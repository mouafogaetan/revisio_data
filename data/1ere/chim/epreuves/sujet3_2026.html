<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Chimie",
  "classe": "Première",
  "sequence": "Séquence 3 : Oxydoréduction en solution aqueuse",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Définitions et concepts fondamentaux",
      "points": "4 pts",
      "enonce": "<div style='background: #f0f8ff; padding: 15px; border-radius: 10px; margin-bottom: 15px;'><p style='color: #2c3e50; font-size: 1rem;'><strong>Consigne :</strong> Répondez aux questions suivantes en utilisant le vocabulaire approprié.</p></div>",
      "questions": [
        {
          "question": "1) Définir l'oxydation et la réduction.",
          "reponse": "<div style='background: #e8f8f5; padding: 10px; border-radius: 8px;'><p><strong>Correction :</strong></p><ul><li><strong>Oxydation :</strong> perte d'électrons.</li><li><strong>Réduction :</strong> gain d'électrons.</li></ul></div>"
        },
        {
          "question": "2) Qu'est-ce qu'un oxydant ? un réducteur ?",
          "reponse": "<div style='background: #e8f8f5; padding: 10px; border-radius: 8px;'><p><strong>Correction :</strong></p><ul><li><strong>Oxydant :</strong> espèce qui capte des électrons.</li><li><strong>Réducteur :</strong> espèce qui cède des électrons.</li></ul></div>"
        },
        {
          "question": "3) Donner la définition d'une réaction d'oxydoréduction.",
          "reponse": "<div style='background: #e8f8f5; padding: 10px; border-radius: 8px;'><p><strong>Correction :</strong> Une réaction d'oxydoréduction est une réaction au cours de laquelle il y a transfert d'électrons entre un oxydant et un réducteur.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Identification des oxydants et réducteurs",
      "points": "6 pts",
      "enonce": "<div style='background: #fef9e7; padding: 15px; border-radius: 10px; margin-bottom: 15px;'><p style='color: #2c3e50; font-size: 1rem;'><strong>Consigne :</strong> Dans les équations suivantes, identifier l'oxydant et le réducteur.</p></div>",
      "questions": [
        {
          "question": "1) <div class='math-block'><div class='math'>$$ \\mathrm{Zn + Cu^{2+} \\rightarrow Zn^{2+} + Cu} $$</div></div>",
          "reponse": "<div style='background: #e8f8f5; padding: 10px; border-radius: 8px;'><p><strong>Correction :</strong></p><ul><li><strong>Oxydant :</strong> Cu²⁺ (gagne 2 électrons)</li><li><strong>Réducteur :</strong> Zn (perd 2 électrons)</li></ul></div>"
        },
        {
          "question": "2) <div class='math-block'><div class='math'>$$ \\mathrm{2Fe^{3+} + Fe \\rightarrow 3Fe^{2+}} $$</div></div>",
          "reponse": "<div style='background: #e8f8f5; padding: 10px; border-radius: 8px;'><p><strong>Correction :</strong></p><ul><li><strong>Oxydant :</strong> Fe³⁺ (réduit en Fe²⁺)</li><li><strong>Réducteur :</strong> Fe (oxydé en Fe²⁺)</li></ul></div>"
        },
        {
          "question": "3) <div class='math-block'><div class='math'>$$ \\mathrm{Cl_2 + 2e^- \\rightarrow 2Cl^-} $$</div></div>",
          "reponse": "<div style='background: #e8f8f5; padding: 10px; border-radius: 8px;'><p><strong>Correction :</strong></p><ul><li>Cette équation est une <strong>réduction</strong>.</li><li><strong>Oxydant :</strong> Cl₂</li></ul></div>"
        },
        {
          "question": "4) <div class='math-block'><div class='math'>$$ \\mathrm{Mg \\rightarrow Mg^{2+} + 2e^-} $$</div></div>",
          "reponse": "<div style='background: #e8f8f5; padding: 10px; border-radius: 8px;'><p><strong>Correction :</strong></p><ul><li>Cette équation est une <strong>oxydation</strong>.</li><li><strong>Réducteur :</strong> Mg</li></ul></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Écriture des demi-équations électroniques",
      "points": "4 pts",
      "enonce": "<div style='background: #eaf2f8; padding: 15px; border-radius: 10px; margin-bottom: 15px;'><p style='color: #2c3e50; font-size: 1rem;'><strong>Consigne :</strong> Écrire les demi-équations électroniques correspondant aux transformations suivantes.</p></div>",
      "questions": [
        {
          "question": "1) Oxydation du zinc \( \\mathrm{Zn} \) en ion zinc \( \\mathrm{Zn^{2+}} \).",
          "reponse": "<div style='background: #e8f8f5; padding: 10px; border-radius: 8px;'><p><strong>Correction :</strong></p><div class='math-block'><div class='math'>$$ \\mathrm{Zn \\rightarrow Zn^{2+} + 2e^-} $$</div></div></div>"
        },
        {
          "question": "2) Réduction de l'ion cuivre \( \\mathrm{Cu^{2+}} \) en cuivre métallique \( \\mathrm{Cu} \).",
          "reponse": "<div style='background: #e8f8f5; padding: 10px; border-radius: 8px;'><p><strong>Correction :</strong></p><div class='math-block'><div class='math'>$$ \\mathrm{Cu^{2+} + 2e^- \\rightarrow Cu} $$</div></div></div>"
        },
        {
          "question": "3) Oxydation de l'ion fer \( \\mathrm{Fe^{2+}} \) en ion fer \( \\mathrm{Fe^{3+}} \).",
          "reponse": "<div style='background: #e8f8f5; padding: 10px; border-radius: 8px;'><p><strong>Correction :</strong></p><div class='math-block'><div class='math'>$$ \\mathrm{Fe^{2+} \\rightarrow Fe^{3+} + e^-} $$</div></div></div>"
        },
        {
          "question": "4) Réduction du dichlore \( \\mathrm{Cl_2} \) en ions chlorure \( \\mathrm{Cl^-} \).",
          "reponse": "<div style='background: #e8f8f5; padding: 10px; border-radius: 8px;'><p><strong>Correction :</strong></p><div class='math-block'><div class='math'>$$ \\mathrm{Cl_2 + 2e^- \\rightarrow 2Cl^-} $$</div></div></div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Application à la vie courante – La rouille",
      "points": "4 pts",
      "enonce": "<div style='background: #f5eef8; padding: 15px; border-radius: 10px; margin-bottom: 15px;'><p style='color: #2c3e50; font-size: 1rem;'><strong>Consigne :</strong> La corrosion du fer est une réaction d'oxydoréduction qui se produit en présence d'eau et de dioxygène.</p></div>",
      "questions": [
        {
          "question": "1) Expliquer pourquoi le fer rouille en présence d'eau et de dioxygène.",
          "reponse": "<div style='background: #e8f8f5; padding: 10px; border-radius: 8px;'><p><strong>Correction :</strong> Le fer s'oxyde en ions \( \\mathrm{Fe^{2+}} \) en cédant des électrons. Les électrons sont captés par le dioxygène qui se réduit en ions hydroxyde \( \\mathrm{OH^-} \). Le \( \\mathrm{Fe^{2+}} \) réagit ensuite avec les ions \( \\mathrm{OH^-} \) pour former de la rouille (\( \\mathrm{Fe(OH)_2} \) puis \( \\mathrm{Fe_2O_3} \)).</p></div>"
        },
        {
          "question": "2) Citer deux méthodes pour protéger le fer contre la corrosion.",
          "reponse": "<div style='background: #e8f8f5; padding: 10px; border-radius: 8px;'><p><strong>Correction :</strong></p><ul><li><strong>Galvanisation :</strong> recouvrir le fer d'une couche de zinc.</li><li><strong>Peinture :</strong> former une barrière protectrice contre l'eau et le dioxygène.</li></ul></div>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Synthèse – Équation bilan et identification",
      "points": "6 pts",
      "enonce": "<div style='background: #fdf2e9; padding: 15px; border-radius: 10px; margin-bottom: 15px;'><p style='color: #2c3e50; font-size: 1rem;'><strong>Consigne :</strong> On plonge un morceau de zinc dans une solution d'acide chlorhydrique.</p></div>",
      "questions": [
        {
          "question": "1) Identifier le gaz dégagé et citer le test qui permet de l'identifier.",
          "reponse": "<div style='background: #e8f8f5; padding: 10px; border-radius: 8px;'><p><strong>Correction :</strong> Le gaz dégagé est le <strong>dihydrogène</strong> \( \\mathrm{H_2} \).</p><p><strong>Test :</strong> On approche une flamme de l'ouverture du tube. Le gaz s'enflamme avec une petite détonation (\"pop\" sound).</p></div>"
        },
        {
          "question": "2) Écrire les demi-équations électroniques puis l'équation bilan de la réaction.",
          "reponse": "<div style='background: #e8f8f5; padding: 10px; border-radius: 8px;'><p><strong>Correction :</strong></p><p><strong>Demi-équations :</strong></p><div class='math-block'><div class='math'>$$ \\mathrm{Zn \\rightarrow Zn^{2+} + 2e^-} $$</div><div class='math'>$$ \\mathrm{2H_3O^+ + 2e^- \\rightarrow H_2 + 2H_2O} $$</div></div><p><strong>Équation bilan :</strong></p><div class='math-block'><div class='math'>$$ \\mathrm{Zn + 2H_3O^+ \\rightarrow Zn^{2+} + H_2 + 2H_2O} $$</div></div></div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
