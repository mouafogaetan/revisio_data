<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) - ajouté par le script de thème */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Introduction à l'Oxydation des Alcools",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'> <h2 style='color: #2c3e50;'>Qu'est-ce que l'oxydation d'un alcool ?</h2> <p style='font-size: 1.1rem; line-height: 1.6;'>L'oxydation d'un alcool est une réaction chimique au cours de laquelle l'alcool perd des atomes d'hydrogène ou gagne des atomes d'oxygène.</p> <ul style='font-size: 1rem; list-style-type: square; padding-left: 20px;'> <li>Il existe deux types d'oxydation : <strong>l'oxydation totale</strong> (combustion) et <strong>l'oxydation ménagée</strong>.</li> <li>L'oxydation ménagée utilise des oxydants doux comme le <strong>KMnO₄</strong> (permanganate de potassium) ou le <strong>K₂Cr₂O₇</strong> (dichromate de potassium) en milieu acide.</li> <li>Le produit obtenu dépend de la classe de l'alcool (primaire, secondaire ou tertiaire).</li> </ul> <div style='background-color: #e8f8f5; padding: 15px; border-radius: 10px; margin: 15px 0; border-left: 5px solid #1abc9c;'> <p style='margin: 0;'><strong>💡 À retenir :</strong> L'oxydation ménagée est une réaction sélective qui permet de transformer les alcools en composés carbonylés (aldéhydes, cétones) ou en acides carboxyliques.</p> </div> <div style='background-color: #fef9e7; padding: 15px; border-radius: 10px; margin: 15px 0;'> <p style='margin: 0;'><strong>Exemple d'oxydant fort :</strong> le permanganate de potassium (KMnO₄) en milieu acide donne une solution violette qui se décolore lors de l'oxydation.</p> </div> </div>",
    "texteParle": "Bonjour à tous. Aujourd'hui, nous allons étudier l'oxydation des alcools. L'oxydation est une réaction au cours de laquelle un alcool perd des atomes d'hydrogène ou gagne des atomes d'oxygène. Il existe deux types d'oxydation : l'oxydation totale, c'est la combustion, et l'oxydation ménagée. L'oxydation ménagée utilise des oxydants doux comme le permanganate de potassium ou le dichromate de potassium. Le produit final de cette réaction dépend de la classe de l'alcool. Les alcools primaires, secondaires et tertiaires ne réagissent pas de la même façon.",
    "note": "L'oxydation ménagée des alcools est une réaction sélective qui dépend de la classe de l'alcool."
  },
  {
    "titre": "Oxydation Totale : Combustion",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'> <h3 style='color: #2c3e50;'>La combustion des alcools</h3> <p style='font-size: 1.1rem; line-height: 1.6;'>La combustion est une oxydation totale qui se fait en présence de dioxygène (O₂).</p> <div style='background-color: #d5f5e3; padding: 15px; border-radius: 10px; margin: 15px 0;'> <h4 style='margin-top: 0; color: #1a5276;'>Équation générale</h4> <div class='math-block' style='text-align: center;'> <div class='math'> $$ C_nH_{2n+2}O + \\frac{3n}{2}O_2 \\longrightarrow nCO_2 + (n+1)H_2O $$ </div> </div> </div> <div style='background-color: #fef9e7; padding: 15px; border-radius: 10px; margin: 15px 0;'> <h4 style='margin-top: 0; color: #7d6608;'>Exemple avec l'éthanol</h4> <div class='math-block' style='text-align: center;'> <div class='math'> $$ C_2H_5OH + 3O_2 \\longrightarrow 2CO_2 + 3H_2O $$ </div> </div> <p style='margin: 5px 0;'>L'éthanol brûle avec une flamme bleue en produisant du dioxyde de carbone et de l'eau.</p> </div> <div style='background-color: #fadbd8; padding: 15px; border-radius: 10px; margin: 15px 0; border-left: 5px solid #e74c3c;'> <p style='margin: 0;'><strong>⚠️ Important :</strong> La combustion incomplète produit du monoxyde de carbone (CO), un gaz très toxique.</p> </div> <div style='display: flex; justify-content: center; margin: 15px 0;'> <div style='background-color: #eaf2f8; padding: 10px; border-radius: 8px; text-align: center; width: 100%;'> <p style='margin: 0; font-size: 0.9rem;'>🔥 L'éthanol est utilisé comme combustible dans les voitures (bioéthanol).</p> </div> </div> </div>",
    "texteParle": "La combustion est une oxydation totale. Elle se fait en présence de dioxygène. Par exemple, l'éthanol brûle pour donner du dioxyde de carbone et de l'eau. Cette réaction est exothermique, elle dégage de la chaleur. Attention, si la combustion est incomplète, il se forme du monoxyde de carbone, qui est un gaz très dangereux. C'est pour cela qu'il est important d'avoir une bonne ventilation lorsqu'on brûle des alcools. L'éthanol est d'ailleurs utilisé comme combustible dans certaines voitures, c'est le bioéthanol.",
    "note": "La combustion des alcools produit du CO₂ et de l'eau. Une combustion incomplète produit du CO toxique."
  },
  {
    "titre": "Oxydation Ménagée des Alcools Primaires",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'> <h3 style='color: #2c3e50;'>Oxydation des alcools primaires</h3> <p style='font-size: 1.1rem; line-height: 1.6;'>Les alcools primaires s'oxydent en deux étapes successives.</p> <div style='display: flex; flex-direction: column; gap: 15px; margin: 15px 0;'> <div style='background-color: #d5f5e3; padding: 15px; border-radius: 8px; border-left: 5px solid #27ae60;'> <h4 style='margin-top: 0; color: #1a5276;'>Étape 1 : Alcool primaire → Aldéhyde</h4> <div class='math-block' style='text-align: center;'> <div class='math'> $$ R-CH_2OH \\xrightarrow{[O]} R-CHO + H_2O $$ </div> </div> <p style='margin: 5px 0; font-size: 0.9rem;'>Exemple : CH₃-CH₂OH + [O] → CH₃-CHO + H₂O (éthanol → éthanal)</p> </div> <div style='background-color: #fef9e7; padding: 15px; border-radius: 8px; border-left: 5px solid #f39c12;'> <h4 style='margin-top: 0; color: #7d6608;'>Étape 2 : Aldéhyde → Acide carboxylique</h4> <div class='math-block' style='text-align: center;'> <div class='math'> $$ R-CHO + [O] \\longrightarrow R-COOH $$ </div> </div> <p style='margin: 5px 0; font-size: 0.9rem;'>Exemple : CH₃-CHO + [O] → CH₃-COOH (éthanal → acide éthanoïque)</p> </div> </div> <div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px; margin: 15px 0; border-left: 5px solid #2980b9;'> <p style='margin: 0;'><strong>📝 Bilan :</strong> R-CH₂OH + 2[O] → R-COOH + H₂O</p> <p style='margin: 5px 0; font-size: 0.9rem;'>L'oxydation totale d'un alcool primaire donne un <strong>acide carboxylique</strong>.</p> </div> </div>",
    "texteParle": "Les alcools primaires s'oxydent en deux étapes. Dans la première étape, l'alcool primaire se transforme en aldéhyde. Par exemple, l'éthanol donne de l'éthanal. Dans la deuxième étape, l'aldéhyde s'oxyde à son tour en acide carboxylique. Ainsi, l'éthanal donne de l'acide éthanoïque. Pour résumer, l'oxydation totale d'un alcool primaire donne un acide carboxylique. Il faut un oxydant assez fort pour réaliser ces deux étapes.",
    "note": "L'oxydation d'un alcool primaire donne d'abord un aldéhyde, puis un acide carboxylique."
  },
  {
    "titre": "Oxydation Ménagée des Alcools Secondaires",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'> <h3 style='color: #2c3e50;'>Oxydation des alcools secondaires</h3> <p style='font-size: 1.1rem; line-height: 1.6;'>Les alcools secondaires s'oxydent en une seule étape pour donner des <strong>cétones</strong>.</p> <div style='background-color: #fef9e7; padding: 15px; border-radius: 10px; margin: 15px 0;'> <div class='math-block' style='text-align: center;'> <div class='math'> $$ R-CH(OH)-R' \\xrightarrow{[O]} R-CO-R' + H_2O $$ </div> </div> <p style='margin: 5px 0;'>L'alcool secondaire perd deux atomes d'hydrogène pour former une cétone.</p> </div> <div style='background-color: #d5f5e3; padding: 15px; border-radius: 10px; margin: 15px 0;'> <h4 style='margin-top: 0; color: #1a5276;'>Exemple</h4> <div class='math-block' style='text-align: center;'> <div class='math'> $$ CH_3-CH(OH)-CH_3 \\xrightarrow{[O]} CH_3-CO-CH_3 + H_2O $$ </div> </div> <p style='margin: 5px 0;'>Propan-2-ol → propanone (acétone)</p> </div> <div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px; margin: 15px 0; border-left: 5px solid #2980b9;'> <p style='margin: 0;'><strong>📝 Bilan :</strong> R-CH(OH)-R' + [O] → R-CO-R' + H₂O</p> <p style='margin: 5px 0; font-size: 0.9rem;'>L'oxydation d'un alcool secondaire donne une <strong>cétone</strong>.</p> </div> <div style='background-color: #fadbd8; padding: 15px; border-radius: 10px; margin: 15px 0; border-left: 5px solid #e74c3c;'> <p style='margin: 0;'><strong>⚠️ Important :</strong> Les cétones sont moins réactives que les aldéhydes et ne s'oxydent pas facilement.</p> </div> </div>",
    "texteParle": "Les alcools secondaires s'oxydent en une seule étape. Ils donnent des cétones. Par exemple, le propan-2-ol, qui est un alcool secondaire, s'oxyde en propanone, que l'on appelle aussi acétone. Contrairement aux aldéhydes, les cétones ne s'oxydent pas facilement. Elles sont plus stables. C'est une différence importante à retenir. L'oxydation d'un alcool secondaire s'arrête donc au stade de la cétone.",
    "note": "L'oxydation d'un alcool secondaire donne une cétone (R-CO-R'). Les cétones ne s'oxydent pas facilement."
  },
  {
    "titre": "Oxydation Ménagée des Alcools Tertiaires",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'> <h3 style='color: #2c3e50;'>Les alcools tertiaires : une exception</h3> <p style='font-size: 1.1rem; line-height: 1.6;'>Les alcools tertiaires <strong>ne subissent pas d'oxydation ménagée</strong>.</p> <div style='background-color: #fadbd8; padding: 15px; border-radius: 10px; margin: 15px 0; border-left: 5px solid #e74c3c;'> <p style='margin: 0; font-weight: bold;'>Pourquoi ?</p> <p style='margin: 5px 0;'>Le carbone porteur du groupe -OH est lié à trois atomes de carbone. Il ne possède <strong>pas d'atome d'hydrogène</strong> sur ce carbone. L'oxydation nécessite la présence d'un hydrogène sur le carbone fonctionnel.</p> </div> <div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px; margin: 15px 0;'> <h4 style='margin-top: 0; color: #1a5276;'>Exemple : 2-méthylpropan-2-ol</h4> <div class='math-block' style='text-align: center;'> <div class='math'> $$ (CH_3)_3-C-OH $$ </div> </div> <p style='margin: 5px 0; font-size: 0.9rem;'>Le carbone central n'a pas d'hydrogène. Il ne peut donc pas s'oxyder.</p> </div> <div style='background-color: #fef9e7; padding: 15px; border-radius: 10px; margin: 15px 0; border-left: 5px solid #f1c40f;'> <p style='margin: 0;'><strong>💡 À retenir :</strong> Les alcools tertiaires ne s'oxydent pas par oxydation ménagée. Ils ne réagissent ni avec KMnO₄ ni avec K₂Cr₂O₇.</p> </div> <div style='display: flex; justify-content: center; margin: 15px 0;'> <div style='background-color: #d5f5e3; padding: 10px; border-radius: 8px; text-align: center; width: 100%;'> <p style='margin: 0; font-size: 0.9rem;'>🔬 Cette propriété permet de distinguer les alcools tertiaires des autres alcools.</p> </div> </div> </div>",
    "texteParle": "Les alcools tertiaires font exception. Ils ne subissent pas d'oxydation ménagée. Pourquoi ? Parce que le carbone qui porte le groupe -OH est lié à trois atomes de carbone. Il n'a pas d'atome d'hydrogène sur ce carbone. Or, l'oxydation nécessite la présence d'un hydrogène sur le carbone fonctionnel. Par exemple, le 2-méthylpropan-2-ol est un alcool tertiaire. Son carbone central n'a pas d'hydrogène, donc il ne s'oxyde pas. Cette propriété permet de distinguer les alcools tertiaires des autres alcools.",
    "note": "Les alcools tertiaires ne subissent pas d'oxydation ménagée car le carbone fonctionnel n'a pas d'hydrogène."
  },
  {
    "titre": "Résumé : Oxydation des Alcools",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'> <h3 style='color: #2c3e50;'>Tableau récapitulatif</h3> <p style='font-size: 1.1rem; line-height: 1.6;'>Le produit d'oxydation dépend de la classe de l'alcool.</p> <div style='overflow-x: auto; margin: 15px 0;'> <table style='width: 100%; border-collapse: collapse; font-size: 0.9rem;'> <thead> <tr style='background-color: #2c3e50; color: white;'> <th style='padding: 12px; border: 1px solid #ddd; text-align: left;'>Classe</th> <th style='padding: 12px; border: 1px solid #ddd; text-align: left;'>Structure</th> <th style='padding: 12px; border: 1px solid #ddd; text-align: left;'>Produit d'oxydation</th> </tr> </thead> <tbody> <tr style='background-color: #d5f5e3;'> <td style='padding: 12px; border: 1px solid #ddd;'><strong>Primaire</strong></td> <td style='padding: 12px; border: 1px solid #ddd;'>R-CH₂-OH</td> <td style='padding: 12px; border: 1px solid #ddd;'>R-COOH (acide carboxylique)</td> </tr> <tr style='background-color: #fef9e7;'> <td style='padding: 12px; border: 1px solid #ddd;'><strong>Secondaire</strong></td> <td style='padding: 12px; border: 1px solid #ddd;'>R-CH(OH)-R'</td> <td style='padding: 12px; border: 1px solid #ddd;'>R-CO-R' (cétone)</td> </tr> <tr style='background-color: #fadbd8;'> <td style='padding: 12px; border: 1px solid #ddd;'><strong>Tertiaire</strong></td> <td style='padding: 12px; border: 1px solid #ddd;'>R-C(OH)(R')(R'')</td> <td style='padding: 12px; border: 1px solid #ddd;'><span style='color: #e74c3c;'>Pas d'oxydation</span></td> </tr> </tbody> </table> </div> <div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px; margin: 15px 0; border-left: 5px solid #2980b9;'> <p style='margin: 0;'><strong>📝 Règle à retenir :</strong></p> <ul style='font-size: 1rem; line-height: 1.8;'> <li>Alcool primaire → Aldéhyde → Acide carboxylique</li> <li>Alcool secondaire → Cétone</li> <li>Alcool tertiaire → Pas d'oxydation</li> </ul> </div> </div>",
    "texteParle": "Voici un tableau récapitulatif. Les alcools primaires s'oxydent en acides carboxyliques. Les alcools secondaires s'oxydent en cétones. Et les alcools tertiaires ne s'oxydent pas. C'est une règle très importante à retenir pour la suite. Si vous avez un alcool primaire, vous pouvez aller jusqu'à l'acide carboxylique. Si vous avez un alcool secondaire, vous vous arrêtez à la cétone. Et si vous avez un alcool tertiaire, il ne réagit pas avec les oxydants ménagés.",
    "note": "Les alcools primaires → acides carboxyliques, secondaires → cétones, tertiaires → pas d'oxydation."
  },
  {
    "titre": "Les Oxydants Utilisés",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'> <h3 style='color: #2c3e50;'>Oxydants forts et leurs caractéristiques</h3> <p style='font-size: 1.1rem; line-height: 1.6;'>Les deux oxydants les plus utilisés en milieu acide sont le permanganate de potassium et le dichromate de potassium.</p> <div style='display: flex; flex-direction: column; gap: 15px; margin: 15px 0;'> <div style='background-color: #e8daef; padding: 15px; border-radius: 8px; border-left: 5px solid #8e44ad;'> <h4 style='margin-top: 0; color: #4a235a;'>Permanganate de potassium (KMnO₄)</h4> <ul style='font-size: 1rem; line-height: 1.8;'> <li><strong>Couleur :</strong> violet en solution</li> <li><strong>Évolution :</strong> se décolore en milieu neutre (MnO₂ brun) ou en milieu acide (Mn²⁺ incolore)</li> <li><strong>Utilisation :</strong> oxydant très puissant</li> </ul> <div class='math-block' style='text-align: center;'> <div class='math'> $$ MnO_4^- + 8H^+ + 5e^- \\longrightarrow Mn^{2+} + 4H_2O $$ </div> </div> </div> <div style='background-color: #fdebd0; padding: 15px; border-radius: 8px; border-left: 5px solid #e67e22;'> <h4 style='margin-top: 0; color: #6c3483;'>Dichromate de potassium (K₂Cr₂O₇)</h4> <ul style='font-size: 1rem; line-height: 1.8;'> <li><strong>Couleur :</strong> orange en solution</li> <li><strong>Évolution :</strong> devient vert (Cr³⁺)</li> <li><strong>Utilisation :</strong> oxydant moins puissant que KMnO₄</li> </ul> <div class='math-block' style='text-align: center;'> <div class='math'> $$ Cr_2O_7^{2-} + 14H^+ + 6e^- \\longrightarrow 2Cr^{3+} + 7H_2O $$ </div> </div> </div> </div> <div style='background-color: #fef9e7; padding: 15px; border-radius: 10px; margin: 15px 0; border-left: 5px solid #f1c40f;'> <p style='margin: 0;'><strong>💡 À retenir :</strong> Les deux oxydants doivent être utilisés en milieu acide (H⁺) pour être efficaces.</p> </div> </div>",
    "texteParle": "Les deux oxydants les plus utilisés pour l'oxydation ménagée sont le permanganate de potassium et le dichromate de potassium. Le permanganate de potassium est violet en solution. Lorsqu'il réagit, il se décolore. En milieu acide, il donne des ions Mn2+ incolores. Le dichromate de potassium est orange. Il devient vert lorsqu'il est réduit en ions Cr3+. Ces deux oxydants doivent être utilisés en milieu acide pour être efficaces.",
    "note": "KMnO₄ (violet → incolore) et K₂Cr₂O₇ (orange → vert) sont les oxydants couramment utilisés."
  },
  {
    "titre": "Exemple : Oxydation de l'Éthanol",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'> <h3 style='color: #2c3e50;'>Étude de cas : l'éthanol</h3> <p style='font-size: 1.1rem; line-height: 1.6;'>L'éthanol (CH₃-CH₂OH) est un alcool primaire. Nous allons suivre son oxydation étape par étape.</p> <div style='display: flex; flex-direction: column; gap: 15px; margin: 15px 0;'> <div style='background-color: #d5f5e3; padding: 15px; border-radius: 8px;'> <h4 style='margin-top: 0; color: #1a5276;'>Étape 1 : Éthanol → Éthanal</h4> <div class='math-block' style='text-align: center;'> <div class='math'> $$ CH_3-CH_2OH + [O] \\xrightarrow{KMnO_4/H^+} CH_3-CHO + H_2O $$ </div> </div> <p style='margin: 5px 0; font-size: 0.9rem;'>C'est l'éthanal (aldéhyde). L'éthanol perd deux atomes d'hydrogène.</p> </div> <div style='background-color: #fef9e7; padding: 15px; border-radius: 8px;'> <h4 style='margin-top: 0; color: #7d6608;'>Étape 2 : Éthanal → Acide éthanoïque</h4> <div class='math-block' style='text-align: center;'> <div class='math'> $$ CH_3-CHO + [O] \\xrightarrow{KMnO_4/H^+} CH_3-COOH $$ </div> </div> <p style='margin: 5px 0; font-size: 0.9rem;'>C'est l'acide éthanoïque (acide carboxylique). L'éthanal gagne un atome d'oxygène.</p> </div> </div> <div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px; margin: 15px 0; border-left: 5px solid #2980b9;'> <p style='margin: 0;'><strong>📝 Bilan global :</strong></p> <div class='math-block' style='text-align: center;'> <div class='math'> $$ CH_3-CH_2OH + 2[O] \\xrightarrow{KMnO_4/H^+} CH_3-COOH + H_2O $$ </div> </div> <p style='margin: 5px 0; font-size: 0.9rem;'>L'éthanol s'oxyde en acide éthanoïque en présence d'un excès d'oxydant.</p> </div> </div>",
    "texteParle": "Prenons l'exemple de l'éthanol, qui est un alcool primaire. Dans une première étape, l'éthanol s'oxyde en éthanal, un aldéhyde. Il perd deux atomes d'hydrogène. Dans une deuxième étape, l'éthanal s'oxyde en acide éthanoïque, un acide carboxylique. Il gagne un atome d'oxygène. Le bilan global est que l'éthanol s'oxyde en acide éthanoïque. C'est ce qu'on obtient lorsque le vin s'oxyde à l'air libre, donnant du vinaigre.",
    "note": "L'oxydation de l'éthanol donne d'abord l'éthanal, puis l'acide éthanoïque."
  },
  {

    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'> <h3 style='color: #2c3e50;'>Étude de cas : le propan-2-ol</h3> <p style='font-size: 1.1rem; line-height: 1.6;'>Le propan-2-ol (CH₃-CH(OH)-CH₃) est un alcool secondaire.</p> <div style='background-color: #fef9e7; padding: 15px; border-radius: 10px; margin: 15px 0;'> <h4 style='margin-top: 0; color: #7d6608;'>Équation d'oxydation</h4> <div class='math-block' style='text-align: center;'> <div class='math'> $$ CH_3-CH(OH)-CH_3 \\xrightarrow{KMnO_4/H^+} CH_3-CO-CH_3 + H_2O $$ </div> </div> <p style='margin: 5px 0;'>Propan-2-ol → propanone (acétone)</p> </div> <div style='display: flex; flex-direction: column; gap: 10px; margin: 15px 0;'> <div style='background-color: #d5f5e3; padding: 10px; border-radius: 8px;'> <p style='margin: 0;'><strong>Observation :</strong> La solution violette de KMnO₄ se décolore.</p> </div> <div style='background-color: #d5f5e3; padding: 10px; border-radius: 8px;'> <p style='margin: 0;'><strong>Produit :</strong> La propanone (acétone) est une cétone.</p> </div> </div> <div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px; margin: 15px 0; border-left: 5px solid #2980b9;'> <p style='margin: 0;'><strong>📝 À retenir :</strong></p> <ul style='font-size: 1rem; line-height: 1.8;'> <li>L'oxydation d'un alcool secondaire s'arrête à la cétone.</li> <li>La cétone ne s'oxyde pas facilement.</li> <li>La propanone est un solvant très utilisé dans l'industrie.</li> </ul> </div> </div>",
    "texteParle": "Prenons maintenant l'exemple du propan-2-ol, qui est un alcool secondaire. Il s'oxyde en propanone, que l'on appelle aussi acétone. Contrairement à l'éthanol, l'oxydation s'arrête ici. La propanone ne s'oxyde pas facilement. L'acétone est un solvant très utilisé dans l'industrie, par exemple pour le dissolvant à ongles. Cette réaction est facile à observer car la solution violette de permanganate de potassium se décolore.",
    "note": "L'oxydation du propan-2-ol donne la propanone (acétone), une cétone qui ne s'oxyde pas."

  {

    // ================================================================

        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();

        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            if (header) header.style.background = 'rgba(15, 23, 42, 0.85)';
            if (footer) footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            if (header) header.style.background = 'rgba(255, 255, 255, 0.85)';
            if (footer) footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
            // Ajouter l'écouteur d'événement click
            themeBtn.addEventListener('click', toggleTheme);
        }
    });
</script>
