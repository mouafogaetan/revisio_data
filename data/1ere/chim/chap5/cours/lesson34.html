<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }

    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }

    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }

    .content-card li:last-child {
        border-bottom: none;
    }

    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }

    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }

    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }

    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }

    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }

    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }

    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }

    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }

    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }

    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }

    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }

    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }

    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }

    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }

    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }

    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }

    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }

    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }

    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }

    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }

    /* Mode jour (par défaut) - ajouté par le script de thème */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>

<div class="app-container">

    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>

    <main class="slide-body" id="slideBody"></main>

    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>

    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>

        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        
            <button class="btn btn-secondary" id="themeToggle" style="font-size:1.2rem; min-width:40px; padding:8px 12px;" title="Passer en mode nuit">
                🌓
            </button>
        </div>

        <div class="auto-indicator" id="autoIndicator">⏸ Lecture manuelle</div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Introduction à la réaction métal-ion métallique",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'> <h2 style='color: #2c3e50;'>Action d'un ion métallique sur un métal</h2> <p style='font-size: 1.1rem; line-height: 1.6;'>Cette réaction met en jeu un <strong>métal</strong> et une <strong>solution contenant des ions d'un autre métal</strong>. C'est une réaction d'oxydoréduction qui se produit spontanément.</p> <ul style='font-size: 1rem; list-style-type: square; padding-left: 20px;'> <li>Le métal le plus réducteur va <strong>s'oxyder</strong> en libérant des électrons.</li> <li>Les ions métalliques vont <strong>capter ces électrons</strong> et se réduire en métal.</li> <li>On observe un <strong>dépôt métallique</strong> sur la surface du métal initial.</li> </ul> <div style='background-color: #e8f8f5; padding: 15px; border-radius: 10px; margin: 15px 0; border-left: 5px solid #1abc9c;'> <p style='margin: 0;'><strong>💡 Exemple classique :</strong> Le zinc métallique plongé dans une solution de sulfate de cuivre. Le zinc (plus réducteur) se dissout et le cuivre se dépose.</p> </div> <div style='background-color: #fef9e7; padding: 15px; border-radius: 10px; margin: 15px 0;'> <p style='margin: 0;'><strong>🔬 Observation :</strong> La solution bleue (ions Cu²⁺) se décolore progressivement et un dépôt rougeâtre de cuivre apparaît.</p> </div> </div>",
    "texteParle": "Bonjour à tous. Aujourd'hui, nous allons étudier l'action d'un ion métallique sur un métal. C'est une réaction d'oxydoréduction très importante. Le principe est simple : un métal, comme le zinc, est plongé dans une solution qui contient des ions d'un autre métal, comme les ions cuivre. Le métal le plus réducteur va s'oxyder en donnant des électrons. Les ions métalliques vont capter ces électrons et se transformer en métal solide. On observe alors un dépôt métallique sur la surface du métal initial. Par exemple, quand on met du zinc dans une solution bleue de sulfate de cuivre, la solution se décolore et un dépôt rouge de cuivre apparaît.",
    "note": "Un métal peut réagir avec les ions d'un autre métal moins réducteur pour former un dépôt métallique."
  },
  {
    "titre": "Expérience : Zinc et solution de Cu²⁺",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'> <h3 style='color: #2c3e50;'>Expérience : Zinc + Cu²⁺</h3> <p style='font-size: 1.1rem; line-height: 1.6;'>On plonge une lame de <strong>zinc</strong> dans une solution de <strong>sulfate de cuivre (CuSO₄)</strong>.</p> <div style='display: flex; flex-direction: column; gap: 15px; margin: 15px 0;'> <div style='background-color: #d5f5e3; padding: 15px; border-radius: 8px;'> <h4 style='margin-top: 0; color: #1a5276;'>Observations</h4> <ul style='font-size: 1rem; line-height: 1.8;'> <li>La solution bleue (Cu²⁺) se <strong>décolore</strong> progressivement.</li> <li>Un dépôt <strong>rougeâtre</strong> de cuivre solide apparaît sur la lame de zinc.</li> <li>La lame de zinc <strong>diminue</strong> de masse.</li> <li>Le dépôt de cuivre <strong>augmente</strong> de masse.</li> </ul> </div> <div style='background-color: #fef9e7; padding: 15px; border-radius: 8px;'> <h4 style='margin-top: 0; color: #7d6608;'>Interprétation</h4> <p style='margin: 5px 0;'>Le zinc (Zn) s'oxyde en ions Zn²⁺. Les ions Cu²⁺ se réduisent en cuivre métallique (Cu).</p> <p style='margin: 5px 0;'>La réaction est : <strong>Zn + Cu²⁺ → Zn²⁺ + Cu</strong></p> </div> </div> <div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px; margin: 15px 0; border-left: 5px solid #2980b9;'> <p style='margin: 0;'><strong>📝 À retenir :</strong> Le zinc est un réducteur plus fort que le cuivre. Il cède ses électrons aux ions cuivre qui se déposent sur la lame.</p> </div> </div>",
    "texteParle": "Voyons maintenant une expérience classique. On plonge une lame de zinc dans une solution de sulfate de cuivre, qui est de couleur bleue. Qu'observe-t-on ? La solution bleue se décolore progressivement parce que les ions cuivre disparaissent. En même temps, un dépôt rougeâtre de cuivre apparaît sur la lame de zinc. La lame de zinc perd de la masse et le dépôt de cuivre gagne de la masse. Cela signifie que le zinc s'est transformé en ions zinc qui passent en solution, tandis que les ions cuivre se sont transformés en cuivre solide. La réaction est donc : Zn + Cu²⁺ → Zn²⁺ + Cu.",
    "note": "Avec le zinc et les ions cuivre (Cu²⁺), on observe la formation d'un dépôt rouge de cuivre."
  },
  {
    "titre": "Demi-équations électroniques",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'> <h3 style='color: #2c3e50;'>Écriture des demi-équations</h3> <p style='font-size: 1.1rem; line-height: 1.6;'>Une réaction d'oxydoréduction peut être décomposée en deux demi-équations : une pour l'oxydation et une pour la réduction.</p> <div style='display: flex; flex-direction: column; gap: 15px; margin: 15px 0;'> <div style='background-color: #d5f5e3; padding: 15px; border-radius: 8px; border-left: 5px solid #27ae60;'> <h4 style='margin-top: 0; color: #1a5276;'>Oxydation du zinc</h4> <div class='math-block' style='text-align: center;'> <div class='math'> $$ Zn \\longrightarrow Zn^{2+} + 2e^- $$ </div> </div> <p style='margin: 5px 0;'>Le zinc <strong>perd</strong> deux électrons. C'est l'oxydation. Le zinc est le <strong>réducteur</strong>.</p> </div> <div style='background-color: #fef9e7; padding: 15px; border-radius: 8px; border-left: 5px solid #f39c12;'> <h4 style='margin-top: 0; color: #7d6608;'>Réduction des ions cuivre</h4> <div class='math-block' style='text-align: center;'> <div class='math'> $$ Cu^{2+} + 2e^- \\longrightarrow Cu $$ </div> </div> <p style='margin: 5px 0;'>Les ions cuivre <strong>gagnent</strong> deux électrons. C'est la réduction. Les ions cuivre sont l'<strong>oxydant</strong>.</p> </div> </div> <div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px; margin: 15px 0; border-left: 5px solid #2980b9;'> <p style='margin: 0;'><strong>📝 À retenir :</strong> Chaque couple redox a sa demi-équation. Les électrons échangés doivent être en même nombre dans les deux demi-équations.</p> </div> </div>",
    "texteParle": "Pour comprendre cette réaction, on peut l'écrire sous forme de deux demi-équations. La première est l'oxydation du zinc. Le zinc perd deux électrons pour donner des ions zinc. C'est l'oxydation, le zinc est le réducteur. La deuxième est la réduction des ions cuivre. Les ions cuivre gagnent deux électrons pour donner du cuivre métallique. C'est la réduction, les ions cuivre sont l'oxydant. Les électrons perdus par le zinc sont exactement ceux gagnés par les ions cuivre. C'est pour cela qu'on dit que la réaction est un échange d'électrons.",
    "note": "Zn → Zn²⁺ + 2e⁻ (oxydation) et Cu²⁺ + 2e⁻ → Cu (réduction)."
  },
  {
    "titre": "Équation-bilan de la réaction",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'> <h3 style='color: #2c3e50;'>Équation-bilan</h3> <p style='font-size: 1.1rem; line-height: 1.6;'>Pour obtenir l'équation-bilan, on additionne les deux demi-équations en veillant à ce que le nombre d'électrons soit le même dans les deux.</p> <div style='background-color: #e8f8f5; padding: 15px; border-radius: 10px; margin: 15px 0;'> <h4 style='margin-top: 0; color: #1a5276;'>Équation-bilan</h4> <div class='math-block' style='text-align: center;'> <div class='math'> $$ Zn + Cu^{2+} \\longrightarrow Zn^{2+} + Cu $$ </div> </div> <p style='margin: 5px 0;'>Cette équation est <strong>équilibrée</strong> en atomes et en charges.</p> </div> <div style='display: flex; flex-direction: column; gap: 10px; margin: 15px 0;'> <div style='background-color: #d5f5e3; padding: 10px; border-radius: 8px;'> <p style='margin: 0;'><strong>✅ Vérification des atomes :</strong> 1 Zn à gauche, 1 Zn à droite. 1 Cu à gauche, 1 Cu à droite.</p> </div> <div style='background-color: #d5f5e3; padding: 10px; border-radius: 8px;'> <p style='margin: 0;'><strong>✅ Vérification des charges :</strong> +2 à gauche, +2 à droite.</p> </div> </div> <div style='background-color: #fef9e7; padding: 15px; border-radius: 10px; margin: 15px 0; border-left: 5px solid #f1c40f;'> <p style='margin: 0;'><strong>💡 À retenir :</strong> L'équation-bilan montre que le zinc métallique est transformé en ion zinc et que l'ion cuivre est transformé en cuivre métallique.</p> </div> </div>",
    "texteParle": "En additionnant les deux demi-équations, on obtient l'équation-bilan de la réaction. Les deux électrons libérés par le zinc sont captés par les ions cuivre. On les annule donc dans l'équation finale. On obtient : Zn + Cu²⁺ → Zn²⁺ + Cu. Cette équation est équilibrée : il y a un atome de zinc de chaque côté et un atome de cuivre de chaque côté. Les charges aussi sont équilibrées : +2 à gauche et +2 à droite. Cette équation résume bien ce qui se passe : le zinc se dissout en ions zinc, et les ions cuivre se déposent en cuivre solide.",
    "note": "L'équation-bilan est : Zn + Cu²⁺ → Zn²⁺ + Cu."
  },
  {
    "titre": "Expérience : Fer et solution de Cu²⁺",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'> <h3 style='color: #2c3e50;'>Expérience : Fer + Cu²⁺</h3> <p style='font-size: 1.1rem; line-height: 1.6;'>On plonge une lame de <strong>fer</strong> dans une solution de <strong>sulfate de cuivre (CuSO₄)</strong>.</p> <div style='display: flex; flex-direction: column; gap: 15px; margin: 15px 0;'> <div style='background-color: #d5f5e3; padding: 15px; border-radius: 8px;'> <h4 style='margin-top: 0; color: #1a5276;'>Observations</h4> <ul style='font-size: 1rem; line-height: 1.8;'> <li>La solution bleue (Cu²⁺) se <strong>décolore</strong> progressivement.</li> <li>Un dépôt <strong>rougeâtre</strong> de cuivre apparaît sur la lame de fer.</li> <li>La lame de fer <strong>diminue</strong> de masse.</li> </ul> </div> <div style='background-color: #fef9e7; padding: 15px; border-radius: 8px;'> <h4 style='margin-top: 0; color: #7d6608;'>Demi-équations</h4> <p style='margin: 5px 0;'><strong>Oxydation du fer :</strong></p> <div class='math-block' style='text-align: center;'> <div class='math'> $$ Fe \\longrightarrow Fe^{2+} + 2e^- $$ </div> </div> <p style='margin: 5px 0;'><strong>Réduction des ions cuivre :</strong></p> <div class='math-block' style='text-align: center;'> <div class='math'> $$ Cu^{2+} + 2e^- \\longrightarrow Cu $$ </div> </div> </div> </div> <div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px; margin: 15px 0; border-left: 5px solid #2980b9;'> <p style='margin: 0;'><strong>📝 Équation-bilan :</strong> Fe + Cu²⁺ → Fe²⁺ + Cu</p> <p style='margin: 5px 0; font-size: 0.9rem;'>Le fer est plus réducteur que le cuivre, il se dissout et le cuivre se dépose.</p> </div> </div>",
    "texteParle": "On peut faire la même expérience avec le fer. On plonge une lame de fer dans une solution bleue de sulfate de cuivre. Les observations sont similaires : la solution se décolore et un dépôt rouge de cuivre se forme sur la lame de fer. Le fer s'oxyde en ions fer II en perdant deux électrons. Les ions cuivre se réduisent en cuivre métallique en gagnant ces électrons. L'équation-bilan est : Fe + Cu²⁺ → Fe²⁺ + Cu. Le fer est donc un réducteur plus fort que le cuivre puisqu'il arrive à déplacer les ions cuivre de la solution.",

    "titre": "Comparaison : cas où la réaction ne se produit pas",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'> <h3 style='color: #2c3e50;'>Quand la réaction ne se produit pas</h3> <p style='font-size: 1.1rem; line-height: 1.6;'>Tous les métaux ne réagissent pas avec tous les ions métalliques. La réaction n'est possible que si le métal est <strong>plus réducteur</strong> que l'ion métallique.</p> <div style='display: flex; flex-direction: column; gap: 15px; margin: 15px 0;'> <div style='background-color: #fadbd8; padding: 15px; border-radius: 8px; border-left: 5px solid #e74c3c;'> <h4 style='margin-top: 0; color: #922b21;'>Cas : Cuivre + Zn²⁺</h4> <p style='margin: 5px 0;'>On plonge du cuivre dans une solution de sulfate de zinc (ZnSO₄).</p> <p style='margin: 5px 0;'><strong>Observation :</strong> <span style='color: #e74c3c;'>Aucune réaction</span>.</p> <p style='margin: 5px 0;'><strong>Explication :</strong> Le cuivre est moins réducteur que le zinc. Il ne peut pas déplacer les ions Zn²⁺.</p> </div> <div style='background-color: #fadbd8; padding: 15px; border-radius: 8px; border-left: 5px solid #e74c3c;'> <h4 style='margin-top: 0; color: #922b21;'>Cas : Argent + Cu²⁺</h4> <p style='margin: 5px 0;'>On plonge de l'argent dans une solution de sulfate de cuivre (CuSO₄).</p> <p style='margin: 5px 0;'><strong>Observation :</strong> <span style='color: #e74c3c;'>Aucune réaction</span>.</p> <p style='margin: 5px 0;'><strong>Explication :</strong> L'argent est moins réducteur que le cuivre.</p> </div> </div> <div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px; margin: 15px 0; border-left: 5px solid #2980b9;'> <p style='margin: 0;'><strong>📝 Règle :</strong> Un métal réagit avec les ions d'un autre métal <strong>moins réducteur</strong> que lui. Pour prévoir la réaction, on utilise la classification électrochimique.</p> </div> </div>",
    "texteParle": "Mais attention, tous les métaux ne réagissent pas avec tous les ions métalliques. Par exemple, si on plonge du cuivre dans une solution de sulfate de zinc, il ne se passe rien. Pourquoi ? Parce que le cuivre est moins réducteur que le zinc. Il ne peut pas arracher les électrons aux ions zinc pour les transformer en zinc métallique. De même, l'argent ne réagit pas avec les ions cuivre. La règle est simple : un métal peut réagir avec les ions d'un métal moins réducteur que lui. On verra plus tard comment prévoir ces réactions en utilisant la classification électrochimique.",
    "note": "Un métal ne réagit qu'avec les ions d'un métal moins réducteur que lui."

  {
    "titre": "Couples redox en jeu",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'> <h3 style='color: #2c3e50;'>Les couples redox impliqués</h3> <p style='font-size: 1.1rem; line-height: 1.6;'>Chaque réaction métal-ion métallique met en jeu deux couples redox.</p> <div style='display: flex; flex-direction: column; gap: 15px; margin: 15px 0;'> <div style='background-color: #d5f5e3; padding: 15px; border-radius: 8px;'> <h4 style='margin-top: 0; color: #1a5276;'>Couple Zn²⁺/Zn</h4> <div class='math-block' style='text-align: center;'> <div class='math'> $$ Zn^{2+} + 2e^- \\rightleftharpoons Zn $$ </div> </div> <p style='margin: 5px 0;'>Le zinc est le <strong>réducteur</strong> (forme réduite). L'ion Zn²⁺ est l'<strong>oxydant</strong> (forme oxydée).</p> </div> <div style='background-color: #fef9e7; padding: 15px; border-radius: 8px;'> <h4 style='margin-top: 0; color: #7d6608;'>Couple Cu²⁺/Cu</h4> <div class='math-block' style='text-align: center;'> <div class='math'> $$ Cu^{2+} + 2e^- \\rightleftharpoons Cu $$ </div> </div> <p style='margin: 5px 0;'>Le cuivre est le <strong>réducteur</strong> (forme réduite). L'ion Cu²⁺ est l'<strong>oxydant</strong> (forme oxydée).</p> </div> </div> <div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px; margin: 15px 0; border-left: 5px solid #2980b9;'> <p style='margin: 0;'><strong>📝 À retenir :</strong> Dans une réaction métal-ion métallique, le métal le plus réducteur (qui s'oxyde le plus facilement) donne ses électrons à l'ion de l'autre couple.</p> </div> </div>",
    "texteParle": "Chaque réaction métal-ion métallique met en jeu deux couples redox. Le premier couple est Zn²⁺/Zn. Dans ce couple, le zinc est le réducteur et l'ion zinc est l'oxydant. Le deuxième couple est Cu²⁺/Cu. Le cuivre est le réducteur et l'ion cuivre est l'oxydant. Dans la réaction entre le zinc et les ions cuivre, le zinc (réducteur du premier couple) réagit avec les ions cuivre (oxydant du deuxième couple). Les électrons sont transférés du zinc vers les ions cuivre. C'est le principe de base des réactions d'oxydoréduction.",
    "note": "Les couples en jeu sont Zn²⁺/Zn et Cu²⁺/Cu. Le zinc réducteur réagit avec l'oxydant Cu²⁺."

  {
    "titre": "Comparaison des pouvoirs réducteurs",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'> <h3 style='color: #2c3e50;'>Pouvoirs réducteurs comparés</h3> <p style='font-size: 1.1rem; line-height: 1.6;'>Les métaux n'ont pas tous la même tendance à perdre leurs électrons. On dit qu'ils ont des <strong>pouvoirs réducteurs</strong> différents.</p> <div style='background-color: #e8f8f5; padding: 15px; border-radius: 10px; margin: 15px 0;'> <h4 style='margin-top: 0; color: #1a5276;'>Classification électrochimique (ordre croissant)</h4> <div style='display: flex; flex-direction: column; gap: 5px; font-size: 1rem;'> <div style='background-color: #fadbd8; padding: 5px 10px; border-radius: 5px;'> <strong>Moins réducteur :</strong> Argent (Ag) &lt; Cuivre (Cu) &lt; Fer (Fe) &lt; Zinc (Zn) &lt; Aluminium (Al) <strong>Plus réducteur</strong> </div> </div> </div> <div style='display: flex; flex-direction: column; gap: 10px; margin: 15px 0;'> <div style='background-color: #d5f5e3; padding: 10px; border-radius: 8px;'> <p style='margin: 0;'><strong>✅ Zn réagit avec Cu²⁺ :</strong> Zn est plus réducteur que Cu.</p> </div> <div style='background-color: #d5f5e3; padding: 10px; border-radius: 8px;'> <p style='margin: 0;'><strong>✅ Fe réagit avec Cu²⁺ :</strong> Fe est plus réducteur que Cu.</p> </div> <div style='background-color: #fadbd8; padding: 10px; border-radius: 8px;'> <p style='margin: 0;'><strong>❌ Cu ne réagit pas avec Zn²⁺ :</strong> Cu est moins réducteur que Zn.</p> </div> </div> <div style='background-color: #fef9e7; padding: 15px; border-radius: 10px; margin: 15px 0; border-left: 5px solid #f1c40f;'> <p style='margin: 0;'><strong>💡 Règle :</strong> Un réducteur réagit avec l'oxydant d'un couple situé <strong>à droite</strong> de lui dans la classification.</p> </div> </div>",
    "texteParle": "Tous les métaux n'ont pas la même tendance à perdre leurs électrons. On dit qu'ils ont des pouvoirs réducteurs différents. On peut les classer par ordre de pouvoir réducteur croissant. Le zinc est plus réducteur que le cuivre, et le fer est aussi plus réducteur que le cuivre. C'est pour cela que le zinc et le fer réagissent avec les ions cuivre. En revanche, le cuivre est moins réducteur que le zinc, donc il ne réagit pas avec les ions zinc. La règle est simple : un réducteur peut réagir avec l'oxydant d'un couple qui est moins réducteur que lui.",
    "note": "Zn et Fe sont plus réducteurs que Cu, donc ils réagissent avec les ions Cu²⁺."

  {
    "titre": "Applications dans la vie quotidienne",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'> <h3 style='color: #2c3e50;'>Applications pratiques</h3> <p style='font-size: 1.1rem; line-height: 1.6;'>La réaction métal-ion métallique a de nombreuses applications dans la vie courante.</p> <div style='display: flex; flex-direction: column; gap: 15px; margin: 15px 0;'> <div style='background-color: #d5f5e3; padding: 15px; border-radius: 8px; border-left: 5px solid #27ae60;'> <h4 style='margin-top: 0; color: #1a5276;'>La galvanisation</h4> <p style='margin: 5px 0;'>Protection du fer contre la corrosion par un revêtement de zinc.</p> <p style='margin: 5px 0; font-size: 0.9rem;'>Le zinc, plus réducteur que le fer, se sacrifie pour protéger le fer de l'oxydation.</p> </div> <div style='background-color: #fef9e7; padding: 15px; border-radius: 8px; border-left: 5px solid #f39c12;'> <h4 style='margin-top: 0; color: #7d6608;'>La récupération des métaux</h4> <p style='margin: 5px 0;'>Extraction du cuivre des solutions par ajout de fer ou de zinc.</p> <p style='margin: 5px 0; font-size: 0.9rem;'>Le fer moins cher permet de récupérer le cuivre des solutions usées.</p> </div> <div style='background-color: #eaf2f8; padding: 15px; border-radius: 8px; border-left: 5px solid #2980b9;'> <h4 style='margin-top: 0; color: #1a5276;'>Les piles</h4> <p style='margin: 5px 0;'>Le principe des piles est basé sur une réaction métal-ion métallique.</p> <p style='margin: 5px 0; font-size: 0.9rem;'>Par exemple, la pile Daniell utilise la réaction Zn + Cu²⁺ → Zn²⁺ + Cu.</p> </div> </div> <div style='background-color: #e8f8f5; padding: 15px; border-radius: 10px; margin: 15px 0; border-left: 5px solid #1abc9c;'> <p style='margin: 0;'><strong>💡 À retenir :</strong> Ces réactions sont à la base de nombreux procédés industriels et de technologies comme les piles.</p> </div> </div>",
    "texteParle": "La réaction métal-ion métallique a de nombreuses applications pratiques. Par exemple, la galvanisation consiste à recouvrir le fer d'une couche de zinc pour le protéger de la corrosion. Le zinc, plus réducteur que le fer, se sacrifie pour protéger le fer. Dans l'industrie, on utilise le fer, qui est moins cher, pour récupérer le cuivre des solutions usées. Enfin, le principe des piles est basé sur ces réactions. La pile Daniell, par exemple, utilise exactement la réaction entre le zinc et les ions cuivre que nous avons étudiée. Ces réactions sont donc très importantes, tant dans l'industrie que dans la vie quotidienne.",
    "note": "Ces réactions sont utilisées pour la galvanisation, la récupération des métaux et dans les piles."

    "texteParle": "Pour conclure, retenons les points essentiels. Premièrement, un métal réducteur réagit avec les ions d'un métal moins réducteur. Par exemple, le zinc réagit avec les ions cuivre. Deuxièmement, les;

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;

    const total = slides.length;
    const synth = window.speechSynthesis;

    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }

    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }

    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        
        loadingCancelled = false;
        isLoading = true;
        
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }

    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }

    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }

    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }

    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }

    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }

    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);

        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }

    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }

            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }

            // Arrêter toute lecture en cours
            stopSpeaking();
            
            // Réinitialiser l'état de pause
            isPaused = false;
            
            showLoading();
            setStatus("Initialisation...", 'loading');

            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;

                let isFinished = false;
                let errorHandled = false;

                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };

                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };

                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    
                    resolve();
                };

                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }

                currentUtterance = utterance;
                
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }

            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }

    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        // Arrêter complètement la lecture
        stopSpeaking();
        
        await new Promise(r => setTimeout(r, 50));
        
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }

        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');

        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }

    async function goToNext() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }

    async function goToPrev() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }

    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }

        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }

        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }

        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }

        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }

    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }

        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }

        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');

        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });

        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });

        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });

        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });

        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });

        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });

        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });

        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }

    init();
});


    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;

    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');

        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            if (header) header.style.background = 'rgba(15, 23, 42, 0.85)';
            if (footer) footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            if (header) header.style.background = 'rgba(255, 255, 255, 0.85)';
            if (footer) footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }

    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
            // Ajouter l'écouteur d'événement click
            themeBtn.addEventListener('click', toggleTheme);
        }
    });

</script>
