<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Maths 1ère A",
  "classe": "Première",
  "sequence": "Séquence 1",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Équations, inéquations et systèmes (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='font-size:1.1em; line-height:1.6;'><p>Cet exercice porte sur la résolution d'équations, d'inéquations du second degré et de systèmes linéaires.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>1. (1.5 pts)</strong> Résoudre dans \\(\\mathbb{R}\\) l'équation : \\(2x^2 - 5x + 2 = 0\\).</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p>Soit \\(2x^2 - 5x + 2 = 0\\). On calcule le discriminant :</p><p>\\(\\Delta = (-5)^2 - 4 \\times 2 \\times 2 = 25 - 16 = 9\\).</p><p>\\(\\Delta > 0\\), l'équation admet deux racines réelles distinctes :</p><p>\\(x_1 = \\dfrac{5 - \\sqrt{9}}{2 \\times 2} = \\dfrac{5 - 3}{4} = \\dfrac{2}{4} = \\dfrac{1}{2}\\).</p><p>\\(x_2 = \\dfrac{5 + \\sqrt{9}}{4} = \\dfrac{5 + 3}{4} = \\dfrac{8}{4} = 2\\).</p><p>L'ensemble solution est : \\(\\mathcal{S} = \\left\\{\\dfrac{1}{2} ; 2\\right\\}\\).</p></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>2. (1 pt)</strong> Résoudre dans \\(\\mathbb{R}\\) l'inéquation : \\(2x^2 - 5x + 2 \\geq 0\\).</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p>On utilise le tableau de signes du trinôme \\(2x^2 - 5x + 2\\).</p><p>Les racines sont \\(\\dfrac{1}{2}\\) et 2.</p><p>Le coefficient \\(a = 2 > 0\\), donc le trinôme est positif à l'extérieur des racines.</p><p>Ainsi : \\(2x^2 - 5x + 2 \\geq 0 \\iff x \\leq \\dfrac{1}{2}\\) ou \\(x \\geq 2\\).</p><p>L'ensemble solution est : \\(\\mathcal{S} = \\left] -\\infty ; \\dfrac{1}{2} \\right] \\cup [2 ; +\\infty[\\).</p></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>3. (1.5 pts)</strong> Résoudre le système d'équations suivant :</p><div style='text-align:center;'><p>\\(\\begin{cases} 2x + 3y = 8 \\\\ x - y = -1 \\end{cases}\\)</p></div></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p>Par substitution : de la deuxième équation, \\(x = y - 1\\).</p><p>On remplace dans la première : \\(2(y - 1) + 3y = 8 \\Rightarrow 2y - 2 + 3y = 8 \\Rightarrow 5y = 10 \\Rightarrow y = 2\\).</p><p>On en déduit \\(x = y - 1 = 2 - 1 = 1\\).</p><p>La solution du système est : \\(\\mathcal{S} = \\{(1 ; 2)\\}\\).</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Dénombrement (3 pts)",
      "points": "3 pts",
      "enonce": "<div style='font-size:1.1em; line-height:1.6;'><p>Cet exercice porte sur les techniques de base du dénombrement.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>1. (1 pt)</strong> Dans une classe de 30 élèves, on doit élire un délégué et un suppléant. Combien y a-t-il de choix possibles ?</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p>Il s'agit de choisir un délégué puis un suppléant. L'ordre est important, et il n'y a pas de remise. On utilise les arrangements :</p><p>\\(A_{30}^2 = 30 \\times 29 = 870\\).</p><p>Il y a donc <strong>870 choix possibles</strong>.</p></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>2. (2 pts)</strong> Dans une classe de 30 élèves, on choisit 5 élèves pour représenter la classe. Combien de groupes différents peut-on former ?</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p>Il s'agit de choisir un groupe de 5 élèves parmi 30. L'ordre n'est pas important et il n'y a pas de remise. On utilise les combinaisons :</p><p>\\(C_{30}^5 = \\dfrac{30!}{5!(30-5)!} = \\dfrac{30 \\times 29 \\times 28 \\times 27 \\times 26}{5 \\times 4 \\times 3 \\times 2 \\times 1} = 142506\\).</p><p>On peut former <strong>142 506 groupes différents</strong>.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Généralités sur les fonctions (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='font-size:1.1em; line-height:1.6;'><p>On considère la fonction \\(f\\) définie sur \\(\\mathbb{R}\\) par \\(f(x) = |x - 1| - 2\\).</p></div>",
      "questions": [
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>1. (1 pt)</strong> Exprimer \\(f(x)\\) sans la valeur absolue.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p>Par définition de la valeur absolue :</p><p>\\(f(x) = \\begin{cases} x - 1 - 2 = x - 3 & \\text{si } x \\geq 1 \\\\ -(x - 1) - 2 = -x + 1 - 2 = -x - 1 & \\text{si } x < 1 \\end{cases}\\)</p><p>Donc \\(f(x) = \\begin{cases} x - 3 & \\text{si } x \\geq 1 \\\\ -x - 1 & \\text{si } x < 1 \\end{cases}\\).</p></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>2. (1.5 pts)</strong> Résoudre graphiquement l'inéquation \\(f(x) \\geq 0\\).</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p>On résout \\(f(x) \\geq 0\\).</p><p><strong>Cas 1 :</strong> \\(x \\geq 1\\) : \\(x - 3 \\geq 0 \\Rightarrow x \\geq 3\\).</p><p><strong>Cas 2 :</strong> \\(x < 1\\) : \\(-x - 1 \\geq 0 \\Rightarrow -x \\geq 1 \\Rightarrow x \\leq -1\\).</p><p>L'ensemble solution est : \\(\\mathcal{S} = \\left] -\\infty ; -1 \\right] \\cup [3 ; +\\infty[\\).</p></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>3. (1.5 pts)</strong> Construire la courbe représentative de \\(f\\) dans un repère orthonormé.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p>La courbe est constituée de deux demi-droites :</p><ul><li>Pour \\(x \\geq 1\\), c'est la droite d'équation \\(y = x - 3\\).</li><li>Pour \\(x < 1\\), c'est la droite d'équation \\(y = -x - 1\\).</li></ul><p>Le point d'angle est \\(A(1 ; -2)\\). Les deux droites se coupent en \\(A\\).</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Limites et asymptotes (3 pts)",
      "points": "3 pts",
      "enonce": "<div style='font-size:1.1em; line-height:1.6;'><p>Soit \\(f\\) la fonction définie par \\(f(x) = \\dfrac{2x + 3}{x - 1}\\).</p></div>",
      "questions": [
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>1. (1.5 pts)</strong> Déterminer les limites de \\(f\\) aux bornes de son ensemble de définition.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p>L'ensemble de définition est \\(\\mathcal{D}_f = \\mathbb{R} \\setminus \\{1\\}\\).</p><p><strong>Limites en \\(\\pm\\infty\\) :</strong></p><p>\\(\\lim\\limits_{x \\to +\\infty} f(x) = \\lim\\limits_{x \\to +\\infty} \\dfrac{2x}{x} = 2\\).</p><p>\\(\\lim\\limits_{x \\to -\\infty} f(x) = \\lim\\limits_{x \\to -\\infty} \\dfrac{2x}{x} = 2\\).</p><p><strong>Limites en \\(x = 1\\) :</strong></p><p>\\(\\lim\\limits_{x \\to 1^+} (x - 1) = 0^+\\), donc \\(\\lim\\limits_{x \\to 1^+} f(x) = +\\infty\\).</p><p>\\(\\lim\\limits_{x \\to 1^-} (x - 1) = 0^-\\), donc \\(\\lim\\limits_{x \\to 1^-} f(x) = -\\infty\\).</p></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>2. (1.5 pts)</strong> En déduire les équations des asymptotes.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p>On a :</p><ul><li>Une asymptote horizontale d'équation \\(y = 2\\) (car les limites en \\(\\pm\\infty\\) valent 2).</li><li>Une asymptote verticale d'équation \\(x = 1\\) (car \\(\\lim\\limits_{x \\to 1} f(x) = \\pm\\infty\\)).</li></ul></div>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Dérivées (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='font-size:1.1em; line-height:1.6;'><p>Soit \\(f\\) la fonction définie sur \\(\\mathbb{R}\\) par \\(f(x) = -2x^2 + 4x + 1\\).</p></div>",
      "questions": [
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>1. (1 pt)</strong> Calculer \\(f'(x)\\).</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p>\\(f'(x) = -2 \\times 2x + 4 = -4x + 4 = 4(1 - x)\\).</p></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>2. (1.5 pts)</strong> Dresser le tableau de variations de \\(f\\) sur \\(\\mathbb{R}\\).</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p>\\(f'(x) = -4x + 4\\). Le signe de \\(f'\\) est :</p><ul><li>\\(f'(x) > 0 \\iff -4x + 4 > 0 \\iff x < 1\\).</li><li>\\(f'(x) < 0 \\iff x > 1\\).</li><li>\\(f'(1) = 0\\).</li></ul><p>Tableau de variations :</p><div style='overflow-x:auto;'><table style='border-collapse:collapse; width:80%; margin:0 auto;'><tr><th style='border:1px solid #ddd; padding:8px; background-color:#f2f2f2;'>\\(x\\)</th><td style='border:1px solid #ddd; padding:8px;'>\\(-\\infty\\)</td><td style='border:1px solid #ddd; padding:8px;'>1</td><td style='border:1px solid #ddd; padding:8px;'>\\(+\\infty\\)</td></tr><tr><th style='border:1px solid #ddd; padding:8px; background-color:#f2f2f2;'>\\(f'(x)\\)</th><td style='border:1px solid #ddd; padding:8px;'>+</td><td style='border:1px solid #ddd; padding:8px;'>0</td><td style='border:1px solid #ddd; padding:8px;'>-</td></tr><tr><th style='border:1px solid #ddd; padding:8px; background-color:#f2f2f2;'>\\(f(x)\\)</th><td style='border:1px solid #ddd; padding:8px;'>\\(-\\infty\\)</td><td style='border:1px solid #ddd; padding:8px;'>3 (maximum)</td><td style='border:1px solid #ddd; padding:8px;'>\\(-\\infty\\)</td></tr></table></div><p>Le maximum est \\(f(1) = -2 \\times 1^2 + 4 \\times 1 + 1 = -2 + 4 + 1 = 3\\).</p></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>3. (1.5 pts)</strong> Déterminer l'équation de la tangente à la courbe de \\(f\\) au point d'abscisse \\(x_0 = 2\\).</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p>L'équation de la tangente est : \\(y = f'(2)(x - 2) + f(2)\\).</p><p>\\(f(2) = -2 \\times 4 + 8 + 1 = -8 + 8 + 1 = 1\\).</p><p>\\(f'(2) = -4 \\times 2 + 4 = -8 + 4 = -4\\).</p><p>Donc : \\(y = -4(x - 2) + 1 = -4x + 8 + 1 = -4x + 9\\).</p><p>La tangente a pour équation : \\(\\boxed{y = -4x + 9}\\).</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 6 : Statistique (2 pts)",
      "points": "2 pts",
      "enonce": "<div style='font-size:1.1em; line-height:1.6;'><p>Le tableau ci-dessous donne la répartition des notes obtenues par les élèves d'une classe de Première à un devoir de Mathématiques.</p><div style='overflow-x:auto;'><table style='border-collapse:collapse; width:100%; margin:0 auto;'><tr><th style='border:1px solid #ddd; padding:8px; background-color:#f2f2f2;'>Notes</th><td style='border:1px solid #ddd; padding:8px;'>[0;4[</td><td style='border:1px solid #ddd; padding:8px;'>[4;8[</td><td style='border:1px solid #ddd; padding:8px;'>[8;12[</td><td style='border:1px solid #ddd; padding:8px;'>[12;16[</td><td style='border:1px solid #ddd; padding:8px;'>[16;20]</td></tr><tr><th style='border:1px solid #ddd; padding:8px; background-color:#f2f2f2;'>Effectifs</th><td style='border:1px solid #ddd; padding:8px;'>2</td><td style='border:1px solid #ddd; padding:8px;'>5</td><td style='border:1px solid #ddd; padding:8px;'>10</td><td style='border:1px solid #ddd; padding:8px;'>8</td><td style='border:1px solid #ddd; padding:8px;'>5</td></tr></table></div></div>",
      "questions": [
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>1. (1 pt)</strong> Calculer la moyenne de cette série statistique.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p>On prend le centre des classes : 2, 6, 10, 14, 18.</p><p>\\(\\bar{x} = \\dfrac{2 \\times 2 + 5 \\times 6 + 10 \\times 10 + 8 \\times 14 + 5 \\times 18}{2 + 5 + 10 + 8 + 5}\\)</p><p>\\(= \\dfrac{4 + 30 + 100 + 112 + 90}{30} = \\dfrac{336}{30} = 11.2\\).</p><p>La moyenne est de <strong>11.2</strong>.</p></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>2. (1 pt)</strong> Déterminer la classe médiane.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p>L'effectif total est \\(N = 30\\). La médiane est la valeur qui partage la série en deux, c'est-à-dire la valeur correspondant à \\(\\dfrac{N}{2} = 15\\).</p><p>Effectifs cumulés croissants : [2 ; 7 ; 17 ; 25 ; 30].</p><p>La 15ème valeur se trouve dans la classe [8 ; 12[.</p><p>La classe médiane est donc <strong>[8 ; 12[</strong>.</p></div>"

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
