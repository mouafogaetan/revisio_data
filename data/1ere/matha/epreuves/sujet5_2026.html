<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Maths 1ère A",
  "classe": "Première A",
  "sequence": "Évaluation séquentielle n°5",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Équations et inéquations du second degré (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='font-size:1em; line-height:1.6;'>Résoudre dans \\(\\mathbb{R}\\) les équations et inéquations suivantes.</div>",
      "questions": [
        {
          "question": "1) Résoudre l'équation : \\( 2x^2 - 5x - 3 = 0 \\)",
          "reponse": "<p>Discriminant : \\(\\Delta = (-5)^2 - 4(2)(-3) = 25 + 24 = 49\\)</p><p>\\(\\sqrt{\\Delta} = 7\\)</p><p>\\(x_1 = \\frac{5 - 7}{4} = -\\frac{1}{2}\\)</p><p>\\(x_2 = \\frac{5 + 7}{4} = 3\\)</p><p>Donc \\(S = \\{-\\frac{1}{2} ; 3\\}\\)</p>"
        },
        {
          "question": "2) Résoudre l'inéquation : \\( -x^2 + 4x - 3 \\geq 0 \\)",
          "reponse": "<p>On résout l'équation \\( -x^2 + 4x - 3 = 0 \\)</p><p>Discriminant : \\(\\Delta = 16 - 4(-1)(-3) = 16 - 12 = 4\\)</p><p>\\(x_1 = \\frac{-4 - 2}{-2} = 1\\) et \\(x_2 = \\frac{-4 + 2}{-2} = 3\\)</p><p>Tableau de signes :</p><div style='overflow-x:auto;'><table style='border-collapse:collapse; width:100%; min-width:250px;'><tr style='background:#e0e0e0;'><th style='border:1px solid #ccc; padding:6px;'>x</th><th style='border:1px solid #ccc; padding:6px;'>-∞</th><th style='border:1px solid #ccc; padding:6px;'>1</th><th style='border:1px solid #ccc; padding:6px;'>3</th><th style='border:1px solid #ccc; padding:6px;'>+∞</th></tr><tr><td style='border:1px solid #ccc; padding:6px;'>signe de \\(-x^2+4x-3\\)</td><td style='border:1px solid #ccc; padding:6px;'>-</td><td style='border:1px solid #ccc; padding:6px;'>0</td><td style='border:1px solid #ccc; padding:6px;'>+</td><td style='border:1px solid #ccc; padding:6px;'>0</td><td style='border:1px solid #ccc; padding:6px;'>-</td></tr></table></div><p>Donc \\( S = [1; 3] \\)</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Systèmes linéaires et problèmes concrets (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='font-size:1em; line-height:1.6;'>Un père a 40 ans et son fils a 12 ans. Dans combien d'années l'âge du père sera-t-il le double de l'âge de son fils ?</div>",
      "questions": [
        {
          "question": "1) Mettre le problème en équation.",
          "reponse": "Soit \\(x\\) le nombre d'années cherché. Dans \\(x\\) années, le père aura \\(40 + x\\) ans et le fils \\(12 + x\\) ans. L'âge du père sera le double de celui du fils, donc : \\( 40 + x = 2(12 + x) \\)"
        },
        {
          "question": "2) Résoudre l'équation et donner la réponse.",
          "reponse": "<p>\\( 40 + x = 24 + 2x \\)</p><p>\\( 40 - 24 = 2x - x \\)</p><p>\\( 16 = x \\)</p><p>Donc dans <strong>16 ans</strong>, l'âge du père sera le double de l'âge de son fils.</p><p>Vérification : Dans 16 ans, le père aura 56 ans et le fils 28 ans. 56 est bien le double de 28.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Dénombrement (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='font-size:1em; line-height:1.6;'>Une classe de Terminale est composée de 20 filles et 15 garçons.</div>",
      "questions": [
        {
          "question": "1) De combien de façons peut-on choisir un délégué et un adjoint parmi les élèves de la classe ?",
          "reponse": "<p>Pour choisir un délégué et un adjoint, l'ordre compte (délégué ≠ adjoint) et il n'y a pas de remise. Il s'agit d'un arrangement de 2 éléments parmi 35.</p><p>\\( A_{35}^2 = 35 \\times 34 = 1190 \\)</p><p>Donc il y a <strong>1190 façons</strong> de choisir un délégué et un adjoint.</p>"
        },
        {
          "question": "2) De combien de façons peut-on choisir un groupe de 4 élèves (2 filles et 2 garçons) pour représenter la classe ?",
          "reponse": "<p>Pour choisir un groupe de 2 filles parmi 20 et 2 garçons parmi 15, l'ordre ne compte pas (groupe). On utilise les combinaisons.</p><p>\\( \\binom{20}{2} \\times \\binom{15}{2} = \\frac{20 \\times 19}{2} \\times \\frac{15 \\times 14}{2} = 190 \\times 105 = 19950 \\)</p><p>Donc il y a <strong>19950 façons</strong> de choisir ce groupe.</p>"
        },
        {
          "question": "3) De combien de façons peut-on choisir un groupe de 3 élèves avec au moins une fille ?",
          "reponse": "<p>Nombre total de façons de choisir 3 élèves parmi 35 : \\( \\binom{35}{3} = \\frac{35 \\times 34 \\times 33}{6} = 6545 \\)</p><p>Nombre de façons de choisir 3 garçons parmi 15 (aucune fille) : \\( \\binom{15}{3} = \\frac{15 \\times 14 \\times 13}{6} = 455 \\)</p><p>Nombre de façons avec au moins une fille = total - cas sans fille : \\( 6545 - 455 = 6090 \\)</p><p>Donc il y a <strong>6090 façons</strong> de choisir un groupe avec au moins une fille.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Lecture graphique et analyse de fonctions (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='font-size:1em; line-height:1.6;'>On donne ci-dessous la courbe représentative d'une fonction \\( f \\).</div><div style='background:#f0f0f0; padding:12px; border-radius:8px; margin:12px 0; text-align:center;'><p style='margin:0;'><strong>Graphique :</strong> Courbe tracée sur \\([-4; 5]\\), coupant l'axe des abscisses en \\(-2\\) et \\(3\\), passant par les points \\((-4; 1)\\), \\((0; -3)\\), \\((2; -5)\\), \\((5; 0)\\) et ayant un maximum en \\((2; -5)\\).</p></div>",
      "questions": [
        {
          "question": "1) Donner l'ensemble de définition de \\( f \\).",
          "reponse": "\\( D_f = [-4; 5] \\)"
        },
        {
          "question": "2) Déterminer l'image de \\( x = 0 \\) par \\( f \\).",
          "reponse": "\\( f(0) = -3 \\)"
        },
        {
          "question": "3) Quels sont les antécédents de \\( y = 0 \\) par \\( f \\) ?",
          "reponse": "Les antécédents de 0 sont les abscisses des points où la courbe coupe l'axe des abscisses : \\( x = -2 \\) et \\( x = 3 \\)."
        },
        {
          "question": "4) Déterminer graphiquement l'ensemble des solutions de l'inéquation \\( f(x) \\geq 0 \\).",
          "reponse": "La courbe est au-dessus de l'axe des abscisses pour \\( x \\in [-4; -2] \\cup [3; 5] \\). Donc \\( S = [-4; -2] \\cup [3; 5] \\)."
        }
      ]
    },
    {
      "titre": "Exercice 5 : Limites, continuité et asymptotes (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='font-size:1em; line-height:1.6;'>Soit la fonction \\( f(x) = \\frac{2x + 1}{x - 3} \\).</div>",
      "questions": [
        {
          "question": "1) Déterminer l'ensemble de définition de \\( f \\).",
          "reponse": "La fonction est définie pour \\( x - 3 \\neq 0 \\), donc \\( x \\neq 3 \\). \\( D_f = \\mathbb{R} \\setminus \\{3\\} = ]-\\infty; 3[ \\cup ]3; +\\infty[ \\)"
        },
        {
          "question": "2) Calculer les limites de \\( f \\) aux bornes de son ensemble de définition.",
          "reponse": "<ul><li>En \\(-\\infty\\) et \\(+\\infty\\) : \\( \\lim_{x \\to \\pm\\infty} \\frac{2x+1}{x-3} = \\lim_{x \\to \\pm\\infty} \\frac{2x}{x} = 2 \\)</li><li>En \\(3^-\\) : \\( \\lim_{x \\to 3^-} f(x) = -\\infty \\) (le dénominateur tend vers 0 négatif, le numérateur vers 7 positif, donc quotient négatif infini)</li><li>En \\(3^+\\) : \\( \\lim_{x \\to 3^+} f(x) = +\\infty \\) (le dénominateur tend vers 0 positif, le numérateur vers 7 positif, donc quotient positif infini)</li></ul>"
        },
        {
          "question": "3) La courbe de \\( f \\) admet-elle une asymptote verticale ? Si oui, donner son équation.",
          "reponse": "Oui, car \\( \\lim_{x \\to 3} f(x) = \\pm\\infty \\). La droite d'équation \\( x = 3 \\) est une <strong>asymptote verticale</strong>."
        }
      ]
    },
    {
      "titre": "Exercice 6 : Dérivées et applications (5 pts)",
      "points": "5 pts",
      "enonce": "<div style='font-size:1em; line-height:1.6;'>Soit la fonction \\( f(x) = x^2 - 4x + 3 \\).</div>",
      "questions": [
        {
          "question": "1) Calculer la dérivée \\( f'(x) \\) de \\( f \\).",
          "reponse": "\\( f'(x) = 2x - 4 \\)"
        },
        {
          "question": "2) Étudier le signe de \\( f'(x) \\) et dresser le tableau de variations de \\( f \\).",
          "reponse": "<p>\\( f'(x) = 2x - 4 \\)</p><p>\\( f'(x) = 0 \\iff x = 2 \\)</p><p>Tableau de signes :</p><div style='overflow-x:auto;'><table style='border-collapse:collapse; width:100%; min-width:200px;'><tr style='background:#e0e0e0;'><th style='border:1px solid #ccc; padding:6px;'>x</th><th style='border:1px solid #ccc; padding:6px;'>-∞</th><th style='border:1px solid #ccc; padding:6px;'>2</th><th style='border:1px solid #ccc; padding:6px;'>+∞</th></tr><tr><td style='border:1px solid #ccc; padding:6px;'>signe de \\(f'(x)\\)</td><td style='border:1px solid #ccc; padding:6px;'>-</td><td style='border:1px solid #ccc; padding:6px;'>0</td><td style='border:1px solid #ccc; padding:6px;'>+</td></tr><tr><td style='border:1px solid #ccc; padding:6px;'>variation de \\(f\\)</td><td style='border:1px solid #ccc; padding:6px;'>↘</td><td style='border:1px solid #ccc; padding:6px;'>-1</td><td style='border:1px solid #ccc; padding:6px;'>↗</td></tr></table></div>"
        },
        {
          "question": "3) Déterminer l'équation de la tangente à la courbe \\( C_f \\) au point d'abscisse \\( x_0 = 1 \\).",
          "reponse": "<p>\\( f(1) = 1^2 - 4(1) + 3 = 1 - 4 + 3 = 0 \\)</p><p>\\( f'(1) = 2(1) - 4 = -2 \\)</p><p>Équation de la tangente : \\( y = f'(1)(x - 1) + f(1) = -2(x - 1) + 0 = -2x + 2 \\)</p><p>Donc \\( T : y = -2x + 2 \\)</p>"
        },
        {
          "question": "4) Trouver les coordonnées du sommet de la parabole.",
          "reponse": "Le sommet de la parabole est atteint lorsque la dérivée s'annule, c'est-à-dire en \\( x = 2 \\). \\( f(2) = 4 - 8 + 3 = -1 \\). Le sommet a pour coordonnées \\( (2; -1) \\) et c'est un minimum (car \\( a = 1 > 0 \\))."
        }
      ]
    },
    {
      "titre": "Exercice 7 : Statistique (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='font-size:1em; line-height:1.6;'>On a relevé les notes sur 20 de 40 élèves d'une classe de Première :</div><div style='overflow-x:auto; margin:12px 0;'><table style='border-collapse:collapse; width:100%; min-width:300px; background:#f8f9fa;'><tr style='background:#2c3e50; color:white;'><th style='border:1px solid #2c3e50; padding:8px;'>Notes</th><th style='border:1px solid #2c3e50; padding:8px;'>[0;4[</th><th style='border:1px solid #2c3e50; padding:8px;'>[4;8[</th><th style='border:1px solid #2c3e50; padding:8px;'>[8;12[</th><th style='border:1px solid #2c3e50; padding:8px;'>[12;16[</th><th style='border:1px solid #2c3e50; padding:8px;'>[16;20]</th></tr><tr><td style='border:1px solid #ccc; padding:8px;'><strong>Effectifs</strong></td><td style='border:1px solid #ccc; padding:8px; text-align:center;'>4</td><td style='border:1px solid #ccc; padding:8px; text-align:center;'>8</td><td style='border:1px solid #ccc; padding:8px; text-align:center;'>12</td><td style='border:1px solid #ccc; padding:8px; text-align:center;'>10</td><td style='border:1px solid #ccc; padding:8px; text-align:center;'>6</td></tr></table></div>",
      "questions": [
        {
          "question": "1) Calculer la moyenne de cette série (utiliser les centres des classes).",
          "reponse": "<p>Centres des classes : \\(2; 6; 10; 14; 18\\)</p><p>\\( \\bar{x} = \\frac{4 \\times 2 + 8 \\times 6 + 12 \\times 10 + 10 \\times 14 + 6 \\times 18}{40} = \\frac{8 + 48 + 120 + 140 + 108}{40} = \\frac{424}{40} = 10,6 \\)</p><p>La moyenne est de <strong>10,6</strong>.</p>"
        },
        {
          "question": "2) Calculer les effectifs cumulés croissants.",
          "reponse": "<div style='overflow-x:auto;'><table style='border-collapse:collapse; width:100%; min-width:250px;'><tr style='background:#e0e0e0;'><th style='border:1px solid #ccc; padding:6px;'>Classes</th><th style='border:1px solid #ccc; padding:6px;'>[0;4[</th><th style='border:1px solid #ccc; padding:6px;'>[4;8[</th><th style='border:1px solid #ccc; padding:6px;'>[8;12[</th><th style='border:1px solid #ccc; padding:6px;'>[12;16[</th><th style='border:1px solid #ccc; padding:6px;'>[16;20]</th></tr><tr><td style='border:1px solid #ccc; padding:6px;'>Effectifs cumulés croissants</td><td style='border:1px solid #ccc; padding:6px;'>4</td><td style='border:1px solid #ccc; padding:6px;'>12</td><td style='border:1px solid #ccc; padding:6px;'>24</td><td style='border:1px solid #ccc; padding:6px;'>34</td><td style='border:1px solid #ccc; padding:6px;'>40</td></tr></table></div>"
        },
        {
          "question": "3) Déterminer la classe médiane.",
          "reponse": "L'effectif total est 40. La médiane est la moyenne des 20e et 21e valeurs. D'après les effectifs cumulés croissants, la 20e et la 21e valeur se trouvent dans la classe [8;12[ car l'effectif cumulé avant cette classe est 12 et après cette classe est 24. La <strong>classe médiane</strong> est donc [8;12[."
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>
