<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>

    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "La division cellulaire : la mitose",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h2 style='color: #2c3e50; text-align: center;'>🧬 La division cellulaire : la mitose</h2><div style='background: #e8f4f8; padding: 20px; border-radius: 10px; text-align: center; margin: 20px 0;'><p style='font-size: 1.2rem; margin: 0;'>🔬 La reproduction conforme des cellules</p></div><div style='background: #fef9e7; padding: 15px; border-radius: 10px; border-left: 5px solid #f39c12;'><p style='margin: 0;'><strong>🎯 Objectifs de la leçon :</strong></p><ul style='margin: 5px 0 0 0;'><li>Décrire les différentes phases de la mitose</li><li>Définir le cycle cellulaire</li><li>Expliquer le rôle de la mitose dans la croissance et le renouvellement cellulaire</li></ul></div></div>",
    "texteParle": "Bonjour à tous ! Aujourd'hui, nous allons étudier un processus fondamental de la biologie : la division cellulaire, appelée mitose. La mitose est le mécanisme par lequel une cellule mère se divise pour donner deux cellules filles identiques. Ce processus est essentiel pour la croissance, le renouvellement des tissus et la réparation des organismes. Nous allons découvrir les différentes phases de la mitose, comprendre le cycle cellulaire et expliquer l'importance de ce processus pour les êtres vivants.",
    "note": "La mitose assure la transmission fidèle de l'information génétique."
  },
  {
    "titre": "Définition et importance",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>🧫 Définition et importance de la mitose</h3><div style='background: #f4f6f7; padding: 15px; border-radius: 10px; margin: 10px 0;'><p style='font-size: 1.1rem;'><strong>La mitose</strong> est un processus de division cellulaire au cours duquel une <strong>cellule mère</strong> se divise en deux <strong>cellules filles génétiquement identiques</strong>.</p></div><div style='display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0;'><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #3498db;'><p style='margin: 0;'><strong>Croissance</strong><br>Augmentation du nombre de cellules</p></div><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #27ae60;'><p style='margin: 0;'><strong>Renouvellement</strong><br>Remplacement des cellules usées</p></div><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #e67e22;'><p style='margin: 0;'><strong>Réparation</strong><br>Régénération des tissus endommagés</p></div></div><div style='background: #d5f5e3; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'>💡 La mitose permet de <strong>maintenir le nombre de chromosomes</strong> : chaque cellule fille reçoit le même nombre de chromosomes que la cellule mère.</p></div></div>",
    "texteParle": "La mitose est un processus de division cellulaire qui permet à une cellule mère de se diviser en deux cellules filles identiques. Ce mécanisme est fondamental pour trois raisons principales. D'abord, il assure la croissance des organismes en augmentant le nombre de cellules. Ensuite, il permet le renouvellement des cellules usées ou mortes. Enfin, il participe à la réparation des tissus endommagés. Un point essentiel : la mitose maintient le nombre de chromosomes identique dans les cellules filles, ce qui garantit la transmission fidèle de l'information génétique.",
    "note": "La mitose est une division équationnelle : le nombre de chromosomes est conservé."
  },
  {
    "titre": "Le cycle cellulaire",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>🔄 Le cycle cellulaire</h3><div style='background: #f4f6f7; padding: 15px; border-radius: 10px; margin: 10px 0;'><p style='font-size: 1.1rem;'>Le cycle cellulaire est l'ensemble des étapes qui vont de la formation d'une cellule à sa division.</p></div><div style='background: white; padding: 12px; border-radius: 8px; margin: 8px 0; border-left: 4px solid #3498db;'><p style='margin: 0;'><strong>1. Interphase</strong> (90-95% du cycle)<br>La cellule grandit et prépare sa division.</p></div><div style='background: white; padding: 12px; border-radius: 8px; margin: 8px 0; border-left: 4px solid #e74c3c;'><p style='margin: 0;'><strong>2. Mitose</strong> (5-10% du cycle)<br>La cellule se divise en deux cellules filles.</p></div><div style='background: #fef9e7; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'>📌 <strong>L'interphase se décompose en trois phases :</strong> G1 (croissance), S (réplication de l'ADN), G2 (préparation à la mitose).</p></div></div>",
    "texteParle": "Le cycle cellulaire est l'ensemble des événements qui se déroulent entre deux divisions successives. Il comprend deux grandes phases : l'interphase et la mitose. L'interphase représente environ 90 à 95% du cycle. Elle se divise en trois étapes : G1, où la cellule grandit ; S, où l'ADN se réplique ; et G2, où la cellule se prépare à la division. La mitose est la phase de division proprement dite. Elle est plus courte mais essentielle pour la formation de deux cellules filles.",
    "note": "L'interphase est une période de préparation intense pour la division."
  },
  {
    "titre": "L'interphase",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>🧪 L'interphase</h3><div style='background: #f4f6f7; padding: 15px; border-radius: 10px; margin: 10px 0;'><p style='font-size: 1.1rem;'>L'interphase est la période de <strong>préparation</strong> à la division cellulaire.</p></div><div style='display: flex; flex-direction: column; gap: 10px; margin: 15px 0;'><div style='background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #3498db;'><p style='margin: 0;'><strong>Phase G1 (Première phase de croissance)</strong><br>La cellule augmente de volume, synthétise des protéines et des organites.</p></div><div style='background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #e67e22;'><p style='margin: 0;'><strong>Phase S (Synthèse de l'ADN)</strong><br>L'ADN est répliqué (duplication des chromosomes). Chaque chromosome passe de 1 à 2 chromatides.</p></div><div style='background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #27ae60;'><p style='margin: 0;'><strong>Phase G2 (Seconde phase de croissance)</strong><br>La cellule continue de grossir, les organites se multiplient, la cellule se prépare pour la mitose.</p></div></div><div style='background: #d5f5e3; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'>💡 La réplication de l'ADN en phase S est <strong>semi-conservative</strong> : chaque nouvelle double hélice contient un brin ancien et un brin nouveau.</p></div></div>",
    "texteParle": "L'interphase est une période clé pendant laquelle la cellule se prépare activement à la division. Elle comprend trois phases. La phase G1 est la première phase de croissance : la cellule augmente de volume, synthétise des protéines et produit des organites. La phase S est la phase de synthèse de l'ADN : le matériel génétique est répliqué, chaque chromosome passe d'une à deux chromatides. La phase G2 est la seconde phase de croissance : la cellule achève sa préparation, les organites se multiplient et la cellule se prépare à la mitose.",
    "note": "La phase S est cruciale car elle garantit que chaque cellule fille recevra une copie complète du génome."
  },
  {
    "titre": "Phases de la mitose",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>🔬 Les phases de la mitose</h3><div style='background: #f4f6f7; padding: 15px; border-radius: 10px; margin: 10px 0;'><p style='font-size: 1.1rem;'>La mitose est un processus continu divisé en <strong>4 phases</strong> pour faciliter son étude.</p></div><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0;'><div style='background: white; padding: 10px; border-radius: 8px; border-left: 4px solid #3498db;'><p style='margin: 0;'><strong>1. Prophase</strong><br>Condensation des chromosomes, disparition de l'enveloppe nucléaire</p></div><div style='background: white; padding: 10px; border-radius: 8px; border-left: 4px solid #e67e22;'><p style='margin: 0;'><strong>2. Métaphase</strong><br>Alignement des chromosomes sur la plaque équatoriale</p></div><div style='background: white; padding: 10px; border-radius: 8px; border-left: 4px solid #e74c3c;'><p style='margin: 0;'><strong>3. Anaphase</strong><br>Séparation des chromatides sœurs vers les pôles</p></div><div style='background: white; padding: 10px; border-radius: 8px; border-left: 4px solid #27ae60;'><p style='margin: 0;'><strong>4. Télophase</strong><br>Réformation de l'enveloppe nucléaire, décondensation des chromosomes</p></div></div><div style='background: #fef9e7; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'>📌 La mitose est suivie de la <strong>cytodiérèse</strong> (division du cytoplasme) pour former deux cellules filles.</p></div></div>",
    "texteParle": "La mitose se déroule en quatre phases successives. La prophase est la première phase : les chromosomes se condensent et deviennent visibles, l'enveloppe nucléaire disparaît et les fibres du fuseau se forment. La métaphase est la deuxième phase : les chromosomes s'alignent sur la plaque équatoriale de la cellule. L'anaphase est la troisième phase : les chromatides sœurs se séparent et migrent vers les pôles opposés. La télophase est la dernière phase : les chromosomes se décondensent, l'enveloppe nucléaire se reforme autour de chaque lot de chromosomes. Enfin, la cytodiérèse divise le cytoplasme.",
    "note": "Ces quatre phases sont continues et se succèdent de manière ordonnée."
  },
  {
    "titre": "La prophase",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>🧬 La prophase</h3><div style='background: #f4f6f7; padding: 15px; border-radius: 10px; margin: 10px 0;'><p style='font-size: 1.1rem;'>La <strong>prophase</strong> est la phase de début de la mitose.</p></div><div style='background: white; padding: 12px; border-radius: 8px; margin: 8px 0; border-left: 4px solid #3498db;'><p style='margin: 0;'><strong>Condensation des chromosomes :</strong> L'ADN s'enroule autour des histones, les chromosomes deviennent visibles au microscope.</p></div><div style='background: white; padding: 12px; border-radius: 8px; margin: 8px 0; border-left: 4px solid #e67e22;'><p style='margin: 0;'><strong>Disparition de l'enveloppe nucléaire :</strong> La membrane du noyau se fragmente et disparaît.</p></div><div style='background: white; padding: 12px; border-radius: 8px; margin: 8px 0; border-left: 4px solid #e74c3c;'><p style='margin: 0;'><strong>Formation du fuseau achromatique :</strong> Les microtubules s'organisent entre les deux pôles de la cellule.</p></div><div style='background: #d5f5e3; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'>💡 Chaque chromosome est constitué de <strong>deux chromatides</strong> identiques reliées par un centromère.</p></div></div>",
    "texteParle": "La prophase est le début de la mitose. Pendant cette phase, plusieurs événements importants se produisent. Les chromosomes se condensent : l'ADN s'enroule autour des protéines histones, ce qui rend les chromosomes visibles au microscope. Chaque chromosome apparaît maintenant comme deux chromatides identiques reliées par un centromère. L'enveloppe nucléaire se fragmente et disparaît. Enfin, le fuseau achromatique se forme à partir des microtubules qui s'organisent entre les deux pôles de la cellule.",
    "note": "La condensation des chromosomes est essentielle pour leur manipulation lors de la division."
  },
  {
    "titre": "La métaphase",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>🧬 La métaphase</h3><div style='background: #f4f6f7; padding: 15px; border-radius: 10px; margin: 10px 0;'><p style='font-size: 1.1rem;'>La <strong>métaphase</strong> est la phase de l'alignement des chromosomes.</p></div><div style='display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0;'><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #3498db;'><p style='margin: 0;'><strong>Alignement</strong><br>Les chromosomes se placent sur la <strong>plaque équatoriale</strong> (au centre de la cellule).</p></div><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #e67e22;'><p style='margin: 0;'><strong>Attachement</strong><br>Les fibres du fuseau s'attachent aux centromères des chromosomes.</p></div></div><div style='background: #fef9e7; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'>📌 La métaphase est la phase la plus <strong>facilement identifiable</strong> au microscope car les chromosomes sont bien alignés et condensés.</p></div></div>",
    "texteParle": "La métaphase est la phase de la mitose où les chromosomes s'alignent sur la plaque équatoriale, une ligne imaginaire au centre de la cellule. Chaque chromosome est attaché aux fibres du fuseau par son centromère. Cette phase est très importante car elle assure que chaque cellule fille recevra une chromatide de chaque chromosome. C'est aussi la phase la plus facile à reconnaître au microscope car les chromosomes sont bien condensés et alignés.",
    "note": "La plaque équatoriale n'est pas une structure physique, mais une ligne imaginaire."

  {
    "titre": "L'anaphase",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>🧬 L'anaphase</h3><div style='background: #f4f6f7; padding: 15px; border-radius: 10px; margin: 10px 0;'><p style='font-size: 1.1rem;'>L'<strong>anaphase</strong> est la phase de la séparation des chromatides.</p></div><div style='display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0;'><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #e74c3c;'><p style='margin: 0;'><strong>Séparation</strong><br>Les centromères se divisent et les <strong>chromatides sœurs</strong> se séparent.</p></div><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #3498db;'><p style='margin: 0;'><strong>Migration</strong><br>Chaque chromatide (devenue un chromosome) migre vers un <strong>pôle</strong> de la cellule.</p></div></div><div style='background: #d5f5e3; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'>💡 L'anaphase est marquée par un <strong>doublement du nombre de chromosomes</strong> dans la cellule (mais chaque chromosome est maintenant composé d'une seule chromatide).</p></div></div>",
    "texteParle": "L'anaphase est la phase où les chromatides sœurs se séparent. Les centromères se divisent, et chaque chromatide, maintenant considérée comme un chromosome à part entière, migre vers l'un des pôles de la cellule. Cette migration est assurée par les fibres du fuseau qui se raccourcissent. À la fin de l'anaphase, chaque pôle possède un lot complet de chromosomes, identique à celui de la cellule mère.",
    "note": "L'anaphase est essentielle pour la répartition équitable du matériel génétique."

  {
    "titre": "La télophase",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>🧬 La télophase</h3><div style='background: #f4f6f7; padding: 15px; border-radius: 10px; margin: 10px 0;'><p style='font-size: 1.1rem;'>La <strong>télophase</strong> est la phase de fin de la mitose.</p></div><div style='background: white; padding: 12px; border-radius: 8px; margin: 8px 0; border-left: 4px solid #27ae60;'><p style='margin: 0;'><strong>Réformation des noyaux :</strong> L'enveloppe nucléaire se reforme autour de chaque lot de chromosomes.</p></div><div style='background: white; padding: 12px; border-radius: 8px; margin: 8px 0; border-left: 4px solid #3498db;'><p style='margin: 0;'><strong>Décondensation :</strong> Les chromosomes se décondensent et redeviennent de la chromatine.</p></div><div style='background: white; padding: 12px; border-radius: 8px; margin: 8px 0; border-left: 4px solid #e67e22;'><p style='margin: 0;'><strong>Disparition du fuseau :</strong> Les microtubules du fuseau achromatique disparaissent.</p></div><div style='background: #fef9e7; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'>📌 La télophase est suivie par la <strong>cytodiérèse</strong> qui sépare le cytoplasme des deux cellules filles.</p></div></div>",
    "texteParle": "La télophase est la dernière phase de la mitose. Plusieurs événements se produisent simultanément. L'enveloppe nucléaire se reforme autour de chaque lot de chromosomes, créant deux noyaux distincts. Les chromosomes se décondensent et redeviennent de la chromatine, la forme non visible au microscope. Le fuseau achromatique disparaît. À la fin de la télophase, deux noyaux sont formés. La cellule n'est cependant pas encore complètement divisée : la cytodiérèse va séparer le cytoplasme et les organites pour former deux cellules filles.",
    "note": "La télophase est pratiquement l'inverse de la prophase."
  },
  {
    "titre": "La cytodiérèse",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>🧫 La cytodiérèse</h3><div style='background: #f4f6f7; padding: 15px; border-radius: 10px; margin: 10px 0;'><p style='font-size: 1.1rem;'>La <strong>cytodiérèse</strong> est la division du cytoplasme, aboutissant à la formation de deux cellules filles.</p></div><div style='display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0;'><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #3498db;'><p style='margin: 0;'><strong>Chez l'animal</strong><br>Formation d'un <strong>sillon de division</strong> (invagination de la membrane) qui étrangle la cellule en deux.</p></div><div style='flex: 1; min-width: 150px; background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #27ae60;'><p style='margin: 0;'><strong>Chez le végétal</strong><br>Formation d'une <strong>plaque cellulaire</strong> à partir de vésicules golgiennes, qui donne naissance à une nouvelle paroi.</p></div></div><div style='background: #fef9e7; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'>📌 La cytodiérèse produit deux cellules filles <strong>diploïdes</strong> (2n) identiques à la cellule mère.</p></div></div>",
    "texteParle": "La cytodiérèse est la division du cytoplasme qui suit la mitose. Elle est différente chez les cellules animales et végétales. Chez l'animal, un sillon de division se forme au niveau de la membrane plasmique : la membrane s'invagine et étrangle la cellule en deux parties. Chez le végétal, une plaque cellulaire se forme à partir de vésicules provenant de l'appareil de Golgi. Cette plaque évolue pour donner une nouvelle paroi qui sépare les deux cellules filles. Le résultat est deux cellules filles diploïdes identiques à la cellule mère.",
    "note": "La cytodiérèse assure la répartition des organites entre les deux cellules filles."
  },
  {
    "titre": "Les différences entre cellules animales et végétales",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>🔄 Différences animales / végétales</h3><div style='background: #f4f6f7; padding: 15px; border-radius: 10px; margin: 10px 0;'><table style='width: 100%; border-collapse: collapse; font-size: 0.9rem;'><thead><tr style='background: #2c3e50; color: white;'><th style='padding: 8px; border: 1px solid #ddd;'>Caractère</th><th style='padding: 8px; border: 1px solid #ddd;'>Cellule animale</th><th style='padding: 8px; border: 1px solid #ddd;'>Cellule végétale</th></tr></thead><tbody><tr><td style='padding: 8px; border: 1px solid #ddd;'>Mitose</td><td style='padding: 8px; border: 1px solid #ddd;'>Centrosome avec centrioles</td><td style='padding: 8px; border: 1px solid #ddd;'>Pas de centrosome (organisation par le noyau)</td></tr><tr style='background: #f9f9f9;'><td style='padding: 8px; border: 1px solid #ddd;'>Cytodiérèse</td><td style='padding: 8px; border: 1px solid #ddd;'>Sillon de division</td><td style='padding: 8px; border: 1px solid #ddd;'>Plaque cellulaire puis nouvelle paroi</td></tr><tr><td style='padding: 8px; border: 1px solid #ddd;'>Paroi</td><td style='padding: 8px; border: 1px solid #ddd;'>Absente</td><td style='padding: 8px; border: 1px solid #ddd;'>Présente (cellulose)</td></tr></tbody></table></div><div style='background: #d5f5e3; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'>💡 Les différences sont liées à la <strong>présence d'une paroi</strong> chez les végétaux, qui nécessite un mode de division spécifique.</p></div></div>",
    "texteParle": "La mitose et la cytodiérèse présentent quelques différences entre les cellules animales et végétales. Chez les cellules animales, la mitose est assistée par le centrosome qui contient des centrioles. Chez les végétaux, il n'y a pas de centrosome : l'organisation du fuseau est assurée par le noyau. La principale différence se situe au niveau de la cytodiérèse : chez l'animal, un sillon de division étrangle la cellule, tandis que chez le végétal, une plaque cellulaire se forme pour donner naissance à une nouvelle paroi. Cette différence est due à la présence d'une paroi rigide chez les végétaux.",
    "note": "Les cellules végétales ne peuvent pas être étranglées à cause de leur paroi rigide."
  },
  {
    "titre": "Rôle de la mitose",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>🌟 Rôle de la mitose</h3><div style='background: #f4f6f7; padding: 15px; border-radius: 10px; margin: 10px 0;'><p style='font-size: 1.1rem;'>La mitose joue un <strong>rôle fondamental</strong> dans la vie des organismes.</p></div><div style='display: flex; flex-direction: column; gap: 10px; margin: 15px 0;'><div style='background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #3498db;'><p style='margin: 0;'><strong>1. Croissance :</strong> La mitose permet l'augmentation du nombre de cellules, assurant ainsi la croissance de l'organisme.</p></div><div style='background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #27ae60;'><p style='margin: 0;'><strong>2. Renouvellement cellulaire :</strong> Les cellules usées sont remplacées par des cellules neuves (exemple : peau, sang).</p></div><div style='background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #e67e22;'><p style='margin: 0;'><strong>3. Réparation des tissus :</strong> La mitose permet la cicatrisation et la régénération des tissus endommagés.</p></div><div style='background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #8e44ad;'><p style='margin: 0;'><strong>4. Multiplication asexuée :</strong> Chez certains organismes, la mitose assure la reproduction (bouturage, division).</p></div></div><div style='background: #fef9e7; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='margin: 0;'>📌 La mitose garantit la <strong>stabilité génétique</strong> car les cellules filles sont identiques à la cellule mère.</p></div></div>",
    "texteParle": "La mitose a plusieurs rôles essentiels dans les organismes vivants. Elle permet d'abord la croissance : en augmentant le nombre de cellules, elle assure le développement de l'organisme. Elle assure ensuite le renouvellement cellulaire : les cellules usées ou mortes sont remplacées par de nouvelles cellules. C'est le cas pour la peau, le sang ou la muqueuse intestinale. Elle permet aussi la réparation des tissus endommagés, comme lors d'une cicatrisation. Enfin, chez certains organismes, la mitose assure la reproduction asexuée, comme le bouturage chez les plantes. Dans tous les cas, la mitose garantit la stabilité génétique.",
    "note": "La mitose est à la base de la vie et de la continuité des espèces."
  },
  {
    "titre": "Résumé des phases de la mitose",
    "contenu": "<div style='padding: 10px; font-family: Arial, sans-serif; line-height: 1.6;'><h3 style='color: #2c3e50;'>📝 Résumé des phases</h3><div style='background: #f4f6f7; padding: 15px; border-radius: 10px; margin: 10px 0;'><table style='width: 100%; border-collapse: collapse; font-size: 0.9rem;'><thead><tr style='background: #2c3e50; color: white;'><th style='padding: 8px; border: 1px solid #ddd;'>Phase</th><th style='padding: 8px; border: 1px solid #ddd;'>Événements clés;
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            header.style.background = 'rgba(15, 23, 42, 0.85)';
            footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            header.style.background = 'rgba(255, 255, 255, 0.85)';
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
        }
    });
</script>
