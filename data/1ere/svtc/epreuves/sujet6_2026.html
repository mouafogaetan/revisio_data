<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "SVT 1ère C",
 "classe": "Première",
 "sequence": "Séquence 6",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Exercice 1 : L'identité biologique et le renouvellement cellulaire",
     "points": "4 pts",
     "enonce": "<p>L'identité biologique d'un individu repose sur l'information génétique contenue dans ses cellules. Cette information est portée par l'ADN, support universel du patrimoine génétique. La transmission fidèle de cette information est assurée par la réplication de l'ADN et par des divisions cellulaires comme la mitose.</p>",
     "questions": [
       {
         "question": "<p><strong>1.1 (0,75 pt)</strong> Décris la structure d'un chromosome chez un eucaryote en précisant la nature des molécules qui le composent.</p>",
         "reponse": "<p>Un chromosome est constitué d'une longue molécule d'<strong>ADN</strong> associée à des <strong>protéines histones</strong>. L'ADN est une double hélice qui s'enroule autour des histones pour former la chromatine, qui se condense en chromosome lors de la division cellulaire.</p>"
       },
       {
         "question": "<p><strong>1.2 (0,75 pt)</strong> Explique pourquoi la réplication de l'ADN est dite semi-conservative.</p>",
         "reponse": "<p>La réplication de l'ADN est dite semi-conservative car chaque nouvelle molécule d'ADN est constituée d'un brin parental conservé et d'un brin néo-synthétisé. Les deux brins de la molécule mère se séparent et servent chacun de matrice pour la synthèse d'un nouveau brin complémentaire.</p>"
       },
       {
         "question": "<p><strong>1.3 (1 pt)</strong> Cite les différentes phases du cycle cellulaire et indique quelle est la phase de réplication de l'ADN.</p>",
         "reponse": "<p>Le cycle cellulaire comprend :</p><ul><li>L'<strong>interphase</strong> : phase G1 (croissance cellulaire), phase S (<strong>réplication de l'ADN</strong>), phase G2 (préparation à la division).</li><li>La <strong>mitose</strong> (division cellulaire).</li></ul>"
       },
       {
         "question": "<p><strong>1.4 (0,75 pt)</strong> En quoi la mitose permet-elle le maintien de l'identité biologique ?</p>",
         "reponse": "<p>La mitose permet la formation de deux cellules filles génétiquement identiques à la cellule mère. Les chromosomes sont dupliqués (phase S) puis répartis équitablement dans les deux cellules filles, chacune recevant le même patrimoine génétique, ce qui assure le maintien de l'identité biologique.</p>"
       },
       {
         "question": "<p><strong>1.5 (0,75 pt)</strong> Quelle est la différence entre un gène et un allèle ?</p>",
         "reponse": "<p>Un <strong>gène</strong> est une séquence d'ADN qui code pour une protéine. Un <strong>allèle</strong> est une version particulière d'un gène, variant d'un individu à l'autre. La diversité allélique est à l'origine des différences entre individus d'une même espèce.</p>"
       }
     ]
   },
   {
     "titre": "Exercice 2 : Expression du patrimoine génétique et biosynthèse des protéines",
     "points": "5 pts",
     "enonce": "<p>L'information génétique contenue dans l'ADN est exprimée pour produire les protéines nécessaires au fonctionnement cellulaire. Ce processus comporte deux étapes : la transcription et la traduction.</p>",
     "questions": [
       {
         "question": "<p><strong>2.1 (0,75 pt)</strong> Où a lieu la transcription chez les eucaryotes ? Qu'est-ce que l'ARN messager (ARNm) ?</p>",
         "reponse": "<p>La transcription a lieu dans le <strong>noyau</strong> chez les eucaryotes. L'ARNm est une molécule d'ARN synthétisée à partir d'un brin d'ADN par complémentarité des bases. Il porte le message génétique du gène vers le cytoplasme.</p>"
       },
       {
         "question": "<p><strong>2.2 (0,75 pt)</strong> Cite les acteurs moléculaires de la traduction et décris leur rôle.</p>",
         "reponse": "<p>Les acteurs de la traduction sont :</p><ul><li>Les <strong>ribosomes</strong> : sites de synthèse des protéines.</li><li>Les <strong>ARNt (ARN de transfert)</strong> : transportent les acides aminés vers le ribosome et reconnaissent les codons sur l'ARNm.</li><li>Les <strong>acides aminés</strong> : éléments constitutifs des protéines.</li></ul>"
       },
       {
         "question": "<p><strong>2.3 (1 pt)</strong> Explique ce qu'est le code génétique et précise ses principales caractéristiques.</p>",
         "reponse": "<p>Le code génétique est un système de correspondance qui permet la traduction de la séquence de nucléotides de l'ARNm en séquence d'acides aminés. Ses principales caractéristiques sont :</p><ul><li>Le <strong>codon</strong> (3 nucléotides) code pour un acide aminé.</li><li>Il est <strong>universel</strong> (commun à tous les êtres vivants).</li><li>Il est <strong>dégénéré</strong> (un acide aminé peut être codé par plusieurs codons).</li></ul>"
       },
       {
         "question": "<p><strong>2.4 (0,75 pt)</strong> Cite deux exemples de devenir des protéines synthétisées dans une cellule.</p>",
         "reponse": "<p>Les protéines synthétisées peuvent :</p><ul><li>Rester dans le cytoplasme (ex : enzymes métaboliques).</li><li>Être expédiées à la surface de la cellule (ex : protéines membranaires).</li><li>Être exportées hors de la cellule (ex : hormones).</li></ul>"
       },
       {
         "question": "<p><strong>2.5 (0,75 pt)</strong> Comment définit-on le phénotype d'un individu ?</p>",
         "reponse": "<p>Le phénotype correspond à l'ensemble des caractères observables d'un individu. Il résulte de l'expression du patrimoine génétique (génotype) et des interactions avec l'environnement.</p>"
       },
       {
         "question": "<p><strong>2.6 (1 pt)</strong> Une mutation ponctuelle (substitution d'une base) peut entraîner un changement d'acide aminé dans une protéine. Pourquoi toutes les mutations n'ont-elles pas de conséquence sur la protéine ?</p>",
         "reponse": "<p>Le code génétique est dégénéré : plusieurs codons peuvent coder pour le même acide aminé. Si la mutation entraîne un codon synonyme (qui code pour le même acide aminé), il n'y a pas de conséquence sur la structure de la protéine. On parle de mutation silencieuse.</p>"
       }
     ]
   },
   {
     "titre": "Exercice 3 : Énergétique biologique - Respiration et Fermentation",
     "points": "5 pts",
     "enonce": "<p>Les cellules animales et végétales produisent de l'énergie sous forme d'ATP à partir de la dégradation des molécules organiques. Cette dégradation peut être complète (respiration aérobie) ou incomplète (fermentation).</p>",
     "questions": [
       {
         "question": "<p><strong>3.1 (0,75 pt)</strong> Compare les rendements énergétiques de la respiration aérobie et de la fermentation.</p>",
         "reponse": "<p>La respiration aérobie produit <strong>36 à 38 ATP</strong> par molécule de glucose, tandis que la fermentation n'en produit que <strong>2 ATP</strong>. La respiration est donc beaucoup plus efficace énergétiquement.</p>"
       },
       {
         "question": "<p><strong>3.2 (1 pt)</strong> Cite deux applications des fermentations dans la vie courante au Cameroun.</p>",
         "reponse": "<p>Au Cameroun, les fermentations sont utilisées pour :</p><ul><li>La fabrication de boissons traditionnelles (ex : vin de palme, bière).</li><li>La production de vinaigre.</li><li>La levée de la pâte pour la fabrication du pain.</li><li>La production de biogaz à partir de déchets organiques.</li></ul>"
       },
       {
         "question": "<p><strong>3.3 (1 pt)</strong> Où se déroule la glycolyse dans la cellule ? Quelle molécule est produite en fin de glycolyse ?</p>",
         "reponse": "<p>La glycolyse se déroule dans le <strong>cytoplasme</strong>. Elle transforme le glucose (6 carbones) en deux molécules de <strong>pyruvate</strong> (3 carbones), avec production de 2 ATP.</p>"
       },
       {
         "question": "<p><strong>3.4 (0,75 pt)</strong> La respiration aérobie nécessite du dioxygène. Quel est le rôle de celui-ci dans la chaîne respiratoire ?</p>",
         "reponse": "<p>Le dioxygène joue le rôle d'<strong>accepteur final d'électrons</strong> dans la chaîne respiratoire mitochondriale. Il permet la réoxydation du NADH en NAD⁺, ce qui maintient le fonctionnement de la chaîne et la production d'ATP.</p>"
       },
       {
         "question": "<p><strong>3.5 (0,75 pt)</strong> Pourquoi la fermentation se produit-elle en l'absence de dioxygène ?</p>",
         "reponse": "<p>La fermentation se produit en l'absence de dioxygène car elle ne nécessite pas de récepteur final d'électrons externe. Elle permet de réoxyder le NADH en NAD⁺ pour que la glycolyse puisse se poursuivre, produisant ainsi un peu d'ATP même en anaérobiose.</p>"
       },
       {
         "question": "<p><strong>3.6 (0,75 pt)</strong> Cite les différents facteurs qui influencent la dépense énergétique d'un individu.</p>",
         "reponse": "<p>La dépense énergétique varie selon :</p><ul><li>L'<strong>âge</strong> (en baisse avec l'âge).</li><li>Le <strong>sexe</strong> (en général plus élevée chez l'homme).</li><li>L'<strong>activité physique</strong> (augmente avec l'intensité de l'effort).</li><li>La <strong>température ambiante</strong> (augmente en cas de froid).</li><li>Le <strong>travail digestif</strong> (augmente après les repas).</li></ul>"
       }
     ]
   },
   {
     "titre": "Exercice 4 : Le flux d'énergie et les cycles biogéochimiques",
     "points": "6 pts",
     "enonce": "<p>Les écosystèmes fonctionnent grâce à un flux d'énergie et à des cycles de la matière. Le cycle du carbone est un exemple de cycle biogéochimique essentiel, aujourd'hui perturbé par les activités humaines.</p>",
     "questions": [
       {
         "question": "<p><strong>4.1 (0,75 pt)</strong> Définis les différents niveaux trophiques d'un écosystème.</p>",
         "reponse": "<p>Les niveaux trophiques sont :</p><ul><li>Les <strong>producteurs primaires</strong> (végétaux chlorophylliens) : produisent la matière organique par photosynthèse.</li><li>Les <strong>consommateurs</strong> (herbivores, carnivores) : consomment la matière organique.</li><li>Les <strong>décomposeurs</strong> (champignons, bactéries) : transforment la matière organique morte en éléments minéraux.</li></ul>"
       },
       {
         "question": "<p><strong>4.2 (1 pt)</strong> Identifie quatre réservoirs de carbone et les flux qui les relient.</p>",
         "reponse": "<p>Les réservoirs de carbone sont :</p><ul><li><strong>L'atmosphère</strong> (CO₂) ↔ <strong>la biosphère</strong> (photosynthèse et respiration).</li><li><strong>La biosphère</strong> ↔ <strong>les océans</strong> (échanges de CO₂ par dissolution).</li><li><strong>Les océans</strong> ↔ <strong>les roches sédimentaires</strong> (précipitation de carbonates par les organismes marins).</li><li><strong>La lithosphère</strong> ↔ <strong>l'atmosphère</strong> (combustion des énergies fossiles, activité volcanique).</li></ul>"
       },
       {
         "question": "<p><strong>4.3 (1,25 pt)</strong> Explique l'impact des activités humaines sur le cycle du carbone et ses conséquences sur le climat.</p>",
         "reponse": "<p>Les activités humaines (déforestation, combustion des énergies fossiles) libèrent d'importantes quantités de CO₂ dans l'atmosphère, stocké depuis des millions d'années dans la lithosphère. Cette augmentation du CO₂ atmosphérique renforce l'effet de serre naturel, entraînant un <strong>réchauffement climatique</strong>. Les conséquences incluent la fonte des glaces, l'élévation du niveau des mers et des perturbations climatiques (sécheresses, inondations).</p>"
       },
       {
         "question": "<p><strong>4.4 (1 pt)</strong> Explique le principe de l'effet de serre en précisant son importance pour la vie sur Terre.</p>",
         "reponse": "<p>L'effet de serre est un phénomène naturel qui piège une partie des rayons infrarouges émis par la Terre après absorption de l'énergie solaire. Les gaz à effet de serre (CO₂, vapeur d'eau, méthane) empêchent ces radiations de s'échapper dans l'espace, ce qui maintient une température moyenne de +15°C favorable à la vie.</p>"
       },
       {
         "question": "<p><strong>4.5 (1 pt)</strong> Distingue l'effet de serre naturel de l'effet de serre additionnel.</p>",
         "reponse": "<p>L'effet de serre naturel est un phénomène indispensable à la vie sur Terre. L'effet de serre additionnel est l'augmentation de cet effet naturel due aux émissions de gaz à effet de serre d'origine anthropique (CO₂ issu de la combustion des énergies fossiles, méthane de l'élevage, etc.). Cet excès est responsable du réchauffement climatique actuel.</p>"
       },
       {
         "question": "<p><strong>4.6 (1 pt)</strong> Qu'est-ce qu'un puits de carbone ? Donne deux exemples.</p>",
         "reponse": "<p>Un <strong>puits de carbone</strong> est un réservoir qui absorbe plus de carbone qu'il n'en relâche. Deux exemples sont :</p><ul><li>Les <strong>forêts</strong> (photosynthèse).</li><li>Les <strong>océans</strong> (dissolution du CO₂ dans l'eau).</li></ul>"
       }
     ]
   }
 ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
