<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "SVT 1ère C",
  "classe": "Première",
  "sequence": "Évaluation séquentielle n°1",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Évaluation des Ressources (Organisation de la cellule et structure de l'ADN)",
      "points": "8 pts",
      "enonce": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; line-height: 1.6; color: #2d3748; background-color: #f7fafc; padding: 1.5rem; border-radius: 12px; max-width: 100%;'><h2 style='font-size: 1.25rem; font-weight: 600; color: #1a202c; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem; margin-bottom: 1rem;'>🧬 Exercice 1 : La cellule et son patrimoine génétique</h2><p style='margin-bottom: 1rem;'>On observe au microscope une cellule. Elle possède une paroi visible, une grande vacuole centrale, et des chloroplastes.</p><div style='background-color: #ebf8ff; padding: 1rem; border-radius: 0.5rem; border-left: 4px solid #3182ce; margin-bottom: 1rem;'><p style='margin: 0; font-weight: 500; color: #2c5282;'>📌 Document :</p><p style='margin: 0.5rem 0 0 0; font-style: italic;'>« La cellule observée possède une paroi rigide, une grande vacuole et des organites verts contenant de la chlorophylle. »</p></div><h2 style='font-size: 1.1rem; font-weight: 600; color: #1a202c; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.3rem; margin-top: 1.5rem;'>📋 Questions :</h2></div>",
      "questions": [
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>1)</strong> Distinguer ce type de cellule d'une cellule animale en citant deux différences majeures. <span style='font-weight: 600; color: #2b6cb0;'>(2 pts)</span></p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong> La cellule observée est une cellule végétale. Les deux différences majeures avec une cellule animale sont :</p><ul style='list-style-type: disc; padding-left: 1.5rem;'><li>La présence d'une <strong>paroi cellulosique</strong> rigide qui protège la cellule végétale.</li><li>La présence de <strong>chloroplastes</strong>, organites contenant de la chlorophylle et permettant la photosynthèse.</li></ul><p>Une cellule animale possède une membrane plasmique uniquement et n'a pas de chloroplastes.</p></div>"
        },
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>2)</strong> Décrire la structure d'un chromosome en citant ses deux principaux constituants. <span style='font-weight: 600; color: #2b6cb0;'>(2 pts)</span></p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong> Un chromosome est constitué de :</p><ul style='list-style-type: disc; padding-left: 1.5rem;'><li><strong>ADN (Acide DésoxyriboNucléique)</strong> : une molécule en forme de double hélice qui porte l'information génétique.</li><li><strong>Histones</strong> : des protéines autour desquelles l'ADN s'enroule pour former une structure compacte appelée chromatine.</li></ul><p>L'association ADN + Histones forme la chromatine, qui se condense en chromosomes lors de la division cellulaire.</p></div>"
        },
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>3)</strong> Expliquer la structure en double hélice de l'ADN et son rôle dans la transmission de l'information génétique. <span style='font-weight: 600; color: #2b6cb0;'>(2 pts)</span></p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong> L'ADN a une structure en <strong>double hélice</strong> formée de deux brins enroulés l'un autour de l'autre. Chaque brin est composé de nucléotides (A, T, G, C) qui s'apparient de manière complémentaire (A avec T, G avec C).</p><p>Cette structure permet à l'ADN de se <strong>répliquer</strong> fidèlement avant chaque division cellulaire : chaque brin sert de matrice pour la synthèse d'un nouveau brin complémentaire, assurant ainsi une transmission exacte du patrimoine génétique.</p></div>"
        },
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>4)</strong> Définir la notion de gène. <span style='font-weight: 600; color: #2b6cb0;'>(2 pts)</span></p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong> Un <strong>gène</strong> est une séquence spécifique d'ADN située à un emplacement précis (locus) sur un chromosome. Il constitue une unité d'information génétique qui détermine un caractère héréditaire en codant pour une protéine ou un ARN fonctionnel.</p></div>"
        }
      ]
    },
    {
      "titre": "Évaluation de l'Agir Compétent (Division cellulaire et hérédité)",
      "points": "8 pts",
      "enonce": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; line-height: 1.6; color: #2d3748; background-color: #f7fafc; padding: 1.5rem; border-radius: 12px; max-width: 100%;'><h2 style='font-size: 1.25rem; font-weight: 600; color: #1a202c; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem; margin-bottom: 1rem;'>🧬 Exercice 2 : La mitose et la transmission du patrimoine génétique</h2><p style='margin-bottom: 1rem;'>Une cellule humaine possède 46 chromosomes (23 paires). Elle entre en division cellulaire (mitose).</p><h2 style='font-size: 1.1rem; font-weight: 600; color: #1a202c; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.3rem; margin-top: 1.5rem;'>📋 Questions :</h2></div>",
      "questions": [
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>1)</strong> Définir le cycle cellulaire et citer ses principales phases. <span style='font-weight: 600; color: #2b6cb0;'>(1,5 pts)</span></p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong> Le <strong>cycle cellulaire</strong> est l'ensemble des étapes qui conduisent une cellule à se diviser. Il comprend :</p><ul style='list-style-type: disc; padding-left: 1.5rem;'><li><strong>L'interphase</strong> : phase de préparation à la division, comprenant les phases G1, S (réplication de l'ADN), et G2.</li><li><strong>La mitose</strong> : phase de division cellulaire.</li></ul></div>"
        },
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>2)</strong> Décrire les quatre phases de la mitose (prophase, métaphase, anaphase, télophase) chez une cellule animale. <span style='font-weight: 600; color: #2b6cb0;'>(3 pts)</span></p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong></p><ul style='list-style-type: disc; padding-left: 1.5rem;'><li><strong>Prophase :</strong> La chromatine se condense en chromosomes visibles. Les centrosomes se déplacent vers les pôles de la cellule. La membrane nucléaire commence à se fragmenter.</li><li><strong>Métaphase :</strong> Les chromosomes, chacun formé de deux chromatides sœurs, s'alignent sur la plaque équatoriale. Les fibres du fuseau se fixent sur les centromères.</li><li><strong>Anaphase :</strong> Les chromatides sœurs se séparent et migrent vers les pôles opposés de la cellule.</li><li><strong>Télophase :</strong> Les chromosomes se décondensent. La membrane nucléaire se reforme autour de chaque lot de chromosomes. La cellule se divise en deux (cytodiérèse).</li></ul></div>"
        },
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>3)</strong> Quel est le nombre de chromosomes dans chaque cellule fille à la fin de la mitose ? Justifier. <span style='font-weight: 600; color: #2b6cb0;'>(1,5 pts)</span></p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong> Chaque cellule fille possède <strong>46 chromosomes</strong> (23 paires).</p><p><strong>Justification :</strong> La mitose est une division équationnelle qui permet de conserver le nombre de chromosomes. Après la réplication de l'ADN en phase S, chaque chromosome est constitué de deux chromatides sœurs. En anaphase, les chromatides se séparent, distribuant un lot complet de 46 chromosomes à chaque cellule fille.</p></div>"
        },
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>4)</strong> Expliquer l'importance de la mitose dans le maintien de l'identité biologique d'un organisme. <span style='font-weight: 600; color: #2b6cb0;'>(2 pts)</span></p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong> La mitose est essentielle pour le maintien de l'identité biologique car :</p><ul style='list-style-type: disc; padding-left: 1.5rem;'><li>Elle produit des cellules filles génétiquement <strong>identiques</strong> à la cellule mère.</li><li>Elle permet le <strong>renouvellement cellulaire</strong> (remplacement des cellules usées) et la <strong>croissance</strong> de l'organisme.</li><li>Elle assure la transmission fidèle du patrimoine génétique à chaque nouvelle cellule, préservant ainsi les caractéristiques de l'individu.</li></ul></div>"
        }
      ]
    },
    {
      "titre": "Évaluation de l'Agir Compétent (Mutation et variabilité génétique)",
      "points": "4 pts",
      "enonce": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; line-height: 1.6; color: #2d3748; background-color: #f7fafc; padding: 1.5rem; border-radius: 12px; max-width: 100%;'><h2 style='font-size: 1.25rem; font-weight: 600; color: #1a202c; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem; margin-bottom: 1rem;'>🧬 Exercice 3 : Mutation et expression du génome</h2><p style='margin-bottom: 1rem;'>Une mutation ponctuelle a lieu sur un gène codant pour une protéine impliquée dans la synthèse du pigment mélanine. La séquence normale de l'ADN est : <strong>ATGGGTCGT</strong>.</p><p style='margin-bottom: 1rem;'>Après mutation, la séquence devient : <strong>ATGGGTCAT</strong>.</p><div style='background-color: #f7fafc; padding: 1rem; border-radius: 0.5rem; margin-bottom: 1rem;'><p style='font-weight: 600; margin: 0;'>🔬 Rappel du code génétique :</p><ul style='list-style-type: none; padding-left: 0.5rem; font-family: monospace; font-size: 0.9rem;'><li>GCT = Alanine</li><li>CGT = Arginine</li><li>CAT = Histidine</li></ul></div><h2 style='font-size: 1.1rem; font-weight: 600; color: #1a202c; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.3rem; margin-top: 1.5rem;'>📋 Questions :</h2></div>",
      "questions": [
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>1)</strong> Comparer les séquences d'ADN avant et après mutation. <span style='font-weight: 600; color: #2b6cb0;'>(1 pt)</span></p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong> La séquence normale est <strong>ATGGGTCGT</strong> et la séquence mutée est <strong>ATGGGTCAT</strong>.</p><p>La mutation a affecté le <strong>7ème nucléotide</strong> (la base G a été remplacée par A). C'est une mutation ponctuelle de type <strong>substitution</strong>.</p></div>"
        },
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>2)</strong> En utilisant le code génétique fourni, déterminer les acides aminés codés par les séquences normales et mutées. Cette mutation entraine-t-elle un changement de la protéine ? Justifier. <span style='font-weight: 600; color: #2b6cb0;'>(2 pts)</span></p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong></p><p>La séquence normale se lit : <strong>ATG | GGT | CGT</strong>.</p><ul style='list-style-type: disc; padding-left: 1.5rem;'><li><strong>ATG</strong> : Méthionine (codon start)</li><li><strong>GGT</strong> : Acide aminé non précisé (remplacer par un tiret)</li><li><strong>CGT</strong> : Arginine</li></ul><p>La séquence mutée se lit : <strong>ATG | GGT | CAT</strong>.</p><ul style='list-style-type: disc; padding-left: 1.5rem;'><li><strong>ATG</strong> : Méthionine</li><li><strong>GGT</strong> : Acide aminé non précisé</li><li><strong>CAT</strong> : Histidine</li></ul><p>Le dernier acide aminé a changé : l'Arginine est remplacée par l'Histidine. Cette mutation est donc une <strong>mutation faux-sens</strong> qui entraîne une modification de la protéine.</p></div>"
        },
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>3)</strong> Expliquer pourquoi certaines mutations peuvent être sans effet sur l'organisme. <span style='font-weight: 600; color: #2b6cb0;'>(1 pt)</span></p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong> Certaines mutations sont sans effet car :</p><ul style='list-style-type: disc; padding-left: 1.5rem;'><li><strong>Mutations silencieuses</strong> : la modification de l'ADN ne change pas l'acide aminé (le code génétique est dégénéré).</li><li><strong>Mutations dans les régions non codantes</strong> (introns) : elles n'affectent pas la séquence de la protéine.</li><li><strong>Mutations neutres</strong> : le changement d'acide aminé n'altère pas la fonction de la protéine.</li></ul></div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
