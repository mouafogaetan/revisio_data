<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "SVT 1ère C",
  "classe": "Première",
  "sequence": "Séquence 2 : Biologie moléculaire et énergétique",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Organisation cellulaire et identification des organites",
      "points": "5 pts",
      "enonce": "<p>L'observation des cellules au microscope révèle des différences structurales importantes entre les cellules animales et végétales. L'étude de leur ultrastructure permet de comprendre les relations entre la structure des organites et leurs fonctions.</p>",
      "questions": [
        {
          "question": "<p><strong>1.1</strong> (1,5 pts) a) Distinguer les cellules animales des cellules végétales en microscopie optique (citer au moins trois critères). <br>b) Donner la fonction de chaque structure citée.</p>",
          "reponse": "<p>a) Différences entre cellules animales et végétales en microscopie optique :</p><ul><li>Présence d'une <strong>paroi cellulosique</strong> chez la cellule végétale (absente chez l'animal) → rôle de soutien et de protection.</li><li>Présence d'une <strong>vacuole</strong> volumineuse chez la cellule végétale (petite ou absente chez l'animal) → rôle de stockage et de maintien de la turgescence.</li><li>Présence de <strong>chloroplastes</strong> chez la cellule végétale (absents chez l'animal) → rôle dans la photosynthèse.</li></ul>"
        },
        {
          "question": "<p><strong>1.2</strong> (1,5 pts) Identifier les organites suivants en microscopie électronique et indiquer leur fonction : <br>a) Mitochondrie <br>b) Réticulum endoplasmique <br>c) Appareil de Golgi</p>",
          "reponse": "<p>a) <strong>Mitochondrie</strong> : organite à double membrane, responsable de la respiration cellulaire et de la production d'ATP (énergie).</p><p>b) <strong>Réticulum endoplasmique</strong> : réseau de membranes, impliqué dans la synthèse des protéines (RE rugueux) et des lipides (RE lisse), et dans le transport intracellulaire.</p><p>c) <strong>Appareil de Golgi</strong> : empilement de saccules, responsable de la maturation, du conditionnement et du transport des protéines vers leur destination finale.</p>"
        },
        {
          "question": "<p><strong>1.3</strong> (2 pts) Établir une relation entre l'ultrastructure de la mitochondrie et sa fonction de production d'énergie.</p>",
          "reponse": "<p>La mitochondrie possède une double membrane :</p><ul><li>La <strong>membrane externe</strong> lisse, perméable aux petites molécules.</li><li>La <strong>membrane interne</strong> plissée en <strong>crêtes</strong>, qui augmente considérablement la surface d'échange.</li></ul><p>Cette grande surface permet d'accueillir de nombreuses chaînes respiratoires et ATP-synthases, nécessaires à la production d'ATP. La matrice (espace interne) contient les enzymes du cycle de Krebs. La structure de la mitochondrie est donc parfaitement adaptée à sa fonction énergétique.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Structure de l'ADN, réplication et mitose",
      "points": "6 pts",
      "enonce": "<p>L'ADN est le support de l'information génétique. Sa structure en double hélice et sa capacité à se répliquer assurent la transmission fidèle du patrimoine génétique lors des divisions cellulaires.</p>",
      "questions": [
        {
          "question": "<p><strong>2.1</strong> (1 pt) a) Décrire la structure d'un chromosome. <br>b) Définir la notion de gène.</p>",
          "reponse": "<p>a) Un <strong>chromosome</strong> est constitué d'une molécule d'<strong>ADN</strong> associée à des protéines appelées <strong>histones</strong>. L'ADN s'enroule autour des histones pour former des nucléosomes, qui se compactent en chromatine puis en chromosomes visibles lors de la division cellulaire.</p><p>b) Un <strong>gène</strong> est un fragment d'ADN qui porte l'information génétique nécessaire à la synthèse d'une protéine (ou d'un ARN). C'est l'unité de base de l'hérédité.</p>"
        },
        {
          "question": "<p><strong>2.2</strong> (1,5 pts) Expliquer le mécanisme de la réplication de l'ADN en précisant son caractère semi-conservatif.</p>",
          "reponse": "<p>La <strong>réplication de l'ADN</strong> est un mécanisme <strong>semi-conservatif</strong> : chaque molécule d'ADN fille reçoit un brin parental (conservé) et un brin néo-synthétisé.</p><p>Étapes :</p><ol><li>L'ADN hélicase sépare les deux brins de la double hélice.</li><li>L'ADN polymérase synthétise un nouveau brin complémentaire en utilisant chaque brin parental comme matrice, selon les règles de complémentarité (A-T, G-C).</li><li>Chaque molécule fille est donc constituée d'un ancien brin et d'un nouveau brin.</li></ol><p>Ce mécanisme assure la transmission fidèle de l'information génétique.</p>"
        },
        {
          "question": "<p><strong>2.3</strong> (2 pts) a) Décrire les phases de la mitose (prophase, métaphase, anaphase, télophase). <br>b) Expliquer le rôle de la mitose dans le maintien de l'identité biologique.</p>",
          "reponse": "<p>a) Phases de la mitose :</p><ul><li><strong>Prophase</strong> : condensation des chromosomes, disparition de l'enveloppe nucléaire, formation du fuseau mitotique.</li><li><strong>Métaphase</strong> : alignement des chromosomes sur la plaque équatoriale.</li><li><strong>Anaphase</strong> : séparation des chromatides-sœurs, migration vers les pôles opposés.</li><li><strong>Télophase</strong> : décondensation des chromosomes, réapparition de l'enveloppe nucléaire, division du cytoplasme (cytodiérèse).</li></ul><p>b) La mitose donne deux cellules filles génétiquement <strong>identiques</strong> à la cellule mère (même nombre de chromosomes, même information génétique). Elle permet le <strong>renouvellement cellulaire</strong>, la <strong>croissance</strong> et la <strong>réparation des tissus</strong>, tout en maintenant l'identité biologique de l'individu.</p>"
        },
        {
          "question": "<p><strong>2.4</strong> (1,5 pts) Définir le cycle cellulaire et identifier ses différentes phases (interphase G1, S, G2, mitose).</p>",
          "reponse": "<p>Le <strong>cycle cellulaire</strong> est l'ensemble des étapes qui conduisent une cellule à se diviser. Il comprend :</p><ul><li><strong>Interphase</strong> (phase de préparation) : <br>- Phase <strong>G1</strong> : croissance cellulaire, synthèse des protéines.<br>- Phase <strong>S</strong> : réplication de l'ADN (synthèse).<br>- Phase <strong>G2</strong> : préparation à la mitose (synthèse des protéines nécessaires).</li><li><strong>Mitose</strong> (division cellulaire) : prophase, métaphase, anaphase, télophase.</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Renouvellement moléculaire et catalyse enzymatique",
      "points": "6 pts",
      "enonce": "<p>Les cellules sont en permanence le siège de réactions chimiques qui assurent leur renouvellement et leur fonctionnement. Les enzymes jouent un rôle fondamental dans la catalyse de ces réactions.</p>",
      "questions": [
        {
          "question": "<p><strong>3.1</strong> (1 pt) a) Définir le renouvellement permanent des molécules organiques. <br>b) Citer les trois grandes classes de molécules organiques (glucides, lipides, protides) en donnant un exemple pour chacune.</p>",
          "reponse": "<p>a) Le <strong>renouvellement permanent</strong> est le processus par lequel les molécules organiques des cellules sont constamment dégradées et resynthétisées. Il assure l'adaptation de la cellule à son environnement et son bon fonctionnement.</p><p>b) Les trois grandes classes :</p><ul><li><strong>Glucides</strong> : glucose, amidon, glycogène.</li><li><strong>Lipides</strong> : triglycérides, phospholipides, cholestérol.</li><li><strong>Protides</strong> : enzymes, hormones, anticorps, collagène.</li></ul>"
        },
        {
          "question": "<p><strong>3.2</strong> (1,5 pts) Expliquer le mécanisme de la biosynthèse des protéines en décrivant les étapes de transcription et de traduction.</p>",
          "reponse": "<p>La biosynthèse des protéines comporte deux étapes principales :</p><p><strong>Transcription</strong> : dans le noyau, l'ADN est utilisé comme matrice pour synthétiser un ARN messager (ARNm) complémentaire. L'ARN polymérase lit le gène et produit l'ARNm.</p><p><strong>Traduction</strong> : dans le cytoplasme, l'ARNm est lu par les ribosomes. Les ARN de transfert (ARNt) apportent les acides aminés correspondant aux codons de l'ARNm, selon le code génétique. Les acides aminés sont assemblés en chaîne polypeptidique (protéine).</p>"
        },
        {
          "question": "<p><strong>3.3</strong> (1,5 pts) a) Définir la notion d'enzyme et de site actif. <br>b) Expliquer le modèle \"clé-serrure\" de la spécificité enzymatique.</p>",
          "reponse": "<p>a) Une <strong>enzyme</strong> est une protéine qui catalyse une réaction chimique spécifique en abaissant l'énergie d'activation. Le <strong>site actif</strong> est la région de l'enzyme où le substrat se fixe.</p><p>b) Le modèle <strong>clé-serrure</strong> : le site actif de l'enzyme (serrure) possède une forme complémentaire à celle du substrat (clé). Seul le substrat spécifique peut se fixer et former le complexe enzyme-substrat, assurant une <strong>spécificité d'action</strong> (substrat et réaction). Ce modèle explique pourquoi une enzyme ne catalyse qu'une seule réaction ou un type de réaction spécifique.</p>"
        },
        {
          "question": "<p><strong>3.4</strong> (2 pts) a) Étudier l'influence du pH sur l'activité enzymatique (tracer l'allure de la courbe). <br>b) Expliquer pourquoi les enzymes ont un pH optimal.</p>",
          "reponse": "<p>a) L'activité enzymatique est maximale à un <strong>pH optimal</strong>. Au-delà ou en deçà, l'activité diminue jusqu'à s'annuler. La courbe est une cloche asymétrique.</p><p>b) Le pH influence l'état de charge des acides aminés du site actif de l'enzyme. Un pH différent du pH optimal modifie la structure tridimensionnelle de l'enzyme (dénaturation partielle) et réduit sa capacité à fixer le substrat. Chaque enzyme possède un pH optimal qui correspond à son environnement physiologique (ex : enzymes digestives comme la pepsine à pH 2, les enzymes du sang à pH 7,4).</p>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Énergétique biologique : respiration et fermentation",
      "points": "4 pts",
      "enonce": "<p>Les cellules animales et végétales produisent de l'énergie sous forme d'ATP par dégradation des molécules organiques. La respiration et la fermentation sont deux voies métaboliques différentes.</p>",
      "questions": [
        {
          "question": "<p><strong>4.1</strong> (1 pt) Distinguer la respiration aérobie de la fermentation.</p>",
          "reponse": "<p><strong>Respiration aérobie</strong> : dégradation complète des molécules organiques (glucose) en CO₂ et H₂O, en présence d'oxygène. Elle produit un grand nombre d'ATP (environ 36 à 38 ATP par molécule de glucose).</p><p><strong>Fermentation</strong> : dégradation partielle des molécules organiques en l'absence d'oxygène. Elle produit peu d'ATP (2 ATP par molécule de glucose) et des déchets organiques (alcool, acide lactique, acide acétique selon le type de fermentation).</p>"
        },
        {
          "question": "<p><strong>4.2</strong> (1,5 pts) Décrire le déroulement de la respiration cellulaire en citant ses trois principales étapes.</p>",
          "reponse": "<p>La respiration cellulaire comporte trois étapes principales :</p><ol><li><strong>Glycolyse</strong> (dans le cytoplasme) : dégradation du glucose en 2 molécules de pyruvate (acide pyruvique), avec production de 2 ATP et de 2 NADH, H+.</li><li><strong>Cycle de Krebs</strong> (dans la matrice mitochondriale) : dégradation complète du pyruvate en CO₂, avec production de NADH, H+ et FADH₂, et de 2 ATP (par cycle).</li><li><strong>Chaîne respiratoire</strong> (dans la membrane interne de la mitochondrie) : réoxydation des coenzymes réduits (NADH, H+ et FADH₂) avec transfert des électrons à l'oxygène, produisant 34 à 38 ATP.</li></ol>"
        },
        {
          "question": "<p><strong>4.3</strong> (1,5 pts) a) Comparer le rendement énergétique de la respiration et de la fermentation. <br>b) Citer deux applications industrielles des fermentations.</p>",
          "reponse": "<p>a) Le rendement énergétique :</p><ul><li><strong>Respiration aérobie</strong> : 36 à 38 ATP par molécule de glucose (rendement élevé).</li><li><strong>Fermentation</strong> : 2 ATP par molécule de glucose (rendement faible).</li></ul><p>b) Deux applications des fermentations :</p><ul><li><strong>Fermentation alcoolique</strong> : fabrication de boissons alcoolisées (vin, bière) et de pain (levure de boulangerie).</li><li><strong>Fermentation acétique</strong> : fabrication de vinaigre (oxydation de l'éthanol en acide acétique par des bactéries acétiques).</li></ul>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
