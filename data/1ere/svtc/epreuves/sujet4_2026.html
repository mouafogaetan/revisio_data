<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "SVT",
  "classe": "Première C",
  "sequence": "Séquence 4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Évaluation des connaissances",
      "points": "4 pts",
      "enonce": "<div style='padding: 10px; background-color: #f0f4f8; border-radius: 8px; color: #1a202c;'><p>Réponds aux questions suivantes par des réponses courtes et précises.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. a)</strong> Distingue l'altération mécanique de l'altération chimique en donnant un exemple pour chacune. (1 pt)</p>",
          "reponse": "<p><strong>Altération mécanique</strong> : Désagrégation physique des roches sans modification de leur composition chimique. Exemple : le gel-dégel qui fissure les roches.</p><p><strong>Altération chimique</strong> : Transformation de la composition chimique des roches par réaction avec l'eau ou l'air. Exemple : l'hydrolyse du feldspath qui donne de l'argile.</p>"
        },
        {
          "question": "<p><strong>1. b)</strong> Cite les quatre principes fondamentaux de la chronologie relative. (1 pt)</p>",
          "reponse": "<ul><li><strong>Principe de superposition</strong></li><li><strong>Principe de continuité</strong></li><li><strong>Principe de recoupement</strong></li><li><strong>Principe d'inclusion</strong></li></ul>"
        },
        {
          "question": "<p><strong>1. c)</strong> Définis l'érosion et la sédimentation. (1 pt)</p>",
          "reponse": "<p><strong>Érosion</strong> : Arrachement et transport des produits d'altération par l'eau, le vent ou les glaciers.</p><p><strong>Sédimentation</strong> : Dépôt des particules transportées lorsqu'il y a diminution de l'énergie du milieu.</p>"
        },
        {
          "question": "<p><strong>1. d)</strong> Qu'est-ce que la diagénèse ? (1 pt)</p>",
          "reponse": "<p>La diagénèse est l'ensemble des processus physiques et chimiques (compaction, cimentation, recristallisation) qui transforment des sédiments meubles en roches sédimentaires consolidées.</p>"
        }
      ]
    },
    {
      "titre": "Application : Chronologie relative",
      "points": "6 pts",
      "enonce": "<div style='padding: 10px; background-color: #f0f4f8; border-radius: 8px; color: #1a202c;'><p><strong>Document :</strong> Coupe géologique simplifiée d'une région.</p><p>On observe de bas en haut :</p><ul><li>Une couche de granite (G) contenant des filons de quartz (Q).</li><li>Une couche de calcaire (C1) avec des fossiles de trilobites.</li><li>Une couche de grès (Gr) avec des fossiles de plantes.</li><li>Une couche de calcaire (C2) avec des fossiles d'ammonites.</li><li>Une intrusion de basalte (B) qui recoupe toutes les couches.</li></ul></div>",
      "questions": [
        {
          "question": "<p><strong>2. a)</strong> Classe les formations rocheuses (G, Q, C1, Gr, C2, B) du plus ancien au plus récent en justifiant par les principes de chronologie relative. (2 pts)</p>",
          "reponse": "<p><strong>Ordre du plus ancien au plus récent :</strong></p><ol><li><strong>G (granite)</strong> : roche la plus profonde (principe de superposition).</li><li><strong>Q (filons de quartz)</strong> : plus récents que le granite car ils le recoupent (principe de recoupement).</li><li><strong>C1 (calcaire à trilobites)</strong> : déposé après le granite et les filons (superposition).</li><li><strong>Gr (grès à plantes)</strong> : déposé après C1 (superposition).</li><li><strong>C2 (calcaire à ammonites)</strong> : déposé après Gr (superposition).</li><li><strong>B (basalte)</strong> : intrusion qui recoupe toutes les couches, donc la plus récente (principe de recoupement).</li></ol>"
        },
        {
          "question": "<p><strong>2. b)</strong> La couche C1 est-elle plus ancienne ou plus récente que la couche C2 ? Justifie. (1 pt)</p>",
          "reponse": "<p>C1 est <strong>plus ancienne</strong> que C2 car elle est située en dessous de C2 (principe de superposition). De plus, les trilobites (C1) ont disparu avant l'apparition des ammonites (C2), ce qui confirme la chronologie.</p>"
        },
        {
          "question": "<p><strong>2. c)</strong> Que peut-on dire de l'âge des filons de quartz par rapport au granite ? (1 pt)</p>",
          "reponse": "<p>Les filons de quartz sont <strong>plus récents</strong> que le granite car ils le recoupent (principe de recoupement). Ils se sont formés après la mise en place du granite.</p>"
        },
        {
          "question": "<p><strong>2. d)</strong> L'intrusion de basalte a-t-elle affecté toutes les couches ? Justifie. (1 pt)</p>",
          "reponse": "<p>Oui, l'intrusion de basalte a affecté toutes les couches car elle les recoupe toutes (C1, Gr, C2, G et Q). Elle est donc plus récente que l'ensemble de ces formations.</p>"
        },
        {
          "question": "<p><strong>2. e)</strong> Quelle est la nature de l'événement géologique représenté par la présence de couches sédimentaires (C1, Gr, C2) superposées ? (1 pt)</p>",
          "reponse": "<p>La présence de couches sédimentaires superposées indique une <strong>sédimentation continue</strong> dans un environnement où les conditions de dépôt ont évolué au cours du temps (passage d'un milieu marin calcaire à un milieu continental ou deltaïque avec grès, puis retour à un milieu marin).</p>"
        }
      ]
    },
    {
      "titre": "Application : Le cycle du carbone et l'effet de serre",
      "points": "4 pts",
      "enonce": "<div style='padding: 10px; background-color: #f0f4f8; border-radius: 8px; color: #1a202c;'><p><strong>Document :</strong> Le cycle du carbone met en jeu plusieurs réservoirs (atmosphère, biomasse, océans, roches sédimentaires) et des flux entre eux.</p></div>",
      "questions": [
        {
          "question": "<p><strong>3. a)</strong> Cite trois réservoirs de carbone et un flux majeur pour chacun. (1,5 pt)</p>",
          "reponse": "<ul><li><strong>Atmosphère</strong> : CO₂, flux de photosynthèse (absorption par les végétaux).</li><li><strong>Biomasse</strong> : matière organique des êtres vivants, flux de respiration (rejet de CO₂).</li><li><strong>Océans</strong> : dissolution du CO₂, flux d'échange avec l'atmosphère.</li></ul>"
        },
        {
          "question": "<p><strong>3. b)</strong> Explique l'impact des activités humaines sur le cycle du carbone. (1,5 pt)</p>",
          "reponse": "<p>Les activités humaines (déforestation, combustion des énergies fossiles, industries) augmentent les émissions de CO₂ dans l'atmosphère. La déforestation réduit la capacité de la biomasse à fixer le CO₂ par photosynthèse. Ces rejets supplémentaires déséquilibrent le cycle du carbone et augmentent la concentration de CO₂ atmosphérique.</p>"
        },
        {
          "question": "<p><strong>3. c)</strong> Quelles sont les conséquences de l'intensification de l'effet de serre ? (1 pt)</p>",
          "reponse": "<p>L'intensification de l'effet de serre provoque :</p><ul><li>Le <strong>réchauffement climatique</strong> (hausse des températures moyennes).</li><li>La <strong>fonte des glaciers</strong> et des calottes polaires.</li><li>L'<strong>élévation du niveau des mers</strong>.</li><li>La <strong>perturbation des écosystèmes</strong> et des cycles saisonniers.</li><li>L'<strong>augmentation des événements climatiques extrêmes</strong> (canicules, inondations, sécheresses).</li></ul>"
        }
      ]
    },
    {
      "titre": "Application : Le cycle de l'azote",
      "points": "3 pts",
      "enonce": "<div style='padding: 10px; background-color: #f0f4f8; border-radius: 8px; color: #1a202c;'><p><strong>Document :</strong> L'azote est un élément essentiel pour les êtres vivants. Il circule dans l'écosystème sous différentes formes.</p></div>",
      "questions": [
        {
          "question": "<p><strong>4. a)</strong> Explique le rôle des bactéries fixatrices de l'azote dans le cycle de l'azote. (1 pt)</p>",
          "reponse": "<p>Les bactéries fixatrices (ex : <em>Rhizobium</em> dans les nodosités des légumineuses) transforment le diazote (N₂) atmosphérique en ammoniaque (NH₃) ou en ions ammonium (NH₄⁺) assimilables par les plantes. C'est la <strong>fixation de l'azote</strong>.</p>"
        },
        {
          "question": "<p><strong>4. b)</strong> Distingue la nitrification de la dénitrification. (1 pt)</p>",
          "reponse": "<p><strong>Nitrification</strong> : Transformation de l'ammonium (NH₄⁺) en nitrates (NO₃⁻) par des bactéries nitrifiantes. Les nitrates sont assimilables par les plantes.</p><p><strong>Dénitrification</strong> : Transformation des nitrates (NO₃⁻) en diazote (N₂) par des bactéries dénitrifiantes, qui retourne dans l'atmosphère.</p>"
        },
        {
          "question": "<p><strong>4. c)</strong> Comment l'azote atmosphérique est-il assimilé par les plantes à fleurs ? (1 pt)</p>",
          "reponse": "<p>Les plantes à fleurs ne peuvent pas assimiler directement l'azote atmosphérique (N₂). Elles l'assimilent sous forme d'<strong>ions ammonium (NH₄⁺)</strong> ou de <strong>nitrates (NO₃⁻)</strong> prélevés dans le sol. Ces ions sont produits par :</p><ul><li>La fixation de l'azote (bactéries).</li><li>La nitrification.</li><li>La décomposition de la matière organique (ammonification).</li></ul>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
