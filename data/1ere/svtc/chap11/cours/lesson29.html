<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }

    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }

    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }

    .content-card li:last-child {
        border-bottom: none;
    }

    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }

    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }

    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }

    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }

    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }

    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }

    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }

    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }

    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }

    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }

    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }

    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }

    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }

    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }

    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }

    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }

    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }

    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }

    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }

    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }

    /* Mode jour (par défaut) */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>

<div class="app-container">

    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>

    <main class="slide-body" id="slideBody"></main>

    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>

    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>

        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>

        <div class="auto-indicator" id="autoIndicator">⏸ Lecture manuelle</div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Introduction",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2c3e50; text-align: center;'>Leçon 29 : L'origine de l'énergie reçue par la planète Terre</h3><p style='text-align: center; font-size: 1.1em;'>Classe : Première C</p><p style='text-align: center;'>Matière : SVT</p><div style='background-color: #eaf2f8; padding: 15px; border-radius: 8px; margin-top: 15px;'><p style='margin: 0; color: #1a5276;'><strong>Objectif de la leçon :</strong></p><ul style='color: #1a5276;'><li>Citer l'origine de l'énergie solaire : la fusion des noyaux d'hydrogène en hélium.</li></ul></div><div style='background-color: #fef9e7; padding: 12px; border-radius: 8px; margin-top: 12px;'><p style='color: #7d6608; margin: 0;'><strong>Question centrale :</strong> D'où provient l'énergie qui permet à la Terre d'abriter la vie ?</p></div></div>",
    "texteParle": "Bonjour à tous. Aujourd'hui, nous allons aborder la leçon 29 sur l'origine de l'énergie reçue par la planète Terre. Cette leçon a un objectif principal : comprendre d'où provient l'énergie solaire qui est à la base de toute vie sur Terre. Nous allons découvrir que cette énergie trouve son origine au cœur même du Soleil, dans des réactions nucléaires qui transforment l'hydrogène en hélium. Cette question est fondamentale car elle nous permet de comprendre pourquoi le Soleil brille depuis des milliards d'années et continuera de le faire. Au Cameroun, comme dans le reste du monde, cette énergie solaire est à l'origine de la photosynthèse, du cycle de l'eau et de tous les phénomènes climatiques.",
    "note": "Objectif : Comprendre l'origine de l'énergie solaire."
  },
  {
    "titre": "Le Soleil, notre source d'énergie",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2c3e50;'>Le Soleil : la principale source d'énergie de la Terre</h3><div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px; margin: 10px 0;'><p style='margin: 0;'><strong>Le Soleil est une étoile :</strong></p><ul><li>Diamètre : environ 1,4 million de kilomètres</li><li>Masse : environ 330 000 fois celle de la Terre</li><li>Température de surface : environ 5 500 °C</li><li>Température au cœur : environ 15 millions de °C</li></ul></div><div style='background-color: #eaf2f8; padding: 12px; border-radius: 8px; margin: 10px 0;'><p style='color: #1a5276; margin: 0;'><strong>L'énergie solaire est essentielle pour :</strong></p><ul style='color: #1a5276;'><li>La photosynthèse (production de matière organique)</li><li>Le cycle de l'eau (évaporation, précipitations)</li><li>Les courants atmosphériques et océaniques</li><li>La régulation du climat terrestre</li></ul></div><div style='background-color: #fef9e7; padding: 10px; border-radius: 8px;'><p style='color: #7d6608; margin: 0;'><strong>Contexte camerounais :</strong> Le Cameroun bénéficie d'un ensoleillement important, ce qui en fait un pays favorable au développement de l'énergie solaire.</p></div></div>",
    "texteParle": "Le Soleil est la principale source d'énergie de notre planète. C'est une étoile qui a un diamètre d'environ 1,4 million de kilomètres, une masse 330 000 fois supérieure à celle de la Terre, et une température à sa surface d'environ 5 500 degrés Celsius. Mais au cœur du Soleil, la température atteint environ 15 millions de degrés Celsius. L'énergie solaire est essentielle pour la vie sur Terre. Elle permet la photosynthèse, le cycle de l'eau, la formation des courants atmosphériques et océaniques, et la régulation du climat. Au Cameroun, nous bénéficions d'un ensoleillement important, ce qui fait de notre pays un lieu favorable au développement de l'énergie solaire.",
    "note": "Le Soleil est une étoile qui produit une énergie considérable."
  },
  {
    "titre": "La fusion nucléaire",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2c3e50;'>La fusion nucléaire : la source d'énergie du Soleil</h3><div style='background-color: #fdedec; padding: 15px; border-radius: 8px; margin: 10px 0;'><p style='color: #922b21; margin: 0;'><strong>Définition :</strong> La fusion nucléaire est une réaction au cours de laquelle deux noyaux atomiques légers s'unissent pour former un noyau plus lourd, avec un dégagement d'énergie.</p></div><div style='background-color: #d5f5e3; padding: 15px; border-radius: 8px; margin: 10px 0;'><p style='color: #1a6e34; margin: 0;'><strong>Dans le Soleil, la fusion concerne principalement :</strong></p><ul style='color: #1a6e34;'><li>4 noyaux d'hydrogène (protons) → 1 noyau d'hélium</li><li>Une partie de la masse est convertie en énergie selon la célèbre équation d'Einstein :</li></ul><div style='text-align: center; background-color: #ffffff; padding: 10px; border-radius: 5px; margin: 10px 0;'><p style='font-size: 1.3em; font-weight: bold; color: #2c3e50;'>E = mc²</p></div><ul style='color: #1a6e34;'><li>E = énergie libérée (Joules)</li><li>m = masse perdue (kilogrammes)</li><li>c = vitesse de la lumière (3 × 10⁸ m/s)</li></ul></div></div>",
    "texteParle": "La source d'énergie du Soleil est la fusion nucléaire. La fusion nucléaire est une réaction au cours de laquelle deux noyaux atomiques légers s'unissent pour former un noyau plus lourd, avec un dégagement d'énergie considérable. Dans le Soleil, la fusion concerne principalement l'hydrogène. Quatre noyaux d'hydrogène, appelés protons, fusionnent pour former un noyau d'hélium. Au cours de cette réaction, une partie de la masse est convertie en énergie. Cette conversion est décrite par la célèbre équation d'Einstein, E égale m c au carré, où E est l'énergie libérée, m est la masse perdue, et c est la vitesse de la lumière. Cette équation montre qu'une très petite quantité de masse peut produire une énorme quantité d'énergie.",
    "note": "Fusion nucléaire : 4 H → 1 He + énergie (E = mc²)."
  },
  {
    "titre": "La chaîne proton-proton",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2c3e50;'>La chaîne proton-proton</h3><div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px; margin: 10px 0;'><p style='margin: 0;'><strong>Étapes de la réaction de fusion :</strong></p><ol><li><strong>Étape 1 :</strong> Deux protons (\( ^1_1H \)) fusionnent pour former un deutérium (\( ^2_1H \)), un positron (e⁺) et un neutrino (ν).</li><li><strong>Étape 2 :</strong> Le deutérium fusionne avec un autre proton pour former de l'hélium-3 (\( ^3_2He \)) et un rayon gamma (γ).</li><li><strong>Étape 3 :</strong> Deux noyaux d'hélium-3 fusionnent pour former de l'hélium-4 (\( ^4_2He \)) et deux protons (\( ^1_1H \)).</li></ol></div><div style='background-color: #eaf2f8; padding: 12px; border-radius: 8px; margin: 10px 0;'><p style='color: #1a5276; margin: 0;'><strong>Bilan global de la réaction :</strong></p><div style='text-align: center; background-color: #ffffff; padding: 10px; border-radius: 5px;'><p style='font-size: 1.2em; color: #2c3e50;'>4 \( ^1_1H \) → \( ^4_2He \) + 2e⁺ + 2ν + énergie</p></div><p style='color: #1a5276; margin-top: 8px;'>Cette réaction libère environ 26,7 MeV (méga-électronvolts) par noyau d'hélium formé.</p></div></div>",
    "texteParle": "La fusion nucléaire dans le Soleil se déroule en plusieurs étapes, selon un processus appelé la chaîne proton-proton. Dans la première étape, deux protons, c'est-à-dire deux noyaux d'hydrogène, fusionnent pour former un noyau de deutérium, qui est un isotope de l'hydrogène. Cette réaction libère également un positron et un neutrino. Dans la deuxième étape, le deutérium fusionne avec un autre proton pour former de l'hélium-3 et un rayon gamma. Enfin, dans la troisième étape, deux noyaux d'hélium-3 fusionnent pour former de l'hélium-4 et deux protons qui peuvent à nouveau participer à la réaction. Le bilan global de la réaction est que quatre noyaux d'hydrogène donnent un noyau d'hélium, deux positrons, deux neutrinos et une grande quantité d'énergie. Cette réaction libère environ 26,7 méga-électronvolts par noyau d'hélium formé.",
    "note": "Chaîne proton-proton : 4 H → He + énergie."
  },
  {
    "titre": "Énergie et masse",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2c3e50;'>Relation entre énergie et masse</h3><div style='background-color: #d5f5e3; padding: 15px; border-radius: 8px; margin: 10px 0;'><p style='color: #1a6e34; margin: 0;'><strong>Le défaut de masse :</strong></p><p style='color: #1a6e34;'>La masse d'un noyau d'hélium est <strong>inférieure</strong> à la somme des masses des quatre protons qui le composent. Cette différence de masse est appelée le <strong>défaut de masse</strong>.</p></div><div style='background-color: #fdedec; padding: 15px; border-radius: 8px; margin: 10px 0;'><p style='color: #922b21; margin: 0;'><strong>Calcul de l'énergie libérée :</strong></p><ul style='color: #922b21;'><li>Masse de 4 protons : 4 × 1,6726 × 10⁻²⁷ kg = 6,6904 × 10⁻²⁷ kg</li><li>Masse d'un noyau d'hélium : 6,6447 × 10⁻²⁷ kg</li><li>Défaut de masse : Δm = 0,0457 × 10⁻²⁷ kg = 4,57 × 10⁻²⁹ kg</li><li>Énergie libérée : E = Δm × c²</li><li>E = 4,57 × 10⁻²⁹ × (3 × 10⁸)² = 4,11 × 10⁻¹² J</li></ul></div><div style='background-color: #fef9e7; padding: 10px; border-radius: 8px;'><p style='color: #7d6608; margin: 0;'><strong>À retenir :</strong> Une toute petite perte de masse libère une énergie colossale. C'est ce qui permet au Soleil de briller depuis environ 4,6 milliards d'années.</p></div></div>",
    "texteParle": "Pour comprendre pourquoi la fusion nucléaire libère autant d'énergie, il faut parler de la relation entre l'énergie et la masse. Le noyau d'hélium a une masse inférieure à la somme des masses des quatre protons qui le composent. Cette différence de masse est appelée le défaut de masse. Par exemple, la masse de quatre protons est d'environ 6,6904 fois 10 puissance moins 27 kilogrammes, tandis que la masse d'un noyau d'hélium est d'environ 6,6447 fois 10 puissance moins 27 kilogrammes. La différence est d'environ 0,0457 fois 10 puissance moins 27 kilogrammes. En utilisant l'équation d'Einstein E égale m c au carré, cette petite perte de masse se transforme en une énergie d'environ 4,11 fois 10 puissance moins 12 joules. Cette énergie est colossale pour une seule réaction. C'est ce qui permet au Soleil de briller depuis environ 4,6 milliards d'années.",

    "titre": "Températures de fusion",

    "texteParle": "La fusion nucléaire nécessite des températures extrêmement élevées, d'environ 15 millions de degrés Celsius au cœur du Soleil. Pourquoi ? Parce que les protons, qui sont les noyaux d'hydrogène, sont chargés positivement et se repoussent donc les uns les autres en raison de la force électrostatique. Pour qu'ils fusionnent, il faut vaincre cette répulsion. La température extrême du cœur solaire fournit aux protons une énergie cinétique suffisante pour qu'ils se rapprochent assez pour que la force nucléaire forte, qui est beaucoup plus puissante que la force électrostatique, puisse agir et les maintenir ensemble. En d'autres termes, plus la température est élevée, plus les particules se déplacent rapidement, ce qui augmente la probabilité de fusion. Cette fusion ne se produit que dans des conditions extrêmes, ce qui explique pourquoi nous ne pouvons pas reproduire cette réaction facilement sur Terre.",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;

    const total = slides.length;
    const synth = window.speechSynthesis;

    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }

    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }

    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        
        loadingCancelled = false;
        isLoading = true;
        
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }

    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }

    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }

    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }

    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }

    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }

    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);

        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }

    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }

            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }

            // Arrêter toute lecture en cours
            stopSpeaking();
            
            // Réinitialiser l'état de pause
            isPaused = false;
            
            showLoading();
            setStatus("Initialisation...", 'loading');

            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;

                let isFinished = false;
                let errorHandled = false;

                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };

                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };

                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    
                    resolve();
                };

                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }

                currentUtterance = utterance;
                
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }

            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }

    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        // Arrêter complètement la lecture
        stopSpeaking();
        
        await new Promise(r => setTimeout(r, 50));
        
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }

        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');

        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }

    async function goToNext() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }

    async function goToPrev() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }

    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }

        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }

        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }

        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }

        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }

    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }

        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }

        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');

        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });

        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });

        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });

        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });

        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });

        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });

        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });

        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }

    init();
});



    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;

    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');

        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            header.style.background = 'rgba(15, 23, 42, 0.85)';
            footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            header.style.background = 'rgba(255, 255, 255, 0.85)';
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }

    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {

        });

        if (statusBadge) {

        const slideCounter = document.querySelector('.slide-counter');

        }
        
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {

            }
        });
        
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {

        const themeBtn = document.getElementById('themeToggle');
