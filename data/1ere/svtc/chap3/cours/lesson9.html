<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }

    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }

    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }

    .content-card li:last-child {
        border-bottom: none;
    }

    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }

    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }

    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }

    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }

    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }

    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }

    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }

    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }

    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }

    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }

    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }

    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }

    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }

    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }

    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }

    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }

    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }

    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }

    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }

    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }

    /* Mode jour (par défaut) */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>

<div class="app-container">

    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>

    <main class="slide-body" id="slideBody"></main>

    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>

    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>

        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>

        <div class="auto-indicator" id="autoIndicator">⏸ Lecture manuelle</div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Bienvenue en cours de SVT",
    "contenu": "<div style='text-align: center; padding: 15px;'><h2 style='color: #2c3e50;'>🧬 Leçon 9 : Relation entre la structure et la fonction de la protéine enzymatique</h2><p style='font-size: 1.1em; color: #34495e; margin-top: 15px;'>Classe : Première C</p><p style='font-size: 1em; color: #7f8c8d;'>Lycée de [Votre établissement]</p><div style='background: #27ae60; color: white; padding: 15px; border-radius: 10px; margin-top: 20px;'><p style='margin: 0; font-size: 1.1em;'>🎯 Objectifs de la leçon :</p><ul style='text-align: left; list-style-type: none; padding: 0;'><li>✓ Définir la notion de site actif</li><li>✓ Comprendre le rôle du site actif dans la catalyse</li><li>✓ Décrire la formation du complexe enzyme-substrat</li><li>✓ Expliquer les modèles \"clé-serrure\" et \"ajustement induit\"</li></ul></div></div>",
    "texteParle": "Bonjour à tous et bienvenue en cours de Sciences de la Vie et de la Terre. Aujourd'hui, nous allons aborder la leçon numéro 9 qui s'intitule Relation entre la structure et la fonction de la protéine enzymatique. Cette leçon est fondamentale car elle nous permet de comprendre comment les enzymes, qui sont des protéines, parviennent à catalyser si efficacement les réactions chimiques dans notre organisme. Nous allons découvrir que c'est la structure tridimensionnelle de l'enzyme qui lui confère sa spécificité d'action. Nous étudierons le site actif, le complexe enzyme-substrat et les deux modèles qui expliquent l'interaction entre l'enzyme et son substrat. Accrochez-vous bien, c'est une leçon passionnante !",
    "note": "Les enzymes sont des catalyseurs biologiques essentiels à la vie."
  },
  {
    "titre": "Rappel : Qu'est-ce qu'une enzyme ?",
    "contenu": "<div style='padding: 10px;'><div style='background: #d5f5e3; padding: 15px; border-radius: 10px; border-left: 5px solid #27ae60;'><h3 style='color: #2c3e50; margin-top: 0;'>Définition :</h3><p style='font-size: 1.1em;'>Une <strong>enzyme</strong> est une <strong>protéine</strong> qui agit comme <strong>catalyseur biologique</strong> en accélérant les réactions chimiques sans être consommée.</p></div><div style='background: #fef9e7; padding: 15px; border-radius: 10px; margin-top: 15px;'><h4 style='color: #2c3e50; margin-top: 0;'>Caractéristiques :</h4><ul style='list-style-type: none; padding: 0;'><li>✅ <span style='color: #27ae60;'>Spécificité</span> : chaque enzyme n'agit que sur un substrat spécifique</li><li>✅ <span style='color: #2980b9;'>Efficacité</span> : accélère les réactions de 10⁶ à 10¹² fois</li><li>✅ <span style='color: #e74c3c;'>Régulation</span> : peut être activée ou inhibée</li></ul></div></div>",
    "texteParle": "Avant d'entrer dans le vif du sujet, rappelons ce qu'est une enzyme. Une enzyme est une protéine qui agit comme catalyseur biologique. Cela signifie qu'elle accélère les réactions chimiques sans être consommée par la réaction. Les enzymes ont trois caractéristiques principales : la spécificité, c'est-à-dire qu'elles n'agissent que sur un substrat particulier ; l'efficacité, elles accélèrent les réactions des millions de fois ; et la régulation, elles peuvent être activées ou inhibées par d'autres molécules.",
    "note": "Les enzymes sont présentes dans toutes les cellules vivantes."
  },
  {
    "titre": "La structure tridimensionnelle des protéines",
    "contenu": "<div style='padding: 10px;'><div style='background: #eaf2f8; padding: 15px; border-radius: 10px; border-left: 5px solid #2980b9;'><h3 style='color: #2c3e50; margin-top: 0;'>Structure des protéines :</h3><ul><li><strong>Structure primaire</strong> : séquence linéaire d'acides aminés</li><li><strong>Structure secondaire</strong> : repliement local (hélice α, feuillet β)</li><li><strong>Structure tertiaire</strong> : repliement global en une forme tridimensionnelle</li><li><strong>Structure quaternaire</strong> : association de plusieurs sous-unités</li></ul></div><div style='background: #fdedec; padding: 15px; border-radius: 10px; margin-top: 15px;'><h4 style='color: #2c3e50; margin-top: 0;'>💡 Point clé :</h4><p>La <strong>structure tertiaire</strong> est la forme fonctionnelle de la protéine. C'est elle qui détermine l'activité de l'enzyme !</p></div></div>",
    "texteParle": "Pour comprendre comment une enzyme fonctionne, il faut d'abord connaître sa structure. Les protéines sont organisées à quatre niveaux. La structure primaire est la séquence linéaire d'acides aminés. La structure secondaire correspond au repliement local en hélices alpha ou en feuillets bêta. La structure tertiaire est le repliement global qui donne à la protéine sa forme tridimensionnelle. Enfin, certaines protéines ont une structure quaternaire, lorsqu'elles sont formées de plusieurs sous-unités. C'est la structure tertiaire qui est la forme fonctionnelle de la protéine et qui détermine l'activité enzymatique.",
    "note": "La forme tridimensionnelle d'une protéine est essentielle à sa fonction."
  },
  {
    "titre": "Le site actif : le cœur de l'enzyme",
    "contenu": "<div style='padding: 10px;'><div style='background: #fef9e7; padding: 15px; border-radius: 10px; border-left: 5px solid #f1c40f;'><h3 style='color: #2c3e50; margin-top: 0;'>Définition :</h3><p style='font-size: 1.1em;'>Le <strong>site actif</strong> est une <strong>région spécifique</strong> de l'enzyme, formée par un petit nombre d'acides aminés, où se fixe le <strong>substrat</strong> et où se déroule la <strong>réaction chimique</strong>.</p></div><div style='background: #ecf0f1; padding: 15px; border-radius: 10px; margin-top: 15px;'><h4 style='color: #2c3e50; margin-top: 0;'>Caractéristiques du site actif :</h4><ul><li>• Formé par des acides aminés de différentes parties de la chaîne</li><li>• Possède une forme spécifique (poche ou crevasse)</li><li>• Présente des charges électriques et des groupements réactifs</li><li>• Est complémentaire du substrat</li></ul></div></div>",
    "texteParle": "Le site actif est une région spécifique de l'enzyme, souvent en forme de poche ou de crevasse, où se fixe le substrat et où se déroule la réaction chimique. Ce site est formé par des acides aminés qui peuvent être éloignés dans la séquence primaire mais qui se retrouvent rapprochés grâce au repliement de la protéine. Le site actif possède une forme et des propriétés chimiques (charges électriques, groupements réactifs) qui sont complémentaires de celles du substrat. C'est cette complémentarité qui assure la spécificité de l'enzyme.",
    "note": "Le site actif est une région tridimensionnelle de l'enzyme."
  },
  {
    "titre": "Le complexe enzyme-substrat",
    "contenu": "<div style='padding: 10px;'><div style='background: #d5f5e3; padding: 15px; border-radius: 10px; border-left: 5px solid #27ae60;'><h3 style='color: #2c3e50; margin-top: 0;'>Formation du complexe enzyme-substrat (ES) :</h3><p style='font-size: 1.1em; text-align: center;'><span style='color: #e74c3c;'>Enzyme (E)</span> + <span style='color: #2980b9;'>Substrat (S)</span> <span style='color: #f1c40f;'>⇌</span> <span style='color: #8e44ad;'>Complexe ES</span> <span style='color: #f1c40f;'>→</span> <span style='color: #e74c3c;'>Enzyme (E)</span> + <span style='color: #27ae60;'>Produit (P)</span></p></div><div style='background: #ecf0f1; padding: 15px; border-radius: 10px; margin-top: 15px;'><h4 style='color: #2c3e50; margin-top: 0;'>Étapes :</h4><ol><li><strong>Fixation</strong> : le substrat se lie au site actif de l'enzyme</li><li><strong>Réaction</strong> : la catalyse se produit dans le complexe ES</li><li><strong>Libération</strong> : les produits sont libérés, l'enzyme est régénérée</li></ol></div><div style='background: #fef9e7; padding: 12px; border-radius: 8px; margin-top: 15px;'><p style='margin: 0;'><strong>Attention :</strong> La formation du complexe ES est <strong>réversible</strong> (E + S ⇌ ES).</p></div></div>",
    "texteParle": "Lorsqu'un substrat rencontre une enzyme, il se lie au site actif pour former un complexe enzyme-substrat, que l'on note ES. Cette liaison est généralement réversible, c'est-à-dire que le substrat peut se détacher de l'enzyme. Une fois le complexe formé, la réaction chimique a lieu : le substrat est transformé en produit. Après la réaction, le produit se détache du site actif et l'enzyme se retrouve intacte et prête à catalyser une nouvelle réaction. C'est ce qui explique que l'enzyme n'est pas consommée et peut agir de manière répétée.",
    "note": "Le complexe enzyme-substrat est une étape clé de la catalyse enzymatique."
  },
  {
    "titre": "Le modèle \"clé-serrure\"",
    "contenu": "<div style='padding: 10px;'><div style='background: #eaf2f8; padding: 15px; border-radius: 10px; border-left: 5px solid #2980b9;'><h3 style='color: #2c3e50; margin-top: 0;'>Modèle proposé par Emil Fischer (1894)</h3><p style='font-size: 1.1em;'>Le substrat (la <strong>clé</strong>) et le site actif (la <strong>serrure</strong>) ont des formes <strong>complémentaires et rigides</strong>.</p></div><div style='background: #fef9e7; padding: 15px; border-radius: 10px; margin-top: 15px;'><h4 style='color: #2c3e50; margin-top: 0;'>Caractéristiques :</h4><ul><li>✅ Forme fixe du site actif</li><li>✅ Aucun changement de conformation</li><li>✅ Spécificité absolue</li></ul></div><div style='background: #fdedec; padding: 12px; border-radius: 8px; margin-top: 15px;'><p style='margin: 0;'><strong>Limite :</strong> Ce modèle ne rend pas compte de la flexibilité des protéines ni des changements de conformation observés.</p></div></div>",
    "texteParle": "Le modèle de la clé et de la serrure a été proposé par Emil Fischer en 1894. Selon ce modèle, le site actif de l'enzyme possède une forme fixe, rigide, qui est complémentaire de celle du substrat. Le substrat s'y insère comme une clé dans une serrure. Cette analogie explique bien la spécificité des enzymes : une clé ne peut ouvrir qu'une serrure particulière. Cependant, ce modèle présente une limite : il ne tient pas compte de la flexibilité des protéines. Or, nous savons aujourd'hui que les protéines sont des molécules dynamiques qui peuvent changer de conformation.",
    "note": "Le modèle clé-serrure est le plus ancien modèle de spécificité enzymatique."
  },
  {
    "titre": "Le modèle \"ajustement induit\"",
    "contenu": "<div style='padding: 10px;'><div style='background: #d5f5e3; padding: 15px; border-radius: 10px; border-left: 5px solid #27ae60;'><h3 style='color: #2c3e50; margin-top: 0;'>Modèle proposé par Daniel Koshland (1958)</h3><p style='font-size: 1.1em;'>La fixation du substrat <strong>induit un changement de conformation</strong> de l'enzyme pour l'ajuster parfaitement.</p></div><div style='background: #fef9e7; padding: 15px; border-radius: 10px; margin-top: 15px;'><h4 style='color: #2c3e50; margin-top: 0;'>Caractéristiques :</h4><ul><li>✅ Le site actif est flexible</li><li>✅ Changement de conformation induit par le substrat</li><li>✅ Meilleur ajustement après la fixation</li></ul></div></div>",
    "texteParle": "Pour pallier les limites du modèle clé-serrure, Daniel Koshland a proposé en 1958 le modèle de l'ajustement induit. Selon ce modèle, le site actif de l'enzyme n'a pas une forme rigide, mais il est flexible. Lorsque le substrat se fixe, il induit un changement de conformation de l'enzyme. Ce changement permet un ajustement optimal du substrat dans le site actif, ce qui rend la catalyse plus efficace. Ce modèle est plus réaliste car il rend compte de la flexibilité des protéines et des changements de conformation observés expérimentalement.",
    "note": "L'ajustement induit explique la flexibilité des enzymes."
  },
  {
    "titre": "Comparaison des deux modèles",
    "contenu": "<div style='padding: 10px;'><table style='width: 100%; border-collapse: collapse; font-size: 0.9em;'><tr style='background: #2c3e50; color: white;'><th style='padding: 8px; border: 1px solid #2c3e50;'>Critère</th><th style='padding: 8px; border: 1px solid #2c3e50;'>Clé-serrure</th><th style='padding: 8px; border: 1px solid #2c3e50;'>Ajustement induit</th></tr><tr style='background: #d5f5e3;'><td style='padding: 8px; border: 1px solid #ddd;'><strong>Site actif</strong></td><td style='padding: 8px; border: 1px solid #ddd;'>Rigide</td><td style='padding: 8px; border: 1px solid #ddd;'>Flexible</td></tr><tr><td style='padding: 8px; border: 1px solid #ddd;'><strong>Substrat</strong></td><td style='padding: 8px; border: 1px solid #ddd;'>Doit avoir la forme exacte</td><td style='padding: 8px; border: 1px solid #ddd;'>Induit un changement</td></tr><tr style='background: #fdedec;'><td style='padding: 8px; border: 1px solid #ddd;'><strong>Ajustement</strong></td><td style='padding: 8px; border: 1px solid #ddd;'>Parfait avant fixation</td><td style='padding: 8px; border: 1px solid #ddd;'>Parfait après fixation</td></tr><tr><td style='padding: 8px; border: 1px solid #ddd;'><strong>Spécificité</strong></td><td style='padding: 8px; border: 1px solid #ddd;'>Absolue</td><td style='padding: 8px; border: 1px solid #ddd;'>Relative (plus large)</td></tr></table></div>",
    "texteParle": "Comparons maintenant les deux modèles. Le modèle clé-serrure considère que le site actif est rigide et que le substrat doit avoir la forme exacte pour s'y insérer. L'ajustement est parfait avant même la fixation du substrat. La spécificité est absolue. En revanche, le modèle de l'ajustement induit considère que le site actif est flexible. Le substrat induit un changement de conformation qui permet un ajustement optimal. L'ajustement est parfait après la fixation. La spécificité est relative, c'est-à-dire qu'une enzyme peut reconnaître plusieurs substrats ayant des structures similaires. Le modèle de l'ajustement induit est aujourd'hui considéré comme plus réaliste.",
    "note": "Le modèle de l'ajustement induit est actuellement le plus accepté."

  {
    "titre": "Pourquoi le site actif est-il spécifique ?",
    "contenu": "<div style='padding: 10px;'><div style='background: #eaf2f8; padding: 15px; border-radius: 10px; border-left: 5px solid #2980b9;'><h3 style='color: #2c3e50; margin-top: 0;'>Origine de la spécificité :</h3><ul><li>• <strong>Complémentarité de forme</strong> : le substrat doit avoir une forme adaptée au site actif</li><li>• <strong>Complémentarité chimique</strong> : les acides aminés du site actif interagissent avec le substrat par liaisons hydrogène, ioniques, hydrophobes</li><li>• <strong>Disposition spatiale</strong> : les groupements réactifs sont positionnés pour catalyser la réaction</li></ul></div></div>",
    "texteParle": "La spécificité des enzymes repose sur trois facteurs. D'abord, la complémentarité de forme : le substrat doit avoir une forme adaptée au site actif de l'enzyme. Ensuite, la complémentarité chimique : les acides aminés qui constituent le site actif interagissent avec le substrat par des liaisons hydrogène, des liaisons ioniques ou des interactions hydrophobes. Enfin, la disposition spatiale des groupements réactifs dans le site actif permet d'orienter le substrat de manière à catalyser la réaction. C'est cette combinaison de facteurs qui explique pourquoi une enzyme n'agit que sur un nombre très restreint de substrats.",
    "note": "La spécificité enzymatique est la clé de la régulation du métabolisme."
  },
  {
    "titre": "Conséquences de l'altération du site actif",
    "contenu": "<div style='padding: 10px;'><div style='background: #fdedec; padding: 15px; border-radius: 10px; border-left: 5px solid #e74c3c;'><h3 style='color: #2c3e50; margin-top: 0;'>Altération du site actif :</h3><ul><li>• <strong>Dénaturation</strong> : température ou pH extrêmes → perte de la structure tertiaire</li><li>• <strong>Mutations</strong> : modification d'un acide aminé du site actif → perte d'activité</li><li>• <strong>Inhibiteurs</strong> : molécules qui se fixent sur le site actif et bloquent l'enzyme</li></ul></div><div style='background: #fef9e7; padding: 15px; border-radius: 10px; margin-top: 15px;'><h4 style='color: #2c3e50; margin-top: 0;'>Exemple :</h4><p>Le cyanure se fixe sur le site actif de la cytochrome oxydase et bloque la respiration cellulaire.</p></div></div>",
    "texteParle": "Le site actif est très fragile. Lorsque sa structure est altérée, l'enzyme perd son activité. Plusieurs facteurs peuvent altérer le site actif. La dénaturation, par exemple, se produit lorsque la température ou le pH sont trop extrêmes : la protéine perd sa structure tridimensionnelle et donc sa fonction. Les mutations peuvent modifier un acide aminé essentiel du site actif et rendre l'enzyme inactive. Enfin, les inhibiteurs sont des molécules qui se fixent sur le site actif et bloquent l'enzyme. C'est le cas par exemple du cyanure, qui se fixe sur la cytochrome oxydase et bloque la respiration cellulaire.",

  {
    "titre": "Applications des enzymes",

    "texteParle": "Les enzymes ont de nombreuses applications industrielles et biotechnologiques. Dans l'industrie alimentaire, la présure est utilisée pour la fabrication du fromage, et les pectinases pour clarifier les jus de fruits. Dans l'industrie pharmaceutique, certaines enzymes permettent de produire des médicaments comme la pénicilline. Dans l'industrie textile, les amylases servent à dégrader l'amidon. En biotechnologie, la Taq polymérase est utilisée en PCR pour amplifier l'ADN, et des enzymes spécifiques sont utilisées dans les tests diagnostiques. Ces applications reposent toutes sur la spécificité des enzymes et leur capacité à catalyser des réactions avec une grande efficacité.",

    "texteParle": "Pour terminer cette leçon, retenons les points essentiels. Le site actif est une région spécifique de l'enzyme, formée par des acides aminés qui se retrouvent rapprochés grâce au repliement de la protéine. C'est dans cette région que le substrat se fixe pour former le complexe enzyme-substrat, étape clé de la catalyse. Le modèle clé-serrure de Fischer considère que le site actif est rigide, tandis que le modèle de l'ajustement induit de Koshland considère qu'il est flexible. L'altération du site actif, que ce soit par dénaturation, mutation ou inhibition, entraîne une perte d'activité enzymatique. Retenez donc que la structure de l'enzyme est ce qui détermine sa fonction, et que cette structure est fragile. Merci pour votre attention et à bientôt pour le prochain cours !",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;

    const total = slides.length;
    const synth = window.speechSynthesis;

    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }

    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }

    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        
        loadingCancelled = false;
        isLoading = true;
        
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }

    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }

    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }

    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }

    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }

    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }

    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);

        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }

    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }

            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }

            // Arrêter toute lecture en cours
            stopSpeaking();
            
            // Réinitialiser l'état de pause
            isPaused = false;
            
            showLoading();
            setStatus("Initialisation...", 'loading');

            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;

                let isFinished = false;
                let errorHandled = false;

                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };

                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };

                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    
                    resolve();
                };

                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }

                currentUtterance = utterance;
                
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }

            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }

    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        // Arrêter complètement la lecture
        stopSpeaking();
        
        await new Promise(r => setTimeout(r, 50));
        
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }

        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');

        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }

    async function goToNext() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }

    async function goToPrev() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }

    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }

        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }

        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }

        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }

        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }

    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }

        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }

        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');

        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });

        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });

        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });

        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });

        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });

        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });

        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });

        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }

    init();
});



    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;

    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');

        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            header.style.background = 'rgba(15, 23, 42, 0.85)';
            footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            header.style.background = 'rgba(255, 255, 255, 0.85)';
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }

    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        
        const appContainer = document.querySelector('.app-container');

            note.style.color = '#2c3e50';

            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.btn').forEach(btn => {

        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {

            statusBadge.style.color = '#2b6cb0';
        }
        
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
        }
    });
</script>
