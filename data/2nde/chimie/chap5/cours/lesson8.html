<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) - ajouté par le script de thème */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Structure des composés ioniques",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'>   <h2 style='color: #2c3e50; text-align: center;'>CHAPITRE 5 : Structure de quelques composés ioniques</h2>   <div style='background-color: #f0f8ff; padding: 15px; border-radius: 10px; margin-top: 20px; border-left: 5px solid #2980b9;'>     <h3 style='color: #2980b9; margin-top: 0;'>Compétence visée :</h3>     <p style='font-size: 16px; line-height: 1.6; color: #2c3e50;'>L'élève sera capable de décrire la structure cristalline d'un solide ionique, de déterminer sa formule statistique et de comprendre la neutralité électrique.</p>   </div>   <div style='margin-top: 20px;'>     <h3 style='color: #2980b9;'>Leçon 8 : Structure de quelques composés ioniques</h3>     <ul style='font-size: 15px; line-height: 1.8; color: #2c3e50;'>       <li><strong>Objectif 1 :</strong> Définir un cristal, une maille cristalline et un solide ionique.</li>       <li><strong>Objectif 2 :</strong> Décrire la structure cristalline du chlorure de sodium (NaCl).</li>       <li><strong>Objectif 3 :</strong> Calculer la contribution d'un ion selon sa position.</li>       <li><strong>Objectif 4 :</strong> Déterminer la formule statistique d'un solide ionique.</li>       <li><strong>Objectif 5 :</strong> Écrire la formule statistique générale.</li>     </ul>   </div> </div>",
    "texteParle": "Bonjour à tous ! Aujourd'hui, nous allons découvrir la structure des composés ioniques. Nous allons apprendre ce qu'est un cristal, une maille cristalline, et comment les ions s'organisent dans un solide ionique comme le sel de table, le chlorure de sodium. Nous verrons aussi comment calculer la formule statistique de ces composés en respectant la neutralité électrique. C'est une leçon très importante qui nous permet de comprendre l'organisation de la matière à l'échelle microscopique.",
    "note": "Cette leçon est essentielle pour comprendre la structure des solides ioniques comme le sel (NaCl)."
  },
  {
    "titre": "Définitions fondamentales",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'>   <h3 style='color: #2c3e50; text-align: center; border-bottom: 2px solid #2980b9; padding-bottom: 10px;'>Définitions essentielles</h3>   <div style='background-color: #e8f4f8; padding: 15px; border-radius: 10px; margin-top: 15px;'>     <h4 style='color: #2980b9; margin-top: 0;'>🔶 Cristal</h4>     <p style='font-size: 15px; line-height: 1.6; color: #2c3e50;'>Un <strong>cristal</strong> est un solide dont les atomes, ions ou molécules sont disposés de manière régulière et périodique dans l'espace.</p>   </div>   <div style='background-color: #e8f4f8; padding: 15px; border-radius: 10px; margin-top: 15px;'>     <h4 style='color: #2980b9; margin-top: 0;'>🔶 Maille cristalline</h4>     <p style='font-size: 15px; line-height: 1.6; color: #2c3e50;'>La <strong>maille cristalline</strong> est le plus petit motif de répétition qui permet de reconstituer tout le cristal par translations successives.</p>   </div>   <div style='background-color: #e8f4f8; padding: 15px; border-radius: 10px; margin-top: 15px;'>     <h4 style='color: #2980b9; margin-top: 0;'>🔶 Solide ionique</h4>     <p style='font-size: 15px; line-height: 1.6; color: #2c3e50;'>Un <strong>solide ionique</strong> est un cristal formé d'ions de charges opposées (cations et anions) maintenus ensemble par des forces électrostatiques attractives.</p>   </div> </div>",
    "texteParle": "Commençons par les définitions fondamentales. Un cristal est un solide dont les particules sont disposées de manière régulière et ordonnée. La maille cristalline est le plus petit motif qui se répète pour former le cristal. Enfin, un solide ionique est un cristal formé d'ions positifs et négatifs qui s'attirent grâce aux forces électrostatiques. Ces définitions sont la base de notre compréhension des structures cristallines.",
    "note": "Les solides ioniques sont généralement durs, cassants et ont des points de fusion élevés."
  },
  {
    "titre": "Structure du chlorure de sodium (NaCl)",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'>   <h3 style='color: #2c3e50; text-align: center; border-bottom: 2px solid #2980b9; padding-bottom: 10px;'>Structure cristalline de NaCl</h3>   <div style='background-color: #e8f4f8; padding: 15px; border-radius: 10px; margin-top: 15px;'>     <h4 style='color: #2980b9; margin-top: 0;'>Ions chlorure (Cl⁻)</h4>     <ul style='font-size: 15px; line-height: 1.8; color: #2c3e50;'>       <li>Placés aux <strong>sommets</strong> du cube (8 ions)</li>       <li>Placés aux <strong>centres des faces</strong> du cube (6 ions)</li>       <li>Soit un total de 14 positions occupées par Cl⁻</li>     </ul>   </div>   <div style='background-color: #e8f4f8; padding: 15px; border-radius: 10px; margin-top: 15px;'>     <h4 style='color: #2980b9; margin-top: 0;'>Ions sodium (Na⁺)</h4>     <ul style='font-size: 15px; line-height: 1.8; color: #2c3e50;'>       <li>Placés aux <strong>milieux des arêtes</strong> du cube (12 ions)</li>       <li>Placé au <strong>centre</strong> du cube (1 ion)</li>       <li>Soit un total de 13 positions occupées par Na⁺</li>     </ul>   </div>   <div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; margin-top: 15px; border: 1px solid #2980b9;'>     <p style='font-size: 14px; line-height: 1.6; color: #2c3e50; text-align: center;'><strong>Remarque :</strong> Chaque ion Na⁺ est entouré de 6 ions Cl⁻ et chaque ion Cl⁻ est entouré de 6 ions Na⁺ (coordinence 6).</p>   </div> </div>",
    "texteParle": "Le chlorure de sodium, connu sous le nom de sel de table, a une structure cubique très particulière. Les ions chlorure, qui sont les ions négatifs, se placent aux sommets du cube et au centre de chaque face. Les ions sodium, les ions positifs, se placent au milieu des arêtes et au centre du cube. Cette organisation permet une alternance régulière des ions positifs et négatifs, ce qui assure la stabilité du cristal. Chaque ion sodium est entouré de six ions chlorure, et inversement.",
    "note": "La structure du NaCl est cubique à faces centrées (CFC) avec un motif NaCl."
  },
  {
    "titre": "Contributions des ions par position",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'>   <h3 style='color: #2c3e50; text-align: center; border-bottom: 2px solid #2980b9; padding-bottom: 10px;'>Contribution des ions selon leur position</h3>   <div style='display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;'>     <div style='background-color: #e8f4f8; padding: 12px; border-radius: 8px; text-align: center;'>       <h4 style='color: #2980b9; margin-top: 0;'>Sommet</h4>       <p style='font-size: 24px; font-weight: bold; color: #2c3e50;'>1/8</p>       <p style='font-size: 13px; color: #2c3e50;'>Un ion au sommet est partagé par 8 mailles</p>     </div>     <div style='background-color: #e8f4f8; padding: 12px; border-radius: 8px; text-align: center;'>       <h4 style='color: #2980b9; margin-top: 0;'>Centre de face</h4>       <p style='font-size: 24px; font-weight: bold; color: #2c3e50;'>1/2</p>       <p style='font-size: 13px; color: #2c3e50;'>Un ion au centre d'une face est partagé par 2 mailles</p>     </div>     <div style='background-color: #e8f4f8; padding: 12px; border-radius: 8px; text-align: center;'>       <h4 style='color: #2980b9; margin-top: 0;'>Milieu d'arête</h4>       <p style='font-size: 24px; font-weight: bold; color: #2c3e50;'>1/4</p>       <p style='font-size: 13px; color: #2c3e50;'>Un ion au milieu d'une arête est partagé par 4 mailles</p>     </div>     <div style='background-color: #e8f4f8; padding: 12px; border-radius: 8px; text-align: center;'>       <h4 style='color: #2980b9; margin-top: 0;'>Centre du cube</h4>       <p style='font-size: 24px; font-weight: bold; color: #2c3e50;'>1</p>       <p style='font-size: 13px; color: #2c3e50;'>Un ion au centre appartient entièrement à la maille</p>     </div>   </div>   <div style='background-color: #f0f8ff; padding: 15px; border-radius: 10px; margin-top: 20px; border-left: 5px solid #2980b9;'>     <p style='font-size: 15px; line-height: 1.6; color: #2c3e50;'><strong>Règle :</strong> La contribution d'un ion dépend de sa position dans la maille. Plus l'ion est partagé avec d'autres mailles, plus sa contribution est faible.</p>   </div> </div>",
    "texteParle": "Pour calculer le nombre réel d'ions dans une maille, nous devons prendre en compte la contribution de chaque ion selon sa position. Un ion au sommet est partagé par huit mailles, il ne compte donc que pour un huitième. Un ion au centre d'une face est partagé par deux mailles, donc pour un demi. Un ion au milieu d'une arête est partagé par quatre mailles, donc pour un quart. Enfin, un ion au centre du cube appartient entièrement à la maille, donc il compte pour un. Ces contributions sont très importantes pour déterminer la formule statistique du composé.",
    "note": "Les contributions sont : sommet = 1/8, face = 1/2, arête = 1/4, centre = 1."
  },
  {
    "titre": "Calcul du nombre d'ions dans NaCl",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'>   <h3 style='color: #2c3e50; text-align: center; border-bottom: 2px solid #2980b9; padding-bottom: 10px;'>Calcul du nombre d'ions par maille</h3>   <div style='margin-top: 20px;'>     <div style='background-color: #e8f4f8; padding: 15px; border-radius: 10px; margin-bottom: 15px;'>       <h4 style='color: #2980b9; margin-top: 0;'>🔵 Ions chlorure (Cl⁻)</h4>       <ul style='font-size: 15px; line-height: 1.8; color: #2c3e50;'>         <li>8 ions aux sommets × 1/8 = <strong>1</strong></li>         <li>6 ions aux centres des faces × 1/2 = <strong>3</strong></li>         <li style='font-weight: bold;'>Total Cl⁻ par maille = 1 + 3 = <span style='color: #2980b9;'>4</span></li>       </ul>     </div>     <div style='background-color: #e8f4f8; padding: 15px; border-radius: 10px;'>       <h4 style='color: #2980b9; margin-top: 0;'>🔴 Ions sodium (Na⁺)</h4>       <ul style='font-size: 15px; line-height: 1.8; color: #2c3e50;'>         <li>12 ions aux milieux des arêtes × 1/4 = <strong>3</strong></li>         <li>1 ion au centre × 1 = <strong>1</strong></li>         <li style='font-weight: bold;'>Total Na⁺ par maille = 3 + 1 = <span style='color: #2980b9;'>4</span></li>       </ul>     </div>   </div>   <div style='background-color: #f0f8ff; padding: 15px; border-radius: 10px; margin-top: 20px; border-left: 5px solid #2980b9;'>     <p style='font-size: 16px; line-height: 1.6; color: #2c3e50; text-align: center;'><strong>Conclusion :</strong> La maille contient 4 ions Na⁺ et 4 ions Cl⁻, soit un rapport Na⁺/Cl⁻ = 1.</p>   </div> </div>",
    "texteParle": "Faisons maintenant le calcul pour le chlorure de sodium. Pour les ions chlorure, nous avons huit ions aux sommets qui contribuent chacun pour un huitième, ce qui donne un ion chlorure. Six ions au centre des faces contribuent chacun pour un demi, ce qui donne trois ions chlorure supplémentaires. Le total est donc de quatre ions chlorure par maille. Pour les ions sodium, douze ions au milieu des arêtes contribuent chacun pour un quart, soit trois ions sodium, plus un ion au centre qui compte pour un, ce qui donne aussi quatre ions sodium. La maille de NaCl contient donc quatre ions sodium et quatre ions chlorure, soit un rapport de un pour un.",
    "note": "Dans NaCl, le nombre de cations Na⁺ est égal au nombre d'anions Cl⁻ dans la maille."
  },
  {
    "titre": "Formule statistique d'un solide ionique",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'>   <h3 style='color: #2c3e50; text-align: center; border-bottom: 2px solid #2980b9; padding-bottom: 10px;'>Formule statistique d'un solide ionique</h3>   <div style='background-color: #e8f4f8; padding: 15px; border-radius: 10px; margin-top: 15px;'>     <h4 style='color: #2980b9; margin-top: 0;'>Définition</h4>     <p style='font-size: 15px; line-height: 1.6; color: #2c3e50;'>La <strong>formule statistique</strong> d'un solide ionique donne le rapport du nombre d'ions de chaque espèce dans la maille, en respectant la <strong>neutralité électrique</strong>.</p>   </div>   <div style='background-color: #f0f8ff; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 5px solid #2980b9;'>     <h4 style='color: #2980b9; margin-top: 0;'>Condition de neutralité électrique</h4>     <p style='font-size: 15px; line-height: 1.6; color: #2c3e50; text-align: center;'><strong>La charge totale des cations doit être égale à la charge totale des anions.</strong></p>     <div style='text-align: center; font-size: 18px; color: #2c3e50;'>       <p>n₁ × q₁ + n₂ × q₂ = 0</p>     </div>   </div>   <div style='background-color: #e8f4f8; padding: 15px; border-radius: 10px; margin-top: 15px;'>     <h4 style='color: #2980b9; margin-top: 0;'>Formule générale</h4>     <div style='text-align: center; font-size: 20px; color: #2c3e50;'>       <p><strong>A<sub>b</sub> B<sub>a</sub></strong></p>     </div>     <p style='font-size: 15px; line-height: 1.6; color: #2c3e50; text-align: center;'>A<sup>a⁺</sup> et B<sup>b⁻</sup> avec a et b les charges des ions.</p>   </div> </div>",
    "texteParle": "La formule statistique d'un solide ionique nous donne le rapport du nombre d'ions de chaque espèce dans la maille. Elle doit absolument respecter la neutralité électrique : la charge totale des cations doit être égale à la charge totale des anions en valeur absolue. Par exemple, pour NaCl, nous avons un ion sodium de charge plus un et un ion chlorure de charge moins un. La formule générale s'écrit A indice b B indice a, où A est le cation de charge a plus et B l'anion de charge b moins. Cela signifie que la formule statistique est obtenue en échangeant les charges des ions.",
    "note": "La neutralité électrique est une condition impérative pour tout solide ionique."
  },
  {
    "titre": "Exemple de calcul de formule statistique",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'>   <h3 style='color: #2c3e50; text-align: center; border-bottom: 2px solid #2980b9; padding-bottom: 10px;'>Calcul de la formule statistique</h3>   <div style='background-color: #e8f4f8; padding: 15px; border-radius: 10px; margin-top: 15px;'>     <h4 style='color: #2980b9; margin-top: 0;'>Exemple : Formation du chlorure de magnésium (MgCl₂)</h4>     <ul style='font-size: 15px; line-height: 1.8; color: #2c3e50;'>       <li>Ion magnésium Mg²⁺ : charge = <strong>+2</strong></li>       <li>Ion chlorure Cl⁻ : charge = <strong>-1</strong></li>     </ul>   </div>   <div style='background-color: #f0f8ff; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 5px solid #2980b9;'>     <h4 style='color: #2980b9; margin-top: 0;'>Application de la neutralité électrique</h4>     <p style='font-size: 15px; line-height: 1.6; color: #2c3e50;'>Soit x le nombre d'ions Mg²⁺ et y le nombre d'ions Cl⁻</p>     <div style='text-align: center; font-size: 18px; color: #2c3e50;'>       <p>(+2) × x + (-1) × y = 0</p>       <p>y = 2x</p>       <p style='font-weight: bold;'>Pour x = 1, y = 2</p>     </div>   </div>   <div style='background-color: #e8f4f8; padding: 15px; border-radius: 10px; margin-top: 15px;'>     <h4 style='color: #2980b9; margin-top: 0;'>Formule statistique</h4>     <div style='text-align: center; font-size: 22px; color: #2c3e50;'>       <p><strong>Mg<sub>1</sub>Cl<sub>2</sub></strong></p>     </div>     <p style='font-size: 15px; line-height: 1.6; color: #2c3e50; text-align: center;'>La maille contient 1 ion Mg²⁺ pour 2 ions Cl⁻.</p>   </div> </div>",
    "texteParle": "Prenons un exemple concret : le chlorure de magnésium. Le magnésium forme l'ion Mg²⁺, donc il porte une charge positive de deux. Le chlore forme l'ion Cl⁻, donc il porte une charge négative de un. Pour respecter la neutralité électrique, il faut que le nombre d'ions chlorure soit le double du nombre d'ions magnésium, car la charge totale des ions magnésium doit équilibrer celle des ions chlorure. Ainsi, la formule statistique du chlorure de magnésium est MgCl₂, ce qui signifie que pour un ion magnésium, il y a deux ions chlorure dans la maille.",
    "note": "La formule d'un composé ionique s'obtient en échangeant les charges des ions."
  },
  {
    "titre": "Application : Formule de l'alumine",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'>   <h3 style='color: #2c3e50; text-align: center; border-bottom: 2px solid #2980b9; padding-bottom: 10px;'>Application : Structure de l'alumine (Al₂O₃)</h3>   <div style='background-color: #e8f4f8; padding: 15px; border-radius: 10px; margin-top: 15px;'>     <h4 style='color: #2980b9; margin-top: 0;'>Données</h4>     <ul style='font-size: 15px; line-height: 1.8; color: #2c3e50;'>       <li>Ion aluminium Al³⁺ : charge = <strong>+3</strong></li>       <li>Ion oxyde O²⁻ : charge = <strong>-2</strong></li>     </ul>   </div>   <div style='background-color: #f0f8ff; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 5px solid #2980b9;'>     <h4 style='color: #2980b9; margin-top: 0;'>Recherche de la formule</h4>     <p style='font-size: 15px; line-height: 1.6; color: #2c3e50;'>Soit x le nombre d'ions Al³⁺ et y le nombre d'ions O²⁻</p>     <div style='text-align: center; font-size: 18px; color: #2c3e50;'>       <p>(+3) × x + (-2) × y = 0</p>       <p>3x = 2y</p>       <p style='font-weight: bold;'>Pour x = 2, y = 3</p>     </div>   </div>   <div style='background-color: #e8f4f8; padding: 15px; border-radius: 10px; margin-top: 15px;'>     <h4 style='color: #2980b9; margin-top: 0;'>Formule statistique</h4>     <div style='text-align: center; font-size: 22px; color: #2c3e50;'>       <p><strong>Al₂O₃</strong></p>     </div>     <p style='font-size: 15px; line-height: 1.6; color: #2c3e50; text-align: center;'>La maille contient 2 ions Al³⁺ pour 3 ions O²⁻.</p>   </div> </div>",
    "texteParle": "Prenons un autre exemple : l'alumine, composée d'aluminium et d'oxygène. L'aluminium forme l'ion Al³⁺, avec une charge positive de trois. L'oxygène forme l'ion O²⁻, avec une charge négative de deux. Pour respecter la neutralité électrique, il faut que trois fois le nombre d'ions oxyde soit égal à deux fois le nombre d'ions aluminium. En prenant deux ions aluminium pour trois ions oxyde, nous obtenons une neutralité électrique parfaite. La formule de l'alumine est donc Al₂O₃, ce qui signifie qu'il y a deux ions aluminium pour trois ions oxyde dans la maille.",
    "note": "Al₂O₃ est un composé ionique très stable, utilisé comme abrasif et dans la fabrication de l'aluminium."
  },
  {
    "titre": "Tableau récapitulatif des solides ioniques",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'>   <h3 style='color: #2c3e50; text-align: center; border-bottom: 2px solid #2980b9; padding-bottom: 10px;'>Tableau récapitulatif</h3>   <div style='overflow-x: auto; margin-top: 15px;'>     <table style='width: 100%; border-collapse: collapse; font-size: 14px;'>       <thead>         <tr style='background-color: #2980b9; color: white;'>           <th style='padding: 10px; border: 1px solid #ddd;'>Composé</th>           <th style='padding: 10px; border: 1px solid #ddd;'>Cation</th>           <th style='padding: 10px; border: 1px solid #ddd;'>Anion</th>           <th style='padding: 10px; border: 1px solid #ddd;'>Formule</th>         </tr>       </thead>       <tbody>         <tr>           <td style='padding: 8px; border: 1px solid #ddd; text-align: center;'>Chlorure de sodium</td>           <td style='padding: 8px; border: 1px solid #ddd; text-align: center;'>Na⁺</td>           <td style='padding: 8px; border: 1px solid #ddd; text-align: center;'>Cl⁻</td>           <td style='padding: 8px; border: 1px solid #ddd; text-align: center; font-weight: bold;'>NaCl</td>         </tr>         <tr style='background-color: #f0f8ff;'>           <td style='padding: 8px; border: 1px solid #ddd; text-align: center;'>Chlorure de magnésium</td>           <td style='padding: 8px; border: 1px solid #ddd; text-align: center;'>Mg²⁺</td>           <td style='padding: 8px; border: 1px solid #ddd; text-align: center;'>Cl⁻</td>           <td style='padding: 8px; border: 1px solid #ddd; text-align: center; font-weight: bold;'>MgCl₂</td>         </tr>         <tr>           <td style='padding: 8px; border: 1px solid #ddd; text-align: center;'>Alumine</td>           <td style='padding: 8px; border: 1px solid #ddd; text-align: center;'>Al³⁺</td>           <td style='padding: 8px; border: 1px solid #ddd; text-align: center;'>O²⁻</td>           <td style='padding: 8px; border: 1px solid #ddd; text-align: center; font-weight: bold;'>Al₂O₃</td>         </tr>         <tr style='background-color: #f0f8ff;'>           <td style='padding: 8px; border: 1px solid #ddd; text-align: center;'>Oxyde de calcium (chaux)</td>           <td style='padding: 8px; border: 1px solid #ddd; text-align: center;'>Ca²⁺</td>           <td style='padding: 8px; border: 1px solid #ddd; text-align: center;'>O²⁻</td>           <td style='padding: 8px; border: 1px solid #ddd; text-align: center; font-weight: bold;'>CaO</td>         </tr>       </tbody>     </table>   </div>   <div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; margin-top: 15px; border-left: 5px solid #2980b9;'>     <p style='font-size: 14px; line-height: 1.6; color: #2c3e50;'><strong>Règle :</strong> La formule se détermine en échangeant les valeurs absolues des charges des ions.</p>   </div> </div>",
    "texteParle": "Pour conclure cette leçon, voici un tableau récapitulatif de quelques composés ioniques avec leurs formules. Le chlorure de sodium NaCl, le chlorure de magnésium MgCl₂, l'alumine Al₂O₃, et l'oxyde de calcium CaO. La règle à retenir est très simple : pour déterminer la formule d'un composé ionique, il suffit d'échanger les valeurs absolues des charges des ions. Par exemple, pour Mg²⁺ et Cl⁻, on échange 2 et 1 pour obtenir Mg₁Cl₂, soit MgCl₂. Cette règle est valable pour tous les composés ioniques.",
    "note": "La formule statistique est la formule chimique la plus simple du composé ionique."
  },
  {
    "titre": "Exercices d'application",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'>   <h3 style='color: #2c3e50; text-align: center; border-bottom: 2px solid #2980b9; padding-bottom: 10px;'>Exercices d'application</h3>   <div style='background-color: #e8f4f8; padding: 15px; border-radius: 10px; margin-top: 15px;'>     <h4 style='color: #2980b9; margin-top: 0;'>Exercice 1</h4>     <p style='font-size: 15px; line-height: 1.6; color: #2c3e50;'>Déterminer la formule statistique du composé formé par les ions Fe³⁺ et O²⁻.</p>     <details style='margin-top: 10px;'>       <summary style='color: #2980b9; cursor: pointer; font-weight: bold;'>Voir la solution</summary>       <div style='background-color: #f0f8ff; padding: 10px; border-radius: 8px; margin-top: 8px;'>         <p style='font-size: 14px; line-height: 1.6;
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            if (header) header.style.background = 'rgba(15, 23, 42, 0.85)';
            if (footer) footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            if (header) header.style.background = 'rgba(255, 255, 255, 0.85)';
            if (footer) footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
            // Ajouter l'écouteur d'événement click
            themeBtn.addEventListener('click', toggleTheme);
        }
    });
</script>
