<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Chimie",
  "classe": "Seconde",
  "sequence": "Séquence 2",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Structure de l'atome",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;'><p>L'atome de magnésium a pour symbole \\( \\mathrm{^{24}_{12}Mg} \\).</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em;'><strong>1.</strong> Quel est le numéro atomique Z du magnésium ? Que représente-t-il ? (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>Le numéro atomique Z est 12. Il représente le nombre de protons présents dans le noyau de l'atome.</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>2.</strong> Calculez le nombre de neutrons N de cet atome. (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>N = A - Z = 24 - 12 = 12. L'atome de magnésium possède 12 neutrons.</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>3.</strong> Calculez la masse du noyau de cet atome. On donne m<sub>p</sub> ≈ m<sub>n</sub> ≈ 1,67 × 10<sup>-27</sup> kg. (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>m<sub>noyau</sub> = A × m<sub>nucléon</sub> = 24 × 1,67 × 10<sup>-27</sup> = 4,01 × 10<sup>-26</sup> kg.</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>4.</strong> Calculez la charge électrique du noyau. e = 1,60 × 10<sup>-19</sup> C. (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>Q = Z × e = 12 × 1,60 × 10<sup>-19</sup> = 1,92 × 10<sup>-18</sup> C.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Structure électronique et classification",
      "points": "5 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;'><p>On considère les atomes suivants : O (Z=8), Cl (Z=17), Na (Z=11), Ar (Z=18).</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em;'><strong>1.</strong> Établissez la structure électronique de chaque atome. (1,5 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>O (Z=8) : (K)<sup>2</sup>(L)<sup>6</sup><br>Cl (Z=17) : (K)<sup>2</sup>(L)<sup>8</sup>(M)<sup>7</sup><br>Na (Z=11) : (K)<sup>2</sup>(L)<sup>8</sup>(M)<sup>1</sup><br>Ar (Z=18) : (K)<sup>2</sup>(L)<sup>8</sup>(M)<sup>8</sup></div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>2.</strong> Déterminez la période et le groupe de chaque atome dans la classification périodique. (2 pts)</div>",
          "reponse": "<div style='font-size: 1em;'>- O : 2ème période (2 couches K et L), groupe 16 (6 électrons de valence).<br>- Cl : 3ème période, groupe 17 (7 électrons de valence).<br>- Na : 3ème période, groupe 1 (1 électron de valence).<br>- Ar : 3ème période, groupe 18 (8 électrons de valence).</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>3.</strong> Parmi ces atomes, lequel est un gaz rare ? Justifiez. (0,5 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>L'argon (Ar) est un gaz rare car il appartient à la colonne 18 du tableau périodique et possède 8 électrons sur sa couche externe (structure électronique stable).</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>4.</strong> Quels sont les ions stables que peuvent former les atomes O et Na ? Justifiez en utilisant la règle de l'octet. (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>- O (Z=8) a 6 électrons de valence, il lui manque 2 électrons pour atteindre la structure électronique stable du gaz rare (octet). Il gagne 2 électrons pour former l'ion O<sup>2-</sup> : O + 2e⁻ → O<sup>2-</sup>.<br>- Na (Z=11) a 1 électron de valence, il perd cet électron pour atteindre la structure stable du gaz rare (octet). Il forme l'ion Na⁺ : Na → Na⁺ + e⁻.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Molécules et liaisons",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;'><p>On donne les atomes : H (Z=1), C (Z=6), O (Z=8), Cl (Z=17).</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em;'><strong>1.</strong> Donner la structure électronique de chaque atome. (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>H : (K)<sup>1</sup> ; C : (K)<sup>2</sup>(L)<sup>4</sup> ; O : (K)<sup>2</sup>(L)<sup>6</sup> ; Cl : (K)<sup>2</sup>(L)<sup>8</sup>(M)<sup>7</sup>.</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>2.</strong> Représentez la formule de Lewis pour la molécule d'eau H₂O. (1,5 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>O : 6 électrons de valence, H : 1 électron de valence. La molécule H₂O possède 8 électrons de valence. La formule de Lewis est : H-O-H avec deux doublets non liants sur l'atome d'oxygène.<br><div style='text-align: center; font-family: monospace;'>..<br>H:O:H<br>..</div></div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>3.</strong> Quelles sont les valences du carbone, de l'oxygène et de l'hydrogène ? (0,5 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>- Hydrogène : valence 1 (1 liaison covalente).<br>- Carbone : valence 4 (4 liaisons covalentes).<br>- Oxygène : valence 2 (2 liaisons covalentes).</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>4.</strong> Proposez deux formules semi-développées possibles pour la molécule C₂H₆O. De quel type d'isomérie s'agit-il ? (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>Les deux formules sont :<br>- CH₃-CH₂-OH (éthanol)<br>- CH₃-O-CH₃ (éther méthylique).<br>Il s'agit d'une isomérie de fonction (car les deux composés appartiennent à des familles chimiques différentes : alcool et éther).</div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Solutions aqueuses et dosage",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;'><p>On dispose d'une solution d'acide chlorhydrique (HCl) de concentration C<sub>A</sub> = 0,10 mol/L. On prélève un volume V<sub>A</sub> = 20,0 mL de cette solution que l'on dose par une solution d'hydroxyde de sodium (NaOH) de concentration C<sub>B</sub> = 0,10 mol/L.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em;'><strong>1.</strong> Écrire l'équation bilan de la réaction de dosage. (0,5 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>L'équation est : H₃O⁺ + OH⁻ → 2H₂O.<br>Ou encore : HCl + NaOH → NaCl + H₂O.</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>2.</strong> Calculer la quantité de matière d'ions H₃O⁺ contenue dans le prélèvement. (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>n(H₃O⁺) = C<sub>A</sub> × V<sub>A</sub> = 0,10 × 0,020 = 2,0 × 10⁻³ mol.</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>3.</strong> Quel volume de solution de soude faut-il verser pour atteindre l'équivalence ? (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>À l'équivalence, les réactifs ont été introduits dans les proportions stœchiométriques : n(H₃O⁺) = n(OH⁻).<br>C<sub>A</sub> V<sub>A</sub> = C<sub>B</sub> V<sub>B</sub> → V<sub>B</sub> = (C<sub>A</sub> V<sub>A</sub>) / C<sub>B</sub> = (0,10 × 0,020) / 0,10 = 0,020 L = 20,0 mL.</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>4.</strong> Décrire brièvement le dispositif expérimental utilisé pour ce dosage. (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>On place la solution d'acide chlorhydrique dans un erlenmeyer avec quelques gouttes d'indicateur coloré (exemple : hélianthine). On remplit une burette graduée avec la solution d'hydroxyde de sodium (soude) de concentration connue. On verse la soude goutte à goutte dans l'acide en agitant, jusqu'au changement de couleur de l'indicateur (point équivalent).</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>5.</strong> Sachant que l'hélianthine vire du rouge au jaune entre pH 3,1 et 4,4, est-il judicieux de l'utiliser pour ce dosage ? Justifiez. (0,5 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>À l'équivalence d'un dosage acide fort par base forte, le pH est 7. L'hélianthine vire entre 3,1 et 4,4, ce qui est trop éloigné de 7. Son utilisation entraînerait une erreur de dosage. Il serait plus judicieux d'utiliser un indicateur dont la zone de virage encadre pH=7, comme le BBT (6,0-7,6).</div>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Identification des ions",
      "points": "3 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;'><p>Un élève dispose de quatre solutions contenant chacune un ion différent. Il réalise les tests suivants :</p><ul style='padding-left: 20px;'><li>Solution 1 : ajout de nitrate d'argent → précipité blanc qui noircit à la lumière.</li><li>Solution 2 : ajout d'hydroxyde de sodium → précipité verdâtre.</li><li>Solution 3 : test à la flamme → flamme jaune.</li><li>Solution 4 : ajout d'acide chlorhydrique → dégagement gazeux qui trouble l'eau de chaux.</li></ul></div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em;'><strong>1.</strong> Identifier les ions présents dans chaque solution. (2 pts)</div>",
          "reponse": "<div style='font-size: 1em;'>- Solution 1 : ion chlorure Cl⁻ (précipité blanc de AgCl qui noircit à la lumière).<br>- Solution 2 : ion fer II Fe²⁺ (précipité verdâtre de Fe(OH)₂).<br>- Solution 3 : ion sodium Na⁺ (test à la flamme : flamme jaune).<br>- Solution 4 : ion carbonate CO₃²⁻ (dégagement de CO₂ qui trouble l'eau de chaux).</div>"
        },
        {
          "question": "<div style='font-size: 1em;'><strong>2.</strong> Écrire les équations bilans des réactions utilisées pour identifier les ions des solutions 1 et 4. (1 pt)</div>",
          "reponse": "<div style='font-size: 1em;'>Solution 1 : Ag⁺ + Cl⁻ → AgCl (précipité blanc).<br>Solution 4 : CO₃²⁻ + 2H₃O⁺ → CO₂ + 3H₂O puis CO₂ + Ca(OH)₂ → CaCO₃ (précipité blanc) + H₂O.</div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
