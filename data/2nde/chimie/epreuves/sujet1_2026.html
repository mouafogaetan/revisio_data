<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Chimie",
  "classe": "Seconde C",
  "sequence": "Séquence 1",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Évaluation des Savoirs",
      "points": "6 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p style='font-size: 1.1em; text-align: justify;'>Cette première partie évalue vos connaissances théoriques sur la structure de l'atome, la classification périodique et les ions. Lisez attentivement chaque question et répondez de manière claire et précise.</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'><p> (2 pts) Définissez les termes suivants :</p><ul style='list-style-type: lower-alpha;'><li style='margin-bottom: 10px;'><strong>a)</strong> <span style='font-weight: normal;'>Nucléide</span></li><li style='margin-bottom: 10px;'><strong>b)</strong> <span style='font-weight: normal;'>Isotopes</span></li><li style='margin-bottom: 10px;'><strong>c)</strong> <span style='font-weight: normal;'>Électrons de valence</span></li></ul></div>",
          "reponse": "<div><p><strong>a) Nucléide :</strong> Un nucléide est une espèce atomique caractérisée par un nombre de protons Z et un nombre de neutrons N spécifiques. Il est représenté par le symbole \\( ^A_Z X \\), où A = Z + N est le nombre de masse.</p><p><strong>b) Isotopes :</strong> Les isotopes sont des atomes d'un même élément chimique (même numéro atomique Z) qui ont un nombre de neutrons différent. Ils possèdent donc le même numéro atomique Z mais des nombres de masse A différents.</p><p><strong>c) Électrons de valence :</strong> Les électrons de valence sont les électrons situés sur la dernière couche électronique (couche externe) d'un atome. Ce sont eux qui interviennent dans les réactions chimiques et la formation des liaisons.</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><p> (2 pts) Répondez par Vrai ou Faux aux affirmations suivantes :</p><ul style='list-style-type: lower-alpha;'><li style='margin-bottom: 10px;'><strong>a)</strong> <span style='font-weight: normal;'>Le noyau atomique a un rayon de l'ordre de \\(10^{-10} m\\).</span></li><li style='margin-bottom: 10px;'><strong>b)</strong> <span style='font-weight: normal;'>La masse du noyau est approximativement égale à la masse de l'atome.</span></li><li style='margin-bottom: 10px;'><strong>c)</strong> <span style='font-weight: normal;'>Les éléments d'une même colonne du tableau périodique ont des propriétés chimiques semblables.</span></li><li style='margin-bottom: 10px;'><strong>d)</strong> <span style='font-weight: normal;'>L'ion sodium \\(Na^+\\) possède la même structure électronique que l'atome de néon.</span></li></ul></div>",
          "reponse": "<div><p><strong>a) Faux :</strong> Le rayon du noyau atomique est de l'ordre de \\(10^{-15} m\\) (ou 1 fermi), tandis que le rayon de l'atome est de l'ordre de \\(10^{-10} m\\).</p><p><strong>b) Vrai :</strong> La masse des électrons est négligeable par rapport à celle des nucléons (protons et neutrons). La masse du noyau est donc pratiquement égale à la masse totale de l'atome.</p><p><strong>c) Vrai :</strong> Les éléments d'une même colonne (groupe) du tableau périodique ont le même nombre d'électrons de valence, ce qui leur confère des propriétés chimiques similaires.</p><p><strong>d) Vrai :</strong> L'atome de sodium \\(Na\\) (Z=11) a pour configuration électronique \\(1s^2 2s^2 2p^6 3s^1\\). En perdant son électron de valence, il forme l'ion \\(Na^+\\) de configuration \\(1s^2 2s^2 2p^6\\), qui est identique à celle du néon \\(Ne\\) (Z=10).</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><p> (2 pts) Un atome \\(X\\) possède 12 protons, 12 neutrons et 12 électrons.</p><ul style='list-style-type: lower-alpha;'><li style='margin-bottom: 10px;'><strong>a)</strong> <span style='font-weight: normal;'>Donner son symbole et sa représentation symbolique.</span></li><li style='margin-bottom: 10px;'><strong>b)</strong> <span style='font-weight: normal;'>Déterminer sa structure électronique.</span></li><li style='margin-bottom: 10px;'><strong>c)</strong> <span style='font-weight: normal;'>Quelle est sa position dans le tableau périodique ? (Période et groupe)</span></li></ul></div>",
          "reponse": "<div><p><strong>a)</strong> Z = 12, A = Z + N = 12 + 12 = 24. L'élément est le magnésium, de symbole \\(Mg\\). Sa représentation symbolique est \\(^{24}_{12}Mg\\).</p><p><strong>b)</strong> Sa structure électronique est : \\(1s^2 2s^2 2p^6 3s^2\\) ou \\((K^2)(L^8)(M^2)\\).</p><p><strong>c)</strong> Il possède 3 couches électroniques, donc il se trouve dans la <strong>3e période</strong>. Il a 2 électrons de valence, donc il appartient au <strong>groupe 2</strong> (colonne des alcalino-terreux).</p></div>"
        }
      ]
    },
    {
      "titre": "Application des Savoirs et Savoir-Faire",
      "points": "8 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p style='font-size: 1.1em; text-align: justify;'>Cette partie vous permet d'appliquer vos connaissances pour résoudre des exercices pratiques de chimie. Montrez vos raisonnements et vos calculs.</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'><p> (3 pts) On considère les atomes suivants : \\(^{16}_8O\\) ; \\(^{17}_8O\\) ; \\(^{18}_8O\\) ; \\(^{19}_9F\\) ; \\(^{24}_{12}Mg\\).</p><ul style='list-style-type: lower-alpha;'><li style='margin-bottom: 10px;'><strong>a)</strong> <span style='font-weight: normal;'>Identifier les isotopes.</span></li><li style='margin-bottom: 10px;'><strong>b)</strong> <span style='font-weight: normal;'>Donner le nombre de protons, de neutrons et d'électrons de l'atome \\(^{19}_9F\\).</span></li><li style='margin-bottom: 10px;'><strong>c)</strong> <span style='font-weight: normal;'>Calculer la masse approchée du noyau de l'atome \\(^{24}_{12}Mg\\). On donne \\(m_{nucléon} \\approx 1,67 \\times 10^{-27} kg\\).</span></li></ul></div>",
          "reponse": "<div><p><strong>a)</strong> Les isotopes sont des atomes qui ont le même Z mais des A différents. On a donc : \\(^{16}_8O\\), \\(^{17}_8O\\) et \\(^{18}_8O\\) sont des isotopes de l'oxygène.</p><p><strong>b)</strong> Pour \\(^{19}_9F\\) : Z = 9 (protons = 9 et électrons = 9). N = A - Z = 19 - 9 = 10 neutrons.</p><p><strong>c)</strong> La masse du noyau est approximativement égale à A × m_{nucléon}. Pour \\(^{24}_{12}Mg\\), \\(m_{noyau} \\approx 24 \\times 1,67 \\times 10^{-27} kg = 4,01 \\times 10^{-26} kg\\).</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><p> (3 pts) Le chlore a pour numéro atomique Z = 17.</p><ul style='list-style-type: lower-alpha;'><li style='margin-bottom: 10px;'><strong>a)</strong> <span style='font-weight: normal;'>Établir sa structure électronique.</span></li><li style='margin-bottom: 10px;'><strong>b)</strong> <span style='font-weight: normal;'>Donner sa représentation de Lewis.</span></li><li style='margin-bottom: 10px;'><strong>c)</strong> <span style='font-weight: normal;'>Préciser sa position (période, groupe) et le nom de la famille à laquelle il appartient.</span></li><li style='margin-bottom: 10px;'><strong>d)</strong> <span style='font-weight: normal;'>Écrire l'équation électronique de formation de l'ion chlorure \\(Cl^-\\).</span></li></ul></div>",
          "reponse": "<div><p><strong>a)</strong> Z=17, la structure électronique est : \\(1s^2 2s^2 2p^6 3s^2 3p^5\\) ou \\((K^2)(L^8)(M^7)\\).</p><p><strong>b)</strong> Il possède 7 électrons de valence (sur la couche M). La représentation de Lewis est : <span style='display: inline-block; font-size: 1.5em; margin: 10px 0;'>Cl<span style='display: inline-block; margin-left: 10px;'>• • • • • • •</span></span> (les 7 électrons sont représentés par des points autour du symbole Cl).</p><p><strong>c)</strong> Période 3 (3 couches électroniques), Groupe 17 (7 électrons de valence). C'est un halogène.</p><p><strong>d)</strong> L'ion chlorure se forme par gain d'un électron : \\(Cl + e^- \\rightarrow Cl^-\\).</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'><p> (2 pts) Un atome \\(Y\\) possède 4 électrons de valence et appartient à la 3e période.</p><ul style='list-style-type: lower-alpha;'><li style='margin-bottom: 10px;'><strong>a)</strong> <span style='font-weight: normal;'>Déterminer le numéro atomique Z de \\(Y\\).</span></li><li style='margin-bottom: 10px;'><strong>b)</strong> <span style='font-weight: normal;'>Donner sa structure électronique et son nom.</span></li></ul></div>",
          "reponse": "<div><p><strong>a)</strong> 3e période signifie que l'atome a 3 couches électroniques (K, L, M). Il a 4 électrons de valence, donc la couche M est remplie avec 4 électrons. Les couches K et L sont saturées (2 et 8 électrons). Le nombre total d'électrons est Z = 2 (K) + 8 (L) + 4 (M) = 14.</p><p><strong>b)</strong> La structure électronique est \\(1s^2 2s^2 2p^6 3s^2 3p^2\\). L'élément est le silicium (Si).</p></div>"
        }
      ]
    },
    {
      "titre": "Situation-Problème",
      "points": "6 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p style='font-size: 1.1em; text-align: justify;'>Cette situation-problème vous place dans un contexte réel où vous devez mobiliser vos compétences en chimie pour résoudre un problème. La qualité de votre raisonnement et de votre présentation est prise en compte.</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'><p><strong>Situation :</strong> Dans un laboratoire de recherche, un chimiste analyse un échantillon d'un minéral inconnu contenant un élément \\(X\\). Les analyses montrent que l'élément \\(X\\) possède les caractéristiques suivantes :</p><ul><li>Il possède 13 protons.</li><li>Il possède 14 neutrons dans son noyau le plus abondant.</li><li>Il est situé dans la 3ème période du tableau périodique.</li></ul><p>Le chimiste souhaite déterminer le symbole de l'élément \\(X\\), sa structure électronique, sa position exacte (groupe et famille), ainsi que la formule de son ion stable. Il doit également écrire l'équation de formation de cet ion.</p><p><strong>Consignes :</strong> Aidez le chimiste à résoudre ce problème en présentant clairement votre raisonnement et vos résultats.</p></div>",
          "reponse": "<div><p><strong>1. Identification de l'élément :</strong> Z = 13 (13 protons). L'élément est l'aluminium, de symbole \\(Al\\).</p><p><strong>2. Structure électronique :</strong> Pour Z=13, la structure électronique est : \\(1s^2 2s^2 2p^6 3s^2 3p^1\\) ou \\((K^2)(L^8)(M^3)\\).</p><p><strong>3. Position dans le tableau périodique :</strong> 3e période (3 couches électroniques), Groupe 13 (3 électrons de valence). Il appartient à la famille des <strong>bore</strong> (ou des métaux pauvres).</p><p><strong>4. Ion stable :</strong> L'atome d'aluminium a 3 électrons sur sa couche externe. Pour atteindre la structure stable du gaz rare (néon), il doit perdre 3 électrons. Il forme alors l'ion \\(Al^{3+}\\).</p><p><strong>5. Équation de formation :</strong> \\(Al \\rightarrow Al^{3+} + 3e^-\\).</p></div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
