<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Chimie",
  "classe": "Seconde",
  "sequence": "Séquence 5",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Structure des composés ioniques - Chlorure de sodium",
      "points": "4 pts",
      "enonce": "<div style='font-size:1.05em; line-height:1.7;'><p><strong>La structure cristalline du chlorure de sodium (NaCl) est une structure cubique dans laquelle les ions chlorure Cl⁻ occupent les sommets et les centres des faces du cube, et les ions sodium Na⁺ occupent les milieux des arêtes et le centre du cube.</strong></p><div style='background-color:#f0f4f8; padding:15px; border-radius:8px; margin:10px 0; color:#1a2332;'><p>Rappel des contributions : 1/8 pour un sommet, 1/2 pour un centre de face, 1/4 pour un milieu d'arête, 1 pour le centre.</p></div></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom:8px;'><strong>1.</strong> Calculer le nombre d'ions chlorure Cl⁻ contenus dans une maille.</div>",
          "reponse": "<div style='background-color:#eaf6ed; padding:10px; border-radius:6px; color:#1a3a2a;'><p><strong>Réponse :</strong> Il y a 4 ions Cl⁻ par maille.</p><p><strong>Explication :</strong></p><p>Les ions Cl⁻ sont situés :</p><ul><li>aux 8 sommets : 8 × 1/8 = 1 ion</li><li>aux 6 centres des faces : 6 × 1/2 = 3 ions</li></ul><p>Nombre total de Cl⁻ = 1 + 3 = <strong>4 ions</strong>.</p></div>"
        },
        {
          "question": "<div style='margin-bottom:8px;'><strong>2.</strong> Calculer le nombre d'ions sodium Na⁺ contenus dans une maille.</div>",
          "reponse": "<div style='background-color:#eaf6ed; padding:10px; border-radius:6px; color:#1a3a2a;'><p><strong>Réponse :</strong> Il y a 4 ions Na⁺ par maille.</p><p><strong>Explication :</strong></p><p>Les ions Na⁺ sont situés :</p><ul><li>aux 12 milieux des arêtes : 12 × 1/4 = 3 ions</li><li>au centre : 1 × 1 = 1 ion</li></ul><p>Nombre total de Na⁺ = 3 + 1 = <strong>4 ions</strong>.</p></div>"
        },
        {
          "question": "<div style='margin-bottom:8px;'><strong>3.</strong> En déduire la formule statistique du chlorure de sodium.</div>",
          "reponse": "<div style='background-color:#eaf6ed; padding:10px; border-radius:6px; color:#1a3a2a;'><p><strong>Réponse :</strong> La formule statistique est NaCl.</p><p><strong>Explication :</strong></p><p>Il y a 4 ions Na⁺ et 4 ions Cl⁻ par maille. Le rapport Na⁺/Cl⁻ est de 4/4 = 1. La maille contient donc 4 motifs NaCl.</p><p>Formule statistique : <strong>NaCl</strong>.</p>"
          }
        ]
      ]
    },
    {
      "titre": "Détermination d'une formule statistique",
      "points": "4 pts",
      "enonce": "<div style='font-size:1.05em; line-height:1.7;'><p><strong>Un composé ionique cristallise dans une maille cubique contenant :</strong></p><ul><li>des ions A²⁺ situés aux 8 sommets et au centre du cube ;</li><li>des ions B⁻ situés aux 12 milieux des arêtes et aux 6 centres des faces.</li></ul></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom:8px;'><strong>1.</strong> Calculer le nombre d'ions A²⁺ par maille.</div>",
          "reponse": "<div style='background-color:#eaf6ed; padding:10px; border-radius:6px; color:#1a3a2a;'><p><strong>Réponse :</strong> 2 ions A²⁺.</p><p><strong>Explication :</strong></p><p>Ions A²⁺ aux 8 sommets : 8 × 1/8 = 1 ion.</p><p>Ion A²⁺ au centre : 1 × 1 = 1 ion.</p><p>Nombre total = 1 + 1 = <strong>2 ions</strong>.</p></div>"
        },
        {
          "question": "<div style='margin-bottom:8px;'><strong>2.</strong> Calculer le nombre d'ions B⁻ par maille.</div>",
          "reponse": "<div style='background-color:#eaf6ed; padding:10px; border-radius:6px; color:#1a3a2a;'><p><strong>Réponse :</strong> 6 ions B⁻.</p><p><strong>Explication :</strong></p><p>Ions B⁻ aux 12 milieux des arêtes : 12 × 1/4 = 3 ions.</p><p>Ions B⁻ aux 6 centres des faces : 6 × 1/2 = 3 ions.</p><p>Nombre total = 3 + 3 = <strong>6 ions</strong>.</p></div>"
        },
        {
          "question": "<div style='margin-bottom:8px;'><strong>3.</strong> Déterminer la formule statistique de ce composé ionique en respectant la neutralité électrique.</div>",
          "reponse": "<div style='background-color:#eaf6ed; padding:10px; border-radius:6px; color:#1a3a2a;'><p><strong>Réponse :</strong> La formule statistique est A₃B₆, soit AB₂.</p><p><strong>Explication :</strong></p><p>Il y a 2 ions A²⁺ et 6 ions B⁻ par maille.</p><p>Charge positive : 2 × (+2) = +4.</p><p>Charge négative : 6 × (-1) = -6.</p><p>La neutralité n'est pas respectée. Il faut ajuster : pour 3 ions A²⁺ (+6) et 6 ions B⁻ (-6), la neutralité est respectée.</p><p>Formule : <strong>A₃B₆</strong> ou en simplifiant <strong>AB₂</strong>.</p></div>"
        }
      ]
    },
    {
      "titre": "Structure cristalline de quelques composés ioniques",
      "points": "5 pts",
      "enonce": "<div style='font-size:1.05em; line-height:1.7;'><p><strong>On considère un composé ionique de formule MX₂ où M²⁺ est un cation et X⁻ un anion. La maille contient :</strong></p><ul><li>des ions M²⁺ aux sommets et au centre du cube ;</li><li>des ions X⁻ aux milieux des arêtes et aux centres des faces.</li></ul></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom:8px;'><strong>1.</strong> Calculer le nombre d'ions M²⁺ par maille.</div>",
          "reponse": "<div style='background-color:#eaf6ed; padding:10px; border-radius:6px; color:#1a3a2a;'><p><strong>Réponse :</strong> 2 ions M²⁺.</p><p><strong>Explication :</strong></p><p>8 sommets × 1/8 = 1 ; 1 centre × 1 = 1.</p><p>Total = <strong>2 ions</strong>.</p></div>"
        },
        {
          "question": "<div style='margin-bottom:8px;'><strong>2.</strong> Calculer le nombre d'ions X⁻ par maille.</div>",
          "reponse": "<div style='background-color:#eaf6ed; padding:10px; border-radius:6px; color:#1a3a2a;'><p><strong>Réponse :</strong> 6 ions X⁻.</p><p><strong>Explication :</strong></p><p>12 arêtes × 1/4 = 3 ; 6 faces × 1/2 = 3.</p><p>Total = <strong>6 ions</strong>.</p></div>"
        },
        {
          "question": "<div style='margin-bottom:8px;'><strong>3.</strong> Vérifier si la neutralité électrique est respectée avec la formule MX₂.</div>",
          "reponse": "<div style='background-color:#eaf6ed; padding:10px; border-radius:6px; color:#1a3a2a;'><p><strong>Réponse :</strong> La neutralité n'est pas respectée.</p><p><strong>Explication :</strong></p><p>Pour 2 ions M²⁺, la charge positive est +4.</p><p>Pour 6 ions X⁻, la charge négative est -6.</p><p>Les charges ne se compensent pas.</p><p>Il faut 3 ions M²⁺ (+6) et 6 ions X⁻ (-6).</p><p>Donc la formule réelle est <strong>M₃X₆</strong> ou <strong>MX₂</strong> en simplifiant, mais ici les nombres ne correspondent pas. La maille décrite correspondrait à une structure de type fluorine CaF₂ où les charges sont Ca²⁺ et F⁻.</p></div>"
        },
        {
          "question": "<div style='margin-bottom:8px;'><strong>4.</strong> Proposer un ajustement des positions pour que la formule MX₂ soit respectée avec la neutralité électrique.</div>",
          "reponse": "<div style='background-color:#eaf6ed; padding:10px; border-radius:6px; color:#1a3a2a;'><p><strong>Réponse :</strong> Pour avoir MX₂, il faut 4 ions M²⁺ et 8 ions X⁻.</p><p><strong>Explication :</strong></p><p>4 ions M²⁺ donnent une charge +8.</p><p>8 ions X⁻ donnent une charge -8.</p><p>La maille doit donc contenir 4 ions M²⁺ et 8 ions X⁻.</p><p>On peut par exemple placer les ions M²⁺ aux sommets et au centre (2 ions) + 2 autres positions et ajuster les X⁻.</p></div>"
        }
      ]
    },
    {
      "titre": "Problème de vie courante : Fabrication du sel de table",
      "type": "competence",
      "niveau": "very hard",
      "enonce": "<div style='font-size:1.05em; line-height:1.7;'><p><strong>Le sel de table (chlorure de sodium) est un composé ionique cristallisé. On souhaite déterminer la formule statistique du chlorure de sodium à partir de l'analyse d'une maille cristalline. La maille contient :</strong></p><ul><li>des ions Na⁺ aux sommets et au centre du cube ;</li><li>des ions Cl⁻ aux milieux des arêtes et aux centres des faces.</li></ul></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom:8px;'><strong>1.</strong> Calculer le nombre d'ions Na⁺ et Cl⁻ dans la maille.</div>",
          "reponse": "<div style='background-color:#eaf6ed; padding:10px; border-radius:6px; color:#1a3a2a;'><p><strong>Réponse :</strong> 2 ions Na⁺ et 6 ions Cl⁻.</p><p><strong>Explication :</strong></p><p>Na⁺ : 8 sommets × 1/8 = 1 ; 1 centre × 1 = 1 → Total = 2.</p><p>Cl⁻ : 12 arêtes × 1/4 = 3 ; 6 faces × 1/2 = 3 → Total = 6.</p></div>"
        },
        {
          "question": "<div style='margin-bottom:8px;'><strong>2.</strong> La neutralité électrique est-elle respectée ? Justifier.</div>",
          "reponse": "<div style='background-color:#eaf6ed; padding:10px; border-radius:6px; color:#1a3a2a;'><p><strong>Réponse :</strong> Non, la neutralité n'est pas respectée.</p><p><strong>Justification :</strong></p><p>Charge positive : 2 Na⁺ × (+1) = +2.</p><p>Charge négative : 6 Cl⁻ × (-1) = -6.</p><p>Les charges ne se compensent pas. Il manque 4 charges positives.</p></div>"
        },
        {
          "question": "<div style='margin-bottom:8px;'><strong>3.</strong> En réalité, la maille du NaCl contient 4 ions Na⁺ et 4 ions Cl⁻. Où se trouvent les ions Na⁺ supplémentaires ?</div>",
          "reponse": "<div style='background-color:#eaf6ed; padding:10px; border-radius:6px; color:#1a3a2a;'><p><strong>Réponse :</strong> Les ions Na⁺ supplémentaires sont au centre des faces.</p><p><strong>Explication :</strong></p><p>Dans la structure réelle de NaCl, les ions Na⁺ sont situés aux milieux des arêtes (12 × 1/4 = 3) et au centre (1), soit 4 ions Na⁺.</p><p>Les ions Cl⁻ sont situés aux sommets (8 × 1/8 = 1) et aux centres des faces (6 × 1/2 = 3), soit 4 ions Cl⁻.</p></div>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
