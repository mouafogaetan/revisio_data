<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Chimie",
  "classe": "Seconde C",
  "sequence": "Séquence 6",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "1 : Structure de l'Atome et Classification Périodique",
      "points": "6 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; color: #333;'>Cet exercice explore la structure de l'atome et l'utilisation du tableau périodique, des concepts fondamentaux pour comprendre la réactivité chimique des éléments.</div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #333;'><strong>1. (2 pts)</strong> Un atome de sodium (Na) possède 11 protons et 12 neutrons.<br>a) Donner sa représentation symbolique <span class='math inline'>\\( ^A_Z X \\)</span> et calculer son nombre de masse.<br>b) Sachant que la charge élémentaire est <span class='math inline'>\\( e = 1{,}60 \\times 10^{-19} \\, C \\)</span> et la masse d'un nucléon <span class='math inline'>\\( m_n = 1{,}67 \\times 10^{-27} \\, kg \\)</span>, calculer la charge électrique et la masse de son noyau.</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; color: #1a1a1a;'><strong>Correction :</strong><br><strong>a)</strong> Z = 11, A = 11 + 12 = 23. Représentation : <span class='math inline'>\\( ^{23}_{11}Na \\)</span><br><strong>b)</strong> Charge : <span class='math inline'>\\( Q = Z \\times e = 11 \\times 1{,}60 \\times 10^{-19} = 1{,}76 \\times 10^{-18} \\, C \\)</span>.<br>Masse : <span class='math inline'>\\( m_{noyau} = A \\times m_n = 23 \\times 1{,}67 \\times 10^{-27} = 3{,}84 \\times 10^{-26} \\, kg \\)</span>.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #333;'><strong>2. (2 pts)</strong> Un élément chimique X a pour structure électronique : <span class='math inline'>\\( (K)^2 (L)^8 (M)^1 \\)</span>.<br>a) Déterminer son numéro atomique Z.<br>b) Déterminer sa période et son groupe dans la classification périodique en justifiant.<br>c) À quelle famille chimique appartient-il ?</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; color: #1a1a1a;'><strong>Correction :</strong><br><strong>a)</strong> Z = 2 + 8 + 1 = 11.<br><strong>b)</strong> Période = 3 (car 3 couches électroniques K, L, M). Groupe = 1 (1 électron de valence).<br><strong>c)</strong> Famille des alcalins.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #333;'><strong>3. (2 pts)</strong> L'atome de chlore (Cl) a pour numéro atomique Z = 17.<br>a) Établir la structure de Lewis de l'atome de chlore.<br>b) Sachant que l'atome de chlore gagne un électron pour former l'ion chlorure <span class='math inline'>\\( Cl^- \\)</span>, écrire l'équation électronique de formation de cet ion. Expliquer en quoi cela permet à l'ion d'atteindre la règle de l'octet.</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; color: #1a1a1a;'><strong>Correction :</strong><br><strong>a)</strong> Structure électronique de Cl : (K)<sup>2</sup>(L)<sup>8</sup>(M)<sup>7</sup>. La structure de Lewis est : Cl avec 7 électrons de valence (6 points autour et un célibataire).<br><strong>b)</strong> <span class='math inline'>\\( Cl + e^- \\rightarrow Cl^- \\)</span>. En gagnant un électron, l'ion Cl<sup>-</sup> possède 8 électrons sur sa couche externe (M), ce qui correspond à la structure électronique stable du gaz rare argon (règle de l'octet).</div>"
        }
      ]
    },
    {
      "titre": "2 : Liaisons, Molécules et Isomérie",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; color: #333;'>Cet exercice porte sur la représentation et l'analyse des molécules, en utilisant les concepts de liaisons chimiques et d'isomérie.</div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #333;'><strong>1. (2 pts)</strong> La molécule d'ammoniac a pour formule brute <span class='math inline'>\\( NH_3 \\)</span>.<br>a) Donner la formule de Lewis de la molécule d'ammoniac sachant que l'azote (Z=7) a 5 électrons de valence et l'hydrogène (Z=1) en a 1.<br>b) Combien de liaisons covalentes l'atome d'azote établit-il ? Quelle est sa valence ?</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; color: #1a1a1a;'><strong>Correction :</strong><br><strong>a)</strong> La formule de Lewis de NH3 montre l'atome d'azote (N) au centre, lié à trois atomes d'hydrogène (H) par trois liaisons simples. L'azote possède également un doublet non-liant.<br><strong>b)</strong> L'azote établit 3 liaisons. Sa valence est de 3.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #333;'><strong>2. (2 pts)</strong> Deux composés organiques ont pour formule brute <span class='math inline'>\\( C_2H_6O \\)</span>. Le premier est l'éthanol <span class='math inline'>\\( CH_3-CH_2-OH \\)</span> et le second est le méthoxyéthane <span class='math inline'>\\( CH_3-O-CH_3 \\)</span>.<br>a) De quel phénomène s'agit-il ? Définir ce phénomène.<br>b) Comment appelle-t-on ce type de composés ?</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; color: #1a1a1a;'><strong>Correction :</strong><br><strong>a)</strong> Il s'agit d'isomérie. Deux composés sont isomères lorsqu'ils ont la même formule brute mais des formules développées (structures) différentes.<br><strong>b)</strong> Ce sont des isomères de fonction (ou de structure).</div>"
        }
      ]
    },
    {
      "titre": "3 : Solutions Aqueuses et Concentration",
      "points": "5 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; color: #333;'>Cet exercice aborde la préparation et la caractérisation des solutions aqueuses, incluant les calculs de concentration.</div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #333;'><strong>1. (2 pts)</strong> On dissout une masse <span class='math inline'>\\( m = 4{,}0 \\, g \\)</span> d'hydroxyde de sodium (NaOH) dans un volume <span class='math inline'>\\( V = 200 \\, mL \\)</span> d'eau. On donne : <span class='math inline'>\\( M_{Na} = 23 \\, g/mol \\)</span>, <span class='math inline'>\\( M_O = 16 \\, g/mol \\)</span>, <span class='math inline'>\\( M_H = 1 \\, g/mol \\)</span>.<br>a) Calculer la masse molaire M du soluté NaOH.<br>b) En déduire la quantité de matière n dissoute.<br>c) Calculer la concentration molaire C de la solution obtenue.</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; color: #1a1a1a;'><strong>Correction :</strong><br><strong>a)</strong> <span class='math inline'>\\( M_{NaOH} = 23 + 16 + 1 = 40 \\, g/mol \\)</span>.<br><strong>b)</strong> <span class='math inline'>\\( n = \\frac{m}{M} = \\frac{4{,}0}{40} = 0{,}10 \\, mol \\)</span>.<br><strong>c)</strong> <span class='math inline'>\\( C = \\frac{n}{V} = \\frac{0{,}10}{200 \\times 10^{-3}} = 0{,}50 \\, mol/L \\)</span>.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #333;'><strong>2. (1,5 pts)</strong> Le chlorure de sodium (NaCl) se dissout dans l'eau. L'ion sodium <span class='math inline'>\\( Na^+ \\)</span> donne à la flamme une coloration jaune.<br>a) Quel test peut-on réaliser pour identifier l'ion chlorure <span class='math inline'>\\( Cl^- \\)</span> dans cette solution ?<br>b) Écrire l'équation de la réaction de précipitation qui permet d'identifier l'ion chlorure.</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; color: #1a1a1a;'><strong>Correction :</strong><br><strong>a)</strong> On peut ajouter quelques gouttes d'une solution de nitrate d'argent <span class='math inline'>\\( AgNO_3 \\)</span>.<br><strong>b)</strong> <span class='math inline'>\\( Ag^+ + Cl^- \\rightarrow AgCl_{(s)} \\)</span>. Il se forme un précipité blanc de chlorure d'argent qui noircit à la lumière.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #333;'><strong>3. (1,5 pts)</strong> On dispose d'une solution mère de glucose de concentration <span class='math inline'>\\( C_m = 100 \\, g/L \\)</span>. On souhaite préparer un volume <span class='math inline'>\\( V_f = 100 \\, mL \\)</span> de solution fille de concentration <span class='math inline'>\\( C_f = 10 \\, g/L \\)</span>.<br>a) Calculer le volume de solution mère à prélever.<br>b) Décrire brièvement le mode opératoire de cette dilution.</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; color: #1a1a1a;'><strong>Correction :</strong><br><strong>a)</strong> D'après la relation de dilution : <span class='math inline'>\\( C_m \\times V_m = C_f \\times V_f \\)</span>.<br><span class='math inline'>\\( V_m = \\frac{C_f \\times V_f}{C_m} = \\frac{10 \\times 100}{100} = 10 \\, mL \\)</span>.<br><strong>b)</strong> On prélève 10 mL de solution mère à l'aide d'une pipette jaugée. On les introduit dans une fiole jaugée de 100 mL. On complète avec de l'eau distillée jusqu'au trait de jauge et on homogénéise.</div>"
        }
      ]
    },
    {
      "titre": "4 : Acides, Bases et Dosage",
      "points": "5 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; color: #333;'>Cet exercice porte sur les réactions acido-basiques et la technique du dosage, essentielle pour déterminer des concentrations inconnues.</div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #333;'><strong>1. (1,5 pts)</strong> Définir un acide et une base selon Brönsted. Donner un exemple pour chacun.</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; color: #1a1a1a;'><strong>Correction :</strong><br>Selon Brönsted, un acide est une espèce chimique capable de libérer un ou plusieurs ions hydrogène (protons) <span class='math inline'>\\( H^+ \\)</span>. Exemple : <span class='math inline'>\\( HCl \\)</span>.<br>Une base est une espèce chimique capable de capter un ou plusieurs ions hydrogène (protons) <span class='math inline'>\\( H^+ \\)</span>. Exemple : <span class='math inline'>\\( NaOH \\)</span>.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #333;'><strong>2. (1,5 pts)</strong> On dose un volume <span class='math inline'>\\( V_a = 20 \\, mL \\)</span> d'une solution d'acide chlorhydrique <span class='math inline'>\\( (H_3O^+ + Cl^-) \\)</span> de concentration inconnue <span class='math inline'>\\( C_a \\)</span> par une solution de soude <span class='math inline'>\\( (Na^+ + HO^-) \\)</span> de concentration <span class='math inline'>\\( C_b = 0{,}1 \\, mol/L \\)</span>. L'équivalence est atteinte lorsqu'on a versé un volume <span class='math inline'>\\( V_b = 15 \\, mL \\)</span> de soude.<br>a) Écrire l'équation-bilan de la réaction de dosage.<br>b) Calculer la concentration <span class='math inline'>\\( C_a \\)</span> de la solution d'acide chlorhydrique.</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; color: #1a1a1a;'><strong>Correction :</strong><br><strong>a)</strong> <span class='math inline'>\\( H_3O^+ + HO^- \\rightarrow 2H_2O \\)</span>.<br><strong>b)</strong> À l'équivalence, <span class='math inline'>\\( C_a \\times V_a = C_b \\times V_b \\)</span>.<br><span class='math inline'>\\( C_a = \\frac{C_b \\times V_b}{V_a} = \\frac{0{,}1 \\times 15}{20} = 0{,}075 \\, mol/L \\)</span>.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #333;'><strong>3. (2 pts)</strong> Une solution aqueuse a un pH de 3 à 25°C.<br>a) Cette solution est-elle acide, basique ou neutre ? Justifier.<br>b) Calculer la concentration en ions hydronium <span class='math inline'>\\( [H_3O^+] \\)</span> de cette solution.<br>c) Le produit ionique de l'eau à 25°C est <span class='math inline'>\\( K_e = 10^{-14} \\)</span>. Calculer la concentration en ions hydroxyde <span class='math inline'>\\( [HO^-] \\)</span> dans cette même solution.</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; color: #1a1a1a;'><strong>Correction :</strong><br><strong>a)</strong> La solution est acide car son pH < 7.<br><strong>b)</strong> <span class='math inline'>\\( [H_3O^+] = 10^{-pH} = 10^{-3} \\, mol/L \\)</span>.<br><strong>c)</strong> <span class='math inline'>\\( K_e = [H_3O^+] \\times [HO^-] \\)</span> donc <span class='math inline'>\\( [HO^-] = \\frac{10^{-14}}{10^{-3}} = 10^{-11} \\, mol/L \\)</span>.</div>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
