<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Chimie",
  "classe": "Seconde",
  "sequence": "Séquence 3",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Structure et composition de la matière (5 points)",
      "points": "5 pts",
      "enonce": "<p>Cet exercice porte sur la structure de l'atome et les caractéristiques des ions.</p>",
      "questions": [
        {
          "question": "<p><strong>1. Structure de l'atome (3 pts)</strong></p><p>a) Donne la composition d'un atome de sodium \\(_{11}^{23}Na\\). (0,75 pt)</p><p>b) Calcule la masse approchée du noyau de cet atome (masse d'un nucléon = 1,67×10⁻²⁷ kg). (0,75 pt)</p><p>c) Quelle est la charge du noyau de cet atome ? (charge élémentaire e = 1,6×10⁻¹⁹ C). (0,75 pt)</p><p>d) Quel est le nombre d'électrons dans l'atome de sodium ? Justifie. (0,75 pt)</p>",
          "reponse": "<p>a) L'atome de sodium \\(_{11}^{23}Na\\) contient 11 protons, 12 neutrons (23 - 11 = 12) et 11 électrons.</p><p>b) La masse approchée du noyau est : m ≈ A × m_nucléon = 23 × 1,67×10⁻²⁷ = 3,84×10⁻²⁶ kg.</p><p>c) La charge du noyau est : Q = Z × e = 11 × 1,6×10⁻¹⁹ = 1,76×10⁻¹⁸ C.</p><p>d) Dans un atome, le nombre d'électrons est égal au nombre de protons, donc l'atome de sodium possède 11 électrons.</p>"
        },
        {
          "question": "<p><strong>2. Ions et isotopes (2 pts)</strong></p><p>a) L'ion sodium \\(Na^+\\) a été formé à partir de l'atome de sodium. Écris l'équation de formation de cet ion. (1 pt)</p><p>b) L'atome de sodium possède un isotope de nombre de masse A = 24. Quelle est la composition de ce noyau ? (1 pt)</p>",
          "reponse": "<p>a) L'équation de formation de l'ion sodium est : \\(Na \\rightarrow Na^+ + e^-\\). L'atome de sodium perd un électron pour former l'ion sodium.</p><p>b) L'isotope \\(_{11}^{24}Na\\) possède 11 protons et 13 neutrons (24 - 11 = 13).</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Structure électronique et classification (6 points)",
      "points": "6 pts",
      "enonce": "<p>Un atome de phosphore a pour numéro atomique Z = 15.</p>",
      "questions": [
        {
          "question": "<p><strong>1. Structure électronique (3 pts)</strong></p><p>a) Établis la structure électronique de l'atome de phosphore en indiquant la répartition des électrons sur les couches K, L et M. (1,5 pts)</p><p>b) Quel est le nombre d'électrons de valence de l'atome de phosphore ? (0,75 pt)</p><p>c) Représente la formule de Lewis de l'atome de phosphore. (0,75 pt)</p>",
          "reponse": "<p>a) La structure électronique du phosphore (Z = 15) est : (K)²(L)⁸(M)⁵, soit 15 électrons répartis sur 3 couches.</p><p>b) Les électrons de valence sont ceux de la dernière couche (couche M). L'atome de phosphore possède 5 électrons de valence.</p><p>c) La formule de Lewis du phosphore est : P avec 5 électrons célibataires (points) autour du symbole.</p>"
        },
        {
          "question": "<p><strong>2. Classification périodique (3 pts)</strong></p><p>a) Détermine la période du phosphore dans le tableau périodique. (0,75 pt)</p><p>b) Détermine le groupe du phosphore. (0,75 pt)</p><p>c) À quelle famille appartient le phosphore ? Justifie. (0,75 pt)</p><p>d) L'atome de phosphore peut gagner 3 électrons pour former l'ion phosphure \\(P^{3-}\\). Quelle règle de stabilité cela lui permet-il d'atteindre ? (0,75 pt)</p>",
          "reponse": "<p>a) Le phosphore possède 3 couches électroniques, il est donc situé dans la 3ème période.</p><p>b) Le phosphore possède 5 électrons de valence, il est donc dans le groupe 15 (colonne 15).</p><p>c) Le phosphore appartient à la famille des pnictogènes (ou azotés).</p><p>d) En gagnant 3 électrons, le phosphore atteint la structure électronique du gaz rare le plus proche (argon), en respectant la règle de l'octet : 8 électrons sur la couche externe.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Liaison chimique et volume molaire (5 points)",
      "points": "5 pts",
      "enonce": "<p>Cet exercice porte sur la formation des molécules et le volume molaire des gaz.</p>",
      "questions": [
        {
          "question": "<p><strong>1. Représentation des molécules (3 pts)</strong></p><p>On considère la molécule de méthane \\(CH_4\\).</p><p>a) Donne la formule de Lewis de la molécule de méthane. (1,5 pts)</p><p>b) Combien de liaisons covalentes simples la molécule de méthane contient-elle ? (0,75 pt)</p><p>c) L'atomicité de la molécule de méthane est de 5. Que signifie cette valeur ? (0,75 pt)</p>",
          "reponse": "<p>a) La formule de Lewis du méthane : H₂C : H, avec 4 liaisons simples C-H.</p><p>b) La molécule de méthane contient 4 liaisons covalentes simples.</p><p>c) L'atomicité est le nombre total d'atomes dans la molécule. Le méthane contient 1 atome de carbone et 4 atomes d'hydrogène, soit 5 atomes au total.</p>"
        },
        {
          "question": "<p><strong>2. Volume molaire (2 pts)</strong></p><p>On prélève 0,5 mol de dioxygène gazeux dans les conditions normales (CNTP).</p><p>a) Quel volume occupe cette quantité de gaz ? (1 pt)</p><p>b) Combien de molécules de dioxygène sont contenues dans cet échantillon ? (1 pt)</p>",
          "reponse": "<p>a) Dans les CNTP, le volume molaire est Vm = 22,4 L/mol. V = n × Vm = 0,5 × 22,4 = 11,2 L.</p><p>b) Le nombre de molécules est : N = n × N_A = 0,5 × 6,02×10²³ = 3,01×10²³ molécules.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Acides, bases et solutions (4 points)",
      "points": "4 pts",
      "enonce": "<p>Cet exercice aborde les solutions acides et basiques ainsi que le pH.</p>",
      "questions": [
        {
          "question": "<p><strong>1. Solutions acides et basiques (3 pts)</strong></p><p>a) Définis un acide selon Brönsted. (1 pt)</p><p>b) L'acide chlorhydrique \\(HCl\\) est un acide fort. Écris l'équation de sa réaction avec l'eau. (1 pt)</p><p>c) On mesure le pH d'une solution et on obtient pH = 3,5. Cette solution est-elle acide, basique ou neutre ? Justifie. (1 pt)</p>",
          "reponse": "<p>a) Selon Brönsted, un acide est une espèce chimique capable de céder un ou plusieurs protons \\(H^+\\).</p><p>b) L'équation de la réaction de l'acide chlorhydrique avec l'eau est : \\(HCl + H_2O \\rightarrow H_3O^+ + Cl^-\\).</p><p>c) La solution est acide car le pH est inférieur à 7. À 25°C, une solution acide a un pH < 7.</p>"
        },
        {
          "question": "<p><strong>2. Identification des ions (1 pt)</strong></p><p>On ajoute quelques gouttes de nitrate d'argent \\(Ag^+\\) à une solution inconnue et on observe un précipité blanc qui noircit à la lumière. Quel ion est mis en évidence ?</p>",
          "reponse": "<p>Le précipité blanc qui noircit à la lumière est caractéristique de l'ion chlorure \\(Cl^-\\).</p>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
