<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Chimie",
  "classe": "Seconde",
  "sequence": "Séquence 4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Dissolution et grandeurs caractéristiques (5 points)",
      "points": "5 pts",
      "enonce": "<p>On dissout une masse m = 11,7 g de chlorure de sodium (NaCl) dans de l'eau distillée pour obtenir un volume V = 500 mL de solution. M(NaCl) = 58,5 g.mol⁻¹.</p>",
      "questions": [
        {
          "question": "1) Écrire l'équation de dissolution du chlorure de sodium dans l'eau. (1 pt)",
          "reponse": "L'équation de dissolution est : <div class='math-block'><div class='math'>$$NaCl \\rightarrow Na^+ + Cl^-$$</div></div>"
        },
        {
          "question": "2) Calculer la quantité de matière n de chlorure de sodium dissous. (1 pt)",
          "reponse": "La quantité de matière est : <div class='math-block'><div class='math'>$$n = \\dfrac{m}{M} = \\dfrac{11,7}{58,5} = 0,20 \\text{ mol}$$</div></div>"
        },
        {
          "question": "3) Calculer la concentration molaire C de la solution obtenue. (1 pt)",
          "reponse": "La concentration molaire est : <div class='math-block'><div class='math'>$$C = \\dfrac{n}{V} = \\dfrac{0,20}{0,500} = 0,40 \\text{ mol.L}^{-1}$$</div></div>"
        },
        {
          "question": "4) Calculer la concentration massique C<sub>m</sub> de cette solution. (1 pt)",
          "reponse": "La concentration massique est : <div class='math-block'><div class='math'>$$C_m = \\dfrac{m}{V} = \\dfrac{11,7}{0,500} = 23,4 \\text{ g.L}^{-1}$$</div></div>"
        },
        {
          "question": "5) Écrire l'équation d'électroneutralité de cette solution. (1 pt)",
          "reponse": "L'équation d'électroneutralité est : <div class='math-block'><div class='math'>$$[Na^+] = [Cl^-]$$</div></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Dilution d'une solution (4 points)",
      "points": "4 pts",
      "enonce": "<p>On dispose d'une solution mère de sulfate de cuivre (CuSO₄) de concentration C₁ = 0,20 mol.L⁻¹. On souhaite préparer 100 mL d'une solution fille de concentration C₂ = 0,050 mol.L⁻¹.</p>",
      "questions": [
        {
          "question": "1) Quel est le volume V₁ de solution mère à prélever ? (1,5 pt)",
          "reponse": "La quantité de matière se conserve lors d'une dilution : <div class='math-block'><div class='math'>$$C_1 \\times V_1 = C_2 \\times V_2$$</div></div> <div class='math-block'><div class='math'>$$V_1 = \\dfrac{C_2 \\times V_2}{C_1} = \\dfrac{0,050 \\times 0,100}{0,20} = 0,025 \\text{ L} = 25 \\text{ mL}$$</div></div>"
        },
        {
          "question": "2) Décrire le protocole expérimental de cette dilution. (1,5 pt)",
          "reponse": "Protocole :<br>1) Prélever V₁ = 25 mL de la solution mère à l'aide d'une pipette jaugée.<br>2) Introduire ce volume dans une fiole jaugée de 100 mL.<br>3) Ajouter de l'eau distillée jusqu'à environ la moitié de la fiole et agiter pour homogénéiser.<br>4) Compléter avec de l'eau distillée jusqu'au trait de jauge.<br>5) Boucher la fiole et agiter par retournements successifs pour homogénéiser la solution fille."
        },
        {
          "question": "3) Calculer la concentration massique de la solution fille si M(CuSO₄) = 160 g.mol⁻¹. (1 pt)",
          "reponse": "La concentration massique est : <div class='math-block'><div class='math'>$$C_{m2} = C_2 \\times M = 0,050 \\times 160 = 8,0 \\text{ g.L}^{-1}$$</div></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Solubilité et saturation (4 points)",
      "points": "4 pts",
      "enonce": "<p>À 25°C, la solubilité du chlorure de potassium (KCl) dans l'eau est S = 340 g.L⁻¹.</p>",
      "questions": [
        {
          "question": "1) Définir la solubilité d'un soluté. (1 pt)",
          "reponse": "La solubilité d'un soluté est la masse maximale de ce soluté que l'on peut dissoudre dans 1 L de solvant à une température donnée pour obtenir une solution saturée."
        },
        {
          "question": "2) Une solution est-elle saturée si elle contient 170 g de KCl dans 500 mL d'eau ? Justifier. (1,5 pt)",
          "reponse": "La quantité maximale dissoute dans 500 mL est : m = S × V = 340 × 0,500 = 170 g. La solution contient exactement la quantité maximale, elle est donc saturée."
        },
        {
          "question": "3) Quelle masse de KCl peut-on dissoudre dans 250 mL d'eau à 25°C ? (1,5 pt)",
          "reponse": "La masse maximale est : m = S × V = 340 × 0,250 = 85 g. On peut dissoudre au maximum 85 g de KCl dans 250 mL d'eau."
        }
      ]
    },
    {
      "titre": "Exercice 4 : Préparation d'une solution par dissolution (4 points)",
      "points": "4 pts",
      "enonce": "<p>On souhaite préparer 200 mL d'une solution de chlorure de calcium (CaCl₂) de concentration C = 0,25 mol.L⁻¹. M(CaCl₂) = 111 g.mol⁻¹.</p>",
      "questions": [
        {
          "question": "1) Calculer la quantité de matière de CaCl₂ nécessaire. (1 pt)",
          "reponse": "La quantité de matière est : <div class='math-block'><div class='math'>$$n = C \\times V = 0,25 \\times 0,200 = 0,050 \\text{ mol}$$</div></div>"
        },
        {
          "question": "2) Calculer la masse de CaCl₂ à peser. (1 pt)",
          "reponse": "La masse est : <div class='math-block'><div class='math'>$$m = n \\times M = 0,050 \\times 111 = 5,55 \\text{ g}$$</div></div>"
        },
        {
          "question": "3) Décrire le protocole de préparation de cette solution. (1 pt)",
          "reponse": "Protocole :<br>1) Peser 5,55 g de CaCl₂ solide à l'aide d'une balance et d'une coupelle.<br>2) Introduire le solide dans une fiole jaugée de 200 mL.<br>3) Ajouter un peu d'eau distillée et agiter pour dissoudre le solide.<br>4) Compléter avec de l'eau distillée jusqu'au trait de jauge.<br>5) Boucher et agiter pour homogénéiser."
        },
        {
          "question": "4) Écrire l'équation de dissolution et l'équation d'électroneutralité. (1 pt)",
          "reponse": "Équation de dissolution : <div class='math-block'><div class='math'>$$CaCl_2 \\rightarrow Ca^{2+} + 2Cl^-$$</div></div> Équation d'électroneutralité : <div class='math-block'><div class='math'>$$2[Ca^{2+}] = [Cl^-]$$</div></div>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Application à une situation de la vie courante (3 points)",
      "points": "3 pts",
      "enonce": "<p>Le sérum physiologique est une solution de chlorure de sodium (NaCl) de concentration massique C<sub>m</sub> = 9,0 g.L⁻¹. Il est utilisé en médecine pour les perfusions.</p>",
      "questions": [
        {
          "question": "1) Calculer la concentration molaire du sérum physiologique. M(NaCl) = 58,5 g.mol⁻¹. (1,5 pt)",
          "reponse": "La concentration molaire est : <div class='math-block'><div class='math'>$$C = \\dfrac{C_m}{M} = \\dfrac{9,0}{58,5} = 0,154 \\text{ mol.L}^{-1}$$</div></div>"
        },
        {
          "question": "2) Quelle masse de NaCl faut-il utiliser pour préparer 500 mL de sérum physiologique ? (1,5 pt)",
          "reponse": "La masse est : <div class='math-block'><div class='math'>$$m = C_m \\times V = 9,0 \\times 0,500 = 4,5 \\text{ g}$$</div></div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
