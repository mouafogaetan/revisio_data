<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Éducation Civique et Morale",
  "classe": "Seconde",
  "sequence": "Séquence 2",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Droits et devoirs du citoyen (5 points)",
      "points": "5 pts",
      "enonce": "<p>Le bon citoyen est celui qui connaît ses droits et assume ses devoirs.</p>",
      "questions": [
        {
          "question": "<p><strong>1. Définition et distinction (2 pts)</strong></p><p>a) Définis les concepts suivants : citoyen, droit, devoir. (1,5 pt)</p><p>b) Quelle est la différence entre un devoir civique et un devoir civil ? (0,5 pt)</p>",
          "reponse": "<p>a) Un citoyen est un membre d'un État faisant preuve d'esprit critique et participant à la vie de la Cité. Un droit est l'ensemble des prérogatives ou avantages que le citoyen peut exiger de l'État. Un devoir est l'ensemble des obligations du citoyen provenant de la loi ou de la morale.</p><p>b) Le devoir civique est une obligation envers l'État (ex: payer l'impôt), tandis que le devoir civil est une obligation envers autrui dans la vie quotidienne (ex: respecter la salubrité).</p>"
        },
        {
          "question": "<p><strong>2. Les droits du citoyen (2 pts)</strong></p><p>a) Cite deux droits socio-économiques du citoyen. (1 pt)</p><p>b) Cite deux droits civiques et politiques. (1 pt)</p>",
          "reponse": "<p>a) Les droits socio-économiques comprennent le droit à l'éducation, le droit à la santé, le droit à la protection sociale, le droit au travail, et le droit de propriété.</p><p>b) Les droits civiques et politiques sont le droit de voter et d'être élu, le droit d'opinion, le droit d'association et le droit à la défense en justice.</p>"
        },
        {
          "question": "<p><strong>3. Les devoirs du citoyen (1 pt)</strong></p><p>Cite un devoir civique et un devoir civil du citoyen camerounais.</p>",
          "reponse": "<p>Devoir civique : le devoir de voter lors des élections. Devoir civil : le devoir de respecter les biens publics (devoir de respecter l'ordre et les biens publics).</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : La paix et les obstacles à sa préservation (4 points)",
      "points": "4 pts",
      "enonce": "<p>La paix est un bien précieux pour toute Nation. Au Cameroun, plusieurs structures et obstacles influencent la préservation de la paix.</p>",
      "questions": [
        {
          "question": "<p><strong>1. Définition et bienfaits de la paix (1,5 pts)</strong></p><p>a) Définis la paix. (0,5 pt)</p><p>b) Explique un bienfait de la paix sur le plan économique. (1 pt)</p>",
          "reponse": "<p>a) La paix est un état d'équilibre politique, économique, social et psychologique entre les citoyens. C'est aussi l'absence de guerre et de violence.</p><p>b) Sur le plan économique, la paix est un facteur de développement car elle attire les investissements étrangers, facilite les échanges mondiaux et permet un développement intégral et durable.</p>"
        },
        {
          "question": "<p><strong>2. Structures de préservation (1 pt)</strong></p><p>Cite deux institutions ou structures qui contribuent à la préservation de la paix au Cameroun.</p>",
          "reponse": "<p>Deux structures de préservation de la paix au Cameroun sont :</p><ul><li>La législation (Constitution, lois, décrets, arrêtés).</li><li>Les forces armées et de police (Armée, Police).</li></ul>"
        },
        {
          "question": "<p><strong>3. Obstacles à la paix (1,5 pts)</strong></p><p>Cite et explique un obstacle politique et un obstacle socio-culturel à la paix.</p>",
          "reponse": "<p>Obstacle politique : La corruption et le détournement des fonds publics qui créent des injustices sociales et minent la confiance des citoyens envers l'État.</p><p>Obstacle socio-culturel : Le tribalisme, qui est une forme de discrimination ethnique souvent source de conflits communautaires et d'insécurité.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Environnement et développement (5 points)",
      "points": "5 pts",
      "enonce": "<p>La protection de l'environnement est devenue un enjeu majeur pour le développement durable. Le programme de la classe de Seconde aborde les agressions contre l'environnement, leurs conséquences et les mesures de protection.</p>",
      "questions": [
        {
          "question": "<p><strong>1. Les agressions contre l'environnement (1,5 pt)</strong></p><p>Définis l'environnement et cite deux formes d'agressions qu'il subit.</p>",
          "reponse": "<p>L'environnement est l'ensemble des éléments naturels (air, eau, atmosphère, végétaux, animaux) et artificiels qui constituent la planète Terre.</p><p>Deux formes d'agressions contre l'environnement sont :</p><ul><li>La pollution par les produits chimiques et les déchets industriels.</li><li>La destruction massive des forêts (déforestation).</li></ul>"
        },
        {
          "question": "<p><strong>2. Conséquences de la destruction de l'environnement (1,5 pt)</strong></p><p>Explique deux conséquences de la destruction de l'environnement sur la santé humaine.</p>",
          "reponse": "<p>La destruction de l'environnement a des conséquences graves sur la santé humaine, notamment :</p><ul><li>L'augmentation des cancers et des maladies de peau à cause de la destruction de la couche d'ozone.</li><li>La propagation des maladies immunitaires, liée à la consommation d'OGM et à la pollution.</li></ul>"
        },
        {
          "question": "<p><strong>3. Mesures de protection (1 pt)</strong></p><p>Cite une mesure de protection de l'environnement.</p>",
          "reponse": "<p>Une mesure de protection de l'environnement est le reboisement, qui permet de lutter contre la déforestation et l'érosion.</p>"
        },
        {
          "question": "<p><strong>4. Organismes de protection (1 pt)</strong></p><p>Cite un organisme mondial et un organisme camerounais de protection de l'environnement.</p>",
          "reponse": "<p>Organisme mondial : le WWF (Fond Mondiale pour la Nature).</p><p>Organisme camerounais : la FONGEC (Fédération des ONG de l'environnement du Cameroun).</p>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Production et consommation (3 points)",
      "points": "3 pts",
      "enonce": "<p>La production et la consommation sont des activités économiques fondamentales. Leur compréhension est essentielle pour appréhender le fonctionnement d'une société.</p>",
      "questions": [
        {
          "question": "<p><strong>1. Définition et facteurs (2 pts)</strong></p><p>a) Définis la production. (0,75 pt)</p><p>b) Cite et explique un facteur humain de production. (0,75 pt)</p><p>c) Cite et explique un facteur économique de production. (0,5 pt)</p>",
          "reponse": "<p>a) La production est l'activité économique qui a pour but la création de biens et de services.</p><p>b) Un facteur humain de production est la main-d'œuvre active et qualifiée. La qualité et la compétence de la main-d'œuvre sont déterminantes pour la productivité et la qualité des biens produits.</p><p>c) Un facteur économique de production est le capital, qui inclut les machines, les voies de communication, les sources d'énergie et l'argent.</p>"
        },
        {
          "question": "<p><strong>2. Définition et types de consommation (1 pt)</strong></p><p>a) Définis la consommation. (0,5 pt)</p><p>b) Cite un exemple de consommation primaire et un exemple de consommation intermédiaire. (0,5 pt)</p>",
          "reponse": "<p>a) La consommation est l'activité économique de transformation et de destruction des biens et services pour satisfaire les besoins.</p><p>b) Consommation primaire : se nourrir (alimentation). Consommation intermédiaire : l'achat d'une voiture de luxe.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : La monnaie et le marché (3 points)",
      "points": "3 pts",
      "enonce": "<p>La monnaie et le marché sont les piliers des échanges économiques modernes.</p>",
      "questions": [
        {
          "question": "<p><strong>1. La monnaie (1,5 pt)</strong></p><p>a) Définis la monnaie. (0,5 pt)</p><p>b) Cite un type de monnaie et explique son usage. (1 pt)</p>",
          "reponse": "<p>a) La monnaie est l'ensemble des moyens de paiement utilisés pour effectuer tout règlement à l'intérieur d'un territoire donné. C'est une convention sociale destinée à faciliter les échanges de biens et de services.</p><p>b) La monnaie métallique ou divisionnaire comprend les pièces en cuivre, argent ou or. Elle est utilisée pour les transactions courantes de faible valeur.</p>"
        },
        {
          "question": "<p><strong>2. Le marché (1,5 pt)</strong></p><p>a) Définis le marché en son sens économique. (0,5 pt)</p><p>b) Cite un circuit de commercialisation. (0,5 pt)</p><p>c) Explique ce circuit. (0,5 pt)</p>",
          "reponse": "<p>a) Le marché est, au sens économique, le lieu de rencontre de l'offre et de la demande.</p><p>b) Le circuit direct, où le producteur vend directement au consommateur.</p><p>c) Dans ce circuit, il n'y a pas d'intermédiaire ; le producteur et le consommateur sont en contact direct. Ce circuit est souvent utilisé pour les produits frais ou artisanaux.</p>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
