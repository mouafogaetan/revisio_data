<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Éducation Civique et Morale",
  "classe": "Seconde",
  "sequence": "Séquence 5",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Maîtrise des concepts fondamentaux de la production et de la consommation",
      "points": "3 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Répondez aux questions suivantes en vous appuyant sur vos connaissances.</p></div>",
      "questions": [
        {
          "question": "<p> Définissez la production.</p>",
          "reponse": "<p>La production est l'activité économique ayant pour but la création de biens et de services.</p>"
        },
        {
          "question": "<p> Citez deux conditions humaines nécessaires à la production.</p>",
          "reponse": "<p>Deux conditions humaines sont : les aptitudes physiques et mentales de l'homme et la main-d'œuvre active et qualifiée.</p>"
        },
        {
          "question": "<p> Définissez la consommation.</p>",
          "reponse": "<p>La consommation est l'activité économique de transformation et de destruction des biens et services.</p>"
        },
        {
          "question": "<p> Expliquez l'importance de la consommation pour l'économie.</p>",
          "reponse": "<p>La consommation est importante car elle permet l'amélioration des conditions de vie, la prospérité des entreprises et la croissance économique.</p>"
        }
      ]
    },
    {
      "titre": "Analyser les enjeux de la monnaie et du marché",
      "points": "3 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>La monnaie et le marché sont au cœur des échanges économiques. Répondez aux questions suivantes.</p></div>",
      "questions": [
        {
          "question": "<p> Définissez la monnaie.</p>",
          "reponse": "<p>La monnaie est l'ensemble des moyens de paiement utilisés pour effectuer tout règlement à l'intérieur d'un territoire donné. C'est une convention sociale destinée à faciliter les échanges de biens et de services.</p>"
        },
        {
          "question": "<p> Quels sont les organismes créateurs de monnaie ?</p>",
          "reponse": "<p>Les banques (centrale, d'affaires, de crédit) par l'octroi de crédits, et le trésor public par le paiement des fonctionnaires.</p>"
        },
        {
          "question": "<p> Définissez le marché au sens économique.</p>",
          "reponse": "<p>Le marché est un lieu de rencontre de l'offre et de la demande.</p>"
        },
        {
          "question": "<p> Citez deux types de classification des marchés selon l'ampleur géographique.</p>",
          "reponse": "<p>Selon l'ampleur géographique, on distingue le marché local et le marché national.</p>"
        }
      ]
    },
    {
      "titre": "Application des notions de production et de consommation à des situations concrètes",
      "points": "4 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Le développement d'une communauté dépend de sa capacité à produire et à consommer de manière durable. Lisez attentivement le texte suivant et répondez aux questions.</p><div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; margin: 15px 0; color: #212529;'><p>« Dans le village de Nkolbisson, les habitants ont décidé de créer une coopérative agricole pour cultiver des produits locaux (maïs, manioc, arachide). Grâce à des formations, ils ont amélioré leurs techniques culturales. Ils ont acheté des machines (tracteurs, décortiqueuses) et construit un petit système d'irrigation. La coopérative vend une partie de sa production sur le marché local et exporte le reste vers la ville voisine. Les revenus permettent aux villageois d'acheter des biens et des services (vêtements, médicaments, scolarité de leurs enfants). »</p></div><p>En vous appuyant sur le texte et sur vos connaissances, répondez aux questions suivantes.</p></div>",
      "questions": [
        {
          "question": "<p> Identifiez dans le texte au moins trois facteurs de production (conditions) qui ont permis à la coopérative de se développer.</p>",
          "reponse": "<p>Trois facteurs de production sont : 1) Les conditions humaines : la formation des agriculteurs. 2) Les conditions économiques : l'achat de machines (tracteurs, décortiqueuses). 3) Les conditions naturelles : l'irrigation.</p>"
        },
        {
          "question": "<p> Expliquez en quoi l'activité de la coopérative constitue une production.</p>",
          "reponse": "<p>La coopérative constitue une production car elle crée des biens (maïs, manioc, arachide) destinés à être vendus sur le marché.</p>"
        },
        {
          "question": "<p> Comment les villageois consomment-ils les biens qu'ils produisent ou les revenus qu'ils en tirent ?</p>",
          "reponse": "<p>Les villageois consomment des biens (vêtements, médicaments) et des services (scolarité) grâce aux revenus tirés de la vente de leurs produits.</p>"
        },
        {
          "question": "<p> Quel type de circuit de commercialisation est utilisé lorsque la coopérative vend ses produits sur le marché local ?</p>",
          "reponse": "<p>Il s'agit d'un circuit direct ou de la vente directe (producteur → consommateur) si les villageois vendent eux-mêmes leurs produits au marché.</p>"
        }
      ]
    },
    {
      "titre": "Expliquer le rôle de la monnaie dans les échanges économiques",
      "points": "4 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Avant l'invention de la monnaie, les échanges se faisaient par le troc. La monnaie a révolutionné les échanges. Répondez aux questions suivantes.</p></div>",
      "questions": [
        {
          "question": "<p> Expliquez comment la monnaie facilite les échanges de biens et de services.</p>",
          "reponse": "<p>La monnaie facilite les échanges en servant d'intermédiaire accepté par tous. Elle évite les inconvénients du troc, qui exige une double coïncidence des besoins (il faut trouver quelqu'un qui a ce que l'on veut et qui veut ce que l'on a).</p>"
        },
        {
          "question": "<p> Qu'est-ce que la monnaie divisionnaire ? Donnez un exemple.</p>",
          "reponse": "<p>La monnaie divisionnaire est la monnaie métallique, c'est-à-dire les pièces en cuivre, argent ou or.</p>"
        },
        {
          "question": "<p> Expliquez le processus de création de la monnaie par les banques.</p>",
          "reponse": "<p>Les banques créent de la monnaie en accordant des crédits. Quand une banque accorde un prêt, elle crédite le compte de l'emprunteur d'une somme qui n'existait pas auparavant, ce qui crée de la monnaie.</p>"
        }
      ]
    },
    {
      "titre": "Comparer les différents types de marchés",
      "points": "3 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Les échanges économiques se déroulent sur différents types de marchés. Répondez aux questions suivantes.</p></div>",
      "questions": [
        {
          "question": "<p> Distinguez le marché des biens et services du marché du travail.</p>",
          "reponse": "<p>Le marché des biens et services est le lieu d'échange des biens matériels et des services. Le marché du travail est le lieu de rencontre entre l'offre de travail (les travailleurs) et la demande de travail (les employeurs).</p>"
        },
        {
          "question": "<p> Quel est le marché des capitaux ?</p>",
          "reponse": "<p>Le marché des capitaux, ou bourse des valeurs, est le lieu où s'échangent des titres financiers (actions, obligations).</p>"
        },
        {
          "question": "<p> Citez deux critères de classification des marchés.</p>",
          "reponse": "<p>Deux critères de classification sont : la nature des échanges et l'ampleur géographique.</p>"
        }
      ]
    },
    {
      "titre": "Synthèse : La monnaie, le marché, la production et la consommation dans l'économie nationale",
      "points": "3 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>La monnaie, le marché, la production et la consommation sont des piliers de l'économie nationale. Rédigez un texte argumenté qui montre leurs interrelations et leur importance pour le développement.</p></div>",
      "questions": [
        {
          "question": "<p> Rédigez un paragraphe structuré (environ 15 lignes) qui montre comment la monnaie facilite les échanges sur le marché, comment la production permet de fournir des biens à ce marché, et comment la consommation stimule l'économie nationale.</p>",
          "reponse": "<p>La monnaie est l'outil indispensable qui permet de fluidifier les échanges sur le marché en servant d'intermédiaire et de réserve de valeur. Le marché, lieu de rencontre de l'offre et de la demande, permet aux producteurs de vendre leurs biens et aux consommateurs de satisfaire leurs besoins. La production, qui mobilise des facteurs naturels, humains et économiques, est la source de ces biens et services. Enfin, la consommation, en créant une demande, stimule la production et participe à la croissance économique. Ainsi, ces quatre éléments forment un cycle vertueux : la production génère des biens, le marché les distribue, la monnaie facilite leur acquisition, et la consommation relance la production. Pour le Cameroun, le développement de ces quatre piliers est essentiel pour sortir du sous-développement.</p>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
