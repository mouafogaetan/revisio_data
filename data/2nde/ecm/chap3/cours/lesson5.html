<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) - ajouté par le script de thème */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Introduction au développement",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'>   <h2 style='color: #2c3e50; text-align: center;'>CHAPITRE 3 : La notion de développement</h2>   <div style='background-color: #f0f8ff; padding: 15px; border-radius: 10px; margin-top: 20px; border-left: 5px solid #2980b9;'>     <h3 style='color: #2980b9; margin-top: 0;'>Leçon 5 : Définition et indicateurs du développement</h3>     <p style='font-size: 16px; line-height: 1.6; color: #2c3e50;'>Le développement est un processus complexe qui touche tous les aspects de la vie d'une société. Comprendre ce qu'est le développement et comment on le mesure est essentiel pour tout citoyen soucieux de l'avenir de son pays.</p>   </div>   <div style='margin-top: 20px;'>     <h4 style='color: #2980b9;'>Objectifs de la leçon :</h4>     <ul style='font-size: 15px; line-height: 1.8; color: #2c3e50;'>       <li>Définir le développement et le sous-développement</li>       <li>Identifier les indicateurs de développement</li>       <li>Comprendre comment on mesure le progrès d'une société</li>     </ul>   </div> </div>",
    "texteParle": "Bonjour à tous. Aujourd'hui, nous allons aborder un thème essentiel pour comprendre le monde dans lequel nous vivons : la notion de développement. Qu'est-ce que le développement ? Comment mesure-t-on le progrès d'un pays ? Pourquoi certains pays sont-ils développés et d'autres sous-développés ? Nous allons répondre à ces questions dans cette leçon. Le développement est un processus qui touche tous les aspects de la vie : l'économie, la santé, l'éducation, la culture, et bien d'autres domaines. C'est un sujet qui nous concerne tous, car l'avenir de notre pays dépend de notre capacité à nous développer.",
    "note": "Le développement est un processus multidimensionnel qui concerne tous les aspects de la vie humaine."
  },
  {
    "titre": "Définition du développement",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'>   <h3 style='color: #2c3e50; text-align: center; border-bottom: 2px solid #2980b9; padding-bottom: 10px;'>Qu'est-ce que le développement ?</h3>   <div style='background-color: #e8f4f8; padding: 15px; border-radius: 10px; margin-top: 15px;'>     <h4 style='color: #2980b9; margin-top: 0;'>📌 Définition</h4>     <p style='font-size: 16px; line-height: 1.6; color: #2c3e50;'>Le <strong>développement</strong> est l'ensemble des moyens utilisés par une société pour subvenir aux besoins de sa population. C'est aussi un processus par lequel l'homme se rend apte à satisfaire ses besoins fondamentaux.</p>   </div>   <div style='background-color: #d4edda; padding: 15px; border-radius: 10px; margin-top: 15px; border: 2px solid #28a745;'>     <h4 style='color: #28a745; margin-top: 0;'>Les dimensions du développement</h4>     <ul style='font-size: 15px; line-height: 1.8; color: #2c3e50;'>       <li><strong>Économique :</strong> production de richesses, création d'emplois</li>       <li><strong>Social :</strong> amélioration des conditions de vie, réduction des inégalités</li>       <li><strong>Culturel :</strong> promotion de l'éducation et de la culture</li>       <li><strong>Politique :</strong> consolidation de la démocratie et des droits humains</li>       <li><strong>Environnemental :</strong> protection des ressources naturelles</li>     </ul>   </div>   <div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; margin-top: 15px; border-left: 5px solid #2980b9;'>     <p style='font-size: 14px; line-height: 1.6; color: #2c3e50;'><strong>💡 À retenir :</strong> Le développement ne se limite pas à la croissance économique. C'est un processus global qui doit bénéficier à toute la population.</p>   </div> </div>",
    "texteParle": "Le développement, qu'est-ce que c'est ? C'est l'ensemble des moyens qu'une société utilise pour répondre aux besoins de sa population. Il ne s'agit pas seulement de produire plus de richesses, mais aussi d'améliorer les conditions de vie de tous les citoyens. Le développement a plusieurs dimensions : économique, sociale, culturelle, politique et environnementale. Un pays ne peut pas se développer seulement sur le plan économique ; il doit aussi progresser dans ces autres domaines. Par exemple, un pays riche mais où les citoyens n'ont pas accès à l'éducation ou à la santé n'est pas vraiment développé.",
    "note": "Le développement durable vise à satisfaire les besoins du présent sans compromettre ceux des générations futures."
  },
  {
    "titre": "Définition du sous-développement",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'>   <h3 style='color: #2c3e50; text-align: center; border-bottom: 2px solid #2980b9; padding-bottom: 10px;'>Qu'est-ce que le sous-développement ?</h3>   <div style='background-color: #f8d7da; padding: 15px; border-radius: 10px; margin-top: 15px; border: 1px solid #dc3545;'>     <h4 style='color: #dc3545; margin-top: 0;'>📌 Définition</h4>     <p style='font-size: 16px; line-height: 1.6; color: #2c3e50;'>Le <strong>sous-développement</strong> est l'état d'un pays faiblement industrialisé et incapable de satisfaire les besoins fondamentaux de sa population.</p>   </div>   <div style='background-color: #fff3cd; padding: 15px; border-radius: 10px; margin-top: 15px; border: 1px solid #ffc107;'>     <h4 style='color: #856404; margin-top: 0;'>Caractéristiques d'un pays sous-développé</h4>     <ul style='font-size: 15px; line-height: 1.8; color: #2c3e50;'>       <li>Faible industrialisation</li>       <li>Pauvreté généralisée</li>       <li>Accès limité à l'éducation et à la santé</li>       <li>Forte dépendance économique</li>       <li>Instabilité politique et sociale</li>     </ul>   </div>   <div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; margin-top: 15px; border-left: 5px solid #2980b9;'>     <p style='font-size: 14px; line-height: 1.6; color: #2c3e50;'><strong>📌 Au Cameroun :</strong> Le Cameroun est classé parmi les pays en développement. Malgré des progrès importants, il reste confronté à des défis majeurs : pauvreté, inégalités, accès limité aux services de base.</p>   </div> </div>",
    "texteParle": "Le sous-développement est la situation d'un pays qui n'arrive pas à satisfaire les besoins fondamentaux de sa population. Ces pays ont une faible industrialisation, une pauvreté généralisée, un accès limité à l'éducation et à la santé, et une forte dépendance économique vis-à-vis des pays riches. Le Cameroun, comme beaucoup de pays africains, est classé parmi les pays en développement. Cela signifie que nous avons encore des progrès à faire dans de nombreux domaines. Mais c'est aussi une chance, car nous avons le potentiel de nous développer et d'améliorer les conditions de vie de nos populations.",
    "note": "Le sous-développement n'est pas une fatalité. De nombreux pays ont réussi à en sortir."
  },
  {
    "titre": "Les indicateurs de développement (1/2)",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'>   <h3 style='color: #2c3e50; text-align: center; border-bottom: 2px solid #2980b9; padding-bottom: 10px;'>Les indicateurs de développement (1/2)</h3>   <div style='background-color: #e8f4f8; padding: 15px; border-radius: 10px; margin-top: 15px;'>     <h4 style='color: #2980b9; margin-top: 0;'>📊 Les indicateurs économiques</h4>     <ul style='font-size: 15px; line-height: 1.8; color: #2c3e50;'>       <li><strong>PIB (Produit Intérieur Brut) :</strong> Valeur de tous les biens et services produits dans un pays en un an. Indicateur de la richesse produite.</li>       <li><strong>PNB (Produit National Brut) :</strong> PIB + revenus des entreprises et citoyens à l'étranger - revenus des étrangers dans le pays.</li>       <li><strong>Revenu par habitant :</strong> PIB divisé par le nombre d'habitants. Indicateur du niveau de vie moyen.</li>     </ul>   </div>   <div style='background-color: #f0f8ff; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 5px solid #2980b9;'>     <h4 style='color: #2980b9; margin-top: 0;'>💡 Exemple</h4>     <p style='font-size: 15px; line-height: 1.6; color: #2c3e50;'>Un pays avec un PIB élevé mais une population très nombreuse peut avoir un revenu par habitant faible. Cela signifie que la richesse est peu répartie.</p>   </div>   <div style='background-color: #fff3cd; padding: 12px; border-radius: 8px; margin-top: 15px; border: 1px solid #ffc107;'>     <p style='font-size: 14px; line-height: 1.6; color: #2c3e50; text-align: center;'><strong>⚠️ Limite :</strong> Ces indicateurs ne mesurent que la richesse économique, pas le bien-être des populations.</p>   </div> </div>",
    "texteParle": "Pour mesurer le développement d'un pays, on utilise des indicateurs. Les indicateurs économiques sont les plus connus. Le PIB, ou Produit Intérieur Brut, est la valeur de tous les biens et services produits dans un pays en une année. C'est un indicateur de la richesse produite. Le PNB est similaire mais prend en compte les revenus des entreprises et des citoyens à l'étranger. Le revenu par habitant, c'est le PIB divisé par le nombre d'habitants. Il donne une idée du niveau de vie moyen. Mais ces indicateurs ont une limite : ils ne mesurent que la richesse économique, pas le bien-être réel des populations.",
    "note": "Le PIB ne prend pas en compte la répartition des richesses ni la qualité de vie."
  },
  {
    "titre": "Les indicateurs de développement (2/2)",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'>   <h3 style='color: #2c3e50; text-align: center; border-bottom: 2px solid #2980b9; padding-bottom: 10px;'>Les indicateurs de développement (2/2)</h3>   <div style='background-color: #e8f4f8; padding: 15px; border-radius: 10px; margin-top: 15px;'>     <h4 style='color: #2980b9; margin-top: 0;'>📊 Les indicateurs sociaux</h4>     <ul style='font-size: 15px; line-height: 1.8; color: #2c3e50;'>       <li><strong>IDH (Indice de Développement Humain) :</strong> Mesure le niveau de développement d'un pays en combinant trois dimensions : la santé (espérance de vie), l'éducation (niveau d'instruction), et le niveau de vie (revenu).</li>       <li><strong>Ressources humaines :</strong> Niveau d'éducation, de formation et de santé de la population.</li>       <li><strong>Ressources alimentaires :</strong> Capacité du pays à nourrir sa population.</li>     </ul>   </div>   <div style='background-color: #d4edda; padding: 15px; border-radius: 10px; margin-top: 15px; border: 2px solid #28a745;'>     <h4 style='color: #28a745; margin-top: 0;'>📌 Pourquoi l'IDH est important ?</h4>     <ul style='font-size: 15px; line-height: 1.8; color: #2c3e50;'>       <li>Il mesure le bien-être réel des populations</li>       <li>Il prend en compte des aspects non économiques</li>       <li>Il permet de comparer les pays de manière plus complète</li>     </ul>   </div>   <div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; margin-top: 15px; border-left: 5px solid #2980b9;'>     <p style='font-size: 14px; line-height: 1.6; color: #2c3e50;'><strong>💡 À retenir :</strong> L'IDH est considéré comme un indicateur plus complet que le PIB pour mesurer le développement d'un pays.</p>   </div> </div>",
    "texteParle": "Les indicateurs sociaux sont plus complets que les indicateurs économiques. Le plus connu est l'IDH, l'Indice de Développement Humain. Il combine trois dimensions : la santé, mesurée par l'espérance de vie ; l'éducation, mesurée par le niveau d'instruction ; et le niveau de vie, mesuré par le revenu. L'IDH est un bon indicateur du bien-être réel des populations. Les ressources humaines, c'est-à-dire le niveau d'éducation et de santé de la population, sont aussi un indicateur important. Un pays avec une population bien éduquée et en bonne santé a plus de chances de se développer durablement.",
    "note": "L'IDH est publié chaque année par le Programme des Nations Unies pour le Développement (PNUD)."
  },
  {
    "titre": "Les niveaux de développement",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'>   <h3 style='color: #2c3e50; text-align: center; border-bottom: 2px solid #2980b9; padding-bottom: 10px;'>Les niveaux de développement dans le monde</h3>   <div style='display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px;'>     <div style='background-color: #d4edda; padding: 12px; border-radius: 8px; border: 2px solid #28a745;'>       <h4 style='color: #28a745; margin-top: 0; text-align: center;'>🟢 Pays développés</h4>       <ul style='font-size: 13px; line-height: 1.6; color: #2c3e50;'>         <li>IDH élevé</li>         <li>Économie industrialisée</li>         <li>Bon niveau de vie</li>         <li>Services publics de qualité</li>         <li>Ex: France, Japon, USA</li>       </ul>     </div>     <div style='background-color: #fff3cd; padding: 12px; border-radius: 8px; border: 2px solid #ffc107;'>       <h4 style='color: #856404; margin-top: 0; text-align: center;'>🟡 Pays émergents</h4>       <ul style='font-size: 13px; line-height: 1.6; color: #2c3e50;'>         <li>IDH moyen</li>         <li>Économie en croissance</li>         <li>Inégalités persistantes</li>         <li>Progrès notables</li>         <li>Ex: Cameroun, Brésil, Inde</li>       </ul>     </div>     <div style='background-color: #f8d7da; padding: 12px; border-radius: 8px; border: 2px solid #dc3545;'>       <h4 style='color: #dc3545; margin-top: 0; text-align: center;'>🔴 Pays sous-développés</h4>       <ul style='font-size: 13px; line-height: 1.6; color: #2c3e50;'>         <li>IDH faible</li>         <li>Pauvreté massive</li>         <li>Faible industrialisation</li>         <li>Services publics déficients</li>         <li>Ex: Niger, Soudan, Tchad</li>       </ul>     </div>   </div>   <div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; margin-top: 15px; border-left: 5px solid #2980b9;'>     <p style='font-size: 14px; line-height: 1.6; color: #2c3e50;'><strong>📌 À retenir :</strong> Le développement est un processus continu. Les pays émergents sont ceux qui progressent rapidement vers le développement.</p>   </div> </div>",
    "texteParle": "Dans le monde, on distingue trois grands niveaux de développement. Les pays développés ont un IDH élevé, une économie industrialisée et un bon niveau de vie. On y trouve la France, le Japon ou les États-Unis. Les pays sous-développés, comme le Niger ou le Soudan, ont un IDH faible, une pauvreté massive et une faible industrialisation. Entre les deux, il y a les pays émergents. Ce sont des pays en développement qui progressent rapidement. Le Cameroun fait partie de cette catégorie. Les pays émergents sont ceux qui ont le plus de potentiel de progression.",
    "note": "La classification des pays par niveau de développement évolue dans le temps."
  },
  {
    "titre": "Causes du sous-développement",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'>   <h3 style='color: #2c3e50; text-align: center; border-bottom: 2px solid #2980b9; padding-bottom: 10px;'>Pourquoi certains pays sont-ils sous-développés ?</h3>   <div style='background-color: #f8d7da; padding: 15px; border-radius: 10px; margin-top: 15px; border: 1px solid #dc3545;'>     <h4 style='color: #dc3545; margin-top: 0;'>Les causes internes</h4>     <ul style='font-size: 15px; line-height: 1.8; color: #2c3e50;'>       <li><strong>Politique :</strong> instabilité politique, corruption, mauvaise gouvernance</li>       <li><strong>Économique :</strong> faible industrialisation, dépendance aux matières premières</li>       <li><strong>Social :</strong> analphabétisme, pauvreté, inégalités, croissance démographique rapide</li>       <li><strong>Culturel :</strong> mentalités, manque d'esprit d'entreprise</li>     </ul>   </div>   <div style='background-color: #f8d7da; padding: 15px; border-radius: 10px; margin-top: 15px; border: 1px solid #dc3545;'>     <h4 style='color: #dc3545; margin-top: 0;'>Les causes externes</h4>     <ul style='font-size: 15px; line-height: 1.8; color: #2c3e50;'>       <li><strong>Historique :</strong> colonisation, exploitation des ressources</li>       <li><strong>Économique :</strong> dettes, règles du commerce international défavorables</li>       <li><strong>Géopolitique :</strong> guerres, conflits, instabilité régionale</li>     </ul>   </div>   <div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; margin-top: 15px; border-left: 5px solid #2980b9;'>     <p style='font-size: 14px; line-height: 1.6; color: #2c3e50;'><strong>💡 À retenir :</strong> Le sous-développement est souvent le résultat d'une combinaison de causes internes et externes.</p>   </div> </div>",
    "texteParle": "Pourquoi certains pays sont-ils sous-développés ? Les causes sont multiples. Il y a d'abord les causes internes : l'instabilité politique, la corruption, la mauvaise gouvernance. Il y a aussi des causes économiques comme la faible industrialisation. Les causes sociales, comme l'analphabétisme et la pauvreté, jouent aussi un rôle important. Mais il y a aussi des causes externes. L'histoire de la colonisation a laissé des traces profondes. Les règles du commerce international sont souvent défavorables aux pays pauvres. Et les conflits et les guerres freinent le développement. C'est souvent une combinaison de ces causes qui maintient un pays dans le sous-développement.",
    "note": "Le sous-développement est un phénomène complexe qui ne peut pas être attribué à une seule cause."
  },
  {
    "titre": "Les ressources humaines et financières",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'>   <h3 style='color: #2c3e50; text-align: center; border-bottom: 2px solid #2980b9; padding-bottom: 10px;'>Les ressources du développement</h3>   <div style='background-color: #e8f4f8; padding: 15px; border-radius: 10px; margin-top: 15px;'>     <h4 style='color: #2980b9; margin-top: 0;'>🧑‍🏫 Les ressources humaines</h4>     <ul style='font-size: 15px; line-height: 1.8; color: #2c3e50;'>       <li>Population active qualifiée</li>       <li>Niveau d'éducation et de formation</li>       <li>État de santé de la population</li>       <li>Esprit d'entreprise et créativité</li>     </ul>   </div>   <div style='background-color: #f0f8ff; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 5px solid #2980b9;'>     <h4 style='color: #2980b9; margin-top: 0;'>💰 Les ressources financières</h4>     <ul style='font-size: 15px; line-height: 1.8; color: #2c3e50;'>       <li>Investissements publics et privés</li>       <li>Aide au développement</li>       <li>Épargne nationale</li>       <li>Ressources fiscales (impôts)</li>     </ul>   </div>   <div style='background-color: #d4edda; padding: 12px; border-radius: 8px; margin-top: 15px; border: 2px solid #28a745;'>     <p style='font-size: 14px; line-height: 1.6; color: #2c3e50; text-align: center;'><strong>📌 À retenir :</strong> Les ressources humaines sont la ressource la plus précieuse pour le développement. Un pays qui investit dans l'éducation et la santé de sa population crée les conditions de son développement.</p>   </div> </div>",
    "texteParle": "Le développement nécessite des ressources. Il y a d'abord les ressources humaines : une population active, qualifiée, en bonne santé, et qui fait preuve de créativité et d'esprit d'entreprise. C'est la ressource la plus précieuse. Un pays peut avoir toutes les ressources naturelles du monde, s'il n'a pas des hommes et des femmes compétents et motivés, il ne pourra pas se développer. Il y a aussi les ressources financières : les investissements, l'aide au développement, l'épargne nationale, et les impôts. Ces ressources permettent de financer les infrastructures, l'éducation, la santé, et tous les investissements nécessaires au développement.",
    "note": "L'investissement dans l'éducation est le meilleur investissement pour le développement."
  },
  {
    "titre": "Indicateurs de développement en pratique",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'>   <h3 style='color: #2c3e50; text-align: center; border-bottom: 2px solid #2980b9; padding-bottom: 10px;'>Exemples d'indicateurs</h3>   <div style='overflow-x: auto; margin-top: 15px;'>     <table style='width: 100%; border-collapse: collapse; font-size: 13px;'>       <thead>         <tr style='background-color: #2980b9; color: white;'>           <th style='padding: 8px; border: 1px solid #ddd; text-align: center;'>Pays</th>           <th style='padding: 8px; border: 1px solid #ddd; text-align: center;'>PIB/habitant (USD)</th>           <th style='padding: 8px; border: 1px solid #ddd; text-align: center;'>IDH</th>           <th style='padding: 8px; border: 1px solid #ddd; text-align: center;'>Niveau</th>         </tr>       </thead>       <tbody>         <tr>           <td style='padding: 6px; border: 1px solid #ddd; text-align: center;'>Norvège</td>           <td style='padding: 6px; border: 1px solid #ddd; text-align: center;'>~80 000</td>           <td style='padding: 6px; border: 1px solid #ddd; text-align: center;'>0,957</td>           <td style='padding: 6px; border: 1px solid #ddd; text-align: center;'>🟢 Développé</td>         </tr>         <tr style='background-color: #f0f8ff;'>           <td style='padding: 6px; border: 1px solid #ddd; text-align: center;'>Cameroun</td>           <td style='padding: 6px; border: 1px solid #ddd; text-align: center;'>~1 600</td>           <td style='padding: 6px; border: 1px solid #ddd; text-align: center;'>0,563</td>           <td style='padding: 6px; border: 1px solid #ddd; text-align: center;'>🟡 Émergent</td>         </tr>         <tr>           <td style='padding: 6px; border: 1px solid #ddd; text-align: center;'>Niger</td>           <td style='padding: 6px; border: 1px solid #ddd; text-align: center;'>~590</td>           <td style='padding: 6px; border: 1px solid #ddd; text-align: center;'>0,394</td>           <td style='padding: 6px; border: 1px solid #ddd; text-align: center;'>🔴 Sous-développé</td>         </tr>       </tbody>     </table>   </div>   <div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; margin-top: 15px; border-left: 5px solid #2980b9;'>     <p style='font-size: 14px; line-height: 1.6; color: #2c3e50;'><strong>📌 À retenir :</strong> L'IDH et le PIB par habitant sont des indicateurs complémentaires pour mesurer le développement d'un pays.</p>   </div> </div>",
    "texteParle": "Voyons quelques exemples concrets d'indicateurs de développement. La Norvège est un pays développé avec un PIB par habitant très élevé et un IDH de 0,957, parmi les plus élevés du monde. Le Cameroun, lui, a un PIB par habitant d'environ 1600 dollars et un IDH de 0,563. C'est un pays émergent, qui progresse. Le Niger a un PIB par habitant très faible et un IDH de 0,394. C'est un pays sous-développé. Ces exemples montrent que le développement se mesure avec des indicateurs variés, et qu'il y a de grandes différences entre les pays.",
    "note": "Les écarts de développement entre les pays restent très importants."
  },
  {
    "titre": "Le développement durable",
    "contenu": "<div style='font-family: Arial, sans-serif; padding: 10px;'>   <h3 style='color: #2c3e50; text-align: center; border-bottom: 2px solid #2980b9; padding-bottom: 10px;'>Le développement durable</h3>   <div style='background-color: #e8f4f8; padding: 15px; border-radius: 10px; margin-top: 15px;'>     <h4 style='color: #2980b9; margin-top: 0;'>🌍 Qu'est-ce que le développement durable ?</h4>     <p style='font-size: 16px; line-height: 1.6; color: #2c3e50;'>Le <strong>développement durable</strong> est un développement qui répond aux besoins du présent sans compromettre la capacité des générations futures à répondre aux leurs.</p>   </div>   <div style='background-color: #d4edda; padding: 15px; border-radius: 10px; margin-top: 15px; border: 2px solid #28a745;'>     <h4 style='color: #28a745; margin-top: 0;'>Les trois piliers du développement durable</h4>     <ul style='font-size: 15px; line-height: 1.8; color: #2c3e50;'>       <li><strong>Économique :</strong> croissance respectueuse de l'environnement</li>       <li><strong>Social :</strong> équité, solidarité, lutte contre les inégalités</li>       <li><strong>Environnemental :</strong> protection des ressources naturelles</li>     </ul>   </div>   <div style='background-color: #fff3cd; padding: 12px; border-radius: 8px; margin-top: 15px; border: 1px solid #ffc107;'>     <p style='font-size: 14px; line-height: 1.6; color: #2c3e50; text-align: center;'><strong>💡 Citation :</strong> \"Nous n'héritons pas de la Terre de nos ancêtres, nous l'empruntons à nos enfants.\" - Saint-Exupéry</p>\\n  </div>\\n</div>",
    "texteParle": ";
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;

    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            if (header) header.style.background = 'rgba(15, 23, 42, 0.85)';
            if (footer) footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            if (header) header.style.background = 'rgba(255, 255, 255, 0.85)';
            if (footer) footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
            // Ajouter l'écouteur d'événement click
            themeBtn.addEventListener('click', toggleTheme);
        }
    });
</script>
