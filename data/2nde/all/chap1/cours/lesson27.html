<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>

    <!-- jQuery -->

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) - ajouté par le script de thème */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES

    const slides = [
  {
    "titre": "Leçon 27 : Pronoms personnels au datif",
    "contenu": "<div style='padding: 10px;'><h2 style='color: #2c3e50;'>Willkommen zur neuen Lektion!</h2><p style='font-size: 1.1rem;'>Aujourd'hui, nous allons apprendre les <strong>pronoms personnels au datif</strong>.</p><div style='background-color: #e8f4f8; padding: 15px; border-radius: 10px; margin-top: 15px;'><p style='color: #1a5276; margin:0;'><strong>🎯 Objectif :</strong> Savoir utiliser les pronoms personnels au datif pour remplacer les compléments d'objet indirect.</p></div><div style='background-color: #fef9e7; padding: 10px; border-radius: 8px; margin-top: 10px;'><p style='color: #7d6608; margin:0;'>📌 <strong>Rappel :</strong> Le datif répond à la question <em>\"Wem?\"</em> (À qui ?).</p></div></div>",

    "note": "Introduction aux pronoms personnels au datif."
  },
  {
    "titre": "Les pronoms personnels au datif",
    "contenu": "<div style='padding: 10px;'><p style='font-weight: bold;'>Voici les pronoms personnels au datif :</p><table style='width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.95rem;'><thead><tr style='background: #2c3e50; color: white;'><th style='padding: 10px; border: 1px solid #ddd;'>Personne</th><th style='padding: 10px; border: 1px solid #ddd;'>Nominatif</th><th style='padding: 10px; border: 1px solid #ddd;'>Accusatif</th><th style='padding: 10px; border: 1px solid #ddd;'>Datif</th></tr></thead><tbody><tr style='background: #f2f3f4;; color: #000000'><td style='padding: 10px; border: 1px solid #ddd;'>1ère sg</td><td style='padding: 10px; border: 1px solid #ddd;'>ich</td><td style='padding: 10px; border: 1px solid #ddd;'>mich</td><td style='padding: 10px; border: 1px solid #ddd;'><span style='background: #f5b041; padding: 5px; border-radius: 5px;; color: #000000'>mir</span></td></tr><tr><td style='padding: 10px; border: 1px solid #ddd;'>2ème sg</td><td style='padding: 10px; border: 1px solid #ddd;'>du</td><td style='padding: 10px; border: 1px solid #ddd;'>dich</td><td style='padding: 10px; border: 1px solid #ddd;'><span style='background: #f5b041; padding: 5px; border-radius: 5px;; color: #000000'>dir</span></td></tr><tr style='background: #f2f3f4;; color: #000000'><td style='padding: 10px; border: 1px solid #ddd;'>3ème sg (masc.)</td><td style='padding: 10px; border: 1px solid #ddd;'>er</td><td style='padding: 10px; border: 1px solid #ddd;'>ihn</td><td style='padding: 10px; border: 1px solid #ddd;'><span style='background: #f5b041; padding: 5px; border-radius: 5px;; color: #000000'>ihm</span></td></tr><tr><td style='padding: 10px; border: 1px solid #ddd;'>3ème sg (fém.)</td><td style='padding: 10px; border: 1px solid #ddd;'>sie</td><td style='padding: 10px; border: 1px solid #ddd;'>sie</td><td style='padding: 10px; border: 1px solid #ddd;'><span style='background: #f5b041; padding: 5px; border-radius: 5px;; color: #000000'>ihr</span></td></tr><tr style='background: #f2f3f4;; color: #000000'><td style='padding: 10px; border: 1px solid #ddd;'>3ème sg (neutre)</td><td style='padding: 10px; border: 1px solid #ddd;'>es</td><td style='padding: 10px; border: 1px solid #ddd;'>es</td><td style='padding: 10px; border: 1px solid #ddd;'><span style='background: #f5b041; padding: 5px; border-radius: 5px;; color: #000000'>ihm</span></td></tr><tr><td style='padding: 10px; border: 1px solid #ddd;'>1ère pl</td><td style='padding: 10px; border: 1px solid #ddd;'>wir</td><td style='padding: 10px; border: 1px solid #ddd;'>uns</td><td style='padding: 10px; border: 1px solid #ddd;'><span style='background: #f5b041; padding: 5px; border-radius: 5px;; color: #000000'>uns</span></td></tr><tr style='background: #f2f3f4;; color: #000000'><td style='padding: 10px; border: 1px solid #ddd;'>2ème pl</td><td style='padding: 10px; border: 1px solid #ddd;'>ihr</td><td style='padding: 10px; border: 1px solid #ddd;'>euch</td><td style='padding: 10px; border: 1px solid #ddd;'><span style='background: #f5b041; padding: 5px; border-radius: 5px;; color: #000000'>euch</span></td></tr><tr><td style='padding: 10px; border: 1px solid #ddd;'>3ème pl</td><td style='padding: 10px; border: 1px solid #ddd;'>sie</td><td style='padding: 10px; border: 1px solid #ddd;'>sie</td><td style='padding: 10px; border: 1px solid #ddd;'><span style='background: #f5b041; padding: 5px; border-radius: 5px;; color: #000000'>ihnen</span></td></tr><tr style='background: #f2f3f4;; color: #000000'><td style='padding: 10px; border: 1px solid #ddd;'>Politesse</td><td style='padding: 10px; border: 1px solid #ddd;'>Sie</td><td style='padding: 10px; border: 1px solid #ddd;'>Sie</td><td style='padding: 10px; border: 1px solid #ddd;'><span style='background: #f5b041; padding: 5px; border-radius: 5px;; color: #000000'>Ihnen</span></td></tr></tbody></table><div style='background: #fdedec; padding: 15px; border-radius: 10px; margin-top: 20px;; color: #000000'><p style='color: #922b21; margin:0;'><strong>🔑 Règle à retenir :</strong><br>• 1ère et 2ème personnes : <strong>mir, dir, uns, euch</strong><br>• 3ème personne masculin et neutre : <strong>ihm</strong><br>• 3ème personne féminin : <strong>ihr</strong><br>• 3ème personne pluriel et politesse : <strong>ihnen / Ihnen</strong></p></div></div>",
    "texteParle": "Voici le tableau des pronoms personnels au datif. Regardez bien les différences avec le nominatif et l'accusatif. Les formes du datif sont : 'mir' pour 'ich', 'dir' pour 'du', 'ihm' pour 'er' et 'es', 'ihr' pour 'sie' (elle), 'uns' pour 'wir', 'euch' pour 'ihr', 'ihnen' pour 'sie' (ils/elles) et 'Ihnen' pour la politesse. Retenez bien ces formes car elles sont très utilisées dans la vie quotidienne.",
    "note": "Tableau complet des pronoms personnels au datif."
  },
  {
    "titre": "Pronoms au datif vs accusatif",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2c3e50;'>Attention aux confusions !</h3><div style='background: #f2d7d5; padding: 15px; border-radius: 10px;; color: #000000'><p style='color: #641e16;'><strong>⚠️ Les formes à ne pas confondre :</strong></p></div><table style='width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.95rem;'><thead><tr style='background: #2c3e50; color: white;'><th style='padding: 8px; border: 1px solid #ddd;'>Personne</th><th style='padding: 8px; border: 1px solid #ddd;'>Accusatif</th><th style='padding: 8px; border: 1px solid #ddd;'>Datif</th><th style='padding: 8px; border: 1px solid #ddd;'>Exemple</th></tr></thead><tbody><tr style='background: #f2f3f4;; color: #000000'><td style='padding: 8px; border: 1px solid #ddd;'>ich</td><td style='padding: 8px; border: 1px solid #ddd;'>mich</td><td style='padding: 8px; border: 1px solid #ddd;'>mir</td><td style='padding: 8px; border: 1px solid #ddd;'><em>Ich sehe <u>mich</u>.<br>Ich helfe <u>mir</u>.</em></td></tr><tr><td style='padding: 8px; border: 1px solid #ddd;'>du</td><td style='padding: 8px; border: 1px solid #ddd;'>dich</td><td style='padding: 8px; border: 1px solid #ddd;'>dir</td><td style='padding: 8px; border: 1px solid #ddd;'><em>Ich sehe <u>dich</u>.<br>Ich helfe <u>dir</u>.</em></td></tr><tr style='background: #f2f3f4;; color: #000000'><td style='padding: 8px; border: 1px solid #ddd;'>er</td><td style='padding: 8px; border: 1px solid #ddd;'>ihn</td><td style='padding: 8px; border: 1px solid #ddd;'>ihm</td><td style='padding: 8px; border: 1px solid #ddd;'><em>Ich sehe <u>ihn</u>.<br>Ich helfe <u>ihm</u>.</em></td></tr><tr><td style='padding: 8px; border: 1px solid #ddd;'>sie (elle)</td><td style='padding: 8px; border: 1px solid #ddd;'>sie</td><td style='padding: 8px; border: 1px solid #ddd;'>ihr</td><td style='padding: 8px; border: 1px solid #ddd;'><em>Ich sehe <u>sie</u>.<br>Ich helfe <u>ihr</u>.</em></td></tr><tr style='background: #f2f3f4;; color: #000000'><td style='padding: 8px; border: 1px solid #ddd;'>es</td><td style='padding: 8px; border: 1px solid #ddd;'>es</td><td style='padding: 8px; border: 1px solid #ddd;'>ihm</td><td style='padding: 8px; border: 1px solid #ddd;'><em>Ich sehe <u>es</u>.<br>Ich helfe <u>ihm</u>.</em></td></tr><tr><td style='padding: 8px; border: 1px solid #ddd;'>wir</td><td style='padding: 8px; border: 1px solid #ddd;'>uns</td><td style='padding: 8px; border: 1px solid #ddd;'>uns</td><td style='padding: 8px; border: 1px solid #ddd;'><em>Du siehst <u>uns</u>.<br>Du hilfst <u>uns</u>.</em></td></tr><tr style='background: #f2f3f4;; color: #000000'><td style='padding: 8px; border: 1px solid #ddd;'>ihr</td><td style='padding: 8px; border: 1px solid #ddd;'>euch</td><td style='padding: 8px; border: 1px solid #ddd;'>euch</td><td style='padding: 8px; border: 1px solid #ddd;'><em>Ich sehe <u>euch</u>.<br>Ich helfe <u>euch</u>.</em></td></tr><tr><td style='padding: 8px; border: 1px solid #ddd;'>sie (pluriel)</td><td style='padding: 8px; border: 1px solid #ddd;'>sie</td><td style='padding: 8px; border: 1px solid #ddd;'>ihnen</td><td style='padding: 8px; border: 1px solid #ddd;'><em>Ich sehe <u>sie</u>.<br>Ich helfe <u>ihnen</u>.</em></td></tr></tbody></table></div>",
    "texteParle": "Il est très important de ne pas confondre les pronoms à l'accusatif et au datif. Par exemple, 'mich' et 'mir' ne sont pas interchangeables. 'Mich' est pour le complément d'objet direct, 'mir' pour le complément d'objet indirect. De même, 'dich' et 'dir', 'ihn' et 'ihm', 'sie' et 'ihr'... Pour 'wir' et 'ihr', les formes sont les mêmes à l'accusatif et au datif : 'uns' et 'euch'. Pour 'sie' (pluriel), on a 'sie' à l'accusatif et 'ihnen' au datif. La politesse 'Sie' devient 'Ihnen' au datif.",
    "note": "Comparaison entre les pronoms à l'accusatif et au datif."
  },
  {
    "titre": "La formule 'Wie geht es...'",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2c3e50;'>Comment ça va ?</h3><div style='background: #ebf5fb; padding: 15px; border-radius: 10px;; color: #000000'><p style='color: #154360;'><strong>Structure :</strong><br><em>Wie geht es <u>+ DATIF</u> ?</em></p></div><div style='background: #fef9e7; padding: 15px; border-radius: 10px; margin-top: 15px;; color: #000000'><p style='color: #7d6608;'><strong>Exemples avec les pronoms au datif :</strong></p><table style='width: 100%; border-collapse: collapse;'><tr style='border-bottom: 1px solid #ddd;'><td style='padding: 8px;'><em>Wie geht es <span style='background: #f5b041; padding: 3px; border-radius: 3px;; color: #000000'>dir</span>?</em></td><td style='padding: 8px;'>Comment vas-tu ?</td></tr><tr style='border-bottom: 1px solid #ddd;'><td style='padding: 8px;'><em>Wie geht es <span style='background: #f5b041; padding: 3px; border-radius: 3px;; color: #000000'>ihm</span>?</em></td><td style='padding: 8px;'>Comment va-t-il ?</td></tr><tr style='border-bottom: 1px solid #ddd;'><td style='padding: 8px;'><em>Wie geht es <span style='background: #f5b041; padding: 3px; border-radius: 3px;; color: #000000'>ihr</span>?</em></td><td style='padding: 8px;'>Comment va-t-elle ?</td></tr><tr style='border-bottom: 1px solid #ddd;'><td style='padding: 8px;'><em>Wie geht es <span style='background: #f5b041; padding: 3px; border-radius: 3px;; color: #000000'>uns</span>?</em></td><td style='padding: 8px;'>Comment allons-nous ?</td></tr><tr style='border-bottom: 1px solid #ddd;'><td style='padding: 8px;'><em>Wie geht es <span style='background: #f5b041; padding: 3px; border-radius: 3px;; color: #000000'>euch</span>?</em></td><td style='padding: 8px;'>Comment allez-vous (pluriel) ?</td></tr><tr><td style='padding: 8px;'><em>Wie geht es <span style='background: #f5b041; padding: 3px; border-radius: 3px;; color: #000000'>Ihnen</span>?</em></td><td style='padding: 8px;'>Comment allez-vous (politesse) ?</td></tr></table></div><div style='background: #d5f5e3; padding: 10px; border-radius: 8px; margin-top: 10px;; color: #000000'><p style='color: #145a32; margin:0;'><strong>Réponse typique :</strong> <em>Es geht <u>mir</u> gut.</em> (Je vais bien.)</p></div></div>",
    "texteParle": "Une formule très utile que vous utiliserez tous les jours : 'Wie geht es...' pour demander comment va quelqu'un. Cette formule est toujours suivie du datif. Par exemple, 'Wie geht es dir ?' pour demander à un ami. 'Wie geht es Ihnen ?' pour une personne que vous vouvoyez. 'Wie geht es ihm ?' pour un homme. 'Wie geht es ihr ?' pour une femme. Et la réponse est toujours 'Es geht mir gut' ou 'Es geht mir schlecht'. C'est une expression incontournable en allemand.",
    "note": "La formule 'Wie geht es...' est toujours suivie du datif."
  },
  {
    "titre": "Verbes qui exigent le datif",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2c3e50;'>Verbes avec datif</h3><p>Certains verbes sont toujours suivis du datif. Il faut les apprendre par cœur.</p><div style='background: #d5f5e3; padding: 15px; border-radius: 10px; margin-top: 10px;; color: #000000'><p style='color: #145a32;'><strong>Les plus courants avec leurs pronoms au datif :</strong></p><table style='width: 100%; border-collapse: collapse;'><tr style='border-bottom: 1px solid #ddd;'><td style='padding: 8px;'><strong>danken</strong></td><td style='padding: 8px;'>remercier</td><td style='padding: 8px;'><em>Ich danke <u>dir</u>.</em></td></tr><tr style='border-bottom: 1px solid #ddd;'><td style='padding: 8px;'><strong>helfen</strong></td><td style='padding: 8px;'>aider</td><td style='padding: 8px;'><em>Er hilft <u>mir</u>.</em></td></tr><tr style='border-bottom: 1px solid #ddd;'><td style='padding: 8px;'><strong>gefallen</strong></td><td style='padding: 8px;'>plaire</td><td style='padding: 8px;'><em>Das gefällt <u>mir</u>.</em></td></tr><tr style='border-bottom: 1px solid #ddd;'><td style='padding: 8px;'><strong>gratulieren</strong></td><td style='padding: 8px;'>féliciter</td><td style='padding: 8px;'><em>Wir gratulieren <u>ihm</u>.</em></td></tr><tr style='border-bottom: 1px solid #ddd;'><td style='padding: 8px;'><strong>gehören</strong></td><td style='padding: 8px;'>appartenir</td><td style='padding: 8px;'><em>Das gehört <u>mir</u>.</em></td></tr><tr><td style='padding: 8px;'><strong>scheinen</strong></td><td style='padding: 8px;'>sembler</td><td style='padding: 8px;'><em>Das scheint <u>ihm</u> gut.</em></td></tr></table></div><div style='background: #fdedec; padding: 10px; border-radius: 8px; margin-top: 10px;; color: #000000'><p style='color: #922b21; margin:0;'><strong>💡 Astuce :</strong> Ces verbes expriment souvent une relation entre les personnes ou un sentiment.</p></div></div>",
    "texteParle": "Il y a des verbes qui sont toujours suivis du datif. Il faut les connaître par cœur. Les plus courants sont : 'danken' (remercier), 'helfen' (aider), 'gefallen' (plaire), 'gratulieren' (féliciter), 'gehören' (appartenir) et 'scheinen' (sembler). Par exemple, on dit 'Ich danke dir' et non pas 'Ich danke dich'. On dit 'Das gefällt mir' et non pas 'Das gefällt mich'. Ces verbes sont très utilisés dans la conversation courante. Prenez le temps de les mémoriser.",
    "note": "Verbes courants qui exigent le datif : danken, helfen, gefallen, etc."
  },
  {
    "titre": "Exemples avec les pronoms au datif",
    "contenu": "<div style='padding: 10px;'><p style='font-weight: bold;'>Observer ces phrases avec les pronoms au datif :</p><div style='background: #eafaf1; padding: 15px; border-radius: 10px; margin: 10px 0;; color: #000000'><p style='color: #1e8449;'><strong>Avec 'mir' :</strong><br><em>Kannst du <u>mir</u> helfen?</em><br>(Peux-tu m'aider ?)<br><em>Das Buch gehört <u>mir</u>.</em><br>(Ce livre m'appartient.)</p></div><div style='background: #ebf5fb; padding: 15px; border-radius: 10px; margin: 10px 0;; color: #000000'><p style='color: #154360;'><strong>Avec 'dir' :</strong><br><em>Ich danke <u>dir</u>.</em><br>(Je te remercie.)<br><em>Wie geht es <u>dir</u>?</em><br>(Comment vas-tu ?)</p></div><div style='background: #fef9e7; padding: 15px; border-radius: 10px; margin: 10px 0;; color: #000000'><p style='color: #7d6608;'><strong>Avec 'ihm' et 'ihr' :</strong><br><em>Wir gratulieren <u>ihm</u>.</em><br>(Nous le félicitons.)<br><em>Ich helfe <u>ihr</u>.</em><br>(Je l'aide.)</p></div><div style='background: #f2d7d5; padding: 15px; border-radius: 10px; margin: 10px 0;; color: #000000'><p style='color: #641e16;'><strong>Avec 'uns', 'euch', 'ihnen' :</strong><br><em>Sie hilft <u>uns</u>.</em><br>(Elle nous aide.)<br><em>Ich danke <u>euch</u>.</em><br>(Je vous remercie - pluriel.)<br><em>Das gefällt <u>ihnen</u>.</em><br>(Cela leur plaît.)</p></div></div>",
    "texteParle": "Prenons des exemples concrets avec chaque pronom au datif. Avec 'mir' : 'Kannst du mir helfen ?' (Peux-tu m'aider ?) et 'Das Buch gehört mir' (Ce livre est à moi). Avec 'dir' : 'Ich danke dir' (Je te remercie) et 'Wie geht es dir ?' (Comment vas-tu ?). Avec 'ihm' et 'ihr' : 'Wir gratulieren ihm' (Nous le félicitons) et 'Ich helfe ihr' (Je l'aide). Avec 'uns', 'euch', 'ihnen' : 'Sie hilft uns', 'Ich danke euch', 'Das gefällt ihnen'. Ces exemples vous aideront à bien utiliser les pronoms au datif.",
    "note": "Exemples d'utilisation des pronoms personnels au datif."
  },
  {
    "titre": "Position des pronoms au datif",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2c3e50;'>Où placer le pronom au datif ?</h3><div style='background: #d5f5e3; padding: 15px; border-radius: 10px;; color: #000000'><p style='color: #145a32;'><strong>Règle :</strong> Le pronom au datif se place <strong>après le verbe</strong> ou <strong>après le sujet</strong> selon la structure.</p></div><div style='background: #ebf5fb; padding: 15px; border-radius: 10px; margin-top: 15px;; color: #000000'><p style='color: #154360;'><strong>Structure 1 :</strong> Sujet + Verbe + Pronom datif + Complément</p><p style='color: #154360;'><em>Ich gebe <u>ihm</u> ein Buch.</em><br>(Je lui donne un livre.)</p></div><div style='background: #fef9e7; padding: 15px; border-radius: 10px; margin-top: 15px;; color: #000000'><p style='color: #7d6608;'><strong>Structure 2 :</strong> Sujet + Verbe + Pronom datif + Pronom accusatif</p><p style='color: #7d6608;'><em>Ich gebe <u>ihm</u> <u>es</u>.</em><br>(Je le lui donne.)<br><span style='font-size: 0.9rem;'>⚠️ Quand les deux sont des pronoms, l'accusatif peut précéder le datif.</span></p></div><div style='background: #f2d7d5; padding: 15px; border-radius: 10px; margin-top: 15px;; color: #000000'><p style='color: #641e16;'><strong>Structure 3 :</strong> Mot interrogatif + Verbe + Sujet + Pronom datif + Complément</p><p style='color: #641e16;'><em>Wem gibst du das Buch?</em><br>(À qui donnes-tu le livre ?)</p></div></div>",
    "texteParle": "La position des pronoms au datif dans la phrase est importante. En général, le pronom au datif se place après le verbe conjugué. Par exemple, 'Ich gebe ihm ein Buch' : 'ihm' est après 'gebe'. Quand il y a un pronom à l'accusatif en plus, l'ordre peut varier. Par exemple, 'Ich gebe ihm es' (je le lui donne) ou 'Ich gebe es ihm'. La première forme est plus courante. Dans une question avec 'wem', le pronom vient après le sujet : 'Wem gibst du das Buch ?'. Retenez bien ces positions.",
    "note": "Position des pronoms au datif dans la phrase."
  },
  {
    "titre": "L'interrogatif 'wem'",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2c3e50;'>Poser une question avec 'wem'</h3><div style='background: #ebf5fb; padding: 15px; border-radius: 10px;; color: #000000'><p style='color: #154360;'><strong>Wem</strong> = À qui ? (datif)</p><p style='color: #154360;'>On l'utilise pour questionner sur le complément d'objet indirect.</p></div><div style='background: #fef9e7; padding: 15px; border-radius: 10px; margin-top: 15px;; color: #000000'><p style='color: #7d6608;'><strong>Exemples :</strong></p><ul style='list-style-type: none; padding: 0;'><li style='padding: 5px;'>📌 <em><u>Wem</u> gibst du das Buch?</em><br>À qui donnes-tu le livre ?</li><li style='padding: 5px;'>📌 <em><u>Wem</u> gehört dieses Auto?</em><br>À qui appartient cette voiture ?</li><li style='padding: 5px;'>📌 <em><u>Wem</u> hilfst du?</em><br>À qui aides-tu ?</li><li style='padding: 5px;'>📌 <em><u>Wem</u> dankst du?</em><br>À qui remercies-tu ?</li></ul></div><div style='background: #f2d7d5; padding: 10px; border-radius: 8px; margin-top: 10px;; color: #000000'><p style='color: #641e16; margin:0;'><strong>⚠️ Attention :</strong> 'Wen' (accusatif) et 'Wem' (datif) sont différents !<br><em>Wen siehst du?</em> (Qui vois-tu ? - accusatif) vs <em>Wem hilfst du?</em> (À qui aides-tu ? - datif)</p></div></div>",
    "texteParle": "Pour poser des questions au datif, on utilise le mot interrogatif 'wem', qui signifie 'à qui'. C'est l'équivalent datif de 'wer' (qui au nominatif) et 'wen' (qui à l'accusatif). Par exemple, 'Wem gibst du das Buch ?' signifie 'À qui donnes-tu le livre ?'. 'Wem hilfst du ?' signifie 'À qui aides-tu ?'. Il est très important de ne pas confondre 'wen' et 'wem' car ils n'ont pas du tout la même fonction dans la phrase. 'Wen' est pour l'accusatif, 'wem' pour le datif.",
    "note": "'Wem' est l'interrogatif du datif, il signifie 'à qui'."
  },
  {
    "titre": "Points clés à retenir",
    "contenu": "<div style='padding: 10px;'><div style='background: #d4efdf; padding: 15px; border-radius: 10px; margin: 5px 0;; color: #000000'><p style='color: #145a32; margin:0;'>📘 <strong>Pronoms au datif :</strong> <em>mir, dir, ihm, ihr, ihm, uns, euch, ihnen, Ihnen</em></p></div><div style='background: #d6eaf8; padding: 15px; border-radius: 10px; margin: 5px 0;; color: #000000'><p style='color: #154360; margin:0;'>📗 <strong>Formule essentielle :</strong> <em>Wie geht es + DATIF ?</em><br>Réponse : <em>Es geht mir gut.</em></p></div><div style='background: #fadbd8; padding: 15px; border-radius: 10px; margin: 5px 0;; color: #000000'><p style='color: #641e16; margin:0;'>📕 <strong>Verbes avec datif :</strong> <em>danken, helfen, gefallen, gratulieren, gehören, scheinen</em></p></div><div style='background: #fef9e7; padding: 15px; border-radius: 10px; margin: 5px 0;; color: #000000'><p style='color;
    // ================================================================

    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;

    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');

    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');

    // ================================================================
    // FONCTIONS

    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            if (header) header.style.background = 'rgba(15, 23, 42, 0.85)';
            if (footer) footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            if (header) header.style.background = 'rgba(255, 255, 255, 0.85)';
            if (footer) footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
            // Ajouter l'écouteur d'événement click
            themeBtn.addEventListener('click', toggleTheme);
        }
    });
</script>
