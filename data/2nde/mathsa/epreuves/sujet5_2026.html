<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Mathématiques 2nd A",
  "classe": "Seconde A",
  "sequence": "Séquence 5 : Dénombrement",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Comprendre les ensembles et les cardinaux (Diagramme de Venn)",
      "points": "5 pts",
      "enonce": "<div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; color: #1a1a1a;'>Dans une classe de <strong>30 élèves</strong>, on a posé la question suivante : <em>« Pratiquez-vous un sport ? »</em><br><br>Les réponses sont les suivantes :<br><ul><li>15 élèves pratiquent le football.</li><li>10 élèves pratiquent le basketball.</li><li>5 élèves pratiquent les deux sports.</li><li>8 élèves ne pratiquent aucun de ces deux sports.</li></ul><br>On note <span class='math inline'>\\( F \\)</span> l'ensemble des élèves pratiquant le football et <span class='math inline'>\\( B \\)</span> l'ensemble de ceux pratiquant le basketball.</div>",
      "questions": [
        {
          "question": "<div style='background-color: #f9f9f9; padding: 10px; border-radius: 6px; color: #1a1a1a;'><span style='font-weight: bold;'>1) </span> Représentez cette situation à l'aide d'un diagramme de Venn.<br>Précisez le nombre d'élèves dans chaque zone du diagramme.</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; color: #1a1a1a;'><div class='math-block'>$$\n\\begin{array}{c}\n\\text{Univers } (E) : 30 \\text{ élèves} \\\\\n\\text{Foot}(F) : 15 \\quad \\text{Basket}(B) : 10 \\\\\nF \\cap B : 5 \\quad \\overline{F \\cup B} : 8\n\\end{array}\n$$</div><br>On calcule ensuite :<br><ul><li><span class='math inline'>\\( F \\setminus B \\)</span> (football uniquement) : <span class='math inline'>\\(15 - 5 = 10\\)</span> élèves.</li><li><span class='math inline'>\\( B \\setminus F \\)</span> (basketball uniquement) : <span class='math inline'>\\(10 - 5 = 5\\)</span> élèves.</li><li><span class='math inline'>\\( F \\cup B \\)</span> (au moins un sport) : <span class='math inline'>\\(15 + 10 - 5 = 20\\)</span> élèves.</li><li>Ni l'un ni l'autre : <span class='math inline'>\\(30 - 20 = 8\\)</span> élèves (donné).</li></ul></div>"
        },
        {
          "question": "<div style='background-color: #f9f9f9; padding: 10px; border-radius: 6px; color: #1a1a1a;'><span style='font-weight: bold;'>2) </span> Calculez <span class='math inline'>\\( \\text{Card}(F \\cup B) \\)</span> en utilisant la formule adaptée.</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; color: #1a1a1a;'>On applique la formule du cardinal de l'union :<br><div class='math-block'>$$ \\text{Card}(F \\cup B) = \\text{Card}(F) + \\text{Card}(B) - \\text{Card}(F \\cap B) = 15 + 10 - 5 = 20 $$</div>Il y a donc <strong>20 élèves</strong> qui pratiquent au moins un des deux sports.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Compter des possibilités (Principe multiplicatif et Arbre de choix)",
      "points": "4 pts",
      "enonce": "<div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; color: #1a1a1a;'>Un restaurant propose un menu à 3 plats :<br><ul><li><strong>Entrée</strong> : Salade, Soupe ou Oeuf mimosa (3 choix).</li><li><strong>Plat principal</strong> : Poisson, Viande ou Pâtes (3 choix).</li><li><strong>Dessert</strong> : Fruit ou Gâteau (2 choix).</li></ul><br>Un client doit choisir un plat dans chaque catégorie.</div>",
      "questions": [
        {
          "question": "<div style='background-color: #f9f9f9; padding: 10px; border-radius: 6px; color: #1a1a1a;'><span style='font-weight: bold;'>1) </span> Combien de menus différents ce client peut-il composer ? Justifiez par le principe multiplicatif.</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; color: #1a1a1a;'>Le nombre total de menus est le produit du nombre de choix pour chaque étape :<br><div class='math-block'>$$ 3 \\text{ (entrées)} \\times 3 \\text{ (plats)} \\times 2 \\text{ (desserts)} = 18 \\text{ menus} $$</div>Le client peut composer <strong>18 menus</strong> différents.</div>"
        },
        {
          "question": "<div style='background-color: #f9f9f9; padding: 10px; border-radius: 6px; color: #1a1a1a;'><span style='font-weight: bold;'>2) </span> Construisez l'arbre de choix correspondant à cette situation (au moins pour les premières branches).</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; color: #1a1a1a;'>L'arbre de choix se construit en partant de la racine et en ajoutant une branche pour chaque choix possible à chaque étape.<br><br>Les premières branches de l'arbre :<br>Niveau 1 (Entrée) : S, S, O (3 branches)<br>Niveau 2 (Plat) : chaque branche d'entrée se divise en 3 branches (P, V, Pâtes).<br>Niveau 3 (Dessert) : chaque branche de plat se divise en 2 branches (F, G).<br><br>Le nombre total de feuilles est <span class='math inline'>\\(3 \\times 3 \\times 2 = 18\\)</span>.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Applications et synthèse (Problème de recensement)",
      "points": "5 pts",
      "enonce": "<div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; color: #1a1a1a;'>Un professeur fait un sondage dans une classe de 25 élèves sur leurs langues vivantes. Il obtient les résultats suivants :<br><ul><li>18 élèves étudient l'anglais.</li><li>12 élèves étudient l'espagnol.</li><li>8 élèves étudient les deux langues.</li></ul><br>On note <span class='math inline'>\\( A \\)</span> l'ensemble des élèves qui étudient l'anglais et <span class='math inline'>\\( E \\)</span> l'ensemble de ceux qui étudient l'espagnol.</div>",
      "questions": [
        {
          "question": "<div style='background-color: #f9f9f9; padding: 10px; border-radius: 6px; color: #1a1a1a;'><span style='font-weight: bold;'>1) </span> Dessinez un diagramme de Venn pour représenter cette situation.</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; color: #1a1a1a;'>On place les données :<br><ul><li>Card(E) = 12</li><li>Card(A) = 18</li><li>Card(A ∩ E) = 8</li></ul><br>On en déduit :<br><ul><li>Anglais uniquement : 18 - 8 = 10</li><li>Espagnol uniquement : 12 - 8 = 4</li><li>Aucune langue : 25 - (10 + 8 + 4) = 25 - 22 = 3</li></ul><br>Le diagramme de Venn est donc un univers de 25 avec deux ensembles A et E qui s'intersectent avec 8 éléments, 10 dans la partie A seule, 4 dans la partie E seule, et 3 à l'extérieur.</div>"
        },
        {
          "question": "<div style='background-color: #f9f9f9; padding: 10px; border-radius: 6px; color: #1a1a1a;'><span style='font-weight: bold;'>2) </span> Calculez le nombre d'élèves qui étudient au moins une des deux langues.</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; color: #1a1a1a;'>On applique la formule :<br><div class='math-block'>$$ \\text{Card}(A \\cup E) = \\text{Card}(A) + \\text{Card}(E) - \\text{Card}(A \\cap E) = 18 + 12 - 8 = 22 $$</div>Il y a donc <strong>22 élèves</strong> qui étudient au moins une des deux langues.</div>"
        },
        {
          "question": "<div style='background-color: #f9f9f9; padding: 10px; border-radius: 6px; color: #1a1a1a;'><span style='font-weight: bold;'>3) </span> Combien d'élèves n'étudient aucune des deux langues ?</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; color: #1a1a1a;'>Le nombre d'élèves n'étudiant aucune langue est le complémentaire de l'union dans la classe :<br><div class='math-block'>$$ \\text{Card}(\\overline{A \\cup E}) = 25 - \\text{Card}(A \\cup E) = 25 - 22 = 3 $$</div>Il y a <strong>3 élèves</strong> qui n'étudient ni l'anglais ni l'espagnol.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Synthèse (Composition d'un code et dénombrement)",
      "points": "6 pts",
      "enonce": "<div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; color: #1a1a1a;'>Un nouveau système de verrouillage électronique nécessite la création d'un code d'accès.<br><br>Ce code est composé de <strong>4 caractères</strong> :<br><ul><li>Le 1er caractère est une lettre majuscule (26 possibilités).</li><li>Le 2ème caractère est un chiffre (0 à 9).</li><li>Le 3ème caractère est un symbole choisi parmi {!, @, #, $, %} (5 possibilités).</li><li>Le 4ème caractère est une lettre minuscule (26 possibilités).</li></ul></div>",
      "questions": [
        {
          "question": "<div style='background-color: #f9f9f9; padding: 10px; border-radius: 6px; color: #1a1a1a;'><span style='font-weight: bold;'>1) </span> Combien de codes différents peut-on former en tout ?</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; color: #1a1a1a;'>Par le principe multiplicatif, le nombre total de codes est :<br><div class='math-block'>$$ 26 \\times 10 \\times 5 \\times 26 = 26 \\times 10 \\times 5 \\times 26 = 33 800 $$</div>Il est possible de former <strong>33 800 codes</strong> différents.</div>"
        },
        {
          "question": "<div style='background-color: #f9f9f9; padding: 10px; border-radius: 6px; color: #1a1a1a;'><span style='font-weight: bold;'>2) </span> Si le code ne peut contenir ni le symbole '#' ni le chiffre '0', combien de codes peut-on former ?</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 12px; border-radius: 8px; color: #1a1a1a;'>On recalcule le nombre de choix pour les positions impactées :<br><ul><li>Lettre majuscule : 26 choix.</li><li>Chiffre : 9 choix (on exclut le 0).</li><li>Symbole : 4 choix (on exclut '#').</li><li>Lettre minuscule : 26 choix.</li></ul><br>Le nombre total de codes est : <span class='math inline'>\\(26 \\times 9 \\times 4 \\times 26 = 24 336\\)</span> codes.</div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
