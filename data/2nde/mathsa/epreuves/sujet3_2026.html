<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Maths 2nd A",
  "classe": "Seconde",
  "sequence": "Séquence 3",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Maîtrise des nombres et du calcul dans ℝ (6 points)",
      "points": "6 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6;'>Cet exercice évalue vos connaissances sur les ensembles de nombres, le calcul avec les radicaux, les puissances et la résolution d'équations simples.</div>",
      "questions": [
        {
          "question": "1) On considère les nombres suivants : <div class='math-block' style='background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 10px 0; text-align: center;'> \\( A = \\frac{3}{5} \\), \\( B = -2 \\), \\( C = \\sqrt{2} \\), \\( D = 0.333... \\), \\( E = \\frac{22}{7} \\) </div> a) Donner le plus petit ensemble (\\(\\mathbb{N}, \\mathbb{Z}, \\mathbb{D}, \\mathbb{Q}, \\mathbb{R}\\)) auquel appartient chacun de ces nombres. b) Justifier que \\(\\sqrt{2}\\) est un nombre irrationnel. (1.5 pt)",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'> <strong>Correction :</strong><br> a) A = 0.6 ∈ D ; B = -2 ∈ Z ; C = √2 ∈ R ; D = 0.333... = 1/3 ∈ Q ; E = 22/7 ∈ Q<br> b) √2 est irrationnel car il ne peut pas s'écrire comme le quotient de deux entiers (démonstration par l'absurde vue en cours). </div>"
        },
        {
          "question": "2) Effectuer les calculs suivants, en donnant le résultat sous la forme la plus simple possible : <div class='math-block' style='background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 10px 0; text-align: center;'> \\( A = \\sqrt{18} + \\sqrt{50} - \\sqrt{8} \\) <br> \\( B = \\frac{3}{\\sqrt{5}} \\) (rendre rationnel le dénominateur) </div> (1.5 pt)",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'> <strong>Correction :</strong><br> \\( A = 3\\sqrt{2} + 5\\sqrt{2} - 2\\sqrt{2} = 6\\sqrt{2} \\) <br> \\( B = \\frac{3}{\\sqrt{5}} \\times \\frac{\\sqrt{5}}{\\sqrt{5}} = \\frac{3\\sqrt{5}}{5} \\) </div>"
        },
        {
          "question": "3) Résoudre dans \\(\\mathbb{R}\\) les équations suivantes : <div class='math-block' style='background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 10px 0; text-align: center;'> (E1) : \\( |2x - 3| = 5 \\) <br> (E2) : \\( (3x + 1)(x - 4) = 0 \\) </div> (1.5 pt)",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'> <strong>Correction :</strong><br> (E1) : \\( 2x - 3 = 5 \\) ou \\( 2x - 3 = -5 \\) → \\( x = 4 \\) ou \\( x = -1 \\). S = {-1 ; 4} <br> (E2) : \\( 3x + 1 = 0 \\) ou \\( x - 4 = 0 \\) → \\( x = -1/3 \\) ou \\( x = 4 \\). S = {-1/3 ; 4} </div>"
        },
        {
          "question": "4) Écrire le nombre \\( 0.00045 \\) en notation scientifique. (0.5 pt)",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'> <strong>Correction :</strong><br> \\( 0.00045 = 4.5 \\times 10^{-4} \\) </div>"
        },
        {
          "question": "5) Donner l'arrondi d'ordre 2 du nombre \\( \\pi = 3.141592... \\). (0.5 pt)",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'> <strong>Correction :</strong><br> \\( \\pi \\approx 3.14 \\) </div>"
        },
        {
          "question": "6) Soit la fonction \\( f \\) définie sur \\(\\mathbb{R}\\) par \\( f(x) = 2x^2 - 3x + 1 \\). Mettre \\( f(x) \\) sous forme canonique. (1 pt)",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'> <strong>Correction :</strong><br> \\( f(x) = 2\\left(x^2 - \\frac{3}{2}x\\right) + 1 = 2\\left[\\left(x - \\frac{3}{4}\\right)^2 - \\frac{9}{16}\\right] + 1 = 2\\left(x - \\frac{3}{4}\\right)^2 - \\frac{1}{8} \\) </div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Calcul littéral et fonctions (5 points)",
      "points": "5 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6;'>Cet exercice porte sur le développement, la factorisation d'expressions et la maîtrise des fonctions affines.</div>",
      "questions": [
        {
          "question": "1) On considère l'expression \\( E(x) = (2x - 5)^2 - (x + 1)^2 \\). <br> a) Développer et réduire \\( E(x) \\). <br> b) Factoriser \\( E(x) \\) en utilisant une identité remarquable. (2 pts)",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'> <strong>Correction :</strong><br> a) \\( E(x) = (4x^2 - 20x + 25) - (x^2 + 2x + 1) = 3x^2 - 22x + 24 \\)<br> b) \\( E(x) = [(2x-5)-(x+1)] [(2x-5)+(x+1)] = (x - 6)(3x - 4) \\) </div>"
        },
        {
          "question": "2) Soit \\( f \\) une fonction affine définie par \\( f(x) = -2x + 3 \\). <br> a) Déterminer le sens de variation de \\( f \\). <br> b) Tracer la courbe représentative de \\( f \\) dans un repère orthonormé (Unité : 1 cm). <br> c) Résoudre graphiquement l'équation \\( f(x) = 1 \\). (2 pts)",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'> <strong>Correction :</strong><br> a) Le coefficient directeur est \\( a = -2 < 0 \\) donc f est décroissante sur \\(\\mathbb{R}\\).<br> b) Droite passant par (0 ; 3) et (1 ; 1).<br> c) Graphiquement, \\( f(x) = 1 \\) donne \\( x = 1 \\). </div>"
        },
        {
          "question": "3) Déterminer l'ensemble de définition de la fonction \\( g(x) = \\frac{x + 2}{x - 3} \\). (0.5 pt)",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'> <strong>Correction :</strong><br> \\( D_g = \\mathbb{R} \\setminus \\{3\\} \\) car le dénominateur doit être différent de 0. </div>"
        },
        {
          "question": "4) Factoriser l'expression \\( 3x^2 + 6x + 3 \\) en utilisant un facteur commun. (0.5 pt)",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'> <strong>Correction :</strong><br> \\( 3(x^2 + 2x + 1) = 3(x+1)^2 \\) </div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Équations, inéquations et systèmes (6 points)",
      "points": "6 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6;'>La résolution d'équations, d'inéquations et de systèmes est au cœur de ce problème.</div>",
      "questions": [
        {
          "question": "1) Résoudre dans \\(\\mathbb{R}\\) l'inéquation suivante, puis représenter l'ensemble des solutions sur une droite graduée. <div class='math-block' style='background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 10px 0; text-align: center;'> \\( \\frac{2x - 1}{x + 3} \\ge 0 \\) </div> (Indication : Dresser un tableau de signes) (2 pts)",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'> <strong>Correction :</strong><br> Valeurs annulant : \\( 2x-1 = 0 \\Rightarrow x = 1/2 \\) et \\( x+3=0 \\Rightarrow x = -3 \\) (valeur interdite).<br> Tableau de signes : S = ]-∞ ; -3[ ∪ [1/2 ; +∞[. </div>"
        },
        {
          "question": "2) Résoudre le système d'équations linéaires suivant par la méthode de votre choix (substitution ou combinaison). <div class='math-block' style='background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 10px 0; text-align: center;'> \\( \\begin{cases} 2x + y = 7 \\\\ x - y = 2 \\end{cases} \\) </div> (1.5 pts)",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'> <strong>Correction :</strong><br> Par addition : \\( 3x = 9 \\Rightarrow x = 3 \\). On remplace : \\( 3 - y = 2 \\Rightarrow y = 1 \\). S = {(3 ; 1)}. </div>"
        },
        {
          "question": "3) Résoudre dans \\(\\mathbb{R}^2\\) le système d'inéquations suivant et représenter graphiquement l'ensemble des solutions. <div class='math-block' style='background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 10px 0; text-align: center;'> \\( \\begin{cases} x + y \\ge 1 \\\\ y - x \\le 2 \\end{cases} \\) </div> (2 pts)",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'> <strong>Correction :</strong><br> On trace les droites \\( y = -x + 1 \\) et \\( y = x + 2 \\). L'ensemble solution est l'intersection des demi-plans au-dessus de la première et en-dessous de la seconde. </div>"
        },
        {
          "question": "4) Résoudre l'équation \\( \\frac{3x+1}{x-2} = 0 \\). (0.5 pt)",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'> <strong>Correction :</strong><br> \\( 3x+1 = 0 \\Rightarrow x = -1/3 \\), avec \\( x \\neq 2 \\). S = {-1/3}. </div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Situation de proportionnalité (4 points)",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6;'>Cet exercice applique la proportionnalité à une situation concrète.</div>",
      "questions": [
        {
          "question": "Un agriculteur vend des sacs de maïs. Le tableau ci-dessous donne la quantité de maïs et le prix correspondant. <div class='math-block' style='background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 10px 0; text-align: center;'> <table style='width:100%; border-collapse: collapse;'> <tr style='background: #ddd;'><th>Quantité (kg)</th><th>5</th><th>10</th><th>15</th><th>?</th></tr> <tr><td>Prix (FCFA)</td><td>2000</td><td>4000</td><td>6000</td><td>10000</td></tr> </table> </div> a) Justifier que c'est un tableau de proportionnalité. b) Calculer le coefficient de proportionnalité. c) Déterminer la quantité correspondant à 10000 FCFA. (2 pts)",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'> <strong>Correction :</strong><br> a) Le rapport prix/quantité est constant : 2000/5 = 4000/10 = 6000/15 = 400.<br> b) Le coefficient de proportionnalité est 400 FCFA/kg.<br> c) Quantité = 10000 / 400 = 25 kg. </div>"
        },
        {
          "question": "Un article coûte 25000 FCFA hors taxe (HT). La TVA est de 19.25%. <br> a) Calculer le montant de la TVA. <br> b) En déduire le prix Toutes Taxes Comprises (TTC). (1 pt)",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'> <strong>Correction :</strong><br> a) TVA = 25000 × 0.1925 = 4812.5 FCFA.<br> b) Prix TTC = 25000 + 4812.5 = 29812.5 FCFA. </div>"
        },
        {
          "question": "Sur un plan, une longueur de 4 cm représente 20 m en réalité. a) Déterminer l'échelle de ce plan. b) Quelle est la longueur réelle d'un segment mesurant 2.5 cm sur le plan ? (1 pt)",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'> <strong>Correction :</strong><br> a) Échelle = 4 cm / 2000 cm = 1/500.<br> b) Longueur réelle = 2.5 × 500 = 1250 cm = 12.5 m. </div>"
        }
      ]
    },
    {

      "points": "4 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6;'>Les statistiques et les outils de dénombrement sont explorés dans ce dernier exercice.</div>",
      "questions": [
        {
          "question": "Voici les notes obtenues par une classe de Seconde en Mathématiques : <div class='math-block' style='background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 10px 0; text-align: center;'> 12 ; 8 ; 15 ; 10 ; 12 ; 9 ; 14 ; 12 ; 13 ; 11 </div> a) Construire le tableau des effectifs et des fréquences (en pourcentage). b) Déterminer le mode de cette série. c) Calculer la moyenne de la classe. (2 pts)",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'> <strong>Correction :</strong><br> a) Tableau : 8(1,10%), 9(1,10%), 10(1,10%), 11(1,10%), 12(3,30%), 13(1,10%), 14(1,10%), 15(1,10%).<br> b) Le mode est 12.<br> c) Moyenne = (12+8+15+10+12+9+14+12+13+11)/10 = 116/10 = 11.6. </div>"
        },
        {
          "question": "Dans une classe, 20 élèves aiment les Mathématiques, 15 aiment la Physique, et 5 aiment les deux matières. <br> a) Représenter cette situation à l'aide d'un diagramme de Venn. <br> b) Combien d'élèves aiment au moins une de ces deux matières ? (1 pt)",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'> <strong>Correction :</strong><br> b) Card(M ∪ P) = Card(M) + Card(P) - Card(M ∩ P) = 20 + 15 - 5 = 30 élèves. </div>"
        },
        {
          "question": "Un menu est composé de 3 entrées, 2 plats principaux et 4 desserts. <br> Combien de menus différents peut-on composer ? (0.5 pt)",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'> <strong>Correction :</strong><br> Nombre de menus = 3 × 2 × 4 = 24. </div>"

        {
          "question": "Construire un diagramme circulaire représentant les notes de la question 1. (Justifier les angles) (0.5 pt)",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'> <strong>Correction :</strong><br> Angles : 8(36°), 9(36°), 10(36°), 11(36°), 12(108°), 13(36°), 14(36°), 15(36°). </div>"

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
