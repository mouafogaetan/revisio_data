<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Mathématiques 2nd A",
 "classe": "Seconde",
 "sequence": "Séquence 1",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Exercice 1 : Ensembles de nombres et intervalles",
     "points": "3 points",
     "enonce": "<div style='font-size: 16px; line-height: 1.6;'><p>On considère les nombres suivants :</p><p style='text-align: center; background: #f8f9fa; padding: 10px; border-radius: 6px;'>\\( -5 \\) ; \\( \\sqrt{2} \\) ; \\( \\frac{2}{3} \\) ; \\( \\pi \\) ; \\( 0,25 \\) ; \\( \\sqrt{9} \\)</p><ol style='list-style-type: decimal; padding-left: 20px;'><li>Pour chacun de ces nombres, déterminer le plus petit ensemble d'appartenance parmi \\( \\mathbb{N} \\), \\( \\mathbb{Z} \\), \\( \\mathbb{D} \\), \\( \\mathbb{Q} \\), \\( \\mathbb{R} \\). Justifier brièvement.</li><li>Représenter sur une droite graduée l'intervalle \\( I = [-2; 3[ \\) puis donner son intersection avec l'intervalle \\( J = ]1; 5] \\).</li><li>Compléter avec \\( \\in \\) ou \\( \\notin \\) : \\( 0 \\) ... \\( I \\) ; \\( 3 \\) ... \\( I \\) ; \\( 1,5 \\) ... \\( J \\).</li></ol></div>",
     "questions": [
       {
         "question": "1) Déterminer le plus petit ensemble d'appartenance pour chaque nombre.",
         "reponse": "<div style='font-size: 15px; line-height: 1.6;'><ul style='list-style-type: none; padding-left: 10px;'><li>\\( -5 \\in \\mathbb{Z} \\)</li><li>\\( \\sqrt{2} \\in \\mathbb{R} \\) (irrationnel)</li><li>\\( \\frac{2}{3} \\in \\mathbb{Q} \\)</li><li>\\( \\pi \\in \\mathbb{R} \\) (irrationnel)</li><li>\\( 0,25 = \\frac{1}{4} \\in \\mathbb{D} \\)</li><li>\\( \\sqrt{9} = 3 \\in \\mathbb{N} \\)</li></ul></div>"
       },
       {
         "question": "2) Représenter \\( I = [-2; 3[ \\) et donner \\( I \\cap J \\) avec \\( J = ]1; 5] \\).",
         "reponse": "<div style='font-size: 15px; line-height: 1.6;'><p>\\( I \\cap J = ]1; 3[ \\)</p></div>"
       },
       {
         "question": "3) Compléter avec \\( \\in \\) ou \\( \\notin \\) :",
         "reponse": "<div style='font-size: 15px; line-height: 1.6;'><p>\\( 0 \\in I \\) ; \\( 3 \\notin I \\) ; \\( 1,5 \\in J \\)</p></div>"
       }
     ]
   },
   {
     "titre": "Exercice 2 : Opérations et priorités",
     "points": "3 points",
     "enonce": "<div style='font-size: 16px; line-height: 1.6;'><p>Calculer et donner le résultat sous forme simplifiée :</p><ol style='list-style-type: decimal; padding-left: 20px;'><li>\\( A = \\frac{3}{4} - \\frac{5}{6} + \\frac{1}{2} \\)</li><li>\\( B = 2 - 3 \\times (-4) + 5 \\)</li><li>\\( C = \\sqrt{75} - 2\\sqrt{3} + \\sqrt{12} \\)</li><li>Rendre rationnel le dénominateur : \\( D = \\frac{5}{\\sqrt{3}} \\)</li></ol></div>",
     "questions": [
       {
         "question": "1) Calculer A",
         "reponse": "<div style='font-size: 15px; line-height: 1.6;'><p>\\( A = \\frac{9}{12} - \\frac{10}{12} + \\frac{6}{12} = \\frac{5}{12} \\)</p></div>"
       },
       {
         "question": "2) Calculer B",
         "reponse": "<div style='font-size: 15px; line-height: 1.6;'><p>\\( B = 2 - (-12) + 5 = 2 + 12 + 5 = 19 \\)</p></div>"
       },
       {
         "question": "3) Calculer C",
         "reponse": "<div style='font-size: 15px; line-height: 1.6;'><p>\\( C = \\sqrt{25 \\times 3} - 2\\sqrt{3} + \\sqrt{4 \\times 3} = 5\\sqrt{3} - 2\\sqrt{3} + 2\\sqrt{3} = 5\\sqrt{3} \\)</p></div>"
       },
       {
         "question": "4) Rendre rationnel D",
         "reponse": "<div style='font-size: 15px; line-height: 1.6;'><p>\\( D = \\frac{5}{\\sqrt{3}} = \\frac{5\\sqrt{3}}{3} \\)</p></div>"
       }
     ]
   },
   {
     "titre": "Exercice 3 : Comparaisons et encadrements",
     "points": "3 points",
     "enonce": "<div style='font-size: 16px; line-height: 1.6;'><ol style='list-style-type: decimal; padding-left: 20px;'><li>Comparer \\( \\frac{2}{5} \\) et \\( \\frac{3}{7} \\) en utilisant le signe de la différence.</li><li>Sachant que \\( 2 < x < 5 \\) et \\( -1 < y < 3 \\), encadrer \\( x+y \\), \\( x-y \\), \\( 3x \\) et \\( \\frac{y}{2} \\).</li><li>Donner la troncature à \\( 10^{-2} \\) et l'arrondi à \\( 10^{-2} \\) de \\( \\pi \\approx 3,141592... \\)</li></ol></div>",
     "questions": [
       {
         "question": "1) Comparer \\( \\frac{2}{5} \\) et \\( \\frac{3}{7} \\)",
         "reponse": "<div style='font-size: 15px; line-height: 1.6;'><p>\\( \\frac{2}{5} - \\frac{3}{7} = \\frac{14-15}{35} = -\\frac{1}{35} < 0 \\) donc \\( \\frac{2}{5} < \\frac{3}{7} \\)</p></div>"
       },
       {
         "question": "2) Encadrer \\( x+y \\), \\( x-y \\), \\( 3x \\) et \\( \\frac{y}{2} \\)",
         "reponse": "<div style='font-size: 15px; line-height: 1.6;'><ul style='list-style-type: none; padding-left: 10px;'><li>\\( 1 < x+y < 8 \\)</li><li>\\( -1 < x-y < 6 \\)</li><li>\\( 6 < 3x < 15 \\)</li><li>\\( -0,5 < \\frac{y}{2} < 1,5 \\)</li></ul></div>"
       },
       {
         "question": "3) Troncature et arrondi de \\( \\pi \\) à \\( 10^{-2} \\)",
         "reponse": "<div style='font-size: 15px; line-height: 1.6;'><p>Troncature : 3,14 ; Arrondi : 3,14</p></div>"
       }
     ]
   },
   {
     "titre": "Exercice 4 : Puissances et notation scientifique",
     "points": "3 points",
     "enonce": "<div style='font-size: 16px; line-height: 1.6;'><ol style='list-style-type: decimal; padding-left: 20px;'><li>Simplifier \\( A = 2^3 \\times 2^{-5} \\times 2^4 \\)</li><li>Simplifier \\( B = \\frac{3^5 \\times 9^2}{3^{-1}} \\)</li><li>Écrire le nombre \\( C = 0,00000025 \\) en notation scientifique.</li></ol></div>",
     "questions": [
       {
         "question": "1) Simplifier A",
         "reponse": "<div style='font-size: 15px; line-height: 1.6;'><p>\\( A = 2^{3-5+4} = 2^2 = 4 \\)</p></div>"
       },
       {
         "question": "2) Simplifier B",
         "reponse": "<div style='font-size: 15px; line-height: 1.6;'><p>\\( B = \\frac{3^5 \\times (3^2)^2}{3^{-1}} = \\frac{3^5 \\times 3^4}{3^{-1}} = 3^{5+4+1} = 3^{10} \\)</p></div>"
       },
       {
         "question": "3) Écrire C en notation scientifique",
         "reponse": "<div style='font-size: 15px; line-height: 1.6;'><p>\\( C = 2,5 \\times 10^{-7} \\)</p></div>"
       }
     ]
   },
   {
     "titre": "Exercice 5 : Problème de la vie courante",
     "points": "4 points",
     "enonce": "<div style='font-size: 16px; line-height: 1.6;'><p>Un agriculteur possède un terrain rectangulaire de longueur \\( L = 50 \\; m \\) et de largeur \\( l = 30 \\; m \\). Il souhaite clôturer ce terrain avec un grillage vendu à 2500 FCFA le mètre. Les poteaux pour fixer le grillage sont vendus à 1500 FCFA l'unité, et il faut un poteau tous les 5 mètres, y compris aux angles.</p><ol style='list-style-type: decimal; padding-left: 20px;'><li>Calculer le périmètre du terrain.</li><li>Déterminer le nombre de poteaux nécessaires.</li><li>Calculer le coût total de la clôture (grillage + poteaux).</li></ol></div>",
     "questions": [
       {
         "question": "1) Calculer le périmètre",
         "reponse": "<div style='font-size: 15px; line-height: 1.6;'><p>\\( P = 2(50 + 30) = 2 \\times 80 = 160 \\; m \\)</p></div>"
       },
       {
         "question": "2) Déterminer le nombre de poteaux",
         "reponse": "<div style='font-size: 15px; line-height: 1.6;'><p>Il y a un poteau tous les 5 m, donc \\( \\frac{160}{5} = 32 \\) poteaux.</p></div>"
       },
       {
         "question": "3) Coût total",
         "reponse": "<div style='font-size: 15px; line-height: 1.6;'><p>Coût du grillage : \\( 160 \\times 2500 = 400 000 \\) FCFA.<br>Coût des poteaux : \\( 32 \\times 1500 = 48 000 \\) FCFA.<br>Coût total : \\( 400 000 + 48 000 = 448 000 \\) FCFA.</p></div>"
       }
     ]
   },
   {
     "titre": "Exercice 6 : Factorisations",
     "points": "4 points",
     "enonce": "<div style='font-size: 16px; line-height: 1.6;'><p>Factoriser les expressions suivantes :</p><ol style='list-style-type: decimal; padding-left: 20px;'><li>\\( A = 9x^2 - 25 \\)</li><li>\\( B = 4x^2 - 12x + 9 \\)</li><li>\\( C = 16x^2 - 8x \\)</li><li>\\( D = x^2 + 6x + 5 \\) (mettre sous forme canonique)</li></ol></div>",
     "questions": [
       {
         "question": "1) Factoriser A",
         "reponse": "<div style='font-size: 15px; line-height: 1.6;'><p>\\( A = (3x - 5)(3x + 5) \\)</p></div>"
       },
       {
         "question": "2) Factoriser B",
         "reponse": "<div style='font-size: 15px; line-height: 1.6;'><p>\\( B = (2x - 3)^2 \\)</p></div>"
       },
       {
         "question": "3) Factoriser C",
         "reponse": "<div style='font-size: 15px; line-height: 1.6;'><p>\\( C = 8x(2x - 1) \\)</p></div>"
       },
       {
         "question": "4) Forme canonique de D",
         "reponse": "<div style='font-size: 15px; line-height: 1.6;'><p>\\( D = (x + 3)^2 - 4 \\)</p></div>"
       }
     ]
   }
 ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
