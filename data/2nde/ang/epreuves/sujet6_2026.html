<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Anglais",
  "classe": "Seconde",
  "sequence": "Sequence 6",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Reading Comprehension: Understanding Government Systems and Civic Rights",
      "points": "10 pts",
      "enonce": "<p style='font-size:1.1rem; line-height:1.7; color:#2d3748; margin-bottom:20px;'>Read the passage below carefully and answer the questions which follow.</p><div style='background-color:#f7fafc; padding:20px; border-radius:12px; border-left:6px solid #4a5568; color:#1a202c; font-size:1rem; line-height:1.8;'><p>Cameroon is a republic with a democratic system of government. Citizens elect their president and members of parliament through free and fair elections. The constitution guarantees fundamental rights such as freedom of speech, freedom of assembly, and the right to vote. However, like many countries, Cameroon faces challenges such as corruption, poverty, and unemployment.</p><p>Citizenship in Cameroon is acquired by birth or by naturalization. Naturalized citizens have the same rights and obligations as natural-born citizens, except that they cannot become president. Civic duties include paying taxes, respecting the law, and participating in community development.</p><p>In recent years, there has been a growing awareness of the importance of civic education. Many NGOs and humanitarian organizations, such as the Red Cross and UNICEF, work to educate citizens about their rights and responsibilities. They also promote volunteering, which helps young people develop skills and a sense of responsibility.</p><p>Volunteering can take place at the local or international level. At the local level, volunteers may help clean up their neighbourhood, assist in schools, or participate in health campaigns. At the international level, volunteers may work with organizations like Doctors Without Borders to provide medical care in crisis zones.</p></div>",
      "questions": [
        {
          "question": "<p style='font-weight:600; color:#2d3748; margin-bottom:8px;'>1) According to the passage, what type of government does Cameroon have?</p>",
          "reponse": "<p style='color:#2f855a;'>Cameroon is a republic with a democratic system of government.</p>"
        },
        {
          "question": "<p style='font-weight:600; color:#2d3748; margin-bottom:8px;'>2) Name two fundamental rights guaranteed by the constitution according to the passage.</p>",
          "reponse": "<p style='color:#2f855a;'>Freedom of speech and freedom of assembly (or the right to vote).</p>"
        },
        {
          "question": "<p style='font-weight:600; color:#2d3748; margin-bottom:8px;'>3) What is the difference between a natural-born citizen and a naturalized citizen mentioned in the text?</p>",
          "reponse": "<p style='color:#2f855a;'>Naturalized citizens have the same rights and obligations as natural-born citizens, but they cannot become president.</p>"
        },
        {
          "question": "<p style='font-weight:600; color:#2d3748; margin-bottom:8px;'>4) What are some civic duties mentioned in the passage?</p>",
          "reponse": "<p style='color:#2f855a;'>Paying taxes, respecting the law, and participating in community development.</p>"
        },
        {
          "question": "<p style='font-weight:600; color:#2d3748; margin-bottom:8px;'>5) According to the text, what are the benefits of volunteering for young people?</p>",
          "reponse": "<p style='color:#2f855a;'>Volunteering helps young people develop skills and a sense of responsibility.</p>"
        },
        {
          "question": "<p style='font-weight:600; color:#2d3748; margin-bottom:8px;'>6) Give an example of a local volunteering activity mentioned in the passage.</p>",
          "reponse": "<p style='color:#2f855a;'>Helping to clean up their neighbourhood, assisting in schools, or participating in health campaigns.</p>"
        }
      ]
    },
    {
      "titre": "Grammar: Tenses, Conditionals, and Reported Speech",
      "points": "6 pts",
      "enonce": "<p style='font-size:1.1rem; line-height:1.7; color:#2d3748;'>Complete the following sentences with the correct tense or form.</p>",
      "questions": [
        {
          "question": "<p style='font-weight:500; color:#2d3748; margin-bottom:6px;'>1) Every day, the students _______ (to study) English for two hours.</p>",
          "reponse": "<p style='color:#2f855a;'>study (present simple for habits)</p>"
        },
        {
          "question": "<p style='font-weight:500; color:#2d3748; margin-bottom:6px;'>2) Right now, the teacher _______ (to explain) the lesson on conditionals.</p>",
          "reponse": "<p style='color:#2f855a;'>is explaining (present continuous for actions in progress)</p>"
        },
        {
          "question": "<p style='font-weight:500; color:#2d3748; margin-bottom:6px;'>3) Last year, we _______ (to visit) the National Museum.</p>",
          "reponse": "<p style='color:#2f855a;'>visited (past simple for completed past action)</p>"
        },
        {
          "question": "<p style='font-weight:500; color:#2d3748; margin-bottom:6px;'>4) If she _______ (to study) harder, she would pass the exam.</p>",
          "reponse": "<p style='color:#2f855a;'>studied (type 2 conditional)</p>"
        },
        {
          "question": "<p style='font-weight:500; color:#2d3748; margin-bottom:6px;'>5) He said that he _______ (to finish) his homework already.</p>",
          "reponse": "<p style='color:#2f855a;'>had finished (reported speech: past perfect)</p>"
        },
        {
          "question": "<p style='font-weight:500; color:#2d3748; margin-bottom:6px;'>6) If I _______ (to know) the answer, I would have told you.</p>",
          "reponse": "<p style='color:#2f855a;'>had known (type 3 conditional)</p>"
        }
      ]
    },
    {
      "titre": "Vocabulary: Synonyms, Antonyms, and Word Formation",
      "points": "4 pts",
      "enonce": "<p style='font-size:1.1rem; line-height:1.7; color:#2d3748; margin-bottom:20px;'>Complete the following tasks on vocabulary.</p>",
      "questions": [
        {
          "question": "<p style='font-weight:500; color:#2d3748; margin-bottom:6px;'>1) Find a synonym for the word <strong>\"responsible\"</strong>.</p>",
          "reponse": "<p style='color:#2f855a;'>accountable / trustworthy / reliable</p>"
        },
        {
          "question": "<p style='font-weight:500; color:#2d3748; margin-bottom:6px;'>2) Find an antonym for the word <strong>\"expensive\"</strong>.</p>",
          "reponse": "<p style='color:#2f855a;'>cheap / affordable / inexpensive</p>"
        },
        {
          "question": "<p style='font-weight:500; color:#2d3748; margin-bottom:6px;'>3) Form an adjective from the noun <strong>\"help\"</strong>.</p>",
          "reponse": "<p style='color:#2f855a;'>helpful</p>"
        },
        {
          "question": "<p style='font-weight:500; color:#2d3748; margin-bottom:6px;'>4) Form a noun from the verb <strong>\"know\"</strong>.</p>",
          "reponse": "<p style='color:#2f855a;'>knowledge</p>"
        }
      ]
    },
    {
      "titre": "Written Composition: Dialogue Writing",
      "points": "5 pts",
      "enonce": "<p style='font-size:1.1rem; line-height:1.7; color:#2d3748; margin-bottom:20px;'>Write a dialogue of about 10 to 12 exchanges between two students discussing the dangers of cyberbullying and how to stay safe on social media. Use appropriate vocabulary from the ICT and social media lesson.</p>",
      "questions": [
        {
          "question": "<p style='font-weight:600; color:#2d3748; margin-bottom:8px;'>Write a dialogue respecting punctuation, politeness formulas, and using at least five vocabulary words from the ICT lesson.</p>",
          "reponse": "<p style='color:#2f855a;'><strong>Example of a good dialogue:</strong></p><p><strong>Sarah:</strong> Hi, Mark. Have you heard about the cyberbullying cases at school?</p><p><strong>Mark:</strong> Yes, I have. It's really worrying. Some students are being harassed on social media.</p><p><strong>Sarah:</strong> Exactly. I think we need to raise awareness about cyberbullying and its dangers.</p><p><strong>Mark:</strong> You're right. Many people don't know how to protect themselves online.</p><p><strong>Sarah:</strong> We should remind everyone not to share personal information on the internet.</p><p><strong>Mark:</strong> That's a good idea. Also, they should block and report anyone who bullies them.</p><p><strong>Sarah:</strong> I agree. Schools and parents also need to educate young people about netiquette.</p><p><strong>Mark:</strong> Yes, and we should encourage students to use social media responsibly.</p><p><strong>Sarah:</strong> Maybe we can start a campaign to promote online safety and kindness.</p><p><strong>Mark:</strong> That would be great! Let's talk to the principal about it tomorrow.</p><p><strong>Sarah:</strong> Good idea. Together we can make a difference.</p><p><strong>Mark:</strong> Indeed. Let's do it for the good of everyone.</p>"
        }
      ]
    },
    {
      "titre": "Literature: Introduction to Literary Elements",
      "points": "5 pts",
      "enonce": "<p style='font-size:1.1rem; line-height:1.7; color:#2d3748; margin-bottom:20px;'>Read the following short text and answer the questions below.</p><div style='background-color:#f7fafc; padding:20px; border-radius:12px; border-left:6px solid #4a5568; color:#1a202c; font-size:1rem; line-height:1.8;'><p>In a small village in the mountains, there lived a young girl named Amina. She was brave and kind, always helping others in need. One day, a terrible drought struck the village. The river dried up, and the crops began to die. The villagers were desperate. Amina decided to go on a journey to find water. She walked for days through the forest, facing many dangers. Finally, she reached a hidden spring that saved the village. The villagers celebrated her as a hero, and her story was told for generations.</p></div>",
      "questions": [
        {
          "question": "<p style='font-weight:600; color:#2d3748; margin-bottom:8px;'>1) What is the setting of the story?</p>",
          "reponse": "<p style='color:#2f855a;'>A small village in the mountains.</p>"
        },
        {
          "question": "<p style='font-weight:600; color:#2d3748; margin-bottom:8px;'>2) Who is the protagonist of the story?</p>",
          "reponse": "<p style='color:#2f855a;'>Amina, a brave and kind young girl.</p>"
        },
        {
          "question": "<p style='font-weight:600; color:#2d3748; margin-bottom:8px;'>3) What is the main problem (conflict) in the story?</p>",
          "reponse": "<p style='color:#2f855a;'>A terrible drought struck the village; the river dried up and the crops began to die.</p>"
        },
        {
          "question": "<p style='font-weight:600; color:#2d3748; margin-bottom:8px;'>4) How does the story end?</p>",
          "reponse": "<p style='color:#2f855a;'>Amina finds a hidden spring that saves the village, and the villagers celebrate her as a hero.</p>"
        },
        {
          "question": "<p style='font-weight:600; color:#2d3748; margin-bottom:8px;'>5) What theme can you identify in this story?</p>",
          "reponse": "<p style='color:#2f855a;'>Courage, selflessness, heroism, or the importance of helping others.</p>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
