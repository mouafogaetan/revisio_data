<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Anglais",
 "classe": "Seconde",
 "sequence": "Séquence 2",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Reading Comprehension: Community Problems and Volunteering",
     "points": "5 pts",
     "enonce": "<div style='font-size:1em; line-height:1.8; background-color:#f8f9fa; padding:15px; border-radius:8px;'><p><strong>Instructions:</strong> Read the following passage carefully and answer the questions that follow.</p><div style='background-color:#e3f2fd; padding:15px; border-radius:6px; margin:10px 0;'><p><strong>Text:</strong></p><p>In many communities across Cameroon, young people face serious problems such as unemployment, poverty, and crime. These problems often lead to frustration and hopelessness. However, many young people have found a solution through volunteering. Volunteering means offering your time and skills to help others without expecting payment.</p><p>For example, some young people join NGOs like the Red Cross or UNICEF to help victims of disasters. Others participate in community service projects such as cleaning the environment, teaching children, or helping the elderly. Volunteering not only helps the community but also helps the volunteers themselves. They develop new skills, gain experience, and feel a sense of responsibility.</p><p>As one volunteer said, <em>\"Volunteering has changed my life. I have learned to be more patient and compassionate.\"</em> Many organizations offer volunteering opportunities at both local and international levels. By volunteering, young people can make a difference and build a better future for their communities.</p></div></div>",
     "questions": [
       {
         "question": "<p><strong>1. (0.5 pt)</strong> What problems do young people face in many Cameroonian communities?</p>",
         "reponse": "<p><strong>Réponse attendue :</strong> They face unemployment, poverty, and crime.</p>"
       },
       {
         "question": "<p><strong>2. (0.5 pt)</strong> What is volunteering?</p>",
         "reponse": "<p><strong>Réponse attendue :</strong> Volunteering means offering your time and skills to help others without expecting payment.</p>"
       },
       {
         "question": "<p><strong>3. (1 pt)</strong> Name two NGOs mentioned in the text.</p>",
         "reponse": "<p><strong>Réponse attendue :</strong> The Red Cross and UNICEF.</p>"
       },
       {
         "question": "<p><strong>4. (1 pt)</strong> List three benefits of volunteering mentioned in the passage.</p>",
         "reponse": "<p><strong>Réponse attendue :</strong> 1) Developing new skills, 2) Gaining experience, 3) Feeling a sense of responsibility.</p>"
       },
       {
         "question": "<p><strong>5. (1 pt)</strong> How has volunteering changed the life of the volunteer mentioned in the text?</p>",
         "reponse": "<p><strong>Réponse attendue :</strong> Volunteering has helped him/her become more patient and compassionate.</p>"
       },
       {
         "question": "<p><strong>6. (1 pt)</strong> In your opinion, why is volunteering important for young people?</p>",
         "reponse": "<p><strong>Réponse attendue :</strong> (Open-ended) Volunteering is important because it helps young people develop skills, gain experience, and contribute positively to their community. It also gives them a sense of purpose and responsibility.</p>"
       }
     ]
   },
   {
     "titre": "Grammar: Tenses and Conditionals",
     "points": "6 pts",
     "enonce": "<div style='font-size:1em; line-height:1.8; background-color:#f8f9fa; padding:15px; border-radius:8px;'><p><strong>Instructions:</strong> Fill in the blanks with the correct verb tense or conditional form.</p></div>",
     "questions": [
       {
         "question": "<p><strong>1. (0.5 pt)</strong> She usually _______ (walk) to school every day.</p>",
         "reponse": "<p><strong>Réponse : walks</strong><br><em>Explication :</em> Le present simple est utilisé pour les habitudes.</p>"
       },
       {
         "question": "<p><strong>2. (0.5 pt)</strong> Listen! The baby _______ (cry).</p>",
         "reponse": "<p><strong>Réponse : is crying</strong><br><em>Explication :</em> Le present continuous est utilisé pour une action en cours.</p>"
       },
       {
         "question": "<p><strong>3. (0.5 pt)</strong> They _______ (visit) their grandparents last weekend.</p>",
         "reponse": "<p><strong>Réponse : visited</strong><br><em>Explication :</em> Le past simple est utilisé pour une action achevée dans le passé.</p>"
       },
       {
         "question": "<p><strong>4. (0.5 pt)</strong> I _______ (already / eat) lunch.</p>",
         "reponse": "<p><strong>Réponse : have already eaten</strong><br><em>Explication :</em> Le present perfect est utilisé pour une action passée avec un lien avec le présent.</p>"
       },
       {
         "question": "<p><strong>5. (0.5 pt)</strong> If you heat ice, it _______ (melt).</p>",
         "reponse": "<p><strong>Réponse : melts</strong><br><em>Explication :</em> Type 0 conditionnel pour une vérité générale.</p>"
       },
       {
         "question": "<p><strong>6. (0.5 pt)</strong> If I study hard, I _______ (pass) the exam.</p>",
         "reponse": "<p><strong>Réponse : will pass</strong><br><em>Explication :</em> Type 1 conditionnel pour une situation possible.</p>"
       },
       {
         "question": "<p><strong>7. (0.5 pt)</strong> If I were rich, I _______ (travel) around the world.</p>",
         "reponse": "<p><strong>Réponse : would travel</strong><br><em>Explication :</em> Type 2 conditionnel pour une situation irréelle.</p>"
       },
       {
         "question": "<p><strong>8. (0.5 pt)</strong> If she had known, she _______ (come).</p>",
         "reponse": "<p><strong>Réponse : would have come</strong><br><em>Explication :</em> Type 3 conditionnel pour une situation irréelle dans le passé.</p>"
       },
       {
         "question": "<p><strong>9. (1 pt)</strong> He said, \"I am tired.\" → He said that he _______ tired.</p>",
         "reponse": "<p><strong>Réponse : was</strong><br><em>Explication :</em> Au discours rapporté, le present simple devient past simple.</p>"
       },
       {
         "question": "<p><strong>10. (1 pt)</strong> She asked, \"Where do you live?\" → She asked me where I _______.</p>",
         "reponse": "<p><strong>Réponse : lived</strong><br><em>Explication :</em> Au discours rapporté, le present simple devient past simple et l'ordre des mots change.</p>"
       }
     ]
   },
   {
     "titre": "Vocabulary: Safety and Health",
     "points": "4 pts",
     "enonce": "<div style='font-size:1em; line-height:1.8; background-color:#f8f9fa; padding:15px; border-radius:8px;'><p><strong>Instructions:</strong> Match the words on the left with their correct definitions on the right. Write the letter of the definition next to the word.</p></div>",
     "questions": [
       {
         "question": "<p><strong>1. (0.5 pt)</strong> Helmet</p>",
         "reponse": "<p><strong>Réponse : D</strong><br><em>Définition :</em> Protective headgear worn for safety.</p>"
       },
       {
         "question": "<p><strong>2. (0.5 pt)</strong> Ambulance</p>",
         "reponse": "<p><strong>Réponse : B</strong><br><em>Définition :</em> A vehicle used to transport sick or injured people to the hospital.</p>"
       },
       {
         "question": "<p><strong>3. (0.5 pt)</strong> Pedestrian</p>",
         "reponse": "<p><strong>Réponse : E</strong><br><em>Définition :</em> A person who is walking, especially in a city or town.</p>"
       },
       {
         "question": "<p><strong>4. (0.5 pt)</strong> Seat belt</p>",
         "reponse": "<p><strong>Réponse : C</strong><br><em>Définition :</em> A safety strap worn in a vehicle to prevent injury.</p>"
       },
       {
         "question": "<p><strong>5. (0.5 pt)</strong> First aid</p>",
         "reponse": "<p><strong>Réponse : A</strong><br><em>Définition :</em> Emergency care given to a sick or injured person before professional help arrives.</p>"
       },
       {
         "question": "<p><strong>6. (0.5 pt)</strong> Addiction</p>",
         "reponse": "<p><strong>Réponse : F</strong><br><em>Définition :</em> The state of being physically or mentally dependent on a substance.</p>"
       },
       {
         "question": "<p><strong>7. (0.5 pt)</strong> Zebra crossing</p>",
         "reponse": "<p><strong>Réponse : H</strong><br><em>Définition :</em> A striped path on the road for pedestrians to cross safely.</p>"
       },
       {
         "question": "<p><strong>8. (0.5 pt)</strong> Traffic lights</p>",
         "reponse": "<p><strong>Réponse : G</strong><br><em>Définition :</em> A signal system used to control the flow of traffic at intersections.</p>"
       }
     ]
   },
   {
     "titre": "Writing: Letter to a Friend",
     "points": "5 pts",
     "enonce": "<div style='font-size:1em; line-height:1.8; background-color:#f8f9fa; padding:15px; border-radius:8px;'><p><strong>Instructions:</strong> Write a letter to a friend describing a volunteering activity you participated in. In your letter, you should:</p><ul style='list-style-type: disc; margin-left:20px;'><li>Describe the activity (what you did).</li><li>Explain why you chose to volunteer.</li><li>Talk about the benefits of volunteering.</li><li>Encourage your friend to volunteer.</li></ul><p>Your letter should be between <strong>150 and 200 words</strong>.</p></div>",
     "questions": [
       {
         "question": "<p><strong>Writing Task (5 pts)</strong></p><p><strong>Critères d'évaluation :</strong></p><ul style='list-style-type: disc; margin-left:20px;'><li><strong>Contenu (2 pts) :</strong> Le candidat décrit une activité de volontariat, explique ses motivations, mentionne les avantages et encourage son ami.</li><li><strong>Structure (1.5 pts) :</strong> La lettre est bien structurée (salutation, introduction, développement, conclusion, formule de politesse).</li><li><strong>Langue (1.5 pts) :</strong> La grammaire, le vocabulaire et l'orthographe sont corrects.</li></ul>",
         "reponse": "<p><strong>Exemple de réponse :</strong></p><div style='background-color:#fff3e0; padding:15px; border-radius:6px;'><p><em>Dear Marie,</em></p><p><em>I hope you are well. I am writing to tell you about a volunteering activity I participated in last weekend. I joined a group of young volunteers from my community to clean the local market. We collected trash, painted the walls, and planted flowers in the surrounding area.</em></p><p><em>I chose to volunteer because I wanted to give back to my community. The market was dirty and people complained about it. I felt that I could make a difference. Volunteering has many benefits. First, it helps the community. Second, it allows volunteers to develop new skills and make new friends. I also felt a sense of pride and responsibility after the activity.</em></p><p><em>I encourage you to volunteer too. There are many opportunities, such as helping at a hospital or teaching children. I promise you will enjoy it and feel good about yourself. Let me know if you are interested. We can volunteer together next time!</em></p><p><em>Take care,</em></p><p><em>Your friend,</em></p><p><em>Jean</em></p></div>"
       }
     ]
   }
 ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
