<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) - ajouté par le script de thème */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Introduction à la situation d'énonciation",
    "contenu": "<div style='font-size: 1.1rem; line-height: 1.8; color: #1a1a2e;'><p><strong>Objectif :</strong> Comprendre les circonstances dans lesquelles un texte est produit.</p><div style='background-color: #fff3cd; padding: 15px; border-radius: 8px; border-left: 5px solid #ffc107; color: #000; margin: 15px 0;'><p style='margin: 0;'><strong>💡 Question :</strong> Quand vous lisez un texte, vous êtes-vous déjà demandé dans quelles conditions il a été écrit ? Qui parle ? À qui ? Quand ? Où ? Comment ?</p></div><p>Pour bien comprendre un texte, il faut analyser sa <strong>situation d'énonciation</strong>.</p><p><strong>Deux notions clés :</strong></p><ul><li>L'<strong>énoncé</strong> : le texte produit.</li><li>L'<strong>énonciation</strong> : l'acte de produire cet énoncé.</li></ul><p>Pour analyser la situation d'énonciation, on répond à <strong>5 questions fondamentales</strong> :</p><div style='background-color: #e7f3fe; padding: 12px; border-radius: 8px; color: #000; margin-top: 10px;'><p style='margin: 0; text-align: center;'><strong>❓ Qui ? ❓ À qui ? ❓ Quand ? ❓ Où ? ❓ Comment ?</strong></p></div></div>",
    "texteParle": "Bonjour à tous. Aujourd'hui, nous allons découvrir la situation d'énonciation. Pour bien comprendre un texte, il ne suffit pas de lire les mots, il faut aussi savoir dans quelles conditions ce texte a été produit. On distingue deux notions : l'énoncé, c'est le texte lui-même, et l'énonciation, c'est l'acte de produire ce texte. Pour analyser la situation d'énonciation, on répond à cinq questions fondamentales : Qui parle ? À qui ? Quand ? Où ? Comment ? Ces cinq questions vous permettront de comprendre pleinement le sens d'un texte.",
    "note": "L'énonciation est l'acte de production du texte."
  },
  {
    "titre": "Énoncé vs Énonciation",
    "contenu": "<div style='font-size: 1rem; line-height: 1.6; color: #1a1a2e;'><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 15px;'><div style='background-color: #2196F3; color: #fff; padding: 15px; border-radius: 8px;'><p style='margin: 0; text-align: center;'><strong>📄 L'ÉNONCÉ</strong></p><p style='margin: 10px 0 0 0;'>C'est le <strong>texte</strong> produit.</p><ul style='margin-top: 10px;'><li>Ce qu'on lit ou entend</li><li>Le résultat de l'acte de communication</li><li>Exemple : <em>« Je vais à l'école. »</em></li></ul></div><div style='background-color: #FF9800; color: #fff; padding: 15px; border-radius: 8px;'><p style='margin: 0; text-align: center;'><strong>✍️ L'ÉNONCIATION</strong></p><p style='margin: 10px 0 0 0;'>C'est l'<strong>acte</strong> de produire l'énoncé.</p><ul style='margin-top: 10px;'><li>L'action de parler ou d'écrire</li><li>Les circonstances de production</li><li>Exemple : <em>« Un élève dit à son professeur... »</em></li></ul></div></div><div style='background-color: #e8f5e9; padding: 12px; border-radius: 5px; color: #000; margin-top: 15px;'><p style='margin: 0;'><strong>📝 À retenir :</strong> L'énoncé est le <em>produit</em>, l'énonciation est le <em>processus</em>.</p></div></div>",
    "texteParle": "Commençons par distinguer deux notions fondamentales. L'énoncé, c'est le texte lui-même, ce que vous lisez ou entendez. Par exemple, la phrase 'Je vais à l'école' est un énoncé. L'énonciation, c'est l'acte de produire cet énoncé, c'est-à-dire l'action de parler ou d'écrire. Par exemple, un élève qui dit cette phrase à son professeur, c'est une situation d'énonciation. En résumé, l'énoncé est le produit, et l'énonciation est le processus de production. Cette distinction est essentielle pour analyser un texte.",
    "note": "L'énoncé est le texte produit, l'énonciation est l'acte de le produire."
  },
  {
    "titre": "Les 5 questions de la situation d'énonciation",
    "contenu": "<div style='font-size: 1rem; line-height: 1.6; color: #1a1a2e;'><p>Pour analyser une situation d'énonciation, on répond à <strong>5 questions</strong> :</p><div style='background-color: #f5f5f5; padding: 12px; border-radius: 8px; color: #000; margin: 10px 0;'><p style='margin: 5px 0;'><strong>1. ❓ QUI parle ?</strong> → Identifier l'émetteur.</p><p style='margin: 5px 0;'><strong>2. ❓ À QUI ?</strong> → Identifier le récepteur/destinataire.</p><p style='margin: 5px 0;'><strong>3. ❓ QUAND ?</strong> → Identifier le moment de l'énonciation.</p><p style='margin: 5px 0;'><strong>4. ❓ OÙ ?</strong> → Identifier le lieu de l'énonciation.</p><p style='margin: 5px 0;'><strong>5. ❓ COMMENT ?</strong> → Identifier l'attitude, la façon de parler.</p></div><div style='background-color: #e8f5e9; padding: 12px; border-radius: 5px; color: #000; margin-top: 10px;'><p style='margin: 0;'><strong>💡 Astuce :</strong> Ces 5 questions forment le <em>cadre de l'énonciation</em>.</p></div></div>",
    "texteParle": "Pour analyser une situation d'énonciation, on répond à cinq questions. La première : Qui parle ? C'est l'émetteur. La deuxième : À qui ? C'est le récepteur. La troisième : Quand ? C'est le moment où l'on parle ou écrit. La quatrième : Où ? C'est le lieu de l'énonciation. La cinquième : Comment ? C'est l'attitude du locuteur, sa façon de s'exprimer. Ces cinq questions vous donnent les clés pour comprendre le cadre dans lequel un texte a été produit. Elles vous aideront à mieux analyser n'importe quel texte.",
    "note": "Les 5 questions définissent le cadre de l'énonciation."
  },
  {
    "titre": "Qui parle ? L'émetteur",
    "contenu": "<div style='font-size: 1rem; line-height: 1.6; color: #1a1a2e;'><div style='background-color: #2196F3; color: #fff; padding: 8px 15px; border-radius: 5px; display: inline-block; margin-bottom: 10px;'><strong>❓ QUI PARLE ?</strong></div><p>Il s'agit d'identifier l'<strong>émetteur</strong>, celui qui produit le message.</p><p><strong>Indices pour identifier l'émetteur :</strong></p><ul><li><strong>Nom propre</strong> : si l'auteur est nommé</li><li><strong>Pronoms de 1ère personne</strong> : <em>je, nous</em></li><li><strong>Adjectifs possessifs</strong> : <em>mon, ma, mes, notre, nos</em></li><li><strong>Verbes conjugués</strong> à la 1ère personne</li></ul><div style='background-color: #e8f5e9; padding: 12px; border-radius: 5px; color: #000; margin-top: 10px;'><p style='margin: 0;'><strong>📝 Exemple :</strong> <em>« <strong>Je</strong> vous écris pour <strong>mon</strong> association. »</em></p><p style='margin: 5px 0 0 20px; font-size: 0.95rem;'>→ L'émetteur est identifiable par <strong>« je »</strong> et <strong>« mon »</strong>.</p></div></div>",
    "texteParle": "La première question est 'Qui parle ?' Il s'agit d'identifier l'émetteur. Pour le trouver, on cherche des indices dans le texte. Les pronoms de la première personne comme 'je' ou 'nous', les adjectifs possessifs comme 'mon' ou 'ma', et les verbes conjugués à la première personne sont des indications précieuses. Par exemple, dans la phrase 'Je vous écris pour mon association', le 'je' et le 'mon' nous indiquent clairement qui est l'émetteur. Parfois, l'émetteur peut aussi être identifié par un nom propre en début de texte.",
    "note": "L'émetteur se reconnaît aux marques de 1ère personne."
  },
  {
    "titre": "À qui ? Le destinataire",
    "contenu": "<div style='font-size: 1rem; line-height: 1.6; color: #1a1a2e;'><div style='background-color: #4CAF50; color: #fff; padding: 8px 15px; border-radius: 5px; display: inline-block; margin-bottom: 10px;'><strong>❓ À QUI ?</strong></div><p>Il s'agit d'identifier le <strong>destinataire</strong> (récepteur), celui à qui le message est adressé.</p><p><strong>Indices pour identifier le destinataire :</strong></p><ul><li><strong>Nom propre</strong> : si le destinataire est nommé</li><li><strong>Pronoms de 2ème personne</strong> : <em>tu, vous</em></li><li><strong>Adjectifs possessifs</strong> : <em>ton, ta, tes, votre, vos</em></li><li><strong>Apostrophes</strong> : <em>cher ami, mesdames, messieurs</em></li></ul><div style='background-color: #e8f5e9; padding: 12px; border-radius: 5px; color: #000; margin-top: 10px;'><p style='margin: 0;'><strong>📝 Exemple :</strong> <em>« <strong>Cher lecteur</strong>, je <strong>vous</strong> raconte une histoire. »</em></p><p style='margin: 5px 0 0 20px; font-size: 0.95rem;'>→ Le destinataire est identifié par <strong>« cher lecteur »</strong> et <strong>« vous »</strong>.</p></div></div>",
    "texteParle": "La deuxième question est 'À qui ?' Il s'agit d'identifier le destinataire, c'est-à-dire la personne à qui le message est adressé. Pour le trouver, on cherche des indices comme les pronoms de la deuxième personne 'tu' ou 'vous', les adjectifs possessifs 'ton' ou 'votre', et les apostrophes comme 'cher ami' ou 'Mesdames, Messieurs'. Par exemple, dans la phrase 'Cher lecteur, je vous raconte une histoire', le 'cher lecteur' et le 'vous' nous indiquent clairement qui est le destinataire.",
    "note": "Le destinataire se reconnaît aux marques de 2ème personne."
  },
  {
    "titre": "Quand ? Le temps de l'énonciation",
    "contenu": "<div style='font-size: 1rem; line-height: 1.6; color: #1a1a2e;'><div style='background-color: #FF9800; color: #fff; padding: 8px 15px; border-radius: 5px; display: inline-block; margin-bottom: 10px;'><strong>❓ QUAND ?</strong></div><p>Il s'agit d'identifier le <strong>moment</strong> où se déroule l'énonciation.</p><p><strong>Indices pour identifier le temps :</strong></p><ul><li><strong>Déictiques temporels</strong> : <em>aujourd'hui, hier, demain, maintenant</em></li><li><strong>Adverbes de temps</strong> : <em>bientôt, actuellement, autrefois</em></li><li><strong>Temps verbaux</strong> : présent, passé, futur</li><li><strong>Dates</strong> : indications précises de date</li></ul><div style='background-color: #e8f5e9; padding: 12px; border-radius: 5px; color: #000; margin-top: 10px;'><p style='margin: 0;'><strong>📝 Exemple :</strong> <em>« <strong>Aujourd'hui</strong>, je <strong>vais</strong> vous parler de l'avenir. »</em></p><p style='margin: 5px 0 0 20px; font-size: 0.95rem;'>→ L'adverbe <strong>« aujourd'hui »</strong> et le présent <strong>« vais »</strong> situent dans le présent.</p></div></div>",
    "texteParle": "La troisième question est 'Quand ?' Il s'agit d'identifier le moment où se déroule l'énonciation. Pour cela, on cherche des déictiques temporels comme 'aujourd'hui', 'hier', 'demain' ou 'maintenant', des adverbes de temps, et les temps verbaux utilisés. Par exemple, dans la phrase 'Aujourd'hui, je vais vous parler de l'avenir', l'adverbe 'aujourd'hui' et le présent 'vais' situent l'énonciation dans le présent. Ce sont ces indices qui nous permettent de savoir quand le texte a été produit.",
    "note": "Le temps de l'énonciation se reconnaît aux déictiques temporels."
  },
  {
    "titre": "Où ? Le lieu de l'énonciation",
    "contenu": "<div style='font-size: 1rem; line-height: 1.6; color: #1a1a2e;'><div style='background-color: #9C27B0; color: #fff; padding: 8px 15px; border-radius: 5px; display: inline-block; margin-bottom: 10px;'><strong>❓ OÙ ?</strong></div><p>Il s'agit d'identifier le <strong>lieu</strong> où se déroule l'énonciation.</p><p><strong>Indices pour identifier le lieu :</strong></p><ul><li><strong>Déictiques spatiaux</strong> : <em>ici, là-bas, devant, derrière</em></li><li><strong>Noms propres de lieux</strong> : <em>Yaoundé, Douala, Cameroun</em></li><li><strong>Adverbes de lieu</strong> : <em>ailleurs, partout, nulle part</em></li><li><strong>Compléments de lieu</strong> : <em>à la maison, dans la rue</em></li></ul><div style='background-color: #e8f5e9; padding: 12px; border-radius: 5px; color: #000; margin-top: 10px;'><p style='margin: 0;'><strong>📝 Exemple :</strong> <em>« <strong>Ici</strong>, à <strong>Yaoundé</strong>, la vie est douce. »</em></p><p style='margin: 5px 0 0 20px; font-size: 0.95rem;'>→ Les mots <strong>« ici »</strong> et <strong>« Yaoundé »</strong> situent le lieu.</p></div></div>",
    "texteParle": "La quatrième question est 'Où ?' Il s'agit d'identifier le lieu où se déroule l'énonciation. Pour cela, on cherche des déictiques spatiaux comme 'ici', 'là-bas', 'devant' ou 'derrière', des noms propres de lieux, des adverbes de lieu et des compléments de lieu. Par exemple, dans la phrase 'Ici, à Yaoundé, la vie est douce', les mots 'ici' et 'Yaoundé' situent clairement le lieu où se tient le locuteur. Ces indices sont essentiels pour comprendre le contexte spatial du texte.",
    "note": "Le lieu de l'énonciation se reconnaît aux déictiques spatiaux."
  },
  {
    "titre": "Comment ? L'attitude du locuteur",
    "contenu": "<div style='font-size: 1rem; line-height: 1.6; color: #1a1a2e;'><div style='background-color: #e91e63; color: #fff; padding: 8px 15px; border-radius: 5px; display: inline-block; margin-bottom: 10px;'><strong>❓ COMMENT ?</strong></div><p>Il s'agit d'identifier l'<strong>attitude</strong> du locuteur, sa façon de s'exprimer.</p><p><strong>Indices pour identifier l'attitude :</strong></p><ul><li><strong>Modalisateurs</strong> : <em>peut-être, probablement, certainement</em></li><li><strong>Verbes de jugement</strong> : <em>penser, croire, estimer</em></li><li><strong>Adverbes de manière</strong> : <em>heureusement, malheureusement</em></li><li><strong>Interjections</strong> : <em>Oh ! Ah ! Hélas !</em></li><li><strong>Termes mélioratifs/péjoratifs</strong> : <em>excellent, médiocre</em></li><li><strong>Conditionnel</strong> : exprime l'hypothèse ou l'atténuation</li></ul></div>",

    "note": "L'attitude du locuteur se reconnaît aux modalisateurs et aux jugements."

il faudrait, on devrait</em></p></div></div></div>",
    "texteParle": "Voici les principaux indices qui révèlent l'attitude du locuteur. Les modalisateurs comme 'peut-être' ou 'certainement' expriment le degré de certitude. Les verbes de jugement comme 'penser' ou 'croire' montrent que le locuteur donne son opinion. Les adverbes comme 'heureusement' ou 'malheureusement' révèlent un jugement de valeur. Les interjections comme 'Oh !' ou 'Hélas !' expriment des émotions. Les termes mélioratifs valorisent tandis que les termes péjoratifs dévalorisent. Enfin, le conditionnel comme 'je voudrais' atténue ou exprime un souhait.",

    "texteParle": "Voici un tableau récapitulatif des cinq questions de la situation d'énonciation. 'Qui parle ?' nous donne l'émetteur, avec des indices comme 'je' ou 'mon'. 'À qui ?' nous donne le destinataire, avec des indices comme 'tu' ou 'votre'. 'Quand ?' nous donne le moment, avec des indices comme 'aujourd'hui' ou le présent. 'Où ?' nous donne le lieu, avec des indices comme 'ici' ou 'Yaoundé'. 'Comment ?' nous donne l'attitude du locuteur, avec des modalisateurs ou des jugements. Ce tableau vous aidera à analyser n'importe quel texte.",

  {
    "titre": "Exercice : Analyser la situation d'énonciation",
    "contenu": "<div style='font-size: 0.95rem; line-height: 1.6; color: #1a1a2e;'><p><strong>Consigne :</strong> Analysez la situation d'énonciation du texte suivant :</p><div style='background-color: #f5f5f5; padding: 15px; border-radius: 8px; color: #000; border-left: 4px solid #2196F3; margin: 10px 0;'><p><i>« Aujourd'hui, chers camarades, je viens vous parler de l'importance de l'éducation. Ici, au Cameroun, nous avons tous le droit d'apprendre. Malheureusement, certains enfants n'ont pas accès à l'école. Mais ensemble, nous pouvons changer les choses ! »</i></p></div><div style='background-color: #fff3cd; padding: 12px; border-radius: 5px; color: #000; margin-top: 10px;'><p style='margin: 0;'><strong>💡 Questions-guide :</strong> Qui parle ? À qui ? Quand ? Où ? Comment ?</p></div></div>",
    "texteParle": "Pour vous entraîner, voici un exercice. Je vais vous lire un texte, et vous devez analyser sa situation d'énonciation en répondant aux cinq questions. Qui parle ? Cherchez les pronoms de première personne. À qui ? Cherchez les marques de deuxième personne. Quand ? Cherchez les indicateurs de temps. Où ? Cherchez les indicateurs de lieu. Comment ? Cherchez les modalisateurs et les jugements. Prenez quelques minutes pour réfléchir, puis nous corrigerons ensemble.",

  {

indice de :</strong></p><button onclick='checkAnswer(3, \"Temps\")' style='background-color: #2196F3; color: white; border: none; padding: 8px 15px; margin-right: 10px; border-radius: 5px; margin-bottom: 5px;'>Lieu</button><button onclick='checkAnswer(3, \"Temps\")' style='background-color: #4CAF50; color: white; border: none; padding: 8px 15px; margin-right: 10px; border-radius: 5px; margin-bottom: 5px;'>Temps</button><button onclick='checkAnswer(3, \"Temps\")' style='background-color: #FF9800; color: white; border: none; padding: 8px 15px; border-radius: 5px; margin-bottom: 5px;'>Émetteur</button><p id='result3' style='margin-top: 10px; font-weight: bold;'></p></div></div><script>function checkAnswer(question, answer) { var resultElement = document.getElementById('result' + question); var correctAnswers = {1: 'Lieu', 2: \"L'attitude du locuteur\", 3: 'Temps';
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            if (header) header.style.background = 'rgba(15, 23, 42, 0.85)';
            if (footer) footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            if (header) header.style.background = 'rgba(255, 255, 255, 0.85)';
            if (footer) footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
            // Ajouter l'écouteur d'événement click
            themeBtn.addEventListener('click', toggleTheme);
        }
    });
</script>
