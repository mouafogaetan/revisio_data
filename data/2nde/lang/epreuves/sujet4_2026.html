<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Langue Française",
  "classe": "Seconde",
  "sequence": "Séquence 4 : De l'énonciation à l'analyse des textes",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Je maîtrise l'énonciation et la communication",
      "points": "5 pts",
      "enonce": "<div style='background-color: #f0f4f8; padding: 15px; border-radius: 8px; color: #1a202c;'>Tout échange linguistique met en jeu des paramètres précis. L'analyse de l'énonciation permet de comprendre qui parle, à qui, et dans quelles conditions.</div>",
      "questions": [
        {
          "question": "1) Définis les termes suivants : a) Émetteur ; b) Récepteur ; c) Référent.",
          "reponse": "a) L'émetteur est celui qui produit et transmet le message. b) Le récepteur est celui à qui est destiné le message. c) Le référent est ce dont on parle dans le message (le sujet du discours)."
        },
        {
          "question": "2) Identifie les marques de subjectivité dans la phrase suivante : <i>« Hélas ! Je trouve que cet enfant est vraiment trop turbulent. »</i>",
          "reponse": "Les marques de subjectivité sont : l'interjection 'Hélas !' (sentiment de regret), le pronom personnel 'je' (émetteur explicite), le verbe de jugement 'trouve', l'adverbe d'intensité 'vraiment' et l'adjectif qualificatif 'turbulent' (jugement de valeur)."
        },
        {
          "question": "3) Construis le schéma de la communication à partir du message suivant : <i>« Le proviseur annonce par haut-parleur que le collège sera fermé demain. »</i>",
          "reponse": "Émetteur : le proviseur. Destinataire : les élèves et personnels du collège. Message : le collège sera fermé demain. Référent : la fermeture du collège. Canal : le haut-parleur (canal sonore). Code : la langue française."
        }
      ]
    },
    {
      "titre": "Je reconnais les fonctions du langage",
      "points": "4 pts",
      "enonce": "<div style='background-color: #f0f4f8; padding: 15px; border-radius: 8px; color: #1a202c;'>Selon Roman Jakobson, le langage remplit six fonctions. Chaque fonction est centrée sur un élément de la communication.</div>",
      "questions": [
        {
          "question": "1) Cite les six fonctions du langage selon Jakobson.",
          "reponse": "Les six fonctions sont : expressive (émotive), conative (impressive), référentielle (dénotative), phatique, métalinguistique et poétique."
        },
        {
          "question": "2) Identifie la fonction dominante dans les énoncés suivants et justifie : <br> a) <i>« Le soleil se lève à l'est et se couche à l'ouest. »</i> <br> b) <i>« Que tu es belle ce soir ! »</i>",
          "reponse": "a) La fonction référentielle est dominante car l'énoncé donne une information objective sur le monde (le référent). b) La fonction expressive est dominante car le locuteur exprime un sentiment (admiration) à travers l'exclamation."
        },
        {
          "question": "3) Dans un message publicitaire, quelle fonction est souvent privilégiée ? Justifie.",
          "reponse": "La fonction conative (ou impressive) est souvent privilégiée car le but de la publicité est de faire agir le récepteur (acheter le produit). On y trouve des impératifs, des apostrophes et des phrases incitatives."
        }
      ]
    },
    {
      "titre": "J'identifie les types de textes",
      "points": "5 pts",
      "enonce": "<div style='background-color: #f0f4f8; padding: 15px; border-radius: 8px; color: #1a202c;'>Les textes se classent en différentes catégories selon leur fonction dominante. Reconnaître le type d'un texte permet de comprendre l'intention de l'auteur.</div>",
      "questions": [
        {
          "question": "1) Associe chaque type de texte à sa fonction : a) Texte narratif ; b) Texte descriptif ; c) Texte argumentatif ; d) Texte injonctif.",
          "reponse": "a) Texte narratif → raconter une histoire. b) Texte descriptif → faire voir, décrire. c) Texte argumentatif → persuader, convaincre. d) Texte injonctif → donner un ordre ou un conseil."
        },
        {
          "question": "2) Relève dans le texte suivant les indices qui permettent d'identifier son type : <br><i>« Il était une fois un roi très riche. Il avait un château magnifique entouré de jardins fleuris. »</i>",
          "reponse": "Les indices du texte narratif sont : la formule d'ouverture 'Il était une fois', les verbes d'action ('avait'), les personnages ('roi'), et la succession d'événements. Les indices descriptifs sont : l'adjectif qualificatif 'magnifique', 'fleuris' et les compléments de lieu."
        },
        {
          "question": "3) À quoi reconnaît-on un texte explicatif ? Donne deux indices.",
          "reponse": "Un texte explicatif se reconnaît à la présence de définitions, de reformulations ('c'est-à-dire'), de connecteurs de cause et de conséquence ('parce que', 'donc'), et d'un lexique spécialisé."
        }
      ]
    },
    {
      "titre": "J'analyse le texte théâtral",
      "points": "4 pts",
      "enonce": "<div style='background-color: #f0f4f8; padding: 15px; border-radius: 8px; color: #1a202c;'>Le texte théâtral obéit à des règles spécifiques liées à sa double destination : la lecture et la représentation.</div>",
      "questions": [
        {
          "question": "1) Qu'est-ce que la double énonciation théâtrale ?",
          "reponse": "La double énonciation théâtrale désigne le fait que, dans une pièce de théâtre, il y a deux niveaux de communication : la communication entre les personnages sur scène, et la communication entre les acteurs et les spectateurs."
        },
        {
          "question": "2) Distingue le monologue du dialogue. Donne un exemple de chaque.",
          "reponse": "Le monologue est un discours d'un seul personnage seul sur scène (exemple : le monologue d'Hamlet, 'Être ou ne pas être'). Le dialogue est un échange de paroles entre plusieurs personnages (exemple : les échanges entre Molière et ses valets dans ses comédies)."
        },
        {
          "question": "3) Cite deux fonctions du théâtre.",
          "reponse": "Les fonctions du théâtre sont : la fonction cathartique (purifier les passions), la fonction divertissante (amuser le public), la fonction utilitaire (éduquer, critiquer la société), et la fonction réaliste (représenter la vie)."
        }
      ]
    },
    {
      "titre": "Je reconnais les figures de style",
      "points": "4 pts",
      "enonce": "<div style='background-color: #f0f4f8; padding: 15px; border-radius: 8px; color: #1a202c;'>Les figures de style sont des procédés expressifs qui permettent d'enrichir le discours et de produire des effets sur le lecteur.</div>",
      "questions": [
        {
          "question": "1) Définis la comparaison et la métaphore en donnant un exemple pour chacune.",
          "reponse": "La comparaison rapproche deux éléments avec un outil de comparaison (comme, tel). Exemple : « Il est courageux comme un lion. » La métaphore est une comparaison sans outil de comparaison. Exemple : « Cet homme est un lion. »"
        },
        {
          "question": "2) Quelle figure de style est utilisée dans les expressions suivantes ? <br> a) <i>« Le vent hurlait dans la nuit. »</i> <br> b) <i>« Je suis mort de fatigue. »</i> <br> c) <i>« Une douceur de velours. »</i>",
          "reponse": "a) Personnification (le vent est doté d'une capacité humaine : hurler). b) Hyperbole (exagération expressive). c) Métaphore (comparaison implicite avec le velours)."
        },
        {
          "question": "3) L'antithèse et l'oxymore sont des figures d'opposition. Explique leur différence.",
          "reponse": "L'antithèse oppose deux termes ou idées dans une phrase (exemple : « Je vis, je meurs »). L'oxymore est une antithèse plus forte, une alliance de mots contradictoires au sein d'un même groupe (exemple : « une obscure clarté »)."
        }
      ]
    },
    {
      "titre": "J'analyse la formation des mots et la ponctuation",
      "points": "3 pts",
      "enonce": "<div style='background-color: #f0f4f8; padding: 15px; border-radius: 8px; color: #1a202c;'>La langue française s'enrichit en permanence par la formation de nouveaux mots. La ponctuation, quant à elle, rythme le discours et en oriente le sens.</div>",
      "questions": [
        {
          "question": "1) Explique les procédés de formation des mots suivants : <br> a) <i>« Il était une fois »</i> → <i>« un fois »</i> (apocope) <br> b) <i>« Organisation des Nations Unies »</i> → <i>« ONU »</i> (siglaison).",
          "reponse": "a) L'apocope consiste à supprimer la fin d'un mot. b) La siglaison consiste à prendre les premières lettres de plusieurs mots pour former un sigle."
        },
        {
          "question": "3) À quoi servent les deux points dans une phrase ? Donne un exemple.",
          "reponse": "Les deux points (:) servent à introduire une explication, une énumération, une citation ou un discours rapporté. Exemple : « Il avait trois qualités : la générosité, la patience et l'écoute. »"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
