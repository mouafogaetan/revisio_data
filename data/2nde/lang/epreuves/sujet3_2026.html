<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Langue Française",
  "classe": "Seconde",
  "sequence": "Séquence 3 : Le style et l'analyse stylistique",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Les modes et les temps verbaux",
      "points": "5 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Le <strong>système verbal</strong> est un outil essentiel pour exprimer le temps, l'attitude du locuteur et les nuances de sens. Il est composé de <strong>modes</strong> (indicatif, conditionnel, subjonctif, impératif, infinitif) et de <strong>temps</strong> qui permettent de situer les actions dans la durée.</div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>1. (1 pt)</strong> Définis ce qu'est un <strong>mode verbal</strong>.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Un <strong>mode verbal</strong> est la manière dont le locuteur présente l'action du verbe. Il peut la présenter comme réelle et certaine (indicatif), hypothétique (conditionnel), souhaitée ou incertaine (subjonctif), ordonnée (impératif) ou sous forme nominale (infinitif).</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>2. (2 pts)</strong> Identifie le <strong>mode</strong> et le <strong>temps</strong> des verbes soulignés dans les phrases suivantes :<br>a) <em>Il <u>partait</u> toujours à la même heure.</em><br>b) <em><u>Viens</u> ici immédiatement !</em><br>c) <em>Je pense qu'il <u>viendra</u> demain.</em><br>d) <em>Il faudrait que vous <u>veniez</u> plus tôt.</em></div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>a) <strong>Imparfait</strong> de l'<strong>indicatif</strong> (action habituelle dans le passé).<br>b) <strong>Impératif</strong> présent (ordre).<br>c) <strong>Futur simple</strong> de l'<strong>indicatif</strong> (action future certaine).<br>d) <strong>Subjonctif</strong> présent (exprimant un souhait après une locution impersonnelle).</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>3. (2 pts)</strong> Explique la <strong>valeur</strong> du conditionnel dans la phrase suivante : <em>Je <u>voudrais</u> un renseignement, s'il vous plaît.</em></div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Le conditionnel est ici employé pour exprimer une <strong>atténuation</strong> ou une marque de <strong>politesse</strong>. Le locuteur atténue sa demande pour éviter l'ordre direct, plus brutal, de l'impératif. Cette valeur est fréquente dans les demandes polies.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Les modes verbaux en contexte",
      "points": "5 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Le choix du <strong>mode verbal</strong> dépend de la <strong>subordination</strong> dans les phrases complexes. Certaines conjonctions ou locutions imposent l'emploi du subjonctif, d'autres de l'indicatif.</div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>1. (1 pt)</strong> Complète les phrases suivantes avec le <strong>mode qui convient</strong> (indicatif ou subjonctif) :<br>a) <em>Il est certain qu'il (venir) ______ demain.</em><br>b) <em>Il faut que tu (faire) ______ tes devoirs.</em></div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>a) <em>Il est certain qu'il <strong>viendra</strong> demain.</em> (indicatif, car on exprime une certitude).<br>b) <em>Il faut que tu <strong>fasses</strong> tes devoirs.</em> (subjonctif, car on exprime une nécessité).</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>2. (2 pts)</strong> Justifie l'emploi du <strong>subjonctif</strong> dans les phrases suivantes :<br>a) <em>Bien qu'il <u>soit</u> fatigué, il continue à travailler.</em><br>b) <em>Je souhaite que vous <u>réussissiez</u> à cet examen.</em></div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>a) La locution <strong>\"bien que\"</strong> introduit une concession, un fait considéré comme hypothétique ou subjectif, ce qui impose le subjonctif.<br>b) Le verbe <strong>\"souhaiter\"</strong> exprime un désir, un souhait. Le subjonctif est utilisé après les verbes de volonté, de désir et de sentiment.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>3. (2 pts)</strong> Trouve la <strong>valeur</strong> du subjonctif dans la phrase suivante : <em>Qu'il <u>réussisse</u> ou qu'il <u>échoue</u>, nous serons toujours fiers de lui.</em></div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Le subjonctif dans cette double proposition exprime une <strong>hypothèse</strong>, une <strong>éventualité</strong>. Le locuteur envisage deux possibilités (réussite ou échec) sans les présenter comme certaines ou réelles. Il manifeste une certaine <strong>incertitude</strong> quant à l'issue.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : La ponctuation et ses effets",
      "points": "5 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>La <strong>ponctuation</strong> est un système de signes qui organise le discours, marque les pauses, l'intention du locuteur et contribue au <strong>rythme</strong> du texte.</div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>1. (1 pt)</strong> À quoi sert le <strong>point-virgule</strong> dans une phrase ?</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Le point-virgule marque une pause plus forte que la virgule mais moins marquée que le point. Il permet de séparer des propositions au sein d'une même phrase, en exprimant souvent un lien logique (opposition, conséquence) ou en marquant une énumération plus complexe.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>2. (2 pts)</strong> Analyse l'effet produit par les <strong>points de suspension</strong> dans la phrase suivante : <em>\"Et puis, soudain... le silence... plus rien...\"</em></div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Les points de suspension créent un effet de <strong>pause</strong>, d'<strong>hésitation</strong> ou de <strong>non-dit</strong>. Ils suggèrent un moment de réflexion, une émotion trop forte pour être exprimée clairement (ici, une surprise ou une angoisse face au silence). Ils contribuent à un rythme haché et à une atmosphère de suspense.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>3. (2 pts)</strong> Quelle est la <strong>différence d'effet</strong> entre le point d'interrogation et le point d'exclamation ?</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Le <strong>point d'interrogation</strong> marque une question, une <strong>interrogation</strong> ou une <strong>incertitude</strong> (ex : une demande d'information, une surprise, un doute). Le <strong>point d'exclamation</strong> exprime une <strong>émotion forte</strong> : joie, colère, étonnement, ordre, admiration. Il traduit l'intonation du locuteur et un engagement affectif dans l'énoncé.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Figures de style, tonalités et analyse stylistique",
      "points": "5 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>L'<strong>analyse stylistique</strong> consiste à étudier les <strong>figures de style</strong> (comparaison, métaphore, personnification, antithèse, hyperbole, etc.) et les <strong>tonalités</strong> (registres) qui donnent à un texte sa couleur particulière.</div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>1. (1 pt)</strong> Identifie la <strong>figure de style</strong> dans la phrase suivante : <em>\"Le vent hurlait comme un loup affamé.\"</em></div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Il s'agit d'une <strong>comparaison</strong>. On trouve les trois éléments de la comparaison : le comparé (\"le vent\"), le comparant (\"un loup affamé\") et l'outil de comparaison (\"comme\").</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>2. (2 pts)</strong> Dans l'extrait suivant, <strong>identifie</strong> les figures de style et <strong>interprète</strong> leur effet : <em>\"La mer, ce miroir infini, reflétait un ciel d'azur où dansaient des nuages de velours.\"</em></div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><ul style='margin-left: 0; padding-left: 20px;'><li><strong>Métaphore</strong> : \"La mer, ce miroir infini\" (comparaison sans outil, la mer est présentée comme un miroir, suggérant sa surface calme et réfléchissante).</li><li><strong>Personnification</strong> : \"des nuages de velours\" et \"dansaient\" (les nuages sont dotés d'une qualité humaine, le velours, suggérant leur douceur, et d'une action humaine, danser, créant une image de légèreté).</li></ul></div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>3. (2 pts)</strong> À quelle <strong>tonalité</strong> appartient le texte suivant ? Justifie ta réponse en t'appuyant sur des indices : <em>\"Le soleil se couchait, drapant la ville dans un voile de mélancolie. Les rues désertes semblaient pleurer le jour disparu.\"</em></div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Ce texte relève de la tonalité <strong>lyrique</strong> ou <strong>élégiaque</strong>. Plusieurs indices le montrent :<br>- Un vocabulaire affectif et subjectif (<em>mélancolie</em>, <em>pleurer</em>).<br>- La présence d'une <strong>personnification</strong> (la ville drapée, les rues qui pleurent) qui crée une atmosphère empreinte de tristesse.<br>- Une tendance à l'expression des sentiments personnels (même si le \"je\" n'est pas explicite, la vision du monde est fortement marquée par l'émotion).</div>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
