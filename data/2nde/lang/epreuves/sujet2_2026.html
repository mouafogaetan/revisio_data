<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Langue Française",
  "classe": "Seconde",
  "sequence": "Séquence 2",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Analyse de la communication et de l'énonciation",
      "points": "5 pts",
      "enonce": "<div style='font-family: system-ui, sans-serif; line-height: 1.6; color: #1e293b; background: #f8fafc; padding: 1rem; border-radius: 8px;'><p>Lisez attentivement le texte suivant puis répondez aux questions.</p><p><em>« Chère Aminata, je t'écris cette lettre pour te dire à quel point ton amitié m'est précieuse. Depuis notre rencontre au collège, je n'ai jamais cessé de t'aimer comme une sœur. Tu es pour moi un pilier sur lequel je peux toujours compter. Pourtant, ces derniers temps, je sens comme un voile de tristesse s'abattre sur notre complicité. Où est passée notre joie de vivre ? Souviens-toi de nos fous rires, de nos secrets échangés à l'ombre du manguier. J'espère que tu sauras retrouver le chemin de mon cœur. »</em></p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>1)</strong> a) Identifier l'émetteur et le récepteur dans ce texte. Justifiez votre réponse en relevant les indices qui vous ont permis de les identifier.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'><strong>Émetteur :</strong> La personne qui écrit la lettre (le locuteur).<br><strong>Indices :</strong> Emploi de la 1ère personne (« je t'écris », « je n'ai jamais cessé », « je sens », « mon cœur »), adjectif possessif (« notre complicité », « notre joie »).<br><strong>Récepteur :</strong> Aminata, la destinataire de la lettre.<br><strong>Indices :</strong> Interpellation directe (« Chère Aminata »), emploi de la 2ème personne (« t'écris », « ton amitié », « t'aimer », « ta sœur »), adjectif possessif (« nos fous rires »).</div>"
        },
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>1)</strong> b) Relever deux marques de subjectivité dans ce texte.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'><strong>Exemples de marques de subjectivité :</strong><br>- Adjectif qualificatif : « précieuse ».<br>- Vocabulaire affectif : « tristesse », « joie de vivre », « complicité ».<br>- Interrogation : « Où est passée notre joie de vivre ? ».</div>"
        },
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>2)</strong> Identifier la situation d'énonciation en répondant aux questions suivantes : Qui parle ? À qui ? Quand ? Où ? Comment ?</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'><strong>Qui parle ?</strong> Une personne qui écrit à son amie.<br><strong>À qui ?</strong> À Aminata, son amie.<br><strong>Quand ?</strong> Le moment de l'écriture de la lettre (le présent de l'énonciation).<br><strong>Où ?</strong> Non précisé, mais on peut supposer un lieu où l'émetteur se trouve.<br><strong>Comment ?</strong> Avec émotion, nostalgie et sincérité.</div>"
        },
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>3)</strong> a) Identifier la fonction du langage dominante dans ce texte.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'>La fonction <strong>expressive (ou émotive)</strong> est dominante. Elle est centrée sur l'émetteur qui exprime ses sentiments (amitié, tristesse, nostalgie).</div>"
        },
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>3)</strong> b) Relever une phrase à la fonction conative et justifier votre réponse.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'><strong>Exemple :</strong> « J'espère que tu sauras retrouver le chemin de mon cœur. »<br><strong>Justification :</strong> Cette phrase est centrée sur le récepteur (Aminata) et vise à l'influencer, à susciter chez elle une prise de conscience.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Étude grammaticale",
      "points": "5 pts",
      "enonce": "<div style='font-family: system-ui, sans-serif; line-height: 1.6; color: #1e293b; background: #f8fafc; padding: 1rem; border-radius: 8px;'><p>Analysez les phrases suivantes extraites du texte de l'exercice 1.</p><p><em>« Depuis notre rencontre au collège, je n'ai jamais cessé de t'aimer comme une sœur. »</em></p><p><em>« Tu es pour moi un pilier sur lequel je peux toujours compter. »</em></p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>1)</strong> Dans la phrase « Depuis notre rencontre au collège, je n'ai jamais cessé de t'aimer comme une sœur. », identifier :<br>a) Le type de phrase.<br>b) Les substituts du référent.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'><strong>a) Type de phrase :</strong> Phrase déclarative.<br><strong>b) Substituts du référent :</strong> « notre rencontre » (substitut anaphorique), « le collège » (lieu), « je » (pronom personnel).</div>"
        },
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>2)</strong> Dans la phrase « Tu es pour moi un pilier sur lequel je peux toujours compter. », identifier :<br>a) La classe grammaticale de « pilier » et de « lequel ».<br>b) La fonction de la subordonnée relative.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'><strong>a) Classes grammaticales :</strong><br>- « pilier » : nom commun.<br>- « lequel » : pronom relatif composé.<br><strong>b) Fonction de la subordonnée relative :</strong> Complément de l'antécédent « pilier ».</div>"
        },
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>3)</strong> a) Donner le sens de l'expression « un pilier » dans ce contexte.<br>b) Expliquer la connotation de cette expression.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'><strong>a) Sens :</strong> Une personne sur qui on peut compter, un soutien solide.<br><strong>b) Connotation :</strong> L'expression connote la stabilité, la fiabilité et la force.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Analyse sémantique",
      "points": "4 pts",
      "enonce": "<div style='font-family: system-ui, sans-serif; line-height: 1.6; color: #1e293b; background: #f8fafc; padding: 1rem; border-radius: 8px;'><p>Étudiez le champ lexical et les sens dans le texte suivant.</p><p><em>« Le cœur gros de chagrin, il errait dans les rues sombres de la ville. Chaque pas résonnait comme un écho de sa souffrance. Le vent, complice de sa peine, sifflait tristement à ses oreilles. Il portait en lui le poids d'une solitude insupportable, une douleur qui semblait ne jamais vouloir s'apaiser. »</em></p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>1)</strong> Relever et construire le champ lexical de la souffrance dans ce texte.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'><strong>Champ lexical de la souffrance :</strong><br>- « chagrin »<br>- « souffrance »<br>- « peine »<br>- « solitude insupportable »<br>- « douleur »</div>"
        },
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>2)</strong> a) Donner le sens dénoté du mot « cœur ».<br>b) Donner le sens connoté du mot « cœur » dans ce contexte.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'><strong>a) Sens dénoté :</strong> Organe central de la circulation sanguine.<br><strong>b) Sens connoté :</strong> Siège des émotions, des sentiments.</div>"
        },
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>3)</strong> Identifier le procédé de formation du mot « insupportable » (préfixe, suffixe, radical).</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'><strong>Formation :</strong> Dérivation par adjonction du préfixe « in- » et du suffixe « -able » au radical « support ».</div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Figures de style et tonalité",
      "points": "4 pts",
      "enonce": "<div style='font-family: system-ui, sans-serif; line-height: 1.6; color: #1e293b; background: #f8fafc; padding: 1rem; border-radius: 8px;'><p>Analysez les figures de style et la tonalité du texte suivant.</p><p><em>« La nuit enveloppait la ville de son manteau sombre. Les étoiles, comme des diamants perdus, scintillaient faiblement. Le vent, tel un vieux sage, chuchotait des secrets oubliés. Mais le silence était un océan dans lequel ses pensées se noyaient lentement. »</em></p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>1)</strong> a) Identifier et nommer deux figures d'analogie dans ce texte.<br>b) Expliquer l'effet produit par l'une d'elles.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'><strong>a) Figures d'analogie :</strong><br>- Comparaison : « comme des diamants perdus ».<br>- Personnification : « le vent chuchotait », « la nuit enveloppait ».<br><strong>b) Effet de la personnification :</strong> Elle donne vie aux éléments naturels, crée une atmosphère poétique et mystérieuse.</div>"
        },
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>2)</strong> a) Identifier la métaphore dans ce texte.<br>b) Analyser ce qu'elle exprime.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'><strong>a) Métaphore :</strong> « le silence était un océan ».<br><strong>b) Analyse :</strong> Cette métaphore exprime l'immensité et l'engloutissement des pensées du personnage dans le silence, comme si elles se noyaient.</div>"
        },
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>3)</strong> Quelle tonalité domine dans ce texte ? Justifier votre réponse à partir d'indices.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'>La tonalité <strong>lyrique</strong> domine. Elle exprime les sentiments personnels du locuteur à travers l'évocation de la nuit, du vent et du silence. Les figures de style, le vocabulaire poétique et l'expression de l'intimité sont caractéristiques de cette tonalité.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Production écrite",
      "points": "2 pts",
      "enonce": "<div style='font-family: system-ui, sans-serif; line-height: 1.6; color: #1e293b; background: #f8fafc; padding: 1rem; border-radius: 8px;'><p>Rédigez un court texte narratif (5 à 7 lignes) dans lequel vous utiliserez :</p><ul><li>Au moins deux substituts du référent.</li><li>Une comparaison.</li><li>Une hyperbole.</li></ul><p>Le texte devra être cohérent et comporter un début, un développement et une fin.</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 0.75rem;'><strong>1)</strong> Rédiger le texte en respectant les consignes.</div>",
          "reponse": "<div style='background: #f1f5f9; padding: 0.75rem; border-radius: 8px; color: #0f172a;'><p><strong>Exemple de texte narratif :</strong></p><p><em>« Le vieux baobab, géant de la savane, avait vu défiler des générations. Ses branches, comme des bras protecteurs, abritaient les enfants du village. Lui, l'immortel, avait résisté à mille tempêtes. Mais ce jour-là, la foudre s'abattit sur lui. Le vieil arbre, qui avait tant donné, s'effondra dans un bruit assourdissant, un fracas qui résonna aux quatre coins du monde. »</em></p><p><strong>Substituts :</strong> « Le vieux baobab » / « ses branches » / « lui, l'immortel ». <strong>Comparaison :</strong> « comme des bras protecteurs ». <strong>Hyperbole :</strong> « un fracas qui résonna aux quatre coins du monde ».</p></div>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
