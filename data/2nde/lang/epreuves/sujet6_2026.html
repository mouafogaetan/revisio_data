<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Langue Française",
  "classe": "Seconde",
  "sequence": "Évaluation séquentielle n°6",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Énonciation et communication (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='font-size:1em; line-height:1.6;'>Lisez attentivement le texte suivant et répondez aux questions.</div><div style='background:#f0f0f0; padding:12px; border-radius:8px; margin:12px 0;'><p style='margin:0;'><strong>Texte :</strong></p><p style='margin:8px 0;'>\"Oh ! mon ami, que je suis heureux de te retrouver ! Cela fait si longtemps que je n'ai pas eu de tes nouvelles. Je t'ai tant écrit, mais tu ne m'as jamais répondu. Dis-moi, comment vas-tu ? Et ta famille ?\"</p></div>",
      "questions": [
        {
          "question": "1) Qui est l'émetteur explicite dans ce texte ? Justifiez votre réponse en relevant deux indices.",
          "reponse": "L'émetteur explicite est la personne qui parle, identifiée par les pronoms personnels <strong>\"je\"</strong> (\"que je suis heureux\", \"je t'ai tant écrit\") et l'adjectif possessif <strong>\"mon\"</strong> (\"mon ami\")."
        },
        {
          "question": "2) À qui s'adresse l'émetteur ? Identifiez le récepteur explicite et justifiez par deux indices.",
          "reponse": "Le récepteur explicite est l'ami à qui l'émetteur s'adresse. Les indices sont : le pronom personnel <strong>\"tu\"</strong> (\"te retrouver\", \"tu ne m'as jamais répondu\") et le nom <strong>\"ami\"</strong> (\"mon ami\")."
        },
        {
          "question": "3) Identifiez la ou les fonctions du langage dominantes dans ce texte. Justifiez votre réponse.",
          "reponse": "La <strong>fonction expressive (ou émotive)</strong> est dominante car le texte exprime les sentiments de l'émetteur (joie, tristesse, reproche) à travers les exclamations (\"Oh !\") et le vocabulaire affectif (\"heureux\", \"tant\"). La <strong>fonction conative (ou impressive)</strong> est également présente car le texte cherche à agir sur le récepteur à travers les questions (\"comment vas-tu ?\") et l'apostrophe (\"mon ami\")."
        }
      ]
    },
    {
      "titre": "Exercice 2 : Classes grammaticales et formation des mots (5 pts)",
      "points": "5 pts",
      "enonce": "<div style='font-size:1em; line-height:1.6;'>Répondez aux questions suivantes sur les classes grammaticales et la formation des mots.</div>",
      "questions": [
        {
          "question": "1) Classez les mots suivants dans le tableau selon leur nature (variable ou invariable) :<br><span style='background:#f0f0f0; padding:2px 6px;'>maison, rapidement, et, elle, devant, courageux, pour, hier</span><br><br>a) Mots variables :<br>b) Mots invariables :",
          "reponse": "a) <strong>Mots variables :</strong> maison (nom), elle (pronom), courageux (adjectif)<br>b) <strong>Mots invariables :</strong> rapidement (adverbe), et (conjonction), devant (préposition), pour (préposition), hier (adverbe)"
        },
        {
          "question": "2) Identifiez la nature (classe grammaticale) des mots en gras dans les phrases suivantes :<br>a) <strong>Il</strong> est arrivé hier.<br>b) Elle a acheté <strong>une</strong> belle robe.<br>c) Il travaille <strong>pour</strong> réussir.<br>d) <strong>Hélas</strong> ! Il est trop tard.",
          "reponse": "a) <strong>Il</strong> : pronom personnel<br>b) <strong>une</strong> : article indéfini<br>c) <strong>pour</strong> : préposition<br>d) <strong>Hélas</strong> : interjection"
        },
        {
          "question": "3) Expliquez le procédé de formation des mots suivants :<br>a) <strong>Défaire</strong> (à partir de faire)<br>b) <strong>Jardinier</strong> (à partir de jardin)<br>c) <strong>Porte-monnaie</strong><br>d) <strong>Vélo</strong> (à partir de vélocipède)",
          "reponse": "a) <strong>Défaire</strong> : <strong>dérivation par préfixation</strong> (ajout du préfixe \"dé-\" au verbe \"faire\")<br>b) <strong>Jardinier</strong> : <strong>dérivation par suffixation</strong> (ajout du suffixe \"-ier\" au nom \"jardin\")<br>c) <strong>Porte-monnaie</strong> : <strong>composition</strong> (association de deux mots \"porte\" et \"monnaie\" avec trait d'union)<br>d) <strong>Vélo</strong> : <strong>abréviation par apocope</strong> (suppression de la fin du mot \"vélocipède\")"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Analyse textuelle - Types de textes (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='font-size:1em; line-height:1.6;'>Identifiez le type de texte dominant dans chacun des extraits suivants et justifiez votre réponse par au moins deux indices précis.</div>",
      "questions": [
        {
          "question": "Extrait 1 :<br><div style='background:#f0f0f0; padding:10px; border-radius:6px; margin:6px 0;'>\"Il était une fois, dans un petit village, un jeune homme nommé Koffi. Il vivait avec sa mère dans une case modeste. Un matin, il décida de partir à la recherche de son père disparu.\"</div><br>Type de texte :",
          "reponse": "<strong>Texte narratif</strong><br>Indices :<br>- Utilisation du passé simple (\"vécut\", \"partit\") et de l'imparfait (\"vivait\")<br>- Présence de repères temporels (\"une fois\", \"un matin\")<br>- Présence de personnages (Koffi, sa mère) et d'actions qui s'enchaînent<br>- Formule d'ouverture typique du conte (\"Il était une fois\")"
        },
        {
          "question": "Extrait 2 :<br><div style='background:#f0f0f0; padding:10px; border-radius:6px; margin:6px 0;'>\"La salle de classe était vaste et lumineuse. De grandes fenêtres s'ouvraient sur un jardin fleuri. Les murs, peints en blanc, étaient ornés de tableaux d'élèves. Au fond, un grand tableau noir attendait les leçons du jour.\"</div><br>Type de texte :",
          "reponse": "<strong>Texte descriptif</strong><br>Indices :<br>- Emploi des verbes d'état (\"était\", \"s'ouvraient\", \"étaient ornés\")<br>- Présence de compléments de lieu (\"sur un jardin\", \"au fond\")<br>- Utilisation d'adjectifs qualificatifs (\"vaste\", \"lumineuse\", \"grand\", \"noir\")<br>- Fonction première : faire voir, créer une atmosphère"
        },
        {
          "question": "Extrait 3 :<br><div style='background:#f0f0f0; padding:10px; border-radius:6px; margin:6px 0;'>\"Il est urgent d'agir contre la pollution. En effet, les déchets plastiques envahissent nos océans et menacent la vie marine. Si nous ne changeons pas nos habitudes, les conséquences seront dramatiques pour les générations futures.\"</div><br>Type de texte :",
          "reponse": "<strong>Texte argumentatif</strong><br>Indices :<br>- Présence d'une thèse défendue (\"Il est urgent d'agir contre la pollution\")<br>- Utilisation de connecteurs logiques (\"En effet\", \"Si... les conséquences seront...\")<br>- Emploi du conditionnel (\"seraient\") pour exprimer une hypothèse<br>- Recherche de persuasion du lecteur"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Figures de style et tonalités (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='font-size:1em; line-height:1.6;'>Identifiez les figures de style et les tonalités (registres) dans les phrases suivantes.</div>",
      "questions": [
        {
          "question": "1) Figure de style :<br>a) \"Il court plus vite que le vent.\"<br>b) \"Cet enfant est un lion.\"<br>c) \"Le soleil sourit aux récoltes.\"<br>d) \"Il a plu toute la journée ; cependant, il est sorti.\"",
          "reponse": "a) <strong>Hyperbole</strong> (exagération expressive de la vitesse)<br>b) <strong>Métaphore</strong> (comparaison sans outil de comparaison, assimilation du courage de l'enfant à celui du lion)<br>c) <strong>Personnification</strong> (attribution d'un comportement humain au soleil)<br>d) <strong>Antithèse</strong> (opposition entre la pluie et la sortie, opposant la contrainte à la liberté)"
        },
        {
          "question": "2) Tonalité (registre) :<br>a) \"Ô triste, triste était mon âme !\"<br>b) \"Il a perdu son procès, mais que voulez-vous, c'est la vie.\"<br>c) \"Le héros s'élança, l'épée haute, défiant les armées ennemies.\"<br>d) \"Ah ! Que ne suis-je né plus tôt pour connaître ces merveilles !\"",
          "reponse": "a) <strong>Registre lyrique</strong> (expression des sentiments personnels, exclamation \"Ô\", répétition de \"triste\")<br>b) <strong>Registre ironique</strong> (apparente résignation, antiphrase, légèreté face à une situation grave)<br>c) <strong>Registre épique</strong> (célébration d'un héros, hyperbole, vocabulaire héroïque : \"s'élança\", \"défiant\")<br>d) <strong>Registre pathétique</strong> (expression d'une souffrance, regret, exclamation, expression d'un désir impossible)"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Analyse de texte - Implicite, substituts et ponctuation (3 pts)",
      "points": "3 pts",
      "enonce": "<div style='font-size:1em; line-height:1.6;'>Lisez le texte suivant et répondez aux questions.</div><div style='background:#f0f0f0; padding:12px; border-radius:8px; margin:12px 0;'><p style='margin:0;'>\"Le vieil homme s'arrêta un instant. Il observa la ville qui s'étendait à ses pieds. Ses yeux fatigués parcoururent les toits, les rues, les lumières... Un sourire triste éclaira son visage. Ah ! Tant de souvenirs...\"</p></div>",
      "questions": [
        {
          "question": "1) Identifiez les substituts anaphoriques du référent <strong>\"le vieil homme\"</strong> dans le texte.",
          "reponse": "Les substituts anaphoriques du référent \"le vieil homme\" sont :<br>- <strong>\"Il\"</strong> (pronom personnel, 1ère phrase)<br>- <strong>\"Ses\"</strong> (adjectif possessif, 3ème phrase : \"Ses yeux fatigués\")<br>- <strong>\"son\"</strong> (adjectif possessif, 4ème phrase : \"son visage\")"
        },
        {
          "question": "2) Analysez l'effet produit par les points de suspension et la ponctuation expressive dans ce texte.",
          "reponse": "Les points de suspension (\"les lumières...\", \"Ah ! Tant de souvenirs...\") créent un effet de <strong>suspense, d'inachevé</strong> et suggèrent une <strong>réflexion intérieure</strong>. Ils invitent le lecteur à imaginer ce qui n'est pas dit. Le point d'exclamation (\"Ah !\") exprime une <strong>émotion forte</strong> (nostalgie, mélancolie). L'ensemble crée une <strong>atmosphère de solitude et de recueillement</strong>."
        },
        {
          "question": "3) Relevez un implicite dans ce texte et interprétez-le.",
          "reponse": "L'implicite est que le vieil homme est <strong>nostalgique, solitaire et rempli de souvenirs</strong>. Les détails suggèrent qu'il se remémore le passé, sans qu'il soit explicitement dit. La fatigue de ses yeux (\"yeux fatigués\"), la tristesse du sourire (\"sourire triste\") et la réminiscence des lumières renvoient à des souvenirs anciens. Il semble être seul et regarder la ville d'un point de vue élevé, ce qui suggère une forme d'isolement ou de méditation sur sa vie passée."
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
