<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Langue Française",
  "classe": "Seconde",
  "sequence": "Séquence 1",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : L'énonciation et les fonctions du langage (6 pts)",
      "points": "6 pts",
      "enonce": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 8px;'><p style='margin: 0; color: #2c3e50;'>Cet exercice porte sur l'identification de l'émetteur, du récepteur et des fonctions du langage dans un texte.</p></div>",
      "questions": [
        {
          "question": "<p><strong>Texte support :</strong></p><div style='background-color: #e8f4f8; padding: 12px; border-radius: 8px; margin: 10px 0; font-style: italic;'><p>« Ô toi, mon cher ami, qui me lis en ce jour de tristesse ! Sais-tu combien ton absence me pèse ? Hélas ! Je ne trouve de réconfort que dans l'écriture. Mon cœur est lourd, mes nuits sont blanches. Reviens vite, je t'en supplie. »</p></div>",
          "reponse": "<p><em>Les réponses ci-dessous correspondent aux questions posées.</em></p>"
        },
        {
          "question": "<p><strong>1. Identification de l'émetteur et du récepteur (2 pts)</strong></p><p>a) (1 pt) Identifie l'émetteur et le récepteur dans ce texte en relevant au moins deux indices pour chacun.</p><p>b) (1 pt) Quelle est la nature de la relation entre l'émetteur et le récepteur ? Justifie ta réponse.</p>",
          "reponse": "<p><strong>a) (1 pt)</strong></p><ul><li><strong>Émetteur :</strong> Le locuteur est identifiable par : « je », « mon cœur » (1ère personne), « mon cher ami ».</li><li><strong>Récepteur :</strong> Le destinataire est identifiable par : « toi », « tu » (2ème personne), « mon cher ami ».</li></ul><p><strong>b) (1 pt)</strong> Il s'agit d'une relation <strong>amicale</strong> et <strong>intime</strong> marquée par une grande proximité affective. Les marques de cette intimité sont : « mon cher ami », « je t'en supplie », l'expression des sentiments personnels.</p>"
        },
        {
          "question": "<p><strong>2. Fonctions du langage (4 pts)</strong></p><p>a) (1 pt) Définis la fonction expressive et la fonction conative selon le modèle de Jakobson.</p><p>b) (2 pts) Identifie les fonctions dominantes dans le texte et justifie ta réponse en relevant des indices précis.</p><p>c) (1 pt) Relève dans le texte un indice de la fonction phatique et explique son rôle.</p>",
          "reponse": "<p><strong>a) (1 pt)</strong></p><ul><li>La <strong>fonction expressive</strong> (ou émotive) est centrée sur l'émetteur. Elle exprime les sentiments, émotions et opinions du locuteur.</li><li>La <strong>fonction conative</strong> (ou impressive) est centrée sur le récepteur. Elle vise à agir sur le destinataire, à le faire réagir.</li></ul><p><strong>b) (2 pts)</strong></p><ul><li><strong>Fonction expressive :</strong> dominante. Indices : pronoms « je », « mon cœur », « mes nuits » ; interjection « Hélas ! » ; vocabulaire affectif (« tristesse », « lourd », « blanches ») ; ponctuation exclamative.</li><li><strong>Fonction conative :</strong> également présente. Indices : pronoms « toi », « tu » ; impératif « Reviens » ; expression suppliante « je t'en supplie ».</li></ul><p><strong>c) (1 pt)</strong> Indice de la fonction phatique : l'apostrophe « Ô toi, mon cher ami, qui me lis » qui vise à établir et maintenir le contact avec le destinataire.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Les éléments de la communication et la situation d'énonciation (5 pts)",
      "points": "5 pts",
      "enonce": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 8px;'><p style='margin: 0; color: #2c3e50;'>Cet exercice permet d'analyser les éléments de la communication et la situation d'énonciation.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. Les six éléments de la communication (2 pts)</strong></p><p>a) (1 pt) Nomme les six éléments de la communication selon le schéma de Roman Jakobson.</p><p>b) (1 pt) À partir du texte de l'exercice 1, identifie le message et le référent.</p>",
          "reponse": "<p><strong>a) (1 pt)</strong> Les six éléments sont :</p><ul><li><strong>Émetteur</strong> (celui qui envoie le message)</li><li><strong>Récepteur</strong> (celui qui reçoit le message)</li><li><strong>Message</strong> (ce qui est transmis)</li><li><strong>Référent</strong> (ce dont on parle)</li><li><strong>Code</strong> (la langue utilisée)</li><li><strong>Canal</strong> (le moyen de transmission)</li></ul><p><strong>b) (1 pt)</strong></p><ul><li><strong>Message :</strong> L'expression de la douleur de l'émetteur due à l'absence de son ami et la demande de retour.</li><li><strong>Référent :</strong> L'absence d'un ami cher, la tristesse du locuteur.</li></ul>"
        },
        {
          "question": "<p><strong>2. La situation d'énonciation (3 pts)</strong></p><p>Réponds aux cinq questions de la situation d'énonciation à partir du texte de l'exercice 1 :</p><ul><li>Qui parle ?</li><li>À qui ?</li><li>Quand ?</li><li>Où ?</li><li>Comment ?</li></ul>",
          "reponse": "<p><strong>Qui parle ?</strong> Un locuteur qui exprime sa tristesse (identifié par « je », « mon cœur »).</p><p><strong>À qui ?</strong> À un ami cher (identifié par « toi », « mon cher ami »).</p><p><strong>Quand ?</strong> Au moment présent (« en ce jour de tristesse »).</p><p><strong>Où ?</strong> Le lieu n'est pas précisé dans le texte (cadre spatio-temporel indéterminé).</p><p><strong>Comment ?</strong> Sur un ton pathétique, marqué par l'émotion et la supplication (interjections, exclamations, impératifs).</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Grammaire et classes de mots (5 pts)",
      "points": "5 pts",
      "enonce": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 8px;'><p style='margin: 0; color: #2c3e50;'>Cet exercice porte sur l'identification des classes de mots et l'analyse des substituts du référent.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. Classes de mots variables (2 pts)</strong></p><p>Relève dans la phrase suivante un exemple de chaque classe de mots variables demandée :</p><p><em>« Ces vieux livres racontent des histoires merveilleuses que nous aimons. »</em></p><p>a) (0.5 pt) Un nom</p><p>b) (0.5 pt) Un article</p><p>c) (0.5 pt) Un pronom</p><p>d) (0.5 pt) Un adjectif</p>",
          "reponse": "<p><strong>a) (0.5 pt)</strong> Nom : « livres » ou « histoires »</p><p><strong>b) (0.5 pt)</strong> Article : « Ces » (démonstratif) ou « des » (indéfini) ou « les » (défini contracté dans « aimons »)</p><p><strong>c) (0.5 pt)</strong> Pronom : « que » (relatif) ou « nous » (personnel)</p><p><strong>d) (0.5 pt)</strong> Adjectif : « vieux » (qualificatif), « merveilleuses » (qualificatif) ou « Ces » (démonstratif)</p>"
        },
        {
          "question": "<p><strong>2. Classes de mots invariables (1.5 pts)</strong></p><p>a) (0.5 pt) Dans la phrase précédente, relève un adverbe et justifie son rôle.</p><p>b) (0.5 pt) Relève une conjonction et indique sa nature (coordination/subordination).</p><p>c) (0.5 pt) Relève une préposition.</p>",
          "reponse": "<p><strong>a) (0.5 pt)</strong> Il n'y a pas d'adverbe dans cette phrase. L'adverbe modifie le verbe, l'adjectif ou un autre adverbe.</p><p><strong>b) (0.5 pt)</strong> « que » est une conjonction de subordination (introduit la relative « que nous aimons »).</p><p><strong>c) (0.5 pt)</strong> Il n'y a pas de préposition dans cette phrase.</p>"
        },
        {
          "question": "<p><strong>3. Les substituts du référent (1.5 pts)</strong></p><p>Dans le texte suivant, relève les substituts du référent <strong>« le vieillard »</strong> :</p><p><em>« Le vieillard s'approcha. L'homme âgé portait un lourd fardeau. Il semblait épuisé. Ses jambes tremblaient sous le poids des ans. Le pauvre murmura une prière. »</em></p>",
          "reponse": "<p>Les substituts du référent <strong>« le vieillard »</strong> sont :</p><ul><li><strong>Substitut lexical :</strong> « L'homme âgé », « Le pauvre »</li><li><strong>Substitut grammatical :</strong> « Il » (pronom personnel), « Ses » (adjectif possessif)</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Polysémie, dénotation et connotation (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='background-color: #f8f9fa; padding: 12px; border-radius: 8px;'><p style='margin: 0; color: #2c3e50;'>Cet exercice permet d'analyser la polysémie, la dénotation et la connotation des mots en contexte.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. La polysémie (2 pts)</strong></p><p>a) (1 pt) Définis la polysémie.</p><p>b) (1 pt) Le mot « cœur » est polysémique. Donne trois sens possibles de ce mot en les illustrant par des exemples.</p>",
          "reponse": "<p><strong>a) (1 pt)</strong> La <strong>polysémie</strong> est la propriété d'un mot qui possède plusieurs sens différents selon le contexte dans lequel il est utilisé. Ces sens sont liés entre eux par un rapport sémantique.</p><p><strong>b) (1 pt)</strong> Sens du mot « cœur » :</p><ul><li><strong>Organe vital :</strong> « Le cœur du patient bat régulièrement. »</li><li><strong>Sentiments, affectivité :</strong> « Mon cœur est rempli de joie. »</li><li><strong>Centre d'un lieu :</strong> « Le cœur de la ville est animé. »</li></ul>"
        },
        {
          "question": "<p><strong>2. Dénotation et connotation (2 pts)</strong></p><p>a) (0.5 pt) Définis la dénotation.</p><p>b) (0.5 pt) Définis la connotation.</p><p>c) (1 pt) Analyse la dénotation et la connotation du mot <strong>« vautour »</strong> dans l'expression : <em>« Ces vautours de la politique n'ont que leur propre intérêt en tête. »</em></p>",
          "reponse": "<p><strong>a) (0.5 pt)</strong> La <strong>dénotation</strong> est le sens premier, objectif et universel d'un mot, tel qu'il est défini dans le dictionnaire.</p><p><strong>b) (0.5 pt)</strong> La <strong>connotation</strong> est le sens secondaire, subjectif et contextuel d'un mot, lié aux émotions, jugements et associations qu'il évoque.</p><p><strong>c) (1 pt)</strong></p><ul><li><strong>Dénotation :</strong> Le vautour est un grand oiseau rapace charognard.</li><li><strong>Connotation :</strong> L'expression connote la <strong>rapacité</strong>, l'<strong>avidité</strong>, le fait de profiter des autres, l'absence de scrupules. Elle a une connotation <strong>négative</strong> et vise à critiquer sévèrement les hommes politiques.</li></ul>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
