<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Info 2nd C",
  "classe": "Seconde C",
  "sequence": "Évaluation séquentielle n°4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Matériel et configuration de l'ordinateur (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='font-size:1em; line-height:1.5;'>Cet exercice porte sur les ports, les composants matériels et la configuration d'un ordinateur.</div>",
      "questions": [
        {
          "question": "1) Donnez la signification des sigles suivants : USB, VGA, HDMI, SATA, AGP.",
          "reponse": "<ul><li><strong>USB</strong> : Universal Serial Bus (bus série universel) - port permettant de connecter de nombreux périphériques.</li><li><strong>VGA</strong> : Video Graphics Array - port pour connecter un écran (signal analogique).</li><li><strong>HDMI</strong> : High Definition Multimedia Interface - port pour connecter un écran (signal numérique haute définition).</li><li><strong>SATA</strong> : Serial Advanced Technology Attachment - interface de connexion pour disques durs et lecteurs optiques.</li><li><strong>AGP</strong> : Accelerated Graphics Port - port dédié à la carte graphique (désormais remplacé par PCIe).</li></ul>"
        },
        {
          "question": "2) Citez les caractéristiques du processeur, de la mémoire RAM et du disque dur.",
          "reponse": "<ul><li><strong>Processeur :</strong> Fréquence (en GHz), marque (Intel, AMD), type (Core i3, i5, i7, Ryzen).</li><li><strong>Mémoire RAM :</strong> Capacité (en Go), temps d'accès (en ns), débit (en Mo/s ou Go/s).</li><li><strong>Disque dur :</strong> Capacité (en Go ou To), vitesse de rotation (en tours/min), temps d'accès (en ms).</li></ul>"
        },
        {
          "question": "3) Distinguez un logiciel propriétaire d'un logiciel libre (open source). Donnez un exemple pour chaque.",
          "reponse": "<ul><li><strong>Logiciel propriétaire :</strong> Le code source n'est pas accessible, l'utilisation est soumise à des licences et souvent payante. <em>Exemple : Microsoft Windows, Adobe Photoshop.</em></li><li><strong>Logiciel libre (open source) :</strong> Le code source est accessible, modifiable et redistribuable librement. <em>Exemple : Linux, LibreOffice, GIMP.</em></li></ul>"
        },
        {
          "question": "4) Expliquez ce qu'est un attribut de fichier et citez-en quatre exemples.",
          "reponse": "Les attributs d'un fichier sont des propriétés qui définissent son comportement dans le système d'exploitation. Les principaux attributs sont :</p><ul><li><strong>Lecture seule (Read-only) :</strong> Le fichier ne peut pas être modifié ou supprimé.</li><li><strong>Archive :</strong> Indique que le fichier a été modifié et doit être sauvegardé.</li><li><strong>Caché (Hidden) :</strong> Le fichier n'est pas visible dans l'explorateur par défaut.</li><li><strong>Système (System) :</strong> Fichier utilisé par le système d'exploitation.</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Entretien des supports de stockage (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='font-size:1em; line-height:1.5;'>Les questions suivantes portent sur les opérations de maintenance des supports de stockage.</div>",
      "questions": [
        {
          "question": "1) Définissez les opérations suivantes :<br>a) Nettoyage de disque<br>b) Sauvegarde (backup)<br>c) Défragmentation<br>d) Partitionnement",
          "reponse": "<ul><li><strong>Nettoyage de disque :</strong> Opération qui consiste à supprimer les fichiers temporaires inutiles, vider la corbeille et libérer de l'espace de stockage.</li><li><strong>Sauvegarde (backup) :</strong> Copie des données importantes sur un support distinct (disque externe, clé USB, Cloud) pour les protéger contre une perte.</li><li><strong>Défragmentation :</strong> Opération qui regroupe les fragments de fichiers éparpillés sur le disque pour améliorer les temps d'accès.</li><li><strong>Partitionnement :</strong> Division d'un disque dur en plusieurs parties logiques (partitions) pour organiser les données ou installer plusieurs systèmes d'exploitation.</li></ul>"
        },
        {
          "question": "2) Quelles sont les principales causes de défaillance d'un disque dur ?",
          "reponse": "Les principales causes de défaillance d'un disque dur sont :</p><ul><li><strong>Facteurs environnementaux :</strong> Humidité, température excessive, poussières.</li><li><strong>Problèmes électriques :</strong> Surtensions, coupures d'électricité.</li><li><strong>Chocs et vibrations :</strong> Chutes, mouvements brusques pendant le fonctionnement.</li><li><strong>Usure mécanique :</strong> Vieillissement des composants (moteur, têtes de lecture/écriture).</li></ul>"
        },
        {
          "question": "3) Expliquez la différence entre un formatage de bas niveau (physique) et un formatage de haut niveau (logique).",
          "reponse": "<ul><li><strong>Formatage de bas niveau (physique) :</strong> Opération qui réorganise la structure du disque en créant les pistes, les secteurs et les zones de données. Il efface toutes les données et est rarement effectué par l'utilisateur final.</li><li><strong>Formatage de haut niveau (logique) :</strong> Opération qui crée le système de fichiers sur une partition (ex: NTFS, FAT32) et efface les tables de fichiers, rendant les données inaccessibles. C'est le formatage couramment effectué par les utilisateurs.</li></ul>"
        },
        {
          "question": "4) Dans le cadre de la maintenance préventive, quelles sont les opérations recommandées pour un disque dur ?",
          "reponse": "Les opérations recommandées sont :</p><ul><li>Effectuer régulièrement un <strong>nettoyage du disque</strong> pour supprimer les fichiers temporaires.</li><li>Réaliser une <strong>défragmentation</strong> périodique (surtout pour les disques durs mécaniques).</li><li>Effectuer des <strong>sauvegardes régulières</strong> des données importantes.</li><li>Scanner le disque avec un <strong>antivirus</strong> pour détecter les agents malveillants.</li><li>Vérifier l'état du disque avec des outils comme <strong>CHKDSK</strong>.</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Production de documents (Texte, Tableur, Présentation) (5 pts)",
      "points": "5 pts",
      "enonce": "<div style='font-size:1em; line-height:1.5;'>Cet exercice porte sur les fonctionnalités des logiciels de bureautique : traitement de texte, tableur et présentation.</div>",

          "question": "1) Citez trois fonctions prédéfinies d'un tableur, en précisant leur utilité.",
          "reponse": "<ul><li><strong>SOMME :</strong> Calcule la somme des valeurs d'une plage de cellules.</li><li><strong>MOYENNE :</strong> Calcule la moyenne arithmétique des valeurs d'une plage de cellules.</li><li><strong>SI :</strong> Permet d'afficher un résultat différent selon qu'une condition est vraie ou fausse (fonction logique).</li></ul>"
        },
        {
          "question": "2) Distinguez une référence relative d'une référence absolue dans un tableur.",
          "reponse": "<ul><li><strong>Référence relative :</strong> S'ajuste automatiquement lorsqu'on recopie la formule vers d'autres cellules. <em>Exemple : A1</em></li><li><strong>Référence absolue :</strong> Reste fixe lorsqu'on recopie la formule. On la note avec le symbole $ devant la colonne et/ou la ligne. <em>Exemple : $A$1</em></li></ul>"
        },
        {
          "question": "3) Qu'appelle-t-on, dans un logiciel de traitement de texte :<br>a) Un style ?<br>b) Une page de garde ?<br>c) Une table des matières ?",
          "reponse": "<ul><li><strong>Style :</strong> Un ensemble prédéfini de caractéristiques de mise en forme (police, taille, couleur, interlignage) que l'on peut appliquer rapidement à un texte.</li><li><strong>Page de garde :</strong> Première page d'un document qui contient généralement le titre, le nom de l'auteur, la date et d'autres informations d'identification.</li><li><strong>Table des matières :</strong> Liste structurée des titres et sous-titres du document avec leurs numéros de page, générée automatiquement à partir des styles de titre.</li></ul>"
        },
        {
          "question": "4) Dans un logiciel de présentation, définissez les notions suivantes :<br>a) Diaporama<br>b) Transition<br>c) Animation",
          "reponse": "<ul><li><strong>Diaporama :</strong> Succession de diapositives présentées à l'écran, formant une présentation complète.</li><li><strong>Transition :</strong> Effet visuel qui s'applique lors du passage d'une diapositive à la suivante.</li><li><strong>Animation :</strong> Effet d'apparition, de déplacement ou de disparition appliqué à un objet (texte, image) sur une diapositive.</li></ul>"
        },
        {
          "question": "5) Un élève souhaite réaliser un bulletin de notes avec les notes de 3 matières. Quelles fonctions du tableur peut-il utiliser pour :<br>a) Calculer la moyenne générale ?<br>b) Obtenir la meilleure note ?<br>c) Obtenir la moins bonne note ?",
          "reponse": "<ul><li><strong>Moyenne générale :</strong> Fonction <code>=MOYENNE()</code></li><li><strong>Meilleure note :</strong> Fonction <code>=MAX()</code></li><li><strong>Moins bonne note :</strong> Fonction <code>=MIN()</code></li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Infographie et multimédia (3 pts)",
      "points": "3 pts",
      "enonce": "<div style='font-size:1em; line-height:1.5;'>Les questions suivantes portent sur l'infographie, les types d'images et les formats de fichiers multimédia.</div>",
      "questions": [
        {
          "question": "1) Définissez l'infographie et citez trois domaines d'application.",
          "reponse": "L'infographie est la création d'images numériques assistée par ordinateur. Elle consiste à utiliser des outils informatiques pour produire et manipuler des images.</p><p>Domaines d'application :</p><ul><li><strong>Médecine et biométrie :</strong> radiologie, imagerie médicale (2D, 3D, 4D), identification biométrique.</li><li><strong>Communication :</strong> publicité, audiovisuel, presse.</li><li><strong>Ingénierie :</strong> maquettes de bâtiments, conception de produits.</li></ul>"
        },
        {
          "question": "2) Distinguez les images matricielles (bitmap) des images vectorielles.",
          "reponse": "<ul><li><strong>Images matricielles (bitmap) :</strong> Composées d'une grille de points (pixels en 2D, voxels en 3D). La qualité se dégrade lorsqu'on les agrandit (pixelisation). Formats : .bmp, .gif, .jpg, .png, .tif.</li><li><strong>Images vectorielles :</strong> Représentées par des formules mathématiques (lignes, courbes, formes géométriques). Peuvent être agrandies sans perte de qualité. Formats : .wmf, .dxf, .svg, .ai.</li></ul>"
        },
        {
          "question": "3) Citez deux formats de fichiers pour chaque type de média :<br>a) Image<br>b) Audio<br>c) Vidéo",
          "reponse": "<ul><li><strong>Image :</strong> .jpg, .png</li><li><strong>Audio :</strong> .mp3, .wav</li><li><strong>Vidéo :</strong> .mp4, .avi</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Algorithmique et HTML (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='font-size:1em; line-height:1.5;'>Cet exercice porte sur les bases de l'algorithmique et la programmation HTML.</div>",
      "questions": [
        {
          "question": "1) Définissez : algorithme, variable, constante et programme.",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>
