<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Informatique",
  "classe": "Seconde C",
  "sequence": "Séquence 2",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Architecture de l'ordinateur (5 pts)",
      "points": "5 pts",
      "enonce": "<div style='background: #f0f8ff; padding: 15px; border-radius: 10px; color: #1a1a2e; font-size: 0.95em;'><p>L'unité centrale est le cœur de l'ordinateur. Elle abrite plusieurs composants essentiels à son fonctionnement.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. (1 pt)</strong> Définis les termes suivants :</p><ul><li><strong>a) Port</strong></li><li><strong>b) Processeur</strong></li></ul>",
          "reponse": "<p><strong>Port :</strong> Un port est une interface de connexion située à l'arrière ou à l'avant de l'unité centrale, permettant de relier des périphériques (clavier, souris, écran, imprimante) à l'ordinateur.</p><p><strong>Processeur (CPU) :</strong> Le processeur est le cerveau de l'ordinateur. Il exécute les instructions des programmes en effectuant des opérations de calcul et de contrôle.</p>"
        },
        {
          "question": "<p><strong>2. (0,5 pt)</strong> Quelle est l'unité de mesure de la vitesse du processeur ?</p>",
          "reponse": "<p>La vitesse du processeur est mesurée en <strong>Hertz (Hz)</strong>, plus précisément en <strong>Gigahertz (GHz)</strong>. Un processeur de 2,5 GHz effectue 2,5 milliards de cycles par seconde.</p>"
        },
        {
          "question": "<p><strong>3. (1 pt)</strong> Donne la signification des sigles suivants : <strong>USB, VGA, CPU</strong></p>",
          "reponse": "<ul><li><strong>USB :</strong> Universal Serial Bus (Bus série universel)</li><li><strong>VGA :</strong> Video Graphics Array (matrice graphique vidéo)</li><li><strong>CPU :</strong> Central Processing Unit (Unité centrale de traitement)</li></ul>"
        },
        {
          "question": "<p><strong>4. (1,5 pt)</strong> Lister 3 composants principaux de l'unité centrale et donner leur rôle.</p>",
          "reponse": "<ul><li><strong>Processeur (CPU) :</strong> Exécute les instructions et effectue les calculs.</li><li><strong>Mémoire RAM :</strong> Stocke temporairement les données et les programmes en cours d'exécution.</li><li><strong>Disque dur :</strong> Stocke de manière permanente les données (système d'exploitation, programmes, fichiers).</li></ul>"
        },
        {
          "question": "<p><strong>5. (1 pt)</strong> Cite 3 critères à prendre en compte pour choisir un ordinateur.</p>",
          "reponse": "<ul><li><strong>Le processeur :</strong> Sa marque, son nombre de cœurs et sa fréquence.</li><li><strong>La mémoire RAM :</strong> Sa capacité (plus elle est grande, plus l'ordinateur est rapide).</li><li><strong>Le disque dur :</strong> Sa capacité de stockage (en Go ou To).</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Logiciels et fichiers (5 pts)",
      "points": "5 pts",
      "enonce": "<div style='background: #fff5e6; padding: 15px; border-radius: 10px; color: #1a1a2e; font-size: 0.95em;'><p>La gestion des logiciels et des fichiers est une compétence fondamentale en informatique.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. (1 pt)</strong> Distingue logiciel système et logiciel d'application en donnant un exemple pour chacun.</p>",
          "reponse": "<ul><li><strong>Logiciel système :</strong> Il gère les ressources matérielles et fournit une interface utilisateur. Exemple : <strong>Windows 11</strong>.</li><li><strong>Logiciel d'application :</strong> Il permet de réaliser une tâche spécifique. Exemple : <strong>Microsoft Word</strong>.</li></ul>"
        },
        {
          "question": "<p><strong>2. (1,5 pt)</strong> Explique les différents modes d'obtention des logiciels suivants : <strong>propriétaire, freeware, shareware, open source</strong>.</p>",
          "reponse": "<ul><li><strong>Propriétaire :</strong> Logiciel payant, le code source est protégé. Exemple : Microsoft Office.</li><li><strong>Freeware :</strong> Logiciel gratuit, mais le code source est fermé. Exemple : Adobe Acrobat Reader.</li><li><strong>Shareware :</strong> Logiciel distribué gratuitement pour un essai, avant de payer. Exemple : WinRAR.</li><li><strong>Open source :</strong> Logiciel gratuit dont le code source est accessible et modifiable. Exemple : LibreOffice.</li></ul>"
        },
        {
          "question": "<p><strong>3. (1 pt)</strong> Qu'est-ce qu'un fichier et un dossier ?</p>",
          "reponse": "<ul><li><strong>Fichier :</strong> Un fichier est une unité logique d'informations stockée sur un support (disque dur, clé USB). Il contient des données (texte, image, musique) identifiées par un nom et une extension.</li><li><strong>Dossier :</strong> Un dossier est une structure qui permet d'organiser et de ranger les fichiers de manière hiérarchique.</li></ul>"
        },
        {
          "question": "<p><strong>4. (1,5 pt)</strong> Identifie les parties d'un fichier et donne 3 caractéristiques d'un fichier.</p>",
          "reponse": "<p><strong>Parties d'un fichier :</strong> Un fichier est composé de deux parties séparées par un point : le <strong>nom</strong> et l'<strong>extension</strong>. Exemple : <code>cours.pdf</code> (cours est le nom, pdf est l'extension).</p><p><strong>Caractéristiques :</strong></p><ul><li><strong>Type :</strong> Indiqué par l'extension (.doc pour document, .jpg pour image).</li><li><strong>Taille :</strong> Espace occupé sur le disque (en octets, Ko, Mo).</li><li><strong>Date de création / modification :</strong> Date et heure de la dernière modification du fichier.</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Entretien des supports de stockage (3 pts)",
      "points": "3 pts",
      "enonce": "<div style='background: #f0fff0; padding: 15px; border-radius: 10px; color: #1a1a2e; font-size: 0.95em;'><p>Un disque dur peut se détériorer avec le temps s'il n'est pas entretenu correctement. Un utilisateur constate que son ordinateur ralentit.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. (1 pt)</strong> Qu'est-ce que la fragmentation d'un disque dur ? Comment y remédier ?</p>",
          "reponse": "<p><strong>Fragmentation :</strong> La fragmentation est l'éparpillement des fragments d'un fichier sur différentes zones du disque dur. Cela ralentit l'accès aux données.</p><p><strong>Remède :</strong> La <strong>défragmentation</strong> regroupe ces fragments pour améliorer les performances.</p>"
        },
        {
          "question": "<p><strong>2. (1 pt)</strong> Cite deux opérations d'entretien d'un disque dur à effectuer régulièrement.</p>",
          "reponse": "<ul><li><strong>Le nettoyage de disque :</strong> Supprimer les fichiers temporaires, les fichiers inutiles et vider la corbeille.</li><li><strong>La sauvegarde (backup) :</strong> Copier régulièrement les données importantes sur un support externe.</li></ul>"
        },
        {
          "question": "<p><strong>3. (1 pt)</strong> Donne deux causes de défaillance d'un disque dur.</p>",
          "reponse": "<ul><li><strong>Les chocs physiques :</strong> Une chute ou un choc peut endommager la mécanique du disque.</li><li><strong>La chaleur excessive :</strong> Une mauvaise ventilation peut provoquer une surchauffe et des dommages.</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Traitement de texte et tableur (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='background: #e6f2ff; padding: 15px; border-radius: 10px; color: #1a1a2e; font-size: 0.95em;'><p>Le traitement de texte et le tableur sont des outils incontournables pour la production de documents.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. (1 pt)</strong> Cite 3 fonctionnalités avancées d'un traitement de texte.</p>",
          "reponse": "<ul><li><strong>La génération d'une table des matières :</strong> À partir des styles appliqués au document.</li><li><strong>La création de styles :</strong> Pour formater rapidement et uniformément le texte.</li><li><strong>L'insertion d'un pied de page :</strong> Permettant d'ajouter des informations communes à toutes les pages.</li></ul>"
        },
        {
          "question": "<p><strong>2. (1 pt)</strong> Distingue référence relative et référence absolue dans un tableur.</p>",
          "reponse": "<ul><li><strong>Référence relative (A1) :</strong> Elle s'ajuste automatiquement lorsqu'on recopie la formule dans d'autres cellules.</li><li><strong>Référence absolue ($A$1) :</strong> Elle reste fixe, même lors de la copie de la formule. Elle est utilisée pour des valeurs constantes.</li></ul>"
        },
        {
          "question": "<p><strong>3. (2 pts)</strong> Voici les notes de 5 élèves en Mathématiques et Physique :</p><table border='1' cellpadding='3' style='border-collapse: collapse; width: 100%;'><tr><th>Élève</th><th>Mathématiques</th><th>Physique</th></tr><tr><td>Elève 1</td><td>15</td><td>14</td></tr><tr><td>Elève 2</td><td>10</td><td>12</td></tr><tr><td>Elève 3</td><td>18</td><td>17</td></tr><tr><td>Elève 4</td><td>08</td><td>09</td></tr><tr><td>Elève 5</td><td>13</td><td>11</td></tr></table><p><strong>a) (1 pt)</strong> Propose une formule pour calculer la moyenne de l'Élève 1.</p><p><strong>b) (1 pt)</strong> Quelle fonction utiliserais-tu pour trouver la note maximale en Mathématiques ?</p>",
          "reponse": "<p><strong>a) Formule moyenne :</strong> <code>=MOYENNE(B2;C2)</code> ou <code>=(B2+C2)/2</code> (si B2 contient la note de Maths et C2 celle de Physique).</p><p><strong>b) Note maximale :</strong> La fonction <strong>MAX</strong> permet de trouver la valeur maximale. Exemple : <code>=MAX(B2:B6)</code> pour les notes de Mathématiques.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Algorithmique (3 pts)",
      "points": "3 pts",
      "enonce": "<div style='background: #e8f4fd; padding: 15px; border-radius: 10px; color: #1a1a2e; font-size: 0.95em;'><p>L'algorithmique est la base de la programmation. Elle permet de décrire une suite d'étapes pour résoudre un problème.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. (1 pt)</strong> Définis un <strong>algorithme</strong> et cite les étapes de sa conception.</p>",
          "reponse": "<p><strong>Algorithme :</strong> Un algorithme est une suite finie et ordonnée d'instructions qui permet de résoudre un problème donné.</p><p><strong>Étapes de conception :</strong></p><ul><li>Définition du problème.</li><li>Recensement des données (entrées et sorties).</li><li>Détermination des traitements à effectuer.</li><li>Écriture de l'algorithme.</li><li>Test et vérification.</li></ul>"
        },
        {
          "question": "<p><strong>2. (1 pt)</strong> Quelle est la différence entre une <strong>variable</strong> et une <strong>constante</strong> ?</p>",
          "reponse": "<p><strong>Variable :</strong> Une variable est une zone mémoire dont la valeur peut être modifiée au cours de l'exécution de l'algorithme.</p><p><strong>Constante :</strong> Une constante est une valeur fixe qui ne change jamais pendant l'exécution du programme.</p>"
        },
        {

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>
