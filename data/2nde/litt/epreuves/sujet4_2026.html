<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Littérature",
 "classe": "Seconde",
 "sequence": "Séquence 4",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Exercice 1 : Dissertation littéraire",
     "points": "10 pts",
     "enonce": "<div style='font-size: 1em; line-height: 1.6;'>Un écrivain anglais nommé Oscar Wilde affirme : « Tout art est absolument inutile. » Pensez-vous que la littérature ne trouve aucune raison d'être dans la société des hommes ? Vous répondrez à cette question dans un développement argumenté et illustré d'exemples précis tirés de vos lectures littéraires.<br><br><div style='background: #f8f9fa; padding: 15px; border-radius: 8px;'><strong>Consignes :</strong><br>• Vous rédigerez une introduction complète (amorce, analyse du sujet, problématique, annonce du plan)<br>• Vous développerez deux ou trois parties équilibrées<br>• Vous utiliserez des exemples littéraires précis (auteurs, œuvres, mouvements)<br>• Vous rédigerez une conclusion répondant clairement à la problématique</div></div>",
     "questions": [
       {
         "question": "1) Rédigez une introduction complète pour ce sujet de dissertation.",
         "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> L'introduction doit comporter trois temps :<br><br>• <strong>Amorce :</strong> Une phrase d'accroche qui introduit le thème (ex: citation, réflexion générale, contexte).<br>• <strong>Analyse du sujet :</strong> Reformulation et délimitation du sujet, définition des termes clés (ici, « art », « inutile », « société »).<br>• <strong>Problématique :</strong> La question reformulée qui servira de fil conducteur à la réflexion.<br>• <strong>Annonce du plan :</strong> Présentation des axes de la réflexion.<br><br><strong>Exemple d'introduction :</strong><br>« Oscar Wilde affirmait avec provocation que \"tout art est absolument inutile\". Cette déclaration, loin d'être un simple paradoxe, interroge la fonction même de la création artistique. En effet, la littérature, forme d'art par excellence, est-elle dépourvue de toute utilité sociale ? Nous verrons dans un premier temps que la littérature peut sembler inutile dans une société qui valorise l'utilité immédiate, avant de montrer qu'elle remplit des fonctions essentielles, pour enfin nuancer cette opposition en envisageant une forme d'utilité plus subtile. »</div>"
       },
       {
         "question": "2) Proposez un plan détaillé pour cette dissertation (deux ou trois parties, avec sous-parties et exemples).",
         "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> <strong>Plan dialectique :</strong><br><br><strong>I. La littérature peut sembler inutile face aux besoins matériels</strong><br> A. Elle ne produit pas de biens concrets<br> B. Elle peut apparaître comme un divertissement superflu<br> C. Exemple : la poésie parnassienne (<em>L'Art pour l'art</em> de Théophile Gautier)<br><br><strong>II. Mais la littérature remplit des fonctions essentielles</strong><br> A. Elle transmet des valeurs et des idées<br> B. Elle dénonce les injustices<br> C. Exemples : <em>Les Misérables</em> de Victor Hugo, <em>Les Fables</em> de La Fontaine<br><br><strong>III. Une utilité plus subtile : l'art pour l'homme</strong><br> A. La littérature comme exploration de l'âme humaine<br> B. Elle nous aide à comprendre le monde et nous-mêmes<br> C. Exemple : la psychologie des personnages dans <em>Madame Bovary</em> de Flaubert</div>"
       },
       {
         "question": "3) Rédigez un paragraphe argumenté pour la partie II (en utilisant un exemple littéraire précis).",
         "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> « La littérature remplit une fonction sociale essentielle : celle de dénoncer les injustices. En effet, l'écrivain, par son œuvre, peut porter un regard critique sur son époque et contribuer à l'évolution des mentalités. Victor Hugo, dans <em>Les Misérables</em>, dénonce la misère du peuple et l'injustice sociale. À travers le personnage de Jean Valjean, ancien bagnard poursuivi pour avoir volé un pain, Hugo montre comment la société peut broyer les plus faibles. Le roman a ainsi contribué à faire évoluer la conscience collective sur la question de la pauvreté et de la réinsertion sociale. La littérature n'est donc pas inutile : elle est un outil de transformation sociale. »</div>"
       }
     ]
   },
   {
     "titre": "Exercice 2 : Contraction de texte et discussion",
     "points": "10 pts",
     "enonce": "<div style='font-size: 1em; line-height: 1.6;'>Lisez attentivement le texte suivant, extrait d'un essai sur le rôle de l'écrivain dans la société.<br><br><div style='background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #dee2e6;'>« L'écrivain est-il un témoin de son temps ? Sans doute, mais il est aussi un acteur. Il ne se contente pas de refléter la société, il contribue à la transformer. Par ses mots, il éclaire des zones d'ombre, il interpelle les consciences, il propose des alternatives. Victor Hugo, en écrivant <em>Les Misérables</em>, ne décrivait pas seulement la misère du XIXe siècle : il la dénonçait avec force, et son roman a eu une influence réelle sur les débats de son époque. L'écrivain porte une responsabilité morale, celle de ne pas rester silencieux face à l'injustice. Mais cette responsabilité ne doit pas pour autant le conduire à une forme de didactisme pesant : la littérature est aussi un espace de liberté et de création, où l'esthétique peut parfois primer sur l'engagement. C'est dans cette tension entre art et engagement que se joue le rôle véritable de l'écrivain. »</div><br><br><strong>Consignes :</strong><br>1) Contractez ce texte au quart de sa longueur (entre 45 et 55 mots).<br>2) Dans une discussion argumentée, répondez à la question suivante : « Selon vous, l'écrivain doit-il nécessairement être engagé ? »</div>",
     "questions": [
       {
         "question": "1) Rédigez la contraction du texte (45-55 mots).",
         "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> « L'écrivain est à la fois témoin et acteur de son temps. Il ne se contente pas de décrire la société, il contribue à la transformer en dénonçant les injustices. Cependant, sa responsabilité morale ne doit pas l'empêcher de créer librement : l'équilibre entre engagement et esthétique est au cœur de son rôle. »<br><br><em>(Compte : 50 mots)</em></div>"
       },
       {
         "question": "2) Rédigez une discussion argumentée répondant à la question : « Selon vous, l'écrivain doit-il nécessairement être engagé ? »",
         "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> <strong>Introduction :</strong> Reformuler la question, annoncer le plan dialectique.<br><br><strong>Argument 1 (thèse) :</strong> L'écrivain a un devoir d'engagement. En effet, par sa notoriété et son talent, il peut influencer les consciences et contribuer à faire évoluer la société. Victor Hugo, avec <em>Les Misérables</em>, Émile Zola avec <em>J'accuse</em>, ont marqué l'histoire par leur engagement.<br><br><strong>Argument 2 (antithèse) :</strong> La littérature peut aussi avoir une valeur purement esthétique. Les poètes comme Baudelaire ou Rimbaud ont exploré les possibilités du langage sans viser une transformation sociale directe. L'art pour l'art est une position légitime.<br><br><strong>Synthèse :</strong> L'engagement n'est pas une obligation absolue. L'écrivain est libre de choisir son rapport au monde. Si certains choisissent l'engagement, d'autres préfèrent l'exploration esthétique ou introspective. La diversité des approches fait la richesse de la littérature. En conclusion, un écrivain peut être engagé, mais il n'y est pas tenu.</div>"
       }
     ]
   }
 ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
