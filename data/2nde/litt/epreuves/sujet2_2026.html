<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <script>
        MathJax = {
            tex: {

            },

            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Littérature",
  "classe": "Seconde",
  "sequence": "Séquence 2",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Dissertation littéraire",
      "points": "10 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px; font-size: 1em; line-height: 1.6;'><p>« La littérature est le miroir de la société. »</p><p>Vous commenterez cette affirmation en vous appuyant sur des œuvres littéraires que vous avez étudiées ou lues.</p></div>",
      "questions": [
        {
          "question": "<p> Analysez le sujet : identifiez les mots-clés et reformulez-le en une problématique.</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p><strong>Mots-clés :</strong> « littérature », « miroir », « société ».</p><p><strong>Problématique :</strong> Dans quelle mesure la littérature est-elle le reflet fidèle des préoccupations, des valeurs et des contradictions de la société qui la voit naître ?</p></div>"
        },
        {
          "question": "<p> Proposez un plan détaillé pour traiter ce sujet.</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p><strong>Plan dialectique :</strong></p><ul><li><strong>I. La littérature comme reflet de la société (thèse)</strong><ul><li>A. La littérature témoigne des mœurs et des conditions de vie d'une époque (ex: Balzac, Zola)</li><li>B. Elle porte la voix des opprimés et dénonce les injustices (ex: Les Misérables de Hugo)</li></ul></li><li><strong>II. La littérature comme dépassement et critique de la société (antithèse)</strong><ul><li>A. Elle crée des mondes imaginaires qui s'opposent au réel (ex: Le Voyage au centre de la Terre de Verne)</li><li>B. Elle propose des modèles alternatifs et interroge les valeurs établies (ex: Candide de Voltaire)</li></ul></li><li><strong>III. La littérature, un miroir déformant et subjectif (synthèse)</strong><ul><li>A. Le regard de l'écrivain est toujours orienté par ses propres convictions</li><li>B. La réception de l'œuvre varie selon les époques, montrant l'évolution du regard sur la société</li></ul></li></ul></div>"
        },
        {
          "question": "<p> Rédigez l'introduction et la conclusion de votre dissertation.</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p><strong>Introduction :</strong></p><p>« La littérature est le miroir de la société » : cette affirmation, souvent reprise, semble suggérer que l'œuvre littéraire se contente de refléter passivement le monde qui l'entoure. Pourtant, le rapport entre la littérature et la société est bien plus complexe. Si elle puise ses matériaux dans le réel, la littérature ne se contente pas de le reproduire : elle le transforme, le critique et l'interroge. Dès lors, se pose la question suivante : dans quelle mesure la littérature est-elle le reflet fidèle de la société qui la voit naître ? Nous verrons d'abord en quoi elle en est le témoin privilégié, puis comment elle s'en émancipe pour proposer un regard critique et créatif.</p><p><strong>Conclusion :</strong></p><p>En définitive, si la littérature puise ses racines dans la société, elle ne s'y réduit pas. Elle est à la fois un miroir qui reflète les réalités sociales et un prisme qui les décompose pour en révéler les nuances et les contradictions. Loin d'être un simple reflet, elle est une médiation, un regard subjectif et engagé sur le monde. C'est en cela que la littérature demeure un témoignage précieux et une forme de connaissance irremplaçable de l'humain.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Contraction de texte et discussion",
      "points": "10 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px; font-size: 1em; line-height: 1.6;'><p><strong>Texte :</strong></p><div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; margin: 10px 0;'><p>« L'écrivain est un homme qui a décidé de transformer son expérience du monde en une œuvre d'art. Il ne se contente pas de raconter ce qu'il a vu ou vécu ; il organise, il choisit, il stylise. Cette transformation est ce qui distingue l'écriture littéraire du simple récit de témoignage. L'écrivain n'est donc pas un photographe, mais un peintre : il interprète la réalité à travers son regard, son style, sa sensibilité. Ainsi, son œuvre, bien qu'ancrée dans un contexte social, historique et culturel, porte la marque indélébile de sa subjectivité. C'est cette subjectivité assumée qui fait la valeur et l'originalité de la création littéraire.</p><p>L'écrivain n'est pas un être désincarné, flottant au-dessus des contingences. Il est le produit de son époque, de sa classe sociale, de son éducation. Ses œuvres, même les plus fantastiques ou les plus abstraites, portent les stigmates de cette appartenance. C'est pourquoi elles peuvent être lues comme des témoignages, non pas sur les faits, mais sur les mentalités d'une époque. Le roman réaliste du XIXe siècle, par exemple, est une source inestimable pour l'historien des mœurs, car il donne à voir des comportements, des valeurs, des peurs que les documents officiels ne saisissent pas.</p><p>Cependant, il y aurait une erreur à réduire l'œuvre littéraire à un simple document social. L'écrivain ne doit pas être confondu avec le sociologue ou l'historien. Son projet n'est pas de décrire ou d'expliquer objectivement la réalité, mais de la recréer. Il la soumet à son imaginaire, à son style, à son désir de beauté. C'est ce travail de recréation qui confère à l'œuvre sa dimension esthétique et sa capacité à émouvoir et à éclairer le lecteur, bien au-delà du contexte qui l'a vu naître. »</p></div></div>",
      "questions": [
        {
          "question": "<p> Lisez attentivement le texte et dégagez sa thèse principale ainsi que les étapes de son argumentation.</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p><strong>Thèse :</strong> L'œuvre littéraire est à la fois le reflet de la subjectivité de son auteur et un témoignage sur la société qui l'a produite, mais elle ne saurait se réduire à un simple document social.</p><p><strong>Plan du texte :</strong></p><ul><li><strong>Première étape :</strong> L'écrivain transforme son expérience en œuvre d'art (il interprète la réalité).</li><li><strong>Deuxième étape :</strong> L'écrivain est le produit de son époque, son œuvre est un témoignage sur les mentalités.</li><li><strong>Troisième étape :</strong> L'œuvre littéraire ne se réduit pas à un document social ; c'est une recréation esthétique.</li></ul></div>"
        },
        {
          "question": "<p> Rédigez une contraction de ce texte en environ 100 mots.</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p><strong>Proposition de contraction (98 mots) :</strong></p><p>L'écrivain transforme son expérience en œuvre d'art, la soumettant à son regard et à son style. Bien qu'ancré dans son époque et sa classe sociale, son œuvre porte la marque de sa subjectivité. Elle constitue un témoignage précieux sur les mentalités d'une période, à l'image du roman réaliste du XIXe siècle. Cependant, la réduire à un simple document social est une erreur. Le projet de l'écrivain n'est pas d'expliquer objectivement le réel, mais de le recréer. C'est cette recréation esthétique qui confère à l'œuvre sa valeur durable, sa capacité à émouvoir et à éclairer le lecteur.</p></div>"
        },
        {
          "question": "<p> En vous appuyant sur le thème du texte, discutez la question suivante : « La littérature doit-elle être un miroir de la société ou un moyen de s'en évader ? » (environ 200 mots)</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p><strong>Discussion :</strong></p><p>La question invite à réfléchir sur la fonction de la littérature : doit-elle refléter la réalité sociale ou permettre de s'en affranchir ? La réponse ne peut être univoque.</p><p>D'une part, la littérature est indissociable de son contexte social. Comme le souligne le texte, l'écrivain est le produit de son époque. Les grandes œuvres réalistes, de Balzac à Zola, ont ainsi entrepris de dépeindre avec minutie les travers de la société, jouant un rôle de critique sociale. Dans cette perspective, la littérature est un miroir qui éclaire le lecteur sur les dysfonctionnements du monde.</p><p>D'autre part, la littérature offre aussi un moyen d'évasion et d'exploration de mondes imaginaires. Les récits de voyage, les œuvres fantastiques ou les utopies permettent d'échapper aux contraintes du réel et de rêver à d'autres possibles. Cette fonction est tout aussi essentielle, car elle nourrit l'esprit et le libère des contingences matérielles.</p><p>En définitive, la littérature n'a pas à choisir entre ces deux rôles. Elle est à la fois ancrée dans le monde et en dialogue avec lui. L'œuvre littéraire, comme le suggère le texte, est une recréation du réel. Elle en part pour le transcender. Le miroir qu'elle tend est un miroir déformant, un prisme qui révèle autant qu'il transforme. La littérature est donc à la fois un moyen de comprendre le monde et de s'en évader, et c'est cette double vocation qui fait sa richesse.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Commentaire composé",
      "points": "10 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px; font-size: 1em; line-height: 1.6;'><p><strong>Texte :</strong></p><div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; margin: 10px 0;'><p>Il avait vingt ans, une vie devant lui, et déjà les regrets. Non pas des regrets d'avoir fait ceci ou pas assez cela, non, un regret plus vague, plus profond, qui tenait à la conscience d'une fatalité. Il sentait qu'il était né pour quelque chose de grand, mais il ne savait pas quoi. Et cette incertitude le rongeait.</p><p>Il regardait les autres, ces jeunes gens de son âge, qui semblaient savoir où ils allaient. Ils avaient des projets, des ambitions, des certitudes. Lui, il flottait, porté par les circonstances, incapable de fixer son cap. Il se sentait comme un navire sans gouvernail, livré aux caprices du vent.</p><p>Parfois, il se prenait à rêver. Il imaginait des vies différentes, des exploits héroïques, des amours passionnées. Mais ces rêves s'évanouissaient au réveil, le laissant plus désemparé encore. La réalité était là, terne, pesante, et il n'avait pas la force de la combattre.</p><p>Il se reprochait sa faiblesse, son manque de caractère. Il aurait voulu être un de ces hommes qui décident de leur destin, qui tracent leur route avec autorité. Mais il n'était qu'un spectateur de sa propre vie, un acteur qui avait oublié son texte.</p><p>Alors, il se réfugiait dans la lecture. Les livres lui offraient des existences toutes faites, des émotions fortes, des certitudes. Il vivait par procuration, empruntant aux héros de papier la force qui lui manquait. Mais ce n'était qu'une illusion, une parenthèse dans le vide de son existence.</p><p>Et le temps passait, inexorablement. Ses vingt ans s'éloignaient, et avec eux l'espoir d'un avenir radieux. Il se sentait prisonnier d'une vie qui n'était pas la sienne, d'un rôle qu'il n'avait pas choisi. Il était le protagoniste d'une tragédie dont il ignorait le dénouement.</p></div></div>",
      "questions": [
        {
          "question": "<p> Présentez ce texte (auteur, genre, mouvement littéraire, thème général).</p>",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>
