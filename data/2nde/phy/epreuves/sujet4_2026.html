<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Physique",
  "classe": "Seconde",
  "sequence": "Séquence 4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Lois de la réfraction",
      "points": "4 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Un rayon lumineux passe de l'air (<span style='font-weight: bold;'>n₁ = 1,00</span>) dans un bloc de verre d'indice <span style='font-weight: bold;'>n₂ = 1,50</span>.</p><p>L'angle d'incidence est <span style='font-weight: bold;'>i₁ = 45°</span>.</p></div>",
      "questions": [
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>1) Énoncer la deuxième loi de Descartes pour la réfraction.</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>La deuxième loi de Descartes pour la réfraction s'énonce ainsi :</p><div class='math-block' style='background-color: #e8f0fe; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0;'><div class='math' style='font-size: 1.4em; font-weight: bold; color: #1a5276;'>$$n_1 \\sin i_1 = n_2 \\sin i_2$$</div></div><p>où :</p><ul style='list-style-type: disc; color: #333;'><li><span style='font-weight: bold;'>n₁</span> est l'indice du milieu 1 (où se trouve le rayon incident),</li><li><span style='font-weight: bold;'>i₁</span> est l'angle d'incidence,</li><li><span style='font-weight: bold;'>n₂</span> est l'indice du milieu 2 (où se trouve le rayon réfracté),</li><li><span style='font-weight: bold;'>i₂</span> est l'angle de réfraction.</li></ul></div>"
        },
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>2) Calculer l'angle de réfraction \(i_2\) dans le verre.</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>On applique la loi de Descartes :</p><div class='math-block' style='background-color: #e8f0fe; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0;'><div class='math' style='font-size: 1.2em; color: #1a5276;'>$$n_1 \\sin i_1 = n_2 \\sin i_2$$</div></div><p>On isole \(i_2\) :</p><div class='math-block' style='background-color: #fef9e7; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0; border: 1px solid #f1c40f;'><div class='math' style='font-size: 1.2em; color: #7d6608;'>$$\\sin i_2 = \\frac{n_1}{n_2} \\sin i_1 = \\frac{1,00}{1,50} \\times \\sin 45° = \\frac{1}{1,5} \\times 0,707 \\approx 0,471$$</div></div><p>On prend l'arcsinus :</p><div class='math-block' style='background-color: #fef9e7; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0; border: 1px solid #f1c40f;'><div class='math' style='font-size: 1.2em; color: #7d6608;'>$$i_2 = \\arcsin(0,471) \\approx 28,1°$$</div></div><div style='background-color: #d5f5e3; padding: 10px; border-radius: 6px; margin-top: 10px;'><p style='margin: 0; color: #1e8449;'><strong>Résultat :</strong> \(i_2 \\approx 28,1°\). Le rayon se rapproche de la normale car il passe de l'air (moins réfringent) au verre (plus réfringent).</p></div></div>"
        },
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>3) Le rayon lumineux effectue maintenant le chemin inverse : il passe du verre (\(n_2 = 1,50\)) dans l'air (\(n_1 = 1,00\)).</strong></p><p><strong>L'angle d'incidence dans le verre est \(i_2 = 28,1°\). Que vaut l'angle de réfraction dans l'air ?</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Par le principe du retour inverse de la lumière, le trajet est réversible. Si l'angle d'incidence dans le verre est \(28,1°\), l'angle de réfraction dans l'air est égal à l'angle d'incidence initial, soit \(45°\).</p><div class='math-block' style='background-color: #e8f0fe; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0;'><div class='math' style='font-size: 1.2em; color: #1a5276;'>$$i_1 = 45°$$</div></div><div style='background-color: #d5f5e3; padding: 10px; border-radius: 6px; margin-top: 10px;'><p style='margin: 0; color: #1e8449;'><strong>Remarque :</strong> Ceci illustre parfaitement le principe du retour inverse de la lumière.</p></div></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Réflexion totale",
      "points": "4 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Un rayon lumineux se propage dans un milieu d'indice \(n_1 = 1,50\) (verre) et arrive à la surface de séparation avec l'air d'indice \(n_2 = 1,00\).</p></div>",
      "questions": [
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>1) Définir l'angle de réfraction limite \(\lambda\).</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>L'<strong>angle de réfraction limite</strong> \(\lambda\) est l'angle d'incidence pour lequel l'angle de réfraction est égal à \(90°\).</p><p>Lorsque \(i_1 = \lambda\), le rayon réfracté rase la surface de séparation des deux milieux.</p><p>Si \(i_1 > \lambda\), il n'y a plus de rayon réfracté : on observe une <strong>réflexion totale</strong>.</p></div>"
        },
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>2) Calculer l'angle de réfraction limite pour le passage du verre vers l'air.</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>L'angle limite est donné par la relation :</p><div class='math-block' style='background-color: #e8f0fe; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0;'><div class='math' style='font-size: 1.4em; font-weight: bold; color: #1a5276;'>$$\\sin \\lambda = \\frac{n_2}{n_1}$$</div></div><p>Application numérique :</p><div class='math-block' style='background-color: #fef9e7; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0; border: 1px solid #f1c40f;'><div class='math' style='font-size: 1.2em; color: #7d6608;'>$$\\sin \\lambda = \\frac{1,00}{1,50} = 0,667$$</div></div><div class='math-block' style='background-color: #fef9e7; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0; border: 1px solid #f1c40f;'><div class='math' style='font-size: 1.2em; color: #7d6608;'>$$\\lambda = \\arcsin(0,667) \\approx 41,8°$$</div></div><div style='background-color: #d5f5e3; padding: 10px; border-radius: 6px; margin-top: 10px;'><p style='margin: 0; color: #1e8449;'><strong>Résultat :</strong> \(\lambda \\approx 41,8°\).</p></div></div>"
        },
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>3) Que se passe-t-il si l'angle d'incidence est \(i_1 = 50°\) ?</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Comme \(i_1 = 50° > \lambda = 41,8°\), l'angle d'incidence est supérieur à l'angle limite.</p><div style='background-color: #fadbd8; padding: 10px; border-radius: 6px; margin-top: 10px; border-left: 4px solid #e74c3c;'><p style='margin: 0; color: #922b21;'><strong>Il y a réflexion totale :</strong> aucun rayon ne traverse la surface de séparation. Le rayon incident est entièrement réfléchi.</p></div></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Application des lois de la réfraction",
      "points": "4 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Un rayon lumineux se propage dans l'eau (\(n_1 = 1,33\)) et arrive à la surface de l'air (\(n_2 = 1,00\)).</p><p>L'angle d'incidence est \(i_1 = 30°\).</p></div>",
      "questions": [
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>1) Calculer l'angle de réfraction \(i_2\) dans l'air.</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>On applique la loi de Descartes :</p><div class='math-block' style='background-color: #e8f0fe; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0;'><div class='math' style='font-size: 1.2em; color: #1a5276;'>$$n_1 \\sin i_1 = n_2 \\sin i_2$$</div></div><p>On isole \(i_2\) :</p><div class='math-block' style='background-color: #fef9e7; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0; border: 1px solid #f1c40f;'><div class='math' style='font-size: 1.2em; color: #7d6608;'>$$\\sin i_2 = \\frac{n_1}{n_2} \\sin i_1 = \\frac{1,33}{1,00} \\times \\sin 30° = 1,33 \\times 0,500 = 0,665$$</div></div><div class='math-block' style='background-color: #fef9e7; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0; border: 1px solid #f1c40f;'><div class='math' style='font-size: 1.2em; color: #7d6608;'>$$i_2 = \\arcsin(0,665) \\approx 41,7°$$</div></div><div style='background-color: #d5f5e3; padding: 10px; border-radius: 6px; margin-top: 10px;'><p style='margin: 0; color: #1e8449;'><strong>Résultat :</strong> \(i_2 \\approx 41,7°\). Le rayon s'éloigne de la normale car il passe de l'eau (plus réfringente) à l'air (moins réfringent).</p></div></div>"
        },
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>2) Calculer l'angle de réfraction limite pour le passage de l'eau vers l'air.</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>L'angle limite est donné par :</p><div class='math-block' style='background-color: #e8f0fe; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0;'><div class='math' style='font-size: 1.4em; font-weight: bold; color: #1a5276;'>$$\\sin \\lambda = \\frac{n_2}{n_1} = \\frac{1,00}{1,33} \\approx 0,752$$</div></div><div class='math-block' style='background-color: #fef9e7; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0; border: 1px solid #f1c40f;'><div class='math' style='font-size: 1.2em; color: #7d6608;'>$$\\lambda = \\arcsin(0,752) \\approx 48,7°$$</div></div><div style='background-color: #d5f5e3; padding: 10px; border-radius: 6px; margin-top: 10px;'><p style='margin: 0; color: #1e8449;'><strong>Résultat :</strong> \(\lambda \\approx 48,7°\).</p></div></div>"
        },
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>3) Pour un angle d'incidence \(i_1 = 60°\), le rayon traverse-t-il la surface ? Justifier.</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Comme \(i_1 = 60° > \lambda = 48,7°\), l'angle d'incidence est supérieur à l'angle limite.</p><div style='background-color: #fadbd8; padding: 10px; border-radius: 6px; margin-top: 10px; border-left: 4px solid #e74c3c;'><p style='margin: 0; color: #922b21;'><strong>Le rayon ne traverse pas la surface :</strong> il subit une réflexion totale.</p></div><p style='margin-top: 10px;'>Ce phénomène est utilisé dans les fibres optiques pour guider la lumière sur de longues distances.</p></div>"

    {
      "titre": "Exercice 4 : Indice de réfraction",
      "points": "4 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Un rayon lumineux se propage d'un milieu inconnu d'indice \(n_1\) vers l'air d'indice \(n_2 = 1,00\).</p><p>Pour un angle d'incidence \(i_1 = 60°\), on mesure un angle de réfraction \(i_2 = 80°\).</p></div>",
      "questions": [
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>1) Calculer l'indice \(n_1\) du milieu inconnu.</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>On applique la loi de Descartes :</p><div class='math-block' style='background-color: #e8f0fe; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0;'><div class='math' style='font-size: 1.2em; color: #1a5276;'>$$n_1 \\sin i_1 = n_2 \\sin i_2$$</div></div><p>On isole \(n_1\) :</p><div class='math-block' style='background-color: #fef9e7; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0; border: 1px solid #f1c40f;'><div class='math' style='font-size: 1.2em; color: #7d6608;'>$$n_1 = \\frac{n_2 \\sin i_2}{\\sin i_1} = \\frac{1,00 \\times \\sin 80°}{\\sin 60°} = \\frac{0,985}{0,866} \\approx 1,137$$</div></div><div style='background-color: #d5f5e3; padding: 10px; border-radius: 6px; margin-top: 10px;'><p style='margin: 0; color: #1e8449;'><strong>Résultat :</strong> \(n_1 \\approx 1,14\).</p></div></div>"

          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>L'indice calculé \(n_1 \\approx 1,14\) ne correspond à aucun des milieux proposés.</p><p>Il pourrait s'agir d'un milieu moins réfringent, comme du méthanol (\(n \\approx 1,33\)) ou du Plexiglas (\(n \\approx 1,49\)).</p><div style='background-color: #fef9e7; padding: 10px; border-radius: 6px; margin-top: 10px; border: 1px solid #f1c40f;'><p style='margin: 0; color: #7d6608;'><strong>Remarque :</strong> Dans la réalité, la valeur trouvée pourrait correspondre à un liquide organique ou à un milieu transparent peu réfringent.</p></div></div>"

          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>3) Calculer l'angle de réfraction limite si ce milieu est en contact avec l'air.</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>L'angle limite est donné par :</p><div class='math-block' style='background-color: #e8f0fe; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0;'><div class='math' style='font-size: 1.4em; font-weight: bold; color: #1a5276;'>$$\\sin \\lambda = \\frac{n_2}{n_1} = \\frac{1,00}{1,14} \\approx 0,877$$</div></div><div class='math-block' style='background-color: #fef9e7; padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0; border: 1px solid #f1c40f;'><div class='math' style='font-size: 1.2em; color: #7d6608;'>$$\\lambda = \\arcsin(0,877) \\approx 61,3°$$</div></div><div style='background-color: #d5f5e3; padding: 10px; border-radius: 6px; margin-top: 10px;'><p style='margin: 0; color: #1e8449;'><strong>Résultat :</strong> \(\lambda \\approx 61,3°\).</p></div></div>"

};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
