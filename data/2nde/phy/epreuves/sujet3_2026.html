<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Physique",
 "classe": "Seconde",
 "sequence": "Séquence 3",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Étude d'un mobile autoporteur sur un plan incliné",
     "points": "5 pts",
     "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px; background-color: #f8f9fa; color: #212529; border-radius: 8px;'><p>Un mobile autoporteur de masse <span style='font-style: italic;'>m</span> = 200 g est abandonné sans vitesse initiale sur un plan incliné d'un angle α = 30° par rapport à l'horizontale. Le mobile glisse sans frottement sur une distance AB = 2 m. On prendra <span style='font-style: italic;'>g</span> = 10 m/s².</p><p><div style='background-color: #e9ecef; padding: 10px; border-radius: 5px; color: #212529;'>Un schéma représentant le plan incliné avec l'angle α, le point A en haut et le point B en bas, ainsi que les forces appliquées (poids et réaction) serait utile.</div></p></div>",
     "questions": [
       {
         "question": "<p> Calculer l'accélération du mobile sur le plan incliné. (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> La seconde loi de Newton appliquée au mobile donne \( \vec{a} = \vec{g} \) sur le plan incliné. La composante tangentielle de l'accélération est \( a = g \sin(\alpha) = 10 \times \sin(30°) = 10 \times 0,5 = 5 \) m/s².</p>"
       },
       {
         "question": "<p> Déterminer la vitesse du mobile au point B en utilisant les équations horaires du mouvement. (2 pts)</p>",
         "reponse": "<p><strong>Réponse :</strong> Le mouvement est rectiligne uniformément varié (MRUV). Les équations horaires sont : \( a = 5 \) m/s², \( v(t) = 5t \) (vitesse initiale nulle), \( x(t) = \frac{1}{2} \times 5 \times t^2 = 2,5t^2 \). Pour parcourir AB = 2 m, on a \( 2 = 2,5t^2 \Rightarrow t^2 = 0,8 \Rightarrow t = \sqrt{0,8} \approx 0,89 \) s. La vitesse en B est \( v_B = 5 \times 0,89 \approx 4,47 \) m/s.</p>"
       },
       {
         "question": "<p> En appliquant le principe de conservation de l'énergie mécanique, calculer la vitesse du mobile au point B. (2 pts)</p>",
         "reponse": "<p><strong>Réponse :</strong> Le système {mobile} est soumis à son poids (force conservative) et à la réaction du support (force ne travaillant pas). L'énergie mécanique se conserve. Au point A, \( E_m = E_{pp} = mgh \) (vitesse nulle). Au point B, \( E_m = \frac{1}{2}mv_B^2 \) (altitude nulle). La dénivellation est \( h = AB \times \sin(\alpha) = 2 \times 0,5 = 1 \) m. On a donc \( \frac{1}{2}mv_B^2 = mgh \Rightarrow v_B = \sqrt{2gh} = \sqrt{2 \times 10 \times 1} = \sqrt{20} \approx 4,47 \) m/s.</p>"
       }
     ]
   },
   {
     "titre": "Équilibre d'un solide soumis à trois forces",
     "points": "4 pts",
     "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px; background-color: #f8f9fa; color: #212529; border-radius: 8px;'><p>Un objet de masse <span style='font-style: italic;'>m</span> = 2 kg est suspendu à un fil. Il est écarté de la verticale par une force horizontale \( \vec{F} \). L'angle que fait le fil avec la verticale est θ = 30°. On prendra <span style='font-style: italic;'>g</span> = 10 m/s².</p><p><div style='background-color: #e9ecef; padding: 10px; border-radius: 5px; color: #212529;'>Un schéma représentant l'objet suspendu, le fil incliné d'un angle θ, la force \( \vec{F} \) horizontale et le poids \( \vec{P} \) vertical vers le bas serait utile.</div></p></div>",
     "questions": [
       {
         "question": "<p> Faire le bilan des forces extérieures appliquées à l'objet. (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> L'objet est soumis à trois forces : son poids \( \vec{P} \) (vertical vers le bas, \( P = mg = 20 \) N), la tension \( \vec{T} \) du fil (dirigée selon le fil) et la force horizontale \( \vec{F} \).</p>"
       },
       {
         "question": "<p> En utilisant la condition d'équilibre d'un solide soumis à trois forces non parallèles, déterminer l'intensité de la force \( F \). (1,5 pts)</p>",
         "reponse": "<p><strong>Réponse :</strong> Les trois forces sont concourantes et leur somme vectorielle est nulle. En projetant sur les axes horizontal et vertical, on obtient : \( F = T \sin(\theta) \) et \( P = T \cos(\theta) \). En divisant la première par la seconde, on a \( \frac{F}{P} = \tan(\theta) \Rightarrow F = P \tan(\theta) = 20 \times \tan(30°) = 20 \times \frac{\sqrt{3}}{3} \approx 11,55 \) N.</p>"
       },
       {
         "question": "<p> En déduire l'intensité de la tension du fil. (1,5 pts)</p>",
         "reponse": "<p><strong>Réponse :</strong> D'après la projection sur l'axe vertical, \( T = \frac{P}{\cos(\theta)} = \frac{20}{\cos(30°)} = \frac{20}{\frac{\sqrt{3}}{2}} = \frac{40}{\sqrt{3}} \approx 23,09 \) N.</p>"
       }
     ]
   },
   {
     "titre": "Application de la conservation de la quantité de mouvement",
     "points": "5 pts",
     "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px; background-color: #f8f9fa; color: #212529; border-radius: 8px;'><p>Un pétard de masse totale <span style='font-style: italic;'>M</span> = 500 g explose en deux fragments. Le fragment 1 de masse <span style='font-style: italic;'>m</span><sub>1</sub> = 200 g est projeté vers la droite avec une vitesse \( v_1 = 30 \) m/s.</p></div>",
     "questions": [
       {
         "question": "<p> Déterminer la vitesse du fragment 2. (2 pts)</p>",
         "reponse": "<p><strong>Réponse :</strong> Le système {pétard} est isolé lors de l'explosion (les forces intérieures sont prépondérantes). La quantité de mouvement se conserve. Avant l'explosion, la quantité de mouvement est nulle (pétard immobile). Après l'explosion, \( \vec{P} = m_1 \vec{v}_1 + m_2 \vec{v}_2 = \vec{0} \). La masse du fragment 2 est \( m_2 = M - m_1 = 0,5 - 0,2 = 0,3 \) kg. On a donc \( 0,2 \times 30 + 0,3 \times v_2 = 0 \Rightarrow v_2 = -20 \) m/s. Le signe négatif indique que le fragment 2 est projeté vers la gauche.</p>"
       },
       {
         "question": "<p> Calculer l'énergie cinétique totale des deux fragments après l'explosion. (2 pts)</p>",
         "reponse": "<p><strong>Réponse :</strong> \( E_c = \frac{1}{2}m_1v_1^2 + \frac{1}{2}m_2v_2^2 = \frac{1}{2} \times 0,2 \times 30^2 + \frac{1}{2} \times 0,3 \times 20^2 = 90 + 60 = 150 \) J.</p>"
       },
       {
         "question": "<p> Expliquer l'origine de cette énergie cinétique. (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> L'énergie cinétique provient de l'énergie chimique contenue dans le pétard. Lors de l'explosion, cette énergie chimique est convertie en énergie cinétique (et en chaleur).</p>"
       }
     ]
   },
   {
     "titre": "Réflexion et réfraction de la lumière",
     "points": "6 pts",
     "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px; background-color: #f8f9fa; color: #212529; border-radius: 8px;'><p><strong>Partie A : Miroir plan (3 pts)</strong></p><p>Un objet AB de hauteur 1,5 m est placé devant un miroir plan.</p><p><strong>Partie B : Réfraction (3 pts)</strong></p><p>Un rayon lumineux passe de l'air (indice \( n_{air} = 1 \)) dans un milieu d'indice \( n = 1,5 \). L'angle d'incidence est \( i = 45° \).</p></div>",
     "questions": [
       {
         "question": "<p><strong>Partie A - 1.</strong> Quelle est la distance entre l'objet et son image dans le miroir plan ? (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> L'image dans un miroir plan est symétrique de l'objet par rapport au plan du miroir. Si l'objet est à une distance <span style='font-style: italic;'>d</span> du miroir, l'image est à la même distance <span style='font-style: italic;'>d</span> de l'autre côté du miroir. La distance objet-image est donc <strong>2<span style='font-style: italic;'>d</span></strong>.</p>"
       },
       {
         "question": "<p><strong>Partie A - 2.</strong> Quelle est la hauteur de l'image ? (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> L'image dans un miroir plan a la même hauteur que l'objet. L'image est donc haute de <strong>1,5 m</strong>.</p>"
       },
       {
         "question": "<p><strong>Partie A - 3.</strong> Quelle est la nature de l'image (réelle ou virtuelle) ? (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> L'image donnée par un miroir plan est virtuelle (elle ne peut pas être recueillie sur un écran).</p>"
       },
       {
         "question": "<p><strong>Partie B - 1.</strong> Calculer l'angle de réfraction <span style='font-style: italic;'>r</span> en utilisant la loi de Snell-Descartes. (1,5 pts)</p>",
         "reponse": "<p><strong>Réponse :</strong> La loi de Snell-Descartes pour la réfraction s'écrit : \( n_{air} \sin(i) = n \sin(r) \). On a \( 1 \times \sin(45°) = 1,5 \times \sin(r) \Rightarrow \sin(r) = \frac{\sin(45°)}{1,5} = \frac{\frac{\sqrt{2}}{2}}{1,5} = \frac{\sqrt{2}}{3} \approx 0,471 \). Donc \( r = \arcsin(0,471) \approx 28,1° \).</p>"
       },
       {
         "question": "<p><strong>Partie B - 2.</strong> Comparer la vitesse de la lumière dans le milieu d'indice <span style='font-style: italic;'>n</span> avec celle dans le vide. (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> L'indice de réfraction est le rapport \( n = \frac{c}{v} \). Dans un milieu d'indice \( n = 1,5 \), la vitesse de la lumière est \( v = \frac{c}{n} = \frac{c}{1,5} \). La lumière est donc plus lente dans ce milieu que dans le vide.</p>"
       },
       {
         "question": "<p><strong>Partie B - 3.</strong> Si le rayon se propageait du milieu d'indice <span style='font-style: italic;'>n</span> vers l'air, quel serait l'angle de réfraction limite ? (0,5 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> L'angle de réfraction limite est donné par \( \sin(\lambda) = \frac{n_{air}}{n} = \frac{1}{1,5} \approx 0,667 \). Donc \( \lambda = \arcsin(0,667) \approx 41,8° \).</p>"
       }
     ]
   }
 ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
