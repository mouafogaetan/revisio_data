<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Physique",
 "classe": "Seconde",
 "sequence": "Séquence 1",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Exercice 1 : Unités, mesures et incertitudes (10 points)",
     "points": "10 pts",
     "enonce": "<div style='font-size:1.1rem; line-height:1.8;'>Le tableau ci-dessous donne le r\u00e9sultat de plusieurs mesures effectu\u00e9es au cours d'une s\u00e9ance de travaux pratiques.</div><table style='width:100%; border-collapse:collapse; margin:20px 0; background:#f8f9fa; border-radius:8px; overflow:hidden;'><thead style='background:#2c3e50; color:white;'><tr><th style='padding:12px 8px; border:1px solid #ddd; text-align:center;'>Grandeur mesur\u00e9e</th><th style='padding:12px 8px; border:1px solid #ddd; text-align:center;'>Instrument</th><th style='padding:12px 8px; border:1px solid #ddd; text-align:center;'>Valeur mesur\u00e9e</th></tr></thead><tbody><tr><td style='padding:10px 8px; border:1px solid #ddd; text-align:center;'>Longueur</td><td style='padding:10px 8px; border:1px solid #ddd; text-align:center;'>R\u00e8gle gradu\u00e9e (mm)</td><td style='padding:10px 8px; border:1px solid #ddd; text-align:center;'>\\( L = 12,34 \\, \\text{cm} \\)</td></tr><tr style='background:#f1f3f5;'><td style='padding:10px 8px; border:1px solid #ddd; text-align:center;'>Volume</td><td style='padding:10px 8px; border:1px solid #ddd; text-align:center;'>\u00c9prouvette gradu\u00e9e (mL)</td><td style='padding:10px 8px; border:1px solid #ddd; text-align:center;'>\\( V = 45 \\, \\text{mL} \\)</td></tr><tr><td style='padding:10px 8px; border:1px solid #ddd; text-align:center;'>Temp\u00e9rature</td><td style='padding:10px 8px; border:1px solid #ddd; text-align:center;'>Thermom\u00e8tre (\\( \\pm 0,5^{\\circ} \\text{C} \\))</td><td style='padding:10px 8px; border:1px solid #ddd; text-align:center;'>\\( \\theta = 25,0^{\\circ} \\text{C} \\)</td></tr></tbody></table>",
     "questions":[
       {
         "question": "<strong>1.1)</strong> Pr\u00e9ciser, pour chaque mesure, le nombre de chiffres significatifs et donner l'incertitude absolue \\( \\Delta x \\).",
         "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>Longueur :</strong> 4 chiffres significatifs (1,2,3,4). Incertitude absolue : \\( \\Delta L = 0,01 \\, \\text{cm} \\) (pr\u00e9cision de la r\u00e8gle).</li><li><strong>Volume :</strong> 2 chiffres significatifs (4,5). Incertitude absolue : \\( \\Delta V = 0,5 \\, \\text{mL} \\) (moiti\u00e9 de la graduation).</li><li><strong>Temp\u00e9rature :</strong> 3 chiffres significatifs (2,5,0). Incertitude absolue : \\( \\Delta \\theta = 0,5^{\\circ} \\text{C} \\) (donn\u00e9e par la pr\u00e9cision de l'instrument).</li></ul>"
       },
       {
         "question": "<strong>1.2)</strong> Exprimer la longueur \\( L \\) en m\u00e8tres en utilisant la notation scientifique.",
         "reponse": "\\( L = 12,34 \\, \\text{cm} = 0,1234 \\, \\text{m} = 1,234 \\times 10^{-1} \\, \\text{m} \\)"
       },
       {
         "question": "<strong>1.3)</strong> Donner l'ordre de grandeur du volume mesur\u00e9.",
         "reponse": "\\( V = 45 \\, \\text{mL} = 4,5 \\times 10^{1} \\, \\text{mL} \\). Ici \\( \\alpha = 4,5 \\) donc \\( 5 \\leq \\alpha < 10 \\). L'ordre de grandeur est \\( 10^{2} \\, \\text{mL} = 100 \\, \\text{mL} \\) (soit \\( 10^{-4} \\, \\text{m}^3 \\))."
       },
       {
         "question": "<strong>1.4)</strong> La mesure de la temp\u00e9rature est-elle affect\u00e9e d'une erreur al\u00e9atoire ou syst\u00e9matique ? Justifier.",
         "reponse": "Il s'agit d'une erreur syst\u00e9matique car elle est li\u00e9e \u00e0 l'instrument de mesure lui-m\u00eame (pr\u00e9cision du thermom\u00e8tre) et se reproduit de mani\u00e8re constante pour toutes les mesures."
       }
     ]
   },
   {
     "titre": "Exercice 2 : Propagation des incertitudes (6 points)",
     "points": "6 pts",
     "enonce": "<div style='font-size:1.1rem; line-height:1.8;'>Un \u00e9l\u00e8ve mesure la r\u00e9sistance \u00e9quivalente d'un circuit. Il obtient les r\u00e9sultats suivants : <br><div class='math-block' style='background:#e9ecef; padding:12px 20px; border-radius:8px; margin:10px 0; text-align:center;'>\\( R_1 = 100 \\, \\Omega \\pm 1 \\, \\Omega \\) <br> \\( R_2 = 220 \\, \\Omega \\pm 5 \\, \\Omega \\)</div></div>",
     "questions":[
       {
         "question": "<strong>2.1)</strong> Les r\u00e9sistors sont associ\u00e9s en s\u00e9rie. Calculer la r\u00e9sistance \u00e9quivalente \\( R_{eq} \\) et son incertitude absolue. Donner le r\u00e9sultat sous la forme \\( R_{eq} = R_{mes} \\pm \\Delta R \\).",
         "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>R\u00e9sistance \u00e9quivalente :</strong> \\( R_{eq} = R_1 + R_2 = 100 + 220 = 320 \\, \\Omega \\)</li><li><strong>Incertitude absolue :</strong> \\( \\Delta R_{eq} = \\Delta R_1 + \\Delta R_2 = 1 + 5 = 6 \\, \\Omega \\) (r\u00e8gle de propagation pour une somme).</li><li><strong>R\u00e9sultat :</strong> \\( R_{eq} = 320 \\, \\Omega \\pm 6 \\, \\Omega \\)</li></ul>"
       },
       {
         "question": "<strong>2.2)</strong> Calculer l'incertitude relative de cette mesure, exprim\u00e9e en pourcentage.",
         "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>Incertitude relative :</strong> \\( \\dfrac{\\Delta R_{eq}}{R_{eq}} = \\dfrac{6}{320} = 0,01875 \\)</li><li><strong>En pourcentage :</strong> \\( 0,01875 \\times 100 = 1,875\\% \\approx 1,9\\% \\)</li></ul>"
       },
       {
         "question": "<strong>2.3)</strong> Si les r\u00e9sistors \u00e9taient associ\u00e9s en parall\u00e8le, quelle serait l'incertitude relative sur la r\u00e9sistance \u00e9quivalente ? (On donne la formule : \\( \\dfrac{1}{R_{eq}} = \\dfrac{1}{R_1} + \\dfrac{1}{R_2} \\))",
         "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>R\u00e9sistance \u00e9quivalente :</strong> \\( \\dfrac{1}{R_{eq}} = \\dfrac{1}{100} + \\dfrac{1}{220} = \\dfrac{11+5}{1100} = \\dfrac{16}{1100} \\) donc \\( R_{eq} = \\dfrac{1100}{16} = 68,75 \\, \\Omega \\)</li><li><strong>Incertitude relative :</strong> \\( \\dfrac{\\Delta R_{eq}}{R_{eq}} = \\dfrac{\\Delta R_1}{R_1} + \\dfrac{\\Delta R_2}{R_2} = \\dfrac{1}{100} + \\dfrac{5}{220} = 0,01 + 0,0227 = 0,0327 \\)</li><li><strong>En pourcentage :</strong> \\( 3,27\\% \\)</li></ul>"
       }
     ]
   },
   {
     "titre": "Exercice 3 : Analyse d'une s\u00e9rie de mesures (4 points)",
     "points": "4 pts",
     "enonce": "<div style='font-size:1.1rem; line-height:1.8;'>Un \u00e9l\u00e8ve mesure la longueur d'une table \u00e0 l'aide d'un m\u00e8tre ruban et obtient les valeurs suivantes (en cm) : <div class='math-block' style='background:#e9ecef; padding:12px 20px; border-radius:8px; margin:10px 0; text-align:center;'><strong>145,2 &nbsp;&nbsp; 145,5 &nbsp;&nbsp; 145,0 &nbsp;&nbsp; 145,3 &nbsp;&nbsp; 145,1 &nbsp;&nbsp; 144,9</strong></div></div>",
     "questions":[
       {
         "question": "<strong>3.1)</strong> Calculer la longueur moyenne \\( \\bar{L} \\) de la table.",
         "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>Somme des mesures :</strong> \\( 145,2 + 145,5 + 145,0 + 145,3 + 145,1 + 144,9 = 871,0 \\, \\text{cm} \\)</li><li><strong>Nombre de mesures :</strong> \\( N = 6 \\)</li><li><strong>Moyenne :</strong> \\( \\bar{L} = \\dfrac{871,0}{6} = 145,17 \\, \\text{cm} \\)</li></ul>"
       },
       {
         "question": "<strong>3.2)</strong> D\u00e9terminer l'incertitude absolue \\( \\Delta L \\) (on prendra la demi-\u00e9tendue de la s\u00e9rie).",
         "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>\u00c9tendue :</strong> \\( L_{max} - L_{min} = 145,5 - 144,9 = 0,6 \\, \\text{cm} \\)</li><li><strong>Incertitude absolue :</strong> \\( \\Delta L = \\dfrac{0,6}{2} = 0,3 \\, \\text{cm} \\)</li></ul>"
       },
       {
         "question": "<strong>3.3)</strong> Pr\u00e9senter le r\u00e9sultat final de la mesure sous la forme \\( L = \\bar{L} \\pm \\Delta L \\).",
         "reponse": "\\( L = 145,2 \\, \\text{cm} \\pm 0,3 \\, \\text{cm} \\) (en arrondissant la moyenne \u00e0 0,1 cm pr\u00e8s)"
       }
     ]
   }
 ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
