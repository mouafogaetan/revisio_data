<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Physique",
  "classe": "Seconde",
  "sequence": "Séquence 2",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Mesures et incertitudes",
      "points": "5 pts",
      "enonce": "<p>Les mesures physiques sont au cœur de la démarche expérimentale. Leur précision et leur présentation correcte sont essentielles.</p><p>Données :</p><ul><li>Unités fondamentales du SI : mètre (m), kilogramme (kg), seconde (s), ampère (A), kelvin (K), mole (mol), candela (cd).</li><li>Préfixes : T (10<sup>12</sup>), G (10<sup>9</sup>), M (10<sup>6</sup>), k (10<sup>3</sup>), m (10<sup>-3</sup>), μ (10<sup>-6</sup>), n (10<sup>-9</sup>), p (10<sup>-12</sup>).</li></ul>",
      "questions": [
        {
          "question": "<p><strong>1.1</strong> (2 pts) a) Citer les 7 unités fondamentales du Système International (SI). <br>b) Associer chaque unité fondamentale à la grandeur physique qu'elle mesure.</p>",
          "reponse": "<p>a) Les 7 unités fondamentales du SI sont : <strong>le mètre (m), le kilogramme (kg), la seconde (s), l'ampère (A), le kelvin (K), la mole (mol) et la candela (cd)</strong>.</p><p>b) Correspondances : <br>- mètre (m) → longueur <br>- kilogramme (kg) → masse <br>- seconde (s) → temps <br>- ampère (A) → intensité de courant électrique <br>- kelvin (K) → température thermodynamique <br>- mole (mol) → quantité de matière <br>- candela (cd) → intensité lumineuse.</p>"
        },
        {
          "question": "<p><strong>1.2</strong> (1 pt) Compléter les égalités suivantes : <br>a) 12,5 cm = ......... m <br>b) 0,0034 A = ......... mA <br>c) 250 nm = ......... m <br>d) 7,2 × 10<sup>-8</sup> s = ......... ns</p>",
          "reponse": "<p>a) 12,5 cm = <strong>0,125 m</strong> <br>b) 0,0034 A = <strong>3,4 mA</strong> <br>c) 250 nm = <strong>2,50 × 10<sup>-7</sup> m</strong> <br>d) 7,2 × 10<sup>-8</sup> s = <strong>72 ns</strong></p>"
        },
        {
          "question": "<p><strong>1.3</strong> (2 pts) Un élève mesure la longueur d'une table avec une règle graduée en millimètres. Il obtient les valeurs suivantes (en cm) : <br>L<sub>1</sub> = 125,3 ; L<sub>2</sub> = 125,1 ; L<sub>3</sub> = 125,4 ; L<sub>4</sub> = 125,2 ; L<sub>5</sub> = 125,3.</p><p>a) Calculer la valeur moyenne \( \overline{L} \) de ces mesures. <br>b) Déterminer l'incertitude absolue \( \Delta L \) (en considérant que l'incertitude est la demi-étendue de la série). <br>c) Exprimer le résultat de la mesure sous la forme \( L = \overline{L} \pm \Delta L \). <br>d) Calculer l'incertitude relative \( \dfrac{\Delta L}{L} \) et l'exprimer en pourcentage.</p>",
          "reponse": "<p>a) \( \overline{L} = \dfrac{125,3 + 125,1 + 125,4 + 125,2 + 125,3}{5} = \dfrac{626,3}{5} = <strong>125,26 cm</strong>\).</p><p>b) Étendue = L<sub>max</sub> - L<sub>min</sub> = 125,4 - 125,1 = 0,3 cm. <br>\( \Delta L = \dfrac{\text{étendue}}{2} = \dfrac{0,3}{2} = <strong>0,15 cm</strong>\).</p><p>c) Résultat : \( L = <strong>125,26 \pm 0,15 cm</strong>\). <br>(Avec 2 chiffres significatifs pour l'incertitude).</p><p>d) \( \dfrac{\Delta L}{L} = \dfrac{0,15}{125,26} \approx 1,2 \times 10^{-3} = <strong>0,12 %</strong>\).</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Mouvement et interactions",
      "points": "6 pts",
      "enonce": "<p>Un mobile autoporteur de masse \( m = 200 \text{ g} \) glisse sans frottement sur une table horizontale. Il est attaché à un ressort de constante de raideur \( k = 5,0 \text{ N.m}^{-1} \). On étudie son mouvement dans un référentiel terrestre considéré comme galiléen.</p><div class='math-block'><div class='math'>$$ \\vec{P} = m \\vec{g} $$</div></div> <div class='math-block'><div class='math'>$$ \\vec{F} = -k \\vec{x} $$</div></div>",
      "questions": [
        {
          "question": "<p><strong>2.1</strong> (1,5 pts) a) Qu'est-ce qu'un référentiel galiléen ? <br>b) Citer un exemple de référentiel galiléen.</p>",
          "reponse": "<p>a) Un référentiel galiléen est un référentiel dans lequel le principe d'inertie s'applique : tout corps isolé ou pseudo-isolé (soumis à un ensemble de forces de résultante nulle) persévère dans son état de repos ou de mouvement rectiligne uniforme.</p><p>b) Exemples : le <strong>référentiel héliocentrique</strong> (dont l'origine est le centre du Soleil), le <strong>référentiel géocentrique</strong> (dont l'origine est le centre de la Terre) et le <strong>référentiel terrestre</strong> pour des expériences de courte durée (on néglige les effets de la rotation de la Terre).</p>"
        },
        {
          "question": "<p><strong>2.2</strong> (2 pts) a) Énoncer la première loi de Newton (principe d'inertie). <br>b) En déduire les caractéristiques du mouvement du mobile lorsque le ressort est à sa position d'équilibre (allongement nul).</p>",
          "reponse": "<p>a) <strong>Principe d'inertie</strong> : Dans un référentiel galiléen, si la somme vectorielle des forces extérieures appliquées à un solide est nulle (\(\sum \vec{F}_{ext} = \vec{0}\)), alors le vecteur vitesse de son centre d'inertie est constant (mouvement rectiligne uniforme ou repos).</p><p>b) Lorsque le ressort est à sa position d'équilibre, l'allongement est nul, donc la force de rappel du ressort est nulle. Le mobile n'est soumis qu'à son poids et à la réaction normale de la table, qui se compensent. La résultante des forces est donc nulle. D'après le principe d'inertie, le mobile est soit au repos, soit animé d'un <strong>mouvement rectiligne uniforme</strong>.</p>"
        },
        {
          "question": "<p><strong>2.3</strong> (2,5 pts) Le mobile est écarté de sa position d'équilibre d'une distance \( x = 4,0 \text{ cm} \) et lâché sans vitesse initiale. <br>a) Calculer la valeur de la force de rappel exercée par le ressort. <br>b) Représenter sur un schéma les forces s'exerçant sur le mobile (poids, réaction normale du support, force de rappel). <br>c) En appliquant le principe d'inertie, justifier qualitativement le mouvement du mobile.</p>",
          "reponse": "<p>a) \( x = 4,0 \text{ cm} = 4,0 \times 10^{-2} \text{ m} \). <br>\( F = k \times x = 5,0 \times 4,0 \times 10^{-2} = <strong>0,20 \text{ N}</strong>\).</p><p>b) Schéma : Le mobile est soumis à : <br>- son poids \( \vec{P} \) (vertical vers le bas). <br>- la réaction normale \( \vec{R}_N \) du support (verticale vers le haut). <br>- la force de rappel \( \vec{F} \) du ressort (horizontale, dirigée vers la position d'équilibre).</p><p>c) Le poids et la réaction normale se compensent. La résultante des forces est donc la force de rappel \( \vec{F} \), qui n'est pas nulle. Le mobile n'est donc pas isolé/pseudo-isolé. Il va être accéléré vers sa position d'équilibre. Une fois à l'équilibre, par inertie, il va dépasser cette position et le ressort s'allongera dans l'autre sens, ce qui donne un <strong>mouvement oscillatoire</strong>.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Optique géométrique",
      "points": "5 pts",
      "enonce": "<p>Un rayon lumineux se propage dans l'air (indice \( n_1 = 1,00 \)) et frappe la surface d'un bloc de verre (indice \( n_2 = 1,50 \)) avec un angle d'incidence \( i_1 = 30^\circ \).</p><div class='math-block'><div class='math'>$$ n_1 \sin i_1 = n_2 \sin i_2 $$</div></div>",
      "questions": [
        {
          "question": "<p><strong>3.1</strong> (1 pt) a) Qu'est-ce que la réfraction de la lumière ? <br>b) Énoncer la loi de Snell-Descartes pour la réfraction.</p>",
          "reponse": "<p>a) La réfraction est le changement de direction que subit un rayon lumineux lorsqu'il traverse la surface de séparation (appelée dioptre) entre deux milieux transparents d'indices de réfraction différents.</p><p>b) <strong>Lois de Snell-Descartes pour la réfraction</strong> : <br>- Les rayons incident et réfracté ainsi que la normale au dioptre sont dans un même plan (plan d'incidence). <br>- \( n_1 \sin i_1 = n_2 \sin i_2 \), où \( n_1 \) et \( n_2 \) sont les indices des milieux 1 et 2, et \( i_1 \) et \( i_2 \) les angles entre les rayons et la normale.</p>"
        },
        {
          "question": "<p><strong>3.2</strong> (2 pts) a) Calculer l'angle de réfraction \( i_2 \) dans le verre. <br>b) Le rayon lumineux se rapproche-t-il ou s'éloigne-t-il de la normale ? Justifier.</p>",
          "reponse": "<p>a) D'après la loi de Snell-Descartes : \( 1,00 \times \sin 30^\circ = 1,50 \times \sin i_2 \). <br>\( \sin i_2 = \dfrac{1,00 \times 0,5}{1,50} = \dfrac{0,5}{1,50} \approx 0,333 \). <br>Donc \( i_2 = \arcsin(0,333) \approx <strong>19,5°</strong>.</p><p>b) L'angle de réfraction (19,5°) est inférieur à l'angle d'incidence (30°). Le rayon lumineux se <strong>rapproche de la normale</strong>. Cela est normal car il passe d'un milieu moins réfringent (air) à un milieu plus réfringent (verre).</p>"
        },
        {
          "question": "<p><strong>3.3</strong> (2 pts) Un rayon lumineux se propage maintenant du verre vers l'air, avec un angle d'incidence dans le verre \( i_1' = 30^\circ \). <br>a) Calculer l'angle de réfraction \( i_2' \) dans l'air. <br>b) En déduire le sens de propagation du rayon et le comparer à la situation précédente.</p>",
          "reponse": "<p>a) D'après la loi de Snell-Descartes : \( 1,50 \times \sin 30^\circ = 1,00 \times \sin i_2' \). <br>\( \sin i_2' = 1,50 \times 0,5 = 0,75 \). <br>Donc \( i_2' = \arcsin(0,75) \approx <strong>48,6°</strong>.</p><p>b) L'angle de réfraction (48,6°) est supérieur à l'angle d'incidence (30°). Le rayon lumineux s'<strong>éloigne de la normale</strong> en passant du verre à l'air. C'est le principe du retour inverse de la lumière : le trajet est réversible.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Électricité",
      "points": "4 pts",
      "enonce": "<p>Un circuit électrique est composé d'un générateur de force électromotrice \( E = 12 \text{ V} \) et de résistance interne \( r = 1,0 \ \Omega \), connecté en série avec un résistor de résistance \( R = 5,0 \ \Omega \).</p><div class='math-block'><div class='math'>$$ U = R \cdot I $$</div></div>",
      "questions": [
        {
          "question": "<p><strong>4.1</strong> (1 pt) a) Énoncer la loi d'Ohm pour un conducteur ohmique. <br>b) Tracer la caractéristique \( U = f(I) \) d'un conducteur ohmique (allure).</p>",
          "reponse": "<p>a) <strong>Loi d'Ohm</strong> : La tension \( U \) aux bornes d'un conducteur ohmique (résistor) est proportionnelle à l'intensité du courant \( I \) qui le traverse : \( U = R \cdot I \), où \( R \) est la résistance du conducteur (en ohms \( \Omega \)).</p><p>b) La caractéristique \( U = f(I) \) d'un conducteur ohmique est une <strong>droite passant par l'origine</strong> dont la pente est égale à la résistance \( R \).</p>"
        },
        {
          "question": "<p><strong>4.2</strong> (1 pt) Calculer l'intensité du courant \( I \) dans le circuit. On négligera la résistance des fils de connexion.</p>",
          "reponse": "<p>La résistance équivalente du circuit série est \( R_{eq} = R + r = 5,0 + 1,0 = 6,0 \ \Omega \). <br>D'après la loi d'Ohm pour un circuit série (loi de Pouillet) : \( I = \dfrac{E}{R_{eq}} = \dfrac{12}{6,0} = <strong>2,0 \text{ A}</strong>\).</p>"
        },
        {
          "question": "<p><strong>4.3</strong> (1 pt) Calculer la tension \( U_R \) aux bornes du résistor et la tension \( U_r \) aux bornes du générateur.</p>",
          "reponse": "<p>\( U_R = R \times I = 5,0 \times 2,0 = <strong>10 \text{ V}</strong>\). <br>\( U_r = r \times I = 1,0 \times 2,0 = <strong>2,0 \text{ V}</strong>\).</p>"
        },
        {
          "question": "<p><strong>4.4</strong> (1 pt) Calculer la puissance dissipée par effet Joule dans le résistor \( R \).</p>",
          "reponse": "<p>La puissance dissipée par effet Joule dans le résistor est : <br>\( P_J = R \times I^2 = 5,0 \times (2,0)^2 = 5,0 \times 4,0 = <strong>20 \text{ W}</strong>\).</p>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
