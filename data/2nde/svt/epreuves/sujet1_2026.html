<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "SVTEEHB",
  "classe": "Seconde",
  "sequence": "Séquence 1",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : La Terre dans le système solaire",
      "points": "4 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Le système solaire est constitué du Soleil et de nombreux corps célestes qui gravitent autour de lui.</p></div>",
      "questions": [
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>1) Citez les quatre planètes telluriques (internes) et les quatre planètes gazeuses (externes) du système solaire.</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>Planètes telluriques (internes) :</strong></p><ul style='list-style-type: disc; color: #333;'><li>Mercure</li><li>Vénus</li><li>Terre</li><li>Mars</li></ul><p><strong>Planètes gazeuses (externes) :</strong></p><ul style='list-style-type: disc; color: #333;'><li>Jupiter</li><li>Saturne</li><li>Uranus</li><li>Neptune</li></ul></div>"
        },
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>2) Définissez une unité astronomique (UA) et une année-lumière (AL).</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><ul style='list-style-type: disc; color: #333;'><li><strong>Unité astronomique (UA) :</strong> C'est la distance moyenne entre la Terre et le Soleil, soit environ \(1,5 \\times 10^8\\,km\).</li><li><strong>Année-lumière (AL) :</strong> C'est la distance parcourue par la lumière en une année, soit environ \(9,46 \\times 10^{12}\\,km\).</li></ul><div style='background-color: #d5f5e3; padding: 8px; border-radius: 4px; margin-top: 5px;'><p style='margin: 0; color: #1e8449;'><strong>À retenir :</strong> L'UA est utilisée pour les distances dans le système solaire, l'AL pour les distances interstellaires.</p></div></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Les enveloppes externes de la Terre",
      "points": "5 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>La Terre est entourée de plusieurs enveloppes externes qui jouent un rôle essentiel dans l'existence de la vie.</p></div>",
      "questions": [
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>1) Nommez les trois enveloppes externes de la Terre et donnez une brève description de chacune.</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><ul style='list-style-type: disc; color: #333;'><li><strong>L'atmosphère :</strong> Enveloppe gazeuse qui entoure la Terre. Elle est composée principalement d'azote (78%) et d'oxygène (21%).</li><li><strong>L'hydrosphère :</strong> Ensemble des masses d'eau présentes sur Terre (océans, mers, lacs, rivières, glaces).</li><li><strong>La lithosphère :</strong> Enveloppe solide externe de la Terre, composée de la croûte continentale (granitique) et de la croûte océanique (basaltique).</li></ul></div>"
        },
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>2) Citez les cinq couches de l'atmosphère de la plus proche à la plus éloignée de la surface terrestre.</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Les cinq couches de l'atmosphère sont :</p><ol style='color: #333;'><li><strong>La troposphère</strong> (0 à 15 km) : où se produisent les phénomènes météorologiques.</li><li><strong>La stratosphère</strong> (15 à 50 km) : qui contient la couche d'ozone.</li><li><strong>La mésosphère</strong> (50 à 85 km) : où les météorites se consument.</li><li><strong>La thermosphère ou ionosphère</strong> (85 à 600 km) : où se produisent les aurores polaires.</li><li><strong>L'exosphère</strong> (au-delà de 600 km) : la couche la plus externe, en transition vers l'espace.</li></ol></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : La diversité du monde vivant",
      "points": "6 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Les êtres vivants présentent une grande diversité et des adaptations leur permettant de peupler des milieux variés.</p></div>",
      "questions": [
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>1) Définissez un écosystème en précisant les notions de biotope et de biocénose.</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Un <strong>écosystème</strong> est un ensemble formé par un milieu (biotope) et les êtres vivants qui y vivent (biocénose).</p><ul style='list-style-type: disc; color: #333;'><li><strong>Le biotope</strong> est le milieu de vie (sol, eau, climat).</li><li><strong>La biocénose</strong> est l'ensemble des êtres vivants (plantes, animaux, micro-organismes) qui interagissent entre eux et avec le biotope.</li></ul></div>"
        },
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>2) Citez deux adaptations des plantes du désert et deux adaptations des animaux du désert.</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>Adaptations des plantes du désert :</strong></p><ul style='list-style-type: disc; color: #333;'><li>Racines profondes pour capter l'eau en profondeur.</li><li>Feuilles transformées en épines pour limiter la transpiration (plantes xérophytes).</li></ul><p><strong>Adaptations des animaux du désert :</strong></p><ul style='list-style-type: disc; color: #333;'><li>Activité nocturne pour éviter la chaleur du jour.</li><li>Production d'urines très concentrées pour économiser l'eau.</li></ul><div style='background-color: #fef9e7; padding: 8px; border-radius: 4px; margin-top: 5px; border: 1px solid #f1c40f;'><p style='margin: 0; color: #7d6608;'><strong>Remarque :</strong> Ces adaptations sont liées à la rareté de l'eau dans les milieux arides.</p></div></div>"
        },
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>3) Définissez la convergence évolutive et donnez un exemple.</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>La <strong>convergence évolutive</strong> est le phénomène par lequel des espèces différentes (sans lien de parenté proche) développent des caractères similaires en réponse à des contraintes du milieu.</p><p><strong>Exemples :</strong></p><ul style='list-style-type: disc; color: #333;'><li>La forme hydrodynamique des poissons et des mammifères marins (dauphin, requin).</li><li>La présence d'ailes chez les insectes, les oiseaux et les chauves-souris (adaptation au vol).</li></ul></div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Interdépendance des êtres vivants",
      "points": "6 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Dans un écosystème, les êtres vivants sont reliés par des relations alimentaires et des interactions variées.</p></div>",
      "questions": [
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>1) Définissez une chaîne alimentaire et un réseau trophique.</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Une <strong>chaîne alimentaire</strong> est une suite ordonnée d'êtres vivants où chacun se nourrit de celui qui le précède et sert de nourriture à celui qui le suit.</p><p>Un <strong>réseau trophique</strong> est l'ensemble des chaînes alimentaires imbriquées d'un écosystème, montrant la diversité des relations alimentaires.</p></div>"
        },
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>2) Distinguez les relations intraspécifiques et interspécifiques en donnant un exemple pour chaque.</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>Relations intraspécifiques :</strong> Entre individus de la même espèce.</p><ul style='list-style-type: disc; color: #333;'><li>Exemple : la compétition pour la nourriture, le territoire ou le partenaire sexuel.</li></ul><p><strong>Relations interspécifiques :</strong> Entre individus d'espèces différentes.</p><ul style='list-style-type: disc; color: #333;'><li>Exemple : le parasitisme (ver solitaire dans l'intestin), le commensalisme, la symbiose (lichen, rhizobium), la prédation (lion/zèbre).</li></ul></div>"
        },
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>3) Expliquez pourquoi la biomasse diminue le long d'une chaîne alimentaire.</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>La biomasse diminue le long d'une chaîne alimentaire car :</p><ul style='list-style-type: disc; color: #333;'><li>Chaque niveau trophique perd de l'énergie sous forme de chaleur (respiration).</li><li>Une partie de la matière n'est pas assimilée (excréments, déchets).</li><li>Environ 90% de l'énergie disponible est perdue à chaque niveau trophique, seuls 10% sont transmis au niveau supérieur.</li></ul><div style='background-color: #ebf5fb; padding: 8px; border-radius: 4px; margin-top: 5px;'><p style='margin: 0; color: #2c3e50;'><strong>Principe :</strong> La pyramide de masse et la pyramide d'énergie illustrent cette diminution progressive.</p></div></div>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : La formation des sols",
      "points": "5 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Le sol est une couche superficielle qui résulte de la transformation de la roche-mère sous l'action des agents de l'environnement.</p></div>",
      "questions": [
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>1) Citez les trois étapes de formation d'un sol.</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>La formation d'un sol se déroule en trois étapes :</p><ol style='color: #333;'><li><strong>La dégradation de la roche-mère</strong> (désagrégation physique et altération chimique).</li><li><strong>L'accumulation et la décomposition de la matière organique</strong> (formation de la litière, puis de l'humus).</li><li><strong>La différenciation des horizons</strong> (formation des couches superposées).</li></ol></div>"
        },
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>2) Citez les trois horizons principaux d'un sol mature et donnez une brève description de chacun.</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><ul style='list-style-type: disc; color: #333;'><li><strong>Horizon A (ou horizon élu vial) :</strong> Couche superficielle riche en matière organique (humus). Elle est lessivée par les eaux de pluie qui entraînent les éléments fins vers le bas.</li><li><strong>Horizon B (ou horizon illuvial) :</strong> Couche où s'accumulent les éléments lessivés de l'horizon A (argile, ions). C'est l'horizon d'accumulation.</li><li><strong>Horizon C :</strong> Couche profonde constituée de la roche-mère en cours de dégradation (roche altérée).</li></ul></div>"
        },
        {
          "question": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p><strong>3) Définissez le pH du sol et expliquez son importance pour les végétaux.</strong></p></div>",
          "reponse": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Le <strong>pH du sol</strong> est une mesure de son acidité ou de son alcalinité. Il est lié à la concentration en ions \(H^+\) dans la solution du sol.</p><p><strong>Importance :</strong></p><ul style='list-style-type: disc; color: #333;'><li>Le pH influence la <strong>disponibilité des ions minéraux</strong> pour les plantes (certains ions sont plus assimilables à des pH précis).</li><li>Un pH trop acide (pH < 5) ou trop basique (pH > 8) peut limiter la croissance des plantes.</li><li>Les plantes ont des exigences spécifiques en matière de pH (plantes calcicoles, calcifuges).</li></ul></div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
