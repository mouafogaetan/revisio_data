<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <script>
        MathJax = {
            tex: {

            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }

    </script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "SVTEEHB",
 "classe": "Seconde",
 "sequence": "Évaluation séquentielle n°6",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Évaluation des Ressources (Roches et Matériaux de la Terre)",
     "points": "8 pts",
     "enonce": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; line-height: 1.6; color: #2d3748; background-color: #f7fafc; padding: 1.5rem; border-radius: 12px; max-width: 100%;'><h2 style='font-size: 1.25rem; font-weight: 600; color: #1a202c; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem; margin-bottom: 1rem;'>🏔️ Exercice 1 : Les matériaux de la Terre</h2><p style='margin-bottom: 1rem;'>Au cours d'une sortie géologique, un groupe d'élèves a collecté les échantillons suivants :</p><ul style='list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem;'><li>Un échantillon A : roche de couleur sombre, à structure microlitique.</li><li>Un échantillon B : roche de couleur claire, à structure grenue avec des cristaux visibles à l'œil nu.</li><li>Un échantillon C : roche présentant des feuillets, avec des cristaux orientés.</li></ul><p style='margin-bottom: 1rem;'>Les élèves doivent identifier ces roches et comprendre leur origine.</p><h2 style='font-size: 1.1rem; font-weight: 600; color: #1a202c; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.3rem; margin-top: 1.5rem;'>📋 Questions :</h2></div>",
     "questions": [
       {
         "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>1)</strong> Identifier l'échantillon A en justifiant votre réponse à partir de sa description. <span style='font-weight: 600; color: #2b6cb0;'>(2 pts)</span></p></div>",
         "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong> L'échantillon A est un <strong>basalte</strong>.</p><p><strong>Justification :</strong> La structure microlitique (verre + microlites) est caractéristique des <strong>roches volcaniques</strong> [citation:8]. La couleur sombre indique qu'il s'agit d'une roche basaltique, pauvre en silice.</p></div>"
       },
       {
         "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>2)</strong> L'échantillon B présente une structure grenue. À quel type de roche appartient-il et comment s'est-il formé ? <span style='font-weight: 600; color: #2b6cb0;'>(2 pts)</span></p></div>",
         "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong> L'échantillon B est une <strong>roche plutonique</strong> (ou intrusive).</p><p><strong>Formation :</strong> Il s'est formé par le <strong>refroidissement lent du magma en profondeur</strong>. Ce refroidissement lent a permis la formation de grands cristaux visibles à l'œil nu, d'où la structure grenue. Un exemple est le <strong>granite</strong> [citation:2].</p></div>"
       },
       {
         "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>3)</strong> L'échantillon C présente des feuillets. Nommer ce type de structure et expliquer comment cette roche s'est formée. <span style='font-weight: 600; color: #2b6cb0;'>(2 pts)</span></p></div>",
         "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong> La structure de l'échantillon C est une <strong>structure cristallophyllienne</strong>.</p><p><strong>Formation :</strong> Cette roche est une <strong>roche métamorphique</strong>. Elle s'est formée par <strong>métamorphisme</strong>, c'est-à-dire par la transformation d'une roche préexistante sous l'effet de fortes pressions et températures en profondeur. Les cristaux se sont orientés perpendiculairement aux contraintes, formant des feuillets. Un exemple est le <strong>schiste</strong> ou le <strong>micaschiste</strong> [citation:6].</p></div>"
       },
       {
         "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>4)</strong> Distinguer les types de magmas suivants : juvénile, granitique et hybride. <span style='font-weight: 600; color: #2b6cb0;'>(2 pts)</span></p></div>",
         "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong></p><ul style='list-style-type: disc; padding-left: 1.5rem;'><li><strong>Magma juvénile :</strong> Magma basaltique, pauvre en silice (45-50%), très fluide. Il donne des roches comme le basalte.</li><li><strong>Magma granitique :</strong> Magma riche en silice (>65%), visqueux. Il donne des roches comme le granite ou la rhyolite.</li><li><strong>Magma hybride :</strong> Magma de composition intermédiaire. Il donne des roches comme l'andésite [citation:7].</li></ul></div>"
       }
     ]
   },
   {
     "titre": "Évaluation de l'Agir Compétent (Volcans, Séismes et Cycle des Roches)",
     "points": "6 pts",
     "enonce": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; line-height: 1.6; color: #2d3748; background-color: #f7fafc; padding: 1.5rem; border-radius: 12px; max-width: 100%;'><h2 style='font-size: 1.25rem; font-weight: 600; color: #1a202c; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem; margin-bottom: 1rem;'>🌋 Exercice 2 : Volcanisme et cycle des roches</h2><p style='margin-bottom: 1rem;'>Le Cameroun est traversé par une ligne de volcans actifs et éteints, appelée <strong>ligne du Cameroun</strong>, qui s'étend du Golfe de Guinée au Lac Tchad.</p><p style='margin-bottom: 1rem;'>Les élèves étudient le cycle des roches à partir de l'observation des roches de la région.</p><h2 style='font-size: 1.1rem; font-weight: 600; color: #1a202c; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.3rem; margin-top: 1.5rem;'>📋 Questions :</h2></div>",
     "questions": [
       {
         "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>1)</strong> Décrire le volcanisme de la ligne du Cameroun. <span style='font-weight: 600; color: #2b6cb0;'>(2 pts)</span></p></div>",
         "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong> La ligne du Cameroun est une chaîne de volcans qui s'étend du Golfe de Guinée (avec les îles de Bioko et Annobón) jusqu'au Lac Tchad. On y trouve des volcans actifs comme le <strong>Mont Cameroun</strong> et des volcans éteints ou en sommeil comme les Monts Bamboutos ou le Mont Manengouba [citation:5]. Le volcanisme est de type mixte (effusif et explosif).</p></div>"
       },
       {
         "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>2)</strong> Décrire les étapes de formation des roches sédimentaires. <span style='font-weight: 600; color: #2b6cb0;'>(2 pts)</span></p></div>",
         "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong> La formation des roches sédimentaires se fait en quatre étapes [citation:9] :</p><ul style='list-style-type: disc; padding-left: 1.5rem;'><li><strong>Destruction (altération) :</strong> Dégradation de la roche-mère par l'érosion.</li><li><strong>Transport :</strong> Les produits de l'altération sont transportés par l'eau, le vent ou les glaciers.</li><li><strong>Dépôt (sédimentation) :</strong> Les sédiments se déposent et s'accumulent.</li><li><strong>Diagenèse :</strong> Compaction et cimentation des sédiments sous l'effet de la pression et de la température.</li></ul></div>"
       },
       {
         "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>3)</strong> Expliquer le cycle des roches en utilisant les termes : érosion, sédimentation, métamorphisme, anatexie et volcanisme. <span style='font-weight: 600; color: #2b6cb0;'>(2 pts)</span></p></div>",
         "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong> Le cycle des roches est le processus de transformation continue des roches [citation:3] :</p><ul style='list-style-type: disc; padding-left: 1.5rem;'><li><strong>Érosion :</strong> Les roches en surface sont détruites par l'érosion.</li><li><strong>Sédimentation :</strong> Les sédiments se déposent et forment des roches sédimentaires.</li><li><strong>Métamorphisme :</strong> Sous l'effet de la pression et de la température, les roches se transforment en roches métamorphiques.</li><li><strong>Anatexie :</strong> À très haute température, les roches métamorphiques fondent pour former du magma.</li><li><strong>Volcanisme :</strong> Le magma remonte et refroidit en surface (roches volcaniques) ou en profondeur (roches plutoniques), et le cycle recommence [citation:3].</li></ul></div>"
       }
     ]
   },
   {
     "titre": "Évaluation de l'Agir Compétent (Risques Géologiques et Protection de l'Environnement)",
     "points": "6 pts",
     "enonce": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; line-height: 1.6; color: #2d3748; background-color: #f7fafc; padding: 1.5rem; border-radius: 12px; max-width: 100%;'><h2 style='font-size: 1.25rem; font-weight: 600; color: #1a202c; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem; margin-bottom: 1rem;'>⚠️ Exercice 3 : Risques géologiques et protection des sols</h2><p style='margin-bottom: 1rem;'>Dans la région du Mont Cameroun, les habitants sont régulièrement exposés à des risques volcaniques et sismiques.</p><p style='margin-bottom: 1rem;'>Par ailleurs, dans les régions de savane, on observe une dégradation des sols due à l'érosion et aux activités humaines.</p><h2 style='font-size: 1.1rem; font-weight: 600; color: #1a202c; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.3rem; margin-top: 1.5rem;'>📋 Questions :</h2></div>",
     "questions": [

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>
