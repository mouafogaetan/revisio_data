<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "SVTEEHB",
  "classe": "Seconde",
  "sequence": "Séquence 5",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Les formations géologiques du Cameroun",
      "points": "8 pts",
      "enonce": "<p>Le Cameroun pr\u00e9sente une grande diversit\u00e9 de formations g\u00e9ologiques qui t\u00e9moignent de son histoire g\u00e9ologique complexe. La carte g\u00e9ologique simplifi\u00e9e ci-dessous illustre la r\u00e9partition des principales formations sur le territoire.</p><div style='max-width: 100%; margin: 15px 0; padding: 10px; background: #f5f7fa; border-radius: 8px;'><img alt='Carte g\u00e9ologique simplifi\u00e9e du Cameroun montrant la ligne volcanique du Cameroun, les massifs granitiques, les bassins s\u00e9dimentaires c\u00f4tiers, le bassin du Tchad et les zones de socle m\u00e9tamorphique.' src=''></div>",
      "questions": [
        {
          "question": "<p> D\u00e9finis la ligne volcanique du Cameroun et cite les principaux \u00e9difices volcaniques qui la composent.</p>",
          "reponse": "<p>La ligne volcanique du Cameroun est une cha\u00eene de volcans align\u00e9s qui s'\u00e9tend du Golfe de Guin\u00e9e jusqu'au Lac Tchad.</p><p>Les principaux \u00e9difices volcaniques sont :</p><ul><li>Le <b>Mont Cameroun</b> : volcan actif dont les laves sont essentiellement basaltiques.</li><li>Les <b>Monts Bamboutos</b> : ensemble volcanique de type bouclier hawa\u00efen.</li><li>Le <b>Mont Manengouba</b> : volcan aux laves and\u00e9sitiques.</li><li>L'<b>Adamaoua</b> : plateau volcanique compos\u00e9 de basalte, trachyte, rhyolite et phonolite.</li><li>Les <b>Kapsiki</b> : massif volcanique aux aiguilles de trachyte caract\u00e9ristiques.</li></ul>"
        },
        {
          "question": "<p> D\u00e9cris les formations plutoniques, s\u00e9dimentaires et m\u00e9tamorphiques pr\u00e9sentes au Cameroun en donnant des exemples.</p>",
          "reponse": "<p><b>Formations plutoniques :</b> Ce sont des roches issues du refroidissement lent de magmas en profondeur. On trouve des granites et des gabbros dans le socle cristallin.</p><p><b>Formations s\u00e9dimentaires :</b> Elles se trouvent principalement dans les bassins s\u00e9dimentaires (bassins c\u00f4tiers, bassin du Tchad). Ce sont des sables, gr\u00e8s, argiles et calcaires.</p><p><b>Formations m\u00e9tamorphiques :</b> Issues de la transformation de roches pr\u00e9existantes sous l'effet de la temp\u00e9rature et de la pression. On trouve des schistes, micaschistes, gneiss, quartzites et marbres dans les zones de socle ancien.</p>"
        },
        {
          "question": "<p> Explique le cycle des roches \u00e0 partir des formations g\u00e9ologiques du Cameroun.</p>",
          "reponse": "<p>Le cycle des roches est un processus continu de transformation :</p><ul><li><b>\u00c9rosion</b> : les roches \u00e9merg\u00e9es sont d\u00e9grad\u00e9es par les agents climatiques et le vent.</li><li><b>S\u00e9dimentation</b> : les produits de l'\u00e9rosion sont transport\u00e9s et d\u00e9pos\u00e9s dans les bassins.</li><li><b>M\u00e9tamorphisme</b> : les roches s\u00e9dimentaires enfouies subissent des transformations sous l'effet de la temp\u00e9rature et de la pression.</li><li><b>Anatexie</b> : fusion partielle des roches m\u00e9tamorphiques en profondeur donnant naissance \u00e0 des magmas.</li><li><b>Volcanisme</b> : les magmas remontent et se solidifient en surface ou en profondeur, formant de nouvelles roches.</li></ul>"
        },
        {
          "question": "<p> En quoi l'\u00e9tude des formations g\u00e9ologiques du Cameroun est-elle importante pour le d\u00e9veloppement du pays ?</p>",
          "reponse": "<p>L'\u00e9tude des formations g\u00e9ologiques est importante pour :</p><ul><li><b>La recherche de ressources mini\u00e8res</b> : or, diamant, bauxite, fer.</li><li><b>La gestion des risques naturels</b> : volcanisme, s\u00e9ismes.</li><li><b>La gestion des eaux souterraines</b> : exploitation des nappes aquif\u00e8res.</li><li><b>L'am\u00e9nagement du territoire</b> : construction d'infrastructures, exploitation des carri\u00e8res.</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Les enveloppes externes de la Terre",
      "points": "6 pts",
      "enonce": "<p>La Terre est entour\u00e9e de plusieurs enveloppes externes qui jouent un r\u00f4le fondamental dans l'existence de la vie. Le document ci-contre repr\u00e9sente une coupe sch\u00e9matique de ces enveloppes.</p>",
      "questions": [
        {
          "question": "<p> Nomme et d\u00e9cris les trois enveloppes externes de la Terre.</p>",
          "reponse": "<p>Les trois enveloppes externes sont :</p><ul><li><b>L'atmosph\u00e8re</b> : couche gazeuse entourant la Terre, compos\u00e9e principalement d'azote (78%) et d'oxyg\u00e8ne (21%), avec des traces de CO₂, de vapeur d'eau et d'autres gaz.</li><li><b>L'hydrosph\u00e8re</b> : ensemble des masses d'eau pr\u00e9sentes sur Terre sous forme liquide (oc\u00e9ans, rivi\u00e8res, lacs), solide (glaces) et gazeuse (vapeur d'eau dans l'atmosph\u00e8re).</li><li><b>La lithosph\u00e8re</b> : partie solide externe de la Terre, compos\u00e9e de la cro\u00fbte continentale (granitique) et de la cro\u00fbte oc\u00e9anique (basaltique).</li></ul>"

        {

          "reponse": "<p>L'atmosph\u00e8re terrestre est divis\u00e9e en plusieurs couches :</p><ul><li><b>Troposph\u00e8re</b> : couche la plus proche du sol (0-15 km) o\u00f9 se produisent les ph\u00e9nom\u00e8nes m\u00e9t\u00e9orologiques. La temp\u00e9rature diminue avec l'altitude.</li><li><b>Stratosph\u00e8re</b> : (15-50 km) contient la couche d'ozone qui filtre les rayons UV. Temp\u00e9rature stable puis croissante.</li><li><b>M\u00e9sosph\u00e8re</b> : (50-85 km) o\u00f9 les m\u00e9t\u00e9orites se consument. Temp\u00e9rature d\u00e9croissante.</li><li><b>Thermosph\u00e8re ou ionosph\u00e8re</b> : (85-500 km) temp\u00e9rature tr\u00e8s \u00e9lev\u00e9e, couche d'ions permettant la propagation des ondes radio.</li><li><b>Exosph\u00e8re</b> : (> 500 km) couche la plus externe, transition avec l'espace.</li></ul>"

          "question": "<p> Explique pourquoi la temp\u00e9rature moyenne de la Terre (15°C) est favorable \u00e0 la vie alors que V\u00e9nus (460°C) et Mars (-60°C) ne le sont pas.</p>",

        }
      ]
    },
    {
      "titre": "Exercice 3 : La formation des sols",
      "points": "6 pts",
      "enonce": "<p>Les sols sont le r\u00e9sultat de l'alt\u00e9ration des roches sous l'action des facteurs climatiques et biologiques. Le document ci-dessous pr\u00e9sente un profil de sol avec ses diff\u00e9rents horizons.</p>",
      "questions": [
        {
          "question": "<p> D\u00e9finis les trois \u00e9tapes de formation d'un sol.</p>",
          "reponse": "<p>La formation d'un sol se fait en trois \u00e9tapes principales :</p><ol><li><b>D\u00e9gradation de la roche-m\u00e8re</b> : d\u00e9sagr\u00e9gation (ph\u00e9nom\u00e8nes physiques comme le gel-d\u00e9gel) et alt\u00e9ration (ph\u00e9nom\u00e8nes chimiques comme l'hydrolyse).</li><li><b>Accumulation et d\u00e9composition de la mati\u00e8re organique</b> : formation de la liti\u00e8re \u00e0 partir des d\u00e9bris v\u00e9g\u00e9taux, transformation en humus par les microorganismes d\u00e9composeurs.</li><li><b>Diff\u00e9renciation des horizons</b> : le sol se structure en couches successives (horizons) sous l'effet du lessivage et de l'accumulation des mati\u00e8res organiques et min\u00e9rales.</li></ol>"
        },
        {
          "question": "<p> D\u00e9cris les trois horizons d'un sol.</p>",
          "reponse": "<p>Un sol est compos\u00e9 de trois horizons principaux :</p><ul><li><b>Horizon A (horizon \u00e9luvial)</b> : couche superficielle riche en mati\u00e8re organique (humus), o\u00f9 se produit le lessivage des \u00e9l\u00e9ments solubles vers les couches inf\u00e9rieures.</li><li><b>Horizon B (horizon illuvial)</b> : couche d'accumulation des \u00e9l\u00e9ments lessiv\u00e9s (argile, oxydes de fer, mati\u00e8re organique).</li><li><b>Horizon C (roche-m\u00e8re)</b> : couche profonde constitu\u00e9e de la roche d'origine en voie de d\u00e9gradation.</li></ul>"

    // ================================================================

    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
