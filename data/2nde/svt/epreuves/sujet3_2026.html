<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "SVTEEHB",
  "classe": "Seconde",
  "sequence": "Séquence 3",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Restitution des connaissances sur le volcanisme",
      "points": "4 pts",
      "enonce": "<div style='font-size:1em;'><p>Répondre aux questions suivantes en vous basant sur les connaissances acquises.</p></div>",
      "questions": [
        {
          "question": "<p> Qu'est-ce qu'un volcan ? (0,5 pt)</p>",
          "reponse": "<p>Un volcan est une structure géologique par laquelle un magma (roche en fusion) remonte du manteau jusqu'à la surface de la Terre.</p>"
        },
        {
          "question": "<p> Donner la définition des termes suivants : <em>chambre magmatique</em>, <em>cheminée</em>, <em>cratère</em> et <em>cône volcanique</em>. (1 pt)</p>",
          "reponse": "<ul style='list-style-type:disc; margin-left:15px;'><li><strong>Chambre magmatique :</strong> Réservoir de magma en profondeur.</li><li><strong>Cheminée (conduit) :</strong> Passage du magma vers la surface.</li><li><strong>Cratère :</strong> Ouverture en haut du volcan par laquelle la lave est expulsée.</li><li><strong>Cône volcanique :</strong> Accumulation de lave et de cendres autour du cratère.</li></ul>"
        },
        {
          "question": "<p> Citer les quatre (4) types de volcans et donner une caractéristique pour chacun. (2 pts)</p>",
          "reponse": "<ul style='list-style-type:disc; margin-left:15px;'><li><strong>Hawaïen :</strong> laves très fluides, éruptions non explosives, formation de boucliers.</li><li><strong>Strombolien :</strong> laves semi-fluides, projections de bombes et scories, éruptions explosives régulières.</li><li><strong>Vulcanien :</strong> laves visqueuses, nuées ardentes et cendres, éruptions explosives violentes.</li><li><strong>Peléen :</strong> laves très visqueuses (presque solides), nuées ardentes destructrices, formation de dômes de lave.</li></ul>"
        },
        {
          "question": "<p> Qu'est-ce qu'un magma ? (0,5 pt)</p>",
          "reponse": "<p>Un magma est une roche en fusion contenant des gaz, des cristaux et des fragments solides.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Les roches volcaniques et les magmas",
      "points": "3 pts",
      "enonce": "<div style='font-size:1em;'><p>Observer le tableau ci-dessous et répondre aux questions.</p><div style='background:#f0f0f0; padding:10px; border-radius:5px; margin-top:10px;'><table style='width:100%; border-collapse:collapse;'><tr style='background:#d0d0d0;'><th style='border:1px solid #999; padding:8px;'>Type de magma</th><th style='border:1px solid #999; padding:8px;'>Origine</th><th style='border:1px solid #999; padding:8px;'>Roche volcanique associée</th></tr><tr><td style='border:1px solid #999; padding:8px;'>Magma juvénile</td><td style='border:1px solid #999; padding:8px;'>Issu du manteau</td><td style='border:1px solid #999; padding:8px;'>Basalte</td></tr><tr><td style='border:1px solid #999; padding:8px;'>Magma granitique</td><td style='border:1px solid #999; padding:8px;'>Fusion de roches continentales</td><td style='border:1px solid #999; padding:8px;'>Rhyolite</td></tr><tr><td style='border:1px solid #999; padding:8px;'>Magma hybride</td><td style='border:1px solid #999; padding:8px;'>Mélange des deux précédents</td><td style='border:1px solid #999; padding:8px;'>Andésite, Trachyte</td></tr></table></div></div>",
      "questions": [
        {
          "question": "<p> Compléter le tableau suivant en indiquant pour chaque roche sa structure et ses caractéristiques principales. (1,5 pt)</p><div style='background:#f0f0f0; padding:10px; border-radius:5px; margin-top:5px;'><table style='width:100%; border-collapse:collapse;'><tr style='background:#d0d0d0;'><th style='border:1px solid #999; padding:8px;'>Roche</th><th style='border:1px solid #999; padding:8px;'>Structure</th><th style='border:1px solid #999; padding:8px;'>Caractéristiques</th></tr><tr><td style='border:1px solid #999; padding:8px;'>Basalte</td><td style='border:1px solid #999; padding:8px;'></td><td style='border:1px solid #999; padding:8px;'></td></tr><tr><td style='border:1px solid #999; padding:8px;'>Rhyolite</td><td style='border:1px solid #999; padding:8px;'></td><td style='border:1px solid #999; padding:8px;'></td></tr><tr><td style='border:1px solid #999; padding:8px;'>Andésite</td><td style='border:1px solid #999; padding:8px;'></td><td style='border:1px solid #999; padding:8px;'></td></tr></table></div>",
          "reponse": "<div style='background:#f0f0f0; padding:10px; border-radius:5px;'><table style='width:100%; border-collapse:collapse;'><tr style='background:#d0d0d0;'><th style='border:1px solid #999; padding:8px;'>Roche</th><th style='border:1px solid #999; padding:8px;'>Structure</th><th style='border:1px solid #999; padding:8px;'>Caractéristiques</th></tr><tr><td style='border:1px solid #999; padding:8px;'>Basalte</td><td style='border:1px solid #999; padding:8px;'>Microlitique</td><td style='border:1px solid #999; padding:8px;'>Roche sombre, très répandue, issue du magma juvénile.</td></tr><tr><td style='border:1px solid #999; padding:8px;'>Rhyolite</td><td style='border:1px solid #999; padding:8px;'>Microlitique</td><td style='border:1px solid #999; padding:8px;'>Roche claire, riche en silice, issue du magma granitique.</td></tr><tr><td style='border:1px solid #999; padding:8px;'>Andésite</td><td style='border:1px solid #999; padding:8px;'>Microlitique</td><td style='border:1px solid #999; padding:8px;'>Roche intermédiaire, issue du magma hybride.</td></tr></table></div>"
        },
        {
          "question": "<p> Que sont les phénocristaux ? (0,5 pt)</p>",
          "reponse": "<p>Les phénocristaux sont de gros cristaux visibles à l'œil nu qui se forment avant l'éruption, lors du refroidissement lent du magma en profondeur.</p>"
        },
        {
          "question": "<p> La composition chimique du magma influence le type d'éruption. Justifier cette affirmation. (1 pt)</p>",
          "reponse": "<p>Un magma riche en silice (ex: magma granitique) est visqueux et piège les gaz, provoquant des éruptions explosives (volcan vulcanien ou péléen). Un magma pauvre en silice (ex: magma juvénile) est fluide et permet aux gaz de s'échapper, donnant des éruptions effusives (volcan hawaïen).</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Le volcanisme camerounais",
      "points": "3 pts",
      "enonce": "<div style='font-size:1em;'><p>Le Cameroun possède un riche patrimoine volcanique. La ligne volcanique du Cameroun s'étend du Golfe de Guinée au Lac Tchad.</p></div>",
      "questions": [
        {
          "question": "<p> Citer les principaux édifices volcaniques du Cameroun. (1,5 pt)</p>",
          "reponse": "<ul style='list-style-type:disc; margin-left:15px;'><li><strong>Mont Cameroun :</strong> volcan actif, laves basaltiques.</li><li><strong>Monts Bamboutos :</strong> bouclier hawaïen.</li><li><strong>Mont Manengouba :</strong> laves andésitiques.</li><li><strong>Adamaoua :</strong> basaltes, trachytes, rhyolites, phonolites.</li><li><strong>Kapsiki :</strong> aiguilles de trachyte.</li></ul>"
        },
        {
          "question": "<p> Pourquoi dit-on que le Mont Cameroun est un volcan actif ? (0,5 pt)</p>",
          "reponse": "<p>Le Mont Cameroun est considéré comme actif car sa dernière éruption a eu lieu en l'an 2000 et il présente une activité sismique régulière.</p>"
        },
        {
          "question": "<p> Quels sont les avantages et les risques du volcanisme pour les populations camerounaises ? (1 pt)</p>",
          "reponse": "<p><strong>Avantages :</strong> sols très fertiles favorables à l'agriculture (ex: région de l'Ouest), attrait touristique (Mont Cameroun), ressources en matériaux de construction (pierres volcaniques).</p><p><strong>Risques :</strong> éruptions volcaniques destructrices, nuées ardentes, émissions de gaz toxiques, coulées de lave menaçant les habitations.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Situation-problème",
      "points": "5 pts",
      "enonce": "<div style='font-size:1em;'><p>Un agriculteur de la région de l'Ouest Cameroun cultive des haricots sur un sol volcanique riche en minéraux. Il constate que ses plants sont vigoureux mais que les rendements restent faibles malgré la fertilité naturelle du sol. Il vous sollicite pour l'aider à comprendre ce phénomène.</p></div>",
      "questions": [
        {
          "question": "<p> Expliquer pourquoi un sol volcanique est considéré comme fertile. (1 pt)</p>",
          "reponse": "<p>Un sol volcanique est riche en minéraux (potassium, phosphore, calcium...) issus de l'altération des roches volcaniques. Ces minéraux sont indispensables à la croissance des plantes.</p>"
        },
        {
          "question": "<p> Proposer deux hypothèses pouvant expliquer le faible rendement des haricots malgré la fertilité du sol. (1 pt)</p>",
          "reponse": "<ul style='list-style-type:disc; margin-left:15px;'><li>Hypothèse 1 : Le sol peut être trop acide (pH défavorable) ou manquer d'eau en saison sèche.</li><li>Hypothèse 2 : Les plants peuvent être attaqués par des ravageurs ou des maladies.</li></ul>"
        },
        {
          "question": "<p> Citer trois facteurs du milieu qui peuvent limiter la production végétale. (1,5 pt)</p>",
          "reponse": "<ul style='list-style-type:disc; margin-left:15px;'><li>L'éclairement (intensité lumineuse).</li><li>La disponibilité en eau (pluviométrie, irrigation).</li><li>La composition chimique du sol (pH, présence d'ions minéraux).</li></ul>"
        },
        {
          "question": "<p> Proposer des solutions pour améliorer le rendement de la culture de haricot. (1,5 pt)</p>",
          "reponse": "<ul style='list-style-type:disc; margin-left:15px;'><li>Réaliser une analyse du sol pour connaître son pH et sa composition.</li><li>Apporter des amendements (chaux si le sol est acide) et des engrais adaptés.</li><li>Mettre en place un système d'irrigation en période sèche.</li><li>Utiliser des semences de qualité et résistantes aux maladies.</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Vrai ou faux ?",
      "points": "5 pts",
      "enonce": "<div style='font-size:1em;'><p>Indiquer pour chaque affirmation si elle est <strong>vraie</strong> ou <strong>fausse</strong> en justifiant votre réponse.</p></div>",
      "questions": [
        {
          "question": "<p> Le magma qui donne du basalte est de type granitique.</p>",
          "reponse": "<p><strong>Faux.</strong> Le basalte est issu du magma juvénile, non du magma granitique. Le magma granitique donne des roches comme la rhyolite.</p>"
        },
        {
          "question": "<p> Les volcans hawaïens sont caractérisés par des éruptions explosives.</p>",
          "reponse": "<p><strong>Faux.</strong> Les volcans hawaïens ont des éruptions non explosives (effusives) car leurs laves sont très fluides.</p>"
        },
        {
          "question": "<p> Le Mont Cameroun est le seul volcan actif du Cameroun.</p>",
          "reponse": "<p><strong>Vrai.</strong> Le Mont Cameroun est le seul volcan encore actif au Cameroun. Les autres (Bamboutos, Manengouba, etc.) sont considérés comme éteints ou en sommeil.</p>"
        },
        {
          "question": "<p> La lave est du magma qui a atteint la surface et a perdu ses gaz.</p>",
          "reponse": "<p><strong>Vrai.</strong> La lave est du magma dégazé qui s'écoule à la surface. Le refroidissement de la lave donne naissance aux roches volcaniques.</p>"
        },
        {
          "question": "<p> Les roches volcaniques ont une structure grenue.</p>",
          "reponse": "<p><strong>Faux.</strong> Les roches volcaniques ont une structure microlitique (cristaux fins dans une pâte de verre) car le refroidissement est rapide. La structure grenue est caractéristique des roches plutoniques qui ont refroidi lentement en profondeur.</p>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
