<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "SVTEEHB",
  "classe": "Seconde",
  "sequence": "Séquence 4 : L'action de l'homme sur l'environnement et les grands phénomènes géologiques",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : L'eau, source de vie et enjeu environnemental",
      "points": "5 pts",
      "enonce": "<p>L'eau est une ressource essentielle à la vie sur Terre. Sa répartition, sa qualité et sa gestion sont des enjeux majeurs pour l'environnement et les sociétés humaines.</p>",
      "questions": [
        {
          "question": "<p><strong>1.1</strong> (1 pt) a) Citer les principaux réservoirs d'eau sur Terre. <br>b) Distinguer les eaux superficielles des eaux souterraines.</p>",
          "reponse": "<p>a) Les principaux réservoirs d'eau sont :</p><ul><li><strong>Les eaux superficielles</strong> : rivières, lacs, retenues d'eau, océans.</li><li><strong>Les eaux souterraines</strong> : nappes phréatiques, aquifères profonds.</li></ul><p>b) Les <strong>eaux superficielles</strong> sont des eaux visibles à la surface du sol (cours d'eau, lacs). Les <strong>eaux souterraines</strong> sont des eaux qui s'infiltrent dans le sol et circulent dans les couches géologiques (nappes phréatiques). Le niveau d'une nappe est appelé <strong>niveau piézométrique</strong>.</p>"
        },
        {
          "question": "<p><strong>1.2</strong> (1,5 pts) a) Expliquer pourquoi les nappes phréatiques constituent une ressource stratégique. <br>b) Citer les causes de la pollution des eaux souterraines.</p>",
          "reponse": "<p>a) Les nappes phréatiques constituent une ressource stratégique car :</p><ul><li>Elles représentent une réserve d'eau importante, souvent de bonne qualité.</li><li>Elles alimentent les puits et forages utilisés pour l'eau potable et l'irrigation.</li><li>Elles assurent un débit régulier aux cours d'eau en période sèche.</li></ul><p>b) Les causes de la pollution des eaux souterraines sont :</p><ul><li><strong>Pollution par les nitrates</strong> : lessivage des engrais azotés utilisés en agriculture.</li><li><strong>Pollution par les pesticides</strong> : infiltration des produits phytosanitaires.</li><li><strong>Pollution par les métaux lourds</strong> : rejets industriels.</li><li><strong>Pollution bactériologique</strong> : infiltration d'eaux usées non traitées.</li></ul>"
        },
        {
          "question": "<p><strong>1.3</strong> (1,5 pts) a) Définir la surexploitation d'une nappe phréatique. <br>b) Expliquer ses conséquences sur l'environnement.</p>",
          "reponse": "<p>a) La <strong>surexploitation</strong> d'une nappe phréatique est le prélèvement d'eau à un rythme supérieur à sa capacité de renouvellement naturel.</p><p>b) Les conséquences de la surexploitation sont :</p><ul><li><strong>Baisse du niveau piézométrique</strong> : les puits et forages s'assèchent.</li><li><strong>Tarissement des sources et des cours d'eau</strong> en période sèche.</li><li><strong>Intrusion saline</strong> : dans les zones côtières, l'eau salée de la mer peut pénétrer dans la nappe et la rendre impropre à la consommation.</li><li><strong>Affaissement des sols</strong> (subsidence).</li></ul>"
        },
        {
          "question": "<p><strong>1.4</strong> (1 pt) Proposer trois mesures pour une gestion durable des ressources en eau.</p>",
          "reponse": "<p>Trois mesures pour une gestion durable de l'eau :</p><ul><li><strong>Réduire les prélèvements</strong> : limiter les pompages excessifs, utiliser des techniques d'irrigation économes (goutte-à-goutte).</li><li><strong>Protéger les nappes contre la pollution</strong> : réglementer l'utilisation des engrais et pesticides, traiter les eaux usées avant rejet.</li><li><strong>Constituer des réserves</strong> : créer des retenues d'eau (barrages, lacs de retenue) pour stocker l'eau en période de pluie et compenser les sécheresses.</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : L'homme et la dégradation des sols et de la végétation",
      "points": "5 pts",
      "enonce": "<p>Les activités humaines ont des conséquences importantes sur les sols et la végétation, compromettant la fertilité des terres et la biodiversité.</p>",
      "questions": [
        {
          "question": "<p><strong>2.1</strong> (1 pt) a) Définir l'érosion des sols. <br>b) Citer trois causes de l'érosion des sols au Cameroun.</p>",
          "reponse": "<p>a) L'<strong>érosion</strong> est le processus de dégradation et de déplacement des particules du sol sous l'action de l'eau (pluie, ruissellement), du vent ou de l'activité humaine.</p><p>b) Trois causes de l'érosion des sols au Cameroun :</p><ul><li>La <strong>déforestation</strong> : abattage des arbres qui protègent le sol.</li><li>Le <strong>surpâturage</strong> : pâturage excessif par le bétail qui détruit le couvert végétal.</li><li>Les <strong>feux de brousse</strong> : brûlis qui détruisent la végétation et la couche superficielle du sol.</li></ul>"
        },
        {
          "question": "<p><strong>2.2</strong> (1,5 pts) a) Expliquer comment la déforestation favorise l'érosion des sols. <br>b) Citer les conséquences de l'érosion sur la production agricole.</p>",
          "reponse": "<p>a) La <strong>déforestation</strong> favorise l'érosion car :</p><ul><li>Les arbres et leurs racines fixent le sol et protègent contre le ruissellement de l'eau.</li><li>Sans couvert végétal, les gouttes de pluie frappent directement le sol et arrachent les particules.</li><li>L'eau de pluie s'écoule plus rapidement, entraînant les particules de terre (ruissellement).</li></ul><p>b) Conséquences de l'érosion sur la production agricole :</p><ul><li>Perte de la couche superficielle fertile du sol (appauvrissement).</li><li>Diminution de la capacité de rétention en eau du sol.</li><li>Lessivage des nutriments essentiels aux plantes (nitrates, phosphates).</li></ul>"
        },
        {
          "question": "<p><strong>2.3</strong> (1,5 pts) a) Définir la salinisation des sols. <br>b) Expliquer ses causes et ses conséquences sur la production végétale.</p>",
          "reponse": "<p>a) La <strong>salinisation</strong> est l'accumulation de sels (chlorures, sulfates, carbonates) dans les couches superficielles du sol, rendant la terre impropre à la culture.</p><p>b) Causes et conséquences :</p><ul><li><strong>Causes</strong> : irrigation excessive dans les zones arides (évaporation de l'eau, les sels restent en surface), remontée de la nappe salée.</li><li><strong>Conséquences</strong> : augmentation de la pression osmotique du sol, les plantes ne peuvent plus absorber l'eau (stress hydrique). La production végétale diminue fortement, et seules des plantes halophiles (tolérantes au sel) peuvent survivre.</li></ul>"
        },
        {
          "question": "<p><strong>2.4</strong> (1 pt) Citer quatre mesures de protection des sols contre la dégradation.</p>",
          "reponse": "<p>Quatre mesures de protection des sols :</p><ul><li><strong>Réboisement et reforestation</strong> pour reconstituer le couvert végétal.</li><li><strong>Établissement de haies brise-vent</strong> pour limiter l'érosion éolienne.</li><li><strong>Utilisation d'engrais organiques</strong> (compost, fumier) pour améliorer la structure et la fertilité du sol.</li><li><strong>Rotation des cultures</strong> pour éviter l'épuisement des nutriments et limiter les parasites.</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Protection de la faune, de la flore et équilibre biologique",
      "points": "4 pts",
      "enonce": "<p>La biodiversité est essentielle à l'équilibre des écosystèmes. Les activités humaines menacent cette diversité par la destruction des habitats et la pollution.</p>",
      "questions": [
        {
          "question": "<p><strong>3.1</strong> (1 pt) a) Définir l'environnement. <br>b) Citer les principales causes de destruction de la végétation au Cameroun.</p>",
          "reponse": "<p>a) L'<strong>environnement</strong> est l'ensemble des éléments naturels et artificiels (physiques, chimiques, biologiques, sociaux, culturels) qui entourent un être vivant et influencent son développement.</p><p>b) Les principales causes de destruction de la végétation au Cameroun sont :</p><ul><li>La <strong>déforestation</strong> (exploitation forestière, agriculture sur brûlis).</li><li>Le <strong>surpâturage</strong> (dans les zones sahéliennes).</li><li>L'<strong>urbanisation</strong> et l'extension des zones agricoles.</li><li>Les <strong>feux de brousse</strong>.</li></ul>"
        },
        {
          "question": "<p><strong>3.2</strong> (1 pt) Expliquer le rôle des insecticides et pesticides dans la réduction de la biodiversité.</p>",
          "reponse": "<p>Les insecticides et pesticides sont des substances chimiques utilisées pour lutter contre les ravageurs des cultures. Leur utilisation abusive a des conséquences néfastes sur la biodiversité :</p><ul><li>Ils détruisent les insectes <strong>utiles</strong> (pollinisateurs comme les abeilles, prédateurs naturels des ravageurs).</li><li>Ils contaminent les sols et les eaux, affectant la faune et la flore non ciblées.</li><li>Ils s'accumulent dans les chaînes alimentaires (bioaccumulation), affectant les animaux et potentiellement l'Homme.</li></ul>"
        },
        {
          "question": "<p><strong>3.3</strong> (1 pt) Citer quatre mesures de protection de la faune et de la flore.</p>",
          "reponse": "<p>Quatre mesures de protection de la faune et de la flore :</p><ul><li>Interdiction des <strong>feux de brousse</strong> incontrôlés.</li><li>Réglementation de l'utilisation des <strong>insecticides et pesticides</strong> et promotion de la <strong>lutte biologique</strong>.</li><li>Création de <strong>parcs nationaux et réserves</strong> pour protéger les espèces menacées.</li><li>Lutte contre le <strong>braconnage</strong> et le trafic d'espèces protégées.</li></ul>"
        },
        {
          "question": "<p><strong>3.4</strong> (1 pt) Expliquer la notion d'équilibre biologique à partir de l'exemple suivant : Vipère ↔ Rongeurs.</p>",
          "reponse": "<p>L'<strong>équilibre biologique</strong> est un état d'équilibre dynamique entre les populations d'une communauté, où les effectifs des espèces restent relativement stables.</p><p>Exemple : Vipère ↔ Rongeurs</p><ul><li>Les vipères se nourrissent de rongeurs.</li><li>Si les vipères sont trop nombreuses, elles réduisent la population de rongeurs.</li><li>La diminution des rongeurs entraîne une diminution des vipères (manque de nourriture).</li><li>La diminution des vipères permet aux rongeurs de se multiplier à nouveau.</li></ul><p>Ce cycle maintient un équilibre entre les deux populations.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Les grands phénomènes géologiques - Volcanisme et plutonisme",
      "points": "6 pts",
      "enonce": "<p>L'activité interne de la Terre se manifeste par le volcanisme et le plutonisme, qui sont à l'origine de la formation de nombreuses roches et reliefs.</p>",
      "questions": [
        {
          "question": "<p><strong>4.1</strong> (1,5 pts) a) Définir le volcanisme. <br>b) Distinguer les roches volcaniques des roches plutoniques en précisant leur mode de formation et leur structure.</p>",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
