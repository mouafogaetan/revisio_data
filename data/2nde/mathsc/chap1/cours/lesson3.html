<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) - ajouté par le script de thème */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Objectifs de la leçon",
    "contenu": "<div style='padding: 10px;'><ul style='list-style-type: disc; padding-left: 20px; font-size: 1.1em; line-height: 1.8;'><li>Comparer deux nombres réels en utilisant le signe de leur différence.</li><li>Utiliser les propriétés des inégalités (addition, multiplication par un réel positif ou négatif).</li><li>Encadrer une somme, un produit, un quotient ou une racine carrée.</li><li>Déterminer la troncature et l'arrondi d'un nombre réel.</li></ul></div>",
    "texteParle": "Bonjour à tous. Dans cette leçon sur les comparaisons dans l'ensemble des nombres réels, nous allons apprendre à comparer des nombres, à utiliser les propriétés des inégalités pour transformer des expressions, à encadrer des résultats de calculs, et enfin à déterminer la troncature et l'arrondi d'un nombre. Ces compétences sont essentielles pour la résolution de problèmes en mathématiques et dans la vie courante.",
    "note": "Introduction : Présentation des objectifs spécifiques de la leçon."
  },
  {
    "titre": "Comparaison de deux réels",
    "contenu": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; border-left: 5px solid #007bff;'><p style='margin: 0 0 10px 0; font-weight: bold;'>Méthode fondamentale</p><p style='margin: 0;'>Pour comparer deux nombres réels <span style='font-weight: bold;'>a</span> et <span style='font-weight: bold;'>b</span>, on étudie le signe de leur <span style='font-weight: bold;'>différence</span> <span style='font-style: italic;'>a - b</span>.</p><ul style='list-style-type: none; padding-left: 0; margin-top: 15px;'><li style='margin-bottom: 8px;'>✅ Si <span style='font-weight: bold;'>a - b > 0</span>, alors <span style='font-weight: bold;'>a > b</span> (a est plus grand que b).</li><li style='margin-bottom: 8px;'>✅ Si <span style='font-weight: bold;'>a - b < 0</span>, alors <span style='font-weight: bold;'>a < b</span> (a est plus petit que b).</li><li style='margin-bottom: 8px;'>✅ Si <span style='font-weight: bold;'>a - b = 0</span>, alors <span style='font-weight: bold;'>a = b</span> (a est égal à b).</li></ul></div>",
    "texteParle": "La méthode fondamentale pour comparer deux nombres réels consiste à calculer leur différence et à étudier le signe de cette différence. Si la différence est positive, le premier nombre est plus grand que le second. Si elle est négative, il est plus petit. Si elle est nulle, les deux nombres sont égaux. Cette méthode est universelle et s'applique à tous les nombres réels.",
    "note": "Principe de base de la comparaison : étudier le signe de la différence."
  },
  {
    "titre": "Exemple de comparaison",
    "contenu": "<div style='background-color: #fff3cd; padding: 15px; border-radius: 8px; border-left: 5px solid #ffc107;'><p style='font-weight: bold; margin-top: 0;'>Comparons <span style='font-size: 1.2em;'>\\(\\frac{5}{7}\\)</span> et <span style='font-size: 1.2em;'>\\(\\frac{7}{10}\\)</span></p><p><span style='font-weight: bold;'>1. Calcul de la différence :</span><br>\\(\\frac{5}{7} - \\frac{7}{10} = \\frac{5 \\times 10 - 7 \\times 7}{70} = \\frac{50 - 49}{70} = \\frac{1}{70}\\)</p><p><span style='font-weight: bold;'>2. Interprétation :</span><br>La différence \\(\\frac{1}{70} > 0\\).</p><p style='font-weight: bold; color: #28a745;'>Conclusion : \\(\\frac{5}{7} > \\frac{7}{10}\\).</p></div>",
    "texteParle": "Prenons un exemple concret pour illustrer cette méthode. Nous voulons comparer cinq septièmes et sept dixièmes. Nous calculons d'abord leur différence en les mettant au même dénominateur, qui est 70. Cinq septièmes devient cinquante sur soixante-dix, et sept dixièmes devient quarante-neuf sur soixante-dix. La différence est donc un sur soixante-dix, un nombre positif. Nous pouvons donc conclure que cinq septièmes est plus grand que sept dixièmes.",
    "note": "Application de la règle de comparaison sur un exemple avec des fractions."
  },
  {
    "titre": "Propriétés des inégalités",
    "contenu": "<div style='display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 10px 0;'><div style='background-color: #e7f5ff; padding: 12px; border-radius: 8px; border: 1px solid #b8daff;'><p style='font-weight: bold; margin-top: 0;'>Addition / Soustraction</p><p style='margin-bottom: 5px;'>Si <span style='font-weight: bold;'>a ≤ b</span>, alors pour tout réel <span style='font-weight: bold;'>c</span> :</p><p style='font-weight: bold; text-align: center; margin: 5px 0;'>a + c ≤ b + c</p><p style='font-weight: bold; text-align: center; margin: 5px 0;'>a - c ≤ b - c</p><p style='font-size: 0.9em; text-align: center;'>On peut ajouter ou soustraire un même nombre aux deux membres.</p></div><div style='background-color: #d4edda; padding: 12px; border-radius: 8px; border: 1px solid #c3e6cb;'><p style='font-weight: bold; margin-top: 0;'>Multiplication / Division</p><p style='margin-bottom: 5px;'>Si <span style='font-weight: bold;'>a ≤ b</span> et <span style='font-weight: bold;'>c > 0</span> :</p><p style='font-weight: bold; text-align: center; margin: 5px 0;'>a × c ≤ b × c</p><p style='font-weight: bold; text-align: center; margin: 5px 0;'>a ÷ c ≤ b ÷ c</p><p style='font-size: 0.9em; text-align: center;'>On peut multiplier ou diviser par un même <span style='color: #28a745; font-weight: bold;'>nombre positif</span>.</p></div><div style='grid-column: 1 / -1; background-color: #f8d7da; padding: 12px; border-radius: 8px; border: 1px solid #f5c6cb;'><p style='font-weight: bold; margin-top: 0;'>⚠️ Multiplication / Division par un nombre négatif</p><p style='margin-bottom: 5px;'>Si <span style='font-weight: bold;'>a ≤ b</span> et <span style='font-weight: bold;'>c < 0</span> :</p><p style='font-weight: bold; text-align: center; margin: 5px 0;'>a × c ≥ b × c</p><p style='font-weight: bold; text-align: center; margin: 5px 0;'>a ÷ c ≥ b ÷ c</p><p style='font-size: 0.9em; text-align: center;'>⚠️ On change le sens de l'inégalité lorsque l'on multiplie ou divise par un <span style='color: #dc3545; font-weight: bold;'>nombre négatif</span>.</p></div></div>",
    "texteParle": "Il est essentiel de connaître les propriétés des inégalités pour les manipuler correctement. Lorsque l'on ajoute ou soustrait un même nombre aux deux membres d'une inégalité, le sens de l'inégalité est conservé. Lorsque l'on multiplie ou divise par un nombre positif, le sens est également conservé. En revanche, lorsque l'on multiplie ou divise par un nombre négatif, le sens de l'inégalité est inversé. C'est une règle fondamentale à ne pas oublier.",
    "note": "Propriétés essentielles des inégalités et cas particulier de la multiplication par un nombre négatif."
  },
  {
    "titre": "Exemple d'application des propriétés",
    "contenu": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px;'><p><span style='font-weight: bold;'>Exercice :</span> Sachant que <span style='font-weight: bold;'>-2 < x < 3</span>, encadrer les expressions suivantes.</p><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;'><div style='background-color: #e9ecef; padding: 10px; border-radius: 6px;'><p style='font-weight: bold; margin-top: 0;'>1) \\(x + 5\\)</p><p>On ajoute 5 à chaque membre :</p><p style='font-weight: bold; text-align: center;'>\\(-2 + 5 < x + 5 < 3 + 5\\)</p><p style='font-weight: bold; color: #007bff; text-align: center;'>\\(3 < x + 5 < 8\\)</p></div><div style='background-color: #e9ecef; padding: 10px; border-radius: 6px;'><p style='font-weight: bold; margin-top: 0;'>2) \\(3x\\)</p><p>On multiplie par 3 (positif) :</p><p style='font-weight: bold; text-align: center;'>\\(-2 \\times 3 < 3x < 3 \\times 3\\)</p><p style='font-weight: bold; color: #007bff; text-align: center;'>\\(-6 < 3x < 9\\)</p></div><div style='grid-column: 1 / -1; background-color: #ffecb3; padding: 10px; border-radius: 6px;'><p style='font-weight: bold; margin-top: 0;'>3) \\(-2x\\)</p><p>On multiplie par -2 (négatif) : <span style='font-weight: bold; color: #dc3545;'>⚠️ On change le sens</span></p><p style='font-weight: bold; text-align: center;'>\\(-2 \\times (-2) > -2x > -2 \\times 3\\)</p><p style='font-weight: bold; color: #007bff; text-align: center;'>\\(4 > -2x > -6\\)</p><p>On réécrit dans l'ordre croissant :</p><p style='font-weight: bold; color: #007bff; text-align: center;'>\\(-6 < -2x < 4\\)</p></div></div></div>",
    "texteParle": "Voyons comment appliquer ces propriétés avec un exemple concret. On sait que x est compris entre -2 et 3. Pour encadrer x plus 5, il suffit d'ajouter 5 à chaque membre, ce qui donne un encadrement entre 3 et 8. Pour encadrer 3x, on multiplie par 3, un nombre positif, donc le sens des inégalités reste inchangé. En revanche, pour encadrer -2x, on multiplie par -2, un nombre négatif, donc le sens des inégalités est inversé. On obtient finalement que -2x est compris entre -6 et 4.",
    "note": "Illustration de l'utilisation des propriétés pour encadrer des expressions."
  },
  {
    "titre": "Encadrement d'une racine carrée",
    "contenu": "<div style='background-color: #e8f5e9; padding: 15px; border-radius: 8px; border-left: 5px solid #4caf50;'><p style='font-weight: bold; margin-top: 0;'>Important :</p><p style='margin-bottom: 5px;'>La fonction racine carrée est <span style='font-weight: bold;'>croissante</span> sur <span style='font-weight: bold;'>[0 ; +∞[</span>.</p><p>Donc, pour <span style='font-weight: bold;'>a ≥ 0</span> et <span style='font-weight: bold;'>b ≥ 0</span> :</p><p style='font-weight: bold; text-align: center; font-size: 1.1em;'>\\(a < b \\iff \\sqrt{a} < \\sqrt{b}\\)</p><div style='background-color: #fff3e0; padding: 10px; border-radius: 6px; margin-top: 10px;'><p style='font-weight: bold; margin-top: 0;'>Exemple :</p><p>Encadrer \\(\\sqrt{10}\\) sachant que \\(9 < 10 < 16\\).</p><p>On applique la racine carrée : \\(\\sqrt{9} < \\sqrt{10} < \\sqrt{16}\\).</p><p style='font-weight: bold; color: #e65100;'>Conclusion : \\(3 < \\sqrt{10} < 4\\).</p></div></div>",
    "texteParle": "Un cas particulier important concerne l'encadrement d'une racine carrée. La racine carrée étant une fonction croissante pour les nombres positifs, l'ordre est conservé. Ainsi, si un nombre est compris entre deux carrés parfaits, sa racine carrée sera comprise entre les racines de ces carrés. Par exemple, puisque 10 est compris entre 9 et 16, la racine carrée de 10 est comprise entre 3 et 4.",
    "note": "Propriété de croissance de la fonction racine carrée pour les encadrements."

  {
    "titre": "Troncature et arrondi",
    "contenu": "<div style='padding: 10px;'><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 15px;'><div style='background-color: #e3f2fd; padding: 12px; border-radius: 8px;'><p style='font-weight: bold; margin-top: 0;'>Troncature à \\(10^{-n}\\)</p><p>C'est la valeur obtenue en <span style='font-weight: bold;'>supprimant</span> tous les chiffres après la n-ième décimale.</p><div style='background-color: #bbdefb; padding: 8px; border-radius: 4px; margin-top: 10px;'><p style='margin: 0;'>Exemple : troncature de \\(\\pi = 3.14159...\\) à \\(10^{-2}\\) (2 décimales).</p><p style='font-weight: bold; text-align: center; margin: 5px 0;'>Troncature = 3.14</p></div></div><div style='background-color: #fce4ec; padding: 12px; border-radius: 8px;'><p style='font-weight: bold; margin-top: 0;'>Arrondi à \\(10^{-n}\\)</p><p>C'est la valeur la plus proche de la troncature ou de la troncature + \\(10^{-n}\\).</p><div style='background-color: #f8bbd0; padding: 8px; border-radius: 4px; margin-top: 10px;'><p style='margin: 0;'>Exemple : arrondi de \\(\\pi = 3.14159...\\) à \\(10^{-2}\\).</p><p style='font-weight: bold; text-align: center; margin: 5px 0;'>Arrondi = 3.14</p><p style='margin: 0; font-size: 0.9em;'>(car le 3ème chiffre est 1 < 5)</p></div></div></div><div style='background-color: #fff9c4; padding: 12px; border-radius: 8px; margin-top: 15px;'><p style='font-weight: bold; margin-top: 0;'>⚠️ Règle de l'arrondi :</p><p style='margin-bottom: 0;'>Si le chiffre suivant (n+1-ième) est <span style='font-weight: bold; color: #d32f2f;'>&lt; 5</span>, on conserve la troncature. S'il est <span style='font-weight: bold; color: #d32f2f;'>&ge; 5</span>, on ajoute 1 à la n-ième décimale (arrondi par excès).</p></div></div>",
    "texteParle": "Il est souvent utile de donner une valeur approchée d'un nombre. On utilise pour cela la troncature ou l'arrondi. La troncature à un certain rang consiste à supprimer tous les chiffres après ce rang. Par exemple, la troncature de pi à deux décimales est 3,14. L'arrondi, lui, consiste à prendre la valeur la plus proche, en regardant le chiffre suivant. Si ce chiffre est inférieur à 5, on conserve la troncature ; s'il est supérieur ou égal à 5, on augmente le dernier chiffre d'une unité.",
    "note": "Distinction et règle de calcul pour la troncature et l'arrondi."

  {
    "titre": "Exemple troncature / arrondi",
    "contenu": "<div style='background-color: #f5f5f5; padding: 15px; border-radius: 8px;'><p style='font-weight: bold; margin-top: 0;'>Soit le nombre : <span style='font-size: 1.2em;'>\\(x = 2.71828...\\)</span> (nombre d'Euler).</p><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;'><div style='background-color: #e8eaf6; padding: 10px; border-radius: 6px;'><p style='font-weight: bold; margin-top: 0;'>Troncature à 3 décimales</p><p>On garde les 3 premiers chiffres après la virgule : 718.</p><p style='font-weight: bold; color: #283593; text-align: center;'>\\(2.718\\)</p></div><div style='background-color: #fce4ec; padding: 10px; border-radius: 6px;'><p style='font-weight: bold; margin-top: 0;'>Arrondi à 3 décimales</p><p>On regarde le 4ème chiffre : 2 (car 2.7182...).</p><p>2 < 5, donc on conserve la troncature.</p><p style='font-weight: bold; color: #c62828; text-align: center;'>\\(2.718\\)</p></div></div><div style='background-color: #e8f5e9; padding: 10px; border-radius: 6px; margin-top: 10px;'><p style='font-weight: bold; margin-top: 0;'>Arrondi à 2 décimales</p><p>On regarde le 3ème chiffre : 8 (car 2.718...).</p><p>8 ≥ 5, donc on ajoute 1 au 2ème chiffre (1 devient 2).</p><p style='font-weight: bold; color: #2e7d32; text-align: center;'>\\(2.72\\)</p></div></div>",
    "texteParle": "Prenons un exemple avec le nombre d'Euler, qui vaut environ 2,71828. Si on veut sa troncature à trois décimales, on garde les trois premiers chiffres après la virgule, soit 718, ce qui donne 2,718. Pour l'arrondi à trois décimales, on regarde le quatrième chiffre, qui est 2, donc inférieur à 5, on conserve la même valeur. En revanche, pour l'arrondi à deux décimales, on regarde le troisième chiffre, qui est 8, supérieur à 5, donc on ajoute 1 au deuxième chiffre, ce qui donne 2,72.",
    "note": "Application des règles sur un nombre concret pour clarifier la différence."
  },
  {

    "contenu": "<div style='padding: 10px;'><ul style='list-style-type: none; padding-left: 0;'><li style='background-color: #e3f2fd; padding: 12px; margin-bottom: 10px; border-radius: 6px; border-left: 4px solid #1976d2;'>✅ Comparer deux réels : étudier le signe de \\(a - b\\).</li><li style='background-color: #e8f5e9; padding: 12px; margin-bottom: 10px; border-radius: 6px; border-left: 4px solid #388e3c;'>✅ Inégalités : l'addition/soustraction conserve le sens.</li><li style='background-color: #fff3e0; padding: 12px; margin-bottom: 10px; border-radius: 6px; border-left: 4px solid #f57c00;'>✅ Multiplication/division : <span style='font-weight: bold;'>si c > 0</span>, le sens est conservé ; <span style='font-weight: bold;'>si c < 0</span>, le sens est inversé.</li><li style='background-color: #f3e5f5; padding: 12px; margin-bottom: 10px; border-radius: 6px; border-left: 4px solid #7b1fa2;'>✅ Encadrement : on applique les propriétés membre à membre.</li><li style='background-color: #fce4ec; padding: 12px; margin-bottom: 10px; border-radius: 6px; border-left: 4px solid #c62828;'>✅ Troncature : suppression des décimales. Arrondi : règle du 5.</li></ul></div>",
    "texteParle": "Pour conclure cette leçon, retenez les points essentiels. Pour comparer deux nombres réels, on étudie le signe de leur différence. Les opérations sur les inégalités doivent respecter les règles : l'addition et la soustraction conservent le sens, la multiplication et la division par un nombre positif aussi, mais par un nombre négatif, le sens est inversé. Les encadrements se font en appliquant ces règles membre à membre. Enfin, pour donner une valeur approchée, on utilise la troncature ou l'arrondi en respectant la règle du chiffre 5 pour l'arrondi.",

rgin-top: 5px;'><div style='background-color: #f3e5f5; padding: 10px; border-radius: 4px; text-align: center;'><p style='font-weight: bold;'>C) 3.14</p></div><div style='background-color: #f3e5f5; padding: 10px; border-radius: 4px; text-align: center;'><p style='font-weight: bold;'>D) 3.15</p></div></div><p style='margin-top: 15px;'><span style='font-weight: bold;'>Réponse :</span> A) 3.141 (on supprime les décimales après la 3ème).</p></div></div>",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            if (header) header.style.background = 'rgba(15, 23, 42, 0.85)';
            if (footer) footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            if (header) header.style.background = 'rgba(255, 255, 255, 0.85)';
            if (footer) footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
            // Ajouter l'écouteur d'événement click
            themeBtn.addEventListener('click', toggleTheme);
        }
    });
