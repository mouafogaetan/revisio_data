<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Mathématiques",
 "classe": "Seconde C",
 "sequence": "Séquence 2",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Calculs dans IR et valeurs absolues",
     "points": "4 pts",
     "enonce": "<div style='font-size: 1.05em; line-height: 1.7; padding: 5px;'><p>On considère les nombres suivants :</p><div class='math-block' style='text-align: center; background-color: #f5f5f5; padding: 10px; border-radius: 6px; margin: 10px 0;'><div class='math'>$$ A = \\dfrac{3}{4} - \\dfrac{5}{6} $$</div></div><div class='math-block' style='text-align: center; background-color: #f5f5f5; padding: 10px; border-radius: 6px; margin: 10px 0;'><div class='math'>$$ B = |2x - 3| \\text{ avec } x = -1 $$</div></div></div>",
     "questions": [
       {
         "question": "<div style='font-size: 1.05em; line-height: 1.7;'><p> Calculer $A$ et donner le résultat sous forme d'une fraction irréductible.</p></div>",
         "reponse": "<div style='font-size: 1.05em; line-height: 1.7; background-color: #e8f5e9; padding: 10px; border-radius: 6px; color: #1e4620;'><p>$A = \\dfrac{3}{4} - \\dfrac{5}{6} = \\dfrac{9}{12} - \\dfrac{10}{12} = -\\dfrac{1}{12}$.</p></div>"
       },
       {
         "question": "<div style='font-size: 1.05em; line-height: 1.7;'><p> Calculer la valeur de $B$ pour $x = -1$.</p></div>",
         "reponse": "<div style='font-size: 1.05em; line-height: 1.7; background-color: #e8f5e9; padding: 10px; border-radius: 6px; color: #1e4620;'><p>$B = |2(-1) - 3| = |-2 - 3| = |-5| = 5$.</p></div>"
       },
       {
         "question": "<div style='font-size: 1.05em; line-height: 1.7;'><p> Résoudre l'équation $|2x - 3| = 5$.</p></div>",
         "reponse": "<div style='font-size: 1.05em; line-height: 1.7; background-color: #e8f5e9; padding: 10px; border-radius: 6px; color: #1e4620;'><p>$|2x - 3| = 5 \\iff 2x - 3 = 5$ ou $2x - 3 = -5$.</p><p>$2x - 3 = 5 \\iff 2x = 8 \\iff x = 4$.</p><p>$2x - 3 = -5 \\iff 2x = -2 \\iff x = -1$.</p><p>L'ensemble des solutions est $\\{-1; 4\\}$.</p></div>"
       }
     ]
   },
   {
     "titre": "Vecteurs et colinéarité",
     "points": "4 pts",
     "enonce": "<div style='font-size: 1.05em; line-height: 1.7; padding: 5px;'><p>On considère les points $A(1; 2)$, $B(3; 4)$ et $C(-1; 0)$ dans un repère orthonormé.</p></div>",
     "questions": [
       {
         "question": "<div style='font-size: 1.05em; line-height: 1.7;'><p> Calculer les coordonnées des vecteurs $\\overrightarrow{AB}$ et $\\overrightarrow{AC}$.</p></div>",
         "reponse": "<div style='font-size: 1.05em; line-height: 1.7; background-color: #e8f5e9; padding: 10px; border-radius: 6px; color: #1e4620;'><p>$\\overrightarrow{AB} = (3-1; 4-2) = (2; 2)$.</p><p>$\\overrightarrow{AC} = (-1-1; 0-2) = (-2; -2)$.</p></div>"
       },
       {
         "question": "<div style='font-size: 1.05em; line-height: 1.7;'><p> Les points $A$, $B$ et $C$ sont-ils alignés ? Justifier.</p></div>",
         "reponse": "<div style='font-size: 1.05em; line-height: 1.7; background-color: #e8f5e9; padding: 10px; border-radius: 6px; color: #1e4620;'><p>$\\overrightarrow{AB} = (2; 2)$ et $\\overrightarrow{AC} = (-2; -2)$.</p><p>On a $\\overrightarrow{AC} = -\\overrightarrow{AB}$.</p><p>Les vecteurs sont colinéaires, donc les points $A$, $B$ et $C$ sont alignés.</p></div>"
       },
       {
         "question": "<div style='font-size: 1.05em; line-height: 1.7;'><p> Déterminer les coordonnées du point $D$ tel que $ABCD$ soit un parallélogramme.</p></div>",
         "reponse": "<div style='font-size: 1.05em; line-height: 1.7; background-color: #e8f5e9; padding: 10px; border-radius: 6px; color: #1e4620;'><p>Dans un parallélogramme $ABCD$, on a $\\overrightarrow{AB} = \\overrightarrow{DC}$.</p><p>Soit $D(x_D; y_D)$. Alors $\\overrightarrow{DC} = C - D = (-1 - x_D; 0 - y_D)$.</p><p>On doit avoir $(2; 2) = (-1 - x_D; -y_D)$.</p><p>$2 = -1 - x_D \\iff x_D = -3$.</p><p>$2 = -y_D \\iff y_D = -2$.</p><p>Donc $D(-3; -2)$.</p></div>"
       }
     ]
   },
   {
     "titre": "Équations et inéquations",
     "points": "6 pts",
     "enonce": "<div style='font-size: 1.05em; line-height: 1.7; padding: 5px;'><p>Résoudre dans $\\mathbb{R}$ les équations et inéquations suivantes.</p></div>",
     "questions": [
       {
         "question": "<div style='font-size: 1.05em; line-height: 1.7;'><p> Résoudre l'équation $3x - 5 = 7$.</p></div>",
         "reponse": "<div style='font-size: 1.05em; line-height: 1.7; background-color: #e8f5e9; padding: 10px; border-radius: 6px; color: #1e4620;'><p>$3x - 5 = 7 \\iff 3x = 12 \\iff x = 4$.</p><p>L'ensemble des solutions est $S = \\{4\\}$.</p></div>"
       },
       {
         "question": "<div style='font-size: 1.05em; line-height: 1.7;'><p> Résoudre l'inéquation $2x + 3 > 5x - 6$.</p></div>",
         "reponse": "<div style='font-size: 1.05em; line-height: 1.7; background-color: #e8f5e9; padding: 10px; border-radius: 6px; color: #1e4620;'><p>$2x + 3 > 5x - 6$</p><p>$3 + 6 > 5x - 2x$</p><p>$9 > 3x$</p><p>$3 > x$</p><p>L'ensemble des solutions est $S = ]-\\infty; 3[$.</p></div>"
       },
       {
         "question": "<div style='font-size: 1.05em; line-height: 1.7;'><p> Résoudre l'équation $x^2 - 5x + 6 = 0$.</p></div>",
         "reponse": "<div style='font-size: 1.05em; line-height: 1.7; background-color: #e8f5e9; padding: 10px; border-radius: 6px; color: #1e4620;'><p>Le discriminant est $\\Delta = (-5)^2 - 4 \\times 1 \\times 6 = 25 - 24 = 1$.</p><p>$\\sqrt{\\Delta} = 1$.</p><p>$x_1 = \\dfrac{5 - 1}{2} = 2$ et $x_2 = \\dfrac{5 + 1}{2} = 3$.</p><p>L'ensemble des solutions est $S = \\{2; 3\\}$.</p></div>"
       },
       {
         "question": "<div style='font-size: 1.05em; line-height: 1.7;'><p> Résoudre l'inéquation $x^2 - 5x + 6 > 0$.</p></div>",
         "reponse": "<div style='font-size: 1.05em; line-height: 1.7; background-color: #e8f5e9; padding: 10px; border-radius: 6px; color: #1e4620;'><p>Le trinôme $x^2 - 5x + 6$ a pour racines $2$ et $3$ et $a = 1 > 0$.</p><p>Tableau de signes :</p><table style='border-collapse: collapse; margin: 10px auto;'><tr><td style='border: 1px solid #333; padding: 5px 10px;'>$x$</td><td style='border: 1px solid #333; padding: 5px 10px;'>$-\\infty$</td><td style='border: 1px solid #333; padding: 5px 10px;'>$2$</td><td style='border: 1px solid #333; padding: 5px 10px;'>$3$</td><td style='border: 1px solid #333; padding: 5px 10px;'>$+\\infty$</td></tr><tr><td style='border: 1px solid #333; padding: 5px 10px;'>$P(x)$</td><td style='border: 1px solid #333; padding: 5px 10px;'>$+$</td><td style='border: 1px solid #333; padding: 5px 10px;'>$0$</td><td style='border: 1px solid #333; padding: 5px 10px;'>$-$</td><td style='border: 1px solid #333; padding: 5px 10px;'>$0$</td><td style='border: 1px solid #333; padding: 5px 10px;'>$+$</td></tr></table><p>$x^2 - 5x + 6 > 0 \\iff x < 2$ ou $x > 3$.</p><p>$S = ]-\\infty; 2[ \\cup ]3; +\\infty[$.</p></div>"
       }
     ]
   },
   {
     "titre": "Problème de tarif",
     "type": "competence",
     "points": "6 pts",
     "enonce": "<div style='font-size: 1.05em; line-height: 1.7; padding: 5px;'><p>Une entreprise de location de voitures propose deux formules :</p><ul><li><strong>Formule A :</strong> 50 000 FCFA par jour, kilométrage illimité.</li><li><strong>Formule B :</strong> 30 000 FCFA par jour plus 200 FCFA par kilomètre parcouru.</li></ul><p>Un client souhaite louer une voiture pour une journée.</p></div>",
     "questions": [
       {
         "question": "<div style='font-size: 1.05em; line-height: 1.7;'><p> Soit $x$ le nombre de kilomètres parcourus. Exprimer le coût de chaque formule en fonction de $x$.</p></div>",
         "reponse": "<div style='font-size: 1.05em; line-height: 1.7; background-color: #e8f5e9; padding: 10px; border-radius: 6px; color: #1e4620;'><p>Formule A : $C_A(x) = 50\\,000$</p><p>Formule B : $C_B(x) = 30\\,000 + 200x$</p></div>"
       },
       {
         "question": "<div style='font-size: 1.05em; line-height: 1.7;'><p> Pour quel nombre de kilomètres les deux formules sont-elles équivalentes ?</p></div>",
         "reponse": "<div style='font-size: 1.05em; line-height: 1.7; background-color: #e8f5e9; padding: 10px; border-radius: 6px; color: #1e4620;'><p>On résout $C_A(x) = C_B(x)$.</p><p>$50\\,000 = 30\\,000 + 200x$</p><p>$20\\,000 = 200x$</p><p>$x = 100$</p><p>Les deux formules sont équivalentes pour 100 km.</p></div>"
       },
       {
         "question": "<div style='font-size: 1.05em; line-height: 1.7;'><p> Quelle formule doit-il choisir s'il prévoit de parcourir :</p><p>a) 80 km ?</p><p>b) 150 km ?</p></div>",
         "reponse": "<div style='font-size: 1.05em; line-height: 1.7; background-color: #e8f5e9; padding: 10px; border-radius: 6px; color: #1e4620;'><p>a) Pour 80 km :</p><p>$C_A = 50\\,000$ FCFA</p><p>$C_B = 30\\,000 + 200 \\times 80 = 30\\,000 + 16\\,000 = 46\\,000$ FCFA</p><p>La formule B est moins chère.</p><p>b) Pour 150 km :</p><p>$C_A = 50\\,000$ FCFA</p><p>$C_B = 30\\,000 + 200 \\times 150 = 30\\,000 + 30\\,000 = 60\\,000$ FCFA</p><p>La formule A est moins chère.</p></div>"
       }
     ]
   }
 ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
