<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
    "matiere": "Maths 2nd C",
    "classe": "Seconde",
    "sequence": "Séquence 3",
    "anneeScolaire": "2025-2026",
    "exercices": [
        {
            "titre": "Exercice 1 : Calculs dans IR et comparaisons",
            "points": "4 pts",
            "enonce": "<div style='padding: 16px; background-color: #f0f4f8; border-radius: 8px; color: #1a202c;'>Cet exercice teste votre maîtrise des ensembles de nombres, des calculs avec des radicaux et des comparaisons de nombres réels.</div>",
            "questions": [
                {
                    "question": "<p> (2,5 pts) On considère les nombres suivants :</p><ul><li>\\( A = \\frac{5}{3} \\)</li><li>\\( B = 0,25 \\)</li><li>\\( C = \\sqrt{2} \\)</li><li>\\( D = \\sqrt{16} \\)</li><li>\\( E = \\frac{2}{3} \\times \\sqrt{9} \\)</li></ul><p>Pour chacun de ces nombres, déterminer le plus petit ensemble (parmi \\( \\mathbb{N}, \\mathbb{Z}, \\mathbb{D}, \\mathbb{Q}, \\mathbb{R} \\)) auquel il appartient. Justifier brièvement votre réponse.</p>",
                    "reponse": "<p><strong>Corrigé :</strong></p><ul><li><strong>A = 5/3 :</strong> \\( \\mathbb{Q} \\) (fraction non décimale).</li><li><strong>B = 0,25 :</strong> \\( \\mathbb{D} \\) (partie décimale finie).</li><li><strong>C = \\(\\sqrt{2}\\) :</strong> \\( \\mathbb{R} \\) mais pas \\( \\mathbb{Q} \\), donc \\( \\mathbb{R} \\).</li><li><strong>D = \\(\\sqrt{16} = 4\\) :</strong> \\( \\mathbb{N} \\).</li><li><strong>E = \\(\\frac{2}{3} \\times 3 = 2\\) :</strong> \\( \\mathbb{N} \\).</li></ul>"
                },
                {
                    "question": "<p> (1,5 pts) Écrire les expressions suivantes sous la forme \\( a\\sqrt{b} \\), où \\( a \\) est un entier relatif et \\( b \\) un entier positif le plus petit possible.</p><ul><li>\\( \\sqrt{75} \\)</li><li>\\( \\sqrt{18} \\times \\sqrt{8} \\)</li><li>\\( \\frac{\\sqrt{45}}{\\sqrt{5}} \\)</li></ul>",
                    "reponse": "<p><strong>Corrigé :</strong></p><ul><li>\\( \\sqrt{75} = \\sqrt{25 \\times 3} = 5\\sqrt{3} \\)</li><li>\\( \\sqrt{18} \\times \\sqrt{8} = \\sqrt{144} = 12 \\)</li><li>\\( \\frac{\\sqrt{45}}{\\sqrt{5}} = \\sqrt{\\frac{45}{5}} = \\sqrt{9} = 3 \\)</li></ul>"
                }
            ]
        },
        {
            "titre": "Exercice 2 : Vecteurs du plan et combinaisons linéaires",
            "points": "4 pts",
            "enonce": "<div style='padding: 16px; background-color: #f0f4f8; border-radius: 8px; color: #1a202c;'>Les questions de cet exercice portent sur la manipulation des vecteurs, les combinaisons linéaires et la colinéarité.</div>",
            "questions": [
                {
                    "question": "<p> (2 pts) Soit un triangle ABC. Placer les points D, E et F tels que :</p><ul><li>\\( \\overrightarrow{AD} = \\overrightarrow{AB} + \\overrightarrow{AC} \\)</li><li>\\( \\overrightarrow{AE} = 2\\overrightarrow{AB} - \\overrightarrow{AC} \\)</li><li>\\( \\overrightarrow{BF} = \\frac{1}{2}\\overrightarrow{BC} \\)</li></ul><p>Réaliser une figure à main levée sur votre copie en utilisant la règle du parallélogramme et la relation de Chasles.</p>",
                    "reponse": "<div style='padding: 12px; border-left: 4px solid #2b6cb0; background-color: #ebf8ff; border-radius: 4px;'><p><strong>Corrigé :</strong></p><ul><li>Pour \\( \\overrightarrow{AD} = \\overrightarrow{AB} + \\overrightarrow{AC} \\), D est le quatrième sommet du parallélogramme ABDC.</li><li>Pour \\( \\overrightarrow{AE} = 2\\overrightarrow{AB} - \\overrightarrow{AC} \\), on place un point B' tel que \\( \\overrightarrow{AB'} = 2\\overrightarrow{AB} \\), puis E est le quatrième sommet du parallélogramme de côtés \\( \\overrightarrow{AB'} \\) et \\( -\\overrightarrow{AC} \\).</li><li>Pour \\( \\overrightarrow{BF} = \\frac{1}{2}\\overrightarrow{BC} \\), F est le milieu de [BC].</li></ul></div>"
                },
                {
                    "question": "<p> (2 pts) Soient \\( \\vec{u} \\) et \\( \\vec{v} \\) deux vecteurs non colinéaires du plan.</p><p><strong>a)</strong> Démontrer que les vecteurs \\( \\vec{w} = 2\\vec{u} - \\vec{v} \\) et \\( \\vec{t} = -4\\vec{u} + 2\\vec{v} \\) sont colinéaires.</p><p><strong>b)</strong> Exprimer \\( \\vec{w} \\) en fonction de \\( \\vec{t} \\).</p>",
                    "reponse": "<p><strong>Corrigé :</strong></p><p><strong>a)</strong> On remarque que \\( \\vec{t} = -4\\vec{u} + 2\\vec{v} = -2(2\\vec{u} - \\vec{v}) = -2\\vec{w} \\). Comme il existe un réel \\( k = -2 \\) tel que \\( \\vec{t} = k\\vec{w} \\), les vecteurs \\( \\vec{w} \\) et \\( \\vec{t} \\) sont colinéaires.</p><p><strong>b)</strong> \\( \\vec{w} = -\\frac{1}{2}\\vec{t} \\).</p>"
                }
            ]
        },
        {
            "titre": "Exercice 3 : Équations, inéquations et systèmes",
            "points": "5 pts",
            "enonce": "<div style='padding: 16px; background-color: #f0f4f8; border-radius: 8px; color: #1a202c;'>Résoudre des équations et inéquations du premier et du second degré, ainsi qu'un système linéaire.</div>",
            "questions": [
                {
                    "question": "<p> (2 pts) Résoudre dans \\( \\mathbb{R} \\) les inéquations suivantes et représenter l'ensemble des solutions sur une droite graduée.</p><ul><li>\\( 3x - 5 \\leq 7 \\)</li><li>\\( -2x + 1 > 0 \\)</li></ul>",
                    "reponse": "<p><strong>Corrigé :</strong></p><ul><li>\\( 3x - 5 \\leq 7 \\Rightarrow 3x \\leq 12 \\Rightarrow x \\leq 4 \\). L'ensemble solution est \\( S = ]-\\infty ; 4] \\).</li><li>\\( -2x + 1 > 0 \\Rightarrow -2x > -1 \\Rightarrow x < \\frac{1}{2} \\). L'ensemble solution est \\( S = ]-\\infty ; \\frac{1}{2}[ \\).</li></ul><p>Sur une droite graduée, on hachure les régions correspondantes.</p>"
                },
                {
                    "question": "<p> (1,5 pts) Résoudre dans \\( \\mathbb{R} \\) l'équation suivante : \\( x^2 - 5x + 6 = 0 \\). Indiquer les étapes de la résolution.</p>",
                    "reponse": "<p><strong>Corrigé :</strong></p><p>Calcul du discriminant : \\( \\Delta = b^2 - 4ac = (-5)^2 - 4 \\times 1 \\times 6 = 25 - 24 = 1 \\).</p><p>Comme \\( \\Delta > 0 \\), l'équation admet deux solutions réelles distinctes :</p><ul><li>\\( x_1 = \\frac{-b - \\sqrt{\\Delta}}{2a} = \\frac{5 - 1}{2} = 2 \\)</li><li>\\( x_2 = \\frac{-b + \\sqrt{\\Delta}}{2a} = \\frac{5 + 1}{2} = 3 \\)</li></ul><p>L'ensemble solution est \\( S = \\{2 ; 3\\} \\).</p>"
                },
                {
                    "question": "<p> (1,5 pts) Résoudre le système d'équations linéaires suivant :</p><p><div class='math-block'><div class='math'>\\[ \\begin{cases} 2x + y = 7 \\\\ x - y = 2 \\end{cases} \\]</div></div></p>",
                    "reponse": "<p><strong>Corrigé :</strong></p><p>Méthode par substitution : de la seconde équation, on a \\( x = y + 2 \\).</p><p>En remplaçant dans la première : \\( 2(y + 2) + y = 7 \\Rightarrow 2y + 4 + y = 7 \\Rightarrow 3y = 3 \\Rightarrow y = 1 \\).</p><p>Alors \\( x = 1 + 2 = 3 \\). L'ensemble solution est \\( S = \\{(3 ; 1)\\} \\).</p>"
                }
            ]
        },
        {
            "titre": "Exercice 4 : Angles inscrits et polygones réguliers",
            "points": "3 pts",
            "enonce": "<div style='padding: 16px; background-color: #f0f4f8; border-radius: 8px; color: #1a202c;'>Cet exercice porte sur les propriétés des angles inscrits et la construction des polygones réguliers.</div>",
            "questions": [
                {
                    "question": "<p> (1,5 pts) Soit un cercle de centre O et de rayon 4 cm. On considère un angle au centre \\( \\widehat{AOB} = 72^\\circ \\). Déterminer la mesure de l'angle inscrit \\( \\widehat{ACB} \\) qui intercepte le même arc \\( \\widehat{AB} \\), où C est un point du cercle n'appartenant pas à l'arc AB. Justifier votre réponse.</p>",
                    "reponse": "<p><strong>Corrigé :</strong></p><p>D'après la propriété des angles inscrits, la mesure d'un angle inscrit est la moitié de la mesure de l'angle au centre qui intercepte le même arc. Donc \\( \\widehat{ACB} = \\frac{1}{2} \\times \\widehat{AOB} = \\frac{1}{2} \\times 72^\\circ = 36^\\circ \\).</p>"
                },
                {
                    "question": "<p> (1,5 pts) Construire un hexagone régulier de 3 cm de côté en décrivant la méthode. Donner la mesure de son angle au centre et de son angle intérieur.</p>",
                    "reponse": "<p><strong>Corrigé :</strong></p><ul><li><strong>Méthode :</strong> Tracer un cercle de rayon 3 cm. Placer un point sur le cercle. Avec le compas, reporter la longueur du rayon (3 cm) sur le cercle pour obtenir les 6 sommets. Relier ces sommets pour former l'hexagone.</li><li><strong>Angle au centre :</strong> \\( \\frac{360^\\circ}{6} = 60^\\circ \\).</li><li><strong>Angle intérieur :</strong> \\( 180^\\circ - 60^\\circ = 120^\\circ \\).</li></ul>"
                }
            ]
        },
        {
            "titre": "Exercice 5 : Statistiques",
            "points": "4 pts",
            "enonce": "<div style='padding: 16px; background-color: #f0f4f8; border-radius: 8px; color: #1a202c;'>Le tableau ci-dessous donne les notes obtenues par les 30 élèves d'une classe de Seconde lors d'un devoir de mathématiques sur 20. Les notes sont regroupées par classes.</div>",
            "questions": [
                {
                    "question": "<p><div style='overflow-x: auto;'><table style='border-collapse: collapse; width: 100%; color: #1a202c;'><thead style='background-color: #2d3748; color: white;'><tr><th style='padding: 8px; border: 1px solid #cbd5e0;'>Notes</th><th style='padding: 8px; border: 1px solid #cbd5e0;'>[0 ; 4[</th><th style='padding: 8px; border: 1px solid #cbd5e0;'>[4 ; 8[</th><th style='padding: 8px; border: 1px solid #cbd5e0;'>[8 ; 12[</th><th style='padding: 8px; border: 1px solid #cbd5e0;'>[12 ; 16[</th><th style='padding: 8px; border: 1px solid #cbd5e0;'>[16 ; 20]</th></tr></thead><tbody><tr><td style='padding: 8px; border: 1px solid #cbd5e0;'><strong>Effectifs</strong></td><td style='padding: 8px; border: 1px solid #cbd5e0;'>3</td><td style='padding: 8px; border: 1px solid #cbd5e0;'>8</td><td style='padding: 8px; border: 1px solid #cbd5e0;'>10</td><td style='padding: 8px; border: 1px solid #cbd5e0;'>7</td><td style='padding: 8px; border: 1px solid #cbd5e0;'>2</td></tr></tbody></table></div></p><p> (1,5 pts) Calculer la moyenne de cette série statistique. (On prendra le centre de chaque classe pour les calculs).</p><p> (1,5 pts) Déterminer la classe médiane de cette série.</p><p> (1 pt) Calculer l'étendue de cette série.</p>",
                    "reponse": "<p><strong>Corrigé :</strong></p><p><strong>1.</strong> Centres des classes : 2, 6, 10, 14, 18.</p><p>Moyenne \\( \\bar{x} = \\frac{3 \\times 2 + 8 \\times 6 + 10 \\times 10 + 7 \\times 14 + 2 \\times 18}{30} = \\frac{6 + 48 + 100 + 98 + 36}{30} = \\frac{288}{30} = 9,6 \\).</p><p><strong>2.</strong> L'effectif total est 30, la médiane est la valeur qui partage la série en deux parties égales, c'est-à-dire la 15e et la 16e valeur. En calculant les effectifs cumulés croissants : 3, 11, 21. La 15e et la 16e valeur se trouvent donc dans la classe [8 ; 12[. La classe médiane est [8 ; 12[.</p><p><strong>3.</strong> Étendue = note maximale - note minimale = 20 - 0 = 20.</p>"
                }
            ]
        }
    ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
