<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Mathématiques",
  "classe": "Seconde C",
  "sequence": "Séquence 5",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Équations et inéquations du second degré",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1.1em; line-height: 1.6; background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><p>On considère le trinôme du second degré défini par : <span class='math inline'>\\(P(x) = 2x^2 - 7x + 3\\)</span>.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 1.05em; line-height: 1.8; padding: 12px;'><p> Résoudre dans <span class='math inline'>\\(\\mathbb{R}\\)</span> l'équation <span class='math inline'>\\(P(x) = 0\\)</span>.</p></div>",
          "reponse": "<div style='font-size: 1.05em; line-height: 1.8; padding: 12px;'><p>Le discriminant est <span class='math inline'>\\(\\Delta = (-7)^2 - 4(2)(3) = 49 - 24 = 25\\)</span>.</p><p>Les racines sont : <span class='math inline'>\\(x_1 = \\frac{7 - 5}{4} = \\frac{1}{2}\\)</span> et <span class='math inline'>\\(x_2 = \\frac{7 + 5}{4} = 3\\)</span>.</p><p>L'ensemble solution est <span class='math inline'>\\(S = \\left\\{\\frac{1}{2}; 3\\right\\}\\)</span>.</p></div>"
        },
        {
          "question": "<div style='font-size: 1.05em; line-height: 1.8; padding: 12px;'><p> Déterminer le signe de <span class='math inline'>\\(P(x)\\)</span> suivant les valeurs de <span class='math inline'>\\(x\\)</span>.</p></div>",
          "reponse": "<div style='font-size: 1.05em; line-height: 1.8; padding: 12px;'><p>Comme <span class='math inline'>\\(a = 2 > 0\\)</span>, le trinôme est positif à l'extérieur des racines et négatif entre les racines.</p><p>Donc : <span class='math inline'>\\(P(x) > 0\\)</span> sur <span class='math inline'>\\(]-\\infty; \\frac{1}{2}[ \\cup ]3; +\\infty[\\)</span> et <span class='math inline'>\\(P(x) < 0\\)</span> sur <span class='math inline'>\\(]\\frac{1}{2}; 3[\\)</span>.</p></div>"
        },
        {
          "question": "<div style='font-size: 1.05em; line-height: 1.8; padding: 12px;'><p> En déduire l'ensemble des solutions de l'inéquation <span class='math inline'>\\(P(x) \\le 0\\)</span>.</p></div>",
          "reponse": "<div style='font-size: 1.05em; line-height: 1.8; padding: 12px;'><p>D'après le signe de <span class='math inline'>\\(P(x)\\)</span>, <span class='math inline'>\\(P(x) \\le 0\\)</span> sur <span class='math inline'>\\([\\frac{1}{2}; 3]\\)</span>.</p><p>L'ensemble solution est <span class='math inline'>\\(S = \\left[\\frac{1}{2}; 3\\right]\\)</span>.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Fonctions numériques",
      "points": "6 pts",
      "enonce": "<div style='font-size: 1.1em; line-height: 1.6; background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><p>On considère la fonction <span class='math inline'>\\(f\\)</span> définie par <span class='math inline'>\\(f(x) = \\frac{2x - 1}{x + 2}\\)</span>.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 1.05em; line-height: 1.8; padding: 12px;'><p> Déterminer l'ensemble de définition de <span class='math inline'>\\(f\\)</span>.</p></div>",
          "reponse": "<div style='font-size: 1.05em; line-height: 1.8; padding: 12px;'><p>La fonction est définie si le dénominateur est non nul : <span class='math inline'>\\(x + 2 \\neq 0 \\iff x \\neq -2\\)</span>.</p><p>L'ensemble de définition est <span class='math inline'>\\(D_f = \\mathbb{R} \\setminus \\{-2\\}\\)</span>.</p></div>"
        },
        {
          "question": "<div style='font-size: 1.05em; line-height: 1.8; padding: 12px;'><p> Calculer les images de <span class='math inline'>\\(-1\\)</span>, <span class='math inline'>\\(0\\)</span> et <span class='math inline'>\\(3\\)</span> par <span class='math inline'>\\(f\\)</span>.</p></div>",
          "reponse": "<div style='font-size: 1.05em; line-height: 1.8; padding: 12px;'><p><span class='math inline'>\\(f(-1) = \\frac{2(-1) - 1}{-1 + 2} = \\frac{-3}{1} = -3\\)</span></p><p><span class='math inline'>\\(f(0) = \\frac{0 - 1}{0 + 2} = -\\frac{1}{2}\\)</span></p><p><span class='math inline'>\\(f(3) = \\frac{6 - 1}{3 + 2} = \\frac{5}{5} = 1\\)</span></p></div>"
        },
        {
          "question": "<div style='font-size: 1.05em; line-height: 1.8; padding: 12px;'><p> Déterminer le ou les antécédents de <span class='math inline'>\\(0\\)</span> par <span class='math inline'>\\(f\\)</span>.</p></div>",
          "reponse": "<div style='font-size: 1.05em; line-height: 1.8; padding: 12px;'><p>On résout <span class='math inline'>\\(f(x) = 0\\)</span> : <span class='math inline'>\\(\\frac{2x - 1}{x + 2} = 0 \\iff 2x - 1 = 0 \\iff x = \\frac{1}{2}\\)</span>.</p><p>L'antécédent de <span class='math inline'>\\(0\\)</span> est <span class='math inline'>\\(\\frac{1}{2}\\)</span>.</p></div>"
        },
        {
          "question": "<div style='font-size: 1.05em; line-height: 1.8; padding: 12px;'><p> Résoudre l'inéquation <span class='math inline'>\\(f(x) > 1\\)</span>.</p></div>",
          "reponse": "<div style='font-size: 1.05em; line-height: 1.8; padding: 12px;'><p><span class='math inline'>\\(\\frac{2x - 1}{x + 2} > 1 \\iff \\frac{2x - 1}{x + 2} - 1 > 0 \\iff \\frac{2x - 1 - x - 2}{x + 2} > 0 \\iff \\frac{x - 3}{x + 2} > 0\\)</span>.</p><p>Tableau de signes : <span class='math inline'>\\(x - 3 = 0 \\iff x = 3\\)</span> et <span class='math inline'>\\(x + 2 = 0 \\iff x = -2\\)</span>.</p><p>Donc <span class='math inline'>\\(\\frac{x - 3}{x + 2} > 0\\)</span> sur <span class='math inline'>\\(]-\\infty; -2[ \\cup ]3; +\\infty[\\)</span>.</p><p>L'ensemble solution est <span class='math inline'>\\(S = ]-\\infty; -2[ \\cup ]3; +\\infty[\\)</span>.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Trigonométrie",
      "points": "5 pts",
      "enonce": "<div style='font-size: 1.1em; line-height: 1.6; background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><p>On considère le cercle trigonométrique et un point <span class='math inline'>\\(M\\)</span> image du réel <span class='math inline'>\\(x\\)</span>.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 1.05em; line-height: 1.8; padding: 12px;'><p> Donner la mesure principale de l'angle <span class='math inline'>\\(\\frac{17\\pi}{3}\\)</span>.</p></div>",
          "reponse": "<div style='font-size: 1.05em; line-height: 1.8; padding: 12px;'><p><span class='math inline'>\\(\\frac{17\\pi}{3} = \\frac{18\\pi}{3} - \\frac{\\pi}{3} = 6\\pi - \\frac{\\pi}{3} = 3 \\times 2\\pi - \\frac{\\pi}{3}\\)</span>.</p><p>La mesure principale est <span class='math inline'>\\(-\\frac{\\pi}{3}\\)</span>.</p></div>"
        },
        {
          "question": "<div style='font-size: 1.05em; line-height: 1.8; padding: 12px;'><p> Résoudre dans <span class='math inline'>\\(\\mathbb{R}\\)</span> l'équation <span class='math inline'>\\(\\sin x = \\frac{\\sqrt{3}}{2}\\)</span>.</p></div>",
          "reponse": "<div style='font-size: 1.05em; line-height: 1.8; padding: 12px;'><p><span class='math inline'>\\(\\sin x = \\sin\\left(\\frac{\\pi}{3}\\right)\\)</span>.</p><p>Donc <span class='math inline'>\\(x = \\frac{\\pi}{3} + 2k\\pi\\)</span> ou <span class='math inline'>\\(x = \\pi - \\frac{\\pi}{3} + 2k\\pi = \\frac{2\\pi}{3} + 2k\\pi\\)</span>, avec <span class='math inline'>\\(k \\in \\mathbb{Z}\\)</span>.</p><p>L'ensemble solution est <span class='math inline'>\\(S = \\left\\{\\frac{\\pi}{3} + 2k\\pi; \\frac{2\\pi}{3} + 2k\\pi \\mid k \\in \\mathbb{Z}\\right\\}\\)</span>.</p></div>"
        },
        {
          "question": "<div style='font-size: 1.05em; line-height: 1.8; padding: 12px;'><p> Simplifier l'expression suivante : <span class='math inline'>\\(A = \\cos(\\pi - x) + \\sin\\left(\\frac{\\pi}{2} - x\\right)\\)</span>.</p></div>",
          "reponse": "<div style='font-size: 1.05em; line-height: 1.8; padding: 12px;'><p><span class='math inline'>\\(\\cos(\\pi - x) = -\\cos x\\)</span> et <span class='math inline'>\\(\\sin\\left(\\frac{\\pi}{2} - x\\right) = \\cos x\\)</span>.</p><p>Donc <span class='math inline'>\\(A = -\\cos x + \\cos x = 0\\)</span>.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Statistiques",
      "points": "5 pts",
      "enonce": "<div style='font-size: 1.1em; line-height: 1.6; background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #212529;'><p>Un relevé des notes d'une classe de Seconde C en Mathématiques est présenté dans le tableau suivant :</p><div class='math-block'><div class='math'>\\begin{array}{|c|c|c|c|c|c|}\\hline \\text{Notes} & [0; 4[ & [4; 8[ & [8; 12[ & [12; 16[ & [16; 20[ \\\\ \\hline \\text{Effectifs} & 3 & 7 & 10 & 6 & 4 \\\\ \\hline \\end{array}</div></div></div>",
      "questions": [
        {
          "question": "<div style='font-size: 1.05em; line-height: 1.8; padding: 12px;'><p> Déterminer l'effectif total de la classe.</p></div>",
          "reponse": "<div style='font-size: 1.05em; line-height: 1.8; padding: 12px;'><p>L'effectif total est <span class='math inline'>\\(N = 3 + 7 + 10 + 6 + 4 = 30\\)</span>.</p></div>"
        },
        {
          "question": "<div style='font-size: 1.05em; line-height: 1.8; padding: 12px;'><p> Calculer la moyenne approximative de cette série.</p></div>",
          "reponse": "<div style='font-size: 1.05em; line-height: 1.8; padding: 12px;'><p>Les centres des classes sont : <span class='math inline'>\\(2; 6; 10; 14; 18\\)</span>.</p><p><span class='math inline'>\\(\\bar{x} = \\frac{3 \\times 2 + 7 \\times 6 + 10 \\times 10 + 6 \\times 14 + 4 \\times 18}{30} = \\frac{6 + 42 + 100 + 84 + 72}{30} = \\frac{304}{30} \\approx 10.13\\)</span>.</p><p>La moyenne approximative est d'environ 10.13.</p></div>"
        },
        {
          "question": "<div style='font-size: 1.05em; line-height: 1.8; padding: 12px;'><p> Déterminer la classe modale.</p></div>",
          "reponse": "<div style='font-size: 1.05em; line-height: 1.8; padding: 12px;'><p>La classe modale est la classe ayant le plus grand effectif. Ici, c'est la classe <span class='math inline'>\\([8; 12[\\)</span> avec 10 élèves.</p></div>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
