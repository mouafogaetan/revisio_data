<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Maths 2nd C",
  "classe": "Seconde",
  "sequence": "Séquence 4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Fonctions : ensemble de définition et lecture graphique",
      "points": "4 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; font-size: 16px; line-height: 1.8; color: #1a1a1a;'>On considère la fonction \\( f \\) définie par \\( f(x) = \\dfrac{2x - 1}{x + 3} \\).</div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'>1) Déterminer l'ensemble de définition de \\( f \\).</div>",
          "reponse": "<div style='background-color: #f0f4f8; padding: 15px; border-radius: 8px; color: #1a1a1a;'><p style='margin-top: 0; font-weight: bold;'>Corrigé :</p><p>La fonction est définie pour tout \\( x \\) tel que le dénominateur \\( x + 3 \\) ne s'annule pas.</p><p>\\( x + 3 \\neq 0 \\Rightarrow x \\neq -3 \\).</p><p>Donc \\( D_f = \\mathbb{R} \\setminus \\{-3\\} = ]-\\infty; -3[ \\cup ]-3; +\\infty[ \\).</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'>2) Donner les images de 0 et de 2 par \\( f \\).</div>",
          "reponse": "<div style='background-color: #f0f4f8; padding: 15px; border-radius: 8px; color: #1a1a1a;'><p style='margin-top: 0; font-weight: bold;'>Corrigé :</p><p>\\( f(0) = \\dfrac{2 \\times 0 - 1}{0 + 3} = -\\dfrac{1}{3} \\).</p><p>\\( f(2) = \\dfrac{2 \\times 2 - 1}{2 + 3} = \\dfrac{3}{5} \\).</p></div>"
        }
      ]
    },
    {
      "titre": "Équations et inéquations",
      "points": "4 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; font-size: 16px; line-height: 1.8; color: #1a1a1a;'>Résoudre dans \\( \\mathbb{R} \\) les équations et inéquations suivantes :</div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'>1) \\( (2x - 3)(x + 5) = 0 \\)</div>",
          "reponse": "<div style='background-color: #f0f4f8; padding: 15px; border-radius: 8px; color: #1a1a1a;'><p style='margin-top: 0; font-weight: bold;'>Corrigé :</p><p>Un produit est nul si et seulement si l'un de ses facteurs est nul.</p><p>\\( 2x - 3 = 0 \\Rightarrow x = \\dfrac{3}{2} \\)</p><p>\\( x + 5 = 0 \\Rightarrow x = -5 \\)</p><p>L'ensemble solution est \\( S = \\left\\{-5 ; \\dfrac{3}{2}\\right\\} \\).</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'>2) \\( 2x - 5 < x + 3 \\)</div>",
          "reponse": "<div style='background-color: #f0f4f8; padding: 15px; border-radius: 8px; color: #1a1a1a;'><p style='margin-top: 0; font-weight: bold;'>Corrigé :</p><p>\\( 2x - 5 < x + 3 \\)</p><p>\\( 2x - x < 3 + 5 \\)</p><p>\\( x < 8 \\)</p><p>L'ensemble solution est \\( S = ]-\\infty; 8[ \\).</p></div>"
        }
      ]
    },
    {
      "titre": "Vecteurs et combinaisons linéaires",
      "points": "4 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; font-size: 16px; line-height: 1.8; color: #1a1a1a;'>Dans un repère orthonormé, on donne les points \\( A(2, 1) \\), \\( B(4, 3) \\), \\( C(0, 5) \\).</div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'>1) Calculer les coordonnées des vecteurs \\( \\overrightarrow{AB} \\) et \\( \\overrightarrow{AC} \\).</div>",
          "reponse": "<div style='background-color: #f0f4f8; padding: 15px; border-radius: 8px; color: #1a1a1a;'><p style='margin-top: 0; font-weight: bold;'>Corrigé :</p><p>\\( \\overrightarrow{AB} = (4-2, 3-1) = (2, 2) \\)</p><p>\\( \\overrightarrow{AC} = (0-2, 5-1) = (-2, 4) \\)</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'>2) Montrer que les points \\( A, B \\) et \\( C \\) ne sont pas alignés.</div>",
          "reponse": "<div style='background-color: #f0f4f8; padding: 15px; border-radius: 8px; color: #1a1a1a;'><p style='margin-top: 0; font-weight: bold;'>Corrigé :</p><p>Les points sont alignés si les vecteurs \\( \\overrightarrow{AB} \\) et \\( \\overrightarrow{AC} \\) sont colinéaires.</p><p>\\( \\overrightarrow{AB} = (2, 2) \\) et \\( \\overrightarrow{AC} = (-2, 4) \\).</p><p>Il n'existe pas de réel \\( k \\) tel que \\( \\overrightarrow{AB} = k\\overrightarrow{AC} \\) car les coordonnées ne sont pas proportionnelles (2/(-2) = -1 et 2/4 = 1/2).</p><p>Donc les points \\( A, B \\) et \\( C \\) ne sont pas alignés.</p></div>"
        }
      ]
    },
    {
      "titre": "Équations du second degré",
      "points": "4 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; font-size: 16px; line-height: 1.8; color: #1a1a1a;'>On considère le trinôme \\( P(x) = x^2 - 5x + 6 \\).</div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'>1) Résoudre l'équation \\( P(x) = 0 \\).</div>",
          "reponse": "<div style='background-color: #f0f4f8; padding: 15px; border-radius: 8px; color: #1a1a1a;'><p style='margin-top: 0; font-weight: bold;'>Corrigé :</p><p>On calcule le discriminant : \\( \\Delta = (-5)^2 - 4 \\times 1 \\times 6 = 25 - 24 = 1 \\).</p><p>\\( \\Delta > 0 \\), donc l'équation admet deux racines réelles distinctes :</p><p>\\( x_1 = \\dfrac{5 - 1}{2} = 2 \\)</p><p>\\( x_2 = \\dfrac{5 + 1}{2} = 3 \\)</p><p>L'ensemble solution est \\( S = \\{2 ; 3\\} \\).</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'>2) Résoudre l'inéquation \\( P(x) \\geq 0 \\).</div>",
          "reponse": "<div style='background-color: #f0f4f8; padding: 15px; border-radius: 8px; color: #1a1a1a;'><p style='margin-top: 0; font-weight: bold;'>Corrigé :</p><p>Le trinôme est du signe de \\( a = 1 > 0 \\) à l'extérieur des racines.</p><p>Donc \\( P(x) \\geq 0 \\) sur \\( ]-\\infty; 2] \\cup [3; +\\infty[ \\).</p></div>"
        }
      ]
    },
    {
      "titre": "Angles et trigonométrie",
      "points": "4 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; font-size: 16px; line-height: 1.8; color: #1a1a1a;'>Soit \\( x \\) un angle orienté tel que \\( \\cos x = -\\dfrac{1}{2} \\) et \\( \\sin x = \\dfrac{\\sqrt{3}}{2} \\).</div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px;'>1) Déterminer \\( x \\) dans l'intervalle \\( [0, 2\\pi[ \\).</div>",
          "reponse": "<div style='background-color: #f0f4f8; padding: 15px; border-radius: 8px; color: #1a1a1a;'><p style='margin-top: 0; font-weight: bold;'>Corrigé :</p><p>On a \\( \\cos x = -\\dfrac{1}{2} \\) et \\( \\sin x = \\dfrac{\\sqrt{3}}{2} \\).</p><p>Cela correspond à l'angle \\( x = \\dfrac{2\\pi}{3} \\) (120°).</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 15px;'>2) Donner la valeur de \\( \\tan x \\).</div>",
          "reponse": "<div style='background-color: #f0f4f8; padding: 15px; border-radius: 8px; color: #1a1a1a;'><p style='margin-top: 0; font-weight: bold;'>Corrigé :</p><p>\\( \\tan x = \\dfrac{\\sin x}{\\cos x} = \\dfrac{\\dfrac{\\sqrt{3}}{2}}{-\\dfrac{1}{2}} = -\\sqrt{3} \\).</p></div>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
