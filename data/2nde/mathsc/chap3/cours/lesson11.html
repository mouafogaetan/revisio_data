<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }

    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }

    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }

    .content-card li:last-child {
        border-bottom: none;
    }

    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }

    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }

    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }

    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }

    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }

    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }

    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }

    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }

    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }

    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }

    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }

    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }

    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }

    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }

    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }

    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }

    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }

    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }

    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }

    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }

    /* Mode jour (par défaut) - ajouté par le script de thème */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>

<div class="app-container">

    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>

    <main class="slide-body" id="slideBody"></main>

    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>

    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>

        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        
            <button class="btn btn-secondary" id="themeToggle" style="font-size:1.2rem; min-width:40px; padding:8px 12px;" title="Passer en mode nuit">
                🌓
            </button>
        </div>

        <div class="auto-indicator" id="autoIndicator">⏸ Lecture manuelle</div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Objectifs du cours",
    "contenu": "<div style='padding: 10px;'><ul style='list-style-type: disc; padding-left: 20px; font-size: 1.1em; line-height: 1.8;'><li>Déterminer l'ensemble de définition (valeurs interdites).</li><li>Résoudre une équation rationnelle de type \\(\\frac{ax+b}{cx+d} = e\\).</li><li>Résoudre une inéquation rationnelle avec tableau de signes.</li><li>Maîtriser la réduction au même dénominateur.</li></ul></div>",
    "texteParle": "Bonjour à tous. Dans cette leçon, nous allons étudier les équations et inéquations rationnelles. Nous apprendrons à déterminer les valeurs interdites, à résoudre des équations de type fraction, et à utiliser le tableau de signes pour résoudre des inéquations rationnelles.",
    "note": "Introduction : Présentation des objectifs de la leçon sur les équations et inéquations rationnelles."
  },
  {
    "titre": "Valeurs interdites",
    "contenu": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; border-left: 5px solid #007bff;'><p style='margin: 0;'>Une <span style='font-weight: bold;'>valeur interdite</span> est une valeur de l'inconnue qui annule le dénominateur d'une fraction.</p><div style='background-color: #e3f2fd; padding: 12px; border-radius: 6px; margin-top: 10px;'><p style='font-weight: bold; margin-top: 0;'>Règle essentielle :</p><p style='font-size: 1.1em; text-align: center;'>On ne peut pas diviser par zéro !</p></div><div style='background-color: #fff3cd; padding: 12px; border-radius: 6px; margin-top: 10px;'><p style='font-weight: bold; margin-top: 0;'>Exemple :</p><p>Pour \\(\\dfrac{2x+1}{x-3}\\), la valeur interdite est \\(x = 3\\) car \\(3 - 3 = 0\\).</p><p style='font-weight: bold;'>Ensemble de définition : \\(\\mathbb{R} \\setminus \\{3\\}\\)</p></div></div>",
    "texteParle": "Avant de résoudre une équation ou une inéquation rationnelle, il faut déterminer les valeurs interdites, c'est-à-dire les valeurs qui annulent le dénominateur. En effet, la division par zéro n'est pas définie en mathématiques. Par exemple, pour la fraction 2x plus 1 sur x moins 3, la valeur interdite est 3, car 3 moins 3 donne 0. L'ensemble de définition est donc tous les nombres réels sauf 3.",
    "note": "Définition et importance des valeurs interdites dans les expressions rationnelles."
  },
  {
    "titre": "Équation rationnelle",
    "contenu": "<div style='background-color: #fff3cd; padding: 15px; border-radius: 8px; border-left: 5px solid #ffc107;'><p style='font-weight: bold; margin-top: 0;'>Définition :</p><p>Une <span style='font-weight: bold;'>équation rationnelle</span> est une équation qui contient des fractions dont le dénominateur contient l'inconnue.</p><p style='margin-top: 10px;'>Elle se présente souvent sous la forme :</p><div style='text-align: center; font-weight: bold; font-size: 1.1em; margin: 10px 0;'>\\(\\dfrac{ax+b}{cx+d} = e\\)</div><p>où \\(a, b, c, d, e\\) sont des nombres réels.</p></div>",
    "texteParle": "Une équation rationnelle est une équation qui contient une ou plusieurs fractions où l'inconnue apparaît au dénominateur. Elle peut souvent s'écrire sous la forme ax plus b sur cx plus d égal e. Notre objectif est de trouver les valeurs de x qui vérifient cette égalité.",
    "note": "Définition d'une équation rationnelle avec sa forme générale."
  },
  {
    "titre": "Méthode de résolution",
    "contenu": "<div style='background-color: #e8f5e9; padding: 15px; border-radius: 8px; border-left: 5px solid #4caf50;'><p style='font-weight: bold; margin-top: 0;'>Étapes pour résoudre \\(\\dfrac{ax+b}{cx+d} = e\\) :</p><ul style='list-style-type: none; padding-left: 0; margin-top: 10px;'><li style='margin-bottom: 8px;'>1️⃣ Déterminer la valeur interdite : \\(x  eq -\\dfrac{d}{c}\\).</li><li style='margin-bottom: 8px;'>2️⃣ Multiplier les deux membres par \\(cx+d\\) : \\(ax+b = e(cx+d)\\).</li><li style='margin-bottom: 8px;'>3️⃣ Résoudre l'équation du premier degré obtenue.</li><li style='margin-bottom: 8px;'>4️⃣ Vérifier que la solution trouvée n'est pas une valeur interdite.</li></ul><div style='background-color: #c8e6c9; padding: 12px; border-radius: 6px; margin-top: 10px;'><p style='font-weight: bold; margin-top: 0;'>Exemple :</p><p>Résoudre \\(\\dfrac{2x+1}{x-3} = 5\\)</p><p>1️⃣ \\(x  eq 3\\)</p><p>2️⃣ \\(2x+1 = 5(x-3)\\)</p><p>3️⃣ \\(2x+1 = 5x-15\\) donc \\(-3x = -16\\) soit \\(x = \\dfrac{16}{3}\\)</p><p>4️⃣ \\(\\dfrac{16}{3}  eq 3\\), donc solution : \\(x = \\dfrac{16}{3}\\)</p></div></div>",
    "texteParle": "Pour résoudre une équation rationnelle, on suit quatre étapes. D'abord, on détermine la valeur interdite en annulant le dénominateur. Ensuite, on multiplie les deux membres par ce dénominateur pour éliminer la fraction. On résout alors l'équation du premier degré obtenue. Enfin, on vérifie que la solution trouvée n'est pas la valeur interdite. Par exemple, pour 2x plus 1 sur x moins 3 égal 5, la valeur interdite est 3. En multipliant par x moins 3, on obtient 2x plus 1 égal 5x moins 15, ce qui donne x égal 16 sur 3, qui est bien différent de 3.",
    "note": "Méthode en quatre étapes pour résoudre une équation rationnelle."
  },
  {
    "titre": "Inéquation rationnelle",
    "contenu": "<div style='background-color: #f3e5f5; padding: 15px; border-radius: 8px; border-left: 5px solid #9c27b0;'><p style='font-weight: bold; margin-top: 0;'>Définition :</p><p>Une <span style='font-weight: bold;'>inéquation rationnelle</span> est une inéquation qui contient des fractions avec l'inconnue au dénominateur.</p><p style='margin-top: 10px;'>Elle se présente sous la forme :</p><div style='text-align: center; font-weight: bold; font-size: 1.1em; margin: 10px 0;'>\\(\\dfrac{ax+b}{cx+d} > 0\\) (ou \\(<, \\geq, \\leq\\)).</div><p style='font-weight: bold; color: #d32f2f;'>⚠️ On ne peut pas multiplier par le dénominateur directement car son signe est inconnu.</p></div>",
    "texteParle": "Une inéquation rationnelle est une inégalité qui contient des fractions avec l'inconnue au dénominateur. Elle peut s'écrire avec les symboles supérieur, inférieur, supérieur ou égal, ou inférieur ou égal. Attention, on ne peut pas multiplier directement par le dénominateur car son signe dépend de la valeur de x, et multiplier par un nombre négatif change le sens de l'inégalité.",
    "note": "Définition d'une inéquation rationnelle et mise en garde sur la multiplication."
  },
  {
    "titre": "Méthode du tableau de signes",
    "contenu": "<div style='padding: 10px;'><p style='font-weight: bold;'>Étapes pour résoudre une inéquation rationnelle :</p><ul style='list-style-type: none; padding-left: 0; margin-top: 10px;'><li style='margin-bottom: 8px;'>1️⃣ Mettre tous les termes du même côté : \\(\\dfrac{ax+b}{cx+d} - e > 0\\).</li><li style='margin-bottom: 8px;'>2️⃣ Réduire au même dénominateur pour obtenir une seule fraction \\(\\dfrac{P(x)}{Q(x)} > 0\\).</li><li style='margin-bottom: 8px;'>3️⃣ Déterminer les valeurs qui annulent \\(P(x)\\) et \\(Q(x)\\).</li><li style='margin-bottom: 8px;'>4️⃣ Construire un tableau de signes avec ces valeurs.</li><li style='margin-bottom: 8px;'>5️⃣ Lire l'ensemble des solutions selon le signe recherché.</li></ul><div style='background-color: #f8f9fa; padding: 12px; border-radius: 6px; border: 1px solid #dee2e6; margin-top: 10px;'><p style='font-weight: bold; margin-top: 0;'>Rappel :</p><p style='margin: 0;'>Le signe d'un quotient \\(\\dfrac{P(x)}{Q(x)}\\) est le signe du produit \\(P(x) \\times Q(x)\\).</p></div></div>",
    "texteParle": "Pour résoudre une inéquation rationnelle, on utilise la méthode du tableau de signes. D'abord, on regroupe tous les termes d'un seul côté pour obtenir une inégalité avec zéro. Ensuite, on réduit au même dénominateur pour n'avoir qu'une seule fraction. On détermine les valeurs qui annulent le numérateur et le dénominateur, puis on construit un tableau de signes. Le signe du quotient est le même que le signe du produit du numérateur et du dénominateur.",
    "note": "Présentation de la méthode du tableau de signes pour les inéquations rationnelles."
  },
  {
    "titre": "Exemple d'inéquation (1)",
    "contenu": "<div style='background-color: #e8f5e9; padding: 15px; border-radius: 8px; border-left: 5px solid #4caf50;'><p style='font-weight: bold; margin-top: 0;'>Exemple :</p><p>Résoudre \\(\\dfrac{x-1}{x+2} \\geq 0\\)</p><div style='background-color: #c8e6c9; padding: 12px; border-radius: 6px; margin-top: 10px;'><p style='font-weight: bold; margin-top: 0;'>Solution :</p><p>1️⃣ Valeurs qui annulent : \\(x-1 = 0 \\Rightarrow x = 1\\) ; \\(x+2 = 0 \\Rightarrow x = -2\\)</p><p>2️⃣ Tableau de signes :</p><div style='background-color: #fff; padding: 10px; border-radius: 4px; margin: 10px 0; overflow-x: auto;'><table style='width: 100%; border-collapse: collapse; text-align: center;'><tr><th style='border: 1px solid #ddd; padding: 6px;'>\\(x\\)</th><th style='border: 1px solid #ddd; padding: 6px;'>\\(-\\infty\\)</th><th style='border: 1px solid #ddd; padding: 6px;'>\\(-2\\)</th><th style='border: 1px solid #ddd; padding: 6px;'>\\(1\\)</th><th style='border: 1px solid #ddd; padding: 6px;'>\\(+\\infty\\)</th></tr><tr><td style='border: 1px solid #ddd; padding: 6px;'>\\(x-1\\)</td><td style='border: 1px solid #ddd; padding: 6px;'>-</td><td style='border: 1px solid #ddd; padding: 6px;'>-</td><td style='border: 1px solid #ddd; padding: 6px;'>0</td><td style='border: 1px solid #ddd; padding: 6px;'>+</td></tr><tr><td style='border: 1px solid #ddd; padding: 6px;'>\\(x+2\\)</td><td style='border: 1px solid #ddd; padding: 6px;'>-</td><td style='border: 1px solid #ddd; padding: 6px;'>0</td><td style='border: 1px solid #ddd; padding: 6px;'>+</td><td style='border: 1px solid #ddd; padding: 6px;'>+</td></tr><tr><td style='border: 1px solid #ddd; padding: 6px; font-weight: bold;'>\\(\\dfrac{x-1}{x+2}\\)</td><td style='border: 1px solid #ddd; padding: 6px; font-weight: bold;'>+</td><td style='border: 1px solid #ddd; padding: 6px;'>||</td><td style='border: 1px solid #ddd; padding: 6px; font-weight: bold;'>-</td><td style='border: 1px solid #ddd; padding: 6px; font-weight: bold;'>+</td></tr></table></div><p>3️⃣ On cherche \\(\\geq 0\\), donc on prend les intervalles où le quotient est positif ou nul.</p><p style='font-weight: bold;'>Solution : \\(x \\in ]-\\infty; -2[ \\cup [1; +\\infty[\\)</p><p style='font-size: 0.9em;'>Remarque : \\(-2\\) est exclu car valeur interdite.</p></div></div>",
    "texteParle": "Prenons un exemple concret. Résolvons l'inéquation x moins 1 sur x plus 2 supérieur ou égal à 0. On trouve d'abord les valeurs qui annulent le numérateur, x égal 1, et le dénominateur, x égal moins 2. On construit ensuite un tableau de signes. Le quotient est positif à l'extérieur des racines et négatif entre elles. Comme on cherche supérieur ou égal à zéro, on prend les intervalles où le quotient est positif. La solution est donc tous les nombres réels sauf ceux entre -2 et 1, en excluant -2 qui est une valeur interdite.",
    "note": "Exemple détaillé de résolution d'une inéquation rationnelle avec tableau de signes."
  },
  {
    "titre": "Exemple d'inéquation (2)",
    "contenu": "<div style='background-color: #fff3e0; padding: 15px; border-radius: 8px; border-left: 5px solid #ff9800;'><p style='font-weight: bold; margin-top: 0;'>Exemple :</p><p>Résoudre \\(\\dfrac{2x+1}{x-3} < 1\\)</p><div style='background-color: #ffe0b2; padding: 12px; border-radius: 6px; margin-top: 10px;'><p style='font-weight: bold; margin-top: 0;'>Solution :</p><p>1️⃣ On met tout du même côté : \\(\\dfrac{2x+1}{x-3} - 1 < 0\\)</p><p>2️⃣ On réduit au même dénominateur : \\(\\dfrac{2x+1 - (x-3)}{x-3} < 0\\)</p><p>\\(\\dfrac{2x+1 - x + 3}{x-3} < 0\\) donc \\(\\dfrac{x+4}{x-3} < 0\\)</p><p>3️⃣ Valeurs : \\(x+4 = 0 \\Rightarrow x = -4\\) ; \\(x-3 = 0 \\Rightarrow x = 3\\)</p><p>4️⃣ Tableau de signes :</p><div style='background-color: #fff; padding: 10px; border-radius: 4px; margin: 10px 0; overflow-x: auto;'><table style='width: 100%; border-collapse: collapse; text-align: center;'><tr><th style='border: 1px solid #ddd; padding: 6px;'>\\(x\\)</th><th style='border: 1px solid #ddd; padding: 6px;'>\\(-\\infty\\)</th><th style='border: 1px solid #ddd; padding: 6px;'>\\(-4\\)</th><th style='border: 1px solid #ddd; padding: 6px;'>\\(3\\)</th><th style='border: 1px solid #ddd; padding: 6px;'>\\(+\\infty\\)</th></tr><tr><td style='border: 1px solid #ddd; padding: 6px;'>\\(x+4\\)</td><td style='border: 1px solid #ddd; padding: 6px;'>-</td><td style='border: 1px solid #ddd; padding: 6px;'>0</td><td style='border: 1px solid #ddd; padding: 6px;'>+</td><td style='border: 1px solid #ddd; padding: 6px;'>+</td></tr><tr><td style='border: 1px solid #ddd; padding: 6px;'>\\(x-3\\)</td><td style='border: 1px solid #ddd; padding: 6px;'>-</td><td style='border: 1px solid #ddd; padding: 6px;'>-</td><td style='border: 1px solid #ddd; padding: 6px;'>0</td><td style='border: 1px solid #ddd; padding: 6px;'>+</td></tr><tr><td style='border: 1px solid #ddd; padding: 6px; font-weight: bold;'>\\(\\dfrac{x+4}{x-3}\\)</td><td style='border: 1px solid #ddd; padding: 6px; font-weight: bold;'>+</td><td style='border: 1px solid #ddd; padding: 6px; font-weight: bold;'>0</td><td style='border: 1px solid #ddd; padding: 6px;'>||</td><td style='border: 1px solid #ddd; padding: 6px; font-weight: bold;'>+</td></tr></table></div><p>5️⃣ On cherche \\(< 0\\), donc quotient négatif : \\(x \\in ]-4; 3[\\)</p><p style='font-weight: bold;'>Solution : \\(x \\in ]-4; 3[\\)</p></div></div>",
    "texteParle": "Prenons un deuxième exemple avec une inéquation plus complexe. Résolvons 2x plus 1 sur x moins 3 inférieur à 1. On commence par tout mettre du même côté, en soustrayant 1. On réduit ensuite au même dénominateur pour obtenir une seule fraction. Après simplification, on obtient x plus 4 sur x moins 3 inférieur à 0. On détermine les valeurs qui annulent le numérateur et le dénominateur. Le tableau de signes nous montre que le quotient est négatif entre -4 et 3. La solution est donc l'intervalle ouvert de -4 à 3.",
    "note": "Deuxième exemple avec réduction au même dénominateur pour résoudre une inéquation."
  },
  {
    "titre": "Cas particuliers",
    "contenu": "<div style='padding: 10px;'><div style='background-color: #fce4ec; padding: 15px; border-radius: 8px; border-left: 5px solid #d32f2f; margin-bottom: 15px;'><p style='font-weight: bold; margin-top: 0;'>⚠️ Attention :</p><ul style='padding-left: 20px;'><li>Les valeurs interdites sont <span style='font-weight: bold;'>toujours exclues</span> des solutions.</li><li>Si le numérateur s'annule, la valeur est incluse si l'inégalité est large (\\(\\geq\\) ou \\(\\leq\\)).</li><li>Si le dénominateur s'annule, la valeur est <span style='font-weight: bold;'>toujours exclue</span>.</li></ul></div><div style='background-color: #e8f5e9; padding: 12px; border-radius: 6px;'><p style='font-weight: bold; margin-top: 0;'>Astuce :</p><p>Pour vérifier le signe d'un quotient, on peut tester une valeur dans chaque intervalle du tableau.</p></div></div>",
    "texteParle": "Il y a quelques règles à retenir. Les valeurs interdites sont toujours exclues des solutions, car on ne peut pas diviser par zéro. Si le numérateur s'annule, la valeur est incluse dans la solution si l'inégalité est large, comme supérieur ou égal. Pour vérifier le signe d'un quotient, on peut toujours tester une valeur dans chaque intervalle du tableau de signes pour s'assurer du résultat.",
    "note": "Règles pour l'inclusion ou l'exclusion des valeurs dans les solutions."
  },
  {
    "titre": "Exercice d'auto-évaluation",
    "contenu": "<div style='padding: 10px;'><div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #dee2e6;'><p style='font-weight: bold; margin-top: 0;'>Question 1 :</p><p>Résoudre \\(\\dfrac{x+2}{x-1} = 3\\).</p><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;'><div style='background-color: #e3f2fd; padding: 8px; border-radius: 4px; text-align: center;'><p style='font-weight: bold;'>A) \\(x = \\dfrac{5}{2}\\)</p></div><div style='background-color: #e3f2fd; padding: 8px; border-radius: 4px; text-align: center;'><p style='font-weight: bold;'>B) \\(x = -\\dfrac{5}{2}\\)</p></div></div><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px;'><div style='background-color: #f3e5f5; padding: 8px; border-radius: 4px; text-align: center;'><p style='font-weight: bold;'>C) \\(x = 1\\)</p></div><div style='background-color: #f3e5f5; padding: 8px; border-radius: 4px; text-align: center;'><p style='font-weight: bold;'>D) \\(x = -1\\)</p></div></div><p style='margin-top: 15px;'><span style='font-weight: bold;'>Réponse :</span> A) \\(x = \\dfrac{5}{2}\\) (car \\(x+2 = 3(x-1)\\) soit \\(x+2 = 3x-3\\), donc \\(-2x = -5\\), \\(x = \\dfrac{5}{2}\\)).</p></div><div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #dee2e6; margin-top: 15px;'><p style='font-weight: bold; margin-top: 0;'>Question 2 :</p><p>Résoudre \\(\\dfrac{x-3}{x+1} \\leq 0\\).</p><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;'><div style='background-color: #e3f2fd; padding: 8px; border-radius: 4px; text-align: center;'><p style='font-weight: bold;'>A) \\([-1; 3]\\)</p></div><div style='background-color: #e3f2fd; padding: 8px; border-radius: 4px; text-align: center;'><p style='font-weight: bold;'>B) \\(]-1; 3]\\)</p></div></div><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px;'><div style='background-color: #f3e5f5; padding: 8px; border-radius: 4px; text-align: center;'><p style='font-weight: bold;'>C) \\([-1; 3[\\)</p></div><div style='background-color: #f3e5f5; padding: 8px; border-radius: 4px; text-align: center;'><p style='font-weight: bold;'>D) \\(]-1; 3[\\)</p></div></div><p style='margin-top: 15px;'><span style='font-weight: bold;'>Réponse :</span> B) \\(]-1; 3]\\) (car le numérateur s'annule en 3 (inclus) et le dénominateur en -1 (exclu), le quotient est négatif entre -1 et 3).</p></div></div>",
    "texteParle": "Pour terminer, je vous propose deux exercices d'auto-évaluation. Le premier est une équation rationnelle. N'oubliez pas de vérifier que votre solution n'est pas une valeur interdite. Le second est une inéquation rationnelle. Utilisez la méthode du tableau de signes en faisant attention aux valeurs incluses ou exclues. Prenez le temps de réfléchir, puis vérifiez vos réponses.",
    "note": "Exercices d'application pour vérifier la compréhension des concepts."
  }
];

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;

    const total = slides.length;
    const synth = window.speechSynthesis;

    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }

    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }

    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        
        loadingCancelled = false;
        isLoading = true;
        
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }

    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }

    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }

    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }

    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }

    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }

    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);

        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }

    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }

            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }

            // Arrêter toute lecture en cours
            stopSpeaking();
            
            // Réinitialiser l'état de pause
            isPaused = false;
            
            showLoading();
            setStatus("Initialisation...", 'loading');

            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;

                let isFinished = false;
                let errorHandled = false;

                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };

                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };

                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    
                    resolve();
                };

                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }

                currentUtterance = utterance;
                
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }

            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }

    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        // Arrêter complètement la lecture
        stopSpeaking();
        
        await new Promise(r => setTimeout(r, 50));
        
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }

        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');

        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }

    async function goToNext() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }

    async function goToPrev() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }

    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }

        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }

        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }

        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }

        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }

    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }

        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }

        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');

        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });

        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });

        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });

        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });

        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });

        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });

        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });

        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }

    init();
});


    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;

    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');

        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            if (header) header.style.background = 'rgba(15, 23, 42, 0.85)';
            if (footer) footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            if (header) header.style.background = 'rgba(255, 255, 255, 0.85)';
            if (footer) footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }

    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
            // Ajouter l'écouteur d'événement click
            themeBtn.addEventListener('click', toggleTheme);
        }
    });

</script>
