<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }

    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }

    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }

    .content-card li:last-child {
        border-bottom: none;
    }

    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }

    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }

    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }

    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }

    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }

    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }

    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }

    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }

    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }

    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }

    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }

    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }

    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }

    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }

    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }

    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }

    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }

    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }

    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }

    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }

    /* Mode jour (par défaut) - ajouté par le script de thème */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>

<div class="app-container">

    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>

    <main class="slide-body" id="slideBody"></main>

    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>

    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>

        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        
            <button class="btn btn-secondary" id="themeToggle" style="font-size:1.2rem; min-width:40px; padding:8px 12px;" title="Passer en mode nuit">
                🌓
            </button>
        </div>

        <div class="auto-indicator" id="autoIndicator">⏸ Lecture manuelle</div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Introduction",
    "contenu": "<div style='font-size: 1.2em; text-align: center; padding: 20px;'><p>Bienvenue en classe de Seconde !</p><p>Aujourd'hui, nous allons découvrir une notion importante de la géométrie : <strong>les quadrilatères inscriptibles dans un cercle</strong>.</p><p>Cette leçon fait partie du chapitre sur les <strong>Angles inscrits et polygones réguliers</strong>.</p><p>Préparez-vous à apprendre comment un simple quadrilatère peut être lié à un cercle de manière élégante.</p></div>",
    "texteParle": "Bonjour à tous ! Bienvenue dans ce cours de mathématiques. Aujourd'hui, nous allons explorer une notion fascinante : les quadrilatères inscriptibles dans un cercle. C'est une notion clé en géométrie qui vous permettra de résoudre de nombreux problèmes. Alors, sortez vos cahiers et vos stylos, et commençons !",
    "note": "Introduction à la leçon sur les quadrilatères inscriptibles."
  },
  {
    "titre": "Objectifs de la leçon",
    "contenu": "<div style='font-size: 1.1em; padding: 15px; background-color: #f0f8ff; border-radius: 8px; border-left: 4px solid #2196F3;'><p style='margin: 5px 0; color: #000;'>À la fin de cette leçon, vous serez capable de :</p><ul style='list-style-type: none; padding: 0; color: #000;'><li style='margin: 10px 0;'><span style='background-color: #2196F3; color: white; border-radius: 50%; display: inline-block; width: 24px; height: 24px; text-align: center; line-height: 24px; margin-right: 10px;'>1</span>Définir un quadrilatère inscriptible</li><li style='margin: 10px 0;'><span style='background-color: #2196F3; color: white; border-radius: 50%; display: inline-block; width: 24px; height: 24px; text-align: center; line-height: 24px; margin-right: 10px;'>2</span>Utiliser la propriété des angles opposés pour un quadrilatère convexe</li><li style='margin: 10px 0;'><span style='background-color: #2196F3; color: white; border-radius: 50%; display: inline-block; width: 24px; height: 24px; text-align: center; line-height: 24px; margin-right: 10px;'>3</span>Utiliser la propriété des angles opposés pour un quadrilatère croisé</li><li style='margin: 10px 0;'><span style='background-color: #2196F3; color: white; border-radius: 50%; display: inline-block; width: 24px; height: 24px; text-align: center; line-height: 24px; margin-right: 10px;'>4</span>Reconnaître un quadrilatère inscriptible sur une figure</li></ul></div>",
    "texteParle": "Dans cette leçon, nous avons quatre objectifs principaux. Premièrement, définir ce qu'est un quadrilatère inscriptible. Deuxièmement, apprendre à utiliser une propriété très importante : celle des angles opposés pour un quadrilatère convexe. Troisièmement, nous verrons une variante de cette propriété pour un quadrilatère croisé. Et enfin, nous nous entraînerons à reconnaître un quadrilatère inscriptible sur une figure. Ces compétences vous seront très utiles pour la suite.",
    "note": "Les quatre objectifs de la leçon sont clairement énoncés."
  },
  {
    "titre": "Définition",
    "contenu": "<div style='padding: 15px;'><div style='background-color: #f5f5f5; border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 2px solid #4CAF50;'><p style='margin: 0; color: #000; font-weight: bold; text-align: center;'>Définition :</p><p style='margin: 10px 0 0 0; color: #000;'>Un <strong>quadrilatère inscriptible</strong> est un quadrilatère dont les <strong>quatre sommets</strong> appartiennent à un même <strong>cercle</strong>.</p><p style='margin: 10px 0 0 0; color: #000;'>On dit aussi que le quadrilatère est <strong>cyclique</strong>.</p></div><div style='background-color: #fff3cd; border-left: 4px solid #ffc107; padding: 10px; border-radius: 4px;'><p style='margin: 0; color: #000;'><span style='font-weight: bold;'>Remarque :</span> Le cercle est appelé le <strong>cercle circonscrit</strong> au quadrilatère.</p></div></div>",
    "texteParle": "Commençons par la base. Un quadrilatère inscriptible, c'est tout simplement un quadrilatère dont les quatre sommets se trouvent sur un même cercle. Ce cercle est alors appelé le cercle circonscrit au quadrilatère. On utilise aussi parfois le terme de quadrilatère cyclique. C'est une définition simple, mais qui a des conséquences très intéressantes, comme nous allons le voir.",
    "note": "Définition claire d'un quadrilatère inscriptible (ou cyclique)."
  },
  {
    "titre": "Quadrilatère convexe",
    "contenu": "<div style='padding: 15px;'><div style='display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;'><div style='background-color: #f5f5f5; border-radius: 8px; padding: 15px; flex: 1 1 200px;'><p style='margin: 0; color: #000; text-align: center;'>Un quadrilatère est <strong>convexe</strong> si tous ses angles intérieurs sont inférieurs à 180°.</p><div style='margin: 15px auto; max-width: 200px;'><img alt='Quadrilatère convexe avec les quatre sommets sur un cercle' src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Ccircle cx=%22100%22 cy=%22100%22 r=%2280%22 fill=%22%23e3f2fd%22 stroke=%22%231978d2%22 stroke-width=%222%22/%3E%3Cpolygon points=%2260,50 150,40 170,120 50,140%22 fill=%22%2390caf9%22 stroke=%22%231978d2%22 stroke-width=%222%22/%3E%3Ccircle cx=%2260%22 cy=%2250%22 r=%224%22 fill=%22%23d32f2f%22/%3E%3Ccircle cx=%22150%22 cy=%2240%22 r=%224%22 fill=%22%23d32f2f%22/%3E%3Ccircle cx=%22170%22 cy=%22120%22 r=%224%22 fill=%22%23d32f2f%22/%3E%3Ccircle cx=%2250%22 cy=%22140%22 r=%224%22 fill=%22%23d32f2f%22/%3E%3Ctext x=%2260%22 y=%2230%22 font-size=%2212%22 fill=%22%23000%22%3EA%3C/text%3E%3Ctext x=%22150%22 y=%2230%22 font-size=%2212%22 fill=%22%23000%22%3EB%3C/text%3E%3Ctext x=%22175%22 y=%22120%22 font-size=%2212%22 fill=%22%23000%22%3EC%3C/text%3E%3Ctext x=%2230%22 y=%22150%22 font-size=%2212%22 fill=%22%23000%22%3ED%3C/text%3E%3C/svg%3E' style='width: 100%%; height: auto; display: block;' /></div></div><div style='background-color: #f5f5f5; border-radius: 8px; padding: 15px; flex: 1 1 200px;'><p style='margin: 0; color: #000; font-weight: bold; text-align: center;'>Théorème :</p><p style='margin: 10px 0; color: #000;'>Un quadrilatère <strong>convexe</strong> est inscriptible <strong>si et seulement si</strong> ses <strong>angles opposés sont supplémentaires</strong>.</p><div style='background-color: #e8f5e9; border-radius: 4px; padding: 10px; margin-top: 10px;'><p style='margin: 0; color: #000;'><span style='font-weight: bold;'>Exemple :</span> Si \\( \\widehat{A} + \\widehat{C} = 180^\\circ \\) et \\( \\widehat{B} + \\widehat{D} = 180^\\circ \\), alors ABCD est inscriptible.</p></div></div></div></div>",
    "texteParle": "Il existe deux types de quadrilatères : les convexes et les croisés. Concentrons-nous d'abord sur les quadrilatères convexes. Un quadrilatère convexe est inscriptible si et seulement si ses angles opposés sont supplémentaires, c'est-à-dire que leur somme fait 180 degrés. C'est un théorème très puissant ! Par exemple, si dans un quadrilatère ABCD, l'angle A plus l'angle C vaut 180 degrés et l'angle B plus l'angle D vaut aussi 180 degrés, alors on est certain que ce quadrilatère est inscriptible dans un cercle.",
    "note": "Propriété des angles opposés supplémentaires pour un quadrilatère convexe inscriptible."
  },
  {
    "titre": "Quadrilatère croisé",
    "contenu": "<div style='padding: 15px;'><div style='display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;'><div style='background-color: #f5f5f5; border-radius: 8px; padding: 15px; flex: 1 1 200px;'><p style='margin: 0; color: #000; text-align: center;'>Un quadrilatère est <strong>croisé</strong> si deux de ses côtés opposés se coupent à l'intérieur du quadrilatère.</p><div style='margin: 15px auto; max-width: 200px;'><img alt='Quadrilatère croisé (en forme de papillon) avec les quatre sommets sur un cercle' src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Ccircle cx=%22100%22 cy=%22100%22 r=%2280%22 fill=%22%23e3f2fd%22 stroke=%22%231978d2%22 stroke-width=%222%22/%3E%3Cpolygon points=%2260,50 170,120 150,40 50,140%22 fill=%22%2390caf9%22 stroke=%22%231978d2%22 stroke-width=%222%22/%3E%3Ccircle cx=%2260%22 cy=%2250%22 r=%224%22 fill=%22%23d32f2f%22/%3E%3Ccircle cx=%22170%22 cy=%22120%22 r=%224%22 fill=%22%23d32f2f%22/%3E%3Ccircle cx=%22150%22 cy=%2240%22 r=%224%22 fill=%22%23d32f2f%22/%3E%3Ccircle cx=%2250%22 cy=%22140%22 r=%224%22 fill=%22%23d32f2f%22/%3E%3Ctext x=%2260%22 y=%2230%22 font-size=%2212%22 fill=%22%23000%22%3EA%3C/text%3E%3Ctext x=%22175%22 y=%22120%22 font-size=%2212%22 fill=%22%23000%22%3EC%3C/text%3E%3Ctext x=%22150%22 y=%2230%22 font-size=%2212%22 fill=%22%23000%22%3EB%3C/text%3E%3Ctext x=%2230%22 y=%22150%22 font-size=%2212%22 fill=%22%23000%22%3ED%3C/text%3E%3C/svg%3E' style='width: 100%%; height: auto; display: block;' /></div></div><div style='background-color: #f5f5f5; border-radius: 8px; padding: 15px; flex: 1 1 200px;'><p style='margin: 0; color: #000; font-weight: bold; text-align: center;'>Théorème :</p><p style='margin: 10px 0; color: #000;'>Un quadrilatère <strong>croisé</strong> est inscriptible <strong>si et seulement si</strong> deux de ses <strong>angles opposés sont égaux</strong>.</p><div style='background-color: #e8f5e9; border-radius: 4px; padding: 10px; margin-top: 10px;'><p style='margin: 0; color: #000;'><span style='font-weight: bold;'>Exemple :</span> Si \\( \\widehat{A} = \\widehat{C} \\) (ou \\( \\widehat{B} = \\widehat{D} \\)), alors le quadrilatère croisé ABCD est inscriptible.</p></div></div></div></div>",
    "texteParle": "Passons maintenant aux quadrilatères croisés, qui ont une forme de papillon. La propriété pour qu'ils soient inscriptibles est différente. Pour un quadrilatère croisé, il est inscriptible si et seulement si deux de ses angles opposés sont égaux. Par exemple, si l'angle A est égal à l'angle C, ou si l'angle B est égal à l'angle D, alors le quadrilatère croisé est inscriptible. C'est une subtilité importante à retenir !",
    "note": "Propriété des angles opposés égaux pour un quadrilatère croisé inscriptible."
  },
  {
    "titre": "Cas particuliers",
    "contenu": "<div style='padding: 15px;'><div style='background-color: #f5f5f5; border-radius: 8px; padding: 15px; margin-bottom: 15px;'><p style='margin: 0; color: #000; font-weight: bold; text-align: center;'>Cas particuliers de quadrilatères inscriptibles :</p><ul style='list-style-type: none; padding: 0; color: #000;'><li style='margin: 10px 0; background-color: #e3f2fd; padding: 10px; border-radius: 4px;'>Le <strong>carré</strong> (tous les sommets sur un cercle)</li><li style='margin: 10px 0; background-color: #e8f5e9; padding: 10px; border-radius: 4px;'>Le <strong>rectangle</strong> (les quatre sommets sur un cercle dont le centre est l'intersection des diagonales)</li><li style='margin: 10px 0; background-color: #fff3e0; padding: 10px; border-radius: 4px;'>Le <strong>trapèze isocèle</strong> (les quatre sommets sur un cercle)</li></ul></div><div style='background-color: #fff3cd; border-left: 4px solid #ffc107; padding: 10px; border-radius: 4px;'><p style='margin: 0; color: #000;'><span style='font-weight: bold;'>À retenir :</span> Tous les rectangles et tous les carrés sont inscriptibles.</p></div></div>",
    "texteParle": "Il est utile de connaître quelques cas particuliers. Par exemple, un carré est toujours inscriptible, tout comme un rectangle. Un trapèze isocèle est également inscriptible dans un cercle. En revanche, un parallélogramme qui n'est pas un rectangle n'est pas inscriptible. Ces cas particuliers vous aideront à reconnaître rapidement des figures inscriptibles.",
    "note": "Cas particuliers : carré, rectangle, trapèze isocèle."
  },
  {
    "titre": "Méthode de reconnaissance",
    "contenu": "<div style='padding: 15px;'><p style='color: #000; font-weight: bold; text-align: center;'>Comment reconnaître un quadrilatère inscriptible ?</p><div style='background-color: #f5f5f5; border-radius: 8px; padding: 15px; margin: 10px 0;'><p style='margin: 0; color: #000;'>1. <strong>Vérifier la somme des angles opposés</strong> (pour un quadrilatère convexe).</p><p style='margin: 10px 0 0 0; color: #000;'>2. <strong>Vérifier l'égalité de deux angles opposés</strong> (pour un quadrilatère croisé).</p><p style='margin: 10px 0 0 0; color: #000;'>3. <strong>Utiliser les propriétés des angles inscrits</strong> : si deux angles inscrits interceptent le même arc, alors ils sont égaux.</p><p style='margin: 10px 0 0 0; color: #000;'>4. <strong>Utiliser les propriétés des polygones réguliers</strong> (tous les polygones réguliers sont inscriptibles).</p></div><div style='background-color: #e8f5e9; border-radius: 4px; padding: 10px; border-left: 4px solid #4CAF50;'><p style='margin: 0; color: #000;'><span style='font-weight: bold;'>Conseil :</span> Sur une figure, cherchez des angles qui interceptent le même arc de cercle pour démontrer l'inscriptibilité.</p></div></div>",
    "texteParle": "Maintenant, comment faire pour reconnaître un quadrilatère inscriptible sur une figure ? Il y a plusieurs méthodes. Vous pouvez vérifier la somme des angles opposés pour un quadrilatère convexe, ou l'égalité de deux angles opposés pour un quadrilatère croisé. Vous pouvez aussi utiliser la propriété des angles inscrits : si deux angles inscrits interceptent le même arc, ils sont égaux. Enfin, n'oubliez pas que tous les polygones réguliers sont inscriptibles. En pratique, cherchez des indices sur la figure pour appliquer ces règles.",
    "note": "Méthodes pour reconnaître un quadrilatère inscriptible."
  },
  {
    "titre": "Exercice d'application",
    "contenu": "<div style='padding: 15px; background-color: #f5f5f5; border-radius: 8px;'><p style='color: #000; font-weight: bold; text-align: center;'>Exercice :</p><div style='background-color: white; border-radius: 8px; padding: 15px; margin: 10px 0;'><p style='color: #000;'>Soit ABCD un quadrilatère. On donne :</p><ul style='color: #000;'><li>\\( \\widehat{A} = 70^\\circ \\)</li><li>\\( \\widehat{B} = 110^\\circ \\)</li><li>\\( \\widehat{C} = 110^\\circ \\)</li><li>\\( \\widehat{D} = 70^\\circ \\)</li></ul><p style='color: #000;'>Ce quadrilatère est-il inscriptible ? Justifier.</p></div><div style='background-color: #e8f5e9; border-radius: 4px; padding: 10px; border-left: 4px solid #4CAF50;'><p style='margin: 0; color: #000;'><span style='font-weight: bold;'>Solution :</span> \\( \\widehat{A} + \\widehat{C} = 70^\\circ + 110^\\circ = 180^\\circ \\). \\( \\widehat{B} + \\widehat{D} = 110^\\circ + 70^\\circ = 180^\\circ \\). Les angles opposés sont supplémentaires, donc le quadrilatère est inscriptible.</p></div></div>",
    "texteParle": "Prenons un petit exercice pour appliquer ce que nous venons d'apprendre. On considère un quadrilatère ABCD dont les angles mesurent 70 degrés, 110 degrés, 110 degrés et 70 degrés. La question est : ce quadrilatère est-il inscriptible ? Pour répondre, on calcule la somme des angles opposés. A plus C donne 180 degrés, B plus D donne aussi 180 degrés. Les angles opposés sont supplémentaires, donc oui, ce quadrilatère est inscriptible. C'est un exemple classique d'application du théorème.",
    "note": "Exercice corrigé sur l'application de la propriété des angles opposés."

  {
    "titre": "Résumé des propriétés",
    "contenu": "<div style='padding: 15px;'><div style='display: flex; flex-wrap: wrap; gap: 15px; justify-content: center;'><div style='background-color: #f5f5f5; border-radius: 8px; padding: 15px; flex: 1 1 250px; border: 2px solid #4CAF50;'><p style='margin: 0; color: #000; font-weight: bold; text-align: center;'>Quadrilatère convexe</p><p style='margin: 10px 0; color: #000; text-align: center;'>Inscriptible \\( \\iff \\)</p><p style='margin: 0; color: #000; text-align: center;'>Angles opposés supplémentaires</p><p style='margin: 10px 0 0 0; color: #000; text-align: center;'>\\( \\widehat{A} + \\widehat{C} = \\widehat{B} + \\widehat{D} = 180^\\circ \\)</p></div><div style='background-color: #f5f5f5; border-radius: 8px; padding: 15px; flex: 1 1 250px; border: 2px solid #FF9800;'><p style='margin: 0; color: #000; font-weight: bold; text-align: center;'>Quadrilatère croisé</p><p style='margin: 10px 0; color: #000; text-align: center;'>Inscriptible \\( \\iff \\)</p><p style='margin: 0; color: #000; text-align: center;'>Angles opposés égaux</p><p style='margin: 10px 0 0 0; color: #000; text-align: center;'>\\( \\widehat{A} = \\widehat{C} \\) ou \\( \\widehat{B} = \\widehat{D} \\)</p></div></div></div>",
    "texteParle": "Pour conclure cette leçon, voici un résumé des propriétés importantes à retenir. Pour un quadrilatère convexe, l'inscriptibilité est équivalente à la somme des angles opposés égale à 180 degrés. Pour un quadrilatère croisé, c'est l'égalité de deux angles opposés qui caractérise l'inscriptibilité. Ces deux propriétés sont essentielles et vous serviront dans vos exercices. N'hésitez pas à les revoir régulièrement.",

  {
    "titre": "Exercices",

    "texteParle": "Pour terminer, je vous propose deux petits exercices pour vérifier votre compréhension. Le premier concerne un quadrilatère convexe avec des angles de 80 et 100 degrés. Le deuxième porte sur un quadrilatère croisé. Prenez le temps de réfléchir, et n'oubliez pas d'utiliser les propriétés que nous venons de voir. Les solutions sont données, mais essayez de les trouver par vous-même d'abord.",

    "texteParle": "Nous arrivons à la fin de ce cours sur les quadrilatères inscriptibles. J'espère que vous avez bien compris les concepts clés : la définition, les propriétés des angles opposés pour les quadrilatères convexes et croisés, et les méthodes de reconnaissance. N'oubliez pas de vous entraîner avec des exercices pour bien maîtriser cette notion. Je reste disponible pour répondre à vos questions. Bonne continuation et à bientôt !",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;

    const total = slides.length;
    const synth = window.speechSynthesis;

    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }

    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }

    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        
        loadingCancelled = false;
        isLoading = true;
        
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }

    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }

    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }

    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }

    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }

    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }

    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);

        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }

    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }

            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }

            // Arrêter toute lecture en cours
            stopSpeaking();
            
            // Réinitialiser l'état de pause
            isPaused = false;
            
            showLoading();
            setStatus("Initialisation...", 'loading');

            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;

                let isFinished = false;
                let errorHandled = false;

                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };

                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };

                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    
                    resolve();
                };

                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }

                currentUtterance = utterance;
                
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }

            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }

    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        // Arrêter complètement la lecture
        stopSpeaking();
        
        await new Promise(r => setTimeout(r, 50));
        
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }

        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');

        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }

    async function goToNext() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }

    async function goToPrev() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }

    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }

        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }

        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }

        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }

        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }

    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }

        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }

        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');

        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });

        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });

        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });

        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });

        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });

        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });

        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });

        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }

    init();
});


    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;

    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');

        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            if (header) header.style.background = 'rgba(15, 23, 42, 0.85)';
            if (footer) footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            if (header) header.style.background = 'rgba(255, 255, 255, 0.85)';
            if (footer) footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }

    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
            // Ajouter l'écouteur d'événement click
            themeBtn.addEventListener('click', toggleTheme);
        }
    });

</script>
