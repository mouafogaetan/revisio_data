<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Bienvenue en cours de Mathématiques",
    "contenu": "<div style='text-align: center; padding: 20px;'><h2 style='color: #2c3e50;'>📐 Leçon 17 : Quelques généralités sur les fonctions</h2><p style='font-size: 1.2em; color: #34495e; margin-top: 20px;'>Classe : Seconde C</p><p style='font-size: 1.1em; color: #7f8c8d;'>Lycée de [Votre établissement]</p><div style='background: #3498db; color: white; padding: 15px; border-radius: 10px; margin-top: 30px;'><p style='margin: 0;'>🎯 Objectifs de la leçon :</p><ul style='text-align: left; list-style-type: none; padding: 0;'><li>✓ Définir une fonction numérique</li><li>✓ Déterminer l'ensemble de définition</li><li>✓ Calculer images et antécédents</li><li>✓ Reconnaître une fonction d'une application</li></ul></div></div>",
    "texteParle": "Bienvenue à tous en ce cours de mathématiques de la classe de Seconde C. Aujourd'hui, nous allons aborder la leçon numéro 17 intitulée Quelques généralités sur les fonctions. Cette leçon est très importante car elle jette les bases de tout ce que vous étudierez sur les fonctions cette année et les années à venir. Nous allons découvrir ce qu'est une fonction, comment elle fonctionne, et comment l'utiliser. Accrochez-vous bien, c'est parti !",
    "note": "Cette leçon est fondamentale pour la suite du programme en mathématiques."
  },
  {
    "titre": "Une fonction, c'est quoi ?",
    "contenu": "<div style='padding: 10px;'><div style='background: #ecf0f1; padding: 15px; border-radius: 10px; border-left: 5px solid #e74c3c;'><h3 style='color: #2c3e50; margin-top: 0;'>Définition :</h3><p style='font-size: 1.1em;'>Une <strong>fonction numérique</strong> est une relation qui associe à chaque nombre <strong><span style='color: #e74c3c;'>x</span></strong> d'un ensemble de départ au plus un nombre <strong><span style='color: #2980b9;'>y</span></strong> dans un ensemble d'arrivée.</p></div><div style='margin-top: 20px; text-align: center;'><div style='display: inline-block; background: #2c3e50; color: white; padding: 15px 30px; border-radius: 8px; font-size: 1.2em;'>x <span style='color: #f1c40f;'>→</span> fonction <span style='color: #f1c40f;'>→</span> f(x)</div></div><div style='background: #d5f5e3; padding: 12px; border-radius: 8px; margin-top: 15px;'><p style='margin: 0;'><strong>Notation :</strong> On note la fonction par une lettre (généralement <span style='color: #e74c3c;'>f</span>) et on écrit : <span style='font-size: 1.2em;'><strong>f : x → f(x)</strong></span></p></div></div>",
    "texteParle": "Une fonction, c'est comme une machine ou un transformateur. Vous mettez un nombre à l'entrée, et la machine vous donne un nombre en sortie. Dans une fonction, chaque nombre d'entrée a une seule et unique sortie. On note souvent une fonction par la lettre f. Si on met le nombre x dans la machine, on obtient f de x, qu'on note f entre parenthèses x. C'est la notation de base à retenir.",
    "note": "L'image d'un nombre x par une fonction f se note f(x)."
  },
  {
    "titre": "Ensemble de définition",
    "contenu": "<div style='padding: 10px;'><div style='background: #eaf2f8; padding: 15px; border-radius: 10px; border-left: 5px solid #2980b9;'><h3 style='color: #2c3e50; margin-top: 0;'>Définition :</h3><p style='font-size: 1.1em;'>L'<strong>ensemble de définition</strong> d'une fonction <span style='color: #e74c3c;'>f</span>, noté <strong><span style='color: #2980b9;'>D<sub>f</sub></span></strong> ou <strong><span style='color: #2980b9;'>D<sub>f</sub></span></strong>, est l'ensemble des nombres <span style='color: #e74c3c;'>x</span> pour lesquels <span style='color: #e74c3c;'>f(x)</span> existe (c'est-à-dire qu'on peut calculer).</p></div><div style='background: #fef9e7; padding: 15px; border-radius: 10px; margin-top: 15px;'><h4 style='color: #2c3e50; margin-top: 0;'>⚠️ Cas particuliers à retenir :</h4><ul style='list-style-type: none; padding: 0;'><li>• <span style='color: #e74c3c;'>√(ax + b)</span> existe si <span style='color: #e74c3c;'>ax + b ≥ 0</span></li><li>• <span style='color: #e74c3c;'>1/(ax + b)</span> existe si <span style='color: #e74c3c;'>ax + b ≠ 0</span></li><li>• Les polynômes comme <span style='color: #e74c3c;'>ax² + bx + c</span> sont définis pour tout <span style='color: #e74c3c;'>x ∈ ℝ</span></li></ul></div></div>",
    "texteParle": "L'ensemble de définition, c'est l'ensemble des nombres qu'on peut mettre dans la machine sans qu'elle se bloque. Par exemple, on ne peut pas diviser par zéro, donc toute fonction avec un dénominateur interdit les valeurs qui annulent ce dénominateur. De même, une racine carrée n'existe que pour des nombres positifs ou nuls. Les polynômes, comme les fonctions du second degré, sont définis partout, donc leur ensemble de définition est l'ensemble des nombres réels, qu'on note R.",
    "note": "Une fonction est dite définie sur un intervalle si elle existe pour toutes les valeurs de cet intervalle."
  },
  {
    "titre": "Exemples d'ensembles de définition",
    "contenu": "<div style='padding: 10px;'><h4 style='color: #2c3e50;'>Exemple 1 :</h4><div style='background: #e8f8f5; padding: 12px; border-radius: 8px;'><p><span style='color: #e74c3c;'>f(x) = √(x - 3)</span></p><p>Il faut que <span style='color: #e74c3c;'>x - 3 ≥ 0</span>, donc <span style='color: #2980b9;'>x ≥ 3</span>.</p><p style='background: #2c3e50; color: white; padding: 5px 10px; display: inline-block; border-radius: 5px;'>D<sub>f</sub> = [3 ; +∞[</p></div><h4 style='color: #2c3e50; margin-top: 15px;'>Exemple 2 :</h4><div style='background: #fdedec; padding: 12px; border-radius: 8px;'><p><span style='color: #e74c3c;'>g(x) = 1/(x - 2)</span></p><p>Il faut que <span style='color: #e74c3c;'>x - 2 ≠ 0</span>, donc <span style='color: #2980b9;'>x ≠ 2</span>.</p><p style='background: #2c3e50; color: white; padding: 5px 10px; display: inline-block; border-radius: 5px;'>D<sub>g</sub> = ℝ \\ {2}</p></div><h4 style='color: #2c3e50; margin-top: 15px;'>Exemple 3 :</h4><div style='background: #ebf5fb; padding: 12px; border-radius: 8px;'><p><span style='color: #e74c3c;'>h(x) = 3x² - 5x + 1</span></p><p>C'est un polynôme, donc défini <span style='color: #2980b9;'>pour tout x ∈ ℝ</span>.</p><p style='background: #2c3e50; color: white; padding: 5px 10px; display: inline-block; border-radius: 5px;'>D<sub>h</sub> = ℝ</p></div></div>",
    "texteParle": "Voyons quelques exemples concrets pour bien comprendre. Pour la fonction f de x égale racine carrée de x moins 3, il faut que l'expression sous la racine soit positive ou nulle, donc x moins 3 supérieur ou égal à zéro. L'ensemble de définition est donc l'intervalle 3 à plus l'infini. Pour la fonction g de x égale 1 sur x moins 2, le dénominateur ne doit pas être nul, donc x ne doit pas être égal à 2. L'ensemble de définition est R privé de 2. Enfin, pour un polynôme comme h de x égale 3x carré moins 5x plus 1, il n'y a pas de restriction, donc l'ensemble de définition est tout R.",
    "note": "L'ensemble de définition peut être un intervalle, une réunion d'intervalles ou tout ℝ."
  },
  {
    "titre": "Image d'un nombre",
    "contenu": "<div style='padding: 10px;'><div style='background: #d5f5e3; padding: 15px; border-radius: 10px; border-left: 5px solid #27ae60;'><h3 style='color: #2c3e50; margin-top: 0;'>Définition :</h3><p style='font-size: 1.1em;'>Soit <span style='color: #e74c3c;'>f</span> une fonction définie sur un ensemble <span style='color: #2980b9;'>D</span>.</p><p style='font-size: 1.1em;'>L'<strong>image</strong> du nombre <span style='color: #e74c3c;'>x</span> par <span style='color: #e74c3c;'>f</span> est le nombre <span style='color: #2980b9;'>f(x)</span> qu'on obtient en remplaçant <span style='color: #e74c3c;'>x</span> par sa valeur dans l'expression de la fonction.</p></div><div style='background: #fef9e7; padding: 15px; border-radius: 10px; margin-top: 15px;'><h4 style='color: #2c3e50; margin-top: 0;'>📝 Exemple :</h4><p>Soit <span style='color: #e74c3c;'>f(x) = 2x + 3</span></p><ul><li>Image de 4 : <span style='color: #2980b9;'>f(4) = 2×4 + 3 = 8 + 3 = 11</span></li><li>Image de -1 : <span style='color: #2980b9;'>f(-1) = 2×(-1) + 3 = -2 + 3 = 1</span></li></ul></div></div>",
    "texteParle": "L'image d'un nombre, c'est le résultat que donne la fonction quand on lui donne ce nombre. Par exemple, si j'ai la fonction f de x égale 2x plus 3, l'image de 4, c'est ce qu'on obtient en remplaçant x par 4 dans l'expression. Ça donne 2 fois 4 plus 3, c'est-à-dire 8 plus 3, ce qui fait 11. De même, l'image de moins 1 est 2 fois moins 1 plus 3, ce qui donne moins 2 plus 3, égal à 1. Simple, non ?",
    "note": "On dit aussi que f(x) est la valeur de la fonction au point x."
  },
  {
    "titre": "Antécédent d'un nombre",
    "contenu": "<div style='padding: 10px;'><div style='background: #eaf2f8; padding: 15px; border-radius: 10px; border-left: 5px solid #2980b9;'><h3 style='color: #2c3e50; margin-top: 0;'>Définition :</h3><p style='font-size: 1.1em;'>Soit <span style='color: #e74c3c;'>f</span> une fonction et <span style='color: #2980b9;'>y</span> un nombre donné.</p><p style='font-size: 1.1em;'>Un <strong>antécédent</strong> de <span style='color: #2980b9;'>y</span> par <span style='color: #e74c3c;'>f</span> est un nombre <span style='color: #e74c3c;'>x</span> tel que <span style='color: #e74c3c;'>f(x) = y</span>.</p></div><div style='background: #fef9e7; padding: 15px; border-radius: 10px; margin-top: 15px;'><h4 style='color: #2c3e50; margin-top: 0;'>📝 Exemple :</h4><p>Soit <span style='color: #e74c3c;'>f(x) = 2x + 3</span></p><p>Pour trouver l'antécédent de <span style='color: #2980b9;'>7</span> :</p><p style='text-align: center;'><span style='color: #e74c3c;'>2x + 3 = 7</span> <span style='color: #95a5a6;'>→</span> <span style='color: #e74c3c;'>2x = 4</span> <span style='color: #95a5a6;'>→</span> <span style='color: #2980b9;'>x = 2</span></p><p style='background: #2c3e50; color: white; padding: 5px 10px; display: inline-block; border-radius: 5px;'>L'antécédent de 7 est 2</p></div></div>",
    "texteParle": "L'antécédent, c'est l'inverse de l'image. Si je connais le résultat de la fonction, l'antécédent est le nombre qu'il faut mettre dans la machine pour obtenir ce résultat. Par exemple, avec la même fonction f de x égale 2x plus 3, si je veux l'antécédent de 7, je dois trouver le nombre x tel que 2x plus 3 égale 7. Je résous l'équation et je trouve x égale 2. Donc l'antécédent de 7 est 2.",

    "texteParle": "Ce schéma montre bien la relation entre antécédent et image. On met le nombre 2 dans la fonction f, elle nous donne le nombre 7. Donc 2 est l'antécédent de 7, et 7 est l'image de 2. On écrit f de 2 égale 7. Retenez bien : on peut aller de l'antécédent vers l'image, mais aussi de l'image vers l'antécédent en résolvant une équation.",

  {

    "contenu": "<div style='padding: 10px;'><div style='background: #eaf2f8; padding: 15px; border-radius: 10px; border-left: 5px solid #2980b9;'><h3 style='color: #2c3e50; margin-top: 0;'>Distinction importante :</h3><p style='font-size: 1.1em;'>Une <strong>fonction</strong> n'est pas forcément définie pour tous les éléments de l'ensemble de départ.</p><p style='font-size: 1.1em;'>Une <strong>application</strong> est une fonction définie pour <strong>tous</strong> les éléments de l'ensemble de départ.</p></div><div style='background: #fef9e7; padding: 15px; border-radius: 10px; margin-top: 15px;'><h4 style='color: #2c3e50; margin-top: 0;'>💡 Exemple :</h4><ul><li><span style='color: #e74c3c;'>f(x) = 1/x</span> n'est pas définie en 0 → c'est une <strong>fonction</strong> (pas une application sur ℝ)</li><li><span style='color: #e74c3c;'>g(x) = x²</span> est définie pour tout <span style='color: #e74c3c;'>x ∈ ℝ</span> → c'est une <strong>application</strong> sur ℝ</li></ul></div><div style='background: #d5f5e3; padding: 12px; border-radius: 8px; margin-top: 15px;'><p style='margin: 0;'>✅ Une application est donc un cas particulier de fonction.</p></div></div>",
    "texteParle": "Il faut bien faire la différence entre une fonction et une application. Une fonction peut ne pas être définie pour certains nombres. Par exemple, la fonction inverse 1 sur x n'est pas définie pour x égale zéro. C'est une fonction, mais pas une application sur l'ensemble R. Par contre, une application est une fonction qui est définie pour tous les nombres de l'ensemble de départ. Par exemple, la fonction carrée x au carré est définie pour tout nombre réel, donc c'est une application.",

  {

    "contenu": "<div style='padding: 10px;'><div style='background: #2c3e50; color: white; padding: 15px; border-radius: 10px;'><h4 style='color: #f1c40f; margin-top: 0;'>Méthode en 3 étapes :</h4><ol style='text-align: left;'><li><strong>Identifier</strong> le type de fonction (polynôme, fraction, racine, ...)</li><li><strong>Exclure</strong> les valeurs qui posent problème :</li><ul><li>Dénominateur nul → à exclure</li><li>Expression sous racine négative → à exclure</li></ul><li><strong>Écrire</strong> l'ensemble solution sous forme d'intervalle</li></ol></div><div style='background: #ecf0f1; padding: 15px; border-radius: 10px; margin-top: 15px;'><h4 style='color: #2c3e50; margin-top: 0;'>🎯 Exemple :</h4><p><span style='color: #e74c3c;'>f(x) = (2x + 1)/(x - 5)</span></p><p>• Dénominateur : <span style='color: #e74c3c;'>x - 5 ≠ 0</span> → <span style='color: #2980b9;'>x ≠ 5</span></p><p>• Donc <span style='background: #2c3e50; color: white; padding: 3px 8px; border-radius: 4px;'>D<sub>f</sub> = ℝ \\ {5}</span></p></div></div>",
    "texteParle": "Pour déterminer l'ensemble de définition d'une fonction, il faut suivre trois étapes simples. D'abord, identifier le type de fonction : est-ce un polynôme, une fraction, une racine carrée ? Ensuite, exclure les valeurs qui posent problème, c'est-à-dire celles qui annulent le dénominateur ou qui rendent l'expression sous la racine négative. Enfin, écrire le résultat sous forme d'intervalle. Par exemple, pour la fonction 2x plus 1 sur x moins 5, le dénominateur x moins 5 ne doit pas être nul, donc x ne doit pas être égal à 5. L'ensemble de définition est R privé de 5.",

    "texteParle": "Pour calculer une image, on utilise une technique qu'on appelle la substitution. C'est tout simple : on remplace la lettre x par le nombre qu'on veut. Par exemple, si on a f de x égale 3x carré moins 2x plus 5, et qu'on veut l'image de 1, on remplace tous les x par 1. 3 fois 1 au carré moins 2 fois 1 plus 5. 1 au carré ça fait 1, donc 3 fois 1 égale 3, moins 2 égale 1, plus 5 égale 6. L'image de 1 est donc 6.",

    "texteParle": "Pour trouver un antécédent, on fait l'opération inverse. On sait le résultat et on cherche le nombre de départ. On résout donc une équation. Par exemple, avec f de x égale 2x moins 3, si je veux l'antécédent de 5, je dois résoudre 2x moins 3 égale 5. J'ajoute 3 des deux côtés, j'obtiens 2x égale 8, donc x égale 4. L'antécédent de 5 est donc 4.",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            header.style.background = 'rgba(15, 23, 42, 0.85)';
            footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            header.style.background = 'rgba(255, 255, 255, 0.85)';
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {

        const body = document.body;

        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {

    });
