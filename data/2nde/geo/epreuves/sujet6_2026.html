<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Géographie",
  "classe": "Seconde",
  "sequence": "Séquence 6",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1: Compréhension des techniques cartographiques",
      "points": "4 pts",
      "enonce": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #333; font-size: 16px;'><p><strong>Document :</strong> Une carte du Cameroun indiquant les principales villes, les routes, les cours d'eau et les zones forestières. La carte comporte un titre, une légende, une échelle graphique et une flèche indiquant le Nord géographique.</p><p>Observez ce document pour répondre aux questions suivantes. D'après une source pédagogique sur l'analyse de documents en géographie, les éléments constitutifs d'une carte sont essentiels à sa lecture et à son interprétation [citation:2].</p></div>",
      "questions": [
        {
          "question": "1) Citez les éléments constitutifs de la carte présentée.",
          "reponse": "Les éléments constitutifs sont : le titre, la légende (explication des signes et symboles), l'échelle (graphique dans ce cas) et l'orientation (le nord géographique)."
        },
        {
          "question": "2) À quoi sert la légende d'une carte ?",
          "reponse": "La légende explique la signification des signes et symboles utilisés sur la carte. Elle permet au lecteur de comprendre l'information représentée (villes, routes, etc.)."
        },
        {
          "question": "3) Distinguez, dans cette carte, les informations qui relèvent d'une carte topographique et celles qui relèvent d'une carte thématique.",
          "reponse": "Les informations topographiques sont les cours d'eau, les routes et les villes (éléments physiques et humains de base). Les informations thématiques sont les zones forestières (qui représentent un thème particulier)."
        },
        {
          "question": "4) Expliquez l'importance de l'échelle sur une carte.",
          "reponse": "L'échelle indique le rapport entre les distances sur la carte et les distances réelles sur le terrain. Elle permet de mesurer les distances, de se repérer et de comparer les espaces représentés."
        }
      ]
    },
    {
      "titre": "Exercice 2: Structure interne de la Terre et mouvements de l'écorce",
      "points": "4 pts",
      "enonce": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #333; font-size: 16px;'><p><strong>Document :</strong> Un schéma de la structure interne de la Terre montrant les différentes couches et leurs limites. Une autre illustration montre les différents types de mouvements des plaques tectoniques (divergence, convergence/subduction, collision, cisaillement).</p><p>La structure interne de la Terre est un thème fondamental de la géomorphologie abordé en classe de Seconde [citation:5].</p></div>",
      "questions": [
        {
          "question": "1) Nommez les différentes couches de la structure interne de la Terre.",
          "reponse": "Les différentes couches sont : l'écorce terrestre ou lithosphère, le manteau ou asthénosphère, et le noyau ou baryosphère (divisé en noyau externe et interne)."
        },
        {
          "question": "2) Expliquez ce qu'est la discontinuité de Moho.",
          "reponse": "La discontinuité de Mohorovičić (Moho) est la limite entre l'écorce terrestre et le manteau supérieur. Elle se caractérise par un changement brutal de la vitesse des ondes sismiques."
        },
        {
          "question": "3) Identifiez le type de mouvement tectonique responsable de la formation des chaînes de montagnes comme l'Himalaya.",
          "reponse": "La collision entre deux plaques continentales, un type de mouvement convergent, est responsable de la formation des chaînes de montagnes comme l'Himalaya."
        },
        {
          "question": "4) Décrivez brièvement ce qu'est une zone de subduction.",
          "reponse": "La subduction est le phénomène par lequel une plaque lithosphérique s'enfonce sous une autre dans le manteau. Elle est à l'origine de la formation des fosses océaniques et des volcans explosifs."
        }
      ]
    },
    {
      "titre": "Exercice 3: Le volcanisme et les séismes",
      "points": "4 pts",
      "enonce": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #333; font-size: 16px;'><p><strong>Documents :</strong> Une photographie de l'éruption d'un volcan de type vulcanien. Une carte du monde localisant les principales zones sismiques (ceinture de feu du Pacifique, dorsales océaniques, zone méditerranéenne).</p><p>Ces phénomènes géologiques sont des manifestations des mouvements de l'écorce terrestre [citation:5].</p></div>",
      "questions": [
        {
          "question": "1) D'après l'image, à quel type de volcan appartient celui qui est présenté ? Justifiez votre réponse.",
          "reponse": "Il s'agit d'un volcan de type vulcanien. Justification : l'image montre des projections de matériaux solides (blocs, bombes, cendres) et des coulées de lave visqueuse, caractéristiques de ce type d'éruption."
        },
        {
          "question": "2) Citez les trois phases d'une éruption volcanique.",
          "reponse": "Les trois phases sont : 1) la phase annonciatrice (grondements, fissurations), 2) la phase éruptive/paroxysmale (coulée de laves, explosions), 3) la phase d'atténuation (fumerolles)."
        },
        {
          "question": "3) Nommez les trois principales zones sismiques dans le monde.",
          "reponse": "Les trois principales zones sont : la ceinture de feu du Pacifique, la zone méditerranéenne (du Portugal à l'Asie du Sud-Est), et les dorsales océaniques."
        },
        {
          "question": "4) Expliquez la différence entre l'échelle de Richter et l'échelle de Mercalli.",
          "reponse": "L'échelle de Richter mesure la magnitude du séisme, c'est-à-dire l'énergie libérée (échelle quantitative). L'échelle de Mercalli mesure l'intensité du séisme, c'est-à-dire les dégâts et les effets ressentis (échelle qualitative)."
        },
        {
          "question": "5) Proposez deux mesures de protection contre les séismes.",
          "reponse": "Deux mesures sont : 1) la construction parasismique (bâtiments conçus pour résister aux secousses), 2) l'éducation des populations aux gestes à adopter en cas de séisme (s'abriter, évacuer les zones dangereuses)."
        }
      ]
    },
    {
      "titre": "Exercice 4: Les types de reliefs et l'érosion",
      "points": "4 pts",
      "enonce": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #333; font-size: 16px;'><p><strong>Document :</strong> Une photographie montrant un paysage de montagne avec des vallées encaissées. Une autre photographie présente un paysage de plaine avec des cours d'eau. Une carte des reliefs du Cameroun est également fournie.</p><p>La connaissance des types de reliefs est essentielle pour comprendre l'organisation des territoires [citation:5].</p></div>",
      "questions": [
        {
          "question": "1) Identifiez le type de relief représenté sur la première photographie. Justifiez votre réponse.",
          "reponse": "Il s'agit d'une montagne. Justification : l'altitude est élevée (supérieure à 2000 m), le relief est marqué par des pentes fortes et des vallées encaissées."
        },
        {
          "question": "2) Distinguez les plaines des plateaux.",
          "reponse": "La plaine est une surface plane de faible altitude (inférieure à 200 m). Le plateau est aussi une surface plane mais d'altitude plus élevée, aux pentes parfois abruptes et aux vallées encaissées."
        },
        {
          "question": "3) Définissez l'érosion fluviale et donnez un exemple de formation qu'elle engendre.",
          "reponse": "L'érosion fluviale est la destruction des sols par l'action des cours d'eau. Elle engendre des talwegs, des gorges, des canyons."
        },
        {
          "question": "4) Citez deux techniques de lutte contre l'érosion des sols.",
          "reponse": "Deux techniques sont : 1) la plantation de végétaux fixateurs de sol (haies, arbres), 2) la construction de banquettes anti-érosion (terrasses)."
        },
        {
          "question": "5) Sur la carte des reliefs du Cameroun, localisez une chaîne de montagnes.",
          "reponse": "La chaîne de montagnes des Monts Mandara, les Monts Bamboutos ou le Mont Cameroun sont des exemples de reliefs montagneux au Cameroun."
        }
      ]
    },
    {
      "titre": "Exercice 5: Circulation atmosphérique et climats",
      "points": "4 pts",
      "enonce": "<div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; color: #333; font-size: 16px;'><p><strong>Documents :</strong> Un schéma de la circulation atmosphérique générale montrant les trois cellules (Hadley, Ferrel, polaire). Un autre schéma présente les types de pluies (convection, orographique, frontale). Un planisphère avec les principales zones climatiques est également fourni.</p><p>L'étude de l'atmosphère et des climats est un thème clé de la météorologie et de la climatologie [citation:5].</p></div>",
      "questions": [
        {
          "question": "1) Expliquez le rôle de la cellule de Hadley dans la circulation atmosphérique.",
          "reponse": "La cellule de Hadley est une circulation de convection entre l'équateur (chaud) et les tropiques. L'air chaud et humide s'élève à l'équateur (zone de basse pression), provoque des pluies, puis redescend vers les tropiques (zone de haute pression, air sec)."
        },
        {
          "question": "2) Distinguez les pluies orographiques des pluies de convection.",
          "reponse": "Les pluies orographiques (de relief) sont provoquées par le soulèvement de l'air humide contre une barrière montagneuse (effet de Foehn). Les pluies de convection sont dues à un réchauffement intense du sol qui provoque une ascension rapide de l'air chaud et humide (orages)."
        },
        {
          "question": "3) Expliquez pourquoi les déserts tropicaux reçoivent très peu de précipitations.",
          "reponse": "Les déserts tropicaux sont situés dans les zones de subsidence des cellules de Hadley (air descendant sec). L'air y est très sec et stable, ce qui empêche la formation de nuages et de pluies."
        },
        {
          "question": "4) Le climat équatorial est caractérisé par des températures constantes et une forte humidité. Expliquez ces caractéristiques.",
          "reponse": "Le climat équatorial est chaud (températures constantes autour de 25-28°C) car il reçoit un fort rayonnement solaire toute l'année. Il est humide et pluvieux (précipitations abondantes) en raison de l'ascendance de l'air chaud et humide de la cellule de Hadley et de la présence de la Zone de Convergence Intertropicale (ZCIT)."
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
