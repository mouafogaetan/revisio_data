<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Géographie",
  "classe": "Seconde",
  "sequence": "Séquence 3",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Structure interne de la Terre",
      "points": "3 pts",
      "enonce": "<div style='font-family: 'Segoe UI', Arial, sans-serif; line-height: 1.6; color: #333;'><p>L’écorce terrestre, le manteau et le noyau constituent les trois grandes enveloppes concentriques de la Terre. La connaissance de leur agencement et de leurs caractéristiques est fondamentale en géologie.</p><div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; margin: 10px 0; border-left: 4px solid #2c3e50;'><p><strong>Document :</strong> Schéma simplifié de la structure interne de la Terre.</p><p><ul><li><strong>Lithosphère (SIAL) :</strong> 0 à 35 km, densité 2,7.</li><li><strong>Asthénosphère (SIMA) :</strong> 35 à 2 900 km, densité 2,9 à 5.</li><li><strong>Baryosphère (NIFE) :</strong> 2 900 à 6 371 km, densité supérieure à 12.</li></ul></p></div></div>",
      "questions": [
        {
          "question": "1) Définis la structure interne de la Terre. (1 pt)",
          "reponse": "La structure interne de la Terre désigne l'agencement des différentes couches ou enveloppes concentriques qui la composent, à savoir l'écorce (lithosphère), le manteau (asthénosphère) et le noyau (baryosphère)."
        },
        {
          "question": "2) D'après le document, donne la composition et l'épaisseur du manteau terrestre. (1 pt)",
          "reponse": "Le manteau terrestre, également appelé asthénosphère, est essentiellement constitué de roches silicatées riches en fer et en magnésium (SIMA). Son épaisseur est d'environ 2 900 km, s'étendant de 35 km à 2 900 km de profondeur."
        },
        {
          "question": "3) Explique la différence entre la discontinuité de Moho et la discontinuité de Gutenberg. (1 pt)",
          "reponse": "La discontinuité de Moho (Mohorovičić) est la limite entre l'écorce terrestre et le manteau, caractérisée par une brutale augmentation de la vitesse des ondes sismiques. La discontinuité de Gutenberg est la limite entre le manteau et le noyau externe, où la vitesse des ondes sismiques chute brutalement (les ondes S ne se propagent plus)."
        }
      ]
    },
    {
      "titre": "Exercice 2 : Les mouvements de l'écorce terrestre",
      "points": "4 pts",
      "enonce": "<div style='font-family: 'Segoe UI', Arial, sans-serif; line-height: 1.6; color: #333;'><p>Les plaques lithosphériques sont en perpétuel mouvement, générant des déformations de l'écorce terrestre et des phénomènes géologiques majeurs.</p><div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; margin: 10px 0; border-left: 4px solid #3498db;'><p><strong>Document :</strong> Schéma des mouvements des plaques.</p><p><ul><li><strong>Divergence :</strong> Écartement des plaques → Rifts, dorsales océaniques.</li><li><strong>Convergence :</strong> Rapprochement des plaques → Subduction (fosses océaniques), collision (chaînes de montagnes).</li><li><strong>Cisaillement :</strong> Glissement horizontal → Failles transformantes.</li></ul></p></div></div>",
      "questions": [
        {
          "question": "1) Définis une plaque tectonique. (0,75 pt)",
          "reponse": "Une plaque tectonique est un fragment rigide de la lithosphère (écorce terrestre + partie supérieure du manteau) qui se déplace à la surface de la Terre, portant les continents et les océans."
        },
        {
          "question": "2) Explique le mouvement de divergence en citant les reliefs qui en résultent. (1 pt)",
          "reponse": "Le mouvement de divergence correspond à un écartement de deux plaques tectoniques l'une par rapport à l'autre. Ce mouvement entraîne la formation de rifts continentaux (ex: rift est-africain) et de dorsales océaniques (ex: dorsale médio-atlantique) où un nouveau plancher océanique se crée."
        },
        {
          "question": "3) Distingue la subduction de la collision en précisant les reliefs associés à chaque mouvement. (1,25 pt)",
          "reponse": "La subduction correspond à l'enfoncement d'une plaque lithosphérique sous une autre, généralement une plaque océanique sous une plaque continentale. Elle est à l'origine de fosses océaniques profondes et d'une activité volcanique intense. La collision est le choc de deux plaques de même nature (continentales), qui ne pouvant s'enfoncer, se chevauchent et forment des chaînes de montagnes (ex: Himalaya)."
        },
        {
          "question": "4) Cite un exemple de mouvement de cisaillement et indique sa conséquence sur le relief. (1 pt)",
          "reponse": "Le mouvement de cisaillement est un glissement horizontal de deux plaques l'une contre l'autre, le long de failles transformantes. La faille de San Andreas en Californie en est l'exemple le plus célèbre. Cette activité est à l'origine de nombreux séismes."
        }
      ]
    },
    {
      "titre": "Exercice 3 : Le volcanisme et les séismes",
      "points": "4 pts",
      "enonce": "<div style='font-family: 'Segoe UI', Arial, sans-serif; line-height: 1.6; color: #333;'><p>Le volcanisme et les séismes sont des manifestations de l'activité interne de la Terre, particulièrement concentrées le long des limites de plaques.</p><div style='background-color: #fff8f0; padding: 15px; border-radius: 8px; margin: 10px 0; border-left: 4px solid #e67e22;'><p><strong>Document :</strong> Les différentes phases d'une éruption volcanique.</p><p><ul><li><strong>Phase annonciatrice :</strong> Grondements, fumées, affolement des animaux.</li><li><strong>Phase éruptive/paroxysmale :</strong> Coulées de lave, explosions, projections de roches et de cendres.</li><li><strong>Phase d'atténuation :</strong> Diminution de l'activité, fumeroles, sources thermales.</li></ul></p></div></div>",
      "questions": [
        {
          "question": "1) Définis le volcanisme. (0,75 pt)",
          "reponse": "Le volcanisme est l'ensemble des phénomènes géologiques liés à la remontée du magma de l'intérieur de la Terre vers la surface (lithosphère), se manifestant par l'activité des volcans (éruptions, coulées de lave, projections de cendres)."
        },
        {
          "question": "2) Explique les trois phases d'une éruption volcanique décrites dans le document. (1,25 pt)",
          "reponse": "Les trois phases d'une éruption volcanique sont : 1) La phase annonciatrice, caractérisée par des signes précurseurs (grondements, émissions de gaz, tremblements de terre, affolement des animaux). 2) La phase éruptive ou paroxysmale, marquée par l'explosion du volcan, les coulées de lave, les projections de cendres et de roches, et les nuées ardentes. 3) La phase d'atténuation, où l'activité diminue progressivement, se limitant à des émissions de vapeur d'eau (fumeroles) et des sources thermales."
        },
        {
          "question": "3) Distingue un volcan hawaïen d'un volcan péléen. (1 pt)",
          "reponse": "Un volcan hawaïen est caractérisé par des laves fluides et une éruption effusive (les laves s'écoulent sans projections majeures). À l'inverse, un volcan péléen est marqué par des laves très visqueuses, une éruption explosive, la formation de dômes et de nuées ardentes (d'ardentes avalanches de gaz et de cendres)."
        },
        {
          "question": "4) Cite deux conséquences positives et deux conséquences négatives du volcanisme. (1 pt)",
          "reponse": "Conséquences positives : 1) Enrichissement des sols grâce aux cendres volcaniques (fertilité), 2) Développement du tourisme autour des volcans. Conséquences négatives : 1) Destructions de biens et pertes de vies humaines, 2) Pollution atmosphérique par les cendres et les gaz volcaniques."
        }
      ]
    },
    {
      "titre": "Exercice 4 : Les types de reliefs et les roches",
      "points": "4 pts",
      "enonce": "<div style='font-family: 'Segoe UI', Arial, sans-serif; line-height: 1.6; color: #333;'><p>La surface de la Terre se caractérise par des formes variées (reliefs) et des matériaux constitutifs différents (roches).</p><div style='background-color: #f4f9f4; padding: 15px; border-radius: 8px; margin: 10px 0; border-left: 4px solid #27ae60;'><p><strong>Document :</strong> Tableau de classification des roches.</p><p><ul><li><strong>Roches endogènes :</strong> Basalte (volcanique), Granite (plutonique).</li><li><strong>Roches exogènes :</strong> Calcaire, Grès, Argile.</li><li><strong>Roches métamorphiques :</strong> Gneiss, Marbre.</li></ul></p></div></div>",
      "questions": [
        {
          "question": "1) Définis le relief. (0,75 pt)",
          "reponse": "Le relief est l'ensemble des formes ou des irrégularités que présente la surface de la Terre. Il varie en fonction de l'altitude, de la pente et de la nature du sous-sol."
        },
        {
          "question": "2) Distingue les reliefs terrestres des reliefs sous-marins en donnant un exemple pour chacun. (1,25 pt)",
          "reponse": "Les reliefs terrestres sont les formes du relief émergé (ex: les montagnes, les plateaux, les plaines, les vallées). Les reliefs sous-marins sont les formes du relief immergé (ex: le plateau continental, la plaine abyssale, les dorsales médio-océaniques, les fosses océaniques)."
        },
        {
          "question": "3) Explique ce qu'est une roche métamorphique et donne un exemple. (1 pt)",
          "reponse": "Une roche métamorphique est une roche qui a subi une transformation à l'état solide, sous l'effet de fortes pressions et/ou de températures élevées, en profondeur dans l'écorce terrestre. Cette transformation modifie sa structure et parfois sa composition. Le gneiss (issu du granite ou du schiste) et le marbre (issu du calcaire) sont des exemples de roches métamorphiques."
        },
        {
          "question": "4) À partir du document, cite un exemple de roche endogène et un exemple de roche exogène. (1 pt)",
          "reponse": "Exemple de roche endogène : le basalte ou le granite. Exemple de roche exogène : le calcaire, le grès ou l'argile."
        }
      ]
    },
    {
      "titre": "Exercice 5 : L'érosion des reliefs terrestres",
      "points": "3 pts",
      "enonce": "<div style='font-family: 'Segoe UI', Arial, sans-serif; line-height: 1.6; color: #333;'><p>L'érosion est un processus de dégradation et de modification des reliefs terrestres par des agents naturels.</p><div style='background-color: #f4f9f9; padding: 15px; border-radius: 8px; margin: 10px 0; border-left: 4px solid #2980b9;'><p><strong>Document :</strong> Les formes d'érosion.</p><p><ul><li><strong>Érosion fluviale :</strong> Action des cours d'eau → Formation de gorges, de vallées.</li><li><strong>Érosion éolienne :</strong> Action du vent → Formation de dunes, de regs.</li></ul></p></div></div>",
      "questions": [
        {
          "question": "1) Définis l'érosion. (0,75 pt)",
          "reponse": "L'érosion est le processus de destruction, de dégradation et d'entraînement des matériaux constitutifs de la surface de la Terre (sols, roches) sous l'action d'agents naturels comme l'eau, le vent ou la glace."
        },
        {
          "question": "2) Distingue l'érosion fluviale de l'érosion éolienne en donnant un exemple pour chacune. (1,25 pt)",
          "reponse": "L'érosion fluviale est l'action érosive exercée par les eaux courantes (rivières, fleuves). Elle creuse des vallées, des gorges et transporte des sédiments. L'érosion éolienne est l'action érosive du vent, qui transporte des particules de sable ou de poussière, façonnant des paysages comme les dunes (dans les déserts de sable, les ergs) ou les regs (déserts de pierres)."
        },
        {
          "question": "3) Cite deux techniques de lutte contre l'érosion. (1 pt)",
          "reponse": "Deux techniques de lutte contre l'érosion sont : 1) La construction de banquettes anti-érosives (ou de terrasses) sur les terrains en pente pour ralentir l'eau et retenir les sols. 2) Le reboisement ou la plantation de végétation fixatrice pour protéger le sol contre l'action du vent et de l'eau."
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
