<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }

    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }

    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }

    .content-card li:last-child {
        border-bottom: none;
    }

    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }

    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }

    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }

    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }

    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }

    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }

    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }

    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }

    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }

    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }

    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }

    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }

    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }

    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }

    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }

    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }

    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }

    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }

    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }

    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }

    /* Mode jour (par défaut) - ajouté par le script de thème */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>

<div class="app-container">

    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>

    <main class="slide-body" id="slideBody"></main>

    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>

    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>

        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        
            <button class="btn btn-secondary" id="themeToggle" style="font-size:1.2rem; min-width:40px; padding:8px 12px;" title="Passer en mode nuit">
                🌓
            </button>
        </div>

        <div class="auto-indicator" id="autoIndicator">⏸ Lecture manuelle</div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Le Volcanisme et les Séismes",
    "contenu": "<div style='text-align: center; padding: 20px;'><h1 style='font-size: 2em; color: #E74C3C;'>🌋 LE VOLCANISME<br>ET LES SÉISMES</h1><h2 style='font-size: 1.3em; color: #2C3E50;'>Les manifestations de la force de la Terre</h2><p style='font-size: 1.1em; margin-top: 20px;'>Les volcans et les séismes sont des phénomènes géologiques qui montrent que la Terre est vivante et en mouvement.</p><div style='margin-top: 30px; display: flex; justify-content: center; gap: 30px; flex-wrap: wrap;'><div style='background-color: #E74C3C; padding: 20px; border-radius: 50%; width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; flex-direction: column; color: white;'>🌋<br>Volcans</div><div style='background-color: #F39C12; padding: 20px; border-radius: 50%; width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; flex-direction: column; color: white;'>🌍<br>Séismes</div></div></div>",
    "texteParle": "Bonjour à tous ! Aujourd'hui, nous abordons une leçon passionnante sur deux phénomènes naturels spectaculaires : le volcanisme et les séismes. Les volcans et les tremblements de terre sont des manifestations de la force de la Terre. Ils nous rappellent que notre planète est vivante et en constante évolution. Nous allons voir ce qui provoque ces phénomènes, comment ils se manifestent et quelles sont leurs conséquences.",
    "note": "Introduction à la leçon sur le volcanisme et les séismes."
  },
  {
    "titre": "Le Volcanisme : Définition",
    "contenu": "<div style='padding: 15px;'><h3 style='color: #E74C3C;'>🌋 Qu'est-ce que le volcanisme ?</h3><div style='background-color: #FDEDEC; padding: 15px; border-radius: 12px; margin-top: 10px;'><p><strong>Définition :</strong> Le volcanisme est l'ensemble des phénomènes liés à l'activité des volcans et à la présence du magma dans l'écorce terrestre.</p></div><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px;'><div style='background-color: #FDF2E9; padding: 12px; border-radius: 8px;'><h4 style='color: #E67E22; margin: 0;'>🔥 Magma</h4><p>Roche en fusion à l'intérieur de la Terre.</p></div><div style='background-color: #E8F8F5; padding: 12px; border-radius: 8px;'><h4 style='color: #2ECC71; margin: 0;'>💨 Lave</h4><p>Magma qui s'est échappé à la surface.</p></div></div></div>",
    "texteParle": "Commençons par définir le volcanisme. Le volcanisme est l'ensemble des phénomènes qui se produisent lors de l'activité des volcans. Il est lié à la présence de magma, c'est-à-dire de roche en fusion, à l'intérieur de la Terre. Quand ce magma remonte à la surface, on l'appelle la lave. C'est cette lave qui sort des volcans lors des éruptions.",
    "note": "Définition du volcanisme."
  },
  {
    "titre": "Les Causes du Volcanisme",
    "contenu": "<div style='padding: 15px;'><h3 style='color: #E74C3C;'>🔍 Pourquoi des volcans ?</h3><div style='display: flex; flex-direction: column; gap: 12px;'><div style='background-color: #FDEDEC; padding: 15px; border-radius: 12px; border-left: 6px solid #E74C3C;'><h4 style='color: #E74C3C; margin: 0;'>1. Mouvement des plaques lithosphériques</h4><p>Le volcanisme est principalement lié aux mouvements des plaques tectoniques.</p><ul><li><strong>Subduction</strong> : une plaque s'enfonce sous une autre, le magma remonte.</li><li><strong>Divergence</strong> : les plaques s'écartent, le magma remplit l'espace.</li></ul></div><div style='background-color: #FDEDEC; padding: 15px; border-radius: 12px; border-left: 6px solid #E74C3C;'><h4 style='color: #E74C3C; margin: 0;'>2. Points chauds</h4><p>Certains volcans se forment au-dessus de points chauds du manteau, indépendamment des plaques.</p><p><strong>Exemple :</strong> Les volcans d'Hawaï.</p></div></div></div>",
    "texteParle": "Mais qu'est-ce qui provoque le volcanisme ? Il y a deux causes principales. D'abord, les mouvements des plaques lithosphériques. Quand une plaque s'enfonce sous une autre, c'est la subduction, le magma remonte et crée des volcans. Quand les plaques s'écartent, c'est la divergence, le magma remplit l'espace et crée aussi des volcans. Ensuite, il y a les points chauds : ce sont des zones du manteau où la température est très élevée. Le magma monte et crée des volcans, comme à Hawaï.",
    "note": "Explication des causes du volcanisme."
  },
  {
    "titre": "Les Phases d'une Éruption Volcanique",
    "contenu": "<div style='padding: 15px;'><h3 style='color: #E74C3C;'>⏳ Les trois phases d'une éruption</h3><div style='display: flex; flex-direction: column; gap: 12px;'><div style='background-color: #FDF2E9; padding: 15px; border-radius: 12px; border-left: 6px solid #E67E22;'><h4 style='color: #E67E22; margin: 0;'>1. Phase annonciatrice</h4><ul><li>Grondements sourds.</li><li>Affolement des animaux.</li><li>Fissurations du sol.</li><li>Émissions de gaz.</li></ul></div><div style='background-color: #FDEDEC; padding: 15px; border-radius: 12px; border-left: 6px solid #E74C3C;'><h4 style='color: #E74C3C; margin: 0;'>2. Phase éruptive ou paroxysmale</h4><ul><li>Coulée de lave.</li><li>Explosions.</li><li>Projections de roches et de cendres.</li></ul></div><div style='background-color: #E8F8F5; padding: 15px; border-radius: 12px; border-left: 6px solid #2ECC71;'><h4 style='color: #2ECC71; margin: 0;'>3. Phase d'atténuation</h4><ul><li>Vapeur d'eau.</li><li>Fumeroles.</li><li>Sources thermales.</li></ul></div></div></div>",
    "texteParle": "Une éruption volcanique se déroule en trois phases. D'abord, la phase annonciatrice : on entend des grondements, les animaux s'affolent, le sol se fissure, des gaz s'échappent. Ensuite, la phase éruptive ou paroxysmale : c'est le moment le plus spectaculaire avec des coulées de lave, des explosions et des projections de roches et de cendres. Enfin, la phase d'atténuation : l'activité diminue, on voit de la vapeur d'eau, des fumeroles et des sources thermales se forment.",
    "note": "Présentation des trois phases d'une éruption volcanique."
  },
  {
    "titre": "Les Types de Volcans selon leur Dynamisme",
    "contenu": "<div style='padding: 15px;'><h3 style='color: #E74C3C;'>🌋 Les différents types de volcans</h3><div style='display: flex; flex-direction: column; gap: 12px;'><div style='background-color: #FDF2E9; padding: 12px; border-radius: 8px;'><strong>🌊 Hawaïen</strong> : Magma fluide, éruptions effusives (coulées de lave). Peu dangereux.</div><div style='background-color: #FDEDEC; padding: 12px; border-radius: 8px;'><strong>🔥 Strombolien</strong> : Laves fluides, quelques projections. Éruptions régulières.</div><div style='background-color: #F4ECF7; padding: 12px; border-radius: 8px;'><strong>💥 Vulcanien</strong> : Laves visqueuses, éruptions explosives. Nuées ardentes.</div><div style='background-color: #D5F5E3; padding: 12px; border-radius: 8px;'><strong>☠️ Péléen</strong> : Laves très visqueuses, éruptions extrêmement explosives. Dômes de lave.</div></div><div style='background-color: #F9E79F; padding: 12px; border-radius: 8px; margin-top: 12px;'><p>💡 <strong>À retenir :</strong> Plus la lave est visqueuse, plus l'éruption est explosive et dangereuse.</p></div></div>",

    "note": "Présentation des types de volcans selon leur dynamisme."
  },
  {
    "titre": "Les Conséquences du Volcanisme",
    "contenu": "<div style='padding: 15px;'><h3 style='color: #E74C3C;'>✅ Les effets des volcans</h3><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 12px;'><div style='background-color: #FDEDEC; padding: 15px; border-radius: 12px; border: 2px solid #E74C3C;'><h4 style='color: #E74C3C; margin: 0;'>❌ Conséquences négatives</h4><ul><li>Destruction des villes et des villages.</li><li>Pertes humaines.</li><li>Destruction des cultures.</li><li>Pollution de l'air.</li><li>Changement climatique temporaire.</li></ul></div><div style='background-color: #E8F8F5; padding: 15px; border-radius: 12px; border: 2px solid #2ECC71;'><h4 style='color: #2ECC71; margin: 0;'>✅ Conséquences positives</h4><ul><li><strong>Chaleur</strong> : géothermie.</li><li><strong>Fertilisation des sols</strong> : cendres riches en minéraux.</li><li><strong>Tourisme</strong> : attraction pour les visiteurs.</li><li><strong>Formation de nouvelles terres</strong>.</li></ul></div></div></div>",
    "texteParle": "Les volcans ont des conséquences à la fois négatives et positives. Du côté négatif, ils peuvent détruire des villes et des villages, causer des pertes humaines, détruire les cultures, polluer l'air et même modifier le climat temporairement. Mais il y a aussi des aspects positifs. Les volcans fournissent de la chaleur utilisée pour la géothermie. Les cendres volcaniques fertilisent les sols en apportant des minéraux. Ils attirent les touristes et peuvent former de nouvelles terres.",
    "note": "Présentation des conséquences du volcanisme."
  },
  {
    "titre": "Les Séismes : Définition",
    "contenu": "<div style='padding: 15px;'><h3 style='color: #F39C12;'>🌍 Qu'est-ce qu'un séisme ?</h3><div style='background-color: #FEF9E7; padding: 15px; border-radius: 12px; margin-top: 10px;'><p><strong>Définition :</strong> Un séisme est une secousse brusque et violente qui affecte l'écorce terrestre. On l'appelle aussi tremblement de terre.</p></div><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px;'><div style='background-color: #FDF2E9; padding: 12px; border-radius: 8px;'><h4 style='color: #E67E22; margin: 0;'>🔴 Foyer (hypocentre)</h4><p>Point de naissance du séisme à l'intérieur de la Terre.</p></div><div style='background-color: #EBF5FB; padding: 12px; border-radius: 8px;'><h4 style='color: #3498DB; margin: 0;'>🔵 Épicentre</h4><p>Point en surface à la verticale du foyer.</p></div></div></div>",
    "texteParle": "Passons maintenant aux séismes, aussi appelés tremblements de terre. Un séisme est une secousse brusque qui affecte l'écorce terrestre. Il naît à l'intérieur de la Terre, à un point qu'on appelle le foyer ou l'hypocentre. La secousse se propage à la surface et atteint un point situé à la verticale du foyer : c'est l'épicentre. C'est à l'épicentre que les dégâts sont les plus importants.",
    "note": "Définition des séismes et des termes foyer et épicentre."
  },
  {
    "titre": "Les Causes des Séismes",
    "contenu": "<div style='padding: 15px;'><h3 style='color: #F39C12;'>🔍 Pourquoi des séismes ?</h3><div style='display: flex; flex-direction: column; gap: 12px;'><div style='background-color: #FEF9E7; padding: 15px; border-radius: 12px; border-left: 6px solid #F39C12;'><h4 style='color: #F39C12; margin: 0;'>Origine des séismes</h4><ul><li><strong>Mouvements de collision</strong> : les plaques tectoniques se heurtent.</li><li><strong>Mouvements de subduction</strong> : une plaque s'enfonce sous une autre.</li><li><strong>Failles</strong> : des cassures dans l'écorce terrestre.</li><li><strong>Remontée du magma</strong> : liée à l'activité volcanique.</li></ul></div><div style='background-color: #F9E79F; padding: 12px; border-radius: 8px; margin-top: 12px;'><p>💡 <strong>À savoir :</strong> La plupart des séismes sont liés aux mouvements des plaques tectoniques.</p></div></div></div>",
    "texteParle": "Les séismes sont causés par plusieurs phénomènes. D'abord, les mouvements de collision entre les plaques tectoniques. Quand deux plaques se heurtent, elles libèrent une énergie qui provoque la secousse. La subduction, quand une plaque s'enfonce sous une autre, est aussi une cause de séismes. Les failles, qui sont des cassures dans l'écorce terrestre, peuvent provoquer des tremblements. Enfin, la remontée du magma dans les volcans peut aussi causer des séismes.",
    "note": "Explication des causes des séismes."
  },
  {
    "titre": "Les Phases d'un Séisme",
    "contenu": "<div style='padding: 15px;'><h3 style='color: #F39C12;'>⏳ Les trois phases d'un séisme</h3><div style='display: flex; flex-direction: column; gap: 12px;'><div style='background-color: #FDF2E9; padding: 15px; border-radius: 12px; border-left: 6px solid #E67E22;'><h4 style='color: #E67E22; margin: 0;'>1. Phase annonciatrice</h4><ul><li>Petites secousses préliminaires (pré-séismes).</li><li>Le sol peut vibrer légèrement.</li></ul></div><div style='background-color: #FDEDEC; padding: 15px; border-radius: 12px; border-left: 6px solid #E74C3C;'><h4 style='color: #E74C3C; margin: 0;'>2. Phase paroxysmale</h4><ul><li>Secousses violentes et destructrices.</li><li>La secousse principale (le séisme lui-même).</li></ul></div><div style='background-color: #E8F8F5; padding: 15px; border-radius: 12px; border-left: 6px solid #2ECC71;'><h4 style='color: #2ECC71; margin: 0;'>3. Phase de répliques</h4><ul><li>Secousses secondaires moins fortes.</li><li>Peuvent durer plusieurs jours ou semaines.</li></ul></div></div></div>",
    "texteParle": "Comme les éruptions volcaniques, les séismes se déroulent en trois phases. La phase annonciatrice est marquée par de petites secousses préliminaires, comme des avertissements. La phase paroxysmale est la secousse principale, la plus violente, c'est le séisme lui-même. La phase de répliques est marquée par des secousses secondaires, moins fortes, qui peuvent durer plusieurs jours ou plusieurs semaines.",
    "note": "Présentation des trois phases d'un séisme."

  {
    "titre": "Les Zones Sismiques dans le Monde",
    "contenu": "<div style='padding: 15px;'><h3 style='color: #F39C12;'>🗺️ Les régions les plus actives</h3><div style='display: flex; flex-direction: column; gap: 12px;'><div style='background-color: #FDEDEC; padding: 15px; border-radius: 12px; border-left: 6px solid #E74C3C;'><h4 style='color: #E74C3C; margin: 0;'>1. Ceinture de feu du Pacifique</h4><p>La zone la plus active au monde. Elle s'étend du Japon aux Andes en passant par l'Alaska, la Californie, le Mexique et la Nouvelle-Zélande.</p></div><div style='background-color: #FDF2E9; padding: 15px; border-radius: 12px; border-left: 6px solid #E67E22;'><h4 style='color: #E67E22; margin: 0;'>2. Zone méditerranéenne</h4><p>Elle s'étend du Portugal au Maghreb, en passant par la Méditerranée, la Turquie, l'Iran et l'Asie centrale.</p></div><div style='background-color: #E8F8F5; padding: 15px; border-radius: 12px; border-left: 6px solid #2ECC71;'><h4 style='color: #2ECC71; margin: 0;'>3. Dorsales océaniques</h4><p>Les chaînes de montagnes sous-marines où les plaques s'écartent.</p></div></div></div>",
    "texteParle": "Les séismes ne se produisent pas partout dans le monde. Ils sont concentrés dans des zones précises. La première est la ceinture de feu du Pacifique, la zone la plus active au monde, qui s'étend du Japon aux Andes en passant par l'Alaska et la Californie. La deuxième est la zone méditerranéenne, qui s'étend du Portugal au Maghreb et jusqu'en Asie centrale. La troisième est les dorsales océaniques, ces chaînes de montagnes sous-marines où les plaques s'écartent.",
    "note": "Présentation des principales zones sismiques dans le monde."
  },
  {
    "titre": "Les Échelles de Mesure des Séismes",
    "contenu": "<div style='padding: 15px;'><h3 style='color: #F39C12;'>📊 Comment mesurer un séisme ?</h3><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 12px;'><div style='background-color: #EBF5FB; padding: 15px; border-radius: 12px; border: 2px solid #3498DB;'><h4 style='color: #3498DB; margin: 0;'>📏 Échelle de Richter</h4><ul><li>Mesure la <strong>magnitude</strong>.</li><li>Évalue l'<strong>énergie</strong> libérée par le séisme.</li><li>Échelle logarithmique de 0 à 10.</li><li>Chaque point correspond à une énergie multipliée par 30.</li></ul></div><div style='background-color: #FDF2E9; padding: 15px; border-radius: 12px; border: 2px solid #E67E22;'><h4 style='color: #E67E22; margin: 0;'>🏚️ Échelle de Mercalli</h4><ul><li>Mesure l'<strong>intensité</strong>.</li><li>Évalue les <strong>dégâts</strong> causés par le séisme.</li><li>Échelle de I à XII.</li><li>Se base sur les observations des dégâts et des ressentis.</li></ul></div></div></div>",
    "texteParle": "Pour mesurer les séismes, on utilise deux échelles différentes. L'échelle de Richter mesure la magnitude, c'est-à-dire l'énergie libérée par le séisme. C'est une échelle logarithmique de 0 à 10 : chaque point correspond à une énergie multipliée par 30. L'échelle de Mercalli mesure l'intensité, c'est-à-dire les dégâts causés. Elle va de I à XII et se base sur les observations des dégâts et sur ce que les gens ont ressenti.",
    "note": "Présentation des échelles de Richter et de Mercalli."
  },
  {
    "titre": "Comparaison Richter / Mercalli",
    "contenu": "<div style='padding: 15px;'><h3 style='color: #F39C12;'>📊 Les deux échelles</h3><table style='width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 0.9em;'><thead><tr style='background-color: #3498DB; color: white;'><th style='padding: 10px; border: 1px solid #ddd;'>Critère</th><th style='padding: 10px; border: 1px solid #ddd;'>Richter</th><th style='padding: 10px; border: 1px solid #ddd;'>Mercalli</th></tr></thead><tbody><tr><td style='padding: 10px; border: 1px solid #ddd;'>Mesure</td><td style='padding: 10px; border: 1px solid #ddd;'>Magnitude</td><td style='padding: 10px; border: 1px solid #ddd;'>Intensité</td></tr><tr style='background-color: #f2f2f2;'><td style='padding: 10px; border: 1px solid #ddd;'>Ce qu'elle évalue</td><td style='padding: 10px; border: 1px solid #ddd;'>Énergie libérée</td><td style='padding: 10px; border: 1px solid #ddd;'>Dégâts observés</td></tr><tr><td style='padding: 10px; border: 1px solid #ddd;'>Échelle</td><td style='padding: 10px; border: 1px solid #ddd;'>0 à 10 (logarithmique)</td><td style='padding: 10px; border: 1px solid #ddd;'>I à XII</td></tr><tr style='background-color: #f2f2f2;'><td style='padding: 10px; border: 1px solid #ddd;'>Exemple</td><td style='padding: 10px; border: 1px solid #ddd;'>Séisme du Japon 2011 : 9,1</td><td style='padding: 10px; border: 1px solid #ddd;'>Destructions massives : XII</td></tr></tbody></table></div>",
    "texteParle": "Pour bien comprendre la différence entre ces deux échelles, regardons ce tableau comparatif. L'échelle de Richter mesure la magnitude, l'énergie libérée. L'échelle de Mercalli mesure l'intensité, les dégâts observés. Richter va de 0 à 10, Mercalli de I à XII. Par exemple, le séisme du Japon en 2011 a eu une magnitude de 9,1 sur l'échelle de Richter et a causé des destructions massives classées XII sur l'échelle de Mercalli.",
    "note": "Comparaison des échelles de Richter et de Mercalli."
  },
  {
    "titre": "Les Mesures de Protection",
    "contenu": "<div style='padding: 15px;'><h3 style='color: #F39C12;'>🛡️ Comment se protéger ?</h3><div style='display: flex; flex-direction: column; gap: 12px;'><div style='background-color: #E8F8F5; padding: 15px; border-radius: 12px; border-left: 6px solid #2ECC71;'><h4 style='color: #2ECC71; margin: 0;'>1. Éducation des populations</h4><ul><li>Apprendre les gestes à adopter en cas de séisme.</li><li>Organiser des exercices d'évacuation dans les écoles.</li></ul></div><div style='background-color: #EBF5FB; padding: 15px; border-radius: 12px; border-left: 6px solid #3498DB;'><h4 style='color: #3498DB; margin: 0;'>2. Constructions parasismiques</h4><ul><li>Bâtiments conçus pour résister aux secousses.</li><li>Matériaux flexibles, structures renforcées.</li></ul></div><div style='background-color: #FDF2E9; padding: 15px; border-radius: 12px; border-left: 6px solid #E67E22;'><h4 style='color: #E67E22; margin: 0;'>3. Sismographes</h4><ul><li>Instruments pour détecter et mesurer les séismes.</li><li>Permettent d'alerter les populations.</li></ul></div></div></div>",
    "texteParle": "Pour se protéger contre les séismes, plusieurs mesures sont mises en place. La première est l'éducation des populations : on apprend aux gens les gestes à adopter en cas de séisme, et on organise des exercices d'évacuation dans les écoles. La deuxième est les constructions parasismiques : on conçoit des bâtiments capables de résister aux secousses, avec des matériaux flexibles et des structures renforcées. La troisième est l'utilisation de sismographes, des instruments qui détectent les séismes et permettent d'alerter les populations.",
    "note": "Présentation des mesures de protection contre les séismes."
  },
  {
    "titre": "Les Gestes à Adopter en Cas de Séisme",
    "contenu": "<div style='padding: 15px;'><h3 style='color: #E74C3C;'>🚨 Que faire en cas de séisme ?</h3><div style='display: flex; flex-direction: column; gap: 10px;'><div style='background-color: #FDEDEC; padding: 15px; border-radius: 12px; border-left: 6px solid #E74C3C;'><h4 style='color: #E74C3C; margin: 0;'>⚠️ Pendant le séisme</h4><ul><li><strong>Abritez-vous</strong> sous une table solide.</li><li><strong>Éloignez-vous</strong> des fenêtres, des objets lourds.</li><li><strong>Ne prenez pas</strong> les escaliers ou l'ascenseur.</li></ul></div><div style='background-color: #E8F8F5; padding: 15px; border-radius: 12px; border-left: 6px solid #2ECC71;'><h4 style='color: #2ECC71; margin: 0;'>✅ Après le séisme</h4><ul><li><strong>Évacuez</strong> les bâtiments endommagés.</li><li><strong>Écoutez</strong> les consignes des autorités.</li><li><strong>Évitez</strong> de téléphoner pour ne pas saturer les lignes.</li></ul></div></div></div>",
    "texteParle": "Il est important de savoir quels gestes adopter en cas de séisme. Pendant le séisme, il faut s'abriter sous une table solide, s'éloigner des fenêtres et des objets lourds, et ne pas prendre les escaliers ou l'ascenseur. Après le séisme, il faut évacuer les bâtiments endommagés, écouter les consignes des autorités et éviter de téléphoner pour ne pas saturer les lignes. Ces gestes simples peuvent sauver des vies.",
    "note": "Présentation des gestes à adopter en cas de séisme."
  },
  {
    "titre": "Volcanisme et Séismes : Les Liens",
    "contenu": "<div style='padding: 15px;'><h3 style='color: #2C3E50;'>🔗 Des phénomènes liés</h3><div style='display: flex; flex-direction: column; gap: 12px;'><div style='background-color: #EBF5FB; padding: 15px; border-radius: 12px;'><ul><li>Les séismes et le volcanisme sont souvent <strong>liés</strong>.</li><li>Les <strong>mouvements des plaques</strong> sont la cause commune.</li><li>Les séismes peuvent annoncer des <strong>éruptions volcaniques</strong>.</li><li>Les volcans peuvent provoquer des <strong>séismes</strong> lors de l'ascension du magma.</li><li>La <strong>ceinture de feu du Pacifique</strong> est à la fois la zone la plus sismique et la plus volcanique du monde.</li></ul></div><div style='background-color: #F9E79F; padding: 12px; border-radius: 8px; margin-top: 12px;'><p>💡 <strong>À retenir :</strong> Les séismes et les volcans sont des manifestations du même phénomène : les mouvements des plaques tectoniques.</p></div></div></div>",
    "texteParle": "Les séismes et le volcanisme sont souvent liés. Ils ont la même cause principale : les mouvements des plaques tectoniques. Les séismes peuvent annoncer des éruptions volcaniques, et les volcans peuvent;

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;

    const total = slides.length;
    const synth = window.speechSynthesis;

    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }

    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }

    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        
        loadingCancelled = false;
        isLoading = true;
        
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }

    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }

    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }

    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }

    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }

    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }

    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);

        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }

    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }

            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }

            // Arrêter toute lecture en cours
            stopSpeaking();
            
            // Réinitialiser l'état de pause
            isPaused = false;
            
            showLoading();
            setStatus("Initialisation...", 'loading');

            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;

                let isFinished = false;
                let errorHandled = false;

                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };

                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };

                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    
                    resolve();
                };

                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }

                currentUtterance = utterance;
                
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }

            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }

    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        // Arrêter complètement la lecture
        stopSpeaking();
        
        await new Promise(r => setTimeout(r, 50));
        
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }

        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');

        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }

    async function goToNext() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }

    async function goToPrev() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }

    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }

        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }

        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }

        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }

        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }

    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }

        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }

        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');

        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });

        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });

        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });

        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });

        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });

        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });

        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });

        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }

    init();
});


    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;

    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');

        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            if (header) header.style.background = 'rgba(15, 23, 42, 0.85)';
            if (footer) footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            if (header) header.style.background = 'rgba(255, 255, 255, 0.85)';
            if (footer) footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }

    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
            // Ajouter l'écouteur d'événement click
            themeBtn.addEventListener('click', toggleTheme);
        }
    });

</script>
