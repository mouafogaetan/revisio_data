<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Français",
  "classe": "Quatrième",
  "sequence": "Séquence 1",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "COMPRÉHENSION ET ANALYSE DE TEXTE",
      "points": "10 pts",
      "enonce": "<div class='exercise-container' style='background-color: #f8f9fa; padding: 20px; border-radius: 8px; color: #212529;'>\n  <p style='font-size: 1.1rem; font-weight: bold;'>Lis attentivement le texte suivant, puis réponds aux questions.</p>\n  <div class='text-block' style='background-color: #ffffff; padding: 15px; border-left: 4px solid #007bff; margin: 15px 0; font-style: italic; color: #212529;'>\n    <p>Il était une fois, dans un petit village du Cameroun, un vieux sage nommé Mba. Il passait ses journées sous le grand manguier à observer les gens. Il voyait les hommes se presser, courir après l'argent et le pouvoir. Un jour, un jeune homme, tout essoufflé, vint le trouver et lui dit : « Grand-père, comment puis-je devenir riche et puissant ? » Le vieux Mba le regarda avec des yeux pétillants de malice, mais son visage resta grave. Il ne répondit pas tout de suite. Il prit une poignée de sable et la laissa couler entre ses doigts, puis il déclara : « Vois-tu, mon enfant, la vie est comme ce sable. Plus tu serres la main pour la retenir, plus elle s'échappe. Pour être vraiment riche, il faut apprendre à donner. »</p>\n    <p>Le jeune homme, déçu par cette réponse, repartit sans comprendre. Des années plus tard, il revint, riche et célèbre, mais lourd de chagrin. Il retrouva Mba, toujours sous le même manguier. « Tu avais raison, grand-père. Mes biens m'ont apporté l'envie et la solitude. » Mba hocha la tête. « La sagesse ne s'achète pas, elle se gagne. Tu as dû perdre pour enfin comprendre. Assieds-toi maintenant, et raconte-moi ton histoire. » Le jeune homme s'assit et, pour la première fois, il se sentit en paix.</p>\n  </div>\n</div>",
      "questions": [
        {
          "question": "<p style='font-weight: bold; color: #0056b3;'>1. Compréhension (2 pts)</p><p>a) Dans quel lieu se déroule l'histoire ? (1 pt)</p><p>b) Qu'est-ce que le vieux Mba laisse couler entre ses doigts pour donner une leçon au jeune homme ? (1 pt)</p>",
          "reponse": "<p><strong>a)</strong> L'histoire se déroule dans un petit village du Cameroun, sous un grand manguier.</p><p><strong>b)</strong> Il laisse couler une poignée de sable entre ses doigts.</p>"
        },
        {
          "question": "<p style='font-weight: bold; color: #0056b3;'>2. Analyse grammaticale (4 pts)</p><p>a) « Le vieux Mba le regarda avec des yeux pétillants de malice. » (ligne 4). <br> &nbsp;&nbsp;&nbsp; - Quel est le temps et le mode du verbe « regarda » ? (1 pt) <br> &nbsp;&nbsp;&nbsp; - Quelle est la classe grammaticale du mot « malice » ? (1 pt)</p><p>b) « Un jour, un jeune homme, tout essoufflé, vint le trouver. » <br> &nbsp;&nbsp;&nbsp; - Quelle est la fonction du groupe de mots « tout essoufflé » ? (1 pt)</p><p>c) « La sagesse ne s'achète pas. » (ligne 10). <br> &nbsp;&nbsp;&nbsp; - Quelle est la classe grammaticale du mot « ne » et du mot « pas » ? (1 pt)</p>",
          "reponse": "<p><strong>a)</strong> Le verbe « regarda » est conjugué au passé simple de l'indicatif.</p><p><strong>b)</strong> Le mot « malice » est un nom commun (ou substantif).</p><p><strong>c)</strong> Le groupe « tout essoufflé » est un complément du nom ou une apposition. (Toutefois, l'analyse la plus simple pour une classe de 4e est de le considérer comme une proposition subordonnée relative au participe passé employé comme adjectif, mais la fonction attendue est celle d'une épithète détachée ou apposition).</p><p><strong>d)</strong> « ne » et « pas » sont des adverbes. Ils forment l'adverbe négatif.</p>"
        },
        {
          "question": "<p style='font-weight: bold; color: #0056b3;'>3. Conjugaison (2 pts)</p><p>a) « Il voyait les hommes se presser. » (ligne 2). <br> &nbsp;&nbsp;&nbsp; - A quel temps est conjugué le verbe « voyait » ? Donne sa valeur dans ce contexte. (1 pt)</p><p>b) « Le jeune homme repartit sans comprendre. » (ligne 8). <br> &nbsp;&nbsp;&nbsp; - A quel temps est conjugué le verbe « repartit » ? Quelle est sa valeur ? (1 pt)</p>",
          "reponse": "<p><strong>a)</strong> Le verbe « voyait » est à l'imparfait de l'indicatif. Il a une valeur de description ou d'habitude (description d'une action passée qui dure).</p><p><strong>b)</strong> Le verbe « repartit » est au passé simple de l'indicatif. Il a une valeur de premier plan (action soudaine, achevée dans le passé).</p>"
        },
        {
          "question": "<p style='font-weight: bold; color: #0056b3;'>4. Réflexion (2 pts)</p><p>Ce texte est un récit. A quel genre littéraire appartient-il selon toi ? (conte, nouvelle, roman ?) Justifie ta réponse en deux ou trois arguments. (2 pts)</p>",
          "reponse": "<p>Ce texte est un <strong>conte</strong>. (1 pt)</p><p><strong>Justification :</strong> On retrouve des caractéristiques du conte comme : la formule d'ouverture « Il était une fois » [citation:5], la présence d'un lieu vague « un petit village du Cameroun », la présence d'un personnage-type (le vieux sage), la morale à la fin du texte « La sagesse ne s'achète pas, elle se gagne. » (2 arguments minimum pour avoir tous les points).</p>"
        }
      ]
    },
    {
      "titre": "ORTHOGRAPHE : ACCORDS DANS LE GROUPE NOMINAL",
      "points": "4 pts",
      "enonce": "<div class='exercise-container' style='background-color: #f8f9fa; padding: 20px; border-radius: 8px; color: #212529;'>\n  <p>Complète les phrases suivantes en accordant correctement les mots entre parenthèses.</p>\n</div>",
      "questions": [
        {
          "question": "<p>1. Les (chef) ________ des différentes tribus se sont réunis pour discuter de la paix.</p>",
          "reponse": "Les <strong>chefs</strong>."
        },
        {
          "question": "<p>2. Elle portait une robe d'un (bleu) ________ clair et des chaussures (marron) ________.</p>",
          "reponse": "Elle portait une robe d'un <strong>bleu</strong> clair et des chaussures <strong>marron</strong> (invariable)."
        },
        {
          "question": "<p>3. Les feuilles (mort) ________ de l'arbre (tombé) ________ recouvraient le sol de la forêt.</p>",
          "reponse": "Les feuilles <strong>mortes</strong> de l'arbre <strong>tombé</strong> recouvraient le sol de la forêt."
        },
        {
          "question": "<p>4. Une foule de personnes (être) ________ présente à la cérémonie.</p>",
          "reponse": "Une foule de personnes <strong>est</strong> présente à la cérémonie. (On accorde avec le sujet « une foule », car le sujet est un nom collectif suivi d'un complément au pluriel, l'accord se fait souvent avec le collectif quand il est employé sans article défini)."
        }
      ]
    },
    {
      "titre": "CONJUGAISON : IMPÉRATIF PRÉSENT",
      "points": "3 pts",
      "enonce": "<div class='exercise-container' style='background-color: #f8f9fa; padding: 20px; border-radius: 8px; color: #212529;'>\n  <p>Transforme les phrases déclaratives suivantes en phrases impératives en t'adressant à une personne (tu) ou à plusieurs (vous), selon l'indication.</p>\n</div>",
      "questions": [
        {
          "question": "<p>1. Tu dois respecter les règles de la communauté. (→ adresse à une seule personne : tu)</p>",
          "reponse": "<strong>Respecte</strong> les règles de la communauté."
        },
        {
          "question": "<p>2. Nous allons écouter les conseils du sage. (→ adresse à plusieurs personnes : vous)</p>",
          "reponse": "<strong>Écoutez</strong> les conseils du sage."
        },
        {
          "question": "<p>3. Vous ne devez pas jeter les déchets dans la rivière. (→ adresse à plusieurs personnes : vous, phrase négative)</p>",
          "reponse": "<strong>Ne jetez pas</strong> les déchets dans la rivière."
        }
      ]
    },
    {
      "titre": "VOCABULAIRE : NIVEAUX DE LANGAGE ET CHAMP LEXICAL",
      "points": "3 pts",
      "enonce": "<div class='exercise-container' style='background-color: #f8f9fa; padding: 20px; border-radius: 8px; color: #212529;'>\n  <p>Observe le texte du premier exercice.</p>\n</div>",
      "questions": [
        {
          "question": "<p>1. Relève deux mots du champ lexical de la <strong>sagesse</strong> ou de la <strong>connaissance</strong> dans le texte de Mba. (1 pt)</p>",
          "reponse": "Les mots « sage », « sagesse » ou « comprendre » font partie du champ lexical de la sagesse."
        },
        {
          "question": "<p>2. A quel niveau de langage appartient le mot « essoufflé » ? (1 pt)</p>",
          "reponse": "Le mot « essoufflé » appartient au niveau de langage <strong>courant</strong> (voire soutenu dans ce contexte)."
        },
        {
          "question": "<p>3. Trouve un synonyme du mot « déclara » utilisé dans le texte. (1 pt)</p>",
          "reponse": "Un synonyme de « déclara » est : <strong>dit</strong>, <strong>affirma</strong>, ou <strong>annonça</strong>."
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
