<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Français",
  "classe": "Quatrième",
  "sequence": "Séquence 5",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Grammaire : Analyse de la phrase",
      "points": "6 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Lis attentivement les phrases suivantes et réponds aux questions.</p></div>",
      "questions": [
        {
          "question": "<p> <span style='font-style: italic;'>« Le garçon, qui avait oublié son sac, rentra précipitamment chez lui. »</span><br>a) <strong>Identifie</strong> la proposition subordonnée relative et précise si elle est déterminative ou explicative. (1 pt)<br>b) <strong>Remplace</strong> cette subordonnée par une expansion du nom de ton choix (adjectif ou complément du nom). (1 pt)</p>",
          "reponse": "<p>a) La proposition subordonnée relative est : <span style='font-style: italic;'>« qui avait oublié son sac »</span>. Elle est <strong>explicative</strong> car elle apporte une information supplémentaire sur le garçon, mais n'est pas essentielle pour identifier de qui on parle ; elle est encadrée par des virgules.</p><p>b) Exemple de remplacement : <span style='font-style: italic;'>« Le garçon <strong>distrait</strong> rentra précipitamment chez lui. »</span> (adjectif) ou <span style='font-style: italic;'>« Le garçon <strong>à la mémoire défaillante</strong> rentra... »</span> (complément du nom).</p>"
        },
        {
          "question": "<p> <span style='font-style: italic;'>« Le film a été réalisé par un jeune cinéaste talentueux. »</span><br><strong>Transforme</strong> cette phrase passive en phrase active. (1 pt)</p>",
          "reponse": "<p><span style='font-style: italic;'>« Un jeune cinéaste talentueux a réalisé le film. »</span></p>"
        },
        {
          "question": "<p> <span style='font-style: italic;'>« Lorsqu'il arriva, nous étions déjà partis. »</span><br><strong>Identifie</strong> les deux propositions et précise le lien logique (temps) qui les unit. (1 pt)</p>",
          "reponse": "<p>Proposition 1 : <span style='font-style: italic;'>« Lorsqu'il arriva »</span> (proposition subordonnée circonstancielle de temps).<br>Proposition 2 : <span style='font-style: italic;'>« nous étions déjà partis »</span> (proposition principale). Le lien logique est le <strong>temps</strong> (l'action de la principale est antérieure à celle de la subordonnée).</p>"
        },
        {
          "question": "<p> <span style='font-style: italic;'>« La ville, avec ses gratte-ciel, est impressionnante. »</span><br><strong>Identifie</strong> la classe grammaticale et la fonction du mot souligné (<span style='font-weight: bold;'>ses</span>). (1 pt)</p>",
          "reponse": "<p>Classe grammaticale : <strong>déterminant possessif</strong>.<br>Fonction : il est <strong>déterminant du nom</strong> (gratte-ciel).</p>"
        },
        {
          "question": "<p> <span style='font-style: italic;'>« Le professeur explique que la Terre tourne autour du Soleil. »</span><br><strong>Transforme</strong> cette phrase au discours indirect en discours direct. (1 pt)</p>",
          "reponse": "<p><span style='font-style: italic;'>« Le professeur explique : \"La Terre tourne autour du Soleil.\" »</span></p>"
        }
      ]
    },
    {
      "titre": "Conjugaison : Maîtrise des modes et des temps",
      "points": "4 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Conjugue les verbes entre parenthèses au temps et au mode demandés.</p></div>",
      "questions": [
        {
          "question": "<p> Si nous (avoir) ________ plus de temps, nous (rester) ________ plus longtemps. (Conditionnel présent) (1 pt)</p>",
          "reponse": "<p>Si nous <strong>avions</strong> plus de temps, nous <strong>resterions</strong> plus longtemps.</p>"
        },
        {
          "question": "<p> Bien qu'il (pleuvoir) ________ , nous (sortir) ________ nous promener. (Subjonctif présent pour le premier verbe) (1 pt)</p>",
          "reponse": "<p>Bien qu'il <strong>pleuve</strong>, nous <strong>sortirons</strong> nous promener. (Le second verbe est au futur simple de l'indicatif, car il exprime une certitude.)</p>"
        },
        {
          "question": "<p> Quand elles (être) ________ parties, nous (savoir) ________ la vérité. (Futur antérieur pour le premier verbe) (1 pt)</p>",
          "reponse": "<p>Quand elles <strong>seront</strong> parties, nous <strong>saurons</strong> la vérité. (Le second verbe est au futur simple de l'indicatif.)</p>"
        },
        {
          "question": "<p> (Ranger) ________ ta chambre avant de sortir ! (Impératif présent, 2e personne du singulier) (1 pt)</p>",
          "reponse": "<p><strong>Range</strong> ta chambre avant de sortir !</p>"
        }
      ]
    },
    {
      "titre": "Orthographe et Vocabulaire : Accords et famille de mots",
      "points": "5 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Complète les phrases en accordant correctement les mots entre parenthèses ou en trouvant les mots dérivés.</p></div>",
      "questions": [
        {
          "question": "<p> <span style='font-style: italic;'>« Les enfants (a) ________ (bien) ________ mangé. Leurs (c) ________ (main) ________ étaient sales. »</span><br>Complète avec les accords nécessaires. (1 pt)</p>",
          "reponse": "<p>a) <strong>ont</strong> (auxiliaire avoir)<br>b) <strong>bien</strong> (invariable)<br>c) <strong>mains</strong> (accord du nom commun féminin pluriel). Phrase complète : <span style='font-style: italic;'>« Les enfants ont bien mangé. Leurs mains étaient sales. »</span></p>"
        },
        {
          "question": "<p> <span style='font-style: italic;'>« Les pompiers, (a) ________ (être) ________, (b) ________ (arriver) ________ rapidement. »</span><br>Accorde le participe passé du verbe <span style='font-weight: bold;'>arriver</span>. (1 pt)</p>",
          "reponse": "<p>a) <strong>étant</strong> (participe présent invariable).<br>b) <strong>arrivés</strong> (participe passé du verbe arriver, conjugué avec l'auxiliaire être, s'accorde avec le sujet 'pompiers' masculin pluriel). Phrase complète : <span style='font-style: italic;'>« Les pompiers, étant arrivés rapidement, ont éteint l'incendie. »</span></p>"
        },
        {
          "question": "<p> <span style='font-style: italic;'>« Elle (a) ________ (sourire) ________ en voyant le résultat. »</span><br>Accorde le participe passé du verbe <span style='font-weight: bold;'>sourire</span>. (1 pt)</p>",
          "reponse": "<p>a) <strong>a</strong> (auxiliaire avoir).<br>b) <strong>souri</strong> (participe passé du verbe sourire, invariable avec l'auxiliaire avoir car pas de COD antéposé). Phrase complète : <span style='font-style: italic;'>« Elle a souri en voyant le résultat. »</span></p>"
        },
        {
          "question": "<p> <span style='font-style: italic;'>« Le (a) ________ (décider) ________ de cette affaire revient au juge. »</span><br>Construis un nom à partir du verbe <span style='font-weight: bold;'>décider</span>. (1 pt)</p>",
          "reponse": "<p>a) <strong>décideur</strong> ou <strong>décisionnaire</strong>. La phrase pourrait être : <span style='font-style: italic;'>« Le décideur de cette affaire revient au juge. »</span> (Le plus courant est 'décisionnaire' ou 'décideur'). L'élève pourrait aussi proposer 'la décision' mais c'est un nom féminin qui changerait le sens de la phrase.</p>"
        },
        {
          "question": "<p> <span style='font-style: italic;'>« Les (a) ________ (cher) ________ des bijoux augmentent en bourse. »</span><br>Transforme l'adjectif <span style='font-weight: bold;'>cher</span> en nom commun. (1 pt)</p>",
          "reponse": "<p>a) <strong>prix</strong>. La phrase complète : <span style='font-style: italic;'>« Les prix des bijoux augmentent en bourse. »</span></p>"
        }
      ]
    },
    {
      "titre": "Culture Littéraire : Analyse d'un extrait de théâtre",
      "points": "5 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px;'><p>Lis l'extrait suivant et réponds aux questions :</p><div style='background-color: #f2f2f2; padding: 15px; border-radius: 8px; color: #000000; margin: 15px 0;'><h4 style='color: #1a5276;'>Extrait d'une pièce de théâtre</h4><p><span style='font-style: italic; font-weight: bold;'>Personnages :</span><br>LE PÈRE : autoritaire, colérique.<br>LA MÈRE : douce, résignée.<br>LE FILS : jeune, révolté.</p><p><span style='font-style: italic; font-weight: bold;'>Scène :</span> Un salon bourgeois. Le père est assis dans un fauteuil, lisant un journal. La mère entre, suivie de son fils, visiblement contrarié.</p><p><span style='font-weight: bold;'>Le Père :</span> (sans lever les yeux) Alors, ce séjour à l'étranger ? Tu as réfléchi à ce que je t'ai dit ?</p><p><span style='font-weight: bold;'>Le Fils :</span> (d'une voix tendue) Oui, père. J'ai réfléchi. Et je suis décidé à y aller.</p><p><span style='font-weight: bold;'>Le Père :</span> (posant son journal, d'un ton sec) Tu es décidé ? Et qui paiera pour ce voyage, dis-moi ? Ce n'est pas avec ton petit boulot de vacances que tu vas financer une telle aventure !</p><p><span style='font-weight: bold;'>Le Fils :</span> (les poings serrés) Je ne te demande pas d'argent, père. J'ai gagné une bourse. C'est une occasion unique pour moi !</p><p><span style='font-weight: bold;'>La Mère :</span> (intervenant doucement) Mais, mon chéri, ton père s'inquiète pour toi. Tu es encore si jeune...</p><p><span style='font-weight: bold;'>Le Fils :</span> (se tournant vers sa mère) Je ne suis plus un enfant, mère ! (se tournant à nouveau vers son père) Et toi, tu ne veux pas comprendre que le monde a changé ! Tu veux que je reste ici, enfermé dans tes idées étroites !</p></div></div>",
      "questions": [
        {
          "question": "<p> <strong>Identifie</strong> le genre littéraire de ce texte. (0.5 pt)</p>",
          "reponse": "<p>Il s'agit d'une pièce de <strong>théâtre</strong> (un texte dramatique).</p>"
        },
        {
          "question": "<p> <strong>Relève</strong> un exemple de didascalie et explique son rôle. (1 pt)</p>",
          "reponse": "<p>Exemples de didascalies : <span style='font-style: italic;'>« sans lever les yeux »</span>, <span style='font-style: italic;'>« d'une voix tendue »</span>, <span style='font-style: italic;'>« posant son journal, d'un ton sec »</span>, <span style='font-style: italic;'>« les poings serrés »</span>.<br>Leur rôle est de décrire le comportement, les gestes ou l'intonation des personnages, ce qui permet au lecteur de visualiser la scène et d'interpréter les dialogues.</p>"
        },
        {
          "question": "<p> Quel est le registre dominant de cet extrait ? Justifie ta réponse en relevant deux éléments du texte. (1 pt)</p>",
          "reponse": "<p>Le registre dominant est le <strong>registre tragique</strong> ou <strong>pathétique</strong>. On observe un conflit familial intense, marqué par des relations tendues entre le père et le fils, et une certaine impuissance. Justifications : les gestes du fils (<span style='font-style: italic;'>« les poings serrés »</span>) et le ton sec du père (<span style='font-style: italic;'>« d'un ton sec »</span>).</p>"
        },
        {
          "question": "<p> <strong>Précise</strong> quel est le personnage principal et <strong>justifie</strong> ton choix par une analyse de sa parole et de son action. (1 pt)</p>",
          "reponse": "<p>Le personnage principal est le <strong>Fils</strong>. Il est le moteur du conflit : il prend la parole pour affirmer sa décision, il se révolte contre l'autorité de son père et cherche à s'émanciper. Sa parole est ferme (<span style='font-style: italic;'>« Je suis décidé »</span>) et il prend une initiative (la bourse).</p>"
        },
        {
          "question": "<p> <strong>Écris</strong> trois répliques qui pourraient constituer la suite de cette scène. Respecte les codes du dialogue théâtral (indication des personnages, didascalies éventuelles). (1.5 pt)</p>",
          "reponse": "<p><strong>Réponse modèle :</strong></p><p><span style='font-weight: bold;'>Le Père :</span> (se levant brusquement) Des idées étroites ? Je t'ai toujours offert le meilleur, et voilà comment tu me remercies ?</p><p><span style='font-weight: bold;'>Le Fils :</span> (reculant d'un pas, mais gardant une voix ferme) Je ne te remercie pas, père. Je te demande seulement de me laisser vivre ma vie.</p><p><span style='font-weight: bold;'>La Mère :</span> (s'approchant de son fils, posant une main sur son épaule) Arrêtez, tous les deux, je vous en supplie ! Ne gâchons pas ce moment de joie.</p>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
