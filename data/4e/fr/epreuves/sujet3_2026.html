<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Français",
  "classe": "Quatrième",
  "sequence": "Séquence 3 : La fiction pour interroger le réel",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Compréhension et analyse de texte",
      "points": "8 pts",
      "enonce": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; color: #1a1a1a;'>\n  <p><strong>Lisez attentivement le texte suivant, puis répondez aux questions :</strong></p>\n  <div style='background-color: #ffffff; padding: 15px; border-left: 4px solid #2c3e50; margin: 15px 0; color: #1a1a1a;'>\n    <p>« Depuis ce jour-là, tout fut fini entre nous. Le petit frère que j'avais tant aimé, avec qui j'avais partagé mes jeux, mes rêves et mes peines, n'était plus le même. Il était devenu un étranger. Il ne me parlait plus que pour me donner des ordres ou me reprocher mes fautes. Il avait pris, disait-il, la place de notre père, parti trop tôt. Mais c'était un père sans tendresse, un chef sans pitié. Je le voyais changer sous mes yeux, sous l'influence de ces amis qui l'entouraient, de ces paroles qu'il écoutait, de ce monde d'adultes qui le réclamait. »</p>\n    <p style='text-align: right;'>— Extrait de <em>Le Premier Homme</em>, Albert Camus, 1994.</p>\n  </div>\n  <div style='background-color: #fdf2e9; padding: 10px; border-radius: 5px; color: #1a1a1a;'>\n    <p><strong>Contexte :</strong> Dans ce roman autobiographique, Albert Camus évoque son enfance en Algérie et les relations complexes au sein de sa famille.</p>\n  </div>\n</div>",
      "questions": [
        {
          "question": "<div style='color: #1a1a1a;'>1) <strong>Identifier</strong> le genre de ce texte en vous appuyant sur des indices précis.</div>",
          "reponse": "<div style='color: #1a1a1a;'>Il s'agit d'un récit autobiographique. L'emploi de la première personne (« je », « mon ») et le souvenir personnel évoqué (« Depuis ce jour-là ») sont des indices qui montrent que l'auteur se raconte lui-même.</div>"
        },
        {
          "question": "<div style='color: #1a1a1a;'>2) <strong>Expliquer</strong> en quoi ce texte peut être considéré comme une fiction qui interroge le réel.</div>",
          "reponse": "<div style='color: #1a1a1a;'>Bien que le texte soit inspiré de la vie réelle de l'auteur (autobiographie), il est aussi une fiction car il est raconté sous forme de récit littéraire. Il interroge le réel en montrant comment la mort du père et l'entrée dans le monde des adultes transforment une relation fraternelle, ce qui est une expérience humaine universelle.</div>"
        },
        {
          "question": "<div style='color: #1a1a1a;'>3) <strong>Analyser</strong> l'évolution du personnage du frère dans ce texte. Quels sont les facteurs de ce changement ?</div>",
          "reponse": "<div style='color: #1a1a1a;'>Le frère, autrefois tendre et proche, devient un « étranger » distant, autoritaire (« donner des ordres », « reprocher mes fautes ») et sans pitié (« un chef sans pitié »). Ce changement est dû à la mort du père, qui le contraint à prendre sa place, et à l'influence des adultes et de son entourage (« ces amis qui l'entouraient », « ces paroles qu'il écoutait », « ce monde d'adultes qui le réclamait »).</div>"
        },
        {
          "question": "<div style='color: #1a1a1a;'>4) <strong>Juger</strong> de l'efficacité de la phrase « Mais c'était un père sans tendresse, un chef sans pitié. » pour faire ressentir la douleur du narrateur. Justifiez votre réponse.</div>",
          "reponse": "<div style='color: #1a1a1a;'>Cette phrase est très efficace car elle crée un contraste violent entre l'image attendue d'un père (tendresse, protection) et la réalité décrite (sans tendresse, sans pitié). Les deux courtes propositions nominales, rythmées comme un constat amer, renforcent le sentiment de perte et de déception du narrateur.</div>"
        }
      ]
    },
    {
      "titre": "Étude de la langue : Maîtrise du discours et de la grammaire",
      "points": "6 pts",
      "enonce": "<div style='background-color: #faf0e6; padding: 15px; border-radius: 8px; color: #1a1a1a;'>\n  <p>Réécrivez le passage suivant en respectant les consignes données :</p>\n  <div style='background-color: #ffffff; padding: 15px; border-left: 4px solid #e74c3c; margin: 15px 0; color: #1a1a1a;'>\n    <p>« Le petit frère que j'avais tant aimé, avec qui j'avais partagé mes jeux, mes rêves et mes peines, n'était plus le même. Il était devenu un étranger. Il ne me parlait plus que pour me donner des ordres ou me reprocher mes fautes. »</p>\n  </div>\n</div>",
      "questions": [
        {
          "question": "<div style='color: #1a1a1a;'>5) <strong>Identifier</strong> la proposition subordonnée relative dans la première phrase et précisez son rôle (déterminatif ou explicatif).</div>",
          "reponse": "<div style='color: #1a1a1a;'>Les propositions subordonnées relatives sont « que j'avais tant aimé » et « avec qui j'avais partagé mes jeux, mes rêves et mes peines ». Elles ont un rôle <strong>déterminatif</strong> car elles sont essentielles pour identifier de quel petit frère il s'agit.</div>"
        },
        {
          "question": "<div style='color: #1a1a1a;'>6) <strong>Transformer</strong> les phrases suivantes en une seule phrase complexe utilisant une subordonnée de conséquence. Vous commencerez par « Le frère était tellement changé... ».</div>",
          "reponse": "<div style='color: #1a1a1a;'>« Le frère était tellement changé qu'il ne me parlait plus que pour me donner des ordres ou me reprocher mes fautes. »</div>"
        },
        {
          "question": "<div style='color: #1a1a1a;'>7) <strong>Transposer</strong> le passage suivant au discours indirect. Commencez par « Le narrateur a expliqué que... ».</div>",
          "reponse": "<div style='color: #1a1a1a;'>« Le narrateur a expliqué que le petit frère qu'il avait tant aimé, avec qui il avait partagé ses jeux, ses rêves et ses peines, n'était plus le même. Il était devenu un étranger. Il ne lui parlait plus que pour lui donner des ordres ou lui reprocher ses fautes. »</div>"
        }
      ]
    },
    {
      "titre": "Expression écrite : Lire le monde à travers la fiction",
      "points": "6 pts",
      "enonce": "<div style='background-color: #e8f8f5; padding: 15px; border-radius: 8px; color: #1a1a1a;'>\n  <p><strong>Choisissez l'un des deux sujets suivants et rédigez un texte d'une vingtaine de lignes.</strong></p>\n  <div style='background-color: #ffffff; padding: 15px; border-radius: 5px; margin: 10px 0; color: #1a1a1a;'>\n    <p><strong>Sujet A (Rédaction d'invention) :</strong> En vous inspirant du texte de Camus, racontez un souvenir d'enfance où un événement ou une personne a changé votre regard sur le monde. Votre récit sera à la première personne et contiendra des descriptions précises pour donner l'illusion du réel.</p>\n  </div>\n  <div style='background-color: #ffffff; padding: 15px; border-radius: 5px; margin: 10px 0; color: #1a1a1a;'>\n    <p><strong>Sujet B (Texte argumentatif) :</strong> Pensez-vous que la littérature, et plus particulièrement la fiction, soit un moyen efficace pour dénoncer les injustices de la société ? Rédigez un paragraphe argumenté en donnant au moins deux arguments et un exemple tiré de vos lectures.</p>\n  </div>\n</div>",
      "questions": [
        {
          "question": "<div style='color: #1a1a1a;'>Sujet A ou B : Rédigez votre texte.</div>",
          "reponse": "<div style='color: #1a1a1a;'><strong>Exemple pour le Sujet B :</strong> <br><br>« Oui, la fiction est un moyen redoutablement efficace pour dénoncer les injustices sociales. D'abord, elle permet de toucher le lecteur par l'émotion, en le plongeant dans le quotidien d'un personnage victime d'une situation injuste. En lisant <em>Germinal</em> d'Émile Zola, on ne peut rester indifférent face à la misère des mineurs, et cette empathie est un puissant moteur de prise de conscience. Ensuite, la fiction offre une liberté de ton que n'ont pas les textes purement argumentatifs. Un auteur peut user de l'ironie, de la satire ou du fantastique pour critiquer un régime ou une idée, ce qui rend sa dénonciation parfois plus percutante. »</div>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
