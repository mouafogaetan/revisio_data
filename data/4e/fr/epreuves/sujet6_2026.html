<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Français",
  "classe": "Quatrième",
  "sequence": "Séquence 6",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "La poésie pour dire l'amour et la révolte",
      "points": "10 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; color: #1a1a1a;'><p><strong>Texte :</strong> Extrait de <em>Les Armes miraculeuses</em> d'Aimé Césaire (1946).</p><div style='background-color: #f9f9f9; padding: 15px; border-radius: 8px; color: #1a1a1a; margin: 10px 0; font-style: italic;'>\"Et je suis un homme de ce monde. Je dis la joie des peuples. Je dis la beauté des peuples. Et je suis un homme de ce monde. Je dis la révolte des peuples. Je dis la liberté des peuples. Et je suis un homme de ce monde.\"</div></div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #1a1a1a;'><strong>1. (2 pts)</strong> a) Quelle forme poétique reconnaissez-vous dans ce texte ? Justifiez votre réponse.<br>b) Le poète emploie la première personne du singulier. Quel est l'effet de ce choix ?</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; color: #1a1a1a;'><strong>Correction :</strong><br><strong>a)</strong> Il s'agit d'un poème en prose. Contrairement au sonnet ou au calligramme, il n'y a pas de vers réguliers ni de rimes. Le texte suit une structure proche de la phrase ordinaire, avec des répétitions qui lui donnent une dimension poétique.<br><strong>b)</strong> L'emploi de la première personne (« je ») renforce l'engagement du poète. Il s'exprime en son nom propre, ce qui donne plus de force à son message.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #1a1a1a;'><strong>2. (2 pts)</strong> Relevez les figures de style présentes dans ce texte et expliquez leur effet.</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; color: #1a1a1a;'><strong>Correction :</strong><br>Le texte utilise l'<strong>anaphore</strong> (« Je dis... Je dis... »). Cette répétition en début de vers crée un rythme martelé, donne de l'intensité au discours et insiste sur l'engagement du poète. On peut aussi noter une <strong>personnification</strong> avec « la joie des peuples », « la beauté des peuples », qui rend abstraites des qualités humaines.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #1a1a1a;'><strong>3. (2 pts)</strong> a) Quel est le thème principal de ce poème ?<br>b) S'agit-il d'une poésie lyrique ou engagée ? Justifiez votre réponse.</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; color: #1a1a1a;'><strong>Correction :</strong><br><strong>a)</strong> Le thème principal est la révolte et la lutte pour la liberté des peuples. Le poète prend la parole au nom de tous.<br><strong>b)</strong> Il s'agit d'une poésie <strong>engagée</strong>. Le poète ne se contente pas d'exprimer ses sentiments personnels, il défend une cause collective : la liberté et la dignité des peuples. C'est un appel à la révolte.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #1a1a1a;'><strong>4. (2 pts)</strong> Expliquez l'importance de la poésie comme outil de dénonciation et de résistance.</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; color: #1a1a1a;'><strong>Correction :</strong><br>La poésie est un outil puissant de dénonciation car elle touche les émotions du lecteur. Elle utilise des images, des rythmes et des sonorités pour marquer les esprits. Dans les contextes de lutte (colonisation, dictature), le poète devient une voix pour les opprimés, comme Aimé Césaire qui défendait la négritude.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #1a1a1a;'><strong>5. (2 pts)</strong> Rédigez un court poème (4 à 6 vers) sur un thème qui vous tient à cœur (amour, liberté, amitié, nature, etc.). Utilisez au moins une figure de style (métaphore, personnification, comparaison).</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; color: #1a1a1a;'><strong>Correction :</strong><br>Exemple de production :<br><em>\"La liberté est un oiseau qui vole (métaphore)<br>Par-dessus les murs de la peur.<br>Elle chante sa chanson ardente<br>Dans le cœur de ceux qui se lèvent.<br>Comme un soleil au matin (comparaison),<br>Elle éclaire notre chemin.\"</em></div>"
        }
      ]
    },
    {
      "titre": "Langue et expression écrite",
      "points": "6 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; color: #1a1a1a;'>Cette partie évalue vos connaissances grammaticales et lexicales.</div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #1a1a1a;'><strong>1. (1,5 pts)</strong> Identifiez la nature et la fonction du mot souligné dans les phrases suivantes :<br>a) <u>Heureusement</u>, le ciel s'est dégagé.<br>b) Il a mangé <u>la pomme</u> que sa mère lui a donnée.</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; color: #1a1a1a;'><strong>Correction :</strong><br><strong>a)</strong> \"Heureusement\" est un adverbe, ayant la fonction de complément circonstanciel de manière (ou de phrase).<br><strong>b)</strong> \"la pomme\" est un groupe nominal, ayant la fonction de COD (Complément d'Objet Direct).</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #1a1a1a;'><strong>2. (1,5 pts)</strong> Transformez les phrases suivantes :<br>a) Mettez la phrase à la voix passive : \"Le vent a emporté le chapeau.\"<br>b) Transformez ce dialogue au discours indirect : \"Il m'a dit : 'Je viendrai demain.'\"</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; color: #1a1a1a;'><strong>Correction :</strong><br><strong>a)</strong> \"Le chapeau a été emporté par le vent.\"<br><strong>b)</strong> \"Il m'a dit qu'il viendrait le lendemain.\" (Attention aux changements de temps et d'indicateurs).</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #1a1a1a;'><strong>3. (1,5 pts)</strong> Conjuguez les verbes entre parenthèses au temps demandé :<br>a) (partir) Si j'avais su, je ne __________________ pas. (conditionnel passé)<br>b) Il faut que tu __________________ (venir) avec nous. (subjonctif présent)</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; color: #1a1a1a;'><strong>Correction :</strong><br><strong>a)</strong> \"... je ne serais pas parti(e).\"<br><strong>b)</strong> \"Il faut que tu viennes avec nous.\"</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #1a1a1a;'><strong>4. (1,5 pts)</strong> Retrouvez le champ lexical de la tristesse dans cette liste de mots, puis classez les autres mots selon leur niveau de langage : \"triste\", \"désolé\", \"affligé\", \"chagriné\", \"peiné\", \"navré\".</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; color: #1a1a1a;'><strong>Correction :</strong><br>Tous ces mots appartiennent au champ lexical de la tristesse. Niveaux de langage :<br>- Niveau familier/courant : triste, désolé<br>- Niveau soutenu : affligé, chagriné, peiné, navré.</div>"
        }
      ]
    },
    {
      "titre": "Production écrite : Le poète engagé",
      "points": "6 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; color: #1a1a1a;'><p>Sujet : \"La poésie peut-elle changer le monde ?\"</p><p>Vous répondrez à cette question dans un développement structuré d'une vingtaine de lignes, en vous appuyant sur vos connaissances et sur le texte d'Aimé Césaire.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #1a1a1a;'><strong>1. (6 pts)</strong> Rédigez un texte argumenté en deux ou trois parties. Vous veillerez à :<br>- Présenter clairement votre thèse.<br>- Argumenter en donnant des exemples précis.<br>- Conclure en ouvrant votre réflexion.</div>",
          "reponse": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; color: #1a1a1a;'><strong>Correction :</strong><br>Un élève peut défendre que la poésie ne change pas directement le monde, mais qu'elle peut changer les mentalités, éveiller les consciences et inspirer l'action. Il peut citer des poètes engagés (Aimé Césaire, Jacques Prévert, René Philombe). Il pourrait aussi nuancer en montrant que la poésie seule ne suffit pas, mais qu'elle participe à un mouvement plus large de transformation sociale.</div>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
