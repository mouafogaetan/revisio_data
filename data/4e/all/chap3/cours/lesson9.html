<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }

    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }

    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }

    .content-card li:last-child {
        border-bottom: none;
    }

    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }

    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }

    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }

    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }

    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }

    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }

    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }

    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }

    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }

    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }

    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }

    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }

    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }

    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }

    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }

    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }

    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }

    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }

    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }

    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }

    /* Mode jour (par défaut) - ajouté par le script de thème */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>

<div class="app-container">

    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>

    <main class="slide-body" id="slideBody"></main>

    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>

    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>

        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        
            <button class="btn btn-secondary" id="themeToggle" style="font-size:1.2rem; min-width:40px; padding:8px 12px;" title="Passer en mode nuit">
                🌓
            </button>
        </div>

        <div class="auto-indicator" id="autoIndicator">⏸ Lecture manuelle</div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Bienvenue en classe !",
    "contenu": "<div style='display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; min-height: 50vh; padding: 10px;'> <h2 style='color: #2c3e50;'>Leçon 9 : Mein Wohnort</h2> <h3 style='color: #34495e;'>Mon lieu d'habitation</h3> <p style='font-size: 1.1rem; margin-top: 20px;'>Aujourd'hui, nous allons apprendre à <strong>décrire notre quartier ou notre village</strong> en allemand.</p> <p style='font-size: 1.1rem;'>Vous saurez nommer les lieux importants et donner des indications simples.</p> <div style='background-color: #e8f4f8; padding: 15px; border-radius: 8px; margin-top: 20px;'> <p><strong>Objectif :</strong> Décrire son environnement proche et donner des indications de direction simples.</p> </div> </div>",

    "note": "Introduction de la leçon sur le lieu d'habitation"
  },
  {
    "titre": "Vocabulaire : Les lieux (1/2)",
    "contenu": "<div style='display: flex; flex-direction: column; gap: 15px; padding: 10px;'> <p>Voici le <strong>vocabulaire des lieux</strong> dans un quartier :</p> <div style='overflow-x: auto;'> <table style='width: 100%; border-collapse: collapse; font-size: 0.9rem;'> <thead style='background-color: #343a40; color: white;'> <tr> <th style='padding: 8px; border: 1px solid #ddd;'>Français</th> <th style='padding: 8px; border: 1px solid #ddd;'>Allemand</th> <th style='padding: 8px; border: 1px solid #ddd;'>Genre</th> </tr> </thead> <tbody> <tr style='background-color: #f8f9fa;'> <td style='padding: 8px; border: 1px solid #ddd;'>la maison</td> <td style='padding: 8px; border: 1px solid #ddd;'><strong>das Haus</strong></td> <td style='padding: 8px; border: 1px solid #ddd;'>neutre</td> </tr> <tr style='background-color: #e9ecef;'> <td style='padding: 8px; border: 1px solid #ddd;'>la rue</td> <td style='padding: 8px; border: 1px solid #ddd;'><strong>die Straße</strong></td> <td style='padding: 8px; border: 1px solid #ddd;'>féminin</td> </tr> <tr style='background-color: #f8f9fa;'> <td style='padding: 8px; border: 1px solid #ddd;'>le marché</td> <td style='padding: 8px; border: 1px solid #ddd;'><strong>der Markt</strong></td> <td style='padding: 8px; border: 1px solid #ddd;'>masculin</td> </tr> <tr style='background-color: #e9ecef;'> <td style='padding: 8px; border: 1px solid #ddd;'>l'école</td> <td style='padding: 8px; border: 1px solid #ddd;'><strong>die Schule</strong></td> <td style='padding: 8px; border: 1px solid #ddd;'>féminin</td> </tr> <tr style='background-color: #f8f9fa;'> <td style='padding: 8px; border: 1px solid #ddd;'>l'église</td> <td style='padding: 8px; border: 1px solid #ddd;'><strong>die Kirche</strong></td> <td style='padding: 8px; border: 1px solid #ddd;'>féminin</td> </tr> <tr style='background-color: #e9ecef;'> <td style='padding: 8px; border: 1px solid #ddd;'>la mosquée</td> <td style='padding: 8px; border: 1px solid #ddd;'><strong>die Moschee</strong></td> <td style='padding: 8px; border: 1px solid #ddd;'>féminin</td> </tr> <tr style='background-color: #f8f9fa;'> <td style='padding: 8px; border: 1px solid #ddd;'>le magasin</td> <td style='padding: 8px; border: 1px solid #ddd;'><strong>das Geschäft</strong></td> <td style='padding: 8px; border: 1px solid #ddd;'>neutre</td> </tr> </tbody> </table> </div> <div style='background-color: #d1ecf1; padding: 15px; border-radius: 8px; margin-top: 10px;'> <p><strong>Astuce :</strong> Apprenez chaque mot avec son article pour retenir son genre !</p> </div> </div>",
    "texteParle": "Commençons par apprendre le vocabulaire des lieux dans un quartier. 'Das Haus' signifie 'la maison', 'die Straße' signifie 'la rue', 'der Markt' signifie 'le marché', 'die Schule' signifie 'l'école', 'die Kirche' signifie 'l'église', 'die Moschee' signifie 'la mosquée', et 'das Geschäft' signifie 'le magasin'. N'oubliez pas d'apprendre chaque mot avec son article pour connaître son genre.",
    "note": "Vocabulaire des lieux dans un quartier"
  },
  {
    "titre": "Vocabulaire : Les lieux (2/2)",
    "contenu": "<div style='display: flex; flex-direction: column; gap: 15px; padding: 10px;'> <p>Autres <strong>lieux importants</strong> :</p> <div style='overflow-x: auto;'> <table style='width: 100%; border-collapse: collapse; font-size: 0.9rem;'> <thead style='background-color: #343a40; color: white;'> <tr> <th style='padding: 8px; border: 1px solid #ddd;'>Français</th> <th style='padding: 8px; border: 1px solid #ddd;'>Allemand</th> <th style='padding: 8px; border: 1px solid #ddd;'>Genre</th> </tr> </thead> <tbody> <tr style='background-color: #f8f9fa;'> <td style='padding: 8px; border: 1px solid #ddd;'>l'hôpital</td> <td style='padding: 8px; border: 1px solid #ddd;'><strong>das Krankenhaus</strong></td> <td style='padding: 8px; border: 1px solid #ddd;'>neutre</td> </tr> <tr style='background-color: #e9ecef;'> <td style='padding: 8px; border: 1px solid #ddd;'>la banque</td> <td style='padding: 8px; border: 1px solid #ddd;'><strong>die Bank</strong></td> <td style='padding: 8px; border: 1px solid #ddd;'>féminin</td> </tr> <tr style='background-color: #f8f9fa;'> <td style='padding: 8px; border: 1px solid #ddd;'>le cinéma</td> <td style='padding: 8px; border: 1px solid #ddd;'><strong>das Kino</strong></td> <td style='padding: 8px; border: 1px solid #ddd;'>neutre</td> </tr> <tr style='background-color: #e9ecef;'> <td style='padding: 8px; border: 1px solid #ddd;'>le restaurant</td> <td style='padding: 8px; border: 1px solid #ddd;'><strong>das Restaurant</strong></td> <td style='padding: 8px; border: 1px solid #ddd;'>neutre</td> </tr> <tr style='background-color: #f8f9fa;'> <td style='padding: 8px; border: 1px solid #ddd;'>la poste</td> <td style='padding: 8px; border: 1px solid #ddd;'><strong>die Post</strong></td> <td style='padding: 8px; border: 1px solid #ddd;'>féminin</td> </tr> <tr style='background-color: #e9ecef;'> <td style='padding: 8px; border: 1px solid #ddd;'>la mairie</td> <td style='padding: 8px; border: 1px solid #ddd;'><strong>das Rathaus</strong></td> <td style='padding: 8px; border: 1px solid #ddd;'>neutre</td> </tr> <tr style='background-color: #f8f9fa;'> <td style='padding: 8px; border: 1px solid #ddd;'>le parc</td> <td style='padding: 8px; border: 1px solid #ddd;'><strong>der Park</strong></td> <td style='padding: 8px; border: 1px solid #ddd;'>masculin</td> </tr> </tbody> </table> </div> <div style='background-color: #d1ecf1; padding: 15px; border-radius: 8px; margin-top: 10px;'> <p><strong>Astuce :</strong> En allemand, les noms de lieux ont des genres différents. Il faut les apprendre avec leur article !</p> </div> </div>",
    "texteParle": "Voici d'autres lieux importants. 'Das Krankenhaus' signifie 'l'hôpital', 'die Bank' signifie 'la banque', 'das Kino' signifie 'le cinéma', 'das Restaurant' signifie 'le restaurant', 'die Post' signifie 'la poste', 'das Rathaus' signifie 'la mairie', et 'der Park' signifie 'le parc'. Ces mots vous permettront de décrire les différents endroits de votre quartier ou de votre village.",
    "note": "Autres lieux importants dans un quartier"
  },
  {
    "titre": "Décrire son quartier",
    "contenu": "<div style='display: flex; flex-direction: column; gap: 15px; padding: 10px;'> <p>Pour <strong>décrire son quartier</strong>, on utilise la structure :</p> <div style='background-color: #d4edda; padding: 15px; border-radius: 8px;'> <p style='text-align: center; font-size: 1.1rem;'><span style='font-weight: bold;'>Mein</span> + <span style='color: #007bff;'>lieu</span> + <span style='font-weight: bold;'>ist</span> + <span style='color: #28a745;'>adjectif</span>.</p> </div> <div style='background-color: #d4edda; padding: 15px; border-radius: 8px; margin-top: 10px;'> <ul style='list-style-type: none; padding: 0;'> <li style='background-color: #f0f0f0; margin-bottom: 8px; padding: 10px; border-radius: 8px;'> <span style='font-weight: bold;'>Mein Wohnort ist</span> <span style='color: #007bff;'>schön</span>. → <span style='color: #28a745;'>Mon lieu d'habitation est beau.</span> </li> <li style='background-color: #f0f0f0; margin-bottom: 8px; padding: 10px; border-radius: 8px;'> <span style='font-weight: bold;'>Mein Dorf ist</span> <span style='color: #007bff;'>klein</span>. → <span style='color: #28a745;'>Mon village est petit.</span> </li> <li style='background-color: #f0f0f0; margin-bottom: 8px; padding: 10px; border-radius: 8px;'> <span style='font-weight: bold;'>Meine Stadt ist</span> <span style='color: #007bff;'>groß</span>. → <span style='color: #28a745;'>Ma ville est grande.</span> </li> <li style='background-color: #f0f0f0; margin-bottom: 8px; padding: 10px; border-radius: 8px;'> <span style='font-weight: bold;'>Mein Viertel ist</span> <span style='color: #007bff;'>ruhig</span>. → <span style='color: #28a745;'>Mon quartier est calme.</span> </li> </ul> </div> <div style='background-color: #fff3cd; padding: 15px; border-radius: 8px; margin-top: 10px;'> <p><strong>Vocabulaire utile :</strong> <em>groß</em> (grand), <em>klein</em> (petit), <em>schön</em> (beau), <em>ruhig</em> (calme), <em>laut</em> (bruyant), <em>modern</em> (moderne).</p> </div> </div>",
    "texteParle": "Pour décrire votre quartier, on utilise la structure 'Mein ... ist ...' qui signifie 'Mon ... est ...'. Par exemple, 'Mein Wohnort ist schön' signifie 'Mon lieu d'habitation est beau'. 'Mein Dorf ist klein' signifie 'Mon village est petit'. 'Meine Stadt ist groß' signifie 'Ma ville est grande'. 'Mein Viertel ist ruhig' signifie 'Mon quartier est calme'. Vous pouvez utiliser des adjectifs comme 'groß' (grand), 'klein' (petit), 'schön' (beau), 'ruhig' (calme), 'laut' (bruyant) ou 'modern' (moderne).",
    "note": "Structure pour décrire son quartier"
  },
  {
    "titre": "Les prépositions de lieu",
    "contenu": "<div style='display: flex; flex-direction: column; gap: 15px; padding: 10px;'> <p>Pour situer les lieux, on utilise les <strong>prépositions de lieu</strong> :</p> <div style='overflow-x: auto;'> <table style='width: 100%; border-collapse: collapse; font-size: 1rem;'> <thead style='background-color: #007bff; color: white;'> <tr> <th style='padding: 10px; border: 1px solid #ddd;'>Français</th> <th style='padding: 10px; border: 1px solid #ddd;'>Allemand</th> <th style='padding: 10px; border: 1px solid #ddd;'>Cas</th> </tr> </thead> <tbody> <tr style='background-color: #f8f9fa;'> <td style='padding: 10px; border: 1px solid #ddd;'>à côté de</td> <td style='padding: 10px; border: 1px solid #ddd;'><strong>neben</strong></td> <td style='padding: 10px; border: 1px solid #ddd;'>datif</td> </tr> <tr style='background-color: #e9ecef;'> <td style='padding: 10px; border: 1px solid #ddd;'>entre</td> <td style='padding: 10px; border: 1px solid #ddd;'><strong>zwischen</strong></td> <td style='padding: 10px; border: 1px solid #ddd;'>datif</td> </tr> <tr style='background-color: #f8f9fa;'> <td style='padding: 10px; border: 1px solid #ddd;'>en face de</td> <td style='padding: 10px; border: 1px solid #ddd;'><strong>gegenüber</strong></td> <td style='padding: 10px; border: 1px solid #ddd;'>datif</td> </tr> <tr style='background-color: #e9ecef;'> <td style='padding: 10px; border: 1px solid #ddd;'>derrière</td> <td style='padding: 10px; border: 1px solid #ddd;'><strong>hinter</strong></td> <td style='padding: 10px; border: 1px solid #ddd;'>datif</td> </tr> <tr style='background-color: #f8f9fa;'> <td style='padding: 10px; border: 1px solid #ddd;'>devant</td> <td style='padding: 10px; border: 1px solid #ddd;'><strong>vor</strong></td> <td style='padding: 10px; border: 1px solid #ddd;'>datif</td> </tr> <tr style='background-color: #e9ecef;'> <td style='padding: 10px; border: 1px solid #ddd;'>dans</td> <td style='padding: 10px; border: 1px solid #ddd;'><strong>in</strong></td> <td style='padding: 10px; border: 1px solid #ddd;'>datif / accusatif</td> </tr> </tbody> </table> </div> <div style='background-color: #d4edda; padding: 15px; border-radius: 8px; margin-top: 10px;'> <p><span style='color: #007bff;'>Exemples :</span></p> <ul style='list-style-type: none; padding: 0;'> <li>Die Schule ist <strong>neben</strong> der Kirche. → L'école est <strong>à côté de</strong> l'église.</li> <li>Das Geschäft ist <strong>gegenüber</strong> dem Markt. → Le magasin est <strong>en face de</strong> marché.</li> </ul> </div> </div>",
    "texteParle": "Pour situer les lieux les uns par rapport aux autres, on utilise des prépositions de lieu. 'Neben' signifie 'à côté de', 'zwischen' signifie 'entre', 'gegenüber' signifie 'en face de', 'hinter' signifie 'derrière', 'vor' signifie 'devant', et 'in' signifie 'dans'. Par exemple, 'Die Schule ist neben der Kirche' signifie 'L'école est à côté de l'église'. 'Das Geschäft ist gegenüber dem Markt' signifie 'Le magasin est en face du marché'.",
    "note": "Prépositions de lieu pour situer les lieux"
  },
  {
    "titre": "Donner des indications simples",
    "contenu": "<div style='display: flex; flex-direction: column; gap: 15px; padding: 10px;'> <p>Voici comment <strong>donner des indications</strong> simples :</p> <div style='background-color: #d4edda; padding: 15px; border-radius: 8px;'> <ul style='list-style-type: none; padding: 0;'> <li style='background-color: #f0f0f0; margin-bottom: 8px; padding: 10px; border-radius: 8px;'> <span style='font-weight: bold;'>Gehen Sie</span> <span style='color: #007bff;'>geradeaus</span> ! → <span style='color: #28a745;'>Allez</span> tout droit ! </li> <li style='background-color: #f0f0f0; margin-bottom: 8px; padding: 10px; border-radius: 8px;'> <span style='font-weight: bold;'>Biegen Sie</span> <span style='color: #007bff;'>links</span> ab ! → <span style='color: #28a745;'>Tournez</span> à gauche ! </li> <li style='background-color: #f0f0f0; margin-bottom: 8px; padding: 10px; border-radius: 8px;'> <span style='font-weight: bold;'>Biegen Sie</span> <span style='color: #007bff;'>rechts</span> ab ! → <span style='color: #28a745;'>Tournez</span> à droite ! </li> <li style='background-color: #f0f0f0; margin-bottom: 8px; padding: 10px; border-radius: 8px;'> <span style='font-weight: bold;'>Nehmen Sie</span> <span style='color: #007bff;'>die erste Straße links</span> ! → <span style='color: #28a745;'>Prenez</span> la première rue à gauche ! </li> <li style='background-color: #f0f0f0; margin-bottom: 8px; padding: 10px; border-radius: 8px;'> <span style='font-weight: bold;'>Es ist</span> <span style='color: #007bff;'>nicht weit</span>. → <span style='color: #28a745;'>Ce n'est pas loin</span>. </li> </ul> </div> <div style='background-color: #fff3cd; padding: 15px; border-radius: 8px; margin-top: 10px;'> <p><strong>Remarque :</strong> On utilise la forme de politesse <em>Sie</em> pour donner des indications.</p> </div> </div>",
    "texteParle": "Pour donner des indications simples, on utilise des expressions comme 'Gehen Sie geradeaus' qui signifie 'Allez tout droit'. 'Biegen Sie links ab' signifie 'Tournez à gauche'. 'Biegen Sie rechts ab' signifie 'Tournez à droite'. 'Nehmen Sie die erste Straße links' signifie 'Prenez la première rue à gauche'. Et 'Es ist nicht weit' signifie 'Ce n'est pas loin'. On utilise la forme de politesse 'Sie' quand on donne des indications à quelqu'un qu'on ne connaît pas.",
    "note": "Donner des indications de direction"
  },
  {
    "titre": "Demander son chemin",
    "contenu": "<div style='display: flex; flex-direction: column; gap: 15px; padding: 10px;'> <p>Voici comment <strong>demander son chemin</strong> :</p> <div style='background-color: #d4edda; padding: 15px; border-radius: 8px;'> <ul style='list-style-type: none; padding: 0;'> <li style='background-color: #f0f0f0; margin-bottom: 8px; padding: 10px; border-radius: 8px;'> <span style='font-weight: bold;'>Entschuldigung</span>, wo ist der Markt ? → <span style='color: #28a745;'>Excusez-moi</span>, où est le marché ? </li> <li style='background-color: #f0f0f0; margin-bottom: 8px; padding: 10px; border-radius: 8px;'> <span style='font-weight: bold;'>Wie komme ich</span> zur Kirche ? → <span style='color: #28a745;'>Comment</span> vais-je à l'église ? </li> <li style='background-color: #f0f0f0; margin-bottom: 8px; padding: 10px; border-radius: 8px;'> <span style='font-weight: bold;'>Ist das</span> der Weg zum Rathaus ? → <span style='color: #28a745;'>Est-ce que</span> c'est le chemin pour la mairie ? </li> <li style='background-color: #f0f0f0; margin-bottom: 8px; padding: 10px; border-radius: 8px;'> <span style='font-weight: bold;'>Wie weit ist</span> die Post ? → <span style='color: #28a745;'>À quelle distance</span> est la poste ? </li> </ul> </div> <div style='background-color: #d1ecf1; padding: 15px; border-radius: 8px; margin-top: 10px;'> <p><strong>Structure :</strong> <span style='font-weight: bold;'>Entschuldigung</span> + <span style='color: #007bff;'>mot interrogatif</span> + <span style='color: #dc3545;'>verbe</span> + <span style='color: #28a745;'>lieu</span> ?</p> </div> </div>",
    "texteParle": "Quand on ne connaît pas le chemin, on peut demander avec des expressions comme 'Entschuldigung, wo ist der Markt ?' qui signifie 'Excusez-moi, où est le marché ?'. 'Wie komme ich zur Kirche ?' signifie 'Comment vais-je à l'église ?'. 'Ist das der Weg zum Rathaus ?' signifie 'Est-ce que c'est le chemin pour la mairie ?'. Et 'Wie weit ist die Post ?' signifie 'À quelle distance est la poste ?'. Ces expressions sont très utiles quand on se déplace.",
    "note": "Demander son chemin"
  },
  {
    "titre": "Décrire son environnement",
    "contenu": "<div style='display: flex; flex-direction: column; gap: 15px; padding: 10px;'> <p>Pour <strong>décrire son environnement</strong>, on peut utiliser :</p> <div style='background-color: #d4edda; padding: 15px; border-radius: 8px;'> <ul style='list-style-type: none; padding: 0;'> <li style='background-color: #f0f0f0; margin-bottom: 8px; padding: 10px; border-radius: 8px;'> <span style='font-weight: bold;'>In meinem Viertel gibt es</span> <span style='color: #007bff;'>einen Markt</span>. → <span style='color: #28a745;'>Dans mon quartier, il y a</span> un marché. </li> <li style='background-color: #f0f0f0; margin-bottom: 8px; padding: 10px; border-radius: 8px;'> <span style='font-weight: bold;'>In meinem Viertel gibt es</span> <span style='color: #007bff;'>eine Schule</span>. → <span style='color: #28a745;'>Dans mon quartier, il y a</span> une école. </li> <li style='background-color: #f0f0f0; margin-bottom: 8px; padding: 10px; border-radius: 8px;'> <span style='font-weight: bold;'>In meinem Viertel gibt es</span> <span style='color: #007bff;'>kein Kino</span>. → <span style='color: #28a745;'>Dans mon quartier, il n'y a pas</span> de cinéma. </li> <li style='background-color: #f0f0f0; margin-bottom: 8px; padding: 10px; border-radius: 8px;'> <span style='font-weight: bold;'>Mein Haus ist</span> <span style='color: #007bff;'>groß und modern</span>. → <span style='color: #28a745;'>Ma maison est</span> grande et moderne. </li> </ul> </div> <div style='background-color: #d1ecf1; padding: 15px; border-radius: 8px; margin-top: 10px;'> <p><strong>Structure :</strong> <span style='font-weight: bold;'>In meinem Viertel gibt es</span> + <span style='color: #007bff;'>lieu</span>.</p> </div> </div>",
    "texteParle": "Pour décrire votre environnement, vous pouvez utiliser l'expression 'In meinem Viertel gibt es' qui signifie 'Dans mon quartier, il y a'. Par exemple, 'In meinem Viertel gibt es einen Markt' signifie 'Dans mon quartier, il y a un marché'. 'In meinem Viertel gibt es eine Schule' signifie 'Dans mon quartier, il y a une école'. Si vous voulez dire qu'il n'y a pas quelque chose, on utilise 'kein' : 'In meinem Viertel gibt es kein Kino' signifie 'Dans mon quartier, il n'y a pas de cinéma'. On peut aussi décrire sa maison : 'Mein Haus ist groß und modern' signifie 'Ma maison est grande et moderne'.",
    "note": "Décrire son environnement avec 'es gibt'"
  },
  {
    "titre": "Exemple : Description d'un quartier",
    "contenu": "<div style='display: flex; flex-direction: column; gap: 15px; padding: 10px;'> <p>Voici un <strong>exemple</strong> de description d'un quartier :</p> <div style='background-color: #e8f4f8; padding: 20px; border-radius: 8px;'> <p style='font-size: 1.1rem;'><strong>Mein Viertel</strong></p> <p>Ich wohne in einem kleinen Dorf. Mein Dorf ist ruhig und schön. In meinem Dorf gibt es eine kleine Schule, eine Kirche und einen Markt. Das Rathaus ist im Zentrum. Die Post ist neben dem Rathaus. Mein Haus ist in der Hauptstraße. Es ist nicht groß, aber modern. Ich mag mein Dorf sehr.</p> </div> <div style='background-color: #d1ecf1; padding: 15px; border-radius: 8px; margin-top: 10px;'> <p><strong>Traduction :</strong></p> <p>J'habite dans un petit village. Mon village est calme et beau. Dans mon village, il y a une petite école, une église et un marché. La mairie est au centre. La poste est à côté de la mairie. Ma maison est dans la rue principale. Elle n'est pas grande, mais moderne. J'aime beaucoup mon village.</p> </div> </div>",
    "texteParle": "Voici un exemple complet de description d'un quartier. On dit 'Ich wohne in einem kleinen Dorf' qui signifie 'J'habite dans un petit village'. 'Mein Dorf ist ruhig und schön' signifie 'Mon village est calme et beau'. 'In meinem Dorf gibt es eine kleine Schule, eine Kirche und einen Markt' signifie 'Dans mon village, il y a une petite école, une église et un marché'. On peut aussi situer les lieux : 'Das Rathaus ist im Zentrum' signifie 'La mairie est au centre'. 'Die Post ist neben dem Rathaus' signifie 'La poste est à côté de la mairie'. Et on finit avec 'Ich mag mein Dorf sehr' qui signifie 'J'aime beaucoup mon village'.",
    "note": "Exemple de description d'un quartier"
  },
  {
    "titre": "Exercice : Décrivez votre quartier",
    "contenu": "<div style='display: flex; flex-direction: column; gap: 15px; padding: 10px;'> <p>À vous de jouer ! Répondez aux questions sur votre <strong>quartier</strong>.</p> <div style='background-color: #fff3cd; padding: 15px; border-radius: 8px;'> <p><strong>Questions :</strong></p> <ul style='list-style-type: none; padding: 0;'> <li style='background-color: #f0f0f0; margin-bottom: 8px; padding: 10px; border-radius: 8px;'> <span style='font-weight: bold;'>1.</span> Wo wohnst du ? (Où habites-tu ?)</li> <li style='background-color: #f0f0f0; margin-bottom: 8px; padding: 10px; border-radius: 8px;'> <span style='font-weight: bold;'>2.</span> Wie ist dein Viertel ? (Comment est ton quartier ?)</li> <li style='background-color: #f0f0f0; margin-bottom: 8px; padding: 10px; border-radius: 8px;'> <span style='font-weight: bold;'>3.</span> Was gibt es in deinem Viertel ? (Qu'y a-t-il dans ton quartier ?)</li> <li style='background-color: #f0f0f0; margin-bottom: 8px; padding: 10px; border-radius: 8px;'> <span style='font-weight: bold;'>4.</span> Wo ist der Markt ? (Où est le marché ?)</li> <li style='background-color: #f0f0f0; margin-bottom: 8px; padding: 10px; border-radius: 8px;'> <span style='font-weight: bold;'>5.</span> Gefällt dir dein Viertel ? (Aimes-tu ton quartier ?)</li> </ul> </;

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;

    const total = slides.length;
    const synth = window.speechSynthesis;

    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }

    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }

    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        
        loadingCancelled = false;
        isLoading = true;
        
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }

    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }

    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }

    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }

    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }

    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }

    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);

        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }

    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }

            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }

            // Arrêter toute lecture en cours
            stopSpeaking();
            
            // Réinitialiser l'état de pause
            isPaused = false;
            
            showLoading();
            setStatus("Initialisation...", 'loading');

            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;

                let isFinished = false;
                let errorHandled = false;

                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };

                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };

                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    
                    resolve();
                };

                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }

                currentUtterance = utterance;
                
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }

            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }

    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        // Arrêter complètement la lecture
        stopSpeaking();
        
        await new Promise(r => setTimeout(r, 50));
        
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }

        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');

        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }

    async function goToNext() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }

    async function goToPrev() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }

    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }

        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }

        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }

        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }

        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }

    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }

        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }

        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');

        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });

        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });

        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });

        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });

        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });

        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });

        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });

        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }

    init();
});


    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;

    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');

        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            if (header) header.style.background = 'rgba(15, 23, 42, 0.85)';
            if (footer) footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            if (header) header.style.background = 'rgba(255, 255, 255, 0.85)';
            if (footer) footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }

    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
            // Ajouter l'écouteur d'événement click
            themeBtn.addEventListener('click', toggleTheme);
        }
    });

</script>
