<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Anglais",
  "classe": "Quatrième",
  "sequence": "Séquence 5",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Grammaire (Temps et voix)",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1.1rem; line-height: 1.6;'><p>Complétez les phrases suivantes en conjuguant le verbe entre parenthèses au temps qui convient.</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 12px;'><strong>1.</strong> My father (work) <input type='text' style='border: none; border-bottom: 1px solid #000; width: 120px;' placeholder='...'> as a teacher for twenty years.</div>",
          "reponse": "<div><strong>1.</strong> My father <strong>has worked</strong> as a teacher for twenty years. (Present perfect pour une durée jusqu'au présent).</div>"
        },
        {
          "question": "<div style='margin-bottom: 12px;'><strong>2.</strong> Last year, we (visit) <input type='text' style='border: none; border-bottom: 1px solid #000; width: 120px;' placeholder='...'> our grandparents in Douala.</div>",
          "reponse": "<div><strong>2.</strong> Last year, we <strong>visited</strong> our grandparents in Douala. (Past simple pour une action achevée dans le passé).</div>"
        },
        {
          "question": "<div style='margin-bottom: 12px;'><strong>3.</strong> The car (repair) <input type='text' style='border: none; border-bottom: 1px solid #000; width: 120px;' placeholder='...'> by the mechanic now.</div>",
          "reponse": "<div><strong>3.</strong> The car <strong>is being repaired</strong> by the mechanic now. (Passive voice au présent continu).</div>"
        },
        {
          "question": "<div style='margin-bottom: 12px;'><strong>4.</strong> If I (be) <input type='text' style='border: none; border-bottom: 1px solid #000; width: 120px;' placeholder='...'> you, I (accept) <input type='text' style='border: none; border-bottom: 1px solid #000; width: 120px;' placeholder='...'> the offer.</div>",
          "reponse": "<div><strong>4.</strong> If I <strong>were</strong> you, I <strong>would accept</strong> the offer. (Conditionnel type 2 pour un conseil).</div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Grammaire et vocabulaire",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1.1rem; line-height: 1.6;'><p><strong>Partie A :</strong> Remplacez les mots soulignés par le pronom relatif qui convient (who, which, whose).</p><p><strong>Partie B :</strong> Formez des adverbes à partir des adjectifs donnés.</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 8px;'><strong>Partie A (2 pts)</strong></div><div style='margin-bottom: 12px;'>1. The girl <u>is my sister</u>. She is wearing a red dress.</div>",
          "reponse": "<div><strong>1.</strong> The girl <strong>who</strong> is wearing a red dress is my sister.</div>"
        },
        {
          "question": "<div style='margin-bottom: 12px;'>2. The book <u>is on the table</u>. I borrowed it from the library.</div>",
          "reponse": "<div><strong>2.</strong> The book <strong>which</strong> I borrowed from the library is on the table.</div>"
        },
        {
          "question": "<div style='margin-bottom: 12px;'>3. The man <u>is a teacher</u>. His son is in my class.</div>",
          "reponse": "<div><strong>3.</strong> The man <strong>whose</strong> son is in my class is a teacher.</div>"
        },
        {
          "question": "<div style='margin-bottom: 8px;'><strong>Partie B (2 pts)</strong></div><div style='margin-bottom: 12px;'>Formez des adverbes à partir des adjectifs suivants :<br/><strong>1.</strong> happy → <input type='text' style='border: none; border-bottom: 1px solid #000; width: 120px;' placeholder='...'><br/><strong>2.</strong> quick → <input type='text' style='border: none; border-bottom: 1px solid #000; width: 120px;' placeholder='...'><br/><strong>3.</strong> careful → <input type='text' style='border: none; border-bottom: 1px solid #000; width: 120px;' placeholder='...'><br/><strong>4.</strong> easy → <input type='text' style='border: none; border-bottom: 1px solid #000; width: 120px;' placeholder='...'></div>",
          "reponse": "<div><strong>Partie B :</strong><br/>1. <strong>happily</strong><br/>2. <strong>quickly</strong><br/>3. <strong>carefully</strong><br/>4. <strong>easily</strong></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Compréhension écrite",
      "points": "6 pts",
      "enonce": "<div style='font-size: 1.1rem; line-height: 1.6;'><p><strong>Lisez le texte suivant et répondez aux questions.</strong></p><div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; margin: 15px 0; color: #1a1a1a;'><p><em>In Cameroon, many young people are worried about ICT illiteracy. They believe that knowing how to use computers and smartphones is very important for their future. For example, WhatsApp and Viber are used to communicate with friends and family. The internet helps students to do research for their school work. However, some people do not have access to the internet. They feel left behind. This is why the government is building more cybercafés in rural areas. It is also training teachers to use ICTs in the classroom.</em></p></div></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 12px;'><strong>1.</strong> What are many young people in Cameroon worried about?</div>",
          "reponse": "<div><strong>1.</strong> They are worried about <strong>ICT illiteracy</strong>.</div>"
        },
        {
          "question": "<div style='margin-bottom: 12px;'><strong>2.</strong> Why do they believe knowing how to use ICTs is important?</div>",
          "reponse": "<div><strong>2.</strong> They believe it is important <strong>for their future</strong>.</div>"
        },
        {
          "question": "<div style='margin-bottom: 12px;'><strong>3.</strong> Name two communication apps mentioned in the text.</div>",
          "reponse": "<div><strong>3.</strong> Two apps mentioned are <strong>WhatsApp and Viber</strong>.</div>"
        },
        {
          "question": "<div style='margin-bottom: 12px;'><strong>4.</strong> What problem do some people face according to the text?</div>",
          "reponse": "<div><strong>4.</strong> Some people <strong>do not have access to the internet</strong>.</div>"
        },
        {
          "question": "<div style='margin-bottom: 12px;'><strong>5.</strong> What is the government doing to solve this problem?</div>",
          "reponse": "<div><strong>5.</strong> The government is <strong>building more cybercafés in rural areas</strong> and <strong>training teachers</strong> to use ICTs.</div>"
        },
        {
          "question": "<div style='margin-bottom: 12px;'><strong>6.</strong> According to you, why is it important to know how to use ICTs?</div>",
          "reponse": "<div><strong>6.</strong> (Réponse personnelle attendue, par exemple : <em>It is important because it helps to find information and to communicate with others.</em>)</div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Expression écrite",
      "points": "6 pts",
      "enonce": "<div style='font-size: 1.1rem; line-height: 1.6;'><p>Choisissez l’un des deux sujets suivants et rédigez un texte d’environ <strong>100 à 150 mots</strong>.</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 12px;'><strong>Sujet 1 :</strong> Racontez comment vous avez utilisé un outil ICT (comme un ordinateur ou un smartphone) pour faire vos devoirs ou communiquer avec un ami. Dites ce que vous avez fait et ce que vous en avez pensé.</div>",
          "reponse": "<div><strong>Sujet 1 :</strong> (Exemple de réponse)<br/><br/><em>Last week, I used my smartphone to do my homework. My teacher asked us to research the history of Cameroon. I opened my browser and searched for information. I found many interesting facts. I also used WhatsApp to discuss the assignment with my friend Marie. We shared ideas and helped each other. I think ICTs are very useful for students. They make learning easier and faster. However, we must use them wisely and not spend too much time on social media.</em></div>"
        },
        {
          "question": "<div style='margin-bottom: 12px;'><strong>Sujet 2 :</strong> Dans votre école, un conflit oppose deux groupes d’élèves. Écrivez un court dialogue où vous proposez des solutions pour résoudre ce conflit.</div>",
          "reponse": "<div><strong>Sujet 2 :</strong> (Exemple de réponse)<br/><br/><em><strong>Me:</strong> Good morning, everyone. I heard there is a problem between the two groups. Can we talk about it?<br/><strong>Student A:</strong> Yes, we don't agree about the use of the football field.<br/><strong>Me:</strong> I understand. What if we use the field on different days?<br/><strong>Student B:</strong> That's a good idea. We can use it on Mondays and Wednesdays.<br/><strong>Me:</strong> And the other group can use it on Tuesdays and Thursdays. What do you think?<br/><strong>Student A:</strong> I agree. This is a fair solution.<br/><strong>Me:</strong> Great! Let's inform the teacher about our decision.</em></div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
