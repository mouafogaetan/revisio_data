<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "SVTEEHB (Sciences de la Vie, de la Terre, Éducation à l'Environnement, Hygiène et Biologie)",
  "classe": "Quatrième",
  "sequence": "Évaluation séquentielle n°5",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Évaluation des Ressources (Appareil Digestif et Nutrition)",
      "points": "8 pts",
      "enonce": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; line-height: 1.6; color: #2d3748; background-color: #f7fafc; padding: 1.5rem; border-radius: 12px; max-width: 100%;'><h2 style='font-size: 1.25rem; font-weight: 600; color: #1a202c; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem; margin-bottom: 1rem;'>🍎 Exercice 1 : Comprendre la digestion</h2><p style='margin-bottom: 1rem;'>L'appareil digestif humain est un système complexe qui permet de transformer les aliments en nutriments assimilables par l'organisme. Il est constitué du <strong>tube digestif</strong> et des <strong>glandes annexes</strong>.</p><div style='background-color: #ebf8ff; padding: 1rem; border-radius: 0.5rem; border-left: 4px solid #3182ce; margin-bottom: 1rem;'><p style='margin: 0; font-weight: 500; color: #2c5282;'>📌 Document :</p><p style='margin: 0.5rem 0 0 0; font-style: italic;'>« Les aliments subissent dans le tube digestif une transformation chimique grâce à l'action de substances appelées enzymes. Cette transformation permet le passage des nutriments dans le sang. »</p></div><h2 style='font-size: 1.1rem; font-weight: 600; color: #1a202c; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.3rem; margin-top: 1.5rem;'>📋 Questions :</h2></div>",
      "questions": [
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>1)</strong> Citer les organes du tube digestif humain dans l'ordre de passage des aliments. <span style='font-weight: 600; color: #2b6cb0;'>(2 pts)</span></p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong> Les organes du tube digestif humain, dans l'ordre, sont :</p><ul style='list-style-type: disc; padding-left: 1.5rem;'><li><strong>Bouche</strong> (cavité buccale) → <strong>Pharynx</strong> → <strong>Œsophage</strong> → <strong>Estomac</strong> → <strong>Intestin grêle</strong> → <strong>Gros intestin</strong> → <strong>Anus</strong>.</li></ul></div>"
        },
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>2)</strong> Distinguer la digestion mécanique de la digestion chimique. <span style='font-weight: 600; color: #2b6cb0;'>(2 pts)</span></p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong></p><ul style='list-style-type: disc; padding-left: 1.5rem;'><li><strong>Digestion mécanique :</strong> C'est le broyage, le brassage et le mélange des aliments. Elle se fait par les dents (mastication) et les mouvements de l'estomac et de l'intestin. Exemple : la mastication des aliments dans la bouche.</li><li><strong>Digestion chimique :</strong> C'est la transformation des aliments en nutriments grâce à l'action des enzymes. Exemple : la digestion des protéines dans l'estomac par la pepsine.</li></ul></div>"
        },
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>3)</strong> Expliquer le rôle des enzymes dans la digestion. <span style='font-weight: 600; color: #2b6cb0;'>(2 pts)</span></p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong> Les <strong>enzymes</strong> sont des substances chimiques qui agissent comme des <strong>catalyseurs</strong> : elles accélèrent les réactions chimiques de la digestion sans être consommées. Chaque enzyme est spécifique d'un type d'aliment. Par exemple :</p><ul style='list-style-type: disc; padding-left: 1.5rem;'><li>Les <strong>amylases</strong> dégradent les amidons en sucres simples.</li><li>Les <strong>protéases</strong> dégradent les protéines en acides aminés.</li><li>Les <strong>lipases</strong> dégradent les lipides en acides gras et glycérol.</li></ul><p>Grâce aux enzymes, les grosses molécules alimentaires sont transformées en petites molécules assimilables par l'organisme.</p></div>"
        },
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>4)</strong> Où se fait l'absorption des nutriments dans l'appareil digestif ? Expliquer. <span style='font-weight: 600; color: #2b6cb0;'>(2 pts)</span></p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong> L'absorption des nutriments se fait principalement dans l'<strong>intestin grêle</strong>.</p><p>La paroi de l'intestin grêle est recouverte de <strong>villosités intestinales</strong>, qui augmentent considérablement la surface d'absorption. Les nutriments traversent la paroi de l'intestin pour passer dans le sang (via les capillaires sanguins) ou dans la lymphe (via les vaisseaux lymphatiques).</p></div>"
        }
      ]
    },
    {
      "titre": "Évaluation de l'Agir Compétent (Biodiversité et Conservation)",
      "points": "6 pts",
      "enonce": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; line-height: 1.6; color: #2d3748; background-color: #f7fafc; padding: 1.5rem; border-radius: 12px; max-width: 100%;'><h2 style='font-size: 1.25rem; font-weight: 600; color: #1a202c; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem; margin-bottom: 1rem;'>🌍 Exercice 2 : La biodiversité en danger</h2><p style='margin-bottom: 1rem;'>La biodiversité est l'ensemble des êtres vivants qui peuplent la planète. Au Cameroun, la forêt tropicale abrite une biodiversité exceptionnelle, mais elle est menacée par les activités humaines.</p><p style='margin-bottom: 1rem;'>Un élève de 4ème a réalisé un recensement des espèces dans une forêt près de son village. Il a observé une diminution du nombre d'oiseaux et de mammifères par rapport aux années précédentes.</p><h2 style='font-size: 1.1rem; font-weight: 600; color: #1a202c; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.3rem; margin-top: 1.5rem;'>📋 Questions :</h2></div>",
      "questions": [
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>1)</strong> Définir la biodiversité et citer les trois niveaux auxquels on peut l'observer. <span style='font-weight: 600; color: #2b6cb0;'>(1,5 pts)</span></p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong> La <strong>biodiversité</strong> est la diversité du monde vivant. Elle s'observe à trois niveaux :</p><ul style='list-style-type: disc; padding-left: 1.5rem;'><li><strong>La diversité des espèces :</strong> le nombre d'espèces animales, végétales et microbiennes.</li><li><strong>La diversité génétique :</strong> la variabilité au sein d'une même espèce.</li><li><strong>La diversité des écosystèmes :</strong> la variété des milieux de vie (forêt, savane, désert, etc.).</li></ul></div>"
        },
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>2)</strong> Citer quatre causes de la diminution de la biodiversité. <span style='font-weight: 600; color: #2b6cb0;'>(2 pts)</span></p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong> Les principales causes de la diminution de la biodiversité sont :</p><ul style='list-style-type: disc; padding-left: 1.5rem;'><li><strong>La destruction des habitats :</strong> déforestation, urbanisation, extension des terres agricoles.</li><li><strong>La pollution :</strong> pollution des eaux, des sols et de l'air par les pesticides, les déchets, etc.</li><li><strong>La surexploitation :</strong> chasse excessive, pêche intensive, braconnage.</li><li><strong>L'introduction d'espèces invasives :</strong> des espèces étrangères qui concurrencent les espèces locales.</li></ul></div>"
        },
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>3)</strong> Proposer trois actions concrètes que l'élève peut mener pour protéger la biodiversité dans son village. <span style='font-weight: 600; color: #2b6cb0;'>(2,5 pts)</span></p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong> L'élève peut mener les actions suivantes :</p><ul style='list-style-type: disc; padding-left: 1.5rem;'><li><strong>Participer à des opérations de reboisement :</strong> planter des arbres pour restaurer les habitats forestiers.</li><li><strong>Sensibiliser les habitants :</strong> organiser des causeries éducatives sur l'importance de la biodiversité et les menaces qui pèsent sur elle.</li><li><strong>Lutter contre la pollution :</strong> mettre en place des systèmes de collecte et de recyclage des déchets pour réduire la pollution des sols et des cours d'eau.</li><li><strong>Promouvoir des pratiques agricoles durables :</strong> encourager l'agriculture biologique et la rotation des cultures.</li></ul></div>"
        }
      ]
    },
    {
      "titre": "Évaluation de l'Agir Compétent (Appareil Moteur et Hygiène)",
      "points": "6 pts",
      "enonce": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; line-height: 1.6; color: #2d3748; background-color: #f7fafc; padding: 1.5rem; border-radius: 12px; max-width: 100%;'><h2 style='font-size: 1.25rem; font-weight: 600; color: #1a202c; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem; margin-bottom: 1rem;'>🏃 Exercice 3 : Prévention des accidents de l'appareil moteur</h2><p style='margin-bottom: 1rem;'>L'appareil moteur (squelette, muscles, articulations) permet le mouvement. Il peut être victime d'accidents et de pathologies qu'il est important de prévenir.</p><p style='margin-bottom: 1rem;'>Pendant un match de football, un élève ressent une douleur intense à la cheville après un mauvais appui. Il a du mal à se tenir debout.</p><h2 style='font-size: 1.1rem; font-weight: 600; color: #1a202c; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.3rem; margin-top: 1.5rem;'>📋 Questions :</h2></div>",
      "questions": [
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>1)</strong> Identifier l'accident de l'appareil moteur dont il s'agit et définir les termes proposés. <span style='font-weight: 600; color: #2b6cb0;'>(2 pts)</span></p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong> Il s'agit vraisemblablement d'une <strong>entorse de la cheville</strong>.</p><ul style='list-style-type: disc; padding-left: 1.5rem;'><li><strong>Entorse :</strong> C'est un étirement ou une déchirure des ligaments qui maintiennent une articulation. Elle survient généralement à la suite d'un mouvement brusque ou d'un faux mouvement.</li><li><strong>Luxation :</strong> C'est la sortie de l'articulation de sa position normale. Elle est très douloureuse et nécessite une réduction par un médecin.</li><li><strong>Fracture :</strong> C'est la cassure d'un os. Elle peut être simple ou compliquée (avec déplacement).</li></ul></div>"
        },
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>2)</strong> Quels sont les gestes de premiers secours (protocole GREC) à appliquer en attendant une prise en charge médicale ? <span style='font-weight: 600; color: #2b6cb0;'>(2 pts)</span></p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong> Le protocole <strong>GREC</strong> (ou RICE en anglais) est la conduite à tenir en cas d'entorse ou de traumatisme articulaire :</p><ul style='list-style-type: disc; padding-left: 1.5rem;'><li><strong>G (Glace) :</strong> Appliquer de la glace (ou un linge froid) sur la zone douloureuse pour réduire l'œdème et la douleur.</li><li><strong>R (Repos) :</strong> Mettre la cheville au repos, ne pas s'appuyer dessus.</li><li><strong>E (Élévation) :</strong> Sursélever la cheville pour limiter le gonflement.</li><li><strong>C (Compression) :</strong> Bandage compressif (pas trop serré) de la cheville pour limiter l'œdème.</li></ul></div>"
        },
        {
          "question": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.95rem; line-height: 1.7; color: #2d3748; padding: 0.5rem 0;'><p><strong>3)</strong> Citer trois règles d'hygiène pour préserver l'appareil moteur. <span style='font-weight: 600; color: #2b6cb0;'>(2 pts)</span></p></div>",
          "reponse": "<div style='font-family: \"Segoe UI\", Roboto, sans-serif; font-size: 0.9rem; line-height: 1.7; color: #2d3748;'><p><strong>Solution :</strong> Trois règles d'hygiène pour préserver l'appareil moteur sont :</p><ul style='list-style-type: disc; padding-left: 1.5rem;'><li><strong>Une alimentation équilibrée :</strong> Riche en calcium (pour les os), en protéines (pour les muscles) et en vitamines (pour les articulations).</li><li><strong>La pratique régulière d'exercices physiques :</strong> Le sport permet de renforcer les muscles, de maintenir la souplesse des articulations et de prévenir l'ostéoporose.</li><li><strong>Éviter les gestes brusques :</strong> S'échauffer avant un effort, respecter les temps de repos, éviter de porter de lourdes charges sans protection.</li></ul></div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
