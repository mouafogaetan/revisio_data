<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "SVTEEHB (Sciences de la Vie, de la Terre, Éducation à l'Environnement, Hygiène et Biologie)",
 "classe": "Quatrième",
 "sequence": "Séquence 6",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Exercice 1 : Maladies par excès et par carence",
     "points": "5 pts",
     "enonce": "<p>L'alimentation joue un rôle fondamental dans le maintien de la santé. Un déséquilibre alimentaire peut entraîner des maladies par carence ou par excès. Il est important de connaître ces maladies et les moyens de les prévenir.</p>",
     "questions": [
       {
         "question": "<p><strong>1.1 (0,75 pt)</strong> Définis l'obésité.</p>",
         "reponse": "<p>L'obésité est une maladie caractérisée par un excès de masse grasse dans le corps, entraînant des risques pour la santé. Elle est généralement évaluée par l'Indice de Masse Corporelle (IMC). L'obésité peut être à l'origine de nombreuses pathologies comme le diabète de type 2, l'hypertension artérielle et les maladies cardiovasculaires.</p>"
       },
       {
         "question": "<p><strong>1.2 (0,75 pt)</strong> Définis l'anémie.</p>",
         "reponse": "<p>L'anémie est une condition caractérisée par une diminution du taux d'hémoglobine dans le sang ou du nombre de globules rouges. L'hémoglobine est la protéine qui transporte l'oxygène dans le corps. L'anémie peut être causée par une carence en fer, en vitamine B12 ou en acide folique, ce qui entraîne une fatigue, une pâleur et une faiblesse générale.</p>"
       },
       {
         "question": "<p><strong>1.3 (1 pt)</strong> Distingue une maladie par carence d'une maladie par excès.</p>",
         "reponse": "<p>Une <strong>maladie par carence</strong> est causée par un manque d'un ou plusieurs nutriments essentiels dans l'alimentation (ex : vitamines, minéraux, protéines). Elle résulte d'une alimentation insuffisante ou déséquilibrée.</p><p>Une <strong>maladie par excès</strong> est causée par une consommation excessive de certains nutriments (comme les graisses saturées, le sucre, le sel) ou par un apport énergétique trop élevé par rapport aux besoins de l'organisme. Elle résulte d'une alimentation trop riche et d'une sédentarité.</p>"
       },
       {
         "question": "<p><strong>1.4 (1,25 pt)</strong> Cite deux maladies par carence et deux maladies par excès liées à l'alimentation.</p>",
         "reponse": "<p><strong>Maladies par carence :</strong></p><ul><li>Le <strong>scorbut</strong> : carence en vitamine C.</li><li>Le <strong>rachitisme</strong> : carence en vitamine D ou en calcium.</li><li>L'<strong>anémie ferriprive</strong> : carence en fer.</li><li>La <strong>pellagre</strong> : carence en vitamine PP.</li></ul><p><strong>Maladies par excès :</strong></p><ul><li>L'<strong>obésité</strong> : excès de lipides et de glucides.</li><li>Le <strong>diabète de type 2</strong> : excès de sucre dans l'alimentation.</li><li>L'<strong>hypertension artérielle</strong> : excès de sel.</li><li>L'<strong>athérosclérose</strong> : excès de graisses saturées.</li></ul>"
       },
       {
         "question": "<p><strong>1.5 (1,25 pt)</strong> Propose trois moyens de lutte contre les maladies par excès et par carence.</p>",
         "reponse": "<p>Pour lutter contre ces maladies, il faut :</p><ul><li><strong>Adopter une alimentation variée et équilibrée</strong> : consommer des fruits, des légumes, des céréales complètes, des protéines et limiter les graisses saturées, le sucre et le sel.</li><li><strong>Pratiquer une activité physique régulière</strong> : au moins 30 minutes par jour pour maintenir un poids santé.</li><li><strong>Consulter un médecin ou un nutritionniste</strong> pour un suivi personnalisé en cas de carence identifiée (supplémentation en fer, vitamines, etc.).</li></ul>"
       }
     ]
   },
   {
     "titre": "Exercice 2 : Maladies du péril fécal",
     "points": "5 pts",
     "enonce": "<p>Les maladies du péril fécal sont des infections causées par des microorganismes pathogènes présents dans les excréments humains ou animaux. Leur transmission se fait par voie fécale-orale, souvent par l'eau ou les aliments contaminés.</p>",
     "questions": [
       {
         "question": "<p><strong>2.1 (0,75 pt)</strong> Cite quatre maladies du péril fécal.</p>",
         "reponse": "<p>Les maladies du péril fécal sont :</p><ul><li>Le <strong>choléra</strong></li><li>La <strong>poliomyélite</strong></li><li>La <strong>fièvre typhoïde</strong></li><li>L'<strong>ambiase</strong></li><li>La <strong>shigellose</strong></li><li>L'<strong>ascaridiose</strong></li></ul>"
       },
       {
         "question": "<p><strong>2.2 (1 pt)</strong> Décris le mode de transmission des maladies du péril fécal.</p>",
         "reponse": "<p>Les maladies du péril fécal se transmettent par <strong>voie fécale-orale</strong>, c'est-à-dire par ingestion d'aliments ou d'eau contaminés par des excréments humains contenant les agents pathogènes. Les modes de transmission sont :</p><ul><li>La consommation d'<strong>eau non traitée</strong> contaminée par des matières fécales.</li><li>La consommation d'<strong>aliments</strong> souillés par des matières fécales (mains sales, mouches, etc.).</li><li>Le <strong>contact direct</strong> avec une personne infectée.</li></ul>"
       },
       {
         "question": "<p><strong>2.3 (1 pt)</strong> Identifie les symptômes du choléra.</p>",
         "reponse": "<p>Les symptômes du choléra sont :</p><ul><li>Des <strong>diarrhées aqueuses abondantes</strong> (selles en \"eau de riz\").</li><li>Des <strong>vomissements</strong>.</li><li>Une <strong>déshydratation</strong> rapide et sévère.</li><li>Des <strong>crampes musculaires</strong>.</li><li>Un <strong>état de choc</strong> et la mort en l'absence de traitement.</li></ul>"
       },
       {
         "question": "<p><strong>2.4 (1,25 pt)</strong> Propose des moyens de lutte et d'hygiène contre les maladies du péril fécal.</p>",
         "reponse": "<p>Pour lutter contre les maladies du péril fécal, il faut :</p><ul><li><strong>Boire de l'eau potable</strong> (eau de source, eau bouillie, eau traitée).</li><li><strong>Se laver les mains</strong> régulièrement avec du savon, surtout après être allé aux toilettes et avant de manger.</li><li><strong>Laver les aliments</strong> avant consommation (fruits, légumes).</li><li><strong>Utiliser des latrines ou des toilettes</strong> pour éviter la contamination de l'environnement.</li><li><strong>Vacciner</strong> contre certaines maladies (poliomyélite, typhoïde).</li><li><strong>Vidanger et entretenir</strong> les fosses septiques.</li></ul>"
       },
       {
         "question": "<p><strong>2.5 (1 pt)</strong> Qu'est-ce que la poliomyélite et quelles sont ses conséquences ?</p>",
         "reponse": "<p>La <strong>poliomyélite</strong> est une maladie infectieuse due à un virus qui attaque le système nerveux. Le virus pénètre par voie digestive et peut entraîner :</p><ul><li>La <strong>destruction des neurones moteurs</strong> de la moelle épinière.</li><li>Des <strong>paralysies</strong> des membres, parfois définitives.</li><li>Une <strong>atrophie musculaire</strong>.</li><li>Dans certains cas, la <strong>mort</strong> par paralysie respiratoire.</li></ul><p>La vaccination est le moyen de prévention le plus efficace.</p>"
       }
     ]
   },
   {
     "titre": "Exercice 3 : IST et VIH/SIDA",
     "points": "5 pts",
     "enonce": "<p>Les Infections Sexuellement Transmissibles (IST) et le VIH/SIDA sont des problèmes majeurs de santé publique. Il est important de connaître leurs modes de transmission, leurs conséquences et les moyens de prévention.</p>",
     "questions": [
       {
         "question": "<p><strong>3.1 (0,75 pt)</strong> Définis une IST.</p>",
         "reponse": "<p>Une <strong>IST (Infection Sexuellement Transmissible)</strong> est une infection qui se transmet principalement lors de rapports sexuels (vaginal, anal, oral) par contact direct entre les muqueuses génitales, anales ou buccales.</p>"
       },
       {
         "question": "<p><strong>3.2 (0,75 pt)</strong> Cite trois IST autres que le VIH/SIDA.</p>",
         "reponse": "<p>Les principales IST sont :</p><ul><li>L'<strong>herpès génital</strong></li><li>La <strong>candidose génitale</strong></li><li>Les <strong>verrues génitales</strong></li><li>La <strong>syphilis</strong></li><li>La <strong>gonorrhée</strong></li><li>La <strong>chlamydiose</strong></li><li>Le <strong>trichomonas</strong></li></ul>"
       },
       {
         "question": "<p><strong>3.3 (1 pt)</strong> Distingue le VIH du SIDA.</p>",
         "reponse": "<p>Le <strong>VIH (Virus de l'Immunodéficience Humaine)</strong> est un virus qui attaque le système immunitaire, en détruisant les lymphocytes T4. Une personne infectée par le VIH est dite <strong>séropositive</strong>.</p><p>Le <strong>SIDA (Syndrome de l'Immunodéficience Acquise)</strong> est le stade avancé de l'infection par le VIH. Il se caractérise par une destruction massive des lymphocytes T4, entraînant une immunodéficience sévère et l'apparition de maladies opportunistes (infections, cancers).</p>"
       },
       {
         "question": "<p><strong>3.4 (1 pt)</strong> Décris les modes de transmission du VIH.</p>",
         "reponse": "<p>Le VIH se transmet par :</p><ul><li><strong>Voie sexuelle</strong> : rapports sexuels non protégés (vaginal, anal, oral) avec une personne infectée.</li><li><strong>Voie sanguine</strong> : transfusion de sang contaminé, partage de seringues ou d'aiguilles contaminées, blessures avec instruments contaminés.</li><li><strong>Voie materno-fœtale</strong> : transmission de la mère infectée à l'enfant pendant la grossesse, l'accouchement ou l'allaitement.</li></ul>"
       },
       {
         "question": "<p><strong>3.5 (0,75 pt)</strong> Cite les moyens de prévention du VIH/SIDA.</p>",
         "reponse": "<p>Les moyens de prévention sont :</p><ul><li>L'utilisation du <strong>préservatif</strong> (masculin ou féminin) lors de tout rapport sexuel.</li><li>Le <strong>dépistage</strong> volontaire et le conseil.</li><li>L'utilisation de <strong>matériel stérile</strong> pour les soins et les injections.</li><li>La <strong>prévention de la transmission mère-enfant</strong> (traitement antirétroviral, césarienne, allaitement artificiel).</li></ul>"
       },
       {
         "question": "<p><strong>3.6 (0,75 pt)</strong> Qu'est-ce que la trithérapie ?</p>",
         "reponse": "<p>La <strong>trithérapie</strong> est un traitement du VIH/SIDA basé sur l'association de trois médicaments antirétroviraux. Elle permet de :</p><ul><li>Réduire la multiplication du virus dans l'organisme.</li><li>Augmenter le nombre de lymphocytes T4.</li><li>Ralentir la progression de la maladie vers le SIDA.</li><li>Permettre aux personnes séropositives de vivre plus longtemps et en meilleure santé.</li></ul>"
       }
     ]
   }
 ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
