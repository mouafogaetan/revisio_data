<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "SVTEEHB (Sciences de la Vie, de la Terre, Éducation à l'Environnement, Hygiène et Biologie)",
  "classe": "Quatrième",
  "sequence": "Séquence 2",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Évaluation des Ressources - Les besoins nutritifs des végétaux et des animaux",
      "points": "6 pts",
      "enonce": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; border-left: 5px solid #007bff; margin-bottom: 15px;'><p style='margin: 0; color: #0056b3; font-weight: bold;'>📌 Document : Les besoins des êtres vivants</p></div><p style='font-size: 0.95em;'>Pour se développer, les êtres vivants ont besoin de matières et d'énergie. On distingue deux grands types d'êtres vivants selon leur mode de nutrition :</p><ul style='font-size: 0.95em;'><li><strong>Les végétaux chlorophylliens</strong> : Ils fabriquent leur propre matière organique à partir d'éléments puisés dans le milieu (eau, sels minéraux, dioxyde de carbone) et grâce à la lumière. C'est la <strong>photosynthèse</strong>.</li><li><strong>Les animaux et les végétaux non chlorophylliens</strong> : Ils sont incapables de fabriquer leur matière organique. Ils doivent donc se nourrir de matière organique déjà fabriquée par d'autres êtres vivants.</li></ul>",
      "questions": [
        {
          "question": "<div style='font-size: 1.05em; font-weight: bold;'>1) Distingue les besoins nutritifs des végétaux chlorophylliens de ceux des végétaux non chlorophylliens. (2 pts)</div>",
          "reponse": "<div style='background-color: #e8f5e9; padding: 12px; border-radius: 6px;'><p><strong>Végétaux chlorophylliens :</strong> Besoins en <strong>eau, sels minéraux, lumière et dioxyde de carbone</strong> pour fabriquer leur propre matière organique.</p><p><strong>Végétaux non chlorophylliens :</strong> Besoins en <strong>matière organique toute faite</strong> qu'ils prélèvent dans leur environnement (ex : champignons sur un tronc d'arbre).</p><p><em>Critères de correction :</em> Distinguer clairement les deux types (1 pt), citer les éléments clés pour chaque type (1 pt).</p></div>"
        },
        {
          "question": "<div style='font-size: 1.05em; font-weight: bold;'>2) Détermine le régime alimentaire des animaux suivants en justifiant : (2 pts)</div><ul style='font-size: 0.95em;'><li><strong>a)</strong> Le lion qui se nourrit de viande : <span style='font-style: italic;'>____________________</span></li><li><strong>b)</strong> La vache qui se nourrit d'herbe : <span style='font-style: italic;'>____________________</span></li><li><strong>c)</strong> L'homme qui se nourrit de viande, de fruits et de légumes : <span style='font-style: italic;'>____________________</span></li><li><strong>d)</strong> La poule qui picore des insectes et des graines : <span style='font-style: italic;'>____________________</span></li></ul>",
          "reponse": "<div style='background-color: #e8f5e9; padding: 12px; border-radius: 6px;'><p><strong>a) Lion :</strong> Carnivore car il se nourrit de viande.</p><p><strong>b) Vache :</strong> Herbivore car elle se nourrit d'herbe.</p><p><strong>c) Homme :</strong> Omnivore car il consomme des aliments d'origine animale et végétale.</p><p><strong>d) Poule :</strong> Omnivore (ou insectivore) car elle consomme des insectes et des graines.</p><p><em>Critères de correction :</em> 0,5 pt par réponse juste et correctement justifiée.</p></div>"
        },
        {
          "question": "<div style='font-size: 1.05em; font-weight: bold;'>3) Explique pourquoi la croissance est considérée comme un paramètre traduisant la production de matière chez les êtres vivants. (2 pts)</div>",
          "reponse": "<div style='background-color: #e8f5e9; padding: 12px; border-radius: 6px;'><p>La <strong>croissance</strong> est l'augmentation de la taille, de la masse ou du volume d'un être vivant. Cette augmentation est le résultat d'une <strong>production de matière</strong> : l'être vivant construit de nouvelles cellules et augmente ainsi sa masse. Chez les animaux, elle se mesure par la taille et le poids ; chez les végétaux, par la taille, le nombre de feuilles ou la masse de la plante.</p><p><em>Critères de correction :</em> Définir la croissance (1 pt), relier à l'augmentation de matière (0,5 pt), donner des exemples (0,5 pt).</p></div>"
        }
      ]
    },
    {
      "titre": "Situation-Problème - La biodiversité en danger",
      "points": "7 pts",
      "enonce": "<div style='background-color: #fff3cd; padding: 15px; border-radius: 8px; border-left: 5px solid #ffc107; margin-bottom: 15px;'><p style='margin: 0; color: #856404;'><strong>🌍 Situation :</strong> Dans la région de l'Est-Cameroun, les forêts sont de plus en plus menacées par l'exploitation forestière et les feux de brousse. De nombreuses espèces animales et végétales disparaissent. La communauté locale constate que certains animaux comme les éléphants et les gorilles deviennent rares.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 1.05em; font-weight: bold;'>1) Définis la biodiversité et cite deux causes de sa diminution. (2 pts)</div>",
          "reponse": "<div style='background-color: #e8f5e9; padding: 12px; border-radius: 6px;'><p><strong>Biodiversité :</strong> La diversité des êtres vivants (espèces animales et végétales) dans un milieu donné. Elle s'exprime par la variété des espèces et des écosystèmes.</p><p><strong>Causes de sa diminution :</strong></p><ul><li>La <strong>destruction des habitats</strong> (déforestation).</li><li>La <strong>pollution</strong> de l'air, de l'eau et des sols.</li><li>La <strong>surexploitation</strong> des ressources (chasse, pêche).</li><li>Les <strong>espèces invasives</strong> qui perturbent l'équilibre.</li></ul><p><em>Critères de correction :</em> Définition de la biodiversité (1 pt), deux causes correctes (1 pt).</p></div>"
        },
        {
          "question": "<div style='font-size: 1.05em; font-weight: bold;'>2) Propose deux moyens de lutte pour protéger la biodiversité dans cette région. (2 pts)</div>",
          "reponse": "<div style='background-color: #e8f5e9; padding: 12px; border-radius: 6px;'><p><strong>Moyens de lutte :</strong></p><ul><li><strong>Pratiquer le reboisement</strong> pour restaurer les forêts.</li><li>Mettre en place des <strong>réserves naturelles</strong> et des parcs nationaux.</li><li><strong>Sensibiliser les populations</strong> à l'importance de la préservation.</li><li><strong>Lutter contre le braconnage</strong> par des lois et des contrôles.</li></ul><p><em>Critères de correction :</em> Deux moyens cohérents et adaptés au contexte (2 pts).</p></div>"
        },
        {
          "question": "<div style='font-size: 1.05em; font-weight: bold;'>3) Explique l'importance de la biodiversité pour l'homme et pour l'équilibre des écosystèmes. (3 pts)</div>",
          "reponse": "<div style='background-color: #e8f5e9; padding: 12px; border-radius: 6px;'><p><strong>Importance pour l'homme :</strong></p><ul><li>Ressources alimentaires (agriculture, pêche).</li><li>Ressources médicinales (plantes médicinales).</li><li>Ressources économiques (bois, tourisme).</li></ul><p><strong>Importance pour les écosystèmes :</strong></p><ul><li>Maintenir l'équilibre des chaînes alimentaires.</li><li>Assurer la régulation du climat (forêts).</li><li>Protéger les sols contre l'érosion.</li></ul><p><em>Critères de correction :</em> Trois points corrects pour l'homme (1,5 pt) et trois pour les écosystèmes (1,5 pt).</p></div>"
        }
      ]
    },
    {
      "titre": "Évaluation des Compétences - Prévention et Secourisme",
      "points": "7 pts",
      "enonce": "<div style='background-color: #fce4ec; padding: 15px; border-radius: 8px; border-left: 5px solid #dc3545; margin-bottom: 15px;'><p style='margin: 0; color: #721c24;'><strong>⚽ Situation d'accident :</strong> Lors d'un match de football au collège, un élève, Kévin, tombe lourdement sur le bras. Il ressent une vive douleur, son bras est déformé et il ne peut plus le bouger. Ses camarades sont inquiets et ne savent pas quoi faire.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size: 1.05em; font-weight: bold;'>1) Identifie l'accident de l'appareil moteur dont souffre probablement Kévin. Justifie ta réponse. (2 pts)</div>",
          "reponse": "<div style='background-color: #e8f5e9; padding: 12px; border-radius: 6px;'><p><strong>Accident :</strong> Fracture du bras (ou fracture).</p><p><strong>Justification :</strong> Les signes sont : une <strong>déformation</strong> du membre, une <strong>douleur intense</strong> et une <strong>impossibilité de mouvement</strong>.</p><p><em>Critères de correction :</em> Nom de l'accident (1 pt), justification cohérente (1 pt).</p></div>"
        },
        {
          "question": "<div style='font-size: 1.05em; font-weight: bold;'>2) Décris la conduite à tenir (gestes de premiers secours) pour aider Kévin en attendant les secours. (3 pts)</div>",
          "reponse": "<div style='background-color: #e8f5e9; padding: 12px; border-radius: 6px;'><p><strong>Conduite à tenir :</strong></p><ul><li><strong>Ne pas déplacer Kévin</strong> pour éviter d'aggraver la fracture.</li><li><strong>Allonger ou installer Kévin</strong> confortablement.</li><li><strong>Immobiliser le bras</strong> à l'aide d'une attelle (planche, ou un objet rigide) ou d'un bandage improvisé.</li><li><strong>Appeler les secours</strong> ou un adulte responsable.</li><li><strong>Rassurer Kévin</strong> et rester à ses côtés en attendant les secours.</li></ul><p><em>Critères de correction :</em> Cinq gestes corrects (3 pts, 0,6 pt par geste).</p></div>"
        },
        {
          "question": "<div style='font-size: 1.05em; font-weight: bold;'>3) Énumère trois règles d'hygiène préventive pour maintenir un bon appareil moteur. (2 pts)</div>",
          "reponse": "<div style='background-color: #e8f5e9; padding: 12px; border-radius: 6px;'><p><strong>Règles d'hygiène préventive :</strong></p><ul><li><strong>Adopter une alimentation équilibrée</strong> (riche en calcium, vitamine D et protéines).</li><li><strong>Pratiquer régulièrement une activité physique</strong> ou un sport pour renforcer les muscles et les os.</li><li><strong>Se réchauffer avant l'effort</strong> et s'étirer après.</li><li><strong>Éviter les postures mauvaises</strong> pour le dos.</li></ul><p><em>Critères de correction :</em> Trois règles correctement énoncées (2 pts).</p></div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
