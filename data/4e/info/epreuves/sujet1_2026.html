<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Informatique",
  "classe": "Quatrième",
  "sequence": "Séquence 1",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Les composants de l'unité centrale (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='background: #f0f8ff; padding: 15px; border-radius: 10px; color: #1a1a2e; font-size: 0.95em;'><p>L'unité centrale est le boîtier qui contient les principaux composants permettant à l'ordinateur de fonctionner.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. (0,75 pt)</strong> Cite 3 composants internes de l'unité centrale.</p>",
          "reponse": "<ul><li>Le processeur (CPU)</li><li>La mémoire RAM</li><li>Le disque dur</li></ul>"
        },
        {
          "question": "<p><strong>2. (1 pt)</strong> Quelle est la fonction du processeur ?</p>",
          "reponse": "<p>Le processeur est le cerveau de l'ordinateur. Il exécute les instructions des programmes et effectue les opérations de calcul et de contrôle.</p>"
        },
        {
          "question": "<p><strong>3. (1,25 pt)</strong> Associe chaque composant à sa fonction :</p><ul><li><strong>a) Disque dur</strong></li><li><strong>b) Mémoire RAM</strong></li><li><strong>c) Carte mère</strong></li></ul>",
          "reponse": "<ul><li><strong>Disque dur :</strong> Stocke les données de manière permanente (système d'exploitation, programmes, fichiers).</li><li><strong>Mémoire RAM :</strong> Stocke temporairement les données et les programmes en cours d'utilisation.</li><li><strong>Carte mère :</strong> Relie et permet la communication entre tous les composants de l'ordinateur.</li></ul>"
        },
        {
          "question": "<p><strong>4. (1 pt)</strong> Décris brièvement comment le processeur et la mémoire RAM interagissent lors de l'exécution d'un programme.</p>",
          "reponse": "<p>Lorsque l'utilisateur lance un programme, celui-ci est chargé depuis le disque dur vers la mémoire RAM. Le processeur va ensuite lire les instructions du programme dans la RAM, les exécuter, et stocker les résultats temporairement dans la RAM avant de les sauvegarder sur le disque dur si nécessaire.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Les mémoires (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='background: #fff5e6; padding: 15px; border-radius: 10px; color: #1a1a2e; font-size: 0.95em;'><p>Les mémoires d'un ordinateur se distinguent par leur volatilité (capacité à conserver les données sans alimentation) et leur technologie.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. (1,5 pt)</strong> Classe les mémoires suivantes dans le tableau ci-dessous : <strong>RAM, ROM, Disque dur SSD, CD-ROM, EEPROM, Disquette</strong></p><table border='1' cellpadding='3' style='border-collapse: collapse; width: 100%;'><tr><th>Mémoires volatiles</th><th>Mémoires non volatiles</th></tr><tr><td></td><td></td></tr></table>",
          "reponse": "<table border='1' cellpadding='3' style='border-collapse: collapse; width: 100%;'><tr><th>Mémoires volatiles</th><th>Mémoires non volatiles</th></tr><tr><td>RAM</td><td>ROM, Disque dur SSD, CD-ROM, EEPROM, Disquette</td></tr></table>"
        },
        {
          "question": "<p><strong>2. (1,25 pt)</strong> Indique la technologie utilisée par chaque mémoire :</p><ul><li><strong>a) Disque dur HDD</strong></li><li><strong>b) CD-ROM</strong></li><li><strong>c) RAM</strong></li></ul>",
          "reponse": "<ul><li><strong>HDD :</strong> Technologie magnétique (plateaux en rotation).</li><li><strong>CD-ROM :</strong> Technologie optique (lecture par laser).</li><li><strong>RAM :</strong> Technologie électronique (circuits intégrés).</li></ul>"
        },
        {
          "question": "<p><strong>3. (1,25 pt)</strong> Explique brièvement le fonctionnement d'un disque dur (HDD).</p>",
          "reponse": "<p>Le disque dur HDD est composé de plateaux magnétiques en rotation. Une tête de lecture/écriture se déplace au-dessus des plateaux pour lire ou écrire les données sous forme de zones magnétisées. La vitesse de rotation (en tours par minute) influence la rapidité d'accès aux données.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Logiciels système et applicatifs (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='background: #f0fff0; padding: 15px; border-radius: 10px; color: #1a1a2e; font-size: 0.95em;'><p>Un ordinateur ne peut fonctionner sans logiciels. On distingue les logiciels système (le système d'exploitation) des logiciels applicatifs.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. (0,75 pt)</strong> Donne 3 fonctions d'un système d'exploitation.</p>",
          "reponse": "<ul><li>Gérer la mémoire de l'ordinateur.</li><li>Gérer les fichiers et dossiers.</li><li>Permettre l'exécution des logiciels.</li></ul>"
        },
        {
          "question": "<p><strong>2. (1 pt)</strong> Explique la différence entre un logiciel système et un logiciel applicatif en donnant un exemple pour chacun.</p>",
          "reponse": "<ul><li><strong>Logiciel système :</strong> Il gère les ressources matérielles et fournit une interface utilisateur. Exemple : <strong>Windows 11</strong>.</li><li><strong>Logiciel applicatif :</strong> Il permet de réaliser une tâche spécifique. Exemple : <strong>Microsoft Word</strong>.</li></ul>"
        },
        {
          "question": "<p><strong>3. (1,25 pt)</strong> Les termes suivants sont-ils des systèmes d'exploitation ou des logiciels applicatifs ?</p><ul><li><strong>a) Linux</strong></li><li><strong>b) LibreOffice</strong></li><li><strong>c) Android</strong></li></ul>",
          "reponse": "<ul><li><strong>Linux :</strong> Système d'exploitation.</li><li><strong>LibreOffice :</strong> Logiciel applicatif (suite bureautique).</li><li><strong>Android :</strong> Système d'exploitation (pour mobiles).</li></ul>"
        },
        {
          "question": "<p><strong>4. (1 pt)</strong> À quoi sert un pilote (driver) ?</p>",
          "reponse": "<p>Un pilote (driver) est un logiciel qui permet au système d'exploitation de communiquer avec un périphérique spécifique (imprimante, carte graphique, etc.). Il fait le lien entre le matériel et le système d'exploitation.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Recherche et communication sur Internet (5 pts)",
      "points": "5 pts",
      "enonce": "<div style='background: #e6f2ff; padding: 15px; border-radius: 10px; color: #1a1a2e; font-size: 0.95em;'><p>Internet est un outil puissant de recherche d'informations et de communication.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. (1 pt)</strong> Cite 3 services offerts par Internet.</p>",
          "reponse": "<ul><li><strong>WWW (World Wide Web) :</strong> Accès aux pages web.</li><li><strong>Messagerie électronique (Email) :</strong> Envoyer et recevoir des messages.</li><li><strong>FTP (File Transfer Protocol) :</strong> Transfert de fichiers.</li></ul>"
        },
        {
          "question": "<p><strong>2. (1 pt)</strong> Explique en 2 phrases ce qu'est un moteur de recherche et comment il fonctionne.</p>",
          "reponse": "<p>Un moteur de recherche (comme Google) est un outil qui permet de trouver des informations sur Internet. Il parcourt le web, indexe les pages, et propose une liste de résultats en fonction des mots-clés saisis par l'utilisateur.</p>"
        },
        {
          "question": "<p><strong>3. (1 pt)</strong> Pour effectuer une recherche efficace, il est important de bien choisir ses mots-clés. Propose des mots-clés pertinents pour trouver des informations sur <strong>\"les volcans actifs dans le monde\"</strong>.</p>",
          "reponse": "<p>Mots-clés possibles : <strong>\"volcans actifs\"</strong>, <strong>\"éruptions volcaniques 2025\"</strong>, <strong>\"liste volcans en activité\"</strong>, <strong>\"volcans en éruption\"</strong>.</p>"
        },
        {
          "question": "<p><strong>4. (1 pt)</strong> Cite deux fournisseurs d'accès à Internet (FAI) présents au Cameroun.</p>",
          "reponse": "<p>Exemples : <strong>CAMTEL</strong>, <strong>Orange Cameroun</strong>, <strong>MTN Cameroun</strong>.</p>"
        },
        {
          "question": "<p><strong>5. (1 pt)</strong> Décris l'interface d'un moteur de recherche et explique comment y accéder.</p>",
          "reponse": "<p>Un moteur de recherche présente généralement une barre de saisie au centre de la page, où l'on tape les mots-clés, et un bouton \"Rechercher\" ou \"OK\" pour lancer la recherche. On y accède en entrant son adresse (URL) dans la barre d'adresse du navigateur (ex: www.google.com) ou en utilisant la barre de recherche intégrée au navigateur.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Traitement de texte (3 pts)",
      "points": "3 pts",
      "enonce": "<div style='background: #f5f0e8; padding: 15px; border-radius: 10px; color: #1a1a2e; font-size: 0.95em;'><p>Le traitement de texte permet de créer et de mettre en forme des documents.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. (1 pt)</strong> Cite 3 éléments que l'on peut insérer dans un document texte.</p>",
          "reponse": "<ul><li>Un tableau</li><li>Une image</li><li>Un en-tête / pied de page</li></ul>"
        },
        {
          "question": "<p><strong>2. (1 pt)</strong> Qu'est-ce que la mise en page d'un document ? Cite un paramètre de mise en page.</p>",
          "reponse": "<p>La mise en page consiste à définir l'apparence globale du document avant impression. Un paramètre de mise en page est <strong>l'orientation</strong> (portrait ou paysage).</p>"
        },
        {
          "question": "<p><strong>3. (1 pt)</strong> Explique pourquoi il est important d'enregistrer régulièrement son travail.</p>",
          "reponse": "<p>Il est important d'enregistrer régulièrement son travail pour <strong>ne pas perdre les modifications</strong> apportées au document en cas de problème technique (panne, coupure de courant, plantage du logiciel).</p>"
        }
      ]
    },
    {
      "titre": "Exercice 6 : Tableur (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='background: #f5f0f0; padding: 15px; border-radius: 10px; color: #1a1a2e; font-size: 0.95em;'><p>Le tableur est un outil pratique pour réaliser des calculs et gérer des données.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. (1 pt)</strong> Définis les termes suivants :</p><ul><li><strong>a) Cellule</strong></li><li><strong>b) Plage de cellules</strong></li></ul>",
          "reponse": "<ul><li><strong>Cellule :</strong> L'intersection d'une ligne et d'une colonne. C'est l'unité de base du tableur, identifiée par une adresse (ex: A1).</li><li><strong>Plage de cellules :</strong> Un ensemble de cellules sélectionnées, défini par les coordonnées de la première et de la dernière cellule séparées par deux points (ex: A1:C5).</li></ul>"
        },
        {
          "question": "<p><strong>2. (1 pt)</strong> Comment se déplace-t-on dans une feuille de calcul ?</p>",
          "reponse": "<p>On se déplace dans une feuille de calcul avec les <strong>touches fléchées</strong> du clavier, avec la <strong>souris</strong> en cliquant sur une cellule, ou avec la touche <strong>Tabulation</strong> pour avancer d'une cellule vers la droite.</p>"

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>
