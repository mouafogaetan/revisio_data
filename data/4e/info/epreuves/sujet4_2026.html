<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Informatique",
  "classe": "Quatrième",
  "sequence": "Séquence 4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Matériel et Logiciels (6 pts)",
      "points": "6 pts",
      "enonce": "<div class='exercise-block'><p>Cet exercice porte sur la connaissance du matériel et des logiciels.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. Composants de l'unité centrale (3 pts)</strong></p><p>a) (1.5 pts) Cite quatre composants internes de l'unité centrale et donne leur fonction.</p><p>b) (1.5 pts) Décris les interactions entre le processeur, la mémoire RAM et le disque dur lors de l'exécution d'un programme.</p>",
          "reponse": "<p><strong>a) (1.5 pts)</strong></p><ul><li><strong>Processeur (CPU) :</strong> Exécute les instructions des programmes et traite les données.</li><li><strong>Mémoire RAM :</strong> Stocke temporairement les données et les programmes en cours d'utilisation.</li><li><strong>Disque dur (HDD/SSD) :</strong> Stocke les données et les programmes de manière permanente.</li><li><strong>Carte mère :</strong> Relie tous les composants entre eux et permet leur communication.</li><li><strong>Alimentation :</strong> Fournit l'énergie électrique nécessaire au fonctionnement de l'ordinateur.</li></ul><p><strong>b) (1.5 pts)</strong> Lors de l'exécution d'un programme, le disque dur charge les données et les instructions dans la RAM. Le processeur va ensuite chercher ces instructions dans la RAM pour les exécuter, et peut y déposer des résultats intermédiaires. La RAM sert donc de mémoire de travail rapide entre le disque dur (plus lent) et le processeur .</p>"
        },
        {
          "question": "<p><strong>2. Logiciels système et applicatifs (3 pts)</strong></p><p>a) (1 pt) Donne deux fonctions principales d'un système d'exploitation.</p><p>b) (1 pt) Quelle est la différence entre un logiciel système et un logiciel applicatif ?</p><p>c) (1 pt) Cite deux exemples de logiciels applicatifs et précise leur usage.</p>",
          "reponse": "<p><strong>a) (1 pt)</strong> Un système d'exploitation a plusieurs fonctions :</p><ul><li>Gérer les ressources matérielles (processeur, mémoire, périphériques).</li><li>Fournir une interface utilisateur (graphique ou en ligne de commande).</li><li>Permettre l'exécution des programmes applicatifs.</li></ul><p><strong>b) (1 pt)</strong> Un <strong>logiciel système</strong> (comme le système d'exploitation) gère le matériel et fournit une plateforme pour les autres logiciels. Un <strong>logiciel applicatif</strong> (comme un traitement de texte) est conçu pour aider l'utilisateur à réaliser une tâche spécifique .</p><p><strong>c) (1 pt)</strong></p><ul><li><strong>Traitement de texte (ex: Microsoft Word, LibreOffice Writer) :</strong> Permet de créer et modifier des documents textuels.</li><li><strong>Tableur (ex: Microsoft Excel, LibreOffice Calc) :</strong> Permet de manipuler des données sous forme de tableaux et d'effectuer des calculs.</li><li><strong>Navigateur web (ex: Chrome, Firefox) :</strong> Permet de consulter des pages sur Internet.</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Internet et Production de Contenus (6 pts)",
      "points": "6 pts",
      "enonce": "<div class='exercise-block'><p>Cet exercice aborde les services Internet et l'utilisation des outils bureautiques.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. Services Internet (2 pts)</strong></p><p>a) (1 pt) Cite trois services offerts par Internet et explique brièvement leur utilité.</p><p>b) (1 pt) Le WWW est un service Internet. Quelle est la principale différence entre le WWW et le courrier électronique (e-mail) ?</p>",
          "reponse": "<p><strong>a) (1 pt)</strong></p><ul><li><strong>WWW (World Wide Web) :</strong> Permet de consulter des pages web (documents hypertextes) via un navigateur .</li><li><strong>Courrier électronique (e-mail) :</strong> Permet d'envoyer et de recevoir des messages écrits .</li><li><strong>FTP (File Transfer Protocol) :</strong> Permet de transférer des fichiers entre un ordinateur et un serveur.</li><li><strong>Téléphonie IP (VoIP) :</strong> Permet de passer des appels téléphoniques via Internet.</li></ul><p><strong>b) (1 pt)</strong> Le <strong>WWW</strong> permet de consulter et d'afficher des informations de manière interactive (pages web), tandis que le <strong>courrier électronique</strong> permet d'échanger des messages de manière asynchrone (non instantanée) entre personnes.</p>"
        },
        {
          "question": "<p><strong>2. Traitement de texte et tableur (4 pts)</strong></p><p>a) (1 pt) Dans un traitement de texte, à quoi servent les fonctions <em>Mise en page</em> et <em>Insertion</em> ?</p><p>b) (1 pt) Dans un tableur, une cellule est identifiée par une adresse (ex: B3). Que signifie cette adresse ?</p><p>c) (2 pts) Une entreprise souhaite calculer le total des ventes mensuelles. Dans un tableur, les chiffres des ventes sont dans les cellules B2 à B6. Quelle formule doit-on écrire dans la cellule B7 pour obtenir la somme ?</p>",
          "reponse": "<p><strong>a) (1 pt)</strong> La fonction <em>Mise en page</em> permet de définir les marges, l'orientation du document et d'ajouter des entêtes/pieds de page. La fonction <em>Insertion</em> permet d'ajouter des tableaux, des images ou d'autres objets dans le texte .</p><p><strong>b) (1 pt)</strong> L'adresse <strong>B3</strong> signifie : la cellule située à l'intersection de la colonne B et de la ligne 3 .</p><p><strong>c) (2 pts)</strong> La formule à écrire est : <code>=SOMME(B2:B6)</code>. Cette formule additionne toutes les valeurs comprises entre les cellules B2 et B6.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Citoyenneté Numérique (3 pts)",
      "points": "3 pts",
      "enonce": "<div class='exercise-block'><p>Cet exercice évalue la compréhension des enjeux de la citoyenneté numérique.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. Empreinte numérique (1.5 pts)</strong></p><p>a) (0.5 pt) Qu'est-ce qu'une empreinte numérique ?</p><p>b) (1 pt) Cite une pratique qui permet de préserver une bonne empreinte numérique et une pratique qui permet de l'effacer partiellement.</p>",
          "reponse": "<p><strong>a) (0.5 pt)</strong> L'empreinte numérique est l'ensemble des traces que nous laissons sur Internet (publications, recherches, commentaires, cookies, etc.). Elle est généralement immuable et inaltérable.</p><p><strong>b) (1 pt)</strong></p><ul><li><strong>Préserver une bonne empreinte :</strong> Publier des contenus pertinents et professionnels, et éviter de partager des informations personnelles sensibles.</li><li><strong>Effacer son empreinte :</strong> Supprimer ses comptes sur les réseaux sociaux inactifs, ou demander la suppression de ses données personnelles à certains sites .</li></ul>"
        },
        {
          "question": "<p><strong>2. Propriété intellectuelle (1.5 pts)</strong></p><p>a) (1 pt) Explique ce qu'est le copyright et pourquoi il est important de le respecter.</p><p>b) (0.5 pt) Parmi les commandements de l'éthique sur Internet, cite un commandement qui protège la propriété intellectuelle.</p>",
          "reponse": "<p><strong>a) (1 pt)</strong> Le <strong>copyright</strong> (droit d'auteur) est un ensemble de lois qui protège les œuvres originales. Il est important de le respecter pour ne pas violer les droits des créateurs et éviter de se livrer à des actes de piratage ou de contrefaçon.</p><p><strong>b) (0.5 pt)</strong> Le 6ème commandement de l'éthique sur Internet stipule : 'Tu ne dois pas utiliser les ressources informatiques d'autrui sans autorisation'. Le 8ème commandement dit : 'Tu ne dois pas t'approprier le travail intellectuel d'autrui'.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Algorithmique (5 pts)",
      "points": "5 pts",
      "enonce": "<div class='exercise-block'><p>Cet exercice permet de mettre en pratique les compétences en résolution de problèmes et en algorithmique.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. Résolution de problème (2 pts)</strong></p><p>Décris les étapes de résolution d'un problème que tu utiliserais pour créer un algorithme qui calcule la moyenne des notes d'une classe.</p>",
          "reponse": "<p>Les étapes sont :</p><ol><li><strong>Analyse du problème :</strong> Comprendre ce qu'on nous demande (calculer la moyenne).</li><li><strong>Décomposition :</strong> Identifier les données d'entrée (les notes) et le résultat attendu (la moyenne).</li><li><strong>Recherche de solution :</strong> Formaliser la formule : Somme des notes / Nombre d'élèves.</li><li><strong>Rédaction de l'algorithme :</strong> Écrire les instructions dans un langage structuré.</li><li><strong>Test et validation :</strong> Vérifier le résultat sur un exemple.</li></ol>"
        },
        {
          "question": "<p><strong>2. Structures de contrôle (3 pts)</strong></p><p>a) (1 pt) À quoi sert une structure alternative (<code>SI...ALORS...SINON</code>) dans un algorithme ?</p><p>b) (2 pts) Écris un algorithme en LDA (Langage de Définition des Algorithmes) qui lit un nombre entier et affiche 'Pair' s'il est pair, et 'Impair' s'il est impair.</p>",
          "reponse": "<p><strong>a) (1 pt)</strong> Une structure alternative permet d'exécuter un bloc d'instructions seulement si une condition est vraie (SI), et un autre bloc si elle est fausse (SINON) .</p><p><strong>b) (2 pts)</strong></p><pre><code>Algorithme Parite\n  Variable nombre : Entier\n  \n  Debut\n    Ecrire(\"Entrez un nombre entier :\")\n    Lire(nombre)\n    \n    SI (nombre MOD 2 = 0) ALORS\n        Ecrire(\"Pair\")\n    SINON\n        Ecrire(\"Impair\")\n    FINSI\n  Fin\n</code></pre><p><em>Remarque : L'opérateur MOD donne le reste de la division entière.</em></p>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
