<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Informatique",
  "classe": "Quatrième",
  "sequence": "Séquence 3",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Le Matériel et les Logiciels (6 pts)",
      "points": "6 pts",
      "enonce": "<div style='font-size:1.1em; line-height:1.6;'><p>Cet exercice porte sur les composants de l'unité centrale, les mémoires et les logiciels.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>1. (2 pts)</strong> Cite trois composants internes de l'unité centrale et donne pour chacun d'eux une fonction.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p><strong>Exemples de réponses :</strong></p><ul><li><strong>Processeur (CPU) :</strong> Il exécute les instructions des programmes et traite les données.</li><li><strong>Mémoire RAM :</strong> Elle stocke temporairement les données et les programmes en cours d'utilisation pour un accès rapide.</li><li><strong>Disque dur (HDD/SSD) :</strong> Il stocke de manière permanente les données, les programmes et le système d'exploitation.</li></ul></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>2. (1.5 pts)</strong> Classe les mémoires suivantes selon leur volatilité : <strong>ROM, RAM, EEPROM, SDRAM, PROM.</strong></p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><ul><li><strong>Mémoires vives (volatiles) :</strong> RAM, SDRAM</li><li><strong>Mémoires mortes (non volatiles) :</strong> ROM, EEPROM, PROM</li></ul></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>3. (1.5 pts)</strong> Donne la fonction principale d'un système d'exploitation et cite un exemple de logiciel système autre qu'un système d'exploitation.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p><strong>Fonction principale :</strong> Un système d'exploitation (SE) a pour rôle de gérer les ressources matérielles de l'ordinateur, de faire l'interface entre l'utilisateur et le matériel, et de fournir un environnement d'exécution pour les logiciels applicatifs.</p><p><strong>Exemple de logiciel système :</strong> Un pilote (driver), un utilitaire (ex: antivirus, défragmenteur) ou un compilateur.</p></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>4. (1 pt)</strong> Qu'appelle-t-on un logiciel applicatif ? Donne un exemple.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p>Un logiciel applicatif est un programme conçu pour aider l'utilisateur à effectuer une tâche spécifique (traitement de texte, calcul, jeu, navigation, etc.).</p><p><strong>Exemple :</strong> Microsoft Word, LibreOffice Calc, Google Chrome, un jeu vidéo.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Internet et Production de Contenus Numériques (7 pts)",
      "points": "7 pts",
      "enonce": "<div style='font-size:1.1em; line-height:1.6;'><p>Cet exercice évalue vos compétences sur la recherche d'informations, la communication et l'utilisation des outils bureautiques sur Internet.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>1. (1.5 pts)</strong> Cite deux fournisseurs de services Internet (FAI) présents au Cameroun. Donne ensuite un exemple de service proposé par l'Internet.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p><strong>FAI :</strong> <span style='font-weight:bold;'>Camtel</span>, <span style='font-weight:bold;'>Orange Cameroun</span>, <span style='font-weight:bold;'>MTN Cameroun</span> (Choisir deux).</p><p><strong>Service Internet :</strong> Le World Wide Web (WWW) permet de consulter des pages web, la messagerie électronique (Email) permet d'envoyer des messages, le Chat (messagerie instantanée), la visioconférence, etc.</p></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>2. (2 pts)</strong> Explique à quoi sert un moteur de recherche. Donne l'URL de deux moteurs de recherche populaires.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p>Un moteur de recherche est un service en ligne qui permet de trouver des informations sur le Web en indexant des pages et en fournissant des résultats pertinents en réponse à des mots-clés saisis par l'utilisateur.</p><p><strong>Exemples d'URL :</strong> <a href='https://www.google.com' target='_blank' style='color:#2d6a4f;'>www.google.com</a>, <a href='https://www.bing.com' target='_blank' style='color:#2d6a4f;'>www.bing.com</a>, <a href='https://duckduckgo.com' target='_blank' style='color:#2d6a4f;'>duckduckgo.com</a></p></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>3. (2 pts)</strong> Dans un traitement de texte, une fois le texte saisi, quelles opérations de mise en forme peut-on appliquer sur la police et sur le paragraphe ? Cite deux opérations pour chacun.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p><strong>Mise en forme de la police :</strong></p><ul><li>Changer la <span style='font-weight:bold;'>nature</span> (ex: Arial, Times New Roman).</li><li>Changer la <span style='font-weight:bold;'>taille</span> (ex: 12, 14).</li><li>Appliquer un <span style='font-weight:bold;'>style</span> (gras, italique, souligné).</li><li>Changer la <span style='font-weight:bold;'>couleur</span> du texte.</li></ul><p><strong>Mise en forme du paragraphe :</strong></p><ul><li>Changer l'<span style='font-weight:bold;'>alignement</span> (gauche, centré, droite, justifié).</li><li>Modifier l'<span style='font-weight:bold;'>interligne</span> (simple, double).</li><li>Gérer les <span style='font-weight:bold;'>retraits</span> (de première ligne, de gauche, de droite).</li><li>Définir l'<span style='font-weight:bold;'>espacement</span> avant et après le paragraphe.</li></ul></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>4. (1.5 pts)</strong> Dans un tableur, qu'est-ce qu'une cellule et une plage de cellules ? Donne un exemple d'adresse de cellule et un exemple de notation d'une plage de cellules.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><ul><li>Une <span style='font-weight:bold;'>cellule</span> est l'intersection d'une ligne et d'une colonne dans une feuille de calcul. C'est l'unité de base pour stocker des données (texte, nombre, formule).</li><li>Une <span style='font-weight:bold;'>plage de cellules</span> est un ensemble de cellules contiguës (adjacentes) ou non.</li><li><strong>Exemple d'adresse de cellule :</strong> <span style='background-color:#e9ecef; padding:0.2rem 0.5rem; border-radius:5px; font-family:monospace;'>B4</span> (colonne B, ligne 4).</li><li><strong>Exemple de notation d'une plage :</strong> <span style='background-color:#e9ecef; padding:0.2rem 0.5rem; border-radius:5px; font-family:monospace;'>A1:C3</span> (toutes les cellules du rectangle allant de A1 à C3).</li></ul></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Citoyenneté Numérique (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='font-size:1.1em; line-height:1.6;'><p>Cet exercice porte sur la protection de votre vie privée, la gestion de votre empreinte numérique et le respect de la propriété intellectuelle.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>1. (1.5 pts)</strong> Cite une pratique qui peut violer la vie privée sur Internet. Cite ensuite une pratique qui permet de se protéger et de garantir sa vie privée.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p><strong>Violation de la vie privée :</strong> Publier des photos d'une personne sur les réseaux sociaux sans son consentement.</p><p><strong>Pratique pour se protéger :</strong> Utiliser des mots de passe forts et différents pour chaque compte, paramétrer les options de confidentialité de ses comptes sur les réseaux sociaux (ex: rendre son profil privé) et ne pas partager d'informations personnelles (adresse, numéro de téléphone) en public.</p></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>2. (1 pt)</strong> Nomme les quatre caractéristiques d'une empreinte numérique.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p>Les caractéristiques d'une empreinte numérique sont :</p><ul><li><span style='font-weight:bold;'>Immuable</span> (ou persistance) : elle peut être conservée indéfiniment.</li><li><span style='font-weight:bold;'>Inaltérable</span> (ou infalsifiable) : difficile à modifier ou supprimer complètement.</li><li><span style='font-weight:bold;'>Individuelle</span> : elle est unique à chaque personne.</li><li><span style='font-weight:bold;'>Classifiable</span> : elle peut être analysée et catégorisée.</li></ul></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>3. (1.5 pts)</strong> Explique ce qu'est le copyright ou le droit d'auteur. Donne un exemple de ressource numérique protégée par ce droit et un exemple de pratique qui le respecte.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p><strong>Définition :</strong> Le droit d'auteur (ou copyright) est un ensemble de droits exclusifs accordés à l'auteur ou au créateur d'une œuvre originale (littéraire, artistique, scientifique, logiciel, etc.), lui conférant un monopole sur l'exploitation de cette œuvre pendant une certaine durée.</p><p><strong>Exemple de ressource protégée :</strong> Un film téléchargé illégalement, un morceau de musique, un article scientifique, un logiciel payant.</p><p><strong>Exemple de pratique respectueuse :</strong> Citer ses sources (auteur, titre, URL, date) lorsqu'on réutilise des informations trouvées en ligne.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Initiation aux Algorithmes (3 pts)",
      "points": "3 pts",
      "enonce": "<div style='font-size:1.1em; line-height:1.6;'><p>Cet exercice porte sur la résolution de problèmes et les structures de contrôle.</p></div>",
      "questions": [
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>1. (1.5 pts)</strong> Lis la situation-problème suivante : <em>\"Un magasin accorde une remise de 10% à tout client dont le montant total des achats est supérieur ou égal à 100 000 FCFA.\"</em></p><p>Propose un algorithme simple (en pseudo-code ou en langage naturel) qui permet de déterminer le montant à payer par un client.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p><strong>Exemple d'algorithme en langage naturel :</strong></p><pre style='background-color:#f8f9fa; color:#212529; padding:1rem; border-radius:8px; font-family:monospace; white-space:pre-wrap; word-break:break-word;'>Algorithme CalculPrix\n    Saisir le montant des achats\n    Si montant >= 100000 Alors\n        prixFinal = montant - (montant * 10 / 100)\n    Sinon\n        prixFinal = montant\n    Fin Si\n    Afficher \"Le montant à payer est de \" + prixFinal + \" FCFA\"\nFin Algorithme</pre></div>"
        },
        {
          "question": "<div style='font-size:1em; line-height:1.6;'><p><strong>2. (1.5 pts)</strong> Dans l'algorithme ci-dessus, identifie la structure de contrôle utilisée. Explique à quoi sert cette structure. Cite une autre structure de contrôle et donne un exemple d'utilisation simple.</p></div>",
          "reponse": "<div style='font-size:1em; line-height:1.6;'><p><strong>Structure utilisée :</strong> La structure est une <span style='font-weight:bold;'>structure alternative</span> (conditionnelle) de type <code style='background-color:#e9ecef; padding:0.2rem 0.4rem; border-radius:5px;'>Si... Sinon...</code>.</p><p><strong>Utilité :</strong> Elle permet d'exécuter un bloc d'instructions seulement si une condition est vraie, et éventuellement un autre bloc d'instructions si la condition est fausse.</p><p><strong>Autre structure de contrôle :</strong> Les structures itératives (<span style='font-weight:bold;'>boucles</span>) comme <code style='background-color:#e9ecef; padding:0.2rem 0.4rem; border-radius:5px;'>Tant que... Faire...</code> ou <code style='background-color:#e9ecef; padding:0.2rem 0.4rem; border-radius:5px;'>Pour... Faire...</code>.</p><p><strong>Exemple :</strong> <em>\"Tant que l'utilisateur n'a pas saisi un nombre positif, on lui redemande de saisir une valeur.\"</em></p></div>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
