<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Informatique",
  "classe": "Quatrième",
  "sequence": "Séquence 6",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "EXERCICE I : MAÎTRISE DES CONNAISSANCES (4 points)",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1.05rem; line-height: 1.8; background: #f8faff; padding: 15px; border-radius: 8px; margin-bottom: 10px; color: #1a1a2e;'><p style='margin-top: 0;'><strong>Consigne :</strong> Réponds par Vrai ou Faux aux affirmations suivantes. Justifie ta réponse en une phrase.</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px; color: #1a1a2e;'><span style='font-weight: bold;'>1.</span> La RAM (Random Access Memory) est une mémoire morte, c'est-à-dire qu'elle conserve ses données même après la mise hors tension de l'ordinateur.</div>",
          "reponse": "<div style='background: #eef5e6; padding: 10px 15px; border-radius: 6px; color: #1a3c34;'><span style='font-weight: bold;'>Faux.</span> La RAM est une mémoire <strong>vive (volatile)</strong> qui perd son contenu lorsque l'ordinateur est éteint. La mémoire morte (ROM) conserve ses données en l'absence d'alimentation.</div>"
        },
        {
          "question": "<div style='margin-bottom: 15px; color: #1a1a2e;'><span style='font-weight: bold;'>2.</span> Le disque dur (HDD) est un support de stockage permanent qui conserve les données même lorsque l'ordinateur est éteint.</div>",
          "reponse": "<div style='background: #eef5e6; padding: 10px 15px; border-radius: 6px; color: #1a3c34;'><span style='font-weight: bold;'>Vrai.</span> Le disque dur est une mémoire de masse non volatile : les données qu'il contient persistent après la mise hors tension de l'ordinateur.</div>"
        },
        {
          "question": "<div style='margin-bottom: 15px; color: #1a1a2e;'><span style='font-weight: bold;'>3.</span> Pour effectuer une recherche sur Internet, il suffit de taper un mot-clé dans la barre d'adresse du navigateur.</div>",
          "reponse": "<div style='background: #eef5e6; padding: 10px 15px; border-radius: 6px; color: #1a3c34;'><span style='font-weight: bold;'>Faux.</span> Pour effectuer une recherche, il faut utiliser un <strong>moteur de recherche</strong> (comme Google, Bing, ou Yahoo) en saisissant le mot-clé dans la barre de recherche du moteur, et non dans la barre d'adresse (qui sert à entrer une URL).</div>"
        },
        {
          "question": "<div style='margin-bottom: 15px; color: #1a1a2e;'><span style='font-weight: bold;'>4.</span> Un algorithme est une suite d'instructions non ordonnées qui permet de résoudre un problème.</div>",
          "reponse": "<div style='background: #eef5e6; padding: 10px 15px; border-radius: 6px; color: #1a3c34;'><span style='font-weight: bold;'>Faux.</span> Un algorithme est une suite <strong>finie et ordonnée</strong> d'instructions permettant de résoudre un problème. L'ordre des instructions est essentiel pour obtenir le résultat attendu.</div>"
        }
      ]
    },
    {
      "titre": "EXERCICE II : APPLICATION DES CONNAISSANCES (5 points)",
      "points": "5 pts",
      "enonce": "<div style='font-size: 1.05rem; line-height: 1.8; background: #f8faff; padding: 15px; border-radius: 8px; margin-bottom: 10px; color: #1a1a2e;'><p style='margin-top: 0;'><strong>Consigne :</strong> Relie chaque composant ou notion à sa définition en écrivant la lettre correspondante dans le tableau.</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 20px; color: #1a1a2e;'><p><strong>Composants / Notions :</strong></p><ul style='list-style: none; padding-left: 5px;'><li style='margin-bottom: 5px;'>1. Processeur</li><li style='margin-bottom: 5px;'>2. Carte mère</li><li style='margin-bottom: 5px;'>3. Système d'exploitation</li><li style='margin-bottom: 5px;'>4. Moteur de recherche</li></ul><p style='margin-top: 15px;'><strong>Définitions :</strong></p><ul style='list-style: none; padding-left: 5px;'><li style='margin-bottom: 5px;'>A. Carte principale qui relie tous les composants de l'ordinateur entre eux.</li><li style='margin-bottom: 5px;'>B. Logiciel système qui gère les ressources de l'ordinateur et permet l'exécution des applications.</li><li style='margin-bottom: 5px;'>C. Outil en ligne permettant de trouver des informations sur le web à partir de mots-clés.</li><li style='margin-bottom: 5px;'>D. Composant matériel qui exécute les instructions et traite les données.</li></ul></div>",
          "reponse": "<div style='background: #eef5e6; padding: 10px 15px; border-radius: 6px; color: #1a3c34;'><table style='width: 100%; border-collapse: collapse; color: #1a3c34;'><thead><tr style='background: #d4e2c0;'><th style='padding: 6px; border: 1px solid #a0b88a;'>Composant / Notion</th><th style='padding: 6px; border: 1px solid #a0b88a;'>Définition</th></tr></thead><tbody><tr><td style='padding: 6px; border: 1px solid #a0b88a;'>1. Processeur</td><td style='padding: 6px; border: 1px solid #a0b88a;'>D</td></tr><tr><td style='padding: 6px; border: 1px solid #a0b88a;'>2. Carte mère</td><td style='padding: 6px; border: 1px solid #a0b88a;'>A</td></tr><tr><td style='padding: 6px; border: 1px solid #a0b88a;'>3. Système d'exploitation</td><td style='padding: 6px; border: 1px solid #a0b88a;'>B</td></tr><tr><td style='padding: 6px; border: 1px solid #a0b88a;'>4. Moteur de recherche</td><td style='padding: 6px; border: 1px solid #a0b88a;'>C</td></tr></tbody></table></div>"
        }
      ]
    },
    {
      "titre": "EXERCICE III : ANALYSE ET RÉSOLUTION DE PROBLÈMES (5 points)",
      "points": "5 pts",
      "enonce": "<div style='font-size: 1.05rem; line-height: 1.8; background: #f8faff; padding: 15px; border-radius: 8px; margin-bottom: 10px; color: #1a1a2e;'><p style='margin-top: 0;'><strong>Consigne :</strong> Lis attentivement les situations suivantes, puis réponds aux questions.</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 15px; color: #1a1a2e;'><span style='font-weight: bold;'>Situation 1 :</span> <strong>(1.5 points)</strong> Tu dois rédiger un rapport en utilisant un traitement de texte. Tu veux que le titre soit en gras, centré et de taille 14.<br><br>a) Quelle opération de mise en forme dois-tu appliquer au texte pour le mettre en gras ?</div>",
          "reponse": "<div style='background: #eef5e6; padding: 10px 15px; border-radius: 6px; color: #1a3c34;'>Pour mettre le texte en gras, il faut utiliser le raccourci <strong>Ctrl + B</strong> ou cliquer sur l'icône <strong>Gras</strong> dans la barre d'outils du traitement de texte.</div>"
        },
        {
          "question": "<div style='margin-bottom: 15px; color: #1a1a2e;'><span style='font-weight: bold;'>b)</span> Quel outil du traitement de texte utilises-tu pour centrer le titre ?</div>",
          "reponse": "<div style='background: #eef5e6; padding: 10px 15px; border-radius: 6px; color: #1a3c34;'>Pour centrer le texte, on utilise l'option d'alignement <strong>Centrer</strong> dans la barre d'outils de mise en forme du paragraphe.</div>"
        },
        {
          "question": "<div style='margin-bottom: 15px; color: #1a1a2e;'><span style='font-weight: bold;'>Situation 2 :</span> <strong>(1.5 points)</strong> Un élève veut calculer la moyenne de ses notes (12, 14, 16, 10 et 18) à l'aide d'un tableur.<br><br>Quelle fonction du tableur doit-il utiliser pour obtenir la moyenne de ces cinq notes ?</div>",
          "reponse": "<div style='background: #eef5e6; padding: 10px 15px; border-radius: 6px; color: #1a3c34;'>L'élève doit utiliser la fonction <strong>MOYENNE</strong> (ou AVERAGE en anglais). Par exemple : <strong>=MOYENNE(12;14;16;10;18)</strong> ou en sélectionnant la plage de cellules contenant les notes.</div>"
        },
        {
          "question": "<div style='margin-bottom: 15px; color: #1a1a2e;'><span style='font-weight: bold;'>Situation 3 :</span> <strong>(2 points)</strong> Voici un algorithme simple qui calcule la somme de deux nombres :<br><br><strong>Algorithme SommeDeuxNombres</strong><br><strong>VAR</strong> a, b, somme : Réel<br><strong>DÉBUT</strong><br>Ecrire(\"Entrez le premier nombre : \")<br>Lire(a)<br>Ecrire(\"Entrez le deuxième nombre : \")<br>Lire(b)<br>somme ← a + b<br>Ecrire(\"La somme est : \", somme)<br><strong>FIN</strong><br><br>a) Si l'utilisateur saisit 15 pour a et 27 pour b, quel résultat sera affiché ?</div>",
          "reponse": "<div style='background: #eef5e6; padding: 10px 15px; border-radius: 6px; color: #1a3c34;'>Le résultat affiché sera <strong>42</strong> car 15 + 27 = 42.</div>"
        },
        {
          "question": "<div style='margin-bottom: 15px; color: #1a1a2e;'><span style='font-weight: bold;'>b)</span> Modifie l'algorithme pour qu'il calcule le <strong>produit</strong> des deux nombres.</div>",
          "reponse": "<div style='background: #eef5e6; padding: 10px 15px; border-radius: 6px; color: #1a3c34;'>Il faut remplacer l'instruction <strong>somme ← a + b</strong> par <strong>produit ← a * b</strong> et modifier l'affichage en conséquence.</div>"
        }
      ]
    },
    {
      "titre": "EXERCICE IV : PRODUCTION ÉCRITE (6 points)",
      "points": "6 pts",
      "enonce": "<div style='font-size: 1.05rem; line-height: 1.8; background: #f8faff; padding: 15px; border-radius: 8px; margin-bottom: 10px; color: #1a1a2e;'><p style='margin-top: 0;'><strong>Consigne :</strong> Rédige un développement structuré (introduction, développement, conclusion) en une dizaine de lignes répondant au sujet suivant :</p><div style='background: #f0f3f9; padding: 15px; border-radius: 6px; margin: 10px 0; border-left: 4px solid #2c3e50; color: #1a1a2e;'><p style='font-weight: bold; margin: 0;'>Sujet : Explique l'importance de l'algorithme dans la résolution de problèmes informatiques et donne un exemple de structure de contrôle utilisée.</p></div></div>",
      "questions": [
        {
          "question": "<div style='color: #1a1a2e;'><p style='font-size: 0.95rem; color: #4a4a6a;'><em>Votre production doit comporter une introduction présentant le sujet, un développement structuré en paragraphes, et une conclusion.</em></p></div>",
          "reponse": "<div style='background: #eef5e6; padding: 10px 15px; border-radius: 6px; color: #1a3c34;'><p><strong>Éléments de corrigé :</strong></p><ul style='padding-left: 20px;'><li><strong>Introduction :</strong> Définit un algorithme comme une suite d'instructions permettant de résoudre un problème et annonce son importance en informatique.</li><li><strong>Développement :</strong> <ul style='padding-left: 20px;'><li><strong>1. Importance de l'algorithme :</strong> L'algorithme est le fondement de tout programme informatique. Il permet de décomposer un problème complexe en étapes simples, de formaliser une solution et d'assurer sa reproductibilité. C'est un outil de réflexion indispensable avant la programmation.</li><li><strong>2. Exemple de structure de contrôle :</strong> On peut citer la structure <strong>alternative</strong> (SI...ALORS...SINON). Elle permet de prendre des décisions en fonction d'une condition. Par exemple : <em>\"SI l'âge est supérieur ou égal à 18 ALORS afficher 'Mineur' SINON afficher 'Majeur'\"</em>.</li></ul></li><li><strong>Conclusion :</strong> Souligne que la maîtrise des algorithmes et des structures de contrôle est essentielle pour tout futur informaticien car elle permet de résoudre efficacement une multitude de problèmes.</li></ul></div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
