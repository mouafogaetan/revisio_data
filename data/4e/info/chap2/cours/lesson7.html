<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }

    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }

    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }

    .content-card li:last-child {
        border-bottom: none;
    }

    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }

    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }

    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }

    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }

    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }

    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }

    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }

    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }

    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }

    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }

    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }

    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }

    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }

    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }

    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }

    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }

    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }

    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }

    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }

    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }

    /* Mode jour (par défaut) - ajouté par le script de thème */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>

<div class="app-container">

    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>

    <main class="slide-body" id="slideBody"></main>

    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>

    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>

        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        
            <button class="btn btn-secondary" id="themeToggle" style="font-size:1.2rem; min-width:40px; padding:8px 12px;" title="Passer en mode nuit">
                🌓
            </button>
        </div>

        <div class="auto-indicator" id="autoIndicator">⏸ Lecture manuelle</div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Qu'est-ce qu'un traitement de texte ?",
    "contenu": "<div style='padding: 12px; background: #E3F2FD; border-radius: 12px; border-left: 6px solid #1565C0;; color: #000000'><p style='margin: 5px 0; font-size: 1rem; line-height: 1.6; color: #0D2B3E;'><strong>Définition :</strong> Un traitement de texte est un <span style='background: #FFE082; padding: 2px 6px; border-radius: 4px;; color: #000000'>logiciel applicatif</span> qui permet de créer, modifier et mettre en forme des documents textuels.</p><div style='background: #FFFFFF; padding: 12px; border-radius: 8px; margin-top: 10px; border: 1px solid #90CAF9;; color: #000000'><p style='margin: 0; font-size: 0.95rem; color: #1A237E;'><span style='font-weight: bold;'>📝 Exemples de traitements de texte :</span></p><ul style='margin: 5px 0 0 0; padding-left: 20px; font-size: 0.95rem; color: #1A237E;'><li><strong>Microsoft Word</strong> (payant, très utilisé)</li><li><strong>LibreOffice Writer</strong> (gratuit, open source)</li><li><strong>Google Docs</strong> (gratuit, en ligne)</li><li><strong>WordPad</strong> (simple, inclus avec Windows)</li></ul></div><div style='background: #FFF9C4; padding: 8px 12px; border-radius: 8px; margin-top: 10px;; color: #000000'><p style='margin: 0; font-size: 0.9rem; color: #4E342E;'><span style='font-weight: bold;'>💡 À retenir :</span> Un traitement de texte permet de corriger les fautes, de changer la présentation et d'ajouter des images, contrairement au Bloc-notes qui ne gère que le texte brut.</p></div></div>",
    "texteParle": "Bonjour à tous. Aujourd'hui, nous allons découvrir un outil indispensable : le traitement de texte. C'est un logiciel qui vous permet d'écrire, de modifier et de mettre en forme des documents. Vous l'utiliserez pour faire vos devoirs, des lettres, des rapports. Il existe plusieurs traitements de texte. Le plus connu est Microsoft Word. Mais il y a aussi LibreOffice Writer qui est gratuit, ou Google Docs qui fonctionne en ligne sans rien installer. Contrairement au Bloc-notes qui ne gère que du texte brut, le traitement de texte permet de corriger les fautes d'orthographe, de changer la taille ou la couleur des caractères, et d'ajouter des images.",
    "note": "Le traitement de texte est un logiciel pour créer et mettre en forme des documents."
  },
  {
    "titre": "Interface d'un traitement de texte",
    "contenu": "<div style='padding: 12px; background: #F3E5F5; border-radius: 12px; border-left: 6px solid #7B1FA2;; color: #000000'><p style='margin: 0 0 10px 0; font-weight: bold; font-size: 1rem; color: #4A148C;'>🖥️ Les éléments de l'interface :</p><div style='background: #E1BEE7; padding: 8px 12px; border-radius: 6px; margin-bottom: 6px;; color: #000000'><p style='margin: 0; font-size: 0.9rem; color: #1E2A36;'><strong>🔝 Barre de titre :</strong> Affiche le nom du document et du logiciel.</p></div><div style='background: #CE93D8; padding: 8px 12px; border-radius: 6px; margin-bottom: 6px;; color: #000000'><p style='margin: 0; font-size: 0.9rem; color: #1E2A36;'><strong>📋 Barre de menus :</strong> Contient les menus (Fichier, Édition, Affichage, Insertion, etc.).</p></div><div style='background: #BA68C8; padding: 8px 12px; border-radius: 6px; margin-bottom: 6px;; color: #000000'><p style='margin: 0; font-size: 0.9rem; color: #FFFFFF;'><strong>🛠️ Barre d'outils (ou Ruban) :</strong> Raccourcis vers les fonctions fréquentes (gras, centrer, etc.).</p></div><div style='background: #9C27B0; padding: 8px 12px; border-radius: 6px; margin-bottom: 6px;; color: #ffffff'><p style='margin: 0; font-size: 0.9rem; color: #FFFFFF;'><strong>📄 Zone de travail :</strong> L'espace où vous écrivez et mettez en page le document.</p></div><div style='background: #6A1B9A; padding: 8px 12px; border-radius: 6px;; color: #ffffff'><p style='margin: 0; font-size: 0.9rem; color: #FFFFFF;'><strong>📊 Barre d'état :</strong> Indique le nombre de pages, la langue, le zoom, etc.</p></div></div>",
    "texteParle": "L'interface d'un traitement de texte est composée de plusieurs éléments. En haut, la barre de titre indique le nom du document sur lequel vous travaillez. En dessous, la barre de menus avec les différents menus. Dans Microsoft Word, on trouve plutôt un Ruban avec des onglets. La barre d'outils contient les raccourcis pour les actions courantes. La zone de travail est l'espace blanc où vous allez écrire votre texte. Enfin, la barre d'état, en bas, donne des informations utiles comme le nombre de pages ou la langue du dictionnaire utilisé.",
    "note": "L'interface type d'un traitement de texte est organisée pour faciliter la création de documents."
  },
  {
    "titre": "Saisir et corriger un texte",
    "contenu": "<div style='padding: 12px; background: #E8F5E9; border-radius: 12px; border-left: 6px solid #2E7D32;; color: #000000'><p style='margin: 0 0 10px 0; font-weight: bold; font-size: 1rem; color: #1B5E20;'>⌨️ La saisie de texte :</p><div style='background: #C8E6C9; padding: 10px 14px; border-radius: 8px; margin-bottom: 8px;; color: #000000'><p style='margin: 0; font-size: 0.95rem; color: #1B3A1B;'><strong>👉 Saisir du texte :</strong> Utilisez le clavier pour taper votre contenu. Le texte s'insère à l'endroit où se trouve le <span style='background: #FFE082; padding: 2px 6px; border-radius: 4px;; color: #000000'>curseur clignotant</span>.</p></div><div style='background: #A5D6A7; padding: 10px 14px; border-radius: 8px; margin-bottom: 8px;; color: #000000'><p style='margin: 0; font-size: 0.95rem; color: #1B3A1B;'><strong>🔄 Retour à la ligne :</strong> Appuyez sur <strong>Entrée</strong> pour créer un nouveau paragraphe.</p></div><div style='background: #81C784; padding: 10px 14px; border-radius: 8px; margin-bottom: 8px;; color: #000000'><p style='margin: 0; font-size: 0.95rem; color: #1B3A1B;'><strong>📝 Correction des fautes :</strong> Utilisez le <span style='background: #FFE082; padding: 2px 6px; border-radius: 4px;; color: #000000'>correcteur orthographique</span> (soulignement rouge).</p></div><div style='background: #66BB6A; padding: 10px 14px; border-radius: 8px;; color: #000000'><p style='margin: 0; font-size: 0.95rem; color: #1B3A1B;'><strong>🔍 Rechercher / Remplacer :</strong> Trouver un mot dans le document et le remplacer si nécessaire (Ctrl+F).</p></div></div>",
    "texteParle": "Commençons par la saisie du texte. Pour écrire, il suffit de taper sur le clavier. Le texte s'inscrit à l'endroit où se trouve le curseur, qui est une petite barre verticale clignotante. Pour aller à la ligne, appuyez sur la touche Entrée. Cela crée un nouveau paragraphe. Le traitement de texte vous aide à corriger vos fautes d'orthographe : les mots mal orthographiés sont souvent soulignés en rouge. Vous pouvez faire un clic droit dessus pour voir les suggestions de correction. Vous pouvez aussi rechercher un mot avec Ctrl+F, et même le remplacer automatiquement par un autre.",
    "note": "La saisie et la correction du texte sont les bases de l'utilisation d'un traitement de texte."
  },
  {
    "titre": "Mise en forme de la police",
    "contenu": "<div style='padding: 12px; background: #FFF8E1; border-radius: 12px; border-left: 6px solid #F57F17;; color: #000000'><p style='margin: 0 0 10px 0; font-weight: bold; font-size: 1rem; color: #4E342E;'>🎨 Mise en forme des caractères (police) :</p><div style='display: flex; flex-wrap: wrap; gap: 8px;'><div style='flex: 1 1 45%; background: #FFECB3; padding: 8px 12px; border-radius: 6px;; color: #000000'><p style='margin: 0; font-size: 0.9rem; color: #3E2723;'><strong>🔤 Police (Type)</strong></p><ul style='margin: 4px 0 0 0; padding-left: 16px; font-size: 0.85rem; color: #3E2723;'><li>Times New Roman</li><li>Arial</li><li>Calibri</li></ul></div><div style='flex: 1 1 45%; background: #FFE0B2; padding: 8px 12px; border-radius: 6px;; color: #000000'><p style='margin: 0; font-size: 0.9rem; color: #3E2723;'><strong>📏 Taille</strong></p><ul style='margin: 4px 0 0 0; padding-left: 16px; font-size: 0.85rem; color: #3E2723;'><li>12 (taille normale)</li><li>14 (titre)</li><li>10 (petit)</li></ul></div><div style='flex: 1 1 45%; background: #FFCC80; padding: 8px 12px; border-radius: 6px;; color: #000000'><p style='margin: 0; font-size: 0.9rem; color: #3E2723;'><strong>🖌️ Style</strong></p><ul style='margin: 4px 0 0 0; padding-left: 16px; font-size: 0.85rem; color: #3E2723;'><li><b>Gras (Ctrl+B)</b></li><li><i>Italique (Ctrl+I)</i></li><li><u>Souligné (Ctrl+U)</u></li></ul></div><div style='flex: 1 1 45%; background: #FFA726; padding: 8px 12px; border-radius: 6px;; color: #000000'><p style='margin: 0; font-size: 0.9rem; color: #FFFFFF;'><strong>🎨 Couleur</strong></p><ul style='margin: 4px 0 0 0; padding-left: 16px; font-size: 0.85rem; color: #FFFFFF;'><li>Couleur de police</li><li>Couleur de surlignage</li></ul></div></div></div>",
    "texteParle": "La mise en forme des caractères s'appelle la police. Vous pouvez changer plusieurs choses. D'abord, le type de police : Times New Roman, Arial ou Calibri par exemple. Ensuite, la taille de la police : 12 pour un texte normal, 14 pour un titre. Vous pouvez aussi appliquer des styles : gras pour mettre en valeur, italique pour une citation, souligné pour un titre. Et bien sûr, changer la couleur du texte pour le rendre plus attractif. Pour appliquer ces modifications, sélectionnez d'abord le texte concerné, puis choisissez l'option dans le ruban ou la barre d'outils.",
    "note": "La mise en forme de la police permet d'embellir et de structurer le texte."
  },
  {
    "titre": "Mise en forme des paragraphes",
    "contenu": "<div style='padding: 12px; background: #E0F7FA; border-radius: 12px; border-left: 6px solid #00838F;; color: #000000'><p style='margin: 0 0 10px 0; font-weight: bold; font-size: 1rem; color: #004D40;'>📐 Mise en forme des paragraphes :</p><div style='background: #B2EBF2; padding: 8px 12px; border-radius: 6px; margin-bottom: 6px;; color: #000000'><p style='margin: 0; font-size: 0.9rem; color: #004D40;'><strong>↔️ Alignement :</strong></p><ul style='margin: 4px 0 0 0; padding-left: 16px; font-size: 0.85rem; color: #004D40;'><li><span style='background: #E0E0E0; padding: 2px 6px; border-radius: 4px;; color: #000000'>Gauche</span> (Ctrl+L) : alignement par défaut</li><li><span style='background: #E0E0E0; padding: 2px 6px; border-radius: 4px;; color: #000000'>Centré</span> (Ctrl+E) : pour les titres</li><li><span style='background: #E0E0E0; padding: 2px 6px; border-radius: 4px;; color: #000000'>Droite</span> (Ctrl+D) : pour les dates</li><li><span style='background: #E0E0E0; padding: 2px 6px; border-radius: 4px;; color: #000000'>Justifié</span> (Ctrl+J) : aligné à gauche et à droite</li></ul></div><div style='background: #80DEEA; padding: 8px 12px; border-radius: 6px; margin-bottom: 6px;; color: #000000'><p style='margin: 0; font-size: 0.9rem; color: #004D40;'><strong>↕️ Interligne :</strong> L'espace entre les lignes (simple, 1.5, double).</p></div><div style='background: #4DD0E1; padding: 8px 12px; border-radius: 6px;; color: #000000'><p style='margin: 0; font-size: 0.9rem; color: #004D40;'><strong>📏 Retrait :</strong> Décalage de la première ligne ou de tout le paragraphe.</p></div></div>",
    "texteParle": "La mise en forme des paragraphes est importante pour la lisibilité de votre document. Vous pouvez choisir l'alignement. L'alignement gauche est le plus courant. Le centrage est utilisé pour les titres. L'alignement à droite pour les dates ou les adresses. La justification est souvent utilisée dans les livres et les journaux pour que le texte soit aligné à gauche et à droite. Vous pouvez aussi modifier l'interligne, c'est-à-dire l'espace entre les lignes, pour aérer le texte. Et le retrait permet de décaler la première ligne du paragraphe, comme dans un livre.",
    "note": "La mise en forme des paragraphes améliore la présentation du document."
  },
  {
    "titre": "Utilisation des styles",
    "contenu": "<div style='padding: 12px; background: #FBE9E7; border-radius: 12px; border-left: 6px solid #D84315;; color: #000000'><p style='margin: 0 0 10px 0; font-weight: bold; font-size: 1rem; color: #4E342E;'>🎯 Les styles : une mise en forme rapide et cohérente</p><div style='background: #FFFFFF; padding: 12px; border-radius: 8px; border: 1px solid #D7CCC8;; color: #000000'><p style='margin: 0; font-size: 0.95rem; color: #1E2A36;'><strong>Un style</strong> est un ensemble prédéfini de mises en forme (police, taille, couleur, espacement).</p></div><div style='background: #FFAB91; padding: 10px 14px; border-radius: 8px; margin-top: 8px;; color: #000000'><p style='margin: 0; font-size: 0.9rem; color: #3E2723;'><strong>Exemples de styles dans Word :</strong></p><ul style='margin: 4px 0 0 0; padding-left: 20px; font-size: 0.9rem; color: #3E2723;'><li><span style='background: #FFF3E0; padding: 2px 8px; border-radius: 4px; font-size: 1.1rem; font-weight: bold;; color: #000000'>Titre 1</span> – Pour les titres principaux</li><li><span style='background: #FFF3E0; padding: 2px 8px; border-radius: 4px; font-size: 1rem; font-weight: bold;; color: #000000'>Titre 2</span> – Pour les sous-titres</li><li><span style='background: #FFF3E0; padding: 2px 8px; border-radius: 4px;; color: #000000'>Normal</span> – Pour le texte courant</li></ul></div><div style='background: #FF8A65; padding: 8px 12px; border-radius: 8px; margin-top: 8px;; color: #000000'><p style='margin: 0; font-size: 0.9rem; color: #FFFFFF;'><strong>💡 Avantage :</strong> Modifier un style modifie automatiquement tous les textes qui l'utilisent.</p></div></div>",
    "texteParle": "Les styles sont très utiles pour gagner du temps. Un style est un ensemble de mises en forme enregistrées avec un nom. Par exemple, le style 'Titre 1' peut être défini en Arial gras taille 16 centré. Si vous appliquez ce style à tous vos titres, vous pouvez changer leur apparence en modifiant simplement le style. Tous les titres seront mis à jour automatiquement. C'est très pratique pour avoir un document cohérent. Dans Word, les styles sont dans le ruban, sous l'onglet Accueil. Utilisez-les pour vos rapports et vos devoirs.",
    "note": "Les styles assurent une mise en forme homogène et rapide du document."
  },
  {
    "titre": "Enregistrer un document",
    "contenu": "<div style='padding: 12px; background: #E8F5E9; border-radius: 12px; border-left: 6px solid #2E7D32;; color: #000000'><p style='margin: 0 0 10px 0; font-weight: bold; font-size: 1rem; color: #1B5E20;'>💾 Enregistrer son travail :</p><div style='background: #C8E6C9; padding: 10px 14px; border-radius: 8px; margin-bottom: 8px;; color: #000000'><p style='margin: 0; font-size: 0.95rem; color: #1B3A1B;'><strong>📌 Enregistrer (Ctrl+S) :</strong> Sauvegarde le document avec le nom actuel.</p></div><div style='background: #A5D6A7; padding: 10px 14px; border-radius: 8px; margin-bottom: 8px;; color: #000000'><p style='margin: 0; font-size: 0.95rem; color: #1B3A1B;'><strong>📌 Enregistrer sous (F12) :</strong> Sauvegarde avec un nouveau nom ou dans un autre format.</p></div><div style='background: #81C784; padding: 10px 14px; border-radius: 8px; margin-bottom: 8px;; color: #000000'><p style='margin: 0; font-size: 0.95rem; color: #1B3A1B;'><strong>📁 Choisir l'emplacement :</strong> Sélectionnez le dossier où vous voulez ranger le fichier.</p></div><div style='background: #66BB6A; padding: 10px 14px; border-radius: 8px;; color: #000000'><p style='margin: 0; font-size: 0.95rem; color: #1B3A1B;'><strong>📄 Choisir le format :</strong></p><ul style='margin: 4px 0 0 0; padding-left: 20px; font-size: 0.9rem; color: #1B3A1B;'><li><strong>.docx</strong> – Format Word (modifiable)</li><li><strong>.pdf</strong> – Format figé (non modifiable)</li><li><strong>.txt</strong> – Texte brut</li></ul></div></div>",
    "texteParle": "Enregistrer régulièrement son travail est très important. C'est ce qui permet de ne pas perdre vos données en cas de coupure de courant ou de plantage. La touche de raccourci pour enregistrer est Ctrl+S. Quand vous enregistrez pour la première fois, la fenêtre Enregistrer sous s'ouvre. Vous devez choisir le nom du fichier, l'emplacement où le sauvegarder (dans vos documents par exemple), et le format. Le format .docx est le format Word classique. Le format .pdf est utile pour partager un document que vous ne voulez pas voir modifié. N'oubliez pas de sauvegarder régulièrement, surtout après avoir fait des modifications importantes.",
    "note": "Sauvegarder régulièrement son document pour éviter la perte de données."
  },
  {
    "titre": "Insérer des tableaux",
    "contenu": "<div style='padding: 12px; background: #F3E5F5; border-radius: 12px; border-left: 6px solid #7B1FA2;; color: #000000'><p style='margin: 0 0 10px 0; font-weight: bold; font-size: 1rem; color: #4A148C;'>📊 Insérer un tableau :</p><div style='background: #E1BEE7; padding: 10px 14px; border-radius: 8px; margin-bottom: 8px;; color: #000000'><p style='margin: 0; font-size: 0.95rem; color: #1E2A36;'><strong>Méthode 1 :</strong> Menu <strong>Insertion</strong> → <strong>Tableau</strong> → Choisir le nombre de lignes et colonnes.</p></div><div style='background: #CE93D8; padding: 10px 14px; border-radius: 8px; margin-bottom: 8px;; color: #000000'><p style='margin: 0; font-size: 0.95rem; color: #1E2A36;'><strong>Méthode 2 :</strong> Dessiner le tableau manuellement.</p></div><div style='background: #BA68C8; padding: 10px 14px; border-radius: 8px;; color: #000000'><p style='margin: 0; font-size: 0.95rem; color: #FFFFFF;'><strong>✏️ Actions possibles :</strong></p><ul style='margin: 4px 0 0 0; padding-left: 20px; font-size: 0.9rem; color: #FFFFFF;'><li>Ajouter/supprimer des lignes ou colonnes</li><li>Fusionner ou diviser des cellules</li><li>Modifier la bordure et le fond</li><li>Mettre le texte en forme dans les cellules</li></ul></div></div>",
    "texteParle": "Les tableaux sont très utiles pour organiser des informations de manière claire. Pour insérer un tableau, allez dans le menu Insertion, puis Tableau. Vous pouvez choisir le nombre de lignes et de colonnes en déplaçant la souris. Une fois le tableau créé, vous pouvez l'ajuster. Vous pouvez ajouter ou supprimer des lignes et des colonnes. Vous pouvez fusionner des cellules pour créer des titres qui s'étendent sur plusieurs colonnes. Vous pouvez aussi changer la bordure et la couleur de fond. N'oubliez pas que le texte dans les cellules peut aussi être mis en forme comme le texte normal.",
    "note": "Les tableaux permettent de structurer et présenter des données efficacement."
  },
  {
    "titre": "Insérer des illustrations",
    "contenu": "<div style='padding: 12px; background: #FFF8E1; border-radius: 12px; border-left: 6px solid #F57F17;; color: #000000'><p style='margin: 0 0 10px 0; font-weight: bold; font-size: 1rem; color: #4E342E;'>🖼️ Insérer des illustrations :</p><div style='background: #FFECB3; padding: 10px 14px; border-radius: 8px; margin-bottom: 8px;; color: #000000'><p style='margin: 0; font-size: 0.95rem; color: #3E2723;'><strong>📷 Images :</strong> Menu <strong>Insertion</strong> → <strong>Image</strong> → Choisir le fichier sur votre ordinateur.</p></div><div style='background: #FFE0B2; padding: 10px 14px; border-radius: 8px; margin-bottom: 8px;; color: #000000'><p style='margin: 0; font-size: 0.95rem; color: #3E2723;'><strong>🎨 Formes :</strong> Dessiner des formes (flèches, rectangles, cercles) avec <strong>Insertion</strong> → <strong>Formes</strong>.</p></div><div style='background: #FFCC80; padding: 10px 14px; border-radius: 8px; margin-bottom: 8px;; color: #000000'><p style='margin: 0; font-size: 0.95rem; color: #3E2723;'><strong>📐 SmartArt :</strong> Créer des diagrammes et des organigrammes.</p></div><div style='background: #FFA726; padding: 10px 14px; border-radius: 8px;; color: #000000'><p style='margin: 0; font-size: 0.95rem; color: #FFFFFF;'><strong>⚙️ Options :</strong> Redimensionner, déplacer, rogner et habiller le texte autour de l'image.</p></div></div>",
    "texteParle": "Un document avec des images est plus attractif. Pour insérer une image, allez dans Insertion, puis Image. Choisissez le fichier sur votre ordinateur. Vous pouvez aussi insérer des formes géométriques comme des flèches, des rectangles ou des cercles. Les SmartArt permettent de créer des diagrammes pour organiser vos idées. Une fois l'illustration insérée, vous pouvez la redimensionner, la déplacer, la rogner. Vous pouvez aussi choisir comment le texte s'organise autour de l'image : au-dessus, en dessous, ou autour. C'est ce qu'on appelle l'habillage du texte.",
    "note": "Les illustrations rendent le document plus vivant et plus clair."
  },
  {
    "titre": "Mise en page du document",
    "contenu": "<div style='padding: 12px; background: #E0F7FA; border-radius: 12px; border-left: 6px solid #00838F;; color: #000000'><p style='margin: 0 0 10px 0; font-weight: bold; font-size: 1rem; color: #004D40;'>📄 Mise en page du document :</p><div style='display: flex; flex-wrap: wrap; gap: 8px;'><div style='flex: 1 1 45%; background: #B2EBF2; padding: 8px 12px; border-radius: 6px;; color: #000000'><p style='margin: 0; font-size: 0.9rem; color: #004D40;'><strong>📏 Marges</strong></p><ul style='margin: 4px 0 0 0; padding-left: 16px; font-size: 0.85rem; color: #004D40;'><li>Normales (2,54 cm)</li><li>Étroites</li><li>Larges</li><li>Personnalisées</li></ul></div><div style='flex: 1 1 45%; background: #80DEEA; padding: 8px 12px; border-radius: 6px;; color: #000000'><p style='margin: 0; font-size: 0.9rem; color: #004D40;'><strong>📐 Orientation</strong></p><ul style='margin: 4px 0 0 0; padding-left: 16px; font-size: 0.85rem; color: #004D40;'><li><strong>Portrait</strong> (vertical)</li><li><strong>Paysage</strong> (horizontal)</li></ul></div><div style='flex: 1 1 45%; background: #4DD0E1; padding: 8px 12px; border-radius: 6px;; color: #000000'><p style='margin: 0; font-size: 0.9rem; color: #004D40;'><strong>📃 Format de papier</strong></p><ul style='margin: 4px 0 0 0; padding-left: 16px; font-size: 0.85rem; color: #004D40;'><li>A4 (standard)</li><li>A5</li><li>Lettre</li></ul></div><div style='flex: 1 1 45%; background: #26C6DA; padding: 8px 12px; border-radius: 6px;; color: #000000'><p style='margin: 0; font-size: 0.9rem; color: #FFFFFF;'><strong>📄 Autres options</strong></p><ul style='margin: 4px 0 0 0; padding-left: 16px; font-size: 0.85rem; color: #FFFFFF;'><li>En-tête et pied de page</li><li>Numérotation des pages</li><li>Sauts de page</li></ul></div></div></div>",
    "texteParle": "La mise en page détermine l'apparence générale de votre document. Les marges sont l'espace entre le texte et les bords de la page. En général, on utilise des marges normales. L'orientation peut être portrait pour un document vertical, ou paysage pour un document horizontal. Le format standard est le A4. Vous pouvez aussi ajouter un en-tête (en haut de page) et un pied de page (en bas) qui se répètent sur toutes les pages. Vous pouvez numéroter les pages. Pour sauter une page, utilisez le saut de page.",
    "note": "La mise en page donne au document son aspect final avant l'impression."
  },
  {
    "titre": "Imprimer un document",
    "contenu": "<div style='padding: 12px; background: #FBE9E7; border-radius: 12px; border-left: 6px solid #D84315;; color: #000000'><p style='margin: 0 0 10px 0; font-weight: bold; font-size: 1rem; color: #4E342E;'>🖨️ Imprimer son document :</p><div style='background: #FFFFFF; padding: 12px; border-radius: 8px; border: 1px solid #D7CCC8;; color: #000000'><p style='margin: 0; font-size: 0.95rem; color: #1E2A36;'><strong>Étape 1 :</strong> Menu <strong>Fichier</strong> → <strong>Imprimer</strong> (ou Ctrl+P).</p></div><div style='background: #FFAB91; padding: 10px 14px; border-radius: 8px; margin-top: 8px;; color: #000000'><p style='margin: 0; font-size: 0.9rem; color: #3E2723;'><strong>⚙️ Options d'impression :</strong></p><ul style='margin: 4px 0 0 0; padding-left: 20px; font-size: 0.9rem; color: #3E2723;'><li><strong>Choisir l'imprimante</strong> (si plusieurs sont disponibles)</li><li><strong>Nombre de copies</strong> (ex: 2 copies)</li><li><strong>Pages à imprimer</strong> (toutes, page spécifique, plage)</li><li><strong>Recto-verso</strong> (si l'imprimante le permet)</li><li><strong>Aperçu avant impression</strong> pour vérifier l;

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;

    const total = slides.length;
    const synth = window.speechSynthesis;

    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }

    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }

    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        
        loadingCancelled = false;
        isLoading = true;
        
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }

    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }

    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }

    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }

    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }

    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }

    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);

        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }

    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }

            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }

            // Arrêter toute lecture en cours
            stopSpeaking();
            
            // Réinitialiser l'état de pause
            isPaused = false;
            
            showLoading();
            setStatus("Initialisation...", 'loading');

            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;

                let isFinished = false;
                let errorHandled = false;

                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };

                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };

                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    
                    resolve();
                };

                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }

                currentUtterance = utterance;
                
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }

            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }

    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        // Arrêter complètement la lecture
        stopSpeaking();
        
        await new Promise(r => setTimeout(r, 50));
        
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }

        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');

        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }

    async function goToNext() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }

    async function goToPrev() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }

    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }

        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }

        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }

        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }

        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }

    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }

        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }

        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');

        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });

        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });

        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });

        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });

        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });

        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });

        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });

        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }

    init();
});


    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;

    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');

        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            if (header) header.style.background = 'rgba(15, 23, 42, 0.85)';
            if (footer) footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            if (header) header.style.background = 'rgba(255, 255, 255, 0.85)';
            if (footer) footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }

    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
            // Ajouter l'écouteur d'événement click
            themeBtn.addEventListener('click', toggleTheme);
        }
    });

</script>
