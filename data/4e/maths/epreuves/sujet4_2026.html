<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Mathématiques",
  "classe": "Quatrième",
  "sequence": "Séquence 4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Arithmétique – PGCD et PPCM",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6;'>1) Décomposer les nombres 180 et 252 en produit de facteurs premiers. <br> 2) En déduire le PGCD(180 ; 252). <br> 3) Calculer le PPCM(180 ; 252). <br> 4) Un confiseur dispose de 180 bonbons à la menthe et 252 bonbons au caramel. Il souhaite faire des paquets identiques en utilisant tous les bonbons. Quel est le plus grand nombre de paquets qu'il peut réaliser ? Quelle sera la composition de chaque paquet ?</div>",
      "questions": [
        {
          "question": "1) Décomposer 180 et 252 en produit de facteurs premiers.",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> 180 = 2² × 3² × 5 <br> 252 = 2² × 3² × 7 </div>"
        },
        {
          "question": "2) En déduire le PGCD(180 ; 252).",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> PGCD(180 ; 252) = 2² × 3² = 4 × 9 = 36</div>"
        },
        {
          "question": "3) Calculer le PPCM(180 ; 252).",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> PPCM(180 ; 252) = 2² × 3² × 5 × 7 = 4 × 9 × 35 = 1260</div>"
        },
        {
          "question": "4) Problème du confiseur : quel est le plus grand nombre de paquets qu'il peut réaliser ? Quelle sera la composition de chaque paquet ?",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> Le plus grand nombre de paquets correspond au PGCD(180 ; 252) = 36. <br> Chaque paquet contiendra : <br> - 180/36 = 5 bonbons à la menthe <br> - 252/36 = 7 bonbons au caramel</div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Nombres rationnels",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6;'>On considère les fractions suivantes : <br> \( A = \\frac{2}{3} + \\frac{5}{4} \) <br> \( B = \\frac{3}{2} \times \\frac{4}{5} \) <br> \( C = \\frac{2}{5} \div \\frac{3}{7} \) <br> 1) Calculer A, B et C en donnant le résultat sous forme de fraction irréductible. <br> 2) Comparer les fractions \( \\frac{3}{4} \) et \( \\frac{5}{6} \). <br> 3) Donner un encadrement de la fraction \( \\frac{7}{3} \) par deux entiers consécutifs.</div>",
      "questions": [
        {
          "question": "1) Calculer A, B et C.",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> A = 2/3 + 5/4 = (8+15)/12 = 23/12 <br> B = 3/2 × 4/5 = 12/10 = 6/5 <br> C = 2/5 ÷ 3/7 = 2/5 × 7/3 = 14/15</div>"
        },
        {
          "question": "2) Comparer les fractions 3/4 et 5/6.",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> 3/4 = 9/12 et 5/6 = 10/12 <br> 9/12 < 10/12 donc 3/4 < 5/6</div>"
        },
        {
          "question": "3) Encadrer la fraction 7/3 par deux entiers consécutifs.",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> 2 < 7/3 < 3 car 2 = 6/3 et 3 = 9/3.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Puissances et calcul littéral",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6;'>1) Calculer : <br> \( A = 2^3 \times 2^4 \) <br> \( B = \\frac{3^5}{3^2} \) <br> \( C = (5^2)^3 \) <br> 2) Donner l'écriture scientifique de \( 450 \\times 10^6 \). <br> 3) Développer et réduire : \( E = 3(2x - 5) \). <br> 4) Factoriser : \( F = 4x^2 - 9 \).</div>",
      "questions": [
        {
          "question": "1) Calculer A, B et C.",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> A = 2^(3+4) = 2^7 = 128 <br> B = 3^(5-2) = 3^3 = 27 <br> C = 5^(2×3) = 5^6 = 15625</div>"
        },
        {
          "question": "2) Donner l'écriture scientifique de 450 × 10^6.",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> 450 × 10^6 = 4,5 × 10^8</div>"
        },
        {
          "question": "3) Développer et réduire E = 3(2x - 5).",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> E = 3 × 2x - 3 × 5 = 6x - 15</div>"
        },
        {
          "question": "4) Factoriser F = 4x² - 9.",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> F = (2x)² - 3² = (2x - 3)(2x + 3)</div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Équations et inéquations",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6;'>1) Résoudre l'équation : \( 3x + 5 = 14 \). <br> 2) Résoudre l'inéquation : \( 2x - 7 \\leq 9 \). Représenter l'ensemble des solutions sur une droite graduée. <br> 3) Un rectangle a une largeur de 4 cm et une longueur inconnue notée \( x \). Sachant que son périmètre est supérieur à 30 cm, écrire une inéquation qui traduit cette situation, puis la résoudre.</div>",
      "questions": [
        {
          "question": "1) Résoudre l'équation 3x + 5 = 14.",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> 3x + 5 = 14 <br> 3x = 14 - 5 <br> 3x = 9 <br> x = 3</div>"
        },
        {
          "question": "2) Résoudre l'inéquation 2x - 7 ≤ 9 et représenter les solutions.",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> 2x - 7 ≤ 9 <br> 2x ≤ 16 <br> x ≤ 8 <br> S = ]-∞ ; 8] </div>"
        },
        {
          "question": "3) Problème du rectangle : écrire et résoudre l'inéquation.",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> Périmètre = 2(x + 4). <br> Inéquation : 2(x + 4) > 30 <br> 2x + 8 > 30 <br> 2x > 22 <br> x > 11. <br> La longueur doit être strictement supérieure à 11 cm.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Géométrie – Cercle et triangle",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6;'>1) Un cercle a un rayon de 5 cm. Calculer la longueur d'un arc de cercle correspondant à un angle au centre de 72°. (On prendra \( \\pi \\approx 3,14 \)). <br> 2) Soit un triangle ABC rectangle en A tel que AB = 6 cm et AC = 8 cm. <br> a) Calculer la longueur BC. <br> b) Montrer que le triangle ABC est rectangle en A.</div>",
      "questions": [
        {
          "question": "1) Calculer la longueur de l'arc de cercle.",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> L = (π × R × α)/180 = (3,14 × 5 × 72)/180 = 1130,4/180 = 6,28 cm</div>"
        },
        {
          "question": "2.a) Calculer la longueur BC dans le triangle rectangle.",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> BC² = AB² + AC² = 36 + 64 = 100 <br> BC = 10 cm</div>"
        },
        {
          "question": "2.b) Montrer que le triangle ABC est rectangle en A.",
          "reponse": "<div style='background: #eaf2f8; padding: 10px; border-radius: 5px; border-left: 4px solid #2980b9;'><strong>Correction :</strong><br> On vérifie avec la réciproque du théorème de Pythagore : <br> BC² = 100 et AB² + AC² = 36 + 64 = 100 <br> BC² = AB² + AC² donc le triangle ABC est rectangle en A.</div>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
