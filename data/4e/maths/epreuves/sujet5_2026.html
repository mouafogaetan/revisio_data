<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Mathématiques",
  "classe": "Quatrième",
  "sequence": "Séquence 5",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Statistiques - Diagrammes et Moyenne",
      "points": "4 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px; font-size: 1em; line-height: 1.6;'><p>Dans une classe de Quatrième, on a relevé la taille (en cm) de 20 élèves :</p><div style='background-color: #f8f9fa; padding: 12px; border-radius: 8px; margin: 10px 0; text-align: center; font-weight: bold;'>145 - 150 - 148 - 155 - 160 - 142 - 148 - 152 - 155 - 158 - 150 - 145 - 160 - 162 - 148 - 155 - 150 - 148 - 152 - 155</div></div>",
      "questions": [
        {
          "question": "<p> Regroupe ces données dans un tableau d'effectifs avec des classes d'amplitude 5 cm : [140 ; 145[, [145 ; 150[, [150 ; 155[, [155 ; 160[, [160 ; 165[.</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><ul><li>[140 ; 145[ : effectif 1 (142)</li><li>[145 ; 150[ : effectif 6 (145, 145, 148, 148, 148, 148)</li><li>[150 ; 155[ : effectif 5 (150, 150, 150, 152, 152)</li><li>[155 ; 160[ : effectif 6 (155, 155, 155, 155, 158, 160)</li><li>[160 ; 165[ : effectif 2 (160, 162)</li></ul></div>"
        },
        {
          "question": "<p> Construis un histogramme (diagramme à bandes) représentant cette série statistique.</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p style='color: #0d6efd; font-weight: bold;'>Instructions pour l'histogramme :</p><ul><li>En abscisse : les classes de taille (140-145, 145-150, etc.)</li><li>En ordonnée : les effectifs (de 0 à 6)</li><li>On trace des bandes de même largeur dont la hauteur est proportionnelle à l'effectif.</li></ul></div>"
        },
        {
          "question": "<p> Calcule la taille moyenne des élèves de cette classe. (Utilise le centre de chaque classe)</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p>Centres des classes : 142,5 ; 147,5 ; 152,5 ; 157,5 ; 162,5.</p><p>\\( \\bar{x} = \\dfrac{1 \\times 142,5 + 6 \\times 147,5 + 5 \\times 152,5 + 6 \\times 157,5 + 2 \\times 162,5}{20} \\)</p><p>\\( \\bar{x} = \\dfrac{142,5 + 885 + 762,5 + 945 + 325}{20} = \\dfrac{3060}{20} = 153 \\) cm.</p><p>La taille moyenne est de 153 cm.</p></div>"
        },
        {
          "question": "<p> Quelle est la classe modale de cette série ?</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p>Les classes [145 ; 150[ et [155 ; 160[ ont toutes les deux un effectif de 6, qui est le plus grand. La série est donc bimodale.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Vecteurs et Translations",
      "points": "5 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px; font-size: 1em; line-height: 1.6;'><p>On considère un parallélogramme ABCD.</p></div>",
      "questions": [
        {
          "question": "<p> En utilisant les propriétés du parallélogramme, donne un vecteur égal à \\( \\overrightarrow{AB} \\).</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p>Dans un parallélogramme ABCD, les côtés opposés sont égaux et parallèles. Donc \\( \\overrightarrow{AB} = \\overrightarrow{DC} \\).</p></div>"
        },
        {
          "question": "<p> Exprime \\( \\overrightarrow{AD} + \\overrightarrow{DC} \\) en utilisant la relation de Chasles.</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p>Par la relation de Chasles, \\( \\overrightarrow{AD} + \\overrightarrow{DC} = \\overrightarrow{AC} \\).</p></div>"
        },
        {
          "question": "<p> Soit E le symétrique de A par rapport à D. Exprime \\( \\overrightarrow{DE} \\) en fonction de \\( \\overrightarrow{AD} \\).</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p>Si E est le symétrique de A par rapport à D, alors D est le milieu de [AE]. Donc \\( \\overrightarrow{DE} = \\overrightarrow{AD} \\).</p></div>"
        },
        {
          "question": "<p> Soit la translation de vecteur \\( \\overrightarrow{AD} \\). Quelle est l'image du point B par cette translation ?</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p>L'image de B par la translation de vecteur \\( \\overrightarrow{AD} \\) est le point C car \\( \\overrightarrow{BC} = \\overrightarrow{AD} \\) dans un parallélogramme.</p></div>"
        },
        {
          "question": "<p> Construis l'image du triangle ABC par la translation de vecteur \\( \\overrightarrow{AD} \\).</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p>L'image du triangle ABC est le triangle DCB car :</p><ul><li>A → D</li><li>B → C</li><li>C → B</li></ul><p>Le triangle DCB est l'image de ABC par la translation.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Calcul littéral et équations",
      "points": "6 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px; font-size: 1em; line-height: 1.6;'><p>On considère l'expression littérale suivante : <span class='math'>\\( E = (2x + 1)(3x - 5) + (2x + 1)(x + 2) \\)</span></p></div>",
      "questions": [
        {
          "question": "<p> Factorise l'expression \\( E \\).</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p>Le facteur commun est \\( (2x + 1) \\).</p><p>\\( E = (2x + 1)[(3x - 5) + (x + 2)] = (2x + 1)(4x - 3) \\).</p></div>"
        },
        {
          "question": "<p> Développe et réduis l'expression \\( E \\).</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p>On développe \\( E = (2x + 1)(3x - 5) + (2x + 1)(x + 2) \\) :</p><ul><li>\\( (2x + 1)(3x - 5) = 6x^2 - 10x + 3x - 5 = 6x^2 - 7x - 5 \\)</li><li>\\( (2x + 1)(x + 2) = 2x^2 + 4x + x + 2 = 2x^2 + 5x + 2 \\)</li></ul><p>\\( E = 6x^2 - 7x - 5 + 2x^2 + 5x + 2 = 8x^2 - 2x - 3 \\).</p></div>"
        },
        {
          "question": "<p> Résous l'équation \\( E = 0 \\) en utilisant la forme factorisée.</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p>\\( E = 0 \\) équivaut à \\( (2x + 1)(4x - 3) = 0 \\).</p><p>Un produit est nul si et seulement si l'un des facteurs est nul.</p><ul><li>\\( 2x + 1 = 0 \\) donc \\( x = -\\frac{1}{2} \\)</li><li>\\( 4x - 3 = 0 \\) donc \\( x = \\frac{3}{4} \\)</li></ul><p>Les solutions sont \\( S = \\{ -\\frac{1}{2}; \\frac{3}{4} \\} \\).</p></div>"
        },
        {
          "question": "<p> Calcule la valeur de \\( E \\) pour \\( x = -2 \\).</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p>On utilise la forme développée : \\( E(-2) = 8(-2)^2 - 2(-2) - 3 = 8 \\times 4 + 4 - 3 = 32 + 4 - 3 = 33 \\).</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Problème - Proportionnalité et Échelle",
      "points": "5 pts",
      "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px; font-size: 1em; line-height: 1.6;'><p>Sur un plan à l'échelle 1/200, un terrain rectangulaire mesure 8 cm de long et 5 cm de large.</p></div>",
      "questions": [
        {
          "question": "<p> Calcule les dimensions réelles de ce terrain en mètres.</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p>Échelle 1/200 signifie que 1 cm sur le plan représente 200 cm dans la réalité.</p><ul><li>Longueur réelle : \\( 8 \\times 200 = 1600 \\) cm = 16 m</li><li>Largeur réelle : \\( 5 \\times 200 = 1000 \\) cm = 10 m</li></ul></div>"
        },
        {
          "question": "<p> Calcule l'aire réelle du terrain en \\( m^2 \\).</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p>\\( A = 16 \\times 10 = 160 \\) m².</p></div>"
        },
        {
          "question": "<p> Quelle est l'aire du terrain sur le plan en \\( cm^2 \\) ?</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p>\\( A_{plan} = 8 \\times 5 = 40 \\) cm².</p></div>"
        },
        {
          "question": "<p> Retrouve le rapport entre l'aire réelle et l'aire sur le plan.</p>",
          "reponse": "<div style='background-color: #f4f6f7; padding: 15px; border-radius: 8px;'><p>\\( A_{réelle} = 160 \\) m² = 1 600 000 cm².</p><p>\\( \\dfrac{A_{réelle}}{A_{plan}} = \\dfrac{1 600 000}{40} = 40 000 = 200^2 \\).</p><p>Les aires sont multipliées par le carré de l'échelle.</p></div>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
