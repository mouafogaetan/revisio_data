<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Mathématiques",
  "classe": "Quatrième",
  "sequence": "Séquence 2",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Décomposition en facteurs premiers et applications",
      "points": "4 pts",
      "enonce": "<p>On donne les nombres \( A = 84 \) et \( B = 126 \).</p>",
      "questions": [
        {
          "question": "<p> Décomposer \( A \) et \( B \) en produit de facteurs premiers. <em>(1 pt)</em></p>",
          "reponse": "<p>\( 84 = 2^2 \\times 3 \\times 7 \)<br>\( 126 = 2 \\times 3^2 \\times 7 \)</p>"
        },
        {
          "question": "<p> En déduire le PGCD de \( A \) et \( B \). <em>(1 pt)</em></p>",
          "reponse": "<p>\( PGCD(84;126) = 2 \\times 3 \\times 7 = 42 \)</p>"
        },
        {
          "question": "<p> En déduire le PPCM de \( A \) et \( B \). <em>(1 pt)</em></p>",
          "reponse": "<p>\( PPCM(84;126) = 2^2 \\times 3^2 \\times 7 = 252 \)</p>"
        },
        {
          "question": "<p> Utiliser le PGCD pour simplifier la fraction \( \\dfrac{84}{126} \). <em>(1 pt)</em></p>",
          "reponse": "<p>\( \\dfrac{84}{126} = \\dfrac{84 \\div 42}{126 \\div 42} = \\dfrac{2}{3} \)</p>"
        }
      ]
    },
    {
      "titre": "Problème de partage (PGCD)",
      "points": "3 pts",
      "enonce": "<p>Un chocolatier dispose de 120 chocolats noirs et de 168 chocolats au lait. Il veut les répartir dans des sachets identiques. Chaque sachet doit contenir le même nombre de chocolats noirs et le même nombre de chocolats au lait. Tous les chocolats doivent être utilisés.</p>",
      "questions": [
        {
          "question": "<p> Calculer le PGCD de 120 et 168. <em>(1 pt)</em></p>",
          "reponse": "<p>\( 120 = 2^3 \\times 3 \\times 5 \)<br>\( 168 = 2^3 \\times 3 \\times 7 \)<br>\( PGCD(120;168) = 2^3 \\times 3 = 24 \)</p>"
        },
        {
          "question": "<p> Quel est le nombre maximal de sachets qu'il peut confectionner ? <em>(1 pt)</em></p>",
          "reponse": "<p>Le nombre maximal de sachets est le PGCD, soit 24 sachets.</p>"
        },
        {
          "question": "<p> Combien de chocolats de chaque sorte y aura-t-il dans chaque sachet ? <em>(1 pt)</em></p>",
          "reponse": "<p>Noirs : \( 120 \\div 24 = 5 \)<br>Au lait : \( 168 \\div 24 = 7 \)<br>Chaque sachet contiendra 5 chocolats noirs et 7 chocolats au lait.</p>"
        }
      ]
    },
    {
      "titre": "Problème de coïncidence (PPCM)",
      "points": "3 pts",
      "enonce": "<p>Deux feux tricolores situés au même carrefour changent de couleur l'un après l'autre. Le premier passe au vert toutes les 12 minutes, le second toutes les 18 minutes. Ils viennent de passer au vert ensemble.</p>",
      "questions": [
        {
          "question": "<p> Calculer le PPCM de 12 et 18. <em>(1 pt)</em></p>",
          "reponse": "<p>\( 12 = 2^2 \\times 3 \)<br>\( 18 = 2 \\times 3^2 \)<br>\( PPCM(12;18) = 2^2 \\times 3^2 = 36 \)</p>"
        },
        {
          "question": "<p> Dans combien de minutes seront-ils de nouveau au vert ensemble ? <em>(1 pt)</em></p>",
          "reponse": "<p>Ils seront de nouveau au vert ensemble dans 36 minutes.</p>"
        },
        {
          "question": "<p> Convertir ce résultat en heures et minutes. <em>(1 pt)</em></p>",
          "reponse": "<p>36 minutes = 0 heure et 36 minutes.</p>"
        }
      ]
    },
    {
      "titre": "Opérations sur les nombres rationnels",
      "points": "4 pts",
      "enonce": "<p>Calculer les expressions suivantes et donner le résultat sous forme de fraction irréductible.</p>",
      "questions": [
        {
          "question": "<p> \( A = \\dfrac{5}{6} - \\dfrac{3}{4} + \\dfrac{1}{2} \) <em>(1 pt)</em></p>",
          "reponse": "<p>On réduit au même dénominateur (12) :<br>\( A = \\dfrac{10}{12} - \\dfrac{9}{12} + \\dfrac{6}{12} = \\dfrac{7}{12} \)</p>"
        },
        {
          "question": "<p> \( B = \\dfrac{3}{4} \\times \\dfrac{8}{9} \) <em>(1 pt)</em></p>",
          "reponse": "<p>\( B = \\dfrac{3 \\times 8}{4 \\times 9} = \\dfrac{24}{36} = \\dfrac{2}{3} \)</p>"
        },
        {
          "question": "<p> \( C = \\dfrac{2}{3} \\div \\dfrac{4}{5} \) <em>(1 pt)</em></p>",
          "reponse": "<p>\( C = \\dfrac{2}{3} \\times \\dfrac{5}{4} = \\dfrac{10}{12} = \\dfrac{5}{6} \)</p>"
        },
        {
          "question": "<p> \( D = \\dfrac{7}{5} - \\dfrac{3}{5} \\times \\dfrac{2}{9} \) <em>(1 pt)</em></p>",
          "reponse": "<p>On effectue d'abord la multiplication :<br>\( D = \\dfrac{7}{5} - \\dfrac{6}{45} = \\dfrac{7}{5} - \\dfrac{2}{15} = \\dfrac{21}{15} - \\dfrac{2}{15} = \\dfrac{19}{15} \)</p>"
        }
      ]
    },
    {
      "titre": "Comparaison et encadrement de nombres rationnels",
      "points": "3 pts",
      "enonce": "<p>On donne les nombres rationnels suivants : \( \\dfrac{5}{6} \\), \( \\dfrac{7}{8} \\), \( \\dfrac{11}{12} \\).</p>",
      "questions": [
        {
          "question": "<p> Ranger ces nombres dans l'ordre croissant. <em>(1 pt)</em></p>",
          "reponse": "<p>On réduit au même dénominateur 24 :<br>\( \\dfrac{5}{6} = \\dfrac{20}{24} \\), \( \\dfrac{7}{8} = \\dfrac{21}{24} \\), \( \\dfrac{11}{12} = \\dfrac{22}{24} \)<br>Donc \( \\dfrac{5}{6} < \\dfrac{7}{8} < \\dfrac{11}{12} \)</p>"
        },
        {
          "question": "<p> Donner un encadrement de \( \\dfrac{5}{6} \) entre deux nombres décimaux consécutifs. <em>(1 pt)</em></p>",
          "reponse": "<p>\( \\dfrac{5}{6} \\approx 0.8333... \)<br>Encadrement : \( 0.8 < \\dfrac{5}{6} < 0.9 \)</p>"
        },
        {
          "question": "<p> Comparer \( \\dfrac{5}{6} \) et \( \\dfrac{7}{8} \) en calculant leur différence. <em>(1 pt)</em></p>",
          "reponse": "<p>\( \\dfrac{5}{6} - \\dfrac{7}{8} = \\dfrac{20}{24} - \\dfrac{21}{24} = -\\dfrac{1}{24} < 0 \)<br>Donc \( \\dfrac{5}{6} < \\dfrac{7}{8} \).</p>"
        }
      ]
    },
    {
      "titre": "Troncature et arrondi",
      "points": "3 pts",
      "enonce": "<p>Soit \( x = \\dfrac{22}{7} \\). Donner une valeur approchée de \( x \\) puis effectuer les opérations suivantes.</p>",
      "questions": [
        {
          "question": "<p> Donner la troncature à \( 10^{-2} \) près de \( x \\). <em>(1 pt)</em></p>",
          "reponse": "<p>\( \\dfrac{22}{7} \\approx 3.142857... \)<br>La troncature à \( 10^{-2} \) près est \( 3.14 \).</p>"
        },
        {
          "question": "<p> Donner l'arrondi à \( 10^{-2} \) près de \( x \\). <em>(1 pt)</em></p>",
          "reponse": "<p>L'arrondi à \( 10^{-2} \) près est \( 3.14 \) car le troisième chiffre après la virgule est 2 (< 5).</p>"
        },
        {
          "question": "<p> Quelle est la différence entre la troncature et l'arrondi pour \( x \\) ? <em>(1 pt)</em></p>",
          "reponse": "<p>Ils sont égaux dans ce cas : \( 3.14 \\). La troncature est la valeur exacte tronquée, l'arrondi est la valeur la plus proche.</p>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
