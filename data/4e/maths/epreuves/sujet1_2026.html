<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Mathématiques",
  "classe": "Quatrième",
  "sequence": "Séquence 1",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : DÉCOMPOSITION EN PRODUIT DE FACTEURS PREMIERS (3 pts)",
      "points": "3 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.8; color: #1a1a1a; font-family: Arial, sans-serif;'>Décomposer les nombres suivants en produit de facteurs premiers :<br><br><strong>1)</strong> <span class='math-inline'>\\( 84 \\)</span><br><br><strong>2)</strong> <span class='math-inline'>\\( 150 \\)</span><br><br><strong>3)</strong> <span class='math-inline'>\\( 360 \\)</span></div>",
      "questions": [
        {
          "question": "1) Décomposer 84 en produit de facteurs premiers.",
          "reponse": "<span class='math-inline'>\\( 84 = 2^2 \\times 3 \\times 7 \\)</span>"
        },
        {
          "question": "2) Décomposer 150 en produit de facteurs premiers.",
          "reponse": "<span class='math-inline'>\\( 150 = 2 \\times 3 \\times 5^2 \\)</span>"
        },
        {
          "question": "3) Décomposer 360 en produit de facteurs premiers.",
          "reponse": "<span class='math-inline'>\\( 360 = 2^3 \\times 3^2 \\times 5 \\)</span>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : PGCD ET PPCM (5 pts)",
      "points": "5 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.8; color: #1a1a1a; font-family: Arial, sans-serif;'>On donne les nombres <span class='math-inline'>\\( a = 72 \\)</span> et <span class='math-inline'>\\( b = 108 \\)</span>.<br><br><strong>1)</strong> Décomposer <span class='math-inline'>\\( 72 \\)</span> et <span class='math-inline'>\\( 108 \\)</span> en produit de facteurs premiers.<br><br><strong>2)</strong> Déterminer le PGCD de <span class='math-inline'>\\( 72 \\)</span> et <span class='math-inline'>\\( 108 \\)</span>.<br><br><strong>3)</strong> Déterminer le PPCM de <span class='math-inline'>\\( 72 \\)</span> et <span class='math-inline'>\\( 108 \\)</span>.</div>",
      "questions": [
        {
          "question": "1) Décomposer 72 et 108 en produit de facteurs premiers.",
          "reponse": "<span class='math-inline'>\\( 72 = 2^3 \\times 3^2 \\)</span><br><span class='math-inline'>\\( 108 = 2^2 \\times 3^3 \\)</span>"
        },
        {
          "question": "2) Déterminer le PGCD de 72 et 108.",
          "reponse": "PGCD(<span class='math-inline'>\\(72, 108\\)</span>) = <span class='math-inline'>\\( 2^2 \\times 3^2 = 4 \\times 9 = 36 \\)</span>"
        },
        {
          "question": "3) Déterminer le PPCM de 72 et 108.",
          "reponse": "PPCM(<span class='math-inline'>\\(72, 108\\)</span>) = <span class='math-inline'>\\( 2^3 \\times 3^3 = 8 \\times 27 = 216 \\)</span>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : PROBLÈME CONCRET SUR LE PGCD (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.8; color: #1a1a1a; font-family: Arial, sans-serif;'>Un jardinier souhaite planter des arbres le long d'une allée rectangulaire de <strong>72 m</strong> de longueur et <strong>48 m</strong> de largeur. Il veut que les arbres soient régulièrement espacés et que la distance entre deux arbres soit la plus grande possible.<br><br><strong>1)</strong> Quelle est la distance maximale entre deux arbres ?<br><br><strong>2)</strong> Combien d'arbres seront plantés en tout ?</div>",
      "questions": [
        {
          "question": "1) Déterminer la distance maximale entre deux arbres.",
          "reponse": "Il faut calculer le PGCD de 72 et 48.<br><span class='math-inline'>\\( 72 = 2^3 \\times 3^2 \\)</span><br><span class='math-inline'>\\( 48 = 2^4 \\times 3 \\)</span><br>PGCD(<span class='math-inline'>\\(72, 48\\)</span>) = <span class='math-inline'>\\( 2^3 \\times 3 = 8 \\times 3 = 24 \\)</span><br>La distance maximale est de <strong>24 m</strong>."
        },
        {
          "question": "2) Calculer le nombre total d'arbres.",
          "reponse": "Nombre d'arbres sur la longueur : <span class='math-inline'>\\( \\frac{72}{24} = 3 \\)</span><br>Nombre d'arbres sur la largeur : <span class='math-inline'>\\( \\frac{48}{24} = 2 \\)</span><br>Nombre total d'arbres : <span class='math-inline'>\\( 3 \\times 2 = 6 \\)</span> arbres."
        }
      ]
    },
    {
      "titre": "Exercice 4 : PROBLÈME CONCRET SUR LE PPCM (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.8; color: #1a1a1a; font-family: Arial, sans-serif;'>Deux bus partent en même temps d'un même arrêt. Le premier bus effectue son trajet en <strong>45 minutes</strong>, le deuxième en <strong>60 minutes</strong>.<br><br><strong>1)</strong> Au bout de combien de temps les deux bus seront-ils de nouveau ensemble à l'arrêt ?<br><br><strong>2)</strong> Combien de voyages aura effectué chaque bus ?</div>",
      "questions": [
        {
          "question": "1) Déterminer le temps au bout duquel les bus se retrouveront.",
          "reponse": "Il faut calculer le PPCM de 45 et 60.<br><span class='math-inline'>\\( 45 = 3^2 \\times 5 \\)</span><br><span class='math-inline'>\\( 60 = 2^2 \\times 3 \\times 5 \\)</span><br>PPCM(<span class='math-inline'>\\(45, 60\\)</span>) = <span class='math-inline'>\\( 2^2 \\times 3^2 \\times 5 = 4 \\times 9 \\times 5 = 180 \\)</span> minutes.<br><strong>180 minutes = 3 heures</strong>."
        },
        {
          "question": "2) Calculer le nombre de voyages effectués par chaque bus.",
          "reponse": "Nombre de voyages du premier bus : <span class='math-inline'>\\( \\frac{180}{45} = 4 \\)</span> voyages.<br>Nombre de voyages du deuxième bus : <span class='math-inline'>\\( \\frac{180}{60} = 3 \\)</span> voyages."
        }
      ]
    },
    {
      "titre": "Exercice 5 : PUISSANCES ET ÉCRITURE SCIENTIFIQUE (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.8; color: #1a1a1a; font-family: Arial, sans-serif;'><strong>1)</strong> Calculer <span class='math-inline'>\\( A = 2^3 \\times 3^2 \\)</span><br><br><strong>2)</strong> Calculer <span class='math-inline'>\\( B = \\frac{5^4 \\times 2^3}{5^2 \\times 2^5} \\)</span><br><br><strong>3)</strong> Donner l'écriture scientifique de <span class='math-inline'>\\( C = 45000 \\)</span> et de <span class='math-inline'>\\( D = 0,00073 \\)</span></div>",
      "questions": [
        {
          "question": "1) Calculer A = <span class='math-inline'>\\( 2^3 \\times 3^2 \\)</span>",
          "reponse": "<span class='math-inline'>\\( A = 8 \\times 9 = 72 \\)</span>"
        },
        {
          "question": "2) Calculer B = <span class='math-inline'>\\( \\frac{5^4 \\times 2^3}{5^2 \\times 2^5} \\)</span>",
          "reponse": "<span class='math-inline'>\\( B = 5^{4-2} \\times 2^{3-5} = 5^2 \\times 2^{-2} = 25 \\times \\frac{1}{4} = \\frac{25}{4} \\)</span>"
        },
        {
          "question": "3) Donner l'écriture scientifique de C = 45000",
          "reponse": "<span class='math-inline'>\\( C = 4,5 \\times 10^4 \\)</span>"
        },
        {
          "question": "4) Donner l'écriture scientifique de D = 0,00073",
          "reponse": "<span class='math-inline'>\\( D = 7,3 \\times 10^{-4} \\)</span>"
        }
      ]
    },
    {
      "titre": "Exercice 6 : OPÉRATIONS SUR LES NOMBRES RATIONNELS (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='font-size: 16px; line-height: 1.8; color: #1a1a1a; font-family: Arial, sans-serif;'>Calculer les expressions suivantes en donnant le résultat sous forme de fraction irréductible.<br><br><strong>1)</strong> <span class='math-inline'>\\( E = \\frac{2}{3} + \\frac{5}{6} - \\frac{1}{2} \\)</span><br><br><strong>2)</strong> <span class='math-inline'>\\( F = \\frac{3}{4} \\times \\frac{8}{9} \\)</span><br><br><strong>3)</strong> <span class='math-inline'>\\( G = \\frac{2}{3} + \\frac{1}{2} \\times \\frac{3}{5} \\)</span></div>",
      "questions": [
        {
          "question": "1) Calculer E = <span class='math-inline'>\\( \\frac{2}{3} + \\frac{5}{6} - \\frac{1}{2} \\)</span>",
          "reponse": "Même dénominateur (6) : <span class='math-inline'>\\( \\frac{4}{6} + \\frac{5}{6} - \\frac{3}{6} = \\frac{4+5-3}{6} = \\frac{6}{6} = 1 \\)</span>"
        },
        {
          "question": "2) Calculer F = <span class='math-inline'>\\( \\frac{3}{4} \\times \\frac{8}{9} \\)</span>",
          "reponse": "<span class='math-inline'>\\( \\frac{3 \\times 8}{4 \\times 9} = \\frac{24}{36} = \\frac{2}{3} \\)</span>"
        },
        {
          "question": "3) Calculer G = <span class='math-inline'>\\( \\frac{2}{3} + \\frac{1}{2} \\times \\frac{3}{5} \\)</span>",
          "reponse": "Priorité à la multiplication : <span class='math-inline'>\\( \\frac{1}{2} \\times \\frac{3}{5} = \\frac{3}{10} \\)</span><br><span class='math-inline'>\\( \\frac{2}{3} + \\frac{3}{10} = \\frac{20}{30} + \\frac{9}{30} = \\frac{29}{30} \\)</span>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
