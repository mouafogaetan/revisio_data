<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) - ajouté par le script de thème */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Bienvenue en classe !",
    "contenu": "<div style='text-align: center; padding: 15px;'><h2 style='color: #2c3e50;'>Module 6 : Médias et communication</h2><h1 style='color: #e74c3c; font-size: 2.2em;'>Leçon 83 : Sens propre / Sens figuré</h1><div style='background-color: #f1c40f; padding: 12px; border-radius: 10px; margin-top: 15px;'><p style='color: #2c3e50; font-weight: bold; font-size: 1.1em;'>🎯 Objectifs de la leçon :</p><ul style='list-style-type: none; padding: 0; text-align: left; font-size: 0.95em;'><li>✅ Approfondir la distinction entre sens propre et sens figuré</li><li>✅ Identifier les figures de style fondées sur le sens figuré</li><li>✅ Utiliser le sens figuré pour enrichir son expression écrite et orale</li></ul></div><div style='margin-top: 20px; background-color: #d5f5e3; padding: 10px; border-radius: 10px;'><p style='color: #1a5276; font-weight: bold;'>🎨 Pourquoi le sens figuré est-il important ?</p><p style='font-size: 0.95em;'>Il rend notre langage plus vivant, plus imagé et plus expressif !</p></div></div>",
    "texteParle": "Bonjour à tous ! Aujourd'hui, nous allons approfondir notre connaissance du sens propre et du sens figuré. Nous avons déjà vu ces notions dans les classes précédentes, mais nous allons maintenant aller plus loin. Nous allons apprendre à identifier les figures de style qui utilisent le sens figuré, comme la métaphore, la comparaison et la personnification. Nous verrons aussi comment utiliser le sens figuré pour enrichir notre expression écrite et orale. Préparez-vous à découvrir la beauté et la richesse du langage imagé !",
    "note": "Le sens figuré est une porte vers la créativité linguistique."
  },
  {
    "titre": "Rappel : sens propre et sens figuré",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2980b9;'>📚 Petite révision</h3><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px;'><div style='background-color: #d6eaf8; padding: 10px; border-radius: 8px;'><strong>🔵 Sens propre</strong><br>C'est le sens premier, littéral d'un mot.<br><br><em>Exemple : « Le chat <u>boit</u> du lait. »</em><br><span style='font-size: 0.9em;'>→ Boire : avaler un liquide.</span></div><div style='background-color: #fadbd8; padding: 10px; border-radius: 8px;'><strong>🔴 Sens figuré</strong><br>C'est le sens imagé, détourné d'un mot.<br><br><em>Exemple : « Il <u>boit</u> les paroles du professeur. »</em><br><span style='font-size: 0.9em;'>→ Boire : écouter avec beaucoup d'attention.</span></div></div><div style='background-color: #fef9e7; padding: 10px; border-radius: 10px; margin-top: 10px;'><p style='font-weight: bold;'>💡 Astuce :</p><p>Pour distinguer les deux sens, posez-vous la question : est-ce que le mot est utilisé dans son sens habituel et concret ?</p></div></div>",
    "texteParle": "Avant d'aller plus loin, faisons un petit rappel. Le sens propre, c'est le sens premier et littéral d'un mot. C'est le sens concret qu'on trouve dans le dictionnaire en premier. Par exemple, quand on dit « Le chat boit du lait », le verbe boire est utilisé dans son sens propre : il signifie avaler un liquide. Le sens figuré, c'est le sens imagé ou détourné d'un mot. Par exemple, quand on dit « Il boit les paroles du professeur », le verbe boire est utilisé au sens figuré : il signifie écouter avec beaucoup d'attention. Pour distinguer les deux, demandez-vous si le mot est utilisé dans son sens habituel et concret.",
    "note": "Le contexte est essentiel pour comprendre si un mot est utilisé au sens propre ou figuré."
  },
  {
    "titre": "Le sens figuré : pourquoi et comment ?",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2980b9;'>🎨 Pourquoi utiliser le sens figuré ?</h3><div style='background-color: #ebf5fb; padding: 15px; border-radius: 10px; margin-top: 5px;'><ul style='font-size: 0.95em;'><li><strong>Pour rendre le langage plus vivant :</strong> Les images captent l'attention</li><li><strong>Pour exprimer des émotions :</strong> Le sens figuré est plus expressif</li><li><strong>Pour créer des images :</strong> Il permet de visualiser des idées abstraites</li><li><strong>Pour enrichir son style :</strong> Il rend l'écriture plus littéraire</li></ul></div><div style='background-color: #fcf3cf; padding: 15px; border-radius: 10px; margin-top: 10px;'><p style='font-weight: bold;'>📝 Comment reconnaître le sens figuré ?</p><p>Cherchez l'<strong>image</strong> ou la <strong>comparaison</strong> sous-jacente. Demandez-vous : « Est-ce que l'auteur veut que je voie quelque chose de particulier ? »</p></div></div>",
    "texteParle": "Pourquoi utilise-t-on le sens figuré ? D'abord, pour rendre le langage plus vivant. Les images captent l'attention et rendent le discours plus intéressant. Ensuite, pour exprimer des émotions. Le sens figuré est plus expressif et permet de transmettre des sentiments avec plus de force. Il permet aussi de créer des images qui aident à visualiser des idées abstraites. Enfin, il enrichit le style et rend l'écriture plus littéraire. Pour reconnaître le sens figuré, cherchez l'image ou la comparaison sous-jacente. Demandez-vous si l'auteur veut vous faire voir quelque chose de particulier.",
    "note": "Le sens figuré est une marque de la créativité de l'auteur."
  },
  {
    "titre": "La comparaison",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2980b9;'>🔍 Figure de style : la comparaison</h3><div style='background-color: #d5f5e3; padding: 15px; border-radius: 10px; margin-top: 5px;'><p><strong>Définition :</strong> La comparaison met en relation deux éléments grâce à un <strong>outil de comparaison</strong> (comme, ainsi que, pareil à, tel, etc.).</p></div><div style='background-color: #d5f5e3; padding: 15px; border-radius: 10px; margin-top: 10px;'><h4 style='color: #27ae60;'>📋 Structure :</h4><p style='text-align: center; font-size: 1.1em;'><strong>Comparé</strong> + <span style='color: #e74c3c;'>outil de comparaison</span> + <strong>comparant</strong></p></div><div style='background-color: #fef9e7; padding: 10px; border-radius: 10px; margin-top: 10px;'><p style='font-weight: bold;'>📝 Exemples :</p><p><em>Elle est <u>douce</u> <span style='color: #e74c3c;'>comme</span> du coton.</em><br><em>Il court <u>vite</u> <span style='color: #e74c3c;'>comme</span> le vent.</em><br><em>Ses yeux brillaient <span style='color: #e74c3c;'>ainsi que</span> des étoiles.</em></p></div></div>",
    "texteParle": "La comparaison est une figure de style très courante qui utilise le sens figuré. Elle met en relation deux éléments à l'aide d'un outil de comparaison. Les outils de comparaison les plus utilisés sont : comme, ainsi que, pareil à, tel, et d'autres. La structure de la comparaison est simple : on a le comparé, c'est-à-dire ce qu'on compare, l'outil de comparaison, et le comparant, c'est-à-dire ce à quoi on compare. Par exemple, dans « Elle est douce comme du coton », le comparé est « elle », l'outil de comparaison est « comme », et le comparant est « du coton ». On compare sa douceur à celle du coton.",
    "note": "La comparaison est une figure de style facile à reconnaître grâce à ses outils."
  },
  {
    "titre": "La métaphore",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2980b9;'>🔍 Figure de style : la métaphore</h3><div style='background-color: #fadbd8; padding: 15px; border-radius: 10px; margin-top: 5px;'><p><strong>Définition :</strong> La métaphore est une comparaison <strong>sans outil de comparaison</strong>. Elle est plus directe et plus imagée.</p></div><div style='background-color: #fadbd8; padding: 15px; border-radius: 10px; margin-top: 10px;'><h4 style='color: #e74c3c;'>📋 Structure :</h4><p style='text-align: center; font-size: 1.1em;'><strong>Comparé</strong> = <strong>comparant</strong> (sans outil)</p></div><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;'><div style='background-color: #fdedec; padding: 10px; border-radius: 8px;'><strong>Comparaison</strong><br><em>Ses yeux sont <u>comme</u> des étoiles.</em></div><div style='background-color: #fdedec; padding: 10px; border-radius: 8px;'><strong>Métaphore</strong><br><em>Ses yeux sont des étoiles.</em></div></div><div style='background-color: #fef9e7; padding: 10px; border-radius: 10px; margin-top: 10px;'><p style='font-weight: bold;'>📝 Autres exemples :</p><p><em>La vie est un voyage.<br>Cette femme est un lion.<br>Le temps est un voleur.</em></p></div></div>",
    "texteParle": "La métaphore est une figure de style très proche de la comparaison, mais elle est plus directe et plus imagée. Contrairement à la comparaison, la métaphore n'utilise pas d'outil de comparaison comme « comme » ou « ainsi que ». Elle affirme que le comparé est le comparant. Par exemple, au lieu de dire « Ses yeux sont comme des étoiles » (comparaison), on dit « Ses yeux sont des étoiles » (métaphore). La métaphore est plus forte et plus poétique. D'autres exemples : « La vie est un voyage », « Cette femme est un lion », « Le temps est un voleur ». Ce sont des métaphores.",
    "note": "La métaphore est souvent considérée comme la plus belle des figures de style."
  },
  {
    "titre": "La personnification",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2980b9;'>🔍 Figure de style : la personnification</h3><div style='background-color: #f4ecf7; padding: 15px; border-radius: 10px; margin-top: 5px;'><p><strong>Définition :</strong> La personnification consiste à attribuer des <strong>caractéristiques humaines</strong> à un objet, un animal ou une idée.</p></div><div style='background-color: #f4ecf7; padding: 15px; border-radius: 10px; margin-top: 10px;'><h4 style='color: #8e44ad;'>📋 Effet :</h4><p>Elle rend l'objet ou l'idée plus vivant et plus proche du lecteur.</p></div><div style='background-color: #fef9e7; padding: 10px; border-radius: 10px; margin-top: 10px;'><p style='font-weight: bold;'>📝 Exemples :</p><p><em>Le vent <u>siffle</u> dans les arbres.<br>La lune <u>sourit</u> aux amoureux.<br>La forêt <u>murmure</u> des secrets.<br>Le temps <u>s'envole</u> rapidement.</em></p></div></div>",
    "texteParle": "La personnification est une figure de style qui donne des caractéristiques humaines à des objets, des animaux ou des idées. Par exemple, on dit que le vent siffle, que la lune sourit, ou que la forêt murmure des secrets. En réalité, le vent ne siffle pas comme un humain, la lune ne sourit pas, et la forêt ne murmure pas. Mais cette image rend ces éléments plus vivants et plus proches de nous. La personnification est très utilisée en poésie, mais aussi dans la littérature et dans la publicité. Elle permet de créer des images fortes et de toucher le lecteur.",
    "note": "La personnification rend les choses inanimées plus proches de nous."
  },
  {
    "titre": "Comparaison, métaphore, personnification",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2980b9;'>📊 Tableau récapitulatif</h3><div style='overflow-x: auto; margin-top: 5px;'><table style='width: 100%; border-collapse: collapse; font-size: 0.9em;'><tr style='background-color: #2c3e50; color: white;'><th style='padding: 8px; border: 1px solid #ddd;'>Figure de style</th><th style='padding: 8px; border: 1px solid #ddd;'>Caractéristique</th><th style='padding: 8px; border: 1px solid #ddd;'>Exemple</th></tr><tr style='background-color: #d5f5e3;'><td style='padding: 8px; border: 1px solid #ddd;'><strong>Comparaison</strong></td><td style='padding: 8px; border: 1px solid #ddd;'>Avec outil de comparaison</td><td style='padding: 8px; border: 1px solid #ddd;'><em>Il est <u>fort</u> comme un lion.</em></td></tr><tr style='background-color: #fadbd8;'><td style='padding: 8px; border: 1px solid #ddd;'><strong>Métaphore</strong></td><td style='padding: 8px; border: 1px solid #ddd;'>Sans outil de comparaison</td><td style='padding: 8px; border: 1px solid #ddd;'><em>C'est un lion.</em></td></tr><tr style='background-color: #f4ecf7;'><td style='padding: 8px; border: 1px solid #ddd;'><strong>Personnification</strong></td><td style='padding: 8px; border: 1px solid #ddd;'>Caractéristiques humaines</td><td style='padding: 8px; border: 1px solid #ddd;'><em>Le vent <u>crie</u>.</em></td></tr></table></div><div style='background-color: #fef9e7; padding: 10px; border-radius: 10px; margin-top: 10px;'><p style='font-weight: bold;'>💡 À retenir :</p><p>La comparaison et la métaphore établissent un lien entre deux éléments. La personnification donne des caractéristiques humaines à un objet.</p></div></div>",
    "texteParle": "Pour bien distinguer ces trois figures de style, regardons ce tableau récapitulatif. La comparaison utilise un outil de comparaison comme « comme » ou « ainsi que ». Par exemple, « Il est fort comme un lion ». La métaphore, elle, n'utilise pas d'outil de comparaison. Elle affirme directement que le comparé est le comparant. Par exemple, « C'est un lion ». La personnification, enfin, donne des caractéristiques humaines à un objet ou à une idée. Par exemple, « Le vent crie ». Retenez bien ces différences : la comparaison et la métaphore établissent un lien entre deux éléments, tandis que la personnification donne des qualités humaines à un objet.",
    "note": "Ces trois figures de style sont très utilisées en littérature et dans le langage courant."
  },
  {
    "titre": "Le sens figuré dans les expressions",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2980b9;'>💬 Les expressions imagées</h3><div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px; margin-top: 5px;'><p>De nombreuses expressions courantes utilisent le sens figuré. Les connaissez-vous ?</p></div><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;'><div style='background-color: #ebf5fb; padding: 10px; border-radius: 8px;'><p><strong>📌 « Avoir la tête dans les nuages »</strong><br><span style='font-size: 0.9em;'>→ Être distrait, rêveur.</span></p><p><strong>📌 « Casser du sucre sur le dos de quelqu'un »</strong><br><span style='font-size: 0.9em;'>→ Médire de quelqu'un.</span></p></div><div style='background-color: #ebf5fb; padding: 10px; border-radius: 8px;'><p><strong>📌 « Donner sa langue au chat »</strong><br><span style='font-size: 0.9em;'>→ Abandonner, ne pas trouver la réponse.</span></p><p><strong>📌 « Mettre son grain de sel »</strong><br><span style='font-size: 0.9em;'>→ Donner son avis sans être invité.</span></p></div></div><div style='background-color: #fef9e7; padding: 10px; border-radius: 10px; margin-top: 10px;'><p style='font-weight: bold;'>📝 Exemple en contexte :</p><p><em>« Il a <u>donné sa langue au chat</u> car il ne trouvait pas la solution. »</em></p></div></div>",
    "texteParle": "Le sens figuré est très présent dans les expressions de la vie quotidienne. Par exemple, quand on dit « Avoir la tête dans les nuages », cela signifie être distrait ou rêveur. « Casser du sucre sur le dos de quelqu'un » signifie médire de cette personne. « Donner sa langue au chat » signifie abandonner, ne pas trouver la réponse. « Mettre son grain de sel » signifie donner son avis sans être invité. Ces expressions sont des métaphores ou des images qui rendent le langage plus vivant et plus expressif. Il est important de les connaître pour bien comprendre le français parlé.",
    "note": "Les expressions imagées font partie du patrimoine linguistique et culturel."
  },

    "contenu": "<div style='padding: 10px;'><h3 style='color: #2980b9;'>✏️ Exercice interactif</h3><div style='background-color: #eaf2f8; padding: 15px; border-radius: 10px; margin-top: 5px;'><p><strong>Consigne :</strong> Pour chaque phrase, indique si le mot souligné est utilisé au sens propre (P) ou au sens figuré (F).</p></div><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;'><div style='background-color: #fef9e7; padding: 10px; border-radius: 8px;'><p>1. « Il <u>vole</u> comme un oiseau. »<br><span style='font-size: 0.9em;'>___</span></p><p>2. « Le temps <u>s'envole</u> trop vite. »<br><span style='font-size: 0.9em;'>___</span></p></div><div style='background-color: #fef9e7; padding: 10px; border-radius: 8px;'><p>3. « Il <u>dévore</u> son repas. »<br><span style='font-size: 0.9em;'>___</span></p><p>4. « Il <u>dévore</u> les livres. »<br><span style='font-size: 0.9em;'>___</span></p></div></div><div style='background-color: #fcf3cf; padding: 10px; border-radius: 10px; margin-top: 10px;'><p style='font-weight: bold;'>🔍 Vérification :</p><p>1. P (propre) &nbsp;&nbsp; 2. F (figuré) &nbsp;&nbsp; 3. P (propre) &nbsp;&nbsp; 4. F (figuré)</p></div></div>",

    "texteParle": "Voici un autre exercice pour reconnaître les figures de style. Je vous donne quatre phrases. Vous devez identifier si c'est une comparaison, une métaphore ou une personnification. La première phrase est « La lune pleure des larmes d'argent » : c'est une personnification, car la lune est représentée comme un être humain qui pleure. La deuxième est « Il est fort comme un bœuf » : c'est une comparaison, car on utilise l'outil de comparaison « comme ». La troisième est « La vie est un combat » : c'est une métaphore, car il n'y a pas d'outil de comparaison. La quatrième est « Le soleil sourit aux enfants » : c'est une personnification, car on donne au soleil un comportement humain.",

  {
    "titre": "Le dictionnaire et le sens figuré",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2980b9;'>📖 Le dictionnaire pour lever les doutes</h3><div style='background-color: #ebf5fb; padding: 15px; border-radius: 10px; margin-top: 5px;'><p>Le dictionnaire est un outil précieux pour vérifier le sens d'un mot et ses différents usages.</p></div><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;'><div style='background-color: #d6eaf8; padding: 10px; border-radius: 8px;'><strong>🔵 Entrée du dictionnaire pour « cœur » :</strong><br><span style='font-size: 0.9em;'>1. (Sens propre) Organe musculaire qui pompe le sang.<br>2. (Sens figuré) Siège des sentiments, de la bonté.<br><em>« Avoir un cœur d'or. »</em></span></div><div style='background-color: #d6eaf8; padding: 10px; border-radius: 8px;'><strong>🔴 Entrée du dictionnaire pour « soleil » :</strong><br><span style='font-size: 0.9em;'>1. (Sens propre) Astre qui éclaire la Terre.<br>2. (Sens figuré) Personne rayonnante, source de joie.<br><em>« C'est un soleil ! »</em></span></div></div><div style='background-color: #fef9e7; padding: 10px; border-radius: 10px; margin-top: 10px;'><p style='font-weight: bold;'>💡 Astuce :</p><p>Lorsque vous doutez du sens d'un mot, consultez le dictionnaire et regardez les différents sens proposés.</p></div></div>",
    "texteParle": "Le dictionnaire est un outil précieux pour vérifier le sens d'un mot et ses différents usages. Quand vous consultez un mot dans le dictionnaire, vous verrez souvent plusieurs sens. Le premier sens proposé est généralement le sens propre. Les autres sens sont souvent des sens figurés. Par exemple, pour le mot « cœur », le sens propre est l'organe qui pompe le sang. Le sens figuré est le siège des sentiments, comme dans « Avoir un cœur d'or ». Pour le mot « soleil », le sens propre est l'astre qui éclaire la Terre, et le sens figuré est une personne rayonnante. Quand vous doutez, n'hésitez pas à consulter le dictionnaire.",
    "note": "Le dictionnaire est un allié précieux pour comprendre les nuances de la langue."
  },
  {
    "titre": "Utiliser le sens figuré pour enrichir son style",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2980b9;'>🎨 Enrichir son expression</h3><div style='background-color: #d5f5e3; padding: 15px; border-radius: 10px; margin-top: 5px;'><p>Utiliser le sens figuré rend votre expression plus riche et plus imagée.</p></div><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;'><div style='background-color: #eaf2f8; padding: 10px; border-radius: 8px;'><strong>🔵 Sans sens figuré :</strong><br><em>Il est très intelligent.</em><br><em>Elle est très belle.</em><br><em>J'ai très faim.</em></div><div style='background-color: #fadbd8; padding: 10px; border-radius: 8px;'><strong>🔴 Avec sens figuré :</strong><br><em>C'est un <u>génie</u> !</em><br><em>C'est une <u>rose</u>.</em><br><em>J'ai une <u>faim de loup</u> !</em></div></div><div style='background-color: #fef9e7; padding: 10px; border-radius: 10px; margin-top: 10px;'><p style='font-weight: bold;'>💡 Conseil :</p><p>N'ayez pas peur d'utiliser des images et des métaphores dans vos écrits et à l'oral. Mais veillez à ce qu'elles soient comprises par votre interlocuteur.</p></div></div>",
    "texteParle": "Utiliser le sens figuré est un excellent moyen d'enrichir votre expression. Comparez ces deux façons de dire la même chose. Sans sens figuré, on dit : « Il est très intelligent », « Elle est très belle », « J'ai très faim ». Avec le sens figuré, on dit : « C'est un génie ! », « C'est une rose », « J'ai une faim de loup ! ». Les expressions avec sens figuré sont plus imagées, plus vivantes et plus expressives. N'ayez pas peur d'utiliser des images et des métaphores dans vos écrits et à l'oral. Mais attention, veillez à ce que vos images soient comprises par votre interlocuteur.",
    "note": "Le sens figuré est un outil puissant pour rendre son style plus personnel et plus créatif."
  },
  {
    "titre": "Synthèse de la leçon",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2980b9;'>📌 Ce que nous avons appris</h3><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px;'><div style='background-color: #d6eaf8; padding: 10px; border-radius: 8px;'><strong>🔵 Sens propre</strong><br>• Sens littéral, concret<br>• Premier sens du dictionnaire<br>• Ex : <em>« Il court vite. »</em></div><div style='background-color: #fadbd8; padding: 10px; border-radius: 8px;'><strong>🔴 Sens figuré</strong><br>• Sens imagé, détourné<br>• Rend le langage plus vivant<br>• Ex : <em>« Le temps court. »</em></div></div><div style='display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 5px;'><div style='background-color: #d5f5e3; padding: 10px; border-radius: 8px;'><strong>🔍 Comparaison</strong><br>Avec outil : <em>comme</em></div><div style='background-color: #fadbd8; padding: 10px; border-radius: 8px;'><strong>🔍 Métaphore</strong><br>Sans outil : <em>est</em></div><div style='background-color: #f4ecf7; padding: 10px; border-radius: 8px;'><strong>🔍 Personnification</strong><br>Caractéristiques humaines</div></div><div style='background-color: #;
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            if (header) header.style.background = 'rgba(15, 23, 42, 0.85)';
            if (footer) footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            if (header) header.style.background = 'rgba(255, 255, 255, 0.85)';
            if (footer) footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
            // Ajouter l'écouteur d'événement click
            themeBtn.addEventListener('click', toggleTheme);
        }
    });
</script>
