<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Histoire",
  "classe": "Cinquième",
  "sequence": "Séquence 6 : L'Âge d'or de l'Afrique et les premiers contacts avec le monde",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Vérification des connaissances : définitions et concepts clés",
      "points": "6 pts",
      "enonce": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; color: #1a1a1a;'><p><strong>Consigne :</strong> Réponds par une définition précise et complète à chacune des questions suivantes. Chaque réponse est notée sur <strong>1,5 point</strong>.</p><p><em>Les notions abordées sont extraites des thèmes de la séquence : les sociétés précoloniales camerounaises, les grands empires ouest-africains et les civilisations américaines.</em></p></div>",
      "questions": [
        {
          "question": "<div style='color: #1a1a1a;'>1) Définis ce qu'est une <strong>société étatique</strong>.</div>",
          "reponse": "<div style='color: #1a1a1a;'>Une <strong>société étatique</strong> est une organisation politique dans laquelle le pouvoir est centralisé autour d'une autorité unique, comme un roi, un empereur ou un lamido. Cette autorité dirige l'administration du territoire, rend la justice et lève l'impôt. Au Cameroun précolonial, on trouve des sociétés étatiques chez les Bamoun, les Douala et dans les lamidats du Nord [d'après le programme].</div>"
        },
        {
          "question": "<div style='color: #1a1a1a;'>2) Qu'est-ce qu'une <strong>société acéphale</strong> ?</div>",
          "reponse": "<div style='color: #1a1a1a;'>Une <strong>société acéphale</strong> est une société qui ne possède pas de chef suprême ou de pouvoir centralisé. Le pouvoir y est réparti entre les lignages, les clans ou les conseils de notables. Ces sociétés sont aussi appelées sociétés égalitaires. Au Cameroun, on retrouve ce modèle chez les Beti, les Bassa et les Bulu du Sud-Cameroun [d'après le programme].</div>"
        },
        {
          "question": "<div style='color: #1a1a1a;'>3) C'est quoi la <strong>traite transsaharienne</strong> ?</div>",
          "reponse": "<div style='color: #1a1a1a;'>La <strong>traite transsaharienne</strong> désigne l'ensemble des échanges commerciaux qui traversaient le désert du Sahara pour relier l'Afrique subsaharienne au monde arabo-musulman (Afrique du Nord, Moyen-Orient). Les caravanes transportaient de l'or, de l'ivoire, des esclaves vers le nord, et du sel, des tissus, des armes vers le sud. Cette route a favorisé l'essor des grands empires comme le Ghana, le Mali et le Songhaï [d'après le programme].</div>"
        },
        {
          "question": "<div style='color: #1a1a1a;'>4) Que signifie <strong>l'effet de serre</strong> ?</div>",
          "reponse": "<div style='color: #1a1a1a;'>L'<strong>effet de serre</strong> est un phénomène naturel par lequel certains gaz présents dans l'atmosphère (comme le dioxyde de carbone) retiennent une partie de la chaleur émise par la Terre, ce qui permet de maintenir une température moyenne propice à la vie. Cependant, les activités humaines (industrie, transport, agriculture) augmentent la concentration de ces gaz, ce qui renforce l'effet de serre et provoque le réchauffement climatique [d'après le programme].</div>"
        }
      ]
    },
    {
      "titre": "Étude d'un empire : l'Empire du Mali",
      "points": "7 pts",
      "enonce": "<div style='background-color: #e8f5e9; padding: 15px; border-radius: 8px; color: #1a1a1a;'><p><strong>Document :</strong> L'Empire du Mali au XIVe siècle.</p><div style='background-color: #ffffff; padding: 15px; border-left: 4px solid #4caf50; margin: 10px 0; color: #1a1a1a;'><p>« Fondé par Soundiata Keita au XIIIe siècle, l'Empire du Mali atteint son apogée au XIVe siècle sous le règne de Kankou Moussa. Ce souverain est célèbre pour son pèlerinage à La Mecque en 1324, au cours duquel il distribua tellement d'or qu'il provoqua une dévaluation de ce métal au Caire. L'empire contrôlait les gisements d'or du Bambouk et du Bouré. Tombouctou, une de ses villes principales, devint un centre intellectuel majeur, abritant la célèbre université de Sankoré. L'Empire du Mali était connu pour son administration efficace, divisée en provinces dirigées par des gouverneurs, et sa puissance militaire. »</p></div></div>",
      "questions": [
        {
          "question": "<div style='color: #1a1a1a;'>5) D'après le document, quelles sont les sources de la richesse de l'Empire du Mali ?</div>",
          "reponse": "<div style='color: #1a1a1a;'>Les sources de la richesse de l'Empire du Mali étaient les <strong>gisements d'or</strong> du Bambouk et du Bouré, ainsi que le <strong>contrôle du commerce transsaharien</strong>. L'empire exploitait ces ressources et les échangeait contre d'autres biens comme le sel [d'après le document].</div>"
        },
        {
          "question": "<div style='color: #1a1a1a;'>6) Explique l'importance de Tombouctou dans l'Empire du Mali.</div>",
          "reponse": "<div style='color: #1a1a1a;'>Tombouctou était une ville majeure de l'Empire du Mali, réputée pour être un <strong>centre intellectuel et religieux</strong> de premier plan. Elle abritait l'<strong>université de Sankoré</strong>, qui attirait des étudiants de toute l'Afrique et du monde musulman. La ville était un carrefour du savoir, où se côtoyaient juristes, théologiens, astronomes et médecins [d'après le document].</div>"
        },
        {
          "question": "<div style='color: #1a1a1a;'>7) Quel est l'événement marquant du règne de Kankou Moussa qui souligne la puissance de l'empire ?</div>",
          "reponse": "<div style='color: #1a1a1a;'>L'événement marquant du règne de Kankou Moussa est son <strong>pèlerinage à La Mecque en 1324</strong>. Ce voyage spectaculaire, avec une immense caravane et des tonnes d'or, a démontré la richesse et la puissance de l'Empire du Mali aux yeux du monde méditerranéen et a renforcé son prestige [d'après le document].</div>"
        }
      ]
    },
    {
      "titre": "Étude de cas : premiers contacts du Cameroun avec les Européens",
      "points": "7 pts",
      "enonce": "<div style='background-color: #fdf2e9; padding: 15px; border-radius: 8px; color: #1a1a1a;'><p><strong>Document :</strong> Les premiers explorateurs européens au Cameroun.</p><div style='background-color: #ffffff; padding: 15px; border-left: 4px solid #ff9800; margin: 10px 0; color: #1a1a1a;'><p>« Dans le cadre des grandes explorations maritimes portugaises, le navigateur <strong>Fernão do Pó</strong> (ou Fernando Pó) atteint les côtes du Cameroun en 1472. Il remonte l'estuaire du Wouri et baptise le fleuve "Rio dos Camarões" en raison de l'abondance de crevettes géantes qu'il y observe. Ce nom sera à l'origine du nom actuel du Cameroun. Les premiers contacts sont marqués par des échanges commerciaux, principalement de l'ivoire, du poivre et de l'huile de palme, que les Européens échangent contre des produits manufacturés. »</p></div><p><strong>Questions :</strong></p></div>",
      "questions": [
        {
          "question": "<div style='color: #1a1a1a;'>8) Quel navigateur a atteint les côtes du Cameroun en 1472 ? Que lui doit-on ?</div>",
          "reponse": "<div style='color: #1a1a1a;'>Le navigateur <strong>Fernão do Pó</strong> a atteint les côtes du Cameroun en 1472. On lui doit le nom du pays, car il a baptisé le fleuve Wouri \"Rio dos Camarões\" (rivière des crevettes) en raison de l'abondance de crevettes géantes, ce qui a donné \"Cameroun\" [d'après le document].</div>"
        },
        {
          "question": "<div style='color: #1a1a1a;'>9) Quels étaient les principaux produits échangés lors des premiers contacts avec les Européens ?</div>",
          "reponse": "<div style='color: #1a1a1a;'>Lors des premiers contacts, les échanges commerciaux portaient principalement sur <strong>l'ivoire</strong>, le <strong>poivre</strong> et <strong>l'huile de palme</strong>. Les Européens offraient en échange des produits manufacturés (tissus, outils, armes) [d'après le document].</div>"
        },
        {
          "question": "<div style='color: #1a1a1a;'>10) Explique l'origine du nom \"Cameroun\" à partir du texte.</div>",
          "reponse": "<div style='color: #1a1a1a;'>Le nom \"Cameroun\" vient du portugais <strong>\"Rio dos Camarões\"</strong> (rivière des crevettes). Fernão do Pó a donné ce nom au fleuve Wouri en raison de la présence massive de crevettes géantes dans son estuaire. Le terme a ensuite été étendu à toute la région [d'après le document].</div>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
