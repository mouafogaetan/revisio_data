<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Histoire",
  "classe": "Cinquième",
  "sequence": "Séquence 4 : Évaluation bilan (Modules I, II et III)",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Peuplement et organisation socio-politique du Cameroun (5 pts)",
      "points": "5 pts",
      "enonce": "<p>Consigne : Les questions suivantes portent sur le peuplement et l'organisation des sociétés précoloniales au Cameroun. Réponds-y en t'aidant de tes connaissances.</p>",
      "questions": [
        {
          "question": "<p> <span style='color:#1565c0;'>Identifie</span> les deux premiers groupes de population à avoir occupé le Cameroun.</p>",
          "reponse": "<p>Les deux premiers groupes sont les <strong>Pygmées</strong> et les <strong>Sao</strong>.</p>"
        },
        {
          "question": "<p> <span style='color:#1565c0;'>Décris</span> brièvement l'organisation sociale des Pygmées.</p>",
          "reponse": "<p>Les Pygmées vivent en <strong>petits groupes nomades</strong> dans la forêt. Ils pratiquent la <strong>chasse</strong> et la <strong>cueillette</strong>. Leur société est <strong>égalitaire</strong>, sans chef centralisé.</p>"
        },
        {
          "question": "<p> <span style='color:#1565c0;'>Présente</span> une réalisation artistique de la civilisation Sao.</p>",
          "reponse": "<p>La civilisation Sao est connue pour ses <strong>statuettes en terre cuite</strong> représentant des personnages aux formes stylisées.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Les migrations et leurs conséquences (5 pts)",
      "points": "5 pts",
      "enonce": "<p>Consigne : Les questions suivantes portent sur les migrations au Cameroun.</p>",
      "questions": [
        {
          "question": "<p> <span style='color:#1565c0;'>Distinguue</span> les <strong>migrations internes</strong> des <strong>migrations externes</strong>.</p>",
          "reponse": "<p>Les <strong>migrations internes</strong> sont des déplacements à l'intérieur du Cameroun (ex : exode rural vers les villes). Les <strong>migrations externes</strong> sont des déplacements vers l'étranger (ex : départ vers l'Europe).</p>"
        },
        {
          "question": "<p> <span style='color:#1565c0;'>Explique</span> une conséquence socio-économique des migrations récentes au Cameroun.</p>",
          "reponse": "<p>Une conséquence est l'<strong>urbanisation</strong> : les migrants quittent les campagnes pour les villes, ce qui provoque une croissance rapide des villes comme Douala et Yaoundé. Cela entraîne un <strong>brassage culturel</strong> mais aussi des problèmes comme le chômage et les logements insalubres.</p>"
        },
        {
          "question": "<p> <span style='color:#1565c0;'>Cite</span> une cause des migrations anciennes au Cameroun.</p>",
          "reponse": "<p>Une cause des migrations anciennes est la <strong>recherche de terres fertiles</strong> pour l'agriculture ou la <strong>pression démographique</strong>.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Sociétés étatiques et sociétés égalitaires (5 pts)",
      "points": "5 pts",
      "enonce": "<p>Consigne : Observe le tableau comparatif ci-dessous et réponds aux questions.</p><div style='background-color:#f5f5f5;padding:15px;border-radius:8px;border:1px solid #ddd;'><table style='width:100%;border-collapse:collapse;font-size:0.9em;'><tr style='background:#1565c0;color:white;'><th>Caractéristiques</th><th>Sociétés étatiques</th><th>Sociétés égalitaires</th></tr><tr><td><strong>Organisation</strong></td><td>Centralisée autour d'un roi ou lamido</td><td>Acéphale (sans chef central)</td></tr><tr><td><strong>Exemples</strong></td><td>Bamoun, Douala, royaumes du Nord</td><td>Beti, Bassa, Bulu</td></tr><tr><td><strong>Pouvoir</strong></td><td>Héréditaire, concentré</td><td>Conseil des notables, chef de village</td></tr></table></div>",
      "questions": [
        {
          "question": "<p> <span style='color:#1565c0;'>Définis</span> ce qu'est une <strong>société étatique</strong>.</p>",
          "reponse": "<p>Une société étatique est une organisation politique <strong>centralisée</strong> autour d'une autorité unique comme un <strong>roi</strong> ou un <strong>lamido</strong>. Le pouvoir est héréditaire et le territoire est délimité.</p>"
        },
        {
          "question": "<p> <span style='color:#1565c0;'>Identifie</span> un peuple du Sud-Cameroun qui vit en société égalitaire.</p>",
          "reponse": "<p>Les <strong>Beti</strong>, les <strong>Bassa</strong> ou les <strong>Bulu</strong> sont des peuples du Sud-Cameroun qui vivent en société égalitaire.</p>"
        },
        {
          "question": "<p> <span style='color:#1565c0;'>Explique</span> le rôle du <strong>conseil des notables</strong> dans les sociétés égalitaires.</p>",
          "reponse": "<p>Le <strong>conseil des notables</strong> est composé des chefs de famille. Il gère les affaires du village, règle les conflits et prend les décisions importantes. Le pouvoir est <strong>collectif</strong> et non concentré entre les mains d'un seul chef.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : L'âge d'or de l'Afrique occidentale et centrale (5 pts)",
      "points": "5 pts",
      "enonce": "<p>Consigne : Les questions suivantes portent sur les grands empires et royaumes d'Afrique avant le 16e siècle.</p>",
      "questions": [
        {
          "question": "<p> <span style='color:#1565c0;'>Explique</span> les sources de richesse de l'<strong>Empire du Ghana</strong>.</p>",
          "reponse": "<p>L'Empire du Ghana s'est enrichi grâce au commerce de l'<strong>or</strong> et du <strong>sel</strong>. Il contrôlait les routes commerciales transsahariennes.</p>"
        },
        {
          "question": "<p> <span style='color:#1565c0;'>Présente</span> un grand souverain de l'<strong>Empire du Mali</strong> et une de ses réalisations.</p>",
          "reponse": "<p><strong>Kankou Moussa</strong> est un célèbre souverain du Mali. Il a fait un <strong>pèlerinage à La Mecque</strong> (1324) qui a fait connaître la richesse du Mali. Il a construit des <strong>mosquées</strong> et a fait de Tombouctou un centre intellectuel.</p>"
        },
        {
          "question": "<p> <span style='color:#1565c0;'>Cite</span> une réalisation artistique du <strong>Royaume du Bénin</strong>.</p>",
          "reponse": "<p>Le Royaume du Bénin est célèbre pour ses <strong>bronzes</strong> et ses sculptures en <strong>ivoire</strong>, qui représentent des scènes de cour et des personnages importants.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : L'Afrique orientale et l'Océan Indien (5 pts)",
      "points": "5 pts",
      "enonce": "<p>Consigne : Lis le texte suivant et réponds aux questions.</p><div style='background-color:#f5f5f5;padding:15px;border-radius:8px;border-left:4px solid #1565c0;'><p><em>Les cités swahilies, comme Kilwa et Mombasa, étaient au cœur d'un vaste réseau commercial qui traversait l'Océan Indien. Les marchands arabes, persans, indiens et chinois y échangeaient l'ivoire, l'or et les épices. Ce commerce a favorisé le métissage culturel entre l'Afrique, le monde arabe et l'Asie.</em></p></div>",
      "questions": [
        {
          "question": "<p> <span style='color:#1565c0;'>Identifie</span> deux cités swahilies mentionnées dans le texte.</p>",
          "reponse": "<p>Les deux cités mentionnées sont <strong>Kilwa</strong> et <strong>Mombasa</strong>.</p>"
        },
        {
          "question": "<p> <span style='color:#1565c0;'>Explique</span> le rôle du commerce de l'Océan Indien dans le développement des cités swahilies.</p>",
          "reponse": "<p>Le commerce de l'Océan Indien a <strong>enrichi</strong> les cités swahilies. Elles contrôlaient les échanges de produits comme l'<strong>ivoire</strong>, l'<strong>or</strong> et les <strong>épices</strong>. Cela a favorisé leur <strong>développement urbain</strong> et leur <strong>prospérité</strong>.</p>"
        },
        {
          "question": "<p> <span style='color:#1565c0;'>Décris</span> le <strong>métissage culturel</strong> afro-arabe qui a eu lieu dans cette région.</p>",
          "reponse": "<p>Le métissage culturel afro-arabe s'est manifesté par l'adoption de la <strong>langue swahilie</strong> (mélange de bantou et d'arabe), la diffusion de l'<strong>islam</strong> et l'émergence d'une <strong>architecture originale</strong> avec des maisons en pierre.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 6 : Synthèse - Les civilisations africaines avant le 16e siècle (5 pts)",
      "points": "5 pts",
      "enonce": "<p>Consigne : Rédige un paragraphe construit sur le sujet suivant : <strong>« La richesse et la diversité des civilisations africaines avant le 16e siècle »</strong>.</p>",
      "questions": [
        {
          "question": "<p>Rédige ton développement.</p>",
          "reponse": "<p><strong>Réponse attendue :</strong> Avant le 16e siècle, l'Afrique connaît une grande <strong>diversité de civilisations</strong>. En Afrique de l'Ouest, les <strong>empires du Ghana, du Mali et du Songhaï</strong> se succèdent, contrôlant le commerce de l'or et du sel [citation:3]. Ces empires sont prospères et développent une <strong>culture raffinée</strong>, comme à Tombouctou, centre intellectuel de l'islam. En Afrique centrale, le <strong>Royaume Kongo</strong> organise son territoire autour du Manikongo. Dans la région du Bénin, les <strong>sculptures en bronze</strong> témoignent d'un art très avancé. Sur la côte est-africaine, les <strong>cités swahilies</strong> (Kilwa, Mombasa) commercent avec l'Asie et l'Arabie, créant une <strong>culture métissée</strong> afro-arabe. Enfin, au Cameroun, les <strong>sociétés étatiques</strong> (Bamoun, Douala) et les <strong>sociétés égalitaires</strong> (Beti, Bassa) coexistent. Cette diversité montre la richesse et la complexité des civilisations africaines avant l'arrivée des Européens.</p>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
