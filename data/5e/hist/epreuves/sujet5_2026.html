<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Histoire",
  "classe": "Cinquième",
  "sequence": "Séquence 5",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Les origines du peuplement du Cameroun",
      "points": "4 pts",
      "enonce": "<div style='margin-bottom: 15px;'><p>Le Cameroun est un pays de brassage culturel. Avant les grandes migrations, plusieurs peuples ont marqué les premières phases de son peuplement.</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 10px;'><p><strong>1.1</strong> (1 pt) Cite les deux premiers peuples à avoir occupé le territoire camerounais.</p></div>",
          "reponse": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1e293b;'><p>Les deux premiers peuples sont les Pygmées et les Sao.</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 10px;'><p><strong>1.2</strong> (1,5 pt) Décris brièvement l'organisation sociale et le mode de vie des premiers habitants identifiés.</p></div>",
          "reponse": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1e293b;'><p>Le premier peuple, les Pygmées, menait une vie de chasseurs-cueilleurs nomades, organisé en petits groupes familiaux. L'autre peuple, les Sao, était sédentaire, vivait dans des villages fortifiés autour du lac Tchad et avait une organisation sociale plus complexe avec une hiérarchie.</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 10px;'><p><strong>1.3</strong> (1,5 pt) Présente une réalisation artistique majeure de la civilisation Sao.</p></div>",
          "reponse": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1e293b;'><p>La civilisation Sao est célèbre pour ses sculptures en terre cuite représentant des figures humaines et animales, ainsi que pour ses objets en bronze et en fer.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Les migrations et l'organisation des sociétés précoloniales",
      "points": "4 pts",
      "enonce": "<div style='margin-bottom: 15px;'><p>Les mouvements de population et la structuration politique ont profondément façonné le visage du Cameroun précolonial.</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 10px;'><p><strong>2.1</strong> (1 pt) Distingue les migrations internes des migrations externes au Cameroun.</p></div>",
          "reponse": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1e293b;'><ul style='margin: 0; padding-left: 20px;'><li><strong>Migrations internes :</strong> Déplacements de populations à l'intérieur des frontières du Cameroun.</li><li><strong>Migrations externes :</strong> Déplacements de populations en provenance ou à destination d'autres pays.</li></ul></div>"
        },
        {
          "question": "<div style='margin-bottom: 10px;'><p><strong>2.2</strong> (1 pt) Identifie les deux grands types d'organisations sociopolitiques au Cameroun précolonial.</p></div>",
          "reponse": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1e293b;'><p>On distingue les sociétés étatiques centralisées et les sociétés égalitaires (ou acéphales).</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 10px;'><p><strong>2.3</strong> (2 pts) Explique le rôle du conseil des notables dans les sociétés égalitaires du Sud-Cameroun.</p></div>",
          "reponse": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1e293b;'><p>Dans les sociétés égalitaires comme celles des Beti ou des Bassa, le conseil des notables joue un rôle de contre-pouvoir. Il assiste le chef de village dans la prise de décisions, règle les conflits, et assure la cohésion sociale en représentant les différentes familles et lignages.</p></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Les grands États d'Afrique de l'Ouest et du Centre",
      "points": "6 pts",
      "enonce": "<div style='margin-bottom: 15px;'><p>L'Afrique médiévale a connu des empires et royaumes florissants, témoins d'une histoire riche et complexe. Associe chaque élément de la colonne A à l'élément correspondant de la colonne B en justifiant ton choix.</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 10px;'><p><strong>3.1</strong> (3 pts) Relie chaque empire/royaume à sa caractéristique principale.</p><div style='display: flex; flex-wrap: wrap; gap: 20px; margin-top: 10px;'><div style='background-color: #e2e8f0; padding: 12px; border-radius: 8px; flex: 1; min-width: 120px;'><p><strong>Colonne A</strong></p><ul style='margin: 0; padding-left: 20px;'><li>1. Empire du Ghana</li><li>2. Empire du Mali</li><li>3. Royaume Kongo</li></ul></div><div style='background-color: #e2e8f0; padding: 12px; border-radius: 8px; flex: 1; min-width: 120px;'><p><strong>Colonne B</strong></p><ul style='margin: 0; padding-left: 20px;'><li>a. Administration centralisée avec provinces, Manikongo</li><li>b. Richesses issues du commerce de l'or et du sel</li><li>c. Apogée sous Soundiata Keita et Kankou Moussa</li></ul></div></div></div>",
          "reponse": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1e293b;'><ul style='margin: 0; padding-left: 20px;'><li><strong>1-b</strong> : L'Empire du Ghana doit sa puissance au contrôle des mines d'or et du commerce du sel.</li><li><strong>2-c</strong> : L'Empire du Mali atteint son apogée sous les règnes de Soundiata Keita et Kankou Moussa.</li><li><strong>3-a</strong> : Le Royaume Kongo était organisé en provinces dirigées par un Manikongo.</li></ul></div>"
        },
        {
          "question": "<div style='margin-bottom: 10px;'><p><strong>3.2</strong> (1 pt) Explique l'importance de Tombouctou pour l'Empire du Mali.</p></div>",
          "reponse": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1e293b;'><p>Tombouctou était un centre intellectuel et commercial de premier plan. Elle abritait des universités et des bibliothèques qui en faisaient un carrefour du savoir islamique et un pôle d'échanges pour le commerce transsaharien.</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 10px;'><p><strong>3.3</strong> (2 pts) Identifie deux fonctions principales de l'art africain traditionnel.</p></div>",
          "reponse": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1e293b;'><ul style='margin: 0; padding-left: 20px;'><li><strong>Fonction religieuse :</strong> Les masques et statuaires sont souvent utilisés lors de rituels pour entrer en contact avec les ancêtres ou les esprits.</li><li><strong>Fonction politique :</strong> L'art est utilisé pour glorifier le pouvoir du roi ou du chef, comme les bronzes du Bénin ou les trônes royaux.</li></ul></div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : L'Afrique, le monde arabe et l'Europe",
      "points": "6 pts",
      "enonce": "<div style='margin-bottom: 15px;'><p>Les premiers contacts entre l'Afrique et le reste du monde ont été marqués par des échanges variés.</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 10px;'><p><strong>4.1</strong> (2 pts) Explique l'impact de l'Islam sur les sociétés de l'Afrique soudanaise.</p></div>",
          "reponse": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1e293b;'><p>L'Islam a profondément influencé les sociétés soudanaises en introduisant une nouvelle religion, l'écriture (arabe) et un droit (la Charia). Il a renforcé le pouvoir des souverains (comme au Mali) qui se sont proclamés « commandeurs des croyants », et a facilité les échanges commerciaux et culturels avec le monde arabo-musulman.</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 10px;'><p><strong>4.2</strong> (2 pts) Décris brièvement le rôle des cités-États swahilies comme Kilwa dans l'Océan Indien.</p></div>",
          "reponse": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1e293b;'><p>Les cités-États swahilies étaient des ports prospères qui contrôlaient le commerce dans l'Océan Indien. Elles commerçaient avec le Moyen-Orient et l'Inde, exportant de l'or, de l'ivoire et des esclaves. Ces échanges ont créé un métissage culturel afro-arabe, visible dans la langue swahilie et l'architecture.</p></div>"
        },
        {
          "question": "<div style='margin-bottom: 10px;'><p><strong>4.3</strong> (2 pts) Explique l'origine du nom « Cameroun ».</p></div>",
          "reponse": "<div style='background-color: #f0f4f8; padding: 12px; border-radius: 8px; color: #1e293b;'><p>Au 15e siècle, les navigateurs portugais, menés par Fernão do Pó, atteignirent l'estuaire du Wouri. Ils furent impressionnés par la quantité de crevettes, qu'ils appelèrent « camarões » en portugais. Le nom évolua ensuite en « Cameroun ».</p></div>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
