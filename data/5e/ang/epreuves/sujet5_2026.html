<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Anglais",
  "classe": "Cinquième",
  "sequence": "Séquence 5",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Grammaire (Temps et pronoms)",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1.1rem; line-height: 1.6;'><p><strong>Partie A :</strong> Complétez les phrases avec le bon pronom réfléchi (myself, yourself, himself, herself, itself, ourselves, themselves).</p><p><strong>Partie B :</strong> Mettez les verbes au futur avec <em>going to</em>.</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 8px;'><strong>Partie A (2 pts)</strong></div><div style='margin-bottom: 12px;'>1. I hurt <input type='text' style='border: none; border-bottom: 1px solid #000; width: 120px;' placeholder='...'> while playing football.</div>",
          "reponse": "<div><strong>1.</strong> I hurt <strong>myself</strong> while playing football.</div>"
        },
        {
          "question": "<div style='margin-bottom: 12px;'>2. She made the cake all by <input type='text' style='border: none; border-bottom: 1px solid #000; width: 120px;' placeholder='...'>.</div>",
          "reponse": "<div><strong>2.</strong> She made the cake all by <strong>herself</strong>.</div>"
        },
        {
          "question": "<div style='margin-bottom: 12px;'>3. They enjoyed <input type='text' style='border: none; border-bottom: 1px solid #000; width: 120px;' placeholder='...'> at the party.</div>",
          "reponse": "<div><strong>3.</strong> They enjoyed <strong>themselves</strong> at the party.</div>"
        },
        {
          "question": "<div style='margin-bottom: 12px;'>4. The cat is cleaning <input type='text' style='border: none; border-bottom: 1px solid #000; width: 120px;' placeholder='...'>.</div>",
          "reponse": "<div><strong>4.</strong> The cat is cleaning <strong>itself</strong>.</div>"
        },
        {
          "question": "<div style='margin-bottom: 8px;'><strong>Partie B (2 pts)</strong></div><div style='margin-bottom: 12px;'>1. She (visit) <input type='text' style='border: none; border-bottom: 1px solid #000; width: 120px;' placeholder='...'> her grandmother next weekend.</div>",
          "reponse": "<div><strong>1.</strong> She <strong>is going to visit</strong> her grandmother next weekend.</div>"
        },
        {
          "question": "<div style='margin-bottom: 12px;'>2. They (buy) <input type='text' style='border: none; border-bottom: 1px solid #000; width: 120px;' placeholder='...'> a new television tomorrow.</div>",
          "reponse": "<div><strong>2.</strong> They <strong>are going to buy</strong> a new television tomorrow.</div>"
        },
        {
          "question": "<div style='margin-bottom: 12px;'>3. We (not / watch) <input type='text' style='border: none; border-bottom: 1px solid #000; width: 120px;' placeholder='...'> TV this evening.</div>",
          "reponse": "<div><strong>3.</strong> We <strong>are not going to watch</strong> TV this evening.</div>"
        },
        {
          "question": "<div style='margin-bottom: 12px;'>4. You (study) <input type='text' style='border: none; border-bottom: 1px solid #000; width: 120px;' placeholder='...'> for the test tonight?</div>",
          "reponse": "<div><strong>4.</strong> <strong>Are</strong> you <strong>going to study</strong> for the test tonight?</div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Grammaire (Prépositions)",
      "points": "3 pts",
      "enonce": "<div style='font-size: 1.1rem; line-height: 1.6;'><p>Complétez les phrases avec la préposition de lieu qui convient : <strong>in, on, under, beside, near, at</strong>.</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 12px;'><strong>1.</strong> The school is <input type='text' style='border: none; border-bottom: 1px solid #000; width: 100px;' placeholder='...'> my house.</div>",
          "reponse": "<div><strong>1.</strong> The school is <strong>near</strong> my house.</div>"
        },
        {
          "question": "<div style='margin-bottom: 12px;'><strong>2.</strong> The book is <input type='text' style='border: none; border-bottom: 1px solid #000; width: 100px;' placeholder='...'> the table.</div>",
          "reponse": "<div><strong>2.</strong> The book is <strong>on</strong> the table.</div>"
        },
        {
          "question": "<div style='margin-bottom: 12px;'><strong>3.</strong> The keys are <input type='text' style='border: none; border-bottom: 1px solid #000; width: 100px;' placeholder='...'> the drawer.</div>",
          "reponse": "<div><strong>3.</strong> The keys are <strong>in</strong> the drawer.</div>"
        },
        {
          "question": "<div style='margin-bottom: 12px;'><strong>4.</strong> She sits <input type='text' style='border: none; border-bottom: 1px solid #000; width: 100px;' placeholder='...'> me in class.</div>",
          "reponse": "<div><strong>4.</strong> She sits <strong>beside</strong> me in class.</div>"
        },
        {
          "question": "<div style='margin-bottom: 12px;'><strong>5.</strong> The cat is sleeping <input type='text' style='border: none; border-bottom: 1px solid #000; width: 100px;' placeholder='...'> the chair.</div>",
          "reponse": "<div><strong>5.</strong> The cat is sleeping <strong>under</strong> the chair.</div>"
        },
        {
          "question": "<div style='margin-bottom: 12px;'><strong>6.</strong> I am <input type='text' style='border: none; border-bottom: 1px solid #000; width: 100px;' placeholder='...'> home right now.</div>",
          "reponse": "<div><strong>6.</strong> I am <strong>at</strong> home right now.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Compréhension écrite",
      "points": "5 pts",
      "enonce": "<div style='font-size: 1.1rem; line-height: 1.6;'><p><strong>Lisez le texte suivant et répondez aux questions.</strong></p><div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; margin: 15px 0; color: #1a1a1a;'><p><em>My name is Amina. I live in Yaoundé. My house has three rooms: a living room, a bedroom, and a kitchen. The living room is my favourite room. There is a big sofa, a television, and a small table in it. My mother is in the kitchen now. She is cooking rice and fish for dinner. My father is in the bedroom. He is reading a book. I am in the living room. I am doing my homework on the table.</em></p></div></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 12px;'><strong>1.</strong> How many rooms does Amina's house have?</div>",
          "reponse": "<div><strong>1.</strong> Her house has <strong>three rooms</strong>.</div>"
        },
        {
          "question": "<div style='margin-bottom: 12px;'><strong>2.</strong> What is Amina's favourite room?</div>",
          "reponse": "<div><strong>2.</strong> Her favourite room is the <strong>living room</strong>.</div>"
        },
        {
          "question": "<div style='margin-bottom: 12px;'><strong>3.</strong> Where is Amina's mother?</div>",
          "reponse": "<div><strong>3.</strong> She is <strong>in the kitchen</strong>.</div>"
        },
        {
          "question": "<div style='margin-bottom: 12px;'><strong>4.</strong> What is Amina's father doing?</div>",
          "reponse": "<div><strong>4.</strong> He is <strong>reading a book</strong>.</div>"
        },
        {
          "question": "<div style='margin-bottom: 12px;'><strong>5.</strong> Is Amina in the bedroom?</div>",
          "reponse": "<div><strong>5.</strong> <strong>No, she isn't.</strong> She is in the living room.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Vocabulaire (Gadgets et appareils)",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1.1rem; line-height: 1.6;'><p><strong>Partie A :</strong> Associez chaque appareil à sa fonction.</p><p><strong>Partie B :</strong> Complétez les phrases avec le mot qui convient.</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 8px;'><strong>Partie A (2 pts)</strong></div><div style='margin-bottom: 12px;'>1. Fridge → <input type='text' style='border: none; border-bottom: 1px solid #000; width: 150px;' placeholder='...'><br/>2. Laptop → <input type='text' style='border: none; border-bottom: 1px solid #000; width: 150px;' placeholder='...'><br/>3. Washing machine → <input type='text' style='border: none; border-bottom: 1px solid #000; width: 150px;' placeholder='...'><br/>4. Smartphone → <input type='text' style='border: none; border-bottom: 1px solid #000; width: 150px;' placeholder='...'></div>",
          "reponse": "<div><strong>Partie A :</strong><br/>1. Fridge → <strong>keeps food fresh</strong><br/>2. Laptop → <strong>used for work/study</strong><br/>3. Washing machine → <strong>washes clothes</strong><br/>4. Smartphone → <strong>used for communication</strong></div>"
        },
        {
          "question": "<div style='margin-bottom: 8px;'><strong>Partie B (2 pts)</strong></div><div style='margin-bottom: 12px;'>1. My mother watches the news on the <input type='text' style='border: none; border-bottom: 1px solid #000; width: 120px;' placeholder='...'> every evening.</div>",
          "reponse": "<div><strong>1.</strong> My mother watches the news on the <strong>television (TV)</strong> every evening.</div>"
        },
        {
          "question": "<div style='margin-bottom: 12px;'>2. I want to buy a new <input type='text' style='border: none; border-bottom: 1px solid #000; width: 120px;' placeholder='...'> to type my homework.</div>",
          "reponse": "<div><strong>2.</strong> I want to buy a new <strong>laptop</strong> to type my homework.</div>"
        },
        {
          "question": "<div style='margin-bottom: 12px;'>3. She puts fruits in the <input type='text' style='border: none; border-bottom: 1px solid #000; width: 120px;' placeholder='...'> to keep them fresh.</div>",
          "reponse": "<div><strong>3.</strong> She puts fruits in the <strong>fridge</strong> to keep them fresh.</div>"
        },
        {
          "question": "<div style='margin-bottom: 12px;'>4. He uses his <input type='text' style='border: none; border-bottom: 1px solid #000; width: 120px;' placeholder='...'> to send messages to his friends.</div>",
          "reponse": "<div><strong>4.</strong> He uses his <strong>smartphone</strong> to send messages to his friends.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Expression écrite",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1.1rem; line-height: 1.6;'><p>Choisissez l’un des deux sujets suivants et rédigez un texte d’environ <strong>80 à 100 mots</strong>.</p></div>",
      "questions": [
        {
          "question": "<div style='margin-bottom: 12px;'><strong>Sujet 1 :</strong> Décrivez votre maison (les pièces et les meubles que vous y trouvez). Dites aussi quelle est votre pièce préférée et pourquoi.</div>",
          "reponse": "<div><strong>Sujet 1 :</strong> (Exemple de réponse)<br/><br/><em>My house has four rooms: a kitchen, a living room, two bedrooms, and a bathroom. In the living room, there is a sofa, a table, and a television. My bedroom is small. It has a bed, a wardrobe, and a desk. My favourite room is the living room because I watch TV and talk with my family there. I love my home.</em></div>"
        },
        {
          "question": "<div style='margin-bottom: 12px;'><strong>Sujet 2 :</strong> Quel est votre appareil électronique préféré ? Pourquoi l'aimez-vous ? Que faites-vous avec cet appareil ?</div>",
          "reponse": "<div><strong>Sujet 2 :</strong> (Exemple de réponse)<br/><br/><em>My favourite gadget is my smartphone. I use it every day. I send messages to my friends and family. I also use it to watch videos and listen to music. I love it because it helps me communicate easily. I can also use it to learn new things on the internet. It is very useful.</em></div>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
