<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) - ajouté par le script de thème */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Welcome to Lesson 4",
    "contenu": "<div style='text-align: center; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 15px; color: white;'><h1 style='font-size: 1.8rem; margin-bottom: 10px;'>🌐 Coping with Social Media</h1><p style='font-size: 1.1rem;'>Lesson 4 - Modern Technology and Communication</p><hr style='border-color: rgba(255,255,255,0.3); width: 50%;'><p style='font-size: 0.9rem; margin-top: 15px;'>Class: Form 5 | Subject: English</p><p style='font-size: 0.9rem;'>🇨🇲 Cameroon</p></div>",
    "texteParle": "Welcome to lesson four on coping with social media. In this lesson, we will learn about different social media platforms, how to use them properly, and how to express our likes and dislikes. We will also practice writing short messages, chats, and tweets. Let's begin our journey into the world of social media!",
    "note": "Cette leçon est basée sur le programme de la classe de Cinquième au Cameroun."
  },
  {
    "titre": "Learning Objectives",
    "contenu": "<div style='padding: 15px; background-color: #f8f9fa; border-radius: 12px; color: #333;'><h3 style='color: #2c3e50; border-bottom: 3px solid #3498db; padding-bottom: 8px;'>🎯 By the end of this lesson, you will be able to:</h3><ul style='list-style-type: none; padding: 0;'><li style='padding: 8px 0; border-bottom: 1px solid #eee;'><span style='background-color: #3498db; color: white; border-radius: 50%; padding: 2px 10px; margin-right: 10px;'>1</span> Read short descriptions, role-plays, and instructions about social media</li><li style='padding: 8px 0; border-bottom: 1px solid #eee;'><span style='background-color: #3498db; color: white; border-radius: 50%; padding: 2px 10px; margin-right: 10px;'>2</span> Express likes, dislikes, and problems related to social media</li><li style='padding: 8px 0;'><span style='background-color: #3498db; color: white; border-radius: 50%; padding: 2px 10px; margin-right: 10px;'>3</span> Write short messages, chats, and tweets on coping with social media</li></ul></div>",
    "texteParle": "By the end of this lesson, you will be able to do three main things. First, you will read short descriptions, role-plays, and instructions about social media. Second, you will express your likes, dislikes, and problems related to social media. And third, you will write short messages, chats, and tweets about coping with social media. These skills will help you communicate better online.",
    "note": "Les objectifs sont basés sur les compétences du programme officiel."
  },
  {
    "titre": "What is Social Media?",
    "contenu": "<div style='padding: 15px; background-color: #e8f4fd; border-radius: 12px; color: #1a1a2e;'><h3 style='color: #2c3e50;'>📱 What is Social Media?</h3><p style='font-size: 1rem; line-height: 1.6;'>Social media are websites and applications that allow people to <strong>share information, ideas, and messages</strong> with others. They help us <strong>connect</strong> with friends, family, and people around the world.</p><div style='background-color: #d4edda; padding: 12px; border-radius: 8px; margin: 10px 0;'><strong>Popular social media platforms:</strong><br>Facebook, WhatsApp, Instagram, TikTok, Twitter (X), YouTube, Snapchat</div><p style='font-size: 0.95rem;'><em>In Cameroon, WhatsApp and Facebook are very popular for communication.</em></p></div>",
    "texteParle": "So what is social media? Social media are websites and applications that allow people to share information, ideas, and messages with others. They help us connect with friends, family, and people around the world. Some popular social media platforms are Facebook, WhatsApp, Instagram, TikTok, Twitter, YouTube, and Snapchat. In Cameroon, WhatsApp and Facebook are very popular for communication.",
    "note": "Les exemples incluent des applications couramment utilisées au Cameroun."
  },
  {
    "titre": "Benefits of Social Media",
    "contenu": "<div style='padding: 15px; border-radius: 12px; color: white; background: linear-gradient(135deg, #11998e, #38ef7d);'><h3 style='color: white;'>✅ Benefits of Social Media</h3><ul style='list-style-type: none; padding: 0;'><li style='padding: 6px 0;'>📌 <strong>Communication:</strong> Stay in touch with friends and family</li><li style='padding: 6px 0;'>📌 <strong>Information:</strong> Get news and updates quickly</li><li style='padding: 6px 0;'>📌 <strong>Learning:</strong> Access educational content and tutorials</li><li style='padding: 6px 0;'>📌 <strong>Entertainment:</strong> Watch videos, listen to music, play games</li><li style='padding: 6px 0;'>📌 <strong>Business:</strong> Promote products and services</li></ul><div style='background-color: rgba(255,255,255,0.2); padding: 8px; border-radius: 8px; margin-top: 10px; text-align: center;'>💡 Social media can be useful when used wisely!</div></div>",
    "texteParle": "Social media has many benefits. First, it helps us communicate and stay in touch with friends and family. Second, we can get news and updates quickly. Third, we can access educational content and tutorials for learning. Fourth, social media provides entertainment like watching videos, listening to music, and playing games. Finally, people use social media to promote products and services. Social media can be very useful when we use it wisely.",
    "note": "Les avantages sont présentés de manière simple et accessible."
  },
  {
    "titre": "Challenges of Social Media",
    "contenu": "<div style='padding: 15px; border-radius: 12px; color: white; background: linear-gradient(135deg, #f093fb, #f5576c);'><h3 style='color: white;'>⚠️ Challenges of Social Media</h3><ul style='list-style-type: none; padding: 0;'><li style='padding: 6px 0;'>🔴 <strong>Addiction:</strong> Spending too much time online</li><li style='padding: 6px 0;'>🔴 <strong>Cyberbullying:</strong> Being harassed or bullied online</li><li style='padding: 6px 0;'>🔴 <strong>Privacy issues:</strong> Personal information being shared</li><li style='padding: 6px 0;'>🔴 <strong>Fake news:</strong> Sharing false or misleading information</li><li style='padding: 6px 0;'>🔴 <strong>Social pressure:</strong> Feeling pressured to look perfect</li></ul><div style='background-color: rgba(255,255,255,0.2); padding: 8px; border-radius: 8px; margin-top: 10px; text-align: center;'>⚠️ Always be careful and responsible online!</div></div>",
    "texteParle": "However, social media also has challenges. One major challenge is addiction, where people spend too much time online. Another is cyberbullying, which is being harassed or bullied online. There are also privacy issues, where personal information can be shared without permission. Fake news is another problem, where people share false information. Finally, there is social pressure, where people feel pressured to look perfect. This is why it is important to always be careful and responsible online.",
    "note": "Les défis sont expliqués avec des termes simples pour les élèves de Cinquième."
  },
  {
    "titre": "Vocabulary: Social Media",
    "contenu": "<div style='padding: 15px; background-color: #fff3cd; border-radius: 12px; color: #1a1a2e;'><h3 style='color: #2c3e50;'>📚 Key Vocabulary</h3><div style='display: grid; grid-template-columns: 1fr; gap: 8px;'><div style='background-color: white; padding: 8px 12px; border-radius: 6px; border-left: 4px solid #007bff;'><strong>Post</strong> - a message or photo shared online</div><div style='background-color: white; padding: 8px 12px; border-radius: 6px; border-left: 4px solid #28a745;'><strong>Like</strong> - to show you appreciate something</div><div style='background-color: white; padding: 8px 12px; border-radius: 6px; border-left: 4px solid #dc3545;'><strong>Share</strong> - to send a post to someone else</div><div style='background-color: white; padding: 8px 12px; border-radius: 6px; border-left: 4px solid #ffc107;'><strong>Comment</strong> - to write a reply or opinion</div><div style='background-color: white; padding: 8px 12px; border-radius: 6px; border-left: 4px solid #17a2b8;'><strong>Follow</strong> - to subscribe to someone's posts</div><div style='background-color: white; padding: 8px 12px; border-radius: 6px; border-left: 4px solid #6f42c1;'><strong>Friend request</strong> - asking someone to connect</div></div></div>",
    "texteParle": "Let's learn some key vocabulary related to social media. A post is a message or photo shared online. To like means to show you appreciate something. To share means to send a post to someone else. To comment means to write a reply or opinion. To follow means to subscribe to someone's posts. And a friend request is asking someone to connect with you on social media. These words will help you talk about social media.",
    "note": "Le vocabulaire est essentiel pour comprendre et discuter des médias sociaux."
  },
  {
    "titre": "Expressing Likes and Dislikes",
    "contenu": "<div style='padding: 15px; background-color: #d6eaf8; border-radius: 12px; color: #1a1a2e;'><h3 style='color: #2c3e50;'>❤️ Expressing Likes & Dislikes</h3><p style='font-size: 0.95rem;'>We can use these expressions to talk about social media:</p><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 10px;'><div style='background-color: #a9dfbf; padding: 10px; border-radius: 8px;'><strong>LIKES</strong><br>✅ I <strong>like</strong> using WhatsApp.<br>✅ I <strong>love</strong> watching YouTube.<br>✅ I <strong>enjoy</strong> sharing photos.<br>✅ I <strong>prefer</strong> Instagram.</div><div style='background-color: #f5b7b1; padding: 10px; border-radius: 8px;'><strong>DISLIKES</strong><br>❌ I <strong>don't like</strong> fake news.<br>❌ I <strong>hate</strong> cyberbullying.<br>❌ I <strong>dislike</strong> too many ads.<br>❌ I <strong>can't stand</strong> spam messages.</div></div><div style='background-color: #d4ac0d; padding: 10px; border-radius: 8px; margin-top: 10px; text-align: center; color: white;'>📝 <strong>Practice:</strong> What do you like or dislike about social media?</div></div>",
    "texteParle": "Now, let's learn how to express our likes and dislikes about social media. To express likes, we can say: I like using WhatsApp, I love watching YouTube, I enjoy sharing photos, or I prefer Instagram. To express dislikes, we can say: I don't like fake news, I hate cyberbullying, I dislike too many ads, or I can't stand spam messages. Now practice with your friends: What do you like or dislike about social media?",
    "note": "Les expressions de goût sont un objectif clé de la leçon."
  },
  {
    "titre": "Problems with Social Media",
    "contenu": "<div style='padding: 15px; background-color: #fdedec; border-radius: 12px; color: #1a1a2e;'><h3 style='color: #c0392b;'>🆘 Common Problems</h3><p style='font-size: 0.95rem;'>Read these common problems people face:</p><div style='background-color: white; padding: 10px; border-radius: 8px; margin: 8px 0;'><strong>1. Addiction:</strong> \"I spend many hours on social media every day.\"</div><div style='background-color: white; padding: 10px; border-radius: 8px; margin: 8px 0;'><strong>2. Cyberbullying:</strong> \"Someone is sending me mean messages.\"</div><div style='background-color: white; padding: 10px; border-radius: 8px; margin: 8px 0;'><strong>3. Privacy:</strong> \"My personal information was shared without my permission.\"</div><div style='background-color: white; padding: 10px; border-radius: 8px; margin: 8px 0;'><strong>4. Fake news:</strong> \"I saw a story that wasn't true.\"</div></div>",
    "texteParle": "Many people face problems with social media. Some common problems are addiction, where people spend too much time online. Cyberbullying is when someone sends mean messages. Privacy problems happen when personal information is shared without permission. And fake news is when we see stories that are not true. These are serious problems that we need to know how to handle.",
    "note": "Les problèmes sont présentés avec des exemples concrets."
  },
  {
    "titre": "Tips for Coping with Social Media",
    "contenu": "<div style='padding: 15px; background: linear-gradient(135deg, #2c3e50, #3498db); border-radius: 12px; color: white;'><h3 style='color: white;'>💡 Tips for Coping with Social Media</h3><div style='background-color: rgba(255,255,255,0.15); padding: 10px; border-radius: 8px; margin: 6px 0;'>⏰ <strong>Set limits:</strong> Spend only a fixed amount of time daily.</div><div style='background-color: rgba(255,255,255,0.15); padding: 10px; border-radius: 8px; margin: 6px 0;'>🛡️ <strong>Protect privacy:</strong> Never share passwords or personal information.</div><div style='background-color: rgba(255,255,255,0.15); padding: 10px; border-radius: 8px; margin: 6px 0;'>🧠 <strong>Be critical:</strong> Don't believe everything you read online.</div><div style='background-color: rgba(255,255,255,0.15); padding: 10px; border-radius: 8px; margin: 6px 0;'>👥 <strong>Talk to someone:</strong> If you are bullied, tell a trusted adult.</div><div style='background-color: rgba(255,255,255,0.15); padding: 10px; border-radius: 8px; margin: 6px 0;'>📵 <strong>Take breaks:</strong> Spend time offline with family and friends.</div></div>",
    "texteParle": "Here are some tips for coping with social media. First, set limits. Spend only a fixed amount of time online each day. Second, protect your privacy. Never share your passwords or personal information. Third, be critical. Don't believe everything you read online. Fourth, if you are being bullied, talk to a trusted adult. And finally, take breaks. Spend time offline with your family and friends. These tips will help you use social media safely.",
    "note": "Les conseils sont pratiques et adaptés au contexte camerounais."
  },
  {
    "titre": "Reading: A Role-Play",
    "contenu": "<div style='padding: 15px; background-color: #f0f8ff; border-radius: 12px; color: #1a1a2e;'><h3 style='color: #2c3e50;'>🎭 Role-Play: Coping with Cyberbullying</h3><div style='background-color: white; padding: 12px; border-radius: 8px; border: 1px solid #ddd;'><p><strong>Mama:</strong> \"You look sad, Fils. What's the matter?\"</p><p><strong>Fils:</strong> \"I'm having problems with social media.\"</p><p><strong>Mama:</strong> \"Tell me about it.\"</p><p><strong>Fils:</strong> \"Someone is sending me mean messages on WhatsApp.\"</p><p><strong>Mama:</strong> \"That is cyberbullying. You must block that person and tell an adult.\"</p><p><strong>Fils:</strong> \"You're right, Mama. I will talk to my teacher too.\"</p><p><strong>Mama:</strong> \"That's a good idea. Remember, social media is for fun, not for problems.\"</p></div><div style='background-color: #ffeaa7; padding: 8px; border-radius: 8px; margin-top: 10px; text-align: center;'>📝 <strong>Comprehension:</strong> What problem is Fils facing? What should he do?</div></div>",
    "texteParle": "Let's read a role-play about coping with cyberbullying. In this dialogue, Mama notices that Fils is sad. Fils tells her that someone is sending him mean messages on WhatsApp. Mama explains that this is cyberbullying and advises him to block that person and tell an adult. Fils decides to talk to his teacher too. The message is that social media should be for fun, not for problems. Now answer this question: What problem is Fils facing and what should he do?",
    "note": "Le role-play permet de contextualiser la leçon."
  },
  {
    "titre": "Writing: Short Messages",
    "contenu": "<div style='padding: 15px; background-color: #e8f8f5; border-radius: 12px; color: #1a1a2e;'><h3 style='color: #2c3e50;'>✍️ Writing Practice</h3><p style='font-size: 0.95rem;'>Write short messages (chats, tweets, or posts) about social media.</p><div style='background-color: #d1f2eb; padding: 12px; border-radius: 8px;'><strong>Example 1 (Chat):</strong><br>\"Hi, I'm worried about spending too much time on social media. I need to reduce my screen time.\"</div><div style='background-color: #d1f2eb; padding: 12px; border-radius: 8px; margin: 10px 0;'><strong>Example 2 (Tweet):</strong><br>\"Social media is a great way to connect with friends, but we must use it wisely! #CopingWithSocialMedia\"</div><div style='background-color: #d1f2eb; padding: 12px; border-radius: 8px;'><strong>Example 3 (Post):</strong><br>\"Today I learned about cyberbullying. We should all be kind to each other online.\"</div></div>",
    "texteParle": "Now it's time to practice writing. You can write short messages like chats, tweets, or posts. For example, a chat message could say: 'Hi, I'm worried about spending too much time on social media. I need to reduce my screen time.' A tweet could say: 'Social media is a great way to connect with friends, but we must use it wisely! Hashtag CopingWithSocialMedia.' A post could say: 'Today I learned about cyberbullying. We should all be kind to each other online.' Now try to write your own messages.",
    "note": "Les exemples sont adaptés au niveau Cinquième."
  },

    "titre": "Practice Activity: Fill in the Blanks",

    "note": "L'exercice renforce le vocabulaire appris."

  {
    "titre": "Role-Play: Expressing Problems",
    "contenu": "<div style='padding: 15px; background-color: #f4ecf7; border-radius: 12px; color: #1a1a2e;'><h3 style='color: #2c3e50;'>🎭 Role-Play: Expressing Problems</h3><p style='font-size: 0.95rem;'>Work in pairs. One person expresses a problem, the other gives advice.</p><div style='background-color: white; padding: 12px; border-radius: 8px;'><strong>Student A:</strong> \"I have a problem. I spend too much time on TikTok.\"<br><strong>Student B:</strong> \"You should set a limit. Try to spend only one hour a day.\"</div><div style='background-color: white; padding: 12px; border-radius: 8px; margin-top: 8px;'><strong>Student A:</strong> \"Someone posted an embarrassing photo of me without my permission.\"<br><strong>Student B:</strong> \"That's a privacy issue. You should ask them to delete it and report it.\"</div><div style='background-color: white; padding: 12px; border-radius: 8px; margin-top: 8px;'><strong>Student A:</strong> \"I saw a video that said something scary about our school, but I don't know if it's true.\"<br><strong>Student B:</strong> \"Don't believe everything you see. Check with a teacher first.\"</div></div>",
    "texteParle": "Now let's do a role-play activity. Work in pairs. One person will express a problem, and the other person will give advice. For example, if someone says 'I spend too much time on TikTok,' the other person can say 'You should set a limit. Try to spend only one hour a day.' You can also discuss problems like privacy issues or fake news. This activity will help you practice expressing problems and giving advice.",
    "note": "L'activité encourage la participation et la pratique orale."

  {
    "titre": "Writing a Friendly Email",
    "contenu": "<div style='padding: 15px; background-color: #ebf5fb; border-radius: 12px; color: #1a1a2e;'><h3 style='color: #2c3e50;'>✉️ Writing: A Friendly Email</h3><p style='font-size: 0.95rem;'>Write an email to a friend about your social media experience.</p><div style='background-color: white; padding: 12px; border-radius: 8px; border: 1px solid #ddd;'><strong>Example:</strong><br><br><strong>Subject:</strong> My Social Media Experience<br><br>Dear John,<br><br>How are you? I want to tell you about my experience with social media. I enjoy using WhatsApp and YouTube. However, I sometimes spend too much time online. My parents are helping me to set limits. I also learned about cyberbullying and how to stay safe online.<br><br>What about you? What do you think about social media?<br><br>Best regards,<br>Fils</div></div>",
    "texteParle": "Let's practice writing a friendly email. Imagine you are writing to a friend about your social media experience. Start with the subject line, then write 'Dear' followed by your friend's name. In the body, you can talk about what you enjoy, any problems you face, and what you are doing to cope. End with 'Best regards' and your name. This is a good way to practice writing in English.",
    "note": "L'écriture d'emails est une compétence pratique pour les élèves."

  {
    "titre": "Post, Tweet, or Chat",
    "contenu": "<div style='padding: 15px; background-color: #fdf2e9; border-radius: 12px; color: #1a1a2e;'><h3 style='color: #2c3e50;'>💬 Your Turn: Post, Tweet, or Chat</h3><p style='font-size: 0.95rem;'>Choose one of these and write your own message:</p><div style='display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;'><div style='background-color: #d5f5e3; padding: 10px; border-radius: 8px; text-align: center;'><strong>📱 CHAT</strong><br>Write a WhatsApp message to a friend about social media.</div><div style='background-color: #d6eaf8; padding: 10px; border-radius: 8px; text-align: center;'><strong>🐦 TWEET</strong><br>Write a short tweet about coping with social media. (max 280 characters)</div><div style='background-color: #fadbd8; padding: 10px; border-radius: 8px; text-align: center;'><strong>📝 POST</strong><br>Write a Facebook/Instagram post about your social media experience.</div></div><div style='background-color: #f1c40f; padding: 8px; border-radius: 8px; margin-top: 10px; text-align: center; color: #1a1a2e;'>✍️ Write your message in your notebook and share it with the class!</div></div>",
    "texteParle": "Now it's your turn. Choose one of these formats and write your own message. You can write a chat message on WhatsApp to a friend about social media. Or you can write a short tweet about coping with social media, with a maximum of 280 characters. Or you can write a post for Facebook or Instagram about your social media experience. Write your message in your notebook and be ready to share it with the class.",
    "note": "L'activité permet aux élèves de choisir leur format préféré."

  {
    "titre": "Quick Quiz: True or False?",
    "contenu": "<div style='padding: 15px; background-color: #eaf2f8; border-radius: 12px; color: #1a1a2e;'><h3 style='color: #2c3e50;'>🧠 Quick Quiz: True or False?</h3><div style='background-color: white; padding: 10px; border-radius: 8px; margin: 5px 0;'>1. Social media helps us connect with friends. <span style='color: #27ae60;'>✅ True</span></div><div style='background-color: white; padding: 10px; border-radius: 8px; margin: 5px 0;'>2. It is safe to share your password with friends. <span style='color: #e74c3c;'>❌ False</span></div><div style='background-color: white; padding: 10px; border-radius: 8px; margin: 5px 0;'>3. Cyberbullying is when someone is kind to you online. <span style='color: #e74c3c;'>❌ False</span></div><div style='background-color: white; padding: 10px; border-radius: 8px; margin: 5px 0;'>4. Spending many hours online is a sign of addiction. <span style='color: #27ae60;'>✅ True</span></div><div style='background-color: white; padding: 10px; border-radius: 8px; margin: 5px 0;'>5. You should always believe everything you see online. <span style='color: #e74c3c;'>❌ False</span></div></div>",
    "texteParle": "Let's do a quick quiz to check your understanding. Number one: Social media helps us connect with friends. This is true. Number two: It is safe to share your password with friends. This is false. Number three: Cyberbullying is when someone is kind to you online. This is false. Number four: Spending many hours online is a sign of addiction. This is true. Number five: You should always believe everything you see online. This is false. Well done!",
    "note": "Le quiz permet de vérifier la compréhension de manière ludique."

  {
    "titre": "Speaking: Class Discussion",
    "contenu": "<div style='padding: 15px; background-color: #fef9e7; border-radius: 12px; color: #1a1a2e;'><h3 style='color: #2c3e50;'>🗣️ Class Discussion</h3><p style='font-size: 0.95rem;'>Discuss these questions in class:</p><div style='background-color: white; padding: 12px; border-radius: 8px; margin: 8px 0;'>💬 <strong>Question 1:</strong> \"Which social media platform do you like most? Why?\"</div><div style='background-color: white; padding: 12px; border-radius: 8px; margin: 8px 0;'>💬 <strong>Question 2:</strong> \"What is the biggest problem you face with social media?\"</div><div style='background-color: white; padding: 12px; border-radius: 8px; margin: 8px 0;'>💬 <strong>Question 3:</strong> \"What advice would you give to someone who spends too much time online?\"</div><div style='background-color: white; padding: 12px; border-radius: 8px; margin: 8px 0;'>💬 <strong>Question 4:</strong> \"How can social media help you in your studies?\"</div></div>",
    "texteParle": "Now let's have a class discussion. I will ask you four questions. First, which social media platform do you like most and why? Second, what is the biggest problem you face with social media? Third, what advice would you give to someone who spends too much time online? And fourth, how can social media help you in your studies? Take turns speaking and listen to your classmates' answers.",
    "note": "La discussion encourage l'expression orale en anglais."
  },
  {
    "titre": "What We Learned Today",
    "contenu": "<div style='padding: 15px; border-radius: 12px; color: white; background: linear-gradient(135deg, #2c3e50, #8e44ad);'><h3 style='color: white;'>📌 What We Learned Today</h3><ul style='list-style-type: none; padding: 0;'><li style='padding: 6px 0;'>✅ What social media is and its benefits</li><li style='padding: 6px 0;'>✅ Common challenges like cyberbullying and addiction</li><li style='padding: 6px 0;'>✅ Vocabulary: post, like, share, comment, follow</li><li style='padding: 6px 0;'>✅ How to express likes and dislikes</li><li style='padding: 6px 0;'>✅ Tips for coping with social media problems</li><li style='padding: 6px 0;'>✅ How to write chats, tweets, posts, and emails</li></ul><div style='background-color: rgba(255,255,255,0.2); padding: 8px; border-radius: 8px; margin-top: 10px; text-align: center;'>🌟 Remember: Use social media responsibly!</div></div>",
    "texteParle;
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            if (header) header.style.background = 'rgba(15, 23, 42, 0.85)';
            if (footer) footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            if (header) header.style.background = 'rgba(255, 255, 255, 0.85)';
            if (footer) footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
            // Ajouter l'écouteur d'événement click
            themeBtn.addEventListener('click', toggleTheme);
        }
    });
</script>
