<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Mathématiques",
  "classe": "Cinquième",
  "sequence": "Séquence 2",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Division euclidienne et Puissances",
      "points": "3 pts",
      "enonce": "<div style='font-size:1.1em; line-height:1.6;'>\n  <p style='margin-bottom:10px;'><strong>Partie A : Division euclidienne</strong></p>\n  <p>1) Effectue la division euclidienne de 537 par 25. Donne le quotient et le reste.</p>\n  <p>2) Vérifie ta réponse en utilisant la relation fondamentale de la division euclidienne : $Dividende = Diviseur \\times Quotient + Reste$.</p>\n  <p style='margin-top:15px;'><strong>Partie B : Puissances</strong></p>\n  <p>3) Calcule les puissances suivantes : $2^5$, $3^4$, $10^3$.</p>\n  <p>4) Écris les nombres suivants sous forme d'une puissance entière : $32$ et $81$.</p>\n</div>",
      "questions": [
        {
          "question": "1) Effectuer la division euclidienne de 537 par 25. Donner le quotient et le reste.",
          "reponse": "<p>On a $537 = 25 \\times 21 + 12$ (car $25 \\times 21 = 525$ et $537 - 525 = 12$).</p><p>Donc le quotient est <strong>21</strong> et le reste est <strong>12</strong>.</p>"
        },
        {
          "question": "2) Vérifier la réponse en utilisant la relation fondamentale de la division euclidienne.",
          "reponse": "<p>La relation fondamentale est : $Dividende = Diviseur \\times Quotient + Reste$.</p><p>Vérification : $25 \\times 21 + 12 = 525 + 12 = 537$. La réponse est correcte.</p>"
        },
        {
          "question": "3) Calculer les puissances suivantes : $2^5$, $3^4$, $10^3$.",
          "reponse": "<ul><li>$2^5 = 2 \\times 2 \\times 2 \\times 2 \\times 2 = 32$</li><li>$3^4 = 3 \\times 3 \\times 3 \\times 3 = 81$</li><li>$10^3 = 10 \\times 10 \\times 10 = 1000$</li></ul>"
        },
        {
          "question": "4) Écrire les nombres suivants sous forme d'une puissance entière : 32 et 81.",
          "reponse": "<ul><li>$32 = 2^5$</li><li>$81 = 3^4$</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : PPCM et PGCD",
      "points": "4 pts",
      "enonce": "<div style='font-size:1.1em; line-height:1.6;'>\n  <p style='margin-bottom:10px;'>1) Décompose les nombres <strong>72</strong> et <strong>108</strong> en produit de facteurs premiers.</p>\n  <p>2) Détermine le PGCD de 72 et 108.</p>\n  <p>3) Détermine le PPCM de 72 et 108.</p>\n  <p style='margin-top:15px;'><strong>Problème :</strong></p>\n  <p>4) Un chocolatier dispose de 72 chocolats au lait et 108 chocolats noirs. Il souhaite confectionner des sachets identiques contenant chacun le même nombre de chocolats au lait et le même nombre de chocolats noirs, sans qu'il ne reste de chocolats.</p>\n  <p>Quel est le plus grand nombre de sachets qu'il peut préparer ? Combien y aura-t-il de chocolats de chaque sorte dans chaque sachet ?</p>\n</div>",
      "questions": [
        {
          "question": "1) Décomposer 72 et 108 en produit de facteurs premiers.",
          "reponse": "<p>$72 = 2^3 \\times 3^2$ (car $72 = 8 \\times 9$).</p><p>$108 = 2^2 \\times 3^3$ (car $108 = 4 \\times 27$).</p>"
        },
        {
          "question": "2) Déterminer le PGCD de 72 et 108.",
          "reponse": "<p>On prend les facteurs communs avec le plus petit exposant : $2^2 \\times 3^2 = 4 \\times 9 = 36$.</p><p>Le PGCD est donc <strong>36</strong>.</p>"
        },
        {
          "question": "3) Déterminer le PPCM de 72 et 108.",
          "reponse": "<p>On prend tous les facteurs avec le plus grand exposant : $2^3 \\times 3^3 = 8 \\times 27 = 216$.</p><p>Le PPCM est donc <strong>216</strong>.</p>"
        },
        {
          "question": "4) Résoudre le problème du chocolatier.",
          "reponse": "<p>Le plus grand nombre de sachets est le PGCD de 72 et 108, soit <strong>36</strong>.</p><p>Dans chaque sachet, il y aura : $72 \\div 36 = 2$ chocolats au lait et $108 \\div 36 = 3$ chocolats noirs.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Opérations sur les fractions",
      "points": "3 pts",
      "enonce": "<div style='font-size:1.1em; line-height:1.6;'>\n  <p><strong>Calculer et donner le résultat sous forme de fraction irréductible :</strong></p>\n  <p>1) $\\dfrac{5}{6} + \\dfrac{7}{6}$</p>\n  <p>2) $\\dfrac{3}{4} + \\dfrac{5}{8}$</p>\n  <p>3) $\\dfrac{2}{3} \\times \\dfrac{9}{4}$</p>\n  <p>4) $\\dfrac{5}{2} \\div \\dfrac{3}{4}$</p>\n  <p><strong>Problème :</strong></p>\n  <p>5) Un jardin est planté de fleurs. Les $\\dfrac{2}{5}$ du jardin sont occupés par des roses, le tiers du reste par des tulipes et le reste par des marguerites.</p>\n  <p>Quelle fraction du jardin est occupée par les marguerites ?</p>\n</div>",
      "questions": [
        {
          "question": "1) $\\dfrac{5}{6} + \\dfrac{7}{6}$",
          "reponse": "<p>$\\dfrac{5}{6} + \\dfrac{7}{6} = \\dfrac{5+7}{6} = \\dfrac{12}{6} = 2$</p>"
        },
        {
          "question": "2) $\\dfrac{3}{4} + \\dfrac{5}{8}$",
          "reponse": "<p>$\\dfrac{3}{4} + \\dfrac{5}{8} = \\dfrac{3 \\times 2}{4 \\times 2} + \\dfrac{5}{8} = \\dfrac{6}{8} + \\dfrac{5}{8} = \\dfrac{11}{8}$</p>"
        },
        {
          "question": "3) $\\dfrac{2}{3} \\times \\dfrac{9}{4}$",
          "reponse": "<p>$\\dfrac{2}{3} \\times \\dfrac{9}{4} = \\dfrac{2 \\times 9}{3 \\times 4} = \\dfrac{18}{12} = \\dfrac{3}{2}$ (après simplification par 6).</p>"
        },
        {
          "question": "4) $\\dfrac{5}{2} \\div \\dfrac{3}{4}$",
          "reponse": "<p>$\\dfrac{5}{2} \\div \\dfrac{3}{4} = \\dfrac{5}{2} \\times \\dfrac{4}{3} = \\dfrac{5 \\times 4}{2 \\times 3} = \\dfrac{20}{6} = \\dfrac{10}{3}$.</p>"
        },
        {
          "question": "5) Résoudre le problème du jardin.",
          "reponse": "<p>Les roses occupent $\\dfrac{2}{5}$ du jardin. Le reste est $1 - \\dfrac{2}{5} = \\dfrac{3}{5}$.</p><p>Les tulipes occupent le tiers du reste : $\\dfrac{1}{3} \\times \\dfrac{3}{5} = \\dfrac{1}{5}$.</p><p>Les marguerites occupent : $\\dfrac{3}{5} - \\dfrac{1}{5} = \\dfrac{2}{5}$ du jardin.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Nombres décimaux relatifs et Équations",
      "points": "4 pts",
      "enonce": "<div style='font-size:1.1em; line-height:1.6;'>\n  <p><strong>Partie A : Opérations sur les relatifs</strong></p>\n  <p>1) Calculer : $(-5) + (-3)$, $(-7) - (+4)$, $(-3) \\times (-6)$, $(-12) \\div (+4)$.</p>\n  <p>2) Calculer $(-2)^3$.</p>\n  <p style='margin-top:15px;'><strong>Partie B : Équations</strong></p>\n  <p>3) Résoudre les équations suivantes :</p>\n  <p>a) $x + 7 = 12$</p>\n  <p>b) $x - 4 = -3$</p>\n  <p>c) $3x = 15$</p>\n  <p>d) $-2x = 8$</p>\n  <p style='margin-top:15px;'><strong>Problème :</strong></p>\n  <p>4) Un père a 42 ans et son fils a 12 ans. Dans combien d'années l'âge du père sera-t-il le double de l'âge du fils ?</p>\n</div>",
      "questions": [
        {
          "question": "1) Calculer les opérations sur les relatifs.",
          "reponse": "<ul><li>$(-5) + (-3) = -8$</li><li>$(-7) - (+4) = -7 - 4 = -11$</li><li>$(-3) \\times (-6) = +18$</li><li>$(-12) \\div (+4) = -3$</li></ul>"
        },
        {
          "question": "2) Calculer $(-2)^3$.",
          "reponse": "<p>$(-2)^3 = (-2) \\times (-2) \\times (-2) = -8$</p>"
        },
        {
          "question": "3) Résoudre les équations.",
          "reponse": "<ul><li><strong>a)</strong> $x + 7 = 12 \\Rightarrow x = 12 - 7 = 5$</li><li><strong>b)</strong> $x - 4 = -3 \\Rightarrow x = -3 + 4 = 1$</li><li><strong>c)</strong> $3x = 15 \\Rightarrow x = \\dfrac{15}{3} = 5$</li><li><strong>d)</strong> $-2x = 8 \\Rightarrow x = \\dfrac{8}{-2} = -4$</li></ul>"
        },
        {
          "question": "4) Résoudre le problème du père et du fils.",
          "reponse": "<p>Soit $x$ le nombre d'années cherché. Dans $x$ années, le père aura $42 + x$ ans et le fils aura $12 + x$ ans.</p><p>On veut que $42 + x = 2(12 + x) = 24 + 2x$.</p><p>Donc $42 - 24 = 2x - x \\Rightarrow 18 = x$.</p><p>Dans <strong>18 ans</strong>, le père aura le double de l'âge de son fils.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Géométrie - Distances et Médiatrice",
      "points": "3 pts",
      "enonce": "<div style='font-size:1.1em; line-height:1.6;'>\n  <p>1) Construis un segment $[AB]$ de longueur 6 cm. Construis la médiatrice de $[AB]$ à la règle graduée et à l'équerre. Justifie ta construction.</p>\n  <p>2) Soit $M$ un point de la médiatrice du segment $[AB]$.</p>\n  <p>Quelle relation y a-t-il entre les distances $MA$ et $MB$ ?</p>\n  <p>3) On donne $AB = 8$ cm. Un point $M$ est tel que $MA = 5$ cm et $MB = 5$ cm.</p>\n  <p>Que peut-on dire du point $M$ ?</p>\n</div>",
      "questions": [
        {
          "question": "1) Construire un segment [AB] de longueur 6 cm et sa médiatrice à la règle graduée et à l'équerre.",
          "reponse": "<p>Construction à la règle graduée et à l'équerre :</p><ul><li>Tracer le segment $[AB]$ de 6 cm.</li><li>Placer le milieu $I$ de $[AB]$ (à 3 cm de $A$).</li><li>Tracer la droite perpendiculaire à $(AB)$ passant par $I$ en utilisant l'équerre. Cette droite est la médiatrice.</li></ul><p>Justification : La médiatrice est la droite perpendiculaire au segment en son milieu.</p>"
        },
        {
          "question": "2) Relation entre les distances MA et MB pour M sur la médiatrice.",
          "reponse": "<p>Si $M$ est un point de la médiatrice de $[AB]$, alors $MA = MB$.</p><p>La médiatrice est l'ensemble des points équidistants des extrémités du segment.</p>"
        },
        {
          "question": "3) Conclusion pour le point M avec MA = 5 cm et MB = 5 cm.",
          "reponse": "<p>Si $MA = MB$, alors le point $M$ est équidistant de $A$ et $B$.</p><p>Donc $M$ est sur la médiatrice du segment $[AB]$.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 6 : Angles",
      "points": "3 pts",
      "enonce": "<div style='font-size:1.1em; line-height:1.6;'>\n  <p>1) Deux angles complémentaires : l'un mesure 35°. Quelle est la mesure de l'autre ?</p>\n  <p>2) Deux angles supplémentaires : l'un mesure 120°. Quelle est la mesure de l'autre ?</p>\n  <p>3) Sur la figure ci-contre, deux droites parallèles $(d)$ et $(d')$ sont coupées par une sécante $(s)$.</p>\n  <p>On sait que l'angle $\\widehat{A_1}$ mesure 50°.</p>\n  <p>Détermine la mesure des angles $\\widehat{A_2}$, $\\widehat{B_1}$ et $\\widehat{B_2}$ en justifiant.</p>\n</div>",
      "questions": [
        {
          "question": "1) Mesure de l'angle complémentaire.",
          "reponse": "<p>Deux angles sont complémentaires si leur somme est égale à $90^\\circ$.</p><p>L'angle complémentaire de $35^\\circ$ est $90 - 35 = 55^\\circ$.</p>"
        },
        {
          "question": "2) Mesure de l'angle supplémentaire.",
          "reponse": "<p>Deux angles sont supplémentaires si leur somme est égale à $180^\\circ$.</p><p>L'angle supplémentaire de $120^\\circ$ est $180 - 120 = 60^\\circ$.</p>"
        },
        {
          "question": "3) Déterminer les mesures des angles avec les droites parallèles.",
          "reponse": "<ul><li>Les angles $\\widehat{A_1}$ et $\\widehat{A_2}$ sont supplémentaires, donc $\\widehat{A_2} = 180 - 50 = 130^\\circ$.</li><li>Les angles $\\widehat{A_1}$ et $\\widehat{B_1}$ sont alternes-internes, donc $\\widehat{B_1} = 50^\\circ$.</li><li>Les angles $\\widehat{B_1}$ et $\\widehat{B_2}$ sont supplémentaires, donc $\\widehat{B_2} = 180 - 50 = 130^\\circ$.</li></ul>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
