<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }
    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }
    .content-card li:last-child {
        border-bottom: none;
    }
    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }
    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }
    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }
    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }
    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }
    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }
    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }
    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }
    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }
    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }
    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }
    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }
    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }
    /* Mode jour (par défaut) - ajouté par le script de thème */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>
<div class="app-container">
    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>
    <main class="slide-body" id="slideBody"></main>
    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>
        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Introduction",
    "contenu": "<div style='font-size: 1.2em; text-align: center; padding: 20px;'><p>Bienvenue en classe de Cinquième !</p><p>Aujourd'hui, nous allons découvrir un solide très important : le <strong>prisme droit</strong>.</p><p>Vous verrez qu'il est partout autour de nous : boîtes de céréales, immeubles, crayons, etc.</p><p>Nous apprendrons à le décrire, à le reconnaître et à calculer son aire et son volume.</p></div>",
    "texteParle": "Bonjour à tous ! Aujourd'hui, nous allons plonger dans le monde des solides avec une figure géométrique très présente dans notre quotidien : le prisme droit. Nous allons apprendre à le reconnaître, à le décrire et à calculer son aire et son volume. Ces compétences vous seront très utiles dans la vie de tous les jours. Alors, sortez vos cahiers et commençons !",
    "note": "Introduction à la leçon sur le prisme droit."
  },
  {
    "titre": "Objectifs de la leçon",
    "contenu": "<div style='font-size: 1.1em; padding: 15px; background-color: #f0f8ff; border-radius: 8px; border-left: 4px solid #2196F3;'><p style='margin: 5px 0; color: #000;'>À la fin de cette leçon, vous serez capables de :</p><ul style='list-style-type: none; padding: 0; color: #000;'><li style='margin: 10px 0;'><span style='background-color: #2196F3; color: white; border-radius: 50%; display: inline-block; width: 24px; height: 24px; text-align: center; line-height: 24px; margin-right: 10px;'>1</span>Décrire un prisme droit (faces, bases, arêtes, hauteur)</li><li style='margin: 10px 0;'><span style='background-color: #2196F3; color: white; border-radius: 50%; display: inline-block; width: 24px; height: 24px; text-align: center; line-height: 24px; margin-right: 10px;'>2</span>Reconnaître un prisme droit dans l'environnement</li><li style='margin: 10px 0;'><span style='background-color: #2196F3; color: white; border-radius: 50%; display: inline-block; width: 24px; height: 24px; text-align: center; line-height: 24px; margin-right: 10px;'>3</span>Réaliser le patron d'un prisme droit</li><li style='margin: 10px 0;'><span style='background-color: #2196F3; color: white; border-radius: 50%; display: inline-block; width: 24px; height: 24px; text-align: center; line-height: 24px; margin-right: 10px;'>4</span>Calculer l'aire latérale, l'aire totale et le volume d'un prisme droit</li></ul></div>",
    "texteParle": "Dans cette leçon, nous avons quatre objectifs. D'abord, nous allons apprendre à décrire un prisme droit en identifiant ses faces, ses bases, ses arêtes et sa hauteur. Ensuite, nous verrons comment le reconnaître dans notre environnement. Troisièmement, nous réaliserons son patron. Et enfin, nous apprendrons à calculer son aire latérale, son aire totale et son volume. Ces compétences sont essentielles pour la suite.",
    "note": "Les quatre objectifs de la leçon sont clairement énoncés."
  },
  {
    "titre": "Définition d'un prisme droit",
    "contenu": "<div style='padding: 15px;'><div style='background-color: #f5f5f5; border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 2px solid #4CAF50;'><p style='margin: 0; color: #000; font-weight: bold; text-align: center;'>Définition :</p><p style='margin: 10px 0 0 0; color: #000;'>Un <strong>prisme droit</strong> est un solide qui possède :</p><ul style='color: #000;'><li style='margin: 5px 0;'>Deux <strong>bases</strong> identiques et parallèles (polygones)</li><li style='margin: 5px 0;'>Des <strong>faces latérales</strong> rectangulaires</li><li style='margin: 5px 0;'>Des <strong>arêtes latérales</strong> perpendiculaires aux bases</li></ul></div><div style='background-color: #fff3cd; border-left: 4px solid #ffc107; padding: 10px; border-radius: 4px;'><p style='margin: 0; color: #000;'><span style='font-weight: bold;'>Exemple :</span> Un prisme droit à base triangulaire a des bases en forme de triangles et des faces latérales rectangulaires.</p></div></div>",
    "texteParle": "Commençons par la définition d'un prisme droit. Un prisme droit est un solide qui a deux bases identiques et parallèles qui sont des polygones. Ses faces latérales sont des rectangles. Les arêtes latérales sont perpendiculaires aux bases. Par exemple, un prisme droit à base triangulaire a des bases en forme de triangles et des faces latérales rectangulaires. C'est une définition simple mais importante.",
    "note": "Définition d'un prisme droit avec ses caractéristiques principales."
  },
  {
    "titre": "Éléments du prisme droit",
    "contenu": "<div style='padding: 15px;'><div style='background-color: #f5f5f5; border-radius: 8px; padding: 15px; margin-bottom: 15px;'><p style='margin: 0; color: #000; font-weight: bold; text-align: center;'>Les éléments d'un prisme droit :</p></div><div style='display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;'><div style='background-color: #e3f2fd; border-radius: 8px; padding: 10px; flex: 1 1 150px; text-align: center; border-left: 4px solid #2196F3;'><p style='margin: 0; color: #000; font-weight: bold;'>Bases</p><p style='margin: 5px 0 0 0; color: #000; font-size: 0.9em;'>Deux polygones identiques et parallèles</p></div><div style='background-color: #fff3e0; border-radius: 8px; padding: 10px; flex: 1 1 150px; text-align: center; border-left: 4px solid #FF9800;'><p style='margin: 0; color: #000; font-weight: bold;'>Faces latérales</p><p style='margin: 5px 0 0 0; color: #000; font-size: 0.9em;'>Des rectangles (autant que de côtés de la base)</p></div><div style='background-color: #f3e5f5; border-radius: 8px; padding: 10px; flex: 1 1 150px; text-align: center; border-left: 4px solid #9C27B0;'><p style='margin: 0; color: #000; font-weight: bold;'>Arêtes latérales</p><p style='margin: 5px 0 0 0; color: #000; font-size: 0.9em;'>Segments perpendiculaires aux bases</p></div><div style='background-color: #fce4ec; border-radius: 8px; padding: 10px; flex: 1 1 150px; text-align: center; border-left: 4px solid #E91E63;'><p style='margin: 0; color: #000; font-weight: bold;'>Hauteur</p><p style='margin: 5px 0 0 0; color: #000; font-size: 0.9em;'>Distance entre les deux bases</p></div></div></div>",
    "texteParle": "Un prisme droit possède plusieurs éléments qu'il faut bien connaître. Il y a les bases, qui sont deux polygones identiques et parallèles. Les faces latérales, qui sont des rectangles. Le nombre de faces latérales est égal au nombre de côtés de la base. Il y a aussi les arêtes latérales, qui sont perpendiculaires aux bases. Et enfin, la hauteur, qui est la distance entre les deux bases. Tous ces éléments sont importants pour décrire un prisme droit.",
    "note": "Présentation des différents éléments d'un prisme droit."
  },
  {
    "titre": "Reconnaître un prisme droit",
    "contenu": "<div style='padding: 15px;'><div style='background-color: #f5f5f5; border-radius: 8px; padding: 15px; margin-bottom: 15px;'><p style='margin: 0; color: #000; font-weight: bold; text-align: center;'>Comment reconnaître un prisme droit ?</p></div><div style='display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;'><div style='background-color: #e8f5e9; border-radius: 8px; padding: 15px; flex: 1 1 200px; border: 2px solid #4CAF50;'><p style='margin: 0; color: #000; font-weight: bold;'>Un prisme droit a :</p><ul style='color: #000;'><li style='margin: 5px 0;'>2 bases identiques</li><li style='margin: 5px 0;'>Des faces latérales rectangulaires</li><li style='margin: 5px 0;'>Des arêtes latérales perpendiculaires aux bases</li></ul></div><div style='background-color: #ffebee; border-radius: 8px; padding: 15px; flex: 1 1 200px; border: 2px solid #d32f2f;'><p style='margin: 0; color: #000; font-weight: bold;'>Ce n'est pas un prisme droit :</p><ul style='color: #000;'><li style='margin: 5px 0;'>Si les faces latérales ne sont pas des rectangles</li><li style='margin: 5px 0;'>Si les arêtes latérales ne sont pas perpendiculaires aux bases</li><li style='margin: 5px 0;'>Si les bases ne sont pas identiques</li></ul></div></div></div>",
    "texteParle": "Pour reconnaître un prisme droit, il faut vérifier plusieurs choses. Un prisme droit a deux bases identiques, des faces latérales rectangulaires, et des arêtes latérales perpendiculaires aux bases. Si une de ces conditions n'est pas remplie, ce n'est pas un prisme droit. Par exemple, un prisme oblique a des arêtes latérales qui ne sont pas perpendiculaires aux bases. C'est important de bien faire la différence.",
    "note": "Critères pour reconnaître un prisme droit."
  },
  {
    "titre": "Exemples dans l'environnement",
    "contenu": "<div style='padding: 15px;'><div style='background-color: #f5f5f5; border-radius: 8px; padding: 15px; margin-bottom: 15px;'><p style='margin: 0; color: #000; font-weight: bold; text-align: center;'>Où trouve-t-on des prismes droits ?</p></div><div style='display: flex; flex-wrap: wrap; gap: 15px; justify-content: center;'><div style='background-color: #e3f2fd; border-radius: 8px; padding: 15px; flex: 1 1 150px; text-align: center;'><p style='margin: 0; color: #000; font-weight: bold;'>Brique</p><p style='margin: 5px 0 0 0; color: #000; font-size: 0.9em;'>Prisme droit à base rectangulaire</p></div><div style='background-color: #fff3e0; border-radius: 8px; padding: 15px; flex: 1 1 150px; text-align: center;'><p style='margin: 0; color: #000; font-weight: bold;'>Boîte de céréales</p><p style='margin: 5px 0 0 0; color: #000; font-size: 0.9em;'>Prisme droit à base rectangulaire</p></div><div style='background-color: #f3e5f5; border-radius: 8px; padding: 15px; flex: 1 1 150px; text-align: center;'><p style='margin: 0; color: #000; font-weight: bold;'>Crayon</p><p style='margin: 5px 0 0 0; color: #000; font-size: 0.9em;'>Prisme droit à base hexagonale</p></div><div style='background-color: #fce4ec; border-radius: 8px; padding: 15px; flex: 1 1 150px; text-align: center;'><p style='margin: 0; color: #000; font-weight: bold;'>Immeuble</p><p style='margin: 5px 0 0 0; color: #000; font-size: 0.9em;'>Souvent un prisme droit</p></div></div></div>",
    "texteParle": "Les prismes droits sont partout autour de nous ! Une brique est un prisme droit à base rectangulaire. Une boîte de céréales aussi. Un crayon est un prisme droit à base hexagonale. Et les immeubles sont souvent des prismes droits. En reconnaissant ces formes dans notre environnement, on comprend mieux pourquoi cette notion est si importante en mathématiques et dans la vie quotidienne.",
    "note": "Exemples de prismes droits dans l'environnement quotidien."

  {
    "titre": "Patron d'un prisme droit",
    "contenu": "<div style='padding: 15px;'><div style='background-color: #f5f5f5; border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 2px solid #2196F3;'><p style='margin: 0; color: #000; font-weight: bold; text-align: center;'>Le patron d'un prisme droit :</p><p style='margin: 10px 0 0 0; color: #000;'>Un <strong>patron</strong> est un dessin en deux dimensions qui permet de construire un solide en trois dimensions.</p><p style='margin: 10px 0 0 0; color: #000;'>Pour un prisme droit, le patron est composé des deux bases et des faces latérales.</p></div><div style='background-color: #e8f5e9; border-radius: 4px; padding: 10px; border-left: 4px solid #4CAF50; margin: 10px 0;'><p style='margin: 0; color: #000;'><span style='font-weight: bold;'>Exemple :</span> Patron d'un prisme droit à base triangulaire</p><p style='margin: 5px 0 0 10px; color: #000;'>2 triangles (les bases) + 3 rectangles (les faces latérales)</p></div><div style='background-color: #fff3cd; border-left: 4px solid #ffc107; padding: 10px; border-radius: 4px;'><p style='margin: 0; color: #000;'><span style='font-weight: bold;'>Astuce :</span> La longueur des rectangles est égale au périmètre de la base.</p></div></div>",
    "texteParle": "Passons maintenant au patron d'un prisme droit. Un patron est un dessin en deux dimensions qui permet de construire un solide. Pour un prisme droit, le patron est composé des deux bases et des faces latérales. Par exemple, le patron d'un prisme droit à base triangulaire est formé de deux triangles et de trois rectangles. La longueur des rectangles est égale au périmètre de la base. C'est une astuce importante pour réaliser un patron correctement.",
    "note": "Explication du patron d'un prisme droit avec un exemple."

  {
    "titre": "Aire latérale d'un prisme droit",
    "contenu": "<div style='padding: 15px;'><div style='background-color: #f5f5f5; border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 2px solid #FF9800;'><p style='margin: 0; color: #000; font-weight: bold; text-align: center;'>Aire latérale :</p><p style='margin: 10px 0 0 0; color: #000;'>L'<strong>aire latérale</strong> d'un prisme droit est la somme des aires des faces latérales.</p><p style='margin: 10px 0 0 0; color: #000;'>Elle est égale au <strong>périmètre de la base</strong> multiplié par la <strong>hauteur</strong>.</p><div style='background-color: #fff3e0; padding: 10px; border-radius: 4px; margin: 10px 0; text-align: center;'><p style='margin: 0; color: #000; font-size: 1.3em;'>\\( A_L = P_{base} \\times h \\)</p></div></div><div style='background-color: #e8f5e9; border-radius: 4px; padding: 10px; border-left: 4px solid #4CAF50; margin: 10px 0;'><p style='margin: 0; color: #000;'><span style='font-weight: bold;'>Exemple :</span> Un prisme droit à base carrée de côté 4 cm et de hauteur 10 cm.</p><p style='margin: 5px 0 0 10px; color: #000;'>Périmètre de la base = 4 × 4 = 16 cm</p><p style='margin: 5px 0 0 10px; color: #000;'>Aire latérale = 16 × 10 = 160 cm²</p></div></div>",
    "texteParle": "Passons au calcul de l'aire latérale d'un prisme droit. L'aire latérale est la somme des aires de toutes les faces latérales. Pour la calculer, on utilise une formule simple : le périmètre de la base multiplié par la hauteur. Par exemple, pour un prisme droit à base carrée de côté 4 cm et de hauteur 10 cm, le périmètre de la base est de 16 cm, et l'aire latérale est de 160 cm². Cette formule est très pratique.",
    "note": "Formule de l'aire latérale d'un prisme droit avec un exemple."
  },
  {
    "titre": "Aire totale d'un prisme droit",
    "contenu": "<div style='padding: 15px;'><div style='background-color: #f5f5f5; border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 2px solid #9C27B0;'><p style='margin: 0; color: #000; font-weight: bold; text-align: center;'>Aire totale :</p><p style='margin: 10px 0 0 0; color: #000;'>L'<strong>aire totale</strong> d'un prisme droit est la somme de l'aire latérale et des aires des deux bases.</p><div style='background-color: #f3e5f5; padding: 10px; border-radius: 4px; margin: 10px 0; text-align: center;'><p style='margin: 0; color: #000; font-size: 1.3em;'>\\( A_T = A_L + 2 \\times A_{base} \\)</p></div></div><div style='background-color: #e8f5e9; border-radius: 4px; padding: 10px; border-left: 4px solid #4CAF50; margin: 10px 0;'><p style='margin: 0; color: #000;'><span style='font-weight: bold;'>Exemple :</span> Un prisme droit à base carrée de côté 4 cm et de hauteur 10 cm.</p><p style='margin: 5px 0 0 10px; color: #000;'>Aire latérale = 160 cm²</p><p style='margin: 5px 0 0 10px; color: #000;'>Aire de la base = 4 × 4 = 16 cm²</p><p style='margin: 5px 0 0 10px; color: #000;'>Aire totale = 160 + 2 × 16 = 160 + 32 = 192 cm²</p></div></div>",
    "texteParle": "L'aire totale d'un prisme droit est la somme de l'aire latérale et des aires des deux bases. La formule est donc : Aire totale = Aire latérale + 2 × Aire de la base. Reprenons l'exemple précédent : avec une base carrée de côté 4 cm et une hauteur de 10 cm, l'aire latérale est de 160 cm² et l'aire de la base est de 16 cm². L'aire totale est donc de 160 + 2 × 16 = 192 cm². C'est important de ne pas oublier les deux bases.",
    "note": "Formule de l'aire totale d'un prisme droit avec un exemple."
  },
  {
    "titre": "Volume d'un prisme droit",
    "contenu": "<div style='padding: 15px;'><div style='background-color: #f5f5f5; border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 2px solid #d32f2f;'><p style='margin: 0; color: #000; font-weight: bold; text-align: center;'>Volume d'un prisme droit :</p><p style='margin: 10px 0 0 0; color: #000;'>Le <strong>volume</strong> d'un prisme droit est égal à l'aire de la base multipliée par la hauteur.</p><div style='background-color: #ffebee; padding: 10px; border-radius: 4px; margin: 10px 0; text-align: center;'><p style='margin: 0; color: #000; font-size: 1.3em;'>\\( V = A_{base} \\times h \\)</p></div></div><div style='background-color: #e8f5e9; border-radius: 4px; padding: 10px; border-left: 4px solid #4CAF50; margin: 10px 0;'><p style='margin: 0; color: #000;'><span style='font-weight: bold;'>Exemple :</span> Un prisme droit à base carrée de côté 4 cm et de hauteur 10 cm.</p><p style='margin: 5px 0 0 10px; color: #000;'>Aire de la base = 4 × 4 = 16 cm²</p><p style='margin: 5px 0 0 10px; color: #000;'>Volume = 16 × 10 = 160 cm³</p></div><div style='background-color: #fff3cd; border-left: 4px solid #ffc107; padding: 10px; border-radius: 4px; margin-top: 10px;'><p style='margin: 0; color: #000;'><span style='font-weight: bold;'>Attention :</span> L'unité de volume est le centimètre cube (cm³) ou le mètre cube (m³).</p></div></div>",
    "texteParle": "Enfin, le volume d'un prisme droit. Le volume est égal à l'aire de la base multipliée par la hauteur. C'est une formule très simple à retenir. Reprenons notre exemple avec le prisme à base carrée de côté 4 cm et de hauteur 10 cm. L'aire de la base est de 16 cm², et le volume est de 16 × 10 = 160 cm³. N'oubliez pas les unités : le volume s'exprime en unités cubiques.",
    "note": "Formule du volume d'un prisme droit avec un exemple."
  },
  {
    "titre": "Problème concret",
    "contenu": "<div style='padding: 15px;'><div style='background-color: #f5f5f5; border-radius: 8px; padding: 15px; margin-bottom: 15px;'><p style='margin: 0; color: #000; font-weight: bold; text-align: center;'>Problème :</p><p style='margin: 10px 0; color: #000;'>Un réservoir d'eau a la forme d'un prisme droit à base rectangulaire. La base mesure 2 m sur 1,5 m et la hauteur est de 1,2 m.</p><p style='margin: 10px 0; color: #000;'>Quelle est la capacité du réservoir en litres ?</p></div><div style='background-color: #e8f5e9; border-radius: 4px; padding: 10px; border-left: 4px solid #4CAF50;'><p style='margin: 0; color: #000;'><span style='font-weight: bold;'>Solution :</span></p><p style='margin: 5px 0 0 10px; color: #000;'>Aire de la base = 2 × 1,5 = 3 m²</p><p style='margin: 5px 0 0 10px; color: #000;'>Volume = 3 × 1,2 = 3,6 m³</p><p style='margin: 5px 0 0 10px; color: #000;'>1 m³ = 1000 L, donc 3,6 m³ = 3600 L</p><p style='margin: 5px 0 0 10px; color: #000;'>Le réservoir peut contenir 3600 litres d'eau.</p></div></div>",
    "texteParle": "Voyons maintenant un problème concret. Un réservoir d'eau a la forme d'un prisme droit à base rectangulaire. La base mesure 2 m sur 1,5 m et la hauteur est de 1,2 m. Pour calculer la capacité du réservoir, on commence par calculer l'aire de la base : 2 × 1,5 = 3 m². Ensuite, on multiplie par la hauteur : 3 × 1,2 = 3,6 m³. Comme 1 m³ correspond à 1000 litres, le réservoir peut contenir 3600 litres d'eau. C'est une application pratique de ce que nous avons appris.",
    "note": "Problème concret utilisant le calcul du volume d'un prisme droit."
  },
  {
    "titre": "Exercices d'application",
    "contenu": "<div style='padding: 15px; background-color: #f5f5f5; border-radius: 8px;'><p style='color: #000; font-weight: bold; text-align: center;'>À vous de jouer !</p><div style='background-color: white; border-radius: 8px; padding: 15px; margin: 10px 0;'><p style='color: #000;'><strong>Exercice 1 :</strong> Un prisme droit a une base triangulaire de côtés 3 cm, 4 cm et 5 cm. La hauteur du prisme est de 8 cm. Calculer son aire latérale.</p><p style='color: #000;'><strong>Exercice 2 :</strong> Un prisme droit à base carrée de côté 5 cm a une aire totale de 250 cm². Quelle est sa hauteur ?</p><p style='color: #000;'><strong>Exercice 3 :</strong> Un prisme droit a une base rectangulaire de 6 cm sur 4 cm et une hauteur de 10 cm. Calculer son volume.</p></div><div style='background-color: #e8f5e9; border-radius: 4px; padding: 10px; border-left: 4px solid #4CAF51;'><p style='margin: 0; color: #000;'><span style='font-weight: bold;'>Solutions :</span></p><p style='margin: 5px 0 0 10px; color: #000;'>1. Périmètre de la base = 3 + 4 + 5 = 12 cm. Aire latérale = 12 × 8 = 96 cm².</p><p style='margin: 5px 0 0 10px; color: #000;'>2. Aire de la base = 5 × 5 = 25 cm². Aire latérale = 250 - 2 × 25 = 200 cm². Périmètre de la base = 4 × 5 = 20 cm. Hauteur = 200 ÷ 20 = 10 cm.</p><p style='margin: 5px 0 0 10px; color: #000;'>3. Aire de la base = 6 × 4 = 24 cm². Volume = 24 × 10 = 240 cm³.</p></div></div>",
    "texteParle": "Pour terminer, je vous propose trois exercices pour vous entraîner. Le premier est un calcul d'aire latérale avec une base triangulaire. Le deuxième est un problème où on cherche la hauteur à partir de l'aire totale. Le troisième est un calcul de volume simple. Prenez le temps de les résoudre par vous-même, puis vérifiez vos réponses avec les solutions données. Ces exercices vous aideront à maîtriser les concepts de la leçon.",
    "note": "Exercices d'application avec solutions pour s'entraîner."

  {

    "contenu": "<div style='font-size: 1.2em; text-align: center; padding: 20px;'><p>Félicitations ! Vous avez terminé cette leçon sur le prisme droit.</p><p>N'oubliez pas les points clés :</p><ul style='list-style-type: none; padding: 0; display: inline-block; text-align: left;'><li style='margin: 10px 0;'>✅ Un prisme droit a 2 bases identiques et des faces latérales rectangulaires</li><li style='margin: 10px 0;'>✅ Aire latérale = Périmètre de la base × Hauteur</li><li style='margin: 10px 0;'>✅ Aire totale = Aire latérale + 2 × Aire de la base</li><li style='margin: 10px 0;'>✅ Volume = Aire de la base × Hauteur</li></ul><p>Continuez à vous entraîner pour maîtriser ces compétences essentielles !</p></div>",
    "texteParle": "Nous arrivons à la fin de ce cours. Vous avez appris à décrire un prisme droit, à le reconnaître, à réaliser son patron, et à calculer son aire latérale, son aire totale et son volume. N'oubliez pas les formules essentielles : l'aire latérale est le périmètre de la base multiplié par la hauteur, l'aire totale est l'aire latérale plus deux fois l'aire de la base, et le volume est l'aire de la base multipliée par la hauteur. Continuez à vous entraîner et à bientôt !",

    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;
    const total = slides.length;
    const synth = window.speechSynthesis;
    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }
    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }
    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        loadingCancelled = false;
        isLoading = true;
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }
    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }
    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }
    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }
    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }
    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }
    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);
        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }
    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }
            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }
            // Arrêter toute lecture en cours
            stopSpeaking();
            // Réinitialiser l'état de pause
            isPaused = false;
            showLoading();
            setStatus("Initialisation...", 'loading');
            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                let isFinished = false;
                let errorHandled = false;
                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };
                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };
                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    resolve();
                };
                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }
                currentUtterance = utterance;
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }
            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }
    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        // Arrêter complètement la lecture
        stopSpeaking();
        await new Promise(r => setTimeout(r, 50));
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }
        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');
        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }
    async function goToNext() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }
    async function goToPrev() {
        if (isTransitioning) return;
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }
    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }
        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }
        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }
        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }
        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }
    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }
        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }
        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');
        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });
        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });
        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });
        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });
        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });
        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });
        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }
    init();
});
    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;
    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');
        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            if (header) header.style.background = 'rgba(15, 23, 42, 0.85)';
            if (footer) footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            if (appContainer) appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            if (header) header.style.background = 'rgba(255, 255, 255, 0.85)';
            if (footer) footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }
    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;
        body.style.background = '#f0f4f8';
        body.style.color = '#1a202c';
        const appContainer = document.querySelector('.app-container');
        if (appContainer) {
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
        }
        const header = document.querySelector('.slide-header');
        if (header) {
            header.style.background = 'rgba(255, 255, 255, 0.85)';
        }
        const footer = document.querySelector('.slide-footer');
        if (footer) {
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
        }
        document.querySelectorAll('.content-card').forEach(card => {
            card.style.background = 'rgba(255,255,255,0.8)';
            card.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.note-box').forEach(note => {
            note.style.background = 'rgba(96, 165, 250, 0.12)';
            note.style.color = '#2c3e50';
        });
        document.querySelectorAll('.math-block').forEach(block => {
            block.style.background = 'rgba(0,0,0,0.05)';
            block.style.borderColor = 'rgba(0,0,0,0.08)';
        });
        document.querySelectorAll('.btn').forEach(btn => {
            btn.style.color = '#2d3748';
        });
        const statusBadge = document.querySelector('.status-badge');
        if (statusBadge) {
            statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
            statusBadge.style.color = '#2b6cb0';
        }
        const slideCounter = document.querySelector('.slide-counter');
        if (slideCounter) {
            slideCounter.style.color = '#4a5568';
        }
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {
            autoIndicator.style.color = '#718096';
        }
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {
                el.style.color = '#2d3748';
            }
        });
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
            // Ajouter l'écouteur d'événement click
            themeBtn.addEventListener('click', toggleTheme);
        }
    });
</script>
