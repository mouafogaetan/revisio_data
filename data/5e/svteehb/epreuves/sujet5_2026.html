<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "SVTEEHB (Sciences de la Vie, de la Terre, Éducation à l'Environnement, Hygiène et Biologie)",
 "classe": "Cinquième",
 "sequence": "Séquence 5",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Lecture et exploitation des inscriptions sur les produits de consommation",
     "points": "4 pts",
     "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px; background-color: #f8f9fa; color: #212529; border-radius: 8px;'><p>Voici un extrait de l'étiquette d'un produit alimentaire :</p><div style='background-color: #e9ecef; padding: 12px; border-radius: 5px; color: #212529; margin: 10px 0;'><p style='margin: 0;'><strong>Biscuits au chocolat</strong></p><p style='margin: 5px 0;'>Ingrédients : farine de blé, sucre, huile de palme, cacao en poudre, lait écrémé, sel, arôme vanille.</p><p style='margin: 5px 0;'>Valeurs nutritionnelles moyennes (pour 100g) : énergie 450 kcal, protides 7g, glucides 62g, lipides 18g.</p><p style='margin: 5px 0;'>À conserver dans un endroit frais et sec. DLC : 31/12/2025.</p></div><p>Questions :</p></div>",
     "questions": [
       {
         "question": "<p> Que signifie l'abréviation DLC ? (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> DLC signifie <strong>Date Limite de Consommation</strong>. C'est la date jusqu'à laquelle le produit conserve ses qualités nutritionnelles et gustatives. Au-delà, il peut présenter un danger pour la santé.</p>"
       },
       {
         "question": "<p> Citer deux ingrédients présents dans ces biscuits. (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> Parmi les ingrédients, on trouve : <strong>la farine de blé</strong>, <strong>le sucre</strong>, <strong>l'huile de palme</strong>, <strong>le cacao en poudre</strong>, le lait écrémé, le sel, l'arôme vanille. (Deux réponses suffisent)</p>"
       },
       {
         "question": "<p> Pour 100g de biscuits, quelle est la quantité de glucides ? (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> Pour 100g de biscuits, la quantité de glucides est de <strong>62 g</strong>.</p>"
       },
       {
         "question": "<p> Pourquoi est-il important de respecter les conditions de conservation indiquées sur l'emballage ? (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> Il est important de respecter les conditions de conservation pour <strong>éviter la détérioration du produit</strong> (moisissures, rancissement) et <strong>prévenir les intoxications alimentaires</strong>.</p>"
       }
     ]
   },
   {
     "titre": "Maladies nutritionnelles par carence et par excès",
     "points": "5 pts",
     "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px; background-color: #f8f9fa; color: #212529; border-radius: 8px;'><p>Dans certaines régions du Cameroun, on observe des cas de malnutrition chez les enfants. Certains présentent un ventre gonflé, une peau sèche et des cheveux décolorés, tandis que d'autres ont des jambes arquées et des douleurs osseuses. Par ailleurs, dans les grandes villes, on note une augmentation des cas de diabète et d'obésité.</p></div>",
     "questions": [
       {
         "question": "<p> Définir une maladie nutritionnelle. (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> Une maladie nutritionnelle est une maladie causée par un <strong>déséquilibre alimentaire</strong>, qu'il s'agisse d'une carence (manque) ou d'un excès de certains nutriments.</p>"
       },
       {
         "question": "<p> Identifier la maladie dont souffrent les enfants présentant un ventre gonflé, une peau sèche et des cheveux décolorés. (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> Ces symptômes sont caractéristiques du <strong>kwashiorkor</strong>, une maladie due à une <strong>carence en protides</strong>.</p>"
       },
       {
         "question": "<p> Identifier la maladie dont souffrent les enfants ayant les jambes arquées et des douleurs osseuses. (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> Ces symptômes sont caractéristiques du <strong>rachitisme</strong>, une maladie due à une <strong>carence en vitamine D</strong> et en calcium.</p>"
       },
       {
         "question": "<p> Citer deux maladies par excès alimentaire. (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> Deux maladies par excès alimentaire sont : <strong>l'obésité</strong> et <strong>le diabète de type 2</strong> (ou maladies cardio-vasculaires).</p>"
       },
       {
         "question": "<p> Proposer deux moyens de lutte contre les carences alimentaires. (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> Pour lutter contre les carences alimentaires, on peut : (1) <strong>diversifier l'alimentation</strong> en consommant des aliments variés (fruits, légumes, protides) ; (2) <strong>enrichir les aliments</strong> en micronutriments (ex: farine enrichie en fer et vitamines).</p>"
       }
     ]
   },
   {
     "titre": "MST et VIH/SIDA",
     "points": "5 pts",
     "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px; background-color: #f8f9fa; color: #212529; border-radius: 8px;'><p>Dans le cadre de la lutte contre le SIDA, une campagne de sensibilisation est organisée dans ton établissement. On te demande d'expliquer à tes camarades les bases de la prévention du VIH/SIDA.</p></div>",
     "questions": [
       {
         "question": "<p> Donner la signification des acronymes VIH et SIDA. (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> VIH signifie <strong>Virus de l'Immunodéficience Humaine</strong>. SIDA signifie <strong>Syndrome de l'Immunodéficience Acquise</strong>.</p>"
       },
       {
         "question": "<p> Citer les trois voies de transmission du VIH. (1,5 pts)</p>",
         "reponse": "<p><strong>Réponse :</strong> Les trois voies de transmission du VIH sont : (1) la <strong>voie sexuelle</strong> (rapports non protégés) ; (2) la <strong>voie sanguine</strong> (transfusion de sang contaminé, partage d'aiguilles) ; (3) la <strong>voie materno-fœtale</strong> (de la mère à l'enfant pendant la grossesse, l'accouchement ou l'allaitement).</p>"
       },
       {
         "question": "<p> Quelle est la différence entre un séropositif et un sidéen ? (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> Un <strong>séropositif</strong> est une personne infectée par le VIH, porteuse du virus mais qui peut ne présenter aucun symptôme pendant des années. Un <strong>sidéen</strong> est une personne dont le système immunitaire est gravement affaibli par le VIH et qui manifeste des <strong>maladies opportunistes</strong>.</p>"
       },
       {
         "question": "<p> Citer deux moyens de prévention contre le VIH/SIDA. (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> Deux moyens de prévention sont : (1) l'utilisation du <strong>préservatif</strong> lors des rapports sexuels ; (2) le <strong>dépistage volontaire</strong> pour connaître son statut sérologique.</p>"
       },
       {
         "question": "<p> Citer une MST autre que le SIDA. (0,5 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> Une MST autre que le SIDA est : la <strong>syphilis</strong>, la <strong>gonococcie</strong>, la <strong>chlamydiose</strong>, l'<strong>herpès génital</strong>, etc. (Une seule réponse suffit).</p>"
       }
     ]
   },
   {
     "titre": "Organisation d'un voyage : vitesse et orientation",
     "points": "6 pts",
     "enonce": "<div style='font-family: Arial, sans-serif; padding: 10px; background-color: #f8f9fa; color: #212529; border-radius: 8px;'><p>Pour préparer un voyage de Douala à Yaoundé, tu dois estimer le temps de trajet et t'orienter correctement.</p><p><strong>Données :</strong> Distance Douala - Yaoundé = 200 km. Un bus roule à une vitesse moyenne de 80 km/h.</p></div>",
     "questions": [
       {
         "question": "<p> Définir la vitesse moyenne. (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> La vitesse moyenne est le rapport de la distance parcourue par la durée du trajet. Elle s'exprime par la formule : <strong>Vm = d/t</strong> (où Vm est en km/h, d en km, t en h).</p>"
       },
       {
         "question": "<p> Calculer la durée du trajet en heures, puis en heures et minutes. (1,5 pts)</p>",
         "reponse": "<p><strong>Réponse :</strong> t = d/Vm = 200 / 80 = <strong>2,5 heures</strong>. 2,5 h = <strong>2 heures et 30 minutes</strong>.</p>"
       },
       {
         "question": "<p> Si le bus part à 7h00, à quelle heure arrivera-t-il à Yaoundé ? (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> Départ à 7h00 + 2h30 = <strong>9h30</strong>.</p>"
       },
       {
         "question": "<p> Qu'est-ce qu'une boussole et à quoi sert-elle ? (1,5 pts)</p>",
         "reponse": "<p><strong>Réponse :</strong> Une boussole est un instrument d'orientation qui comporte une <strong>aiguille aimantée</strong>. Elle sert à indiquer la direction du <strong>Nord magnétique</strong>, ce qui permet de s'orienter sur le terrain.</p>"
       },
       {
         "question": "<p> Citer un autre moyen d'orientation. (1 pt)</p>",
         "reponse": "<p><strong>Réponse :</strong> Un autre moyen d'orientation est la <strong>carte routière</strong> (ou carte géographique) qui permet de se repérer en utilisant les routes, les villes et les points de repère.</p>"
       }
     ]
   }
 ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
