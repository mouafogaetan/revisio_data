<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],

            },

            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"

    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "SVTEEHB",
  "classe": "Cinquième",
  "sequence": "Séquence 6",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Alimentation équilibrée et besoins nutritionnels",
      "points": "7 pts",
      "enonce": "<p>La sant\u00e9 de l'organisme d\u00e9pend en grande partie d'une alimentation \u00e9quilibr\u00e9e. Les aliments sont compos\u00e9s de diff\u00e9rents nutriments qui jouent des r\u00f4les sp\u00e9cifiques dans notre corps.</p>",
      "questions": [
        {
          "question": "<p> Cite les cinq groupes d'aliments simples et donne un exemple pour chacun.</p>",
          "reponse": "<p>Les cinq groupes d'aliments simples sont :</p><ul><li><b>Les glucides</b> (sucres) : exemple, le riz, le pain, les p\u00e2tes.</li><li><b>Les lipides</b> (mati\u00e8res grasses) : exemple, l'huile, le beurre, l'avocat.</li><li><b>Les protides</b> (prot\u00e9ines) : exemple, la viande, le poisson, les \u0153ufs, les haricots.</li><li><b>Les vitamines</b> : exemple, les fruits et les l\u00e9gumes (vitamine C dans l'orange).</li><li><b>Les sels min\u00e9raux et l'eau</b> : exemple, l'eau de boisson, le sel de table, le calcium dans le lait.</li></ul>"
        },
        {
          "question": "<p> Classe les aliments suivants selon leur r\u00f4le : \u00e9nerg\u00e9tique, plastique ou fonctionnel. <i>Huile de palme - Poisson - Orange - Riz - Lait - Sel de table</i></p>",
          "reponse": "<p><b>R\u00f4le \u00e9nerg\u00e9tique :</b> les aliments qui fournissent de l'\u00e9nergie : <b>huile de palme</b> (lipides) et <b>riz</b> (glucides).</p><p><b>R\u00f4le plastique :</b> les aliments qui participent \u00e0 la construction et au renouvellement des tissus : <b>poisson</b> (protides) et <b>lait</b> (protides, sels min\u00e9raux).</p><p><b>R\u00f4le fonctionnel :</b> les aliments qui r\u00e9gulent les fonctions de l'organisme : <b>orange</b> (vitamines) et <b>sel de table</b> (sels min\u00e9raux).</p>"
        },
        {
          "question": "<p> D\u00e9finis la ration alimentaire et cite les qualit\u00e9s d'une bonne ration alimentaire.</p>",
          "reponse": "<p>La <b>ration alimentaire</b> est la quantit\u00e9 et la qualit\u00e9 d'aliments n\u00e9cessaires par jour pour couvrir les besoins de l'organisme.</p><p>Les qualit\u00e9s d'une bonne ration alimentaire sont :</p><ul><li><b>Vari\u00e9e</b> : pour apporter tous les nutriments n\u00e9cessaires.</li><li><b>\u00c9quilibr\u00e9e</b> : avec une bonne proportion de chaque nutriment.</li><li><b>Suffisante</b> : en quantit\u00e9 pour couvrir les besoins \u00e9nerg\u00e9tiques.</li><li><b>R\u00e9guli\u00e8re</b> : prise \u00e0 des heures fixes pour faciliter la digestion.</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Maladies nutritionnelles, carences et excès",
      "points": "6 pts",
      "enonce": "<p>Les d\u00e9s\u00e9quilibres alimentaires peuvent entra\u00eener des maladies par carence ou par exc\u00e8s. Ces pathologies sont fr\u00e9quentes au Cameroun, notamment chez les enfants et les personnes \u00e2g\u00e9es.</p>",
      "questions": [
        {
          "question": "<p> D\u00e9finis une maladie par carence et une maladie par exc\u00e8s en donnant un exemple pour chacune.</p>",
          "reponse": "<p>Une <b>maladie par carence</b> est une maladie caus\u00e9e par le manque d'un nutriment essentiel dans l'alimentation.</p><p>Exemple : le <b>kwashiorkor</b> est une maladie par carence en protides [citation:10].</p><p>Une <b>maladie par exc\u00e8s</b> est une maladie caus\u00e9e par une consommation excessive d'un nutriment.</p><p>Exemple : l'<b>ob\u00e9sit\u00e9</b> est une maladie par exc\u00e8s de lipides et de glucides.</p>"
        },
        {
          "question": "<p> Cite trois maladies par carence et pr\u00e9cise le nutriment qui manque pour chacune.</p>",
          "reponse": "<p>Les maladies par carence sont :</p><ul><li><b>Le rachitisme</b> : d\u00fb \u00e0 une carence en vitamine D ou en calcium.</li><li><b>Le scorbut</b> : d\u00fb \u00e0 une carence en vitamine C.</li><li><b>Le goitre</b> : d\u00fb \u00e0 une carence en iode.</li></ul><p>D'autres maladies par carence existent : la pellagre (carence en vitamine PP), le b\u00e9ri-b\u00e9ri (carence en vitamine B1), et le marasme (carence globale en \u00e9nergie et protides).</p>"
        },
        {
          "question": "<p> Pour lutter contre les carences alimentaires, propose trois actions concr\u00e8tes applicables dans une famille camerounaise.</p>",
          "reponse": "<p>Pour lutter contre les carences alimentaires, on peut :</p><ul><li><b>Diversifier l'alimentation</b> en consommant des fruits, des l\u00e9gumes, de la viande, du poisson et des c\u00e9r\u00e9ales \u00e0 chaque repas.</li><li><b>Utiliser des aliments locaux riches en nutriments</b> comme les l\u00e9gumineuses (haricots, pois) pour les protides, les feuilles vertes pour le fer et les vitamines.</li><li><b>Promouvoir l'hygi\u00e8ne alimentaire</b> en lavant les aliments et en les conservant correctement pour \u00e9viter les pertes de nutriments [citation:10].</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Intoxications alimentaires et conservation des aliments",
      "points": "7 pts",
      "enonce": "<p>Au Cameroun, les intoxications alimentaires sont fr\u00e9quentes et souvent dues \u00e0 une mauvaise conservation des aliments ou \u00e0 une hygi\u00e8ne d\u00e9faillante. Il est important de conna\u00eetre les bonnes pratiques pour \u00e9viter ces accidents.</p>",
      "questions": [
        {
          "question": "<p> D\u00e9finis une intoxication alimentaire et cite trois types d'intoxications avec leur cause.</p>",
          "reponse": "<p>Une <b>intoxication alimentaire</b> est une maladie provoqu\u00e9e par l'ingestion d'aliments contamin\u00e9s par des micro-organismes, des toxines ou des substances chimiques.</p><p>Les types d'intoxications sont :</p><ul><li><b>La salmonellose</b> : due \u00e0 la bact\u00e9rie Salmonella, pr\u00e9sente dans les \u0153ufs et la volaille mal cuits.</li><li><b>Le botulisme</b> : due \u00e0 la toxine de la bact\u00e9rie Clostridium botulinum, pr\u00e9sente dans les conserves mal st\u00e9rilis\u00e9es.</li><li><b>L'empoisonnement</b> : d\u00fb \u00e0 la pr\u00e9sence de substances toxiques (pesticides, m\u00e9taux lourds) dans les aliments.</li></ul>"
        },
        {
          "question": "<p> D\u00e9cris les principales m\u00e9thodes de conservation des aliments en expliquant leur principe.</p>",
          "reponse": "<p>Les principales m\u00e9thodes de conservation des aliments sont :</p><ul><li><b>Le s\u00e9chage</b> : on retire l'eau des aliments pour emp\u00eacher la croissance des micro-organismes (exemple : le poisson fum\u00e9).</li><li><b>Le salage</b> : on ajoute du sel qui cr\u00e9e un milieu hostile pour les bact\u00e9ries (exemple : le poisson sal\u00e9).</li><li><b>La cong\u00e9lation</b> : on abaisse la temp\u00e9rature pour ralentir ou stopper la croissance des microbes.</li><li><b>L'utilisation d'antiseptiques</b> : on ajoute des substances naturelles ou chimiques qui emp\u00eachent le d\u00e9veloppement des micro-organismes (exemple : le vinaigre, le citron).</li></ul>"
        },
        {
          "question": "<p> Une famille a consomm\u00e9 des aliments conserv\u00e9s dans des conditions douteuses. Tous les membres ont pr\u00e9sent\u00e9 des vomissements et des diarrh\u00e9es. Explique ce qui s'est pass\u00e9 et propose des mesures \u00e0 prendre pour \u00e9viter que cela ne se reproduise.</p>",
          "reponse": "<p>Les sympt\u00f4mes (vomissements, diarrh\u00e9es) indiquent une <b>intoxication alimentaire</b> [citation:10]. Cela peut \u00eatre d\u00fb \u00e0 la consommation d'aliments contamin\u00e9s par des bact\u00e9ries (salmonelle, staphylocoque) qui se sont d\u00e9velopp\u00e9es \u00e0 cause d'une mauvaise conservation.</p><p>Pour \u00e9viter cela, il faut :</p><ul><li><b>Respecter la cha\u00eene du froid</b> : conserver les aliments p\u00e9rissables au r\u00e9frig\u00e9rateur.</li><li><b>V\u00e9rifier les dates de p\u00e9remption</b> avant la consommation.</li><li><b>Bien cuire les aliments</b>, surtout la viande et les \u0153ufs, pour tuer les bact\u00e9ries.</li><li><b>Laver les ustensiles de cuisine et les mains</b> avant de pr\u00e9parer les repas.</li></ul>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
