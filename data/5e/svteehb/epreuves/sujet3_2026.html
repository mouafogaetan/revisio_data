<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "SVTEEHB",
 "classe": "Cinquième",
 "sequence": "Séquence 3",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Exercice 1 : Reproduction animale",
     "points": "4 pts",
     "enonce": "<p>La reproduction est un phénomène essentiel à la pérennité des espèces animales. Elle implique des mécanismes complexes allant de la rencontre des partenaires à la naissance des petits. L'éleveur doit maîtriser ces mécanismes pour améliorer la production animale.</p>",
     "questions": [
       {
         "question": "<p><strong>1.1 (0,75 pt)</strong> Distingue un animal hermaphrodite d'un animal gonochorique en donnant un exemple pour chacun.</p>",
         "reponse": "<p>Un animal <strong>hermaphrodite</strong> possède à la fois les organes reproducteurs mâles et femelles (ex : l'escargot, le ténia). Un animal <strong>gonochorique</strong> possède un seul sexe, mâle ou femelle (ex : le poulet, le chien, l'homme).</p>"
       },
       {
         "question": "<p><strong>1.2 (0,75 pt)</strong> Cite deux signaux utilisés par les animaux pour attirer un partenaire sexuel.</p>",
         "reponse": "<p>Les animaux utilisent différents signaux pour attirer un partenaire :</p><ul><li>Les <strong>chants</strong> (ex : le chant des oiseaux).</li><li>La <strong>production de lumière</strong> (ex : le lampyre ou ver luisant).</li><li>Les <strong>parades nuptiales</strong> (ex : la danse du scorpion).</li></ul>"
       },
       {
         "question": "<p><strong>1.3 (1,25 pt)</strong> Décris le parcours du spermatozoïde dans l'appareil reproducteur mâle depuis sa production jusqu'à son émission.</p>",
         "reponse": "<p>Le spermatozoïde est produit dans les <strong>testicules</strong>. Il est ensuite stocké et acheminé dans les <strong>spermiductes</strong> (ou canaux déférents). Il parcourt ensuite le canal éjaculateur et est émis à l'extérieur par le <strong>pénis</strong> lors de l'éjaculation.</p>"
       },
       {
         "question": "<p><strong>1.4 (1,25 pt)</strong> Distingue la fécondation externe de la fécondation interne en donnant un exemple pour chaque cas.</p>",
         "reponse": "<p>La <strong>fécondation externe</strong> a lieu à l'extérieur du corps de la femelle, généralement dans l'eau. Les gamètes sont libérés dans le milieu extérieur où ils se rencontrent (ex : les poissons, les amphibiens).</p><p>La <strong>fécondation interne</strong> a lieu à l'intérieur du corps de la femelle. Les spermatozoïdes sont déposés dans les voies génitales de la femelle où ils rencontrent les ovules (ex : les mammifères, les oiseaux).</p>"
       }
     ]
   },
   {
     "titre": "Exercice 2 : Qualité des sols",
     "points": "4 pts",
     "enonce": "<p>La qualité des sols est un facteur déterminant pour la production agricole. Un bon sol agricole doit posséder certaines qualités physiques et chimiques qui permettent aux plantes de bien se développer. L'agriculteur peut utiliser différentes techniques pour améliorer la qualité de ses sols.</p>",
     "questions": [
       {
         "question": "<p><strong>2.1 (0,75 pt)</strong> Définis la texture du sol et distingue les trois types de texture.</p>",
         "reponse": "<p>La <strong>texture du sol</strong> est la proportion relative des différentes particules minérales qui le composent (sable, limon, argile). On distingue :</p><ul><li>Les sols <strong>sableux</strong> : riches en sable, ils sont perméables mais retiennent peu l'eau.</li><li>Les sols <strong>argileux</strong> : riches en argile, ils retiennent l'eau mais sont peu perméables.</li><li>Les sols <strong>limoneux</strong> : riches en limon, ils ont des propriétés intermédiaires.</li></ul>"
       },
       {
         "question": "<p><strong>2.2 (0,75 pt)</strong> Cite trois qualités d'un bon sol agricole.</p>",
         "reponse": "<p>Un bon sol agricole doit être :</p><ul><li><strong>Meuble</strong> : facile à travailler.</li><li><strong>Riche en sels minéraux</strong> : pour nourrir les plantes.</li><li><strong>Perméable</strong> : pour permettre l'infiltration de l'eau.</li><li><strong>Dépourvu de parasites</strong> : pour éviter les maladies des plantes.</li></ul>"
       },
       {
         "question": "<p><strong>2.3 (1,25 pt)</strong> Explique ce qu'est la structure granuleuse d'un sol et pourquoi elle est considérée comme la meilleure pour l'agriculture.</p>",
         "reponse": "<p>La <strong>structure granuleuse</strong> est une structure du sol où les particules sont regroupées en petits agrégats arrondis (mottes) qui laissent des espaces entre elles. Cette structure est considérée comme la meilleure car elle assure :</p><ul><li>Une bonne <strong>aération</strong> du sol.</li><li>Une bonne <strong>perméabilité</strong>.</li><li>Une bonne <strong>rétention d'eau</strong>.</li><li>Une facilité de <strong>travail du sol</strong>.</li></ul>"
       },
       {
         "question": "<p><strong>2.4 (1,25 pt)</strong> Distingue les engrais chimiques des engrais organiques en citant leurs avantages et inconvénients.</p>",
         "reponse": "<p><strong>Engrais chimiques (minéraux) :</strong></p><ul><li>Avantages : action rapide, dosage précis, faciles à transporter.</li><li>Inconvénients : peuvent polluer les sols et les eaux, appauvrissent le sol à long terme, coût élevé.</li></ul><p><strong>Engrais organiques (compost, fumier, fientes) :</strong></p><ul><li>Avantages : améliorent la structure du sol, enrichissent en humus, action lente mais durable.</li><li>Inconvénients : action lente, encombrants à transporter, peuvent contenir des agents pathogènes.</li></ul>"
       }
     ]
   },
   {
     "titre": "Exercice 3 : Maladies des plantes et des animaux d'élevage",
     "points": "4 pts",
     "enonce": "<p>Les plantes cultivées et les animaux d'élevage sont exposés à de nombreuses maladies causées par divers agents pathogènes. Connaître ces maladies et leurs modes de lutte est essentiel pour assurer une production de qualité.</p>",
     "questions": [
       {
         "question": "<p><strong>3.1 (0,75 pt)</strong> Cite trois principaux ennemis des plantes cultivées.</p>",
         "reponse": "<p>Les principaux ennemis des plantes sont :</p><ul><li>Les <strong>champignons</strong> microscopiques.</li><li>Les <strong>virus</strong>.</li><li>Les <strong>insectes</strong> ravageurs.</li><li>Les <strong>vers</strong> (nématodes).</li><li>Les <strong>oiseaux</strong> et les <strong>rongeurs</strong>.</li></ul>"
       },
       {
         "question": "<p><strong>3.2 (1 pt)</strong> Cite deux maladies des bovins et décris leurs symptômes.</p>",
         "reponse": "<p><strong>Helminthose</strong> : maladie due à des vers (helminthes) dans le tube digestif. Symptômes : amaigrissement, diarrhée, poil terne, anémie.</p><p><strong>Peste bovine</strong> : maladie virale très contagieuse. Symptômes : fièvre élevée, écoulements oculaires et nasaux, diarrhée hémorragique, mort rapide.</p><p><strong>Ascaridiose</strong> : maladie due à un ver (Ascaris) dans l'intestin. Symptômes : amaigrissement, diarrhée, retard de croissance.</p>"
       },
       {
         "question": "<p><strong>3.3 (1,25 pt)</strong> Propose deux méthodes de lutte contre les maladies des plantes cultivées.</p>",
         "reponse": "<p>Les méthodes de lutte contre les maladies des plantes sont :</p><ul><li>L'utilisation de <strong>fongicides</strong> (contre les champignons) et d'<strong>insecticides</strong> (contre les insectes).</li><li>La <strong>rotation des cultures</strong> : alterner les cultures pour éviter la prolifération des parasites spécifiques à une plante.</li><li>Le choix de <strong>semences saines</strong> et résistantes.</li><li>Le <strong>désherbage</strong> pour éliminer les plantes hôtes des parasites.</li></ul>"
       },
       {
         "question": "<p><strong>3.4 (1 pt)</strong> Décris la maladie de la cysticercose chez le porc.</p>",
         "reponse": "<p>La <strong>cysticercose</strong> est une maladie parasitaire due à la larve du ténia (Taenia solium). Le porc s'infeste en ingérant des œufs de ténia présents dans les selles humaines ou dans l'environnement. Les larves (cysticerques) se logent dans les muscles du porc, formant des kystes visibles à l'œil nu. La consommation de viande de porc infestée et mal cuite peut transmettre le parasite à l'homme (téniasis).</p>"
       }
     ]
   },
   {
     "titre": "Exercice 4 : Santé de la reproduction et MST/VIH/SIDA",
     "points": "5 pts",
     "enonce": "<p>La santé de la reproduction est un aspect essentiel du bien-être des adolescents et des adultes. Il est important de connaître les mécanismes de la reproduction, les méthodes de contraception et de se protéger contre les infections sexuellement transmissibles.</p>",
     "questions": [
       {
         "question": "<p><strong>4.1 (0,75 pt)</strong> Définis la puberté.</p>",
         "reponse": "<p>La <strong>puberté</strong> est l'ensemble des transformations physiques, physiologiques et psychologiques qui marquent le passage de l'enfance à l'adolescence et à l'âge adulte. Elle se manifeste par le développement des caractères sexuels primaires et secondaires, et par l'acquisition de la capacité à se reproduire.</p>"
       },
       {
         "question": "<p><strong>4.2 (1 pt)</strong> Décris le parcours du zygote de la fécondation à la nidation.</p>",
         "reponse": "<p>Le <strong>zygote</strong> est la cellule-œuf formée par la fusion des gamètes mâle et femelle. Il se divise rapidement tout en descendant dans la trompe de Fallope jusqu'à l'utérus. Au bout de quelques jours, l'embryon arrive dans la cavité utérine où il s'<strong>implante</strong> dans la muqueuse utérine (endomètre). Cette étape est appelée la <strong>nidation</strong>.</p>"
       },
       {
         "question": "<p><strong>4.3 (1,25 pt)</strong> Cite trois méthodes de contraception et décris brièvement leur principe.</p>",
         "reponse": "<p>Les méthodes de contraception sont :</p><ul><li><strong>L'abstinence périodique</strong> (méthode Ogino) : éviter les rapports sexuels pendant la période d'ovulation.</li><li>La <strong>pilule contraceptive</strong> : contient des hormones qui empêchent l'ovulation.</li><li>Le <strong>préservatif</strong> (masculin ou féminin) : barrière physique qui empêche le contact entre les gamètes.</li><li>Le <strong>stérilet</strong> (dispositif intra-utérin) : empêche la nidation de l'embryon.</li></ul>"
       },
       {
         "question": "<p><strong>4.4 (1,25 pt)</strong> Explique la différence entre une MST et une IST.</p>",
         "reponse": "<p>Les <strong>MST (Maladies Sexuellement Transmissibles)</strong> sont des infections qui se transmettent lors de rapports sexuels et qui présentent des symptômes visibles (ulcères, écoulements, etc.). Les <strong>IST (Infections Sexuellement Transmissibles)</strong> est une appellation plus large qui inclut toutes les infections transmises lors de rapports sexuels, qu'elles présentent ou non des symptômes. Une personne peut être porteuse d'une infection sans le savoir et la transmettre.</p>"
       },
       {
         "question": "<p><strong>4.5 (0,75 pt)</strong> Cite les trois voies de transmission du VIH.</p>",
         "reponse": "<p>Le VIH se transmet par trois voies principales :</p><ul><li>La <strong>voie sexuelle</strong> : rapports sexuels non protégés.</li><li>La <strong>voie sanguine</strong> : transfusion de sang contaminé, partage de seringues, accidents d'exposition au sang.</li><li>La <strong>voie materno-fœtale</strong> : transmission de la mère à l'enfant pendant la grossesse, l'accouchement ou l'allaitement.</li></ul>"
       }
     ]
   }
 ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
