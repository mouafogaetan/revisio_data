<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "SVTEEHB",
  "classe": "Cinquième",
  "sequence": "Séquence 4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : La reproduction animale et l'amélioration des productions (5 points)",
      "points": "5 pts",
      "enonce": "<div style='font-size:1rem; line-height:1.8;'>La reproduction est un processus fondamental qui permet aux espèces de se perpétuer. L'Homme a appris à maîtriser ce processus pour améliorer la production animale.</div><div style='background:#f4f6f7; padding:12px; border-radius:8px; margin:10px 0;'><p style='margin:0;'><strong>Document :</strong> Dans un élevage de bovins, l'éleveur souhaite améliorer la qualité de son troupeau. Il décide d'utiliser l'insémination artificielle avec de la semence d'un taureau reproducteur de race pure.</p></div>",
      "questions": [
        {
          "question": "<strong>1.1)</strong> Définir l'insémination artificielle et expliquer son intérêt pour l'éleveur.",
          "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>Insémination artificielle</strong> : technique qui consiste à introduire artificiellement du sperme (contenant des spermatozoïdes) dans l'appareil génital d'une femelle pour provoquer la fécondation sans accouplement.</li><li><strong>Intérêt pour l'éleveur</strong> :</li><ul style='padding-left:15px;'><li>Permet de sélectionner les meilleurs reproducteurs (qualité génétique).</li><li>Évite les risques de transmission de maladies lors de l'accouplement.</li><li>Permet de féconder un grand nombre de femelles avec la semence d'un seul mâle.</li></ul></ul>"
        },
        {
          "question": "<strong>1.2)</strong> Distinguer la fécondation externe de la fécondation interne. Donner un exemple pour chaque type.",
          "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>Fécondation externe</strong> : la fécondation a lieu à l'extérieur du corps de la femelle. Les gamètes mâles et femelles sont libérés dans le milieu extérieur (généralement aquatique). Exemple : poissons, grenouilles.</li><li><strong>Fécondation interne</strong> : la fécondation a lieu à l'intérieur du corps de la femelle. Le gamète mâle (spermatozoïde) est déposé dans l'appareil reproducteur femelle. Exemple : mammifères, oiseaux, reptiles.</li></ul>"
        },
        {
          "question": "<strong>1.3)</strong> Qu'est-ce qu'un animal hermaphrodite ? Donner deux exemples.",
          "reponse": "Un animal hermaphrodite est un animal qui possède à la fois les organes reproducteurs mâles et femelles. Exemples : l'escargot, le tænia (ver solitaire), le ver de terre."
        }
      ]
    },
    {
      "titre": "Exercice 2 : Le développement de la cellule-œuf (5 points)",
      "points": "5 pts",
      "enonce": "<div style='font-size:1rem; line-height:1.8;'>Après la fécondation, la cellule-œuf (zygote) se développe pour donner un nouvel individu. Chez certains animaux, le développement se fait dans un œuf, chez d'autres, il se fait dans le ventre de la mère.</div>",
      "questions": [
        {
          "question": "<strong>2.1)</strong> Distinguer les animaux ovipares, vivipares et ovovivipares. Donner un exemple pour chaque catégorie.",
          "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>Ovipares</strong> : animaux qui pondent des œufs. Le développement de l'embryon a lieu à l'extérieur du corps de la mère. Exemple : poule, poisson, grenouille, insecte.</li><li><strong>Vivipares</strong> : animaux qui mettent au monde des petits vivants. Le développement de l'embryon a lieu à l'intérieur de l'utérus de la mère, qui nourrit l'embryon via le placenta. Exemple : chien, chat, homme, baleine.</li><li><strong>Ovovivipares</strong> : animaux dont les œufs éclosent à l'intérieur du corps de la mère, qui donne naissance à des petits vivants. Les embryons se développent dans des œufs retenus dans l'utérus. Exemple : vipère, requin, guppy (poisson).</li></ul>"
        },
        {
          "question": "<strong>2.2)</strong> Décrire la structure d'un œuf de poule en citant ses différentes parties.",
          "reponse": "Un œuf de poule est composé de :<ul style='margin:0; padding-left:20px;'><li><strong>La coquille</strong> : enveloppe calcaire protectrice, percée de pores pour les échanges gazeux.</li><li><strong>La membrane coquillière</strong> : fine membrane qui tapisse l'intérieur de la coquille.</li><li><strong>La chambre à air</strong> : espace d'air situé au pôle large de l'œuf.</li><li><strong>Le blanc (ou albumen)</strong> : liquide clair et visqueux, riche en protéines, qui protège le jaune.</li><li><strong>Le jaune (ou vitellus)</strong> : réserve nutritive riche en lipides et protéines.</li><li><strong>Le germe (ou blastoderme)</strong> : petite tache blanche à la surface du jaune, qui donnera l'embryon après fécondation.</li></ul>"
        },
        {
          "question": "<strong>2.3)</strong> Définir la métamorphose et donner un exemple d'animal qui la subit.",
          "reponse": "La métamorphose est une transformation profonde de la morphologie d'un animal au cours de son développement, qui passe par des stades larvaires différents de l'adulte. Exemple : le papillon (œuf → chenille → chrysalide → papillon), la grenouille (têtard → grenouille), le criquet (larve → adulte sans métamorphose complète)."
        }
      ]
    },
    {
      "titre": "Exercice 3 : La santé de la reproduction humaine (5 points)",
      "points": "5 pts",
      "enonce": "<div style='font-size:1rem; line-height:1.8;'>La reproduction humaine est un processus complexe qui peut être perturbé par divers facteurs. Il est important de connaître les mécanismes pour assurer une bonne santé reproductive.</div>",
      "questions": [
        {
          "question": "<strong>3.1)</strong> Définir la puberté et citer les principales transformations qu'elle entraîne.",
          "reponse": "La puberté est l'ensemble des transformations physiques et hormonales qui marquent le passage de l'enfance à l'adolescence et qui rendent l'individu apte à la reproduction. Ces transformations incluent :<ul style='margin:0; padding-left:20px;'><li>Chez la fille : développement des seins, apparition des règles (ménarche), pilosité, élargissement du bassin.</li><li>Chez le garçon : mue de la voix, apparition de la pilosité, développement des organes génitaux, production de spermatozoïdes.</li></ul>"
        },
        {
          "question": "<strong>3.2)</strong> Définir une MST (ou IST) et citer trois exemples.",
          "reponse": "Une MST (Maladie Sexuellement Transmissible) est une infection qui se transmet lors de rapports sexuels non protégés. On parle aussi d'IST (Infection Sexuellement Transmissible). Exemples : la syphilis, la gonococcie, la chlamydiose, l'hépatite B, le SIDA (VIH)."
        },
        {
          "question": "<strong>3.3)</strong> Expliquer le mode d'action du VIH et les trois voies de transmission.",
          "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>Mode d'action</strong> : le VIH (Virus de l'Immunodéficience Humaine) attaque et détruit les <strong>lymphocytes T4</strong>, cellules clés du système immunitaire. Cela entraîne une <strong>immunodéficience</strong> progressive, rendant l'organisme vulnérable aux <strong>infections opportunistes</strong>.</li><li><strong>Trois voies de transmission</strong> :</li><ul style='padding-left:15px;'><li><strong>Sexuelle</strong> : rapports sexuels non protégés (vaginal, anal, oral).</li><li><strong>Sanguine</strong> : transfusion de sang contaminé, partage de seringues, matériel médical non stérilisé.</li><li><strong>Placentaire (mère-enfant)</strong> : pendant la grossesse, l'accouchement ou l'allaitement.</li></ul></ul>"
        },
        {
          "question": "<strong>3.4)</strong> Citer trois méthodes de contraception.",
          "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>Méthodes barrières</strong> : préservatif masculin, préservatif féminin (empêchent le contact entre les gamètes).</li><li><strong>Méthodes hormonales</strong> : pilule contraceptive, implant, patch, anneau vaginal (empêchent l'ovulation).</li><li><strong>Méthodes chimiques</strong> : spermicides (détruisent les spermatozoïdes).</li><li><strong>Méthodes naturelles</strong> : abstinence périodique (méthode Ogino), retrait, allaitement.</li><li><strong>Dispositifs intra-utérins (DIU)</strong> : stérilet.</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : L'amélioration de la qualité des sols (5 points)",
      "points": "5 pts",
      "enonce": "<div style='font-size:1rem; line-height:1.8;'>Pour obtenir de bonnes récoltes, il est essentiel de connaître les propriétés du sol et d'utiliser des techniques adaptées pour améliorer sa qualité.</div>",
      "questions": [
        {
          "question": "<strong>4.1)</strong> Définir la texture du sol et la structure du sol.",
          "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>Texture du sol</strong> : elle se réfère à la taille des particules minérales qui le composent (sable, limon, argile). Un sol peut être sableux, argileux, limoneux ou avoir une texture équilibrée (loam).</li><li><strong>Structure du sol</strong> : elle se réfère à la manière dont les particules sont agencées entre elles. On distingue les structures compacte (tassée), particulaire (sableuse) et granuleuse (meuble, grumeleuse). La structure granuleuse est idéale pour l'agriculture.</li></ul>"
        },
        {
          "question": "<strong>4.2)</strong> Citer quatre qualités d'un bon sol agricole.",
          "reponse": "Un bon sol agricole doit être :<ul style='margin:0; padding-left:20px;'><li><strong>Meuble</strong> : facile à travailler, permettant le développement des racines.</li><li><strong>Riche en sels minéraux</strong> : contenant les éléments nutritifs nécessaires aux plantes (azote, phosphore, potassium, etc.).</li><li><strong>Perméable</strong> : permettant l'infiltration de l'eau et l'aération.</li><li><strong>Dé pourvu de parasites</strong> : ne contenant pas d'organismes nuisibles (vers, champignons pathogènes, etc.).</li></ul>"
        },
        {
          "question": "<strong>4.3)</strong> Distinguer la jachère de l'assolement.",
          "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>Jachère</strong> : pratique qui consiste à laisser un champ reposer (ne pas le cultiver) pendant une ou plusieurs saisons pour permettre au sol de reconstituer ses réserves nutritives et de se régénérer.</li><li><strong>Assolement</strong> : pratique qui consiste à alterner chaque année les cultures sur une même parcelle. Par exemple, cultiver du maïs une année, puis des légumineuses l'année suivante, etc. Cela permet d'éviter l'épuisement du sol.</li></ul>"
        },
        {
          "question": "<strong>4.4)</strong> Distinguer les engrais chimiques des engrais organiques. Citer un avantage et un inconvénient pour chaque type.",
          "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>Engrais chimiques</strong> : produits de synthèse industrielle, apportant des éléments minéraux spécifiques (ex: NPK 20-10-10).</li><ul style='padding-left:15px;'><li><strong>Avantage</strong> : action rapide, dosage précis.</li><li><strong>Inconvénient</strong> : risque de pollution des sols et des eaux, lessivage par les pluies, coût élevé.</li></ul><li><strong>Engrais organiques</strong> : issus de matières végétales ou animales (compost, fumier, fientes, etc.).</li><ul style='padding-left:15px;'><li><strong>Avantage</strong> : améliore la structure du sol, enrichit en humus, libération lente des nutriments.</li><li><strong>Inconvénient</strong> : action plus lente, risque de transmission de maladies si le compost n'est pas bien préparé.</li></ul></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Lecture et exploitation des inscriptions sur les produits de consommation (5 points)",
      "points": "5 pts",
      "enonce": "<div style='font-size:1rem; line-height:1.8;'>La lecture attentive des étiquettes des produits de consommation permet de faire des choix éclairés et de préserver sa santé.</div>",
      "questions": [
        {
          "question": "<strong>5.1)</strong> Distinguer un corps pur d'un mélange.",
          "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>Corps pur</strong> : substance constituée d'une seule sorte de molécule ou d'atomes. Exemples : l'eau distillée (H₂O), le sel (NaCl), l'or (Au).</li><li><strong>Mélange</strong> : substance constituée de plusieurs sortes de molécules. Exemples : l'eau salée (eau + sel), l'air (azote + oxygène + autres gaz), le jus d'orange.</li></ul>"
        },
        {
          "question": "<strong>5.2)</strong> Distinguer un mélange homogène d'un mélange hétérogène. Donner un exemple pour chaque.",
          "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>Mélange homogène</strong> : mélange dont les constituants ne sont pas distinguables à l'œil nu. Exemple : l'eau salée (le sel est dissous), le lait, l'air.</li><li><strong>Mélange hétérogène</strong> : mélange dont les constituants sont distinguables à l'œil nu. Exemple : l'eau et l'huile, le sable et l'eau, une salade de fruits.</li></ul>"
        },
        {
          "question": "<strong>5.3)</strong> Décrire deux techniques de séparation des constituants d'un mélange.",
          "reponse": "<ul style='margin:0; padding-left:20px;'><li><strong>La filtration</strong> : technique qui permet de séparer un solide d'un liquide en utilisant un filtre (papier filtre, tamis). Les particules solides sont retenues par le filtre, tandis que le liquide (filtrat) passe à travers. Exemple : séparer le sable de l'eau.</li><li><strong>La distillation</strong> : technique qui permet de séparer les constituants d'un mélange homogène (liquide + solide dissous ou deux liquides miscibles) en utilisant la différence de température d'ébullition. Le liquide est chauffé, le constituant le plus volatil s'évapore, puis est refroidi et récupéré (distillat). Exemple : séparer l'alcool de l'eau.</li></ul>"
        },
        {
          "question": "<strong>5.4)</strong> Que doit-on vérifier sur une étiquette de produit alimentaire avant de l'acheter ?",
          "reponse": "Sur une étiquette de produit alimentaire, on doit vérifier :<ul style='margin:0; padding-left:20px;'><li>La <strong>date limite de consommation</strong> (DLC) ou la date de péremption.</li><li>La liste des <strong>ingrédients</strong> (composition).</li><li>La <strong>valeur nutritive</strong> (apports énergétiques, lipides, glucides, protides).</li><li>La <strong>quantité</strong> (poids ou volume).</li><li>Le nom du <strong>fabricant</strong> et le pays d'origine.</li><li>Les <strong>pictogrammes</strong> de dangerosité (le cas échéant).</li></ul>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
