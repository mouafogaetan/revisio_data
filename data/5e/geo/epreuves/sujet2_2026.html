<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Géographie",
  "classe": "Cinquième",
  "sequence": "Séquence 2",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : La croissance de la population mondiale",
      "points": "4 pts",
      "enonce": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; color: #212529;'><p><strong>Consigne :</strong> Observe attentivement le graphique ci-dessous et réponds aux questions.</p><div style='background-color: #ffffff; padding: 10px; border-radius: 5px; border: 1px solid #dee2e6; text-align: center;'><p style='font-style: italic;'>[Graphique : Évolution de la population mondiale de 1800 à 2025. La courbe montre une croissance lente jusqu'en 1900, puis une accélération rapide à partir des années 1950, passant de 2,5 milliards à plus de 8 milliards aujourd'hui.]</p></div></div>",
      "questions": [
        {
          "question": "Décris l'évolution de la population mondiale entre 1800 et 2025 en utilisant des données précises.",
          "reponse": "La population mondiale a connu une croissance lente jusqu'en 1900 (environ 1,6 milliard), puis une accélération rapide. Elle est passée de 2,5 milliards en 1950 à plus de 8 milliards aujourd'hui."
        },
        {
          "question": "Quelles sont les principales périodes de forte croissance démographique ?",
          "reponse": "Les périodes de forte croissance sont principalement après la Seconde Guerre mondiale (depuis les années 1950), avec une explosion démographique appelée le « baby-boom »."
        },
        {
          "question": "Explique deux facteurs qui expliquent cette croissance rapide depuis le XXe siècle.",
          "reponse": "Le progrès médical (vaccins, antibiotiques) a réduit la mortalité, et l'amélioration des conditions d'hygiène et d'alimentation a également contribué à augmenter l'espérance de vie."
        }
      ]
    },
    {
      "titre": "Exercice 2 : L'inégale répartition de la population",
      "points": "5 pts",
      "enonce": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; color: #212529;'><p><strong>Consigne :</strong> Étudie les documents suivants et réponds aux questions.</p><div style='background-color: #ffffff; padding: 10px; border-radius: 5px; border: 1px solid #dee2e6;'><p><strong>Document 1 :</strong> « Les trois principaux foyers de peuplement dans le monde sont l'Asie du Sud-Est, l'Asie du Sud et l'Europe occidentale. À l'opposé, de vastes zones comme le Sahara, le Groenland ou l'Amazonie sont des déserts humains. »</p></div><div style='background-color: #ffffff; padding: 10px; border-radius: 5px; border: 1px solid #dee2e6;'><p><strong>Document 2 :</strong> « La densité de population au Bangladesh est de plus de 1000 habitants/km², tandis qu'elle est inférieure à 5 habitants/km² dans certaines régions du Canada. »</p></div></div>",
      "questions": [
        {
          "question": "Cite les trois principaux foyers de peuplement mentionnés dans le Document 1.",
          "reponse": "L'Asie du Sud-Est, l'Asie du Sud et l'Europe occidentale."
        },
        {
          "question": "D'après le Document 2, pourquoi la densité est-elle si élevée au Bangladesh ?",
          "reponse": "Le Bangladesh est un pays de plaines fertiles avec un climat favorable, ce qui a attiré une population nombreuse au fil du temps. La culture du riz permet de nourrir une population dense."
        },
        {
          "question": "Explique deux facteurs physiques et un facteur humain qui expliquent l'inégale répartition de la population.",
          "reponse": "Facteurs physiques : le climat (les zones tempérées et tropicales humides sont plus peuplées que les déserts ou les zones froides), la présence d'eau (les fleuves et les côtes attirent les populations). Facteur humain : les activités économiques (les régions industrialisées ou agricoles productives attirent les populations)."
        },
        {
          "question": "Explique ce que sont les « déserts humains » et donne un exemple.",
          "reponse": "Les déserts humains sont des zones très faiblement peuplées en raison de contraintes naturelles fortes. Par exemple : le Sahara (aridité), le Groenland (froid), la forêt amazonienne (climat et difficultés d'accès)."
        }
      ]
    },
    {
      "titre": "Exercice 3 : L'Homme en milieu équatorial et tropical",
      "points": "5 pts",
      "enonce": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; color: #212529;'><p><strong>Consigne :</strong> Compare les activités humaines en milieu équatorial et en milieu tropical.</p><div style='background-color: #ffffff; padding: 10px; border-radius: 5px; border: 1px solid #dee2e6;'><p><strong>Document 1 :</strong> « En milieu équatorial, la forêt dense est exploitée par des populations qui pratiquent la cueillette, la chasse et une agriculture sur brûlis. Cependant, l'humidité et les maladies (paludisme) sont des contraintes majeures. »</p></div><div style='background-color: #ffffff; padding: 10px; border-radius: 5px; border: 1px solid #dee2e6;'><p><strong>Document 2 :</strong> « En milieu tropical, les paysans cultivent le maïs, le manioc (vivrier) et le cacao ou le coton (rente). La saison sèche limite les cultures et l'érosion menace les sols. »</p></div></div>",
      "questions": [
        {
          "question": "Quelles sont les principales caractéristiques du climat équatorial ?",
          "reponse": "Le climat équatorial est caractérisé par une chaleur constante, une forte humidité et des pluies abondantes toute l'année (pas de saison sèche)."
        },
        {
          "question": "Quelles sont les principales activités humaines en milieu équatorial ?",
          "reponse": "La cueillette (collecte de fruits, noix), la chasse, la pêche et l'agriculture sur brûlis (on coupe et brûle la forêt pour cultiver quelques années avant qu'elle ne s'épuise)."
        },
        {
          "question": "Quelles sont les principales contraintes du milieu équatorial pour les hommes ?",
          "reponse": "L'humidité excessive, les maladies (paludisme, trypanosomiase), la difficulté de déplacement en forêt dense, et la pauvreté des sols après le brûlis."
        },
        {
          "question": "Distinguer les cultures vivrières des cultures de rente en milieu tropical. Donne des exemples.",
          "reponse": "Les cultures vivrières nourrissent la population locale (maïs, manioc, igname, mil). Les cultures de rente sont destinées à l'exportation (cacao, café, coton, arachide)."
        },
        {
          "question": "Explique pourquoi les sols tropicaux sont fragiles et menacés d'érosion.",
          "reponse": "Les pluies violentes lessivent les sols, la saison sèche les dessèche, et la déforestation (pour les cultures de rente) expose le sol à l'érosion. L'épuisement des sols par des cultures intensives est aussi un problème."
        }
      ]
    },
    {
      "titre": "Exercice 4 : Les campagnes d'Afrique",
      "points": "3 pts",
      "enonce": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; color: #212529;'><p><strong>Consigne :</strong> Décris l'organisation de l'espace rural en Afrique à l'aide des documents et de tes connaissances.</p><div style='background-color: #ffffff; padding: 10px; border-radius: 5px; border: 1px solid #dee2e6;'><p><strong>Document 1 :</strong> « En Afrique de l'Ouest, les villages sont souvent groupés autour d'un chef-lieu, avec des habitations en matériaux locaux (banco, bois). »</p></div><div style='background-color: #ffffff; padding: 10px; border-radius: 5px; border: 1px solid #dee2e6;'><p><strong>Document 2 :</strong> « Les activités rurales dominantes sont l'agriculture, l'élevage et l'artisanat (poterie, tissage). »</p></div></div>",
      "questions": [
        {
          "question": "Distingue les deux formes d'habitat rural que tu connais et donne un exemple pour chacune.",
          "reponse": "L'habitat groupé (villages concentrés, souvent autour d'un point d'eau ou d'un chef-lieu) ; l'habitat dispersé (hameaux isolés, souvent liés à une exploitation agricole)."
        },
        {
          "question": "Cite trois activités économiques pratiquées dans les campagnes africaines.",
          "reponse": "L'agriculture (vivrière et de rente), l'élevage (bovins, ovins, caprins) et l'artisanat (poterie, fabrication d'outils, tissage)."
        }
      ]
    },
    {
      "titre": "Exercice 5 : Les relations villes-campagnes",
      "points": "3 pts",
      "enonce": "<div style='background-color: #f0f8ff; padding: 15px; border-radius: 8px; color: #212529;'><p><strong>Consigne :</strong> Décris les flux entre les campagnes et les villes en Afrique.</p></div>",
      "questions": [
        {
          "question": "Quels sont les principaux flux (biens, personnes, informations) entre les campagnes et les villes ?",
          "reponse": "Les campagnes fournissent des produits agricoles (vivres, matières premières) et des migrants vers les villes. Les villes fournissent des biens manufacturés, des services (éducation, santé), des informations et des capitaux (argent envoyé par les migrants)."
        },
        {
          "question": "Qu'est-ce que l'exode rural et quelles sont ses conséquences ?",
          "reponse": "L'exode rural est le départ massif des populations des campagnes vers les villes. Cela entraîne une croissance urbaine rapide, avec des problèmes de logement, d'emploi et de services, et un vieillissement des campagnes avec une baisse de la production agricole."
        },
        {
          "question": "Comment les villes influencent-elles les campagnes ?",
          "reponse": "Les villes sont des débouchés pour les produits agricoles, elles offrent des emplois, elles diffusent des innovations techniques et des modes de vie urbains, et elles attirent les jeunes, ce qui modifie la structure des campagnes."
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
