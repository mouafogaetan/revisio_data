<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Géographie",
  "classe": "Cinquième",
  "sequence": "Séquence 4",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Maîtrise des connaissances et des repères fondamentaux",
      "points": "6 pts",
      "enonce": "<p>Répondez de manière précise et concise aux questions suivantes. Chaque réponse est notée sur 1 ou 2 points.</p>",
      "questions": [
        {
          "question": "<p> (1 pt) Définissez le concept de <em>désertification</em>.</p>",
          "reponse": "<p>La désertification est le processus de dégradation des terres dans les zones arides, semi-arides et sub-humides sèches, principalement dû aux activités humaines (déforestation, surpâturage, pratiques agricoles inadaptées) et aux variations climatiques.</p>"
        },
        {
          "question": "<p> (2 pts) Expliquez ce qu'est l'<em>exode rural</em> et quelles en sont les principales conséquences pour les campagnes.</p>",
          "reponse": "<p>L'exode rural est le départ définitif ou temporaire d'une partie de la population des campagnes vers les villes. Ses principales conséquences pour les campagnes sont : une diminution de la main-d'œuvre agricole (vieillissement de la population), l'abandon de terres cultivées, un déclin économique local et une rupture des liens sociaux traditionnels.</p>"
        },
        {
          "question": "<p> (1 pt) Citez deux grandes contraintes physiques auxquelles l'homme doit faire face en <em>milieu désertique</em>.</p>",
          "reponse": "<p>Les deux grandes contraintes du milieu désertique sont : la pénurie d'eau (aridité extrême) et les très fortes chaleurs (températures élevées).</p>"
        },
        {
          "question": "<p> (2 pts) Quelles sont les deux principales fonctions des villes en Afrique ? Donnez un exemple pour chacune.</p>",
          "reponse": "<p>Les villes ont des fonctions multiples. <strong>Fonction administrative :</strong> Elles abritent les lieux de pouvoir et de décision (ex : Yaoundé, capitale politique du Cameroun). <strong>Fonction économique :</strong> Elles sont des pôles de production, d'échanges et de services (ex : Douala, capitale économique du Cameroun, avec son port et ses industries).</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Lecture et analyse de documents",
      "points": "6 pts",
      "enonce": "<p>Le document ci-dessous présente des données et un témoignage sur l'urbanisation en Afrique. Lisez-les attentivement et répondez aux questions.</p>",
      "questions": [
        {
          "question": "<p><strong>Document :</strong></p><p><em>« L'Afrique connaît une urbanisation rapide. En 1950, seulement 15 % de sa population vivait en ville. Aujourd'hui, ce chiffre dépasse les 40 %, et il est estimé à 60 % en 2050. Cette croissance est principalement due à l'exode rural et à la forte natalité. Dans les villes, les migrants s'installent souvent dans des quartiers périphériques où les logements sont précaires et les services de base (eau, électricité, assainissement) inexistants. »</em></p><p><em>« Témoignage d'Aminata, 28 ans, arrivée à Dakar il y a cinq ans : “Au village, il n'y avait pas de travail. Je suis venue en ville pour trouver un emploi et aider ma famille. Je vis dans un quartier populaire, je suis coiffeuse. C'est dur, mais j'envoie de l'argent à ma mère tous les mois. Ce qui me manque le plus, c'est l'entraide du village.” »</em></p><p> (1 pt) Quels sont les deux facteurs de la croissance urbaine en Afrique mentionnés dans le texte ?</p>",
          "reponse": "<p>Les deux facteurs mentionnés sont l'<strong>exode rural</strong> et la <strong>forte natalité</strong>.</p>"
        },
        {
          "question": "<p> (2 pts) D'après le témoignage d'Aminata, quelles sont les motivations du départ des campagnes vers les villes ? Quels liens (flux) se créent entre la ville et son village d'origine ?</p>",
          "reponse": "<p>La motivation principale du départ est la <strong>recherche d'un emploi</strong> et de meilleures conditions de vie. Le lien créé est un <strong>flux financier</strong> : Aminata envoie de l'argent à sa mère restée au village, ce qui constitue un apport économique important pour les familles rurales.</p>"
        },
        {
          "question": "<p> (2 pts) Quelles sont les difficultés rencontrées par les migrants dans les villes africaines ?</p>",
          "reponse": "<p>Les difficultés rencontrées sont : le manque de travail (Aminata a dû s'installer à son compte), l'habitat précaire (quartiers populaires) et le manque d'infrastructures de base (eau, électricité, assainissement). On peut aussi ajouter la rupture avec l'entraide villageoise.</p>"
        },
        {
          "question": "<p> (1 pt) L'urbanisation rapide est une caractéristique des pays en développement. Relevez dans le document un chiffre qui montre cette tendance pour l'Afrique.</p>",
          "reponse": "<p>Le chiffre est : <strong>“En 1950, seulement 15 % de sa population vivait en ville”</strong> alors qu'aujourd'hui ce chiffre dépasse les 40 %. Cette augmentation de 25% en quelques décennies montre la rapidité du phénomène.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Étude de cas et réflexion",
      "points": "8 pts",
      "enonce": "<p>L'exercice suivant porte sur les relations entre l'homme et son milieu de vie. Répondez aux questions en vous appuyant sur vos connaissances et votre réflexion personnelle.</p>",
      "questions": [
        {
          "question": "<p> (4 pts) La forêt équatoriale est un milieu contraignant pour les populations qui y vivent, mais elle offre aussi des ressources. Présentez deux contraintes majeures de ce milieu et deux activités économiques que les habitants y pratiquent pour s'adapter.</p>",
          "reponse": "<p><strong>Contraintes :</strong> Climat chaud et humide favorisant les maladies (paludisme, trypanosomiase) ; Forte pluviosité qui peut limiter certaines activités agricoles et rendre les déplacements difficiles.</p><p><strong>Activités économiques :</strong> La chasse et la cueillette pour l'alimentation ; L'agriculture sur brûlis et les plantations (cacao, café, palmier à huile) qui exploitent la fertilité des sols.</p>"
        },
        {
          "question": "<p> (4 pts) En Afrique, les relations entre les villes et les campagnes sont fondées sur une certaine complémentarité. Décrivez brièvement cette complémentarité en présentant ce que les villes apportent aux campagnes et ce que les campagnes apportent aux villes.</p>",
          "reponse": "<p><strong>Les villes apportent aux campagnes :</strong> Des débouchés pour les produits agricoles (marchés urbains), des services (éducation, santé, banques), des biens de consommation (vêtements, outils, matériaux) et des transferts d'argent des migrants.</p><p><strong>Les campagnes apportent aux villes :</strong> La main-d'œuvre nécessaire à l'économie urbaine (migrants, journaliers), des denrées alimentaires (vivres) et des matières premières agricoles (coton, cacao).</p><p>Cette complémentarité crée des flux de personnes, de biens, de capitaux et d'informations qui sont essentiels au fonctionnement économique du pays.</p>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
