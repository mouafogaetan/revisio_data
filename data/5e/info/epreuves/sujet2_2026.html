<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Informatique",
  "classe": "Cinquième",
  "sequence": "Séquence 2",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Les périphériques de l'ordinateur (5 pts)",
      "points": "5 pts",
      "enonce": "<div style='background: #f0f8ff; padding: 15px; border-radius: 10px; color: #1a1a2e; font-size: 0.95em;'><p>Les périphériques sont des composants externes qui permettent à l'utilisateur d'interagir avec l'ordinateur.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. (1,5 pt)</strong> Définis les trois types de périphériques en donnant un exemple pour chacun.</p>",
          "reponse": "<ul><li><strong>Périphérique d'entrée :</strong> Permet d'introduire des données dans l'ordinateur. Exemple : <strong>clavier</strong>.</li><li><strong>Périphérique de sortie :</strong> Permet de restituer les informations traitées. Exemple : <strong>moniteur</strong>.</li><li><strong>Périphérique d'entrée/sortie :</strong> Permet à la fois d'introduire et de restituer des données. Exemple : <strong>disque dur externe</strong>.</li></ul>"
        },
        {
          "question": "<p><strong>2. (1,5 pt)</strong> Classe les périphériques suivants dans le tableau : <strong>souris, imprimante, écran tactile, clé USB, scanner, haut-parleur</strong>.</p><table border='1' cellpadding='3' style='border-collapse: collapse; width: 100%;'><tr><th>Entrée</th><th>Sortie</th><th>Entrée/Sortie</th></tr><tr><td></td><td></td><td></td></tr></table>",
          "reponse": "<table border='1' cellpadding='3' style='border-collapse: collapse; width: 100%;'><tr><th>Entrée</th><th>Sortie</th><th>Entrée/Sortie</th></tr><tr><td>Souris, Scanner</td><td>Imprimante, Haut-parleur</td><td>Écran tactile, Clé USB</td></tr></table>"
        },
        {
          "question": "<p><strong>3. (1 pt)</strong> Cite 3 supports de stockage (mémoire de masse).</p>",
          "reponse": "<ul><li>Disque dur (HDD)</li><li>Clé USB</li><li>CD/DVD</li></ul>"
        },
        {
          "question": "<p><strong>4. (1 pt)</strong> Quelle est la différence entre un périphérique et un support de stockage ?</p>",
          "reponse": "<p>Un <strong>périphérique</strong> est un composant externe qui permet d'échanger des données avec l'ordinateur. Un <strong>support de stockage</strong> est un dispositif qui permet de conserver des données de manière permanente. Certains supports de stockage (comme une clé USB) peuvent être considérés comme des périphériques d'entrée/sortie.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Les ports de l'unité centrale (5 pts)",
      "points": "5 pts",
      "enonce": "<div style='background: #fff5e6; padding: 15px; border-radius: 10px; color: #1a1a2e; font-size: 0.95em;'><p>Les ports sont des connecteurs situés à l'arrière de l'unité centrale qui permettent de brancher les périphériques.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. (2 pts)</strong> Associe chaque port à sa fonction :</p><ul><li><strong>a) USB</strong></li><li><strong>b) HDMI</strong></li><li><strong>c) RJ45</strong></li><li><strong>d) VGA</strong></li></ul>",
          "reponse": "<ul><li><strong>USB :</strong> Permet de connecter des périphériques (souris, clavier, clé USB, imprimante).</li><li><strong>HDMI :</strong> Transmet l'image et le son vers un écran ou un téléviseur.</li><li><strong>RJ45 :</strong> Connecte l'ordinateur à un réseau (Internet).</li><li><strong>VGA :</strong> Transmet le signal vidéo vers un écran (moniteur).</li></ul>"
        },
        {
          "question": "<p><strong>2. (1 pt)</strong> Donne la signification des sigles suivants :</p><ul><li><strong>a) USB</strong></li><li><strong>b) HDMI</strong></li></ul>",
          "reponse": "<ul><li><strong>USB :</strong> Universal Serial Bus (Bus série universel).</li><li><strong>HDMI :</strong> High-Definition Multimedia Interface (Interface multimédia haute définition).</li></ul>"
        },
        {
          "question": "<p><strong>3. (1 pt)</strong> Cite 2 ports utilisés pour connecter un écran à l'unité centrale.</p>",
          "reponse": "<ul><li>Port <strong>VGA</strong></li><li>Port <strong>HDMI</strong></li></ul>"
        },
        {
          "question": "<p><strong>4. (1 pt)</strong> Sur quel port branche-t-on une clé USB ?</p>",
          "reponse": "<p>On branche une clé USB sur un port <strong>USB</strong>.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Catégories de logiciels (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='background: #f0fff0; padding: 15px; border-radius: 10px; color: #1a1a2e; font-size: 0.95em;'><p>Les logiciels sont des programmes qui permettent à l'ordinateur d'exécuter des tâches. On distingue plusieurs catégories de logiciels.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. (1 pt)</strong> Cite 3 catégories de logiciels et donne le rôle de chacune.</p>",
          "reponse": "<ul><li><strong>Système d'exploitation :</strong> Gère les ressources matérielles et permet l'exécution des autres logiciels.</li><li><strong>Logiciel applicatif :</strong> Permet à l'utilisateur d'effectuer une tâche spécifique (traitement de texte, tableur, jeu).</li><li><strong>Utilitaire :</strong> Effectue des tâches de maintenance (nettoyage de disque, défragmentation, antivirus).</li></ul>"
        },
        {
          "question": "<p><strong>2. (1 pt)</strong> Quel est le rôle d'un système d'exploitation ? Cite 2 exemples.</p>",
          "reponse": "<p>Le système d'exploitation gère les ressources de l'ordinateur (mémoire, processeur, périphériques) et fournit une interface utilisateur.</p><p><strong>Exemples :</strong> Windows 11, Linux, macOS.</p>"
        },
        {
          "question": "<p><strong>3. (1 pt)</strong> Distingue logiciel système et logiciel applicatif.</p>",
          "reponse": "<ul><li><strong>Logiciel système :</strong> Gère le fonctionnement de l'ordinateur (ex: Windows).</li><li><strong>Logiciel applicatif :</strong> Permet à l'utilisateur de réaliser des tâches (ex: Microsoft Word, Excel).</li></ul>"
        },
        {
          "question": "<p><strong>4. (1 pt)</strong> À quoi sert un logiciel utilitaire ? Donne un exemple.</p>",
          "reponse": "<p>Un logiciel utilitaire sert à optimiser ou entretenir l'ordinateur.</p><p><strong>Exemple :</strong> Un logiciel de <strong>défragmentation</strong> qui regroupe les fragments de fichiers sur le disque dur pour améliorer les performances.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Éthique numérique et sécurité (6 pts)",
      "points": "6 pts",
      "enonce": "<div style='background: #e6f2ff; padding: 15px; border-radius: 10px; color: #1a1a2e; font-size: 0.95em;'><p>L'utilisation des outils informatiques doit respecter des règles éthiques et des mesures de sécurité.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. (1 pt)</strong> Cite 3 commandements de l'éthique numérique.</p>",
          "reponse": "<ul><li>Ne pas utiliser un ordinateur pour nuire à autrui.</li><li>Ne pas utiliser un ordinateur pour voler ou endommager.</li><li>Respecter la vie privée des autres utilisateurs.</li></ul>"
        },
        {
          "question": "<p><strong>2. (2 pts)</strong> Explique les trois concepts fondamentaux de la sécurité informatique :</p><ul><li><strong>a) Confidentialité</strong></li><li><strong>b) Intégrité</strong></li><li><strong>c) Disponibilité</strong></li></ul>",
          "reponse": "<ul><li><strong>Confidentialité :</strong> Seules les personnes autorisées peuvent accéder aux données.</li><li><strong>Intégrité :</strong> Les données ne doivent pas être modifiées ou altérées sans autorisation.</li><li><strong>Disponibilité :</strong> Les données et les systèmes doivent être accessibles quand les utilisateurs en ont besoin.</li></ul>"
        },
        {
          "question": "<p><strong>3. (1 pt)</strong> Cite deux mécanismes de protection des données.</p>",
          "reponse": "<ul><li>L'utilisation d'un <strong>antivirus</strong> pour protéger contre les virus.</li><li>La création d'un <strong>compte utilisateur</strong> avec mot de passe pour limiter les accès.</li></ul>"
        },
        {
          "question": "<p><strong>4. (2 pts)</strong> Mme Mballa utilise Internet. Elle reçoit un message d'un inconnu lui demandant ses identifiants de messagerie. Que doit-elle faire ? Justifie ta réponse.</p>",
          "reponse": "<p>Mme Mballa ne doit <strong>surtout pas répondre</strong> à ce message ni donner ses identifiants. Il s'agit probablement d'une tentative de <strong>hameçonnage (phishing)</strong>. Elle doit signaler le message comme indésirable et ne jamais communiquer ses mots de passe à des inconnus.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Gestion des fichiers (4 pts)",
      "points": "4 pts",
      "enonce": "<div style='background: #f5f0e8; padding: 15px; border-radius: 10px; color: #1a1a2e; font-size: 0.95em;'><p>La gestion des fichiers est une compétence essentielle pour organiser ses données sur un ordinateur.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. (1 pt)</strong> Distingue un <strong>fichier</strong> d'un <strong>dossier</strong>.</p>",
          "reponse": "<ul><li><strong>Fichier :</strong> Une unité logique d'informations stockée sur un support (texte, image, musique).</li><li><strong>Dossier :</strong> Un conteneur permettant d'organiser les fichiers de manière hiérarchique.</li></ul>"
        },
        {
          "question": "<p><strong>2. (1 pt)</strong> Cite 3 caractéristiques d'un fichier.</p>",
          "reponse": "<ul><li>Le <strong>nom</strong> du fichier.</li><li>L'<strong>extension</strong> qui indique le type de fichier.</li><li>La <strong>taille</strong> du fichier (en octets, Ko ou Mo).</li></ul>"
        },
        {
          "question": "<p><strong>3. (1 pt)</strong> Quelles opérations peut-on effectuer sur un fichier ?</p>",
          "reponse": "<ul><li>Créer un fichier.</li><li>Copier un fichier.</li><li>Renommer un fichier.</li><li>Supprimer un fichier.</li><li>Déplacer un fichier.</li></ul>"
        },
        {
          "question": "<p><strong>4. (1 pt)</strong> Pourquoi est-il important d'organiser ses fichiers dans des dossiers ?</p>",
          "reponse": "<p>Organiser ses fichiers dans des dossiers permet de <strong>retrouver plus facilement</strong> ses documents et de <strong>gagner du temps</strong> dans ses recherches. Cela évite aussi de perdre des fichiers importants.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 6 : Traitement de texte (3 pts)",
      "points": "3 pts",
      "enonce": "<div style='background: #f5f0f0; padding: 15px; border-radius: 10px; color: #1a1a2e; font-size: 0.95em;'><p>Le traitement de texte permet de créer et de mettre en forme des documents.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. (1 pt)</strong> Cite 3 fonctionnalités du menu <strong>Accueil</strong> dans un traitement de texte.</p>",

      "titre": "Exercice 7 : Notion d'abstraction (3 pts)",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>
