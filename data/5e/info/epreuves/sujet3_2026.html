<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }
    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }
    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }
    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }
    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }
    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }
    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }
    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }
    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }
    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }
    .exercise-statement .math {
        color: #1e40af;
    }
    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }
    .question-block.revealed {
        border-left-color: #059669;
    }
    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }
    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }
    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }
    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }
    .question-answer .math {
        color: #065f46;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }
    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }
    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }
    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }
    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }
    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }
    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }
    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }
    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }
    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }
    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }
    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }
    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>
    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>
    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>
        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>
<script>
$(function() {
    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Informatique",
  "classe": "Cinquième",
  "sequence": "Séquence 3",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Matériel et Périphériques (5 pts)",
      "points": "5 pts",
      "enonce": "<div class='exercise-block'><p>Cet exercice porte sur l'exploration du matériel d'un microordinateur.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. Périphériques (2 pts)</strong></p><p>a) (1 pt) Donne la définition d'un périphérique et cite trois exemples.</p><p>b) (1 pt) Quelle est la différence entre un périphérique d'entrée et un périphérique de sortie ?</p>",
          "reponse": "<p><strong>a) (1 pt)</strong> Un <strong>périphérique</strong> est un dispositif connecté à l'unité centrale qui permet d'échanger des informations. Exemples : clavier, souris, moniteur, imprimante.</p><p><strong>b) (1 pt)</strong> Un périphérique d'entrée permet d'envoyer des données à l'ordinateur (ex: clavier, souris). Un périphérique de sortie permet à l'ordinateur de restituer les données (ex: moniteur, imprimante).</p>"
        },
        {
          "question": "<p><strong>2. Interfaces et ports (3 pts)</strong></p><p>a) (1.5 pts) Cite quatre ports que l'on trouve sur une unité centrale et donne leur utilité.</p><p>b) (1.5 pts) Un utilisateur souhaite connecter un écran et un clavier à son ordinateur. Quels ports doit-il utiliser pour chaque périphérique ?</p>",
          "reponse": "<p><strong>a) (1.5 pts)</strong></p><ul><li><strong>Port USB :</strong> Connecte des périphériques comme la souris, le clavier, une clé USB.</li><li><strong>Port HDMI :</strong> Connecte un écran (vidéo + audio).</li><li><strong>Port RJ45 :</strong> Connecte un câble réseau pour accéder à Internet.</li><li><strong>Port VGA :</strong> Connecte un écran (vidéo uniquement).</li></ul><p><strong>b) (1.5 pts)</strong></p><ul><li><strong>Écran :</strong> Port HDMI (ou VGA selon le modèle).</li><li><strong>Clavier :</strong> Port USB (ou PS/2 sur les anciens modèles).</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Logiciels et Systèmes d'exploitation (6 pts)",
      "points": "6 pts",
      "enonce": "<div class='exercise-block'><p>Cet exercice aborde les logiciels, les systèmes d'exploitation et leurs usages.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. Catégories de logiciels (2 pts)</strong></p><p>a) (1 pt) Distingue un logiciel système d'un logiciel applicatif.</p><p>b) (1 pt) Cite deux exemples de logiciels système et deux exemples de logiciels applicatifs.</p>",
          "reponse": "<p><strong>a) (1 pt)</strong> Un <strong>logiciel système</strong> gère le matériel et fournit une plateforme pour les autres logiciels. Un <strong>logiciel applicatif</strong> est conçu pour aider l'utilisateur à réaliser une tâche spécifique [citation:2].</p><p><strong>b) (1 pt)</strong></p><ul><li><strong>Logiciels système :</strong> Windows, Linux, macOS.</li><li><strong>Logiciels applicatifs :</strong> Microsoft Word (traitement de texte), Excel (tableur), un navigateur web.</li></ul>"
        },
        {
          "question": "<p><strong>2. Système d'exploitation (2 pts)</strong></p><p>a) (1 pt) Quelles sont les trois principales fonctions d'un système d'exploitation ?</p><p>b) (1 pt) Qu'est-ce qu'un fichier ? Cite deux opérations que l'on peut effectuer sur un fichier.</p>",
          "reponse": "<p><strong>a) (1 pt)</strong></p><ul><li>Gestion des fichiers et des répertoires.</li><li>Gestion de la mémoire (RAM).</li><li>Gestion des périphériques (entrées/sorties) [citation:2].</li></ul><p><strong>b) (1 pt)</strong> Un <strong>fichier</strong> est une unité logique de stockage d'informations (texte, image, programme). On peut le créer, le copier, le déplacer, le renommer ou le supprimer.</p>"
        },
        {
          "question": "<p><strong>3. Utilisation d'un logiciel applicatif (2 pts)</strong></p><p>Dans un traitement de texte (comme Word), à quoi sert le Menu <em>Accueil</em> et ses blocs <em>Police</em> et <em>Paragraphe</em> ?</p>",
          "reponse": "<p>Le menu <strong>Accueil</strong> regroupe les outils de mise en forme courante.</p><ul><li>Le bloc <strong>Police</strong> permet de modifier le type de caractères (police), la taille, la couleur, le gras, l'italique.</li><li>Le bloc <strong>Paragraphe</strong> permet de modifier l'alignement du texte, les puces, les numéros, l'interligne.</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Citoyenneté Numérique et Sécurité (5 pts)",
      "points": "5 pts",
      "enonce": "<div class='exercise-block'><p>Cet exercice évalue la compréhension de l'éthique numérique et des concepts de sécurité.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. Commandements de l'éthique numérique (2 pts)</strong></p><p>a) (1 pt) Qu'est-ce que l'éthique numérique ?</p><p>b) (1 pt) Cite deux commandements de l'éthique numérique et explique-les.</p>",
          "reponse": "<p><strong>a) (1 pt)</strong> L'<strong>éthique numérique</strong> est un ensemble de règles de conduite à respecter dans l'utilisation des technologies et d'Internet.</p><p><strong>b) (1 pt)</strong></p><ul><li><strong>Commandement 6 :</strong> \"Tu ne dois pas utiliser les ressources informatiques d'autrui sans autorisation\" (respect du matériel).</li><li><strong>Commandement 8 :</strong> \"Tu ne dois pas t'approprier le travail intellectuel d'autrui\" (respect du copyright).</li></ul>"
        },
        {
          "question": "<p><strong>2. Sécurité informatique (3 pts)</strong></p><p>a) (1.5 pts) Explique les trois piliers de la sécurité informatique (Confidentialité, Intégrité, Disponibilité).</p><p>b) (1.5 pts) Cite deux mécanismes de protection des données sur un ordinateur.</p>",
          "reponse": "<p><strong>a) (1.5 pts)</strong></p><ul><li><strong>Confidentialité :</strong> Seules les personnes autorisées peuvent accéder aux données.</li><li><strong>Intégrité :</strong> Les données ne doivent pas être modifiées de manière non autorisée.</li><li><strong>Disponibilité :</strong> Les données doivent être accessibles quand on en a besoin.</li></ul><p><strong>b) (1.5 pts)</strong></p><ul><li>Un <strong>antivirus</strong> pour protéger contre les logiciels malveillants.</li><li>L'utilisation de <strong>comptes utilisateurs</strong> avec mots de passe pour limiter l'accès.</li><li>Des <strong>pare-feux</strong> (firewalls) pour contrôler les connexions réseau.</li></ul>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Abstraction et Visualisation (4 pts)",
      "points": "4 pts",
      "enonce": "<div class='exercise-block'><p>Cet exercice permet de mettre en pratique la visualisation et la représentation abstraite.</p></div>",
      "questions": [
        {
          "question": "<p><strong>1. Visualisation d'un objet (2 pts)</strong></p><p>a) (1 pt) Qu'est-ce qu'une carte mentale (ou carte heuristique) ?</p><p>b) (1 pt) Donne un exemple de situation où l'utilisation d'une carte mentale serait utile.</p>",
          "reponse": "<p><strong>a) (1 pt)</strong> Une <strong>carte mentale</strong> est un outil de représentation visuelle qui permet d'organiser des idées autour d'un concept central. Elle utilise des branches, des couleurs et des images pour faciliter la compréhension.</p><p><strong>b) (1 pt)</strong> Une carte mentale est utile pour :</p><ul><li>Préparer un exposé ou un plan de révision.</li><li>Prendre des notes de manière structurée.</li><li>Résumer un cours ou un chapitre.</li></ul>"
        },
        {
          "question": "<p><strong>2. Représentation abstraite (2 pts)</strong></p><p>Propose une règle de classification pour les \"objets numériques\" (ex: fichiers, dossiers, applications) et donne des exemples.</p>",
          "reponse": "<p>On peut classer les objets numériques selon leur nature :</p><ul><li><strong>Les fichiers :</strong> unité de stockage (ex: image.jpg, rapport.docx).</li><li><strong>Les dossiers :</strong> conteneurs de fichiers (ex: \"Documents\", \"Photos\").</li><li><strong>Les applications :</strong> programmes exécutables (ex: Word, Chrome).</li></ul><p>Ou selon leur utilité :</p><ul><li><strong>Fichiers personnels</strong> (créés par l'utilisateur).</li><li><strong>Fichiers système</strong> (nécessaires au fonctionnement de l'ordinateur).</li></ul>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};
    const totalExercises = examData.exercices.length;
    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');
    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;
        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);
        // Construire le contenu
        let html = '';
        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;
        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;
            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        $body.html(html);
        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);
        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }
        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }
    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }
        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;
        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);
        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }
    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }
    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }
    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }
    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }
    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }
    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });
        // Afficher le premier exercice
        renderExercise(0);
        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);
        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }
    init();
});
</script>
</body>
</html>
