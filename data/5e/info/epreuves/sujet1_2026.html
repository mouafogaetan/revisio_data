<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Informatique",
  "classe": "Cinquième",
  "sequence": "Séquence 1 : Exploration du matériel et des logiciels",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Les périphériques",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Les <strong>périphériques</strong> sont des dispositifs externes qui permettent à l'utilisateur d'interagir avec l'ordinateur. Ils se classent en trois catégories selon leur fonction.</div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>1. (1 pt)</strong> Cite trois périphériques d'<strong>entrée</strong>.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Trois périphériques d'entrée : le <strong>clavier</strong>, la <strong>souris</strong> et le <strong>scanner</strong>. Ils permettent d'introduire des données dans l'ordinateur.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>2. (1 pt)</strong> Donne deux exemples de périphériques de <strong>sortie</strong> et précise leur rôle.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Deux périphériques de sortie : le <strong>moniteur</strong> (affiche les informations visuelles) et l'<strong>imprimante</strong> (produit une sortie papier).</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>3. (1 pt)</strong> Qu'est-ce qu'un périphérique d'<strong>entrée/sortie</strong> ? Donne un exemple.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Un périphérique d'entrée/sortie est un dispositif qui permet à la fois d'envoyer des données à l'ordinateur et d'en recevoir. Exemple : un <strong>disque dur externe</strong> ou une <strong>clé USB</strong>.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>4. (1 pt)</strong> Cite un support de stockage et donne sa caractéristique principale.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Le <strong>disque dur</strong> (HDD) est un support de stockage permanent qui permet de conserver les données même lorsque l'ordinateur est éteint.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : L'unité centrale et ses ports",
      "points": "5 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>L'<strong>unité centrale</strong> est le boîtier qui contient les composants électroniques de l'ordinateur. Elle dispose de <strong>ports</strong> qui permettent de connecter les périphériques.</div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>1. (1 pt)</strong> Donne la signification des sigles suivants : <strong>VGA</strong>, <strong>USB</strong>, <strong>HDMI</strong>.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>VGA</strong> : Video Graphics Array (port vidéo analogique).<br><strong>USB</strong> : Universal Serial Bus (port universel pour périphériques).<br><strong>HDMI</strong> : High-Definition Multimedia Interface (port vidéo/audio numérique).</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>2. (1 pt)</strong> À quoi sert un port <strong>RJ45</strong> ?</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Le port <strong>RJ45</strong> sert à connecter l'ordinateur à un <strong>réseau informatique</strong> (via un câble Ethernet) pour accéder à Internet ou à d'autres ordinateurs.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>3. (1 pt)</strong> Relie chaque périphérique au port correspondant :<br>- Souris/Clavier<br>- Écran<br>- Imprimante<br>- Casque audio<br><br>USB, VGA/HDMI, Prise jack, Port parallèle.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><ul style='margin-left: 0; padding-left: 20px;'><li><strong>Souris/Clavier</strong> → <strong>USB</strong> (ou PS/2)</li><li><strong>Écran</strong> → <strong>VGA</strong> ou <strong>HDMI</strong></li><li><strong>Imprimante</strong> → <strong>Port parallèle</strong> (ou USB)</li><li><strong>Casque audio</strong> → <strong>Prise jack</strong></li></ul></div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>4. (2 pts)</strong> Cite les <strong>quatre étapes</strong> pour mettre en marche un microordinateur.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><ol style='margin-left: 0; padding-left: 20px;'><li>Vérifier que tous les périphériques sont correctement connectés.</li><li>Appuyer sur le bouton d'alimentation de l'unité centrale.</li><li>Allumer les périphériques (écran, imprimante, etc.).</li><li>Attendre que le système d'exploitation se charge complètement.</li></ol></div>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Logiciels système et applicatifs",
      "points": "5 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Un ordinateur fonctionne grâce à deux grandes catégories de <strong>logiciels</strong> : les logiciels système et les logiciels applicatifs.</div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>1. (1 pt)</strong> Définis un <strong>système d'exploitation</strong> et donne deux exemples.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Un <strong>système d'exploitation</strong> est un logiciel système qui gère les ressources de l'ordinateur et sert d'interface entre l'utilisateur et le matériel. Exemples : <strong>Windows</strong>, <strong>Linux</strong>, <strong>macOS</strong>, <strong>Android</strong>, <strong>iOS</strong>.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>2. (1 pt)</strong> Qu'est-ce qu'un <strong>logiciel d'application</strong> ? Cite deux exemples.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Un <strong>logiciel d'application</strong> est un programme conçu pour aider l'utilisateur à réaliser une tâche spécifique. Exemples : <strong>Microsoft Word</strong> (traitement de texte), <strong>VLC</strong> (lecteur multimédia).</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>3. (1 pt)</strong> À quoi sert un <strong>utilitaire</strong> ? Donne un exemple.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Un <strong>utilitaire</strong> est un logiciel système qui permet d'optimiser ou de maintenir le bon fonctionnement de l'ordinateur. Exemple : un <strong>antivirus</strong>, un <strong>défragmenteur de disque</strong> ou un <strong>nettoyeur de fichiers</strong>.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>4. (2 pts)</strong> Complète le tableau suivant en indiquant si le logiciel est un <strong>logiciel système</strong> ou un <strong>logiciel applicatif</strong> :<br><br>- Microsoft Excel<br>- Ubuntu (Linux)<br>- Google Chrome<br>- Antivirus Avast</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><ul style='margin-left: 0; padding-left: 20px;'><li><strong>Microsoft Excel</strong> → Logiciel applicatif</li><li><strong>Ubuntu (Linux)</strong> → Logiciel système (système d'exploitation)</li><li><strong>Google Chrome</strong> → Logiciel applicatif</li><li><strong>Antivirus Avast</strong> → Logiciel système (utilitaire)</li></ul></div>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Notion de fichier",
      "points": "4 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Un <strong>fichier</strong> est un ensemble d'informations stocké sur un support de stockage. Il se caractérise par plusieurs éléments.</div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>1. (1 pt)</strong> Quelles sont les <strong>deux parties</strong> qui composent le nom d'un fichier ?</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Un nom de fichier est composé de deux parties : le <strong>nom</strong> (choisi par l'utilisateur) et l'<strong>extension</strong> (précédée d'un point), qui indique le type du fichier. Exemple : <code>rapport.pdf</code> → nom = rapport, extension = pdf.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>2. (1 pt)</strong> Quel est le rôle de l'<strong>extension</strong> d'un fichier ?</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>L'<strong>extension</strong> indique le type de données contenues dans le fichier et permet au système d'exploitation de savoir quel logiciel utiliser pour l'ouvrir.</div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>3. (1 pt)</strong> Classe les fichiers suivants par type :<br><code>mon_image.jpg</code>, <code>cours.docx</code>, <code>install.exe</code>, <code>archive.zip</code>.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><ul style='margin-left: 0; padding-left: 20px;'><li><code>mon_image.jpg</code> → fichier <strong>image</strong></li><li><code>cours.docx</code> → fichier de <strong>traitement de texte</strong></li><li><code>install.exe</code> → fichier <strong>exécutable</strong></li><li><code>archive.zip</code> → fichier <strong>compressé</strong></li></ul></div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>4. (1 pt)</strong> Cite quatre <strong>attributs</strong> qui caractérisent un fichier.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Les quatre attributs d'un fichier sont : <strong>Lecture seule</strong>, <strong>Archive</strong>, <strong>Caché</strong>, <strong>Système</strong>.</div>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Éthique et sécurité informatique",
      "points": "2 pts",
      "enonce": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>L'<strong>éthique numérique</strong> et la <strong>sécurité informatique</strong> sont des enjeux importants pour tout utilisateur d'Internet.</div>",
      "questions": [
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>1. (1 pt)</strong> Cite trois <strong>commandements</strong> de l'éthique numérique que tu connais.</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>Trois commandements de l'éthique numérique : <ul style='margin-left: 0; padding-left: 20px;'><li><strong>Ne pas utiliser un ordinateur pour nuire à autrui</strong> (ne pas hacker, ne pas diffuser de fausses informations).</li><li><strong>Ne pas utiliser un ordinateur pour voler</strong> (respecter la propriété intellectuelle, ne pas pirater).</li><li><strong>Ne pas utiliser un ordinateur pour espionner</strong> (respecter la vie privée des autres).</li></ul></div>"
        },
        {
          "question": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'><strong>2. (1 pt)</strong> Que signifie la <strong>confidentialité</strong> dans le cadre de la sécurité informatique ?</div>",
          "reponse": "<div style='font-size: 1em; line-height: 1.6; color: #2c3e50;'>La <strong>confidentialité</strong> signifie que les données ne sont accessibles qu'aux personnes autorisées. Elle garantit que les informations sont protégées contre les accès non autorisés.</div>"
        }
      ]
    }
  ]
};

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
