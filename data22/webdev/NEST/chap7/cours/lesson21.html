<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cours NestJS - Configuration avancée (Lesson 21)</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax pour les formules mathématiques -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* Styles personnalisés pour le confort de lecture */
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .slide-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
        }
        .slide {
            background: white;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease;
            overflow: hidden;
        }
        .slide-content {
            padding: 2rem;
        }
        @media (max-width: 640px) {
            .slide-content {
                padding: 1.5rem;
            }
            h1 {
                font-size: 1.8rem;
            }
            h2 {
                font-size: 1.4rem;
            }
        }
        .nav-btn {
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .nav-btn:hover {
            transform: scale(1.02);
            background-color: #1e3a8a !important;
        }
        .progress-bar {
            transition: width 0.3s ease;
        }
        code {
            background-color: #f1f5f9;
            padding: 0.2rem 0.4rem;
            border-radius: 0.5rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            color: #0f172a;
        }
        pre {
            background-color: #0f172a;
            color: #e2e8f0;
            padding: 1rem;
            border-radius: 1rem;
            overflow-x: auto;
            font-size: 0.85rem;
            margin: 1rem 0;
        }
        .badge {
            background-color: #3b82f6;
            color: white;
            font-size: 0.7rem;
            padding: 0.2rem 0.6rem;
            border-radius: 9999px;
            display: inline-block;
        }
        h3 {
            font-weight: 600;
            margin-top: 1.2rem;
            margin-bottom: 0.5rem;
            color: #1e293b;
        }
        .objective-item {
            background: #f8fafc;
            border-left: 4px solid #3b82f6;
            padding: 0.8rem;
            margin: 0.8rem 0;
            border-radius: 0.75rem;
        }
    </style>
</head>
<body class="antialiased">

    <div class="slide-container">
        <!-- Conteneur des slides -->
        <div id="slides-wrapper" class="relative">
            <!-- Les slides seront injectées ici -->
        </div>

        <!-- Navigation et indicateurs -->
        <div class="flex justify-between items-center mt-6 gap-3 flex-wrap">
            <button id="prevBtn" class="nav-btn bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2 px-5 rounded-full shadow-md transition disabled:opacity-50 disabled:cursor-not-allowed">← Précédent</button>
            <div class="flex gap-2 flex-wrap justify-center" id="dotsContainer"></div>
            <button id="nextBtn" class="nav-btn bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2 px-5 rounded-full shadow-md transition">Suivant →</button>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-2 mt-4 overflow-hidden">
            <div id="progressBar" class="progress-bar bg-blue-600 h-2 rounded-full" style="width: 0%;"></div>
        </div>
    </div>

    <script>
        // Définition des slides pour la lesson21
        const slidesData = [
            {
                type: "title",
                title: "⚙️ Gestion avancée de la configuration",
                subtitle: "NestJS - Lesson 21 : .env, validation Joi et fichiers multiples",
                emoji: "🔐",
                bgClass: "bg-gradient-to-br from-blue-50 to-indigo-100"
            },
            {
                type: "objectives",
                title: "🎯 Objectifs pédagogiques",
                objectives: [
                    "Créer et organiser des fichiers d'environnement : .env, .env.development, .env.production",
                    "Utiliser la validation des variables d'environnement avec le schéma Joi",
                    "Charger des fichiers de configuration au format YAML ou JSON",
                    "Appliquer les bonnes pratiques de sécurité pour les secrets"
                ]
            },
            {
                type: "content",
                title: "📁 Les fichiers .env : pourquoi plusieurs ?",
                content: `
                    <p>Dans une application réelle, on utilise différents environnements : développement, test, production. Chacun a ses propres paramètres (ports, URLs API, clés secrètes...). NestJS avec <code>@nestjs/config</code> permet de charger automatiquement plusieurs fichiers.</p>
                    <div class="bg-gray-50 p-4 rounded-xl my-3">
                        <p class="font-mono text-sm">📄 .env.development  →  BASE_URL=http://localhost:3000<br>
                        📄 .env.production   →  BASE_URL=https://api.monsite.com<br>
                        📄 .env.test         →  BASE_URL=http://test.local</p>
                    </div>
                    <p>Le fichier chargé dépend de la variable <code>NODE_ENV</code>. On peut aussi utiliser un fichier <code>.env</code> par défaut.</p>
                `
            },
            {
                type: "content",
                title: "🧪 Valider les variables avec Joi",
                content: `
                    <p>Pour éviter les erreurs silencieuses, on valide que toutes les variables requises sont présentes et du bon type. La bibliothèque <strong>Joi</strong> permet de définir un schéma.</p>
                    <pre><code>// validation.ts
import * as Joi from 'joi';

export const validationSchema = Joi.object({
  PORT: Joi.number().default(3000),
  DATABASE_URL: Joi.string().required(),
  JWT_SECRET: Joi.string().min(16).required(),
  NODE_ENV: Joi.string()
    .valid('development', 'production', 'test')
    .default('development'),
});</code></pre>
                    <p class="mt-2">💡 <strong>Bloom - Analyser :</strong> Pourquoi Joi empêche-t-il l'application de démarrer si une variable obligatoire manque ?</p>
                    <p>Réponse : Il lance une exception explicite, évitant des comportements imprévisibles.</p>
                `
            },
            {
                type: "content",
                title: "📄 Charger des fichiers YAML / JSON",
                content: `
                    <p>Parfois, la configuration est complexe (listes, objets imbriqués). On peut alors utiliser des fichiers <code>.yaml</code> ou <code>.json</code>.</p>
                    <pre><code>// config.yaml
database:
  host: localhost
  port: 5432
features:
  - logging
  - cache</code></pre>
                    <p>Il faut installer <code>yaml</code> puis créer une factory personnalisée :</p>
                    <pre><code>import { readFileSync } from 'fs';
import * as yaml from 'yaml';

export default () => {
  const configFile = process.env.NODE_ENV === 'production' 
    ? 'config.prod.yaml' 
    : 'config.dev.yaml';
  const file = readFileSync(configFile, 'utf8');
  return yaml.parse(file);
};</code></pre>
                `
            },
            {
                type: "content",
                title: "🛡️ Bonnes pratiques de sécurité",
                content: `
                    <ul class="list-disc pl-6 space-y-2">
                        <li>✅ <strong>Ne jamais committer</strong> les fichiers .env (ajouter .env* au .gitignore)</li>
                        <li>✅ Utiliser <strong>.env.example</strong> pour documenter les variables nécessaires</li>
                        <li>✅ Chiffrer les secrets en production (Vault, AWS Secrets Manager)</li>
                        <li>✅ Toujours valider les variables au démarrage (Joi)</li>
                        <li>✅ Éviter de logger les variables sensibles</li>
                    </ul>
                    <div class="bg-amber-50 border-l-4 border-amber-400 p-3 rounded mt-3">
                        ⚠️ <span class="font-semibold">À retenir :</span> Un développeur malveillant ou un leak de code ne doit jamais exposer les clés API !
                    </div>
                `
            },
            {
                type: "content",
                title: "🔧 Mise en pratique - Exemple complet",
                content: `
                    <p>Voici un extrait de <code>app.module.ts</code> intégrant validation Joi et fichiers multiples :</p>
                    <pre><code>import { Module } from '@nestjs/common';
import { ConfigModule } from '@nestjs/config';
import configuration from './config/configuration';
import { validationSchema } from './config/validation';

@Module({
  imports: [
    ConfigModule.forRoot({
      envFilePath: ['.env', \`.env.\${process.env.NODE_ENV}\`],
      load: [configuration],     // charge un fichier YAML/JSON
      validationSchema,
      isGlobal: true,
    }),
  ],
})
export class AppModule {}</code></pre>
                    <p>Ensuite, on peut injecter <code>ConfigService</code> partout :</p>
                    <pre><code>constructor(private configService: ConfigService) {
  const dbUrl = this.configService.get('DATABASE_URL');
}</code></pre>
                `
            },
            {
                type: "conclusion",
                title: "🏁 Résumé de la leçon",
                conclusions: [
                    "Plusieurs fichiers .env par environnement (développement, production, test)",
                    "Validation impérative avec Joi pour la robustesse",
                    "Possibilité d'utiliser YAML/JSON pour des configurations structurées",
                    "La sécurité des secrets est primordiale",
                    "ConfigService est le point d'accès unique aux variables"
                ]
            }
        ];

        let currentSlide = 0;

        function renderSlides() {
            const wrapper = $('#slides-wrapper');
            wrapper.empty();
            slidesData.forEach((slide, idx) => {
                let slideHtml = `<div class="slide mb-6" data-slide-index="${idx}" style="display: ${idx === currentSlide ? 'block' : 'none'};">`;
                slideHtml += `<div class="slide-content ${slide.bgClass || 'bg-white'} rounded-2xl">`;
                
                if (slide.type === 'title') {
                    slideHtml += `
                        <div class="text-center py-6 md:py-10">
                            <div class="text-6xl mb-4">${slide.emoji}</div>
                            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800">${slide.title}</h1>
                            <p class="text-gray-600 mt-3 text-lg">${slide.subtitle}</p>
                            <div class="mt-6 inline-block bg-blue-100 text-blue-800 px-4 py-2 rounded-full text-sm">Module @nestjs/config</div>
                        </div>
                    `;
                }
                else if (slide.type === 'objectives') {
                    slideHtml += `<h2 class="text-2xl font-bold text-gray-800 border-b-2 border-blue-400 pb-2 inline-block">${slide.title}</h2>`;
                    slideHtml += `<div class="mt-5">`;
                    slide.objectives.forEach(obj => {
                        slideHtml += `<div class="objective-item flex items-start gap-3"><span class="text-blue-600 text-xl">📌</span><span>${obj}</span></div>`;
                    });
                    slideHtml += `</div>`;
                }
                else if (slide.type === 'content') {
                    slideHtml += `<h2 class="text-2xl font-bold text-gray-800 border-l-4 border-blue-500 pl-3">${slide.title}</h2>`;
                    slideHtml += `<div class="mt-4 text-gray-700 leading-relaxed">${slide.content}</div>`;
                }
                else if (slide.type === 'conclusion') {
                    slideHtml += `<h2 class="text-2xl font-bold text-gray-800">${slide.title}</h2><div class="mt-4 space-y-2">`;
                    slide.conclusions.forEach(conc => {
                        slideHtml += `<div class="flex items-start gap-2"><span class="text-green-600">✔️</span><span>${conc}</span></div>`;
                    });
                    slideHtml += `</div><div class="mt-6 p-3 bg-blue-50 rounded-xl text-center text-blue-800">🎓 Félicitations ! Vous maîtrisez la configuration avancée NestJS.</div>`;
                }
                
                slideHtml += `</div></div>`;
                wrapper.append(slideHtml);
            });
            updateDots();
            updateProgress();
            toggleButtons();
        }

        function updateDots() {
            const container = $('#dotsContainer');
            container.empty();
            slidesData.forEach((_, idx) => {
                const dot = $(`<button class="w-3 h-3 rounded-full mx-1 transition-all ${idx === currentSlide ? 'bg-blue-700 w-5' : 'bg-gray-400'}" data-index="${idx}"></button>`);
                dot.on('click', () => goToSlide(idx));
                container.append(dot);
            });
        }

        function updateProgress() {
            const percent = ((currentSlide + 1) / slidesData.length) * 100;
            $('#progressBar').css('width', `${percent}%`);
        }

        function toggleButtons() {
            $('#prevBtn').prop('disabled', currentSlide === 0);
            if (currentSlide === slidesData.length - 1) {
                $('#nextBtn').text('Terminé ✓');
            } else {
                $('#nextBtn').text('Suivant →');
            }
        }

        function goToSlide(index) {
            if (index < 0) index = 0;
            if (index >= slidesData.length) index = slidesData.length - 1;
            $(`.slide`).hide();
            $(`.slide[data-slide-index="${index}"]`).fadeIn(200);
            currentSlide = index;
            updateDots();
            updateProgress();
            toggleButtons();
            // Faire défiler vers le haut
            $('html, body').animate({ scrollTop: 0 }, 100);
            // Re-rendre les maths si besoin
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        function nextSlide() {
            if (currentSlide < slidesData.length - 1) {
                goToSlide(currentSlide + 1);
            } else {
                alert("🎉 Bravo ! Vous avez terminé cette leçon. Pensez à pratiquer avec vos propres fichiers .env et Joi.");
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                goToSlide(currentSlide - 1);
            }
        }

        $(document).ready(function() {
            renderSlides();
            $('#nextBtn').on('click', nextSlide);
            $('#prevBtn').on('click', prevSlide);
            // Gestion clavier (flèches gauche/droite)
            $(document).on('keydown', function(e) {
                if (e.key === 'ArrowRight') nextSlide();
                if (e.key === 'ArrowLeft') prevSlide();
            });
        });
    </script>
    <!-- Note supplémentaire : tous les exemples sont conformes à la lesson21 du programme NestJS -->
</body>
</html>
