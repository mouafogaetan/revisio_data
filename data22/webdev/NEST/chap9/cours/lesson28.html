<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 28 : WebSockets avec NestJS | Communication temps réel</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (pour formules, optionnel mais présent) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* transitions fluides pour les slides */
        .slide {
            transition: opacity 0.3s ease-in-out, transform 0.3s ease;
        }
        .slide-hidden {
            display: none;
            opacity: 0;
            transform: translateX(20px);
        }
        .slide-visible {
            display: block;
            opacity: 1;
            transform: translateX(0);
        }
        .slide-content {
            max-height: 70vh;
            overflow-y: auto;
            scrollbar-width: thin;
        }
        /* Personnalisation des couleurs (apaisantes) */
        body {
            background: #f1f5f9;
        }
        .card-bg {
            background: #ffffff;
        }
        .nav-btn {
            transition: all 0.2s;
        }
        .nav-btn:active {
            transform: scale(0.96);
        }
        .code-block {
            background: #0f172a;
            color: #e2e8f0;
            border-radius: 0.75rem;
            padding: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }
        @media (max-width: 640px) {
            .code-block {
                font-size: 0.7rem;
                padding: 0.75rem;
            }
            .slide-content {
                max-height: 65vh;
            }
        }
        .badge {
            background: #eef2ff;
            color: #4338ca;
        }
    </style>
</head>
<body class="font-sans antialiased p-4 md:p-6">

<div class="max-w-4xl mx-auto">
    <div class="card-bg rounded-2xl shadow-xl overflow-hidden border border-gray-100">
        <!-- En-tête avec progression -->
        <div class="bg-gradient-to-r from-emerald-700 to-teal-700 px-5 py-4 text-white">
            <div class="flex justify-between items-center flex-wrap gap-2">
                <div>
                    <p class="text-xs font-semibold uppercase tracking-wide opacity-80">NestJS - Communication temps réel</p>
                    <h1 class="text-xl md:text-2xl font-bold">WebSockets & Gateway</h1>
                    <p class="text-sm opacity-90 mt-1">Leçon 28 · @WebSocketGateway, événements, Socket.IO</p>
                </div>
                <div class="bg-white/20 backdrop-blur-sm px-3 py-1 rounded-full text-sm font-mono">
                    <span id="slideCounter">1</span> / <span id="totalSlides"></span>
                </div>
            </div>
            <div class="w-full bg-white/30 rounded-full h-1.5 mt-3">
                <div id="progressBar" class="bg-yellow-300 h-1.5 rounded-full w-0 transition-all duration-300"></div>
            </div>
        </div>

        <!-- Zone des slides -->
        <div id="slidesContainer" class="p-5 md:p-7 bg-gray-50">
            <div class="text-center py-10 text-gray-500">Chargement du cours...</div>
        </div>

        <!-- Navigation -->
        <div class="px-5 py-4 border-t border-gray-200 bg-white flex justify-between items-center flex-wrap gap-3">
            <button id="prevSlide" class="nav-btn bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-2 px-5 rounded-full transition flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
                Précédent
            </button>
            <div class="flex gap-1" id="dotsIndicator"></div>
            <button id="nextSlide" class="nav-btn bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 px-5 rounded-full transition flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed">
                Suivant
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
            </button>
        </div>
    </div>
    <p class="text-xs text-center text-gray-400 mt-5">📡 WebSockets - Applications temps réel (chat, notifications, jeux)</p>
</div>

<script>
    // Slides pour la leçon 28 : WebSockets avec NestJS
    const slidesData = [
        { // slide 1 : titre
            type: "title",
            title: "🔌 WebSockets avec NestJS",
            subtitle: "Créer des applications temps réel grâce aux Gateways et Socket.IO",
            icon: "💬"
        },
        { // slide 2 : objectifs pédagogiques
            type: "objectives",
            title: "🎯 Objectifs de la leçon",
            objectives: [
                "✅ Installer @nestjs/websockets et socket.io",
                "✅ Créer un Gateway avec @WebSocketGateway()",
                "✅ Gérer les événements avec @SubscribeMessage() et émettre des messages",
                "✅ Comprendre la différence entre WebSocket et HTTP classique",
                "✅ Construire un mini chat temps réel"
            ]
        },
        { // slide 3 : Qu'est-ce que WebSocket & pourquoi NestJS
            type: "content",
            title: "🧠 WebSockets : communication bidirectionnelle",
            content: `
                <p class="mb-3">Le protocole <strong class="text-emerald-700">WebSocket</strong> permet une communication en duplex intégral entre le client et le serveur, contrairement au HTTP qui suit un modèle requête/réponse. NestJS intègre de façon élégante les WebSockets via le package <code class="bg-gray-200 px-1 rounded">@nestjs/websockets</code>, avec une architecture similaire aux contrôleurs : les <strong class="text-emerald-700">Gateways</strong>.</p>
                <div class="bg-blue-50 border-l-4 border-blue-500 p-3 rounded-md mb-3">
                    <p class="text-sm font-semibold">✨ Avantages :</p>
                    <ul class="list-disc list-inside text-sm space-y-1">
                        <li>Latence très faible</li>
                        <li>Idéal pour : chat, notifications push, jeux en ligne, collaboration en direct</li>
                        <li>NestJS supporte plusieurs adaptateurs (Socket.IO, WS natif, etc.)</li>
                    </ul>
                </div>
                <p class="text-sm">Par défaut, NestJS utilise <strong>Socket.IO</strong> (riche en fonctionnalités : fallback, rooms, reconnection automatique).</p>
            `
        },
        { // slide 4 : Installation et création d'un Gateway
            type: "content",
            title: "📦 Installation & premier Gateway",
            content: `
                <p class="font-mono text-sm mb-2">Commande d'installation :</p>
                <div class="code-block mb-4">npm install @nestjs/websockets @nestjs/platform-socket.io socket.io</div>
                <p class="mb-2">Créez un Gateway avec la CLI : <code class="bg-gray-200 px-1 rounded">nest g gateway chat</code>. Exemple simple :</p>
                <div class="code-block">
                    // chat.gateway.ts<br>
                    import { WebSocketGateway, WebSocketServer, SubscribeMessage, MessageBody, ConnectedSocket } from '@nestjs/websockets';<br>
                    import { Server, Socket } from 'socket.io';<br><br>
                    @WebSocketGateway({ cors: { origin: '*' } })<br>
                    export class ChatGateway {<br>
                    &nbsp;&nbsp;@WebSocketServer() server: Server;<br><br>
                    &nbsp;&nbsp;@SubscribeMessage('message')<br>
                    &nbsp;&nbsp;handleMessage(@MessageBody() data: string, @ConnectedSocket() client: Socket): void {<br>
                    &nbsp;&nbsp;&nbsp;&nbsp;console.log(\`Message reçu: \${data}\`);<br>
                    &nbsp;&nbsp;&nbsp;&nbsp;this.server.emit('broadcast', \`Nouveau message: \${data}\`);<br>
                    &nbsp;&nbsp;}<br>
                    }
                </div>
                <p class="text-sm mt-2">💡 <code>@WebSocketServer()</code> donne accès à l'instance Socket.IO Server pour émettre vers tous les clients.</p>
            `
        },
        { // slide 5 : Écouter et émettre des événements
            type: "content",
            title: "📡 Gérer les événements (SubscribeMessage / emit)",
            content: `
                <p>Le décorateur <code>@SubscribeMessage('nomEvenement')</code> écoute un événement spécifique. La méthode peut renvoyer un résultat qui sera émis directement au client ou utiliser <code>server.emit</code> pour diffuser.</p>
                <div class="code-block my-3">
                    @SubscribeMessage('joinRoom')<br>
                    handleJoinRoom(@MessageBody() room: string, @ConnectedSocket() client: Socket) {<br>
                    &nbsp;&nbsp;client.join(room);<br>
                    &nbsp;&nbsp;client.to(room).emit('userJoined', \`Un utilisateur a rejoint \${room}\`);<br>
                    &nbsp;&nbsp;return { event: 'joined', data: room };<br>
                    }<br>
                </div>
                <p class="text-sm">🔁 <strong>Émettre depuis le serveur :</strong> <code>this.server.emit('event', payload)</code> → tous les clients connectés.<br>
                <strong>À un client spécifique :</strong> <code>client.emit('private', data)</code>.</p>
                <div class="bg-amber-50 p-2 rounded-md text-sm mt-2">📌 <span class="font-semibold">Bon à savoir :</span> Les Gateways peuvent aussi écouter les connexions/déconnexions avec <code>handleConnection(client: Socket)</code> et <code>handleDisconnect(client)</code>.</div>
            `
        },
        { // slide 6 : Exemple d'un mini chat interactif (conceptuel)
            type: "content",
            title: "💬 Exemple concret : serveur de chat minimal",
            content: `
                <p>Voici un Gateway complet pour un chat avec gestion de salons (rooms) :</p>
                <div class="code-block">
                    @WebSocketGateway({ cors: true })<br>
                    export class ChatGateway {<br>
                    &nbsp;&nbsp;@WebSocketServer() server: Server;<br><br>
                    &nbsp;&nbsp;@SubscribeMessage('sendMessage')<br>
                    &nbsp;&nbsp;handleSendMessage(@MessageBody() payload: { room: string; text: string; user: string }) {<br>
                    &nbsp;&nbsp;&nbsp;&nbsp;this.server.to(payload.room).emit('newMessage', {<br>
                    &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;user: payload.user, text: payload.text, time: new Date()<br>
                    &nbsp;&nbsp;&nbsp;&nbsp;});<br>
                    &nbsp;&nbsp;&nbsp;&nbsp;return { success: true };<br>
                    &nbsp;&nbsp;}<br>
                    &nbsp;&nbsp;@SubscribeMessage('joinRoom')<br>
                    &nbsp;&nbsp;handleJoinRoom(@MessageBody() room: string, @ConnectedSocket() client: Socket) {<br>
                    &nbsp;&nbsp;&nbsp;&nbsp;client.join(room);<br>
                    &nbsp;&nbsp;}<br>
                    }
                </div>
                <p class="text-sm mt-2">Côté client (JavaScript) : <code>socket.emit('joinRoom', 'general'); socket.emit('sendMessage', { room: 'general', text: 'Bonjour!', user: 'Alice' });</code></p>
                <div class="bg-indigo-50 p-2 rounded-md mt-2">✨ <span class="font-medium">Test facile :</span> Utilisez l'extension "Socket.IO Client" ou une simple page HTML avec Socket.IO client.</div>
            `
        },
        { // slide 7 : Différence avec les API REST et cas d'usage
            type: "content",
            title: "⚖️ WebSockets vs REST : quand choisir ?",
            content: `
                <div class="grid md:grid-cols-2 gap-4 text-sm">
                    <div class="bg-green-50 p-3 rounded-lg border border-green-200">
                        <p class="font-bold text-green-800">✅ WebSockets</p>
                        <ul class="list-disc list-inside space-y-1 mt-1">
                            <li>Temps réel bidirectionnel</li>
                            <li>Mise à jour instantanée (ex: trading, chat)</li>
                            <li>Surcoût faible après connexion</li>
                        </ul>
                    </div>
                    <div class="bg-blue-50 p-3 rounded-lg border border-blue-200">
                        <p class="font-bold text-blue-800">✅ REST (HTTP)</p>
                        <ul class="list-disc list-inside space-y-1 mt-1">
                            <li>Requête/réponse simple</li>
                            <li>Mise en cache facile</li>
                            <li>Standard universel</li>
                        </ul>
                    </div>
                </div>
                <p class="mt-4 text-sm">Combiner les deux est fréquent : API REST pour les opérations CRUD classiques, WebSocket pour les notifications / événements live. NestJS permet de cohabiter facilement.</p>
                <div class="bg-gray-100 p-3 rounded-lg mt-3">
                    <p class="font-mono text-xs">📌 <span class="font-semibold">Astuce pro :</span> Utilisez les <strong>adaptateurs</strong> (Redis) pour scaler les WebSockets sur plusieurs instances.</p>
                </div>
            `
        },
        { // slide 8 : Exercice pratique / à faire chez soi
            type: "content",
            title: "🏋️ Exercice pratique : votre premier chat en direct",
            content: `
                <p class="font-semibold">Objectif : Créer un mini salon de discussion avec NestJS Gateway et un front simple.</p>
                <ul class="list-decimal list-inside space-y-2 mt-2 text-sm">
                    <li>Générer un projet NestJS.</li>
                    <li>Installer les packages WebSocket.</li>
                    <li>Créer un Gateway Chat avec les méthodes <code>joinRoom</code> et <code>sendMessage</code>.</li>
                    <li>Créer un fichier HTML client avec Socket.IO (CDN) pour se connecter au serveur et afficher les messages.</li>
                </ul>
                <div class="code-block mt-3 text-xs">
                    &lt;script src="https://cdn.socket.io/4.5.0/socket.io.min.js"&gt;&lt;/script&gt;<br>
                    &lt;script&gt; const socket = io('http://localhost:3000'); socket.emit('joinRoom', 'dev'); socket.on('newMessage', (msg) => console.log(msg)); &lt;/script&gt;
                </div>
                <p class="text-sm mt-3">💡 Pour aller plus loin : gérez les noms d'utilisateur, les salons privés et l'historique.</p>
                <div class="bg-yellow-50 p-2 rounded-md mt-2">🚀 <strong>Défi supplémentaire :</strong> Ajouter un interceptor ou un guard WebSocket pour l'authentification JWT.</div>
            `
        }
    ];

    let currentIndex = 0;
    const totalSlides = slidesData.length;

    function renderSlides() {
        const $container = $("#slidesContainer");
        $container.empty();
        slidesData.forEach((slide, idx) => {
            let slideHtml = `<div class="slide slide-hidden" data-slide-index="${idx}" id="slide_${idx}"><div class="slide-content">`;
            if (slide.type === "title") {
                slideHtml += `
                    <div class="text-center py-6 md:py-10">
                        <div class="text-7xl mb-4">${slide.icon || "📡"}</div>
                        <h2 class="text-3xl md:text-4xl font-extrabold bg-gradient-to-r from-emerald-700 to-teal-700 bg-clip-text text-transparent">${slide.title}</h2>
                        <p class="text-gray-600 mt-4 text-lg">${slide.subtitle || ""}</p>
                        <div class="mt-8 flex justify-center">
                            <span class="bg-emerald-100 text-emerald-800 px-4 py-2 rounded-full text-sm">Gateway · Socket.IO</span>
                        </div>
                    </div>
                `;
            } else if (slide.type === "objectives") {
                slideHtml += `<h3 class="text-xl font-bold text-gray-800 border-l-4 border-emerald-500 pl-3 mb-4">${slide.title}</h3>
                              <div class="grid gap-3 md:grid-cols-2">`;
                slide.objectives.forEach(obj => {
                    slideHtml += `<div class="bg-white rounded-lg p-3 shadow-sm border border-gray-200 flex items-start gap-2"><span class="text-emerald-600 text-xl">✓</span><span>${obj}</span></div>`;
                });
                slideHtml += `</div>`;
            } else if (slide.type === "content") {
                slideHtml += `<h3 class="text-xl font-bold text-gray-800 border-l-4 border-emerald-500 pl-3 mb-4">${slide.title}</h3>
                              <div class="prose prose-sm max-w-none text-gray-700">${slide.content}</div>`;
            }
            slideHtml += `</div></div>`;
            $container.append(slideHtml);
        });
        updateSlideVisibility();
        updateDotsAndCounter();
    }

    function updateSlideVisibility() {
        $(".slide").each(function(idx) {
            if (idx === currentIndex) {
                $(this).removeClass("slide-hidden").addClass("slide-visible");
            } else {
                $(this).removeClass("slide-visible").addClass("slide-hidden");
            }
        });
        const progressPercent = ((currentIndex + 1) / totalSlides) * 100;
        $("#progressBar").css("width", `${progressPercent}%`);
        $("#slideCounter").text(currentIndex + 1);
        $("#totalSlides").text(totalSlides);
    }

    function updateDotsAndCounter() {
        const $dots = $("#dotsIndicator");
        $dots.empty();
        for (let i = 0; i < totalSlides; i++) {
            const dotClass = (i === currentIndex) ? "bg-emerald-600 w-3 h-3" : "bg-gray-300 w-2.5 h-2.5";
            $dots.append(`<button class="dot-nav mx-1 rounded-full ${dotClass} transition-all duration-200 focus:outline-none" data-index="${i}"></button>`);
        }
        $(".dot-nav").on("click", function() {
            let idx = parseInt($(this).data("index"));
            if (!isNaN(idx) && idx >= 0 && idx < totalSlides) {
                currentIndex = idx;
                updateSlideVisibility();
                updateDotsAndCounter();
            }
        });
        $("#prevSlide").prop("disabled", currentIndex === 0);
        $("#nextSlide").prop("disabled", currentIndex === totalSlides - 1);
    }

    function nextSlide() {
        if (currentIndex < totalSlides - 1) {
            currentIndex++;
            updateSlideVisibility();
            updateDotsAndCounter();
        }
    }
    function prevSlide() {
        if (currentIndex > 0) {
            currentIndex--;
            updateSlideVisibility();
            updateDotsAndCounter();
        }
    }

    $(document).ready(function() {
        renderSlides();
        $("#nextSlide").on("click", nextSlide);
        $("#prevSlide").on("click", prevSlide);
        $(document).on("keydown", function(e) {
            if (e.key === "ArrowRight") nextSlide();
            else if (e.key === "ArrowLeft") prevSlide();
        });
        if (window.MathJax) MathJax.typesetPromise();
    });
</script>
</body>
</html>
