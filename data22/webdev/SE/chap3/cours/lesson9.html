<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 9 : Patrons structurels - Génie Logiciel</title>
    <!-- Tailwind CSS + Font Awesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (pour formules si besoin) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* styles personnalisés légers pour améliorer le confort visuel */
        body {
            background: #f8fafc;
        }
        /* transition smooth pour les slides */
        .slide-container {
            transition: all 0.3s ease-in-out;
        }
        .slide {
            transition: opacity 0.4s ease;
        }
        /* navigation buttons hover effect */
        .nav-btn {
            transition: all 0.2s;
        }
        .nav-btn:hover {
            transform: scale(1.05);
        }
        /* code blocks simple style */
        .code-block {
            background: #1e293b;
            color: #e2e8f0;
            border-radius: 0.75rem;
            padding: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            overflow-x: auto;
        }
        /* rendre le texte plus lisible sur mobile */
        @media (max-width: 640px) {
            .prose p, .prose li {
                font-size: 0.9rem;
            }
            h3 {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body class="font-sans antialiased">

    <div class="max-w-5xl mx-auto px-4 py-6 md:py-10">
        <!-- Conteneur principal slide -->
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
            <!-- Entête avec progression -->
            <div class="bg-gradient-to-r from-indigo-700 to-blue-800 px-5 py-4 flex justify-between items-center text-white">
                <div>
                    <span class="text-xs font-semibold uppercase tracking-wide">Initiation au Génie logiciel</span>
                    <h1 class="text-lg md:text-xl font-bold leading-tight mt-1">Patrons de conception – Structurels</h1>
                </div>
                <div class="bg-white/20 rounded-full px-3 py-1 text-sm font-medium">
                    <span id="slideCounter">1</span> / <span id="totalSlides"></span>
                </div>
            </div>

            <!-- zone de contenu dynamique (slides) -->
            <div id="slidesWrapper" class="relative min-h-[450px] md:min-h-[500px] bg-gray-50">
                <!-- Les slides seront injectées ici -->
            </div>

            <!-- navigation + indicateurs -->
            <div class="bg-gray-100 px-5 py-4 flex flex-col sm:flex-row justify-between items-center gap-3 border-t border-gray-200">
                <div class="flex gap-3">
                    <button id="prevBtn" class="nav-btn bg-white hover:bg-gray-200 text-gray-800 font-semibold py-2 px-5 rounded-full shadow-sm transition disabled:opacity-40 disabled:cursor-not-allowed">◀ Précédent</button>
                    <button id="nextBtn" class="nav-btn bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-5 rounded-full shadow-sm transition">Suivant ▶</button>
                </div>
                <div class="flex gap-2 flex-wrap justify-center" id="dotIndicator"></div>
            </div>
        </div>

        <!-- petite note pédagogique -->
        <p class="text-center text-xs text-gray-500 mt-6">✨ Leçon 9 — Adapter, Pont, Composite, Décorateur, Façade, Proxy & Flyweight</p>
    </div>

    <script>
        // Définition des slides: titre, objectifs, contenu (HTML ou texte enrichi)
        // Nous structurons la leçon 9 : Patrons structurels (Adapter, Bridge, Composite, Decorator, Facade, Proxy, Flyweight)
        // slide 1: titre + présentation leçon
        // slide 2: objectifs pédagogiques
        // slide 3 à ... chaque patron ou groupe avec explications simples, schémas ascii ou descriptions
        
        const slidesData = [
            { // slide 0 : titre
                type: "title",
                title: "Patrons de conception structurels",
                subtitle: "Adapter • Bridge • Composite • Decorator • Facade • Proxy • Flyweight",
                description: "Des solutions éprouvées pour organiser les classes et objets afin de créer des architectures flexibles et maintenables."
            },
            { // slide 1 : objectifs
                type: "objectives",
                items: [
                    "Comprendre le rôle des patrons structurels dans l'architecture logicielle.",
                    "Maîtriser le pattern Adapter (adaptateur) pour faire collaborer des interfaces incompatibles.",
                    "Utiliser Bridge (pont) pour séparer abstraction et implémentation.",
                    "Appliquer Composite pour traiter des objets individuels et compositions de manière uniforme.",
                    "Ajouter dynamiquement des responsabilités avec Decorator.",
                    "Simplifier l’accès à un système complexe grâce à Façade.",
                    "Contrôler l’accès à un objet avec Proxy, et optimiser la mémoire avec Flyweight."
                ]
            },
            { // slide 2 : Adapter
                type: "content",
                patron: "Adapter (Adaptateur)",
                definition: "Convertit l'interface d'une classe existante en une interface attendue par le client. Permet à des classes incompatibles de collaborer.",
                schema: "📦 [Client] → (interface cible) ← [Adapter] → [Adaptee (librairie existante)]",
                exemple: "Exemple: une application veut utiliser une API de paiement externe avec une interface différente. L'Adapter fait le pont sans modifier le code existant.",
                when: "✅ Quand vous voulez réutiliser une classe existante dont l'interface ne correspond pas à vos besoins."
            },
            { // slide 3 : Bridge
                type: "content",
                patron: "Bridge (Pont)",
                definition: "Sépare une abstraction de son implémentation afin que les deux puissent varier indépendamment.",
                schema: "🔗 [Abstraction] ◇──→ [Implémenteur]\n    ↑                    ↑\n[AbstractionConcrète]  [ImplémentationConcrète]",
                exemple: "Exemple: Formes (cercle, carré) et couleurs (rouge, bleu). Au lieu de créer 4 classes, on sépare forme et couleur, et on les combine dynamiquement.",
                when: "✅ Utile lorsque vous avez des hiérarchies croisées et que vous voulez éviter une explosion de sous-classes."
            },
            { // slide 4 : Composite
                type: "content",
                patron: "Composite (Composition)",
                definition: "Permet de composer des objets en structures arborescentes pour représenter des hiérarchies partie-tout. Les clients traitent de manière uniforme les objets individuels et leurs compositions.",
                schema: "📁 [Composant] ← [Feuille]\n    ↑\n [Composite] (contient plusieurs Composants)",
                exemple: "Exemple: Système de fichiers : un dossier contient des fichiers et d'autres dossiers ; on peut appliquer des opérations (taille, suppression) sur chaque élément.",
                when: "✅ Idéal pour des menus, des interfaces graphiques ou des structures récursives."
            },
            { // slide 5 : Decorator
                type: "content",
                patron: "Decorator (Décorateur)",
                definition: "Attache dynamiquement de nouvelles responsabilités à un objet. Fournit une alternative flexible à l'héritage pour étendre les fonctionnalités.",
                schema: "🎨 [ComposantConcret] ← [Decorateur] → ajoute comportement (encapsulation)",
                exemple: "Exemple: Dans un système de café, on peut ajouter du lait, du sucre ou de la chantilly sans modifier la classe Café de base.",
                when: "✅ À utiliser pour ajouter des options sans multiplier les sous-classes, respectant le principe Ouvert/Fermé."
            },
            { // slide 6 : Facade
                type: "content",
                patron: "Facade (Façade)",
                definition: "Fournit une interface unifiée et simplifiée à un ensemble d'interfaces complexes d'un sous-système.",
                schema: "🏠 [Client] → [Facade] → (sous-systèmes complexes: librairieA, baseDonnées, logging...)",
                exemple: "Exemple: Dans une application de réservation, une classe Facade gère l'appel à plusieurs services (vols, hôtels, voitures) en une seule méthode.",
                when: "✅ Très utile pour découpler les clients d'un système complexe et améliorer la lisibilité."
            },
            { // slide 7 : Proxy
                type: "content",
                patron: "Proxy (Mandataire)",
                definition: "Fournit un substitut ou un placeholder pour contrôler l'accès à un objet réel (p. ex. paresseux, sécurité, journalisation).",
                schema: "🔒 [Client] → [Proxy] → (contrôle d'accès) → [ObjetRéel]",
                exemple: "Exemple: Une image haute résolution chargée uniquement quand elle est affichée (proxy virtuel). Ou un proxy de sécurité qui vérifie les droits.",
                when: "✅ Pour gérer les accès distants, les objets coûteux à créer ou des contrôles d'authentification."
            },
            { // slide 8 : Flyweight
                type: "content",
                patron: "Flyweight (Poids-mouche)",
                definition: "Partage efficacement de grandes quantités d'objets fins (état intrinsèque) pour économiser la mémoire. L'état extrinsèque est passé par le client.",
                schema: "♻️ [FlyweightFactory] → (objets partagés) ← [Client] avec données contextuelles",
                exemple: "Exemple: Éditeur de texte : chaque caractère peut être partagé (flyweight) avec sa police, sa couleur ; la position est donnée de l'extérieur.",
                when: "✅ Utilisez-le quand vous avez un grand nombre d'objets et que le coût mémoire est critique."
            },
            { // slide 9 : résumé & mise en pratique
                type: "summary",
                title: "Récapitulons les patrons structurels",
                points: [
                    "🔌 Adapter : rend compatible des interfaces différentes.",
                    "🌉 Bridge : découple abstraction de l'implémentation.",
                    "🌿 Composite : traite des arbres d'objets uniformément.",
                    "🎀 Decorator : ajoute des fonctionnalités sans héritage.",
                    "🏛️ Facade : simplifie un système complexe.",
                    "🛡️ Proxy : contrôle l'accès à un objet.",
                    "🪶 Flyweight : optimise la mémoire par partage."
                ],
                note: "Ces patrons aident à concevoir des systèmes flexibles, maintenables et évolutifs. À vous de les pratiquer sur des petits projets !"
            }
        ];

        let currentSlideIndex = 0;
        let totalSlides = slidesData.length;
        
        // Rendu d'un slide en fonction de son type
        function renderSlide(index) {
            const slide = slidesData[index];
            if (!slide) return;
            let htmlContent = '';
            
            if (slide.type === 'title') {
                htmlContent = `
                    <div class="flex flex-col items-center justify-center text-center p-6 md:p-12 min-h-[450px] bg-gradient-to-br from-blue-50 to-indigo-50">
                        <div class="max-w-2xl">
                            <div class="inline-block px-4 py-1 rounded-full bg-indigo-100 text-indigo-800 text-sm font-semibold mb-4">Patrons de conception — Structurels</div>
                            <h2 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4">${escapeHtml(slide.title)}</h2>
                            <p class="text-xl md:text-2xl font-medium text-indigo-700 mb-6">${escapeHtml(slide.subtitle)}</p>
                            <div class="h-1 w-20 bg-indigo-400 mx-auto my-4 rounded-full"></div>
                            <p class="text-gray-600 text-lg">${escapeHtml(slide.description)}</p>
                            <div class="mt-8 flex flex-wrap justify-center gap-2 text-sm text-gray-500">
                                <span class="bg-white px-3 py-1 rounded-full shadow-sm">📘 7 patrons clés</span>
                                <span class="bg-white px-3 py-1 rounded-full shadow-sm">🏗️ Architecture logicielle</span>
                            </div>
                        </div>
                    </div>
                `;
            } 
            else if (slide.type === 'objectives') {
                htmlContent = `
                    <div class="p-6 md:p-10">
                        <h3 class="text-2xl font-bold text-indigo-800 border-l-4 border-indigo-600 pl-4 mb-6">🎯 Objectifs d’apprentissage</h3>
                        <ul class="space-y-3">
                            ${slide.items.map(item => `<li class="flex items-start gap-3 text-gray-700"><span class="text-indigo-600 text-xl leading-5">✓</span> <span class="text-base md:text-lg">${escapeHtml(item)}</span></li>`).join('')}
                        </ul>
                        <div class="mt-8 p-4 bg-indigo-50 rounded-xl text-indigo-800 text-sm italic">
                            💡 À la fin de cette leçon, vous saurez choisir et implémenter les patrons structurels adaptés à vos besoins.
                        </div>
                    </div>
                `;
            }
            else if (slide.type === 'content') {
                htmlContent = `
                    <div class="p-6 md:p-8">
                        <div class="flex items-center gap-2 mb-4 flex-wrap">
                            <span class="bg-indigo-100 text-indigo-800 text-xs font-semibold px-3 py-1 rounded-full">Patron</span>
                            <h3 class="text-2xl md:text-3xl font-bold text-gray-800">${escapeHtml(slide.patron)}</h3>
                        </div>
                        <div class="prose prose-lg max-w-none text-gray-700 space-y-4">
                            <p><strong class="text-indigo-700">📖 Définition :</strong> ${escapeHtml(slide.definition)}</p>
                            <div class="bg-gray-800 text-green-200 p-3 rounded-lg font-mono text-sm overflow-x-auto whitespace-pre-wrap">${escapeHtml(slide.schema)}</div>
                            <p><strong class="text-indigo-700">🧩 Exemple concret :</strong> ${escapeHtml(slide.exemple)}</p>
                            <div class="bg-emerald-50 border-l-4 border-emerald-500 p-4 rounded-r-lg">
                                <p class="font-semibold text-emerald-800">📌 Quand l'utiliser ?</p>
                                <p class="text-gray-700">${escapeHtml(slide.when)}</p>
                            </div>
                        </div>
                        <!-- Petit dessin ASCII amélioré si besoin, mais on garde simple -->
                        <div class="mt-5 text-center text-xs text-gray-400 border-t pt-4">Illustration schématique du patron ${escapeHtml(slide.patron)}</div>
                    </div>
                `;
            }
            else if (slide.type === 'summary') {
                htmlContent = `
                    <div class="p-6 md:p-10 bg-white">
                        <h3 class="text-2xl font-bold text-gray-800 mb-4">📚 ${escapeHtml(slide.title)}</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-6">
                            ${slide.points.map(point => `<div class="bg-gray-50 p-3 rounded-lg shadow-sm flex items-center gap-2"><span class="text-indigo-600 font-bold">➤</span><span>${escapeHtml(point)}</span></div>`).join('')}
                        </div>
                        <div class="bg-gradient-to-r from-indigo-50 to-purple-50 p-5 rounded-xl italic border border-indigo-200">
                            <p class="font-medium text-indigo-900">✨ ${escapeHtml(slide.note)}</p>
                        </div>
                        <div class="mt-6 text-center text-sm text-gray-500">
                            🧠 Pour aller plus loin : essayez d'implémenter un mini-projet (ex: éditeur de texte ou système de paiement) avec ces patrons.
                        </div>
                    </div>
                `;
            }
            else {
                htmlContent = `<div class="p-6">Contenu non disponible</div>`;
            }
            
            // On enveloppe dans un conteneur slide avec animation
            return `<div class="slide fade-in">${htmlContent}</div>`;
        }
        
        // Helper pour éviter les injections, même si nos données sont safe
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }
        
        // Mettre à jour l'affichage
        function updateSlide() {
            const wrapper = $('#slidesWrapper');
            if (!wrapper) return;
            const slideHtml = renderSlide(currentSlideIndex);
            wrapper.html(slideHtml);
            $('#slideCounter').text(currentSlideIndex + 1);
            updateDots();
            updateButtons();
            // Scroll vers le haut du slide pour le confort mobile
            $('html, body').animate({ scrollTop: $('.max-w-5xl').offset().top - 10 }, 100);
        }
        
        function updateDots() {
            const container = $('#dotIndicator');
            container.empty();
            for (let i = 0; i < totalSlides; i++) {
                const dot = $('<button>')
                    .addClass(`w-2.5 h-2.5 rounded-full transition-all mx-1 ${i === currentSlideIndex ? 'bg-indigo-700 w-4' : 'bg-gray-400 hover:bg-gray-500'}`)
                    .attr('data-index', i);
                dot.on('click', function() {
                    const idx = parseInt($(this).attr('data-index'));
                    if (!isNaN(idx) && idx !== currentSlideIndex && idx >=0 && idx < totalSlides) {
                        currentSlideIndex = idx;
                        updateSlide();
                    }
                });
                container.append(dot);
            }
        }
        
        function updateButtons() {
            $('#prevBtn').prop('disabled', currentSlideIndex === 0);
            $('#nextBtn').text(currentSlideIndex === totalSlides - 1 ? '🏁 Terminer' : 'Suivant ▶');
        }
        
        // Navigation événements
        function nextSlide() {
            if (currentSlideIndex < totalSlides - 1) {
                currentSlideIndex++;
                updateSlide();
            } else {
                // fin du cours : message de félicitations
                alert('🎉 Félicitations ! Vous avez terminé la leçon 9 sur les patrons structurels. Continuez à pratiquer pour les maîtriser.');
            }
        }
        
        function prevSlide() {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                updateSlide();
            }
        }
        
        // Initialisation et gestionnaire d'événements jQuery
        $(document).ready(function() {
            totalSlides = slidesData.length;
            $('#totalSlides').text(totalSlides);
            updateSlide();
            
            $('#nextBtn').on('click', nextSlide);
            $('#prevBtn').on('click', prevSlide);
            
            // keyboard navigation (gauche/droite)
            $(document).on('keydown', function(e) {
                if (e.key === 'ArrowLeft') {
                    prevSlide();
                    e.preventDefault();
                } else if (e.key === 'ArrowRight') {
                    nextSlide();
                    e.preventDefault();
                }
            });
            
            // optimisation mobile: ajuster le min-height au besoin
            const adjustHeight = () => {
                let slideContent = $('.slide');
                if (slideContent.length) {
                    // rien de particulier, tailwind gère bien
                }
            };
            $(window).on('resize', adjustHeight);
            adjustHeight();
        });
        
        // ajout animation fadeIn (simple)
        const styleAnim = document.createElement('style');
        styleAnim.textContent = `
            .fade-in {
                animation: fadeSlide 0.35s ease-out;
            }
            @keyframes fadeSlide {
                from { opacity: 0; transform: translateY(8px); }
                to { opacity: 1; transform: translateY(0); }
            }
        `;
        document.head.appendChild(styleAnim);
    </script>
</body>
</html>
