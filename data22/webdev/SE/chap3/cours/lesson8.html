<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 8 : Patrons de création (Singleton, Factory, Builder, Prototype) - Génie Logiciel</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (pour formules éventuelles) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <!-- Personnalisation Tailwind : couleurs douces et lisibles -->
    <style>
        /* Ajustements pour un meilleur contraste et couleurs apaisantes */
        body {
            background: #f8fafc; /* fond très clair */
        }
        .slide-card {
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
        }
        /* Pour les petits écrans: boutons de navigation bien tactiles */
        .nav-btn {
            min-width: 44px;
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .progress-bar {
            transition: width 0.3s ease;
        }
        /* code blocks style simple */
        pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 1rem;
            border-radius: 0.75rem;
            overflow-x: auto;
            font-size: 0.85rem;
            margin: 1rem 0;
        }
        code {
            font-family: 'Courier New', monospace;
        }
        .slide-content h3 {
            font-weight: 600;
            font-size: 1.4rem;
            margin-top: 0.5rem;
            margin-bottom: 0.75rem;
            color: #0f172a;
        }
        .slide-content p {
            margin-bottom: 0.75rem;
            line-height: 1.5;
        }
        .badge-pattern {
            background: #e0f2fe;
            color: #0369a1;
            padding: 0.2rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        @media (max-width: 640px) {
            .slide-card {
                margin-left: 0.5rem;
                margin-right: 0.5rem;
            }
            .title-main {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body class="font-sans antialiased">

    <div class="max-w-4xl mx-auto px-3 sm:px-6 py-6 sm:py-10">
        <!-- Conteneur slide principal -->
        <div class="relative">
            <!-- Slide dynamique -->
            <div id="slideContainer" class="slide-card bg-white rounded-2xl border border-gray-100 overflow-hidden">
                <!-- contenu injecté par jQuery -->
            </div>

            <!-- Indicateur de progression et navigation -->
            <div class="flex flex-wrap justify-between items-center gap-3 mt-6">
                <div class="flex gap-2">
                    <button id="prevBtn" class="nav-btn bg-white border border-gray-300 hover:bg-gray-100 text-gray-800 font-medium py-2 px-4 rounded-full transition shadow-sm">← Précédent</button>
                    <button id="nextBtn" class="nav-btn bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-5 rounded-full transition shadow-sm">Suivant →</button>
                </div>
                <div class="text-sm text-gray-500 bg-gray-100 px-3 py-1 rounded-full">
                    <span id="slideCounter">1</span> / <span id="totalSlides">0</span>
                </div>
            </div>
            <!-- Barre de progression -->
            <div class="w-full bg-gray-200 rounded-full h-2 mt-4 overflow-hidden">
                <div id="progressFill" class="progress-bar bg-indigo-500 h-2 rounded-full" style="width: 0%;"></div>
            </div>
        </div>
    </div>

    <script>
        // Définition des slides pour la leçon 8: "Patrons de création"
        // Contenu pédagogique adapté au Cameroun, langage simple, exemples concrets.
        const slidesData = [
            {   // slide 0: titre
                type: "title",
                title: "Leçon 8 : Patrons de création",
                subtitle: "Singleton, Factory, Abstract Factory, Builder et Prototype",
                description: "Apprenez à mieux construire vos objets en Génie Logiciel"
            },
            {   // slide 1: objectifs pédagogiques
                type: "objectives",
                objectives: [
                    "Comprendre ce qu'est un patron de création et son utilité",
                    "Maîtriser le Singleton : une instance unique globale",
                    "Utiliser Factory Method et Abstract Factory pour créer des objets sans spécifier leurs classes concrètes",
                    "Appliquer le Builder pour construire des objets complexes étape par étape",
                    "Découvrir le Prototype pour cloner des objets efficacement"
                ]
            },
            {   // slide 2: introduction aux patrons de création
                type: "content",
                title: "🔧 Qu'est-ce qu'un patron de création ?",
                content: `<p>Les patrons de conception (design patterns) sont des solutions réutilisables à des problèmes courants en programmation. Les <strong>patrons de création</strong> concernent la <strong>création d'objets</strong>. Ils rendent le code plus flexible et découplé.</p>
                <p>Pourquoi les utiliser ? Éviter le "new" sauvage, centraliser la logique d'instanciation, faciliter la maintenance. Imaginez que vous construisez une application pour gérer une école au Cameroun : vous aurez besoin d'élèves, professeurs, cours... Les patrons de création vous aideront à organiser tout ça proprement.</p>
                <div class="bg-blue-50 p-3 rounded-lg mt-2"><span class="font-semibold">💡 Exemple concret:</span> Fabriquer des objets similaires sans répéter du code.</div>`
            },
            {   // slide 3: Singleton
                type: "content",
                title: "👤 Singleton (Instance unique)",
                content: `<p><span class="badge-pattern">Singleton</span> Garantit qu'une classe n'a qu'une seule instance et fournit un point d'accès global. Parfait pour les gestionnaires de configuration, les connexions à une base de données, ou un logger.</p>
                <pre><code>// Exemple simple en JavaScript (ES6)
class DatabaseConnection {
  constructor() {
    if (DatabaseConnection.instance) {
      return DatabaseConnection.instance;
    }
    this.connection = "Connecté à la BDD";
    DatabaseConnection.instance = this;
  }
  getConnection() { return this.connection; }
}
const db1 = new DatabaseConnection();
const db2 = new DatabaseConnection();
console.log(db1 === db2); // true (même instance)</code></pre>
                <p>✅ Avantages : économie de ressources, accès global contrôlé. ⚠️ Attention : peut rendre les tests difficiles (on l'utilise avec modération).</p>`
            },
            {   // slide 4: Factory Method
                type: "content",
                title: "🏭 Factory Method (Méthode de fabrique)",
                content: `<p>Définit une interface pour créer un objet, mais laisse les sous-classes décider quelle classe instancier.</p>
                <p><strong>Exemple :</strong> Une application de transport. Vous avez une classe <code>Transporteur</code> avec la méthode <code>creerVehicule()</code>. Les classes filles (Camion, Bateau, Moto) implémentent la création.</p>
                <pre><code>// Factory Method
class Vehicule {
  livrer() { throw new Error("Méthode abstraite"); }
}
class Camion extends Vehicule {
  livrer() { return "Livraison par route (Camion)"; }
}
class Bateau extends Vehicule {
  livrer() { return "Livraison par fleuve (Bateau)"; }
}
class Logistique {
  creerVehicule() { return new Camion(); } // par défaut
  planifierLivraison() {
    const vehicule = this.creerVehicule();
    return vehicule.livrer();
  }
}
// Utilisation
const logistique = new Logistique();
console.log(logistique.planifierLivraison());</code></pre>
                <p>🎯 Utile quand le code doit fonctionner avec différents types d'objets sans connaître leurs classes exactes.</p>`
            },
            {   // slide 5: Abstract Factory
                type: "content",
                title: "🏭🏭 Abstract Factory (Fabrique abstraite)",
                content: `<p>Crée des familles d'objets liés ou dépendants sans spécifier leurs classes concrètes. Idéal pour des interfaces graphiques (thèmes) ou des produits qui doivent fonctionner ensemble.</p>
                <pre><code>// Exemple: Mobilier pour différents styles
class ChaiseModerne { style() { return "Chaise moderne"; } }
class TableModerne { style() { return "Table moderne"; } }
class ChaiseClassique { style() { return "Chaise classique"; } }
class TableClassique { style() { return "Table classique"; } }

// Fabrique abstraite
class MeubleFactory {
  creerChaise() {}
  creerTable() {}
}
class FabriqueModerne extends MeubleFactory {
  creerChaise() { return new ChaiseModerne(); }
  creerTable() { return new TableModerne(); }
}
class FabriqueClassique extends MeubleFactory {
  creerChaise() { return new ChaiseClassique(); }
  creerTable() { return new TableClassique(); }
}
// Utilisation
const factory = new FabriqueModerne();
console.log(factory.creerChaise().style());</code></pre>
                <p>✨ Différence avec Factory Method : Abstract Factory produit plusieurs types d'objets (une famille).</p>`
            },
            {   // slide 6: Builder
                type: "content",
                title: "🏗️ Builder (Constructeur)",
                content: `<p>Sépare la construction d'un objet complexe de sa représentation, permettant la même construction pour différentes représentations. Parfait quand un objet a beaucoup de paramètres optionnels.</p>
                <pre><code>// Exemple: Construction d'un ordinateur
class Ordinateur {
  constructor() {
    this.cpu = "";
    this.ram = "";
    this.stockage = "";
    this.gpu = "";
  }
}
class OrdinateurBuilder {
  constructor() { this.ordi = new Ordinateur(); }
  setCPU(cpu) { this.ordi.cpu = cpu; return this; }
  setRAM(ram) { this.ordi.ram = ram; return this; }
  setStockage(stockage) { this.ordi.stockage = stockage; return this; }
  setGPU(gpu) { this.ordi.gpu = gpu; return this; }
  build() { return this.ordi; }
}
// Utilisation fluide
const monPC = new OrdinateurBuilder()
  .setCPU("Intel i7")
  .setRAM("16 Go")
  .setStockage("1 To SSD")
  .build();
console.log(monPC);</code></pre>
                <p>📌 Builder évite les constructeurs avec une longue liste de paramètres. Pratique pour assembler pas à pas.</p>`
            },
            {   // slide 7: Prototype
                type: "content",
                title: "🧬 Prototype (Clonage)",
                content: `<p>Permet de créer de nouveaux objets en <strong>clonant</strong> un prototype existant plutôt qu'en instanciant une classe. Évite le coût de création complexe.</p>
                <pre><code>// Exemple: Clone d'une forme
class Forme {
  constructor(couleur) { this.couleur = couleur; }
  clone() { return new Forme(this.couleur); }
  afficher() { return \`Forme \${this.couleur}\`; }
}
class Cercle extends Forme {
  constructor(couleur, rayon) {
    super(couleur);
    this.rayon = rayon;
  }
  clone() { return new Cercle(this.couleur, this.rayon); }
}
const cercleOriginal = new Cercle("Rouge", 10);
const cercleClone = cercleOriginal.clone();
console.log(cercleClone.afficher()); // Forme Rouge
console.log(cercleClone.rayon); // 10</code></pre>
                <p>💡 Avantage : performances améliorées si l'initialisation est lourde. Utilisez-le quand vous avez beaucoup d'objets similaires.</p>`
            },
            {   // slide 8: résumé & comparaison
                type: "content",
                title: "📚 Récapitulatif des patrons de création",
                content: `<div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <div class="bg-gray-50 p-3 rounded-lg"><span class="font-bold">Singleton</span> : Une seule instance globale (ex: configuration).</div>
                <div class="bg-gray-50 p-3 rounded-lg"><span class="font-bold">Factory Method</span> : Délègue la création aux sous-classes.</div>
                <div class="bg-gray-50 p-3 rounded-lg"><span class="font-bold">Abstract Factory</span> : Crée des familles d'objets compatibles.</div>
                <div class="bg-gray-50 p-3 rounded-lg"><span class="font-bold">Builder</span> : Construit des objets complexes étape par étape.</div>
                <div class="bg-gray-50 p-3 rounded-lg"><span class="font-bold">Prototype</span> : Clone des objets existants.</div>
                </div>
                <p class="mt-3">🧠 <strong>À retenir :</strong> Choisissez le patron selon le problème : besoin d'unicité → Singleton, création flexible → Factory, assemblage complexe → Builder, duplication → Prototype.</p>`
            },
            {   // slide 9: Exercice / application pratique (pour engager)
                type: "content",
                title: "✏️ Petit exercice pratique",
                content: `<p>Imaginez que vous développez un système de gestion de <strong>restaurant scolaire</strong>. Identifiez quel patron utiliser pour :</p>
                <ul class="list-disc pl-5 mb-3 space-y-1">
                    <li>Gérer la configuration unique de la cantine (heures d'ouverture, menu du jour) → <span class="bg-yellow-100 px-1">Singleton</span></li>
                    <li>Préparer différents types de repas (plat végétarien, standard, enfant) sans modifier le code client → <span class="bg-yellow-100 px-1">Factory Method</span></li>
                    <li>Créer un menu complet (entrée+plat+dessert) avec plusieurs options optionnelles → <span class="bg-yellow-100 px-1">Builder</span></li>
                    <li>Cloner une recette type pour la personnaliser → <span class="bg-yellow-100 px-1">Prototype</span></li>
                </ul>
                <p>Réfléchissez à des exemples dans vos projets de développement Web !</p>`
            },
            {   // slide 10: conclusion
                type: "content",
                title: "🎯 Conclusion & prochaines étapes",
                content: `<p>Les patrons de création rendent votre code plus modulaire et évolutif. En maîtrisant Singleton, Factory, Builder et Prototype, vous serez capable de concevoir des applications robustes.</p>
                <p>💻 <strong>Conseil de l'enseignant :</strong> Entraînez-vous à implémenter ces patrons dans vos projets personnels ou en équipe. Utilisez-les avec discernement pour éviter la sur-ingénierie.</p>
                <p>📖 Prochaine leçon : Patrons structurels (Adapter, Composite, Decorator...)</p>
                <div class="mt-4 text-center text-indigo-700 italic">"Bien construire ses objets, c'est déjà bien coder !"</div>`
            }
        ];

        let currentSlideIndex = 0;
        let totalSlides = slidesData.length;

        // Fonction pour générer le HTML d'un slide selon son type
        function renderSlide(index) {
            const slide = slidesData[index];
            if (!slide) return "<div>Erreur slide</div>";
            
            if (slide.type === "title") {
                return `
                    <div class="p-6 sm:p-10 text-center bg-gradient-to-br from-indigo-50 to-white">
                        <span class="inline-block px-3 py-1 rounded-full bg-indigo-100 text-indigo-800 text-sm font-semibold mb-4">Leçon 8 · Génie Logiciel</span>
                        <h1 class="title-main text-3xl sm:text-4xl font-extrabold text-gray-900 mb-4">${escapeHtml(slide.title)}</h1>
                        <p class="text-xl text-gray-600 mb-6">${escapeHtml(slide.subtitle)}</p>
                        <p class="text-gray-500 max-w-md mx-auto">${escapeHtml(slide.description)}</p>
                        <div class="mt-8 text-indigo-500 text-sm">👨‍🏫 Cours pour la classe Développement Web - Cameroun</div>
                    </div>
                `;
            } 
            else if (slide.type === "objectives") {
                let objectivesHtml = `<div class="p-6 sm:p-8"><h2 class="text-2xl font-bold text-gray-800 border-l-4 border-indigo-500 pl-3 mb-5">🎯 Objectifs de la leçon</h2><ul class="space-y-3">`;
                slide.objectives.forEach(obj => {
                    objectivesHtml += `<li class="flex items-start gap-2"><span class="text-indigo-600 text-lg">✓</span> <span class="text-gray-700">${escapeHtml(obj)}</span></li>`;
                });
                objectivesHtml += `</ul><div class="mt-6 bg-indigo-50 p-3 rounded-lg text-sm text-indigo-800">📌 À la fin de cette leçon, vous saurez utiliser ces patrons dans vos projets web.</div></div>`;
                return objectivesHtml;
            }
            else if (slide.type === "content") {
                return `
                    <div class="p-6 sm:p-8 slide-content">
                        <h2 class="text-2xl font-bold text-gray-800 border-b border-gray-200 pb-2 mb-4">${escapeHtml(slide.title)}</h2>
                        <div>${slide.content}</div>
                    </div>
                `;
            }
            return "<div>Type de slide inconnu</div>";
        }

        // petite fonction anti-XSS
        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }

        // mise à jour de l'affichage et des contrôles
        function updateSlide() {
            const htmlContent = renderSlide(currentSlideIndex);
            $("#slideContainer").fadeOut(150, function() {
                $(this).html(htmlContent).fadeIn(150);
            });
            $("#slideCounter").text(currentSlideIndex + 1);
            $("#totalSlides").text(totalSlides);
            const progressPercent = ((currentSlideIndex) / (totalSlides - 1)) * 100;
            $("#progressFill").css("width", progressPercent + "%");
            
            // Désactiver/activer les boutons si nécessaire
            if (currentSlideIndex === 0) {
                $("#prevBtn").prop("disabled", false).removeClass("opacity-50 cursor-not-allowed").addClass("opacity-100");
            } else {
                $("#prevBtn").prop("disabled", false);
            }
            if (currentSlideIndex === totalSlides - 1) {
                $("#nextBtn").prop("disabled", false).text("Terminé ✅");
            } else {
                $("#nextBtn").prop("disabled", false).text("Suivant →");
            }
            // Si on veut rendre disabled style, mais on gère le click
        }

        // Navigation
        function nextSlide() {
            if (currentSlideIndex < totalSlides - 1) {
                currentSlideIndex++;
                updateSlide();
                // scroll en haut pour mobile
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                // Fin du cours : petit message
                if (currentSlideIndex === totalSlides - 1) {
                    alert("🎉 Félicitations ! Vous avez terminé la leçon sur les patrons de création. N'hésitez pas à revoir les exemples.");
                }
            }
        }

        function prevSlide() {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                updateSlide();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        // Gestion clavier (flèches gauche/droite)
        $(document).keydown(function(e) {
            if (e.key === "ArrowLeft") {
                prevSlide();
                e.preventDefault();
            } else if (e.key === "ArrowRight") {
                nextSlide();
                e.preventDefault();
            }
        });

        // Initialisation
        $(document).ready(function() {
            updateSlide();
            $("#prevBtn").on("click", prevSlide);
            $("#nextBtn").on("click", nextSlide);
        });
    </script>
</body>
</html>
