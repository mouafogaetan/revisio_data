<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 30 : Maintenir et améliorer un code existant | Génie Logiciel</title>
    <!-- Tailwind CSS + Font Awesome (optionnel pour icônes) + Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (pour formules si besoin, mais utile pour affichage propre) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* personnalisations douces pour accessibilité et confort visuel */
        body {
            background: #fef9e8;  /* fond très doux, beige clair */
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        }
        .slide-container {
            transition: all 0.2s ease;
        }
        .slide-card {
            background: rgba(255, 255, 245, 0.98);
            backdrop-filter: blur(0px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
        }
        .nav-btn {
            transition: all 0.2s ease;
        }
        .nav-btn:hover:not(:disabled) {
            transform: scale(1.02);
            background-color: #1e3a8a;
        }
        .progress-bar {
            transition: width 0.3s ease;
        }
        /* code small style */
        .code-badge {
            background: #1e293b;
            color: #e2e8f0;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
        }
        @media (max-width: 640px) {
            .slide-card {
                border-radius: 1.5rem;
                margin-left: 0.5rem;
                margin-right: 0.5rem;
            }
            h1 {
                font-size: 1.8rem;
            }
            h2 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body class="antialiased">

    <main class="max-w-5xl mx-auto px-3 sm:px-5 py-6 md:py-10">
        <!-- Conteneur slides -->
        <div class="slide-card overflow-hidden bg-white/90 shadow-xl rounded-3xl border border-amber-100">
            <!-- header avec progression et titre de matière -->
            <div class="bg-gradient-to-r from-indigo-800 to-indigo-700 px-5 py-3 sm:py-4 flex flex-wrap justify-between items-center text-white rounded-t-3xl">
                <div class="text-sm font-medium">📘 Initiation au Génie logiciel | Leçon 30</div>
                <div class="text-xs bg-indigo-900/50 px-3 py-1 rounded-full">Maintenance & Amélioration</div>
            </div>

            <!-- slide dynamique via jQuery -->
            <div id="slides-wrapper" class="relative min-h-[60vh] md:min-h-[65vh]">
                <!-- les slides seront injectées ici -->
            </div>

            <!-- Navigation controls + compteur -->
            <div class="px-5 py-4 bg-gray-50 border-t border-gray-200 flex flex-col sm:flex-row justify-between items-center gap-3 rounded-b-3xl">
                <div class="flex gap-3">
                    <button id="prevSlide" class="nav-btn bg-indigo-600 hover:bg-indigo-700 disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-medium py-2 px-5 rounded-full shadow-md transition">◀ Précédent</button>
                    <button id="nextSlide" class="nav-btn bg-indigo-600 hover:bg-indigo-700 disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-medium py-2 px-5 rounded-full shadow-md transition">Suivant ▶</button>
                </div>
                <div class="text-sm text-gray-600 font-mono">
                    Slide <span id="currentSlideIdx">1</span> / <span id="totalSlidesCount">0</span>
                </div>
                <div class="w-full sm:w-48 bg-gray-200 rounded-full h-2 overflow-hidden">
                    <div id="progressFill" class="progress-bar bg-indigo-500 h-full rounded-full" style="width: 0%;"></div>
                </div>
            </div>
        </div>
        <!-- petite note pédagogique -->
        <p class="text-center text-xs text-stone-500 mt-5">📖 Utilisez les boutons pour naviguer. Chaque slide explore un aspect de la maintenance et l'amélioration du code.</p>
    </main>

    <script>
        // Définition des slides pour la leçon 30 : "Maintenir et améliorer un code existant"
        // Slide 0: Titre
        // Slide 1: Objectifs pédagogiques (basés sur les objectifs de lesson30)
        // Slides suivants: contenu détaillé : maintenance, dette technique, refactoring, code smells, DRY/KISS, conventions, etc.
        // On reprend les objectifs de la lesson30 (JSON original)
        
        const slidesData = [
            {
                type: "title",
                titre: "Maintenir et améliorer un code existant",
                sousTitre: "Leçon 30 · Génie logiciel",
                description: "Apprenez à préserver, nettoyer et faire évoluer un logiciel sans casser ce qui fonctionne."
            },
            {
                type: "objectifs",
                titre: "🎯 Objectifs d'apprentissage",
                objectifsList: [
                    "Distinguer les 4 types de maintenance (corrective, adaptive, perfective, préventive).",
                    "Comprendre la dette technique, son impact et comment la mesurer (SonarQube, analyse statique).",
                    "Définir le refactoring : améliorer la structure sans changer le comportement externe.",
                    "Maîtriser les techniques de refactoring (extraction méthode, renommage, déplacement).",
                    "Identifier les « code smells » (longue méthode, grande classe, jalousie de fonction).",
                    "Appliquer les principes DRY (Don't Repeat Yourself) et KISS (Keep It Simple).",
                    "Respecter les conventions de nommage et de documentation."
                ]
            },
            {
                type: "content",
                titre: "🔧 Types de maintenance logicielle",
                contenu: `<p class="mb-3">La maintenance ne se limite pas à « réparer des bugs ». Selon le standard ISO/CEI 14764, on distingue :</p>
                <ul class="list-disc pl-6 space-y-2">
                    <li><strong class="text-indigo-700">🔁 Maintenance corrective</strong> : corriger les erreurs et anomalies détectées après la livraison.</li>
                    <li><strong class="text-indigo-700">🌍 Maintenance adaptive</strong> : adapter le logiciel à des changements d'environnement (nouveau système d'exploitation, base de données, etc.).</li>
                    <li><strong class="text-indigo-700">✨ Maintenance perfective</strong> : améliorer les performances, maintenabilité ou ajouter de petites fonctionnalités.</li>
                    <li><strong class="text-indigo-700">🛡️ Maintenance préventive</strong> : anticiper les problèmes futurs (refactoring, documentation, correction proactive).</li>
                </ul>
                <div class="mt-4 bg-blue-50 p-3 rounded-xl border-l-4 border-blue-400 text-sm">💡 <span class="font-semibold">Exemple concret :</span> Passer d’une librairie obsolète à une nouvelle version (adaptative). Réécrire une fonction trop lourde pour qu’elle soit plus claire (perfective).</div>`
            },
            {
                type: "content",
                titre: "💸 Dette technique – Qu'est-ce que c'est ?",
                contenu: `<p class="mb-2">La <strong>dette technique</strong> est le coût supplémentaire lié au choix d’une solution rapide et peu propre à court terme, au détriment de la qualité.</p>
                <ul class="list-disc pl-6 space-y-1 mb-3">
                    <li>Comme une dette financière : on paye des « intérêts » sous forme de temps perdu, bugs fréquents, difficulté d’évolution.</li>
                    <li>Exemples : code dupliqué, absence de tests, architecture bancale.</li>
                </ul>
                <p><strong class="text-red-700">📊 Mesurer la dette technique :</strong> Outils d’analyse statique comme <span class="font-mono bg-gray-100 px-1">SonarQube</span>, <span class="font-mono bg-gray-100 px-1">ESLint</span> avec règles de qualité, ou encore <span class="font-mono bg-gray-100 px-1">CodeClimate</span>. Ces outils attribuent un indicateur « dette technique » (temps estimé pour corriger).</p>
                <div class="mt-3 p-3 bg-amber-50 rounded-lg text-sm">⚠️ <span class="font-semibold">Impact :</span> ralentit l’ajout de nouvelles fonctionnalités, augmente les risques de régression.</div>`
            },
            {
                type: "content",
                titre: "♻️ Refactoring : améliorer sans casser",
                contenu: `<p class="mb-2"><span class="font-bold text-emerald-700">Définition</span> (Martin Fowler) : « Modification du code source pour améliorer sa structure interne sans modifier son comportement observable. »</p>
                <p class="mb-2">Objectifs : code plus lisible, plus facile à maintenir, plus extensible.</p>
                <p class="mb-2"><span class="font-semibold">🔧 Techniques classiques de refactoring :</span></p>
                <ul class="list-disc pl-6 space-y-1">
                    <li><strong>Extraction de méthode</strong> : découper un gros bloc en petites fonctions.</li>
                    <li><strong>Renommage explicite</strong> (variables, fonctions, classes) pour exprimer l’intention.</li>
                    <li><strong>Déplacement de méthode/attribut</strong> : mettre le code là où il a le plus de sens.</li>
                    <li><strong>Remplacement de conditionnel par polymorphisme</strong> (plus avancé).</li>
                </ul>
                <div class="mt-3 bg-gray-100 rounded-lg p-3 font-mono text-xs overflow-x-auto">
                    // Avant refactoring (longue méthode)
                    function process(order) { /* 30 lignes de calculs et affichages */ }
                    // Après : extraire calculateTotal(), applyDiscount(), display()
                </div>
                <p class="mt-2 text-sm text-gray-600">💡 Les IDE modernes (VS Code, IntelliJ) proposent des refactorings automatiques (sécurisés).</p>`
            },
            {
                type: "content",
                titre: "👃 Code smells – Les mauvaises odeurs à reconnaître",
                contenu: `<p>Un <strong>code smell</strong> est une caractéristique du code qui indique un problème de conception potentiel, souvent source de dette technique.</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-3">
                    <div class="bg-pink-50 p-3 rounded-xl">
                        <span class="font-bold">🐘 Longue méthode</span><br>Méthode qui fait trop de choses → difficile à tester et comprendre.
                    </div>
                    <div class="bg-pink-50 p-3 rounded-xl">
                        <span class="font-bold">🏛️ Grande classe</span><br>Trop de responsabilités → viole le principe de responsabilité unique (SRP).
                    </div>
                    <div class="bg-pink-50 p-3 rounded-xl">
                        <span class="font-bold">💚 Jalousie de fonction (Feature Envy)</span><br>Une méthode accède plus aux données d’une autre classe qu’à la sienne.
                    </div>
                    <div class="bg-pink-50 p-3 rounded-xl">
                        <span class="font-bold">🔁 Code dupliqué</span><br>Même logique à plusieurs endroits → risque de divergence et d’erreur.
                    </div>
                </div>
                <p class="mt-3 text-sm">✅ Détecter ces odeurs permet de savoir où refactorer en priorité.</p>`
            },
            {
                type: "content",
                titre: "🧹 Principes DRY, KISS et bonnes pratiques",
                contenu: `<div class="space-y-4">
                    <div class="border-l-4 border-indigo-500 pl-4">
                        <p class="font-bold text-indigo-800">DRY – Don't Repeat Yourself</p>
                        <p>« Chaque élément de connaissance doit avoir une représentation unique et sans ambiguïté dans un système. » Évitez la duplication. Si une même logique apparaît plusieurs fois, factorisez-la.</p>
                    </div>
                    <div class="border-l-4 border-emerald-500 pl-4">
                        <p class="font-bold text-emerald-800">KISS – Keep It Simple, Stupid !</p>
                        <p>La simplicité est primordiale. Privilégiez des solutions évidentes, lisibles, plutôt que des astuces complexes ou sur-architecturées.</p>
                    </div>
                    <div class="bg-gray-50 p-3 rounded-lg">
                        <p class="font-semibold">📐 Conventions de nommage & documentation :</p>
                        <ul class="list-disc pl-6 mt-1">
                            <li>Noms de variables/fonctions explicites (<span class="font-mono">getUserAge</span> plutôt que <span class="font-mono">g</span>).</li>
                            <li>Respecter la casse propre au langage (camelCase, PascalCase, snake_case).</li>
                            <li>Documenter les parties complexes (JSDoc, docstrings) mais un code clair est la meilleure documentation.</li>
                        </ul>
                    </div>
                </div>`
            },
            {
                type: "content",
                titre: "🛠️ Outils pour mesurer la qualité et la dette",
                contenu: `<p>Utiliser des outils automatiques permet de surveiller la santé du code :</p>
                <table class="min-w-full bg-white border border-gray-200 text-sm my-3 rounded-lg overflow-hidden">
                    <thead class="bg-gray-100"><tr><th class="p-2 text-left">Outil</th><th class="p-2 text-left">Fonction</th></tr></thead>
                    <tbody>
                        <tr class="border-b"><td class="p-2 font-mono">SonarQube</td><td class="p-2">Analyse statique, dette technique, bugs, vulnérabilités, code smells.</td></tr>
                        <tr class="border-b"><td class="p-2 font-mono">ESLint / Pylint / PHPStan</td><td class="p-2">Linters spécifiques au langage pour maintenir des conventions et détecter les odeurs.</td></tr>
                        <tr class="border-b"><td class="p-2 font-mono">Code Climate</td><td class="p-2">Métriques de maintenabilité, couverture et duplication.</td></tr>
                        <tr><td class="p-2 font-mono">PMD / SpotBugs</td><td class="p-2">Détection d'antipatterns dans le code Java, etc.</td></tr>
                    </tbody>
                </table>
                <p class="text-sm italic">📈 Dans un pipeline CI, on peut bloquer une fusion si la dette technique dépasse un seuil.</p>`
            },
            {
                type: "content",
                titre: "🧪 Mise en pratique – Conseils pour refactorer sereinement",
                contenu: `<div class="space-y-3">
                    <div class="flex items-start gap-3"><span class="text-2xl">✅</span><span><strong>Avoir une bonne suite de tests</strong> : avant tout refactoring, assurez-vous que les tests unitaires couvrent bien la zone modifiée. Les tests vous protégeront contre les régressions.</span></div>
                    <div class="flex items-start gap-3"><span class="text-2xl">🔁</span><span><strong>Refactorer petit à petit</strong> : une petite modification à la fois, puis relancer les tests. Technique « baby steps ».</span></div>
                    <div class="flex items-start gap-3"><span class="text-2xl">👥</span><span><strong>Pair programming & code reviews</strong> : un regard extérieur aide à repérer les mauvaises odeurs et les améliorations possibles.</span></div>
                    <div class="flex items-start gap-3"><span class="text-2xl">📚</span><span><strong>Documenter les décisions</strong> : pourquoi un refactoring a été fait (ADR - Architecture Decision Record).</span></div>
                    <div class="bg-indigo-50 p-3 rounded-xl text-center text-indigo-900 text-sm mt-2">✨ Citation : « Tout le monde écrit du code sale parfois, mais un bon ingénieur sait le nettoyer sans faire peur à l'équipe. »</div>
                </div>`
            },
            {
                type: "conclusion",
                titre: "📌 Récapitulatif & à retenir",
                resume: `<ul class="list-disc pl-5 space-y-2">
                    <li>La maintenance logicielle a 4 formes : corrective, adaptive, perfective, préventive.</li>
                    <li>La dette technique freine l'évolution et doit être mesurée (SonarQube).</li>
                    <li>Refactoring = amélioration interne sans modification fonctionnelle.</li>
                    <li>Identifier les code smells (longue méthode, jalousie, duplication) est la première étape.</li>
                    <li>DRY, KISS, conventions de nommage : des piliers pour un code maintenable.</li>
                    <li>Les outils d'analyse statique et une bonne couverture de tests sont indispensables.</li>
                </ul>
                <div class="mt-5 bg-green-50 rounded-xl p-4 text-center text-green-800">🎯 Prochain objectif : appliquer ces pratiques dans vos projets de développement web !</div>`
            }
        ];

        let currentSlide = 0;
        let totalSlides = slidesData.length;

        // Fonction pour générer la slide active
        function renderSlide(index) {
            const data = slidesData[index];
            let html = '';
            const baseCardClass = "p-6 md:p-8 transition-all duration-200";

            if (data.type === 'title') {
                html = `<div class="${baseCardClass} text-center">
                            <div class="mb-4 text-indigo-500 text-6xl">🧹⚙️</div>
                            <h1 class="text-3xl md:text-5xl font-extrabold text-gray-800 mb-4">${data.titre}</h1>
                            <p class="text-xl text-indigo-700 font-medium">${data.sousTitre}</p>
                            <div class="mt-8 text-gray-500 border-t border-gray-200 pt-6 italic">« Un code propre n’est pas un luxe, c’est une nécessité. »</div>
                        </div>`;
            } 
            else if (data.type === 'objectifs') {
                let objItems = '';
                data.objectifsList.forEach(obj => {
                    objItems += `<li class="mb-2 flex items-start"><span class="text-indigo-600 mr-2">🎯</span> ${obj}</li>`;
                });
                html = `<div class="${baseCardClass}">
                            <h2 class="text-2xl md:text-3xl font-bold text-gray-800 border-b border-indigo-200 pb-2 mb-5">${data.titre}</h2>
                            <ul class="space-y-2 text-gray-700 text-base md:text-lg">${objItems}</ul>
                        </div>`;
            }
            else if (data.type === 'content') {
                html = `<div class="${baseCardClass}">
                            <h2 class="text-2xl md:text-3xl font-bold text-gray-800 border-l-8 border-indigo-500 pl-4 mb-5">${data.titre}</h2>
                            <div class="prose prose-lg max-w-none text-gray-700">${data.contenu}</div>
                        </div>`;
            }
            else if (data.type === 'conclusion') {
                html = `<div class="${baseCardClass}">
                            <h2 class="text-2xl md:text-3xl font-bold text-gray-800 mb-4">${data.titre}</h2>
                            <div class="text-gray-700 text-base space-y-3">${data.resume}</div>
                            <div class="mt-6 text-center text-sm text-gray-500">🔁 Navigation suivante pour revoir les concepts clés.</div>
                        </div>`;
            }
            return html;
        }

        // Mise à jour des boutons, compteur et barre
        function updateNavigation() {
            $('#prevSlide').prop('disabled', currentSlide === 0);
            $('#nextSlide').prop('disabled', currentSlide === totalSlides - 1);
            $('#currentSlideIdx').text(currentSlide + 1);
            $('#totalSlidesCount').text(totalSlides);
            const percent = ((currentSlide) / (totalSlides - 1)) * 100;
            $('#progressFill').css('width', `${percent}%`);
        }

        // Chargement slide
        function loadSlide(index) {
            if (index < 0) index = 0;
            if (index >= totalSlides) index = totalSlides - 1;
            currentSlide = index;
            const slideHtml = renderSlide(currentSlide);
            $('#slides-wrapper').html(slideHtml);
            updateNavigation();
            // Scroll en haut du slide (améliore l'expérience mobile)
            $('html, body').animate({ scrollTop: $('.slide-card').offset().top - 10 }, 100);
            // Recharger MathJax si nécessaire (formules éventuelles)
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        // Evenements
        $(document).ready(function() {
            loadSlide(0);
            $('#prevSlide').on('click', function() {
                if (currentSlide > 0) loadSlide(currentSlide - 1);
            });
            $('#nextSlide').on('click', function() {
                if (currentSlide < totalSlides - 1) loadSlide(currentSlide + 1);
            });
            // Gestion clavier (flèches gauche/droite)
            $(document).on('keydown', function(e) {
                if (e.key === 'ArrowLeft') {
                    if (currentSlide > 0) loadSlide(currentSlide - 1);
                } else if (e.key === 'ArrowRight') {
                    if (currentSlide < totalSlides - 1) loadSlide(currentSlide + 1);
                }
            });
        });
    </script>
</body>
</html>
