<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 31 : Planifier et suivre un projet logiciel | Génie Logiciel</title>
    <!-- Tailwind CSS + Google Fonts pour une meilleure lisibilité -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax pour formules (si besoin) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <!-- Ajustements personnalisés pour slides et confort visuel -->
    <style>
        /* Transition slides douce */
        .slide-container {
            transition: transform 0.3s ease-in-out, opacity 0.2s;
        }
        .slide {
            background: #ffffff;
            border-radius: 1.5rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
        }
        /* Active dot indicator */
        .dot-active {
            background-color: #3b82f6;
            width: 1.8rem;
        }
        .dot-inactive {
            background-color: #cbd5e1;
        }
        /* Navigation hover effect */
        .nav-btn {
            transition: all 0.2s;
        }
        .nav-btn:hover:not(:disabled) {
            background-color: #eef2ff;
            transform: scale(1.05);
        }
        /* rendu image fallback si jamais (pas d'images complexes ici) */
        img {
            max-width: 100%;
            border-radius: 0.75rem;
        }
        /* Pour les petits écrans : texte bien aéré */
        @media (max-width: 640px) {
            .slide {
                padding: 1.25rem;
            }
            h2 {
                font-size: 1.5rem;
            }
        }
        /* Accessibilité : focus outline */
        button:focus-visible, a:focus-visible {
            outline: 2px solid #2563eb;
            outline-offset: 2px;
        }
        /* Couleurs agréables */
        body {
            background: #f8fafc;
        }
        .bg-soft-primary {
            background-color: #eef2ff;
        }
    </style>
</head>
<body class="font-sans antialiased">

    <div class="max-w-5xl mx-auto px-4 py-6 md:py-10">
        <!-- Conteneur slides avec vue unique -->
        <div class="relative">
            <!-- Slides wrapper -->
            <div id="slidesWrapper" class="overflow-hidden rounded-2xl">
                <div id="slidesContainer" class="slide-container flex transition-all duration-500 ease-out">
                    <!-- Les slides seront injectées dynamiquement par jQuery -->
                </div>
            </div>

            <!-- Indicateurs de pagination (dots) -->
            <div id="paginationDots" class="flex justify-center gap-2 mt-6 flex-wrap"></div>

            <!-- Boutons navigation précédent/suivant -->
            <div class="flex justify-between items-center mt-6 gap-4">
                <button id="prevSlide" class="nav-btn px-5 py-2 rounded-full bg-white border border-gray-300 shadow-sm text-gray-700 font-medium disabled:opacity-40 disabled:cursor-not-allowed transition">
                    ← Précédent
                </button>
                <span id="slideCounter" class="text-sm text-gray-500 bg-white/70 px-3 py-1 rounded-full">Slide 1 / ?</span>
                <button id="nextSlide" class="nav-btn px-5 py-2 rounded-full bg-blue-600 text-white font-medium shadow-sm hover:bg-blue-700 disabled:opacity-40 disabled:cursor-not-allowed transition">
                    Suivant →
                </button>
            </div>
        </div>
    </div>

    <script>
        // --------------------------------------------------------------
        // DONNÉES DE LA LEÇON 31 : PLANIFICATION ET SUIVI DE PROJET
        // Inspiré du programme (lesson31) : estimation, Gantt/PERT, risques
        // ainsi que gestion de projet, métriques (vélocité, burn-down), communication.
        // Adapté en langage simple et accessible.
        // --------------------------------------------------------------
        const lessonData = {
            title: "Planification et suivi de projet logiciel",
            objectives: [
                "Estimer l’effort d’un projet avec des méthodes simples (analogie, points de fonction, COCOMO).",
                "Utiliser les diagrammes de Gantt et PERT pour visualiser les tâches et dépendances.",
                "Gérer les risques : les identifier, analyser et proposer des plans de mitigation.",
                "Découvrir des outils de gestion de projet comme Jira, Trello ou Asana.",
                "Maîtriser les métriques (vélocité, burn‑down chart, burn‑up chart) et les cérémonies agiles."
            ],
            // Contenu des slides (slide 0 : titre, slide 1 : objectifs, les suivants contenu)
            contentSlides: [
                {   // Slide 0 : Titre + introduction
                    type: "title",
                    content: `
                        <div class="flex flex-col items-center justify-center text-center space-y-5">
                            <div class="bg-blue-100 rounded-full p-4 inline-block">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-blue-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
                                </svg>
                            </div>
                            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800">📊 Planification et suivi<br>de projet logiciel</h1>
                            <p class="text-gray-600 text-lg max-w-xl">Apprenez à estimer, organiser et piloter un projet de A à Z, comme un chef de projet aguerri.</p>
                            <div class="pt-4 text-sm text-blue-600 bg-blue-50 px-4 py-2 rounded-full">Leçon 31 – Génie Logiciel</div>
                        </div>
                    `
                },
                {   // Slide 1 : Objectifs pédagogiques
                    type: "objectives",
                    content: `
                        <div>
                            <h2 class="text-2xl md:text-3xl font-bold text-gray-800 border-l-6 border-blue-500 pl-4 mb-6">🎯 Objectifs de la leçon</h2>
                            <ul class="space-y-4 text-gray-700">
                                ${lessonData.objectives.map(obj => `<li class="flex items-start gap-3"><span class="text-blue-600 text-xl">✓</span> <span class="text-lg">${obj}</span></li>`).join('')}
                            </ul>
                            <div class="mt-8 bg-soft-primary rounded-xl p-4 text-sm text-gray-600">
                                💡 Après cette leçon, vous serez capable de planifier une petite équipe de développement et d’anticiper les obstacles.
                            </div>
                        </div>
                    `
                },
                {   // Slide 2 : Estimation de l'effort (méthodes)
                    type: "content",
                    title: "📈 Estimer l'effort : les bonnes méthodes",
                    content: `
                        <div class="space-y-4">
                            <p class="text-gray-700">Avant de coder, il faut évaluer <strong>le temps et les ressources</strong>. Trois approches simples :</p>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-2">
                                <div class="bg-gray-50 p-4 rounded-xl border border-gray-200"><span class="font-bold text-blue-800">🔍 Analogie</span><br>Comparer avec un projet passé similaire. "Notre précédent site e‑commerce a pris 3 mois, donc celui-ci peut-être 4 mois car plus complexe".</div>
                                <div class="bg-gray-50 p-4 rounded-xl border border-gray-200"><span class="font-bold text-blue-800">📐 Points de fonction</span><br>Mesurer la fonctionnalité livrée (entrées, sorties, requêtes). Idéal pour une estimation technique indépendante du langage.</div>
                                <div class="bg-gray-50 p-4 rounded-xl border border-gray-200"><span class="font-bold text-blue-800">📏 COCOMO</span><br>Modèle constructif basé sur la taille du logiciel (en milliers de lignes de code). Formule : <span class="font-mono text-sm">Effort = a × (KLOC)^b</span>. Utilisé pour projets de grande envergure.</div>
                            </div>
                            <div class="mt-3 bg-blue-50 p-3 rounded-lg text-blue-800 text-sm">📌 <strong>À retenir :</strong> Combinez plusieurs méthodes pour affiner votre estimation. Prévoyez toujours une marge d'erreur !</div>
                        </div>
                    `
                },
                {   // Slide 3 : Diagrammes de Gantt et PERT
                    type: "content",
                    title: "📅 Diagrammes Gantt & PERT : visualiser le chemin critique",
                    content: `
                        <div class="space-y-4">
                            <p><strong>Diagramme de Gantt</strong> : affiche les tâches sur une frise chronologique. Permet de voir les chevauchements, dépendances et jalons.</p>
                            <div class="bg-gray-100 rounded-lg p-3 text-center text-gray-600 text-sm italic border border-dashed border-gray-300">
                                ══════════════════════<br>
                                📌 Tâche A | ████████░░  (8 jours)<br>
                                📌 Tâche B |     ██████░░ (6 jours) ← dépend de A<br>
                                📌 Jalon 1 : validation client au jour 10<br>
                                [Exemple simplifié de diagramme Gantt]
                            </div>
                            <p><strong>Diagramme PERT</strong> (Program Evaluation Review Technique) : met en avant les dépendances entre tâches et le <span class="font-semibold">chemin critique</span> (séquence la plus longue).</p>
                            <div class="bg-gray-100 p-3 rounded-lg text-sm">
                                🧩 Noeud début → (Tâche1: 3j) → (Tâche2: 5j) → fin. Si un retard sur le chemin critique retarde tout le projet.
                            </div>
                            <p class="text-gray-600">📌 Outils : Microsoft Project, GanttProject, ou modules dans Jira/ClickUp.</p>
                        </div>
                    `
                },
                {   // Slide 4 : Gestion des risques
                    type: "content",
                    title: "⚠️ Gestion des risques : Anticiper pour mieux réagir",
                    content: `
                        <div class="space-y-3">
                            <p>Un risque = événement incertain qui peut impacter négativement le projet. Étapes clés :</p>
                            <ol class="list-decimal list-inside space-y-1 pl-2 text-gray-700">
                                <li><strong>Identification</strong> : brainstorming, leçons apprises (ex: départ d’un dev, panne serveur, exigences floues).</li>
                                <li><strong>Analyse</strong> : probabilité (faible/moyenne/élevée) et gravité.</li>
                                <li><strong>Mitigation</strong> : actions préventives (ex: former un binôme sur les compétences critiques, backups quotidiens).</li>
                            </ol>
                            <div class="grid grid-cols-2 gap-3 mt-2">
                                <div class="bg-red-50 p-2 rounded text-sm border-l-4 border-red-400">🔥 Exemple : Retard livraison fournisseur → solution : avoir un fournisseur alternatif.</div>
                                <div class="bg-amber-50 p-2 rounded text-sm border-l-4 border-amber-400">📉 Exemple : Sous-estimation → ajouter des tampons (buffers) dans le planning.</div>
                            </div>
                            <p class="italic text-sm">Un registre des risques (Excel ou outil comme Jira) est indispensable pour suivre l’évolution.</p>
                        </div>
                    `
                },
                {   // Slide 5 : Outils de gestion de projet (Jira, Trello, Asana etc)
                    type: "content",
                    title: "🛠️ Outils du chef de projet",
                    content: `
                        <div class="space-y-4">
                            <p>Les outils modernes aident à centraliser les tâches, suivre l’avancement et collaborer.</p>
                            <div class="flex flex-wrap gap-3 justify-center">
                                <span class="bg-indigo-100 text-indigo-800 px-4 py-2 rounded-full font-medium">Jira (Agile/Scrum)</span>
                                <span class="bg-green-100 text-green-800 px-4 py-2 rounded-full font-medium">Trello (Kanban)</span>
                                <span class="bg-blue-100 text-blue-800 px-4 py-2 rounded-full font-medium">Asana (Tâches)</span>
                                <span class="bg-purple-100 text-purple-800 px-4 py-2 rounded-full font-medium">ClickUp (Tout-en-un)</span>
                            </div>
                            <p class="text-gray-700"><strong>Jira</strong> : idéal pour Scrum (sprints, backlogs, vélocité).<br>
                            <strong>Trello</strong> : tableaux visuels « À faire, En cours, Terminé ». <br>
                            <strong>Asana / ClickUp</strong> : plannings, diagrammes de Gantt intégrés et automatisations.</p>
                            <div class="bg-gray-100 rounded-lg p-3 text-center text-sm">💡 Conseil : choisissez l’outil en fonction de la taille de l’équipe et de la complexité du projet.</div>
                        </div>
                    `
                },
                {   // Slide 6 : Métriques agiles (vélocité, burn-down, burn-up)
                    type: "content",
                    title: "📊 Métriques de suivi : vélocité, burn‑down chart",
                    content: `
                        <div class="space-y-3">
                            <p><span class="font-semibold">Vélocité</span> : nombre de points de story (ou d’effort) qu’une équipe termine par sprint. Permet de prévoir la cadence future.</p>
                            <p><span class="font-semibold">Burn‑down chart</span> (graphique d’avancement) : travail restant au fil du temps. Idéal pour voir si on finit à temps.</p>
                            <div class="bg-gray-100 p-4 rounded-xl text-center">
                                <svg width="100%" height="80" viewBox="0 0 300 80" class="mx-auto max-w-[280px]">
                                    <polyline points="10,70 80,60 150,45 220,30 280,15" stroke="#3b82f6" stroke-width="2" fill="none" />
                                    <polyline points="10,70 80,65 150,55 220,50 280,48" stroke="#ef4444" stroke-dasharray="4" stroke-width="1.5" fill="none" />
                                    <text x="10" y="78" fill="#4b5563" font-size="8">Sprint début</text>
                                    <text x="250" y="15" fill="#4b5563" font-size="8">Sprint fin</text>
                                    <text x="120" y="38" fill="#1e40af" font-size="9">Travail restant idéal</text>
                                    <text x="120" y="48" fill="#b91c1c" font-size="9">Réel</text>
                                </svg>
                                <p class="text-xs text-gray-500 mt-1">Burn‑down : la ligne idéale descend régulièrement ; la ligne réelle doit suivre.</p>
                            </div>
                            <p><strong>Burn‑up chart</strong> : travail total accompli vs périmètre total. Utile pour visualiser l’ajout de fonctionnalités en cours de route.</p>
                        </div>
                    `
                },
                {   // Slide 7 : Cérémonies et communication (daily meetings, revues, rétrospectives)
                    type: "content",
                    title: "🗣️ Communication et rituels d’équipe",
                    content: `
                        <div class="space-y-4">
                            <p>Un projet réussi repose sur une communication fluide. Les rituels agiles :</p>
                            <ul class="list-disc pl-5 space-y-1">
                                <li><strong>Daily meeting</strong> : 15 min chaque matin. Chacun répond : "Qu’ai-je fait hier ? Que ferai-je aujourd’hui ? Blocages ?"</li>
                                <li><strong>Revue de sprint</strong> : démonstration des fonctionnalités terminées au client / partie prenante.</li>
                                <li><strong>Rétrospective</strong> : analyse de ce qui a bien fonctionné / à améliorer.</li>
                                <li><strong>Revues de code (Code review)</strong> : améliorer la qualité et partager les connaissances.</li>
                            </ul>
                            <div class="flex flex-wrap gap-2 justify-start mt-2">
                                <span class="bg-slate-200 text-slate-800 text-sm px-3 py-1 rounded-full">💬 Slack</span>
                                <span class="bg-slate-200 text-slate-800 text-sm px-3 py-1 rounded-full">📘 Confluence</span>
                                <span class="bg-slate-200 text-slate-800 text-sm px-3 py-1 rounded-full">👥 Teams</span>
                                <span class="bg-slate-200 text-slate-800 text-sm px-3 py-1 rounded-full">🤝 Pair programming</span>
                            </div>
                            <p class="text-gray-600 mt-2">La communication transparente réduit les conflits et augmente la productivité.</p>
                        </div>
                    `
                },
                {   // Slide 8 : Résumé et application (exemple concret)
                    type: "content",
                    title: "✨ En résumé : les clés pour bien planifier",
                    content: `
                        <div class="grid md:grid-cols-2 gap-5">
                            <div class="bg-white shadow-sm rounded-xl p-4 border border-gray-100">
                                <div class="font-bold text-blue-700 text-lg">📌 Étapes de planification</div>
                                <ul class="list-disc list-inside text-sm mt-2 space-y-1">
                                    <li>Estimer (points de fonction / analogie)</li>
                                    <li>Identifier les dépendances (PERT / Gantt)</li>
                                    <li>Anticiper les risques (matrice probabilité-impact)</li>
                                    <li>Choisir l’outil de suivi (Jira / Trello)</li>
                                    <li>Définir les métriques (vélocité, burn‑down)</li>
                                </ul>
                            </div>
                            <div class="bg-white shadow-sm rounded-xl p-4 border border-gray-100">
                                <div class="font-bold text-green-700 text-lg">🎯 Pendant l’exécution</div>
                                <ul class="list-disc list-inside text-sm mt-2 space-y-1">
                                    <li>Daily meeting & revues régulières</li>
                                    <li>Suivre la courbe d’avancement (burn‑down)</li>
                                    <li>Adapter le planning si besoin (ajustement des priorités)</li>
                                    <li>Gérer les retards en réallouant des ressources</li>
                                </ul>
                            </div>
                        </div>
                        <div class="mt-5 bg-blue-50 p-4 rounded-xl text-blue-900 text-center">
                            ⭐ « Mieux vaut une bonne planification qu’une course effrénée vers l’échec. »
                        </div>
                    `
                }
            ]
        };

        // Construction des slides
        let slidesArray = [];

        // Slide titre (contenu depuis contentSlides[0])
        slidesArray.push(lessonData.contentSlides[0]);
        // Slide objectifs
        slidesArray.push(lessonData.contentSlides[1]);
        // Ajouter les slides de contenu restants (2 à 8)
        for(let i=2; i<lessonData.contentSlides.length; i++) {
            slidesArray.push(lessonData.contentSlides[i]);
        }

        const totalSlides = slidesArray.length;
        let currentIndex = 0;

        // Fonction pour générer le HTML d’un slide en fonction de son type
        function renderSlide(slide, idx) {
            if(slide.type === "title") {
                return `<div class="slide w-full flex-shrink-0 p-6 md:p-10 bg-white rounded-2xl shadow-lg min-h-[450px] flex flex-col justify-center">${slide.content}</div>`;
            } 
            else if(slide.type === "objectives") {
                return `<div class="slide w-full flex-shrink-0 p-6 md:p-10 bg-white rounded-2xl shadow-lg min-h-[450px] overflow-y-auto">${slide.content}</div>`;
            }
            else if(slide.type === "content") {
                // Ajout d’un titre dynamique
                return `<div class="slide w-full flex-shrink-0 p-6 md:p-10 bg-white rounded-2xl shadow-lg min-h-[450px] overflow-y-auto">
                            <h2 class="text-2xl md:text-3xl font-bold text-gray-800 mb-5 flex items-center gap-2">📌 ${slide.title}</h2>
                            ${slide.content}
                        </div>`;
            }
            return `<div class="slide w-full flex-shrink-0 p-6 bg-white">${slide.content}</div>`;
        }

        // Mise à jour de l'affichage : position du container + dots + compteur
        function updateCarousel() {
            const container = $('#slidesContainer');
            const slideWidth = $('.slide').outerWidth();
            const newPosition = - (currentIndex * slideWidth);
            container.css('transform', `translateX(${newPosition}px)`);
            
            // Mettre à jour dots actif/inactif
            $('#paginationDots .dot').each(function(i) {
                if(i === currentIndex) {
                    $(this).removeClass('dot-inactive bg-gray-300').addClass('dot-active bg-blue-600 w-8');
                } else {
                    $(this).removeClass('dot-active bg-blue-600 w-8').addClass('dot-inactive bg-gray-300 w-3');
                }
            });
            $('#slideCounter').text(`Slide ${currentIndex+1} / ${totalSlides}`);
            
            // Gestion état boutons
            $('#prevSlide').prop('disabled', currentIndex === 0);
            $('#nextSlide').prop('disabled', currentIndex === totalSlides-1);
        }

        // Navigation
        function goToSlide(index) {
            if(index < 0) index = 0;
            if(index >= totalSlides) index = totalSlides-1;
            currentIndex = index;
            updateCarousel();
        }

        // Recalculer la largeur des slides au resize pour garder un bon défilement
        function adjustSlidesWidth() {
            const wrapperWidth = $('#slidesWrapper').width();
            $('.slide').css('min-width', wrapperWidth + 'px');
            $('.slide').css('width', wrapperWidth + 'px');
            updateCarousel(); // repositionne après resize
        }

        // Initialisation complète
        function init() {
            // Générer les slides HTML dans le container
            let slidesHtml = '';
            slidesArray.forEach((slide, idx) => {
                slidesHtml += renderSlide(slide, idx);
            });
            $('#slidesContainer').html(slidesHtml);
            
            // Générer les points (dots) dynamiques
            let dotsHtml = '';
            for(let i=0; i<totalSlides; i++) {
                dotsHtml += `<button class="dot rounded-full h-3 transition-all duration-200 mx-1 ${i===0 ? 'bg-blue-600 w-8' : 'bg-gray-300 w-3'}" data-index="${i}"></button>`;
            }
            $('#paginationDots').html(dotsHtml);
            
            // Événements dots
            $('.dot').on('click', function() {
                const idx = parseInt($(this).data('index'));
                goToSlide(idx);
            });
            
            // Ajustement largeur
            adjustSlidesWidth();
            $(window).on('resize', function() {
                adjustSlidesWidth();
            });
            
            // Navigation clavier
            $(document).on('keydown', function(e) {
                if(e.key === 'ArrowLeft') {
                    $('#prevSlide').click();
                } else if(e.key === 'ArrowRight') {
                    $('#nextSlide').click();
                }
            });
            
            $('#prevSlide').on('click', () => goToSlide(currentIndex-1));
            $('#nextSlide').on('click', () => goToSlide(currentIndex+1));
            
            // compteur initial
            $('#slideCounter').text(`Slide 1 / ${totalSlides}`);
        }
        
        // Lancer l’application quand le DOM est prêt
        $(document).ready(function() {
            init();
        });
    </script>
    <!-- Petit texte footer pédagogique -->
    <footer class="text-center text-gray-400 text-xs py-6 border-t mt-6 max-w-5xl mx-auto">
        Cours de Génie Logiciel — Enseignant au Cameroun | Leçon 31 : Planification et suivi de projet | Basé sur le programme officiel.
    </footer>
</body>
</html>
