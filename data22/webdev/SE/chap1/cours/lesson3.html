<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Leçon 3 : Qualité et normes en génie logiciel | Cours de Génie Logiciel</title>
  <!-- Tailwind CSS via CDN + base styles pour améliorer le rendu mobile -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <!-- MathJax (formules mathématiques si besoin) -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
  <style>
    /* personnalisation douce pour les slides et transitions douces */
    body {
      background: #f8fafc;
    }
    .slide-container {
      transition: all 0.3s ease;
    }
    .slide-card {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    /* navigation buttons style */
    .nav-btn {
      transition: background-color 0.2s, transform 0.1s;
    }
    .nav-btn:active {
      transform: scale(0.96);
    }
    /* bullet list améliorée */
    .objective-item, .content-list li {
      margin-bottom: 0.75rem;
    }
    .badge-chapitre {
      background: #e0f2fe;
      color: #0369a1;
    }
    /* pour les petits écrans : texte légèrement ajusté */
    @media (max-width: 640px) {
      .slide-card {
        border-radius: 1.25rem;
      }
      h1 {
        font-size: 1.8rem;
      }
      h2 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body class="font-sans antialiased bg-gradient-to-br from-slate-50 to-blue-50">

  <div class="max-w-4xl mx-auto px-4 py-6 md:py-8">
    <!-- indicateur de progression & titre de matière -->
    <div class="flex justify-between items-center mb-4 text-sm text-gray-500 flex-wrap gap-2">
      <div class="bg-white/70 backdrop-blur-sm px-3 py-1 rounded-full shadow-sm">
        📘 <span class="font-medium">Matière:</span> Initiation au Génie logiciel
      </div>
      <div class="bg-white/70 backdrop-blur-sm px-3 py-1 rounded-full shadow-sm">
        🧪 <span class="font-medium">Leçon 3:</span> Attributs de qualité & normes
      </div>
    </div>

    <!-- Container des slides (affichage dynamique avec jQuery) -->
    <div id="slides-root" class="relative">
      <!-- les slides seront injectées ici -->
    </div>

    <!-- Contrôles de navigation + compteur -->
    <div class="flex justify-between items-center mt-6 gap-3 flex-wrap">
      <button id="prevSlide" class="nav-btn bg-white border border-gray-300 hover:bg-gray-100 text-gray-800 font-semibold py-2 px-5 rounded-full shadow-md flex items-center gap-2 transition disabled:opacity-40 disabled:cursor-not-allowed">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
        Précédent
      </button>
      <div class="text-sm bg-white/60 backdrop-blur px-4 py-2 rounded-full shadow-sm">
        Slide <span id="currentSlideIdx">1</span> / <span id="totalSlides">0</span>
      </div>
      <button id="nextSlide" class="nav-btn bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-5 rounded-full shadow-md flex items-center gap-2 transition disabled:opacity-40 disabled:cursor-not-allowed">
        Suivant
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
      </button>
    </div>
    
    <!-- petit message informatif -->
    <div class="text-center text-xs text-gray-400 mt-6">
      ✨ Utilise les boutons ou les flèches du clavier (← →) pour naviguer entre les slides
    </div>
  </div>

  <script>
    // Définition des slides à partir des objectifs de la lesson3 (Qualité & normes)
    // Contenu structuré : Slide1 (Titre), Slide2 (Objectifs), Slides suivants : contenu détaillé.
    // La leçon 3 correspond à l'objectif : qualités ISO 25010, normes IEEE, ISO 12207, CMMI, métriques (complexité cyclomatique, couverture)
    
    const lessonData = {
      title: "Qualité et normes en génie logiciel",
      subtitle: "Attributs de qualité • Normes internationales • Métriques essentielles",
      objectives: [
        "Définir les attributs de qualité selon la norme ISO 25010 (fonctionnalité, fiabilité, maintenabilité, efficacité).",
        "Comprendre les normes importantes en génie logiciel : IEEE, ISO 12207, CMMI.",
        "Identifier les métriques de qualité : complexité cyclomatique et couverture de code."
      ],
      contentSlides: [
        {
          title: "📌 Les attributs de qualité (ISO 25010)",
          description: "La norme ISO/IEC 25010 définit un modèle de qualité logicielle. Voici les caractéristiques principales :",
          points: [
            "✅ <strong>Fonctionnalité</strong> : Le logiciel fournit les fonctions qui répondent aux besoins explicites et implicites.",
            "✅ <strong>Fiabilité</strong> : Capacité à maintenir son niveau de performance sous conditions données (disponibilité, tolérance aux pannes).",
            "✅ <strong>Maintenabilité</strong> : Facilité à modifier le logiciel (corriger, améliorer, adapter).",
            "✅ <strong>Efficacité</strong> : Performance et utilisation optimale des ressources (temps de réponse, consommation mémoire).",
            "📖 D'autres attributs comme la sécurité, la compatibilité ou l'utilisabilité sont également dans ISO 25010, mais nous nous concentrons sur les fondamentaux."
          ],
          schemaHint: "🔍 Ces attributs permettent d’évaluer la qualité d’un logiciel de manière standardisée."
        },
        {
          title: "🏛️ Les normes en génie logiciel",
          description: "Les normes aident les équipes à suivre des bonnes pratiques reconnues internationalement.",
          points: [
            "📘 <strong>IEEE</strong> : Institut of Electrical and Electronics Engineers – propose des standards pour les文档 (ex: IEEE 830 pour exigences).",
            "📘 <strong>ISO/IEC 12207</strong> : Norme internationale sur les processus du cycle de vie du logiciel (acquisition, fourniture, développement, exploitation, maintenance).",
            "📘 <strong>CMMI</strong> : Capability Maturity Model Integration – modèle d’évaluation de la maturité des processus de développement. (niveaux 1 à 5)",
            "💡 Pourquoi les normes ? Elles assurent la qualité, réduisent les risques et facilitent la communication entre équipes."
          ],
          extraNote: "Un développeur web peut appliquer ces concepts sans forcément viser la certification, mais les connaître améliore la rigueur."
        },
        {
          title: "📊 Métriques de qualité : Complexité cyclomatique",
          description: "La complexité cyclomatique mesure la complexité structurelle d’un programme (inventée par Thomas McCabe).",
          points: [
            "🔢 <strong>Définition</strong> : Nombre de chemins linéairement indépendants dans un code source. Plus le nombre est élevé, plus le code est difficile à tester et maintenir.",
            "📈 <strong>Formule simple</strong> : M = E – N + 2P (où E = arêtes, N = nœuds, P = composants connectés).",
            "🧪 <strong>Interprétation</strong> : De 1 à 10 → code simple et facile ; > 20 → code très complexe, à refactoriser.",
            "🛠️ <strong>Outils</strong> : SonarQube, PHP Metrics, radon (Python), eslint-plugin-complexity."
          ],
          mathExample: "Exemple : Une fonction avec des `if` et `else if` imbriqués aura une complexité élevée. Réduisez la en découpant en petites fonctions."
        },
        {
          title: "🧪 Métriques de qualité : Couverture de code",
          description: "La couverture de code indique le pourcentage de code exécuté lors des tests automatiques.",
          points: [
            "🎯 <strong>Pourquoi ?</strong> Une forte couverture augmente la confiance dans la fiabilité du logiciel et détecte les zones non testées.",
            "📐 <strong>Types de couverture</strong> : instructions (lines), branches (décisions), fonctions, chemins.",
            "🏆 <strong>Bonnes pratiques</strong> : Visez au moins 70-80% de couverture de branches, mais attention une couverture à 100% ne garantit pas l’absence de bugs.",
            "⚙️ <strong>Outils populaires</strong> : JaCoCo (Java), pytest-cov (Python), Jest --coverage (JS), gcov (C/C++)."
          ],
          tip: "Conseil: dans un projet web, combinez tests unitaires + tests d'intégration pour une couverture réaliste."
        },
        {
          title: "🔗 Lien entre normes, attributs et métriques",
          description: "Comment tout cela s’articule dans la pratique ?",
          points: [
            "📌 Les <strong>normes (ISO 12207, CMMI)</strong> organisent le processus de développement pour favoriser la qualité.",
            "📌 Les <strong>attributs ISO 25010</strong> définissent ce qu’est un logiciel de qualité (maintenabilité, fiabilité…).",
            "📌 Les <strong>métriques (complexité cyclomatique, couverture)</strong> aident à <em>mesurer</em> objectivement ces attributs.",
            "✔️ Exemple concret : Un code avec une faible complexité cyclomatique sera plus maintenable (attribut maintenabilité). Des tests avec une haute couverture renforcent la fiabilité."
          ],
          illustration: "📊 Utiliser SonarQube permet de visualiser ces métriques en continu et d’appliquer les normes de façon agile."
        },
        {
          title: "🧠 Petit exercice de réflexion",
          description: "Appliquez à votre projet ou à un code existant :",
          points: [
            "✏️ Imaginez une fonction qui contient 15 conditions if/else. Calculez mentalement la complexité cyclomatique approximative (très élevée). Que faire ? Extraire des sous-fonctions.",
            "✏️ Sur une application React, quelle métrique utiliseriez-vous pour vérifier la maintenabilité ? (indice : couverture + complexité).",
            "✏️ Pourquoi CMMI est-il important pour une entreprise qui vend des logiciels critiques (aérospatial, santé) ? -> elle démontre la maturité des processus."
          ],
          conclusion: "Ces notions vous aideront à produire un code plus robuste, professionnel et facile à faire évoluer."
        }
      ]
    };

    // Construction de la liste complète des slides
    let slidesArray = [];
    
    // Slide 1 : Titre principal
    slidesArray.push({
      type: "title",
      content: {
        mainTitle: lessonData.title,
        sub: lessonData.subtitle,
        badge: "🎯 Leçon 3 • Qualité & Normes"
      }
    });
    
    // Slide 2 : Objectifs d'apprentissage (à partir des objectifs de la lesson)
    slidesArray.push({
      type: "objectives",
      content: {
        title: "🎓 Objectifs d’apprentissage",
        objectivesList: lessonData.objectives,
        note: "À la fin de cette leçon, vous serez capable d'expliquer ces concepts et de les appliquer dans vos projets."
      }
    });
    
    // Slides de contenu : Pour chaque élément de contentSlides, créer un slide "content"
    lessonData.contentSlides.forEach((slide, idx) => {
      slidesArray.push({
        type: "content",
        content: {
          title: slide.title,
          description: slide.description,
          points: slide.points,
          extra: slide.schemaHint || slide.extraNote || slide.tip || slide.illustration || slide.mathExample || slide.conclusion,
          isLast: idx === lessonData.contentSlides.length - 1
        }
      });
    });
    
    // Variable pour slide courant
    let currentIndex = 0;
    const total = slidesArray.length;
    
    // Fonction pour générer le HTML d'un slide selon son type
    function renderSlide(slide, index) {
      if (slide.type === "title") {
        const c = slide.content;
        return `
          <div class="slide-card bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
            <div class="bg-gradient-to-r from-blue-800 to-indigo-700 px-6 py-12 md:py-16 text-white text-center">
              <div class="inline-block bg-white/20 backdrop-blur-sm px-3 py-1 rounded-full text-sm font-medium mb-4">${c.badge || "Chapitre"}</div>
              <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-3">${c.mainTitle}</h1>
              <p class="text-blue-100 text-lg md:text-xl max-w-2xl mx-auto">${c.sub}</p>
              <div class="mt-8 flex justify-center">
                <div class="animate-pulse bg-white/20 rounded-full p-2">
                  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
                </div>
              </div>
            </div>
            <div class="p-6 bg-gray-50 text-center text-gray-500 text-sm">
              📍 Cameroun • Formation Développement Web | Génie logiciel
            </div>
          </div>
        `;
      } 
      else if (slide.type === "objectives") {
        const c = slide.content;
        let bullets = '';
        c.objectivesList.forEach(obj => {
          bullets += `<li class="objective-item flex gap-3"><span class="text-blue-600 font-bold text-lg">🎯</span><span class="text-gray-700">${obj}</span></li>`;
        });
        return `
          <div class="slide-card bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
            <div class="bg-amber-50 border-b border-amber-200 px-6 py-4">
              <h2 class="text-2xl md:text-3xl font-bold text-amber-800 flex items-center gap-2">📚 ${c.title}</h2>
            </div>
            <div class="p-6 md:p-8">
              <ul class="space-y-3">
                ${bullets}
              </ul>
              <div class="mt-6 p-4 bg-blue-50 rounded-xl text-blue-800 text-sm italic">
                💡 ${c.note}
              </div>
            </div>
          </div>
        `;
      }
      else if (slide.type === "content") {
        const c = slide.content;
        let pointsHtml = '';
        if(c.points && c.points.length) {
          pointsHtml = `<ul class="content-list space-y-3 mt-4">`;
          c.points.forEach(pt => {
            pointsHtml += `<li class="flex gap-2 text-gray-700"><span class="text-blue-500 shrink-0">▹</span> <span>${pt}</span></li>`;
          });
          pointsHtml += `</ul>`;
        }
        let extraHtml = '';
        if(c.extra) {
          extraHtml = `<div class="mt-6 p-4 bg-indigo-50 border-l-4 border-indigo-400 rounded-r-xl text-indigo-800 text-sm md:text-base">✨ ${c.extra}</div>`;
        }
        return `
          <div class="slide-card bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
            <div class="bg-gradient-to-r from-slate-700 to-slate-800 px-6 py-4">
              <h2 class="text-xl md:text-2xl font-bold text-white">${c.title}</h2>
              <p class="text-slate-200 text-sm mt-1">${c.description || "Aperçu des concepts clés"}</p>
            </div>
            <div class="p-6 md:p-8">
              ${pointsHtml}
              ${extraHtml}
              ${c.isLast ? '<div class="mt-8 text-center text-green-700 font-medium border-t pt-4">🏁 Fin du contenu théorique — À vous de jouer !</div>' : ''}
            </div>
          </div>
        `;
      }
      return `<div class="slide-card bg-white rounded-2xl shadow p-6">Contenu non disponible</div>`;
    }
    
    // Mise à jour de l'affichage et des boutons
    function updateSlide() {
      const slideHtml = renderSlide(slidesArray[currentIndex], currentIndex);
      $("#slides-root").html(slideHtml);
      $("#currentSlideIdx").text(currentIndex + 1);
      $("#totalSlides").text(total);
      
      // Gestion désactivation boutons
      $("#prevSlide").prop("disabled", currentIndex === 0);
      $("#nextSlide").prop("disabled", currentIndex === total - 1);
      
      // Scroll top pour chaque slide (mobile/PC)
      $("html, body").animate({ scrollTop: 0 }, 100);
      
      // déclencher MathJax si besoin (au cas où des formules apparaissent dans le futur)
      if (window.MathJax) {
        MathJax.typesetPromise && MathJax.typesetPromise();
      }
    }
    
    // Navigation
    function nextSlide() {
      if (currentIndex < total - 1) {
        currentIndex++;
        updateSlide();
      }
    }
    function prevSlide() {
      if (currentIndex > 0) {
        currentIndex--;
        updateSlide();
      }
    }
    
    // Événements jQuery
    $(document).ready(function(){
      updateSlide();
      
      $("#nextSlide").on("click", nextSlide);
      $("#prevSlide").on("click", prevSlide);
      
      // Navigation clavier (flèches)
      $(document).keydown(function(e) {
        if (e.key === "ArrowLeft") {
          prevSlide();
          e.preventDefault();
        } else if (e.key === "ArrowRight") {
          nextSlide();
          e.preventDefault();
        }
      });
      
      // petite touche tactile pour swipe? optionnel
      let touchStartX = 0;
      $("#slides-root").on("touchstart", function(e) {
        touchStartX = e.originalEvent.touches[0].clientX;
      });
      $("#slides-root").on("touchend", function(e) {
        if (!touchStartX) return;
        const endX = e.originalEvent.changedTouches[0].clientX;
        const diff = endX - touchStartX;
        if (Math.abs(diff) > 50) {
          if (diff > 0) prevSlide();
          else nextSlide();
          touchStartX = 0;
        }
      });
    });
  </script>
  
  <!-- Aucune image externe superflue, uniquement design minimal. Si vous voulez plus d'illustration, j'ajoute simplement un petit schéma textuel fait maison pour la complexité cyclomatique (aucune image externe nécessaire) 
  Mais quelques éléments dessinés en CSS/unicode sont déjà présents -->
  <noscript>
    <div class="max-w-4xl mx-auto p-4 bg-yellow-100 border-l-4 border-yellow-500">Veuillez activer JavaScript pour profiter des slides interactifs.</div>
  </noscript>
</body>
</html>
