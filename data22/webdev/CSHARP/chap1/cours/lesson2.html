<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Cours C# | Leçon 2 : Installer .NET et créer une application console</title>
    <!-- Tailwind CSS via CDN + basic inter font -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (optionnel, formules simples si besoin mais reste léger) -->

    <style>
        /* styles doux pour améliorer lisibilité + transition slides */
        body {
            background: #f8fafc;
            font-family: system-ui, 'Segoe UI', 'Inter', 'Segoe UI', Roboto, sans-serif;
        }
        .slide-container {
            transition: all 0.2s ease;
        }
        .card-slide {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(0px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1), 0 1px 3px rgba(0,0,0,0.05);
        }
        /* boutons navigation accessibles */
        .nav-btn {
            transition: 0.2s;
            user-select: none;
        }
        .nav-btn:active {
            transform: scale(0.96);
        }
        .progress-bar {
            background: #e2e8f0;
            border-radius: 999px;
            overflow: hidden;
        }
        .progress-fill {
            background: #2563eb;
            width: 0%;
            height: 6px;
            transition: width 0.3s ease;
        }
        @media (max-width: 640px) {
            .card-slide {
                border-radius: 1.5rem;
                margin: 0 0.5rem;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
        /* code block style */
        pre {
            background: #1e293b;
            color: #e2e8f0;
            border-radius: 1rem;
            overflow-x: auto;
            padding: 1rem;
            font-size: 0.85rem;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
        }
        code.inline-code {
            background: #eef2ff;
            color: #1e3a8a;
            padding: 0.2rem 0.4rem;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            font-family: monospace;
        }
        .slide-content {
            max-height: 65vh;
            overflow-y: auto;
            padding-right: 0.25rem;
        }
        .slide-content::-webkit-scrollbar {
            width: 5px;
        }
        .slide-content::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }
        .slide-content::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 10px;
        }
    </style>
</head>
<body class="antialiased">

    <div class="min-h-screen flex flex-col items-center justify-center py-8 px-4 md:px-6 bg-gradient-to-br from-sky-50 via-white to-indigo-50">
        <!-- Main slide wrapper -->
        <div class="w-full max-w-4xl mx-auto relative">
            <!-- Titre du cours + indicateur de leçon -->
            <div class="flex justify-between items-center mb-3 px-2">
                <div class="text-sm font-semibold bg-white/70 backdrop-blur-sm rounded-full px-3 py-1 shadow-sm text-slate-700">
                    📘 Initiation C# | Leçon 2/3 du Chapitre 1
                </div>
                <div class="text-sm font-medium text-gray-500" id="slideCounter">Slide 1 / 5</div>
            </div>
            
            <!-- Carte slide principale -->
            <div class="card-slide bg-white border border-slate-200/80 shadow-xl overflow-hidden">
                <div class="p-5 sm:p-7 md:p-8">
                    <!-- contenu dynamique injecté via jQuery -->
                    <div id="slideContent" class="slide-container">
                        <!-- le contenu des slides sera chargé ici -->
                    </div>
                </div>
            </div>
            
            <!-- Barre de progression + navigation -->
            <div class="mt-6 flex flex-col gap-3">
                <div class="progress-bar w-full">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="flex justify-between items-center gap-3">
                    <button id="prevSlide" class="nav-btn bg-white border border-indigo-200 hover:bg-indigo-50 text-indigo-700 font-semibold py-2.5 px-5 rounded-2xl shadow-sm transition flex items-center gap-1 disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:bg-white">
                        ← Précédent

                    <button id="nextSlide" class="nav-btn bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-5 rounded-2xl shadow-md transition flex items-center gap-1 disabled:opacity-40 disabled:cursor-not-allowed">
                        Suivant →
                    </button>

            </div>
            
            <!-- petite aide pour mobiles -->

    <script>
        // Définition des slides pour la lesson2 (Installation et Premier programme C#)

        // Slide 2 : Installer SDK .NET et outils (Visual Studio / VS Code)
        // Slide 3 : Créer une application console avec dotnet new console
        // Slide 4 : Comprendre la structure d'un programme C# (using, namespace, class, Main)
        
        const slides = [
            { // slide 0 : titre & ambiance
                title: "💻 Leçon 2 : Installation et premier programme C#",

                            <svg class="w-12 h-12 text-indigo-700" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                        </div>
                        <h1 class="text-3xl md:text-4xl font-extrabold bg-gradient-to-r from-indigo-800 to-sky-700 bg-clip-text text-transparent">Installer .NET & créer votre première app console</h1>
                        <p class="text-slate-600 text-lg max-w-md mx-auto">Transformez votre ordinateur en machine de développement C#</p>
                        <div class="pt-4 flex justify-center gap-3 text-sm text-gray-500">
                            <span class="bg-gray-100 px-3 py-1 rounded-full">🔧 .NET SDK 8/9</span>
                            <span class="bg-gray-100 px-3 py-1 rounded-full">📝 Visual Studio / VS Code</span>
                        </div>
                    </div>
                `
            },
            { // slide 1 : objectifs de la leçon (basé sur l'énoncé lesson2)
                title: "🎯 Objectifs de la leçon",
                content: `
                    <div class="space-y-6">
                        <p class="text-slate-700">À la fin de cette leçon, vous serez capable de :</p>
                        <ul class="space-y-4">
                            <li class="flex items-start gap-3"><span class="text-indigo-600 text-xl">✅</span> <span><strong>Installer le SDK .NET</strong> et l’environnement (Visual Studio Community ou VS Code)</span></li>
                            <li class="flex items-start gap-3"><span class="text-indigo-600 text-xl">✅</span> <span><strong>Créer une application console</strong> avec la commande <code class="inline-code">dotnet new console</code></span></li>
                            <li class="flex items-start gap-3"><span class="text-indigo-600 text-xl">✅</span> <span><strong>Comprendre la structure</strong> d’un programme C# : <code class="inline-code">using</code>, <code class="inline-code">namespace</code>, <code class="inline-code">class</code> et la méthode <code class="inline-code">Main</code></span></li>
                        </ul>
                        <div class="bg-indigo-50 p-4 rounded-xl border-l-4 border-indigo-400">
                            <p class="text-sm text-indigo-800">✨ Pourquoi cette leçon ? Bien installer les outils est la première étape pour coder comme un pro !</p>
                        </div>
                    </div>
                `
            },
            { // slide 2 : Installer SDK .NET et IDE
                title: "⚙️ Installation de l'environnement",
                content: `
                    <div class="space-y-5">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div class="bg-slate-50 p-4 rounded-xl">
                                <h3 class="font-bold text-indigo-800 flex items-center gap-2"><span>🔽</span> 1. SDK .NET</h3>
                                <p class="text-sm mt-2">Téléchargez le SDK .NET (8 ou 9) depuis <strong>dotnet.microsoft.com</strong>. Vérifiez l’installation avec :</p>
                                <pre class="text-xs mt-2"><code>dotnet --version</code></pre>
                            </div>
                            <div class="bg-slate-50 p-4 rounded-xl">
                                <h3 class="font-bold text-indigo-800 flex items-center gap-2"><span>🖥️</span> 2. Éditeur de code</h3>
                                <p class="text-sm mt-2">🔹 Visual Studio Community (Windows/Mac) : complet pour C# <br> 🔹 VS Code + extension C# (léger, gratuit, multiplateforme)</p>
                                <div class="mt-2 flex flex-wrap gap-2 text-xs">
                                    <span class="bg-indigo-100 px-2 py-0.5 rounded-full">extension "C# Dev Kit"</span>
                                    <span class="bg-indigo-100 px-2 py-0.5 rounded-full">Omnisharp</span>
                                </div>
                            </div>
                        </div>
                        <div class="relative w-full bg-gray-100 rounded-xl p-3 text-center">
                            <p class="text-sm font-medium">🎓 Astuce Cameroun : internet limité ? Téléchargez le SDK hors ligne ou partagez en clé USB. Visual Studio Community est gratuit pour les étudiants.</p>
                        </div>
                        <!-- dessin SVG simple representant le terminal -->
                        <div class="flex justify-center pt-2">
                            <svg width="200" height="80" viewBox="0 0 300 80" xmlns="http://www.w3.org/2000/svg" class="max-w-full">
                                <rect x="20" y="15" width="260" height="50" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
                                <circle cx="38" cy="40" r="4" fill="#f97316"/>
                                <circle cx="58" cy="40" r="4" fill="#facc15"/>
                                <circle cx="78" cy="40" r="4" fill="#22c55e"/>
                                <text x="100" y="45" fill="#cbd5e1" font-size="12" font-family="monospace">dotnet --version → 8.0.xxx</text>
                            </svg>
                        </div>
                        <p class="text-xs text-gray-500 text-center">💡 Sur Linux/macOS, utilisez votre gestionnaire de paquets ou script d'installation.</p>
                    </div>
                `
            },
            { // slide 3 : créer application console, dotnet new console
                title: "🚀 Créer votre première app console",
                content: `
                    <div class="space-y-5">
                        <div class="bg-gradient-to-r from-indigo-50 to-sky-50 p-4 rounded-xl">
                            <h3 class="font-bold text-lg">📁 Étapes magiques :</h3>
                            <ol class="list-decimal list-inside space-y-2 mt-2 text-slate-800">
                                <li>Ouvrez un terminal (cmd, PowerShell, bash)</li>
                                <li>Créez un dossier : <code class="inline-code">mkdir MonPremierProjet</code> puis <code class="inline-code">cd MonPremierProjet</code></li>
                                <li>Tapez : <code class="inline-code bg-gray-900 text-white px-2 py-1 rounded">dotnet new console</code></li>
                                <li>Exécutez : <code class="inline-code bg-gray-900 text-white px-2 py-1 rounded">dotnet run</code></li>
                            </ol>
                        </div>
                        <div class="border border-slate-200 rounded-xl p-3 bg-white shadow-sm">
                            <p class="text-sm font-semibold mb-1">✨ Résultat dans le terminal :</p>
                            <pre><code>Hello, World!</code></pre>
                            <p class="text-xs text-gray-500 mt-2">🎉 Félicitations ! Vous venez d'exécuter votre premier programme C#.</p>
                        </div>
                        <!-- petit dessin représentant le fichier généré -->
                        <div class="flex flex-wrap justify-between items-center gap-2 text-xs bg-slate-100 p-3 rounded-xl">
                            <div class="flex items-center gap-1"><span class="font-mono">📄 Program.cs</span> <span class="text-gray-500">fichier principal</span></div>
                            <div class="flex items-center gap-1"><span class="font-mono">⚙️ .csproj</span> <span class="text-gray-500">fichier projet</span></div>
                            <div class="flex items-center gap-1"><span class="font-mono">📦 obj/</span> <span class="text-gray-500">dossiers temporaires</span></div>
                        </div>
                    </div>
                `
            },
            { // slide 4 : structure du programme C# (using, namespace, class, Main)
                title: "🧠 Structure d'un programme C#",
                content: `
                    <div class="space-y-5">
                        <p class="text-slate-700">Le code généré par <code class="inline-code">dotnet new console</code> ressemble à ceci :</p>
                        <pre><code>using System;

namespace MonPremierProjet
{
    class Program
    {
        static void Main(string[] args)
        {
            Console.WriteLine("Hello, World!");
        }
    }
}</code></pre>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-sm">
                            <div class="bg-slate-50 p-3 rounded-lg"><span class="font-mono font-bold text-indigo-700">using System;</span><br/>📌 Importe l'espace de noms System (Console, etc.)</div>
                            <div class="bg-slate-50 p-3 rounded-lg"><span class="font-mono font-bold text-indigo-700">namespace ...</span><br/>📦 Organise ton code, évite les conflits de noms.</div>
                            <div class="bg-slate-50 p-3 rounded-lg"><span class="font-mono font-bold text-indigo-700">class Program</span><br/>🧩 Bloc principal contenant méthodes et données.</div>
                            <div class="bg-slate-50 p-3 rounded-lg"><span class="font-mono font-bold text-indigo-700">static void Main()</span><br/>🚪 Point d'entrée : c'est par là que tout commence !</div>
                        </div>
                        <div class="bg-amber-50 p-3 rounded-xl border border-amber-200 text-amber-800 text-sm">
                            💡 <strong>À retenir :</strong> tout programme C# a besoin d'une classe avec une méthode Main. L'environnement .NET l'appelle automatiquement.
                        </div>
                        <!-- petite analogie simple -->
                        <div class="flex items-center gap-3 text-center justify-center text-xs text-gray-600 bg-white rounded-xl shadow-inner p-2">
                            <span>🏠 Maison = Namespace</span> → <span>🚪 Pièce = Classe</span> → <span>🔑 Entrée = Main()</span>
                        </div>
                    </div>
                `
            }
        ];
        
        let currentSlide = 0;
        const totalSlides = slides.length;
        
        // fonctions de rendu et maj
        function renderSlide(index) {
            const slide = slides[index];
            if (!slide) return;
            const titleHtml = slide.title ? `<h2 class="text-2xl md:text-3xl font-bold text-indigo-800 mb-4 pb-2 border-b border-indigo-100">${slide.title}</h2>` : '';
            const fullHtml = `
                ${titleHtml}
                <div class="slide-content">
                    ${slide.content}
                </div>
            `;
            $('#slideContent').fadeOut(120, function() {
                $(this).html(fullHtml);
                // réactiver MathJax si besoin sur nouvelles formules (aucune formule complexe mais sécurité)
                if (window.MathJax) {
                    MathJax.typesetPromise();
                }
                $(this).fadeIn(150);
            });
            
            // Mettre à jour compteur, progress bar et indicateurs
            $('#slideCounter').text(`Slide ${index+1} / ${totalSlides}`);
            const progressPercent = ((index+1) / totalSlides) * 100;
            $('#progressFill').css('width', `${progressPercent}%`);
            
            // gestion état boutons
            $('#prevSlide').prop('disabled', index === 0);
            $('#nextSlide').prop('disabled', index === totalSlides-1);
            
            // mettre à jour les points (dots)
            updateDots(index);
        }
        
        function updateDots(activeIndex) {
            let dotsHtml = '';
            for (let i = 0; i < totalSlides; i++) {
                let activeClass = (i === activeIndex) ? 'bg-indigo-600 w-6' : 'bg-gray-300 w-2';
                dotsHtml += `<span class="h-2 rounded-full transition-all ${activeClass}"></span>`;
            }
            $('#dotsIndicator').html(dotsHtml);
        }
        
        // navigation
        function nextSlide() {
            if (currentSlide < totalSlides - 1) {
                currentSlide++;
                renderSlide(currentSlide);
            }
        }
        
        function prevSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                renderSlide(currentSlide);
            }
        }
        
        // initialisation + événements + support swipe mobile (jQuery simple)
        $(document).ready(function() {
            renderSlide(0);
            
            $('#nextSlide').on('click', nextSlide);
            $('#prevSlide').on('click', prevSlide);
            
            // raccourcis clavier (flèches)
            $(document).on('keydown', function(e) {
                if (e.key === 'ArrowRight') {
                    nextSlide();
                    e.preventDefault();
                } else if (e.key === 'ArrowLeft') {
                    prevSlide();
                    e.preventDefault();
                }
            });
            
            // swipe pour mobile (touch)
            let touchStartX = 0;
            let touchEndX = 0;
            const slideContainer = document.querySelector('.card-slide');
            if (slideContainer) {
                slideContainer.addEventListener('touchstart', (e) => {
                    touchStartX = e.changedTouches[0].screenX;
                }, false);
                slideContainer.addEventListener('touchend', (e) => {
                    touchEndX = e.changedTouches[0].screenX;
                    if (touchEndX < touchStartX - 40) nextSlide();
                    if (touchEndX > touchStartX + 40) prevSlide();
                }, false);
            }
        });
    </script>
</body>
</html>
