<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 19 : Héritage & Polymorphisme - C# | Cours Web Dev</title>
    <!-- Tailwind CSS + Google Fonts pour lisibilité -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax pour formules (optionnel, mais présent) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* transitions slides douces */
        .slide-container {
            transition: opacity 0.3s ease-in-out;
        }
        .slide {
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .slide.active {
            display: block;
            opacity: 1;
        }
        /* navigation boutons */
        .nav-btn {
            transition: all 0.2s;
        }
        .nav-btn:hover:not(:disabled) {
            transform: scale(1.02);
            background-color: #1e3a8a;
        }
        /* personnalisation scroll / code */
        pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 1rem;
            border-radius: 1rem;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            margin: 1rem 0;
        }
        code {
            font-family: 'Courier New', monospace;
            background: #f1f5f9;
            padding: 0.2rem 0.4rem;
            border-radius: 0.5rem;
            color: #0f172a;
        }
        .dark-code code {
            background: #334155;
            color: #f1f5f9;
        }
        .card-lesson {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(2px);
        }
        @media (max-width: 640px) {
            .text-title {
                font-size: 1.8rem;
            }
            pre {
                font-size: 0.75rem;
                padding: 0.8rem;
            }
        }
        .bg-soft {
            background: linear-gradient(135deg, #f0f9ff 0%, #e6f0fa 100%);
        }
    </style>
</head>
<body class="bg-soft font-sans antialiased">

    <div class="max-w-5xl mx-auto px-4 py-6 md:py-10">
        <!-- Conteneur principal slides -->
        <div class="slide-container relative bg-white/70 backdrop-blur-sm rounded-3xl shadow-2xl border border-blue-100 overflow-hidden">
            
            <!-- En-tête fixe avec progression -->
            <div class="bg-indigo-800 text-white px-5 py-3 flex justify-between items-center flex-wrap gap-2">
                <div class="flex items-center gap-2">
                    <span class="font-bold text-lg">📘 C# avancé</span>
                    <span class="text-sm bg-indigo-600 px-3 py-1 rounded-full">Leçon 19 : virtual / override / new</span>
                </div>
                <div class="text-sm bg-indigo-900/60 px-3 py-1 rounded-full">
                    <span id="slideCounter">1</span> / <span id="totalSlides">0</span>
                </div>
            </div>

            <!-- Zone dynamique des slides -->
            <div id="slidesWrapper" class="p-5 md:p-8 min-h-[500px]">
                <!-- Les slides seront injectées via jQuery -->
            </div>

            <!-- Navigation -->
            <div class="flex justify-between items-center px-5 py-4 border-t border-blue-100 bg-white/50">
                <button id="prevSlide" class="nav-btn bg-indigo-700 hover:bg-indigo-800 disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-semibold py-2 px-5 rounded-xl shadow-md transition">◀ Précédent</button>
                <div class="text-sm text-gray-600 hidden md:block">✨ Polymorphisme : redéfinir pour mieux évoluer</div>
                <button id="nextSlide" class="nav-btn bg-indigo-700 hover:bg-indigo-800 disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-semibold py-2 px-5 rounded-xl shadow-md transition">Suivant ▶</button>
            </div>
        </div>
        
        <footer class="text-center text-gray-500 text-xs mt-6">
            Cours conçu pour les élèves du Cameroun - Initiation C# | Héritage & polymorphisme
        </footer>
    </div>

    <script>
        // Contenu des slides structuré : titre, objectifs, contenu principal détaillé
        // Slide 1 : Titre de la leçon
        // Slide 2 : Objectifs pédagogiques
        // Slides 3, 4, 5, 6 : contenu (explications, exemples, schéma ascii, bonnes pratiques)
        
        const slidesData = [
            { // slide 0
                type: "title",
                title: "🎯 virtual, override, new",
                subtitle: "Redéfinition de méthodes en C# | Héritage & polymorphisme",
                icon: "🔄",
                bgDecor: "bg-gradient-to-br from-indigo-50 to-blue-50"
            },
            { // slide 1 objectifs
                type: "objectifs",
                title: "📌 Objectifs de la leçon",
                points: [
                    "✔️ Comprendre le polymorphisme par redéfinition (override)",
                    "✔️ Savoir déclarer une méthode virtuelle avec le mot-clé <span class='font-mono bg-gray-200 px-1 rounded'>virtual</span>",
                    "✔️ Redéfinir une méthode dans une classe dérivée grâce à <span class='font-mono bg-gray-200 px-1 rounded'>override</span>",
                    "✔️ Distinguer <span class='font-mono bg-gray-200 px-1 rounded'>override</span> du masquage avec <span class='font-mono bg-gray-200 px-1 rounded'>new</span>",
                    "✔️ Utiliser le polymorphisme pour écrire du code extensible"
                ]
            },
            { // slide 2 : rappel héritage + virtual
                type: "content",
                title: "🧩 Méthodes virtuelles : la clé du polymorphisme",
                content: `
                    <p class="mb-3">Quand une classe parent possède une méthode marquée <code class="bg-gray-200 px-1 rounded">virtual</code>, une classe enfant peut la <strong>réécrire</strong> pour fournir sa propre implémentation.</p>
                    <div class="bg-indigo-50 p-4 rounded-xl border-l-8 border-indigo-500 my-4">
                        <p class="font-semibold">💡 Pourquoi virtual ?</p>
                        <p>Sans <code>virtual</code>, une méthode ne peut pas être redéfinie. Grâce à <code>override</code>, C# exécute la version la plus dérivée de l'objet (même si manipulé via une référence de type parent). C'est la base du polymorphisme.</p>
                    </div>
                    <pre><code>// Classe de base
public class Animal
{
    public virtual string FaireDuBruit()
    {
        return "L'animal émet un son...";
    }
}

// Classe dérivée
public class Chien : Animal
{
    public override string FaireDuBruit()
    {
        return "Wouf wouf ! 🐕";
    }
}</code></pre>
                    <p class="mt-3 text-sm italic">🔍 Appeler <code>FaireDuBruit()</code> sur un <code>Animal</code> pointant vers <code>Chien</code> déclenche la version "Chien".</p>
                `
            },
            { // slide 3 : override en action + polymorphisme
                type: "content",
                title: "⚙️ Exemple concret : override vs appel de base",
                content: `
                    <p class="mb-2">On peut aussi réutiliser l'implémentation parente avec <code class="bg-gray-200">base.NomMethode()</code>.</p>
                    <pre><code>public class Oiseau : Animal
{
    public override string FaireDuBruit()
    {
        string baseSound = base.FaireDuBruit(); // "L'animal émet un son..."
        return baseSound + " Puis l'oiseau chante : Cui cui ! 🐦";
    }
}

// Utilisation polymorphique
Animal monAnimal = new Chien();
Console.WriteLine(monAnimal.FaireDuBruit()); // Wouf wouf !

Animal oiseauAnim = new Oiseau();
Console.WriteLine(oiseauAnim.FaireDuBruit()); 
// L'animal émet un son... Puis l'oiseau chante : Cui cui !</code></pre>
                    <div class="bg-yellow-50 p-3 rounded-lg mt-3 text-sm">
                        ⚠️ <span class="font-semibold">Sans override</span>, si on utilise le mot-clé <code>new</code>, le comportement change : la méthode de la classe parent est appelée selon le type de référence.
                    </div>
                `
            },
            { // slide 4 : différence override vs new (masquage)
                type: "content",
                title: "🔁 override versus new : quelles différences ?",
                content: `
                    <p><strong>override</strong> : redéfinit complètement la méthode virtuelle. Le polymorphisme fonctionne (même à travers une référence parent).</p>
                    <p><strong>new</strong> : masque la méthode parent sans polymorphisme. Si on utilise une référence parent, c'est la version parent qui est appelée.</p>
                    <pre><code>public class Parent {
    public virtual void Afficher() => Console.WriteLine("Parent");
}
public class EnfantOverride : Parent {
    public override void Afficher() => Console.WriteLine("Enfant override");
}
public class EnfantNew : Parent {
    public new void Afficher() => Console.WriteLine("Enfant new (masquage)");
}

Parent p1 = new EnfantOverride();
p1.Afficher();  // "Enfant override" (polymorphisme)

Parent p2 = new EnfantNew();
p2.Afficher();  // "Parent"   ⚠️ car new ne redéfinit pas virtuellement

EnfantNew p3 = new EnfantNew();
p3.Afficher();  // "Enfant new (masquage)"</code></pre>
                    <div class="bg-red-50 p-3 rounded-lg mt-2"><span class="font-bold">📌 Règle d'or :</span> utilisez <code>override</code> pour le polymorphisme, réservez <code>new</code> à des cas très spécifiques où vous voulez rompre la chaîne de redéfinition.</div>
                `
            },
            { // slide 5 : schéma ASCII (dessin maison pour illustrer)
                type: "content",
                title: "🎨 Polymorphisme illustré (héritage visuel)",
                content: `
                    <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
                        <div class="bg-gray-800 text-green-300 p-4 rounded-xl font-mono text-xs md:text-sm w-full overflow-x-auto">
                            <pre class="bg-transparent text-green-300 p-0 m-0">
      Animal (classe parent)
      ┌─────────────────┐
      │ + virtual FaireDuBruit() │
      └────────┬────────┘
               │
       ┌───────┴───────┐
       ▼               ▼
   ┌──────┐       ┌─────────┐
   │ Chien│       │ Oiseau  │
   │override│     │override │
   └──────┘       └─────────┘
   
   Référence Animal -> Chien  => exécute Chien.FaireDuBruit()
   Référence Animal -> Oiseau => exécute Oiseau.FaireDuBruit()
                            </pre>
                        </div>
                        <div class="bg-indigo-100 p-4 rounded-2xl w-full">
                            <p class="font-bold text-indigo-900">📢 Exemple concret dans une liste :</p>
                            <pre class="bg-indigo-900 text-indigo-100 text-xs p-3 rounded-lg"><code>List&lt;Animal&gt; animaux = new() { new Chien(), new Oiseau() };
foreach (var a in animaux)
    Console.WriteLine(a.FaireDuBruit());
// Résultat : Wouf wouf !   +   L'animal émet un son... Puis l'oiseau chante : Cui cui !</code></pre>
                        </div>
                    </div>
                `
            },
            { // slide 6 : bonnes pratiques + récap
                type: "content",
                title: "✅ Bonnes pratiques & pièges à éviter",
                content: `
                    <ul class="list-disc pl-5 space-y-2">
                        <li><span class="font-semibold">✔ Toujours utiliser <code>override</code> pour redéfinir une méthode virtuelle.</span> C'est plus clair et respecte le polymorphisme.</li>
                        <li><span class="font-semibold">🔁 Appel à <code>base</code> judicieux</span> : si vous voulez enrichir le comportement parent, appelez la méthode de base.</li>
                        <li><span class="font-semibold">🚫 Ne pas confondre <code>new</code> et <code>override</code></span> : <code>new</code> peut briser l’effet attendu dans un contexte polymorphique.</li>
                        <li><span class="font-semibold">💎 Propriétés virtuelles</span> : on peut aussi utiliser <code>virtual</code> / <code>override</code> sur des propriétés (get/set).</li>
                        <li><span class="font-semibold">📚 Documentation : </span> les méthodes marquées <code>sealed override</code> empêchent une redéfinition plus profonde.</li>
                    </ul>
                    <div class="mt-5 p-3 bg-blue-50 rounded-lg text-blue-800">
                        💡 Exercice pour vous : Créez une classe <code>Forme</code> avec <code>virtual double CalculerAire()</code>. Ensuite <code>Cercle</code> et <code>Rectangle</code> qui surchargent cette méthode. Affichez les aires polymorphiquement.
                    </div>
                `
            }
        ];

        let currentIndex = 0;
        let total = slidesData.length;

        // Fonction pour générer le HTML dynamique des slides
        function renderSlide(slide, idx) {
            if (slide.type === "title") {
                return `
                    <div class="text-center py-6 md:py-10 flex flex-col items-center justify-center min-h-[420px]">
                        <div class="text-7xl mb-4">${slide.icon || "📖"}</div>
                        <h1 class="text-3xl md:text-5xl font-extrabold bg-gradient-to-r from-indigo-800 to-purple-700 bg-clip-text text-transparent">${slide.title}</h1>
                        <p class="text-lg md:text-xl text-gray-700 mt-4 max-w-xl mx-auto">${slide.subtitle}</p>
                        <div class="mt-8 flex flex-wrap justify-center gap-2 text-sm text-indigo-600 bg-indigo-50 px-4 py-2 rounded-full">
                            <span>🎯 Héritage C#</span> • <span>⚡ Polymorphisme</span> • <span>🔄 virtual / override</span>
                        </div>
                    </div>
                `;
            } 
            else if (slide.type === "objectifs") {
                return `
                    <div class="py-4">
                        <h2 class="text-2xl md:text-3xl font-bold text-indigo-800 border-l-8 border-indigo-500 pl-4 mb-6">${slide.title}</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            ${slide.points.map(p => `
                                <div class="flex items-start gap-3 bg-white rounded-xl shadow p-3 hover:shadow-md transition">
                                    <span class="text-indigo-600 text-xl">🎯</span>
                                    <span class="text-gray-800">${p}</span>
                                </div>
                            `).join('')}
                        </div>
                        <div class="mt-6 text-center text-indigo-500 text-sm italic">✨ À la fin de cette leçon, vous saurez appliquer le polymorphisme C# avec élégance</div>
                    </div>
                `;
            } 
            else {
                // contenu classique
                return `
                    <div>
                        <h2 class="text-2xl md:text-3xl font-bold text-indigo-800 border-l-8 border-indigo-500 pl-4 mb-5">${slide.title}</h2>
                        <div class="prose prose-lg max-w-none text-gray-800">
                            ${slide.content}
                        </div>
                    </div>
                `;
            }
        }

        function updateSlides() {
            const wrapper = $("#slidesWrapper");
            if (!wrapper) return;
            // Générer toutes les slides (pour gestion dynamique)
            let slidesHtml = '';
            for (let i = 0; i < slidesData.length; i++) {
                const s = slidesData[i];
                const activeClass = (i === currentIndex) ? 'active' : '';
                slidesHtml += `<div class="slide ${activeClass}" data-slide-index="${i}">${renderSlide(s, i)}</div>`;
            }
            wrapper.html(slidesHtml);
            $("#totalSlides").text(slidesData.length);
            $("#slideCounter").text(currentIndex + 1);
            
            // Gestion des boutons prev/next
            $("#prevSlide").prop('disabled', currentIndex === 0);
            $("#nextSlide").prop('disabled', currentIndex === slidesData.length - 1);
            
            // Attacher des events de swipe? Petite amélioration tactile optionnelle
        }
        
        function goToSlide(index) {
            if (index < 0 || index >= slidesData.length) return;
            // Retirer la classe active de toutes les slides
            $(".slide").removeClass("active");
            currentIndex = index;
            $(`.slide[data-slide-index="${currentIndex}"]`).addClass("active");
            $("#slideCounter").text(currentIndex + 1);
            $("#prevSlide").prop('disabled', currentIndex === 0);
            $("#nextSlide").prop('disabled', currentIndex === slidesData.length - 1);
            // Scroll en haut du slide container (option)
            $('html, body').animate({ scrollTop: $("#slidesWrapper").offset().top - 20 }, 200);
        }
        
        $(document).ready(function() {
            updateSlides();
            
            $("#nextSlide").on("click", function() {
                if (currentIndex < slidesData.length - 1) {
                    goToSlide(currentIndex + 1);
                }
            });
            $("#prevSlide").on("click", function() {
                if (currentIndex > 0) {
                    goToSlide(currentIndex - 1);
                }
            });
            
            // Gestion clavier : flèche gauche/droite pour une bonne expérience
            $(document).keydown(function(e) {
                if (e.key === "ArrowLeft") {
                    $("#prevSlide").click();
                } else if (e.key === "ArrowRight") {
                    $("#nextSlide").click();
                }
            });
            
            // On ajoute un petit effet pour rendre les pré/code adaptés au dark ?
            // Adapter via tailwind déjà ok
        });
    </script>
    <!-- Note: aucun moteur de recherche nécessaire car nous avons dessiné des schémas ascii et tous les exemples sont présents -->
</body>
</html>
