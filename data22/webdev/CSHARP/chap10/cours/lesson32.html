<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cours C# - Programmation asynchrone (async/await) | Développement Web</title>
    <!-- Tailwind CSS via CDN + base pour couleurs douces -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax pour formules mathématiques (optionnel, peu utilisé ici mais présent) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* Styles personnalisés pour slides et confort visuel */
        body {
            background: #f8fafc; /* fond clair mais reposant */
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
        }
        .slide-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
        }
        .slide-card {
            background: white;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            transition: all 0.2s ease;
            overflow: hidden;
        }
        .nav-btn {
            background-color: #1e293b;
            transition: 0.2s;
        }
        .nav-btn:hover:not(:disabled) {
            background-color: #0f172a;
            transform: scale(1.02);
        }
        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .dot-active {
            background-color: #2563eb;
            width: 2rem;
        }
        .dot-inactive {
            background-color: #cbd5e1;
            width: 0.75rem;
        }
        .progress-bar {
            transition: width 0.3s ease;
        }
        /* mise en valeur des concepts asynchrones */
        .code-block {
            background-color: #1e293b;
            color: #e2e8f0;
            border-radius: 1rem;
            padding: 1rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .highlight-async {
            border-left: 5px solid #3b82f6;
            background-color: #eff6ff;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
        }
        @media (max-width: 640px) {
            .slide-card {
                border-radius: 1.5rem;
            }
            .code-block {
                font-size: 0.75rem;
                padding: 0.75rem;
            }
            h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body class="antialiased">

<div class="slide-container py-4 md:py-8">
    <!-- Slide principal dynamique -->
    <div id="slideWrapper" class="relative">
        <div id="currentSlide" class="slide-card">
            <!-- le contenu sera injecté par jQuery -->
            <div class="p-5 md:p-8">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-sm font-semibold px-3 py-1 bg-blue-100 text-blue-800 rounded-full">Leçon 32 · Initiation C#</span>
                    <span id="slideCounter" class="text-sm text-gray-500 bg-gray-100 px-3 py-1 rounded-full">Slide 1 / ?</span>
                </div>
                <div id="slideContent">
                    <!-- Contenu dynamique -->
                </div>
            </div>
        </div>

        <!-- Navigation + indicateurs -->
        <div class="flex flex-wrap justify-between items-center mt-6 gap-3">
            <button id="prevSlide" class="nav-btn text-white px-5 py-2 rounded-full text-sm md:text-base font-medium shadow-md flex items-center gap-1 disabled:opacity-40" disabled>
                ← Précédent
            </button>
            <div class="flex gap-2 flex-wrap justify-center" id="dotsContainer">
                <!-- dots générés dynamiquement -->
            </div>
            <button id="nextSlide" class="nav-btn text-white px-5 py-2 rounded-full text-sm md:text-base font-medium shadow-md flex items-center gap-1">
                Suivant →
            </button>
        </div>
        <!-- barre de progression -->
        <div class="w-full bg-gray-200 rounded-full h-2 mt-6">
            <div id="progressBar" class="bg-blue-600 h-2 rounded-full progress-bar" style="width: 0%"></div>
        </div>
    </div>
</div>

<script>
    // Définition des slides pour la lesson32 : Comprendre async/await (programmation asynchrone)
    // Structure: Slide 0 = Titre & intro, Slide 1 = Objectifs pédagogiques, Slides suivants = contenu détaillé
    const slidesData = [
        { // slide 0 : titre de la leçon
            type: "title",
            title: "⚡ Programmation asynchrone en C#",
            subtitle: "Maîtriser async / await pour des applications réactives",
            badge: "Lesson 32 · .NET moderne"
        },
        { // slide 1 : objectifs d'apprentissage
            type: "objectives",
            objectives: [
                "Comprendre la programmation asynchrone et ses avantages (fluidité, performances)",
                "Déclarer une méthode async et utiliser le mot-clé await",
                "Distinguer Task<T> (avec retour) et Task (sans retour)",
                "Exemples concrets dans une console et dans une application réelle"
            ]
        },
        { // slide 2 : Qu'est-ce que l'asynchrone ?
            type: "content",
            title: "🕒 Synchrone vs Asynchrone",
            content: `<p class="mb-3">En programmation traditionnelle (<span class="font-mono bg-gray-100 px-1">synchrone</span>), chaque instruction bloque l'exécution suivante. Si une opération dure (appel web, lecture fichier, requête base de données), l'application semble « figée ».</p>
            <div class="highlight-async my-4">
                <p class="font-bold text-blue-800">📌 Asynchrone :</p>
                <p>Permet de démarrer une tâche longue sans bloquer le thread principal. L'application reste réactive, et quand la tâche est terminée, le code reprend là où il s'était arrêté.</p>
            </div>
            <p>Avantages : Interfaces fluides, meilleure utilisation des ressources serveur (API, jeux, I/O). C# propose le modèle <code class="bg-gray-200 px-1 rounded">async/await</code> depuis C# 5.</p>`
        },
        { // slide 3 : async et await - syntaxe de base
            type: "content",
            title: "📖 Déclarer une méthode async / await",
            content: `<p class="mb-2">Une méthode asynchrone est marquée avec le modificateur <code class="bg-gray-200 px-1 rounded font-bold">async</code>. Le type de retour doit être :</p>
            <ul class="list-disc pl-6 space-y-1 mb-3">
                <li><code class="bg-gray-200 px-1 rounded">Task</code> : pour une méthode qui ne retourne aucune valeur (équivalent de <code>void</code> asynchrone).</li>
                <li><code class="bg-gray-200 px-1 rounded">Task&lt;TResult&gt;</code> : pour une méthode qui retourne une valeur de type <code>TResult</code>.</li>
                <li><code class="bg-gray-200 px-1 rounded">void</code> (uniquement pour les gestionnaires d'événements, à éviter ailleurs).</li>
            </ul>
            <div class="code-block">
                <span class="text-green-300">// Exemple : méthode async qui retourne une chaîne</span><br>
                <span class="text-yellow-300">public async Task&lt;string&gt; ObtenirMessageAsync()</span><br>
                {<br>
                &nbsp;&nbsp;&nbsp;&nbsp;<span class="text-blue-300">await</span> Task.Delay(2000);  // simule un traitement long<br>
                &nbsp;&nbsp;&nbsp;&nbsp;<span class="text-green-300">return</span> "Bonjour depuis async !";<br>
                }<br><br>
                <span class="text-yellow-300">public async Task ExecuterAsync()</span><br>
                {<br>
                &nbsp;&nbsp;&nbsp;&nbsp;string resultat = <span class="text-blue-300">await</span> ObtenirMessageAsync();<br>
                &nbsp;&nbsp;&nbsp;&nbsp;Console.WriteLine(resultat);<br>
                }
            </div>
            <p class="mt-3 text-sm text-gray-600"><span class="font-semibold">await</span> suspend l'exécution de la méthode jusqu'à ce que la tâche soit terminée, sans bloquer le thread.</p>`
        },
        { // slide 4 : Task et Task<T>
            type: "content",
            title: "🧩 Comprendre Task et Task&lt;T&gt;",
            content: `<p><strong>Task</strong> représente une opération asynchrone qui peut être en attente, en cours, terminée ou ayant échoué. <strong>Task&lt;TResult&gt;</strong> est une spécialisation qui retourne un résultat.</p>
            <div class="code-block mt-3">
                // Tâche sans valeur de retour<br>
                Task tache = File.WriteAllTextAsync("test.txt", "contenu");<br>
                await tache;<br><br>
                // Tâche avec retour<br>
                Task&lt;int&gt; calculTask = CalculerSommeAsync(10, 20);<br>
                int somme = await calculTask;<br>
                Console.WriteLine(somme);
            </div>
            <div class="bg-indigo-50 p-3 rounded-lg mt-3">
                💡 <span class="font-medium">Bon à savoir :</span> On peut démarrer une tâche manuellement avec <code class="bg-gray-200 px-1 rounded">Task.Run(() => ...)</code> pour déléguer du code CPU-intensif à un thread du pool.
            </div>`
        },
        { // slide 5 : Exemple pratique "appel cuisine"
            type: "content",
            title: "🍳 Exemple concret : Préparer un café asynchrone",
            content: `<p>Imaginez : faire bouillir l'eau (3 secondes) et pendant ce temps, vous pouvez ranger la cuisine. C'est l'asynchrone !</p>
            <div class="code-block text-sm">
                async Task&lt;string&gt; ChaufferEauAsync() {<br>
                &nbsp;&nbsp;&nbsp;&nbsp;Console.WriteLine("⏳ Chauffage de l'eau...");<br>
                &nbsp;&nbsp;&nbsp;&nbsp;await Task.Delay(3000);<br>
                &nbsp;&nbsp;&nbsp;&nbsp;return "Eau chaude ☕";<br>
                }<br><br>
                async Task FaireCafeAsync() {<br>
                &nbsp;&nbsp;&nbsp;&nbsp;Console.WriteLine("Démarrer la machine...");<br>
                &nbsp;&nbsp;&nbsp;&nbsp;string eau = await ChaufferEauAsync();<br>
                &nbsp;&nbsp;&nbsp;&nbsp;Console.WriteLine($"{eau} - Café prêt !");<br>
                }<br><br>
                // Dans Main, appeler: await FaireCafeAsync();
            </div>
            <p class="mt-3">Pendant l'attente (<code>await Task.Delay</code>), le thread peut traiter d'autres événements : interface réactive, autres requêtes.</p>`
        },
        { // slide 6: Gestion des exceptions
            type: "content",
            title: "⚠️ Exceptions et asynchrone",
            content: `<p>La gestion des exceptions se fait naturellement avec <code>try/catch</code> autour de l'appel <code>await</code>. Les exceptions levées dans une tâche asynchrone sont propagées lors du <code>await</code>.</p>
            <div class="code-block">
                try {<br>
                &nbsp;&nbsp;&nbsp;&nbsp;string data = await LireFichierAsync("fichier.txt");<br>
                }<br>
                catch (FileNotFoundException ex) {<br>
                &nbsp;&nbsp;&nbsp;&nbsp;Console.WriteLine($"Fichier introuvable : {ex.Message}");<br>
                }<br>
                catch (Exception ex) {<br>
                &nbsp;&nbsp;&nbsp;&nbsp;Console.WriteLine($"Erreur : {ex.Message}");<br>
                }
            </div>
            <div class="highlight-async mt-3">
                🔥 Important : Ne jamais écrire <code>async void</code> sauf pour les gestionnaires d'événements (WinForms, WPF, MAUI), car les exceptions ne peuvent pas être capturées facilement.
            </div>`
        },
        { // slide 7 : Bonnes pratiques et récapitulatif
            type: "content",
            title: "🎯 Synthèse & bonnes pratiques",
            content: `<ul class="list-disc pl-6 space-y-2">
                <li>Nommez les méthodes asynchrones avec le suffixe "Async" (ex: <code>GetUserAsync</code>).</li>
                <li>Évitez <code>.Result</code> ou <code>.Wait()</code> car cela peut causer des <strong>deadlocks</strong> (blocage) dans certains contextes (UI, ASP.NET).</li>
                <li>Préférez <code>await</code> jusqu'en haut de la pile d'appels.</li>
                <li>Utilisez <code>Task.WhenAll</code> pour attendre plusieurs tâches en parallèle.</li>
                <li>Pour annuler une tâche asynchrone, utilisez <code>CancellationToken</code> (future leçon).</li>
            </ul>
            <div class="mt-5 p-3 bg-green-50 border border-green-200 rounded-xl">
                <p class="font-semibold">✅ À retenir : async/await rend le code asynchrone aussi lisible que du code synchrone, mais avec de bien meilleures performances pour les opérations d'entrée-sortie.</p>
            </div>`
        }
    ];

    let currentIndex = 0;
    const totalSlides = slidesData.length;

    // Fonction pour générer le contenu HTML d'un slide selon son type
    function renderSlide(index) {
        const slide = slidesData[index];
        if (!slide) return "";

        if (slide.type === "title") {
            return `
                <div class="text-center py-4 md:py-8">
                    <span class="inline-block bg-blue-100 text-blue-700 text-sm font-semibold px-4 py-1 rounded-full mb-4">${slide.badge}</span>
                    <h1 class="text-3xl md:text-5xl font-extrabold bg-gradient-to-r from-blue-800 to-indigo-700 bg-clip-text text-transparent">${slide.title}</h1>
                    <p class="text-gray-600 text-lg md:text-xl mt-4 max-w-2xl mx-auto">${slide.subtitle}</p>
                    <div class="mt-10 flex justify-center">
                        <div class="bg-gray-100 p-4 rounded-full inline-flex items-center gap-2 text-gray-500"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg> Appuyez sur Suivant →</div>
                    </div>
                </div>
            `;
        } 
        else if (slide.type === "objectives") {
            let objList = "";
            slide.objectives.forEach((obj, idx) => {
                objList += `<li class="flex items-start gap-3 mb-3"><span class="bg-blue-600 text-white rounded-full w-6 h-6 flex items-center justify-center text-sm flex-shrink-0 mt-0.5">${idx+1}</span><span class="text-gray-700">${obj}</span></li>`;
            });
            return `
                <div>
                    <div class="flex items-center gap-2 mb-5">
                        <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <h2 class="text-2xl md:text-3xl font-bold text-gray-800">Objectifs de la leçon</h2>
                    </div>
                    <ul class="space-y-2 text-lg">${objList}</ul>
                    <div class="mt-8 p-4 bg-amber-50 rounded-xl border border-amber-200 text-amber-800 text-sm">
                        💡 Après ce cours, vous saurez rendre vos applications .NET plus réactives et performantes.
                    </div>
                </div>
            `;
        } 
        else if (slide.type === "content") {
            return `
                <div>
                    <h2 class="text-2xl md:text-3xl font-bold text-gray-800 border-l-4 border-blue-500 pl-4 mb-5">${slide.title}</h2>
                    <div class="prose prose-slate max-w-none">${slide.content}</div>
                </div>
            `;
        }
        return "<p>Erreur de contenu</p>";
    }

    // Mise à jour de l'affichage, boutons, dots, progression
    function updateSlides() {
        const contentHtml = renderSlide(currentIndex);
        $("#slideContent").fadeOut(100, function() {
            $(this).html(contentHtml).fadeIn(200);
        });
        $("#slideCounter").text(`Slide ${currentIndex+1} / ${totalSlides}`);
        
        // Gestion des boutons précédent/suivant
        $("#prevSlide").prop("disabled", currentIndex === 0);
        $("#nextSlide").prop("disabled", currentIndex === totalSlides-1);
        
        // Mise à jour des dots
        let dotsHtml = "";
        for (let i = 0; i < totalSlides; i++) {
            let activeClass = (i === currentIndex) ? "dot-active w-8" : "dot-inactive w-3";
            dotsHtml += `<button class="dot-btn h-2 rounded-full transition-all ${activeClass} mx-1" data-index="${i}"></button>`;
        }
        $("#dotsContainer").html(dotsHtml);
        
        // Barre de progression
        const progressPercent = ((currentIndex + 1) / totalSlides) * 100;
        $("#progressBar").css("width", `${progressPercent}%`);
        
        // Scroll automatique en haut du slide pour mobile
        $('html, body').animate({ scrollTop: $("#slideWrapper").offset().top - 20 }, 100);
    }
    
    // Événements
    $("#nextSlide").on("click", function() {
        if (currentIndex < totalSlides - 1) {
            currentIndex++;
            updateSlides();
        }
    });
    $("#prevSlide").on("click", function() {
        if (currentIndex > 0) {
            currentIndex--;
            updateSlides();
        }
    });
    
    // Délégation pour les dots (clics)
    $(document).on("click", ".dot-btn", function() {
        const idx = parseInt($(this).data("index"));
        if (!isNaN(idx) && idx !== currentIndex && idx >=0 && idx < totalSlides) {
            currentIndex = idx;
            updateSlides();
        }
    });
    
    // Initialisation
    updateSlides();

    // Ajout d'un gestionnaire de swipe pour mobiles (optionnel simple)
    let touchStartX = 0;
    let touchEndX = 0;
    const slideContainer = document.getElementById("slideWrapper");
    slideContainer.addEventListener("touchstart", (e) => {
        touchStartX = e.changedTouches[0].screenX;
    });
    slideContainer.addEventListener("touchend", (e) => {
        touchEndX = e.changedTouches[0].screenX;
        if (touchEndX < touchStartX - 50 && currentIndex < totalSlides-1) {
            // swipe gauche -> suivant
            currentIndex++;
            updateSlides();
        } else if (touchEndX > touchStartX + 50 && currentIndex > 0) {
            // swipe droite -> précédent
            currentIndex--;
            updateSlides();
        }
    });
</script>

<!-- Note pédagogique : images dessinées non nécessaires pour ce contenu purement technique; 
     si besoin d'une illustration de concept asynchrone, nous décrivons par texte clair et schémas dans le code  -->

    <p>📘 Cours asynchrone C# · Enseignant au Cameroun · Support visuel adapté aux petits écrans · Utilisation de MathJax pour d'éventuelles formules (aucune formule lourde ici) </p>
    <p class="mt-1">✨ Programmation asynchrone : libérez la puissance du non-bloquant avec async/await.</p>
</footer>
</body>
</html>
