<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Leçon 29 : Gérer les erreurs avec try-catch-finally | C#</title>
  <!-- Tailwind CSS + Google Fonts + Font Awesome (icônes utiles) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Personnalisation Tailwind pour un thème lisible et agréable -->
  <style>
    /* Ajustements supplémentaires pour la lisibilité et le confort visuel */
    body {
      background: linear-gradient(135deg, #f0f9ff 0%, #e6f0fa 100%);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
    }
    .slide-card {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .slide-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.15);
    }
    /* boutons de navigation bien visibles */

      transition: all 0.2s;

    .nav-btn:active {
      transform: scale(0.96);
    }
    /* code blocks: meilleure lisibilité */
    pre {
      border-radius: 1rem;
      background: #1e293b;
      color: #e2e8f0;
      overflow-x: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    code {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.9rem;
    }
    .badge-pill {
      background: #1e3a8a;
      color: white;
      border-radius: 9999px;
      padding: 0.2rem 0.8rem;
      font-size: 0.75rem;
      font-weight: 600;
    }
    /* pour l'affichage mobile: texte fluide */
    @media (max-width: 640px) {
      h1 {
        font-size: 1.8rem;
      }
      .slide-card {
        padding: 1rem;
      }
    }
  </style>
  <!-- jQuery & MathJax (optionnel si formules, mais on le laisse dispo) -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
</head>
<body class="antialiased">

  <div class="max-w-5xl mx-auto px-4 py-6 md:py-10">
    <!-- En-tête fixe avec progression et titre de matière -->
    <div class="flex flex-wrap justify-between items-center mb-4 gap-2">
      <div class="flex items-center gap-2">
        <span class="bg-blue-700 text-white text-xs font-bold px-3 py-1 rounded-full shadow">📘 C# - Initiation</span>
        <span class="bg-gray-200 text-gray-800 text-xs font-semibold px-3 py-1 rounded-full">Chapitre 9 : Gestion robuste des erreurs</span>
      </div>
      <div class="text-sm text-gray-600 bg-white/60 rounded-full px-3 py-1 backdrop-blur-sm">
        Leçon 29/39
      </div>
    </div>

    <!-- Conteneur principal slides -->
    <div id="slides-container" class="relative">
      <!-- Les slides seront injectées ici via jQuery -->
    </div>

    <!-- Navigation + indicateur de progression -->
    <div class="flex justify-between items-center mt-8 gap-3 flex-wrap">
      <button id="prevSlide" class="nav-btn bg-white border border-blue-300 text-blue-700 font-semibold py-2 px-5 rounded-full shadow-md hover:bg-blue-50 disabled:opacity-40 disabled:cursor-not-allowed transition flex items-center gap-2">
        ← Précédent
      </button>
      <div class="text-sm font-medium bg-white/70 backdrop-blur-sm px-4 py-2 rounded-full shadow-sm">
        Slide <span id="currentSlideIdx">1</span> / <span id="totalSlidesCount">0</span>
      </div>
      <button id="nextSlide" class="nav-btn bg-blue-700 text-white font-semibold py-2 px-5 rounded-full shadow-md hover:bg-blue-800 disabled:opacity-40 disabled:cursor-not-allowed transition flex items-center gap-2">
        Suivant →
      </button>
    </div>
  </div>

  <script>
    // ======================================================
    // DONNÉES DE LA LEÇON 29 (try, catch, finally, exceptions)
    // ======================================================
    // Structure cohérente avec le programme: lesson29 => 3 objectifs enrichis en contenu pédagogique
    const lessonData = {
      title: "Gérer les erreurs de manière robuste",
      subtitle: "try, catch, finally et la gestion des exceptions en C#",
      objectives: [
        "Capturer les exceptions avec try-catch et protéger son application contre les crashs.",
        "Utiliser finally pour le nettoyage des ressources (fermeture de fichiers, connexions).",
        "Comprendre la propagation des exceptions et comment les remonter proprement."
      ],
      slides: [
        {
          type: "concept",
          title: "🔐 Pourquoi gérer les erreurs ?",
          content: `<p class="mb-3">En programmation, les erreurs sont inévitables : fichier introuvable, saisie utilisateur incorrecte, connexion réseau coupée… Sans gestion, votre programme plante brutalement. <strong class="text-blue-800">La gestion d'exceptions</strong> permet de contrôler ces situations et de réagir intelligemment.</p>
                    <div class="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-lg my-4">
                      <p class="italic">📌 <span class="font-bold">Exemple concret</span> : Si vous demandez un nombre à l'utilisateur et qu'il écrit "douze", au lieu d'un crash, on affiche un message d'erreur et on redemande la saisie.</p>
                    </div>
                    <p>En C#, le mécanisme repose sur les mots-clés : <code class="bg-gray-200 px-1 rounded">try</code>, <code class="bg-gray-200 px-1 rounded">catch</code>, <code class="bg-gray-200 px-1 rounded">finally</code> et <code class="bg-gray-200 px-1 rounded">throw</code>.</p>`
        },
        {
          type: "syntax",
          title: "📖 Structure try-catch-finally",
          content: `<p class="mb-2">Voici le squelette classique :</p>
                    <pre class="p-4 text-sm rounded-xl overflow-x-auto"><code class="language-csharp">try 
{
    // Code qui peut générer une exception
    int division = 10 / int.Parse("0");
}
catch (DivideByZeroException ex)
{
    Console.WriteLine("Erreur mathématique : " + ex.Message);
}
catch (Exception ex) // attrape toutes les autres exceptions
{
    Console.WriteLine("Erreur générale : " + ex.Message);
}
finally
{
    // Toujours exécuté, même si erreur ou return
    Console.WriteLine("Nettoyage (fermeture fichiers...)");
}</code></pre>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mt-4 text-sm">
                      <div class="bg-white p-3 rounded shadow"><span class="font-bold text-red-600">try</span> : Bloc à risque</div>
                      <div class="bg-white p-3 rounded shadow"><span class="font-bold text-green-600">catch</span> : Traite l'erreur selon son type</div>
                      <div class="bg-white p-3 rounded shadow"><span class="font-bold text-purple-600">finally</span> : Exécution obligatoire (libération)</div>
                    </div>`
        },
        {
          type: "demo",
          title: "🧪 Exemple pratique : division sécurisée",
          content: `<p>Imaginons un programme qui lit deux nombres et affiche leur quotient. Sans <code>try-catch</code>, une division par zéro ou une lettre ferait planter l'application.</p>
                    <pre class="p-4 text-sm mt-3"><code>static void Main()
{
    try
    {
        Console.Write("Numérateur : ");
        int a = int.Parse(Console.ReadLine());
        Console.Write("Dénominateur : ");
        int b = int.Parse(Console.ReadLine());
        int resultat = a / b;
        Console.WriteLine($"Résultat : {resultat}");
    }
    catch (DivideByZeroException)
    {
        Console.WriteLine("⚠️ Erreur : division par zéro interdite !");
    }
    catch (FormatException)
    {
        Console.WriteLine("⚠️ Erreur : veuillez entrer un nombre valide.");
    }
    catch (Exception ex)
    {
        Console.WriteLine($"Erreur inattendue : {ex.Message}");
    }
    finally
    {
        Console.WriteLine("Fin de l'opération (nettoyage).");
    }
}</code></pre>
                    <p class="mt-2 text-green-800 bg-green-50 p-2 rounded">✅ Résultat : l'application ne crash jamais, l'utilisateur est informé.</p>`
        },
        {
          type: "propagation",
          title: "🔄 Propagation des exceptions",
          content: `<p>Quand une exception n'est pas capturée dans une méthode, elle <strong>remonte</strong> à l'appelant. Cela permet de centraliser la gestion d'erreurs au bon niveau.</p>
                    <div class="bg-amber-50 p-4 rounded my-4 border border-amber-200">
                      <span class="font-bold">Schéma de propagation :</span>
                      <pre class="bg-transparent text-sm mt-2">Méthode A (appelle B) → Méthode B (appelle C) → Méthode C (throw new Exception())
↑ Si B ne catch pas, l'exception remonte jusqu'à A, ou jusqu'au niveau supérieur.</pre>
                    </div>
                    <pre class="p-3"><code>void MethodePrincipale()
{
    try
    {
        TraitementMetier();
    }
    catch (Exception ex)
    {
        Console.WriteLine("Attrapé au niveau principal : " + ex.Message);
    }
}

void TraitementMetier()
{
    // Pas de try/catch ici → l'exception remonte
    int.Parse("abc");
}</code></pre>
                    <p>💡 <strong>Bonnes pratiques</strong> : Capturer uniquement si vous pouvez réagir (log, message, nouvelle tentative). Sinon, laissez remonter.</p>`
        },
        {
          type: "bonnesPratiques",
          title: "✨ Astuces & bonnes pratiques",
          content: `<ul class="list-disc list-inside space-y-2">
                      <li>📌 <strong>Spécificité d'abord</strong> : placez les <code>catch</code> les plus spécifiques avant <code>catch (Exception)</code>.</li>
                      <li>📌 <strong>finally indispensable</strong> : pour fermer des fichiers, connexions DB, flux réseau.</li>
                      <li>📌 <strong>Ne jamais avaler une exception sans la logger</strong> : évitez <code>catch {}</code> vide.</li>
                      <li>📌 Utilisez <code>throw;</code> (sans argument) pour relancer l'exception originelle (conserve la pile d'appels).</li>
                      <li>📌 <strong>Utiliser using</strong> pour les ressources <code>IDisposable</code> équivaut à try-finally.</li>
                    </ul>
                    <div class="mt-4 bg-indigo-50 p-3 rounded-lg">
                      <p class="font-semibold">🔁 Exemple avec finally :</p>
                      <pre class="text-xs"><code>FileStream fs = null;
try {
    fs = File.Open("data.txt", FileMode.Open);
    // lecture...
} catch (IOException ex) {
    Console.WriteLine("Erreur fichier");
} finally {
    if (fs != null) fs.Close(); // libération garantie
}</code></pre>
                    </div>`
        },
        {
          type: "qcm",
          title: "🧠 Vérifions votre compréhension",
          content: `<div id="quizZone">
                      <p class="font-semibold mb-3">Quelle est la bonne pratique concernant l'ordre des blocs <code>catch</code> ?</p>
                      <div class="space-y-2">
                        <label class="flex items-center gap-3 bg-white p-2 rounded border"><input type="radio" name="quiz" value="A"> A) Mettre d'abord <code>catch(Exception)</code> puis les spécifiques.</label>
                        <label class="flex items-center gap-3 bg-white p-2 rounded border"><input type="radio" name="quiz" value="B"> B) Mettre d'abord les exceptions les plus spécifiques (ex: DivideByZeroException) puis Exception.</label>
                        <label class="flex items-center gap-3 bg-white p-2 rounded border"><input type="radio" name="quiz" value="C"> C) L'ordre n'a pas d'importance.</label>
                      </div>
                      <button id="submitQuiz" class="mt-4 bg-blue-600 text-white px-5 py-2 rounded-full hover:bg-blue-700">Vérifier ma réponse</button>
                      <p id="quizFeedback" class="mt-3 text-sm italic"></p>
                    </div>`
        }
      ]
    };

    // Construction du tableau de slides complet (slide 1: titre, slide2: objectifs, puis les 6 slides de contenu)
    let fullSlides = [];

    // 1. Slide de titre
    fullSlides.push({
      type: "title",
      title: lessonData.title,
      content: `<div class="text-center">
                  <span class="inline-block bg-blue-100 text-blue-800 text-sm font-bold px-4 py-1 rounded-full mb-3">Leçon 29 · Chapitre 9</span>
                  <h1 class="text-3xl md:text-5xl font-extrabold bg-gradient-to-r from-blue-800 to-cyan-700 bg-clip-text text-transparent my-4">${lessonData.title}</h1>
                  <p class="text-lg text-gray-700 max-w-2xl mx-auto">${lessonData.subtitle}</p>
                  <div class="mt-6 flex justify-center gap-4 flex-wrap">
                    <div class="bg-white/60 p-3 rounded-xl shadow-sm"><span class="font-bold">🎯 try</span> · bloc protégé</div>
                    <div class="bg-white/60 p-3 rounded-xl shadow-sm"><span class="font-bold">🛡️ catch</span> · interception</div>
                    <div class="bg-white/60 p-3 rounded-xl shadow-sm"><span class="font-bold">🧹 finally</span> · libération</div>
                  </div>
                </div>`
    });

    // 2. Slide des objectifs d'apprentissage
    fullSlides.push({
      type: "objectives",
      title: "🎯 Objectifs d'apprentissage",
      content: `<ul class="space-y-4 text-lg">
                  ${lessonData.objectives.map(obj => `<li class="flex items-start gap-3"><span class="text-blue-600 text-2xl">✓</span> <span>${obj}</span></li>`).join('')}
                </ul>
                <div class="mt-6 bg-blue-50 p-4 rounded-2xl">
                  <p class="font-medium">💡 À la fin de cette leçon, vous saurez construire des applications C# résistantes aux erreurs imprévues.</p>
                </div>`
    });

    // Ajout des slides de contenu depuis lessonData.slides
    lessonData.slides.forEach(slide => {
      fullSlides.push({
        type: slide.type,
        title: slide.title,
        content: slide.content
      });
    });

    // Mise à jour du compteur total de slides
    const totalSlides = fullSlides.length;
    let currentIndex = 0;

    // Fonction pour générer l'affichage d'une slide selon son type et son contenu
    function renderSlide(index) {
      const slide = fullSlides[index];
      if (!slide) return;
      
      // Détermine un style de fond subtil selon le type
      let bgCardClass = "bg-white/90 backdrop-blur-sm";
      if (slide.type === "title") bgCardClass = "bg-gradient-to-br from-white to-blue-50/80";
      if (slide.type === "syntax") bgCardClass = "bg-gray-50/90";
      if (slide.type === "demo") bgCardClass = "bg-white border-l-4 border-green-400";
      if (slide.type === "propagation") bgCardClass = "bg-amber-50/80";
      
      let html = `
        <div class="slide-card rounded-2xl shadow-xl ${bgCardClass} p-6 md:p-8 transition-all duration-300">
          <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
            <span class="badge-pill">Slide ${index+1}/${totalSlides}</span>
            ${slide.type === "qcm" ? '<span class="text-xs bg-yellow-100 text-yellow-800 px-3 py-1 rounded-full">❓ Quiz interactif</span>' : ''}
          </div>
          <h2 class="text-2xl md:text-3xl font-bold text-gray-800 border-b border-gray-200 pb-3 mb-5">${slide.title}</h2>
          <div class="prose prose-blue max-w-none text-gray-700 leading-relaxed">
            ${slide.content}
          </div>
        </div>
      `;
      
      $("#slides-container").html(html);
      $("#currentSlideIdx").text(index+1);
      $("#totalSlidesCount").text(totalSlides);
      
      // Gérer l'état des boutons prev/next
      $("#prevSlide").prop("disabled", index === 0);
      $("#nextSlide").prop("disabled", index === totalSlides-1);
      
      // Réinitialisation des événements du quiz si nécessaire (pour éviter les doublons)
      if (slide.type === "qcm") {
        $("#submitQuiz").off("click").on("click", function() {
          const selected = $("input[name='quiz']:checked").val();
          if (!selected) {
            $("#quizFeedback").html("❓ Veuillez sélectionner une réponse d'abord.").css("color", "#b91c1c");
            return;
          }
          if (selected === "B") {
            $("#quizFeedback").html("✅ Exact ! On place toujours les exceptions les plus spécifiques avant les plus générales (Exception). Bonne pratique essentielle.").css("color", "#166534");
          } else {
            $("#quizFeedback").html("⚠️ Pas tout à fait. L'ordre correct : attraper d'abord les exceptions dérivées (DivideByZeroException) puis la classe de base Exception. Cela évite les masquages.").css("color", "#b45309");
          }
        });
      }
      
      // Pour les slides contenant du code, on pourrait rafraîchir le style mais c'est déjà ok.
      // Si besoin de retrigger MathJax (si formules)
      if (window.MathJax) {
        MathJax.typesetPromise();
      }
    }
    
    // Navigation
    function nextSlide() {
      if (currentIndex < totalSlides - 1) {
        currentIndex++;
        renderSlide(currentIndex);
        // Scroll en douceur vers le haut (mobile friendly)
        $("html, body").animate({ scrollTop: $("#slides-container").offset().top - 20 }, 200);
      }
    }
    
    function prevSlide() {
      if (currentIndex > 0) {
        currentIndex--;
        renderSlide(currentIndex);
        $("html, body").animate({ scrollTop: $("#slides-container").offset().top - 20 }, 200);
      }
    }
    
    // Événements des boutons
    $("#nextSlide").on("click", nextSlide);
    $("#prevSlide").on("click", prevSlide);
    
    // Support clavier : flèches droite/gauche
    $(document).on("keydown", function(e) {
      if (e.key === "ArrowRight") {
        nextSlide();
        e.preventDefault();
      } else if (e.key === "ArrowLeft") {
        prevSlide();
        e.preventDefault();
      }
    });
    
    // Initialisation: première slide
    renderSlide(0);
    
    // Petit dessin SVG intégré "image maison" pour illustrer try-catch-finally si nécessaire ?
    // Optionnel: Ajout d'une petite illustration sur le slide propagation via un canvas minimal.
    // Mais on respecte la consigne: on dessine si nécessaire. Ici on peut ajouter un petit bloc SVG 'propagation'
    // Seulement pour mieux visualiser. (dessin maison)
    // On attend que la slide propagation soit affichée pour y injecter un dessin simple ? 
    // Pour rester propre, on va améliorer la slide "propagation" en insérant un schéma SVG simple après le chargement.
    // On peut utiliser un MutationObserver ou mieux, après chaque render, regarder si le titre contient "propagation"
    function addCustomDiagrams() {
      const currentTitle = $("h2").text().toLowerCase();
      if (currentTitle.includes("propagation des exceptions") && $(".custom-schema").length === 0) {
        // Dessiner un petit schéma en SVG pour illustrer la remontée d'exception (fait maison)
        const svgSchema = `
          <div class="custom-schema mt-5 flex justify-center">
            <svg width="100%" height="130" viewBox="0 0 500 120" xmlns="http://www.w3.org/2000/svg" class="max-w-full">
              <rect x="20" y="10" width="120" height="40" fill="#dbeafe" stroke="#2563eb" stroke-width="2" rx="8" />
              <text x="80" y="35" text-anchor="middle" fill="#1e3a8a" font-size="12">Méthode A</text>
              <rect x="190" y="45" width="120" height="40" fill="#dbeafe" stroke="#2563eb" stroke-width="2" rx="8" />
              <text x="250" y="70" text-anchor="middle" fill="#1e3a8a" font-size="12">Méthode B</text>
              <rect x="360" y="80" width="120" height="40" fill="#fee2e2" stroke="#dc2626" stroke-width="2" rx="8" />
              <text x="420" y="105" text-anchor="middle" fill="#991b1b" font-size="12">Méthode C ⚠️</text>
              <path d="M140 30 L185 65" stroke="#f97316" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
              <path d="M310 85 L355 100" stroke="#f97316" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
              <defs>
                <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
                  <polygon points="0 0, 8 4, 0 8" fill="#f97316" />
                </marker>
              </defs>
              <text x="230" y="30" fill="#ea580c" font-size="11">Exception remonte ↑</text>
              <text x="430" y="72" fill="#ea580c" font-size="11">throw new ...</text>
            </svg>
          </div>`;
        $(".prose").append(svgSchema);
      }
    }
    
    // Observer les changements de slide (après chaque render)
    const observer = new MutationObserver(function() {
      addCustomDiagrams();
    });
    observer.observe(document.getElementById("slides-container"), { childList: true, subtree: true });
    
    // Ajouter un petit dessin sur la slide bonnes pratiques (exemple d'un schéma try-finally)
    // On utilise aussi un effet après render.
    // Pour être sûr d'avoir le style cohérent, on appelle au cas où la première slide propagation n'a pas été detectée
    setTimeout(() => addCustomDiagrams(), 100);
    
    // Ajout d'un meta pour le responsive et le viewport déjà bien géré.
    // Optimization des images? pas d'image externe nécessaire.
    
    // Petite amélioration : les blocs de code peuvent être rendus plus lisibles
    // Ajout d'un attribut "copy" non demandé mais reste propre.
    console.log("Leçon 29 prête – Gestion des exceptions avec try/catch/finally");
  </script>
</body>
</html>
