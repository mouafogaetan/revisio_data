<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 36 : Créer une API REST avec ASP.NET Core | Initiation C#</title>
    <!-- Tailwind CSS + Font Awesome (pour icônes discrètes) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (formules si besoin, mais peu utilisé dans ce cours) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* transitions douces pour slides */
        .slide {
            transition: opacity 0.3s ease-in-out;
        }
        body {
            background: #f8fafc;
        }
        /* personnalisation des boutons navigation */
        .nav-btn {
            transition: all 0.2s;
        }
        .nav-btn:active {
            transform: scale(0.96);
        }
        /* code simple */
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            background: #1e293b;
            color: #e2e8f0;
            padding: 1rem;
            border-radius: 0.75rem;
            overflow-x: auto;
            font-size: 0.85rem;
        }
        code {
            font-family: 'Fira Code', monospace;
            background: #eef2ff;
            padding: 0.2rem 0.4rem;
            border-radius: 0.4rem;
            font-size: 0.9rem;
            color: #0f172a;
        }
        .dark-bg-code code {
            background: #334155;
            color: #f1f5f9;
        }
        .slide-content h3 {
            font-weight: 700;
            font-size: 1.4rem;
            margin-top: 0.5rem;
            margin-bottom: 1rem;
            color: #0f3b5c;
            border-left: 5px solid #3b82f6;
            padding-left: 0.75rem;
        }
        .slide-content p, .slide-content li {
            line-height: 1.5;
        }
        .card-tip {
            background: #e0f2fe;
            border-left: 6px solid #0284c7;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            margin: 1rem 0;
        }
    </style>
</head>
<body class="font-sans antialiased bg-gradient-to-br from-slate-50 to-slate-100">

    <div class="max-w-4xl mx-auto px-4 py-6 md:py-10">
        <!-- En-tête léger avec infos matière -->
        <div class="text-center mb-6 md:mb-8">
            <span class="text-xs font-semibold text-blue-600 bg-blue-100 px-3 py-1 rounded-full">CHAPITRE 12 · API REST</span>
            <h1 class="text-2xl md:text-3xl font-extrabold text-gray-800 mt-3">🌐 Créer des API Web avec ASP.NET Core</h1>
            <p class="text-gray-600 mt-1">Leçon 36 : dotnet new webapi & structure moderne</p>
        </div>

        <!-- Conteneur slides -->
        <div id="slidesContainer" class="relative bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
            <!-- slide actuel injecté dynamiquement -->
            <div id="currentSlide" class="slide p-6 md:p-8 slide-content">
                <!-- le contenu sera chargé via jQuery -->
            </div>

            <!-- Navigation + indicateur -->
            <div class="flex flex-wrap items-center justify-between gap-3 border-t border-gray-200 bg-gray-50 px-6 py-4">
                <div class="flex gap-3">
                    <button id="prevSlide" class="nav-btn bg-white hover:bg-gray-100 text-gray-700 font-medium py-2 px-4 rounded-xl shadow-sm border border-gray-300 transition disabled:opacity-40" disabled>◀ Précédent</button>
                    <button id="nextSlide" class="nav-btn bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-5 rounded-xl shadow-sm transition">Suivant ▶</button>
                </div>
                <div class="text-sm text-gray-500 bg-gray-100 px-3 py-1 rounded-full">
                    Slide <span id="slideCounter">1</span> / <span id="totalSlides">0</span>
                </div>
            </div>
        </div>

        <!-- petit pied de page explicatif -->
        <div class="text-center text-xs text-gray-400 mt-6">
            📘 Cours pour classe Développement Web — Initiation C# | ASP.NET Core API
        </div>
    </div>

    <script>
        // Définition des slides pour la leçon 36 : Créer une API Web avec dotnet new webapi
        // Slide 1 : Titre de la leçon
        // Slide 2 : Objectifs pédagogiques
        // Slides 3 à 5+ : contenu détaillé (création projet, structure, injection dépendances)
        const slidesData = [
            {   // slide 0 - Titre
                type: "title",
                content: `
                    <div class="flex flex-col items-center justify-center min-h-[55vh] text-center">
                        <div class="bg-blue-50 rounded-full p-4 mb-5 inline-block">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#2563eb" class="w-12 h-12">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 3v1.5M4.5 4.5h15M4.5 9h15M4.5 13.5h15M4.5 18h15M16.5 21h-9a1.5 1.5 0 0 1-1.5-1.5v-12a1.5 1.5 0 0 1 1.5-1.5h9a1.5 1.5 0 0 1 1.5 1.5v12a1.5 1.5 0 0 1-1.5 1.5Z" />
                            </svg>
                        </div>
                        <h2 class="text-3xl md:text-4xl font-black text-gray-800">🚀 Créer une API Web avec ASP.NET Core</h2>
                        <p class="text-gray-500 max-w-md mt-4">dotnet new webapi — La base d’une API REST moderne en C#</p>
                        <div class="mt-8 flex gap-2 text-sm text-blue-700 bg-blue-50 px-4 py-2 rounded-full">
                            ⚡ .NET 6/7/8 &nbsp;|&nbsp; 🌐 Contrôleurs &nbsp;|&nbsp; 💉 Injection dépendances
                        </div>
                    </div>
                `
            },
            {   // slide 1 - objectifs
                type: "objectifs",
                content: `
                    <div class="min-h-[50vh]">
                        <h3 class="text-2xl font-bold border-l-4 border-blue-500 pl-3 mb-5">🎯 Objectifs de la leçon</h3>
                        <ul class="space-y-4 text-gray-700">
                            <li class="flex items-start gap-3"><span class="text-blue-600 font-bold text-xl">✓</span> <span><strong>Créer</strong> une API Web avec la commande <code class="bg-gray-100">dotnet new webapi</code></span></li>
                            <li class="flex items-start gap-3"><span class="text-blue-600 font-bold text-xl">✓</span> <span><strong>Comprendre</strong> la structure automatique (Program.cs, Controllers, appsettings.json)</span></li>
                            <li class="flex items-start gap-3"><span class="text-blue-600 font-bold text-xl">✓</span> <span><strong>Utiliser l'injection de dépendances</strong> (native dans ASP.NET Core)</span></li>
                            <li class="flex items-start gap-3"><span class="text-blue-600 font-bold text-xl">✓</span> <span><strong>Savoir lancer</strong> l'API et tester avec Swagger intégré</span></li>
                        </ul>
                        <div class="mt-6 card-tip">
                            💡 <span class="font-semibold">Pourquoi ASP.NET Core ?</span> Il est multiplateforme, ultra performant et permet de construire rapidement des API REST.
                        </div>
                    </div>
                `
            },
            {   // slide 2 - Créer le projet étape par étape
                type: "content",
                content: `
                    <h3>🛠️ 1. Créer une API Web (commande)</h3>
                    <p>Ouvrez votre terminal (ou PowerShell) et exécutez :</p>
                    <pre class="my-3"><code>dotnet new webapi -n MaPremiereAPI
cd MaPremiereAPI
code .                // si vous utilisez VS Code</code></pre>
                    <p class="mt-2">Cette commande génère un projet avec un contrôleur exemple (<code>WeatherForecastController</code>), Swagger, et la configuration de base.</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-5">
                        <div class="bg-gray-50 p-3 rounded-lg border"><span class="font-mono text-sm">📁 Controllers/</span><br>Contient les contrôleurs (points d'entrée API)</div>
                        <div class="bg-gray-50 p-3 rounded-lg border"><span class="font-mono text-sm">⚙️ Program.cs</span><br>Configure les services et le pipeline HTTP</div>
                        <div class="bg-gray-50 p-3 rounded-lg border"><span class="font-mono text-sm">📄 appsettings.json</span><br>Fichier de configuration (chaînes de connexion, logs...)</div>
                        <div class="bg-gray-50 p-3 rounded-lg border"><span class="font-mono text-sm">🌐 Properties/launchSettings.json</span><br>Profils de lancement</div>
                    </div>
                `
            },
            {   // slide 3 - Comprendre la structure (Program.cs et contrôleur)
                type: "content",
                content: `
                    <h3>🧩 2. Décortiquons <code>Program.cs</code> (minimal API building)</h3>
                    <pre class="text-sm"><code>var builder = WebApplication.CreateBuilder(args);

// Ajout des services pour les contrôleurs et Swagger
builder.Services.AddControllers();
builder.Services.AddEndpointsApiExplorer();
builder.Services.AddSwaggerGen();

var app = builder.Build();

if (app.Environment.IsDevelopment())
{
    app.UseSwagger();
    app.UseSwaggerUI();
}

app.UseHttpsRedirection();
app.UseAuthorization();
app.MapControllers();   // mappe les routes des contrôleurs
app.Run();</code></pre>
                    <p class="mt-3">👉 <strong>AddControllers</strong> enregistre les contrôleurs. <strong>MapControllers</strong> active le routage attributaires (<code>[Route]</code>). L'<strong>injection de dépendances</strong> se fait via le container <code>builder.Services</code>.</p>
                    <div class="card-tip mt-3">
                        🔍 <span class="font-medium">Injection de dépendances native :</span> Plus besoin de bibliothèques externes. On ajoute un service avec <code>AddScoped&lt;IMaClasse, MaClasse&gt;()</code>.
                    </div>
                `
            },
            {   // slide 4 - Exemple de contrôleur et utilisation DI
                type: "content",
                content: `
                    <h3>📡 3. Exemple d’un contrôleur simple + DI</h3>
                    <pre><code>[ApiController]
[Route("api/[controller]")]
public class ProduitController : ControllerBase
{
    private readonly ILogger&lt;ProduitController&gt; _logger;
    // Injection via constructeur
    public ProduitController(ILogger&lt;ProduitController&gt; logger)
    {
        _logger = logger;
    }
    
    [HttpGet]
    public IActionResult ObtenirProduits()
    {
        _logger.LogInformation("Récupération des produits");
        return Ok(new[] { "Livre C#", "PC Portable" });
    }
}</code></pre>
                    <p class="mt-2">✔ <code>[ApiController]</code> active la validation automatique. <code>[Route("api/[controller]")]</code> génère <strong>/api/produit</strong>. L'<strong>injection</strong> ici du logger nous permet d'utiliser la journalisation.</p>
                    <p>💡 Vous pouvez aussi injecter vos propres services (DbContext, services métier) simplement !</p>
                `
            },
            {   // slide 5 - Lancer l'API et Swagger
                type: "content",
                content: `
                    <h3>🚀 4. Lancer et tester l'API avec Swagger</h3>
                    <p>Exécutez la commande :</p>
                    <pre><code>dotnet run</code></pre>
                    <p>Puis ouvrez votre navigateur à l'adresse : <code class="bg-gray-100">https://localhost:5001/swagger</code> ou <code>http://localhost:5000/swagger</code> (selon le profil).</p>
                    <div class="relative my-4 bg-slate-800 rounded-xl p-3 text-white text-sm">
                        <span class="block font-mono">✨ Swagger affiche toutes vos routes, permet d’envoyer des requêtes GET/POST directement !</span>
                        <div class="flex items-center gap-2 mt-2 text-yellow-200 text-xs">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a8 8 0 100 16 8 8 0 000-16zm1 12h-2v-2h2v2zm0-4h-2V6h2v4z"/></svg>
                            Important : Swagger n'est disponible qu'en environnement de développement par défaut.
                        </div>
                    </div>
                    <p>🎯 <strong>Injection de dépendances dans Program.cs</strong> : vous ajoutez vos services personnalisés avec <code>builder.Services.AddScoped&lt;IMonService, MonService&gt;();</code></p>
                `
            },
            {   // slide 6 - Récapitulatif & bonnes pratiques
                type: "content",
                content: `
                    <h3>📌 Récapitulatif & bonnes pratiques</h3>
                    <ul class="list-disc pl-5 space-y-2">
                        <li><code>dotnet new webapi</code> → génère la base avec contrôleur, Swagger, configuration.</li>
                        <li><strong>Injection de dépendances</strong> intégrée : scoped, transient, singleton.</li>
                        <li>Structure principale : <strong>Program.cs</strong> (configuration), dossier <strong>Controllers</strong>.</li>
                        <li>Utilisez <code>[ApiController]</code> et héritez de <code>ControllerBase</code> pour les API.</li>
                        <li>N'oubliez pas <code>MapControllers()</code> pour activer le routage.</li>
                    </ul>
                    <div class="mt-6 bg-green-50 border border-green-200 rounded-xl p-4 flex flex-col sm:flex-row gap-3 items-start">
                        <span class="text-2xl">📚</span>
                        <div><span class="font-bold">À retenir :</span> ASP.NET Core simplifie la création d'API REST. L'injection de dépendances vous aide à écrire un code propre et testable.</div>
                    </div>
                    <p class="mt-4 text-sm text-gray-500">Prochaine leçon : Créer des contrôleurs avec les verbes HTTP (GET, POST, PUT, DELETE).</p>
                `
            }
        ];

        let currentIndex = 0;
        const total = slidesData.length;
        $("#totalSlides").text(total);

        function renderSlide(index) {
            const slide = slidesData[index];
            let htmlContent = slide.content;
            // on ajoute éventuellement une classe dynamique pour les fonds spécifiques (optionnel)
            $("#currentSlide").fadeOut(120, function() {
                $(this).html(htmlContent).fadeIn(150);
            });
            $("#slideCounter").text(index+1);
            // Gérer les boutons disabled
            if(index === 0) {
                $("#prevSlide").prop("disabled", true);
            } else {
                $("#prevSlide").prop("disabled", false);
            }
            if(index === total-1) {
                $("#nextSlide").prop("disabled", true);
            } else {
                $("#nextSlide").prop("disabled", false);
            }
            // scroll vers le haut (pour mobile)
            $('html, body').animate({ scrollTop: $("#slidesContainer").offset().top - 20 }, 100);
        }

        // navigation
        $("#nextSlide").on("click", function() {
            if(currentIndex < total-1) {
                currentIndex++;
                renderSlide(currentIndex);
            }
        });
        $("#prevSlide").on("click", function() {
            if(currentIndex > 0) {
                currentIndex--;
                renderSlide(currentIndex);
            }
        });

        // Initialisation
        renderSlide(0);

        // Ajustement MathJax si nécessaire (pas fondamental mais on l'inclut)
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
        // Réactiver MathJax après changement de slide (si jamais formules apparaissent)
        $(document).on('slideChanged', function() {
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        });
        // appelle après render
        const originalRender = renderSlide;
        window.renderSlide = function(idx) {
            originalRender(idx);
            setTimeout(() => {
                if(window.MathJax) MathJax.typesetPromise();
            }, 50);
        };
        renderSlide = function(idx) {
            originalRender(idx);
            setTimeout(() => {
                if(window.MathJax) MathJax.typesetPromise();
            }, 50);
        };
        // override la fonction pour que les prochains rendu déclenchent MathJax
        renderSlide(currentIndex);
    </script>
    <!-- Note: aucune image externe insérée, ni dessin complexe. Le contenu reste didactique et accessible -->
</body>
</html>
