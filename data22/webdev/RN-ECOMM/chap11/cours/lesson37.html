<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 37 : FlashList - Optimisation des performances React Native</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (optionnel) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* styles doux pour confort visuel + transitions */
        body {
            background: #f1f5f9;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
        }
        .slide-card {
            transition: all 0.2s ease;
            border-radius: 1.8rem;
        }
        .nav-btn {
            transition: all 0.2s;
            user-select: none;
        }
        .nav-btn:active { transform: scale(0.96); }
        .progress-bar {
            transition: width 0.3s ease;
        }
        pre {
            background: #0f172a;
            color: #e2e8f0;
            padding: 1rem;
            border-radius: 1rem;
            overflow-x: auto;
            font-size: 0.85rem;
            margin: 1rem 0;
        }
        code {
            font-family: 'JetBrains Mono', monospace;
            background: #eef2ff;
            padding: 0.2rem 0.4rem;
            border-radius: 0.5rem;
            font-size: 0.85rem;
            color: #1e293b;
        }
        pre code {
            background: transparent;
            padding: 0;
            color: inherit;
        }
        .badge-lesson {
            background: #7c3aed;
        }
        .comparison-table td, .comparison-table th {
            padding: 0.75rem;
            border-bottom: 1px solid #e2e8f0;
        }
        @media (max-width: 640px) {
            .slide-card { border-radius: 1.25rem; }
            .text-responsive { font-size: 0.95rem; }
        }
    </style>
</head>
<body class="p-4 md:p-6">

<div class="max-w-4xl mx-auto relative">
    <!-- Contexte & entête -->
    <div class="mb-4 flex flex-wrap justify-between gap-2 items-center">
        <div class="text-xs md:text-sm font-medium bg-white/80 backdrop-blur-sm px-3 py-1.5 rounded-full shadow-sm text-gray-600">
            📱 Matière : Développement d'application mobile e-commerce multiplateforme
        </div>
        <div class="text-xs bg-purple-50 text-purple-700 px-3 py-1.5 rounded-full">
            Chapitre 11 · Optimiser les performances
        </div>
    </div>

    <!-- Carte principale slide -->
    <div class="slide-card bg-white shadow-xl border border-gray-100 p-5 md:p-8">
        <!-- En-tête de navigation -->
        <div class="flex justify-between items-center mb-5 pb-2 border-b border-gray-100 flex-wrap gap-2">
            <div class="flex items-center gap-2">
                <span class="badge-lesson text-white text-xs font-bold px-3 py-1 rounded-full">Leçon 37 / 55</span>
                <span class="text-gray-500 text-sm">⚡ FlashList · performances extrêmes</span>
            </div>
            <div class="text-sm text-gray-400" id="slideCounter">Slide 1 / <span id="totalSlides">0</span></div>
        </div>

        <!-- Zone de contenu dynamique (slides) -->
        <div id="slideContent" class="min-h-[500px] transition-all duration-200"></div>

        <!-- Navigation + barre de progression -->
        <div class="flex justify-between items-center mt-8 pt-5 border-t border-gray-100 gap-3">
            <button id="prevSlide" class="nav-btn bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2 px-5 rounded-full shadow-sm disabled:opacity-40 disabled:cursor-not-allowed transition">
                ← Précédent
            </button>
            <div class="flex-1 h-2 bg-gray-100 rounded-full overflow-hidden mx-2">
                <div id="progressFill" class="progress-bar h-full bg-purple-600 rounded-full w-0"></div>
            </div>
            <button id="nextSlide" class="nav-btn bg-purple-700 hover:bg-purple-800 text-white font-semibold py-2 px-6 rounded-full shadow-md transition">
                Suivant →
            </button>
        </div>
    </div>
    <p class="text-center text-xs text-gray-400 mt-6">📱 Navigation tactile (glisser) ou boutons – cours adapté mobile</p>
</div>

<script>
    // ----- Définition des slides pour la leçon 37 : FlashList, virtualisation, recyclage, chargement infini -----
    // Objectifs lesson37 (d'après JSON) :
    // 0: Utiliser FlashList au lieu de FlatList (shopify/flash-list)
    // 1: Pagination et chargement infini
    // 2: Virtualisation et recyclage des composants
    const slides = [
        {
            type: "title",
            title: "⚡ FlashList : La liste ultime pour React Native",
            subtitle: "Remplacez FlatList et boostez les performances de votre e-commerce",
            emoji: "🚀",
            description: "Découvrez comment afficher des milliers de produits sans ralentissement, grâce à la virtualisation améliorée et au recyclage intelligent de composants."
        },
        {
            type: "objectives",
            title: "🎯 Objectifs de la leçon",
            objectives: [
                "Remplacer FlatList par FlashList (bibliothèque Shopify) pour des performances accrues",
                "Mettre en place la pagination et le chargement infini (scroll) dans une liste de produits",
                "Comprendre la virtualisation et le recyclage des composants pour économiser la mémoire"
            ]
        },
        {
            type: "concept",
            title: "🔍 Pourquoi FlashList est plus performant que FlatList ?",
            description: "FlatList de React Native est performant, mais FlashList (shopify/flash-list) pousse l'optimisation plus loin :",
            features: [
                "✅ **Recyclage avancé** : réutilisation extrême des cellules pour minimiser les créations",
                "✅ **Mesure automatique** : calcule la taille des éléments sans `getItemLayout`",
                "✅ **Rendu asynchrone** : priorise les interactions utilisateur (scroll fluide)",
                "✅ **Moins de `onScroll`** : réduction des calculs de layout, batterie économisée"
            ],
            note: "Pour des catalogues de 5000+ produits, FlashList peut améliorer le FPS de 30 à 60 images/secondes."
        },
        {
            type: "code_demo",
            title: "📦 Installation et migration depuis FlatList",
            codeBlocks: [
                {
                    lang: "bash",
                    title: "1. Installation",
                    content: "npm install @shopify/flash-list\n# ou expo install @shopify/flash-list"
                },
                {
                    lang: "jsx",
                    title: "2. Remplacer FlatList par FlashList",
                    content: "import { FlashList } from '@shopify/flash-list';\n\n// Avant : <FlatList data={products} renderItem={...} />\n// Après : \n<FlashList\n  data={products}\n  renderItem={({ item }) => <ProductCard product={item} />}\n  estimatedItemSize={120}   // IMPORTANT : hauteur approximative d'un élément\n  keyExtractor={(item) => item.id}\n/>"
                }
            ],
            important: "⚠️ La prop `estimatedItemSize` est obligatoire : FlashList a besoin de connaître la taille moyenne d'un élément pour optimiser le rendu (valeur en pixels)."
        },
        {
            type: "pagination",
            title: "📄 Pagination et chargement infini (infinite scroll)",
            description: "Avec FlashList, on utilise `onEndReached` et `onEndReachedThreshold` comme avec FlatList, mais le rendu reste plus fluide.",
            codeExample: `const [products, setProducts] = useState([]);
const [loading, setLoading] = useState(false);
const [page, setPage] = useState(1);

const loadMore = async () => {
  if (loading) return;
  setLoading(true);
  const newProducts = await fetchProducts(page);
  setProducts(prev => [...prev, ...newProducts]);
  setPage(p => p+1);
  setLoading(false);
};

<FlashList
  data={products}
  renderItem={({item}) => <ProductItem item={item} />}
  estimatedItemSize={140}
  onEndReached={loadMore}
  onEndReachedThreshold={0.5}
  ListFooterComponent={loading && <ActivityIndicator />}
/>`,
            tip: "💡 `onEndReachedThreshold` (0 à 1) : déclenche le chargement quand l'utilisateur est à 50% de la fin."
        },
        {
            type: "virtualisation",
            title: "🔄 Virtualisation & Recyclage des composants",
            content: "FlashList utilise une technique de **fenêtre glissante** : seuls les éléments visibles et quelques voisins sont montés dans l'arbre React, les autres sont démontés et leurs ressources libérées.",
            schemaHtml: `<div class="bg-slate-100 p-4 rounded-2xl my-4 text-center border border-slate-200">
                <div class="flex justify-center gap-2 flex-wrap text-sm">
                    <span class="bg-white px-3 py-1 rounded-full shadow">🔴 élément hors écran (détruit)</span>
                    <span class="bg-purple-200 px-3 py-1 rounded-full shadow">🟣 fenêtre visible (rendu)</span>
                    <span class="bg-white px-3 py-1 rounded-full shadow">⚪ éléments tampons (prêts)</span>
                </div>
                <div class="mt-3 text-gray-600">📱 Recyclage : les composants sont réutilisés pour de nouvelles données, évitant la création d'instances.</div>
            </div>`,
            benefits: [
                "✔️ Mémoire constante (O(1) par rapport à la taille de la liste)",
                "✔️ Scroll extrêmement fluide même avec des images lourdes",
                "✔️ Idéal pour les chats, galeries photos, fils d'actualités"
            ]
        },
        {
            type: "tips",
            title: "🧠 Bonnes pratiques & astuces avancées",
            tips: [
                "📌 Toujours fournir `estimatedItemSize` : mesurez la hauteur approximative d'un élément (ex: 150 pour une carte produit)",
                "📌 Utiliser `getItemType` pour les listes hétérogènes (ex: séparateurs, en-têtes) → meilleur recyclage",
                "📌 Désactiver `removeClippedSubviews` si vous utilisez des animations complexes",
                "📌 Combiner FlashList avec `expo-image` pour le cache des photos → ultra fluide",
                "📌 `overrideItemLayout` : pour les listes avec des tailles dynamiques, personnalisez le layout"
            ]
        },
        {
            type: "comparison",
            title: "🏆 Comparaison FlashList vs FlatList",
            rows: [
                { critere: "Recyclage des cellules", flatlist: "Basique", flashlist: "Avancé + réutilisation intelligente" },
                { critere: "Calcul automatique des tailles", flatlist: "Nécessite getItemLayout", flashlist: "Auto via mesure asynchrone" },
                { critere: "Performance sur 1000+ éléments", flatlist: "Correct", flashlist: "Excellent (60 FPS)" },
                { critere: "Mémoire utilisée (ex: 5000 items)", flatlist: "Élevée", flashlist: "Optimale (window glissante)" }
            ]
        },
        {
            type: "quiz",
            title: "📝 Vérification des acquis",
            question: "Pourquoi FlashList a-t-il besoin de la propriété `estimatedItemSize` alors que FlatList fonctionne sans ?",
            options: [
                "Pour désactiver le chargement infini",
                "Pour permettre le calcul préliminaire du scroll et optimiser la fenêtre de rendu sans mesurer chaque élément",
                "Pour rendre obligatoire l'utilisation de getItemLayout",
                "Pour limiter le nombre d'éléments à 500"
            ],
            correctIndex: 1,
            explanation: "✅ `estimatedItemSize` indique à FlashList la hauteur moyenne d'un élément. Ainsi, il peut déterminer rapidement la position du scroll et la fenêtre à afficher, sans avoir à mesurer chaque élément au préalable (gain de performances). FlatList peut fonctionner sans mais au prix de calculs supplémentaires."
        },
        {
            type: "conclusion",
            title: "🏁 Récapitulatif de la leçon",
            summary: "FlashList est l'outil de référence pour les longues listes dans React Native. Grâce à sa virtualisation poussée et son recyclage, il surpasse FlatList sur les gros volumes (catalogues e-commerce, flux réseaux sociaux). N'oubliez jamais `estimatedItemSize`, et combinez-le avec `onEndReached` pour le chargement infini.",
            nextStep: "Prochaine étape : optimiser les images avec expo-image et lazy loading."
        }
    ];

    let currentIndex = 0;
    const total = slides.length;
    $("#totalSlides").text(total);

    // Helper pour échapper HTML (dans les codes)
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // fonction de rendu principale
    function renderSlide(index) {
        const slide = slides[index];
        let html = '';

        if (slide.type === 'title') {
            html = `
                <div class="text-center py-4 md:py-8">
                    <div class="text-6xl mb-3">${slide.emoji}</div>
                    <h1 class="text-3xl md:text-4xl font-extrabold bg-gradient-to-r from-purple-800 to-indigo-700 bg-clip-text text-transparent">${slide.title}</h1>
                    <p class="text-gray-600 text-base md:text-lg mt-3 max-w-xl mx-auto">${slide.subtitle}</p>
                    <div class="mt-5 bg-purple-50 inline-block px-5 py-2 rounded-full text-purple-800 text-sm">⏱️ 15 min · performance critique</div>
                    <div class="mt-4 text-gray-500">${slide.description}</div>
                </div>
            `;
        } 
        else if (slide.type === 'objectives') {
            html = `
                <div>
                    <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2 mb-6"><span class="text-3xl">📌</span> ${slide.title}</h2>
                    <ul class="space-y-4">
                        ${slide.objectives.map(obj => `<li class="flex items-start gap-3 bg-gray-50 p-3 rounded-xl"><span class="text-purple-500 text-xl">✓</span> <span class="text-gray-700">${obj}</span></li>`).join('')}
                    </ul>
                    <div class="mt-6 p-4 bg-indigo-50 rounded-2xl border-l-4 border-purple-400 text-sm">
                        💡 À la fin, vous saurez créer des listes capables d'afficher des milliers de produits sans ralentissement.
                    </div>
                </div>
            `;
        }
        else if (slide.type === 'concept') {
            html = `
                <div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-4">${slide.title}</h2>
                    <p class="text-gray-700 mb-4">${slide.description}</p>
                    <ul class="space-y-2 mb-5 bg-gray-50 p-4 rounded-xl">
                        ${slide.features.map(f => `<li class="flex gap-2"><span class="text-purple-500">✨</span> <span>${f}</span></li>`).join('')}
                    </ul>
                    <div class="bg-amber-50 p-3 rounded-xl text-amber-800 text-sm">📘 ${slide.note}</div>
                </div>
            `;
        }
        else if (slide.type === 'code_demo') {
            let codeHtml = '';
            slide.codeBlocks.forEach(block => {
                codeHtml += `<div class="mb-5"><div class="font-mono text-sm text-gray-600 mb-1">${block.title || ''}</div><pre><code class="language-${block.lang}">${escapeHtml(block.content)}</code></pre></div>`;
            });
            html = `
                <div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-4">${slide.title}</h2>
                    ${codeHtml}
                    <div class="bg-red-50 p-3 rounded-xl text-red-700 text-sm border-l-4 border-red-400">${slide.important}</div>
                </div>
            `;
        }
        else if (slide.type === 'pagination') {
            html = `
                <div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-3">${slide.title}</h2>
                    <p class="mb-3 text-gray-700">${slide.description}</p>
                    <pre><code class="language-javascript">${escapeHtml(slide.codeExample)}</code></pre>
                    <div class="mt-3 text-green-700 bg-green-50 p-3 rounded-lg text-sm">${slide.tip}</div>
                </div>
            `;
        }
        else if (slide.type === 'virtualisation') {
            html = `
                <div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-3">${slide.title}</h2>
                    <p class="text-gray-700">${slide.content}</p>
                    ${slide.schemaHtml}
                    <ul class="space-y-2 mt-3">
                        ${slide.benefits.map(b => `<li class="flex gap-2 items-center"><span class="text-green-600 text-lg">✔️</span> <span>${b}</span></li>`).join('')}
                    </ul>
                </div>
            `;
        }
        else if (slide.type === 'tips') {
            html = `
                <div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-5">${slide.title}</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        ${slide.tips.map(t => `<div class="bg-white border border-gray-200 p-3 rounded-xl shadow-sm flex gap-2"><span>💡</span> ${t}</div>`).join('')}
                    </div>
                </div>
            `;
        }
        else if (slide.type === 'comparison') {
            html = `
                <div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-4">${slide.title}</h2>
                    <div class="overflow-x-auto">
                        <table class="min-w-full bg-gray-50 rounded-xl overflow-hidden">
                            <thead class="bg-gray-200"><tr><th class="p-3 text-left">Critère</th><th class="p-3 text-left">FlatList</th><th class="p-3 text-left">FlashList</th></tr></thead>
                            <tbody>
                                ${slide.rows.map(row => `<tr><td class="p-3 font-medium">${row.critere}</td><td class="p-3">${row.flatlist}</td><td class="p-3 text-purple-700 font-medium">${row.flashlist}</td></tr>`).join('')}
                            </tbody>
                        </table>
                    </div>
                    <div class="mt-4 text-xs text-gray-500">⚡ FlashList est le choix recommandé pour les catalogues de plus de 500 produits.</div>
                </div>
            `;
        }
        else if (slide.type === 'quiz') {
            html = `
                <div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-4">${slide.title}</h2>
                    <div class="bg-indigo-50 p-5 rounded-2xl">
                        <p class="font-semibold text-gray-800 text-lg mb-4">❓ ${slide.question}</p>
                        <div class="space-y-3" id="quizOptionsContainer">
                            ${slide.options.map((opt, idx) => `<label class="flex items-center gap-3 p-3 bg-white rounded-xl border cursor-pointer hover:bg-gray-50"><input type="radio" name="quizRadio" value="${idx}" class="w-4 h-4 text-purple-600"><span>${opt}</span></label>`).join('')}
                        </div>
                        <button id="quizSubmitBtn" class="mt-5 bg-purple-600 text-white px-6 py-2 rounded-full hover:bg-purple-700">Vérifier ma réponse</button>
                        <div id="quizFeedbackMsg" class="mt-4 text-sm"></div>
                    </div>
                </div>
            `;
        }
        else if (slide.type === 'conclusion') {
            html = `
                <div class="text-center py-6">
                    <div class="text-5xl mb-3">🏆</div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-4">${slide.title}</h2>
                    <p class="text-gray-700 mb-5">${slide.summary}</p>
                    <div class="bg-green-50 p-4 rounded-2xl text-green-800 text-sm">🚀 ${slide.nextStep}</div>
                </div>
            `;
        }

        $("#slideContent").html(html);
        $("#slideCounter").text(`Slide ${index+1} / ${total}`);
        const progressPercent = ((index) / (total - 1)) * 100;
        $("#progressFill").css("width", `${progressPercent}%`);
        $("#prevSlide").prop("disabled", index === 0);
        $("#nextSlide").prop("disabled", index === total-1);

        // Gestionnaire quiz
        if (slide.type === 'quiz') {
            $("#quizSubmitBtn").off('click').on('click', function() {
                const selectedVal = $("input[name='quizRadio']:checked").val();
                if (selectedVal === undefined) {
                    $("#quizFeedbackMsg").html('<span class="text-orange-600">📢 Veuillez choisir une réponse.</span>');
                    return;
                }
                const isCorrect = parseInt(selectedVal) === slide.correctIndex;
                if (isCorrect) {
                    $("#quizFeedbackMsg").html(`<span class="text-green-700 bg-green-100 p-2 rounded-lg inline-block">✅ ${slide.explanation}</span>`);
                } else {
                    $("#quizFeedbackMsg").html(`<span class="text-red-600 bg-red-50 p-2 rounded-lg inline-block">❌ ${slide.explanation}</span>`);
                }
            });
        }
    }

    // navigation par boutons
    $("#nextSlide").on("click", () => { if (currentIndex < total-1) { currentIndex++; renderSlide(currentIndex); window.scrollTo({ top: 0, behavior: 'smooth' }); } });
    $("#prevSlide").on("click", () => { if (currentIndex > 0) { currentIndex--; renderSlide(currentIndex); window.scrollTo({ top: 0, behavior: 'smooth' }); } });
    
    // swipe mobile
    let touchStartX = 0;
    $("#slideContent").on("touchstart", (e) => { touchStartX = e.originalEvent.touches[0].clientX; });
    $("#slideContent").on("touchend", (e) => {
        if (!touchStartX) return;
        const diff = e.originalEvent.changedTouches[0].clientX - touchStartX;
        if (Math.abs(diff) > 50) {
            if (diff > 0 && currentIndex > 0) { currentIndex--; renderSlide(currentIndex); }
            else if (diff < 0 && currentIndex < total-1) { currentIndex++; renderSlide(currentIndex); }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        touchStartX = 0;
    });

    renderSlide(0);
</script>
</body>
</html>
