<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Leçon 5 : UI mobile avec React Native Paper & composants réutilisables</title>
  <!-- Tailwind CSS + configuration apaisante -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0F3B3D',
            secondary: '#E7B42C',
            accent: '#2A9D8F',
            lightBg: '#F9FBFD'
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'Segoe UI', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <!-- MathJax (discret) -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
  <style>
    .slide { transition: opacity 0.25s ease-in-out; }
    body { background: linear-gradient(125deg, #f0f9f4 0%, #e6f0fa 100%); }
    .btn-nav:active { transform: scale(0.96); }
    .prose pre { background-color: #1e293b; color: #e2e8f0; padding: 0.75rem; border-radius: 0.75rem; overflow-x: auto; font-size: 0.8rem; }
    .prose code { background-color: #eef2ff; padding: 0.2rem 0.4rem; border-radius: 0.375rem; font-weight: 500; color: #0f172a; }
  </style>
</head>
<body class="font-sans antialiased">

<div class="max-w-5xl mx-auto px-4 py-5 md:py-8">
  <!-- en-tête avec progression -->
  <div class="flex flex-wrap justify-between items-center gap-3 mb-6">
    <div class="flex items-center gap-2">
      <span class="text-3xl">🎨</span>
      <div>
        <h1 class="text-xl md:text-2xl font-bold text-slate-800">React Native Paper · Composants UI</h1>
        <p class="text-xs text-slate-500">Leçon 5 · Créer l'interface utilisateur mobile</p>
      </div>
    </div>
    <div class="bg-white/70 backdrop-blur-sm px-3 py-1.5 rounded-full text-sm font-medium shadow-sm border border-slate-200">
      <span id="slideCounter">1</span> / <span id="totalSlides"></span>
    </div>
  </div>

  <!-- conteneur principal des slides -->
  <div id="slidesContainer" class="relative bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200 min-h-[65vh] md:min-h-[70vh]"></div>

  <!-- navigation + points indicateurs -->
  <div class="mt-8 flex flex-col sm:flex-row justify-between items-center gap-4">
    <button id="prevBtn" class="btn-nav px-5 py-2.5 bg-white border border-slate-300 text-slate-700 rounded-xl shadow-sm hover:bg-slate-50 disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2 font-medium transition">← Précédent</button>
    <div class="flex gap-2 flex-wrap justify-center" id="dotsContainer"></div>
    <button id="nextBtn" class="btn-nav px-5 py-2.5 bg-primary text-white rounded-xl shadow-md hover:bg-teal-800 disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2 font-medium transition">Suivant →</button>
  </div>

  <footer class="mt-8 text-center text-xs text-slate-500 border-t pt-5">📱 Développement mobile multiplateforme – Interface e-commerce avec React Native Paper & composants personnalisés.</footer>
</div>

<script>
  // ----- Définition des slides pour la leçon 5 : React Native Paper, composants de base et réutilisabilité -----
  const slidesData = [
    { type: "title", title: "🎨 Bibliothèques UI & Composants", subtitle: "React Native Paper / NativeBase · Composants réutilisables", desc: "Découvrez comment installer et configurer React Native Paper, utiliser ses composants (Button, Card, Input, Modal, BottomSheet) et créer vos propres composants personnalisés pour un e-commerce mobile." },
    { type: "objectifs", title: "🎯 Objectifs de la leçon", objectives: [
      "Installer et configurer React Native Paper (ou NativeBase) dans un projet Expo.",
      "Utiliser les composants prêts à l'emploi : Button, Card, TextInput, Modal, BottomSheet.",
      "Créer des composants personnalisés réutilisables (ex: ProductCard, CustomButton).",
      "Appliquer un thème cohérent (couleurs, typographie) pour l'ensemble de l'application."
    ] },
    { type: "content", title: "📦 1. Installation de React Native Paper", content: `
      <div class="space-y-4">
        <p>React Native Paper est une bibliothèque de composants Material Design pour React Native, compatible avec Expo. Elle accélère le développement et garantit une interface cohérente.</p>
        <div class="bg-gray-900 text-green-300 p-3 rounded-lg font-mono text-sm">
          npx expo install react-native-paper
        </div>
        <p>Pour utiliser les icônes, installez également <code>react-native-vector-icons</code> (ou utilisez les icônes intégrées via <code>react-native-paper</code>).</p>
        <div class="bg-amber-50 p-3 rounded-lg border-l-4 border-amber-400">
          💡 <strong>Alternative NativeBase :</strong> Si vous préférez, NativeBase propose une approche similaire. Ce cours se concentre sur React Native Paper, très populaire pour les e-commerces.
        </div>
        <p>Ensuite, enveloppez votre application avec <code>PaperProvider</code> pour appliquer le thème :</p>
        <div class="bg-gray-800 text-white p-2 rounded text-sm">
          <pre>import { PaperProvider } from 'react-native-paper';
export default function App() {
  return &lt;PaperProvider&gt;{/* vos écrans */}&lt;/PaperProvider&gt;;
}</pre>
        </div>
      </div>
    ` },
    { type: "content", title: "🧩 2. Composants de base : Button, Card, Input", content: `
      <div class="space-y-4">
        <p>Voici quelques composants essentiels pour un e-commerce mobile :</p>
        <div class="grid md:grid-cols-2 gap-4">
          <div class="border rounded-xl p-3 bg-slate-50">
            <h4 class="font-bold text-primary">🔘 Button</h4>
            <pre class="bg-gray-800 text-gray-100 text-xs p-2 rounded mt-1">&lt;Button mode="contained" onPress={() => {}}&gt;Ajouter au panier&lt;/Button&gt;</pre>
          </div>
          <div class="border rounded-xl p-3 bg-slate-50">
            <h4 class="font-bold text-primary">🃏 Card (produit)</h4>
            <pre class="bg-gray-800 text-gray-100 text-xs p-2 rounded mt-1">&lt;Card&gt;
  &lt;Card.Cover source={{ uri: 'image_url' }} /&gt;
  &lt;Card.Title title="Nom produit" subtitle="25€" /&gt;
&lt;/Card&gt;</pre>
          </div>
          <div class="border rounded-xl p-3 bg-slate-50">
            <h4 class="font-bold text-primary">✏️ TextInput</h4>
            <pre class="bg-gray-800 text-gray-100 text-xs p-2 rounded mt-1">&lt;TextInput label="Email" mode="outlined" value={email} onChangeText={setEmail} /&gt;</pre>
          </div>
          <div class="border rounded-xl p-3 bg-slate-50">
            <h4 class="font-bold text-primary">📱 Modal</h4>
            <pre class="bg-gray-800 text-gray-100 text-xs p-2 rounded mt-1">&lt;Modal visible={visible} onDismiss={closeModal}&gt;...&lt;/Modal&gt;</pre>
          </div>
        </div>
        <p>Ces composants sont responsives et respectent les gestes mobiles (clavier, focus).</p>
      </div>
    ` },
    { type: "content", title: "🎨 3. Configurer un thème personnalisé", content: `
      <div class="space-y-3">
        <p>Créez un thème cohérent avec les couleurs de votre marque :</p>
        <div class="bg-gray-800 text-gray-100 p-3 rounded-lg text-sm">
          <pre>import { MD3LightTheme as DefaultTheme, PaperProvider } from 'react-native-paper';

const theme = {
  ...DefaultTheme,
  colors: {
    ...DefaultTheme.colors,
    primary: '#2A9D8F',
    accent: '#E9C46A',
    background: '#F9FBFD',
  },
};

&lt;PaperProvider theme={theme}&gt;&lt;App /&gt;&lt;/PaperProvider&gt;</pre>
        </div>
        <div class="bg-indigo-50 p-3 rounded-lg">
          <span class="font-bold">✨ Personnalisation avancée :</span> Vous pouvez aussi redéfinir les polices, les bordures, etc. Cela garantit une identité visuelle unique pour votre application e-commerce.
        </div>
        <p>Utilisez `useTheme()` pour accéder au thème dans vos composants personnalisés.</p>
      </div>
    ` },
    { type: "content", title: "🛠️ 4. Créer des composants personnalisés réutilisables", content: `
      <div class="space-y-4">
        <p>Pour éviter la duplication, créez vos propres composants (ex: <code>ProductCard</code>, <code>CustomButton</code>).</p>
        <div class="bg-gray-800 text-white p-3 rounded-lg text-sm">
          <pre>// components/ProductCard.jsx
import { Card, Button } from 'react-native-paper';

export const ProductCard = ({ product, onAddToCart }) => (
  &lt;Card mode="elevated" style={{ margin: 8 }}&gt;
    &lt;Card.Cover source={{ uri: product.image }} /&gt;
    &lt;Card.Title title={product.name} subtitle={\`\${product.price} €\`} /&gt;
    &lt;Card.Actions&gt;
      &lt;Button onPress={() => onAddToCart(product)}&gt;Acheter&lt;/Button&gt;
    &lt;/Card.Actions&gt;
  &lt;/Card&gt;
);</pre>
        </div>
        <p>Avantages :</p>
        <ul class="list-disc pl-5 text-sm">
          <li>Code plus propre et maintenable.</li>
          <li>Mise à jour facile (changer le style d'une carte impacte toute l'app).</li>
          <li>Réutilisable dans plusieurs écrans (home, recherche, catégories).</li>
        </ul>
        <div class="bg-green-50 p-2 rounded text-sm">💡 <strong>Conseil :</strong> Structurez vos composants dans un dossier <code>src/components/</code> et utilisez des props typées (TypeScript).</div>
      </div>
    ` },
    { type: "content", title: "🧩 5. BottomSheet & modales avancées", content: `
      <div class="space-y-3">
        <p>Pour les filtres dans un e-commerce, un <strong>BottomSheet</strong> est idéal (ex: tri par prix, catégories).</p>
        <div class="bg-gray-800 text-gray-100 p-2 rounded text-sm">
          <pre>import { BottomSheet, BottomSheetView } from '@gorhom/bottom-sheet';

&lt;BottomSheet ref={sheetRef} snapPoints={['50%']}&gt;
  &lt;BottomSheetView&gt;
    {/* contenu des filtres */}
  &lt;/BottomSheetView&gt;
&lt;/BottomSheet&gt;</pre>
        </div>
        <p>N'oubliez pas d'installer <code>@gorhom/bottom-sheet</code> : <code>npx expo install @gorhom/bottom-sheet</code>.</p>
        <div class="bg-amber-50 p-3 rounded-lg">
          ⚠️ <span class="font-bold">Note :</span> React Native Paper ne fournit pas de BottomSheet natif ; associez-le avec cette librairie. Pour une modal simple, utilisez le composant <code>Modal</code> de Paper.
        </div>
        <p>Exemple d'utilisation : choisir une variante de taille ou de couleur avant d'ajouter au panier.</p>
      </div>
    ` }
  ];

  let currentSlide = 0;
  const total = slidesData.length;

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function buildSlides() {
    let html = '';
    slidesData.forEach((slide, idx) => {
      let inner = '';
      if (slide.type === 'title') {
        inner = `
          <div class="flex flex-col items-center justify-center min-h-[60vh] text-center p-6">
            <div class="bg-teal-100 p-5 rounded-full mb-5 shadow-md"><span class="text-5xl">🎨</span></div>
            <h2 class="text-3xl md:text-4xl font-extrabold text-slate-800 mb-3">${escapeHtml(slide.title)}</h2>
            <p class="text-lg text-teal-700 font-medium">${escapeHtml(slide.subtitle)}</p>
            <div class="mt-6 max-w-md bg-white/60 p-4 rounded-xl shadow-inner"><p class="text-slate-600">${escapeHtml(slide.desc)}</p></div>
          </div>
        `;
      } else if (slide.type === 'objectifs') {
        let list = '';
        slide.objectives.forEach(obj => { list += `<li class="mb-3 flex items-start gap-2"><span class="text-primary text-xl font-bold">✓</span> <span>${escapeHtml(obj)}</span></li>`; });
        inner = `<div class="p-6 md:p-8"><h2 class="text-2xl font-bold text-slate-800 border-b pb-3 mb-5 flex items-center gap-2">${escapeHtml(slide.title)}</h2><ul class="space-y-2 text-base md:text-lg list-none">${list}</ul><div class="mt-8 bg-gradient-to-r from-teal-50 to-cyan-50 rounded-xl p-4 text-sm italic border">💡 À la fin de cette leçon, vous saurez construire une interface riche et réutilisable pour votre application mobile e-commerce.</div></div>`;
      } else if (slide.type === 'content') {
        inner = `<div class="p-5 md:p-7"><h2 class="text-2xl font-bold text-slate-800 mb-4 flex items-center gap-2">${escapeHtml(slide.title)}</h2><div class="prose prose-slate max-w-none leading-relaxed">${slide.content}</div></div>`;
      }
      html += `<div class="slide" data-slide-index="${idx}" style="display: ${idx === currentSlide ? 'block' : 'none'};">${inner}</div>`;
    });
    return html;
  }

  function generateDots() {
    let dotsHtml = '';
    for (let i = 0; i < total; i++) {
      const activeClass = (i === currentSlide) ? 'bg-primary w-6' : 'bg-gray-300 w-3';
      dotsHtml += `<button class="dot-indicator h-3 rounded-full transition-all mx-1 ${activeClass}" data-index="${i}"></button>`;
    }
    $('#dotsContainer').html(dotsHtml);
    $('.dot-indicator').on('click', function() {
      const idx = parseInt($(this).data('index'));
      if (!isNaN(idx) && idx !== currentSlide && idx >= 0 && idx < total) {
        currentSlide = idx;
        updateSlideAndUI();
      }
    });
  }

  function updateSlideAndUI() {
    $('.slide').each(function(idx) {
      if (idx === currentSlide) $(this).fadeIn(180);
      else $(this).hide();
    });
    $('#slideCounter').text(currentSlide + 1);
    $('#totalSlides').text(total);
    $('#dotsContainer .dot-indicator').each(function(idx) {
      if (idx === currentSlide) {
        $(this).removeClass('bg-gray-300 w-3').addClass('bg-primary w-6');
      } else {
        $(this).removeClass('bg-primary w-6').addClass('bg-gray-300 w-3');
      }
    });
    $('#prevBtn').prop('disabled', currentSlide === 0);
    $('#nextBtn').prop('disabled', currentSlide === total - 1);
    if (window.MathJax) MathJax.typesetPromise && MathJax.typesetPromise();
  }

  $(document).ready(function() {
    const slidesHtml = buildSlides();
    $('#slidesContainer').html(slidesHtml);
    $('#totalSlides').text(total);
    generateDots();
    updateSlideAndUI();

    $('#prevBtn').on('click', () => {
      if (currentSlide > 0) { currentSlide--; updateSlideAndUI(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
    });
    $('#nextBtn').on('click', () => {
      if (currentSlide < total - 1) { currentSlide++; updateSlideAndUI(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
    });
    $(document).on('keydown', (e) => {
      if (e.key === 'ArrowLeft') $('#prevBtn').click();
      else if (e.key === 'ArrowRight') $('#nextBtn').click();
    });
  });
</script>
</body>
</html>
