<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Leçon 48 : EAS Build – Préparation à la publication | React Native</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- MathJax (optionnel) -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
  <style>
    .slide {
      transition: opacity 0.25s ease-in-out;
    }
    body {
      background: #f0f4fa;
    }
    .nav-btn {
      min-width: 44px;
      min-height: 44px;
    }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-100 to-indigo-50 font-sans antialiased">

  <div class="max-w-4xl mx-auto px-4 py-6 md:py-10">
    <div class="relative bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl border border-indigo-100 overflow-hidden">
      
      <!-- En-tête -->
      <div class="bg-indigo-800 px-5 py-3 flex justify-between items-center text-white">
        <div class="flex items-center gap-2">
          <i class="fas fa-cloud-upload-alt text-lg"></i>
          <span class="font-semibold text-sm md:text-base">EAS Build · Expo Application Services</span>
        </div>
        <div class="text-sm bg-indigo-700 px-3 py-1 rounded-full">
          Leçon 48 / 55
        </div>
      </div>

      <!-- Conteneur slides -->
      <div id="slides-container" class="min-h-[520px] md:min-h-[560px] relative"></div>

      <!-- Navigation + indicateurs -->
      <div class="flex justify-between items-center p-5 border-t border-indigo-100 bg-gray-50">
        <button id="prevSlide" class="nav-btn bg-white hover:bg-indigo-100 text-indigo-800 font-semibold py-2 px-5 rounded-full shadow transition-all disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2">
          <i class="fas fa-arrow-left"></i> Précédent
        </button>
        <div id="slide-indicators" class="flex gap-2 flex-wrap justify-center"></div>
        <button id="nextSlide" class="nav-btn bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-5 rounded-full shadow transition-all flex items-center gap-2">
          Suivant <i class="fas fa-arrow-right"></i>
        </button>
      </div>
    </div>
    <div class="text-center text-sm text-gray-500 mt-6">
      <i class="fas fa-rocket"></i> Génération de builds prêts pour le Play Store et l'App Store
    </div>
  </div>

  <script>
    // --------------------------------------------------------------
    // Leçon 48 : EAS Build (Expo Application Services)
    // Configuration, génération des clés de signature (Android/iOS)
    // Création des builds de production (AAB, IPA)
    // --------------------------------------------------------------
    const slidesData = [
      {
        type: "title",
        title: "☁️ EAS Build : Le cloud pour Expo",
        subtitle: "Générer des builds de production (APK, AAB, IPA) sans configuration locale complexe",
        icon: "fa-cloud-upload-alt",
        bgClass: "bg-gradient-to-r from-indigo-800 to-purple-800"
      },
      {
        type: "objectives",
        title: "🎯 Objectifs de la leçon",
        objectives: [
          "Comprendre EAS Build et ses avantages (cloud, automatisation, signature)",
          "Configurer EAS CLI et se connecter à son compte Expo",
          "Générer les clés de signature Android (keystore) et iOS (certificats)",
          "Créer un build de production (.aab pour Android, .ipa pour iOS)",
          "Télécharger et tester les artefacts avant publication"
        ]
      },
      {
        type: "content",
        title: "📱 Pourquoi EAS Build ?",
        content: `<p>Avant EAS, pour générer un build iOS, il fallait un Mac avec Xcode. Pour Android, configurer le JDK et Android Studio. <strong>EAS Build</strong> est un service cloud d'Expo qui :</p>
        <ul class="list-disc pl-6 mt-2 space-y-1">
          <li>🚀 <strong>Simplifie</strong> la génération de builds (iOS et Android) sans environnement local lourd</li>
          <li>🔐 <strong>Gère les clés de signature</strong> (keystore Android, certificats iOS) de façon sécurisée</li>
          <li>🤖 <strong>Automatise</strong> les processus (CI/CD) et peut être intégré à GitHub Actions</li>
          <li>📦 <strong>Produit des artefacts</strong> prêts à être soumis aux stores (Google Play, App Store)</li>
        </ul>
        <div class="mt-3 p-3 bg-green-50 rounded-xl">
          <i class="fas fa-check-circle text-green-600"></i> EAS Build est disponible gratuitement (limité) ou avec des plans payants.
        </div>`
      },
      {
        type: "content",
        title: "🔧 Installation et configuration",
        content: `<p>Étapes préliminaires :</p>
        <pre class="bg-gray-800 text-green-200 p-3 rounded-lg text-sm">
# 1. Installer EAS CLI globalement
npm install -g eas-cli

# 2. Se connecter à son compte Expo (créer un compte si besoin)
eas login

# 3. Initialiser EAS dans le projet (création de eas.json)
eas build:configure
        </pre>
        <p>Le fichier <code>eas.json</code> généré :</p>
        <pre class="bg-gray-800 text-white p-3 rounded-lg text-sm">
{
  "cli": { "version": ">= 3.0.0" },
  "build": {
    "development": { "developmentClient": true, "distribution": "internal" },
    "preview": { "android": { "buildType": "apk" }, "ios": { "simulator": true } },
    "production": { "android": { "buildType": "app-bundle" }, "ios": { "simulator": false } }
  }
}
        </pre>
        <p>On peut créer plusieurs profiles (development, preview, production).</p>`
      },
      {
        type: "content",
        title: "🔑 Génération des clés de signature (Android & iOS)",
        content: `<p>La première fois que vous lancez un build, EAS génère automatiquement les clés ou vous guide pour les créer. Vous pouvez aussi les gérer manuellement :</p>
        <ul class="list-disc pl-6 mt-2">
          <li><strong>Android</strong> : un keystore (fichier .jks) signe l'APK/AAB. EAS peut le créer pour vous.</li>
          <li><strong>iOS</strong> : certificats de distribution et provisioning profiles. EAS s'occupe de tout via l'API Apple.</li>
        </ul>
        <pre class="bg-gray-800 text-yellow-200 p-3 rounded-lg text-sm">
# Générer un build de production (création automatique des clés)
eas build --platform android --profile production
eas build --platform ios --profile production
        </pre>
        <div class="bg-indigo-50 p-3 rounded-lg mt-2">
          <i class="fas fa-shield-alt"></i> <strong>Important :</strong> Conservez précieusement les clés (elles sont stockées sur les serveurs Expo mais il faut les sauvegarder localement).
        </div>`
      },
      {
        type: "content",
        title: "📦 Créer un build Android (AAB pour Play Store)",
        content: `<p>Pour Google Play Store, on génère un <strong>Android App Bundle (.aab)</strong> :</p>
        <pre class="bg-gray-800 text-blue-200 p-3 rounded-lg text-sm">
eas build --platform android --profile production
        </pre>
        <p>EAS va :</p>
        <ul class="list-disc pl-6 mt-1">
          <li>Vérifier votre configuration <code>app.json</code> (package name, version, icônes).</li>
          <li>Compiler le code dans le cloud et signer l'app.</li>
          <li>Vous fournir un lien de téléchargement (ou l'uploader automatiquement sur Play Store avec <code>eas submit</code>).</li>
        </ul>
        <pre class="bg-gray-800 text-gray-200 p-3 rounded-lg text-sm">
# Télécharger l'artefact une fois le build terminé
eas build:download --platform android --profile production
        </pre>
        <p>L'AAB peut être testé via le <strong>Firebase Test Lab</strong> ou sur un appareil réel via <code>bundletool</code>.</p>`
      },
      {
        type: "content",
        title: "🍏 Créer un build iOS (IPA pour App Store)",
        content: `<p>Pour iOS, avant de build, assurez-vous d'avoir :</p>
        <ul class="list-disc pl-6 mt-2">
          <li>Un compte Apple Developer (99$/an).</li>
          <li>Un <code>bundleIdentifier</code> unique dans <code>app.json</code>.</li>
          <li>Une session <code>eas login</code> avec les droits nécessaires.</li>
        </ul>
        <pre class="bg-gray-800 text-blue-200 p-3 rounded-lg text-sm">
eas build --platform ios --profile production
        </pre>
        <p>EAS crée automatiquement :</p>
        <ul class="list-disc pl-6">
          <li>Certificats de distribution (gérés par Expo).</li>
          <li>Provisioning profiles pour l'App Store.</li>
          <li>Un fichier <code>.ipa</code> prêt à être soumis via Transporter ou <code>eas submit</code>.</li>
        </ul>
        <div class="bg-yellow-50 p-2 rounded mt-2 text-sm">
          <i class="fas fa-info-circle"></i> Le build iOS nécessite un Mac pour la signature? Non, tout se fait dans le cloud Expo.
        </div>`
      },
      {
        type: "content",
        title: "🎯 Personnaliser eas.json : profiles et variables d'environnement",
        content: `<p>Vous pouvez définir plusieurs profiles pour différents environnements :</p>
        <pre class="bg-gray-800 text-gray-100 p-3 rounded-lg text-sm">
"build": {
  "development": {
    "developmentClient": true,
    "distribution": "internal"
  },
  "staging": {
    "extends": "production",
    "env": { "API_URL": "https://staging.api.com" },
    "android": { "buildType": "apk" }
  },
  "production": {
    "env": { "API_URL": "https://api.prod.com" },
    "android": { "buildType": "app-bundle" },
    "ios": { "simulator": false }
  }
}
        </pre>
        <p>Lancer un build avec un profile spécifique :</p>
        <pre class="bg-gray-800 text-green-200 p-3 rounded-lg text-sm">
eas build --profile staging --platform android
        </pre>
        <p>Les variables d'environnement sont injectées dans votre code via <code>process.env.API_URL</code> (ou <code>expo-constants</code>).</p>`
      },
      {
        type: "content",
        title: "🧪 Tester le build localement (APK / AAB / IPA)",
        content: `<p>Avant de soumettre aux stores, testez :</p>
        <ul class="list-disc pl-6 space-y-1">
          <li><strong>Android APK</strong> : installez-le sur un appareil physique ou émulateur.</li>
          <li><strong>Android AAB</strong> : utilisez <code>bundletool</code> pour générer un APK universel de test.</li>
          <li><strong>iOS IPA</strong> : vous pouvez le déployer sur un appareil via <strong>Apple TestFlight</strong> (via <code>eas submit</code>).</li>
        </ul>
        <pre class="bg-gray-800 text-white p-3 rounded-lg text-sm">
# Télécharger et installer sur Android
adb install monapp.apk

# Tester un AAB localement
bundletool build-apks --bundle=app.aab --output=app.apks
bundletool install-apks --apks=app.apks
        </pre>
        <p>EAS permet aussi de générer des <strong>builds internes</strong> (distribution interne) pour les testeurs via un lien.</p>`
      },
      {
        type: "content",
        title: "🚀 Bonnes pratiques pour la mise en production",
        content: `<ul class="list-disc pl-6 space-y-2">
          <li><strong>Versionner correctement</strong> : incrémentez <code>version</code> (Android) et <code>buildNumber</code> (iOS) dans <code>app.json</code> avant chaque build.</li>
          <li><strong>Nettoyer le cache</strong> : si un build échoue, utilisez <code>eas build --platform android --clear-cache</code>.</li>
          <li><strong>Sauvegarder les clés</strong> : même si Expo les garde, exportez-les : <code>eas credentials:export --path ./credentials.zip</code>.</li>
          <li><strong>Utiliser <code>eas submit</code></strong> pour soumettre automatiquement aux stores après un build réussi.</li>
          <li><strong>Configurer la CI/CD</strong> : intégrez EAS Build à GitHub Actions pour automatiser les releases.</li>
        </ul>
        <div class="mt-3 p-3 bg-purple-50 rounded-xl">
          <i class="fas fa-rocket"></i> Avec EAS Build, plus besoin de machine virtuelle Android ou de Mac coûteux.
        </div>`
      },
      {
        type: "summary",
        title: "📦 Récapitulatif : EAS Build en production",
        points: [
          "EAS Build = builds cloud pour Expo (APK, AAB, IPA)",
          "Configuration via eas.json (profiles : development, preview, production)",
          "Génération automatique des clés de signature Android (keystore) et iOS (certificats)",
          "Commande `eas build --platform android/ios --profile production`",
          "Téléchargement des artefacts et tests locaux",
          "Possibilité d'automatiser la soumission aux stores avec `eas submit`"
        ],
        icon: "fa-check-double"
      }
    ];

    let currentIndex = 0;
    const totalSlides = slidesData.length;

    function renderSlide(slide) {
      if (slide.type === "title") {
        return `
          <div class="slide h-full w-full text-white ${slide.bgClass || 'bg-gradient-to-br from-indigo-700 to-purple-700'} rounded-2xl p-6 md:p-10 flex flex-col justify-center items-center text-center min-h-[500px]">
            <i class="fas ${slide.icon || 'fa-cloud-upload-alt'} text-6xl md:text-7xl mb-6 drop-shadow-lg"></i>
            <h1 class="text-3xl md:text-5xl font-extrabold mb-4">${slide.title}</h1>
            <p class="text-indigo-100 text-lg md:text-xl max-w-xl">${slide.subtitle || ''}</p>
            <div class="mt-8 text-sm bg-white/20 px-4 py-2 rounded-full backdrop-blur-sm">Expo EAS · Builds signés en cloud</div>
          </div>
        `;
      }
      else if (slide.type === "objectives") {
        return `
          <div class="slide p-6 md:p-8 bg-white rounded-2xl min-h-[500px] flex flex-col">
            <div class="flex items-center gap-3 mb-5 border-b border-indigo-200 pb-3">
              <i class="fas fa-bullseye text-indigo-600 text-3xl"></i>
              <h2 class="text-2xl md:text-3xl font-bold text-gray-800">${slide.title}</h2>
            </div>
            <ul class="space-y-4 flex-1">
              ${slide.objectives.map(obj => `<li class="flex items-start gap-3 text-gray-700 text-lg"><i class="fas fa-check-circle text-green-500 mt-1"></i><span>${obj}</span></li>`).join('')}
            </ul>
            <div class="mt-6 text-sm text-gray-400"><i class="fas fa-arrow-down"></i> Naviguez pour maîtriser EAS Build</div>
          </div>
        `;
      }
      else if (slide.type === "content") {
        return `
          <div class="slide p-6 md:p-8 bg-white rounded-2xl min-h-[500px] overflow-y-auto">
            <h2 class="text-2xl md:text-3xl font-bold text-indigo-800 border-l-6 border-indigo-500 pl-3 mb-5">${slide.title}</h2>
            <div class="prose max-w-none text-gray-700">${slide.content}</div>
          </div>
        `;
      }
      else if (slide.type === "summary") {
        return `
          <div class="slide p-6 md:p-8 bg-gradient-to-br from-emerald-50 to-teal-50 rounded-2xl min-h-[500px] flex flex-col justify-center">
            <div class="text-center">
              <i class="fas ${slide.icon || 'fa-graduation-cap'} text-5xl text-emerald-700 mb-4"></i>
              <h2 class="text-2xl md:text-3xl font-bold text-gray-800 mb-6">${slide.title}</h2>
              <ul class="text-left max-w-md mx-auto space-y-3">
                ${slide.points.map(p => `<li class="flex gap-2 items-start"><i class="fas fa-check text-emerald-600 mt-1"></i><span class="text-gray-700">${p}</span></li>`).join('')}
              </ul>
              <div class="mt-8 p-3 bg-white rounded-xl inline-block shadow">
                <i class="fas fa-mobile-alt"></i> Votre application prête à conquérir les stores !
              </div>
            </div>
          </div>
        `;
      }
      return `<div class="p-8 text-red-500">Erreur de contenu</div>`;
    }

    function updateSlide() {
      const slideHtml = renderSlide(slidesData[currentIndex]);
      $('#slides-container').fadeOut(150, function() {
        $(this).html(slideHtml);
        $(this).fadeIn(200);
      });
      let indicatorsHtml = '';
      for (let i = 0; i < totalSlides; i++) {
        const activeClass = (i === currentIndex) ? 'bg-indigo-600 w-8' : 'bg-gray-300 w-3';
        indicatorsHtml += `<button class="indicator-dot h-2 rounded-full ${activeClass} transition-all mx-1" data-index="${i}"></button>`;
      }
      $('#slide-indicators').html(indicatorsHtml);
      $('#prevSlide').prop('disabled', currentIndex === 0);
      $('#nextSlide').html(currentIndex === totalSlides - 1 ? 'Terminé <i class="fas fa-check-circle ml-2"></i>' : 'Suivant <i class="fas fa-arrow-right ml-2"></i>');
    }

    function nextSlide() {
      if (currentIndex < totalSlides - 1) {
        currentIndex++;
        updateSlide();
      } else {
        alert('🎉 Félicitations ! Vous savez générer des builds de production avec EAS Build. Lancez votre première publication !');
      }
    }

    function prevSlide() {
      if (currentIndex > 0) {
        currentIndex--;
        updateSlide();
      }
    }

    $(document).ready(function() {
      updateSlide();
      $('#nextSlide').on('click', nextSlide);
      $('#prevSlide').on('click', prevSlide);
      
      $(document).on('click', '.indicator-dot', function() {
        const idx = $(this).data('index');
        if (idx !== undefined && idx >= 0 && idx < totalSlides) {
          currentIndex = idx;
          updateSlide();
        }
      });
      
      // Swipe mobile
      let touchStartX = 0, touchEndX = 0;
      const container = document.getElementById('slides-container');
      if (container) {
        container.addEventListener('touchstart', (e) => {
          touchStartX = e.changedTouches[0].screenX;
        });
        container.addEventListener('touchend', (e) => {
          touchEndX = e.changedTouches[0].screenX;
          if (touchEndX < touchStartX - 50) nextSlide();
          if (touchEndX > touchStartX + 50) prevSlide();
        });
      }
    });
  </script>
</body>
</html>
