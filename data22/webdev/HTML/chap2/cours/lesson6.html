<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Leçon 6 : Les liens hypertextes | HTML</title>
  <!-- Tailwind CSS + Google Fonts pour meilleure lisibilité -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <!-- MathJax (utile pour d'éventuelles notations techniques mais peu nécessaire ici, inclus par précaution) -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
  <style>
    /* transitions slides + personnalisation douce */
    .slide {
      transition: opacity 0.3s ease-in-out, transform 0.3s ease;
    }
    .slide:not(.active-slide) {
      display: none;
      opacity: 0;
      transform: translateX(20px);
    }
    .active-slide {
      display: block;
      opacity: 1;
      transform: translateX(0);
    }
    /* pour les boutons navigation */
    .nav-btn {
      transition: all 0.2s;
    }
    .nav-btn:active {
      transform: scale(0.96);
    }
    /* code inline style */
    code {
      background-color: #f3f4f6;
      padding: 0.2rem 0.4rem;
      border-radius: 0.375rem;
      font-family: 'Courier New', monospace;
      font-size: 0.9em;
      color: #b91c1c;
    }
    pre {
      background: #1e293b;
      color: #e2e8f0;
      padding: 1rem;
      border-radius: 1rem;
      overflow-x: auto;
      font-size: 0.9rem;
    }
    .glass-card {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(2px);
    }
    body {
      background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
    }
  </style>
</head>
<body class="font-sans antialiased">

  <main class="max-w-4xl mx-auto px-4 py-6 md:py-10">
    <!-- Conteneur principal slides -->
    <div class="bg-white/80 backdrop-blur-sm rounded-3xl shadow-2xl overflow-hidden border border-indigo-100">
      
      <!-- Header décoratif avec progression -->
      <div class="bg-gradient-to-r from-indigo-600 to-purple-600 px-6 py-4 text-white">
        <div class="flex justify-between items-center flex-wrap gap-2">
          <div>
            <span class="text-xs font-semibold uppercase tracking-wide">Cours HTML · Développement Web</span>
            <h2 class="text-xl font-bold">Leçon 6 : Créer des liens hypertextes</h2>
          </div>
          <div class="bg-white/20 rounded-full px-3 py-1 text-sm font-medium">
            <span id="slideCounter">1</span> / <span id="totalSlides">0</span>
          </div>
        </div>
        <!-- barre de progression -->
        <div class="w-full bg-white/30 rounded-full h-1.5 mt-3">
          <div id="progressBar" class="bg-yellow-300 h-1.5 rounded-full w-0 transition-all duration-300"></div>
        </div>
      </div>

      <!-- Zone des slides (contenu dynamique via JS) -->
      <div id="slidesContainer" class="p-6 md:p-8 min-h-[480px]">
        <!-- Les slides seront injectées par jQuery -->
      </div>

      <!-- Pied de page avec boutons de navigation -->
      <div class="px-6 py-5 bg-gray-50 border-t border-gray-200 flex flex-col sm:flex-row justify-between items-center gap-4">
        <button id="prevSlide" class="nav-btn bg-white border border-gray-300 hover:bg-gray-100 text-gray-800 font-medium py-2 px-5 rounded-full shadow-sm transition flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed">
          ⬅️ Précédent
        </button>
        <div class="flex gap-2">
          <span id="pageIndicator" class="text-sm text-gray-500">Slide 1</span>
        </div>
        <button id="nextSlide" class="nav-btn bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-6 rounded-full shadow-md transition flex items-center gap-2">
          Suivant ➡️
        </button>
      </div>
    </div>

    <!-- Petit rappel pédagogique -->
    <div class="text-center text-xs text-gray-500 mt-6">
      ✨ Navigation par slides — cliquez sur les boutons pour parcourir la leçon.
    </div>
  </main>

  <script>

    // On ajoute des exemples concrets et dessin/icône maison via SVG (léger & accessible)
    
    const slidesData = [

      { // Slide 1 : Objectifs d'apprentissage (issus de lesson6 et contextuels)
        type: "objectifs",
        content: `
          <div>

              <li class="flex items-start gap-3"><span class="text-indigo-600 text-xl">✓</span> <span>Comprendre le rôle de la balise <code class="bg-gray-100">&lt;a&gt;</code> (ancre) pour créer des liens.</span></li>
              <li class="flex items-start gap-3"><span class="text-indigo-600 text-xl">✓</span> <span>Maîtriser l'attribut <code class="bg-gray-100">href</code> : lien absolu, lien relatif et ancre interne (#id).</span></li>

            </ul>
            <div class="mt-8 p-4 bg-amber-50 rounded-2xl text-amber-800 text-sm">
              💡 Astuce : Un lien bien conçu améliore l'expérience utilisateur et le référencement (SEO) !
            </div>
          </div>
        `
      },
      { // Slide 2 : Qu'est-ce qu'un lien hypertexte ? Syntaxe de base
        content: `
          <div>
            <h3 class="text-xl font-bold text-gray-800 flex items-center gap-2">🔍 1. La balise &lt;a&gt; : le cœur du lien</h3>
            <p class="mt-2 text-gray-700">Un lien hypertexte permet de passer d’une page à une autre, ou d’aller à un endroit précis dans la même page.</p>
            <div class="my-5 bg-slate-800 text-slate-100 rounded-xl p-4">

            <p class="text-gray-700"><span class="font-mono text-red-600">href</span> = Hypertext REFerence, c'est la destination du lien.</p>
            <div class="grid md:grid-cols-2 gap-4 mt-6">
              <div class="border border-indigo-100 rounded-xl p-3 bg-indigo-50/40">
                <span class="font-bold">📁 Lien absolu</span> : vers un site externe <code>href="https://www.google.com"</code>
              </div>
              <div class="border border-indigo-100 rounded-xl p-3 bg-indigo-50/40">
                <span class="font-bold">📄 Lien relatif</span> : vers une page dans mon projet <code>href="apropos.html"</code>
              </div>
            </div>
            <div class="mt-5 text-sm italic text-gray-500">Exemple simple : <a href="#" class="text-indigo-600 underline" id="demoLinkEx">👉 essayez ce lien (ne mène nulle part)</a></div>
          </div>
        `
      },
      { // Slide 3 : Les types d'URL (absolue, relative, ancre interne)
        content: `
          <div>
            <h3 class="text-xl font-bold text-gray-800">🌐 2. Types d'URL avec href</h3>
            <ul class="mt-3 space-y-3 list-disc pl-5 text-gray-700">
              <li><strong class="text-indigo-700">Absolu</strong> : contient l’adresse complète (https://...). Utile pour des liens externes.</li>
              <li><strong class="text-indigo-700">Relatif</strong> : chemin par rapport au fichier actuel. Ex: <code>contact.html</code> ou <code>../index.html</code>.</li>
              <li><strong class="text-indigo-700">Ancre interne</strong> : lien vers un élément de la même page avec <code>href="#section-id"</code>. L’élément doit avoir un <code>id="section-id"</code>.</li>
              <li><strong class="text-indigo-700">Lien mail/téléphone</strong> : <code>mailto:exemple@domaine.com</code> ou <code>tel:+237600000000</code>.</li>
            </ul>
            <!-- Petit dessin SVG maison : flèche entre pages -->

                <rect x="190" y="15" width="80" height="35" rx="8" fill="#c7d2fe" stroke="#4f46e5" stroke-width="1.5"/>
                <text x="210" y="37" font-size="10" fill="#1e1b4b">page2.html</text>
                <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#dc2626"/></marker></defs>
              </svg>
            </div>
            <p class="bg-blue-50 p-3 rounded-lg text-blue-800"><span class="font-bold">📌 Exemple d'ancre interne :</span> <code>&lt;a href="#fin"&gt;Aller en bas de page&lt;/a&gt;</code></p>
          </div>
        `
      },
      { // Slide 4 : Ouvrir un lien dans un nouvel onglet (target="_blank") + sécurité
        content: `
          <div>
            <h3 class="text-xl font-bold text-gray-800">🪟 3. L'attribut target : ouvrir dans un nouvel onglet</h3>
            <p class="mt-2">Pour éviter que l'utilisateur quitte votre site, on peut forcer l’ouverture du lien dans un autre onglet :</p>
            <pre class="my-4">&lt;a href="https://www.w3.org" target="_blank" rel="noopener noreferrer"&gt;Site du W3C&lt;/a&gt;</pre>
            <div class="bg-yellow-50 border-l-4 border-yellow-400 p-3 my-3">
              <p class="font-semibold">⚠️ Bonne pratique :</p>
              <p class="text-sm">Ajoutez toujours <code>rel="noopener noreferrer"</code> pour des raisons de sécurité (empêche la nouvelle page de contrôler l'ancienne).</p>
            </div>
            <div class="flex justify-center my-2">
              <div class="bg-gray-100 rounded-xl p-2 inline-flex gap-2 items-center shadow-sm">
                <span class="text-sm">🔗 Ex: </span>
                <a href="#" id="demoBlankLink" class="text-indigo-600 underline font-medium">Ouvrir un exemple (alerte)</a>
              </div>
            </div>
          </div>
        `
      },
      { // Slide 5 : Ancres internes et navigation dans la page (démonstration pratique)
        content: `
          <div>
            <h3 class="text-xl font-bold text-gray-800">📍 4. Créer des ancres internes (navigation dans la page)</h3>
            <p class="mt-1">Vous pouvez sauter vers n'importe quelle section en utilisant l’identifiant (id). Très utile pour les longs documents.</p>
            <div class="bg-gray-800 text-white rounded-lg p-4 my-4 font-mono text-sm overflow-x-auto">
              &lt;h2 id="top"&gt;Début du cours&lt;/h2&gt;<br>
              &lt;a href="#top"&gt;Retour en haut&lt;/a&gt;
            </div>
            <div class="grid grid-cols-2 gap-2 text-center mt-3">
              <div class="border p-2 rounded-lg">🔹 <code>href="#section1"</code></div>
              <div class="border p-2 rounded-lg">🔸 Cible : <code>id="section1"</code></div>
            </div>
            <!-- Mini démo interactive ancres internes (sans rechargement) -->
            <div class="mt-5 bg-indigo-50 rounded-xl p-4 text-center">
              <p class="mb-2">🧪 <strong>Testez l'ancre interne :</strong></p>
              <button id="scrollToDemo" class="bg-indigo-500 text-white px-4 py-1 rounded-full text-sm shadow">Aller à l'exemple "Bonus" en bas du slide</button>
              <div id="demoAnchorTarget" class="mt-4 p-2 bg-white rounded border border-indigo-200 text-gray-600 text-sm">⬅️ Je suis un bloc cible (id="ancreDemoSlide")</div>
            </div>
          </div>
        `
      },
      { // Slide 6 : Lien image, lien téléchargement, et bonnes pratiques
        content: `
          <div>
            <h3 class="text-xl font-bold text-gray-800">🖼️ 5. Autres types de liens : image, téléchargement</h3>
            <p class="mt-2">On peut transformer n'importe quel élément (image, icône, bloc) en lien :</p>
            <div class="flex flex-wrap gap-6 my-5 items-center">
              <div>
                <p class="font-medium">🔹 Lien avec image :</p>
                <pre class="text-xs p-2">&lt;a href="page.html"&gt;&lt;img src="logo.png" alt="logo"&gt;&lt;/a&gt;</pre>
              </div>
              <div class="bg-gray-100 p-3 rounded-xl">
                <a href="#" id="fakeDownloadLink" class="flex flex-col items-center gap-1">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M12 4v12m0 0l-3-3m3 3l3-3" /></svg>
                  <span class="text-xs">Télécharger fictif</span>
                </a>
              </div>
              <div>
                <p class="font-medium">📎 Lien de téléchargement : <code>download</code></p>
                <code>&lt;a href="fichier.pdf" download&gt;PDF&lt;/a&gt;</code>
              </div>
            </div>
            <div class="bg-green-50 p-3 rounded-lg border border-green-200">
              💡 Pour améliorer l'accessibilité, le texte du lien doit être explicite (évitez "cliquez ici").
            </div>
          </div>
        `
      },
      { // Slide 7 : Exercice / Résumé et validation 
        content: `
          <div>
            <h3 class="text-2xl font-bold text-indigo-800">✅ Récapitulons !</h3>
            <div class="grid md:grid-cols-2 gap-4 mt-5">
              <div class="bg-white border rounded-2xl p-4 shadow-sm">
                <span class="font-bold text-indigo-700">📌 &lt;a href="url"&gt;</span>
                <p class="text-sm">Crée un lien vers une autre page.</p>
              </div>
              <div class="bg-white border rounded-2xl p-4 shadow-sm">
                <span class="font-bold text-indigo-700">🎯 href="#id"</span>
                <p class="text-sm">Ancre interne vers un élément avec un id.</p>

              <div class="bg-white border rounded-2xl p-4 shadow-sm">

            <div class="mt-7 text-center p-3 bg-gray-100 rounded-xl" id="ancreDemoSlide">
              🌟 <strong>Petit défi :</strong> Créez une page avec un menu qui permet de revenir en haut grâce à une ancre !
            </div>
            <p class="text-xs text-gray-400 mt-3">Félicitations, vous maîtrisez la création de liens hypertextes !</p>
          </div>
        `
      }
    ];

    let currentIndex = 0;
    let totalSlides = slidesData.length;

    // Mettre à jour l'affichage du compteur
    function updateUI() {
      $("#slideCounter").text(currentIndex + 1);
      $("#totalSlides").text(totalSlides);
      $("#pageIndicator").text(`Slide ${currentIndex + 1} / ${totalSlides}`);
      let percent = ((currentIndex) / (totalSlides - 1)) * 100;
      if (totalSlides === 1) percent = 100;
      $("#progressBar").css("width", `${percent}%`);
      
      // désactiver boutons limites
      if (currentIndex === 0) $("#prevSlide").prop("disabled", true);
      else $("#prevSlide").prop("disabled", false);
      
      if (currentIndex === totalSlides - 1) $("#nextSlide").prop("disabled", true);
      else $("#nextSlide").prop("disabled", false);
    }

    // afficher le slide actif
    function renderCurrentSlide() {
      const slide = slidesData[currentIndex];
      let htmlContent = slide.content;
      // Ajouter un wrapper générique
      let finalHtml = `<div class="slide active-slide" id="slide-${currentIndex}">${htmlContent}</div>`;
      $("#slidesContainer").html(finalHtml);
      updateUI();
      // réattacher les éventuels évènements spécifiques après rendu (ex: bouton démo)
      attachSlideEvents();
    }

    function attachSlideEvents() {
      // démo lien interne slide5 : bouton scroll vers l'ancre dans le même slide
      if (currentIndex === 5) {
        $("#scrollToDemo").off("click").on("click", function(e) {
          e.preventDefault();
          const targetEl = document.getElementById("demoAnchorTarget");
          if(targetEl) {
            targetEl.scrollIntoView({ behavior: "smooth", block: "center" });
            targetEl.style.transition = "0.2s";
            targetEl.style.backgroundColor = "#fef9c3";
            setTimeout(() => { targetEl.style.backgroundColor = ""; }, 800);
          }
        });
        // attribution de l'id sur le bloc pour l'ancre interne
        $("#demoAnchorTarget").attr("id", "demoAnchorTarget");
      }
      if(currentIndex === 2) {
        $("#demoLinkEx").off("click").on("click", function(e) {
          e.preventDefault();
          alert("Ce lien est un exemple. Un vrai lien aurait une URL valide.");
        });
      }
      if(currentIndex === 4) {
        $("#demoBlankLink").off("click").on("click", function(e) {
          e.preventDefault();
          alert("Exemple d'ouverture d'onglet : vous pouvez définir target='_blank' sur un vrai lien.\n(simulation)");
        });
      }
      if(currentIndex === 6) {
        $("#fakeDownloadLink").off("click").on("click", function(e){
          e.preventDefault();
          alert("Lien de téléchargement fictif : en réalité vous ajouteriez l'attribut download");
        });
      }
    }

    function goNext() {
      if (currentIndex < totalSlides - 1) {
        currentIndex++;
        renderCurrentSlide();
      }
    }
    
    function goPrev() {
      if (currentIndex > 0) {
        currentIndex--;
        renderCurrentSlide();
      }
    }
    
    $(document).ready(function() {
      renderCurrentSlide();
      $("#nextSlide").on("click", goNext);
      $("#prevSlide").on("click", goPrev);
      // navigation clavier (gauche/droite)
      $(document).on("keydown", function(e) {
        if (e.key === "ArrowRight") {
          goNext();
        } else if (e.key === "ArrowLeft") {
          goPrev();
        }
      });
    });
  </script>
</body>
</html>
