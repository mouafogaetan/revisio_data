<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cours HTML | Structuration du texte - Leçon 4</title>
    <!-- Tailwind CSS + Font Awesome (pour icônes légères) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (formules mathématiques si besoin) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <!-- Tailwind personnalisation légère pour améliorer contraste & lisibilité -->
    <style>
        /* Transition douce entre slides */
        .slide {
            transition: all 0.3s ease-in-out;
        }
        /* Amélioration focus pour accessibilité */
        button:focus, a:focus {
            outline: 2px solid #3b82f6;
            outline-offset: 2px;
        }
        /* scroll fluide sur mobile */
        html {
            scroll-behavior: smooth;
        }
        /* Empêcher le débordement horizontal */
        body {
            overflow-x: hidden;
        }
        /* personnalisation barre de navigation */
        .nav-dot {
            transition: background 0.2s ease, transform 0.2s ease;
        }
        .nav-dot.active {
            background-color: #2563eb !important;
            transform: scale(1.2);
        }
        /* couleurs douces mais lisibles: fond blanc cassé, textes foncés */
        .bg-soft {
            background-color: #fefcf5;
        }
        .card-objectif {
            background: #f8fafc;
            border-left: 5px solid #3b82f6;
        }
        .code-demo {
            background: #1e293b;
            color: #e2e8f0;
            border-radius: 0.75rem;
            font-family: 'Courier New', monospace;
        }
        @media (max-width: 640px) {
            .slide-content {
                padding-left: 0.75rem;
                padding-right: 0.75rem;
            }
            h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body class="bg-soft font-sans antialiased">

    <div class="max-w-4xl mx-auto px-4 py-6 md:py-8">
        <!-- Conteneur principal des slides -->
        <div id="slidesContainer" class="relative">
            <!-- Les slides seront injectées via jQuery, mais pour structure fiable, on génère directement en HTML statique dynamique ? 
            On va construire l'intégralité en HTML, avec contrôle jQuery pour navigation. -->
        </div>
        
        <!-- Indicateurs de progression (dots) + boutons de navigation -->
        <div class="flex justify-center items-center space-x-3 mt-8 mb-4 flex-wrap" id="dotsNav"></div>
        
        <div class="flex justify-between items-center mt-2 gap-3">
            <button id="prevBtn" class="px-5 py-2 bg-gray-200 hover:bg-gray-300 rounded-full font-semibold text-gray-800 transition disabled:opacity-40 disabled:cursor-not-allowed">◀ Précédent</button>
            <span id="slideCounter" class="text-sm text-gray-600 bg-white px-4 py-1 rounded-full shadow-sm"></span>
            <button id="nextBtn" class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-full font-semibold transition shadow-md disabled:opacity-40 disabled:cursor-not-allowed">Suivant ▶</button>
        </div>
    </div>

    <script>
        // Définition du contenu des slides (Leçon 4 : titres, paragraphes, balises de mise en forme)
        // Slide 0: Titre principal + informations leçon
        // Slide 1: Objectifs d'apprentissage
        // Slides suivants: contenu détaillé de la leçon 4 (h1 à h6, p, br, hr, strong, em, mark, small, del, ins)
        
        const slidesData = [
            { // Slide 0 - Titre
                type: "title",
                title: "📄 Maîtriser la structure textuelle en HTML",
                subtitle: "Leçon 4 : Titres, paragraphes et mise en forme",
                badge: "Initiation au HTML • Chapitre 2",
                description: "Apprenez à organiser vos contenus texte avec les balises essentielles du HTML. Des titres hiérarchiques aux emphases élégantes."
            },
            { // Slide 1 - Objectifs
                type: "objectifs",
                objectifsList: [
                    "Utiliser les titres de h1 à h6 pour structurer une page logique",
                    "Maîtriser les paragraphes (p), les sauts de ligne (br) et les lignes horizontales (hr)",
                    "Appliquer les balises de mise en forme : strong, em, mark, small, del, ins"
                ]
            },
            { // Slide 2 - Les titres HTML (h1 à h6)
                type: "content",
                titre: "🏷️ Les titres : hiérarchie et importance",
                contenu: `<p class="mb-3">Les titres permettent d'organiser le contenu et aident les moteurs de recherche (SEO) ainsi que les lecteurs d'écran. Voici comment ils s'utilisent :</p>
                <div class="code-demo p-4 my-4 overflow-x-auto text-sm">
&lt;h1&gt;Titre principal (1 seul par page)&lt;/h1&gt;<br>
&lt;h2&gt;Sous-titre important&lt;/h2&gt;<br>
&lt;h3&gt;Section de niveau 3&lt;/h3&gt;<br>
&lt;h4&gt;Détail secondaire&lt;/h4&gt;<br>
&lt;h5&gt;Niveau 5&lt;/h5&gt;<br>
&lt;h6&gt;Niveau 6&lt;/h6&gt;
                </div>
                <div class="bg-white p-4 rounded-lg border border-gray-200 mt-2">
                    <p class="font-semibold">✨ Exemple visuel :</p>
                    <div class="mt-2 space-y-1">
                        <h1 class="text-2xl font-bold">h1 - Titre principal</h1>
                        <h2 class="text-xl font-semibold">h2 - Section importante</h2>
                        <h3 class="text-lg font-medium">h3 - Sous-section</h3>
                        <h4 class="text-base font-medium">h4 - Détail</h4>
                        <h5 class="text-sm font-medium">h5 - Note mineure</h5>
                        <h6 class="text-xs font-medium">h6 - Très secondaire</h6>
                    </div>
                </div>
                <div class="mt-3 p-3 bg-blue-50 rounded-md text-blue-800 text-sm">💡 Astuce : n'utilisez qu'un seul &lt;h1&gt; par page pour la clarté sémantique.</div>`
            },
            { // Slide 3 - Paragraphes, sauts de ligne et lignes horizontales
                type: "content",
                titre: "📝 Paragraphes & espacement : &lt;p&gt;, &lt;br&gt;, &lt;hr&gt;",
                contenu: `<p class="mb-2">La balise <code class="bg-gray-200 px-1 rounded">&lt;p&gt;</code> définit un paragraphe, ajoutant automatiquement une marge. <code class="bg-gray-200 px-1 rounded">&lt;br&gt;</code> permet un simple retour à la ligne, tandis que <code class="bg-gray-200 px-1 rounded">&lt;hr&gt;</code> insère une ligne horizontale de séparation.</p>
                <div class="code-demo p-4 my-3 text-sm">
&lt;p&gt;Ceci est un premier paragraphe. Il contient plusieurs phrases et l'espacement se fait naturellement.&lt;/p&gt;<br>
&lt;p&gt;Deuxième paragraphe, bien distinct.&lt;/p&gt;<br>
&lt;p&gt;Ligne 1&lt;br&gt;Ligne 2 après un saut (br)&lt;/p&gt;<br>
&lt;hr&gt;  &lt;!-- ligne décorative --&gt;
                </div>
                <div class="bg-gray-50 p-3 rounded border mt-2">
                    <p><strong>Rendu :</strong></p>
                    <p>Ceci est un premier paragraphe. Il contient plusieurs phrases et l'espacement se fait naturellement.</p>
                    <p>Deuxième paragraphe, bien distinct.</p>
                    <p>Ligne 1<br>Ligne 2 après un saut (br)</p>
                    <hr class="my-2 border-gray-300">
                    <p class="text-gray-500">Une ligne horizontale sépare les sections.</p>
                </div>`
            },
            { // Slide 4 - Mise en forme : strong, em, mark, small, del, ins
                type: "content",
                titre: "🎨 Balises de mise en forme du texte",
                contenu: `<p>HTML propose des balises pour donner du style et du sens à certaines parties du texte :</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 my-4">
                    <div class="bg-white p-3 rounded shadow-sm border">
                        <code class="font-mono text-blue-700">&lt;strong&gt;</code> → <strong>Texte très important (gras sémantique)</strong>
                    </div>
                    <div class="bg-white p-3 rounded shadow-sm border">
                        <code class="font-mono text-blue-700">&lt;em&gt;</code> → <em>Texte mis en emphase (italique)</em>
                    </div>
                    <div class="bg-white p-3 rounded shadow-sm border">
                        <code class="font-mono text-blue-700">&lt;mark&gt;</code> → <mark>Texte surligné</mark>
                    </div>
                    <div class="bg-white p-3 rounded shadow-sm border">
                        <code class="font-mono text-blue-700">&lt;small&gt;</code> → <small>Petits caractères (légende, mention légale)</small>
                    </div>
                    <div class="bg-white p-3 rounded shadow-sm border">
                        <code class="font-mono text-blue-700">&lt;del&gt;</code> → <del>Texte supprimé (barré)</del>
                    </div>
                    <div class="bg-white p-3 rounded shadow-sm border">
                        <code class="font-mono text-blue-700">&lt;ins&gt;</code> → <ins>Texte inséré (souligné)</ins>
                    </div>
                </div>
                <div class="code-demo p-3 text-sm">
&lt;p&gt;Le HTML est &lt;strong&gt;fondamental&lt;/strong&gt; pour le web. Il est &lt;em&gt;facile à apprendre&lt;/em&gt;. &lt;mark&gt;À retenir&lt;/mark&gt;: toujours valider son code !&lt;/p&gt;
&lt;p&gt;&lt;del&gt;Ancienne version&lt;/del&gt; &lt;ins&gt;HTML5 moderne&lt;/ins&gt; est recommandée.&lt;/p&gt;
                </div>`
            },
            { // Slide 5 - Exemple pratique combiné & conseils
                type: "content",
                titre: "✍️ Exemple complet et bonnes pratiques",
                contenu: `<p>Voici un extrait de code qui combine titres, paragraphe, mise en forme et séparateurs :</p>
                <div class="code-demo p-4 my-3 text-sm overflow-auto">
&lt;h2&gt;Les bienfaits du HTML sémantique&lt;/h2&gt;<br>
&lt;p&gt;Le HTML permet de &lt;strong&gt;structurer&lt;/strong&gt; l'information. Grâce à &lt;em&gt;des balises appropriées&lt;/em&gt;, vos pages seront accessibles.&lt;/p&gt;<br>
&lt;hr&gt;<br>
&lt;p&gt;&lt;small&gt;Publié le 12 juin 2026&lt;/small&gt;&lt;/p&gt;<br>
&lt;p&gt;&lt;mark&gt;Nouveauté&lt;/mark&gt; : les attributs globaux améliorent l'expérience.&lt;/p&gt;<br>
&lt;p&gt;&lt;del&gt;Ancienne méthode&lt;/del&gt; &lt;ins&gt;Approche moderne recommandée&lt;/ins&gt;&lt;/p&gt;
                </div>
                <div class="bg-green-50 p-4 rounded-lg border-l-8 border-green-500 mt-3">
                    <p class="font-bold text-green-800">📌 À retenir :</p>
                    <ul class="list-disc ml-5 space-y-1 text-gray-800">
                        <li>Les titres donnent une structure logique (comme un plan de document).</li>
                        <li>Utilisez &lt;br&gt; avec parcimonie, préférez les paragraphes.</li>
                        <li>&lt;hr&gt; sépare visuellement des sections thématiques.</li>
                        <li>Les balises comme &lt;strong&gt; et &lt;em&gt; ajoutent du sens, pas seulement du style.</li>
                    </ul>
                </div>`
            },
            { // Slide 6 - Exercice / mise en pratique (petite activité)
                type: "content",
                titre: "⚙️ Petit exercice pratique",
                contenu: `<p class="mb-3">Essayez par vous-même dans un fichier HTML ou un bac à sable en ligne :</p>
                <div class="bg-indigo-50 p-4 rounded-xl">
                    <p class="font-medium">📝 Consigne :</p>
                    <p>Créez une petite section "À propos" contenant :</p>
                    <ul class="list-decimal ml-6 mt-2 space-y-1">
                        <li>Un titre principal (h1) "Mon Portfolio"</li>
                        <li>Un sous-titre h2 "Mes compétences web"</li>
                        <li>Un paragraphe décrivant vos motivations, avec <strong>un mot important</strong> et <em>une citation fictive en italique</em>.</li>
                        <li>Une ligne horizontale, puis un petit texte barré indiquant "ancienne version" et une insertion "nouvelle version"</li>
                        <li>Surlignez un mot clé avec <code>&lt;mark&gt;</code>.</li>
                    </ul>
                    <p class="mt-3 text-sm text-gray-600">💡 Solution dans la slide suivante (corrigé)</p>
                </div>`
            },
            { // Slide 7 - Correction et exemple live interactif
                type: "content",
                titre: "✅ Correction de l'exercice",
                contenu: `<p>Voici un exemple conforme à la consigne :</p>
                <div class="code-demo p-3 my-2 text-sm">
&lt;h1&gt;Mon Portfolio&lt;/h1&gt;<br>
&lt;h2&gt;Mes compétences web&lt;/h2&gt;<br>
&lt;p&gt;Je maîtrise le HTML pour créer des &lt;strong&gt;structures claires&lt;/strong&gt;. &lt;em&gt;"Le code c'est la clé de la créativité"&lt;/em&gt;.&lt;/p&gt;<br>
&lt;hr&gt;<br>
&lt;p&gt;&lt;del&gt;ancienne version : HTML4&lt;/del&gt; &lt;ins&gt;HTML5 moderne&lt;/ins&gt;&lt;/p&gt;<br>
&lt;p&gt;&lt;mark&gt;HTML5&lt;/mark&gt; offre des balises sémantiques puissantes.&lt;/p&gt;
                </div>
                <div class="mt-4 bg-white p-4 rounded shadow-sm">
                    <h1 class="text-2xl font-bold">Mon Portfolio</h1>
                    <h2 class="text-xl font-semibold mt-1">Mes compétences web</h2>
                    <p class="mt-2">Je maîtrise le HTML pour créer des <strong>structures claires</strong>. <em>"Le code c'est la clé de la créativité"</em>.</p>
                    <hr class="my-3">
                    <p><del>ancienne version : HTML4</del> <ins>HTML5 moderne</ins></p>
                    <p><mark>HTML5</mark> offre des balises sémantiques puissantes.</p>
                </div>
                <p class="mt-3 text-blue-700 text-sm">📢 Félicitations ! Vous savez maintenant organiser et embellir vos textes en HTML.</p>`
            }
        ];

        let currentSlide = 0;
        const totalSlides = slidesData.length;

        // Fonction pour générer un slide en fonction des données
        function renderSlide(index) {
            const data = slidesData[index];
            let html = '';
            if (data.type === 'title') {
                html = `
                    <div class="slide bg-white rounded-2xl shadow-xl p-6 md:p-8 mb-2">
                        <div class="text-center">
                            <span class="inline-block bg-blue-100 text-blue-800 text-sm px-4 py-1 rounded-full mb-4">${data.badge}</span>
                            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-3">${data.title}</h1>
                            <p class="text-xl text-gray-600 mb-6">${data.subtitle}</p>
                            <div class="w-20 h-1 bg-blue-500 mx-auto rounded-full my-4"></div>
                            <p class="text-gray-500 max-w-md mx-auto">${data.description}</p>
                            <div class="mt-8 flex justify-center">
                                <svg class="w-10 h-10 text-blue-400 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
                            </div>
                        </div>
                    </div>
                `;
            } 
            else if (data.type === 'objectifs') {
                let items = '';
                data.objectifsList.forEach((obj, i) => {
                    items += `<li class="flex items-start space-x-3 mb-4"><span class="bg-blue-100 text-blue-700 rounded-full w-6 h-6 flex items-center justify-center flex-shrink-0 text-sm font-bold">${i+1}</span><span class="text-gray-700">${obj}</span></li>`;
                });
                html = `
                    <div class="slide bg-white rounded-2xl shadow-xl p-6 md:p-8">
                        <h2 class="text-2xl md:text-3xl font-bold text-gray-800 border-l-5 border-blue-500 pl-4 mb-6">🎯 Objectifs de la leçon</h2>
                        <ul class="space-y-3">
                            ${items}
                        </ul>
                        <div class="mt-8 p-3 bg-blue-50 rounded-lg text-center text-blue-700">📘 À la fin de cette leçon, vous saurez créer des pages textuelles structurées et lisibles.</div>
                    </div>
                `;
            } 
            else if (data.type === 'content') {
                html = `
                    <div class="slide bg-white rounded-2xl shadow-xl p-6 md:p-8">
                        <h2 class="text-2xl md:text-3xl font-bold text-gray-800 border-b border-gray-200 pb-2 mb-5">${data.titre}</h2>
                        <div class="slide-content">
                            ${data.contenu}
                        </div>
                    </div>
                `;
            }
            return html;
        }

        // Mise à jour de l'affichage complet (slides, dots, boutons)
        function updateDisplay() {
            const container = $('#slidesContainer');
            container.empty();
            const slideHtml = renderSlide(currentSlide);
            container.html(slideHtml);
            
            // Génération des dots (indicateurs)
            let dotsHtml = '';
            for (let i = 0; i < totalSlides; i++) {
                const activeClass = (i === currentSlide) ? 'active' : '';
                dotsHtml += `<button class="nav-dot w-3 h-3 rounded-full mx-1 ${activeClass === 'active' ? 'bg-blue-600' : 'bg-gray-400'} hover:bg-blue-400 transition" data-index="${i}"></button>`;
            }
            $('#dotsNav').html(dotsHtml);
            
            // Mise à jour du compteur
            $('#slideCounter').text(`Slide ${currentSlide+1} / ${totalSlides}`);
            
            // Gestion des boutons précédent/suivant
            $('#prevBtn').prop('disabled', currentSlide === 0);
            $('#nextBtn').prop('disabled', currentSlide === totalSlides - 1);
            
            // Scroll en haut pour un meilleur confort mobile
            $('html, body').animate({ scrollTop: 0 }, 200);
        }
        
        // Navigation événementielle
        function nextSlide() {
            if (currentSlide < totalSlides - 1) {
                currentSlide++;
                updateDisplay();
            }
        }
        
        function prevSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                updateDisplay();
            }
        }
        
        $(document).ready(function() {
            updateDisplay();
            
            $('#nextBtn').on('click', nextSlide);
            $('#prevBtn').on('click', prevSlide);
            
            // Navigation par les dots (délégation)
            $(document).on('click', '.nav-dot', function() {
                const idx = $(this).data('index');
                if (idx !== undefined && idx !== currentSlide) {
                    currentSlide = idx;
                    updateDisplay();
                }
            });
            
            // navigation clavier (gauche/droite)
            $(document).on('keydown', function(e) {
                if (e.key === 'ArrowRight') {
                    nextSlide();
                } else if (e.key === 'ArrowLeft') {
                    prevSlide();
                }
            });
        });
        
        // Ajuster le style supplémentaire pour quelques éléments dynamiques (rendu <code> propre)
        // Ajout d'une classe pour les balises code inline
        $('head').append('<style>code:not(.font-mono) { background: #eef2ff; padding: 0.2rem 0.4rem; border-radius: 0.375rem; font-size: 0.9rem; } .code-demo code { background: #334155; color: #cbd5e1; padding: 0.1rem 0.3rem; }</style>');
        
        // Correction optionnelle mathjax mais pas nécessaire pour cette leçon 
    </script>
</body>
</html>
