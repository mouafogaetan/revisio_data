<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cours HTML5 | Structure de base d'un document HTML</title>
    <!-- Tailwind CSS + jQuery + MathJax -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <!-- Personnalisation Tailwind + couleurs douces -->
    <style>
        /* transitions fluides pour les slides */
        .slide {
            transition: all 0.3s ease-in-out;
        }
        /* focus visible pour accessibilité */
        button:focus-visible, a:focus-visible {
            outline: 2px solid #2c7da0;
            outline-offset: 2px;
        }
        /* barre de progression personnalisée */
        .progress-bar {
            transition: width 0.3s ease;
        }
        /* swipe sur mobile : simple indicateur visuel */
        @media (max-width: 640px) {
            .swipe-hint {
                display: flex;
            }
        }
        .swipe-hint {
            display: none;
        }
        body {
            touch-action: pan-y pinch-zoom; /* amélioration swipe vertical */
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50 font-sans antialiased">

    <!-- Conteneur principal : slides -->
    <div class="max-w-5xl mx-auto px-4 py-6 md:py-10 min-h-screen flex flex-col justify-center">
        
        <!-- Navigation et progression -->
        <div class="mb-4 flex justify-between items-center flex-wrap gap-3 bg-white/70 backdrop-blur-sm rounded-full p-2 shadow-sm">
            <div class="flex gap-2">
                <button id="prevBtn" class="bg-indigo-100 hover:bg-indigo-200 text-indigo-800 font-medium px-4 py-2 rounded-full transition disabled:opacity-40 disabled:cursor-not-allowed text-sm md:text-base">◀ Précédent</button>
                <button id="nextBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-4 py-2 rounded-full transition text-sm md:text-base">Suivant ▶</button>
            </div>
            <div class="text-sm text-gray-600 bg-gray-100 px-3 py-1 rounded-full">
                <span id="slideCounter">1</span> / <span id="totalSlides"></span>
            </div>
        </div>
        
        <!-- Barre de progression -->
        <div class="w-full bg-gray-200 rounded-full h-2 mb-6 overflow-hidden">
            <div id="progressFill" class="progress-bar bg-indigo-500 h-full rounded-full" style="width: 0%"></div>
        </div>

        <!-- Zone des slides (caché/affichage via jQuery) -->
        <div class="relative bg-white rounded-2xl shadow-xl overflow-hidden border border-indigo-100">
            <div id="slidesContainer" class="relative min-h-[480px] md:min-h-[540px]">
                <!-- Les slides seront injectées dynamiquement ou en HTML statique mais on utilise du JS pour la structure.
                     On va générer les slides manuellement dans le HTML pour lisibilité et ensuite les contrôler. 
                     Mais on peut aussi tout écrire en dur. Pour plus de clarté, je génère le contenu des slides en HTML direct 
                     et jQuery gère la pagination. -->
            </div>
        </div>

        <!-- petit indicateur swipe pour mobile -->
        <div class="swipe-hint justify-center items-center gap-1 text-xs text-gray-400 mt-4">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75l3 3m0 0l3-3m-3 3v-7.5M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span>Glissez vers le haut/bas pour naviguer (mobile)</span>
        </div>
    </div>

    <script>
        // Structure des slides : Titre, Objectifs + contenu détaillé de la lesson 2 du chapitre 1
        // D'après le programme : lesson2 (chap1) : Maîtriser !DOCTYPE, balises html/head/title/body, meta charset
        const slidesData = [
            {
                type: "title",
                title: "Initiation au HTML",
                subtitle: "Structure de base d'un document HTML",
                chapter: "Chapitre 1 · Leçon 2",
                icon: "🌐"
            },
            {
                type: "objectifs",
                title: "🎯 Objectifs de la leçon",
                objectives: [
                    "Maîtriser la balise <code class='bg-gray-100 px-1 rounded'>&lt;!DOCTYPE html&gt;</code> et son rôle.",
                    "Utiliser correctement les balises <code class='bg-gray-100 px-1 rounded'>&lt;html&gt;</code>, <code class='bg-gray-100 px-1 rounded'>&lt;head&gt;</code>, <code class='bg-gray-100 px-1 rounded'>&lt;title&gt;</code> et <code class='bg-gray-100 px-1 rounded'>&lt;body&gt;</code>.",
                    "Comprendre l'encodage des caractères avec <code class='bg-gray-100 px-1 rounded'>&lt;meta charset=&quot;UTF-8&quot;&gt;</code>."
                ]
            },
            {
                type: "content",
                title: "📄 1. La déclaration DOCTYPE",
                content: `
                    <p class="mb-3">La toute première ligne d’un document HTML doit être <code class="bg-gray-100 px-1.5 py-0.5 rounded text-indigo-700 font-mono text-sm">&lt;!DOCTYPE html&gt;</code>.</p>
                    <p class="mb-3">Cette déclaration n’est pas une balise HTML, mais une <strong>instruction</strong> qui indique au navigateur quelle version de HTML utiliser. Avec <code class="bg-gray-100 px-1 rounded">&lt;!DOCTYPE html&gt;</code>, on impose le mode « standards » (mode standard) et on évite le mode « quirks » (qui peut mal interpréter le code).</p>
                    <div class="bg-gray-800 text-gray-100 p-3 rounded-lg font-mono text-sm overflow-x-auto my-4">
                        &lt;!DOCTYPE html&gt;
                    </div>
                    <p class="text-sm text-gray-600">💡 <strong>À retenir :</strong> Toujours la placer en tout premier, avant même la balise &lt;html&gt;.</p>
                `
            },
            {
                type: "content",
                title: "🧱 2. La balise racine &lt;html&gt;",
                content: `
                    <p class="mb-3">La balise <code class="bg-gray-100 px-1 rounded">&lt;html&gt;</code> est la racine du document. Tout le contenu de la page doit être placé entre <code class="bg-gray-100 px-1 rounded">&lt;html&gt;</code> et <code class="bg-gray-100 px-1 rounded">&lt;/html&gt;</code>.</p>
                    <p class="mb-3">On y ajoute souvent l’attribut <code class="bg-gray-100 px-1 rounded">lang</code> pour préciser la langue principale (ex: <code class="bg-gray-100 px-1 rounded">lang="fr"</code>), ce qui aide les lecteurs d’écran et les moteurs de recherche.</p>
                    <pre class="bg-gray-800 text-gray-100 p-3 rounded-lg font-mono text-sm overflow-x-auto my-3">
&lt;html lang="fr"&gt;
  ...
&lt;/html&gt;</pre>
                `
            },
            {
                type: "content",
                title: "🧠 3. L’en-tête &lt;head&gt; : métadonnées essentielles",
                content: `
                    <p class="mb-2">La balise <code class="bg-gray-100 px-1 rounded">&lt;head&gt;</code> contient toutes les informations <strong>non visibles</strong> directement dans la page, mais cruciales pour le navigateur et le référencement.</p>
                    <ul class="list-disc pl-6 space-y-1 my-3">
                        <li><span class="font-semibold">&lt;title&gt;</span> : le titre affiché dans l’onglet du navigateur.</li>
                        <li><span class="font-semibold">&lt;meta charset="UTF-8"&gt;</span> : encodage des caractères (accents, symboles).</li>
                        <li>D’autres métadonnées (viewport, description…) seront vues plus tard.</li>
                    </ul>
                    <div class="bg-amber-50 border-l-4 border-amber-400 p-3 my-2 text-amber-800 rounded">
                        ⚠️ Sans <code class="bg-amber-100 px-1 rounded">meta charset</code>, certains navigateurs peuvent mal afficher les lettres accentuées (é,è,ç,à...).
                    </div>
                `
            },
            {
                type: "content",
                title: "📛 4. La balise &lt;title&gt;",
                content: `
                    <p>Elle est obligatoire à l’intérieur du <code class="bg-gray-100 px-1 rounded">&lt;head&gt;</code>. Le texte entre <code class="bg-gray-100 px-1 rounded">&lt;title&gt;</code> et <code class="bg-gray-100 px-1 rounded">&lt;/title&gt;</code> apparaît dans l’onglet du navigateur, dans l’historique, et dans les résultats de recherche (SEO).</p>
                    <div class="bg-gray-100 p-3 rounded-lg my-4 font-mono text-sm">
                        &lt;title&gt;Mon premier site web - Apprentissage HTML&lt;/title&gt;
                    </div>
                    <p class="text-green-700">✅ Toujours donner un titre clair et descriptif à chaque page.</p>
                `
            },
            {
                type: "content",
                title: "🖼️ 5. La balise &lt;body&gt; : le contenu visible",
                content: `
                    <p class="mb-3">Tout ce que l’utilisateur voit (textes, images, liens, vidéos…) se trouve à l’intérieur de la balise <code class="bg-gray-100 px-1 rounded">&lt;body&gt;</code>.</p>
                    <p>Le navigateur affiche les éléments en respectant l’ordre du code. C’est le <strong>corps</strong> de la page web.</p>
                    <div class="bg-gray-800 text-gray-100 p-3 rounded-lg font-mono text-sm overflow-x-auto my-3">
                        &lt;body&gt;
                            &lt;h1&gt;Bienvenue au Cameroun numérique&lt;/h1&gt;
                            &lt;p&gt;Apprenons le HTML ensemble !&lt;/p&gt;
                        &lt;/body&gt;
                    </div>
                `
            },
            {
                type: "content",
                title: "🔤 6. L’encodage UTF-8 et les caractères spéciaux",
                content: `
                    <p>L’encodage <strong>UTF-8</strong> permet d’afficher tous les caractères du monde : lettres accentuées, symboles mathématiques, emojis 🎉. On l’ajoute ainsi :</p>
                    <pre class="bg-gray-800 text-gray-100 p-3 rounded-lg font-mono text-sm overflow-x-auto my-3">
&lt;meta charset="UTF-8"&gt;</pre>
                    <p class="mt-2">Sans cela, les "é", "è", "ç" pourraient devenir des symboles étranges. Exemple : "Cameroun" deviendrait "Cameroun" illisible.</p>
                    <div class="bg-green-50 p-3 rounded-md my-2 text-green-800">
                        🌍 Le HTML5 utilise UTF-8 par défaut, mais il est conseillé d’écrire explicitement la balise meta pour garantir l’affichage sur tous les anciens navigateurs.
                    </div>
                `
            },
            {
                type: "content",
                title: "📝 Exemple complet : document minimal",
                content: `
                    <p>Voici la structure de base d’une page HTML valide avec tous les éléments vus :</p>
                    <div class="bg-gray-900 text-gray-100 p-3 rounded-lg font-mono text-sm overflow-x-auto my-4">
<pre class="whitespace-pre-wrap break-words">
&lt;!DOCTYPE html&gt;
&lt;html lang="fr"&gt;
  &lt;head&gt;
    &lt;meta charset="UTF-8"&gt;
    &lt;title&gt;Ma première page HTML&lt;/title&gt;
  &lt;/head&gt;
  &lt;body&gt;
    &lt;h1&gt;Bonjour à tous&lt;/h1&gt;
    &lt;p&gt;J’apprends la structure d’un document HTML.&lt;/p&gt;
  &lt;/body&gt;
&lt;/html&gt;
</pre>
                    </div>
                    <p class="italic">📌 Copiez ce modèle dans votre éditeur de texte (comme VS Code, ou même bloc-notes) et enregistrez le fichier avec l'extension <strong>.html</strong>. Ouvrez-le dans un navigateur pour voir le résultat !</p>
                `
            },
            {
                type: "recap",
                title: "✨ Récapitulatif & bonnes pratiques",
                items: [
                    "Toujours commencer par <code>&lt;!DOCTYPE html&gt;</code>.",
                    "La balise <code>&lt;html&gt;</code> contient toute la page.",
                    "Le <code>&lt;head&gt;</code> : métadonnées et <code>&lt;title&gt;</code> (indispensable).",
                    "Le <code>&lt;body&gt;</code> : le contenu visible.",
                    "Ne jamais oublier <code>&lt;meta charset=&quot;UTF-8&quot;&gt;</code> pour les accents.",
                    "Indenter proprement le code (lisibilité) et fermer toutes les balises."
                ]
            }
        ];

        let currentIndex = 0;
        let totalSlides = slidesData.length;

        // Fonction pour afficher une slide spécifique
        function renderSlide(index) {
            const data = slidesData[index];
            if (!data) return;
            let html = '';
            
            // Couleurs de fond cohérentes, lisibles, douces
            if (data.type === 'title') {
                html = `
                    <div class="slide p-6 md:p-10 flex flex-col justify-center items-center text-center min-h-[460px] md:min-h-[520px] bg-gradient-to-br from-indigo-50 to-white">
                        <div class="text-6xl mb-4">${data.icon || '📘'}</div>
                        <h1 class="text-3xl md:text-5xl font-extrabold text-indigo-800 mb-2">${data.title}</h1>
                        <p class="text-xl md:text-2xl text-gray-700 mt-2">${data.subtitle}</p>
                        <div class="mt-6 px-4 py-2 bg-indigo-100 rounded-full text-indigo-700 text-sm font-medium">${data.chapter}</div>
                        <div class="mt-8 text-gray-500 text-sm">Apprentissage interactif 🧑‍🏫</div>
                    </div>
                `;
            } 
            else if (data.type === 'objectifs') {
                html = `
                    <div class="slide p-6 md:p-8 min-h-[460px] md:min-h-[520px] bg-white">
                        <h2 class="text-2xl md:text-3xl font-bold text-indigo-800 border-b-2 border-indigo-200 pb-3 mb-6">${data.title}</h2>
                        <ul class="space-y-4 text-gray-800">
                            ${data.objectives.map(obj => `<li class="flex items-start gap-3"><span class="text-indigo-600 text-xl">✓</span> <span class="text-base md:text-lg">${obj}</span></li>`).join('')}
                        </ul>
                        <div class="mt-8 bg-blue-50 p-4 rounded-xl text-blue-800">
                            💪 À la fin de cette leçon, vous saurez écrire la structure HTML complète de n'importe quelle page web !
                        </div>
                    </div>
                `;
            }
            else if (data.type === 'content') {
                html = `
                    <div class="slide p-6 md:p-8 min-h-[460px] md:min-h-[520px] bg-white overflow-y-auto">
                        <h2 class="text-2xl md:text-3xl font-bold text-indigo-800 border-l-4 border-indigo-500 pl-4 mb-5">${data.title}</h2>
                        <div class="prose prose-indigo max-w-none text-gray-700 leading-relaxed">
                            ${data.content}
                        </div>
                    </div>
                `;
            }
            else if (data.type === 'recap') {
                html = `
                    <div class="slide p-6 md:p-8 min-h-[460px] md:min-h-[520px] bg-gradient-to-r from-indigo-50 to-white">
                        <h2 class="text-2xl md:text-3xl font-bold text-indigo-800 mb-5 flex items-center gap-2">📌 ${data.title}</h2>
                        <ul class="space-y-3 list-disc pl-5 marker:text-indigo-500">
                            ${data.items.map(item => `<li class="text-gray-800 text-base md:text-lg">${item}</li>`).join('')}
                        </ul>
                        <div class="mt-8 p-4 bg-indigo-100 rounded-2xl text-center">
                            <p class="font-semibold">🎯 Exercice pratique :</p>
                            <p class="text-sm">Créez un fichier "index.html" avec la structure complète et affichez votre nom, votre ville (au Cameroun) et un message de bienvenue. Validez avec le validateur W3C.</p>
                        </div>
                    </div>
                `;
            }
            
            $('#slidesContainer').html(html);
            $('#slideCounter').text(index + 1);
            const percent = ((index + 1) / totalSlides) * 100;
            $('#progressFill').css('width', `${percent}%`);
            
            // désactiver les boutons aux extrémités
            $('#prevBtn').prop('disabled', index === 0);
            $('#nextBtn').prop('disabled', index === totalSlides - 1);
            
            // MathJax au cas où (aucune formule maths ici, mais prêt)
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }
        
        // navigation classique
        function nextSlide() {
            if (currentIndex < totalSlides - 1) {
                currentIndex++;
                renderSlide(currentIndex);
            }
        }
        
        function prevSlide() {
            if (currentIndex > 0) {
                currentIndex--;
                renderSlide(currentIndex);
            }
        }
        
        // Gestion du swipe sur mobile (touch events)
        let touchStartY = 0;
        let touchEndY = 0;
        
        function handleTouchStart(e) {
            touchStartY = e.changedTouches[0].screenY;
        }
        
        function handleTouchEnd(e) {
            touchEndY = e.changedTouches[0].screenY;
            const diff = touchStartY - touchEndY;
            if (Math.abs(diff) > 50) { // seuil de swipe vertical
                if (diff > 0) {
                    // swipe vers le haut => suivant
                    nextSlide();
                } else {
                    // swipe vers le bas => précédent
                    prevSlide();
                }
            }
        }
        
        // Evenements
        $(document).ready(function() {
            $('#totalSlides').text(totalSlides);
            renderSlide(0);
            
            $('#nextBtn').on('click', nextSlide);
            $('#prevBtn').on('click', prevSlide);
            
            // Support clavier : flèches gauche/droite
            $(document).on('keydown', function(e) {
                if (e.key === 'ArrowRight') {
                    nextSlide();
                    e.preventDefault();
                } else if (e.key === 'ArrowLeft') {
                    prevSlide();
                    e.preventDefault();
                }
            });
            
            // Swipe mobile
            const container = document.getElementById('slidesContainer');
            if (container) {
                container.addEventListener('touchstart', handleTouchStart, { passive: false });
                container.addEventListener('touchend', handleTouchEnd);
            }
            
            // sécurité pour que les slides ne débordent pas si contenu long
            $('.slide').css('overflow-y', 'auto');
        });
        
        // Rendu des balises code dans les objectifs : amélioration
        // permet d'afficher les balises sans les interpréter : déjà fait via texte, mais on nettoie
        // La fonction renderSlide remplace déjà le contenu brut, et le code HTML injecté est sécurisé grâce aux guillemets.
        // MathJax optionnel
    </script>
    <!-- Message d'accessibilité supplémentaire -->
    <noscript>
        <div class="text-center p-4 bg-red-100">Votre navigateur ne supporte pas JavaScript, mais le contenu reste accessible.</div>
    </noscript>
</body>
</html>
