<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 29 : React Hook Form – Formulaires performants | React</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #f0f9ff;
            font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
        }
        .slide-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .code-block {
            background: #0f172a;
            color: #e2e8f0;
            border-radius: 1rem;
            padding: 1rem;
            overflow-x: auto;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.4;
            margin: 1.2rem 0;
            white-space: pre-wrap;
            word-break: break-word;
        }
        @media (max-width: 640px) {
            .code-block {
                font-size: 0.7rem;
                padding: 0.75rem;
            }
        }
        .note-info {
            background: #dbeafe;
            border-left: 5px solid #2563eb;
            padding: 0.8rem 1rem;
            border-radius: 1rem;
            margin: 1rem 0;
        }
        .note-success {
            background: #ecfdf5;
            border-left: 5px solid #10b981;
            padding: 0.8rem 1rem;
            border-radius: 1rem;
            margin: 1rem 0;
        }
        .badge-rhf {
            background: #e0e7ff;
            color: #3730a3;
            font-weight: 600;
            padding: 0.2rem 0.8rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            display: inline-block;
        }
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 10px;
        }
    </style>
    <!-- jQuery & MathJax -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
</head>
<body class="antialiased">

    <div class="max-w-4xl mx-auto px-4 py-6 md:py-10">
        <!-- Zone d'affichage dynamique des slides -->
        <div id="slides-container" class="relative"></div>

        <!-- Navigation entre slides -->
        <div class="flex justify-between items-center mt-8 gap-3">
            <button id="prevBtn" class="bg-white hover:bg-slate-100 text-slate-700 font-semibold py-2 px-5 rounded-full shadow-md transition disabled:opacity-40 disabled:cursor-not-allowed border border-slate-300 text-sm md:text-base">◀ Précédent</button>
            <div class="text-sm bg-white/70 backdrop-blur-sm px-4 py-1.5 rounded-full shadow-sm text-slate-600">
                Slide <span id="currentSlide">1</span> / <span id="totalSlides">0</span>
            </div>
            <button id="nextBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-5 rounded-full shadow-md transition disabled:opacity-40 disabled:cursor-not-allowed text-sm md:text-base">Suivant ▶</button>
        </div>
    </div>

    <footer class="text-center text-slate-400 text-xs py-5 border-t border-slate-200 mt-6">
        🇨🇲 Cours React – Enseignant Cameroun | Leçon 29 : React Hook Form
    </footer>

    <script>
        // Contenu des slides pour la leçon 29 (React Hook Form)
        const slidesData = [
            {
                type: "title",
                icon: "📝",
                title: "React Hook Form",
                subtitle: "Créez des formulaires performants avec peu de re-rendus et une validation simplifiée",
                badge: "Leçon 29 · Niveau Intermédiaire"
            },
            {
                type: "objectifs",
                title: "🎯 Objectifs de la leçon",
                list: [
                    "✅ Installer et configurer React Hook Form dans un projet",
                    "✅ Gérer les champs d'un formulaire avec register et handleSubmit",
                    "✅ Comprendre pourquoi React Hook Form limite les re-rendus",
                    "✅ Ajouter des règles de validation simples (required, minLength, pattern)",
                    "✅ Intégrer la validation avancée avec Zod ou Yup",
                    "✅ Gérer les erreurs et afficher des messages personnalisés"
                ]
            },
            {
                type: "content",
                title: "🧠 Pourquoi React Hook Form ?",
                content: `
                    <p>Avec <code>useState</code>, chaque frappe dans un input déclenche un re-rendu du composant. Pour les formulaires complexes, cela peut nuire aux performances. <strong>React Hook Form</strong> résout ce problème en utilisant des références (refs) non contrôlées.</p>
                    <ul class="list-disc pl-6 mt-3 space-y-1">
                        <li>✅ <span class="font-semibold">Performances optimales</span> : très peu de re-rendus.</li>
                        <li>✅ <span class="font-semibold">Code réduit</span> : moins de boilerplate que useState.</li>
                        <li>✅ <span class="font-semibold">Validation intégrée</span> : règles natives et support de Zod/Yup.</li>
                        <li>✅ <span class="font-semibold">Gestion des erreurs facile</span> : messages dynamiques.</li>
                    </ul>
                    <div class="note-info mt-3">
                        📦 <strong>Installation</strong> : <code>npm install react-hook-form</code>
                    </div>
                `
            },
            {
                type: "content",
                title: "🔧 Premier formulaire avec useForm",
                content: `
                    <p>Le hook <code>useForm</code> fournit tout le nécessaire : register, handleSubmit, formState (errors).</p>
                    <div class="code-block">
                        import { useForm } from 'react-hook-form';

                        function ContactForm() {
                          const { register, handleSubmit, formState: { errors } } = useForm();
                          
                          const onSubmit = (data) => {
                            console.log('Données du formulaire :', data);
                            // Envoyer à l'API...
                          };
                          
                          return (
                            &lt;form onSubmit={handleSubmit(onSubmit)}&gt;
                              &lt;input {...register('nom')} placeholder="Votre nom" /&gt;
                              &lt;input {...register('email')} placeholder="Email" /&gt;
                              &lt;button type="submit"&gt;Envoyer&lt;/button&gt;
                            &lt;/form&gt;
                          );
                        }
                    </div>
                    <div class="note-success mt-2">
                        💡 <strong>Astuce</strong> : <code>register('nom')</code> enregistre le champ. <code>handleSubmit</code> valide et appelle <code>onSubmit</code> uniquement si tout est correct.
                    </div>
                `
            },
            {
                type: "content",
                title: "✅ Validation basique (required, minLength, pattern)",
                content: `
                    <p>On peut ajouter des règles de validation directement dans <code>register</code>.</p>
                    <div class="code-block">
                        &lt;input 
                          {...register('email', { 
                            required: 'L\'email est obligatoire',
                            pattern: {
                              value: /^[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}$/i,
                              message: 'Adresse email invalide'
                            }
                          })} 
                        /&gt;
                        {errors.email && &lt;p style={{ color: 'red' }}&gt;{errors.email.message}&lt;/p&gt;}
                        
                        &lt;input 
                          {...register('password', { 
                            required: 'Mot de passe requis',
                            minLength: { value: 6, message: 'Au moins 6 caractères' }
                          })} 
                        /&gt;
                    </div>
                    <ul class="list-disc pl-6 mt-2">
                        <li><code>required</code> : chaîne ou booléen (message personnalisé).</li>
                        <li><code>minLength / maxLength</code> : pour les chaînes.</li>
                        <li><code>pattern</code> : expression régulière.</li>
                        <li><code>validate</code> : fonction personnalisée.</li>
                    </ul>
                `
            },
            {
                type: "content",
                title: "📐 Validation avancée avec Zod (ou Yup)",
                content: `
                    <p>Pour des règles complexes, on peut utiliser <strong>Zod</strong> (ou Yup) avec le <strong>resolve</strong> de <code>@hookform/resolvers</code>.</p>
                    <div class="code-block">
                        npm install @hookform/resolvers zod zod
                    </div>
                    <div class="code-block">
                        import { useForm } from 'react-hook-form';
                        import { zodResolver } from '@hookform/resolvers/zod';
                        import { z } from 'zod';

                        const schema = z.object({
                          nom: z.string().min(2, 'Nom trop court'),
                          email: z.string().email('Email invalide'),
                          age: z.number({ invalid_type_error: 'Âge requis' }).min(18, 'Vous devez avoir 18 ans')
                        });

                        function Form() {
                          const { register, handleSubmit, formState: { errors } } = useForm({
                            resolver: zodResolver(schema)
                          });
                          
                          const onSubmit = (data) => console.log(data);
                          // ... JSX avec affichage des erreurs
                        }
                    </div>
                    <div class="note-info mt-2">
                        🧠 <strong>Avantage</strong> : La validation est centralisée, réutilisable et très lisible.
                    </div>
                `
            },
            {
                type: "content",
                title: "⚡ Optimisation : réduction des re-rendus",
                content: `
                    <p>Contrairement à <code>useState</code> qui re-rend à chaque frappe, React Hook Form utilise des <strong>refs non contrôlées</strong>. Le composant ne se re-rend que lorsque la validation ou la soumission se produit.</p>
                    <div class="note-success">
                        ✅ <strong>Performance mesurable</strong> : pour un formulaire de 10 champs, les re-rendus passent de 10+ par frappe à 0 ou 1 seule fois.
                    </div>
                    <p>Pour accéder à la valeur en temps réel (ex: affichage dynamique), on peut utiliser <code>watch</code> :</p>
                    <div class="code-block">
                        const { watch } = useForm();
                        const nomValue = watch('nom'); // se re-rend uniquement quand 'nom' change
                    </div>
                    <p>Astuce : utilisez <code>watch</code> uniquement pour les champs qui en ont besoin.</p>
                `
            },
            {
                type: "content",
                title: "🏁 Résumé et bonnes pratiques",
                content: `
                    <p><span class="font-bold text-indigo-700">✅ Ce qu'il faut retenir :</span></p>
                    <ul class="list-disc pl-6 mt-2 space-y-1">
                        <li>React Hook Form est la bibliothèque de formulaires la plus populaire dans l'écosystème React.</li>
                        <li>Utilisez <code>register</code> pour connecter chaque champ, <code>handleSubmit</code> pour la soumission.</li>
                        <li>La validation peut être intégrée directement (<code>required, pattern</code>) ou via Zod/Yup.</li>
                        <li>Les erreurs sont accessibles dans <code>formState.errors</code>.</li>
                        <li>Pour des formulaires très interactifs, utilisez <code>watch</code> de manière ciblée.</li>
                    </ul>
                    <div class="grid grid-cols-2 gap-2 mt-4 text-center text-sm">
                        <div class="bg-indigo-50 p-2 rounded-lg">📦 useForm</div>
                        <div class="bg-indigo-50 p-2 rounded-lg">📝 register</div>
                        <div class="bg-indigo-50 p-2 rounded-lg">🚀 handleSubmit</div>
                        <div class="bg-indigo-50 p-2 rounded-lg">✅ zodResolver</div>
                    </div>
                    <p class="mt-4 italic text-slate-500">"Des formulaires rapides, peu de re-rendus, une validation claire – React Hook Form change la donne !"</p>
                `
            }
        ];

        let currentIdx = 0;
        const total = slidesData.length;

        function renderSlide(index) {
            const s = slidesData[index];
            if (!s) return "<div class='text-center p-10'>Erreur slide</div>";
            
            if (s.type === "title") {
                return `
                    <div class="slide-card bg-gradient-to-br from-indigo-50 to-blue-50 rounded-3xl shadow-xl p-6 md:p-10 text-center border border-indigo-100">
                        <div class="text-7xl mb-4">${s.icon}</div>
                        <h1 class="text-3xl md:text-5xl font-extrabold text-indigo-800 leading-tight">${s.title}</h1>
                        <p class="text-lg md:text-xl text-slate-600 mt-4 max-w-xl mx-auto">${s.subtitle}</p>
                        <div class="mt-6 inline-block bg-indigo-200 px-4 py-1 rounded-full text-indigo-800 text-sm font-medium">${s.badge}</div>
                        <div class="mt-8 w-16 h-1 bg-indigo-300 mx-auto rounded-full"></div>
                    </div>
                `;
            } 
            else if (s.type === "objectifs") {
                return `
                    <div class="slide-card bg-white rounded-3xl shadow-xl p-6 md:p-8 border-l-8 border-indigo-500">
                        <h2 class="text-2xl md:text-3xl font-bold text-indigo-700 mb-5">${s.title}</h2>
                        <ul class="space-y-3">
                            ${s.list.map(item => `<li class="flex items-start gap-3 text-slate-700 text-base md:text-lg"><span class="text-indigo-500 text-xl shrink-0">📌</span> <span>${item}</span></li>`).join('')}
                        </ul>
                        <div class="mt-6 bg-indigo-50 p-3 rounded-xl text-indigo-700 text-sm italic">
                            🧠 Après cette leçon, vous saurez créer des formulaires React à la fois performants et faciles à maintenir !
                        </div>
                    </div>
                `;
            }
            else if (s.type === "content") {
                return `
                    <div class="slide-card bg-white rounded-3xl shadow-xl p-6 md:p-8">
                        <h2 class="text-2xl md:text-3xl font-bold text-indigo-700 border-b border-indigo-200 pb-3 mb-5">${s.title}</h2>
                        <div class="prose prose-slate max-w-none text-slate-700 leading-relaxed">
                            ${s.content}
                        </div>
                    </div>
                `;
            }
            return `<div class="bg-white rounded-2xl p-6">Contenu non disponible</div>`;
        }

        function updateDisplay() {
            const html = renderSlide(currentIdx);
            $("#slides-container").html(html);
            $("#currentSlide").text(currentIdx + 1);
            $("#totalSlides").text(total);
            
            $("#prevBtn").prop("disabled", currentIdx === 0);
            $("#nextBtn").prop("disabled", currentIdx === total - 1);
            
            $("html, body").animate({ scrollTop: 0 }, 80);
            if (window.MathJax && typeof MathJax.typesetPromise === 'function') {
                MathJax.typesetPromise();
            }
        }

        function nextSlide() {
            if (currentIdx < total - 1) {
                currentIdx++;
                updateDisplay();
            }
        }
        
        function prevSlide() {
            if (currentIdx > 0) {
                currentIdx--;
                updateDisplay();
            }
        }

        $(document).ready(function() {
            updateDisplay();
            $("#nextBtn").on("click", nextSlide);
            $("#prevBtn").on("click", prevSlide);
            
            $(document).keydown(function(e) {
                if (e.key === "ArrowRight") { nextSlide(); e.preventDefault(); }
                else if (e.key === "ArrowLeft") { prevSlide(); e.preventDefault(); }
            });
            
            let touchStartX = 0, touchEndX = 0;
            const container = document.getElementById("slides-container");
            if (container) {
                container.addEventListener('touchstart', (e) => {
                    touchStartX = e.changedTouches[0].screenX;
                }, { passive: true });
                container.addEventListener('touchend', (e) => {
                    touchEndX = e.changedTouches[0].screenX;
                    if (touchEndX < touchStartX - 45) nextSlide();
                    if (touchEndX > touchStartX + 45) prevSlide();
                });
            }
        });
    </script>
</body>
</html>
