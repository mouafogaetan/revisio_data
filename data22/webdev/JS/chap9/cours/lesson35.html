            },
            { // slide 3 : Démo interactive - To-do list et API (projet complet)
                title: "🖥️ Démo : Application To-do + Citation API",
                content: `
                    <div class="space-y-5">

                        <div class="border rounded-xl overflow-hidden shadow-sm bg-white">
                            <!-- App Demo Area -->
                            <div id="demoAppContainer" class="p-5 bg-gray-50">
                                <!-- Partie to-do list -->
                                <h3 class="font-bold text-lg text-indigo-800 flex items-center gap-2"><span>📋</span> Ma liste de tâches (localStorage)</h3>
                                <div class="flex flex-col sm:flex-row gap-2 mt-3">
                                    <input type="text" id="taskInput" placeholder="ex: Réviser les closures" class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:ring-indigo-500 focus:border-indigo-500">

                                    <button id="clearStorageBtn" class="text-red-500 hover:text-red-700 text-xs underline">Effacer toutes les tâches</button>

                            </div>
                            <!-- Partie API Citation (fetch) -->
                            <div class="border-t p-5 bg-white">
                                <div class="flex justify-between items-center flex-wrap gap-2">
                                    <h3 class="font-bold text-indigo-800">✨ Inspiration API externe (fetch)</h3>
                                    <button id="fetchQuoteBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white text-sm px-4 py-1.5 rounded-full shadow">🔄 Nouvelle citation</button>
                                </div>
                                <div id="quoteBox" class="mt-3 p-4 bg-indigo-50 rounded-xl italic text-gray-700">
                                    Cliquez sur "Nouvelle citation" pour recevoir une phrase inspirante.
                                </div>
                                <p class="text-xs text-gray-400 mt-2">API : Quotable (gratuit, sans clé) — exemple de requête asynchrone.</p>
                            </div>
                        </div>
                        <div class="text-sm bg-gray-100 p-3 rounded-md">
                            💡 <strong>Analyse du code :</strong> l'application utilise jQuery pour la manipulation DOM, événements, gestion localStorage avec JSON.stringify/parse et fetch() avec then/catch. Tous les concepts de la leçon 35 sont réunis !
                        </div>
                    </div>
                `
            },
            { // slide 4 : Explication code - gestion des tâches
                title: "🧠 Explication 1 : Gestion des tâches & localStorage",
                content: `
                    <div class="space-y-4">
                        <div class="bg-gray-800 text-white p-3 rounded-lg overflow-x-auto">
                            <pre class="text-sm font-mono"><code>// Stockage : clé "todoAppTasks"
let tasks = JSON.parse(localStorage.getItem("todoAppTasks")) || [];

function saveTasks() {
  localStorage.setItem("todoAppTasks", JSON.stringify(tasks));
}

function renderTasks() {
  // Génération du HTML via jQuery
  $("#todoList").empty();
  tasks.forEach((task, idx) => {
    let li = $("\<li\>").addClass("flex justify-between items-center p-2 border-b");
    // case à cocher + texte
    let checkSpan = $("\<span\>").addClass("flex items-center gap-2");
    let checkBox = $("\<input\>").attr("type","checkbox").prop("checked", task.completed);
    checkBox.on("change", () => { toggleCompleted(idx); });
    let taskText = $("\<span\>").text(task.text);
    if(task.completed) taskText.css("text-decoration","line-through").css("color","#6c757d");
    // bouton supprimer
    let delBtn = $("\<button\>").text("🗑️").addClass("text-red-500 hover:text-red-700");
    delBtn.on("click", () => deleteTask(idx));
    // assemblage
    checkSpan.append(checkBox, taskText);
    li.append(checkSpan, delBtn);
    $("#todoList").append(li);
  });
  $("#taskCount").text(\`\${tasks.length} tâche(s)\`);
}</code></pre>
                        </div>
                        <p><strong>✔️ Mécanisme :</strong> chaque modification (ajout, suppression, toggle) appelle saveTasks() puis renderTasks(). La persistance permet de retrouver les tâches après rafraîchissement.</p>
                    </div>
                `
            },
            { // slide 5 : Explication code - Evenements et API fetch
                title: "🌐 Explication 2 : Événements & API Fetch (asynchrone)",
                content: `
                    <div class="space-y-4">
                        <div class="bg-gray-800 text-white p-3 rounded-lg overflow-x-auto">
                            <pre class="text-sm font-mono"><code>// Récupération d'une citation aléatoire via fetch
$("#fetchQuoteBtn").on("click", function() {
  $("#quoteBox").html("⏳ Chargement d'une citation...");
  fetch("https://api.quotable.io/random")
    .then(response => {
      if (!response.ok) throw new Error("Erreur réseau");
      return response.json();
    })
    .then(data => {
      let quoteText = data.content;
      let author = data.author;
      $("#quoteBox").html(\`“\${quoteText}” — <strong>\${author}</strong>\`);
    })
    .catch(error => {
      $("#quoteBox").html("❌ Impossible de charger la citation. Vérifiez votre connexion.");
      console.error(error);
    });
});

// Ajout d'une tâche
$("#addTaskBtn").on("click", function() {
  let newTaskText = $("#taskInput").val().trim();
  if(newTaskText === "") return alert("Veuillez écrire une tâche");
  tasks.push({ text: newTaskText, completed: false });
  saveTasks();
  renderTasks();
  $("#taskInput").val("");
});</code></pre>
                        </div>
                        <p>🎯 On utilise également les fonctions <code>deleteTask</code> et <code>toggleCompleted</code>. De plus, on initialise l'interface au chargement et on écoute l’événement <code>clearStorageBtn</code> pour vider les données.</p>
                    </div>
                `
            },
            { // slide 6 : Défis / améliorations possibles
                title: "🚀 Aller plus loin : ce que vous pouvez ajouter",
                content: `
                    <div class="space-y-4">
                        <p>Le projet présenté est une base solide. Pour approfondir, voici des idées :</p>
                        <ul class="list-disc pl-6 space-y-2">

            },
            { // slide 7 : Résumé et conseils finaux

                            <p class="text-lg font-semibold">Vous avez maintenant toutes les cartes en main pour développer des applications web complètes.</p>

        ];

        let currentSlide = 0;
        const total = slidesData.length;
        $("#totalSlides").text(total);

        function renderSlide(index) {
            const slide = slidesData[index];
            let html = `
                <div class="animate-fade-in">
                    <h2 class="text-2xl md:text-3xl font-bold text-gray-800 border-l-4 border-indigo-500 pl-4 mb-6">${slide.title}</h2>
                    <div class="prose max-w-none text-gray-700">
                        ${slide.content}
                    </div>
                </div>
            `;
            $("#slideContent").html(html);
            $("#slideCounter").text(index+1);
            
            // Mise à jour des dots
            let dotsHtml = "";
            for(let i=0; i<total; i++) {
                let activeClass = (i === index) ? "bg-indigo-600 w-3 h-3" : "bg-gray-300 w-2.5 h-2.5";
                dotsHtml += `<div class="${activeClass} rounded-full transition-all duration-200"></div>`;
            }
            $("#slideDotContainer").html(dotsHtml);
            
            // désactiver boutons si besoin
            $("#prevSlide").prop("disabled", index === 0);
            $("#nextSlide").prop("disabled", index === total-1);
            
            // Si on est sur la slide 3 (index 3) qui contient l'application demo, alors on initialise l'app demo
            // index 3 correspond à la démo interactive (slide 3 dans notre tableau)
            if(index === 3) {
                initDemoApplication();
            }
        }

        // Fonction d'initialisation de la démo (to-do + API) utilisant jQuery
        let demoInitialized = false;
        function initDemoApplication() {
            if(demoInitialized) return;
            demoInitialized = true;
            
            // Variables tasks
            let tasks = [];
            const STORAGE_KEY = "todoAppTasks";
            
            function loadTasksFromStorage() {
                let stored = localStorage.getItem(STORAGE_KEY);
                if(stored) {
                    tasks = JSON.parse(stored);
                } else {
                    tasks = [
                        { text: "✨ Ajouter une citation via API", completed: false },
                        { text: "✅ Marquer cette tâche comme finie", completed: false }
                    ];
                }
                saveTasksToStorage();
                renderTodoList();
            }
            
            function saveTasksToStorage() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
            }
            
            function renderTodoList() {
                const $todoList = $("#todoList");
                $todoList.empty();
                if(tasks.length === 0) {
                    $todoList.html('<li class="text-gray-400 text-center py-2">Aucune tâche. Ajoutez-en une !</li>');
                    $("#taskCount").text("0 tâche(s)");
                    return;
                }
                tasks.forEach((task, idx) => {
                    const $li = $("<li>").addClass("flex justify-between items-center p-2 border-b border-gray-200 todo-item");
                    const $left = $("<div>").addClass("flex items-center gap-2");
                    const $checkbox = $("<input>").attr("type", "checkbox").addClass("rounded focus:ring-indigo-500");
                    $checkbox.prop("checked", task.completed);
                    $checkbox.on("change", () => {
                        tasks[idx].completed = $checkbox.prop("checked");
                        saveTasksToStorage();
                        renderTodoList();
                    });
                    const $taskSpan = $("<span>").addClass("text-gray-800").text(task.text);
                    if(task.completed) $taskSpan.addClass("line-through text-gray-400");
                    $left.append($checkbox, $taskSpan);
                    const $delBtn = $("<button>").html("🗑️").addClass("text-red-500 hover:text-red-700 text-sm font-medium bg-transparent");
                    $delBtn.on("click", () => {
                        tasks.splice(idx, 1);
                        saveTasksToStorage();
                        renderTodoList();
                    });
                    $li.append($left, $delBtn);
                    $todoList.append($li);
                });
                $("#taskCount").text(`${tasks.length} tâche(s)`);
            }
            
            // Ajout tâche
            $("#addTaskBtn").off("click").on("click", function() {
                const newTaskText = $("#taskInput").val().trim();
                if(newTaskText === "") {
                    alert("Veuillez saisir une tâche");
                    return;
                }
                tasks.push({ text: newTaskText, completed: false });
                saveTasksToStorage();
                renderTodoList();
                $("#taskInput").val("");
            });
            
            $("#clearStorageBtn").off("click").on("click", function() {
                if(confirm("Effacer toutes les tâches ?")) {
                    tasks = [];
                    saveTasksToStorage();
                    renderTodoList();
                }
            });
            
            // Citation API fetch
            function fetchRandomQuote() {
                const $quoteBox = $("#quoteBox");
                $quoteBox.html("⏳ Chargement de la citation ...");
                $.ajax({
                    url: "https://api.quotable.io/random",
                    method: "GET",
                    timeout: 8000,
                    success: function(data) {
                        if(data && data.content) {
                            $quoteBox.html(`“${data.content}” — <strong>${data.author || "Anonyme"}</strong>`);
                        } else {
                            $quoteBox.html("❌ Citation indisponible, réessayez.");
                        }
                    },
                    error: function() {
                        $quoteBox.html("⚠️ Impossible de récupérer une citation. Vérifiez votre connexion internet.");
                    }
                });
            }
            
            $("#fetchQuoteBtn").off("click").on("click", function(e) {
                e.preventDefault();
                fetchRandomQuote();
            });
            
            loadTasksFromStorage();
            fetchRandomQuote(); // chargement initial
        }
        
        // Navigation
        function goPrev() { if(currentSlide > 0) { currentSlide--; renderSlide(currentSlide); } }
        function goNext() { if(currentSlide < total-1) { currentSlide++; renderSlide(currentSlide); } }
        
        $("#prevSlide").on("click", goPrev);
        $("#nextSlide").on("click", goNext);
        
        // Initialisation au premier slide
        renderSlide(0);
    </script>
</body>
