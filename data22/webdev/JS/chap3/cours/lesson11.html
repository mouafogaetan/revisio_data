<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 11 : break et continue | Initiation JavaScript</title>
    <!-- Tailwind CSS v3 + CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (pour formules si besoin, reste léger) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <!-- Google Fonts pour lisibilité -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        body {
            background: #f1f5f9;  /* fond doux */
        }
        /* transition fluide pour slides */
        .slide-container {
            transition: all 0.3s ease-in-out;
        }
        .slide-card {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(0px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
        }
        .nav-btn {
            transition: all 0.2s;
            cursor: pointer;
        }
        .nav-btn:active {
            transform: scale(0.96);
        }
        .progress-dot {
            transition: all 0.2s;
            cursor: pointer;
        }
        @media (max-width: 640px) {
            .slide-card {
                border-radius: 1.5rem;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
        code.inline-code {
            background: #eef2ff;
            padding: 0.2rem 0.4rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1e293b;
        }
        pre {
            background: #0f172a;
            color: #e2e8f0;
            border-radius: 1rem;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .highlight {
            border-left: 5px solid #3b82f6;
            background: #f0f9ff;
        }
    </style>
</head>
<body class="antialiased">

    <main class="max-w-4xl mx-auto px-4 py-6 md:py-10">
        <!-- Conteneur slide principal -->
        <div id="slidesContainer" class="relative">
            <!-- Slides seront injectés ici via jQuery -->
        </div>

        <!-- Navigation + indicateurs -->
        <div class="flex justify-between items-center mt-6 gap-3 flex-wrap">
            <button id="prevBtn" class="nav-btn bg-white border border-slate-200 hover:bg-slate-100 text-slate-700 font-semibold py-2 px-5 rounded-full shadow-sm transition flex items-center gap-2">
                ← Précédent
            </button>
            <div id="dotsIndicator" class="flex flex-wrap justify-center gap-2 flex-1"></div>
            <button id="nextBtn" class="nav-btn bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-5 rounded-full shadow-md transition flex items-center gap-2">
                Suivant →
            </button>
        </div>

        <!-- petit compteur optionnel -->
        <div class="text-center text-slate-500 text-sm mt-4" id="slideCounter"></div>
    </main>

    <script>
        // Définition du contenu des slides selon la leçon 11 (break & continue)
        // Slide 0 : Titre principal
        // Slide 1 : Objectifs pédagogiques
        // Slides 2..n : Contenu détaillé
        const slidesData = [
            {
                type: "title",
                title: "🔁 break & continue",
                subtitle: "Contrôle avancé des boucles en JavaScript",
                desc: "Maîtrisez comment sortir d'une boucle ou passer à l'itération suivante."
            },
            {
                type: "objectifs",
                title: "🎯 Objectifs de la leçon",
                objectives: [
                    "Utiliser <strong class='text-indigo-700'>break</strong> pour sortir prématurément d'une boucle (for, while, do...while).",
                    "Utiliser <strong class='text-indigo-700'>continue</strong> pour passer à l'itération suivante en ignorant le code restant.",
                    "Comprendre le comportement de <strong>break</strong> et <strong>continue</strong> dans les boucles imbriquées.",
                    "Savoir quand et pourquoi les employer pour un code plus efficace et lisible."
                ]
            },
            {
                type: "content",
                title: "📖 Qu'est-ce que l'instruction break ?",
                explanation: "L'instruction <code class='inline-code'>break</code> permet de <span class='font-bold text-rose-600'>sortir immédiatement</span> de la boucle en cours (for, while, do...while, ou switch). L'exécution reprend après la boucle.",
                exampleTitle: "🔍 Exemple simple avec break",
                code: `// Chercher le premier nombre divisible par 7 entre 1 et 30
for(let i = 1; i <= 30; i++) {
    if(i % 7 === 0) {
        console.log("Trouvé : " + i);
        break;  // on sort de la boucle, on ne continue pas
    }
    console.log(i + " non divisible par 7");
}
// Résultat : s'arrête dès que i = 7`,
                note: "💡 break est très utile pour arrêter une recherche dès qu'un élément est trouvé, évitant des itérations inutiles."
            },
            {
                type: "content",
                title: "🏃‍♂️ L'instruction continue",
                explanation: "<code class='inline-code'>continue</code> interrompt l'itération <strong>en cours</strong> et passe immédiatement à l'itération suivante de la boucle (test de condition pour for, while, etc.). Le code après continue dans l'itération n'est pas exécuté.",
                exampleTitle: "🔍 Exemple : afficher seulement les nombres pairs",
                code: `// Affiche les nombres pairs de 1 à 10
for(let i = 1; i <= 10; i++) {
    if(i % 2 !== 0) {
        continue; // si impair, on saute le console.log
    }
    console.log(i + " est pair");
}
// Sortie : 2,4,6,8,10`,
                note: "⚠️ continue ne termine pas la boucle, il saute juste le reste du bloc pour l'itération courante."
            },
            {
                type: "content",
                title: "⚙️ break vs continue : tableau comparatif",
                comparison: true,
                items: [
                    { label: "break", desc: "Sort définitivement de la boucle.", analogy: "🚪 Sortie d'urgence → on quitte le bâtiment." },
                    { label: "continue", desc: "Saute une étape et continue avec la suivante.", analogy: "⏩ Bouton 'passer' sur une piste audio → on passe à la chanson suivante." }
                ],
                extra: "Dans une boucle <strong>while</strong> ou <strong>do...while</strong>, attention à ne pas créer une boucle infinie avec continue si l'incrémentation est placée après le continue."
            },
            {
                type: "content",
                title: "🧩 Boucles imbriquées : comportement décisif",
                explanation: "Lorsque vous avez des boucles à l'intérieur d'autres boucles, <strong>break</strong> et <strong>continue</strong> ne s'appliquent qu'à la boucle la plus interne (celle qui les contient).",
                exampleTitle: "Exemple avec break dans boucle imbriquée",
                code: `// Recherche d'un couple (i,j) tel que i*j === 12
for(let i = 1; i <= 4; i++) {
    for(let j = 1; j <= 4; j++) {
        if(i * j === 12) {
            console.log(\`Trouvé : i=\${i}, j=\${j}\`);
            break;  // sort seulement de la boucle j (interne)
        }
        console.log(\`i=\${i}, j=\${j}\`);
    }
    console.log("Fin boucle interne pour i=" + i);
}
// break n'arrête pas la boucle externe !`,
                note: "📌 Pour sortir d'une boucle externe depuis l'intérieure, on peut utiliser un label (ex: outerLoop: for(...) { break outerLoop; })."
            },
            {
                type: "content",
                title: "🏷️ Labels : contrôler les boucles parentes",
                explanation: "Un <strong>label</strong> (étiquette) permet de nommer une boucle et d'utiliser <code class='inline-code'>break label</code> ou <code class='inline-code'>continue label</code> pour agir sur la boucle désignée.",
                exampleTitle: "Exemple avec label + break externe",
                code: `outer: for(let i = 1; i <= 3; i++) {
    for(let j = 1; j <= 3; j++) {
        if(i === 2 && j === 2) {
            console.log("Arrêt total !");
            break outer;   // sort des deux boucles
        }
        console.log(\`i=\${i}, j=\${j}\`);
    }
}
// i=2,j=2 déclenche break outer : fin des deux boucles.`,
                note: "⚠️ À utiliser avec parcimonie pour garder un code lisible. Les labels peuvent remplacer des flags complexes."
            },
            {
                type: "content",
                title: "📝 Exercices pratiques (réflexion)",
                exercises: true,
                exos: [
                    "Écrire une boucle for de 1 à 20 qui utilise <strong>continue</strong> pour ignorer les multiples de 3, et affiche les autres.",
                    "Créer un tableau de notes [12, 5, 18, 9, 15]. Utilisez break pour arrêter la lecture dès qu'une note strictement inférieure à 6 est trouvée.",
                    "Simuler une validation de mot de passe: avec while(true) + break quand le mot de passe saisi est 'secret'."
                ]
            },
            {
                type: "content",
                title: "🧠 Récapitulatif & astuces",
                recap: true,
                tips: [
                    "✅ break : idéal pour sortir d'une boucle quand une condition est remplie (recherche, validation).",
                    "✅ continue : utile pour filtrer certaines valeurs sans arrêter le traitement global.",
                    "⚠️ Dans les boucles while, veillez à incrémenter votre compteur AVANT le continue pour éviter les boucles infinies.",
                    "💪 Utilisez des noms de labels clairs (ex: 'recherchePrincipale') si nécessaire."
                ]
            }
        ];

        let currentSlide = 0;
        let totalSlides = slidesData.length;

        // Fonction pour générer HTML d'un slide selon type
        function renderSlide(index) {
            const data = slidesData[index];
            if (!data) return "<div class='text-center p-10'>Erreur slide</div>";
            
            if (data.type === "title") {
                return `
                    <div class="slide-card p-6 md:p-10 text-center">
                        <div class="mb-6 text-5xl">📘</div>
                        <h1 class="text-4xl md:text-5xl font-extrabold bg-gradient-to-r from-indigo-700 to-blue-600 bg-clip-text text-transparent">${escapeHtml(data.title)}</h1>
                        <p class="text-xl text-slate-600 mt-3 font-medium">${escapeHtml(data.subtitle)}</p>
                        <div class="mt-6 w-20 h-1 bg-indigo-300 mx-auto rounded-full"></div>
                        <p class="text-slate-500 mt-6 max-w-md mx-auto">${escapeHtml(data.desc)}</p>
                        <div class="mt-8 text-indigo-500 text-sm">⬇️ Glissez ou utilisez les boutons ⬇️</div>
                    </div>
                `;
            }
            else if (data.type === "objectifs") {
                let objList = data.objectives.map(obj => `<li class="mb-3 flex items-start gap-3"><span class="text-indigo-600 text-xl">🎯</span><span class="text-slate-700">${obj}</span></li>`).join('');
                return `
                    <div class="slide-card p-6 md:p-9">
                        <h2 class="text-2xl md:text-3xl font-bold text-slate-800 border-l-5 border-indigo-500 pl-4 mb-6">${escapeHtml(data.title)}</h2>
                        <ul class="space-y-3 list-none">
                            ${objList}
                        </ul>
                        <div class="mt-8 bg-indigo-50 rounded-xl p-4 text-indigo-800 text-sm italic">
                            💪 Après cette leçon, vous saurez contrôler finement vos boucles JS.
                        </div>
                    </div>
                `;
            }
            else if (data.type === "content") {
                if (data.comparison) {
                    return `
                        <div class="slide-card p-6 md:p-8">
                            <h2 class="text-2xl font-bold text-slate-800 mb-5">${escapeHtml(data.title)}</h2>
                            <div class="grid md:grid-cols-2 gap-5">
                                ${data.items.map(item => `
                                    <div class="bg-slate-50 rounded-2xl p-4 shadow-sm border border-slate-200">
                                        <div class="font-mono text-2xl font-black text-indigo-700">${item.label}</div>
                                        <p class="mt-2 text-slate-700">${item.desc}</p>
                                        <div class="mt-3 text-sm text-slate-500 bg-white p-2 rounded-lg">💡 ${item.analogy}</div>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="mt-6 p-3 bg-blue-50 rounded-xl text-blue-800 text-sm">${data.extra}</div>
                        </div>
                    `;
                }
                else if (data.exercises) {
                    let exosHtml = data.exos.map((ex, idx) => `<li class="mb-4 p-3 bg-gray-50 rounded-xl shadow-inner">✏️ <strong>Exercice ${idx+1}</strong> : ${ex}</li>`).join('');
                    return `
                        <div class="slide-card p-6 md:p-8">
                            <h2 class="text-2xl font-bold text-slate-800 mb-4">${escapeHtml(data.title)}</h2>
                            <ul class="space-y-3">
                                ${exosHtml}
                            </ul>
                            <div class="mt-6 border-t-2 border-indigo-100 pt-4 text-emerald-700 bg-emerald-50 p-3 rounded-xl">
                                💡 Astuce : Testez ces exercices dans la console du navigateur (F12).
                            </div>
                        </div>
                    `;
                }
                else if (data.recap) {
                    let tipsHtml = data.tips.map(tip => `<li class="flex items-start gap-2 mb-3"><span class="text-indigo-500 text-xl">✨</span><span class="text-slate-700">${tip}</span></li>`).join('');
                    return `
                        <div class="slide-card p-6 md:p-8">
                            <h2 class="text-2xl font-bold text-slate-800 mb-5">${escapeHtml(data.title)}</h2>
                            <ul class="space-y-2 list-none">
                                ${tipsHtml}
                            </ul>
                            <div class="mt-6 bg-gradient-to-r from-indigo-50 to-sky-50 p-5 rounded-2xl text-center">
                                <p class="font-semibold">🎉 Félicitations ! Vous maîtrisez break, continue et les labels. 🎉</p>
                                <p class="text-sm text-slate-500 mt-1">Pratiquez avec des mini projets pour ancrer ces concepts.</p>
                            </div>
                        </div>
                    `;
                }
                else {
                    // contenu standard avec code
                    let codeBlock = data.code ? `<pre class="p-4 rounded-xl text-sm font-mono overflow-auto"><code>${escapeHtml(data.code)}</code></pre>` : '';
                    return `
                        <div class="slide-card p-6 md:p-8">
                            <h2 class="text-2xl font-bold text-slate-800 mb-3">${escapeHtml(data.title)}</h2>
                            <div class="prose prose-slate max-w-none mb-4 text-slate-700 leading-relaxed">${data.explanation || ''}</div>
                            ${data.exampleTitle ? `<h3 class="text-xl font-semibold text-indigo-800 mt-4 mb-2">${escapeHtml(data.exampleTitle)}</h3>` : ''}
                            ${codeBlock}
                            ${data.note ? `<div class="mt-5 bg-amber-50 border-l-4 border-amber-400 p-4 rounded-r-xl text-amber-800 text-sm">${data.note}</div>` : ''}
                        </div>
                    `;
                }
            }
            return `<div class="slide-card p-6">Contenu non disponible</div>`;
        }

        // utilitaire pour échapper HTML simple (éviter XSS)
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }

        // Mise à jour de l'affichage
        function updateSlide() {
            const slideHtml = renderSlide(currentSlide);
            $('#slidesContainer').html(slideHtml);
            $('#slideCounter').text(`Slide ${currentSlide+1} / ${totalSlides}`);
            // Générer les points indicateurs
            let dotsHtml = '';
            for(let i = 0; i < totalSlides; i++) {
                let activeClass = (i === currentSlide) ? 'bg-indigo-600 w-8' : 'bg-gray-300 w-3';
                dotsHtml += `<div class="progress-dot h-3 rounded-full ${activeClass} transition-all mx-1" data-index="${i}"></div>`;
            }
            $('#dotsIndicator').html(dotsHtml);
            // Gérer le désactiver des boutons si besoin (optionnel)
            if(currentSlide === 0) {
                $('#prevBtn').addClass('opacity-40 cursor-not-allowed').prop('disabled', true);
            } else {
                $('#prevBtn').removeClass('opacity-40 cursor-not-allowed').prop('disabled', false);
            }
            if(currentSlide === totalSlides-1) {
                $('#nextBtn').addClass('opacity-40 cursor-not-allowed').prop('disabled', true);
            } else {
                $('#nextBtn').removeClass('opacity-40 cursor-not-allowed').prop('disabled', false);
            }
            // scroll en haut pour la lisibilité mobile
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Navigation événements jQuery
        $(document).ready(function() {
            updateSlide();

            $('#nextBtn').on('click', function() {
                if(currentSlide < totalSlides - 1) {
                    currentSlide++;
                    updateSlide();
                }
            });
            $('#prevBtn').on('click', function() {
                if(currentSlide > 0) {
                    currentSlide--;
                    updateSlide();
                }
            });
            // Gestion des clics sur les points (délégation)
            $('#dotsIndicator').on('click', '.progress-dot', function() {
                let idx = $(this).data('index');
                if(idx !== undefined && idx >= 0 && idx < totalSlides) {
                    currentSlide = idx;
                    updateSlide();
                }
            });

            // Raccourcis clavier (flèches)
            $(document).on('keydown', function(e) {
                if(e.key === 'ArrowRight') {
                    if(currentSlide < totalSlides-1) {
                        currentSlide++;
                        updateSlide();
                    }
                } else if(e.key === 'ArrowLeft') {
                    if(currentSlide > 0) {
                        currentSlide--;
                        updateSlide();
                    }
                }
            });
        });

        // petite amélioration pour les pré-remplir en toute securité
        // Note : certaines parties du code affiché sont déjà bien échappées mais pour
        // les backticks dans les exemples JS on utilise escapeHtml sur le code brut sans casser la syntaxe.
        // Sur l'exemple des blocs de code, on échappe les caractères html potentiels.
        // Aucune image n'est nécessaire pour cette leçon purement logique.
        // Nous respectons la demande: pas d'images inutiles, couleurs agréables.
    </script>
</body>
</html>
