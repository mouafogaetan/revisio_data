<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Leçon 28 : Malwares et antivirus | Initiation aux Systèmes d'exploitation</title>
    <!-- Tailwind CSS + base responsive -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (optionnel, peu de formules mais présent pour compatibilité) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* styles doux pour la lecture, pas d'images intrusives */
        body {
            background: #f4f7fc;
            font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
        }
        /* transitions slides */
        .slide {
            transition: all 0.25s ease-out;
        }
        .nav-btn {
            transition: background 0.2s, transform 0.1s;
        }
        .nav-btn:active {
            transform: scale(0.96);
        }
        /* scroll fluide sur mobile */
        html {
            scroll-behavior: smooth;
        }
        /* diapo card shadow légère */
        .card-slide {
            box-shadow: 0 12px 25px -12px rgba(0, 0, 0, 0.15);
        }
        /* pas de bleu agressif, couleurs apaisantes */
        .bg-primary-soft {
            background-color: #1e4a6b;
        }
        .text-primary-dark {
            color: #0c4a6e;
        }
        .bg-objectif {
            background-color: #eef2ff;
        }
        .list-bullet-safe {
            list-style-type: disc;
            padding-left: 1.5rem;
        }
    </style>
</head>
<body class="antialiased">

    <div class="max-w-3xl mx-auto px-3 sm:px-5 py-5 md:py-8">
        <!-- Conteneur slides dynamique -->
        <div id="slides-container" class="relative">
            <!-- les slides seront injectées ici via jQuery -->
        </div>

        <!-- Navigation et indicateur de progression -->
        <div class="mt-6 flex justify-between items-center gap-3 flex-wrap">
            <button id="prevSlide" class="nav-btn bg-white border border-gray-300 hover:bg-gray-100 text-gray-700 font-medium py-2 px-5 rounded-full shadow-sm disabled:opacity-40 disabled:cursor-not-allowed transition">◀ Précédent</button>
            <div class="text-sm text-gray-600 bg-white/70 px-4 py-1.5 rounded-full shadow-sm">
                <span id="slideCounter">1</span> / <span id="totalSlides">0</span>
            </div>
            <button id="nextSlide" class="nav-btn bg-primary-soft hover:bg-blue-800 text-white font-medium py-2 px-5 rounded-full shadow-sm disabled:opacity-40 disabled:cursor-not-allowed transition">Suivant ▶</button>
        </div>

        <!-- petit rappel tactile: swiper géré via jQuery (simple)-->
    </div>

    <script>
        // Définition du contenu de la leçon 28 : Malwares et antivirus
        // Titre principal, objectifs + contenu structuré en slides
        const lessonTitle = "Leçon 28 : Menaces informatiques & Antivirus";
        const competence = "Identifier les types de malwares et comprendre la protection antivirus";
        
        // Objectifs pédagogiques (issus du JSON, reformulés simplement)
        const objectives = [
            "Identifier les principaux types de malwares : virus, ver, cheval de Troie, ransomware.",
            "Comprendre le fonctionnement des antivirus (signature, heuristique, analyse comportementale).",
            "Découvrir les rootkits et les mesures anti-rootkit."
        ];
        
        // Contenu détaillé découpé en 4 slides de contenu + slide intro + slide objectifs = total 6 slides
        const contentSlides = [
            {
                title: "🦠 Qu'est-ce qu'un malware ?",
                content: `
                    <p class="mb-3"><span class="font-semibold">Malware</span> = "Malicious Software". Programme conçu pour nuire, espionner, endommager un système ou voler des données.</p>
                    <p class="mb-2">On retrouve des malwares sous toutes les formes : exécutables, scripts, macros, ou même dissimulés dans des documents.</p>
                    <div class="bg-amber-50 border-l-4 border-amber-500 p-3 mt-3 rounded text-amber-800 text-sm">
                        💡 <span class="font-medium">À retenir :</span> Un malware peut infecter un ordinateur via un email piégé, un téléchargement frauduleux, une clé USB ou un site compromis.
                    </div>
                `
            },
            {
                title: "🧬 Virus, Ver & Cheval de Troie",
                content: `
                    <div class="grid gap-4 sm:grid-cols-1 md:grid-cols-1">
                        <div class="bg-white rounded-xl p-4 border border-gray-200">
                            <h3 class="font-bold text-red-700 text-lg">🦠 Virus</h3>
                            <p>Se propage en infectant d'autres fichiers exécutables. Besoin d'une action humaine (exécuter un programme infecté) et se réplique.</p>
                        </div>
                        <div class="bg-white rounded-xl p-4 border border-gray-200">
                            <h3 class="font-bold text-orange-700 text-lg">🐛 Ver (Worm)</h3>
                            <p>Se propage automatiquement sur le réseau sans intervention humaine. Consomme les ressources et peut créer des botnets.</p>
                        </div>
                        <div class="bg-white rounded-xl p-4 border border-gray-200">
                            <h3 class="font-bold text-purple-700 text-lg">🎭 Cheval de Troie (Trojan)</h3>
                            <p>Se fait passer pour un logiciel légitime, mais ouvre une porte dérobée. Ne se réplique pas, mais vole des données.</p>
                        </div>
                    </div>
                    <p class="text-sm text-gray-500 mt-3 italic">Exemple : Un jeu cracké peut contenir un cheval de Troie.</p>
                `
            },
            {
                title: "💰 Ransomware & Autres menaces modernes",
                content: `
                    <div class="space-y-3">
                        <div class="bg-red-50 p-3 rounded-lg">
                            <span class="font-bold text-red-800">🔒 Ransomware :</span> Chiffre les fichiers de la victime et demande une rançon (souvent en cryptomonnaie). Ex: WannaCry, Locky.
                        </div>
                        <div class="bg-slate-50 p-3 rounded-lg">
                            <span class="font-bold text-slate-800">🕵️ Spyware :</span> Espionne les activités (frappes clavier, mots de passe) sans consentement.
                        </div>
                        <div class="bg-yellow-50 p-3 rounded-lg">
                            <span class="font-bold text-yellow-800">🎣 Adware & PUPs :</span> Publicités intempestives, programmes potentiellement indésirables.
                        </div>
                        <div class="bg-gray-100 p-3 rounded-lg">
                            <span class="font-bold text-gray-800">🧙 Rootkit :</span> Modifie le noyau ou des appels système pour cacher sa présence (processus, fichiers). Très difficile à détecter.
                        </div>
                    </div>
                    <div class="mt-3 text-sm bg-blue-50 p-2 rounded border border-blue-200">
                        ⚠️ Les rootkits peuvent persister même après une réinstallation superficielle du système.
                    </div>
                `
            },
            {
                title: "🛡️ Comment fonctionne un antivirus ?",
                content: `
                    <p class="mb-2">Un antivirus protège en utilisant plusieurs techniques :</p>
                    <ul class="list-disc pl-5 space-y-2 mb-3">
                        <li><span class="font-medium">✔️ Détection par signature :</span> Compare les fichiers à une base de signatures (empreintes de malwares connus). Mise à jour quotidienne indispensable.</li>
                        <li><span class="font-medium">🧠 Analyse heuristique :</span> Examine le comportement suspect et la structure du code pour détecter des variantes inconnues.</li>
                        <li><span class="font-medium">🎭 Analyse comportementale :</span> Surveille les actions en temps réel (accès fichiers, connexions réseau, modifications registre).</li>
                    </ul>
                    <div class="bg-green-50 p-3 rounded-lg border border-green-200">
                        <p class="font-semibold">✅ Mesures anti-rootkit :</p>
                        <p class="text-sm">Analyse au niveau noyau, comparaison des listes systèmes, scanners dédiés (GMER, TDSSKiller). Utilisation de live CD pour analyser sans démarrer l'OS infecté.</p>
                    </div>
                    <p class="mt-3 text-center text-sm text-gray-500">Les antivirus modernes intègrent aussi des protections web, pare-feu et anti-ransomware.</p>
                `
            }
        ];
        
        // Construction complète des slides : 
        // Slide 0 : Titre + présentation leçon
        // Slide 1 : Objectifs
        // Slides 2 à 5 : contenus (4 slides de contenu détaillé)
        let slidesData = [];
        
        // Slide d'introduction (titre)
        slidesData.push({
            type: "title",
            html: `
                <div class="text-center py-6 md:py-8">
                    <div class="inline-block bg-blue-100 text-blue-800 text-sm font-semibold px-3 py-1 rounded-full mb-3">Initiation aux Systèmes d'exploitation</div>
                    <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-3">${lessonTitle}</h1>
                    <p class="text-lg text-gray-600 max-w-md mx-auto">${competence}</p>
                    <div class="mt-6 flex justify-center gap-4 text-sm text-gray-500">
                        <span>🛡️ Sécurité</span> • <span>🧬 Malwares</span> • <span>🔬 Antivirus</span>
                    </div>
                </div>
            `
        });
        
        // Slide objectifs
        let objListHtml = `<ul class="space-y-3">`;
        objectives.forEach(obj => {
            objListHtml += `<li class="flex items-start gap-3"><span class="text-blue-600 text-xl">✓</span><span class="text-gray-700">${obj}</span></li>`;
        });
        objListHtml += `</ul>`;
        slidesData.push({
            type: "objectives",
            html: `
                <div class="bg-objectif rounded-2xl p-5 md:p-7">
                    <h2 class="text-2xl font-bold text-primary-dark border-l-4 border-blue-600 pl-3 mb-5">🎯 Objectifs d'apprentissage</h2>
                    ${objListHtml}
                    <div class="mt-6 text-sm text-gray-500 italic">À la fin de cette leçon, vous saurez reconnaître les menaces et expliquer la protection antivirus.</div>
                </div>
            `
        });
        
        // Ajout des slides de contenu (contentSlides)
        contentSlides.forEach((slide, idx) => {
            slidesData.push({
                type: "content",
                html: `
                    <div>
                        <h2 class="text-2xl font-bold text-gray-800 border-b-2 border-blue-300 pb-2 mb-4">${slide.title}</h2>
                        <div class="prose prose-sm max-w-none text-gray-700">
                            ${slide.content}
                        </div>
                    </div>
                `
            });
        });
        
        // Ajout d'un dernier slide récapitulatif / quiz ludique (pour renforcer)
        slidesData.push({
            type: "summary",
            html: `
                <div class="bg-gradient-to-r from-indigo-50 to-sky-50 rounded-2xl p-6">
                    <h2 class="text-2xl font-bold text-indigo-800 mb-3">📌 Résumé & bonnes pratiques</h2>
                    <ul class="list-disc pl-5 space-y-2 text-gray-700">
                        <li>Un <strong>malware</strong> peut être un virus, ver, trojan, ransomware, rootkit...</li>
                        <li>Les antivirus utilisent <strong>signatures, heuristique et analyse comportementale</strong>.</li>
                        <li>Les <strong>rootkits</strong> nécessitent des outils spécifiques et parfois une réinstallation propre.</li>
                        <li>Mettez à jour votre OS et évitez les téléchargements suspects.</li>
                    </ul>
                    <div class="mt-5 p-3 bg-yellow-100 rounded-lg text-center text-yellow-800 text-sm">
                        🔐 Astuce: Activez toujours la protection en temps réel et réalisez des scans réguliers.
                    </div>
                </div>
            `
        });
        
        // Gestion dynamique des slides
        let currentIndex = 0;
        let total = slidesData.length;
        
        function renderSlide(index) {
            if (index < 0) index = 0;
            if (index >= total) index = total - 1;
            currentIndex = index;
            
            const slideHtml = slidesData[currentIndex].html;
            // Animation fade? on remplace le conteneur
            $("#slides-container").html(`
                <div class="slide card-slide bg-white rounded-2xl p-5 sm:p-7 md:p-8 transition-all duration-200">
                    ${slideHtml}
                </div>
            `);
            
            $("#slideCounter").text(currentIndex + 1);
            $("#totalSlides").text(total);
            
            // Gestion état des boutons
            $("#prevSlide").prop("disabled", currentIndex === 0);
            $("#nextSlide").prop("disabled", currentIndex === total - 1);
            
            // Scroll en haut de la slide pour meilleure expérience mobile
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        // Navigation événements
        $("#prevSlide").on("click", function() {
            if (currentIndex > 0) {
                renderSlide(currentIndex - 1);
            }
        });
        
        $("#nextSlide").on("click", function() {
            if (currentIndex < total - 1) {
                renderSlide(currentIndex + 1);
            }
        });
        
        // Gestion du swipe tactile (simple détection left/right)
        let touchStartX = 0;
        let touchEndX = 0;
        const slidesContainer = document.getElementById("slides-container");
        
        $(document).on("touchstart", "#slides-container", function(e) {
            touchStartX = e.originalEvent.touches[0].clientX;
        });
        
        $(document).on("touchend", "#slides-container", function(e) {
            touchEndX = e.originalEvent.changedTouches[0].clientX;
            const delta = touchEndX - touchStartX;
            if (Math.abs(delta) > 60) {
                if (delta > 0 && currentIndex > 0) {
                    // swipe droite -> précédent
                    renderSlide(currentIndex - 1);
                } else if (delta < 0 && currentIndex < total - 1) {
                    // swipe gauche -> suivant
                    renderSlide(currentIndex + 1);
                }
            }
        });
        
        // Raccourci clavier flèches (navigation)
        $(document).on("keydown", function(e) {
            if (e.key === "ArrowLeft") {
                if (currentIndex > 0) renderSlide(currentIndex - 1);
                e.preventDefault();
            } else if (e.key === "ArrowRight") {
                if (currentIndex < total - 1) renderSlide(currentIndex + 1);
                e.preventDefault();
            }
        });
        
        // Initialisation
        renderSlide(0);
        
        // Petit effet de chargement + ajout d'un meta pour confort mobile supplémentaire
        $('head').append('<meta name="theme-color" content="#1e4a6b">');
        
        // DESSIN SIMBOLIQUE: Nous devons insérer des images si nécessaire, mais la consigne demande de dessiner soit même
        // ou d'utiliser un alt. Dans cette leçon, aucun schema complexe; toutefois pour illustrer un cycle malware ou un rootkit on peut insérer
        // une petite zone dessinée en SVG simple (exemple schéma "infection", car une image peut aider)
        // On va créer après le rendu final un petit diagramme simple sur la slide "Rootkit" ? Plutôt ajouter dans slide content approprié
        // Mais pour respecter "si possible tu le dessine toi-même": on améliore la slide des rootkits avec un petit dessin SVG simple (arbo)
        // Modification après chargement : on va améliorer la slide des ransomwares / rootkits pour inclure un SVG de schéma de contamination
        
        // On injecte une petite illustration après la construction complète, sans casser le DOM.
        // On utilise MutationObserver ou simple setTimeout pour ajouter un schéma minimal dans la slide qui parle de rootkit (slide index 4 dans slidesData? la slide 3 de contenu (index global 5?))
        setTimeout(() => {
            // On cherche un bloc décrivant les rootkits dans la quatrième slide de contenu (celle avec le titre "💰 Ransomware & Autres menaces modernes")
            // Mais pour que ce soit pertinent, on ajoute un petit dessin explicatif simple (ex: mode noyau vs utilisateur)
            // On va aussi insérer dans la slide des antivirus un petit schéma de détection par signature.
            // Comme il faut dessiner ou alors alt, je vais créer un mini schéma SVG dans une zone ciblée.
            
            // trouver le conteneur slide actif? Mieux: après chaque render, on peut enrichir certains éléments spécifiques
            // Mais on veut que le dessin persiste. On va utiliser une fonction qui ajoute un élément SVG simple dans la slide 5 (celle rootkit)
            // Pour éviter du code redondant, on modifie après le premier rendu, et aussi après chaque changement de slide on vérifie si l'élément peut être ajouté.
            function addSimpleDrawingIfNeeded() {
                // Ajoute un petit schéma d'infection/rootkit dans la slide qui contient le titre "💰 Ransomware & Autres menaces modernes"
                // On sélectionne la slide active, on cherche le titre h2 contenant "Ransomware"
                const activeSlideDiv = $("#slides-container .slide");
                if (activeSlideDiv.length) {
                    const titleElem = activeSlideDiv.find("h2:contains('Ransomware'), h2:contains('💰 Ransomware')");
                    if (titleElem.length && !activeSlideDiv.find(".custom-svg-rootkit").length) {
                        // Ne pas dupliquer
                        const svgDrawing = `
                            <div class="custom-svg-rootkit mt-4 bg-gray-50 p-3 rounded-xl border border-gray-200">
                                <p class="text-sm font-medium text-gray-600 mb-2">🔍 Principe d'un rootkit (schéma simplifié)</p>
                                <svg viewBox="0 0 300 100" class="w-full max-w-md mx-auto" xmlns="http://www.w3.org/2000/svg">
                                    <rect x="10" y="10" width="80" height="40" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" rx="6" />
                                    <text x="28" y="34" font-size="8" fill="#1e3a8a">Applications</text>
                                    <rect x="110" y="10" width="80" height="40" fill="#fecaca" stroke="#dc2626" stroke-width="1.5" rx="6" />
                                    <text x="128" y="34" font-size="8" fill="#991b1b">Rootkit (caché)</text>
                                    <rect x="210" y="10" width="80" height="40" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5" rx="6" />
                                    <text x="228" y="34" font-size="8" fill="#14532d">Noyau (Kernel)</text>
                                    <path d="M90 30 L108 30" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)" />
                                    <path d="M190 30 L208 30" stroke="#374151" stroke-width="1.5" />
                                    <defs>
                                        <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
                                            <polygon points="0 0, 6 3, 0 6" fill="#374151" />
                                        </marker>
                                    </defs>
                                    <text x="50" y="72" font-size="7" fill="#4b5563">Injection & interception</text>
                                    <text x="145" y="72" font-size="7" fill="#4b5563">Masquage des appels système</text>
                                </svg>
                                <p class="text-xs text-gray-500 mt-1">Le rootkit intercepte les appels système et cache sa présence au niveau noyau.</p>
                            </div>
                        `;
                        // On insère après le dernier élément de contenu mais avant la fin
                        const contentArea = activeSlideDiv.children().last();
                        if (!activeSlideDiv.find(".custom-svg-rootkit").length) {
                            contentArea.after(svgDrawing);
                        }
                    }
                    
                    // Pour la slide antivirus (fonctionnement) on peut ajouter un petit schéma simple signature/heuristique
                    const antivirusTitle = activeSlideDiv.find("h2:contains('Comment fonctionne un antivirus')");
                    if (antivirusTitle.length && !activeSlideDiv.find(".antivirus-schema").length) {
                        const schemaAntivirus = `
                            <div class="antivirus-schema mt-5 bg-white border rounded-xl p-3 shadow-sm">
                                <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide">⚙️ Méthodes de détection</p>
                                <div class="flex flex-wrap justify-around gap-2 mt-2 text-center">
                                    <div class="bg-gray-100 p-2 rounded w-24"><span class="block text-lg">📜</span><span class="text-xs">Signature</span><span class="text-[11px] block">Base de données</span></div>
                                    <div class="bg-gray-100 p-2 rounded w-24"><span class="block text-lg">🧠</span><span class="text-xs">Heuristique</span><span class="text-[11px] block">Analyse code</span></div>
                                    <div class="bg-gray-100 p-2 rounded w-24"><span class="block text-lg">🎬</span><span class="text-xs">Comportementale</span><span class="text-[11px] block">Sandbox</span></div>
                                </div>
                            </div>
                        `;
                        activeSlideDiv.find("div.mt-3.text-sm.bg-blue-50").before(schemaAntivirus);
                    }
                }
            }
            
            // Ajout au premier rendu et après chaque changement de slide (observer)
            renderSlide(currentIndex);
            addSimpleDrawingIfNeeded();
            
            // On surcharge renderSlide pour déclencher le dessin supplémentaire après chaque mise à jour.
            const originalRender = renderSlide;
            window.renderSlide = function(idx) {
                originalRender(idx);
                setTimeout(addSimpleDrawingIfNeeded, 30);
            };
            renderSlide = window.renderSlide;
            // reassign button events with new render
            $("#prevSlide").off("click").on("click", function() {
                if (currentIndex > 0) renderSlide(currentIndex - 1);
            });
            $("#nextSlide").off("click").on("click", function() {
                if (currentIndex < total - 1) renderSlide(currentIndex + 1);
            });
            // Réapplique le rendu initial avec dessin
            renderSlide(0);
        }, 50);
    </script>
    <!-- petite amélioration des marges pour mobile -->
    <style>
        @media (max-width: 640px) {
            .card-slide {
                padding: 1.2rem !important;
            }
            h1 {
                font-size: 1.8rem !important;
            }
            h2 {
                font-size: 1.4rem !important;
            }
        }
        .prose ul, .prose ol {
            margin-left: 1rem;
        }
    </style>
</body>
</html>
