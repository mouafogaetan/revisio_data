<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Cours OS | Communication & Synchronisation des processus</title>
  <!-- Tailwind CSS + Google Fonts + Font Awesome (pour icônes propres) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Personnalisation Tailwind pour couleurs apaisantes et lisibles -->
  <style>
    /* Transition douce entre slides, fixer hauteur minimale */
    .slide-container {
      transition: all 0.3s ease-in-out;
    }
    body {
      background: linear-gradient(145deg, #f6f9fc 0%, #eef2f5 100%);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }
    /* Carte slide avec ombre légère et fond blanc doux */
    .slide-card {
      background: rgba(255,255,255,0.98);
      backdrop-filter: blur(0px);
      border-radius: 2rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2), 0 1px 2px rgba(0,0,0,0.02);
      transition: transform 0.2s;
    }
    /* boutons navigation tactiles */
    .nav-btn {
      transition: all 0.2s;
      cursor: pointer;
      user-select: none;
    }
    .nav-btn:active {
      transform: scale(0.96);
    }
    /* adaptabilité texte sur mobile */
    @media (max-width: 640px) {
      .slide-card {
        border-radius: 1.5rem;
      }
      h1 {
        font-size: 1.8rem;
      }
      .prose p, .prose li {
        font-size: 0.95rem;
      }
    }
    /* améliorer la liste des objectifs / contenu */
    .list-bullet-custom {
      list-style-type: none;
      padding-left: 0;
    }
    .list-bullet-custom li {
      margin-bottom: 0.6rem;
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
    }
    .list-bullet-custom li::before {
      content: "▹";
      color: #0f67b3;
      font-weight: bold;
      display: inline-block;
      width: 1.25rem;
    }
    .badge-chapitre {
      background-color: #e9f0f9;
      color: #1e4a76;
    }
    /* MathJax sera appliqué automatiquement */
  </style>
  <!-- jQuery (Google CDN) -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <!-- MathJax pour formules si besoin (même si peu de formules dans leçon7, on prévoit) -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
</head>
<body class="antialiased flex flex-col items-center justify-center min-h-screen p-3 md:p-6">

  <main class="w-full max-w-4xl mx-auto relative">
    <!-- Zone diapositive principale -->
    <div id="slidesWrapper" class="relative">
      <div class="slide-card p-5 md:p-8 lg:p-10 transition-all duration-300">
        <div id="slideContent" class="prose prose-lg max-w-none text-gray-800">
          <!-- Le contenu dynamique jQuery injectera ici les slides -->
        </div>
        <!-- Indicateur de progression & navigation -->
        <div class="flex justify-between items-center mt-8 pt-4 border-t border-gray-200 flex-wrap gap-3">
          <div class="text-sm text-gray-500 bg-gray-100 px-3 py-1 rounded-full" id="slideCounter">Slide 1 / X</div>
          <div class="flex gap-3">
            <button id="prevSlide" class="nav-btn bg-white border border-gray-300 hover:bg-gray-100 text-gray-700 font-medium py-2 px-5 rounded-full shadow-sm transition">◀ Précédent</button>
            <button id="nextSlide" class="nav-btn bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-6 rounded-full shadow-md transition">Suivant ▶</button>
          </div>
        </div>
      </div>
    </div>
    
    <!-- petit message info -->
    <div class="text-center text-xs text-gray-400 mt-5">
      📘 Matière: Initiation aux Systèmes d'exploitation | Chapitre 2 – Processus & Threads | Leçon 7 : Communication et synchronisation
    </div>
  </main>

  <script>
    // ------------------------------
    // DONNÉES DES SLIDES POUR LESSON7
    // D'après le programme : objectifsLesson (index 0,1,2) + approfondissement contenu
    // Leçon 7 : "Comprendre les mécanismes de communication (tube, file de messages, mémoire partagée)
    // Découvrir sémaphores et mutex pour la synchronisation
    // Comprendre le problème des producteurs-consommateurs et des lecteurs-rédacteurs"
    // On construit des slides pédagogiques, clairs, avec exemples adaptés au Cameroun & langage simple.
    const lessonData = {
      title: "Communication & Synchronisation des processus",
      subtitle: "Comment les processus collaborent sans se bloquer ?",
      objectives: [
        "Comprendre les mécanismes de communication inter-processus (tube, file de messages, mémoire partagée).",
        "Découvrir les sémaphores et les mutex pour synchroniser l'accès aux ressources partagées.",
        "Analyser et résoudre les problèmes classiques : producteurs-consommateurs et lecteurs-rédacteurs."
      ],
      slidesContent: [
        { // slide 0: intro contexte
          type: "content",
          title: "🎯 Pourquoi la communication et synchronisation ?",
          html: `<p class="leading-relaxed">Dans un système d'exploitation, plusieurs processus ou threads s'exécutent en parallèle. Ils ont parfois besoin de <strong class="text-indigo-700">s'échanger des données</strong> (communication) et de <strong class="text-indigo-700">coordonner leurs actions</strong> pour éviter les conflits (synchronisation).</p>
          <div class="bg-blue-50 border-l-4 border-blue-500 p-4 my-5 rounded-lg">
            <p class="text-sm md:text-base">📌 <strong>Exemple concret :</strong> Imaginons deux amis qui doivent partager un seul stylo pour écrire. Ils doivent se communiquer "à qui le tour" et attendre que l'autre ait fini. En informatique, c'est pareil avec la mémoire ou les fichiers !</p>
          </div>
          <p class="mt-3">Cette leçon explore les outils fournis par l'OS : <strong>tubes, files de messages, mémoire partagée, sémaphores, mutex</strong>, et deux problèmes célèbres.</p>`
        },
        { // slide 1 : communication inter-processus (IPC) : tubes & files
          type: "content",
          title: "📬 Mécanismes de communication (IPC)",
          html: `<div class="grid md:grid-cols-2 gap-5">
            <div class="bg-gray-50 p-4 rounded-xl">
              <h3 class="font-bold text-lg flex items-center gap-2">🔧 Tube (Pipe)</h3>
              <p>Communication <strong>unidirectionnelle</strong> (flux de données simple sens). Utilisé entre processus ayant un lien de parenté (ex: shell).</p>
              <pre class="bg-gray-800 text-green-200 p-2 rounded text-xs md:text-sm mt-2 overflow-x-auto">$ commande1 | commande2   # tube anonyme</pre>
              <p class="text-sm mt-1">📌 <em>Tube nommé (FIFO)</em> : permet à des processus non-parents de communiquer via un fichier spécial.</p>
            </div>
            <div class="bg-gray-50 p-4 rounded-xl">
              <h3 class="font-bold text-lg flex items-center gap-2">📨 File de messages</h3>
              <p>Les processus envoient et reçoivent des <strong>messages structurés</strong> (avec type). Chaque message est stocké temporairement dans une file gérée par le noyau.</p>
              <p class="text-sm mt-1"><strong>Avantage</strong> : permet d'échanger des données sans mémoire commune, asynchrone.</p>
              <p class="text-sm bg-white p-1 rounded border">Exemple d'utilisation : système de messagerie entre modules d'un jeu.</p>
            </div>
          </div>
          <div class="mt-4 bg-indigo-50 p-3 rounded-lg">
            <p class="font-semibold">🧠 Mémoire partagée : la plus rapide</p>
            <p>Un segment de mémoire accessible par plusieurs processus. <span class="italic">Attention :</span> il faut la synchroniser (avec sémaphores) pour éviter les accès simultanés problématiques.</p>
          </div>`
        },
        { // slide 2 : sémaphores & mutex (synchro)
          type: "content",
          title: "🔒 Sémaphores & Mutex : maîtriser l'accès concurrent",
          html: `<div class="space-y-4">
            <div class="bg-gradient-to-r from-green-50 to-teal-50 p-4 rounded-xl">
              <h3 class="text-xl font-bold">🚦 Sémaphore (Dijkstra)</h3>
              <p>Variable entière contrôlée par deux opérations atomiques : <code class="bg-gray-200 px-1 rounded">P()</code> (proberen, attendre) et <code class="bg-gray-200 px-1 rounded">V()</code> (verhogen, signaler).</p>
              <ul class="list-disc pl-5 mt-2 space-y-1">
                <li><strong>Sémaphore binaire</strong> (0 ou 1) = verrouillage simple → équivalent à un mutex.</li>
                <li><strong>Sémaphore compteur</strong> (N>1) : contrôle l'accès à un nombre limité de ressources (ex: 3 imprimantes).</li>
              </ul>
              <div class="bg-white p-2 rounded mt-2 text-sm"><span class="font-mono">P(s) : si s>0 alors s-- sinon attendre ; V(s) : s++ et réveiller un processus en attente.</span></div>
            </div>
            <div class="bg-amber-50 p-4 rounded-xl">
              <h3 class="text-xl font-bold">🤝 Mutex (MUTual EXclusion)</h3>
              <p>Verrou binaire spécialisé pour l'exclusion mutuelle. Un thread verrouille le mutex avant d'entrer en section critique, puis déverrouille.</p>
              <p class="mt-1"><strong>Différence avec sémaphore binaire :</strong> Le mutex impose que seul le thread qui a verrouillé peut déverrouiller (propriété). Sémaphore plus général.</p>
            </div>
          </div>`
        },
        { // slide 3 : Problème producteurs-consommateurs (visuel + explication)
          type: "content",
          title: "🏭 Problème classique : Producteurs - Consommateurs",
          html: `<div class="flex flex-col lg:flex-row gap-6 items-start">
            <div class="flex-1">
              <p>Un ou plusieurs producteurs génèrent des données (items) et les déposent dans un <strong>tampon (buffer)</strong> de taille limitée. Les consommateurs retirent ces données pour les traiter.</p>
              <div class="bg-gray-100 p-3 rounded-lg my-3 text-center font-mono text-sm">[Tampon: |_|_|_|_|]  (taille max = 5)</div>
              <p><span class="font-bold text-red-600">⚠️ Problèmes :</span> producteur ne doit pas ajouter si tampon plein ; consommateur ne doit pas retirer si tampon vide. Accès concurrent doit être protégé !</p>
              <div class="mt-3 bg-green-100 p-2 rounded-lg"><strong>💡 Solution avec sémaphores :</strong> <br/> 
              - Sémaphore <strong>vide</strong> = nombre de places libres, <strong>plein</strong> = nombre d'items disponibles, <strong>mutex</strong> pour protéger le tampon.</div>
            </div>
            <div class="flex-1 bg-white shadow-md rounded-xl p-3 border">
              <h4 class="font-bold text-center">Algorithme simplifié</h4>
              <pre class="bg-gray-800 text-gray-200 text-xs p-3 rounded overflow-x-auto">
Producteur:
  P(vide);           // attend une place libre
  P(mutex);
    // déposer item dans tampon
  V(mutex);
  V(plein);          // signale un item dispo

Consommateur:
  P(plein);          // attend au moins un item
  P(mutex);
    // retirer item du tampon
  V(mutex);
  V(vide);           // signale place libérée
              </pre>
              <p class="text-xs mt-2">✨ Ce modèle est utilisé dans les files d'attente, les serveurs web, etc.</p>
            </div>
          </div>`
        },
        { // slide 4 : Lecteurs-rédacteurs
          type: "content",
          title: "📖 Problème des Lecteurs - Rédacteurs",
          html: `<div class="space-y-4">
            <p class="font-medium">Des processus peuvent lire une ressource partagée (base de données, fichier) et d'autres peuvent la modifier (écrire). Règles de synchronisation :</p>
            <ul class="list-disc pl-6 space-y-1">
              <li><strong>Plusieurs lecteurs</strong> peuvent lire simultanément (pas de conflit).</li>
              <li><strong>Un rédacteur</strong> doit avoir un accès exclusif (aucun lecteur ni autre rédacteur).</li>
              <li>Pendant qu'un rédacteur écrit, aucun lecteur ne peut accéder.</li>
            </ul>
            <div class="grid md:grid-cols-2 gap-4 mt-2">
              <div class="border rounded-lg p-3 bg-blue-50">
                <p class="font-bold">🔵 Première variante (priorité lecteurs)</p>
                <p>Les lecteurs peuvent entrer tant qu'il n'y a pas de rédacteur. Risque de famine pour les rédacteurs.</p>
              </div>
              <div class="border rounded-lg p-3 bg-purple-50">
                <p class="font-bold">🟣 Priorité rédacteurs</p>
                <p>Dès qu'un rédacteur demande l'accès, les nouveaux lecteurs sont bloqués. Équitable.</p>
              </div>
            </div>
            <div class="bg-gray-100 p-3 rounded-lg text-sm"><span class="font-semibold">🛠️ Implémentation classique :</span> sémaphores "mutexLecteurs", "resource" et un compteur de lecteurs actifs.</div>
            <p class="text-indigo-800 mt-1">💡 Ce problème apparaît dans les systèmes de gestion de bases de données, caches, gestionnaires de fichiers.</p>
          </div>`
        },
        { // slide 5 : Récapitulatif & Applications
          type: "content",
          title: "📌 Récapitulons : outils pour processus collaborateurs",
          html: `<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="bg-white border rounded-2xl p-4 shadow-sm">
              <h3 class="font-bold text-lg">📡 Communication</h3>
              <ul class="list-bullet-custom mt-2">
                <li>Tubes (Pipe / FIFO) – flux simple.</li>
                <li>Files de messages – communication structurée asynchrone.</li>
                <li>Mémoire partagée – la plus rapide, nécessite synchronisation.</li>
              </ul>
            </div>
            <div class="bg-white border rounded-2xl p-4 shadow-sm">
              <h3 class="font-bold text-lg">⏱️ Synchronisation</h3>
              <ul class="list-bullet-custom mt-2">
                <li>Mutex – exclusion mutuelle simple.</li>
                <li>Sémaphores – gestion de ressources multiples.</li>
                <li>Problèmes producteurs-consommateurs et lecteurs-rédacteurs.</li>
              </ul>
            </div>
          </div>
          <div class="mt-6 bg-indigo-100 p-4 rounded-xl text-center">
            ⚡ <strong>À retenir :</strong> Sans synchronisation, on court vers le "désordre" : incohérence des données, interblocages, corruption mémoire. Les OS fournissent ces mécanismes pour une exécution fiable.
          </div>`
        },
        { // slide 6 : Exercice réflexe / défi
          type: "content",
          title: "🧪 Petit exercice de réflexion",
          html: `<div class="space-y-3">
            <p class="font-semibold">Situation : 3 imprimantes partagées par 10 étudiants. Chaque étudiant doit réserver une imprimante avant d'imprimer.</p>
            <ol class="list-decimal pl-6 space-y-2">
              <li>Quel mécanisme de synchronisation utiliseriez-vous ?</li>
              <li>Comment éviter qu'un étudiant bloque l'imprimante trop longtemps ?</li>
            </ol>
            <div class="bg-gray-100 p-4 rounded-lg cursor-pointer hover:bg-gray-200 transition" id="revealAnswer">
              <span class="font-medium">🔍 Cliquer pour voir une piste de réponse</span>
              <div id="answerHint" class="hidden mt-2 text-green-800 text-sm">✅ Solution : Sémaphore compteur initialisé à 3. Chaque étudiant exécute P(sémaphore) pour réserver, puis V(sémaphore) pour libérer. Pour éviter la famine, on peut implémenter une politique FIFO ou timer. De plus, il faut protéger les imprimantes avec des mutex pour chaque imprimante si nécessaire.</div>
            </div>
            <p class="text-xs text-gray-500 mt-2">💬 Discutez avec vos camarades et comparez avec les sémaphores vus dans la leçon.</p>
          </div>`
        }
      ]
    };

    let currentSlideIndex = 0;
    let totalSlides = 0;

    // Construction complète des slides : titre + objectifs + contenu détaillé
    function buildFullSlides() {
      const slidesArray = [];
      // Slide 0 : Titre principal
      slidesArray.push({
        type: "title",
        title: lessonData.title,
        subtitle: lessonData.subtitle,
        html: `
          <div class="text-center my-4 md:my-8">
            <span class="badge-chapitre text-sm px-3 py-1 rounded-full inline-block mb-3">Chapitre 2 – Processus & Threads</span>
            <h1 class="text-3xl md:text-5xl font-extrabold bg-gradient-to-r from-indigo-800 to-cyan-700 bg-clip-text text-transparent">${lessonData.title}</h1>
            <p class="text-lg md:text-xl text-gray-600 mt-4">${lessonData.subtitle}</p>
            <div class="mt-6 flex justify-center gap-3 text-sm text-gray-500">
              <span>🖥️ Initiation aux Systèmes d'exploitation</span>
              <span>🎓 Niveau: Webdev</span>
            </div>
          </div>
        `
      });
      // Slide 1 : Objectifs pédagogiques
      let objectivesHtml = `<div><h2 class="text-2xl font-bold border-l-4 border-indigo-500 pl-4 mb-6">🎯 Objectifs de la leçon</h2><ul class="list-bullet-custom space-y-3">`;
      lessonData.objectives.forEach(obj => {
        objectivesHtml += `<li class="text-gray-700">${obj}</li>`;
      });
      objectivesHtml += `</ul><div class="mt-8 bg-indigo-50/50 p-4 rounded-2xl text-center text-indigo-800"><span class="font-medium">✨ À la fin de cette leçon, vous saurez résoudre des problèmes classiques de synchronisation !</span></div></div>`;
      slidesArray.push({ type: "objectives", html: objectivesHtml });
      
      // Ajouter les slides de contenu génériques
      lessonData.slidesContent.forEach(slide => {
        slidesArray.push({
          type: slide.type,
          title: slide.title,
          html: `<div><h2 class="text-2xl font-bold border-b-2 border-indigo-200 pb-2 mb-5">${slide.title}</h2>${slide.html}</div>`
        });
      });
      
      // optionnel : ajouter un slide de conclusion / fin
      slidesArray.push({
        type: "end",
        html: `<div class="text-center py-8">
          <div class="text-5xl mb-4">🎉</div>
          <h2 class="text-2xl md:text-3xl font-bold text-gray-800">Félicitations !</h2>
          <p class="text-gray-600 mt-3 max-w-md mx-auto">Vous maîtrisez les bases de la communication et synchronisation inter-processus.</p>
          <p class="mt-5 text-indigo-600">Pratiquez avec des exercices et explorez les appels système sous Linux (pipe, shmget, semget).</p>
          <div class="mt-6 text-sm text-gray-400">Leçon 7 – Programme officiel “Initiation aux Systèmes d'exploitation”</div>
        </div>`
      });
      return slidesArray;
    }

    const slides = buildFullSlides();
    totalSlides = slides.length;

    // Fonction pour afficher le slide courant
    function renderSlide() {
      const slide = slides[currentSlideIndex];
      let contentHtml = '';
      if (slide.type === 'title') {
        contentHtml = slide.html;
      } else if (slide.type === 'objectives') {
        contentHtml = slide.html;
      } else {
        contentHtml = slide.html;
      }
      $('#slideContent').fadeOut(150, function() {
        $(this).html(contentHtml);
        // Réappliquer les styles mathjax si nécessaire
        if (window.MathJax) {
          MathJax.typesetPromise ? MathJax.typesetPromise() : MathJax.typeset();
        }
        $(this).fadeIn(200);
      });
      // Mettre à jour compteur
      $('#slideCounter').text(`Slide ${currentSlideIndex+1} / ${totalSlides}`);
      // gestion désactivation boutons
      $('#prevSlide').prop('disabled', currentSlideIndex === 0).css('opacity', currentSlideIndex === 0 ? 0.5 : 1);
      $('#nextSlide').prop('disabled', currentSlideIndex === totalSlides-1).css('opacity', currentSlideIndex === totalSlides-1 ? 0.5 : 1);
    }

    // Navigation
    function nextSlide() {
      if (currentSlideIndex < totalSlides - 1) {
        currentSlideIndex++;
        renderSlide();
      }
    }
    function prevSlide() {
      if (currentSlideIndex > 0) {
        currentSlideIndex--;
        renderSlide();
      }
    }

    // Événements jQuery et gestions clavier
    $(document).ready(function() {
      renderSlide();
      $('#nextSlide').on('click', nextSlide);
      $('#prevSlide').on('click', prevSlide);
      $(document).keydown(function(e) {
        if (e.key === 'ArrowRight') nextSlide();
        else if (e.key === 'ArrowLeft') prevSlide();
      });
      
      // Révélation réponse exercice (élément dynamique après render, utilisation délégation)
      $(document).on('click', '#revealAnswer', function() {
        $('#answerHint').toggleClass('hidden');
      });
      
      // Ajout d'un petit effet tactile pour les boutons
      $('.nav-btn').on('touchstart', function() {
        $(this).addClass('scale-95');
      }).on('touchend', function() {
        $(this).removeClass('scale-95');
      });
    });
  </script>
</body>
</html>
