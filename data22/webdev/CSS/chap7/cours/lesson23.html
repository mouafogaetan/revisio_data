<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 23 : Intégration de maquette - CSS | Cours Développement Web</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (optionnel, mais inclus pour formules mathématiques si besoin) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <!-- Police moderne et confortable -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        body { background: #f8fafc; }
        /* Style personnalisé pour les slides */
        .slide {
            display: none;
            animation: fadeSlide 0.3s ease-out;
        }
        .slide.active-slide {
            display: block;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Amélioration du contraste des ombres et boutons */
        .nav-btn {
            transition: all 0.2s ease;
        }
        .nav-btn:hover:not(:disabled) {
            transform: scale(1.02);
            background-color: #1e293b;
        }
        /* Pour les petits écrans : padding adapté */
        @media (max-width: 640px) {
            .card-slide {
                padding: 1.25rem;
            }
            h1 { font-size: 1.8rem; }
        }
        /* custom scroll bar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 10px;
        }
        /* Pour les exemples de code */
        pre {
            background: #0f172a;
            color: #e2e8f0;
            padding: 1rem;
            border-radius: 0.75rem;
            overflow-x: auto;
            font-size: 0.85rem;
            margin: 1rem 0;
        }
        code {
            font-family: 'Fira Code', monospace;
        }
        .badge {
            @apply inline-block bg-indigo-100 text-indigo-800 text-xs font-semibold px-2 py-1 rounded-full;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-gray-100">

    <div class="max-w-5xl mx-auto px-4 py-6 md:py-10">
        <!-- EN-TÊTE FIXE avec progression (affichage slide courant) -->
        <div class="flex justify-between items-center mb-6 flex-wrap gap-3 bg-white/60 backdrop-blur-sm p-3 rounded-2xl shadow-sm border border-gray-200 sticky top-2 z-10">
            <div class="flex items-center gap-2">
                <span class="bg-indigo-600 text-white text-xs font-bold px-3 py-1 rounded-full">Leçon 23/23</span>
                <span class="text-sm font-medium text-gray-600">🎨 Intégration maquette complète</span>
            </div>
            <div class="flex gap-2 text-sm bg-gray-100 px-3 py-1.5 rounded-full">
                <span id="currentSlideIdx" class="font-bold text-indigo-700">1</span>
                <span class="text-gray-500">/</span>
                <span id="totalSlidesCount" class="text-gray-600">0</span>
            </div>
        </div>

        <!-- CONTENEUR DES SLIDES -->
        <div id="slidesContainer" class="mt-2"></div>

        <!-- BOUTONS DE NAVIGATION -->
        <div class="flex justify-between items-center mt-8 gap-3">
            <button id="prevBtn" class="nav-btn bg-white border border-gray-300 hover:bg-gray-100 text-gray-800 font-semibold py-2.5 px-5 rounded-xl shadow-sm transition disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2">
                ← Précédent
            </button>
            <div class="flex gap-2">
                <button id="gotoStart" class="text-xs bg-gray-200 hover:bg-gray-300 px-3 py-1.5 rounded-full">Début</button>
                <button id="gotoEnd" class="text-xs bg-gray-200 hover:bg-gray-300 px-3 py-1.5 rounded-full">Fin</button>
            </div>
            <button id="nextBtn" class="nav-btn bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-5 rounded-xl shadow-md transition flex items-center gap-2">
                Suivant →
            </button>
        </div>

        <!-- Pied de page / info responsive -->
        <div class="text-center text-xs text-gray-400 mt-8 border-t pt-5">
            📱 Cours CSS responsive - Maîtrisez l'intégration d'une maquette avec Flexbox, Grid & techniques modernes
        </div>
    </div>

    <script>
        $(document).ready(function() {
            // ---------- STRUCTURE DES SLIDES (lesson23 : intégration maquette complète) ----------
            // Titre slide 1, Slide 2 objectifs, puis contenu détaillé adapté à la leçon23
            const slidesData = [
                {
                    type: "title",
                    title: "📄 Leçon 23 : Intégration d'une maquette complète",
                    subtitle: "HTML / CSS / Flexbox & Grid — Réaliser un site vitrine professionnel",
                    badge: "Projet final",
                    description: "Mettez en pratique toutes vos compétences CSS pour intégrer une maquette réactive : page d'accueil, à propos, galerie, contact."
                },
                {
                    type: "objectives",
                    title: "🎯 Objectifs pédagogiques",
                    objectives: [
                        "Intégrer et styliser une maquette de site web (accueil, à propos, galerie, contact)",
                        "Utiliser efficacement Flexbox et Grid pour la mise en page complexe",
                        "Rendre le site entièrement responsive et tester sur différentes tailles d'écran",
                        "Appliquer les bonnes pratiques (mobile-first, organisation CSS, variables)"
                    ]
                },
                {
                    type: "content",
                    title: "📐 Phase 1 : Analyser la maquette & structure HTML",
                    content: `
                        <p class="mb-3">Avant d'écrire le CSS, il faut découper la maquette en blocs logiques. Une intégration professionnelle suit ces étapes :</p>
                        <ul class="list-disc pl-6 space-y-2 mb-4">
                            <li><strong>Header</strong> : navigation (logo + menu responsive)</li>
                            <li><strong>Hero section</strong> : bannière avec titre, CTA</li>
                            <li><strong>Section "À propos"</strong> : texte et image/valeurs</li>
                            <li><strong>Galerie / projets</strong> : grille d'images (CSS Grid)</li>
                            <li><strong>Formulaire de contact</strong> : inputs, bouton</li>
                            <li><strong>Footer</strong> : liens, copyright</li>
                        </ul>
                        <div class="bg-indigo-50 border-l-4 border-indigo-500 p-4 rounded-md">
                            💡 <span class="font-semibold">Bon à savoir :</span> Toujours partir du HTML sémantique (header, main, section, footer) pour une meilleure accessibilité.
                        </div>
                    `
                },
                {
                    type: "content",
                    title: "🎨 Phase 2 : Mise en page avec Flexbox (Header & Hero)",
                    content: `
                        <p>Flexbox est parfait pour les alignements linéaires : barre de navigation, alignement vertical des éléments dans la bannière.</p>
                        <pre><code>/* Exemple de navbar responsive */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
}
.nav-links {
    display: flex;
    gap: 1.5rem;
}
@media (max-width: 768px) {
    .navbar { flex-direction: column; }
}</code></pre>
                        <p class="mt-2">Pour la hero section, on utilise souvent <code>display: flex</code> avec <code>align-items: center</code> et <code>justify-content: center</code>.</p>
                        <div class="mt-3 p-3 bg-white rounded-xl shadow-sm border">
                            <span class="font-medium">🎯 Exercice rapide :</span> Créez une barre de navigation avec logo à gauche et liens centrés sur mobile.
                        </div>
                    `
                },
                {
                    type: "content",
                    title: "🏗️ Phase 3 : Mise en page complexe avec Grid (Galerie & cartes)",
                    content: `
                        <p>CSS Grid est idéal pour créer des grilles d'articles, galerie photo ou les sections multi-colonnes.</p>
                        <pre><code>.galerie {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 1.5rem;
}
.projet-card {
    background: white;
    border-radius: 1rem;
    overflow: hidden;
    transition: transform 0.2s;
}
.projet-card:hover { transform: translateY(-5px); }</code></pre>
                        <p>✅ <strong>Avantage :</strong> <code>auto-fit</code> et <code>minmax</code> garantissent un design responsive sans médias queries supplémentaires.</p>
                        <div class="bg-gray-100 p-3 rounded-lg mt-2 text-sm">🧩 <strong>Exemple concret :</strong> Une grille de projets qui passe de 1 colonne sur mobile à 3 colonnes sur desktop automatiquement.</div>
                    `
                },
                {
                    type: "content",
                    title: "📱 Phase 4 : Rendre le site responsive (Media Queries & Mobile-First)",
                    content: `
                        <p>Adopter l’approche <span class="font-bold text-indigo-700">mobile-first</span> : styles de base pour petits écrans, puis on enrichit avec <code>@media (min-width: ...)</code>.</p>
                        <pre><code>/* Styles par défaut (mobile) */
.container { padding: 1rem; }
.hero h1 { font-size: 1.8rem; }

/* Tablette */
@media (min-width: 768px) {
    .container { max-width: 720px; margin: auto; }
    .hero h1 { font-size: 2.5rem; }
}
/* Desktop */
@media (min-width: 1024px) {
    .container { max-width: 1024px; }
    .grid-layout { grid-template-columns: repeat(3, 1fr); }
}</code></pre>
                        <p class="mt-2">📌 Tester sur différentes tailles grâce aux outils développeur (mode responsive).</p>
                    `
                },
                {
                    type: "content",
                    title: "🎨 Phase 5 : Styliser la page contact et les composants",
                    content: `
                        <p>Formulaire de contact élégant avec validation CSS / ombres douces : </p>
                        <pre><code>.contact-form {
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
    max-width: 600px;
    margin: 0 auto;
}
input, textarea {
    padding: 0.75rem;
    border: 1px solid #cbd5e1;
    border-radius: 0.75rem;
    transition: 0.2s;
}
input:focus, textarea:focus {
    border-color: #4f46e5;
    outline: none;
    box-shadow: 0 0 0 3px rgba(79,70,229,0.2);
}
button[type="submit"] {
    background: #4f46e5;
    color: white;
    font-weight: bold;
    padding: 0.8rem;
    border-radius: 2rem;
}</code></pre>
                        <div class="flex flex-wrap gap-3 mt-3 justify-center">
                            <div class="bg-green-50 px-4 py-2 rounded-full text-xs">✅ Accessibilité</div>
                            <div class="bg-blue-50 px-4 py-2 rounded-full text-xs">🎯 Validation native</div>
                        </div>
                    `
                },
                {
                    type: "content",
                    title: "🧩 Phase 6 : Assemblage final – Projet complet",
                    content: `
                        <p>Maintenant nous assemblons toutes les briques : header, hero, section à propos, grille projets, formulaire, footer. <br> 
                        <span class="font-semibold">Tips pro :</span> Utilisez des <strong>variables CSS</strong> (couleurs, espacements) et une architecture BEM pour maintenir le code.</p>
                        <pre><code>:root {
    --primary: #4f46e5;
    --gray-light: #f1f5f9;
    --spacing: 1rem;
}
.btn-primary { background: var(--primary); }</code></pre>
                        <p>🚀 <strong>Défi final :</strong> intégrez une maquette complète (4 sections) sur votre machine, validez le responsive.</p>
                        <div class="mt-3 flex gap-2 flex-wrap">
                            <span class="badge">🎯 Compétence : intégration pixel perfect</span>
                            <span class="badge">📱 Test responsive obligatoire</span>
                        </div>
                    `
                },
                {
                    type: "content",
                    title: "🔍 Exemple visuel d'une grille (schéma simplifié)",
                    content: `
                        <p>Voici un aperçu d’une disposition possible pour la galerie d’un portfolio :</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-4 bg-white p-4 rounded-2xl shadow-md">
                            <div class="bg-indigo-100 h-28 rounded-lg flex items-center justify-center font-medium shadow-inner">📸 Projet 1</div>
                            <div class="bg-indigo-100 h-28 rounded-lg flex items-center justify-center font-medium">🎨 Projet 2</div>
                            <div class="bg-indigo-100 h-28 rounded-lg flex items-center justify-center font-medium">🖌️ Projet 3</div>
                            <div class="bg-indigo-100 h-28 rounded-lg flex items-center justify-center font-medium">📱 Projet 4</div>
                        </div>
                        <p class="text-sm text-gray-500 mt-3">↑ Exemple de grille responsive avec 2 colonnes sur tablette et 1 sur mobile (Tailwind pour la démo). À reproduire en CSS pur.</p>
                        <div class="bg-amber-50 p-3 rounded-lg mt-3 text-amber-800 text-sm">
                            💪 Conseil : Pour les images, pensez à <code>max-width:100%; height:auto;</code> pour l'adaptabilité.
                        </div>
                    `
                },
                {
                    type: "conclusion",
                    title: "🏁 Récapitulatif & Travaux pratiques",
                    summary: [
                        "✔️ Maîtriser l'intégration d'une maquette de A à Z",
                        "✔️ Combiner Flexbox (navigation, centrage) et Grid (galerie, mise en page globale)",
                        "✔️ Rendre totalement responsive avec media queries et unités relatives",
                        "✔️ Tester sur mobile & desktop pour valider l'expérience utilisateur",
                        "🎓 Exercice : Intégrez la maquette fournie en suivant les bonnes pratiques et déposez votre code."
                    ],
                    cta: "🚀 À vous de jouer! Utilisez les outils vus pour réaliser un mini-site complet."
                }
            ];
            
            let currentSlide = 0;
            let totalSlides = slidesData.length;

            // Fonction pour générer le HTML des slides
            function renderSlides() {
                let html = '';
                for (let i = 0; i < slidesData.length; i++) {
                    const s = slidesData[i];
                    let slideInner = '';
                    if (s.type === 'title') {
                        slideInner = `
                            <div class="text-center">
                                <div class="inline-block bg-gradient-to-r from-indigo-500 to-purple-600 text-white text-xs font-bold px-3 py-1 rounded-full mb-4">${s.badge || 'Projet pratique'}</div>
                                <h1 class="text-3xl md:text-5xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-indigo-800 to-purple-700">${s.title}</h1>
                                <p class="text-xl text-gray-600 mt-4 max-w-2xl mx-auto">${s.subtitle}</p>
                                <div class="mt-6 p-4 bg-white/60 rounded-2xl inline-block shadow-sm">${s.description}</div>
                                <div class="mt-8 flex justify-center">
                                    <div class="animate-bounce text-indigo-400 text-2xl">👇</div>
                                </div>
                            </div>
                        `;
                    } 
                    else if (s.type === 'objectives') {
                        let listItems = '';
                        s.objectives.forEach(obj => { listItems += `<li class="mb-3 flex items-start gap-3"><span class="text-indigo-600 text-xl">✓</span> <span>${obj}</span></li>`; });
                        slideInner = `
                            <div>
                                <h2 class="text-2xl md:text-3xl font-bold text-indigo-800 border-l-8 border-indigo-500 pl-4 mb-6">${s.title}</h2>
                                <ul class="bg-white p-6 rounded-2xl shadow-md space-y-2 text-gray-800 text-lg">
                                    ${listItems}
                                </ul>
                            </div>
                        `;
                    }
                    else if (s.type === 'content') {
                        slideInner = `
                            <div>
                                <h2 class="text-2xl font-bold text-slate-800 flex items-center gap-2 mb-5"><span class="w-1 h-7 bg-indigo-500 rounded-full"></span> ${s.title}</h2>
                                <div class="prose prose-slate max-w-none text-gray-700 leading-relaxed">
                                    ${s.content}
                                </div>
                            </div>
                        `;
                    }
                    else if (s.type === 'conclusion') {
                        let summaryItems = '';
                        s.summary.forEach(item => { summaryItems += `<li class="mb-2 flex gap-2"><span class="text-green-600">✅</span> ${item}</li>`; });
                        slideInner = `
                            <div>
                                <h2 class="text-2xl md:text-3xl font-bold text-indigo-800 mb-4">${s.title}</h2>
                                <div class="bg-gradient-to-r from-indigo-50 to-white p-6 rounded-2xl shadow">
                                    <ul class="mb-6 space-y-2">
                                        ${summaryItems}
                                    </ul>
                                    <div class="bg-indigo-100 rounded-xl p-4 text-center font-semibold text-indigo-800">
                                        ${s.cta}
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                    
                    html += `<div class="slide card-slide bg-white rounded-2xl shadow-xl p-5 md:p-8 transition-all" data-slide-index="${i}">${slideInner}</div>`;
                }
                $('#slidesContainer').html(html);
                $('#totalSlidesCount').text(totalSlides);
                updateSlideVisibility();
            }
            
            function updateSlideVisibility() {
                $('.slide').removeClass('active-slide');
                $(`.slide[data-slide-index="${currentSlide}"]`).addClass('active-slide');
                $('#currentSlideIdx').text(currentSlide + 1);
                // gestion désactivation boutons
                $('#prevBtn').prop('disabled', currentSlide === 0);
                $('#nextBtn').prop('disabled', currentSlide === totalSlides - 1);
            }
            
            function nextSlide() {
                if (currentSlide < totalSlides - 1) {
                    currentSlide++;
                    updateSlideVisibility();
                    window.scrollTo({ top: 80, behavior: 'smooth' });
                }
            }
            function prevSlide() {
                if (currentSlide > 0) {
                    currentSlide--;
                    updateSlideVisibility();
                    window.scrollTo({ top: 80, behavior: 'smooth' });
                }
            }
            function goToStart() { currentSlide = 0; updateSlideVisibility(); window.scrollTo({ top: 80, behavior: 'smooth' }); }
            function goToEnd() { currentSlide = totalSlides - 1; updateSlideVisibility(); window.scrollTo({ top: 80, behavior: 'smooth' }); }
            
            // Event listeners
            $('#nextBtn').on('click', nextSlide);
            $('#prevBtn').on('click', prevSlide);
            $('#gotoStart').on('click', goToStart);
            $('#gotoEnd').on('click', goToEnd);
            
            // Gestion clavier (flèches)
            $(document).on('keydown', function(e) {
                if (e.key === 'ArrowRight') nextSlide();
                if (e.key === 'ArrowLeft') prevSlide();
            });
            
            // Initialisation
            renderSlides();
            
            // Petit confort pour le responsive : si on clique sur les cartes pour mise en valeur légère
            $('body').on('click', 'pre', function() {
                // sélection du texte (optionnel)
                let range = document.createRange();
                range.selectNodeContents(this);
                window.getSelection()?.removeAllRanges();
                window.getSelection()?.addRange(range);
            });
        });
    </script>
</body>
</html>
