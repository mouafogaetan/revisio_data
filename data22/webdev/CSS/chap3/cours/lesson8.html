<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cours CSS - Leçon 8 : Styliser les textes | Développement Web</title>
    <!-- Tailwind CSS via CDN + base layer for custom overrides -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (optionnel, présent pour formules mathématiques si besoin, mais peu utilisé dans le style texte) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* Smooth transition pour slides et petits réglages accessibilité */
        body {
            background: #f8fafc;
        }
        .slide-container {
            transition: all 0.3s ease;
        }
        .slide {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }
        .nav-btn {
            transition: background 0.2s, transform 0.1s;
        }
        .nav-btn:active {
            transform: scale(0.96);
        }
        /* pour la mise en avant des exemples */
        .code-block {
            background-color: #1e293b;
            color: #e2e8f0;
            border-radius: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .demo-box {
            background: #f1f5f9;
            border-left: 5px solid #3b82f6;
            padding: 1rem;
            border-radius: 0.75rem;
        }
        /* personnalisation pour petits écrans */
        @media (max-width: 640px) {
            .slide {
                border-radius: 1rem;
            }
            .code-block {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body class="font-sans antialiased bg-gradient-to-br from-sky-50 to-indigo-50">

    <div class="max-w-4xl mx-auto px-4 py-6 md:py-10">
        <!-- En-tête fixe avec progression -->
        <div class="flex justify-between items-center mb-5 bg-white/70 backdrop-blur-sm rounded-full px-5 py-2 shadow-sm sticky top-2 z-10">
            <div class="text-sm font-semibold text-indigo-700">📘 CSS · Initiation</div>
            <div class="text-sm text-gray-600" id="slideCounter">Slide <span id="currentSlideNum">1</span> / <span id="totalSlides">0</span></div>
        </div>

        <!-- Zone principale des slides -->
        <div id="slidesWrapper" class="relative">
            <!-- Slides injectés dynamiquement avec jQuery, mais on construit en HTML statique pour clarté, puis on gère la navigation -->
            <div id="slidesContainer" class="slide-container"></div>

            <!-- Navigation buttons -->
            <div class="flex justify-between items-center mt-8 gap-4">
                <button id="prevBtn" class="nav-btn bg-white border border-gray-300 hover:bg-gray-100 text-gray-800 font-medium py-2.5 px-6 rounded-xl shadow-sm transition disabled:opacity-40 disabled:cursor-not-allowed">⬅ Précédent</button>
                <div class="text-xs text-gray-500 bg-white/50 px-3 py-1 rounded-full">Leçon 8/23 · Initiation CSS</div>
                <button id="nextBtn" class="nav-btn bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-6 rounded-xl shadow-md transition disabled:opacity-40 disabled:cursor-not-allowed">Suivant ➔</button>
            </div>
        </div>

        <!-- pied de page léger -->
        <div class="text-center text-gray-400 text-xs mt-10 border-t border-gray-200 pt-5">
            Cours pour classe Développement Web (Cameroun) · Initiation au CSS · Propriétés typographiques
        </div>
    </div>

    <script>
        // Définition des slides selon les objectifs de la leçon 8: "Maîtriser font-family, font-size...", Google Fonts, etc.
        // Leçon 8 contient 3 objectifs principaux, nous allons découper en plusieurs slides : 
        // Slide1 Titre de la leçon, Slide2 Objectifs d'apprentissage, puis slides de contenu : 
        // Slide3: Polices (font-family, import Google Fonts, @font-face)
        // Slide4: Taille, poids, style (font-size, font-weight, font-style)
        // Slide5: Alignement et décorations texte (text-align, text-decoration, text-transform, line-height, letter-spacing)
        // Slide6: Import de polices personnalisées et bonnes pratiques.
        // Soit total 6 slides (titre + objectifs + 4 contenu)
        
        const slidesData = [
            { // slide 0 : Titre
                type: "title",
                title: "🎨 Leçon 8 : Maîtriser le style des textes en CSS",
                subtitle: "font-family, google fonts, alignement, espacements & décorations",
                icon: "✍️"
            },
            { // slide 1 : Objectifs pédagogiques (reprenant les objectifs de lesson8)
                type: "objectives",
                objectives: [
                    "Maîtriser font-family, font-size, font-weight, font-style.",
                    "Utiliser text-align, text-decoration, text-transform, line-height, letter-spacing.",
                    "Importer des polices Google Fonts ou des polices personnalisées (@font-face)."
                ]
            },
            { // slide 2 : Les polices (font-family) et premières notions
                type: "content",
                title: "📌 1. Choisir une police : font-family",
                content: `
                    <p class="mb-3">La propriété <code class="bg-gray-200 px-1 rounded">font-family</code> définit la police de caractères. On donne plusieurs polices de secours (fallback) séparées par des virgules.</p>
                    <div class="code-block p-3 my-3"><code>body {<br>  font-family: "Helvetica Neue", Arial, sans-serif;<br>}</code></div>
                    <p class="text-sm">✅ <strong>Familles génériques :</strong> serif, sans-serif, monospace, cursive, fantasy.</p>
                    <div class="demo-box mt-3">
                        <p class="font-serif text-lg mb-1">Texte en serif (Times New Roman style)</p>
                        <p class="font-sans text-lg mb-1">Texte en sans-serif (Arial/Helvetica style)</p>
                        <p class="font-mono text-lg">Texte monospace (Code style)</p>
                    </div>
                `
            },
            { // slide 3 : Taille, poids et style (font-size, font-weight, font-style)
                type: "content",
                title: "📏 2. Taille, graisse et style",
                content: `
                    <ul class="list-disc pl-5 space-y-2 mb-3">
                        <li><strong>font-size</strong> : taille du texte (px, em, rem, %...). <span class="text-indigo-700">Ex: 1rem = 16px par défaut.</span></li>
                        <li><strong>font-weight</strong> : normal, bold, 100 à 900.</li>
                        <li><strong>font-style</strong> : normal, italic, oblique.</li>
                    </ul>
                    <div class="code-block p-3 my-2"><code>h1 { font-size: 2.5rem; font-weight: 700; font-style: normal; }<br>
                    .citation { font-style: italic; font-weight: 500; }</code></div>
                    <div class="demo-box flex flex-col gap-2">
                        <span class="text-xs">Texte extra small (0.75rem)</span>
                        <span class="text-base font-normal">Normal (1rem / 16px) poids normal</span>
                        <span class="text-lg font-bold">Gras & taille large (1.125rem)</span>
                        <span class="text-xl font-light italic">Léger + italique (très stylé)</span>
                    </div>
                `
            },
            { // slide 4 : Alignement, décoration, transformation, interlignage, espacement des lettres
                type: "content",
                title: "✨ 3. Alignement, décoration et espacements",
                content: `
                    <p><strong>text-align</strong> : left, right, center, justify.</p>
                    <p><strong>text-decoration</strong> : underline, overline, line-through, none.</p>
                    <p><strong>text-transform</strong> : uppercase, lowercase, capitalize.</p>
                    <p><strong>line-height</strong> : interligne (conseillé 1.5 pour lisibilité).</p>
                    <p><strong>letter-spacing</strong> : espacement entre lettres (kerning).</p>
                    <div class="code-block p-3 my-3"><code>p { text-align: justify; line-height: 1.6; letter-spacing: 0.5px; }<br>
                    .titre-special { text-transform: uppercase; text-decoration: underline wavy #f97316; }</code></div>
                    <div class="demo-box mt-2 space-y-2">
                        <p class="text-center bg-slate-100 p-1 rounded">Texte centré</p>
                        <p class="text-right text-sm">Texte aligné à droite</p>
                        <p class="underline decoration-sky-500">Souligné personnalisé</p>
                        <p class="tracking-wider uppercase text-xs font-semibold">Espacement large & majuscules</p>
                        <p class="leading-loose">Un interligne très aéré (line-height: 2) pour un confort de lecture sur mobile.</p>
                    </div>
                `
            },
            { // slide 5 : Google Fonts & polices personnalisées @font-face (import)
                type: "content",
                title: "🌐 4. Importer des polices (Google Fonts / @font-face)",
                content: `
                    <p class="mb-2">Pour enrichir le design, on utilise <strong>Google Fonts</strong> (gratuit) ou sa propre police via <code>@font-face</code>.</p>
                    <div class="code-block p-3 text-sm"><code>/* Dans le HTML ou CSS */<br>
                    @import url('https://fonts.googleapis.com/css2?family=Inter&family=Roboto+Slab:wght@400;700&amp;display=swap');<br>
                    body { font-family: 'Inter', sans-serif; }<br>
                    h1 { font-family: 'Roboto Slab', serif; }<br>
                    /* police personnalisée */<br>
                    @font-face {<br>
                      font-family: 'MaPolice';<br>
                      src: url('police.woff2') format('woff2');<br>
                    }<br></code></div>
                    <div class="mt-3 p-3 bg-gradient-to-r from-indigo-50 to-purple-50 rounded-xl border border-indigo-200">
                        <p class="font-['Poppins'] text-indigo-800" style="font-family: 'Poppins', sans-serif;">✨ Exemple avec Google Font (Poppins) : Ce texte utilise une police moderne importée.</p>
                        <p class="font-['Roboto_Slab'] text-gray-700 mt-1" style="font-family: 'Roboto Slab', serif;">📖 Et voici Roboto Slab, une police avec empattement, parfaite pour les titres.</p>
                        <p class="text-xs text-gray-500 mt-2">💡 Astuce : Toujours prévoir des polices de secours (system fonts) pour améliorer la performance.</p>
                    </div>
                `
            }
        ];

        let currentIndex = 0;
        let totalSlides = slidesData.length;

        // Fonction pour générer le HTML d'un slide
        function renderSlide(slide, idx) {
            if (slide.type === 'title') {
                return `
                    <div class="slide p-6 md:p-10 text-center bg-white" data-index="${idx}">
                        <div class="text-6xl mb-5">${slide.icon || '🎓'}</div>
                        <h1 class="text-3xl md:text-4xl font-extrabold bg-gradient-to-r from-indigo-700 to-purple-700 bg-clip-text text-transparent">${slide.title}</h1>
                        <p class="text-gray-600 text-lg mt-4 max-w-md mx-auto">${slide.subtitle}</p>
                        <div class="mt-8 flex justify-center">
                            <div class="h-1 w-16 bg-indigo-400 rounded-full"></div>
                        </div>
                        <p class="text-sm text-gray-400 mt-8">Classe: Développement Web — Initiation CSS</p>
                    </div>
                `;
            } 
            else if (slide.type === 'objectives') {
                return `
                    <div class="slide p-6 md:p-8" data-index="${idx}">
                        <div class="flex items-center gap-3 mb-4 border-b pb-2 border-indigo-200">
                            <span class="text-3xl">🎯</span>
                            <h2 class="text-2xl font-bold text-gray-800">Objectifs d'apprentissage</h2>
                        </div>
                        <ul class="space-y-3 mt-4">
                            ${slide.objectives.map(obj => `<li class="flex items-start gap-3 bg-blue-50 p-3 rounded-xl"><span class="text-indigo-600 text-xl">✓</span><span class="text-gray-700">${obj}</span></li>`).join('')}
                        </ul>
                        <div class="mt-6 bg-amber-50 p-3 rounded-lg text-amber-800 text-sm">
                            💡 À la fin de cette leçon, vous saurez styliser vos textes comme un designer web !
                        </div>
                    </div>
                `;
            } 
            else if (slide.type === 'content') {
                return `
                    <div class="slide p-6 md:p-8" data-index="${idx}">
                        <h2 class="text-2xl font-bold text-indigo-800 border-l-4 border-indigo-500 pl-3 mb-5">${slide.title}</h2>
                        <div class="prose prose-sm max-w-none text-gray-700">
                            ${slide.content}
                        </div>
                        <div class="mt-6 text-xs text-gray-400 border-t pt-3 italic">Astuce: pratiquez en modifiant les exemples dans votre éditeur de code !</div>
                    </div>
                `;
            }
            return `<div class="slide p-6">Erreur</div>`;
        }

        // Afficher tous les slides dans un container avec gestion de l'affichage (un seul slide visible à la fois)
        function buildSlidesAndShow() {
            const container = $('#slidesContainer');
            container.empty();
            // construire chaque slide mais les mettre en display: flex ou grid ? on utilisera flex avec overflow?
            // pour une navigation simple, on génère chaque slide comme élément avec classe "slide-item" masqué si pas actif.
            slidesData.forEach((slide, i) => {
                const slideHtml = renderSlide(slide, i);
                const $slideDiv = $('<div>').addClass('slide-item w-full transition-all duration-300')
                                            .css({ display: i === currentIndex ? 'block' : 'none' })
                                            .html(slideHtml);
                container.append($slideDiv);
            });
            updateCounterAndButtons();
        }

        function updateCounterAndButtons() {
            $('#currentSlideNum').text(currentIndex + 1);
            $('#totalSlides').text(totalSlides);
            // Gérer l'état des boutons
            $('#prevBtn').prop('disabled', currentIndex === 0);
            $('#nextBtn').prop('disabled', currentIndex === totalSlides - 1);
        }

        function showSlide(index) {
            if (index < 0 || index >= totalSlides) return;
            currentIndex = index;
            const $items = $('.slide-item');
            $items.each(function(i) {
                if (i === currentIndex) {
                    $(this).fadeIn(200).css('display', 'block');
                } else {
                    $(this).fadeOut(100).css('display', 'none');
                }
            });
            updateCounterAndButtons();
            // scroll en haut pour mobile
            $('html, body').animate({ scrollTop: $('#slidesWrapper').offset().top - 20 }, 100);
        }

        // initialisation et événements
        $(document).ready(function() {
            buildSlidesAndShow();

            $('#prevBtn').on('click', function() {
                if (currentIndex > 0) showSlide(currentIndex - 1);
            });
            $('#nextBtn').on('click', function() {
                if (currentIndex < totalSlides - 1) showSlide(currentIndex + 1);
            });

            // support clavier (flèches gauche/droite)
            $(document).on('keydown', function(e) {
                if (e.key === 'ArrowLeft') {
                    if (currentIndex > 0) showSlide(currentIndex - 1);
                    e.preventDefault();
                } else if (e.key === 'ArrowRight') {
                    if (currentIndex < totalSlides - 1) showSlide(currentIndex + 1);
                    e.preventDefault();
                }
            });
            
            // petite amélioration pour les touches tactiles (swipe simple avec jquery mobile ? on évite surcharge)
            // on ajoute un indicateur de slide
        });

        // Ajout de styles supplémentaires pour les démos dynamiques? Mais déjà ok.
        // petite injection pour que Google Fonts démo fonctionne en externe? On peut ajouter un lien pour bien montrer
        // on va ajouter dynamiquement le lien Google Fonts pour l'exemple de la slide 5, mais pour l'affichage on le fait ici
        const linkGoogleFont = document.createElement('link');
        linkGoogleFont.rel = 'stylesheet';
        linkGoogleFont.href = 'https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,700&family=Poppins:wght@400;600&family=Roboto+Slab:wght@400;700&display=swap';
        document.head.appendChild(linkGoogleFont);
        
        // Petit correctif pour que la démonstration de polices personnalisées (via style en ligne) fonctionne correctement.
        // On injecte également des styles supplémentaires pour les démos code & cohérence.
        const extraStyle = document.createElement('style');
        extraStyle.textContent = `
            code {
                background-color: #eef2ff;
                color: #1e3a8a;
                padding: 0.2rem 0.4rem;
                border-radius: 0.5rem;
                font-size: 0.85em;
            }
            .code-block code {
                background: transparent;
                color: #cbd5e1;
            }
            .slide p, .slide li {
                line-height: 1.5;
            }
            .demo-box p {
                margin-bottom: 0.25rem;
            }
            @media (max-width: 480px) {
                .slide {
                    padding: 1.25rem !important;
                }
                .code-block {
                    font-size: 0.7rem;
                }
            }
        `;
        document.head.appendChild(extraStyle);
        
        // Petite image SVG dessinée (pour illustration typographique style "Texte") si besoin? 
        // Le cours n'a pas besoin d'image complexe, mais pour satisfaire la condition "si nécessaire on dessine" -> on ajoute une petite décoration SVG simple dans le slide5?
        // Nous ajoutons un mini schéma d'exemple de mise en forme dans le slide1 ou dans le pied? 
        // L'énoncé demande "si possible tu le dessine toi meme" -> on peut créer un petit motif de texte stylisé dans l'une des slides en bas.
        // Pour montrer une illustration simple mais pertinente (notion de hiérarchie typo) je vais ajouter dans la slide3 ou slide4 un mini SVG "lettre stylisée".
        // Mais pas intrusif, on l'insère dans le slide de contenu de façon légère. Je choisis slide "polices" (slide2 index2) pour ajouter un dessin vectoriel simple montrant différentes tailles.
        // Après construction du DOM, on insère un petit dessin avec SVG fait main sans altérer la compréhension.
        function addHandDrawnSVG() {
            // Attendre que slide2 (index2 contenu) soit chargé, on utilise setInterval mais plus propre : observer?
            // Comme on génère les slides de façon dynamique, on peut injecter après build dans le container .slide-item spécifique.
            // On va tenter d'insérer après un certain délai mais plus fiable: utiliser MutationObserver léger.
            // Mais simple: on ajoute via setTimeout 300ms pour cibler le slide-item actif ou éventuellement on modifie le contenu.
            // Mieux: on ajoute dans le contenu HTML d'un slide existant (ex: slide des polices) un petit svg décoratif.
            // On va plutôt modifier la donnée slidesData[2] (slide font-family) pour ajouter un encart SVG sympa.
            // Mais pour éviter de surcharger, on modifie après coup.
            setTimeout(() => {
                // cibler le slide d'index 2 (polices) pour y mettre un petit dessin texte stylisé.
                const targetSlide = $('.slide-item').eq(2);
                if(targetSlide.length) {
                    const svgGraphic = `
                        <div class="flex justify-center my-4">
                            <svg width="180" height="50" viewBox="0 0 200 50" xmlns="http://www.w3.org/2000/svg">
                                <text x="10" y="25" font-family="Arial, sans-serif" font-size="16" fill="#3b82f6" font-weight="bold">Aa</text>
                                <text x="55" y="35" font-family="Georgia, serif" font-size="20" fill="#ef4444" font-style="italic">Gy</text>
                                <text x="110" y="20" font-family="monospace" font-size="14" fill="#10b981">CSS</text>
                                <circle cx="170" cy="25" r="8" fill="#fbbf24" />
                                <text x="166" y="29" font-size="12" fill="#1f2937" font-weight="bold">!</text>
                            </svg>
                            <p class="text-xs text-center text-gray-500 ml-2">Les polices donnent vie au texte !</p>
                        </div>
                    `;
                    // On insère dans le bloc de contenu avant la démo box
                    const contentDiv = targetSlide.find('.prose');
                    if(contentDiv.length) {
                        contentDiv.append(svgGraphic);
                    }
                }
            }, 250);
        }
        
        // Après chargement et affichage on lance
        $(window).on('load', function() {
            addHandDrawnSVG();
            // Rendre les boutons accessibles et vérifier l'affichage mobile-friendly
        });
    </script>
</body>
</html>
