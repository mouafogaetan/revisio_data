<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 3 : Syntaxe CSS & Sélecteurs de base | Cours CSS</title>
    <!-- Tailwind CSS CDN + base interactions -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (formules mathématiques si besoin, bien que CSS soit moins mathématique, mais prêt) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* petites améliorations personnalisées pour lisibilité + animations slide fluide */
        body {
            background: #f9fafb;
            font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
        }
        .slide-container {
            transition: transform 0.3s ease-out, opacity 0.25s ease;
        }
        .slide {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            transition: all 0.2s;
        }
        .nav-btn {
            transition: all 0.2s;
            user-select: none;
        }
        .nav-btn:active {
            transform: scale(0.96);
        }
        .progress-bar {
            transition: width 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        /* pour les scrolls légers et accessibilité */
        @media (max-width: 640px) {
            .slide {
                border-radius: 1.25rem;
            }
            h1 {
                font-size: 1.7rem;
            }
        }
        /* code style basique */
        pre {
            background: #1e293b;
            color: #e2e8f0;
            border-radius: 1rem;
            padding: 1rem;
            overflow-x: auto;
            font-size: 0.85rem;
        }
        code {
            font-family: 'JetBrains Mono', monospace;
            background: #f1f5f9;
            padding: 0.2rem 0.4rem;
            border-radius: 0.5rem;
            font-size: 0.85rem;
            color: #0f172a;
        }
        pre code {
            background: transparent;
            padding: 0;
            color: inherit;
        }
        .badge-css {
            background: #2965f1;
        }
        .highlight {
            border-left: 4px solid #3b82f6;
            background-color: #f0f9ff;
        }
    </style>
</head>
<body class="antialiased">

    <div class="max-w-4xl mx-auto px-4 sm:px-6 py-6 md:py-10">
        <!-- CONTENEUR PRINCIPAL DES SLIDES -->
        <div class="relative">
            <!-- Indicateur de progression + compteur -->
            <div class="flex justify-between items-center mb-4 text-sm font-medium text-gray-500">
                <div class="flex items-center gap-2">
                    <span class="bg-indigo-100 text-indigo-800 px-3 py-1 rounded-full text-xs font-semibold">📘 CSS - Initiation</span>
                    <span id="slideCounter" class="bg-gray-100 px-3 py-1 rounded-full text-xs">Slide 1 / ?</span>
                </div>
                <div class="w-32 bg-gray-200 rounded-full h-2 overflow-hidden hidden sm:block">
                    <div id="progressFill" class="progress-bar h-full bg-indigo-600 rounded-full w-0"></div>
                </div>
            </div>

            <!-- Zone des slides (carrousel simple) -->
            <div class="overflow-hidden relative">
                <div id="slidesWrapper" class="slide-container flex flex-nowrap transition-transform duration-300 ease-out">
                    <!-- Les slides seront injectées via jQuery -->
                </div>
            </div>

            <!-- Navigation flèches + points -->
            <div class="flex justify-between items-center mt-8 gap-3">
                <button id="prevSlide" class="nav-btn bg-white border border-gray-300 hover:bg-gray-100 text-gray-700 font-medium py-2.5 px-5 rounded-2xl shadow-sm transition flex items-center gap-1 disabled:opacity-40 disabled:cursor-not-allowed">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
                    Précédent
                </button>
                <div class="flex gap-2 flex-wrap justify-center" id="dotsContainer"></div>
                <button id="nextSlide" class="nav-btn bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-5 rounded-2xl shadow-md transition flex items-center gap-1 disabled:opacity-40 disabled:cursor-not-allowed">
                    Suivant
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            // ---------- Données de la leçon 3 : Syntaxe CSS & sélecteurs (type, classe, id + plusieurs classes)
            // Objectifs (slide 2) + contenu détaillé adapté au programme (Lesson3)
            // Slide 1: Titre de la leçon
            // Slide 2: Objectifs pédagogiques (basés sur les objectifs de lesson3)
            // Slide 3: Structure d'une règle CSS (sélecteur, propriété, valeur)
            // Slide 4: Sélecteurs de type (balise), classe (.maClasse) et id (#monId)
            // Slide 5: Appliquer plusieurs classes sur un même élément + exemples pratiques
            // Slide 6: Exercice simple ou récapitulatif interactif (petite démonstration)
            
            const slidesData = [
                { // slide 0 : titre principal
                    type: 'title',
                    title: '🎨 Syntaxe CSS & Sélecteurs de base',
                    subtitle: 'Comprendre la structure CSS • Sélecteurs type, classe, id • Multi-classes',
                    bgClass: 'bg-gradient-to-br from-indigo-50 to-blue-50'
                },
                { // slide 1 : objectifs
                    type: 'objectives',
                    objectives: [
                        "Comprendre la structure d'une règle CSS : sélecteur, propriété, valeur",
                        "Utiliser les sélecteurs de type (balise), de classe (.maClasse) et d'id (#monId)",
                        "Appliquer plusieurs classes sur un même élément HTML",
                        "Prendre conscience de la puissance des sélecteurs pour styliser efficacement"
                    ]
                },
                { // slide 2 : règle CSS
                    type: 'rule',
                    title: '📐 La règle CSS : structure fondamentale',
                    content: 'Une règle CSS se compose d’un sélecteur qui cible un élément HTML, suivi d’un bloc de déclarations entre accolades { }. Chaque déclaration associe une propriété à une valeur.',
                    codeExample: `/* Syntaxe générale */
sélecteur {
    propriété: valeur;
    propriété2: valeur2;
}

/* Exemple concret */
p {
    color: blue;
    font-size: 16px;
}`,
                    note: 'Le point-virgule après chaque déclaration est obligatoire (sauf pour la dernière, mais conseillé partout).'
                },
                { // slide 3 : sélecteurs type, classe, id
                    type: 'selectors',
                    title: '🎯 Trois familles de sélecteurs essentiels',
                    selectors: [
                        { name: 'Sélecteur de type (balise)', syntax: 'p, h1, div, a', desc: 'Cible tous les éléments HTML de ce type.', example: 'p { margin: 0; }' },
                        { name: 'Sélecteur de classe', syntax: '.maclasse', desc: 'Cible les éléments ayant l’attribut class="maclasse". Réutilisable.', example: '.important { font-weight: bold; }' },
                        { name: 'Sélecteur d’id', syntax: '#monId', desc: 'Cible un élément unique avec id="monId". Haute spécificité.', example: '#header { background: #333; }' }
                    ],
                    tip: '💡 Privilégiez les classes pour le style, les ID pour des ancres ou JS.'
                },
                { // slide 4 : appliquer plusieurs classes
                    type: 'multiClasses',
                    title: '✨ Appliquer plusieurs classes sur un même élément',
                    description: 'Un élément HTML peut avoir plusieurs classes séparées par un espace dans l’attribut class. Les styles de toutes les classes s’appliquent (en cascade).',
                    codeExampleHtml: `<div class="carte ombre arrondi">
    Contenu stylisé avec 3 classes
</div>`,
                    codeExampleCss: `.carte { background: white; padding: 1rem; }
.ombre { box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
.arrondi { border-radius: 12px; }`,
                    note: "Très utile pour réutiliser des styles modulaires (ex: .btn, .btn-primaire, .grand)."
                },
                { // slide 5 : démo interactive & bonnes pratiques
                    type: 'interactive',
                    title: '🧪 Petite zone interactive: testez les classes !',
                    description: 'Cliquez sur les boutons ci-dessous pour ajouter/enlever des classes sur la boîte. Observez l’effet combiné.'
                }
            ];

            let currentIndex = 0;
            let totalSlides = slidesData.length;

            // Rendu des slides dans le wrapper
            function buildSlides() {
                let html = '';
                for (let i = 0; i < slidesData.length; i++) {
                    const s = slidesData[i];
                    html += `<div class="slide flex-shrink-0 w-full p-5 md:p-7 transition-all" data-slide-index="${i}" style="width: 100%;">`;
                    
                    if (s.type === 'title') {
                        html += `
                            <div class="text-center py-6 md:py-10 ${s.bgClass || 'bg-white'} rounded-2xl">
                                <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 tracking-tight">${s.title}</h1>
                                <p class="text-gray-600 mt-4 text-lg max-w-md mx-auto">${s.subtitle}</p>
                                <div class="mt-8 flex justify-center gap-2">
                                    <span class="bg-blue-100 text-blue-700 text-sm px-3 py-1 rounded-full">Sélecteurs basiques</span>
                                    <span class="bg-green-100 text-green-700 text-sm px-3 py-1 rounded-full">Multi-classes</span>
                                </div>
                                <div class="mt-10 text-indigo-500 text-sm">⬇️ Utilisez les flèches pour naviguer ⬇️</div>
                            </div>
                        `;
                    } 
                    else if (s.type === 'objectives') {
                        html += `
                            <div class="bg-white rounded-2xl p-5">
                                <h2 class="text-2xl font-bold flex items-center gap-2 text-indigo-800"><span class="text-3xl">🎯</span> Objectifs de la leçon</h2>
                                <ul class="mt-5 space-y-3">
                                    ${s.objectives.map(obj => `<li class="flex items-start gap-3"><span class="text-indigo-500 font-bold text-xl">•</span> <span class="text-gray-700 text-base">${obj}</span></li>`).join('')}
                                </ul>
                                <div class="mt-6 bg-indigo-50 p-4 rounded-xl text-sm text-indigo-800 border border-indigo-100">
                                    💡 À la fin de cette leçon, vous saurez écrire des règles CSS propres et cibler précisément vos éléments.
                                </div>
                            </div>
                        `;
                    }
                    else if (s.type === 'rule') {
                        html += `
                            <div class="bg-white rounded-2xl p-5">
                                <h2 class="text-2xl font-bold text-indigo-800">${s.title}</h2>
                                <p class="text-gray-700 mt-3 leading-relaxed">${s.content}</p>
                                <div class="mt-5">
                                    <pre><code class="language-css">${escapeHtml(s.codeExample)}</code></pre>
                                </div>
                                <div class="mt-4 p-3 bg-yellow-50 border-l-4 border-yellow-400 text-gray-700 text-sm rounded-r-lg">${s.note}</div>
                            </div>
                        `;
                    }
                    else if (s.type === 'selectors') {
                        html += `
                            <div class="bg-white rounded-2xl p-5">
                                <h2 class="text-2xl font-bold text-indigo-800">${s.title}</h2>
                                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-5">
                                    ${s.selectors.map(sel => `
                                        <div class="border border-gray-200 rounded-xl p-4 bg-gray-50">
                                            <div class="font-mono text-indigo-700 font-bold bg-indigo-50 inline-block px-2 py-1 rounded text-sm">${sel.syntax}</div>
                                            <p class="text-sm text-gray-600 mt-2">${sel.desc}</p>
                                            <pre class="mt-3 text-xs bg-gray-800 p-2 rounded"><code>${escapeHtml(sel.example)}</code></pre>
                                        </div>
                                    `).join('')}
                                </div>
                                <div class="mt-5 text-sm bg-blue-50 p-3 rounded-lg">${s.tip}</div>
                            </div>
                        `;
                    }
                    else if (s.type === 'multiClasses') {
                        html += `
                            <div class="bg-white rounded-2xl p-5">
                                <h2 class="text-2xl font-bold text-indigo-800">${s.title}</h2>
                                <p class="text-gray-700 mt-2">${s.description}</p>
                                <div class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div>
                                        <span class="font-semibold text-gray-700">HTML :</span>
                                        <pre class="mt-1"><code class="language-html">${escapeHtml(s.codeExampleHtml)}</code></pre>
                                    </div>
                                    <div>
                                        <span class="font-semibold text-gray-700">CSS :</span>
                                        <pre class="mt-1"><code class="language-css">${escapeHtml(s.codeExampleCss)}</code></pre>
                                    </div>
                                </div>
                                <div class="mt-4 p-3 bg-emerald-50 text-emerald-800 rounded-lg text-sm border border-emerald-200">${s.note}</div>
                                <div class="mt-4 flex flex-wrap gap-2 bg-gray-100 p-3 rounded-xl">
                                    <span class="text-sm">✅ Exemple concret : </span> <code class="bg-white">&lt;button class="btn btn-primary large"&gt;Cliquez&lt;/button&gt;</code> combine 3 styles.
                                </div>
                            </div>
                        `;
                    }
                    else if (s.type === 'interactive') {
                        html += `
                            <div class="bg-white rounded-2xl p-5">
                                <h2 class="text-2xl font-bold text-indigo-800">${s.title}</h2>
                                <p class="text-gray-700">${s.description}</p>
                                <div class="mt-6 border-2 border-dashed border-indigo-200 rounded-xl p-5 bg-gray-50 transition-all" id="demoBox">
                                    <div id="magicBox" class="p-5 rounded-xl transition-all duration-200 bg-white shadow-md text-center">
                                        🧩 Zone démo : <span class="font-bold">Plusieurs classes actives</span>
                                    </div>
                                </div>
                                <div class="flex flex-wrap gap-3 mt-6">
                                    <button data-class="bg-blue-100" data-classname="bg-blue-100" class="demo-btn px-4 py-2 rounded-full text-sm bg-blue-100 text-blue-800 hover:bg-blue-200">➕ Fond bleu clair</button>
                                    <button data-class="border-2 border-indigo-400" data-classname="border-2 border-indigo-400" class="demo-btn px-4 py-2 rounded-full text-sm bg-white border border-gray-300">➕ Bordure indigo</button>
                                    <button data-class="shadow-lg" data-classname="shadow-lg" class="demo-btn px-4 py-2 rounded-full text-sm bg-gray-200">➕ Ombre large</button>
                                    <button data-class="rounded-2xl" data-classname="rounded-2xl" class="demo-btn px-4 py-2 rounded-full text-sm bg-gray-200">➕ Coins très arrondis</button>
                                    <button id="resetClassesBtn" class="px-4 py-2 rounded-full text-sm bg-red-100 text-red-700">⟳ Réinitialiser</button>
                                </div>
                                <p class="text-xs text-gray-500 mt-5">💡 Remarque : l’ordre des classes n’a pas d’importance, la cascade CSS détermine le style final.</p>
                                <div class="mt-4 highlight p-3 rounded-xl">
                                    <strong class="font-mono">📌 Rétention :</strong> Un élément peut avoir plusieurs classes -> <code class="bg-gray-200">class="bouton principal icone"</code>
                                </div>
                            </div>
                        `;
                    }
                    
                    html += `</div>`;
                }
                $('#slidesWrapper').html(html);
                updateDotsAndCounter();
                updateButtonsState();
                attachInteractiveEvents();
            }

            function escapeHtml(str) {
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                    return c;
                });
            }
            
            function updateSlidePosition() {
                const wrapper = $('#slidesWrapper');
                const slideWidth = $('.slide').first().outerWidth();
                const offset = - (currentIndex * slideWidth);
                wrapper.css('transform', `translateX(${offset}px)`);
                // mettre à jour le compteur
                $('#slideCounter').text(`Slide ${currentIndex+1} / ${totalSlides}`);
                const progressPercent = ((currentIndex) / (totalSlides-1)) * 100;
                $('#progressFill').css('width', `${progressPercent}%`);
                updateDotsAndCounter();
                updateButtonsState();
            }
            
            function updateDotsAndCounter() {
                let dotsHtml = '';
                for (let i = 0; i < totalSlides; i++) {
                    const activeClass = (i === currentIndex) ? 'bg-indigo-600 w-6' : 'bg-gray-300 w-2';
                    dotsHtml += `<button class="dot rounded-full h-2 ${activeClass} transition-all mx-1" data-index="${i}"></button>`;
                }
                $('#dotsContainer').html(dotsHtml);
                $('.dot').on('click', function() {
                    const idx = parseInt($(this).data('index'));
                    if (!isNaN(idx)) {
                        currentIndex = idx;
                        updateSlidePosition();
                    }
                });
            }
            
            function updateButtonsState() {
                $('#prevSlide').prop('disabled', currentIndex === 0);
                $('#nextSlide').prop('disabled', currentIndex === totalSlides - 1);
            }
            
            function attachInteractiveEvents() {
                // Réinitialiser la boîte démo (enlever toutes les classes ajoutées)
                const $magicBox = $('#magicBox');
                // stocker les classes par défaut (celles d'origine)
                if (!$magicBox.data('originalClasses')) {
                    $magicBox.data('originalClasses', $magicBox.attr('class') || 'p-5 rounded-xl transition-all duration-200 bg-white shadow-md text-center');
                }
                
                $('.demo-btn').off('click').on('click', function() {
                    const addClass = $(this).data('class');
                    if (addClass && $magicBox) {
                        $magicBox.addClass(addClass);
                    }
                });
                
                $('#resetClassesBtn').off('click').on('click', function() {
                    const original = $magicBox.data('originalClasses');
                    if (original) {
                        $magicBox.attr('class', original);
                    } else {
                        $magicBox.attr('class', 'p-5 rounded-xl transition-all duration-200 bg-white shadow-md text-center');
                    }
                    // réappliquer les styles de base
                    $magicBox.removeClass('bg-blue-100 border-2 border-indigo-400 shadow-lg rounded-2xl');
                });
            }
            
            // navigation events + redimensionnement fenêtre pour ajuster slide
            function initNavigation() {
                $('#prevSlide').on('click', function() {
                    if (currentIndex > 0) {
                        currentIndex--;
                        updateSlidePosition();
                    }
                });
                $('#nextSlide').on('click', function() {
                    if (currentIndex < totalSlides - 1) {
                        currentIndex++;
                        updateSlidePosition();
                    }
                });
                $(window).on('resize', function() {
                    // recalculer la largeur du slide et repositionner
                    const slideWidth = $('.slide').first().outerWidth();
                    const newOffset = - (currentIndex * slideWidth);
                    $('#slidesWrapper').css('transform', `translateX(${newOffset}px)`);
                });
            }
            
            buildSlides();
            initNavigation();
            // fix initial width set
            setTimeout(() => {
                updateSlidePosition();
            }, 50);
        });
    </script>
    <!-- Petit style complémentaire pour lisibilité des blocs de code -->
    <style>
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        @media (max-width: 640px) {
            pre {
                font-size: 0.7rem;
            }
            .slide {
                padding: 1rem !important;
            }
        }
        .dot {
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .dot:hover {
            background-color: #6366f1;
            width: 1.2rem;
        }
        button:disabled {
            opacity: 0.5;
        }
        #magicBox {
            transition: all 0.2s ease;
        }
    </style>
</body>
</html>
