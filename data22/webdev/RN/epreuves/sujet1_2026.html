<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Évaluation React Native – Séquence 1 | Développement Web</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- Chart.js (statistiques si besoin) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.min.js"></script>
    <!-- MathJax -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* transitions et feedback */
        .card-question {
            transition: all 0.2s ease;
        }
        .feedback-correct {
            background-color: #dcfce7;
            border-left: 5px solid #22c55e;
        }
        .feedback-incorrect {
            background-color: #fee2e2;
            border-left: 5px solid #ef4444;
        }
        .quiz-option {
            transition: background 0.2s, border 0.2s;
            cursor: pointer;
        }
        .selected-option {
            background-color: #c7d2fe;
            border: 1px solid #4f46e5;
        }
        .progress-fill {
            transition: width 0.25s ease;
        }
        @media (max-width: 640px) {
            .quiz-option {
                padding: 0.75rem !important;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-gray-100 font-sans antialiased">

<div class="max-w-4xl mx-auto px-4 py-6 md:py-10">
    <!-- EN-TÊTE DE L'ÉPREUVE -->
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 mb-8">
        <div class="bg-gradient-to-r from-indigo-700 to-blue-800 px-6 py-7 text-white">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center">
                <div>
                    <span class="text-sm font-semibold tracking-wide uppercase opacity-80">Évaluation séquentielle</span>
                    <h1 class="text-3xl md:text-4xl font-extrabold mt-1">📱 Séquence 1 : Écosystème & Création d’une app React Native</h1>
                    <p class="text-indigo-100 mt-2">Classe : Développement Web – Initiation à React Native</p>
                </div>
                <div class="mt-3 md:mt-0 bg-white/20 rounded-xl px-5 py-2 text-center backdrop-blur-sm">
                    <div class="text-2xl font-bold" id="total-score">0</div>
                    <div class="text-xs uppercase">points / 100</div>
                </div>
            </div>
            <div class="flex flex-wrap gap-2 mt-5 text-sm">
                <span class="bg-white/20 rounded-full px-3 py-1">⚛️ Bridge & Composants</span>
                <span class="bg-white/20 rounded-full px-3 py-1">📦 Expo vs React Native CLI</span>
                <span class="bg-white/20 rounded-full px-3 py-1">🎨 Style & Layout</span>
                <span class="bg-white/20 rounded-full px-3 py-1">📱 App mobile native</span>
            </div>
        </div>
        <div class="px-6 py-3 bg-gray-50 border-b flex flex-wrap justify-between items-center gap-2 text-sm text-gray-600">
            <div>⏱️ Durée : 1h30</div>
            <div class="flex items-center gap-3">
                <span>Progression :</span>
                <div class="w-40 bg-gray-300 rounded-full h-2">
                    <div id="progress-bar" class="progress-fill bg-indigo-600 h-2 rounded-full" style="width:0%"></div>
                </div>
                <span id="progress-text" class="font-mono">0/8 questions</span>
            </div>
        </div>
    </div>

    <!-- Conteneur des questions (rempli dynamiquement) -->
    <div id="questions-container"></div>

    <!-- Bouton Rendre copie -->
    <div id="submit-area" class="flex justify-center mt-8"></div>

    <!-- Section des résultats (cachée initialement) -->
    <div id="results-container" class="hidden mt-8"></div>
</div>

<script>
    // ===================== DONNÉES DES QUESTIONS (SÉQUENCE 1 : chap1,2,3) =====================
    // Sujet: écosystème, installation, composants View/Text/Image/FlatList, useState, props simples.
    const questions = [
        {
            id: 1,
            type: "qcm",
            text: "Quel est le rôle du 'bridge' dans React Native ?",
            options: [
                "Il permet de compiler l'application en WebAssembly",
                "Il assure la communication entre le code JavaScript et le code natif (iOS/Android)",
                "Il gère uniquement le rendu des images",
                "Il remplace le Metro bundler"
            ],
            correct: 1,
            points: 10,
            explanation: "Le bridge est le mécanisme qui sérialise les messages entre le thread JavaScript et le thread natif, permettant l'exécution de composants natifs."
        },
        {
            id: 2,
            type: "qcm",
            text: "Parmi ces commandes, laquelle crée un nouveau projet React Native avec Expo (approche recommandée pour débuter) ?",
            options: [
                "npx react-native init myApp",
                "expo start myApp",
                "npx create-expo-app myApp",
                "npm install -g expo-cli && expo new myApp"
            ],
            correct: 2,
            points: 10,
            explanation: "La commande officielle pour créer un projet Expo est 'npx create-expo-app mon-app'. React Native CLI nécessite Android Studio/Xcode."
        },
        {
            id: 3,
            type: "qcm",
            text: "Quel composant React Native doit-on utiliser pour afficher une liste longue et performante (avec chargement paresseux) ?",
            options: ["ScrollView", "ListView", "FlatList", "SectionList"],
            correct: 2,
            points: 10,
            explanation: "FlatList est optimisé pour les grandes listes : rendu paresseux, recyclage des éléments. ScrollView charge tout en mémoire."
        },
        {
            id: 4,
            type: "code",
            text: "Écrivez le code JSX pour afficher un texte 'Bienvenue React Native' centré verticalement et horizontalement, avec un style de fond bleu clair (backgroundColor: '#e0f2fe') et du texte en blanc. Utilisez View et Text, ainsi qu'un StyleSheet.create().",
            correctKeywords: ["View", "Text", "style", "flex", "justifyContent", "alignItems", "backgroundColor", "#e0f2fe"],
            points: 15,
            explanation: "Il faut créer un conteneur View avec flex:1, justifyContent:'center', alignItems:'center', backgroundColor, puis un composant Text avec son style."
        },
        {
            id: 5,
            type: "match",
            text: "Associez chaque composant React Native à sa description principale :",
            items: [
                { left: "Image", right: "Affichage de ressources visuelles (locales ou distantes)" },
                { left: "TouchableOpacity", right: "Zone interactive avec retour d'opacité" },
                { left: "SafeAreaView", right: "Gère les zones sécurisées (iPhone X et +)" },
                { left: "TextInput", right: "Permet la saisie de texte" }
            ],
            points: 15,
            explanation: "Image -> affichage d'image; TouchableOpacity -> bouton tactile; SafeAreaView -> encoches; TextInput -> champ formulaire."
        },
        {
            id: 6,
            type: "diagram",
            text: "Ordonnez les étapes pour lancer une application React Native (Expo Go) sur un appareil physique :",
            steps: [
                "Installer Expo Go sur le téléphone",
                "Exécuter 'npx expo start' dans le terminal",
                "Scanner le QR code avec Expo Go",
                "Créer le projet avec 'npx create-expo-app MonApp'"
            ],
            correctOrder: [3, 0, 1, 2],
            points: 15,
            explanation: "Ordre logique : création projet → installer Expo Go → démarrer le serveur → scanner QR code."
        },
        {
            id: 7,
            type: "qcm",
            text: "Quelle est la principale différence entre ScrollView et FlatList en termes de performance ?",
            options: [
                "FlatList ne fonctionne que sur iOS",
                "ScrollView charge tous les enfants immédiatement, FlatList effectue un rendu paresseux",
                "FlatList ne supporte pas le style Flexbox",
                "ScrollView est plus rapide pour 10 000 éléments"
            ],
            correct: 1,
            points: 10,
            explanation: "FlatList implémente le rendu paresseux et le recyclage des cellules, contrairement à ScrollView qui monte tous les composants enfants."
        },
        {
            id: 8,
            type: "case",
            text: "Vous développez une application météo simple. Décrivez (ou écrivez un extrait) comment utiliser useState pour stocker la température actuelle (nombre) et une fonction pour mettre à jour cette température.",
            points: 15,
            explanation: "On utilise : const [temperature, setTemperature] = useState(22); puis setTemperature(nouvelleValeur).",
            sampleSolution: "import React, { useState } from 'react';\nconst [temp, setTemp] = useState(22);"
        }
    ];

    let userAnswers = {};
    let evaluated = false;
    let finalScore = 0;

    // ===================== FONCTIONS =====================
    function saveAnswer(questionId, answerValue) {
        if (evaluated) return;
        userAnswers[questionId] = answerValue;
        updateProgressAndUI();
    }

    function updateProgressAndUI() {
        const answeredCount = Object.keys(userAnswers).filter(qid => userAnswers[qid] !== undefined && userAnswers[qid] !== "").length;
        const percent = (answeredCount / questions.length) * 100;
        $("#progress-bar").css("width", percent + "%");
        $("#progress-text").text(`${answeredCount}/${questions.length} questions`);
        if (!evaluated) recalcLiveScore();
    }

    // Calcul de score provisoire
    function recalcLiveScore() {
        let total = 0;
        questions.forEach(q => {
            const ans = userAnswers[q.id];
            if (!ans) return;
            if (q.type === "qcm") {
                if (parseInt(ans) === q.correct) total += q.points;
            } else if (q.type === "code") {
                if (ans && typeof ans === "string") {
                    const hasAll = q.correctKeywords.every(kw => ans.toLowerCase().includes(kw.toLowerCase()));
                    if (hasAll) total += q.points;
                    else if (ans.length > 5) total += Math.floor(q.points * 0.4);
                }
            } else if (q.type === "match") {
                if (ans && Object.keys(ans).length === q.items.length) {
                    let correctCount = 0;
                    for (let i=0; i<q.items.length; i++) {
                        if (ans[i] === q.items[i].right) correctCount++;
                    }
                    total += (correctCount / q.items.length) * q.points;
                }
            } else if (q.type === "diagram") {
                if (ans && JSON.stringify(ans) === JSON.stringify(q.correctOrder)) total += q.points;
            } else if (q.type === "case") {
                if (ans && ans.length > 15) total += q.points;
            }
        });
        finalScore = Math.round(total);
        $("#total-score").text(finalScore);
    }

    // Évaluation définitive avec feedbacks
    function evaluateExam() {
        if (evaluated) return;
        evaluated = true;
        let totalPoints = 0;
        questions.forEach(q => {
            const ans = userAnswers[q.id];
            let isCorrect = false;
            let earned = 0;
            if (!ans) {
                showFeedback(q.id, false, "Aucune réponse fournie. "+ (q.explanation || "Relisez le cours."));
                return;
            }
            if (q.type === "qcm") {
                isCorrect = (parseInt(ans) === q.correct);
                earned = isCorrect ? q.points : 0;
                showFeedback(q.id, isCorrect, q.explanation);
            } else if (q.type === "code") {
                const hasAll = q.correctKeywords.every(kw => ans.toLowerCase().includes(kw.toLowerCase()));
                isCorrect = hasAll;
                earned = isCorrect ? q.points : (ans.length > 5 ? Math.floor(q.points * 0.4) : 0);
                showFeedback(q.id, isCorrect, q.explanation + (isCorrect ? " ✔ Excellent !" : " ❌ Vérifiez les mots-clés attendus : " + q.correctKeywords.join(", ")));
            } else if (q.type === "match") {
                let correctCount = 0;
                for (let i=0; i<q.items.length; i++) {
                    if (ans[i] === q.items[i].right) correctCount++;
                }
                earned = (correctCount / q.items.length) * q.points;
                isCorrect = (correctCount === q.items.length);
                showFeedback(q.id, isCorrect, `${correctCount}/${q.items.length} bonnes associations. ${q.explanation}`);
            } else if (q.type === "diagram") {
                isCorrect = (JSON.stringify(ans) === JSON.stringify(q.correctOrder));
                earned = isCorrect ? q.points : 0;
                showFeedback(q.id, isCorrect, q.explanation);
            } else if (q.type === "case") {
                if (ans && ans.toLowerCase().includes("usestate") && ans.toLowerCase().includes("temperature")) {
                    isCorrect = true;
                    earned = q.points;
                } else {
                    isCorrect = false;
                    earned = ans && ans.length > 8 ? Math.floor(q.points * 0.5) : 0;
                }
                showFeedback(q.id, isCorrect, q.explanation + " Exemple : const [temperature, setTemperature] = useState(22);");
            }
            totalPoints += earned;
        });
        finalScore = Math.round(totalPoints);
        $("#total-score").text(finalScore);
        const percentScore = (finalScore / 100) * 100;
        let grade = "F";
        if (percentScore >= 90) grade = "A+";
        else if (percentScore >= 80) grade = "A";
        else if (percentScore >= 70) grade = "B";
        else if (percentScore >= 60) grade = "C";
        else if (percentScore >= 50) grade = "D";
        // Afficher résultat global
        $("#submit-area").hide();
        $("#results-container").removeClass("hidden").html(`
            <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
                <div class="bg-gradient-to-r from-green-600 to-emerald-700 px-6 py-6 text-white text-center">
                    <h2 class="text-2xl font-bold">📱 Résultat final - Séquence 1</h2>
                    <p class="text-green-100">React Native : Écosystème & premiers composants</p>
                </div>
                <div class="p-6 text-center">
                    <div class="inline-block bg-indigo-100 rounded-full px-8 py-4 mb-4">
                        <span class="text-5xl font-bold text-indigo-700">${finalScore}</span>
                        <span class="text-xl text-indigo-500">/100</span>
                    </div>
                    <div class="text-2xl font-bold mb-2">Note : ${grade}</div>
                    <div class="w-full max-w-md mx-auto bg-gray-200 rounded-full h-3">
                        <div class="bg-indigo-600 h-3 rounded-full" style="width: ${percentScore}%"></div>
                    </div>
                    <p class="text-gray-600 mt-5">${percentScore >= 70 ? "Félicitations ! Vous maîtrisez les fondamentaux de React Native." : "Revoyez l'installation, les composants View/Text/FlatList et le bridge pour réussir."}</p>
                    <button id="restart-exam" class="mt-6 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-3 rounded-xl shadow transition">⟳ Refaire l'épreuve</button>
                </div>
            </div>
        `);
        $("#restart-exam").on("click", () => location.reload());
    }

    function showFeedback(questionId, isCorrect, message) {
        const $fb = $(`#fb-${questionId}`);
        if ($fb.length) {
            $fb.removeClass("hidden");
            $fb.addClass(isCorrect ? "feedback-correct" : "feedback-incorrect");
            $fb.html(`<span class="font-semibold">${isCorrect ? "✓ " : "✗ "}</span> ${message}`);
        }
    }

    // Génération du formulaire complet avec jQuery
    function renderQuestions() {
        let html = '';
        questions.forEach((q, idx) => {
            html += `<div class="bg-white rounded-2xl shadow-lg mb-6 overflow-hidden" id="q-card-${q.id}">`;
            html += `<div class="bg-gray-50 px-5 py-3 border-b flex justify-between"><span class="font-bold text-indigo-700">Question ${idx+1}</span><span class="text-sm text-gray-500">${q.points} pts</span></div>`;
            html += `<div class="p-5 md:p-6"><p class="font-medium text-gray-800 mb-4">${q.text}</p>`;

            if (q.type === "qcm") {
                html += `<div class="space-y-2">`;
                q.options.forEach((opt, optIdx) => {
                    const selected = (userAnswers[q.id] == optIdx);
                    html += `<div class="quiz-option border rounded-xl p-3 ${selected ? 'selected-option' : 'border-gray-200'}" data-qid="${q.id}" data-val="${optIdx}">
                                <span class="inline-block w-6 h-6 rounded-full border-2 ${selected ? 'border-indigo-600 bg-indigo-100' : 'border-gray-300'} text-center mr-2">${String.fromCharCode(65+optIdx)}</span> ${opt}
                            </div>`;
                });
                html += `</div>`;
            }
            else if (q.type === "code") {
                const saved = userAnswers[q.id] || "";
                html += `<textarea class="w-full h-32 border border-gray-300 rounded-xl p-3 font-mono text-sm" data-qid="${q.id}" placeholder="Écrivez votre code JSX / JavaScript ...">${saved}</textarea>`;
                html += `<p class="text-xs text-gray-500 mt-1">✨ Utilisez StyleSheet.create, View, Text et flex centrage</p>`;
            }
            else if (q.type === "match") {
                html += `<div class="match-container space-y-3" data-qid="${q.id}">`;
                q.items.forEach((item, idxItem) => {
                    const savedMatch = userAnswers[q.id];
                    const selectedVal = savedMatch ? savedMatch[idxItem] : "";
                    html += `<div class="flex flex-col md:flex-row gap-3 bg-gray-50 p-3 rounded-xl">
                                <div class="w-full md:w-1/2 font-bold">${item.left}</div>
                                <div class="w-full md:w-1/2">
                                    <select class="match-select w-full p-2 border rounded-lg" data-qid="${q.id}" data-idx="${idxItem}">
                                        <option value="">-- Associer --</option>
                                        <option value="Affichage de ressources visuelles (locales ou distantes)" ${selectedVal === "Affichage de ressources visuelles (locales ou distantes)" ? "selected" : ""}>Image</option>
                                        <option value="Zone interactive avec retour d'opacité" ${selectedVal === "Zone interactive avec retour d'opacité" ? "selected" : ""}>TouchableOpacity</option>
                                        <option value="Gère les zones sécurisées (iPhone X et +)" ${selectedVal === "Gère les zones sécurisées (iPhone X et +)" ? "selected" : ""}>SafeAreaView</option>
                                        <option value="Permet la saisie de texte" ${selectedVal === "Permet la saisie de texte" ? "selected" : ""}>TextInput</option>
                                    </select>
                                </div>
                            </div>`;
                });
                html += `</div>`;
            }
            else if (q.type === "diagram") {
                const savedOrder = userAnswers[q.id];
                html += `<div class="diagram-sortable" data-qid="${q.id}"><div id="sortable-${q.id}" class="space-y-2">`;
                q.steps.forEach((step, sIdx) => {
                    const displayOrder = savedOrder ? savedOrder.indexOf(sIdx) : sIdx;
                    html += `<div class="bg-indigo-50 p-3 rounded-lg cursor-move border border-indigo-200 flex justify-between" data-original="${sIdx}"><span>📌 ${step}</span><span class="handle text-gray-400">⋮⋮</span></div>`;
                });
                html += `</div><p class="text-xs text-gray-500 mt-2">Glissez pour ordonner les étapes.</p></div>`;
            }
            else if (q.type === "case") {
                const saved = userAnswers[q.id] || "";
                html += `<textarea class="w-full h-28 border rounded-xl p-3 font-mono text-sm" data-qid="${q.id}" placeholder="Écrivez votre logique useState ...">${saved}</textarea>`;
            }

            html += `<div id="fb-${q.id}" class="hidden mt-4 p-3 rounded-lg text-sm"></div>`;
            html += `</div></div>`;
        });
        $("#questions-container").html(html);
        attachEvents();
    }

    function attachEvents() {
        // QCM
        $(".quiz-option").on("click", function() {
            if (evaluated) return;
            const qid = $(this).data("qid");
            const val = $(this).data("val");
            $(`#q-card-${qid} .quiz-option`).removeClass("selected-option");
            $(this).addClass("selected-option");
            saveAnswer(qid, val);
        });
        // Textarea code/case
        $("textarea[data-qid]").on("input", function() {
            if (evaluated) return;
            const qid = $(this).data("qid");
            saveAnswer(qid, $(this).val());
        });
        // Match selects
        $(".match-select").on("change", function() {
            if (evaluated) return;
            const qid = $(this).data("qid");
            const idx = $(this).data("idx");
            let current = userAnswers[qid] || {};
            current[idx] = $(this).val();
            saveAnswer(qid, current);
        });
        // drag & drop pour diagram (jQuery UI)
        $(function() {
            if (typeof $.fn.sortable !== "undefined") {
                $(".diagram-sortable").each(function() {
                    const container = $(this);
                    const qid = container.data("qid");
                    const sortableId = `#sortable-${qid}`;
                    $(sortableId).sortable({
                        update: function() {
                            let newOrder = [];
                            $(sortableId).children().each(function() {
                                newOrder.push(parseInt($(this).data("original")));
                            });
                            saveAnswer(qid, newOrder);
                        },
                        handle: ".handle"
                    });
                });
            } else {
                // fallback message
                $(".diagram-sortable").append("<p class='text-xs text-red-500'>Activer jQuery UI pour le tri.</p>");
            }
        });
    }

    // Chargement de jQuery UI pour le drag & drop
    function loadJQueryUIAndRender() {
        if (typeof $.fn.sortable === "undefined") {
            const script = document.createElement("script");
            script.src = "https://code.jquery.com/ui/1.13.2/jquery-ui.min.js";
            script.onload = () => {
                const link = document.createElement("link");
                link.rel = "stylesheet";
                link.href = "https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css";
                document.head.appendChild(link);
                renderQuestions();
            };
            document.head.appendChild(script);
        } else {
            renderQuestions();
        }
    }

    $(document).ready(() => {
        loadJQueryUIAndRender();
        $("#submit-area").html(`<button id="final-submit" class="bg-indigo-700 hover:bg-indigo-800 text-white font-bold py-3 px-8 rounded-full shadow-lg transition">📱 Rendre copie & évaluation</button>`);
        $("#final-submit").on("click", () => {
            if(evaluated) return;
            evaluateExam();
            $("#final-submit").prop("disabled", true).text("Évaluation terminée");
        });
    });
</script>
</body>
</html>
