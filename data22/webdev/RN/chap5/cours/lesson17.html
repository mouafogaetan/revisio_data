<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Leçon 17 : Personnalisation du Header dans React Native</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (optionnel, mais présent pour formules mathématiques si besoin) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* Styles personnalisés pour l'effet slide et l'adaptabilité */
        body {
            background: #f1f5f9;
            font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
        }
        .slide-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
        }
        .slide-card {
            background: white;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            transition: all 0.2s ease;
            min-height: 70vh;
            display: flex;
            flex-direction: column;
        }
        .slide-content {
            flex: 1;
            padding: 2rem 1.8rem;
        }
        .nav-btn {
            transition: all 0.2s;
            cursor: pointer;
            background: #0f172a;
            color: white;
            border-radius: 9999px;
            padding: 0.6rem 1.4rem;
            font-weight: 500;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .nav-btn:hover {
            background: #1e293b;
            transform: scale(0.97);
        }
        .nav-btn:active {
            transform: scale(0.95);
        }
        .dot-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #cbd5e1;
            transition: all 0.2s;
            cursor: pointer;
        }
        .dot-indicator.active {
            background-color: #0f172a;
            width: 24px;
            border-radius: 12px;
        }
        code {
            background: #1e293b;
            color: #e2e8f0;
            padding: 0.2rem 0.4rem;
            border-radius: 12px;
            font-size: 0.85rem;
            font-family: monospace;
        }
        pre {
            background: #0f172a;
            padding: 1rem;
            border-radius: 1rem;
            overflow-x: auto;
            margin: 1rem 0;
            color: #f1f5f9;
            font-size: 0.85rem;
        }
        .highlight {
            background: #fef9c3;
            color: #1e293b;
            padding: 0.1rem 0.3rem;
            border-radius: 8px;
        }
        @media (max-width: 640px) {
            .slide-content {
                padding: 1.5rem 1rem;
            }
            .nav-btn {
                padding: 0.4rem 1rem;
                font-size: 0.85rem;
            }
            h2 {
                font-size: 1.5rem;
            }
        }
        .list-disc-custom {
            list-style-type: disc;
            padding-left: 1.5rem;
            margin: 0.75rem 0;
        }
        .bg-soft-blue {
            background: #eef2ff;
        }
    </style>
</head>
<body class="antialiased">

<div class="slide-container">
    <div id="slidesWrapper" class="relative">
        <!-- SLIDES seront générés dynamiquement via jQuery -->
    </div>

    <!-- Navigation et indicateurs -->
    <div class="flex justify-between items-center mt-8 gap-3 flex-wrap">
        <button id="prevSlide" class="nav-btn px-5 py-2 text-sm md:text-base">← Précédent</button>
        <div id="dotsContainer" class="flex gap-2 justify-center flex-wrap my-2"></div>
        <button id="nextSlide" class="nav-btn px-5 py-2 text-sm md:text-base">Suivant →</button>
    </div>
</div>

<script>
    // Définition des slides pour la leçon 17: Personnalisation du header
    const slidesData = [
        {
            type: "title",
            title: "Leçon 17 : Personnaliser le header dans React Native",
            subtitle: "Navigation Stack · setOptions · Header personnalisé",
            emoji: "📱🎨"
        },
        {
            type: "objectifs",
            title: "🎯 Objectifs de la leçon",
            objectives: [
                "Personnaliser le header (titre, couleur, boutons) dans React Navigation",
                "Utiliser setOptions pour modifier dynamiquement le header",
                "Cacher le header ou créer un header entièrement personnalisé"
            ]
        },
        {
            type: "content",
            title: "📌 Introduction : Le header dans Stack Navigator",
            content: `<p class="mb-3">Dans React Navigation, le <strong class="highlight">header</strong> est la barre située en haut de chaque écran. Elle contient souvent le titre de l'écran, un bouton retour ou des actions. Par défaut, le header est automatique mais nous pouvons le modifier selon nos besoins.</p>
            <p class="mb-2">✨ <strong>Pourquoi personnaliser ?</strong> Donner une identité visuelle à l'app, ajouter des icônes (menu, recherche, panier) ou adapter le style aux thèmes.</p>
            <div class="bg-soft-blue p-4 rounded-xl mt-3">
                <p class="font-bold">💡 Rappel Stack Navigation :</p>
                <p>Un Stack.Navigator empile les écrans, chaque écran possède son propre header (configurable globalement ou localement).</p>
            </div>`
        },
        {
            type: "content",
            title: "🎨 1. Personnalisation de base : titre et couleurs",
            content: `<p class="mb-2">Dans l'écran, on peut définir des options via la prop <code>options</code> du <code>Stack.Screen</code>.</p>
            <pre><code>// Dans App.js ou votre fichier de navigation
&lt;Stack.Screen 
  name="Accueil" 
  component={HomeScreen} 
  options={{
    title: '🏠 Mon Accueil',
    headerStyle: { backgroundColor: '#0f172a' },
    headerTintColor: '#fff',
    headerTitleStyle: { fontWeight: 'bold', fontSize: 18 },
  }}
/></code></pre>
            <p class="mt-2">✔️ <strong>Explication :</strong> <code>headerStyle</code> → fond de la barre, <code>headerTintColor</code> → couleur des boutons (retour), <code>headerTitleStyle</code> → style du titre.</p>
            <p class="mt-1 text-sm text-gray-600">Résultat : header avec fond sombre, texte blanc et titre personnalisé.</p>`
        },
        {
            type: "content",
            title: "⚙️ 2. setOptions : modifier le header dynamiquement",
            content: `<p class="mb-2">Parfois, le header doit changer selon l'état du composant. On utilise <code>navigation.setOptions()</code> à l'intérieur du composant écran.</p>
            <pre><code>function ProfileScreen({ navigation, route }) {
  const [isFollowed, setIsFollowed] = React.useState(false);

  React.useLayoutEffect(() => {
    navigation.setOptions({
      headerRight: () => (
        &lt;Button 
          title={isFollowed ? "Suivi" : "Suivre"} 
          onPress={() => setIsFollowed(!isFollowed)}
        /&gt;
      ),
      headerStyle: { backgroundColor: isFollowed ? '#22c55e' : '#334155' }
    });
  }, [navigation, isFollowed]);

  return ( ... );
}</code></pre>
            <p>✅ <strong>Utile :</strong> Ajouter un bouton "Suivre", "Modifier", ou changer la couleur selon l'état.</p>`
        },
        {
            type: "content",
            title: "🕹️ 3. Ajouter des boutons dans le header (gauche/droite)",
            content: `<p>Via <code>headerLeft</code> et <code>headerRight</code> on peut insérer des composants React (icônes, texte).</p>
            <pre><code>options={{
  headerRight: () => (
    &lt;TouchableOpacity onPress={() => alert('Recherche')} style={{ marginRight: 15 }}>
      &lt;Text style={{ color: '#3b82f6' }}>🔍 Rechercher&lt;/Text>
    &lt;/TouchableOpacity>
  ),
  headerLeft: () => (
    &lt;TouchableOpacity onPress={() => console.log('menu')} style={{ marginLeft: 15 }}>
      &lt;Text>☰&lt;/Text>
    &lt;/TouchableOpacity>
  )
}}</code></pre>
            <div class="mt-3 p-3 bg-gray-100 rounded-lg">
                ⚠️ Si vous utilisez <code>headerLeft</code>, le bouton retour par défaut disparaît. Pour le conserver, composez avec <code>useNavigation</code> ou utilisez <code>headerBackTitleVisible</code>.
            </div>`
        },
        {
            type: "content",
            title: "🧹 4. Cacher le header & header personnalisé complet",
            content: `<p><strong>🔹 Cacher le header :</strong> <code>options={{ headerShown: false }}</code> sur un écran spécifique.</p>
            <pre><code>&lt;Stack.Screen name="FullScreen" component={FullScreenModal} options={{ headerShown: false }} /></code></pre>
            <p class="mt-2"><strong>🔸 Créer un header entièrement personnalisé :</strong> utiliser <code>header</code> dans les options (fonction qui retourne un composant React).</p>
            <pre><code>options={{
  header: (props) => &lt;CustomHeader title="Mon super header" backButton={props.navigation.goBack} />
}}</code></pre>
            <p class="mt-1">Ainsi vous contrôlez chaque pixel : hauteur, arrière-plan, boutons sur mesure, animations.</p>`
        },
        {
            type: "content",
            title: "📱 5. Exemple complet : header dynamique avec icônes",
            content: `<p>Imaginons un écran "Détails Produit" où le header change selon les favoris :</p>
            <pre><code>function ProductDetail({ navigation, route }) {
  const [isFavorite, setFavorite] = React.useState(false);
  React.useLayoutEffect(() => {
    navigation.setOptions({
      title: route.params.productName,
      headerRight: () => (
        &lt;Button title={isFavorite ? '❤️' : '🤍'} onPress={() => setFavorite(!isFavorite)} />
      ),
      headerStyle: { backgroundColor: isFavorite ? '#ffe4e6' : '#f8fafc' }
    });
  }, [navigation, isFavorite, route.params.productName]);
  return &lt;View>...&lt;/View>;
}</code></pre>
            <p>📌 Résultat : Une expérience utilisateur réactive et moderne.</p>`
        },
        {
            type: "content",
            title: "✅ Résumé & Bonnes pratiques",
            content: `<ul class="list-disc-custom">
                <li><strong>Titre personnalisé :</strong> options.title ou headerTitle</li>
                <li><strong>Couleurs :</strong> headerStyle (fond), headerTintColor (icônes/texte retour)</li>
                <li><strong>Boutons dynamiques :</strong> setOptions + useLayoutEffect / useEffect</li>
                <li><strong>Cacher header :</strong> headerShown: false</li>
                <li><strong>Header sur mesure :</strong> header: () => &lt;VotreComposant /&gt;</li>
                <li>📖 N'oubliez pas d'importer les éléments depuis <code>@react-navigation/native-stack</code></li>
            </ul>
            <div class="mt-4 p-3 border-l-4 border-blue-600 bg-blue-50 rounded">
                💡 <strong>À retenir :</strong> Le header est un outil clé d'ergonomie mobile. Une bonne personnalisation améliore l'expérience utilisateur.
            </div>`
        },
        {
            type: "end",
            title: "🏁 Fin de la leçon",
            message: "Félicitations ! Vous savez maintenant personnaliser les headers dans React Native. Entraînez-vous avec des petits projets 🚀",
            nextAction: "Pratiquez en ajoutant des boutons et des couleurs à votre application"
        }
    ];

    let currentSlide = 0;
    let totalSlides = slidesData.length;

    // Fonction pour afficher le slide actuel
    function renderSlide(index) {
        const data = slidesData[index];
        let html = '';
        
        if (data.type === 'title') {
            html = `
                <div class="slide-card text-center">
                    <div class="slide-content flex flex-col justify-center items-center min-h-[60vh]">
                        <div class="text-6xl mb-4">${data.emoji || '📱'}</div>
                        <h1 class="text-3xl md:text-5xl font-extrabold bg-gradient-to-r from-slate-800 to-slate-600 bg-clip-text text-transparent">${data.title}</h1>
                        <p class="text-xl text-gray-600 mt-4">${data.subtitle || ''}</p>
                        <div class="mt-8 text-sm text-gray-400">React Navigation · Stack · Personnalisation</div>
                    </div>
                </div>
            `;
        }
        else if (data.type === 'objectifs') {
            html = `
                <div class="slide-card">
                    <div class="slide-content">
                        <h2 class="text-2xl md:text-3xl font-bold text-slate-800 border-b-4 border-indigo-400 pb-2 inline-block">${data.title}</h2>
                        <ul class="mt-6 space-y-3">
                            ${data.objectives.map(obj => `<li class="flex items-start gap-3 text-lg"><span class="text-indigo-600 text-xl">✓</span> <span>${obj}</span></li>`).join('')}
                        </ul>
                        <div class="mt-8 p-4 bg-indigo-50 rounded-2xl">
                            <p class="text-indigo-800">🎯 À la fin de cette leçon, vous saurez rendre vos applications React Native plus professionnelles et intuitives.</p>
                        </div>
                    </div>
                </div>
            `;
        }
        else if (data.type === 'content') {
            html = `
                <div class="slide-card">
                    <div class="slide-content">
                        <h2 class="text-2xl md:text-3xl font-bold text-slate-800 mb-4">${data.title}</h2>
                        <div class="prose prose-slate max-w-none text-gray-700 leading-relaxed">
                            ${data.content}
                        </div>
                    </div>
                </div>
            `;
        }
        else if (data.type === 'end') {
            html = `
                <div class="slide-card text-center">
                    <div class="slide-content flex flex-col justify-center items-center min-h-[55vh]">
                        <div class="text-5xl mb-4">🎉</div>
                        <h2 class="text-3xl font-bold text-slate-800">${data.title}</h2>
                        <p class="text-xl text-gray-600 mt-3">${data.message}</p>
                        <p class="mt-6 italic text-gray-500">💪 ${data.nextAction || ''}</p>
                        <div class="mt-6 text-sm bg-slate-100 px-4 py-2 rounded-full">Leçon terminée 👏</div>
                    </div>
                </div>
            `;
        }
        else {
            // fallback générique
            html = `<div class="slide-card"><div class="slide-content">${JSON.stringify(data)}</div></div>`;
        }
        
        $('#slidesWrapper').html(html);
        updateDots(index);
        
        // Re-apply MathJax si besoin (au cas où des formules apparaîtraient, mais dans cette leçon pas nécessaire)
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
        // Scroll to top pour une meilleure ergonomie mobile
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    function updateDots(activeIndex) {
        let dotsHtml = '';
        for (let i = 0; i < totalSlides; i++) {
            const activeClass = i === activeIndex ? 'active' : '';
            dotsHtml += `<div class="dot-indicator ${activeClass}" data-index="${i}"></div>`;
        }
        $('#dotsContainer').html(dotsHtml);
        
        // Ajout événements clic sur points
        $('.dot-indicator').on('click', function() {
            const idx = parseInt($(this).data('index'));
            if (!isNaN(idx) && idx >= 0 && idx < totalSlides) {
                currentSlide = idx;
                renderSlide(currentSlide);
            }
        });
    }
    
    function nextSlide() {
        if (currentSlide < totalSlides - 1) {
            currentSlide++;
            renderSlide(currentSlide);
        } else {
            // Optionnel: petite notification déjà au bout
            if(currentSlide === totalSlides-1){
                $('#nextSlide').text('✔ Terminé');
                setTimeout(()=>$('#nextSlide').text('Suivant →'), 1000);
            }
        }
    }
    
    function prevSlide() {
        if (currentSlide > 0) {
            currentSlide--;
            renderSlide(currentSlide);
            $('#nextSlide').text('Suivant →');
        }
    }
    
    // Gestion du clavier (flèches gauche/droite)
    $(document).on('keydown', function(e) {
        if (e.key === 'ArrowRight') {
            nextSlide();
        } else if (e.key === 'ArrowLeft') {
            prevSlide();
        }
    });
    
    // Initialisation
    $(document).ready(function() {
        renderSlide(0);
        $('#nextSlide').on('click', nextSlide);
        $('#prevSlide').on('click', prevSlide);
        
        // Swipe simple pour mobile (touch events basique)
        let touchStartX = 0;
        let touchEndX = 0;
        const slidesWrapper = document.getElementById('slidesWrapper');
        slidesWrapper.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, false);
        slidesWrapper.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            if (touchEndX < touchStartX - 50) nextSlide();
            if (touchEndX > touchStartX + 50) prevSlide();
        }, false);
    });
</script>

<!-- Quelques améliorations pédagogiques en bas de page (copyright simplifié) -->
<footer class="text-center text-xs text-gray-400 py-6 border-t border-gray-200 mt-8">
    <p>📘 Cours React Native — Leçon 17 : Personnalisation du Header | Enseignant au Cameroun 🇨🇲 | Utilisation libre pour étudiants</p>
</footer>
</body>
</html>
