  "compilerOptions": {
    "module": "commonjs",

    "removeComments": true,
    "emitDecoratorMetadata": true,
    "experimentalDecorators": true,
    "allowSyntheticDefaultImports": true,
    "target": "ES2021",

    "outDir": "./dist",
    "baseUrl": "./",
    "incremental": true,

    "strictBindCallApply": true,
    "forceConsistentCasingInFileNames": true,

    "paths": {

      "@config/*": ["src/config/*"],

      "@entities/*": ["src/entities/*"]
    }
  }
}</pre>
                    </div>
                    <p>🔗 Les <strong>chemins d'alias</strong> (<code>paths</code>) permettront des imports plus propres : <code>import { DatabaseModule } from '@common/database'</code>.</p>

    let currentSlide = 0;
    const totalSlides = slides.length;

    function renderSlide(index) {
        const slide = slides[index];
        const html = `
            <div class="slide-card overflow-hidden">
                <div class="bg-gradient-to-r from-sky-50 to-cyan-50 px-6 py-3 border-b border-sky-200">
                    <h3 class="font-semibold text-sky-800">${slide.title}</h3>
                </div>
                <div>
                    ${slide.content}
                </div>
            </div>
        `;
        $("#slides-wrapper").html(html);
        $("#pageIndicator").text(`Slide ${index+1} / ${totalSlides}`);
        const progressPercent = (index / (totalSlides - 1)) * 100;
        $("#progress-fill").css("width", `${progressPercent}%`);
        
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function nextSlide() {
        if (currentSlide < totalSlides - 1) {
            currentSlide++;
            renderSlide(currentSlide);
        } else {
            alert("🎉 Félicitations ! Vous maîtrisez l'initialisation d'un projet NestJS pour e-commerce.");
        }
    }

    function prevSlide() {
        if (currentSlide > 0) {
            currentSlide--;
            renderSlide(currentSlide);
        } else {
            alert("C'est le début de la leçon.");
        }
    }

    renderSlide(0);
    $("#nextBtn").on("click", nextSlide);
    $("#prevBtn").on("click", prevSlide);
    
    $(document).on("keydown", function(e) {
        if (e.key === "ArrowRight") nextSlide();
        if (e.key === "ArrowLeft") prevSlide();
    });
</script>
