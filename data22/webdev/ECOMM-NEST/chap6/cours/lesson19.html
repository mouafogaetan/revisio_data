<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Leçon 19 : Entités Order & OrderItem | API E-commerce</title>
  <!-- Tailwind CSS + jQuery + MathJax -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
  <style>
    body { background: #f3f4f6; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    .slide-card { transition: all 0.2s ease; }
    .progress-fill { transition: width 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
    pre { white-space: pre-wrap; word-break: break-word; tab-size: 2; }
    button:focus-visible { outline: 2px solid #1e40af; outline-offset: 2px; }
    .status-badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 9999px; font-size: 0.7rem; font-weight: 600; }
    @media (max-width: 640px) {
      .slide-content { padding-left: 1rem; padding-right: 1rem; }
      h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body class="antialiased">

  <div class="max-w-5xl mx-auto px-3 md:px-5 py-5 md:py-8">
    <!-- Barre sticky -->
    <div class="sticky top-0 z-20 bg-white/85 backdrop-blur-md rounded-2xl shadow-sm p-3 mb-6 flex flex-wrap items-center justify-between gap-3 border border-gray-100">
      <div class="flex items-center gap-3">
        <span class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white text-xs font-bold px-3 py-1.5 rounded-full shadow-sm">NestJS • E-commerce</span>
        <span class="text-gray-600 text-sm font-medium hidden sm:inline-block">Leçon 19 : Order & OrderItem</span>
      </div>
      <div class="flex items-center gap-3">
        <span id="slideCounter" class="text-sm text-gray-600 bg-gray-100 px-3 py-1 rounded-full font-medium">1 / 7</span>
        <div class="hidden sm:block w-36 h-1.5 bg-gray-200 rounded-full overflow-hidden">
          <div id="progressFill" class="progress-fill h-full bg-indigo-500 rounded-full" style="width: 14%"></div>
        </div>
      </div>
    </div>

    <div id="slidesContainer" class="relative"></div>

    <!-- Navigation slides -->
    <div class="flex justify-between items-center mt-8 gap-4">
      <button id="prevSlide" class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-semibold py-2.5 px-5 rounded-xl shadow-sm transition flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
        Précédent
      </button>
      <span class="text-xs text-gray-400 hidden md:block">← / →  ou glisser</span>
      <button id="nextSlide" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-5 rounded-xl shadow-md transition flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed">
        Suivant
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
      </button>
    </div>

    <div class="text-center text-gray-400 text-xs mt-8 pt-4 border-t border-gray-200">
      🇨🇲 Cours API e-commerce — Enseignant au Cameroun | Commandes, snapshots et statuts
    </div>
  </div>

  <script>
    // Slides pour la leçon 19 (lesson19) : Order, OrderItem, snapshot, statuts
    const slidesData = [
      { // Slide 1 - Titre
        type: "title",
        title: "📦 Commandes et historique d'achat",
        subtitle: "Entités Order & OrderItem, snapshot produit, statuts de commande",
        badge: "Leçon 19 • NestJS + TypeORM",
        desc: "Apprenez à modéliser une commande figée dans le temps, avec ses articles et son évolution (statuts). Garantissez l'intégrité des factures."
      },
      { // Slide 2 - Objectifs (selon programme)
        type: "objectifs",
        title: "🎯 Objectifs de la leçon",
        items: [
          "Créer l'entité Order avec statuts (pending, paid, shipped, delivered, cancelled)",
          "Créer l'entité OrderItem pour le snapshot du produit au moment de l'achat",
          "Ajouter les champs total, adresse de livraison, méthode de paiement, numéro de suivi"
        ]
      },
      { // Slide 3 - Pourquoi une entité OrderItem avec snapshot ?
        type: "content",
        title: "📸 1. Le snapshot : pourquoi figer les données ?",
        text: "Une commande doit refléter les informations <strong>au moment de l'achat</strong> : prix, nom du produit, TVA, etc. Si le produit est modifié après (prix augmenté), la facture du client doit rester correcte.",
        list: [
          "On copie (snapshot) les champs nécessaires dans OrderItem : productName, unitPrice, quantity, total.",
          "On ne fait pas de relation directe ManyToOne vers Product (car le produit peut être supprimé ou modifié).",
          "On conserve toutefois une référence optionnelle (productId) pour traçabilité."
        ],
        example: "OrderItem : id, orderId, productSnapshotName, unitPrice, quantity, totalPrice, productId (nullable)",
        note: "💡 C'est le principe de 'snapshot' : on gèle l'état commercial au moment de la validation de la commande."
      },
      { // Slide 4 - Entités TypeORM détaillées
        type: "code-example",
        title: "🏗️ 2. Entités Order et OrderItem (TypeORM)",
        code: `// order.entity.ts
import { Entity, Column, OneToMany, ManyToOne } from 'typeorm';
import { User } from '../../users/entities/user.entity';
import { OrderItem } from './order-item.entity';

export enum OrderStatus {
  PENDING = 'pending',
  PAID = 'paid',
  SHIPPED = 'shipped',
  DELIVERED = 'delivered',
  CANCELLED = 'cancelled'
}

@Entity()
export class Order {
  @PrimaryGeneratedColumn()
  id: number;

  @Column({ type: 'enum', enum: OrderStatus, default: OrderStatus.PENDING })
  status: OrderStatus;

  @Column('decimal', { precision: 12, scale: 2 })
  total: number;

  @Column({ type: 'json' })
  shippingAddress: { street: string; city: string; zipCode: string; country: string };

  @Column()
  paymentMethod: string; // 'stripe', 'paypal', 'cash_on_delivery'

  @Column({ nullable: true })
  trackingNumber: string;

  @CreateDateColumn()
  createdAt: Date;

  @UpdateDateColumn()
  updatedAt: Date;

  @ManyToOne(() => User, user => user.orders)
  user: User;

  @OneToMany(() => OrderItem, item => item.order, { cascade: true })
  items: OrderItem[];
}

// order-item.entity.ts
@Entity()
export class OrderItem {
  @PrimaryGeneratedColumn()
  id: number;

  @Column()
  productSnapshotName: string;

  @Column('decimal', { precision: 10, scale: 2 })
  unitPrice: number;

  @Column('int')
  quantity: number;

  @Column('decimal', { precision: 12, scale: 2 })
  totalPrice: number;

  @Column({ nullable: true })
  productId: number; // référence optionnelle (soft link)

  @ManyToOne(() => Order, order => order.items)
  order: Order;
}`,
        explanation: "✅ Order stocke les infos globales (statut, total, adresse). OrderItem contient le snapshot (nom, prix unitaire, quantité). Cascade permet de sauvegarder les items avec la commande."
      },
      { // Slide 5 - Cycle de vie des statuts
        type: "status-flow",
        title: "🔄 3. Machine à états d'une commande",
        description: "Les statuts évoluent selon le processus logistique et de paiement. Voici les transitions classiques :",
        states: [
          { name: "PENDING", color: "bg-yellow-100 text-yellow-800", desc: "Commande créée, en attente de paiement." },
          { name: "PAID", color: "bg-green-100 text-green-800", desc: "Paiement confirmé, préparation en cours." },
          { name: "SHIPPED", color: "bg-blue-100 text-blue-800", desc: "Expédiée, numéro de suivi disponible." },
          { name: "DELIVERED", color: "bg-emerald-100 text-emerald-800", desc: "Livrée au client." },
          { name: "CANCELLED", color: "bg-red-100 text-red-800", desc: "Annulée (avant ou après paiement avec remboursement)." }
        ],
        note: "⏳ Transitions : PENDING → PAID → SHIPPED → DELIVERED. Depuis PENDING ou PAID, on peut passer à CANCELLED."
      },
      { // Slide 6 - Implémentation du changement de statut
        type: "code-example",
        title: "⚙️ 4. Changer le statut (OrderService)",
        code: `// order.service.ts
async updateStatus(orderId: number, newStatus: OrderStatus, userRole: string) {
  const order = await this.orderRepo.findOne({ where: { id: orderId }, relations: ['user'] });
  if (!order) throw new NotFoundException('Commande introuvable');
  
  // Vérifier les droits : admin ou vendeur du produit (selon logique)
  if (userRole !== 'admin' && order.user.role !== 'seller') {
    throw new ForbiddenException('Action non autorisée');
  }
  
  // Validation de transition (exemple basique)
  const allowedTransitions = {
    [OrderStatus.PENDING]: [OrderStatus.PAID, OrderStatus.CANCELLED],
    [OrderStatus.PAID]: [OrderStatus.SHIPPED, OrderStatus.CANCELLED],
    [OrderStatus.SHIPPED]: [OrderStatus.DELIVERED],
    [OrderStatus.DELIVERED]: [],
    [OrderStatus.CANCELLED]: []
  };
  
  if (!allowedTransitions[order.status].includes(newStatus)) {
    throw new BadRequestException(\`Transition de \${order.status} vers \${newStatus} invalide\`);
  }
  
  order.status = newStatus;
  if (newStatus === OrderStatus.SHIPPED) {
    // Générer un numéro de suivi fictif ou réel
    order.trackingNumber = \`TRK-\${Date.now()}\`;
  }
  return this.orderRepo.save(order);
}`,
        explanation: "✅ On valide les transitions autorisées. On peut ajouter des actions annexes (email, webhook, génération de facture) lors des changements."
      },
      { // Slide 7 - Récapitulatif & bonnes pratiques
        type: "recap",
        title: "✅ Récapitulatif & astuces pratiques",
        items: [
          "Order : informations globales (statut, total, adresse, mode de paiement).",
          "OrderItem : snapshot produit (nom, prix unitaire, quantité) pour garantir l'intégrité des factures.",
          "Les statuts suivent une machine à états : éviter les transitions impossibles.",
          "Ne jamais supprimer une commande : garder l'historique pour le suivi et les litiges.",
          "Utiliser des transactions pour créer une commande et décrémenter les stocks."
        ],
        finalTip: "🧠 Pensez aux index sur order.userId et order.createdAt pour des requêtes rapides. Ajoutez également un champ `paymentIntentId` pour lier la commande au paiement Stripe/PayPal."
      }
    ];

    let currentSlide = 0;
    const total = slidesData.length;

    function escapeHtml(str) {
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      }).replace(/\\n/g, '\n');
    }

    function renderSlide(index) {
      const data = slidesData[index];
      const container = $("#slidesContainer");
      container.empty();

      let html = `<div class="slide-card bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 transition-all">`;
      html += `<div class="bg-gradient-to-r from-blue-50 to-indigo-50 px-5 py-2 border-b border-indigo-100 flex justify-between items-center">
                  <span class="text-xs font-mono text-indigo-700 bg-indigo-100 px-2 py-0.5 rounded-full">slide ${index+1}/${total}</span>
                  <span class="text-indigo-400 text-xs">commandes & snapshots</span>
                </div>`;

      if (data.type === "title") {
        html += `<div class="p-6 md:p-10 text-center">
                  <div class="inline-block mb-3 px-4 py-1 bg-indigo-100 text-indigo-800 rounded-full text-sm font-bold">${data.badge}</div>
                  <h1 class="text-3xl md:text-5xl font-extrabold text-gray-800 mb-5">${data.title}</h1>
                  <p class="text-xl text-gray-600 max-w-2xl mx-auto">${data.subtitle}</p>
                  <div class="mt-7 text-gray-500 border-t border-gray-200 inline-block pt-3">${data.desc}</div>
                  <div class="mt-6 flex justify-center"><div class="w-16 h-1 bg-indigo-400 rounded-full"></div></div>
                </div>`;
      }
      else if (data.type === "objectifs") {
        html += `<div class="p-6 md:p-8">
                  <h2 class="text-2xl md:text-3xl font-bold text-gray-800 border-l-4 border-indigo-500 pl-4 mb-6">${data.title}</h2>
                  <ul class="space-y-4">`;
        data.items.forEach(item => {
          html += `<li class="flex items-start gap-3"><span class="inline-flex items-center justify-center bg-green-100 text-green-700 rounded-full w-6 h-6 text-sm mt-0.5">✓</span><span class="text-gray-700 text-lg">${item}</span></li>`;
        });
        html += `</ul></div>`;
      }
      else if (data.type === "content") {
        html += `<div class="p-6 md:p-8">
                  <h2 class="text-2xl font-bold text-gray-800 mb-4">${data.title}</h2>
                  <div class="text-gray-700 leading-relaxed space-y-4 text-base">`;
        if(data.text) html += `<p>${data.text}</p>`;
        if(data.list) {
          html += `<ul class="list-disc pl-6 space-y-2 mt-2">`;
          data.list.forEach(item => html += `<li>${item}</li>`);
          html += `</ul>`;
        }
        if(data.example) {
          html += `<div class="bg-gray-900 text-gray-100 rounded-lg p-4 font-mono text-sm mt-4 overflow-x-auto">${escapeHtml(data.example)}</div>`;
        }
        if(data.note) html += `<div class="bg-yellow-50 p-3 rounded-lg border-l-4 border-yellow-400 mt-4 text-yellow-800">${data.note}</div>`;
        html += `</div></div>`;
      }
      else if (data.type === "code-example") {
        html += `<div class="p-6 md:p-8">
                  <h2 class="text-2xl font-bold text-gray-800 mb-4">${data.title}</h2>
                  <div class="bg-gray-900 rounded-xl overflow-hidden shadow-md">
                    <div class="flex items-center gap-2 bg-gray-800 px-4 py-2 text-gray-300 text-xs font-mono"><span class="w-3 h-3 rounded-full bg-red-500"></span><span class="w-3 h-3 rounded-full bg-yellow-500"></span><span class="w-3 h-3 rounded-full bg-green-500"></span><span class="ml-2">TypeScript / NestJS</span></div>
                    <pre class="text-sm md:text-base text-gray-200 p-5 overflow-x-auto font-mono"><code>${escapeHtml(data.code)}</code></pre>
                  </div>
                  <div class="mt-5 bg-indigo-50 p-4 rounded-xl text-indigo-800 border-l-4 border-indigo-400">${data.explanation}</div>
                </div>`;
      }
      else if (data.type === "status-flow") {
        html += `<div class="p-6 md:p-8">
                  <h2 class="text-2xl font-bold text-gray-800">${data.title}</h2>
                  <p class="text-gray-700 mt-1 mb-5">${data.description}</p>
                  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3 mb-5">
                    ${data.states.map(s => `
                      <div class="border rounded-xl p-3 bg-gray-50">
                        <div class="flex items-center gap-2"><span class="status-badge ${s.color}">${s.name}</span><span class="text-xs text-gray-500">${s.desc}</span></div>
                      </div>
                    `).join('')}
                  </div>
                  <div class="bg-blue-50 p-4 rounded-xl text-blue-800 border-l-4 border-blue-400">${data.note}</div>
                </div>`;
      }
      else if (data.type === "recap") {
        html += `<div class="p-6 md:p-8">
                  <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-3 mb-5">📌 ${data.title}</h2>
                  <ul class="space-y-3 mb-6">
                    ${data.items.map(item => `<li class="flex gap-2 items-start"><span class="text-indigo-500 text-xl">▹</span><span class="text-gray-700">${item}</span></li>`).join('')}
                  </ul>
                  <div class="bg-gradient-to-r from-indigo-50 to-blue-50 p-5 rounded-2xl border border-indigo-200 text-indigo-900 font-medium shadow-inner">${data.finalTip}</div>
                </div>`;
      }

      html += `</div>`;
      container.html(html);

      $("#slideCounter").text(`${index+1} / ${total}`);
      let percent = ((index+1) / total) * 100;
      $("#progressFill").css("width", `${percent}%`);
      $("#prevSlide").prop("disabled", index === 0);
      $("#nextSlide").prop("disabled", index === total-1);
      if (window.MathJax) MathJax.typesetPromise();
    }

    function next() { if (currentSlide < total-1) { currentSlide++; renderSlide(currentSlide); window.scrollTo({ top: 0, behavior: "smooth" }); } }
    function prev() { if (currentSlide > 0) { currentSlide--; renderSlide(currentSlide); window.scrollTo({ top: 0, behavior: "smooth" }); } }

    $(document).ready(function() {
      renderSlide(0);
      $("#nextSlide").on("click", next);
      $("#prevSlide").on("click", prev);
      $(document).on("keydown", function(e) {
        if (e.key === "ArrowRight") { next(); e.preventDefault(); }
        else if (e.key === "ArrowLeft") { prev(); e.preventDefault(); }
      });
      let touchstartX = 0;
      $("body").on("touchstart", function(e) { touchstartX = e.originalEvent.touches[0].clientX; });
      $("body").on("touchend", function(e) {
        if (!touchstartX) return;
        let endX = e.originalEvent.changedTouches[0].clientX;
        let diff = endX - touchstartX;
        if (Math.abs(diff) > 50) { diff > 0 ? prev() : next(); touchstartX = 0; }
      });
    });
  </script>
</body>
</html>
