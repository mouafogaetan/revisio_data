<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Leçon 14 : Variations produit & alertes stock | API E-commerce</title>
  <!-- Tailwind CSS + jQuery + MathJax -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
  <style>
    body { background: #f5f7fb; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    .slide-card { transition: all 0.2s ease; }
    .progress-fill { transition: width 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
    pre { white-space: pre-wrap; word-break: break-word; tab-size: 2; }
    button:focus-visible { outline: 2px solid #1e40af; outline-offset: 2px; }
    @media (max-width: 640px) {
      .slide-content { padding-left: 1rem; padding-right: 1rem; }
      h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body class="antialiased">

  <div class="max-w-5xl mx-auto px-3 md:px-5 py-5 md:py-8">
    <!-- Barre sticky -->
    <div class="sticky top-0 z-20 bg-white/85 backdrop-blur-md rounded-2xl shadow-sm p-3 mb-6 flex flex-wrap items-center justify-between gap-3 border border-gray-100">
      <div class="flex items-center gap-3">
        <span class="bg-gradient-to-r from-amber-600 to-orange-600 text-white text-xs font-bold px-3 py-1.5 rounded-full shadow-sm">NestJS • E-commerce</span>
        <span class="text-gray-600 text-sm font-medium hidden sm:inline-block">Leçon 14 : Variations & alertes stock</span>
      </div>
      <div class="flex items-center gap-3">
        <span id="slideCounter" class="text-sm text-gray-600 bg-gray-100 px-3 py-1 rounded-full font-medium">1 / 7</span>
        <div class="hidden sm:block w-36 h-1.5 bg-gray-200 rounded-full overflow-hidden">
          <div id="progressFill" class="progress-fill h-full bg-amber-500 rounded-full" style="width: 14%"></div>
        </div>
      </div>
    </div>

    <div id="slidesContainer" class="relative"></div>

    <!-- Navigation slides -->
    <div class="flex justify-between items-center mt-8 gap-4">
      <button id="prevSlide" class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-semibold py-2.5 px-5 rounded-xl shadow-sm transition flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
        Précédent
      </button>
      <span class="text-xs text-gray-400 hidden md:block">← / →  ou glisser</span>
      <button id="nextSlide" class="bg-amber-600 hover:bg-amber-700 text-white font-semibold py-2.5 px-5 rounded-xl shadow-md transition flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed">
        Suivant
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
      </button>
    </div>

    <div class="text-center text-gray-400 text-xs mt-8 pt-4 border-t border-gray-200">
      🇨🇲 Cours API e-commerce — Enseignant au Cameroun | Variations produits, stock bas et alertes
    </div>
  </div>

  <script>
    // Slides pour la leçon 14 (lesson14) : variations, stock bas, alertes
    const slidesData = [
      { // Slide 1 - Titre
        type: "title",
        title: "📦 Variations produits & gestion des stocks",
        subtitle: "Stocks individuels, seuils d'alerte et notifications",
        badge: "Leçon 14 • NestJS + TypeORM",
        desc: "Apprenez à gérer des produits avec variations (taille, couleur, etc.), à suivre les stocks critiques et à déclencher des alertes automatiques."
      },
      { // Slide 2 - Objectifs (selon programme)
        type: "objectifs",
        title: "🎯 Objectifs de la leçon",
        items: [
          "Ajouter des variations (taille, couleur) avec stock individuel",
          "Implémenter la gestion des stocks bas (seuil minimum)",
          "Créer des alertes stock via webhook / email"
        ]
      },
      { // Slide 3 - Modélisation des variations
        type: "content",
        title: "🏷️ 1. Variations de produit : pourquoi ?",
        text: "Un même produit peut exister en plusieurs versions (couleurs, tailles). Il faut un stock séparé pour chaque variante. On utilise une entité <strong>ProductVariant</strong> liée à Product.",
        list: [
          "Éviter la duplication des infos générales (nom, description, images).",
          "Permettre un suivi précis du stock par combinaison d'options.",
          "Faciliter les remises et prix différents par variante."
        ],
        example: "Entité ProductVariant : id, sku, price (optionnel, hérite du produit), stockQuantity, attributes (ex: { couleur: 'rouge', taille: 'M' })",
        note: "💡 Relation OneToMany entre Product et ProductVariant. La table Product contient les infos communes, ProductVariant gère les spécificités."
      },
      { // Slide 4 - Implémentation des entités (TypeORM)
        type: "code-example",
        title: "📄 2. Entités Product et ProductVariant (TypeORM)",
        code: `// product.entity.ts
import { Entity, Column, OneToMany } from 'typeorm';
import { ProductVariant } from './product-variant.entity';

@Entity()
export class Product {
  @PrimaryGeneratedColumn()
  id: number;

  @Column()
  name: string;

  @Column('text')
  description: string;

  @Column('decimal', { precision: 10, scale: 2 })
  basePrice: number;

  @OneToMany(() => ProductVariant, variant => variant.product, { cascade: true })
  variants: ProductVariant[];
}

// product-variant.entity.ts
@Entity()
export class ProductVariant {
  @PrimaryGeneratedColumn()
  id: number;

  @Column({ unique: true })
  sku: string;  // identifiant unique par variante

  @Column('json', { nullable: true })
  attributes: Record<string, string>; // { "couleur": "noir", "taille": "L" }

  @Column('int', { default: 0 })
  stockQuantity: number;

  @Column('int', { default: 5 })
  lowStockThreshold: number;  // seuil d'alerte individuel

  @ManyToOne(() => Product, product => product.variants)
  product: Product;
}`,
        explanation: "✅ On stocke les attributs sous forme JSON (flexible). Chaque variante possède son propre SKU, son stock et un seuil d'alerte. La cascade permet de sauvegarder les variantes avec le produit."
      },
      { // Slide 5 - Gestion des stocks bas et alertes
        type: "alert",
        title: "⚠️ 3. Détection stock bas & alertes",
        description: "Un stock est considéré <strong>bas</strong> lorsque la quantité disponible est inférieure ou égale au seuil défini (lowStockThreshold).",
        steps: [
          "Créer un service StockMonitorService qui vérifie périodiquement (cron job) ou après chaque modification de stock.",
          "Comparer stockQuantity <= lowStockThreshold.",
          "Déclencher une alerte : email au vendeur/admin, webhook, ou log."
        ],
        codeExample: `// stock-monitor.service.ts
import { Injectable } from '@nestjs/common';
import { InjectRepository } from '@nestjs/typeorm';
import { Repository } from 'typeorm';
import { ProductVariant } from './product-variant.entity';
import { MailService } from '../mail/mail.service';

@Injectable()
export class StockMonitorService {
  constructor(
    @InjectRepository(ProductVariant)
    private variantRepo: Repository<ProductVariant>,
    private mailService: MailService,
  ) {}

  async checkLowStockAndAlert() {
    const variants = await this.variantRepo.find({
      relations: ['product'],
      where: 'stockQuantity <= lowStockThreshold'
    });
    for (const variant of variants) {
      await this.mailService.sendLowStockAlert(variant);
      // ou webhook: await this.webhookService.notify(variant);
    }
    return { alertedCount: variants.length };
  }
}`,
        noteFinal: "🎯 On peut exécuter cette vérification chaque heure via @nestjs/schedule (cron). Également déclencher après chaque mise à jour de stock (ex: lors d'une commande)."
      },
      { // Slide 6 - Exemple complet : mise à jour stock + alerte
        type: "code-example",
        title: "🔄 4. Mise à jour du stock avec déclenchement d'alerte",
        code: `// product-variant.service.ts
async updateStock(variantId: number, newQuantity: number): Promise<ProductVariant> {
  const variant = await this.variantRepo.findOne({ where: { id: variantId }, relations: ['product'] });
  if (!variant) throw new NotFoundException('Variante non trouvée');
  
  variant.stockQuantity = newQuantity;
  const saved = await this.variantRepo.save(variant);
  
  // Vérifier seuil bas immédiatement
  if (saved.stockQuantity <= saved.lowStockThreshold) {
    await this.stockMonitorService.sendLowStockAlert(saved);
  }
  
  // Si le stock devient nul, déclencher alerte "rupture"
  if (saved.stockQuantity === 0) {
    await this.stockMonitorService.sendOutOfStockAlert(saved);
  }
  return saved;
}`,
        explanation: "✅ Après chaque modification, on vérifie le seuil et on envoie une alerte si nécessaire. On peut aussi envoyer une notification webhook vers un système externe (Slack, CRM, etc.)."
      },
      { // Slide 7 - Récapitulatif & bonnes pratiques
        type: "recap",
        title: "✅ Récapitulatif & astuces pratiques",
        items: [
          "Variations : entité séparée ProductVariant liée à Product (OneToMany).",
          "Stock individuel, SKU unique et seuil d'alerte paramétrable par variante.",
          "Détection proactive : cron job + vérification après chaque opération critique.",
          "Alertes via email, webhook (Slack/Discord) ou SMS pour réactivité.",
          "Prévoir un historique des mouvements de stock (audit) pour traçabilité."
        ],
        finalTip: "🧠 Pour les e-commerces à fort volume, utilisez des files d'attente (Bull) pour les alertes afin de ne pas bloquer la réponse HTTP. Pensez aussi au stock 'virtuel' réservé dans les paniers avant validation."
      }
    ];

    let currentSlide = 0;
    const total = slidesData.length;

    function escapeHtml(str) {
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      }).replace(/\\n/g, '\n');
    }

    function renderSlide(index) {
      const data = slidesData[index];
      const container = $("#slidesContainer");
      container.empty();

      let html = `<div class="slide-card bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 transition-all">`;
      html += `<div class="bg-gradient-to-r from-amber-50 to-orange-50 px-5 py-2 border-b border-amber-100 flex justify-between items-center">
                  <span class="text-xs font-mono text-amber-700 bg-amber-100 px-2 py-0.5 rounded-full">slide ${index+1}/${total}</span>
                  <span class="text-amber-400 text-xs">stocks & alertes</span>
                </div>`;

      if (data.type === "title") {
        html += `<div class="p-6 md:p-10 text-center">
                  <div class="inline-block mb-3 px-4 py-1 bg-amber-100 text-amber-800 rounded-full text-sm font-bold">${data.badge}</div>
                  <h1 class="text-3xl md:text-5xl font-extrabold text-gray-800 mb-5">${data.title}</h1>
                  <p class="text-xl text-gray-600 max-w-2xl mx-auto">${data.subtitle}</p>
                  <div class="mt-7 text-gray-500 border-t border-gray-200 inline-block pt-3">${data.desc}</div>
                  <div class="mt-6 flex justify-center"><div class="w-16 h-1 bg-amber-400 rounded-full"></div></div>
                </div>`;
      }
      else if (data.type === "objectifs") {
        html += `<div class="p-6 md:p-8">
                  <h2 class="text-2xl md:text-3xl font-bold text-gray-800 border-l-4 border-amber-500 pl-4 mb-6">${data.title}</h2>
                  <ul class="space-y-4">`;
        data.items.forEach(item => {
          html += `<li class="flex items-start gap-3"><span class="inline-flex items-center justify-center bg-green-100 text-green-700 rounded-full w-6 h-6 text-sm mt-0.5">✓</span><span class="text-gray-700 text-lg">${item}</span></li>`;
        });
        html += `</ul></div>`;
      }
      else if (data.type === "content") {
        html += `<div class="p-6 md:p-8">
                  <h2 class="text-2xl font-bold text-gray-800 mb-4">${data.title}</h2>
                  <div class="text-gray-700 leading-relaxed space-y-4 text-base">`;
        if(data.text) html += `<p>${data.text}</p>`;
        if(data.list) {
          html += `<ul class="list-disc pl-6 space-y-2 mt-2">`;
          data.list.forEach(item => html += `<li>${item}</li>`);
          html += `</ul>`;
        }
        if(data.example) {
          html += `<div class="bg-gray-900 text-gray-100 rounded-lg p-4 font-mono text-sm mt-4 overflow-x-auto">${escapeHtml(data.example)}</div>`;
        }
        if(data.note) html += `<div class="bg-yellow-50 p-3 rounded-lg border-l-4 border-yellow-400 mt-4 text-yellow-800">${data.note}</div>`;
        html += `</div></div>`;
      }
      else if (data.type === "code-example") {
        html += `<div class="p-6 md:p-8">
                  <h2 class="text-2xl font-bold text-gray-800 mb-4">${data.title}</h2>
                  <div class="bg-gray-900 rounded-xl overflow-hidden shadow-md">
                    <div class="flex items-center gap-2 bg-gray-800 px-4 py-2 text-gray-300 text-xs font-mono"><span class="w-3 h-3 rounded-full bg-red-500"></span><span class="w-3 h-3 rounded-full bg-yellow-500"></span><span class="w-3 h-3 rounded-full bg-green-500"></span><span class="ml-2">TypeScript / NestJS</span></div>
                    <pre class="text-sm md:text-base text-gray-200 p-5 overflow-x-auto font-mono"><code>${escapeHtml(data.code)}</code></pre>
                  </div>
                  <div class="mt-5 bg-amber-50 p-4 rounded-xl text-amber-800 border-l-4 border-amber-400">${data.explanation}</div>
                </div>`;
      }
      else if (data.type === "alert") {
        html += `<div class="p-6 md:p-8">
                  <h2 class="text-2xl font-bold text-gray-800">${data.title}</h2>
                  <p class="text-gray-700 mt-2 mb-4">${data.description}</p>
                  <ul class="list-decimal pl-6 space-y-1 text-gray-700 mb-5">${data.steps.map(s => `<li>${s}</li>`).join('')}</ul>
                  <div class="bg-gray-900 rounded-xl overflow-hidden">
                    <div class="bg-gray-800 px-4 py-2 text-gray-300 text-xs">stock-monitor.service.ts</div>
                    <pre class="text-gray-200 p-5 overflow-x-auto font-mono text-sm"><code>${escapeHtml(data.codeExample)}</code></pre>
                  </div>
                  <div class="mt-5 bg-blue-50 p-3 rounded-lg text-blue-800">${data.noteFinal}</div>
                </div>`;
      }
      else if (data.type === "recap") {
        html += `<div class="p-6 md:p-8">
                  <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-3 mb-5">📌 ${data.title}</h2>
                  <ul class="space-y-3 mb-6">
                    ${data.items.map(item => `<li class="flex gap-2 items-start"><span class="text-amber-500 text-xl">▹</span><span class="text-gray-700">${item}</span></li>`).join('')}
                  </ul>
                  <div class="bg-gradient-to-r from-amber-50 to-orange-50 p-5 rounded-2xl border border-amber-200 text-amber-900 font-medium shadow-inner">${data.finalTip}</div>
                </div>`;
      }

      html += `</div>`;
      container.html(html);

      $("#slideCounter").text(`${index+1} / ${total}`);
      let percent = ((index+1) / total) * 100;
      $("#progressFill").css("width", `${percent}%`);
      $("#prevSlide").prop("disabled", index === 0);
      $("#nextSlide").prop("disabled", index === total-1);
      if (window.MathJax) MathJax.typesetPromise();
    }

    function next() { if (currentSlide < total-1) { currentSlide++; renderSlide(currentSlide); window.scrollTo({ top: 0, behavior: "smooth" }); } }
    function prev() { if (currentSlide > 0) { currentSlide--; renderSlide(currentSlide); window.scrollTo({ top: 0, behavior: "smooth" }); } }

    $(document).ready(function() {
      renderSlide(0);
      $("#nextSlide").on("click", next);
      $("#prevSlide").on("click", prev);
      $(document).on("keydown", function(e) {
        if (e.key === "ArrowRight") { next(); e.preventDefault(); }
        else if (e.key === "ArrowLeft") { prev(); e.preventDefault(); }
      });
      let touchstartX = 0;
      $("body").on("touchstart", function(e) { touchstartX = e.originalEvent.touches[0].clientX; });
      $("body").on("touchend", function(e) {
        if (!touchstartX) return;
        let endX = e.originalEvent.changedTouches[0].clientX;
        let diff = endX - touchstartX;
        if (Math.abs(diff) > 50) { diff > 0 ? prev() : next(); touchstartX = 0; }
      });
    });
  </script>
</body>
</html>
