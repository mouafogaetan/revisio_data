import { NestFactory } from '@nestjs/core';
import { AppModule } from './app.module';

async function bootstrap() {
  const app = await NestFactory.create(AppModule);
  
  // Configuration CORS
  app.enableCors({
    origin: ['https://marketcamer.com', 'https://admin.marketcamer.com'],
    methods: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'OPTIONS'],
    credentials: true, // Permet les cookies / headers d'authentification
    allowedHeaders: ['Content-Type', 'Authorization', 'X-Requested-With'],
    exposedHeaders: ['X-Total-Count'],
    maxAge: 86400, // 24h pour les requêtes preflight
  });
  
  await app.listen(3000);
}
bootstrap();</pre>

import { Injectable, ExecutionContext } from '@nestjs/common';
import { ThrottlerGuard } from '@nestjs/throttler';

@Injectable()
export class UserThrottlerGuard extends ThrottlerGuard {
  protected async getTracker(req: Record<string, any>): Promise<string> {
    // Si utilisateur connecté, utiliser son ID
    const user = req.user;
    if (user && user.id) {
      return \`user-\${user.id}\`;
    }
    // Sinon, utiliser l'IP
    return req.ip;
  }
}

// Utilisation dans le contrôleur
@Controller('orders')
@UseGuards(UserThrottlerGuard)
@Throttle({ default: { limit: 50, ttl: 60000 } })

  // Limité à 50 requêtes/minute par utilisateur connecté
}</pre>

                    <div class="code-block my-5">
                        <pre># /etc/nginx/sites-available/marketcamer-api
server {
    listen 80;
    server_name api.marketcamer.com;
    return 301 https://\$server_name\$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.marketcamer.com;

    ssl_certificate /etc/letsencrypt/live/api.marketcamer.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.marketcamer.com/privkey.pem;

    # Rate limiting par IP
    limit_req_zone \$binary_remote_addr zone=api:10m rate=10r/s;
    limit_conn_zone \$binary_remote_addr zone=conn:10m;

    location / {
        limit_req zone=api burst=20 nodelay;
        limit_conn conn 10;
        
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade \$http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host \$host;
        proxy_set_header X-Real-IP \$remote_addr;
        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto \$scheme;
        proxy_cache_bypass \$http_upgrade;
    }
}</pre>

                        <pre># Limites globales
# /etc/nginx/nginx.conf
http {
    # Limite le nombre de connexions par IP
    limit_conn_zone \$binary_remote_addr zone=addr:10m;
    
    # Limite le taux de requêtes
    limit_req_zone \$binary_remote_addr zone=login:10m rate=5r/m;
    
    # Timeouts
    client_body_timeout 5s;
    client_header_timeout 5s;
    send_timeout 10s;
    
    # Taille maximale des requêtes
    client_max_body_size 10M;
    
    # Désactiver le keepalive pour les attaques lentes
    keepalive_requests 10;
    keepalive_timeout 5s;
}

# Dans la configuration du site
location /auth/login {
    limit_req zone=login burst=2 nodelay;
    limit_req_status 429;
    proxy_pass http://localhost:3000;
}

location /api {
    # Bloquer les User-Agents suspects
    if (\$http_user_agent ~* (bot|crawler|scraper|curl|wget)) {
        return 403;
    }
    
    # Bloquer les IP malveillantes (à mettre à jour régulièrement)
    deny 192.168.1.100;
    allow all;
}</pre>
