<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Lesson 18 : Héritage et polymorphisme en TypeScript</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax pour les formules mathématiques -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* Styles personnalisés pour un confort visuel */
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .slide-container {
            max-width: 1200px;
            margin: 2rem auto;
            transition: all 0.3s ease;
        }
        .slide-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transition: transform 0.2s;
            overflow: hidden;
        }
        .nav-button {
            transition: all 0.2s ease;
            background-color: #1e293b;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .nav-button:hover {
            background-color: #0f172a;
            transform: scale(1.02);
        }
        .nav-button:active {
            transform: scale(0.98);
        }
        .code-block {
            background-color: #1e293b;
            color: #e2e8f0;
            border-radius: 1rem;
            padding: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .badge {
            display: inline-block;
            background-color: #3b82f6;
            color: white;
            border-radius: 9999px;
            padding: 0.2rem 0.8rem;
            font-size: 0.7rem;
            font-weight: bold;
            margin-right: 0.5rem;
        }
        @media (max-width: 640px) {
            .slide-card {
                border-radius: 1.5rem;
                margin: 1rem;
            }
            .nav-button {
                padding: 0.5rem 1rem;
                font-size: 0.8rem;
            }
            .code-block {
                font-size: 0.75rem;
                padding: 0.75rem;
            }
        }
        .progress-bar {
            height: 4px;
            background: #cbd5e1;
            border-radius: 2px;
        }
        .progress-fill {
            height: 4px;
            background: #3b82f6;
            border-radius: 2px;
            width: 0%;
        }
        h1, h2, h3 {
            font-weight: 700;
            letter-spacing: -0.02em;
        }
    </style>
</head>
<body class="p-4">

<div class="slide-container" id="app">
    <!-- Conteneur dynamique des slides -->
    <div id="slides-wrapper" class="relative"></div>
    <!-- Indicateur de progression + navigation -->
    <div class="flex flex-col items-center mt-6 gap-4">
        <div class="w-full max-w-md progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
        </div>
        <div class="flex gap-6 justify-center flex-wrap">
            <button id="prevBtn" class="nav-button"><span class="mr-1">◀</span> Précédent</button>
            <span id="pageIndicator" class="text-gray-700 font-medium bg-white/60 backdrop-blur-sm px-4 py-2 rounded-full">Slide 1 / 1</span>
            <button id="nextBtn" class="nav-button">Suivant <span class="ml-1">▶</span></button>
        </div>
    </div>
</div>

<script>
    // Définition du contenu des slides pour la lesson18
    const slides = [
        { // Slide 0 : Titre
            title: "Héritage et polymorphisme en TypeScript",
            content: `
                <div class="flex flex-col items-center justify-center min-h-[60vh] text-center p-6">
                    <div class="bg-blue-100 text-blue-800 rounded-full px-6 py-2 text-sm font-semibold mb-4">Lesson 18 - Chapitre 5</div>
                    <h1 class="text-4xl md:text-6xl font-extrabold bg-gradient-to-r from-indigo-600 to-blue-500 bg-clip-text text-transparent mb-6">Héritage & Polymorphisme</h1>
                    <p class="text-lg text-gray-600 max-w-2xl mx-auto">Apprenez à réutiliser et étendre vos classes comme un professionnel du développement Web au Cameroun 🇨🇲</p>
                    <div class="mt-10 flex gap-3 flex-wrap justify-center">
                        <span class="bg-gray-200 px-4 py-2 rounded-full text-sm">🔹 extends</span>
                        <span class="bg-gray-200 px-4 py-2 rounded-full text-sm">🔹 super()</span>
                        <span class="bg-gray-200 px-4 py-2 rounded-full text-sm">🔹 override</span>
                        <span class="bg-gray-200 px-4 py-2 rounded-full text-sm">🔹 abstract</span>
                    </div>
                </div>
            `
        },
        { // Slide 1 : Objectifs pédagogiques
            title: "Objectifs de la leçon",
            content: `
                <div class="p-6 md:p-10">
                    <h2 class="text-2xl md:text-3xl font-bold text-indigo-800 border-l-8 border-indigo-500 pl-4 mb-6">🎯 Objectifs</h2>
                    <ul class="space-y-5 text-gray-700 text-lg">
                        <li class="flex items-start gap-3"><span class="text-green-600 text-xl">✓</span> <strong>Hériter</strong> d'une classe avec le mot-clé <span class="bg-gray-100 px-2 py-1 rounded font-mono text-sm">extends</span></li>
                        <li class="flex items-start gap-3"><span class="text-green-600 text-xl">✓</span> Utiliser <span class="bg-gray-100 px-2 py-1 rounded font-mono text-sm">super()</span> pour appeler le constructeur parent</li>
                        <li class="flex items-start gap-3"><span class="text-green-600 text-xl">✓</span> <strong>Redéfinir</strong> des méthodes avec le mot-clé <span class="bg-gray-100 px-2 py-1 rounded font-mono text-sm">override</span></li>
                        <li class="flex items-start gap-3"><span class="text-green-600 text-xl">✓</span> Comprendre et créer des <strong>classes abstraites</strong> (<span class="bg-gray-100 px-2 py-1 rounded font-mono text-sm">abstract class</span>)</li>
                        <li class="flex items-start gap-3"><span class="text-green-600 text-xl">✓</span> Maîtriser la différence entre héritage et interface</li>
                    </ul>
                    <div class="mt-8 bg-blue-50 rounded-2xl p-4 border border-blue-200">
                        <p class="text-blue-800"><span class="font-bold">💡 Pourquoi c'est important ?</span> L'héritage permet d'éviter la duplication de code et de créer des hiérarchies logiques (ex: Véhicule → Voiture → VoitureElectrique).</p>
                    </div>
                </div>
            `
        },
        { // Slide 2 : Héritage simple avec extends
            title: "1. Héritage simple : extends",
            content: `
                <div class="p-6 md:p-10">
                    <h2 class="text-2xl font-bold text-indigo-700 mb-4">🔗 Le mot-clé <span class="bg-gray-200 px-2 py-1 rounded">extends</span></h2>
                    <p>Une classe enfant peut hériter de toutes les propriétés et méthodes d'une classe parent (sauf les membres privés).</p>
                    <div class="code-block my-5">
                        <pre>class Animal {
  constructor(public nom: string) {}
  deplacer(): void {
    console.log(\`\${this.nom} se déplace\`);
  }
}

class Oiseau extends Animal {
  voler(): void {
    console.log(\`\${this.nom} vole dans le ciel\`);
  }
}

const perroquet = new Oiseau("Coco");
perroquet.deplacer(); // Coco se déplace
perroquet.voler();    // Coco vole dans le ciel</pre>
                    </div>
                    <p class="text-gray-600">✅ L'oiseau hérite de <span class="font-mono">deplacer()</span> et ajoute sa propre méthode <span class="font-mono">voler()</span>.</p>
                    <div class="mt-4 bg-amber-50 p-3 rounded-lg"><span class="font-bold">⚠️ À retenir :</span> TypeScript supporte l'héritage simple (une seule classe parente).</div>
                </div>
            `
        },
        { // Slide 3 : super() et constructeur
            title: "2. super() : appeler le parent",
            content: `
                <div class="p-6 md:p-10">
                    <h2 class="text-2xl font-bold text-indigo-700 mb-4">📞 Le mot-clé <span class="bg-gray-200 px-2 py-1 rounded">super()</span></h2>
                    <p>Dans le constructeur d'une classe fille, on <strong>doit</strong> appeler <span class="font-mono bg-gray-100 px-1">super()</span> avant d'utiliser <span class="font-mono">this</span>. Cela exécute le constructeur parent.</p>
                    <div class="code-block my-5">
                        <pre>class Employe {
  constructor(public nom: string, public salaire: number) {}
}

class Developpeur extends Employe {
  constructor(nom: string, salaire: number, public langage: string) {
    super(nom, salaire);  // Appel obligatoire
    // this.langage = langage;  on peut aussi affecter ici
  }

  afficherDetails() {
    console.log(\`\${this.nom} (salaire: \${this.salaire}) code en \${this.langage}\`);
  }
}

const dev = new Developpeur("Fatima", 750000, "TypeScript");
dev.afficherDetails();</pre>
                    </div>
                    <p>💡 <span class="font-mono">super()</span> doit être la première instruction dans le constructeur enfant.</p>
                </div>
            `
        },
        { // Slide 4 : Redéfinition de méthodes (override)
            title: "3. Redéfinir des méthodes avec override",
            content: `
                <div class="p-6 md:p-10">
                    <h2 class="text-2xl font-bold text-indigo-700 mb-4">✍️ Le mot-clé <span class="bg-gray-200 px-2 py-1 rounded">override</span></h2>
                    <p>Une classe enfant peut modifier le comportement d'une méthode héritée. Utilisez <span class="font-mono bg-gray-100 px-1">override</span> pour plus de clarté et de sécurité.</p>
                    <div class="code-block my-5">
                        <pre>class Vehicule {
  demarrer(): void {
    console.log("Le véhicule démarre avec un bruit...");
  }
}

class Moto extends Vehicule {
  override demarrer(): void {
    console.log("🥁 VROUM VROUM! La moto rugit!");
  }
}

const maMoto = new Moto();
maMoto.demarrer(); // Affiche le message spécifique à la moto</pre>
                    </div>
                    <p>🔁 On peut aussi appeler la méthode parente depuis la méthode enfant : <span class="font-mono bg-gray-100 px-1">super.demarrer()</span>.</p>
                </div>
            `
        },
        { // Slide 5 : Classes abstraites (abstract)
            title: "4. Classes abstraites",
            content: `
                <div class="p-6 md:p-10">
                    <h2 class="text-2xl font-bold text-indigo-700 mb-4">🧩 abstract class : modèle pour les autres classes</h2>
                    <p>Une classe abstraite ne peut pas être instanciée directement. Elle sert de "plan" pour les classes dérivées. Elle peut contenir des méthodes abstraites (sans corps) et des méthodes concrètes.</p>
                    <div class="code-block my-5">
                        <pre>abstract class Forme {
  abstract calculerAire(): number;  // méthode abstraite, sans implémentation

  afficherType(): void {
    console.log("Je suis une forme géométrique");
  }
}

class Rectangle extends Forme {
  constructor(public largeur: number, public hauteur: number) {
    super();
  }
  override calculerAire(): number {
    return this.largeur * this.hauteur;
  }
}

const rect = new Rectangle(5, 10);
console.log(rect.calculerAire()); // 50
// const forme = new Forme(); // ERREUR ! Impossible d'instancier une classe abstraite</pre>
                    </div>
                    <p class="mt-2">🧠 La classe abstraite définit un contrat que les enfants doivent respecter.</p>
                </div>
            `
        },
        { // Slide 6 : Différence entre interface et classe abstraite
            title: "5. Interface vs Classe abstraite",
            content: `
                <div class="p-6 md:p-10">
                    <h2 class="text-2xl font-bold text-indigo-700 mb-4">⚖️ Classe abstraite vs Interface</h2>
                    <div class="overflow-x-auto">
                        <table class="min-w-full bg-white border border-gray-200 rounded-2xl">
                            <thead class="bg-gray-100">
                                <tr><th class="p-3 text-left">Critère</th><th class="p-3 text-left">Classe abstraite</th><th class="p-3 text-left">Interface</th></tr>
                            </thead>
                            <tbody class="divide-y">
                                <tr><td class="p-3">Instanciation</td><td class="p-3">❌ Non</td><td class="p-3">❌ Non</td></tr>
                                <tr><td class="p-3">Méthodes avec code</td><td class="p-3">✅ Oui (concrètes)</td><td class="p-3">❌ Non (uniquement signatures)</td></tr>
                                <tr><td class="p-3">Propriétés avec valeurs par défaut</td><td class="p-3">✅ Oui</td><td class="p-3">❌ Non</td></tr>
                                <tr><td class="p-3">Héritage multiple</td><td class="p-3">❌ Non (une seule classe)</td><td class="p-3">✅ Oui (plusieurs interfaces)</td></tr>
                                <tr><td class="p-3">Constructeur</td><td class="p-3">✅ Oui</td><td class="p-3">❌ Non</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <p class="mt-5 text-sm text-gray-600">Utilisez une classe abstraite quand vous avez un socle commun avec du code réutilisable. Utilisez une interface pour définir un contrat pur (forme d'objet).</p>
                </div>
            `
        },
        { // Slide 7 : Exemple concret - Système de paiement
            title: "Exemple pratique: Paiements",
            content: `
                <div class="p-6 md:p-10">
                    <h2 class="text-2xl font-bold text-indigo-700 mb-4">💰 Cas d'usage réel : système de paiement</h2>
                    <div class="code-block text-sm">
                        <pre>abstract class Paiement {
  constructor(public montant: number) {}
  abstract effectuerPaiement(): string;
  logInfo(): void {
    console.log(\`Paiement de \${this.montant} FCFA initié\`);
  }
}

class PaiementCarte extends Paiement {
  constructor(montant: number, private numeroCarte: string) { super(montant); }
  override effectuerPaiement(): string {
    return \`Paiement par carte de \${this.montant} FCFA accepté.\`;
  }
}

class PaiementMobileMoney extends Paiement {
  constructor(montant: number, private telephone: string) { super(montant); }
  override effectuerPaiement(): string {
    return \`Paiement Mobile Money de \${this.montant} FCFA via \${this.telephone}.\`;
  }
}

const paiement = new PaiementMobileMoney(2500, "+2376XXXXXXX");
console.log(paiement.effectuerPaiement());</pre>
                    </div>
                    <p class="mt-3">🎓 Cet exemple illustre l'héritage, l'abstraction et le polymorphisme (chaque classe enfant implémente <span class="font-mono">effectuerPaiement()</span> à sa manière).</p>
                </div>
            `
        },
        { // Slide 8 : Exercice rapide + résumé
            title: "Résumé & Exercice",
            content: `
                <div class="p-6 md:p-10">
                    <h2 class="text-2xl font-bold text-indigo-700 mb-4">📝 Ce qu'il faut retenir</h2>
                    <ul class="list-disc pl-6 space-y-2 text-gray-700">
                        <li><span class="font-mono">class Enfant extends Parent</span> : héritage des propriétés/méthodes</li>
                        <li><span class="font-mono">super()</span> : appel au constructeur parent (obligatoire)</li>
                        <li><span class="font-mono">override</span> : redéfinition explicite d'une méthode héritée</li>
                        <li><span class="font-mono">abstract class</span> : ne peut pas être instanciée, sert de modèle avec méthodes abstraites</li>
                    </ul>
                    <div class="mt-6 p-5 bg-green-50 border border-green-200 rounded-xl">
                        <p class="font-bold text-green-800">🧪 Mini exercice :</p>
                        <p>Créez une classe abstraite <span class="font-mono">Appareil</span> avec une méthode abstraite <span class="font-mono">allumer()</span>. Ensuite créez deux classes <span class="font-mono">Telephone</span> et <span class="font-mono">Ordinateur</span> qui héritent et implémentent <span class="font-mono">allumer()</span> chacune différemment.</p>
                        <details class="mt-3"><summary class="cursor-pointer text-blue-600">Voir solution</summary>
                        <div class="code-block mt-2 text-xs">abstract class Appareil { abstract allumer(): void; }<br>class Telephone extends Appareil { allumer() { console.log("Téléphone allumé"); } }<br>class Ordinateur extends Appareil { allumer() { console.log("Ordinateur boot"); } }</div>
                        </details>
                    </div>
                </div>
            `
        }
    ];

    let currentSlide = 0;
    const totalSlides = slides.length;

    function renderSlide(index) {
        const slide = slides[index];
        const html = `
            <div class="slide-card overflow-hidden animate-fade-in">
                <div class="bg-gradient-to-r from-indigo-50 to-blue-50 px-6 py-3 border-b border-indigo-100">
                    <h3 class="font-semibold text-indigo-800">${slide.title}</h3>
                </div>
                <div class="p-1">
                    ${slide.content}
                </div>
            </div>
        `;
        $("#slides-wrapper").html(html);
        $("#pageIndicator").text(`Slide ${index+1} / ${totalSlides}`);
        const progressPercent = ((index) / (totalSlides - 1)) * 100;
        $("#progress-fill").css("width", `${progressPercent}%`);
        
        // MathJax relance le rendu pour d'éventuelles formules mathématiques
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
        // Scroll vers le haut pour une meilleure expérience mobile
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function nextSlide() {
        if (currentSlide < totalSlides - 1) {
            currentSlide++;
            renderSlide(currentSlide);
        } else {
            // option boucler? on reste
            alert("Fin du cours ! Félicitations 🎉");
        }
    }

    function prevSlide() {
        if (currentSlide > 0) {
            currentSlide--;
            renderSlide(currentSlide);
        } else {
            alert("Vous êtes au début de la leçon.");
        }
    }

    // Initialisation
    renderSlide(0);
    $("#nextBtn").on("click", nextSlide);
    $("#prevBtn").on("click", prevSlide);
    
    // Gestion clavier (flèches droite/gauche)
    $(document).on("keydown", function(e) {
        if (e.key === "ArrowRight") nextSlide();
        if (e.key === "ArrowLeft") prevSlide();
    });
    
    // Ajustement des mathjax après chargement complet
    $(window).on("load", function() {
        if (window.MathJax) MathJax.typesetPromise();
    });
</script>

<!-- Note : la leçon utilise des extraits TypeScript complets. Expliquez bien le rôle des mots-clés override et abstract. -->
</body>
</html>
