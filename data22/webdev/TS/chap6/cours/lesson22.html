<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Leçon 22 : Classes et interfaces génériques | TypeScript</title>
  <!-- Tailwind CSS + Font Awesome (optionnel) + jQuery + MathJax -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
  <style>
    /* Douceur et accessibilité */
    body {
      background: #f1f5f9;
    }
    .slide-card {
      transition: all 0.2s ease;
    }
    .progress-fill {
      transition: width 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      tab-size: 2;
    }
    button:focus-visible, a:focus-visible {
      outline: 2px solid #1e40af;
      outline-offset: 2px;
      border-radius: 0.5rem;
    }
    @media (max-width: 640px) {
      .slide-content {
        padding-left: 1rem;
        padding-right: 1rem;
      }
      h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body class="font-sans antialiased">

  <div class="max-w-5xl mx-auto px-3 md:px-5 py-5 md:py-8">
    <!-- Barre de progression sticky -->
    <div class="sticky top-0 z-20 bg-white/80 backdrop-blur-md rounded-2xl shadow-sm p-3 mb-6 flex flex-wrap items-center justify-between gap-3 border border-gray-100">
      <div class="flex items-center gap-3">
        <span class="bg-gradient-to-r from-indigo-600 to-blue-600 text-white text-xs font-bold px-3 py-1.5 rounded-full shadow-sm">TypeScript • Génériques</span>
        <span class="text-gray-600 text-sm font-medium hidden sm:inline-block">Leçon 22</span>
      </div>
      <div class="flex items-center gap-3">
        <span id="slideCounter" class="text-sm text-gray-600 bg-gray-100 px-3 py-1 rounded-full font-medium">1 / 8</span>
        <div class="hidden sm:block w-36 h-1.5 bg-gray-200 rounded-full overflow-hidden">
          <div id="progressFill" class="progress-fill h-full bg-indigo-500 rounded-full" style="width: 12.5%"></div>
        </div>
      </div>
    </div>

    <!-- Zone des slides -->
    <div id="slidesContainer" class="relative"></div>

    <!-- Navigation -->
    <div class="flex justify-between items-center mt-8 gap-4">
      <button id="prevSlide" class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-semibold py-2.5 px-5 rounded-xl shadow-sm transition flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
        Précédent
      </button>
      <span class="text-xs text-gray-400 hidden md:block">← / →  ou  swipe</span>
      <button id="nextSlide" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-5 rounded-xl shadow-md transition flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed">
        Suivant
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
      </button>
    </div>
    
    <div class="text-center text-gray-400 text-xs mt-8 pt-4 border-t border-gray-200">
      🇨🇲 Cours TypeScript — Enseignant au Cameroun | Génériques : classes, interfaces et types utilitaires
    </div>
  </div>

  <script>
    // Données des slides pour la leçon 22 (lesson22)
    // Objectifs: créer classe générique, interface générique, utiliser génériques avec types utilitaires
    const slidesData = [
      { // slide 1 - Titre
        type: "title",
        title: "🧩 Créer des composants réutilisables et typés",
        subtitle: "Classes génériques, interfaces génériques & types utilitaires",
        badge: "Leçon 22 • TS Avancé",
        desc: "Apprenez à construire des blocs de code flexibles, sûrs et parfaitement typés grâce aux génériques en TypeScript."
      },
      { // slide 2 - Objectifs selon le programme
        type: "objectifs",
        title: "🎯 Objectifs de la leçon",
        items: [
          "Créer une classe générique (ex: class Stack<T>)",
          "Définir une interface générique pour des contrats flexibles",
          "Utiliser les génériques avec les types utilitaires (Partial, Pick, Omit)"
        ]
      },
      { // slide 3 - Pourquoi une classe générique ?
        type: "content",
        title: "📦 1. Classe générique : une boîte adaptable",
        text: "Une <strong>classe générique</strong> permet de définir une structure qui peut fonctionner avec n'importe quel type. On déclare un paramètre de type <code class='bg-gray-200 px-1 rounded'>&lt;T&gt;</code>. Très utile pour les collections (Pile, Liste, etc.)",
        list: [
          "Évite la duplication de code (ex: StackNumber, StackString)",
          "Garantit la sécurité du typage à l'utilisation",
          "TypeScript infère automatiquement le type lors de l'instanciation"
        ],
        exampleSimple: "class Stack&lt;T&gt; { private items: T[] = []; push(item: T) { this.items.push(item); } pop(): T | undefined { return this.items.pop(); } }"
      },
      { // slide 4 - Exemple concret classe générique Stack<T>
        type: "code-example",
        title: "💻 Exemple : une pile (Stack) générique",
        code: `// Classe générique Stack
class Stack<T> {
  private elements: T[] = [];
  
  push(element: T): void {
    this.elements.push(element);
  }
  
  pop(): T | undefined {
    return this.elements.pop();
  }
  
  peek(): T | undefined {
    return this.elements[this.elements.length - 1];
  }
  
  isEmpty(): boolean {
    return this.elements.length === 0;
  }
}

// Utilisation avec des nombres
const numberStack = new Stack<number>();
numberStack.push(10);
numberStack.push(20);
console.log(numberStack.pop()); // 20

// Utilisation avec des chaînes
const stringStack = new Stack<string>();
stringStack.push("TypeScript");
stringStack.push("Génériques");
console.log(stringStack.peek()); // "Génériques"`,
        explanation: "✅ On réutilise la même logique pour tout type : number, string, objet, etc. TypeScript vérifie que l'on pousse bien le bon type."
      },
      { // slide 5 - Interface générique
        type: "interface-generic",
        title: "📐 2. Interface générique : contrat paramétré",
        textIntro: "Une interface générique définit un moule que plusieurs types différents peuvent respecter. Idéal pour les API, repositories ou services.",
        interfaceExample: `interface Repository<T, ID = number> {
  findById(id: ID): T | null;
  save(entity: T): T;
  delete(id: ID): void;
}

// Implémentation concrète pour User
interface User {
  id: number;
  name: string;
}

class UserRepository implements Repository<User, number> {
  private users: User[] = [];
  
  findById(id: number): User | null {
    return this.users.find(u => u.id === id) || null;
  }
  save(entity: User): User {
    this.users.push(entity);
    return entity;
  }
  delete(id: number): void {
    this.users = this.users.filter(u => u.id !== id);
  }
}`,
        note: "🔁 On peut même définir des paramètres par défaut : <code>interface Repo&lt;T, ID = string&gt;</code>. Très pratique !"
      },
      { // slide 6 - Génériques & Types utilitaires (Partial, Pick, Omit)
        type: "utils-slide",
        title: "⚙️ 3. Types utilitaires + Génériques",
        description: "TypeScript fournit des <strong>types utilitaires</strong> qui sont eux-mêmes génériques. Ils transforment des types existants :",
        utilityList: [
          { name: "Partial<T>", desc: "Rend toutes les propriétés de T optionnelles." },
          { name: "Pick<T, K>", desc: "Crée un type avec seulement certaines clés K de T." },
          { name: "Omit<T, K>", desc: "Crée un type en excluant certaines clés K de T." },
          { name: "Readonly<T>", desc: "Rend toutes les propriétés de T en lecture seule." }
        ],
        example: `interface Produit {
  id: number;
  nom: string;
  prix: number;
  stock: number;
}

// Mise à jour partielle (PUT partiel)
function updateProduit(id: number, modification: Partial<Produit>): void {
  console.log("Modifications:", modification);
  // modification peut contenir seulement 'nom' ou 'prix', etc.
}

// Choisir uniquement certaines propriétés
type ProduitResume = Pick<Produit, "id" | "nom">;
// Équivaut à { id: number; nom: string; }

// Omettre une propriété sensible
type ProduitSansStock = Omit<Produit, "stock">;`,
        tip: "💡 Ces utilitaires sont puissants pour manipuler des objets sans réécrire vos interfaces."
      },
      { // slide 7 - Application pratique : un service générique avec Partial
        type: "code-example",
        title: "🚀 Mise en pratique : API générique avec types utilitaires",
        code: `// Exemple d'un gestionnaire de localStorage générique
class StorageService<T> {
  constructor(private key: string) {}
  
  // Sauvegarde complète
  save(data: T): void {
    localStorage.setItem(this.key, JSON.stringify(data));
  }
  
  // Mise à jour partielle grâce à Partial<T>
  update(partialData: Partial<T>): void {
    const existing = this.get();
    if (existing) {
      const updated = { ...existing, ...partialData };
      this.save(updated);
    }
  }
  
  get(): T | null {
    const raw = localStorage.getItem(this.key);
    return raw ? JSON.parse(raw) : null;
  }
  
  // Sélection de champs spécifiques avec Pick
  getFields<Keys extends keyof T>(keys: Keys[]): Pick<T, Keys> | null {
    const data = this.get();
    if (!data) return null;
    const result = {} as Pick<T, Keys>;
    keys.forEach(k => { result[k] = data[k]; });
    return result;
  }
}

interface UserSettings {
  theme: 'clair' | 'sombre';
  notifications: boolean;
  language: string;
}

const settingsService = new StorageService<UserSettings>('userConfig');
settingsService.update({ theme: 'sombre' }); // ✅ ne modifie que le thème
// TypeScript vérifie les clés : settingsService.getFields(['theme', 'language'])`,
        explanation: "🎯 Les génériques combinés à Partial, Pick et Omit rendent votre code à la fois flexible et 100% typé. Moins de bugs, plus de confiance !"
      },
      { // slide 8 - Récap + astuces
        type: "recap",
        title: "✅ Synthèse & bonnes pratiques",
        items: [
          "Les classes génériques (<T>) évitent la duplication et préservent le typage.",
          "Les interfaces génériques permettent des contrats paramétrables (ex: Repository<T>).",
          "Utilisez Partial<T> pour les mises à jour partielles, Pick/Omit pour affiner vos types.",
          "Combinez génériques et utilitaires pour des composants ultra-réutilisables.",
          "Pensez aux contraintes (extends) quand vous avez besoin de propriétés spécifiques sur T."
        ],
        finalTip: "✨ Astuce finale : Quand vous écrivez une fonction ou une classe qui semble 'presque pareille' pour plusieurs types, pensez générique ! Votre code deviendra élégant et robuste."
      }
    ];

    let currentSlide = 0;
    const total = slidesData.length;

    // Helper d'échappement HTML
    function escapeCode(str) {
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      }).replace(/\\n/g, '\n');
    }

    function renderSlide(index) {
      const data = slidesData[index];
      const container = $("#slidesContainer");
      container.empty();

      let html = `<div class="slide-card bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 transition-all">`;
      // petite bandeau slide
      html += `<div class="bg-gradient-to-r from-indigo-50 to-blue-50 px-5 py-2 border-b border-indigo-100 flex justify-between items-center">
                  <span class="text-xs font-mono text-indigo-700 bg-indigo-100 px-2 py-0.5 rounded-full">slide ${index+1}/${total}</span>
                  <span class="text-indigo-400 text-xs">composants réutilisables</span>
                </div>`;
      
      // contenu dynamique selon type
      if (data.type === "title") {
        html += `<div class="p-6 md:p-10 text-center">
                  <div class="inline-block mb-3 px-4 py-1 bg-indigo-100 text-indigo-800 rounded-full text-sm font-bold">${data.badge}</div>
                  <h1 class="text-3xl md:text-5xl font-extrabold text-gray-800 mb-5">${data.title}</h1>
                  <p class="text-xl text-gray-600 max-w-2xl mx-auto">${data.subtitle}</p>
                  <div class="mt-7 text-gray-500 border-t border-gray-200 inline-block pt-3">${data.desc}</div>
                  <div class="mt-6 flex justify-center"><div class="w-16 h-1 bg-indigo-400 rounded-full"></div></div>
                </div>`;
      } 
      else if (data.type === "objectifs") {
        html += `<div class="p-6 md:p-8">
                  <h2 class="text-2xl md:text-3xl font-bold text-gray-800 border-l-4 border-indigo-500 pl-4 mb-6">${data.title}</h2>
                  <ul class="space-y-4">`;
        data.items.forEach(item => {
          html += `<li class="flex items-start gap-3"><span class="inline-flex items-center justify-center bg-green-100 text-green-700 rounded-full w-6 h-6 text-sm mt-0.5">✓</span><span class="text-gray-700 text-lg">${item}</span></li>`;
        });
        html += `</ul></div>`;
      }
      else if (data.type === "content") {
        html += `<div class="p-6 md:p-8">
                  <h2 class="text-2xl font-bold text-gray-800 mb-4">${data.title}</h2>
                  <div class="text-gray-700 leading-relaxed space-y-4 text-base">`;
        if(data.text) html += `<p>${data.text}</p>`;
        if(data.list) {
          html += `<ul class="list-disc pl-6 space-y-2 mt-2">`;
          data.list.forEach(item => html += `<li>${item}</li>`);
          html += `</ul>`;
        }
        if(data.exampleSimple) {
          html += `<div class="bg-gray-900 text-gray-100 rounded-lg p-4 font-mono text-sm mt-4 overflow-x-auto">${escapeCode(data.exampleSimple)}</div>`;
        }
        if(data.note) html += `<div class="bg-yellow-50 p-3 rounded-lg border-l-4 border-yellow-400 mt-4 text-yellow-800">${data.note}</div>`;
        html += `</div></div>`;
      }
      else if (data.type === "code-example") {
        html += `<div class="p-6 md:p-8">
                  <h2 class="text-2xl font-bold text-gray-800 mb-4">${data.title}</h2>
                  <div class="bg-gray-900 rounded-xl overflow-hidden shadow-md">
                    <div class="flex items-center gap-2 bg-gray-800 px-4 py-2 text-gray-300 text-xs font-mono"><span class="w-3 h-3 rounded-full bg-red-500"></span><span class="w-3 h-3 rounded-full bg-yellow-500"></span><span class="w-3 h-3 rounded-full bg-green-500"></span><span class="ml-2">TypeScript</span></div>
                    <pre class="text-sm md:text-base text-gray-200 p-5 overflow-x-auto font-mono"><code>${escapeCode(data.code)}</code></pre>
                  </div>
                  <div class="mt-5 bg-indigo-50 p-4 rounded-xl text-indigo-800 border-l-4 border-indigo-400">${data.explanation}</div>
                </div>`;
      }
      else if (data.type === "interface-generic") {
        html += `<div class="p-6 md:p-8">
                  <h2 class="text-2xl font-bold text-gray-800 mb-3">${data.title}</h2>
                  <p class="text-gray-700 mb-4">${data.textIntro}</p>
                  <div class="bg-gray-900 rounded-xl overflow-hidden">
                    <div class="bg-gray-800 px-4 py-2 text-gray-300 text-xs">interface générique</div>
                    <pre class="text-gray-200 p-5 overflow-x-auto font-mono text-sm"><code>${escapeCode(data.interfaceExample)}</code></pre>
                  </div>
                  <div class="mt-4 bg-gray-50 p-3 rounded-lg">${data.note}</div>
                </div>`;
      }
      else if (data.type === "utils-slide") {
        html += `<div class="p-6 md:p-8">
                  <h2 class="text-2xl font-bold text-gray-800">${data.title}</h2>
                  <p class="text-gray-700 mt-2 mb-5">${data.description}</p>
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    ${data.utilityList.map(util => `
                      <div class="bg-gray-50 border border-gray-200 rounded-xl p-3">
                        <code class="text-indigo-700 font-bold bg-indigo-50 px-2 py-0.5 rounded">${util.name}</code>
                        <p class="text-gray-600 text-sm mt-1">${util.desc}</p>
                      </div>
                    `).join('')}
                  </div>
                  <div class="bg-gray-900 rounded-xl p-4">
                    <pre class="text-gray-200 font-mono text-sm overflow-x-auto"><code>${escapeCode(data.example)}</code></pre>
                  </div>
                  <div class="mt-4 text-blue-800 bg-blue-50 p-3 rounded-lg">${data.tip}</div>
                </div>`;
      }
      else if (data.type === "recap") {
        html += `<div class="p-6 md:p-8">
                  <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-3 mb-5">📌 ${data.title}</h2>
                  <ul class="space-y-3 mb-6">
                    ${data.items.map(item => `<li class="flex gap-2 items-start"><span class="text-indigo-500 text-xl">▹</span><span class="text-gray-700">${item}</span></li>`).join('')}
                  </ul>
                  <div class="bg-gradient-to-r from-indigo-50 to-purple-50 p-5 rounded-2xl border border-indigo-200 text-indigo-900 font-medium shadow-inner">${data.finalTip}</div>
                </div>`;
      }
      
      html += `</div>`;
      container.html(html);
      
      // update progression
      $("#slideCounter").text(`${index+1} / ${total}`);
      let percent = ((index+1) / total) * 100;
      $("#progressFill").css("width", `${percent}%`);
      
      $("#prevSlide").prop("disabled", index === 0);
      $("#nextSlide").prop("disabled", index === total-1);
      
      if (window.MathJax) {
        MathJax.typesetPromise();
      }
    }

    // Navigation
    function next() {
      if (currentSlide < total-1) {
        currentSlide++;
        renderSlide(currentSlide);
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    }
    function prev() {
      if (currentSlide > 0) {
        currentSlide--;
        renderSlide(currentSlide);
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    }

    $(document).ready(function() {
      renderSlide(0);
      $("#nextSlide").on("click", next);
      $("#prevSlide").on("click", prev);
      $(document).on("keydown", function(e) {
        if (e.key === "ArrowRight") { next(); e.preventDefault(); }
        else if (e.key === "ArrowLeft") { prev(); e.preventDefault(); }
      });
      
      // swipe mobile
      let touchstartX = 0;
      $("body").on("touchstart", function(e) {
        touchstartX = e.originalEvent.touches[0].clientX;
      });
      $("body").on("touchend", function(e) {
        if (!touchstartX) return;
        let endX = e.originalEvent.changedTouches[0].clientX;
        let diff = endX - touchstartX;
        if (Math.abs(diff) > 50) {
          diff > 0 ? prev() : next();
          touchstartX = 0;
        }
      });
    });
  </script>
</body>
</html>
