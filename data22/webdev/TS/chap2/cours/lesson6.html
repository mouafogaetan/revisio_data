<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Leçon 6 : Les énumérations (Enums) en TypeScript</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (prêt pour formules si besoin) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        body {
            background: #f0f4f8;
            font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
        }
        .slide-card {
            background: white;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            transition: all 0.2s;
            min-height: 70vh;
            display: flex;
            flex-direction: column;
        }
        .slide-content {
            flex: 1;
            padding: 2rem 1.8rem;
        }
        .nav-btn {
            cursor: pointer;
            background: #0f172a;
            color: white;
            border-radius: 9999px;
            padding: 0.6rem 1.4rem;
            font-weight: 500;
            transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .nav-btn:hover {
            background: #1e293b;
            transform: scale(0.97);
        }
        .dot-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #cbd5e1;
            transition: all 0.2s;
            cursor: pointer;
        }
        .dot-indicator.active {
            background-color: #0f172a;
            width: 24px;
            border-radius: 12px;
        }
        pre {
            background: #0f172a;
            padding: 1rem;
            border-radius: 1rem;
            overflow-x: auto;
            margin: 1rem 0;
            color: #e2e8f0;
            font-size: 0.85rem;
        }
        code {
            background: #1e293b;
            color: #e2e8f0;
            padding: 0.2rem 0.4rem;
            border-radius: 10px;
            font-family: monospace;
            font-size: 0.85rem;
        }
        .highlight {
            background: #fef9c3;
            color: #1e293b;
            padding: 0.1rem 0.3rem;
            border-radius: 8px;
        }
        @media (max-width: 640px) {
            .slide-content {
                padding: 1.5rem 1rem;
            }
            .nav-btn {
                padding: 0.4rem 1rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body class="antialiased">
<div class="max-w-5xl mx-auto px-4 py-6 md:py-8">
    <div id="slidesWrapper" class="relative"></div>

    <!-- Navigation et indicateurs -->
    <div class="flex justify-between items-center mt-8 gap-3 flex-wrap">
        <button id="prevSlide" class="nav-btn px-5 py-2 text-sm md:text-base">← Précédent</button>
        <div id="dotsContainer" class="flex gap-2 justify-center flex-wrap my-2"></div>
        <button id="nextSlide" class="nav-btn px-5 py-2 text-sm md:text-base">Suivant →</button>
    </div>
</div>

<script>
    // Slides pour la leçon 6 : Enums en TypeScript
    const slidesData = [
        {
            type: "title",
            title: "📋 Les énumérations (Enums) en TypeScript",
            subtitle: "enum numérique · enum textuel · const enum · reverse mapping",
            emoji: "🔢📌"
        },
        {
            type: "objectifs",
            title: "🎯 Objectifs de la leçon",
            objectives: [
                "Créer des enums numériques et textuels pour représenter un ensemble limité de valeurs",
                "Comprendre la compilation des enums et le reverse mapping (numérique)",
                "Utiliser const enum pour optimiser le code JavaScript généré"
            ]
        },
        {
            type: "content",
            title: "🤔 Pourquoi utiliser des énumérations ?",
            content: `<p>Les énumérations (enum) permettent de définir un ensemble de <strong>constantes nommées</strong>. Elles rendent le code plus lisible et moins sujet aux erreurs.</p>
            <div class="bg-indigo-50 p-4 rounded-xl mt-3">
                <p class="font-bold">📌 Problème sans enum :</p>
                <pre><code>let direction = "UP"; // "UP" ou "DOWN" ? Risque de faute !</code></pre>
                <p class="font-bold mt-2">✅ Avec enum :</p>
                <pre><code>enum Direction { UP, DOWN, LEFT, RIGHT }\nlet dir: Direction = Direction.UP;</code></pre>
            </div>
            <p class="mt-2">Les enums sont idéals pour : les jours de la semaine, les statuts (succès/échec), les rôles utilisateur, etc.</p>`
        },
        {
            type: "content",
            title: "🔢 Enum numérique (par défaut)",
            content: `<p>TypeScript attribue automatiquement des valeurs numériques aux membres, en commençant par <code>0</code>.</p>
            <pre><code>enum Status {\n  PENDING,   // 0\n  APPROVED,  // 1\n  REJECTED   // 2\n}\n\nlet currentStatus: Status = Status.APPROVED;\nconsole.log(currentStatus); // Affiche 1</code></pre>
            <p>On peut aussi initialiser manuellement les valeurs :</p>
            <pre><code>enum ErrorCode {\n  NOT_FOUND = 404,\n  UNAUTHORIZED = 401,\n  SERVER_ERROR = 500\n}</code></pre>
            <p>Les membres suivants s'incrémentent automatiquement :</p>
            <pre><code>enum Direction {\n  NORTH = 1,\n  SOUTH,   // 2\n  EAST,    // 3\n  WEST     // 4\n}</code></pre>`
        },
        {
            type: "content",
            title: "📝 Enum textuel (chaînes de caractères)",
            content: `<p>On peut utiliser des chaînes pour des valeurs plus explicites. Chaque membre doit être initialisé avec une chaîne.</p>
            <pre><code>enum HttpMethod {\n  GET = "GET",\n  POST = "POST",\n  PUT = "PUT",\n  DELETE = "DELETE"\n}\n\nfunction fetchData(method: HttpMethod) {\n  console.log(`Requête ${method}`);\n}\n\nfetchData(HttpMethod.GET);</code></pre>
            <div class="bg-green-50 p-3 rounded-lg mt-2">
                💡 <strong>Avantage</strong> : le code JavaScript généré est plus lisible et les valeurs sont auto-descriptives.
            </div>`
        },
        {
            type: "content",
            title: "🔄 Reverse mapping (énumérations numériques)",
            content: `<p>TypeScript génère un <strong>reverse mapping</strong> pour les enums numériques : on peut accéder à la clé à partir de la valeur.</p>
            <pre><code>enum Status {\n  PENDING = 0,\n  APPROVED = 1\n}\n\nconsole.log(Status.PENDING);   // 0\nconsole.log(Status[0]);        // "PENDING"</code></pre>
            <p>Le JavaScript généré ressemble à ceci :</p>
            <pre><code>var Status;\n(function (Status) {\n    Status[Status["PENDING"] = 0] = "PENDING";\n    Status[Status["APPROVED"] = 1] = "APPROVED";\n})(Status || (Status = {}));</code></pre>
            <p>⚠️ Le reverse mapping <strong>n'existe pas</strong> pour les enums textuels.</p>`
        },
        {
            type: "content",
            title: "⚡ const enum : optimisation à la compilation",
            content: `<p>Le mot-clé <code>const enum</code> supprime complètement l'objet enum et <strong>remplace les références par leurs valeurs littérales</strong> lors de la compilation. Résultat : code JavaScript plus léger.</p>
            <pre><code>const enum Color {\n  RED = "#FF0000",\n  GREEN = "#00FF00",\n  BLUE = "#0000FF"\n}\n\nlet bgColor = Color.RED;\n// Après compilation : let bgColor = "#FF0000";</code></pre>
            <div class="bg-yellow-50 p-3 rounded-lg mt-2">
                ⚠️ Attention : <code>const enum</code> ne permet pas le reverse mapping et ne peut pas être utilisé si on a besoin de l'objet enum lui-même (ex: itération).
            </div>`
        },
        {
            type: "content",
            title: "📊 Enum hétérogène (mix numérique / texte)",
            title: "Enum hétérogène : mélange numérique / texte",
            content: `<p>TypeScript autorise le mélange, mais ce n'est pas recommandé (moins prévisible).</p>
            <pre><code>enum Mixed {\n  A = 1,\n  B = "B_VALUE",\n  C = 2\n}</code></pre>
            <p>À éviter sauf cas très spécifiques. Privilégier des enums homogènes (uniquement numériques ou uniquement textuels).</p>`
        },
        {
            type: "content",
            title: "🧠 Utilisation avancée : itérer sur un enum",
            content: `<p>Pour itérer sur les clés d'un enum numérique (attention au reverse mapping), on peut filtrer :</p>
            <pre><code>enum Direction {\n  UP = 1,\n  DOWN = 2,\n  LEFT = 3,\n  RIGHT = 4\n}\n\n// Récupérer les clés (noms)\nconst keys = Object.keys(Direction).filter(k => isNaN(Number(k)));\nconsole.log(keys); // ["UP", "DOWN", "LEFT", "RIGHT"]\n\n// Récupérer les valeurs\nconst values = Object.values(Direction).filter(v => typeof v === "number");\nconsole.log(values); // [1,2,3,4]</code></pre>
            <p>Pour un enum textuel, plus simple : <code>Object.keys(HttpMethod)</code> donne directement les clés.</p>`
        },
        {
            type: "content",
            title: "✅ Bonnes pratiques avec les enums",
            content: `<ul class="list-disc pl-5 space-y-2">
                <li>Utilisez des <strong>enums textuels</strong> pour une meilleure lisibilité du code généré.</li>
                <li>Préférez <code>const enum</code> lorsque vous n'avez pas besoin de l'objet enum à l'exécution (ex: valeurs constantes).</li>
                <li>Évitez les enums hétérogènes.</li>
                <li>Pour les petites collections de valeurs, une <strong>union de types littéraux</strong> peut suffire : <code>type Direction = "UP" | "DOWN" | "LEFT" | "RIGHT";</code></li>
                <li>Nommez les enums au singulier (Role, Status, Color).</li>
                <li>Documentez les membres si nécessaire.</li>
            </ul>
            <div class="bg-indigo-50 p-3 rounded-lg mt-2">💡 Les enums sont parfaits pour les options de configuration, les codes d'erreur, les statuts de commande ou les rôles d'utilisateur.</div>`
        },
        {
            type: "end",
            title: "🏁 Félicitations !",
            message: "Vous maîtrisez les énumérations TypeScript : un outil puissant pour des données contraintes et lisibles.",
            nextAction: "Pratiquez en créant un enum pour les jours de la semaine ou les couleurs d'un thème."
        }
    ];

    let currentSlide = 0;
    const totalSlides = slidesData.length;

    function renderSlide(index) {
        const data = slidesData[index];
        let html = '';
        if (data.type === 'title') {
            html = `
                <div class="slide-card text-center">
                    <div class="slide-content flex flex-col justify-center items-center min-h-[55vh]">
                        <div class="text-7xl mb-4">${data.emoji}</div>
                        <h1 class="text-3xl md:text-5xl font-extrabold bg-gradient-to-r from-slate-800 to-indigo-700 bg-clip-text text-transparent">${data.title}</h1>
                        <p class="text-xl text-gray-600 mt-4">${data.subtitle}</p>
                        <div class="mt-6 text-sm text-gray-400">TypeScript · Enum · Typage avancé</div>
                    </div>
                </div>
            `;
        } 
        else if (data.type === 'objectifs') {
            html = `
                <div class="slide-card">
                    <div class="slide-content">
                        <h2 class="text-2xl md:text-3xl font-bold text-slate-800 border-b-4 border-indigo-400 pb-2 inline-block">${data.title}</h2>
                        <ul class="mt-6 space-y-3">
                            ${data.objectives.map(obj => `<li class="flex items-start gap-3 text-lg"><span class="text-indigo-600 text-xl">🎯</span> <span>${obj}</span></li>`).join('')}
                        </ul>
                        <div class="mt-8 p-4 bg-indigo-50 rounded-2xl">
                            <p class="text-indigo-800">À la fin de cette leçon, vous saurez structurer vos constantes avec des énumérations claires et performantes.</p>
                        </div>
                    </div>
                </div>
            `;
        }
        else if (data.type === 'content') {
            html = `
                <div class="slide-card">
                    <div class="slide-content">
                        <h2 class="text-2xl md:text-3xl font-bold text-slate-800 mb-4">${data.title}</h2>
                        <div class="prose prose-slate max-w-none text-gray-700 leading-relaxed">
                            ${data.content}
                        </div>
                    </div>
                </div>
            `;
        }
        else if (data.type === 'end') {
            html = `
                <div class="slide-card text-center">
                    <div class="slide-content flex flex-col justify-center items-center min-h-[50vh]">
                        <div class="text-5xl mb-4">🏆</div>
                        <h2 class="text-3xl font-bold text-slate-800">${data.title}</h2>
                        <p class="text-xl text-gray-600 mt-3">${data.message}</p>
                        <p class="mt-6 italic text-gray-500">✨ ${data.nextAction}</p>
                        <div class="mt-6 text-sm bg-slate-100 px-4 py-2 rounded-full">Enums maîtrisés ✅</div>
                    </div>
                </div>
            `;
        }
        $('#slidesWrapper').html(html);
        updateDots(index);
        if (window.MathJax) MathJax.typesetPromise();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function updateDots(activeIndex) {
        let dotsHtml = '';
        for (let i = 0; i < totalSlides; i++) {
            const activeClass = i === activeIndex ? 'active' : '';
            dotsHtml += `<div class="dot-indicator ${activeClass}" data-index="${i}"></div>`;
        }
        $('#dotsContainer').html(dotsHtml);
        $('.dot-indicator').on('click', function() {
            const idx = parseInt($(this).data('index'));
            if (!isNaN(idx) && idx >= 0 && idx < totalSlides) {
                currentSlide = idx;
                renderSlide(currentSlide);
            }
        });
    }

    function nextSlide() {
        if (currentSlide < totalSlides - 1) {
            currentSlide++;
            renderSlide(currentSlide);
        } else {
            if(currentSlide === totalSlides-1){
                $('#nextSlide').text('✔ Terminé');
                setTimeout(()=>$('#nextSlide').text('Suivant →'), 1000);
            }
        }
    }

    function prevSlide() {
        if (currentSlide > 0) {
            currentSlide--;
            renderSlide(currentSlide);
            $('#nextSlide').text('Suivant →');
        }
    }

    $(document).ready(function() {
        renderSlide(0);
        $('#nextSlide').on('click', nextSlide);
        $('#prevSlide').on('click', prevSlide);
        $(document).on('keydown', (e) => {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
        });
        let touchStartX = 0, touchEndX = 0;
        const wrapper = document.getElementById('slidesWrapper');
        wrapper.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        });
        wrapper.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            if (touchEndX < touchStartX - 50) nextSlide();
            if (touchEndX > touchStartX + 50) prevSlide();
        });
    });
</script>
<footer class="text-center text-xs text-gray-400 border-t border-gray-200 mt-8 py-5">
    <p>📘 Cours TypeScript — Leçon 6 : Les énumérations (Enums) | Enseignant Cameroun 🇨🇲</p>
</footer>
</body>
</html>
