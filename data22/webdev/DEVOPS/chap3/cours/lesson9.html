<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 9 : Stratégies de branchement Git | DevOps</title>
    <!-- Tailwind CSS + CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (optionnel, présent pour formules mais peu utilisé ici) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* transitions douces pour slides */
        .slide {
            transition: opacity 0.3s ease-in-out;
        }
        /* personnalisation légère des couleurs pour confort visuel */
        body {
            background: #f4f7fc;
        }
        .card-glass {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(2px);
        }
        .btn-nav {
            transition: all 0.2s;
        }
        .btn-nav:active {
            transform: scale(0.96);
        }
        /* code friendly */
        pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 1rem;
            border-radius: 1rem;
            overflow-x: auto;
            font-size: 0.85rem;
        }
        code {
            font-family: 'Monaco', 'Menlo', monospace;
        }
        .badge-git {
            background: #f05033;
            color: white;
        }
        .prose ul, .prose ol {
            margin-left: 1.5rem;
        }
        .slide-content {
            max-height: 70vh;
            overflow-y: auto;
            padding-right: 0.5rem;
        }
        /* responsive ajustements */
        @media (max-width: 640px) {
            .slide-content {
                max-height: 65vh;
            }
            h2 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body class="font-sans antialiased">

    <div class="min-h-screen flex flex-col items-center justify-center px-4 py-6 md:py-10">
        <!-- Conteneur principal du diaporama -->
        <div class="w-full max-w-5xl bg-white/70 backdrop-blur-sm rounded-3xl shadow-2xl overflow-hidden border border-gray-200">
            <!-- Header avec progression -->
            <div class="bg-gradient-to-r from-indigo-700 to-sky-700 text-white px-6 py-4 flex justify-between items-center flex-wrap gap-2">
                <div>
                    <h1 class="text-xl md:text-2xl font-bold">📘 Initiation au DevOps</h1>
                    <p class="text-indigo-100 text-sm">Chapitre 3 : Maîtriser Git pour le travail collaboratif · Leçon 9</p>
                </div>
                <div class="bg-white/20 rounded-full px-4 py-1 text-sm font-semibold backdrop-blur-sm">
                    Slide <span id="currentSlideIdx">1</span> / <span id="totalSlidesCount">0</span>
                </div>
            </div>

            <!-- Zone principale slide -->
            <div class="relative p-6 md:p-8 min-h-[550px] flex flex-col">
                <div id="slidesContainer" class="relative w-full overflow-hidden">
                    <!-- Les slides seront injectées dynamiquement via jQuery -->
                </div>

                <!-- Navigation + indicateurs -->
                <div class="flex justify-between items-center mt-8 pt-4 border-t border-gray-200">
                    <button id="prevBtn" class="btn-nav bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-2 px-5 rounded-full shadow-md transition flex items-center gap-1 disabled:opacity-40 disabled:cursor-not-allowed">
                        ◀ Précédent
                    </button>
                    <div class="flex gap-2 flex-wrap justify-center" id="dotsNav"></div>
                    <button id="nextBtn" class="btn-nav bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-5 rounded-full shadow-md transition flex items-center gap-1">
                        Suivant ▶
                    </button>
                </div>
            </div>
        </div>
        <p class="text-xs text-gray-500 mt-6 text-center">📌 Cours conçu pour les étudiants — Cameroun 🇨🇲 | Approche simple & progressive</p>
    </div>

    <script>
        // ==================== DONNÉES DE LA LEÇON 9 (stratégies Git) ====================
        // Titre de la leçon, objectifs, puis contenu réparti en slides additionnels
        const lessonTitle = "Stratégies de branchement : Git Flow & GitHub Flow";
        const lessonObjectives = [
            "Comprendre Git Flow (develop, feature, release, hotfix)",
            "Découvrir GitHub Flow (simplifié pour CI/CD et déploiement continu)",
            "Choisir la stratégie adaptée à la taille de l’équipe et au projet"
        ];

        // Contenu des slides (après slide objectifs)
        // Chaque slide contient: titre, contenu HTML (explications, commandes, exemples)
        const contentSlides = [
            {
                titre: "🌿 Git Flow : la stratégie complète",
                html: `
                    <div class="prose prose-slate max-w-none">
                        <p class="text-lg">Git Flow est idéal pour les projets avec <strong>versions planifiées</strong> (logiciels, applications mobiles, cycles longs). Il structure le dépôt autour de <span class="font-mono bg-gray-100 px-1 rounded">branches principales</span> :</p>
                        <ul class="list-disc space-y-1 mt-3">
                            <li><span class="font-bold text-indigo-700">main (ou master)</span> : code prêt pour la production, uniquement des versions stables.</li>
                            <li><span class="font-bold text-indigo-700">develop</span> : branche d'intégration pour les prochaines fonctionnalités.</li>
                            <li><span class="font-bold text-indigo-700">feature/*</span> : créées depuis develop pour développer de nouvelles fonctionnalités.</li>
                            <li><span class="font-bold text-indigo-700">release/*</span> : préparer une nouvelle version (correctifs mineurs, documentation).</li>
                            <li><span class="font-bold text-indigo-700">hotfix/*</span> : partir de main pour corriger rapidement un bug critique.</li>
                        </ul>
                        <div class="bg-indigo-50 p-3 rounded-xl mt-4 border-l-4 border-indigo-500">
                            <p class="text-sm font-medium">📌 <strong>Commande typique :</strong> création d’une feature branch :</p>
                            <pre class="text-sm mt-2"><code>git checkout develop
git checkout -b feature/ajout-panier
# ... travail puis fusion
git checkout develop
git merge --no-ff feature/ajout-panier</code></pre>
                        </div>
                        <p class="mt-3 text-gray-700">✅ Avantages : très structuré, parfait pour les grosses équipes. Inconvénient : complexité accrue.</p>
                    </div>
                `
            },
            {
                titre: "🚀 GitHub Flow : simplicité et déploiement continu",
                html: `
                    <div class="prose prose-slate max-w-none">
                        <p class="font-medium">GitHub Flow est plus léger : <strong>une seule branche principale (main)</strong> + branches de fonctionnalités. Il épouse parfaitement la culture CI/CD.</p>
                        <ul class="list-decimal mt-2 space-y-1 ml-5">
                            <li>La branche <code class="bg-gray-100 px-1">main</code> est toujours déployable.</li>
                            <li>Pour chaque nouvelle fonctionnalité : créer une branche descriptive (ex: <code>feature/paiement-stripe</code>).</li>
                            <li>Travailler, <strong>ouvrir une Pull Request</strong> pour discuter et relire le code.</li>
                            <li>Une fois la PR validée, on fusionne (merge) dans <code>main</code>.</li>
                            <li>Déploiement automatique immédiat après merge (via pipeline CI/CD).</li>
                        </ul>
                        <div class="bg-sky-50 p-3 rounded-xl mt-4 border-l-4 border-sky-500">
                            <p class="font-semibold">💡 Exemple workflow GitHub Flow :</p>
                            <pre class="text-xs mt-2"><code>git checkout -b ajout-2fa
git add . && git commit -m "implémentation double authentification"
git push origin ajout-2fa
# Créer pull request sur GitHub
# Après validation : merge & déploiement automatique</code></pre>
                        </div>
                        <p class="mt-2">📈 Idéal pour startups, projets web, équipes agiles qui livrent plusieurs fois par jour.</p>
                    </div>
                `
            },
            {
                titre: "🤔 Comment bien choisir sa stratégie ?",
                html: `
                    <div class="prose prose-slate max-w-none">
                        <p class="font-semibold">Le choix dépend de plusieurs facteurs : taille de l'équipe, fréquence de livraison, type d'application.</p>
                        <div class="grid md:grid-cols-2 gap-4 mt-4">
                            <div class="bg-white border border-gray-200 p-4 rounded-2xl shadow-sm">
                                <h3 class="text-indigo-700 text-xl font-bold">📦 Git Flow</h3>
                                <p class="mt-1 text-sm">✔ Équipes 10+ développeurs<br>✔ Versions planifiées (mensuelles/trimestrielles)<br>✔ Applications embarquées, logicielles<br>✔ Nécessité de hotfix officiels</p>
                            </div>
                            <div class="bg-white border border-gray-200 p-4 rounded-2xl shadow-sm">
                                <h3 class="text-sky-700 text-xl font-bold">⚡ GitHub Flow</h3>
                                <p class="mt-1 text-sm">✔ Équipes réduites à moyennes<br>✔ Livraison continue (plusieurs déploiements par jour)<br>✔ Projets web, SaaS, APIs<br>✔ Moins de surcharge administrative</p>
                            </div>
                        </div>
                        <div class="mt-4 p-3 bg-gray-100 rounded-xl">
                            <p class="italic">🎯 <strong>Conseil pratique :</strong> Si vous débutez en DevOps ou que votre projet est livré en continu → commencez par <span class="font-bold">GitHub Flow</span>.  Pour les applications legacy ou cycles longs → Git Flow.</p>
                        </div>
                        <div class="mt-4 flex justify-center">
                            <div class="w-full max-w-sm text-center text-sm text-gray-600 border-t pt-3 mt-2">
                                <span class="inline-block bg-gray-200 rounded-full px-3 py-1">📌 Rappel : Dans tous les cas, l’essentiel est d’avoir une convention claire et des revues de code.</span>
                            </div>
                        </div>
                    </div>
                `
            },
            {
                titre: "🛠️ Exemple concret & extensions (GitLab Flow)",
                html: `
                    <div class="prose prose-slate max-w-none">
                        <p>Il existe aussi <strong>GitLab Flow</strong> (mélange entre environnement et branches). Très répandu avec les pipelines CI/CD. En entreprise, on retrouve souvent des branches <code>pre-production</code> ou <code>staging</code>.</p>
                        <div class="bg-gradient-to-r from-gray-50 to-gray-100 p-4 rounded-xl my-3">
                            <p class="font-mono text-sm">Exemple d'arborescence Git Flow vs GitHub Flow (visuel conceptuel) :</p>
                            <pre class="text-xs mt-1 bg-gray-800 text-gray-200 p-2 rounded overflow-x-auto">
    Git Flow :
    main  ◄─────── release/1.0 ────── develop
      │                │                 │
      └─hotfix/1.0.1   └─ feature/login  └─ feature/inscription
                            
    GitHub Flow :
    main  ◄─────── feature/paiement
    (toujours prêt)    │
                        └─ PR & review → merge & deploy
                            </pre>
                        </div>
                        <p class="mt-2">💎 <strong>Résumé final :</strong> la stratégie de branchement améliore la collaboration, réduit les conflits et s’intègre aux pipelines DevOps. L'important est de documenter la méthode choisie pour toute l'équipe.</p>
                    </div>
                `
            }
        ];

        // Construction des slides: 
        // Slide 0 : Titre de la leçon
        // Slide 1 : Objectifs pédagogiques
        // Slides 2..n : contenus de contentSlides
        let slides = [];

        // Slide titre
        slides.push({
            type: 'title',
            title: lessonTitle,
            subtitle: 'Stratégies de branches pour le travail collaboratif moderne'
        });

        // Slide objectifs
        slides.push({
            type: 'objectives',
            objectives: lessonObjectives
        });

        // Slides de contenu
        contentSlides.forEach((item, idx) => {
            slides.push({
                type: 'content',
                titre: item.titre,
                htmlContent: item.html
            });
        });

        // État du diaporama
        let currentIndex = 0;
        const totalSlides = slides.length;
        
        // Fonction pour dessiner tous les slides et les masquer (seulement afficher celui actif)
        function renderSlides() {
            const container = $('#slidesContainer');
            container.empty();
            let slideHtml = '';
            for (let i = 0; i < slides.length; i++) {
                const slide = slides[i];
                let inner = '';
                if (slide.type === 'title') {
                    inner = `
                        <div class="flex flex-col items-center justify-center text-center space-y-5">
                            <div class="inline-block p-3 bg-indigo-100 rounded-full">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-indigo-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
                                </svg>
                            </div>
                            <h2 class="text-4xl md:text-5xl font-extrabold bg-gradient-to-r from-indigo-800 to-sky-600 bg-clip-text text-transparent">${escapeHtml(slide.title)}</h2>
                            <p class="text-xl text-gray-600 max-w-xl">${escapeHtml(slide.subtitle)}</p>
                            <div class="mt-4 text-indigo-500 text-sm font-mono bg-indigo-50 px-4 py-2 rounded-full">Git • Collaboration • DevOps</div>
                        </div>
                    `;
                } 
                else if (slide.type === 'objectives') {
                    let objList = '';
                    slide.objectives.forEach((obj, idx) => {
                        objList += `<li class="flex items-start gap-3 mb-3"><span class="bg-green-100 text-green-700 rounded-full w-6 h-6 flex items-center justify-center text-sm font-bold shrink-0">${idx+1}</span><span class="text-gray-700">${escapeHtml(obj)}</span></li>`;
                    });
                    inner = `
                        <div>
                            <div class="flex items-center gap-2 mb-4">
                                <span class="text-3xl">🎯</span>
                                <h2 class="text-2xl md:text-3xl font-bold text-gray-800">Objectifs de la leçon</h2>
                            </div>
                            <div class="bg-white rounded-2xl p-5 shadow-sm border">
                                <ul class="space-y-2 text-lg">
                                    ${objList}
                                </ul>
                                <div class="mt-6 text-sm text-gray-500 border-t pt-3 italic">À la fin de ce cours, vous serez capable de choisir et implémenter la bonne stratégie Git.</div>
                            </div>
                        </div>
                    `;
                }
                else if (slide.type === 'content') {
                    inner = `
                        <div>
                            <div class="flex items-center gap-2 border-b border-gray-200 pb-3 mb-4">
                                <span class="text-2xl">📖</span>
                                <h2 class="text-2xl md:text-3xl font-bold text-indigo-800">${escapeHtml(slide.titre)}</h2>
                            </div>
                            <div class="slide-content">
                                ${slide.htmlContent}
                            </div>
                        </div>
                    `;
                }
                // chaque slide possède une classe slide + hidden / visible
                const displayClass = (i === currentIndex) ? '' : 'hidden';
                container.append(`<div id="slide_${i}" class="slide ${displayClass} transition-all duration-300" data-index="${i}">${inner}</div>`);
            }
            $('#totalSlidesCount').text(totalSlides);
            updateDots();
            updateNavButtons();
        }

        // mise à jour des points indicateurs
        function updateDots() {
            const dotsContainer = $('#dotsNav');
            dotsContainer.empty();
            for (let i = 0; i < totalSlides; i++) {
                const activeClass = (i === currentIndex) ? 'bg-indigo-600 w-6' : 'bg-gray-300 w-3';
                const dot = `<button class="h-3 rounded-full ${activeClass} transition-all mx-1 hover:bg-indigo-400 focus:outline-none" data-slide-index="${i}"></button>`;
                dotsContainer.append(dot);
            }
            // click sur dot
            $('[data-slide-index]').each(function() {
                $(this).on('click', function() {
                    const idx = parseInt($(this).attr('data-slide-index'));
                    if (!isNaN(idx) && idx !== currentIndex && idx >=0 && idx < totalSlides) {
                        goToSlide(idx);
                    }
                });
            });
            $('#currentSlideIdx').text(currentIndex+1);
        }

        function updateNavButtons() {
            $('#prevBtn').prop('disabled', currentIndex === 0);
            if (currentIndex === 0) {
                $('#prevBtn').addClass('opacity-50 cursor-not-allowed');
            } else {
                $('#prevBtn').removeClass('opacity-50 cursor-not-allowed');
            }
            $('#nextBtn').prop('disabled', currentIndex === totalSlides-1);
            if (currentIndex === totalSlides-1) {
                $('#nextBtn').addClass('opacity-50 cursor-not-allowed');
            } else {
                $('#nextBtn').removeClass('opacity-50 cursor-not-allowed');
            }
        }

        function goToSlide(index) {
            if (index === currentIndex) return;
            // cacher l'ancien slide
            $(`#slide_${currentIndex}`).addClass('hidden');
            // afficher le nouveau
            $(`#slide_${index}`).removeClass('hidden');
            currentIndex = index;
            $('#currentSlideIdx').text(currentIndex+1);
            updateDots();
            updateNavButtons();
            // scroll en haut du contenu (optionnel)
            $('.slide-content').scrollTop(0);
        }

        function nextSlide() {
            if (currentIndex < totalSlides-1) {
                goToSlide(currentIndex+1);
            }
        }

        function prevSlide() {
            if (currentIndex > 0) {
                goToSlide(currentIndex-1);
            }
        }

        // échappement HTML simple
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }

        // initialisation
        $(document).ready(function() {
            renderSlides();
            $('#prevBtn').on('click', prevSlide);
            $('#nextBtn').on('click', nextSlide);
            // gestion clavier
            $(document).on('keydown', function(e) {
                if (e.key === 'ArrowLeft') {
                    prevSlide();
                    e.preventDefault();
                } else if (e.key === 'ArrowRight') {
                    nextSlide();
                    e.preventDefault();
                }
            });
            // Si on souhaite un petit dessin pour illustration: on peut ajouter un canvas mais non nécessaire.
            // On respecte la consigne: pas d'images inutiles. Sinon, un petit schéma via SVG directement dans le contenu ?
            // Le contenu HTML contient déjà des représentations textuelles de schémas de branches. C'est léger et lisible.
        });
    </script>
</body>
</html>
