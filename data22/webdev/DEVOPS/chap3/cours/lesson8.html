<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cours DevOps : Maîtriser Git pour le travail collaboratif | Lesson 8</title>
    <!-- Tailwind CSS via CDN + base couches -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (formules mathématiques si besoin, mais pour Git peu probable, on l'inclut au cas où) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* personnalisation fine pour lisibilité et slides */
        body {
            background: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
        }
        /* transition slides */
        .slide {
            transition: opacity 0.3s ease-in-out;
        }
        .slide-hidden {
            display: none;
        }
        /* coloration douce */
        .card-hover:hover {
            transform: translateY(-2px);
            transition: all 0.2s;
        }
        .bg-soft-blue {
            background-color: #eef2ff;
        }
        .border-soft {
            border-color: #cbd5e1;
        }
        /* on garde une palette accessible */
        h1, h2, h3 {
            letter-spacing: -0.01em;
        }
        .code-block {
            background: #1e293b;
            color: #e2e8f0;
            border-radius: 1rem;
            padding: 1rem;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
        }
        @media (max-width: 640px) {
            .code-block {
                font-size: 0.75rem;
                padding: 0.75rem;
            }
        }
        .badge-git {
            background: #f97316;
            color: white;
            font-weight: 600;
        }
    </style>
</head>
<body class="antialiased">

    <!-- Conteneur principal des slides -->
    <div id="slidesContainer" class="max-w-4xl mx-auto px-4 py-6 md:py-10">
        <!-- dynamique : slides injectés via jQuery -->
    </div>

    <!-- Navigation en bas fixe (mobile friendly) -->
    <div class="fixed bottom-4 left-0 right-0 flex justify-center gap-3 z-20">
        <button id="prevSlideBtn" class="bg-white hover:bg-gray-100 text-gray-800 font-semibold py-2 px-5 rounded-full shadow-md border border-gray-300 transition disabled:opacity-40 disabled:cursor-not-allowed">◀ Précédent</button>
        <button id="nextSlideBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-5 rounded-full shadow-md transition">Suivant ▶</button>
    </div>

    <script>
        // Données de la lesson8 (contenu structuré en slides)
        // D'après le programme: chap3, lesson8 (idLesson: lesson8) -> "Maîtriser Git pour le travail collaboratif"
        // Objectifs de lesson8: 
        // 0: Réviser les commandes de base (clone, add, commit, push, pull)
        // 1: Maîtriser les branches (create, switch, merge, rebase)
        // 2: Résoudre les conflits de fusion
        // Nous allons détailler ces notions en slides pédagogiques
        
        const courseData = {
            title: "Git pour le travail collaboratif",
            subtitle: "Maîtriser les bases, branches et résolution de conflits",
            objectives: [
                "Réviser les commandes fondamentales : clone, add, commit, push, pull",
                "Maîtriser la gestion des branches : création, bascule, fusion (merge) et rebase",
                "Savoir résoudre les conflits de fusion comme un pro",
                "Comprendre le workflow collaboratif avec Git"
            ],
            slidesContent: [
                {
                    type: "concept",
                    title: "📌 Rappel : Commandes de base Git",
                    content: `
                        <p class="mb-3">Git est le couteau suisse du versionnement. Avant d'aller plus loin, révisons les commandes essentielles que tout développeur doit connaître.</p>
                        <div class="grid md:grid-cols-2 gap-4 mt-4">
                            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-orange-400">
                                <p class="font-bold">🔁 git clone</p>
                                <p class="text-sm text-gray-600">Copier un dépôt distant sur sa machine.</p>
                                <div class="code-block text-xs mt-2">git clone https://github.com/exemple/projet.git</div>
                            </div>
                            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-orange-400">
                                <p class="font-bold">➕ git add</p>
                                <p class="text-sm text-gray-600">Ajouter les modifications à l'index (stagging).</p>
                                <div class="code-block text-xs mt-2">git add .   # ou git add monfichier.js</div>
                            </div>
                            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-orange-400">
                                <p class="font-bold">💾 git commit</p>
                                <p class="text-sm text-gray-600">Enregistrer une version locale avec un message.</p>
                                <div class="code-block text-xs mt-2">git commit -m "Ajout fonctionnalité login"</div>
                            </div>
                            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-orange-400">
                                <p class="font-bold">🚀 git push</p>
                                <p class="text-sm text-gray-600">Envoyer les commits vers le dépôt distant.</p>
                                <div class="code-block text-xs mt-2">git push origin main</div>
                            </div>
                            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-orange-400">
                                <p class="font-bold">⬇️ git pull</p>
                                <p class="text-sm text-gray-600">Récupérer et fusionner les changements distants.</p>
                                <div class="code-block text-xs mt-2">git pull origin main</div>
                            </div>
                        </div>
                        <p class="mt-4 text-indigo-700 text-sm bg-indigo-50 p-3 rounded-lg">💡 Astuce : <code class="bg-gray-200 px-1 rounded">git status</code> permet de voir l'état des fichiers à tout moment.</p>
                    `
                },
                {
                    type: "concept",
                    title: "🌿 Travailler avec les branches (create, switch, merge)",
                    content: `
                        <p class="mb-3">Les branches permettent de développer des fonctionnalités en parallèle sans déstabiliser la branche principale (souvent <code class="bg-gray-200 px-1 rounded">main</code> ou <code class="bg-gray-200 px-1 rounded">master</code>).</p>
                        <div class="space-y-4">
                            <div class="bg-white rounded-xl p-4 shadow-sm">
                                <h3 class="font-semibold text-lg">📌 Créer une nouvelle branche</h3>
                                <div class="code-block mt-2">git branch ma-fonctionnalite   # créer la branche\ngit checkout ma-fonctionnalite  # basculer dessus\n# ou en une commande :\ngit checkout -b nouvelle-fonction</div>
                                <p class="text-sm mt-2">(Git moderne utilise aussi <code>git switch -c nouvelle-branche</code>)</p>
                            </div>
                            <div class="bg-white rounded-xl p-4 shadow-sm">
                                <h3 class="font-semibold text-lg">🔄 Fusionner (merge) une branche</h3>
                                <div class="code-block mt-2">git checkout main\ngit merge ma-fonctionnalite</div>
                                <p class="text-sm mt-2">Git applique les commits de la branche sur la branche courante. Simple et efficace !</p>
                            </div>
                            <div class="bg-white rounded-xl p-4 shadow-sm">
                                <h3 class="font-semibold text-lg">⚡ Rebase : une autre façon d'intégrer</h3>
                                <div class="code-block mt-2">git checkout ma-fonctionnalite\ngit rebase main</div>
                                <p class="text-sm mt-2">Le rebase réécrit l'historique en plaçant les commits de la branche comme s'ils étaient développés à partir du dernier état de main. L'historique devient linéaire.</p>
                                <div class="bg-yellow-50 p-2 rounded mt-2 text-amber-800 text-sm">⚠️ Attention : Évitez de rebaser des branches partagées sur des dépôts publics.</div>
                            </div>
                        </div>
                        <!-- petit dessin ascii art pour visualiser merge vs rebase? on peut faire un petit schéma léger -->
                        <div class="mt-6 bg-gray-100 p-4 rounded-lg overflow-x-auto">
                            <pre class="text-xs font-mono">
   Merge classique :        Rebase :
   main:  A---B---C         main:  A---B---C
          \\         →                        \\
   feature: D---E            feature:          D'---E'
   Résultat : A-B-C-D-E (avec commit fusion)   Linéaire : A-B-C-D'-E'
                            </pre>
                            <p class="text-gray-600 text-xs mt-1">Schéma simplifié : le rebase donne un historique plus propre.</p>
                        </div>
                    `
                },
                {
                    type: "concept",
                    title: "⚔️ Résoudre les conflits de fusion",
                    content: `
                        <p class="mb-3">Un conflit survient quand deux branches modifient les mêmes lignes d'un même fichier. Git ne sait pas automatiquement quelle version garder. Voici comment le résoudre sereinement.</p>
                        <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded-lg mb-5">
                            <p class="font-semibold text-red-800">🔧 Étapes pratiques :</p>
                            <ol class="list-decimal list-inside space-y-2 mt-2 text-gray-800">
                                <li>Lancer <code class="bg-gray-200 px-1 rounded">git merge brancheX</code> ou <code class="bg-gray-200 px-1 rounded">git pull</code> → Git signale les fichiers conflictuels.</li>
                                <li>Ouvrir les fichiers en conflit : ils contiennent des marqueurs <span class="font-mono bg-gray-300 px-1">&lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD</span>, <span class="font-mono bg-gray-300 px-1">=======</span>, <span class="font-mono bg-gray-300 px-1">&gt;&gt;&gt;&gt;&gt;&gt;&gt; branche</span>.</li>
                                <li>Modifier le fichier pour garder la version définitive (supprimer les marqueurs).</li>
                                <li>Ajouter le fichier résolu : <code class="bg-gray-200 px-1 rounded">git add fichier_en_conflit.java</code></li>
                                <li>Terminer la fusion : <code class="bg-gray-200 px-1 rounded">git commit</code> (Git crée un commit de fusion).</li>
                            </ol>
                        </div>
                        <div class="bg-white p-4 rounded-xl shadow-sm">
                            <p class="font-medium">💡 Exemple concret de conflit :</p>
                            <div class="code-block text-xs mt-2">
    &lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD
    function saluer() { return "Bonjour le monde!"; }
    =======
    function saluer() { return "Hello DevOps!"; }
    &gt;&gt;&gt;&gt;&gt;&gt;&gt; branche-collaborateur
                            </div>
                            <p class="mt-2 text-sm">Après résolution manuelle, on garde la meilleure version :</p>
                            <div class="code-block text-xs mt-1 bg-green-900">
    function saluer() { return "Bonjour équipe DevOps!"; }
                            </div>
                            <p class="mt-2 text-indigo-600">✅ <strong>git add .</strong> puis <strong>git commit</strong> → conflit terminé.</p>
                        </div>
                        <p class="mt-4 text-sm text-gray-600">✨ Outils comme <strong>git mergetool</strong> peuvent ouvrir des éditeurs graphiques (VSCode, meld) pour faciliter la résolution.</p>
                    `
                },
                {
                    type: "concept",
                    title: "🧑‍🤝‍🧑 Bonnes pratiques collaboratives & workflows",
                    content: `
                        <p class="mb-3">Travailler en équipe avec Git demande des règles simples pour éviter les maux de tête.</p>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div class="bg-white p-4 rounded-xl shadow-md">
                                <div class="flex items-center gap-2"><span class="text-2xl">🔄</span><h3 class="font-bold">Pull avant de push</h3></div>
                                <p class="text-gray-700 text-sm">Toujours faire <code class="bg-gray-100 px-1">git pull --rebase</code> avant de pousser pour intégrer les changements distants.</p>
                            </div>
                            <div class="bg-white p-4 rounded-xl shadow-md">
                                <div class="flex items-center gap-2"><span class="text-2xl">🏷️</span><h3 class="font-bold">Messages de commit clairs</h3></div>
                                <p class="text-gray-700 text-sm">Utilisez l'impératif : "Ajoute validation formulaire" plutôt que "modif".</p>
                            </div>
                            <div class="bg-white p-4 rounded-xl shadow-md">
                                <div class="flex items-center gap-2"><span class="text-2xl">🌱</span><h3 class="font-bold">Branches courtes et nommées</h3></div>
                                <p class="text-gray-700 text-sm">Nommez vos branches par feature : <code>feature/login-oauth</code>, <code>hotfix/urgent-securite</code>.</p>
                            </div>
                            <div class="bg-white p-4 rounded-xl shadow-md">
                                <div class="flex items-center gap-2"><span class="text-2xl">🗑️</span><h3 class="font-bold">Nettoyage après fusion</h3></div>
                                <p class="text-gray-700 text-sm">Supprimez les branches inutiles (<code>git branch -d ma-branche</code>).</p>
                            </div>
                        </div>
                        <div class="mt-5 bg-indigo-50 p-3 rounded-lg text-center">
                            🌟 <strong>Git Flow simplifié</strong> : une branche <code>main</code> pour la production, une branche <code>develop</code> pour l'intégration, et des branches features. Les Pull Requests (GitHub/GitLab) permettent la revue de code.
                        </div>
                    `
                },
                {
                    type: "exercice",
                    title: "🧪 Mini exercice pratique",
                    content: `
                        <p class="font-medium">Mettez en pratique les commandes et la gestion de conflit :</p>
                        <div class="bg-gray-900 text-gray-100 p-5 rounded-2xl mt-3 font-mono text-sm overflow-x-auto">
1. # Initialiser un dépôt ou cloner<br>
2. git init mon-projet && cd mon-projet<br>
3. echo "# Mon Projet" > README.md && git add . && git commit -m "Initial commit"<br>
4. git checkout -b feature/accueil<br>
5. echo "<h1>Bienvenue</h1>" > index.html && git add . && git commit -m "Ajoute page accueil"<br>
6. git checkout main<br>
7. echo "<h1>Site Principal</h1>" > index.html && git add . && git commit -m "Modif page main"<br>
8. git merge feature/accueil   # CONFLIT sur index.html<br>
9. Ouvrez index.html, résolvez le conflit en fusionnant les deux lignes, puis ajoutez et commitez.
                        </div>
                        <p class="mt-4 text-green-700 bg-green-50 p-3 rounded-lg">🎯 Objectif : vous sentez maintenant à l'aise avec les commandes de base, les branches, fusions et résolution de conflit !</p>
                    `
                }
            ]
        };

        // Construction des slides dynamiquement
        let currentSlideIndex = 0;
        let slides = [];

        function buildSlides() {
            const container = $("#slidesContainer");
            container.empty();
            slides = [];
            
            // Slide 0 : Titre et présentation de la leçon
            const titleSlide = $(`
                <div class="slide bg-white rounded-3xl shadow-xl p-6 md:p-10 mb-8 transition-all">
                    <div class="text-center">
                        <div class="inline-block badge-git px-4 py-1 rounded-full text-sm mb-4">Leçon 8 · Git collaboratif</div>
                        <h1 class="text-3xl md:text-5xl font-extrabold bg-gradient-to-r from-orange-600 to-indigo-700 bg-clip-text text-transparent">${courseData.title}</h1>
                        <p class="text-gray-600 text-lg mt-3">${courseData.subtitle}</p>
                        <div class="mt-8 flex justify-center">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" /></svg>
                        </div>
                        <p class="text-sm text-gray-400 mt-6">Appuyez sur Suivant pour commencer ▶</p>
                    </div>
                </div>
            `);
            slides.push(titleSlide);

            // Slide 1 : Objectifs d'apprentissage
            const objectivesHtml = courseData.objectives.map(obj => `<li class="flex items-start gap-3 mb-3"><span class="text-indigo-500 text-xl">✓</span><span>${obj}</span></li>`).join('');
            const objectivesSlide = $(`
                <div class="slide bg-white rounded-3xl shadow-xl p-6 md:p-10 mb-8">
                    <h2 class="text-2xl md:text-3xl font-bold border-b border-gray-200 pb-3 mb-5">🎯 Objectifs de la leçon</h2>
                    <ul class="space-y-2 text-gray-700 text-lg">
                        ${objectivesHtml}
                    </ul>
                    <div class="mt-8 bg-soft-blue p-4 rounded-xl">
                        <p class="font-semibold">🔍 À la fin de ce cours, vous saurez collaborer efficacement avec Git, gérer les branches et sortir de tout conflit.</p>
                    </div>
                </div>
            `);
            slides.push(objectivesSlide);

            // Slides de contenu (concept + exercices)
            courseData.slidesContent.forEach((slideData, idx) => {
                let bgExtra = slideData.type === 'exercice' ? 'border-t-8 border-t-green-500' : '';
                const slideHtml = $(`
                    <div class="slide bg-white rounded-3xl shadow-xl p-6 md:p-10 mb-8 ${bgExtra}">
                        <div class="flex items-center gap-2 mb-4">
                            <span class="text-3xl">${slideData.type === 'concept' ? '📘' : '✏️'}</span>
                            <h2 class="text-2xl font-bold text-gray-800">${slideData.title}</h2>
                        </div>
                        <div class="prose max-w-none text-gray-700">
                            ${slideData.content}
                        </div>
                        ${slideData.type === 'exercice' ? '<div class="mt-6 text-sm text-gray-500 italic">💡 N’hésitez pas à reproduire l’exercice sur votre terminal.</div>' : ''}
                    </div>
                `);
                slides.push(slideHtml);
            });

            // Ajout d'un slide final récapitulatif / conclusion
            const congratsSlide = $(`
                <div class="slide bg-gradient-to-br from-indigo-50 to-white rounded-3xl shadow-xl p-8 md:p-12 text-center">
                    <span class="text-6xl">🎉</span>
                    <h2 class="text-3xl font-bold mt-3">Félicitations !</h2>
                    <p class="text-gray-700 text-lg mt-4">Vous avez terminé la leçon sur Git collaboratif. Vous savez maintenant utiliser les commandes de base, les branches, merger, rebaser et gérer les conflits.</p>
                    <div class="mt-8 p-4 bg-orange-100 rounded-2xl inline-block">
                        <p class="font-mono">git --version && git log --oneline</p>
                    </div>
                    <p class="mt-6 text-sm">Revenez en arrière pour réviser ou passez à la pratique réelle sur GitHub !</p>
                </div>
            `);
            slides.push(congratsSlide);

            // Affichage des slides dans le container
            slides.forEach((slide, i) => {
                slide.addClass('slide-hidden');
                container.append(slide);
            });
            showSlide(currentSlideIndex);
        }

        function showSlide(index) {
            if (index < 0) index = 0;
            if (index >= slides.length) index = slides.length - 1;
            slides.forEach((slide, i) => {
                if (i === index) {
                    slide.removeClass('slide-hidden').fadeIn(200);
                } else {
                    slide.addClass('slide-hidden').hide();
                }
            });
            currentSlideIndex = index;
            // gestion état boutons
            $("#prevSlideBtn").prop('disabled', currentSlideIndex === 0);
            if (currentSlideIndex === slides.length - 1) {
                $("#nextSlideBtn").text('Terminé ✔️');
            } else {
                $("#nextSlideBtn").text('Suivant ▶');
            }
        }

        function nextSlide() {
            if (currentSlideIndex < slides.length - 1) {
                showSlide(currentSlideIndex + 1);
            } else {
                // Fin du parcours, on peut afficher une notification non intrusive
                alert("🎓 Bravo ! Vous avez parcouru tous les slides. Rechargez la page pour revoir la leçon.");
            }
        }

        function prevSlide() {
            if (currentSlideIndex > 0) {
                showSlide(currentSlideIndex - 1);
            }
        }

        $(document).ready(function () {
            buildSlides();
            // Événements de navigation
            $("#nextSlideBtn").on("click", nextSlide);
            $("#prevSlideBtn").on("click", prevSlide);
            // Support clavier gauche/droite
            $(document).keydown(function(e) {
                if (e.key === "ArrowRight") {
                    nextSlide();
                } else if (e.key === "ArrowLeft") {
                    prevSlide();
                }
            });
            // Adaptation mobile du padding pour le contenu
            $(".code-block").each(function() {
                if ($(this).width() > $(window).width() - 40) {
                    $(this).css("overflow-x", "auto");
                }
            });
        });
    </script>
    <!-- note de bas de page (non intrusive) -->
    <div class="text-center text-xs text-gray-400 py-6 max-w-4xl mx-auto px-4">
        📖 Programme DevOps — Chapitre 3 : Maîtriser Git pour le travail collaboratif | Lesson 8
    </div>
</body>
</html>
