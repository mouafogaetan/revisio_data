<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 38 : Mise en place CI/CD, Docker & Kubernetes | Cours DevOps</title>
    <!-- Tailwind CSS + Font Awesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (pour formules mathématiques si besoin) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* Ajustements personnalisés pour slides et lisibilité */
        body {
            background: linear-gradient(145deg, #f3f6fc 0%, #eef2f7 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        .slide-container {
            transition: all 0.3s ease;
        }
        .slide-card {
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.25), 0 1px 2px rgba(0,0,0,0.05);
            transition: transform 0.2s ease;
        }
        .nav-btn {
            transition: all 0.2s;
            background: white;
            border-radius: 60px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .nav-btn:hover:not(:disabled) {
            background: #1e293b;
            color: white;
            transform: scale(1.03);
        }
        .progress-bar {
            height: 6px;
            background: #cbd5e1;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #0f3b5c;
            transition: width 0.3s ease;
        }
        @media (max-width: 640px) {
            .slide-card {
                border-radius: 1.5rem;
                padding: 1.25rem !important;
            }
            h1 {
                font-size: 1.8rem !important;
            }
            h2 {
                font-size: 1.4rem !important;
            }
        }
        /* style pour les listes et lisibilité */
        .objective-item, .content-item {
            margin-bottom: 0.75rem;
            line-height: 1.4;
        }
        .code-block {
            background: #0f172a;
            color: #e2e8f0;
            padding: 0.9rem;
            border-radius: 1rem;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
        }
        .badge-tech {
            background: #e0f2fe;
            color: #0369a1;
            border-radius: 40px;
            padding: 0.2rem 0.8rem;
            font-size: 0.75rem;
            font-weight: 600;
        }
    </style>
</head>
<body class="antialiased">

    <div class="max-w-4xl mx-auto px-4 py-6 md:py-10">
        <!-- En-tête simple avec progression -->
        <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
            <div class="text-sm font-medium text-slate-500 bg-white/60 px-4 py-1 rounded-full shadow-sm">
                📘 DevOps · Initiation
            </div>
            <div class="text-sm font-medium text-slate-600 bg-white/60 px-4 py-1 rounded-full shadow-sm">
                Leçon 38 / 39 : Pipeline complet
            </div>
        </div>

        <!-- Zone slide principale -->
        <div class="slide-container relative">
            <div id="slide-wrapper" class="slide-card p-6 md:p-10 transition-all duration-300">
                <!-- Contenu injecté dynamiquement par jQuery -->
                <div id="dynamic-slide-content">
                    <!-- le JS remplacera -->
                </div>
            </div>

            <!-- Indicateur de progression et boutons navigation -->
            <div class="mt-6 flex flex-col sm:flex-row justify-between items-center gap-4">
                <div class="progress-bar w-full sm:w-2/3">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
                <div class="flex gap-3">
                    <button id="prevBtn" class="nav-btn px-5 py-2 text-sm font-semibold border border-slate-300 disabled:opacity-40" disabled>◀ Précédent</button>
                    <button id="nextBtn" class="nav-btn px-5 py-2 text-sm font-semibold border border-slate-300">Suivant ▶</button>
                </div>
            </div>
            <p class="text-center text-xs text-slate-400 mt-3">Utilise les boutons pour naviguer entre les diapositives</p>
        </div>

        <!-- petite note sur les outils -->
        <div class="mt-8 text-center text-xs text-slate-400 border-t pt-4">
            <span>🧠 Culture DevOps · CI/CD · Docker · Kubernetes · Pratique terrain</span>
        </div>
    </div>

    <script>
        $(document).ready(function(){

            // --- Définition des slides pour la leçon 38 (intitulé: "Configurer le CI/CD, containeriser avec Docker, déployer sur Kubernetes")
            // Conforme au programme: lesson38 = Configurer le CI/CD (GitHub Actions ou GitLab CI) + Containeriser avec Docker + Déployer sur Kubernetes (Minikube ou cloud)

            const slides = [
                { // Slide 0 : Titre principal
                    type: "title",
                    titre: "🚀 Mise en place d’une chaîne DevOps complète",
                    sousTitre: "CI/CD · Docker · Kubernetes",
                    description: "Leçon 38 : Configurer l’intégration continue, empaqueter l’application avec Docker et la déployer sur un cluster Kubernetes."
                },
                { // Slide 1 : Objectifs pédagogiques
                    type: "objectifs",
                    title: "🎯 Objectifs de la leçon",
                    list: [
                        "✅ Configurer un pipeline CI/CD fonctionnel (GitHub Actions ou GitLab CI)",
                        "🐳 Containeriser une application avec Docker (Dockerfile, image)",
                        "☸️ Déployer l’application sur Kubernetes (Minikube ou cluster cloud)",
                        "🔁 Comprendre l’enchaînement : code → image → déploiement orchestré",
                        "🛠️ Utiliser les fichiers YAML pour les ressources Kubernetes"
                    ]
                },
                { // Slide 2 : Introduction pipeline CI/CD
                    type: "content",
                    title: "🔄 1. Pipeline CI/CD : cœur de l'automatisation",
                    content: `
                        <p class="mb-3">L’intégration continue (CI) et le déploiement continu (CD) permettent de <strong>tester, builder et déployer</strong> automatiquement à chaque modification du code.</p>
                        <div class="bg-indigo-50 p-4 rounded-xl border-l-8 border-indigo-400 my-4">
                            <p class="font-semibold">📌 Pour notre projet :</p>
                            <ul class="list-disc pl-5 mt-2 space-y-1">
                                <li>Dépôt Git (GitHub/GitLab) → déclenchement pipeline</li>
                                <li>Build et test → construction image Docker</li>
                                <li>Push image vers registre (Docker Hub / GitLab registry)</li>
                                <li>Déploiement automatique sur Kubernetes (kubectl apply)</li>
                            </ul>
                        </div>
                        <p>💡 <span class="font-mono text-sm bg-gray-100 px-1">.github/workflows/ci-cd.yml</span> ou <span class="font-mono text-sm bg-gray-100 px-1">.gitlab-ci.yml</span> décrivent les étapes.</p>
                    `
                },
                { // Slide 3 : Exemple GitHub Actions simplifié
                    type: "content",
                    title: "⚙️ 2. Exemple concret : Workflow GitHub Actions",
                    content: `
                        <p class="mb-2">Voici un extrait YAML pour une application Node.js :</p>
                        <div class="code-block text-sm mb-4">
                            <pre style="margin:0; white-space: pre-wrap; word-break: break-word;">name: CI/CD Pipeline
on: push
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Build Docker image
        run: docker build -t monapp:latest .
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      - name: Push image
        run: |
          docker tag monapp:latest monuser/monapp:latest
          docker push monuser/monapp:latest
      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/monapp-deploy monapp=monuser/monapp:latest
          kubectl rollout status deployment/monapp-deploy</pre>
                        </div>
                        <p>🔐 Les secrets (Docker Hub, kubeconfig) sont stockés dans les variables secrètes du dépôt.</p>
                    `
                },
                { // Slide 4 : Containerisation Docker
                    type: "content",
                    title: "🐳 3. Containerisation avec Docker",
                    content: `
                        <p>Pour que l’application soit portable et facile à déployer sur Kubernetes, on crée un <strong>Dockerfile</strong>. Exemple pour une app Python/Node :</p>
                        <div class="code-block my-3">
                            <pre>FROM node:18-alpine
WORKDIR /app
COPY package*.json ./
RUN npm install
COPY . .
EXPOSE 3000
CMD ["node", "server.js"]</pre>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mt-3">
                            <div class="bg-gray-50 p-3 rounded-lg"><span class="font-bold">🔨 Build :</span> <code class="text-sm bg-gray-200 px-1 rounded">docker build -t monapp-web .</code></div>
                            <div class="bg-gray-50 p-3 rounded-lg"><span class="font-bold">🏷️ Tag :</span> <code class="text-sm bg-gray-200 px-1 rounded">docker tag monapp-web monlogin/monapp:v1</code></div>
                            <div class="bg-gray-50 p-3 rounded-lg"><span class="font-bold">📤 Push :</span> <code class="text-sm bg-gray-200 px-1 rounded">docker push monlogin/monapp:v1</code></div>
                            <div class="bg-gray-50 p-3 rounded-lg"><span class="font-bold">✅ Vérifier :</span> <code class="text-sm bg-gray-200 px-1 rounded">docker images</code></div>
                        </div>
                    `
                },
                { // Slide 5 : Kubernetes - Déploiement (Deployment + Service)
                    type: "content",
                    title: "☸️ 4. Déployer sur Kubernetes (Manifests)",
                    content: `
                        <p>On écrit deux fichiers YAML essentiels : <strong>deployment.yaml</strong> et <strong>service.yaml</strong>.</p>
                        <div class="code-block text-xs mt-2 mb-3">
<pre># deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: monapp-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: monapp
  template:
    metadata:
      labels:
        app: monapp
    spec:
      containers:
      - name: monapp
        image: monlogin/monapp:latest
        ports:
        - containerPort: 3000</pre>
<pre># service.yaml (ClusterIP ou NodePort)
apiVersion: v1
kind: Service
metadata:
  name: monapp-service
spec:
  selector:
    app: monapp
  ports:
    - port: 80
      targetPort: 3000
  type: NodePort</pre>
                        </div>
                        <p>📦 Commandes : <code class="bg-gray-100 px-1 rounded">kubectl apply -f deployment.yaml</code> puis <code class="bg-gray-100 px-1 rounded">kubectl apply -f service.yaml</code>.</p>
                    `
                },
                { // Slide 6 : Mise en pratique & Minikube
                    type: "content",
                    title: "💻 5. Test local avec Minikube",
                    content: `
                        <div class="flex flex-wrap gap-2 mb-3">
                            <span class="badge-tech">🖥️ Minikube</span>
                            <span class="badge-tech">📦 Kubectl</span>
                            <span class="badge-tech">🐳 Docker</span>
                        </div>
                        <p>Pour déployer en local comme sur un vrai cluster :</p>
                        <ol class="list-decimal pl-6 space-y-2 mt-2">
                            <li><strong>Démarrer Minikube</strong> : <code class="bg-gray-100 px-1 rounded">minikube start</code></li>
                            <li><strong>Utiliser le même registre Docker</strong> : <code class="bg-gray-100 px-1 rounded">eval $(minikube docker-env)</code> (optionnel) ou push vers un registre accessible</li>
                            <li><strong>Appliquer les manifests</strong> : <code class="bg-gray-100 px-1 rounded">kubectl apply -f .</code></li>
                            <li><strong>Vérifier les pods</strong> : <code class="bg-gray-100 px-1 rounded">kubectl get pods</code></li>
                            <li><strong>Accéder à l'application</strong> : <code class="bg-gray-100 px-1 rounded">minikube service monapp-service</code></li>
                        </ol>
                        <div class="mt-4 bg-teal-50 p-3 rounded-xl text-teal-800 text-sm">✨ <span class="font-semibold">Astuce enseignant :</span> Pour un cloud réel, on utilise un contexte kubectl sur AKS/EKS/GKE et on ajuste l’Ingress.</div>
                    `
                },
                { // Slide 7 : Résumé & bonnes pratiques
                    type: "content",
                    title: "📌 Récapitulatif & Bonnes pratiques",
                    content: `
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mt-1">
                            <div class="bg-white border rounded-xl p-4 shadow-sm">
                                <p class="font-bold text-indigo-700">🔁 Chaîne complète</p>
                                <ul class="list-disc pl-5 text-sm mt-2 space-y-1">
                                    <li>Code ➔ CI (test, build) ➔ Docker ➔ Registry ➔ CD (kubectl) ➔ Cluster</li>
                                    <li>GitHub Actions + Docker Hub + Kubernetes = automatisation totale</li>
                                </ul>
                            </div>
                            <div class="bg-white border rounded-xl p-4 shadow-sm">
                                <p class="font-bold text-indigo-700">✅ Vérifications</p>
                                <ul class="list-disc pl-5 text-sm mt-2 space-y-1">
                                    <li><code>kubectl rollout status</code> pour le suivi</li>
                                    <li>Mettre à jour l'image via le pipeline avec nouveau tag</li>
                                    <li>Utiliser <strong>namespaces</strong> pour séparer les environnements</li>
                                </ul>
                            </div>
                        </div>
                        <p class="mt-4 italic text-gray-600">🎯 Objectif : chaque commit peut devenir une version déployable en production.</p>
                    `
                },
                { // Slide 8 : Exercice pratique / à faire
                    type: "content",
                    title: "🧪 Activité pratique (à réaliser)",
                    content: `
                        <p class="font-medium">Travail à faire par équipe :</p>
                        <div class="bg-amber-50 p-4 rounded-xl mt-3 border border-amber-200">
                            <ol class="list-decimal pl-5 space-y-2">
                                <li>Choisissez une mini-application (ex: API Express ou Flask).</li>
                                <li>Écrivez un Dockerfile et testez en local.</li>
                                <li>Configurez un workflow GitHub Actions qui construit l’image et la pousse sur Docker Hub.</li>
                                <li>Écrivez les manifests Kubernetes (Deployment + Service).</li>
                                <li>Déployez sur Minikube et vérifiez que l’application répond.</li>
                            </ol>
                            <p class="mt-3 text-sm">💡 Utilisez les ressources du cours et n’hésitez pas à vous entraider !</p>
                        </div>
                        <div class="mt-4 text-center">
                            <span class="inline-flex items-center gap-1 text-sm bg-slate-100 px-3 py-1 rounded-full">📎 Rendu : dépôt Git + capture du pipeline réussi</span>
                        </div>
                    `
                }
            ];

            let currentSlide = 0;
            const totalSlides = slides.length;

            // Fonction pour rendre le contenu selon type
            function renderSlide(index) {
                const slide = slides[index];
                let html = '';
                const progressPercent = ((index + 1) / totalSlides) * 100;
                $('#progressFill').css('width', `${progressPercent}%`);

                if (slide.type === 'title') {
                    html = `
                        <div class="text-center py-4 md:py-8">
                            <h1 class="text-3xl md:text-4xl font-extrabold bg-gradient-to-r from-[#0f3b5c] to-[#1e6f5c] bg-clip-text text-transparent">${slide.titre}</h1>
                            <p class="text-xl md:text-2xl font-semibold mt-3 text-slate-700">${slide.sousTitre}</p>
                            <div class="w-24 h-1 bg-teal-500 mx-auto my-5 rounded-full"></div>
                            <p class="text-gray-600 max-w-lg mx-auto">${slide.description}</p>
                            <div class="mt-8 flex justify-center gap-3 flex-wrap">
                                <span class="px-4 py-2 bg-slate-100 rounded-full text-sm">🐙 GitHub Actions</span>
                                <span class="px-4 py-2 bg-slate-100 rounded-full text-sm">🐳 Docker</span>
                                <span class="px-4 py-2 bg-slate-100 rounded-full text-sm">☸️ Kubernetes</span>
                            </div>
                        </div>
                    `;
                } 
                else if (slide.type === 'objectifs') {
                    html = `<div><h2 class="text-2xl md:text-3xl font-bold text-[#0f3b5c] border-l-6 border-[#1e6f5c] pl-4 mb-6">${slide.title}</h2><ul class="space-y-3">`;
                    slide.list.forEach(item => {
                        html += `<li class="flex items-start gap-3 bg-gray-50 p-3 rounded-xl shadow-sm"><span class="text-green-600 text-xl">✓</span><span class="text-gray-800">${item}</span></li>`;
                    });
                    html += `</ul><div class="mt-6 p-3 bg-blue-50 rounded-lg text-blue-800 text-sm">🎓 À la fin de cette leçon, vous serez capable de réaliser un déploiement moderne DevOps.</div></div>`;
                }
                else if (slide.type === 'content') {
                    html = `<div><h2 class="text-2xl md:text-3xl font-bold text-[#0f3b5c] border-l-6 border-[#1e6f5c] pl-4 mb-5">${slide.title}</h2><div class="prose max-w-none text-gray-700">${slide.content}</div></div>`;
                }

                $('#dynamic-slide-content').fadeOut(150, function(){
                    $(this).html(html).fadeIn(200);
                });

                // Gestion des boutons prev/next
                $('#prevBtn').prop('disabled', index === 0);
                $('#nextBtn').prop('disabled', index === totalSlides - 1).text(index === totalSlides - 1 ? "Terminé ✓" : "Suivant ▶");
            }

            // Navigation
            function nextSlide() {
                if (currentSlide < totalSlides - 1) {
                    currentSlide++;
                    renderSlide(currentSlide);
                } else {
                    // fin du cours, afficher un petit message de félicitations
                    if(currentSlide === totalSlides - 1){
                        alert("🎉 Félicitations ! Vous avez terminé la leçon 38. Entraînez-vous avec l'activité pratique pour maîtriser la chaîne DevOps complète.");
                    }
                }
            }

            function prevSlide() {
                if (currentSlide > 0) {
                    currentSlide--;
                    renderSlide(currentSlide);
                }
            }

            $('#nextBtn').on('click', nextSlide);
            $('#prevBtn').on('click', prevSlide);

            // Initialisation
            renderSlide(0);

            // Option au clavier (flèches) pour faciliter
            $(document).keydown(function(e) {
                if (e.key === 'ArrowRight') {
                    nextSlide();
                } else if (e.key === 'ArrowLeft') {
                    prevSlide();
                }
            });
        });
    </script>
</body>
</html>
