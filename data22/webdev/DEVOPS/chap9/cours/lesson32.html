<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cours DevOps - Leçon 32 : Modèles Cloud (IaaS, PaaS, SaaS)</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (optionnel pour formules, mais présent au cas où) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <!-- Police & icônes simple -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f4f7fc;
            scroll-behavior: smooth;
        }
        /* Transition pour les slides */
        .slide {
            display: none;
            transition: all 0.3s ease;
        }
        .slide.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .progress-bar {
            transition: width 0.2s linear;
        }
        /* personnalisation des couleurs pour un bon contraste */
        .card-hover:hover {
            transform: translateY(-4px);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.1);
        }
        .btn-nav {
            transition: background 0.2s, transform 0.1s;
        }
        .btn-nav:active {
            transform: scale(0.96);
        }
        /* couleurs douces pour le texte */
        .soft-text {
            color: #1e293b;
        }
        .bg-soft-blue {
            background-color: #eef2ff;
        }
    </style>
</head>
<body class="antialiased">

    <div class="max-w-5xl mx-auto px-4 py-6 md:py-10">
        <!-- Conteneur principal slides -->
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
            
            <!-- Barre de progression stylisée -->
            <div class="h-1.5 w-full bg-gray-200">
                <div id="progressFill" class="progress-bar h-full bg-gradient-to-r from-blue-600 to-indigo-500 w-0"></div>
            </div>
            
            <!-- En-tête avec compteur -->
            <div class="flex justify-between items-center px-6 pt-5 pb-2 text-sm text-gray-500 border-b border-gray-100">
                <div class="flex gap-2 items-center">
                    <span class="font-semibold text-indigo-700">📘 DevOps · Leçon 32</span>
                </div>
                <div>
                    <span id="slideCounter" class="bg-gray-100 px-3 py-1 rounded-full text-xs font-medium">1 / 0</span>
                </div>
            </div>
            
            <!-- Zone des slides dynamiques -->
            <div id="slidesContainer" class="p-5 md:p-8">
                <!-- Les slides seront injectées ici via JS -->
            </div>
            
            <!-- Navigation -->
            <div class="flex justify-between items-center px-6 py-5 bg-gray-50 border-t border-gray-200">
                <button id="prevBtn" class="btn-nav px-5 py-2.5 rounded-xl bg-white border border-gray-300 text-gray-700 font-medium hover:bg-gray-100 disabled:opacity-40 disabled:cursor-not-allowed transition">
                    ← Précédent
                </button>
                <div class="flex gap-2">
                    <span class="text-xs text-gray-400 hidden sm:inline">Naviguez avec les boutons</span>
                </div>
                <button id="nextBtn" class="btn-nav px-6 py-2.5 rounded-xl bg-indigo-600 text-white font-medium shadow-md hover:bg-indigo-700 transition">
                    Suivant →
                </button>
            </div>
        </div>
        
        <!-- Petit rappel pédagogique (optionnel) -->
        <div class="text-center text-xs text-gray-400 mt-6">
            📌 Diaporama interactif – Cours d'initiation au Cloud (IaaS, PaaS, SaaS)
        </div>
    </div>

    <script>
        // Définition des slides pour la leçon 32 : "Comprendre les modèles (IaaS, PaaS, SaaS)"
        // Slide 0 : Titre de la leçon
        // Slide 1 : Objectifs d'apprentissage
        // Slides 2,3,4 : Contenu détaillé + schémas dessinés maison (SVG/HTML)
        // Slides supplémentaires : Comparatifs, exemples, récapitulatif

        const slidesData = [
            {
                type: "title",
                titre: "☁️ Les modèles du Cloud Computing",
                sousTitre: "IaaS · PaaS · SaaS",
                description: "Comprendre les fondements du cloud et choisir le bon service pour vos projets DevOps.",
                icone: "🌩️"
            },
            {
                type: "objectifs",
                titre: "🎯 Objectifs d'apprentissage",
                objectifs: [
                    "🗂️ Distinguer les trois principaux modèles de services cloud : IaaS, PaaS, SaaS.",
                    "⚙️ Comprendre les cas d'usage et les bénéfices de chaque modèle.",
                    "🏢 Identifier les providers majeurs (AWS, Azure, GCP) et leurs offres emblématiques.",
                    "📊 Comparer la responsabilité client/fournisseur (sécurité, gestion, scalabilité).",
                    "🧠 Choisir le bon modèle selon le contexte métier et technique."
                ]
            },
            {
                type: "content",
                titre: "🏗️ IaaS : Infrastructure as a Service",
                sousTitre: "La base, la flexibilité maximale",
                contenu: `<p class="mb-4">L’<span class="font-bold text-indigo-700">IaaS</span> fournit des ressources informatiques virtualisées via Internet (serveurs, stockage, réseau). Vous gérez les OS, middleware et applications. Idéal pour les équipes DevOps qui veulent un contrôle total sans gérer le hardware physique.</p>
                <div class="bg-gradient-to-br from-gray-50 to-blue-50 p-5 rounded-xl my-4 border border-blue-100">
                    <p class="font-semibold text-gray-800 mb-2">📦 Exemples populaires :</p>
                    <ul class="list-disc list-inside space-y-1 text-gray-700">
                        <li><strong>AWS</strong> : EC2 (calcul), S3 (stockage), VPC (réseau)</li>
                        <li><strong>Azure</strong> : Virtual Machines, Blob Storage</li>
                        <li><strong>GCP</strong> : Compute Engine, Cloud Storage</li>
                    </ul>
                </div>
                <div class="flex justify-center my-4">
                    <div class="bg-white border rounded-lg p-3 shadow-sm max-w-full overflow-auto">
                        <!-- Schéma dessiné maison SVG : IaaS -->
                        <svg width="100%" height="120" viewBox="0 0 600 100" xmlns="http://www.w3.org/2000/svg" class="max-w-full" style="height: auto;">
                            <rect x="10" y="20" width="560" height="70" rx="12" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5" stroke-dasharray="4 2"/>
                            <text x="30" y="48" font-size="12" fill="#1e1b4b">👤 Vous gérez :</text>
                            <text x="30" y="68" font-size="13" font-weight="bold" fill="#0f172a">App + Données + OS + Middleware</text>
                            <text x="30" y="86" font-size="11" fill="#475569">Le Cloud fournit : Virtualisation, Stockage, Réseau</text>
                            <rect x="450" y="25" width="110" height="55" rx="8" fill="#c7d2fe" stroke="#4f46e5" stroke-width="1"/>
                            <text x="470" y="55" font-size="12" fill="#1e1b4b">Fournisseur</text>
                            <text x="470" y="70" font-size="11" fill="#3730a3">Matériel / Hyperviseur</text>
                        </svg>
                    </div>
                </div>
                <p class="text-sm text-gray-600 mt-3">✅ Avantages : Élasticité, paiement à l’usage, contrôle total. Idéal pour migrations "lift & shift".</p>`
            },
            {
                type: "content",
                titre: "⚙️ PaaS : Platform as a Service",
                sousTitre: "Développez sans vous soucier de l’infrastructure",
                contenu: `<p class="mb-4">Le <span class="font-bold text-indigo-700">PaaS</span> met à disposition une plateforme complète (OS, base de données, serveur web, runtime). Vous vous concentrez uniquement sur le code et les données. Parfait pour les développeurs qui veulent livrer rapidement sans administrer les serveurs.</p>
                <div class="bg-gradient-to-br from-gray-50 to-emerald-50 p-5 rounded-xl my-4 border border-emerald-100">
                    <p class="font-semibold text-gray-800 mb-2">✨ Exemples notables :</p>
                    <ul class="list-disc list-inside space-y-1 text-gray-700">
                        <li><strong>Heroku</strong> (déploiement git simple)</li>
                        <li><strong>Google App Engine</strong>, <strong>AWS Elastic Beanstalk</strong></li>
                        <li><strong>Azure App Service</strong> (web apps, API)</li>
                    </ul>
                </div>
                <div class="flex justify-center my-4">
                    <div class="bg-white border rounded-lg p-3 shadow-sm">
                        <svg width="100%" height="110" viewBox="0 0 600 100" xmlns="http://www.w3.org/2000/svg" class="max-w-full">
                            <rect x="10" y="15" width="560" height="75" rx="12" fill="#dcfce7" stroke="#10b981" stroke-width="1.5"/>
                            <text x="30" y="40" font-size="12" fill="#064e3b">👨‍💻 Vous gérez : Votre application + Données</text>
                            <text x="30" y="60" font-size="13" font-weight="bold" fill="#065f46">Le fournisseur gère : OS, runtime, middleware, mise à l'échelle auto</text>
                            <rect x="460" y="22" width="98" height="55" rx="8" fill="#a7f3d0" stroke="#10b981"/>
                            <text x="474" y="52" font-size="11" fill="#064e3b">PaaS Provider</text>
                            <text x="478" y="67" font-size="10" fill="#047857">(Runtime, DB, Scaling)</text>
                        </svg>
                    </div>
                </div>
                <p class="text-sm text-gray-600">🚀 Productivité accrue, zero gestion de patchs, intégration CI/CD native.</p>`
            },
            {
                type: "content",
                titre: "💻 SaaS : Software as a Service",
                sousTitre: "Prêt à l'emploi, accessible depuis n'importe où",
                contenu: `<p class="mb-4">Le <span class="font-bold text-indigo-700">SaaS</span> offre des applications complètes hébergées et maintenues par le fournisseur. Vous y accédez via un navigateur. Aucune gestion technique nécessaire. Idéal pour les utilisateurs finaux et les entreprises qui veulent des solutions clé en main.</p>
                <div class="bg-gradient-to-br from-gray-50 to-purple-50 p-5 rounded-xl my-4 border border-purple-100">
                    <p class="font-semibold text-gray-800 mb-2">📱 Exemples courants :</p>
                    <ul class="list-disc list-inside space-y-1 text-gray-700">
                        <li><strong>Google Workspace</strong> (Gmail, Drive, Docs)</li>
                        <li><strong>Microsoft 365</strong>, <strong>Salesforce</strong>, <strong>Dropbox</strong>, <strong>Slack</strong></li>
                    </ul>
                </div>
                <div class="flex justify-center my-4">
                    <svg width="100%" height="110" viewBox="0 0 600 100" xmlns="http://www.w3.org/2000/svg" class="max-w-full">
                        <rect x="10" y="15" width="560" height="75" rx="12" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
                        <text x="30" y="42" font-size="12" fill="#4c1d95">🙋 Utilisateur final : Utilise l’application directement</text>
                        <text x="30" y="62" font-size="13" font-weight="bold" fill="#5b21b6">Fournisseur gère tout : Infra, plateforme, applicatif, sécurité</text>
                        <rect x="455" y="22" width="105" height="58" rx="8" fill="#d8b4fe" stroke="#8b5cf6"/>
                        <text x="469" y="52" font-size="11" fill="#4c1d95">SaaS</text>
                        <text x="468" y="68" font-size="10" fill="#6d28d9">Application complète</text>
                    </svg>
                </div>
                <p class="text-sm text-gray-600">📌 Mise à jour automatique, accessibilité mobile, abonnement simple. Idéal pour les startups et les équipes non techniques.</p>`
            },
            {
                type: "comparaison",
                titre: "📊 Comparaison : Responsabilités partagées",
                description: "Qui gère quoi ? (Niveau de contrôle vs abstraction)",
                tableData: {
                    headers: ["Composant", "IaaS", "PaaS", "SaaS"],
                    rows: [
                        ["Applications", "✅ Client", "✅ Client", "✅ Fournisseur"],
                        ["Données", "✅ Client", "✅ Client", "⚠️ Client (données métier) / Fournisseur (app)"],
                        ["Runtime / Middleware", "✅ Client", "✅ Fournisseur", "✅ Fournisseur"],
                        ["OS & Virtualisation", "✅ Client (OS invité)", "✅ Fournisseur", "✅ Fournisseur"],
                        ["Matériel (serveurs, réseau)", "✅ Fournisseur", "✅ Fournisseur", "✅ Fournisseur"]
                    ]
                }
            },
            {
                type: "conseils",
                titre: "🔍 Comment bien choisir ?",
                contenu: `<div class="grid grid-cols-1 md:grid-cols-3 gap-5 mt-3">
                    <div class="bg-blue-50 p-4 rounded-xl border-l-4 border-blue-500"><span class="font-bold block text-blue-800">🏢 IaaS</span><span class="text-sm">Flexibilité extrême, équipes DevOps chevronnées, applications legacy, besoin de config réseau spécifique.</span></div>
                    <div class="bg-emerald-50 p-4 rounded-xl border-l-4 border-emerald-500"><span class="font-bold block text-emerald-800">⚡ PaaS</span><span class="text-sm">Développement rapide, startups, microservices, sans se soucier des serveurs, scalabilité automatique.</span></div>
                    <div class="bg-purple-50 p-4 rounded-xl border-l-4 border-purple-500"><span class="font-bold block text-purple-800">📱 SaaS</span><span class="text-sm">Solutions bureautiques, CRM, collaboration, réduction des coûts de maintenance IT.</span></div>
                </div>
                <p class="mt-5 text-gray-700 italic text-sm bg-gray-100 p-3 rounded-lg">💡 Dans un environnement DevOps moderne, on utilise souvent les trois : IaaS pour l’infra critique, PaaS pour le déploiement d’applications, et SaaS pour la gestion (GitHub, Slack, etc.).</p>`
            },
            {
                type: "recap",
                titre: "📝 Récapitulatif & Exercice réflexif",
                contenu: `<ul class="list-disc pl-5 space-y-2 text-gray-800">
                    <li><strong>IaaS</strong> → Le cloud vous loue des machines virtuelles et du stockage.</li>
                    <li><strong>PaaS</strong> → Plateforme prête à déployer votre code (sans gérer l’OS).</li>
                    <li><strong>SaaS</strong> → Application toute prête, il ne reste qu'à l'utiliser.</li>
                </ul>
                <div class="bg-yellow-50 p-4 rounded-xl mt-5 border border-yellow-200">
                    <p class="font-semibold">🧠 À vous de jouer :</p>
                    <p class="text-sm">Votre entreprise souhaite créer une application web interne de gestion des stocks, avec des pics de trafic imprévisibles. Quelle offre choisiriez-vous ? Pourquoi ? Discutez en classe ou répondez en commentaire.</p>
                </div>
                <div class="mt-4 text-center text-indigo-600 text-xs">Prochaine étape : Découverte des régions et zones de disponibilité (Lesson 32 suite).</div>`
            }
        ];

        let currentIndex = 0;
        let totalSlides = slidesData.length;

        // Fonction pour afficher le slide
        function renderSlide(index) {
            const data = slidesData[index];
            let html = '';
            
            if (data.type === 'title') {
                html = `
                    <div class="text-center py-8 md:py-12">
                        <div class="text-6xl mb-4">${data.icone || '☁️'}</div>
                        <h1 class="text-3xl md:text-4xl font-extrabold bg-gradient-to-r from-indigo-700 to-blue-600 bg-clip-text text-transparent">${data.titre}</h1>
                        <p class="text-xl text-gray-600 mt-3 font-medium">${data.sousTitre}</p>
                        <div class="mt-6 bg-blue-50 inline-block px-6 py-3 rounded-full text-indigo-800 text-sm">${data.description}</div>
                        <div class="mt-10 text-gray-400 text-sm">⬅️ Utilisez les boutons pour naviguer ➡️</div>
                    </div>
                `;
            } 
            else if (data.type === 'objectifs') {
                let objList = '';
                data.objectifs.forEach(obj => { objList += `<li class="mb-3 flex items-start gap-2"><span class="text-indigo-500 text-lg">✓</span> <span class="text-gray-700">${obj}</span></li>`; });
                html = `
                    <div>
                        <h2 class="text-2xl md:text-3xl font-bold text-gray-800 border-l-4 border-indigo-500 pl-4 mb-6">${data.titre}</h2>
                        <div class="bg-white rounded-xl p-5 shadow-sm">
                            <ul class="space-y-2">${objList}</ul>
                        </div>
                    </div>
                `;
            }
            else if (data.type === 'content') {
                html = `
                    <div>
                        <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2">${data.titre}</h2>
                        <p class="text-indigo-600 font-medium mt-1 mb-4">${data.sousTitre}</p>
                        <div class="prose max-w-none">${data.contenu}</div>
                    </div>
                `;
            }
            else if (data.type === 'comparaison') {
                // construction tableau responsif
                let tableHtml = '<div class="overflow-x-auto"><table class="min-w-full bg-white border border-gray-200 rounded-xl text-sm"><thead><tr class="bg-gray-100">';
                data.tableData.headers.forEach(h => { tableHtml += `<th class="px-4 py-3 text-left font-semibold text-gray-700">${h}</th>`; });
                tableHtml += '</tr></thead><tbody>';
                data.tableData.rows.forEach(row => {
                    tableHtml += '<tr class="border-b border-gray-200">';
                    row.forEach(cell => { tableHtml += `<td class="px-4 py-3 text-gray-700">${cell}</td>`; });
                    tableHtml += '</tr>';
                });
                tableHtml += '</tbody></table></div>';
                html = `
                    <div>
                        <h2 class="text-2xl font-bold text-gray-800 mb-2">${data.titre}</h2>
                        <p class="text-gray-600 mb-5">${data.description}</p>
                        ${tableHtml}
                        <div class="mt-5 text-xs text-gray-500 italic">Plus vous montez dans la pile (SaaS), moins vous avez de gestion technique.</div>
                    </div>
                `;
            }
            else if (data.type === 'conseils' || data.type === 'recap') {
                html = `
                    <div>
                        <h2 class="text-2xl font-bold text-gray-800 mb-4">${data.titre}</h2>
                        ${data.contenu}
                    </div>
                `;
            }
            else {
                html = `<div class="p-4">Contenu en préparation</div>`;
            }
            
            $('#slidesContainer').html(html);
            $('#slideCounter').text(`${index+1} / ${totalSlides}`);
            
            // Mise à jour barre de progression
            const progressPercent = ((index+1) / totalSlides) * 100;
            $('#progressFill').css('width', `${progressPercent}%`);
            
            // Gérer état des boutons
            $('#prevBtn').prop('disabled', index === 0);
            if (index === totalSlides-1) {
                $('#nextBtn').text('Terminé ✓').removeClass('bg-indigo-600').addClass('bg-green-600');
            } else {
                $('#nextBtn').text('Suivant →').removeClass('bg-green-600').addClass('bg-indigo-600');
            }
        }
        
        // Navigation
        function nextSlide() {
            if (currentIndex < totalSlides - 1) {
                currentIndex++;
                renderSlide(currentIndex);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                // Fin du cours: afficher une petite alerte / message de félicitations
                if(currentIndex === totalSlides-1){
                    alert("🎉 Félicitations ! Vous avez terminé la leçon 32. Continuez à explorer le cloud !");
                }
            }
        }
        
        function prevSlide() {
            if (currentIndex > 0) {
                currentIndex--;
                renderSlide(currentIndex);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }
        
        // Initialisation et events
        $(document).ready(function(){
            renderSlide(0);
            $('#nextBtn').on('click', nextSlide);
            $('#prevBtn').on('click', prevSlide);
            // raccourci clavier (gauche/droite)
            $(document).on('keydown', function(e) {
                if (e.key === 'ArrowRight') {
                    nextSlide();
                    e.preventDefault();
                } else if (e.key === 'ArrowLeft') {
                    prevSlide();
                    e.preventDefault();
                }
            });
        });
    </script>
</body>
</html>
