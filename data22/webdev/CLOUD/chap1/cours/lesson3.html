<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 3 : Modèles de déploiement cloud | Cours Cloud Computing</title>
    <!-- Tailwind CSS via CDN + base styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (optionnel mais présent si besoin formules) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* transitions douces pour slides */
        .slide {
            transition: opacity 0.3s ease-in-out, transform 0.2s ease;
        }
        .slide-hidden {
            display: none;
            opacity: 0;
        }
        .slide-visible {
            display: block;
            opacity: 1;
        }
        /* personnalisations accessibles */
        body {
            background: #f0f9ff; /* ciel très doux */
        }
        .card-cloud {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(0px);
            border-radius: 1.5rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
        }
        .btn-nav {
            transition: all 0.2s;
        }
        .btn-nav:hover {
            transform: scale(1.02);
            background-color: #0f3b5f;
        }
        /* pour petits écrans : texte un peu plus lisible */
        @media (max-width: 640px) {
            h1 { font-size: 1.8rem; }
            h2 { font-size: 1.4rem; }
            .prose p { font-size: 0.95rem; }
        }
        .progress-bar {
            background-color: #e2e8f0;
            border-radius: 999px;
            overflow: hidden;
        }
        .progress-fill {
            background-color: #1e6f5c;
            width: 0%;
            height: 8px;
            transition: width 0.3s;
        }
        .highlight-badge {
            background: #fef9e3;
            border-left: 6px solid #f59e0b;
        }
    </style>
</head>
<body class="font-sans antialiased p-4 md:p-6">

    <div class="max-w-4xl mx-auto">
        <!-- En-tête clair avec titre de matière -->
        <div class="mb-4 flex flex-wrap justify-between items-center text-sm text-gray-600 bg-white/60 rounded-xl p-2 px-4 shadow-sm">
            <span class="font-semibold">📘 Matière: Initiation au Cloud Computing</span>
            <span class="bg-teal-100 text-teal-800 px-3 py-1 rounded-full text-xs font-medium">Chapitre 1 · Leçon 3</span>
        </div>

        <!-- Conteneur principal slide -->
        <div class="card-cloud p-5 md:p-8 relative">
            <!-- Indicateur de progression & compteur -->
            <div class="flex justify-between items-center mb-4 text-xs text-gray-500">
                <span id="slideCounter">Slide 1 / 7</span>
                <div class="w-32 md:w-48 progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
            </div>

            <!-- Zone dynamique des slides -->
            <div id="slidesContainer" class="min-h-[420px] md:min-h-[480px]">
                <!-- Les slides seront injectées par jQuery, mais on peut inclure structure inline -->
            </div>

            <!-- Navigation buttons + indicateur mobile-friendly -->
            <div class="flex flex-col sm:flex-row justify-between items-center gap-3 mt-8 pt-4 border-t border-gray-200">
                <button id="prevBtn" class="btn-nav px-5 py-2 bg-gray-700 hover:bg-gray-800 text-white rounded-full shadow-md flex items-center gap-1 disabled:opacity-40 disabled:cursor-not-allowed transition">
                    ◀ Précédent
                </button>
                <div class="flex gap-2 flex-wrap justify-center">
                    <span id="pageIndicators" class="flex gap-1"></span>
                </div>
                <button id="nextBtn" class="btn-nav px-5 py-2 bg-teal-700 hover:bg-teal-800 text-white rounded-full shadow-md flex items-center gap-1 disabled:opacity-40 disabled:cursor-not-allowed transition">
                    Suivant ▶
                </button>
            </div>
        </div>

        <!-- petit rappel objectif leçon (pied) -->
        <div class="text-center text-xs text-gray-500 mt-6">
            ✨ Cours conçu pour la classe Développement Web – Cameroun | Modèles de déploiement : Public, Privé, Hybride, Multi-cloud
        </div>
    </div>

    <script>
        $(document).ready(function(){
            // --------------------------------------------------------------
            // Données de la leçon 3 (basée sur objectifs lesson3 du JSON)
            // Titres, contenus enrichis pour le contexte pédagogique.
            // Thèmes: 1. Modèles de déploiement (public, privé, hybride)
            // 2. Multi-cloud & Community cloud
            // 3. Comment choisir selon contraintes (sécurité, coût, conformité)
            // Création de slides structurées: 
            // Slide 0: Titre leçon
            // Slide 1: Objectifs d'apprentissage (issues de lesson3)
            // Slide 2: Cloud public – caractéristiques, exemples
            // Slide 3: Cloud privé – définition, avantages/inconvénients, technologies
            // Slide 4: Cloud hybride – meilleur des deux mondes + schéma simple dessiné
            // Slide 5: Multi-cloud et Community cloud (explications)
            // Slide 6: Choisir le bon modèle (facteurs décisionnels, tableau simple)
            // --------------------------------------------------------------
            
            const slidesData = [
                { // slide 0 - titre
                    type: "title",
                    title: "☁️ Modèles de déploiement cloud",
                    subtitle: "Public, Privé, Hybride & Multi-cloud",
                    desc: "Comprendre où placer ses applications et données selon les besoins de l'entreprise."
                },
                { // slide 1 - objectifs
                    type: "objectifs",
                    objectives: [
                        "Distinguer cloud public (AWS, Azure, GCP), privé (OpenStack, VMware) et hybride.",
                        "Comprendre le multi-cloud et le community cloud.",
                        "Choisir le bon modèle selon les contraintes (sécurité, coût, conformité)."
                    ]
                },
                { // slide 2 - Cloud public
                    type: "content",
                    title: "🏢 Cloud Public",
                    content: `<p>Les ressources (serveurs, stockage, réseau) sont <strong>mises à disposition par un fournisseur tiers</strong> via internet, partagées entre plusieurs clients (mutualisation).</p>
                    <div class="bg-blue-50 p-4 rounded-xl mt-3">
                        <span class="font-bold">✅ Avantages :</span>
                        <ul class="list-disc list-inside mt-1 space-y-1">
                            <li>Pas d’investissement initial (CAPEX réduit)</li>
                            <li>Élasticité illimitée, paiement à l’usage</li>
                            <li>Maintenance et sécurité gérées par le fournisseur</li>
                        </ul>
                        <span class="font-bold block mt-2">⚠️ Inconvénients :</span>
                        <ul class="list-disc list-inside mt-1">
                            <li>Moins de contrôle, conformité parfois complexe</li>
                            <li>Dépendance au fournisseur (vendor lock-in potentiel)</li>
                        </ul>
                        <div class="mt-3 text-sm bg-white p-2 rounded-lg"><span class="font-semibold">Exemples :</span> Amazon Web Services (AWS), Microsoft Azure, Google Cloud Platform (GCP), OVHcloud.</div>
                    </div>
                    <div class="mt-3 text-center text-sm text-gray-500">🌍 Idéal pour startups, applications web, big data, et charges variables.</div>`
                },
                { // slide 3 - Cloud privé
                    type: "content",
                    title: "🔒 Cloud Privé",
                    content: `<p>Infrastructure cloud dédiée à <strong>une seule organisation</strong> (hébergée sur site ou chez un fournisseur exclusif).</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-3">
                        <div class="bg-gray-50 p-3 rounded-lg">
                            <span class="font-semibold text-green-700">✔ Points forts</span>
                            <ul class="list-disc list-inside text-sm mt-1">
                                <li>Contrôle total et personnalisation</li>
                                <li>Sécurité renforcée, conformité (RGPD, ISO)</li>
                                <li>Performances prévisibles</li>
                            </ul>
                        </div>
                        <div class="bg-gray-50 p-3 rounded-lg">
                            <span class="font-semibold text-red-600">✖ Défis</span>
                            <ul class="list-disc list-inside text-sm mt-1">
                                <li>Coût élevé (matériel, maintenance)</li>
                                <li>Scalabilité limitée par capacité physique</li>
                                <li>Équipe dédiée nécessaire</li>
                            </ul>
                        </div>
                    </div>
                    <div class="mt-3 p-2 bg-indigo-50 rounded-lg"><span class="font-medium">Technologies courantes :</span> OpenStack, VMware vSphere, Microsoft Azure Stack, Proxmox.</div>
                    <p class="text-sm mt-2">Idéal pour institutions financières, gouvernements, grandes entreprises avec données sensibles.</p>`
                },
                { // slide 4 - Cloud hybride + dessin SVG simple (schéma liaison)
                    type: "content",
                    title: "🔄 Cloud Hybride",
                    content: `<p>Combine <strong>cloud public + cloud privé</strong> avec orchestration permettant aux données et applications de circuler entre les deux.</p>
                    <div class="flex justify-center my-4">
                        <svg width="280" height="120" viewBox="0 0 300 110" xmlns="http://www.w3.org/2000/svg" class="max-w-full h-auto">
                            <rect x="10" y="20" width="100" height="60" rx="10" fill="#e2e8f0" stroke="#0f3b5f" stroke-width="2" />
                            <text x="60" y="55" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">Cloud Privé</text>
                            <rect x="180" y="20" width="100" height="60" rx="10" fill="#bae6fd" stroke="#0284c7" stroke-width="2" />
                            <text x="230" y="55" text-anchor="middle" fill="#0c4a6e" font-size="12" font-weight="bold">Cloud Public</text>
                            <path d="M110 50 L170 50" stroke="#f97316" stroke-width="3" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
                            <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><polygon points="0 0, 8 4, 0 8" fill="#f97316"/></marker></defs>
                            <text x="140" y="40" text-anchor="middle" fill="#f97316" font-size="9">VPN /</text>
                            <text x="140" y="52" text-anchor="middle" fill="#f97316" font-size="9">Direct Connect</text>
                        </svg>
                    </div>
                    <div class="bg-amber-50 p-3 rounded-lg">
                        <span class="font-bold">🌟 Avantages majeurs :</span> flexibilité, sécurité pour données critiques + exploitation du cloud public pour les pics de charge ("cloud bursting"). 
                        <span class="block mt-2 text-sm">Exemple : Une banque garde ses données clients en privé mais utilise le cloud public pour une application mobile de scoring.</span>
                    </div>`
                },
                { // slide 5 - Multi-cloud & Community cloud
                    type: "content",
                    title: "🌐 Multi-cloud & Community Cloud",
                    content: `<div class="space-y-4">
                        <div class="border-l-4 border-teal-500 pl-3">
                            <h3 class="font-bold text-lg">Multi-cloud</h3>
                            <p>Utilisation de plusieurs fournisseurs de cloud public (ex: AWS + Azure + GCP) afin d'éviter la dépendance, optimiser les coûts ou profiter des meilleurs services de chaque plateforme.</p>
                            <p class="text-sm text-gray-600 mt-1"><span class="font-medium">Exemple concret :</span> Une entreprise utilise AWS pour ses VM, et GCP pour l'IA/ML (BigQuery, TensorFlow).</p>
                        </div>
                        <div class="border-l-4 border-indigo-400 pl-3">
                            <h3 class="font-bold text-lg">Community Cloud</h3>
                            <p>Infrastructure partagée entre plusieurs organisations ayant des préoccupations communes (sécurité, conformité, domaine métier). Peut être géré en interne ou par un tiers.</p>
                            <p class="text-sm text-gray-600 mt-1">Cas typique : Hôpitaux d'une région partageant une plateforme cloud conforme à la réglementation sanitaire. Économies d'échelle + standards communs.</p>
                        </div>
                        <div class="bg-gray-100 p-2 rounded text-center text-sm">📌 Important: Le multi-cloud n’est pas un hybride (l’hybride relie public+privé, multi-cloud utilise plusieurs publics).</div>
                    </div>`
                },
                { // slide 6 - Choisir le bon modèle (facteurs clés)
                    type: "content",
                    title: "🎯 Choisir le bon modèle de déploiement",
                    content: `<p>Le choix dépend de plusieurs critères métier et techniques :</p>
                    <div class="overflow-x-auto my-3">
                        <table class="min-w-full bg-white border border-gray-300 rounded-lg text-sm">
                            <thead class="bg-teal-100">
                                <tr><th class="p-2 border">Critère</th><th class="p-2 border">Cloud Public</th><th class="p-2 border">Cloud Privé</th><th class="p-2 border">Hybride</th></tr>
                            </thead>
                            <tbody>
                                <tr class="border-b"><td class="p-2 font-semibold">Coût initial</td><td class="p-2">Très faible</td><td class="p-2">Élevé</td><td class="p-2">Moyen à élevé</td></tr>
                                <tr class="border-b"><td class="p-2 font-semibold">Sécurité / Conformité</td><td class="p-2">Standard (certifié)</td><td class="p-2">Très élevé (contrôle total)</td><td class="p-2">Personnalisable</td></tr>
                                <tr class="border-b"><td class="p-2 font-semibold">Scalabilité</td><td class="p-2">Illimitée</td><td class="p-2">Limitée</td><td class="p-2">Très flexible</td></tr>
                                <tr><td class="p-2 font-semibold">Compétences requises</td><td class="p-2">Moyennes</td><td class="p-2">Élevées (équipe interne)</td><td class="p-2">Élevées</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="highlight-badge p-3 rounded-lg mt-2">
                        💡 <span class="font-medium">Conseil pour nos projets au Cameroun :</span> Pour une startup ou un projet web, commencez avec le cloud public (coût faible, agilité). Pour des données très sensibles (administration, santé) envisagez un hybride ou privé selon budget.
                    </div>
                    <p class="mt-3 text-sm text-center">📊 Étudiez la souveraineté des données, la latence réseau et les obligations légales (loi sur la protection des données).</p>`
                }
            ];
            
            let currentIndex = 0;
            const totalSlides = slidesData.length;
            
            // Fonction pour générer le HTML d'un slide selon son type
            function renderSlide(slide, idx) {
                if (slide.type === "title") {
                    return `
                        <div class="text-center py-6 md:py-10">
                            <div class="inline-block p-3 rounded-full bg-teal-100 text-5xl mb-4">☁️</div>
                            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800">${escapeHtml(slide.title)}</h1>
                            <h2 class="text-xl md:text-2xl text-teal-700 mt-2 font-semibold">${escapeHtml(slide.subtitle)}</h2>
                            <p class="text-gray-600 mt-4 max-w-md mx-auto">${escapeHtml(slide.desc)}</p>
                            <div class="mt-8 text-sm text-teal-600 bg-teal-50 inline-block px-4 py-2 rounded-full">📖 Leçon 3 · Chapitre 1</div>
                        </div>
                    `;
                } 
                else if (slide.type === "objectifs") {
                    let objList = "";
                    slide.objectives.forEach(obj => {
                        objList += `<li class="mb-3 flex items-start gap-2"><span class="text-teal-600 font-bold text-xl">✓</span> <span>${escapeHtml(obj)}</span></li>`;
                    });
                    return `
                        <div>
                            <h2 class="text-2xl font-bold border-l-4 border-teal-600 pl-3 mb-5">🎯 Objectifs d'apprentissage</h2>
                            <ul class="space-y-2 text-gray-700 text-base md:text-lg">
                                ${objList}
                            </ul>
                            <div class="mt-6 p-3 bg-gray-50 rounded-lg italic text-gray-500 text-sm">🔍 À la fin de cette leçon, vous saurez choisir un modèle adapté à un besoin professionnel.</div>
                        </div>
                    `;
                }
                else if (slide.type === "content") {
                    return `
                        <div>
                            <h2 class="text-2xl font-bold border-b-2 border-teal-200 pb-2 mb-4">${escapeHtml(slide.title)}</h2>
                            <div class="prose prose-blue max-w-none text-gray-700">
                                ${slide.content}
                            </div>
                        </div>
                    `;
                }
                return `<div>Erreur contenu</div>`;
            }
            
            // simple escapeHtml
            function escapeHtml(str) {
                if(!str) return "";
                return str.replace(/[&<>]/g, function(m) {
                    if(m === '&') return '&amp;';
                    if(m === '<') return '&lt;';
                    if(m === '>') return '&gt;';
                    return m;
                }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                    return c;
                });
            }
            
            // Mettre à jour affichage slide et progression
            function updateSlide() {
                const slide = slidesData[currentIndex];
                const htmlContent = renderSlide(slide, currentIndex);
                $("#slidesContainer").fadeOut(150, function() {
                    $(this).html(htmlContent).fadeIn(180);
                });
                // Mise à jour compteur
                $("#slideCounter").text(`Slide ${currentIndex+1} / ${totalSlides}`);
                const percent = ((currentIndex+1) / totalSlides) * 100;
                $("#progressFill").css("width", `${percent}%`);
                
                // Gérer état des boutons
                $("#prevBtn").prop("disabled", currentIndex === 0);
                $("#nextBtn").prop("disabled", currentIndex === totalSlides-1);
                if(currentIndex === 0) $("#prevBtn").addClass("opacity-50"); else $("#prevBtn").removeClass("opacity-50");
                if(currentIndex === totalSlides-1) $("#nextBtn").addClass("opacity-50"); else $("#nextBtn").removeClass("opacity-50");
                
                // Générer les indicateurs de pages (bullets)
                let indicatorsHtml = "";
                for (let i = 0; i < totalSlides; i++) {
                    let activeClass = (i === currentIndex) ? "bg-teal-600 w-6" : "bg-gray-300 w-3";
                    indicatorsHtml += `<button class="page-indicator h-2 rounded-full ${activeClass} transition-all mx-0.5" data-index="${i}"></button>`;
                }
                $("#pageIndicators").html(indicatorsHtml);
            }
            
            // Événements navigation
            $("#nextBtn").on("click", function() {
                if (currentIndex < totalSlides - 1) {
                    currentIndex++;
                    updateSlide();
                    window.scrollTo({ top: 80, behavior: "smooth" });
                }
            });
            $("#prevBtn").on("click", function() {
                if (currentIndex > 0) {
                    currentIndex--;
                    updateSlide();
                    window.scrollTo({ top: 80, behavior: "smooth" });
                }
            });
            
            // Cliquer sur les bullets
            $(document).on("click", ".page-indicator", function() {
                let newIdx = parseInt($(this).data("index"));
                if (!isNaN(newIdx) && newIdx >= 0 && newIdx < totalSlides) {
                    currentIndex = newIdx;
                    updateSlide();
                    window.scrollTo({ top: 80, behavior: "smooth" });
                }
            });
            
            // prise en charge clavier (flèches)
            $(document).on("keydown", function(e) {
                if (e.key === "ArrowRight") {
                    $("#nextBtn").click();
                } else if (e.key === "ArrowLeft") {
                    $("#prevBtn").click();
                }
            });
            
            // initialisation
            updateSlide();
            
            // Petit dessin SVG supplémentaire? déjà fait dans hybride. Aucune image externe nécessaire
            // On garantit que tout le contenu est accessible et sans images superflues.
        });
    </script>
</body>
</html>
