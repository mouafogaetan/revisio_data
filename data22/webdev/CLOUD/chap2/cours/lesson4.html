<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cours Cloud | Leçon 4 : Découverte d'AWS</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (optionnel, pour d'éventuelles formules, mais utile si besoin) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* styles personnalisés pour le confort visuel + transitions slides */
        body {
            background: linear-gradient(135deg, #f0f9ff 0%, #e6f0fa 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
        }
        .slide-container {
            transition: transform 0.4s ease-out, opacity 0.3s ease;
        }
        .slide {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.25);
            transition: all 0.2s;
        }
        .nav-btn {
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .nav-btn:hover:not(:disabled) {
            transform: scale(1.05);
            background-color: #1e40af;
            color: white;
        }
        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .progress-bar {
            transition: width 0.3s ease;
        }
        .bullet-item {
            transition: all 0.2s;
        }
        .bullet-item:hover {
            transform: translateX(6px);
            background-color: #f1f5f9;
        }
        @media (max-width: 640px) {
            .slide {
                border-radius: 1.25rem;
                padding: 1.5rem !important;
            }
            h2 {
                font-size: 1.6rem;
            }
        }
        /* Scroll doux mais pas d'impact sur slides */
        html {
            scroll-behavior: smooth;
        }
        .card-icon {
            background: #dbeafe;
            border-radius: 2rem;
        }
    </style>
</head>
<body class="antialiased">

    <div class="max-w-5xl mx-auto px-4 py-6 md:py-10 min-h-screen flex flex-col justify-center">
        <!-- Conteneur principal slide -->
        <div class="slide-container relative" id="slidesWrapper">
            <div id="currentSlideContent" class="slide p-6 md:p-10 shadow-2xl">
                <!-- Le contenu dynamique via jQuery sera injecté ici -->
            </div>
            
            <!-- Indicateur de progression + navigation -->
            <div class="flex flex-wrap items-center justify-between mt-8 gap-3">
                <div class="flex gap-3">
                    <button id="prevSlideBtn" class="nav-btn bg-white/70 hover:bg-blue-800 hover:text-white text-blue-900 font-semibold py-2 px-5 rounded-full shadow-md transition">◀ Précédent</button>
                    <button id="nextSlideBtn" class="nav-btn bg-blue-700 text-white font-semibold py-2 px-5 rounded-full shadow-md transition">Suivant ▶</button>
                </div>
                <div class="text-sm text-gray-700 bg-white/60 px-4 py-1 rounded-full">
                    Slide <span id="slideCounter">1</span> / <span id="totalSlides">0</span>
                </div>
                <div class="w-full md:w-64 mt-2 md:mt-0 bg-gray-200 rounded-full h-2 overflow-hidden">
                    <div id="progressFill" class="progress-bar bg-blue-600 h-full rounded-full" style="width: 0%;"></div>
                </div>
            </div>
        </div>
        
        <!-- petite note pédagogique -->
        <div class="text-center text-gray-500 text-xs mt-6 italic">
            📘 Leçon 4 — Module Cloud Computing | Formation Développement Web
        </div>
    </div>

    <script>
        // ---------- Définition du contenu des slides (Leçon 4 : Découvrir AWS) ----------
        // D'après le programme: objectifsLesson pour lesson4 : 
        // 0: Découvrir l'historique et la part de marché d'AWS
        // 1: Comprendre les régions, zones de disponibilité et edge locations
        // 2: Identifier les services phares (EC2, S3, RDS, Lambda, VPC)
        // On va construire 5 slides (titre, objectifs, historique+market share, régions/AZ/Edge, services clés)
        
        const slidesData = [
            {
                type: "title",
                title: "☁️ Découverte d'Amazon Web Services (AWS)",
                subtitle: "Le leader mondial du Cloud Computing",
                emoji: "🚀",
                bgClass: "bg-gradient-to-br from-blue-50 to-indigo-50"
            },
            {
                type: "objectives",
                title: "🎯 Objectifs pédagogiques",
                objectives: [
                    "Découvrir l'historique et la part de marché d'AWS (le pionnier du cloud public)",
                    "Comprendre les régions, zones de disponibilité et edge locations (infrastructure mondiale)",
                    "Identifier les services phares : EC2, S3, RDS, Lambda, VPC"
                ]
            },
            {
                type: "history",
                title: "📜 Historique & Part de marché AWS",
                content: [
                    "Lancé en 2006 par Amazon (d'abord pour gérer sa propre infrastructure e-commerce), AWS est devenu le premier cloud public moderne.",
                    "Aujourd'hui, AWS détient environ 32-34% du marché mondial du cloud (devant Azure et GCP), générant des dizaines de milliards de dollars de revenus.",
                    "Pourquoi AWS domine ? : Innovation rapide (>200 services), présence mondiale, maturité, énorme communauté et écosystème mature.",
                    "Des entreprises comme Netflix, Airbnb, Spotify, ou encore la NASA utilisent AWS pour leur scalabilité."
                ],
                illustration: "chart"
            },
            {
                type: "regions",
                title: "🌍 Régions, Zones de Disponibilité (AZ) & Edge Locations",
                content: [
                    "📌 Région : zone géographique distincte (ex: us-east-1 Virginie du Nord, eu-west-3 Paris). Chaque région est indépendante pour la tolérance aux pannes.",
                    "📌 Zone de Disponibilité (AZ) : un ou plusieurs datacenters au sein d'une région, connectés par fibre à très faible latence. Minimum 3 AZ par région.",
                    "📌 Edge Location : points de présence (PoP) du réseau CDN CloudFront, utilisés pour accélérer la diffusion de contenus (vidéos, sites statiques). Plus de 400+ points dans le monde.",
                    "✅ Pourquoi c'est important ? : choisir une région proche de ses utilisateurs réduit la latence; répliquer entre AZ apporte une haute disponibilité."
                ],
                simpleMap: true
            },
            {
                type: "services",
                title: "⚙️ Services Phares d'AWS (les incontournables)",
                servicesList: [
                    { name: "EC2", desc: "Elastic Compute Cloud : serveurs virtuels (VMs) configurables à la demande (CPU, RAM, stockage)." },
                    { name: "S3", desc: "Simple Storage Service : stockage objet scalable pour fichiers, sauvegardes, sites statiques (haute durabilité)." },
                    { name: "RDS", desc: "Relational Database Service : bases de données relationnelles managées (MySQL, PostgreSQL, etc.) avec backups automatiques." },
                    { name: "Lambda", desc: "Serverless Function : exécute du code sans provisionner de serveurs, paiement à la demande." },
                    { name: "VPC", desc: "Virtual Private Cloud : réseau isolé et sécurisé dans le cloud (sous-réseaux, route tables, ACL)." }
                ],
                conclusion: "Ces services constituent la base de la majorité des architectures cloud AWS."
            }
        ];
        
        let currentIndex = 0;
        const total = slidesData.length;
        
        // Fonction pour générer le HTML du slide courant
        function renderSlide(index) {
            const data = slidesData[index];
            let html = '';
            
            if (data.type === 'title') {
                html = `
                    <div class="text-center ${data.bgClass} rounded-2xl p-4 transition-all">
                        <div class="text-6xl md:text-7xl mb-4">${data.emoji}</div>
                        <h1 class="text-3xl md:text-5xl font-extrabold text-gray-800 leading-tight">${data.title}</h1>
                        <div class="w-24 h-1 bg-blue-500 mx-auto my-5 rounded-full"></div>
                        <p class="text-lg md:text-xl text-gray-600 mt-3">${data.subtitle}</p>
                        <div class="mt-8 inline-flex items-center gap-2 bg-blue-100 text-blue-800 px-4 py-2 rounded-full text-sm">
                            <span>📘 Leçon 4 · Initiation AWS</span>
                        </div>
                    </div>
                `;
            } 
            else if (data.type === 'objectives') {
                html = `
                    <div>
                        <h2 class="text-2xl md:text-3xl font-bold text-gray-800 border-l-5 border-blue-500 pl-4 mb-6">${data.title}</h2>
                        <ul class="space-y-4 mt-4">
                            ${data.objectives.map(obj => `<li class="flex items-start gap-3 bg-gray-50 p-3 rounded-xl bullet-item"><span class="text-blue-600 text-xl">🎯</span><span class="text-gray-700">${obj}</span></li>`).join('')}
                        </ul>
                        <div class="mt-8 p-4 bg-blue-50 rounded-2xl text-blue-800 text-sm italic">
                            💡 À la fin de cette leçon, vous saurez expliquer pourquoi AWS est leader, comment son infrastructure est répartie et quels services utiliser pour vos projets.
                        </div>
                    </div>
                `;
            }
            else if (data.type === 'history') {
                html = `
                    <div>
                        <h2 class="text-2xl md:text-3xl font-bold text-gray-800 border-l-5 border-blue-500 pl-4 mb-5">${data.title}</h2>
                        <div class="grid md:grid-cols-2 gap-6 items-start">
                            <div class="space-y-3">
                                ${data.content.map(para => `<p class="text-gray-700 flex items-start gap-2"><span class="text-blue-500 text-xl">▹</span> ${para}</p>`).join('')}
                            </div>
                            <div class="bg-white p-4 rounded-xl shadow-inner border border-gray-100">
                                <div class="text-center font-semibold text-gray-700 mb-2">📊 Part de marché cloud mondial (est. 2025)</div>
                                <div class="relative pt-1">
                                    <div class="flex mb-2 items-center justify-between">
                                        <span class="text-xs font-semibold text-blue-700">AWS ~32%</span>
                                        <span class="text-xs font-semibold text-gray-500">Azure ~22%</span>
                                        <span class="text-xs font-semibold text-gray-500">GCP ~11%</span>
                                    </div>
                                    <div class="flex h-5 rounded-full overflow-hidden">
                                        <div style="width: 32%" class="bg-blue-600"></div>
                                        <div style="width: 22%" class="bg-sky-400"></div>
                                        <div style="width: 11%" class="bg-emerald-400"></div>
                                        <div style="width: 35%" class="bg-gray-300"></div>
                                    </div>
                                    <p class="text-xs text-gray-500 mt-2">Autres (Alibaba, IBM, OCI...) ~35%</p>
                                </div>
                                <div class="mt-4 p-2 bg-gray-50 rounded-lg text-xs">
                                    🧠 AWS a été lancé en 2006, bien avant les concurrents, ce qui lui a permis d'acquérir une longueur d'avance.
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
            else if (data.type === 'regions') {
                html = `
                    <div>
                        <h2 class="text-2xl md:text-3xl font-bold text-gray-800 border-l-5 border-blue-500 pl-4 mb-5">${data.title}</h2>
                        <div class="space-y-4 mb-5">
                            ${data.content.map(para => `<div class="flex gap-2 bg-white/70 p-3 rounded-xl shadow-sm"><span class="text-indigo-500 font-bold">🌐</span><p class="text-gray-700">${para}</p></div>`).join('')}
                        </div>
                        <div class="mt-5 bg-gray-100 rounded-2xl p-5 text-center border border-gray-200">
                            <div class="font-mono text-sm text-gray-500">📡 Schéma simplifié : Région → Zones de disponibilité (AZ) → Datacenters</div>
                            <div class="flex flex-wrap justify-center gap-4 mt-3">
                                <div class="bg-blue-200 p-3 rounded-2xl w-28 text-center shadow"><span class="font-bold">🌎 Région</span><div class="text-xs">Paris (eu-west-3)</div></div>
                                <div class="text-2xl text-gray-400">→</div>
                                <div class="bg-green-100 p-3 rounded-2xl w-28 text-center shadow"><span class="font-bold">AZ 1</span><div class="text-xs">Datacenter A</div></div>
                                <div class="bg-green-100 p-3 rounded-2xl w-28 text-center shadow"><span class="font-bold">AZ 2</span><div class="text-xs">Datacenter B</div></div>
                                <div class="bg-green-100 p-3 rounded-2xl w-28 text-center shadow"><span class="font-bold">AZ 3</span><div class="text-xs">Datacenter C</div></div>
                            </div>
                            <div class="mt-4 text-sm text-gray-600">+ Edge Locations (CloudFront) pour diffusion rapide de contenu statique et dynamique.</div>
                        </div>
                    </div>
                `;
            }
            else if (data.type === 'services') {
                html = `
                    <div>
                        <h2 class="text-2xl md:text-3xl font-bold text-gray-800 border-l-5 border-blue-500 pl-4 mb-5">${data.title}</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-2">
                            ${data.servicesList.map(srv => `
                                <div class="bg-white border border-gray-200 rounded-xl p-4 shadow-sm hover:shadow-md transition-all">
                                    <div class="flex items-center gap-3">
                                        <div class="bg-blue-100 text-blue-800 font-bold rounded-full w-8 h-8 flex items-center justify-center">⚡</div>
                                        <h3 class="font-bold text-xl text-gray-800">${srv.name}</h3>
                                    </div>
                                    <p class="text-gray-600 text-sm mt-2 pl-2">${srv.desc}</p>
                                </div>
                            `).join('')}
                        </div>
                        <div class="mt-6 p-4 bg-blue-100/50 rounded-xl italic text-center text-blue-900 font-medium">
                            💬 "${data.conclusion}" 
                        </div>
                        <div class="mt-4 text-sm text-gray-500 flex flex-wrap gap-2 justify-center">
                            <span class="bg-gray-200 px-3 py-1 rounded-full">#EC2</span>
                            <span class="bg-gray-200 px-3 py-1 rounded-full">#S3</span>
                            <span class="bg-gray-200 px-3 py-1 rounded-full">#Lambda</span>
                            <span class="bg-gray-200 px-3 py-1 rounded-full">#Serverless</span>
                        </div>
                    </div>
                `;
            }
            
            // wrapper responsif
            return `<div class="transition-all duration-200 fade-in">${html}</div>`;
        }
        
        // Mettre à jour l'affichage, les boutons, compteur, progress bar
        function updateSlideUI() {
            const slideHtml = renderSlide(currentIndex);
            $('#currentSlideContent').fadeOut(150, function() {
                $(this).html(slideHtml).fadeIn(200);
            });
            $('#slideCounter').text(currentIndex + 1);
            $('#totalSlides').text(total);
            const progressPercent = ((currentIndex) / (total - 1)) * 100;
            $('#progressFill').css('width', `${progressPercent}%`);
            
            // Gérer état des boutons
            $('#prevSlideBtn').prop('disabled', currentIndex === 0);
            $('#nextSlideBtn').prop('disabled', currentIndex === total - 1);
            
            // réappliquer MathJax si nécessaire (contenu peut contenir des formules, mais leçon4 simple)
            if (window.MathJax) {
                MathJax.typesetPromise && MathJax.typesetPromise();
            }
        }
        
        // Navigation
        function nextSlide() {
            if (currentIndex < total - 1) {
                currentIndex++;
                updateSlideUI();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }
        
        function prevSlide() {
            if (currentIndex > 0) {
                currentIndex--;
                updateSlideUI();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }
        
        // Gestionnaire clavier (gauche/droite)
        $(document).keydown(function(e) {
            if (e.key === 'ArrowLeft') {
                prevSlide();
                e.preventDefault();
            } else if (e.key === 'ArrowRight') {
                nextSlide();
                e.preventDefault();
            }
        });
        
        // initialisation
        $(document).ready(function() {
            updateSlideUI();
            $('#prevSlideBtn').on('click', prevSlide);
            $('#nextSlideBtn').on('click', nextSlide);
            // Ajout d'un effet "swipe" simple pour mobile (optionnel amélioration)
            let touchStartX = 0;
            let touchEndX = 0;
            const slidesContainer = document.getElementById('slidesWrapper');
            slidesContainer.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            });
            slidesContainer.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                if (touchEndX < touchStartX - 50) nextSlide();
                if (touchEndX > touchStartX + 50) prevSlide();
            });
        });
    </script>
    <!-- petite assurance pour les couleurs lisibles et responsive -->
    <noscript>Votre navigateur ne supporte pas JavaScript, veuillez activer pour le cours interactif.</noscript>
</body>
</html>
