<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Leçon 39 : Gestion des utilisateurs & rôles (Admin) | React e-commerce</title>
    <!-- Tailwind CSS + Font Awesome (icônes discrètes) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (formules légères si besoin) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        .slide-container { transition: opacity 0.25s ease-in-out; }
        .fadeIn { animation: fadeSlide 0.3s ease-out; }
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .nav-btn:active { transform: scale(0.96); }
        pre { white-space: pre-wrap; word-wrap: break-word; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #e2e8f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
        .badge-admin { background: #e0e7ff; color: #4338ca; }
        .badge-user { background: #dcfce7; color: #166534; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-indigo-50 antialiased">

    <main class="max-w-5xl mx-auto px-4 py-6 md:py-10">
        <div class="relative bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl overflow-hidden border border-indigo-200">
            <!-- en-tête -->
            <div class="bg-gradient-to-r from-indigo-800 to-slate-800 px-5 py-4 text-white flex justify-between items-center flex-wrap gap-2">
                <div class="flex items-center gap-2">
                    <span class="text-2xl">👥</span>
                    <span class="font-bold tracking-wide">React E-commerce | Interface Admin</span>
                </div>
                <span class="bg-white/20 text-xs px-3 py-1 rounded-full">Leçon 39 · Gestion utilisateurs & rôles</span>
            </div>

            <!-- zone slides dynamiques -->
            <div id="slides-wrapper" class="p-5 md:p-8 min-h-[500px] flex flex-col">
                <!-- contenu injecté jQuery -->
            </div>

            <!-- navigation -->
            <div class="border-t border-gray-200 bg-gray-50/90 px-5 py-4 flex flex-wrap justify-between items-center gap-3">
                <div class="flex gap-2">
                    <button id="prevSlide" class="nav-btn bg-white border border-gray-300 hover:bg-indigo-100 text-indigo-800 font-medium py-2 px-4 rounded-xl shadow-sm flex items-center gap-1 text-sm md:text-base transition">◀ Précédent</button>
                    <button id="nextSlide" class="nav-btn bg-indigo-700 hover:bg-indigo-800 text-white font-medium py-2 px-5 rounded-xl shadow-md flex items-center gap-1 text-sm md:text-base transition">Suivant ▶</button>
                </div>
                <div class="flex items-center gap-2 text-sm text-gray-600 bg-white px-3 py-1 rounded-full shadow-inner">
                    <span id="slideCounter">Slide 1 / 1</span>
                    <span class="w-1.5 h-1.5 rounded-full bg-indigo-400"></span>
                    <span class="hidden sm:inline">Admin Users & Roles</span>
                </div>
                <div class="flex gap-1" id="dotsIndicator"></div>
            </div>
        </div>
        <p class="text-center text-xs text-gray-500 mt-5">🔁 Navigation : boutons ou flèches ← →. Gérez les utilisateurs et sécurisez l'admin.</p>
    </main>

    <script>
        // ----- SLIDES LEÇON 39 : Gestion des utilisateurs et rôles (Admin) -----
        const slides = [
            { // Slide 0 : Titre
                type: "title",
                content: `
                    <div class="flex flex-col items-center justify-center text-center h-full min-h-[450px]">
                        <div class="bg-indigo-100 rounded-full p-4 mb-5 shadow-md">
                            <svg class="w-12 h-12 text-indigo-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                        </div>
                        <h1 class="text-3xl md:text-5xl font-extrabold bg-gradient-to-r from-indigo-800 to-slate-700 bg-clip-text text-transparent">Gestion des utilisateurs & rôles</h1>
                        <p class="text-gray-600 max-w-xl mx-auto mt-4 text-lg">Dashboard administrateur : lister, filtrer, modifier rôles, bloquer/débloquer</p>
                        <div class="flex flex-wrap gap-2 justify-center mt-6 text-sm">
                            <span class="bg-gray-100 px-3 py-1 rounded-full">🛡️ Role-based Access Control</span>
                            <span class="bg-gray-100 px-3 py-1 rounded-full">🔍 Filtres & recherche</span>
                            <span class="bg-gray-100 px-3 py-1 rounded-full">⚡ Changement de rôle (user → admin)</span>
                            <span class="bg-gray-100 px-3 py-1 rounded-full">🚫 Blocage / déblocage</span>
                        </div>
                    </div>
                `
            },
            { // Slide 1 : Objectifs pédagogiques
                type: "objectifs",
                content: `
                    <div class="h-full">
                        <h2 class="text-2xl md:text-3xl font-bold text-indigo-800 border-l-5 border-indigo-500 pl-4 mb-6">🎯 Objectifs de la leçon</h2>
                        <div class="grid md:grid-cols-2 gap-5">
                            <div class="bg-indigo-50 rounded-xl p-4 shadow-sm"><div class="font-bold text-indigo-800">1. Comprendre</div><p class="text-gray-700">La gestion des utilisateurs côté admin : listing, pagination, filtres.</p></div>
                            <div class="bg-indigo-50 rounded-xl p-4 shadow-sm"><div class="font-bold text-indigo-800">2. Appliquer</div><p class="text-gray-700">Le principe de RBAC : restreindre l'accès admin selon le rôle.</p></div>
                            <div class="bg-indigo-50 rounded-xl p-4 shadow-sm"><div class="font-bold text-indigo-800">3. Analyser</div><p class="text-gray-700">Les enjeux de sécurité (bloquer un utilisateur malveillant, promouvoir admin).</p></div>
                            <div class="bg-indigo-50 rounded-xl p-4 shadow-sm"><div class="font-bold text-indigo-800">4. Créer</div><p class="text-gray-700">Un tableau de bord utilisateur avec recherche, switch de rôle et actions.</p></div>
                        </div>
                        <div class="mt-6 p-3 bg-slate-100 rounded-lg text-slate-800 text-sm italic">💡 À la fin, vous saurez implémenter une interface admin sécurisée pour gérer les comptes.</div>
                    </div>
                `
            },
            { // Slide 2 : Architecture et RBAC
                type: "content",
                content: `
                    <div>
                        <h2 class="text-xl md:text-2xl font-bold text-indigo-800 flex items-center gap-2">🏛️ RBAC (Role-Based Access Control) pour l'admin</h2>
                        <p class="mt-2 text-gray-700">Seuls les utilisateurs avec le rôle <strong>admin</strong> peuvent accéder à l'interface de gestion.</p>
                        <div class="bg-gray-100 p-4 rounded-xl mt-3">
                            <div class="font-mono text-sm">🔐 Exemple de protection de route avec React Router :</div>
                            <pre class="bg-gray-800 text-green-300 p-3 rounded mt-2 text-sm overflow-x-auto"><code>// composant ProtectedRoute
const AdminRoute = ({ children }) => {
  const { user } = useAuth();
  if (!user) return &lt;Navigate to="/login" /&gt;;
  if (user.role !== 'admin') return &lt;Navigate to="/" /&gt;;
  return children;
};</code></pre>
                        </div>
                        <div class="mt-4 flex flex-wrap gap-3">
                            <div class="bg-amber-50 p-3 rounded-lg"><span class="font-bold">Rôles classiques :</span> admin, manager, user, support</div>
                            <div class="bg-green-50 p-3 rounded-lg">Le backend doit renvoyer le rôle dans le JWT.</div>
                        </div>
                    </div>
                `
            },
            { // Slide 3 : Interface de listing des utilisateurs (tableau)
                type: "content",
                content: `
                    <div>
                        <h2 class="text-xl md:text-2xl font-bold text-indigo-800">📋 Tableau des utilisateurs (Admin)</h2>
                        <p class="text-gray-700">Composants typiques : <code>Table</code>, <code>SearchInput</code>, <code>Pagination</code>, <code>SelectRole</code>.</p>
                        <div class="mt-3 overflow-x-auto border rounded-lg">
                            <table class="min-w-full text-sm bg-white">
                                <thead class="bg-gray-100"><tr><th class="px-4 py-2">ID</th><th>Nom</th><th>Email</th><th>Rôle</th><th>Statut</th><th>Actions</th></tr></thead>
                                <tbody><tr><td class="border-t px-4 py-2">1</td><td>Alice</td><td>alice@ex.com</td><td><select class="border rounded p-1"><option>user</option><option>admin</option></select></td><td><span class="bg-green-100 px-2 rounded-full">actif</span></td><td><button class="text-red-500">🔒 Bloquer</button></td></tr></tbody>
                            </table>
                        </div>
                        <div class="bg-indigo-50 p-3 rounded mt-3 text-sm">✨ Bonnes pratiques : pagination (10/20/50), tri par colonne, filtres par rôle/statut.</div>
                    </div>
                `
            },
            { // Slide 4 : Changer les rôles (user → admin)
                type: "content",
                content: `
                    <div>
                        <h2 class="text-xl md:text-2xl font-bold text-indigo-800">🔄 Modification du rôle utilisateur</h2>
                        <p>Via un <code>select</code> ou un bouton, on envoie une requête PUT/PATCH au backend.</p>
                        <div class="bg-gray-800 text-gray-100 p-4 rounded-lg mt-3">
                            <pre><code>// mutation avec React Query
const updateRoleMutation = useMutation({
  mutationFn: ({ userId, role }) => 
    api.patch(\`/admin/users/\${userId}/role\`, { role }),
  onSuccess: () => queryClient.invalidateQueries(['users'])
});

// dans le composant
<select onChange={(e) => updateRoleMutation.mutate({ userId, role: e.target.value })}>
  <option value="user">Utilisateur</option>
  <option value="admin">Administrateur</option>
</select></code></pre>
                        </div>
                        <p class="text-yellow-700 text-sm mt-2">⚠️ Sécurité : vérifier que l'utilisateur connecté est bien admin (backend aussi !).</p>
                    </div>
                `
            },
            { // Slide 5 : Bloquer / débloquer un compte
                type: "content",
                content: `
                    <div>
                        <h2 class="text-xl md:text-2xl font-bold text-indigo-800">🚫 Gestion du statut (bloqué / actif)</h2>
                        <p class="mb-2">Un utilisateur bloqué ne peut plus se connecter ni passer commande. Utile pour fraude ou non-respect CGU.</p>
                        <div class="bg-rose-50 border-l-4 border-rose-400 p-3 rounded-md">
                            <span class="font-bold">Implémentation typique :</span>
                            <pre class="bg-gray-800 text-gray-100 p-2 rounded text-sm mt-2"><code>// endpoint backend: PATCH /admin/users/:id/status
{ "isActive": false }

// côté front, icône toggle
<button onClick={() => toggleBlock(user)}>
  {user.isActive ? '🔒 Bloquer' : '🔓 Débloquer'}
</button></code></pre>
                        </div>
                        <p class="text-gray-600 mt-3">✅ Après blocage, l'utilisateur reçoit une notification (email/toast) et est déconnecté.</p>
                    </div>
                `
            },
            { // Slide 6 : Recherche et filtres dynamiques
                type: "content",
                content: `
                    <div>
                        <h2 class="text-xl md:text-2xl font-bold text-indigo-800">🔍 Filtres et recherche temps réel</h2>
                        <div class="flex flex-wrap gap-4 mt-3">
                            <div class="bg-white border rounded-lg p-3 flex-1">
                                <label>Recherche par nom/email :</label>
                                <input type="text" class="border rounded p-2 w-full mt-1" placeholder="Alice...">
                            </div>
                            <div class="bg-white border rounded-lg p-3 flex-1">
                                <label>Filtrer par rôle :</label>
                                <select class="border rounded p-2 w-full mt-1"><option>Tous</option><option>admin</option><option>user</option></select>
                            </div>
                        </div>
                        <p class="mt-3 text-sm">Utiliser <strong>useDebounce</strong> sur la recherche pour limiter les appels API et <strong>useMemo</strong> pour filtrer côté client si petit dataset.</p>
                        <pre class="bg-gray-800 text-green-200 p-2 rounded text-xs mt-2"><code>const debouncedSearch = useDebounce(searchTerm, 300);
useEffect(() => {
  refetchUsers({ search: debouncedSearch, roleFilter });
}, [debouncedSearch, roleFilter]);</code></pre>
                    </div>
                `
            },
            { // Slide 7 : Bonnes pratiques et conclusion
                type: "content",
                content: `
                    <div>
                        <h2 class="text-xl md:text-2xl font-bold text-indigo-800">✅ Récapitulatif & sécurité</h2>
                        <ul class="list-disc list-inside space-y-2 mt-3 text-gray-700">
                            <li>Utiliser <strong>React Hook Form + Zod</strong> pour les formulaires admin (création utilisateur).</li>
                            <li>Ne jamais faire confiance au frontend : toutes les actions (changement rôle, blocage) doivent être validées par le backend.</li>
                            <li>Logger les actions sensibles (qui a promu un admin, qui a bloqué un compte).</li>
                            <li>Implémenter une confirmation (<code>window.confirm</code> ou modal) avant blocage/promotion.</li>
                            <li>Utiliser des <strong>squelettes (skeleton)</strong> pendant le chargement des utilisateurs.</li>
                            <li>Gérer les erreurs (réseau, permission) avec des toasts (sonner).</li>
                        </ul>
                        <div class="mt-6 bg-indigo-100 p-4 rounded-xl text-indigo-800 text-center font-semibold">
                            🎯 Interface admin : une brique essentielle pour tout e-commerce scalable et sécurisé.
                        </div>
                    </div>
                `
            }
        ];

        let currentSlideIndex = 0;
        const totalSlides = slides.length;

        function renderSlide() {
            const data = slides[currentSlideIndex];
            $('#slides-wrapper').html(`<div class="slide-container fadeIn w-full">${data.content}</div>`);
            $('#slideCounter').text(`Slide ${currentSlideIndex+1} / ${totalSlides}`);

            let dotsHtml = '';
            for (let i = 0; i < totalSlides; i++) {
                const active = i === currentSlideIndex ? 'bg-indigo-600 w-6' : 'bg-gray-300 w-2';
                dotsHtml += `<button class="dot-indicator h-2 rounded-full transition-all ${active} mx-1 hover:bg-indigo-400" data-index="${i}"></button>`;
            }
            $('#dotsIndicator').html(dotsHtml);
            $('.dot-indicator').on('click', function() {
                const idx = parseInt($(this).data('index'));
                if (!isNaN(idx) && idx !== currentSlideIndex && idx >=0 && idx < totalSlides) {
                    currentSlideIndex = idx;
                    renderSlide();
                }
            });
            if (window.MathJax) MathJax.typesetPromise();
        }

        $('#prevSlide').on('click', () => {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                renderSlide();
            }
        });
        $('#nextSlide').on('click', () => {
            if (currentSlideIndex < totalSlides - 1) {
                currentSlideIndex++;
                renderSlide();
            } else {
                if (currentSlideIndex === totalSlides-1) {
                    const notif = $('<div class="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-indigo-800 text-white text-sm px-5 py-2 rounded-full shadow-lg z-50">✅ Fin du cours Admin Users & Roles ! Sécurisez vos dashboards.</div>');
                    $('body').append(notif);
                    setTimeout(() => notif.fadeOut(500, function(){ $(this).remove(); }), 2500);
                }
            }
        });

        $(document).on('keydown', (e) => {
            if (e.key === 'ArrowLeft') $('#prevSlide').click();
            if (e.key === 'ArrowRight') $('#nextSlide').click();
        });

        renderSlide();
    </script>
</body>
</html>
