<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Leçon 45 : Animation avec Framer Motion – React E-commerce</title>
  <!-- Tailwind CSS + configuration apaisante -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#4F46E5',   // indigo doux
            secondary: '#EC4899',
            accent: '#06B6D4'
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'Segoe UI', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <!-- MathJax (pour formules, si besoin) -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
  <style>
    .slide { transition: opacity 0.25s ease-in-out; }
    body { background: linear-gradient(145deg, #f9fafb 0%, #f0f2f5 100%); }
    .btn-slide:active { transform: scale(0.96); }
    .prose pre { background-color: #1e293b; color: #e2e8f0; padding: 0.75rem; border-radius: 0.75rem; overflow-x: auto; font-size: 0.8rem; }
    .prose code { background-color: #eef2ff; padding: 0.2rem 0.4rem; border-radius: 0.375rem; font-weight: 500; color: #0f172a; }
  </style>
</head>
<body class="font-sans antialiased">

<div class="max-w-5xl mx-auto px-4 py-5 md:py-8">
  <!-- En-tête avec progression -->
  <div class="flex flex-wrap justify-between items-center gap-3 mb-6">
    <div class="flex items-center gap-2">
      <span class="text-3xl">✨</span>
      <div>
        <h1 class="text-xl md:text-2xl font-bold text-slate-800">Framer Motion · Animations React</h1>
        <p class="text-xs text-slate-500">Leçon 45 · Améliorer l'expérience utilisateur</p>
      </div>
    </div>
    <div class="bg-white/70 backdrop-blur-sm px-3 py-1.5 rounded-full text-sm font-medium shadow-sm border border-slate-200">
      <span id="slideCounter">1</span> / <span id="totalSlides"></span>
    </div>
  </div>

  <!-- Conteneur diaporama -->
  <div id="slidesContainer" class="relative bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200 min-h-[65vh] md:min-h-[70vh]"></div>

  <!-- Navigation + dots -->
  <div class="mt-8 flex flex-col sm:flex-row justify-between items-center gap-4">
    <button id="prevBtn" class="btn-slide px-5 py-2.5 bg-white border border-slate-300 text-slate-700 rounded-xl shadow-sm hover:bg-slate-50 disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2 font-medium transition">← Précédent</button>
    <div class="flex gap-2 flex-wrap justify-center" id="dotsContainer"></div>
    <button id="nextBtn" class="btn-slide px-5 py-2.5 bg-primary text-white rounded-xl shadow-md hover:bg-indigo-700 disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2 font-medium transition">Suivant →</button>
  </div>

  <footer class="mt-8 text-center text-xs text-slate-500 border-t pt-5">📘 Cours Développement Web (Cameroun) – React e-commerce. Apprenez à animer vos composants avec Framer Motion.</footer>
</div>

<script>
  // ----- Slides pour la Leçon 45 : Framer Motion (installation, animations d'apparition, transitions entre pages) -----
  const slidesData = [
    { type: "title", title: "✨ Framer Motion", subtitle: "Animer l'interface e-commerce", desc: "Découvrez comment installer Framer Motion, animer l'apparition des produits, créer des transitions fluides entre les pages et améliorer l'expérience utilisateur." },
    { type: "objectifs", title: "🎯 Objectifs de la leçon", objectives: [
      "Installer et configurer Framer Motion dans un projet React.",
      "Animer l’apparition des produits avec des effets de fade et de sliding.",
      "Créer des micro-interactions (hover, tap) sur les cartes produits.",
      "Mettre en place des transitions entre les pages avec AnimatePresence.",
      "Comprendre les bonnes pratiques d’accessibilité avec les animations."
    ] },
    { type: "content", title: "📦 1. Installation de Framer Motion", content: `
      <div class="space-y-4">
        <p>Framer Motion est une bibliothèque puissante pour créer des animations fluides dans React. Pour l'installer :</p>
        <div class="bg-slate-800 text-green-300 p-3 rounded-lg font-mono text-sm">
          npm install framer-motion
        </div>
        <p>Pas de configuration complexe : importez simplement les composants <code class="bg-gray-100 px-1 rounded">motion</code> et les hooks.</p>
        <div class="bg-indigo-50 p-3 rounded-lg border-l-4 border-indigo-400">
          <span class="font-bold">💡 Note :</span> Framer Motion fonctionne avec React 18+ et est compatible avec les Server Components (Next.js).
        </div>
        <p>Pour débuter, on transforme un élément HTML classique en élément animable :</p>
        <div class="bg-gray-800 text-white p-2 rounded text-sm">
          <pre>import { motion } from 'framer-motion';

const MaCarte = () => (<motion.div animate={{ opacity: 1 }}>Contenu</motion.div>);</pre>
        </div>
      </div>
    ` },
    { type: "content", title: "🎬 2. Animer l'apparition des produits (fade & slide)", content: `
      <div class="grid md:grid-cols-2 gap-5">
        <div class="bg-white border p-4 rounded-xl shadow-sm">
          <h4 class="font-bold text-primary">✨ Animation d’entrée</h4>
          <p class="text-sm">On utilise les props <code>initial</code> et <code>animate</code> pour définir l'état de départ et final.</p>
          <pre class="bg-gray-800 text-xs text-gray-200 p-2 rounded mt-2">motion.div
  initial={{ opacity: 0, y: 20 }}
  animate={{ opacity: 1, y: 0 }}
  transition={{ duration: 0.4 }}</pre>
        </div>
        <div class="bg-white border p-4 rounded-xl shadow-sm">
          <h4 class="font-bold text-primary">⏳ Animation au scroll</h4>
          <p class="text-sm">Avec <code>whileInView</code>, les produits s'animent quand ils apparaissent dans la zone visible.</p>
          <pre class="bg-gray-800 text-xs text-gray-200 p-2 rounded mt-2">whileInView={{ opacity: 1, scale: 1 }}
initial={{ opacity: 0, scale: 0.8 }}
viewport={{ once: true }}</pre>
        </div>
      </div>
      <div class="mt-4 p-3 bg-amber-50 rounded-lg text-sm">
        🧩 <strong>Exemple concret :</strong> Dans la grille de produits, chaque carte peut avoir un délai différent grâce à <code>transition={{ delay: index * 0.1 }}</code>.
      </div>
    ` },
    { type: "content", title: "🖱️ 3. Micro-interactions : hover, tap, drag", content: `
      <div class="space-y-4">
        <p>Framer Motion facilite les retours visuels lors des interactions :</p>
        <div class="flex flex-wrap gap-4 justify-around">
          <div class="bg-white p-4 rounded-xl shadow text-center w-36">
            <div class="text-3xl mb-1">🖱️</div>
            <p class="font-semibold">Hover</p>
            <code class="text-xs">whileHover={{ scale: 1.05 }}</code>
          </div>
          <div class="bg-white p-4 rounded-xl shadow text-center w-36">
            <div class="text-3xl mb-1">👆</div>
            <p class="font-semibold">Tap</p>
            <code class="text-xs">whileTap={{ scale: 0.95 }}</code>
          </div>
          <div class="bg-white p-4 rounded-xl shadow text-center w-36">
            <div class="text-3xl mb-1">↔️</div>
            <p class="font-semibold">Drag</p>
            <code class="text-xs">drag="x" dragConstraints</code>
          </div>
        </div>
        <div class="bg-gray-800 text-gray-100 p-3 rounded-lg text-sm">
          <pre>&lt;motion.button
  whileHover={{ scale: 1.05, backgroundColor: "#4F46E5" }}
  whileTap={{ scale: 0.95 }}
  transition={{ type: "spring", stiffness: 300 }}
&gt;
  Ajouter au panier
&lt;/motion.button&gt;</pre>
        </div>
        <p>Ces interactions rendent l'interface plus vivante et réactive, surtout sur mobile.</p>
      </div>
    ` },
    { type: "content", title: "🔄 4. Transitions entre les pages (AnimatePresence)", content: `
      <div class="space-y-3">
        <p>Pour animer le changement de route, on utilise <code>AnimatePresence</code> qui détecte les composants qui quittent le DOM.</p>
        <div class="bg-slate-800 text-white p-3 rounded-lg text-sm">
          <pre>import { AnimatePresence, motion } from 'framer-motion';
import { Routes, Route, useLocation } from 'react-router-dom';

const location = useLocation();
return (
  &lt;AnimatePresence mode="wait"&gt;
    &lt;Routes location={location} key={location.pathname}&gt;
      &lt;Route path="/" element={&lt;Home /&gt;} /&gt;
      &lt;Route path="/products" element={&lt;Products /&gt;} /&gt;
    &lt;/Routes&gt;
  &lt;/AnimatePresence&gt;
);</pre>
        </div>
        <p>Chaque page peut définir ses propres animations (entrée/sortie) :</p>
        <div class="bg-gray-100 p-3 rounded text-sm">
          <code>initial={{ opacity: 0, x: 100 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: -100 }}</code>
        </div>
        <div class="bg-green-50 p-2 rounded text-sm">✅ L'utilisation de <code>mode="wait"</code> assure que la nouvelle page n'apparaît qu'après la sortie de l'ancienne.</div>
      </div>
    ` },
    { type: "content", title: "♿ 5. Accessibilité et bonnes pratiques", content: `
      <div class="grid md:grid-cols-2 gap-5">
        <div class="bg-red-50 p-3 rounded-lg">
          <h4 class="font-bold text-red-700">⚠️ Ne pas exagérer</h4>
          <p class="text-sm">Les animations trop longues ou fréquentes peuvent causer des nausées ou ralentir l'expérience. Privilégiez des durées courtes (0.2s à 0.5s).</p>
        </div>
        <div class="bg-indigo-50 p-3 rounded-lg">
          <h4 class="font-bold text-indigo-700">📱 Respecter <code>prefers-reduced-motion</code></h4>
          <p class="text-sm">Utilisez <code>useReducedMotion</code> hook pour désactiver les animations quand l'utilisateur a paramétré son système pour réduire les mouvements.</p>
          <pre class="bg-white p-1 text-xs mt-1">const shouldReduceMotion = useReducedMotion();
const transition = shouldReduceMotion ? { duration: 0 } : { duration: 0.4 };</pre>
        </div>
      </div>
      <div class="mt-3 bg-yellow-50 p-3 rounded text-sm">
        💡 <span class="font-bold">Performance :</span> Utilisez <code>transform</code> et <code>opacity</code> (compositing) plutôt que de modifier `width`/`height` pour des animations 60fps.
      </div>
    ` }
  ];

  let currentSlide = 0;
  const total = slidesData.length;

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function buildSlides() {
    let html = '';
    slidesData.forEach((slide, idx) => {
      let inner = '';
      if (slide.type === 'title') {
        inner = `
          <div class="flex flex-col items-center justify-center min-h-[60vh] text-center p-6">
            <div class="bg-indigo-100 p-5 rounded-full mb-5 shadow-md"><span class="text-5xl">✨</span></div>
            <h2 class="text-3xl md:text-4xl font-extrabold text-slate-800 mb-3">${escapeHtml(slide.title)}</h2>
            <p class="text-lg text-indigo-600 font-medium">${escapeHtml(slide.subtitle)}</p>
            <div class="mt-6 max-w-md bg-white/60 p-4 rounded-xl shadow-inner"><p class="text-slate-600">${escapeHtml(slide.desc)}</p></div>
          </div>
        `;
      } else if (slide.type === 'objectifs') {
        let list = '';
        slide.objectives.forEach(obj => { list += `<li class="mb-3 flex items-start gap-2"><span class="text-primary text-xl font-bold">✓</span> <span>${escapeHtml(obj)}</span></li>`; });
        inner = `<div class="p-6 md:p-8"><h2 class="text-2xl font-bold text-slate-800 border-b pb-3 mb-5 flex items-center gap-2">${escapeHtml(slide.title)}</h2><ul class="space-y-2 text-base md:text-lg list-none">${list}</ul><div class="mt-8 bg-gradient-to-r from-indigo-50 to-pink-50 rounded-xl p-4 text-sm italic border">💡 À la fin, vous saurez rendre votre application e-commerce dynamique et fluide.</div></div>`;
      } else if (slide.type === 'content') {
        inner = `<div class="p-5 md:p-7"><h2 class="text-2xl font-bold text-slate-800 mb-4 flex items-center gap-2">${escapeHtml(slide.title)}</h2><div class="prose prose-slate max-w-none leading-relaxed">${slide.content}</div></div>`;
      }
      html += `<div class="slide" data-slide-index="${idx}" style="display: ${idx === currentSlide ? 'block' : 'none'};">${inner}</div>`;
    });
    return html;
  }

  function generateDots() {
    let dotsHtml = '';
    for (let i = 0; i < total; i++) {
      const activeClass = (i === currentSlide) ? 'bg-primary w-6' : 'bg-gray-300 w-3';
      dotsHtml += `<button class="dot-indicator h-3 rounded-full transition-all mx-1 ${activeClass}" data-index="${i}"></button>`;
    }
    $('#dotsContainer').html(dotsHtml);
    $('.dot-indicator').on('click', function() {
      const idx = parseInt($(this).data('index'));
      if (!isNaN(idx) && idx !== currentSlide && idx >= 0 && idx < total) {
        currentSlide = idx;
        updateSlideAndUI();
      }
    });
  }

  function updateSlideAndUI() {
    $('.slide').each(function(idx) {
      if (idx === currentSlide) $(this).fadeIn(180);
      else $(this).hide();
    });
    $('#slideCounter').text(currentSlide + 1);
    $('#totalSlides').text(total);
    $('#dotsContainer .dot-indicator').each(function(idx) {
      if (idx === currentSlide) {
        $(this).removeClass('bg-gray-300 w-3').addClass('bg-primary w-6');
      } else {
        $(this).removeClass('bg-primary w-6').addClass('bg-gray-300 w-3');
      }
    });
    $('#prevBtn').prop('disabled', currentSlide === 0);
    $('#nextBtn').prop('disabled', currentSlide === total - 1);
    if (window.MathJax) MathJax.typesetPromise && MathJax.typesetPromise();
  }

  $(document).ready(function() {
    const slidesHtml = buildSlides();
    $('#slidesContainer').html(slidesHtml);
    $('#totalSlides').text(total);
    generateDots();
    updateSlideAndUI();

    $('#prevBtn').on('click', () => {
      if (currentSlide > 0) { currentSlide--; updateSlideAndUI(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
    });
    $('#nextBtn').on('click', () => {
      if (currentSlide < total - 1) { currentSlide++; updateSlideAndUI(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
    });
    $(document).on('keydown', (e) => {
      if (e.key === 'ArrowLeft') $('#prevBtn').click();
      else if (e.key === 'ArrowRight') $('#nextBtn').click();
    });
  });
</script>
</body>
</html>
