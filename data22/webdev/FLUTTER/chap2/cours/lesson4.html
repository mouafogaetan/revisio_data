<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 4 : Fondamentaux de Dart pour Flutter | Cours Flutter</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (optionnel, pour formules si besoin mais pas prioritaire pour cette leçon) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* styles personnalisés pour renfort et slides */
        body {
            background: #f4f7fc; /* fond doux */
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        .slide-container {
            max-width: 1100px;
            margin: 0 auto;
            transition: all 0.2s ease;
        }
        .slide-card {
            background: white;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
            overflow-y: auto;
            max-height: 80vh;
        }
        /* navigation buttons */
        .nav-btn {
            background: #1E3A8A;
            transition: background 0.2s, transform 0.1s;
        }
        .nav-btn:hover:not(:disabled) {
            background: #1E40AF;
            transform: scale(1.02);
        }
        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .progress-bar {
            height: 6px;
            background: #DBEAFE;
            border-radius: 10px;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #2563EB;
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        /* code friendly */
        pre {
            background: #0F172A;
            color: #E2E8F0;
            padding: 1rem;
            border-radius: 1rem;
            overflow-x: auto;
            font-size: 0.9rem;
            margin: 1rem 0;
        }
        code {
            font-family: 'Fira Code', monospace;
        }
        .inline-code {
            background: #EFF6FF;
            color: #1E3A8A;
            padding: 0.2rem 0.4rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: monospace;
        }
        .lesson-badge {
            background: #E0F2FE;
            color: #0369A1;
        }
        @media (max-width: 640px) {
            .slide-card {
                border-radius: 1.5rem;
                max-height: 75vh;
            }
            .nav-btn {
                padding: 0.5rem 1rem;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body class="p-4 md:p-6">

    <div class="slide-container w-full px-2 md:px-4">
        <!-- Barre de progression -->
        <div class="mb-4 flex justify-between items-center text-sm text-gray-600">
            <span class="font-semibold">📘 Initiation à Flutter – Leçon 4</span>
            <span id="slideIndicator" class="bg-white/70 px-3 py-1 rounded-full shadow-sm">Slide 1 / ?</span>
        </div>
        <div class="progress-bar w-full mb-5">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <!-- Zone dynamique des slides -->
        <div id="slidesWrapper" class="relative">
            <!-- Le contenu sera injecté par jQuery -->
        </div>

        <!-- Navigation buttons -->
        <div class="flex justify-between items-center mt-6 gap-3">
            <button id="prevSlide" class="nav-btn px-5 py-2 rounded-full text-white font-medium shadow-md flex items-center gap-2 disabled:opacity-40" disabled>
                ⬅ Précédent
            </button>
            <div class="text-sm text-gray-500 bg-white/50 px-3 py-1 rounded-full">
                <span id="currentSlideNum">1</span> / <span id="totalSlidesNum">0</span>
            </div>
            <button id="nextSlide" class="nav-btn px-5 py-2 rounded-full text-white font-medium shadow-md flex items-center gap-2">
                Suivant ➡
            </button>
        </div>
    </div>

    <script>
        // Définition des slides pour la leçon 4: "Utiliser var, final, const et les types (int, double, String, bool) | Listes, Sets, Maps"
        // D'après les objectifs de lesson4: types, var/final/const, listes/sets/maps, et également différence final/const (inclus)
        // Nous structurons en plusieurs slides: 
        // Slide 1 : Titre + contexte Flutter/Dart
        // Slide 2 : Objectifs spécifiques de la leçon
        // Slide 3 : Variables et types de base (var, final, const, int, double, String, bool)
        // Slide 4 : Différence entre final et const (approfondie)
        // Slide 5 : Listes en Dart (List, opérations courantes)
        // Slide 6 : Sets (Set) et Maps (Map) avec exemples
        // Slide 7 : Petit récapitulatif pratique et exercice intégré (interaction)
        
        const slidesData = [
            {
                type: "title",
                title: "🎯 Dart : Variables, Types & Collections",
                subtitle: "Les fondations pour maîtriser Flutter",
                description: "Le langage Dart est le moteur de Flutter. Dans cette leçon, nous apprendrons à déclarer des variables, utiliser les types primitifs, et manipuler les collections (List, Set, Map).",
                icone: "📦"
            },
            {
                type: "objectifs",
                title: "🎓 Objectifs d’apprentissage",
                points: [
                    "✅ Utiliser <span class='inline-code'>var</span>, <span class='inline-code'>final</span> et <span class='inline-code'>const</span> en comprenant leurs différences.",
                    "✅ Maîtriser les types de base : <span class='inline-code'>int</span>, <span class='inline-code'>double</span>, <span class='inline-code'>String</span>, <span class='inline-code'>bool</span>.",
                    "✅ Comprendre la différence fondamentale entre <span class='inline-code'>final</span> et <span class='inline-code'>const</span>.",
                    "✅ Créer et manipuler des <span class='inline-code'>List</span> (listes), des <span class='inline-code'>Set</span> (ensembles) et des <span class='inline-code'>Map</span> (dictionnaires).",
                    "✅ Appliquer ces concepts dans de petits extraits de code Dart/Flutter."
                ]
            },
            {
                type: "content",
                title: "📌 Variables & Types primitifs",
                content: `
                    <p class="mb-3">En Dart, tout est objet. Chaque variable a un type, mais on peut aussi utiliser <strong class="text-blue-700">var</strong> pour que le type soit inféré automatiquement.</p>
                    <div class="bg-slate-800 text-gray-200 p-4 rounded-xl mb-4">
                        <pre><code>void main() {
  // Types explicites
  int age = 20;
  double taille = 1.75;
  String nom = "Abdou";
  bool estEtudiant = true;
  
  // Inférence avec var
  var pays = "Cameroun";   // String
  var population = 2700;   // int
  var note = 15.5;         // double
  
  print("$nom a $age ans, il mesure $taille m");
}</code></pre>
                    </div>
                    <p>✨ <strong>Important</strong> : Les chaînes de caractères peuvent utiliser les guillemets simples ou doubles. On peut insérer des expressions avec <span class="inline-code">${expression}</span>.</p>
                    <div class="bg-blue-50 border-l-4 border-blue-500 p-3 rounded-lg mt-2">
                        💡 Les types numériques <span class="inline-code">int</span> et <span class="inline-code">double</span> sont des sous-types de <span class="inline-code">num</span>. Dart gère également les opérations mathématiques classiques.
                    </div>
                `
            },
            {
                type: "content",
                title: "⚖️ final vs const : la différence clé",
                content: `
                    <p><span class="inline-code">final</span> : variable qui ne peut être modifiée qu'<strong>une seule fois</strong> (au moment de l'exécution).<br>
                    <span class="inline-code">const</span> : variable <strong>constante de compilation</strong>, sa valeur est connue avant même l'exécution du programme.</p>
                    <pre><code>void main() {
  final heure = DateTime.now(); // OK : valeur déterminée à l'exécution
  // const heureConst = DateTime.now(); // ERREUR ! DateTime.now() n'est pas constant
  
  const pi = 3.14159;        // constante de compilation
  final double gravite = 9.81; // final peut aussi être initialisé avec une valeur connue
  
  var listeFinale = [1, 2, 3];
  // listeFinale = [4,5,6];  // possible car listeFinale est var, pas final
  
  final listeConstante = [10, 20];
  // listeConstante.add(30); // On peut modifier le contenu ! final ne gèle pas l'objet, seulement la référence.
  // mais on ne peut pas réassigner : listeConstante = [99]; // Erreur
  
  const listeImmutable = [100, 200]; // compile-time constant
  // listeImmutable.add(300); // ERREUR : les objets const sont totalement immutables
}</code></pre>
                    <p class="mt-2 bg-yellow-50 p-2 rounded-md">📢 <strong>À retenir :</strong> <span class="inline-code">const</span> est plus restrictif et idéal pour les valeurs fixes (comme les couleurs, marges). <span class="inline-code">final</span> est parfait pour une variable initialisée une fois mais au runtime.</p>
                `
            },
            {
                type: "content",
                title: "📋 Les Listes (tableaux dynamiques)",
                content: `
                    <p>Une <strong>List</strong> en Dart est une collection ordonnée d'éléments, accessible par index. Les listes peuvent être de taille fixe ou extensible.</p>
                    <pre><code>void main() {
  // Liste mutable classique
  List&lt;String&gt; fruits = ["Mangue", "Orange", "Banane"];
  fruits.add("Ananas");
  fruits[0] = "Manguier";     // modification
  print(fruits);              // [Manguier, Orange, Banane, Ananas]
  
  // Liste avec inférence
  var notes = [12, 15, 18, 10];
  notes.removeAt(2);
  print(notes.length);        // 3
  
  // Liste immuable (compile-time)
  const joursSemaine = ["Lundi", "Mardi", "Mercredi"];
  // joursSemaine.add("Jeudi"); // interdit
  
  // Opérations utiles : .where(), .map(), .forEach()
  var pairs = [1,2,3,4].where((n) => n.isEven).toList();
  print(pairs); // [2,4]
}</code></pre>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-3">
                        <div class="bg-gray-100 p-3 rounded-lg"><span class="font-bold">📌 .add()</span> : ajouter élément</div>
                        <div class="bg-gray-100 p-3 rounded-lg"><span class="font-bold">📌 .remove()</span> : supprimer valeur</div>
                        <div class="bg-gray-100 p-3 rounded-lg"><span class="font-bold">🔁 .forEach()</span> : parcourir</div>
                        <div class="bg-gray-100 p-3 rounded-lg"><span class="font-bold">🧩 [] opérateur</span> : accès index</div>
                    </div>
                `
            },
            {
                type: "content",
                title: "🔄 Sets (ensembles) et Maps (dictionnaires)",
                content: `
                    <div class="mb-4">
                        <h3 class="text-xl font-semibold text-indigo-800">🔹 Set : collection sans doublons, non ordonnée</h3>
                        <pre><code>void main() {
  Set&lt;String&gt; regions = {"Centre", "Littoral", "Ouest", "Centre"};
  print(regions);   // {Centre, Littoral, Ouest} → doublon Centre supprimé
  
  regions.add("Nord");
  regions.add("Littoral"); // n'ajoute pas car déjà présent
  
  // Vérifier existence
  print(regions.contains("Ouest")); // true
}</code></pre>
                    </div>
                    <div>
                        <h3 class="text-xl font-semibold text-indigo-800">🗺️ Map : paires clé/valeur</h3>
                        <pre><code>void main() {
  Map&lt;String, int&gt; ages = {
    "Fatima": 22,
    "Yannick": 19,
    "Claude": 27,
  };
  
  ages["Aicha"] = 20;   // ajout/modification
  ages["Fatima"] = 23;   // mise à jour
  
  print(ages["Yannick"]); // 19
  print(ages.keys);       // (Fatima, Yannick, Claude, Aicha)
  print(ages.values);     // (23, 19, 27, 20)
  
  ages.forEach((nom, age) => print("$nom a $age ans"));
}</code></pre>
                        <p class="text-sm text-gray-600 mt-2">📌 Les Maps sont très utiles pour représenter des objets JSON ou des données structurées.</p>
                    </div>
                `
            },
            {
                type: "exercise",
                title: "🧪 Mini exercice interactif",
                content: `
                    <p class="mb-3">Teste ta compréhension ! Voici un extrait Dart. Corrige le code ou réponds à la question :</p>
                    <div class="bg-gray-900 text-white p-3 rounded-lg font-mono text-sm">
                        <pre id="codeSample" class="bg-transparent p-0">void main() {
  var pays = "Cameroun";
  final population = 27_000_000;   // int
  const capitale = "Yaoundé";
  
  // Que produit ce code ?
  List villes = ["Douala", "Yaoundé", "Garoua"];
  villes.add("Bafoussam");
  
  Set uniqueVilles = {"Douala","Yaoundé","Douala"};
  print(uniqueVilles.length);
  
  Map capitals = {"Cameroun": "Yaoundé", "France": "Paris"};
  capitals["Cameroun"] = "Nouveau siège?";
  print(capitals["Cameroun"]);
}</pre>
                    </div>
                    <div class="mt-4 space-y-2">
                        <p class="font-medium">❓ Questions :</p>
                        <ul class="list-disc pl-5 space-y-1">
                            <li>1. Que va afficher <span class="inline-code">print(uniqueVilles.length)</span> ?</li>
                            <li>2. La variable <span class="inline-code">population</span> est-elle modifiable après sa déclaration ?</li>
                            <li>3. Dans la Map, quelle valeur sera affichée pour "Cameroun" après la modification ?</li>
                        </ul>
                        <button id="revealAnswers" class="mt-3 bg-green-600 hover:bg-green-700 text-white px-5 py-2 rounded-full text-sm transition shadow">🔍 Voir les réponses</button>
                        <div id="answersBlock" class="mt-3 hidden bg-green-50 p-3 rounded-xl border border-green-200 text-green-800">
                            ✅ <strong>Réponses :</strong><br>
                            1. <span class="inline-code">2</span> (car Set supprime les doublons : "Douala" apparaît une seule fois).<br>
                            2. Non, car elle est déclarée <strong>final</strong> → ne peut être réaffectée.<br>
                            3. La valeur affichée sera <strong>"Nouveau siège?"</strong> (Map a mis à jour la clé "Cameroun").
                        </div>
                    </div>
                    <p class="text-sm mt-4 italic">💪 Bravo ! Ces concepts sont essentiels pour gérer l'état et les données dans tes apps Flutter.</p>
                `
            }
        ];
        
        let currentIndex = 0;
        let totalSlides = slidesData.length;
        
        // Mise à jour des infos et affichage slide
        function renderSlide(index) {
            const slide = slidesData[index];
            let html = '';
            const wrapper = $('#slidesWrapper');
            
            // Construction du contenu selon type de slide
            if (slide.type === 'title') {
                html = `
                    <div class="slide-card p-6 md:p-10 text-center">
                        <div class="text-6xl mb-4">${slide.icone}</div>
                        <h1 class="text-3xl md:text-5xl font-extrabold bg-gradient-to-r from-blue-800 to-indigo-700 bg-clip-text text-transparent">${slide.title}</h1>
                        <p class="text-xl text-gray-600 mt-3 font-medium">${slide.subtitle}</p>
                        <div class="mt-6 border-t pt-5 text-gray-500">${slide.description}</div>
                        <div class="mt-8 flex justify-center">
                            <div class="lesson-badge px-5 py-2 rounded-full text-sm font-semibold">📖 Flutter & Dart · Niveau débutant</div>
                        </div>
                    </div>
                `;
            } 
            else if (slide.type === 'objectifs') {
                let pointsHtml = '';
                slide.points.forEach(p => { pointsHtml += `<li class="mb-3 text-gray-700">${p}</li>`; });
                html = `
                    <div class="slide-card p-6 md:p-8">
                        <h2 class="text-2xl md:text-3xl font-bold text-indigo-800 border-b pb-2 mb-5">${slide.title}</h2>
                        <ul class="space-y-2 text-lg">${pointsHtml}</ul>
                        <div class="mt-6 bg-blue-50 p-4 rounded-xl text-blue-800">
                            💡 Ces compétences te permettront d'écrire du code Dart robuste avant de plonger dans les widgets Flutter.
                        </div>
                    </div>
                `;
            }
            else if (slide.type === 'content') {
                html = `
                    <div class="slide-card p-6 md:p-8">
                        <h2 class="text-2xl md:text-3xl font-bold text-indigo-800 mb-4 flex items-center gap-2">📘 ${slide.title}</h2>
                        <div class="prose max-w-none">${slide.content}</div>
                    </div>
                `;
            }
            else if (slide.type === 'exercise') {
                html = `
                    <div class="slide-card p-6 md:p-8">
                        <h2 class="text-2xl md:text-3xl font-bold text-indigo-800 mb-4">${slide.title}</h2>
                        <div>${slide.content}</div>
                    </div>
                `;
            }
            
            wrapper.html(html);
            // Mise à jour des indicateurs
            $('#currentSlideNum').text(index+1);
            $('#totalSlidesNum').text(totalSlides);
            $('#slideIndicator').text(`Slide ${index+1} / ${totalSlides}`);
            let progressPercent = ((index+1) / totalSlides) * 100;
            $('#progressFill').css('width', `${progressPercent}%`);
            
            // Gérer état des boutons
            $('#prevSlide').prop('disabled', index === 0);
            $('#nextSlide').prop('disabled', index === totalSlides-1);
            
            // Ré-associer les événements spécifiques si besoin (révélation réponse)
            if (slide.type === 'exercise') {
                $('#revealAnswers').off('click').on('click', function() {
                    $('#answersBlock').toggleClass('hidden');
                });
            }
        }
        
        // Navigation
        function nextSlide() {
            if (currentIndex < totalSlides - 1) {
                currentIndex++;
                renderSlide(currentIndex);
                // scroll en haut pour mobile
                $('html, body').animate({ scrollTop: 0 }, 200);
            }
        }
        
        function prevSlide() {
            if (currentIndex > 0) {
                currentIndex--;
                renderSlide(currentIndex);
                $('html, body').animate({ scrollTop: 0 }, 200);
            }
        }
        
        $(document).ready(function() {
            // Initialiser
            renderSlide(0);
            
            // Événements boutons
            $('#nextSlide').on('click', nextSlide);
            $('#prevSlide').on('click', prevSlide);
            
            // Raccourcis clavier (optionnel)
            $(document).on('keydown', function(e) {
                if (e.key === 'ArrowRight') {
                    nextSlide();
                } else if (e.key === 'ArrowLeft') {
                    prevSlide();
                }
            });
            
            // Adaptation: correction des hauteurs sur petits écrans pour éviter débordements
            $('.slide-card').css('overflow-y', 'auto');
        });
    </script>
    <!-- Ajout d'un petit texte de pied de page -->
    <footer class="text-center text-xs text-gray-400 mt-8 pb-4">
        Cours d'Initiation à Flutter - Enseignant au Cameroun 🇨🇲 | Leçon 4 : Variables, types & collections Dart
    </footer>
</body>
</html>
