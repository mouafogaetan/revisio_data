<head>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (pour les éventuelles formules, reste disponible) -->

    <style>

        }

        }

</head>
<body class="bg-gradient-to-b from-sky-50 to-indigo-50 font-sans antialiased">

    <div class="max-w-4xl mx-auto px-4 py-6 md:py-10">

    <script>
        // Définition des slides pour la LEÇON 34 : Tests unitaires avec flutter_test, mocks, widgets
        // Slide 0 : Titre

        const slidesData = [
            { // Slide 0 - Titre
                type: "title",
                content: `

                                <div class="flex items-center gap-3 mb-2"><span class="text-xl">✅</span><span class="font-semibold">Écrire des tests unitaires</span></div>
                                <p class="text-gray-600 text-sm">Utiliser le package <code class="bg-gray-200 px-1 rounded">flutter_test</code> pour tester les fonctions, les classes et la logique métier.</p>

                                <p class="text-gray-600 text-sm">Maîtriser <code>pumpWidget</code>, <code>find</code>, <code>expect</code> pour valider l'interface utilisateur.</p>

                            <div class="bg-sky-50 rounded-xl p-4 shadow-sm">
                                <div class="flex items-center gap-3 mb-2"><span class="text-xl">🎭</span><span class="font-semibold">Mocker avec mockito</span></div>
                                <p class="text-gray-600 text-sm">Simuler des dépendances externes (API, base de données) pour isoler les tests.</p>
                            </div>

                                <div class="flex items-center gap-3 mb-2"><span class="text-xl">🏆</span><span class="font-semibold">Bonnes pratiques</span></div>
                                <p class="text-gray-600 text-sm">Organiser ses tests, exécuter `flutter test` et interpréter la couverture.</p>
                            </div>
                        </div>
                        <div class="mt-6 bg-amber-50 border-l-4 border-amber-400 p-3 rounded text-amber-800 text-sm">
                            💡 À la fin de ce cours, vous saurez tester votre application Flutter comme un vrai pro !

            },
            { // Slide 2 - Introduction aux tests unitaires
                type: "content",
                content: `
                    <div class="px-6 py-8 md:px-10 prose max-w-none">
                        <h2 class="text-2xl font-bold text-indigo-800">🧪 Pourquoi tester son code Flutter ?</h2>
                        <p>Les tests unitaires permettent de vérifier que chaque petite partie (unité) de votre application fonctionne correctement. En Flutter, le framework intègre <strong class="text-indigo-700">flutter_test</strong> pour écrire et exécuter des tests rapidement.</p>
                        <div class="bg-indigo-50 p-4 rounded-xl my-4">
                            <p class="font-semibold">🔍 Avantages :</p>
                            <ul class="list-disc pl-5 space-y-1">
                                <li>Détecter les bugs avant la publication.</li>
                                <li>Refactoriser sans peur.</li>
                                <li>Documenter le comportement attendu.</li>
                                <li>Gagner du temps sur le long terme.</li>
                            </ul>
                        </div>
                        <pre><code>// Exemple simple de test unitaire
import 'package:flutter_test/flutter_test.dart';

void main() {
  test('Addition de 2 et 3 doit donner 5', () {
    int sum = 2 + 3;
    expect(sum, 5);
  });
}</code></pre>
                        <p class="mt-2 text-gray-600">📌 Exécutez les tests avec <code>flutter test</code> dans votre terminal.</p>
                    </div>
                `
            },
            { // Slide 3 - Tester des widgets (pumpWidget, find, expect)
                type: "content",
                content: `
                    <div class="px-6 py-8 md:px-10 prose max-w-none">
                        <h2 class="text-2xl font-bold text-indigo-800">📱 Tester des widgets Flutter</h2>
                        <p>Avec <code>WidgetTester</code>, vous pouvez construire vos widgets, interagir et vérifier le rendu.</p>
                        <div class="bg-gray-800 rounded-xl p-4 my-4 overflow-x-auto">
                            <pre class="text-sm text-gray-100"><code>testWidgets('Mon widget affiche un texte', (WidgetTester tester) async {
  // Construire le widget
  await tester.pumpWidget(MyApp());

  // Vérifier qu'un texte est présent
  expect(find.text('Bienvenue'), findsOneWidget);
  
  // Simuler un tap
  await tester.tap(find.byIcon(Icons.add));
  await tester.pump(); // Reconstruire
  expect(find.text('1'), findsOneWidget);
});</code></pre>
                        </div>
                        <ul class="list-disc pl-5">
                            <li><code>pumpWidget()</code> : monte le widget dans l’arbre de test.</li>
                            <li><code>find</code> : localise les widgets (par texte, type, clé).</li>
                            <li><code>expect</code> : assertions (findsOneWidget, findsNothing, findsNWidgets).</li>
                            <li><code>pump()</code> : déclenche une reconstruction (utile après animation ou setState).</li>
                        </ul>
                    </div>
                `
            },
            { // Slide 4 - Mockito : mocker les dépendances
                type: "content",
                content: `
                    <div class="px-6 py-8 md:px-10 prose max-w-none">
                        <h2 class="text-2xl font-bold text-indigo-800">🎭 Mocker avec Mockito (isoler les tests)</h2>
                        <p>Quand votre code dépend d’une API, d’une base de données ou d’un plugin, utilisez <strong>mockito</strong> pour simuler ces composants.</p>
                        <div class="bg-yellow-50 p-3 rounded border-l-4 border-yellow-400 mb-4">
                            ⚠️ Pensez à ajouter <code>mockito: ^5.4.0</code> et <code>build_runner</code> dans <strong>dev_dependencies</strong>.
                        </div>
                        <pre><code>// 1. Créer une classe mockée
import 'package:mockito/annotations.dart';
import 'package:mockito/mockito.dart';

@GenerateMocks([ApiService])
void main() {
  test('récupère les données', () async {
    final mockApi = MockApiService();
    when(mockApi.fetchData()).thenAnswer((_) async => "Données mockées");
    
    final result = await mockApi.fetchData();
    expect(result, "Données mockées");
    verify(mockApi.fetchData()).called(1);
  });
}</code></pre>
                        <p>🎯 Générez les mocks avec <code>flutter pub run build_runner build</code>. Cela rend vos tests rapides et prévisibles.</p>
                    </div>
                `
            },
            { // Slide 5 - Exemple concret : test d’un compteur
                type: "content",
                content: `
                    <div class="px-6 py-8 md:px-10 prose max-w-none">
                        <h2 class="text-2xl font-bold text-indigo-800">🔧 Cas pratique : Tester un CounterViewModel</h2>
                        <p>Prenons une classe simple qui gère un compteur.</p>
                        <pre><code>class Counter {
  int value = 0;
  void increment() => value++;
  void decrement() => value--;
}</code></pre>
                        <p>Test unitaire :</p>
                        <pre><code>import 'package:flutter_test/flutter_test.dart';

void main() {
  group('Counter', () {
    test('valeur initiale doit être 0', () {
      final counter = Counter();
      expect(counter.value, 0);
    });

    test('incrément augmente la valeur', () {
      final counter = Counter();
      counter.increment();
      expect(counter.value, 1);
    });
  });
}</code></pre>
                        <p>✅ Résultat : le terminal affiche "All tests passed!"</p>
                    </div>
                `
            },
            { // Slide 6 - Bonnes pratiques et astuces
                type: "content",
                content: `
                    <div class="px-6 py-8 md:px-10 prose max-w-none">
                        <h2 class="text-2xl font-bold text-indigo-800">🏅 Bonnes pratiques pour vos tests</h2>
                        <ul class="list-disc space-y-2">
                            <li>🔹 <strong>Organisation</strong> : placez vos tests dans le dossier <code>test/</code> avec le nom <code>nom_fichier_test.dart</code>.</li>
                            <li>🔹 <strong>Un test = une logique</strong> : chaque test doit valider un seul comportement.</li>
                            <li>🔹 <strong>Utilisez <code>setUp()</code></strong> pour initialiser des objets communs avant chaque test.</li>
                            <li>🔹 <strong>Testez les cas limites</strong> : valeurs nulles, erreurs, listes vides.</li>
                            <li>🔹 <strong>Pour les widgets asynchrones</strong> : utilisez <code>pumpAndSettle()</code> pour attendre les animations.</li>
                        </ul>
                        <div class="bg-green-50 p-4 rounded-xl mt-4">
                            <p class="font-bold text-green-800">📈 Couverture de code :</p>
                            <p>Exécutez <code>flutter test --coverage</code>, puis ouvrez <code>coverage/index.html</code> pour visualiser les parties non testées.</p>
                        </div>
                    </div>
                `
            },
            { // Slide 7 - Conclusion / défi
                type: "content",
                content: `
                    <div class="flex flex-col items-center justify-center min-h-[50vh] px-6 text-center">
                        <div class="bg-indigo-100 rounded-full p-3 mb-4">
                            <span class="text-3xl">🚀</span>
                        </div>
                        <h2 class="text-2xl font-bold text-indigo-800">Prêt à tester vos apps Flutter ?</h2>
                        <p class="text-gray-600 mt-2 max-w-md">N'oubliez pas : des tests fiables = des applications professionnelles et robustes. Entraînez-vous à écrire des tests unitaires pour chaque fonction que vous codez.</p>
                        <div class="mt-6 p-3 bg-indigo-50 rounded-xl w-full">
                            <p class="font-mono text-sm">✨ Exercice : Testez un formulaire de connexion avec des mocks ✨</p>
                        </div>
                        <p class="text-xs text-gray-400 mt-6">Leçon 34 - Programme Développement Web (Flutter) - Cameroun 🇨🇲</p>

                `
            }
        ];

        // Variables globales
        let currentIndex = 0;
        let totalSlides = slidesData.length;
        let $slidesWrapper = $("#slidesWrapper");
        let $dotsContainer = $("#dotsContainer");
        let $prevBtn = $("#prevBtn");
        let $nextBtn = $("#nextBtn");
        let $slideCounterSpan = $("#slideCounter");
        let $totalSlidesSpan = $("#totalSlides");

        // Construction des slides dans le wrapper
        function buildSlides() {
            $slidesWrapper.empty();
            slidesData.forEach((slide, idx) => {
                const slideDiv = $("<div>").addClass("slide w-full flex-shrink-0").html(slide.content);
                $slidesWrapper.append(slideDiv);
            });
            $totalSlidesSpan.text(totalSlides);
            updateSlidePosition();
            generateDots();
            updateButtonsAndCounter();
        }

        // Mise à jour de la translation horizontale
        function updateSlidePosition() {
            const offset = -currentIndex * 100;
            $slidesWrapper.css("transform", `translateX(${offset}%)`);
        }

        // Générer les petits points indicateurs
        function generateDots() {
            $dotsContainer.empty();
            for (let i = 0; i < totalSlides; i++) {
                const dot = $("<button>")
                    .addClass(`w-2.5 h-2.5 rounded-full mx-1 transition-all duration-200 focus:outline-none ${i === currentIndex ? "bg-indigo-600 w-5" : "bg-gray-300 hover:bg-indigo-300"}`)
                    .attr("data-index", i);
                dot.on("click", function() {
                    const idx = parseInt($(this).attr("data-index"));
                    if (!isNaN(idx) && idx !== currentIndex) {
                        currentIndex = idx;
                        updateSlidePosition();
                        updateDotsActive();
                        updateButtonsAndCounter();
                    }
                });
                $dotsContainer.append(dot);
            }
            updateDotsActive();
        }

        function updateDotsActive() {
            $dotsContainer.children().each(function(idx, el) {
                if (idx === currentIndex) {
                    $(el).removeClass("bg-gray-300 w-2.5").addClass("bg-indigo-600 w-5");
                } else {
                    $(el).removeClass("bg-indigo-600 w-5").addClass("bg-gray-300 w-2.5");
                }
            });
        }

        function updateButtonsAndCounter() {
            // Mise à jour compteur affiché
            $slideCounterSpan.text(currentIndex + 1);
            // Désactiver précédent si première slide
            if (currentIndex === 0) {
                $prevBtn.prop("disabled", true);
            } else {
                $prevBtn.prop("disabled", false);
            }
            // Désactiver suivant si dernière slide
            if (currentIndex === totalSlides - 1) {
                $nextBtn.prop("disabled", true);
            } else {
                $nextBtn.prop("disabled", false);
            }
        }

        function goNext() {
            if (currentIndex < totalSlides - 1) {
                currentIndex++;
                updateSlidePosition();
                updateDotsActive();
                updateButtonsAndCounter();
            }
        }

        function goPrev() {
            if (currentIndex > 0) {
                currentIndex--;
                updateSlidePosition();
                updateDotsActive();
                updateButtonsAndCounter();
            }
        }

        // Gestion des événements de swipe (pour mobile)
        let touchStartX = 0;
        let touchEndX = 0;
        const minSwipeDistance = 50; // en pixels

        function handleTouchStart(e) {
            touchStartX = e.originalEvent.touches[0].clientX;
        }

        function handleTouchEnd(e) {
            if (touchStartX === 0) return;
            touchEndX = e.originalEvent.changedTouches[0].clientX;
            const diff = touchEndX - touchStartX;
            if (Math.abs(diff) > minSwipeDistance) {
                if (diff > 0) {
                    // swipe droite → précédent
                    goPrev();
                } else {
                    // swipe gauche → suivant
                    goNext();
                }
            }
            touchStartX = 0;
        }

        // Initialisation au chargement
        $(document).ready(function() {
            buildSlides();
            // Événements boutons
            $prevBtn.on("click", goPrev);
            $nextBtn.on("click", goNext);
            // Gestion du swipe sur le conteneur des slides
            const $sliderContainer = $(".overflow-hidden");
            $sliderContainer.on("touchstart", handleTouchStart);
            $sliderContainer.on("touchend", handleTouchEnd);
            // Support clavier (optionnel)
            $(document).keydown(function(e) {
                if (e.key === "ArrowLeft") {
                    goPrev();
                    e.preventDefault();
                } else if (e.key === "ArrowRight") {
                    goNext();
                    e.preventDefault();
                }
            });
        });
    </script>
