<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 8 : Pare-feu - Sécurisation Réseau | Cours Cybersécurité</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (optionnel, pour d'éventuelles formules mais peu nécessaire ici, présent par précaution) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* Personnalisation légère pour un confort de lecture */
        body {
            background: #f4f7fc; /* fond doux */
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        /* transitions slides */
        .slide {
            transition: opacity 0.3s ease-in-out;
        }
        .slide-hidden {
            display: none;
        }
        /* boutons de navigation adaptés tactile */
        .nav-btn {
            transition: all 0.2s;
        }
        .nav-btn:active {
            transform: scale(0.96);
        }
        /* Scrollbar discrète si besoin */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 10px;
        }
        /* améliorer contraste sur mobile */
        @media (max-width: 640px) {
            .card-slide {
                padding: 1.25rem !important;
            }
            h1 {
                font-size: 1.8rem !important;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-50 p-4 md:p-6 min-h-screen flex items-center justify-center">

    <div class="max-w-4xl w-full mx-auto">
        <!-- Conteneur principal carte slide -->
        <div class="bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl overflow-hidden border border-indigo-100">
            <!-- Header avec progression et titre matière -->
            <div class="bg-indigo-800 text-white px-5 py-3 flex justify-between items-center flex-wrap gap-2">
                <div>
                    <p class="text-xs font-semibold uppercase tracking-wide">📡 Cybersécurité · Protection réseau</p>
                    <p class="text-sm font-medium opacity-90">Chapitre 3 : Protéger l'infrastructure réseau</p>
                </div>
                <div class="bg-indigo-900/60 px-3 py-1 rounded-full text-sm font-bold">
                    Leçon 8/40
                </div>
            </div>

            <!-- Zone d'affichage des slides dynamique -->
            <div id="slides-container" class="relative min-h-[500px] md:min-h-[550px]">
                <!-- Les slides seront injectées via jQuery -->
            </div>

            <!-- Navigation + indicateur de slide -->
            <div class="bg-gray-50 px-5 py-4 border-t border-indigo-100 flex flex-col sm:flex-row items-center justify-between gap-3">
                <div class="flex gap-3 order-2 sm:order-1">
                    <button id="prevSlide" class="nav-btn bg-white border border-indigo-300 hover:bg-indigo-50 text-indigo-800 font-semibold py-2 px-5 rounded-xl shadow-sm transition flex items-center gap-1 disabled:opacity-40 disabled:cursor-not-allowed">
                        ◀ Précédent
                    </button>
                    <button id="nextSlide" class="nav-btn bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-5 rounded-xl shadow-md transition flex items-center gap-1">
                        Suivant ▶
                    </button>
                </div>
                <div class="text-sm text-gray-600 font-medium order-1 sm:order-2">
                    Slide <span id="currentSlideIndex">1</span> / <span id="totalSlidesCount">0</span>
                </div>
                <div class="flex gap-1 order-3">
                    <button id="resetSlide" class="text-xs text-indigo-500 hover:text-indigo-700 bg-indigo-50 px-3 py-1.5 rounded-full transition" title="Revenir au début">
                        ↺ Recommencer
                    </button>
                </div>
            </div>
        </div>
        <p class="text-center text-xs text-gray-500 mt-6">📘 Support de cours — Cameroun · Initiation cybersécurité | Approche simple et accessible</p>
    </div>

    <script>
        $(document).ready(function() {
            // --------------------------------------------------------------
            // Contenu structuré de la Leçon 8 : Pare-feu (Firewalls)
            // Conformément au référentiel lesson8 : 
            // objectifs: distinguer matériel/logiciel, filtrage par paquets (ACL, stateful), NGFW/UTM
            // Nous construisons 5 slides : Titre, Objectifs, Théorie1, Théorie2, Exercice/Résumé
            // --------------------------------------------------------------
            
            const slidesData = [
                {   // SLIDE 1 - TITRE
                    type: "title",
                    title: "🛡️ Pare-feu : Le gardien du réseau",
                    subtitle: "Comprendre, configurer et maîtriser les murs de feu numériques",
                    icon: "🔥",
                    bgClass: "bg-gradient-to-br from-indigo-700 to-purple-800"
                },
                {   // SLIDE 2 - OBJECTIFS PÉDAGOGIQUES
                    type: "objectives",
                    objectives: [
                        "✅ Distinguer un pare-feu matériel d’un pare-feu logiciel.",
                        "✅ Comprendre le filtrage par paquets (ACL, inspection avec état).",
                        "✅ Découvrir les pare-feu nouvelle génération (NGFW) et UTM."
                    ]
                },
                {   // SLIDE 3 - Qu'est-ce qu'un pare-feu ? Matériel vs Logiciel
                    type: "content",
                    title: "🧱 Pare-feu matériel vs logiciel",
                    content: `
                        <p class="mb-3 text-gray-700 leading-relaxed">Un <strong class="text-indigo-700">pare-feu</strong> est un système de sécurité qui contrôle le trafic réseau entrant et sortant selon des règles définies. Il agit comme une barrière entre un réseau interne (fiable) et des réseaux externes (non fiables comme Internet).</p>
                        <div class="grid md:grid-cols-2 gap-5 mt-4">
                            <div class="bg-indigo-50 p-4 rounded-xl border-l-4 border-indigo-500">
                                <h3 class="font-bold text-indigo-800 text-lg flex items-center gap-2">🖥️ Pare-feu logiciel</h3>
                                <p class="text-sm mt-1">Installé sur un système d'exploitation (Windows Defender, iptables, pfSense). Idéal pour protéger un serveur ou poste de travail individuel.</p>
                                <ul class="list-disc list-inside text-sm mt-2 space-y-1 text-gray-700"><li>✅ Moins coûteux, flexible</li><li>⚠️ Consomme des ressources CPU/RAM</li></ul>
                            </div>
                            <div class="bg-purple-50 p-4 rounded-xl border-l-4 border-purple-500">
                                <h3 class="font-bold text-purple-800 text-lg flex items-center gap-2">🏢 Pare-feu matériel</h3>
                                <p class="text-sm mt-1">Appliance dédiée (Cisco, Fortinet, Netgate). Protège tout un réseau d'entreprise.</p>
                                <ul class="list-disc list-inside text-sm mt-2 space-y-1 text-gray-700"><li>✅ Performances élevées, fiabilité</li><li>⚠️ Coût plus important</li></ul>
                            </div>
                        </div>
                        <div class="mt-5 p-3 bg-amber-50 rounded-lg text-amber-800 text-sm border border-amber-200">
                            💡 <span class="font-semibold">En résumé :</span> Un pare-feu matériel protège l’ensemble du réseau, tandis qu’un pare-feu logiciel protège une machine spécifique. Dans les entreprises, on utilise souvent les deux !
                        </div>
                    `
                },
                {   // SLIDE 4 - Filtrage par paquets (ACL, Stateful inspection)
                    type: "content",
                    title: "🔎 Filtrage par paquets : ACL & Stateful Inspection",
                    content: `
                        <p class="mb-3">Le cœur du pare-feu repose sur l’analyse des paquets réseau. Deux grandes méthodes :</p>
                        <div class="space-y-5 mt-2">
                            <div class="bg-gray-50 p-4 rounded-xl shadow-sm">
                                <h3 class="font-bold text-indigo-800">📦 Filtrage statique (ACL - Access Control List)</h3>
                                <p class="text-sm mt-1">Examine chaque paquet de manière indépendante selon des règles statiques (IP source/destination, port, protocole). <span class="italic">"Je regarde chaque enveloppe sans me souvenir des précédentes."</span></p>
                                <pre class="bg-gray-800 text-green-300 p-2 rounded-md text-xs mt-2 overflow-x-auto">Autoriser TCP 192.168.1.0/24 vers 0.0.0.0/0 port 80 (HTTP)<br>Bloquer tout autre trafic</pre>
                            </div>
                            <div class="bg-gray-50 p-4 rounded-xl shadow-sm border-l-4 border-indigo-400">
                                <h3 class="font-bold text-indigo-800">🧠 Filtrage avec état (Stateful inspection)</h3>
                                <p class="text-sm mt-1">Garde en mémoire l'état des connexions (ouvertes, établies). Autorise automatiquement le trafic retour si la connexion a été initiée de l’intérieur.</p>
                                <p class="text-sm mt-2">🔒 Exemple : Vous allez sur un site web → le pare-feu autorise la réponse du serveur. Sans cela, il bloquerait les paquets entrants. Plus sécurisé et intelligent !</p>
                            </div>
                        </div>
                        <div class="mt-4 text-center text-xs text-gray-500 italic">📡 Les pare-feux modernes combinent ACL et inspection dynamique.</div>
                    `
                },
                {   // SLIDE 5 - NGFW & UTM (Nouvelle génération)
                    type: "content",
                    title: "🚀 Pare-feu nouvelle génération (NGFW) & UTM",
                    content: `
                        <p class="mb-3">Les <strong class="text-indigo-700">NGFW (Next-Generation Firewall)</strong> vont au-delà du filtrage classique. Ils intègrent des fonctionnalités avancées :</p>
                        <div class="flex flex-wrap gap-3 justify-between mt-2">
                            <div class="bg-white border border-indigo-100 rounded-xl p-3 flex-1 min-w-[140px] shadow-sm">
                                <div class="text-2xl">🔍</div>
                                <div class="font-semibold text-sm">Inspection profonde</div>
                                <div class="text-xs text-gray-600">Analyse du contenu des paquets (DPI)</div>
                            </div>
                            <div class="bg-white border border-indigo-100 rounded-xl p-3 flex-1 min-w-[140px] shadow-sm">
                                <div class="text-2xl">🛡️</div>
                                <div class="font-semibold text-sm">IPS intégré</div>
                                <div class="text-xs text-gray-600">Prévention d'intrusion</div>
                            </div>
                            <div class="bg-white border border-indigo-100 rounded-xl p-3 flex-1 min-w-[140px] shadow-sm">
                                <div class="text-2xl">☁️</div>
                                <div class="font-semibold text-sm">Filtrage web</div>
                                <div class="text-xs text-gray-600">Catégorisation URL</div>
                            </div>
                        </div>
                        <div class="mt-5 bg-indigo-50 p-4 rounded-lg">
                            <h4 class="font-bold text-indigo-800">📦 UTM (Unified Threat Management)</h4>
                            <p class="text-sm">Solution "tout-en-un" : pare-feu, antivirus, anti-spam, VPN, filtrage web, etc. Idéal pour PME et établissements scolaires. Exemples: <strong>Sophos XG, FortiGate, pfSense (avec plugins)</strong>.</p>
                        </div>
                        <div class="mt-3 text-sm text-gray-600 italic bg-white rounded-lg p-2 border">
                            💡 À retenir : Les pare-feux modernes ne se contentent plus de bloquer des ports, ils comprennent les applications et détectent les comportements malveillants.
                        </div>
                    `
                },
                {   // SLIDE 6 - Synthèse / Quiz / Cas pratique simple
                    type: "recap",
                    title: "🧠 Petite mise en pratique",
                    content: `
                        <div class="space-y-4">
                            <p class="font-medium">❓ Questions pour réfléchir :</p>
                            <ul class="list-decimal list-inside space-y-2 text-gray-800">
                                <li>Pourquoi un pare-feu logiciel est-il utile sur un ordinateur portable qui se connecte à différents réseaux (WiFi public, maison) ?</li>
                                <li>Que se passe-t-il si un pare-feu stateful reçoit un paquet "réponse" sans qu'une connexion n'ait été demandée auparavant ?</li>
                                <li>Citez un avantage d'un NGFW par rapport à un pare-feu classique.</li>
                            </ul>
                            <div class="bg-green-50 border-l-4 border-green-500 p-3 rounded-r-lg mt-4">
                                <p class="text-sm font-medium text-green-800">🎯 Activité simple :</p>
                                <p class="text-sm">Sur votre ordinateur, affichez les règles du pare-feu (ex: Windows -> "Windows Defender Firewall" ou sur Linux `sudo iptables -L`). Observez les règles entrantes/sortantes. Discutez en classe.</p>
                            </div>
                            <div class="text-center text-xs text-gray-400 mt-4">🔐 Rappel : La sécurité est un processus, pas un produit !</div>
                        </div>
                    `
                }
            ];
            
            let currentSlide = 0;
            let totalSlides = slidesData.length;
            
            // Mise à jour compteur & affichage slide
            function renderSlide(index) {
                if (index < 0) index = 0;
                if (index >= totalSlides) index = totalSlides - 1;
                currentSlide = index;
                
                const slide = slidesData[currentSlide];
                let html = '';
                const baseClass = "slide p-5 md:p-7 transition-all duration-200";
                
                if (slide.type === 'title') {
                    html = `
                        <div class="${baseClass} ${slide.bgClass || 'bg-indigo-700'} text-white rounded-2xl shadow-inner">
                            <div class="flex flex-col items-center text-center justify-center min-h-[450px]">
                                <div class="text-6xl mb-4 drop-shadow-lg">${slide.icon || '🛡️'}</div>
                                <h1 class="text-3xl md:text-4xl font-extrabold mb-3 tracking-tight">${slide.title}</h1>
                                <p class="text-indigo-100 text-lg md:text-xl max-w-lg">${slide.subtitle || 'Protéger son réseau avec intelligence'}</p>
                                <div class="mt-8 bg-white/20 rounded-full px-4 py-1 text-sm font-mono">Leçon 8 · Pare-feu</div>
                            </div>
                        </div>
                    `;
                } 
                else if (slide.type === 'objectives') {
                    html = `
                        <div class="${baseClass} bg-white">
                            <div class="flex items-center gap-3 mb-5 border-b border-indigo-200 pb-3">
                                <span class="text-3xl">🎯</span>
                                <h2 class="text-2xl font-bold text-indigo-800">Objectifs de la leçon</h2>
                            </div>
                            <ul class="space-y-4 mt-2">
                                ${slide.objectives.map(obj => `<li class="flex items-start gap-3 text-gray-700 text-lg"><span class="text-green-500 text-xl">✓</span> <span>${obj}</span></li>`).join('')}
                            </ul>
                            <div class="mt-8 p-3 bg-indigo-50 rounded-xl italic text-indigo-700 text-sm">
                                🌟 Après ce cours, vous saurez comment un pare-feu filtre le trafic et protège un réseau !
                            </div>
                        </div>
                    `;
                }
                else if (slide.type === 'content') {
                    html = `
                        <div class="${baseClass} bg-white">
                            <div class="flex items-center gap-2 mb-4">
                                <span class="text-2xl">📖</span>
                                <h2 class="text-xl md:text-2xl font-bold text-indigo-800">${slide.title}</h2>
                            </div>
                            <div class="prose max-w-none text-gray-700">
                                ${slide.content}
                            </div>
                        </div>
                    `;
                }
                else if (slide.type === 'recap') {
                    html = `
                        <div class="${baseClass} bg-white">
                            <div class="flex items-center gap-2 mb-4 border-b border-indigo-100 pb-2">
                                <span class="text-2xl">📌</span>
                                <h2 class="text-xl md:text-2xl font-bold text-indigo-800">${slide.title}</h2>
                            </div>
                            <div class="text-gray-700">
                                ${slide.content}
                            </div>
                            <div class="mt-6 text-center text-sm text-gray-400 border-t pt-4">
                                ✅ Fin de la leçon 8 — N’hésitez pas à revoir les concepts.
                            </div>
                        </div>
                    `;
                }
                else {
                    // fallback
                    html = `<div class="${baseClass} bg-white"><p>Contenu en préparation</p></div>`;
                }
                
                $("#slides-container").fadeOut(100, function() {
                    $(this).html(html).fadeIn(200);
                });
                
                // Mettre à jour l'indicateur et désactiver les boutons si besoin
                $("#currentSlideIndex").text(currentSlide+1);
                $("#totalSlidesCount").text(totalSlides);
                
                // Gestion des états des boutons
                if (currentSlide === 0) {
                    $("#prevSlide").prop('disabled', true);
                } else {
                    $("#prevSlide").prop('disabled', false);
                }
                if (currentSlide === totalSlides-1) {
                    $("#nextSlide").prop('disabled', true);
                } else {
                    $("#nextSlide").prop('disabled', false);
                }
            }
            
            // Navigation
            function nextSlide() {
                if (currentSlide < totalSlides - 1) {
                    renderSlide(currentSlide + 1);
                }
            }
            function prevSlide() {
                if (currentSlide > 0) {
                    renderSlide(currentSlide - 1);
                }
            }
            function resetToFirst() {
                renderSlide(0);
            }
            
            // Événements
            $("#nextSlide").on('click', nextSlide);
            $("#prevSlide").on('click', prevSlide);
            $("#resetSlide").on('click', resetToFirst);
            
            // Gestion du clavier (flèches droite/gauche)
            $(document).on('keydown', function(e) {
                if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    nextSlide();
                } else if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    prevSlide();
                } else if (e.key === 'Home') {
                    e.preventDefault();
                    resetToFirst();
                }
            });
            
            // Support tactile simple (swipe) optionnel
            let touchStartX = 0;
            $("#slides-container").on('touchstart', function(e) {
                touchStartX = e.originalEvent.touches[0].clientX;
            });
            $("#slides-container").on('touchend', function(e) {
                if (!touchStartX) return;
                let endX = e.originalEvent.changedTouches[0].clientX;
                let diff = endX - touchStartX;
                if (Math.abs(diff) > 50) {
                    if (diff > 0) prevSlide();
                    else nextSlide();
                }
                touchStartX = 0;
            });
            
            // Initialisation
            renderSlide(0);
        });
    </script>
</body>
</html>
