<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 35 : RGPD - Protection des données | Cours Cybersécurité</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (optionnel, pour d'éventuelles formules) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <!-- Font Awesome pour icônes discrètes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Animation douce et corrections mobile */
        body {
            background: linear-gradient(135deg, #f0f9ff 0%, #e9f0f5 100%);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        .slide-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .slide-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.15);
        }
        .progress-dot {
            transition: all 0.2s;
            cursor: pointer;
        }
        .progress-dot.active {
            background-color: #1e3a8a;
            transform: scale(1.2);
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.3);
        }
        .btn-nav {
            transition: all 0.2s;
        }
        .btn-nav:active {
            transform: scale(0.96);
        }
        /* Ajustements pour très petits écrans */
        @media (max-width: 480px) {
            .slide-card {
                border-radius: 1.5rem;
            }
            h2 {
                font-size: 1.5rem;
            }
        }
        /* Pour améliorer lisibilité contenu */
        .lesson-content p, .lesson-content li {
            font-size: 1rem;
            line-height: 1.5;
        }
    </style>
</head>
<body class="antialiased">

    <div class="max-w-4xl mx-auto px-4 py-6 md:py-10">
        <!-- En-tête de la matière (fixe, hors slides) -->
        <div class="mb-6 text-center md:text-left md:flex md:justify-between md:items-center bg-white/60 backdrop-blur-sm rounded-2xl p-3 shadow-sm">
            <div>
                <span class="text-xs font-semibold text-blue-700 bg-blue-100 px-3 py-1 rounded-full">Classe : Développement Web</span>
                <h1 class="text-xl md:text-2xl font-bold text-gray-800 mt-1">Initiation à la Cybersécurité</h1>
            </div>
            <div class="mt-2 md:mt-0 text-sm text-gray-600">
                <i class="fas fa-gavel mr-1 text-blue-600"></i> Leçon 35 · RGPD & conformité
            </div>
        </div>

        <!-- Conteneur principal des slides -->
        <div id="slides-container" class="relative">
            <!-- Les slides seront injectées dynamiquement via jQuery -->
        </div>

        <!-- Navigation et progression -->
        <div class="mt-8 flex flex-col items-center gap-4">
            <!-- Indicateurs de progression (dots) -->
            <div id="progress-dots" class="flex flex-wrap justify-center gap-2 mb-2"></div>
            
            <div class="flex justify-between items-center w-full max-w-sm gap-4">
                <button id="prev-slide" class="btn-nav bg-white hover:bg-gray-100 text-gray-800 font-semibold py-2 px-5 rounded-full shadow-md transition flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed">
                    <i class="fas fa-chevron-left text-sm"></i> Précédent
                </button>
                <span id="slide-counter" class="text-sm bg-gray-800/70 text-white px-3 py-1 rounded-full">Slide 1 / X</span>
                <button id="next-slide" class="btn-nav bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2 px-5 rounded-full shadow-md transition flex items-center gap-2">
                    Suivant <i class="fas fa-chevron-right text-sm"></i>
                </button>
            </div>
        </div>

        <!-- Pied de page informatif -->
        <div class="text-center text-xs text-gray-500 mt-8 border-t border-gray-200 pt-5">
            <i class="fas fa-lock"></i> Cours conforme aux programmes officiels Cameroun · Protection des données personnelles
        </div>
    </div>

    <script>
        $(document).ready(function() {
            // ---------- Définition des slides pour la leçon 35 (RGPD) ----------
            // D'après objectifsLesson de lesson35 : 
            // 0: Comprendre les droits des personnes (accès, rectification, effacement)
            // 1: Identifier les obligations (DPIA, DPO, notification de violation)
            // 2: Mettre en conformité les traitements de données
            // Nous allons construire un slide titre, un slide objectifs, puis 3 slides de contenu (un par objectif)
            // plus un slide récapitulatif / mise en situation. Soit 6 slides au total.
            
            const slidesData = [
                {
                    type: "title",
                    title: "RGPD : Règlement Général sur la Protection des Données",
                    subtitle: "Comprendre et appliquer la réglementation européenne (et son influence au Cameroun)",
                    icon: "fas fa-shield-alt"
                },
                {
                    type: "objectifs",
                    title: "Objectifs de la leçon",
                    objectives: [
                        "Comprendre les droits des personnes concernées (accès, rectification, effacement - droit à l'oubli)",
                        "Identifier les obligations des organismes (DPIA, DPO, notification de violation)",
                        "Mettre en conformité les traitements de données personnelles"
                    ]
                },
                {
                    type: "content",
                    title: "📌 Droit des personnes : accès, rectification et effacement",
                    content: `
                        <p class="mb-3">Le RGPD donne aux citoyens un <strong>contrôle renforcé</strong> sur leurs données personnelles. Trois droits fondamentaux :</p>
                        <ul class="list-disc pl-6 space-y-2 mb-4">
                            <li><i class="fas fa-eye text-blue-600 mr-2"></i> <strong>Droit d’accès</strong> : toute personne peut demander à savoir quelles données sont détenues, pourquoi, et obtenir une copie gratuitement.</li>
                            <li><i class="fas fa-pen text-green-600 mr-2"></i> <strong>Droit de rectification</strong> : si les données sont inexactes ou incomplètes, l’individu peut exiger leur correction.</li>
                            <li><i class="fas fa-trash-alt text-red-600 mr-2"></i> <strong>Droit à l’effacement (“droit à l’oubli”)</strong> : suppression des données lorsqu’elles ne sont plus nécessaires, ou en cas de retrait de consentement.</li>
                        </ul>
                        <div class="bg-blue-50 border-l-4 border-blue-500 p-3 rounded text-sm mt-2">
                            <i class="fas fa-info-circle text-blue-700 mr-1"></i> <span class="font-medium">Exemple concret :</span> Un ancien client peut demander à une entreprise de supprimer ses coordonnées deux ans après la fin du contrat.
                        </div>
                    `
                },
                {
                    type: "content",
                    title: "⚙️ Obligations des responsables de traitement",
                    content: `
                        <p class="mb-3">Les organisations (entreprises, écoles, associations) doivent se conformer à plusieurs obligations clés :</p>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-2">
                            <div class="bg-white rounded-lg shadow-sm p-3 border border-gray-200">
                                <i class="fas fa-chart-line text-purple-600 text-xl mb-1"></i>
                                <h4 class="font-bold">DPIA (Analyse d'impact)</h4>
                                <p class="text-sm">Obligatoire pour les traitements à risque élevé (ex: suivi santé, évaluation systématique).</p>
                            </div>
                            <div class="bg-white rounded-lg shadow-sm p-3 border border-gray-200">
                                <i class="fas fa-user-tie text-indigo-600 text-xl mb-1"></i>
                                <h4 class="font-bold">DPO (Délégué à la protection)</h4>
                                <p class="text-sm">Désignation obligatoire pour certaines structures (secteur public, traitement à grande échelle).</p>
                            </div>
                            <div class="bg-white rounded-lg shadow-sm p-3 border border-gray-200 col-span-1 md:col-span-2">
                                <i class="fas fa-bell text-red-500 text-xl mb-1"></i>
                                <h4 class="font-bold">Notification de violation de données</h4>
                                <p class="text-sm">En cas de fuite ou accès non autorisé, notifier l'autorité de contrôle dans les 72 heures et informer les personnes concernées si risque élevé.</p>
                            </div>
                        </div>
                        <p class="mt-3 text-xs text-gray-500"><i class="fas fa-gavel"></i> Les manquements peuvent entraîner des amendes allant jusqu'à 20 millions € ou 4% du CA mondial.</p>
                    `
                },
                {
                    type: "content",
                    title: "🛠️ Mettre en conformité ses traitements de données",
                    content: `
                        <p class="mb-3">Pour respecter le RGPD, voici les étapes pratiques pour tout organisme (même au Cameroun, si vous traitez des données de citoyens européens ou inspirez-vous de ces standards) :</p>
                        <ol class="list-decimal pl-6 space-y-2 mb-4">
                            <li><strong>Cartographier les données</strong> : identifier quelles données personnelles sont collectées (nom, email, IP, etc.).</li>
                            <li><strong>Base légale claire</strong> : consentement, contrat, obligation légale, intérêt légitime, etc.</li>
                            <li><strong>Respecter les principes</strong> : minimisation (collecter l'essentiel), limitation de conservation, sécurité intégrée (Privacy by Design).</li>
                            <li><strong>Informer les personnes</strong> via une politique de confidentialité accessible et transparente.</li>
                            <li><strong>Répondre aux demandes d'exercice des droits</strong> (accès, rectification, effacement) sous 1 mois.</li>
                        </ol>
                        <div class="bg-green-50 border border-green-200 rounded-lg p-3 text-sm">
                            <i class="fas fa-check-circle text-green-700 mr-1"></i> <span class="font-semibold">Bon à savoir :</span> Tenir un registre des traitements est obligatoire pour la plupart des responsables.
                        </div>
                    `
                },
                {
                    type: "summary",
                    title: "✨ Synthèse & application locale",
                    content: `
                        <p class="mb-3">Le RGPD est un standard mondial. Au Cameroun, la loi n° 2021-012 relative à la protection des données personnelles s’inspire fortement du RGPD.</p>
                        <div class="flex flex-wrap gap-2 justify-center my-4">
                            <span class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-sm"><i class="fas fa-user-check mr-1"></i> Droits : accès, rectif, effacement</span>
                            <span class="bg-purple-100 text-purple-800 px-3 py-1 rounded-full text-sm"><i class="fas fa-tasks mr-1"></i> Obligations : DPIA, DPO, notification</span>
                            <span class="bg-green-100 text-green-800 px-3 py-1 rounded-full text-sm"><i class="fas fa-database mr-1"></i> Mise en conformité : cartographie + sécurité</span>
                        </div>
                        <p class="text-center italic text-gray-600">"La protection des données n’est pas une option, c’est un droit fondamental."</p>
                        <div class="mt-4 text-center text-sm bg-gray-100 p-2 rounded-lg">
                            <i class="fas fa-school"></i> En tant que futur développeur web, intégrez dès maintenant un bandeau de consentement cookies et une politique de confidentialité dans vos projets !
                        </div>
                    `
                }
            ];

            let currentIndex = 0;
            const totalSlides = slidesData.length;

            // Fonction pour rendre un slide selon son type
            function renderSlide(slide, idx) {
                if (slide.type === "title") {
                    return `
                        <div class="slide-card bg-white rounded-2xl shadow-xl overflow-hidden">
                            <div class="bg-gradient-to-r from-blue-800 to-indigo-700 p-6 md:p-8 text-white text-center">
                                <i class="${slide.icon} text-5xl mb-3 opacity-90"></i>
                                <h2 class="text-3xl md:text-4xl font-extrabold leading-tight">${slide.title}</h2>
                                <div class="w-20 h-1 bg-yellow-400 mx-auto my-4 rounded-full"></div>
                                <p class="text-lg md:text-xl opacity-90">${slide.subtitle}</p>
                                <div class="mt-6 text-sm bg-white/20 inline-block px-4 py-1 rounded-full backdrop-blur-sm">Leçon 35 · Cybersécurité</div>
                            </div>
                        </div>
                    `;
                } 
                else if (slide.type === "objectifs") {
                    let objItems = '';
                    slide.objectives.forEach((obj, i) => {
                        objItems += `<li class="flex items-start gap-3 mb-4"><span class="bg-blue-100 text-blue-800 font-bold rounded-full w-6 h-6 inline-flex items-center justify-center flex-shrink-0 mt-0.5">${i+1}</span><span class="text-gray-700">${obj}</span></li>`;
                    });
                    return `
                        <div class="slide-card bg-white rounded-2xl shadow-xl overflow-hidden">
                            <div class="bg-blue-50 px-6 py-5 border-b border-blue-100">
                                <h2 class="text-2xl font-bold text-blue-900"><i class="fas fa-bullseye mr-2"></i> ${slide.title}</h2>
                            </div>
                            <div class="p-6 md:p-8">
                                <ul class="space-y-3">
                                    ${objItems}
                                </ul>
                                <div class="mt-6 text-sm text-gray-500 border-t pt-4">
                                    <i class="fas fa-graduation-cap"></i> À la fin de cette leçon, vous serez capable de conseiller et d'appliquer les bases du RGPD.
                                </div>
                            </div>
                        </div>
                    `;
                }
                else if (slide.type === "content") {
                    return `
                        <div class="slide-card bg-white rounded-2xl shadow-xl overflow-hidden">
                            <div class="bg-white px-6 py-4 border-b border-gray-200 flex items-center gap-2">
                                <i class="fas fa-file-alt text-blue-600 text-xl"></i>
                                <h2 class="text-xl md:text-2xl font-bold text-gray-800">${slide.title}</h2>
                            </div>
                            <div class="p-6 md:p-8 lesson-content">
                                ${slide.content}
                            </div>
                            <div class="bg-gray-50 px-6 py-2 text-right text-xs text-gray-400 border-t">
                                <i class="fas fa-database"></i> Fondamentaux RGPD
                            </div>
                        </div>
                    `;
                }
                else if (slide.type === "summary") {
                    return `
                        <div class="slide-card bg-white rounded-2xl shadow-xl overflow-hidden">
                            <div class="bg-gradient-to-r from-green-700 to-teal-700 px-6 py-4 text-white">
                                <h2 class="text-2xl font-bold"><i class="fas fa-clipboard-list mr-2"></i> ${slide.title}</h2>
                            </div>
                            <div class="p-6 md:p-8">
                                ${slide.content}
                            </div>
                        </div>
                    `;
                }
                return `<div class="bg-white rounded-2xl p-6">Contenu par défaut</div>`;
            }

            // Mise à jour complète de l'affichage
            function updateSlides() {
                const slideHtml = renderSlide(slidesData[currentIndex], currentIndex);
                $('#slides-container').html(slideHtml);
                $('#slide-counter').text(`Slide ${currentIndex+1} / ${totalSlides}`);
                
                // Mise à jour des dots
                let dotsHtml = '';
                for (let i = 0; i < totalSlides; i++) {
                    let activeClass = (i === currentIndex) ? 'active' : '';
                    dotsHtml += `<div class="progress-dot w-2.5 h-2.5 rounded-full bg-gray-400 mx-1 ${activeClass}" data-index="${i}"></div>`;
                }
                $('#progress-dots').html(dotsHtml);
                
                // Gestion état boutons
                $('#prev-slide').prop('disabled', currentIndex === 0);
                if (currentIndex === 0) {
                    $('#prev-slide').addClass('opacity-50');
                } else {
                    $('#prev-slide').removeClass('opacity-50');
                }
                if (currentIndex === totalSlides-1) {
                    $('#next-slide').addClass('opacity-70');
                } else {
                    $('#next-slide').removeClass('opacity-70');
                }
                
                // Scroll en haut de la slide pour mobile
                $('html, body').animate({ scrollTop: $('#slides-container').offset().top - 20 }, 200);
            }
            
            // Navigation événements
            $('#next-slide').on('click', function() {
                if (currentIndex < totalSlides - 1) {
                    currentIndex++;
                    updateSlides();
                }
            });
            $('#prev-slide').on('click', function() {
                if (currentIndex > 0) {
                    currentIndex--;
                    updateSlides();
                }
            });
            
            // Clic sur les dots
            $(document).on('click', '.progress-dot', function() {
                let index = $(this).data('index');
                if (typeof index !== 'undefined' && index >= 0 && index < totalSlides) {
                    currentIndex = index;
                    updateSlides();
                }
            });
            
            // Gestion du clavier (flèches gauche/droite)
            $(document).on('keydown', function(e) {
                if (e.key === 'ArrowLeft') {
                    if (currentIndex > 0) {
                        currentIndex--;
                        updateSlides();
                    }
                } else if (e.key === 'ArrowRight') {
                    if (currentIndex < totalSlides - 1) {
                        currentIndex++;
                        updateSlides();
                    }
                }
            });
            
            // Initialiser première slide
            updateSlides();
            
            // Optionnel : Info MathJax si jamais utilisé (rien à faire)
        });
    </script>
</body>
</html>
