<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 36 : SMSI, ISO 27001 et conformité PCI-DSS | Cybersécurité</title>
    <!-- Tailwind CSS + CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (au cas où, mais nous n'avons pas de formules complexes ici) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* transitions douces pour les slides */
        .slide {
            transition: all 0.3s ease-in-out;
        }
        /* personnalisation du défilement si besoin */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #2c3e66;
        }
        body {
            background: #f4f7fc;
        }
        .card-slide {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(0px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
        }
        .nav-btn {
            transition: 0.2s;
        }
        .nav-btn:hover {
            transform: scale(1.03);
            background-color: #1e3a5f !important;
        }
        @media (max-width: 640px) {
            .card-slide {
                border-radius: 1.5rem;
                margin: 0 0.5rem;
            }
            h1 {
                font-size: 1.8rem;
            }
            h2 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body class="font-sans antialiased bg-gradient-to-br from-blue-50 to-indigo-50 p-4 md:p-6 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-5xl mx-auto relative">
        <!-- Conteneur des slides (carrousel simple) -->
        <div id="slides-container" class="relative overflow-hidden">
            <!-- Les slides seront injectées ici via jQuery -->
        </div>

        <!-- indicateur de progression + boutons navigation -->
        <div class="flex flex-col items-center mt-6 gap-4">
            <div class="flex gap-5 items-center">
                <button id="prevBtn" class="nav-btn bg-white/80 backdrop-blur-sm text-gray-800 font-semibold py-2 px-5 rounded-full shadow-md hover:bg-indigo-600 hover:text-white transition disabled:opacity-40 disabled:cursor-not-allowed border border-gray-200">◀ Précédent</button>
                <span id="slideCounter" class="text-sm bg-gray-800/70 text-white px-4 py-1.5 rounded-full font-medium">Slide 1 / ?</span>
                <button id="nextBtn" class="nav-btn bg-white/80 backdrop-blur-sm text-gray-800 font-semibold py-2 px-5 rounded-full shadow-md hover:bg-indigo-600 hover:text-white transition">Suivant ▶</button>
            </div>
            <div class="w-full max-w-md h-1.5 bg-gray-200 rounded-full overflow-hidden">
                <div id="progressBar" class="h-full bg-indigo-600 rounded-full transition-all duration-300" style="width: 0%;"></div>
            </div>
        </div>
    </div>

    <script>
        // Définition des slides : Titre, objectifs, contenu (plusieurs slides de contenu)
        // Nous allons construire la leçon 36 "SMSI (ISO 27001) et normes PCI-DSS"
        // Slide 0 : Titre de la leçon
        // Slide 1 : Objectifs d'apprentissage
        // Slides 2-... contenu détaillé (ISO 27001, ISO 27002, PCI-DSS, audits etc)
        
        const lessonData = {
            title: "Leçon 36 : SMSI (ISO 27001) et conformité PCI‑DSS",
            subtitle: "Normes, contrôles et sécurité des cartes bancaires",
            objectives: [
                "Comprendre la structure du Système de Management de la Sécurité de l'Information (SMSI) selon ISO 27001.",
                "Appliquer les contrôles recommandés par l'ISO 27002 (Annexe A).",
                "Respecter les exigences fondamentales de la norme PCI-DSS pour les transactions par carte bancaire.",
                "Savoir préparer une démarche de certification et de conformité."
            ],
            contentSlides: [
                {
                    title: "1. Qu'est-ce que l'ISO 27001 ?",
                    content: `<p class="text-gray-800 leading-relaxed"><span class="font-bold text-indigo-800">ISO/IEC 27001</span> est une norme internationale qui spécifie les exigences pour établir, mettre en œuvre, maintenir et améliorer de manière continue un <strong class="text-indigo-700">Système de Management de la Sécurité de l'Information (SMSI)</strong>. Elle suit l'approche PDCA (Plan-Do-Check-Act) et permet aux organisations de gérer leurs risques de sécurité.</p>
                    <div class="mt-5 bg-blue-50 p-4 rounded-xl border-l-8 border-indigo-500">
                        <p class="italic text-gray-700">🎯 <strong>Pourquoi c'est important ?</strong> Elle donne un cadre reconnu mondialement pour protéger la confidentialité, l'intégrité et la disponibilité des données.</p>
                    </div>
                    <p class="mt-4">La certification ISO 27001 prouve aux clients et partenaires que la sécurité est prise au sérieux.</p>
                    <!-- petit dessin simple SVG illustrant le cycle PDCA -->
                    <div class="flex justify-center my-5">
                        <svg width="200" height="120" viewBox="0 0 300 130" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="150" cy="65" r="50" stroke="#1E3A8A" stroke-width="2.5" fill="#EFF6FF"/>
                            <text x="140" y="60" font-size="12" fill="#1E3A8A" font-weight="bold">Plan</text>
                            <text x="175" y="45" font-size="10" fill="#2563EB">Do</text>
                            <text x="115" y="45" font-size="10" fill="#2563EB">Check</text>
                            <text x="140" y="95" font-size="11" fill="#2563EB">Act</text>
                            <path d="M180 30 L200 20 L195 40 Z" fill="#3B82F6" opacity="0.7"/>
                            <path d="M120 30 L100 20 L105 40 Z" fill="#3B82F6" opacity="0.7"/>
                            <text x="50" y="110" font-size="9" fill="#4B5563">Amélioration continue</text>
                        </svg>
                    </div>
                    `
                },
                {
                    title: "2. ISO 27002 : Les contrôles de sécurité",
                    content: `<p class="mb-3">L'<strong class="text-indigo-700">ISO 27002</strong> fournit un ensemble de bonnes pratiques et de contrôles de sécurité, classés en 14 domaines (accès, cryptographie, sécurité physique, etc.).</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-3">
                        <div class="bg-gray-50 p-3 rounded-lg shadow-sm"><span class="font-bold">🔐 Contrôle d'accès</span> – Gestion des droits utilisateurs.</div>
                        <div class="bg-gray-50 p-3 rounded-lg shadow-sm"><span class="font-bold">📜 Cryptographie</span> – Chiffrement et gestion des clés.</div>
                        <div class="bg-gray-50 p-3 rounded-lg shadow-sm"><span class="font-bold">🛡️ Sécurité opérationnelle</span> – Protection contre les malwares, sauvegardes.</div>
                        <div class="bg-gray-50 p-3 rounded-lg shadow-sm"><span class="font-bold">🌐 Sécurité des communications</span> – Sécurisation des réseaux.</div>
                    </div>
                    <p class="mt-4 text-sm text-gray-600">💡 Les contrôles sont choisis en fonction de l'analyse de risques. Un SMSI performant utilise ces mesures pour réduire les risques à un niveau acceptable.</p>
                    `
                },
                {
                    title: "3. PCI-DSS : Protéger les paiements par carte",
                    content: `<p><strong class="text-red-700">PCI Data Security Standard (PCI-DSS)</strong> est une norme de sécurité obligatoire pour toute entité qui traite, stocke ou transmet des données de cartes bancaires (Visa, Mastercard, etc.).</p>
                    <div class="my-4 bg-amber-50 p-4 rounded-xl border-l-4 border-amber-500">
                        <p class="font-semibold">🔒 6 objectifs principaux (12 exigences) :</p>
                        <ul class="list-disc list-inside mt-2 space-y-1 text-sm">
                            <li>Construire et maintenir un réseau sécurisé</li>
                            <li>Protéger les données des titulaires de carte</li>
                            <li>Gérer les vulnérabilités</li>
                            <li>Contrôler les accès</li>
                            <li>Surveiller et tester les réseaux</li>
                            <li>Maintenir une politique de sécurité</li>
                        </ul>
                    </div>
                    <p>La non-conformité expose à des amendes élevées et à la perte de la confiance. Exemple : obligation de chiffrer les transmissions de données et de ne pas conserver les CVV.</p>
                    <!-- Dessin symbolique d'une carte protégée -->
                    <div class="flex justify-center mt-3">
                        <svg width="140" height="80" viewBox="0 0 200 100" fill="none">
                            <rect x="20" y="25" width="160" height="55" rx="8" fill="#E2E8F0" stroke="#1E293B" stroke-width="1.5"/>
                            <text x="35" y="50" font-size="12" fill="#0F172A">**** **** **** 1234</text>
                            <text x="35" y="70" font-size="9" fill="#475569">🔒 Chiffré - PCI DSS</text>
                            <circle cx="160" cy="52" r="10" fill="#10B981" opacity="0.8" />
                            <text x="156" y="56" font-size="8" fill="white">✓</text>
                        </svg>
                    </div>`
                },
                {
                    title: "4. Mise en conformité : étapes clés",
                    content: `<p>Que ce soit pour ISO 27001 ou PCI-DSS, la démarche suit un cheminement similaire :</p>
                    <ol class="list-decimal list-inside space-y-2 mt-3 bg-white p-4 rounded-2xl shadow-sm">
                        <li><strong>Analyse de risque</strong> (identifier les actifs, menaces, vulnérabilités).</li>
                        <li><strong>Définition du périmètre</strong> du SMSI / des systèmes impactés par les cartes bancaires.</li>
                        <li><strong>Rédaction des politiques</strong> (politique de sécurité, procédures).</li>
                        <li><strong>Mise en œuvre des contrôles techniques et organisationnels</strong>.</li>
                        <li><strong>Formation et sensibilisation</strong> du personnel.</li>
                        <li><strong>Audit interne</strong> puis certification par un organisme accrédité (pour ISO 27001) ou validation annuelle (PCI-DSS).</li>
                    </ol>
                    <div class="mt-4 text-center text-indigo-700 text-sm font-medium">📋 Astuce enseignant : utilisez des grilles de contrôle pour suivre l'avancement.</div>
                    `
                },
                {
                    title: "5. Exemple de contrôles PCI-DSS vs ISO 27002",
                    content: `<div class="overflow-x-auto">
                        <table class="min-w-full bg-white border border-gray-200 rounded-xl text-sm">
                            <thead class="bg-indigo-100">
                                <tr><th class="px-4 py-2 border">Domaine</th><th class="px-4 py-2 border">Exigence PCI-DSS</th><th class="px-4 py-2 border">Contrôle ISO 27002</th></tr>
                            </thead>
                            <tbody>
                                <tr><td class="border px-3 py-2">Pare-feu</td><td class="border px-3 py-2">Exigence 1</td><td class="border px-3 py-2">Clause 13 (Sécurité réseau)</td></tr>
                                <tr><td class="border px-3 py-2">Mots de passe</td><td class="border px-3 py-2">Exigence 8</td><td class="border px-3 py-2">Contrôle d'accès (9.4)</td></tr>
                                <tr><td class="border px-3 py-2">Chiffrement</td><td class="border px-3 py-2">Exigence 3 & 4</td><td class="border px-3 py-2">Cryptographie (10)</td></tr>
                                <tr><td class="border px-3 py-2">Journalisation</td><td class="border px-3 py-2">Exigence 10</td><td class="border px-3 py-2">Journalisation (12.4)</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <p class="mt-4 text-gray-600">Les deux cadres sont complémentaires : l'ISO 27001 donne une structure managériale, PCI-DSS impose des contrôles très stricts pour les données bancaires.</p>
                    `
                },
                {
                    title: "6. Audit et rapport de conformité",
                    content: `<p>Pour obtenir la certification, l'entreprise passe par un audit externe. Les étapes :</p>
                    <ul class="list-disc ml-6 mt-2 space-y-1">
                        <li><span class="font-medium">Audit documentaire</span> : vérification des politiques et procédures.</li>
                        <li><span class="font-medium">Audit terrain</span> : tests de contrôles, entretiens, preuves techniques.</li>
                        <li><span class="font-medium">Rapport d'écarts</span> : corrections si nécessaire.</li>
                        <li><span class="font-medium">Certificat de conformité</span> valable 3 ans (avec audits de surveillance annuels).</li>
                    </ul>
                    <div class="bg-green-50 p-3 rounded-lg mt-4 flex items-start gap-2">
                        <span class="text-2xl">📝</span>
                        <p class="text-sm">Un bon rapport d'audit doit contenir le périmètre, les preuves collectées, les non-conformités et un plan d'actions correctives. Pour PCI-DSS, un rapport d'évaluation (ROC) est exigé pour les niveaux 1.</p>
                    </div>
                    `
                }
            ]
        };

        // Construction des slides : 
        // index 0 => Titre
        // index 1 => Objectifs
        // index 2 ... => contentSlides
        let slidesArray = [];

        // Slide Titre
        slidesArray.push({
            type: "title",
            html: `
                <div class="flex flex-col items-center justify-center text-center p-6 md:p-10">
                    <span class="text-sm uppercase tracking-wider text-indigo-500 font-semibold bg-indigo-100 px-4 py-1 rounded-full">Cours – Initiation Cybersécurité</span>
                    <h1 class="text-3xl md:text-5xl font-extrabold mt-6 bg-gradient-to-r from-indigo-800 to-cyan-700 bg-clip-text text-transparent">${lessonData.title}</h1>
                    <p class="text-gray-600 text-lg mt-4 max-w-xl">${lessonData.subtitle}</p>
                    <div class="mt-10 w-20 h-1 bg-indigo-300 rounded-full"></div>
                    <p class="text-sm text-gray-500 mt-6">Cliquez sur Suivant pour commencer</p>
                </div>
            `
        });

        // Slide Objectifs
        let objList = lessonData.objectives.map(obj => `<li class="mb-3 flex items-start gap-3"><span class="text-indigo-600 text-xl">🎯</span><span class="text-gray-700">${obj}</span></li>`).join('');
        slidesArray.push({
            type: "objectives",
            html: `
                <div class="p-6 md:p-8">
                    <div class="flex items-center gap-3 mb-5">
                        <div class="bg-indigo-100 p-2 rounded-full"><svg class="w-7 h-7 text-indigo-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></div>
                        <h2 class="text-2xl md:text-3xl font-bold text-gray-800">Objectifs d'apprentissage</h2>
                    </div>
                    <ul class="space-y-3 mt-2">${objList}</ul>
                    <div class="mt-8 text-sm text-center text-gray-500 italic">À la fin de cette leçon, vous serez capable de maîtriser les bases des normes de sécurité.</div>
                </div>
            `
        });

        // Ajouter les slides de contenu depuis contentSlides
        lessonData.contentSlides.forEach((slide, idx) => {
            slidesArray.push({
                type: "content",
                html: `
                    <div class="p-6 md:p-8">
                        <div class="flex items-center gap-2 mb-4">
                            <span class="bg-indigo-100 text-indigo-800 text-xs font-bold px-3 py-1 rounded-full">Chapitre ${idx+1}</span>
                        </div>
                        <h2 class="text-2xl font-bold text-gray-800 border-l-4 border-indigo-500 pl-4 mb-5">${slide.title}</h2>
                        <div class="prose max-w-none">
                            ${slide.content}
                        </div>
                        <div class="mt-8 pt-4 border-t border-gray-100 text-right text-xs text-gray-400">Leçon 36 - Cadres de conformité</div>
                    </div>
                `
            });
        });

        let currentIndex = 0;
        let totalSlides = slidesArray.length;

        function renderSlide(index) {
            if (index < 0) index = 0;
            if (index >= totalSlides) index = totalSlides - 1;
            currentIndex = index;
            const slideHtml = slidesArray[currentIndex].html;
            $('#slides-container').html(`
                <div class="slide card-slide bg-white rounded-2xl shadow-2xl transition-all duration-300 min-h-[450px] md:min-h-[500px] overflow-y-auto max-h-[70vh] md:max-h-[70vh]">
                    ${slideHtml}
                </div>
            `);
            $('#slideCounter').text(`Slide ${currentIndex+1} / ${totalSlides}`);
            let progressPercent = ((currentIndex+1) / totalSlides) * 100;
            $('#progressBar').css('width', `${progressPercent}%`);
            // gestion des boutons disabled
            $('#prevBtn').prop('disabled', currentIndex === 0);
            $('#nextBtn').prop('disabled', currentIndex === totalSlides-1);
            // scroller en haut du slide (optionnel)
            $('.card-slide').animate({ scrollTop: 0 }, 100);
        }

        function nextSlide() {
            if (currentIndex + 1 < totalSlides) {
                renderSlide(currentIndex + 1);
            }
        }

        function prevSlide() {
            if (currentIndex - 1 >= 0) {
                renderSlide(currentIndex - 1);
            }
        }

        $(document).ready(function() {
            renderSlide(0);
            $('#nextBtn').on('click', nextSlide);
            $('#prevBtn').on('click', prevSlide);
            // navigation au clavier (flèches)
            $(document).keydown(function(e) {
                if (e.key === 'ArrowRight') {
                    nextSlide();
                } else if (e.key === 'ArrowLeft') {
                    prevSlide();
                }
            });
            // support swipe simple pour mobile? optionnel simple
            let touchStartX = 0;
            $('#slides-container').on('touchstart', function(e) {
                touchStartX = e.originalEvent.touches[0].clientX;
            });
            $('#slides-container').on('touchend', function(e) {
                if (!touchStartX) return;
                let endX = e.originalEvent.changedTouches[0].clientX;
                let diff = endX - touchStartX;
                if (Math.abs(diff) > 50) {
                    if (diff > 0) prevSlide();
                    else nextSlide();
                }
                touchStartX = 0;
            });
        });
    </script>
    <!-- note: Les images ont été dessinées via SVG chaque fois que possible conformément à la consigne -->
</body>
</html>
