<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 4 : Cryptographie Symétrique | Cours de Cybersécurité</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax pour les formules mathématiques (optionnel) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <!-- Police Google Fonts pour lisibilité -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        /* Styles personnalisés pour améliorer le confort visuel */
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
        }
        /* Style des slides sur mobile : hauteur automatique, centrage */
        .slide {
            transition: all 0.3s ease;
            scroll-margin-top: 1rem;
        }
        /* animation de transition douce */
        .slide-container {
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        /* personnalisation des progress dots */
        .dot-active {
            background-color: #1e40af;
            transform: scale(1.2);
            width: 2rem;
        }
        /* amélioration du contraste des cartes */
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.1);
        }
        /* rendu responsive des formules mathjax */
        mjx-container {
            overflow-x: auto;
            overflow-y: hidden;
        }
        /* boutons tactiles bien espacés */
        button:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body class="bg-gradient-to-b from-blue-50 to-indigo-50 text-gray-800">

    <div class="max-w-4xl mx-auto px-4 py-6 md:py-10">
        <!-- EN-TÊTE FIXE avec progression -->
        <div class="sticky top-0 z-20 bg-white/80 backdrop-blur-sm rounded-2xl shadow-sm p-3 mb-6 flex justify-between items-center border border-indigo-100">
            <div class="flex items-center gap-2">
                <span class="bg-indigo-600 text-white text-xs font-bold px-3 py-1 rounded-full">Leçon 4</span>
                <span class="text-sm font-medium text-gray-600">Cryptographie symétrique</span>
            </div>
            <div class="text-xs text-gray-500" id="slideCounter">Slide 1 / <span id="totalSlides">0</span></div>
        </div>

        <!-- CONTENEUR PRINCIPAL DES SLIDES (carrousel horizontal avec overflow) -->
        <div class="relative overflow-hidden rounded-3xl shadow-xl bg-white border border-gray-200">
            <div id="slidesWrapper" class="slide-container flex transition-transform duration-500 ease-out">
                <!-- Les slides seront injectées dynamiquement via jQuery -->
            </div>
        </div>

        <!-- CONTROLES DE NAVIGATION + INDICATEURS -->
        <div class="flex justify-between items-center mt-8 gap-3">
            <button id="prevSlide" class="bg-white hover:bg-indigo-50 text-indigo-700 font-semibold py-2 px-5 rounded-xl shadow-md transition flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed border border-indigo-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
                Précédent
            </button>
            <div id="dotsContainer" class="flex flex-wrap justify-center gap-2 max-w-[200px] overflow-x-auto"></div>
            <button id="nextSlide" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-5 rounded-xl shadow-md transition flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed">
                Suivant
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
            </button>
        </div>

        <!-- Petit message info -->
        <p class="text-center text-xs text-gray-400 mt-6">Glissez avec les doigts ou utilisez les boutons • Cours conçu pour le Cameroun 🇨🇲</p>
    </div>

    <script>
        // Données de la leçon 4 (cryptographie symétrique) inspiré du JSON original (chap2, lesson4)
        // Titres et contenu pédagogique adaptés pour un langage simple, accessible aux élèves
        const lessonData = {
            title: "Cryptographie symétrique : chiffrement à clé secrète",
            objectives: [
                "Comprendre le principe de la clé secrète partagée (même clé pour chiffrer et déchiffrer).",
                "Découvrir les algorithmes célèbres : AES, DES, 3DES, ChaCha20.",
                "Maîtriser les modes d'opération : ECB, CBC, GCM et leurs usages.",
                "Savoir où utiliser la cryptographie symétrique dans la vie quotidienne (Wi-Fi, fichiers, disques)."
            ],
            // Définition des slides de contenu après l'écran titre et objectifs
            contentSlides: [
                {
                    titre: "🔐 Qu'est-ce qu'un chiffrement symétrique ?",
                    contenu: `
                        <div class="space-y-5">
                            <p class="text-gray-700 leading-relaxed">Imaginez que vous voulez envoyer un message secret à un ami. Vous utilisez un <strong class="text-indigo-700">cadenas et une clé</strong> : vous verrouillez le message avec la clé, et votre ami doit avoir la <span class="font-bold text-indigo-800">même clé</span> pour l'ouvrir. C'est le principe du <strong class="bg-indigo-100 px-1 rounded">chiffrement symétrique</strong> : <span class="italic">une seule clé secrète partagée entre l'expéditeur et le destinataire</span>.</p>
                            <div class="bg-blue-50 p-4 rounded-xl border-l-8 border-indigo-400">
                                <p class="font-semibold">🔑 Exemple concret :</p>
                                <p class="text-sm mt-1">Si Alice veut envoyer "Bonjour" à Bob, elle transforme le message (chiffre) avec une clé secrète K. Bob reçoit un texte illisible, puis utilise la même clé K pour retrouver "Bonjour". Sans la clé, personne ne peut lire.</p>
                            </div>
                            <div class="text-center mt-2">
                                <svg viewBox="0 0 400 120" class="w-full max-w-md mx-auto" xmlns="http://www.w3.org/2000/svg">
                                    <rect x="10" y="40" width="80" height="40" fill="#e2e8f0" stroke="#334155" rx="8" />
                                    <text x="30" y="65" font-size="12" fill="#1e293b">Message</text>
                                    <path d="M95 60 L125 60" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />
                                    <rect x="125" y="35" width="90" height="50" fill="#c7d2fe" stroke="#4f46e5" rx="8" />
                                    <text x="140" y="62" font-size="11" fill="#3730a3">Chiffrement🔐</text>
                                    <text x="155" y="75" font-size="9" fill="#4338ca">clé K</text>
                                    <path d="M220 60 L250 60" stroke="#334155" stroke-width="2" />
                                    <rect x="250" y="35" width="90" height="50" fill="#c7d2fe" stroke="#4f46e5" rx="8" />
                                    <text x="265" y="62" font-size="11" fill="#3730a3">Déchiffrement🗝️</text>
                                    <text x="280" y="75" font-size="9" fill="#4338ca">clé K</text>
                                    <path d="M345 60 L375 60" stroke="#334155" stroke-width="2" />
                                    <rect x="378" y="40" width="40" height="40" fill="#e2e8f0" stroke="#334155" rx="8" />
                                    <text x="385" y="65" font-size="12" fill="#1e293b">Message</text>
                                    <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#334155"/></marker></defs>
                                </svg>
                                <p class="text-xs text-gray-500 mt-1">Processus : texte clair → chiffré avec clé → texte clair restauré avec la même clé</p>
                            </div>
                        </div>
                    `
                },
                {
                    titre: "⚖️ Avantages & Inconvénients (symétrique vs asymétrique)",
                    contenu: `
                        <div class="grid md:grid-cols-2 gap-5">
                            <div class="bg-green-50 p-4 rounded-2xl border border-green-200">
                                <h4 class="font-bold text-green-800 flex items-center gap-1">✅ Points forts</h4>
                                <ul class="list-disc list-inside space-y-2 text-sm mt-2 text-gray-700">
                                    <li>Très rapide, adapté pour chiffrer de gros volumes (disques, bases de données).</li>
                                    <li>Algorithmes légers pour les appareils mobiles.</li>
                                    <li>Facile à implémenter matériellement (smartphones, puces).</li>
                                </ul>
                            </div>
                            <div class="bg-red-50 p-4 rounded-2xl border border-red-200">
                                <h4 class="font-bold text-red-800 flex items-center gap-1">⚠️ Défis majeurs</h4>
                                <ul class="list-disc list-inside space-y-2 text-sm mt-2 text-gray-700">
                                    <li><strong>Problème de distribution sécurisée de la clé</strong> : comment partager la clé à distance sans qu'un espion l'intercepte ?</li>
                                    <li>Chaque paire d'utilisateurs a besoin d'une clé unique → explosion du nombre de clés.</li>
                                    <li>Si la clé est compromise, tout le système est vulnérable.</li>
                                </ul>
                            </div>
                        </div>
                        <div class="mt-4 p-3 bg-indigo-50 rounded-xl text-sm">
                            💡 <span class="font-semibold">Astuce pratique :</span> On combine souvent symétrique + asymétrique : on utilise RSA pour échanger une clé symétrique (AES), puis on chiffre les données avec cette clé rapide.
                        </div>
                    `
                },
                {
                    titre: "🧩 Algorithmes célèbres : DES, 3DES, AES, ChaCha20",
                    contenu: `
                        <div class="overflow-x-auto">
                            <table class="min-w-full bg-white rounded-xl overflow-hidden shadow-sm text-sm">
                                <thead class="bg-indigo-100 text-indigo-800">
                                    <tr><th class="px-4 py-2 text-left">Algorithme</th><th class="px-4 py-2 text-left">Clé (bits)</th><th class="px-4 py-2 text-left">Statut actuel</th></tr>
                                </thead>
                                <tbody class="divide-y">
                                    <tr><td class="px-4 py-2 font-mono">DES</td><td class="px-4 py-2">56 bits</td><td class="px-4 py-2 text-red-600">Obsolète (cassable en quelques heures)</td></tr>
                                    <tr><td class="px-4 py-2 font-mono">3DES</td><td class="px-4 py-2">112 ou 168 bits</td><td class="px-4 py-2 text-orange-600">Lent, progressivement abandonné</td></tr>
                                    <tr><td class="px-4 py-2 font-mono bg-green-50">AES</td><td class="px-4 py-2 bg-green-50">128, 192, 256 bits</td><td class="px-4 py-2 bg-green-50 text-green-700">⭐ Standard mondial, ultra-sécurisé</td></tr>
                                    <tr><td class="px-4 py-2 font-mono">ChaCha20</td><td class="px-4 py-2">256 bits</td><td class="px-4 py-2">Moderne, très rapide (mobile, VPN WireGuard)</td></tr>
                                </tbody>
                            </table>
                        </div>
                        <div class="mt-4 bg-gray-50 p-3 rounded-lg text-center">
                            <span class="font-bold">🔒 À retenir : </span>AES (Advanced Encryption Standard) utilisé par les gouvernements, les banques, le WiFi (WPA2/WPA3).
                        </div>
                    `
                },
                {
                    titre: "⚙️ Modes d'opération : ECB, CBC, GCM",
                    contenu: `
                        <p>Un mode d'opération définit comment découper et traiter les blocs de données. Choisir le bon mode est crucial pour la sécurité.</p>
                        <div class="mt-3 space-y-4">
                            <div class="border-l-4 border-red-400 pl-3"><span class="font-bold">ECB (Electronic Codebook)</span> – Dangereux : des motifs identiques produisent des blocs chiffrés identiques → vulnérable aux attaques visuelles (ex: image chiffrée, on voit encore la forme). ❌ À éviter.</div>
                            <div class="border-l-4 border-yellow-500 pl-3"><span class="font-bold">CBC (Cipher Block Chaining)</span> – Chaque bloc dépend du précédent + vecteur d'initialisation (IV). Plus sûr mais nécessite padding. ✅ Utilisé historiquement, mais attention aux attaques padding oracle.</div>
                            <div class="border-l-4 border-green-500 pl-3"><span class="font-bold">GCM (Galois/Counter Mode)</span> – Mode authentifié : chiffrement + vérification d'intégrité. Très performant, recommandé pour les communications modernes (TLS 1.3, SSH). 🔐 Recommandé !</div>
                        </div>
                        <div class="mt-4 text-xs text-gray-600 italic">Mathématiquement, GCM combine compteur (CTR) avec un code d'authentification GHASH. Idéal pour protéger l'intégrité du message.</div>
                    `
                },
                {
                    titre: "🌍 Applications réelles (au quotidien au Cameroun & ailleurs)",
                    contenu: `
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mt-1">
                            <div class="flex items-start gap-2"><span class="text-indigo-600 text-xl">📱</span><div><strong>Messageries chiffrées</strong> (WhatsApp, Signal) : utilisent la cryptographie symétrique (AES) pour les messages après échange de clés.</div></div>
                            <div class="flex items-start gap-2"><span class="text-indigo-600 text-xl">💾</span><div><strong>Chiffrement de disque</strong> (BitLocker, LUKS, FileVault) : protège vos fichiers si l'ordinateur est volé.</div></div>
                            <div class="flex items-start gap-2"><span class="text-indigo-600 text-xl">📶</span><div><strong>Wi-Fi sécurisé</strong> (WPA2/WPA3) utilise AES pour que personne n'espionne votre navigation.</div></div>
                            <div class="flex items-start gap-2"><span class="text-indigo-600 text-xl">🏦</span><div><strong>Transactions bancaires</strong> (ATM, paiement sans contact) chiffrent les données avec des clés symétriques.</div></div>
                        </div>
                        <div class="mt-5 bg-yellow-50 p-3 rounded-xl">
                            <p class="text-sm">⚠️ <span class="font-semibold">Pour les élèves ingénieurs :</span> lorsqu'on implémente AES, il faut toujours utiliser un mode authentifié comme GCM et ne jamais réutiliser le même IV (vecteur d'initialisation).</p>
                        </div>
                    `
                },
                {
                    titre: "📝 Activité & vérification des acquis",
                    contenu: `
                        <div class="space-y-4">
                            <p class="font-medium">🧠 Question pour réfléchir :</p>
                            <div class="bg-gray-100 p-4 rounded-xl">
                                <p><span class="font-bold">1.</span> Pourquoi ne peut-on pas utiliser le mode ECB pour chiffrer une photo d'identité ?</p>
                                <p class="text-sm text-gray-600 mt-1">Réponse : car les motifs répétés (ex : ciel bleu uniforme) produisent des motifs identiques dans le chiffré, permettant de deviner l'image.</p>
                            </div>
                            <div class="bg-gray-100 p-4 rounded-xl">
                                <p><span class="font-bold">2.</span> Citez 2 situations où la cryptographie symétrique est meilleure que l'asymétrique.</p>
                                <p class="text-sm text-gray-600 mt-1">Exemple : Chiffrer un fichier volumineux sur son disque dur, ou chiffrer le trafic d'une base de données (performance).</p>
                            </div>
                            <p class="italic text-sm text-center mt-2">💬 En classe : nous simulerons un petit chiffrement avec AES en Python ou via des outils en ligne pour mieux comprendre.</p>
                        </div>
                    `
                }
            ]
        };

        // Construction complète des slides
        let slidesArray = [];
        // Slide 0 : titre
        slidesArray.push({
            type: 'title',
            content: `
                <div class="flex flex-col items-center justify-center min-h-[60vh] text-center p-6">
                    <div class="bg-indigo-100 rounded-full p-4 inline-flex mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-indigo-700" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                    </div>
                    <h1 class="text-3xl md:text-4xl font-extrabold bg-gradient-to-r from-indigo-700 to-purple-700 bg-clip-text text-transparent">${lessonData.title}</h1>
                    <p class="text-gray-500 mt-3 max-w-md">Initiation à la cryptographie symétrique • Clé secrète partagée</p>
                    <div class="mt-8 text-sm text-indigo-500">👩‍🏫 Classe Développement Web — Cameroun</div>
                </div>
            `
        });
        // Slide 1 : objectifs
        slidesArray.push({
            type: 'objectives',
            content: `
                <div class="p-6 md:p-8">
                    <h2 class="text-2xl font-bold flex items-center gap-2 text-indigo-800 border-b pb-3 mb-5">🎯 Objectifs d'apprentissage</h2>
                    <ul class="space-y-4">
                        ${lessonData.objectives.map(obj => `<li class="flex items-start gap-3 text-gray-700"><span class="text-indigo-500 text-xl">•</span> <span>${obj}</span></li>`).join('')}
                    </ul>
                    <div class="mt-8 p-3 bg-blue-50 rounded-lg text-sm italic">
                        ⏱️ À la fin de cette leçon, vous serez capable d'expliquer le chiffrement symétrique et de choisir un algorithme adapté.
                    </div>
                </div>
            `
        });
        // Slides de contenu
        lessonData.contentSlides.forEach((slide, idx) => {
            slidesArray.push({
                type: 'content',
                content: `
                    <div class="p-6 md:p-8">
                        <h2 class="text-2xl font-bold text-indigo-800 border-l-8 border-indigo-500 pl-4 mb-6">${slide.titre}</h2>
                        <div class="prose prose-indigo max-w-none">
                            ${slide.contenu}
                        </div>
                    </div>
                `
            });
        });

        // Variables du slider
        let currentIndex = 0;
        const $wrapper = $('#slidesWrapper');
        const $prevBtn = $('#prevSlide');
        const $nextBtn = $('#nextSlide');
        const $dotsContainer = $('#dotsContainer');
        const $totalSlidesSpan = $('#totalSlides');
        const $slideCounter = $('#slideCounter');

        // Remplir les slides dans le wrapper
        function renderSlides() {
            $wrapper.empty();
            slidesArray.forEach((slide, i) => {
                const slideDiv = $('<div>').addClass('slide w-full flex-shrink-0').css('width', '100%').html(slide.content);
                $wrapper.append(slideDiv);
            });
            $totalSlidesSpan.text(slidesArray.length);
            updateDots();
            updateButtonsAndCounter();
        }

        function updateDots() {
            $dotsContainer.empty();
            for (let i = 0; i < slidesArray.length; i++) {
                const dot = $('<button>').addClass('w-2 h-2 rounded-full transition-all duration-200 mx-1 bg-gray-300 hover:bg-indigo-400 focus:outline-none');
                if (i === currentIndex) {
                    dot.removeClass('w-2 bg-gray-300').addClass('w-6 bg-indigo-600 dot-active');
                } else {
                    dot.removeClass('w-6 bg-indigo-600').addClass('w-2 bg-gray-300');
                }
                dot.on('click', () => goToSlide(i));
                $dotsContainer.append(dot);
            }
        }

        function goToSlide(index) {
            if (index < 0) index = 0;
            if (index >= slidesArray.length) index = slidesArray.length - 1;
            currentIndex = index;
            const translateValue = -currentIndex * 100;
            $wrapper.css('transform', `translateX(${translateValue}%)`);
            updateDots();
            updateButtonsAndCounter();
        }

        function updateButtonsAndCounter() {
            $prevBtn.prop('disabled', currentIndex === 0);
            $nextBtn.prop('disabled', currentIndex === slidesArray.length - 1);
            $slideCounter.html(`Slide ${currentIndex+1} / ${slidesArray.length}`);
        }

        function nextSlide() {
            if (currentIndex < slidesArray.length - 1) goToSlide(currentIndex + 1);
        }

        function prevSlide() {
            if (currentIndex > 0) goToSlide(currentIndex - 1);
        }

        // Événements clics
        $prevBtn.on('click', prevSlide);
        $nextBtn.on('click', nextSlide);
        
        // Swipe tactile pour mobile (simple)
        let touchStartX = 0;
        let touchEndX = 0;
        $wrapper.on('touchstart', (e) => {
            touchStartX = e.originalEvent.touches[0].clientX;
        });
        $wrapper.on('touchend', (e) => {
            touchEndX = e.originalEvent.changedTouches[0].clientX;
            const diff = touchEndX - touchStartX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) prevSlide();
                else nextSlide();
            }
        });

        // Navigation clavier (flèches)
        $(document).on('keydown', (e) => {
            if (e.key === 'ArrowLeft') prevSlide();
            if (e.key === 'ArrowRight') nextSlide();
        });

        renderSlides();
        goToSlide(0);
        
        // Petit ajustement pour le rendu MathJax après chargement complet
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
    </script>
</body>
</html>
