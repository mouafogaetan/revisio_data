<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 5 : Cryptographie asymétrique | Cours de Cybersécurité</title>
    <!-- Tailwind CSS + Font Awesome (icônes) + Google Fonts pour lisibilité -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax pour formules mathématiques -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #f0f9ff 0%, #e9f0f5 100%); }
        /* style des slides : effet carte moderne, ombre douce */
        .slide-card {
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(0px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1), 0 1px 2px rgba(0,0,0,0.02);
            transition: transform 0.2s ease, opacity 0.3s ease;
        }
        .nav-btn {
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .nav-btn:hover {
            transform: scale(1.02);
            background-color: #1e3a8a !important;
        }
        .progress-bar {
            transition: width 0.3s ease;
        }
        /* adapté pour les petits écrans: texte lisible */
        @media (max-width: 640px) {
            .slide-card {
                border-radius: 1.5rem;
                margin-left: 0.5rem;
                margin-right: 0.5rem;
            }
            h1 { font-size: 1.8rem !important; }
            h2 { font-size: 1.4rem !important; }
        }
        /* amélioration contraste et accessibilité */
        .objective-item, .content-item {
            transition: background 0.1s ease;
        }
        .code-bg {
            background: #1e293b;
            color: #e2e8f0;
            border-radius: 1rem;
            font-family: 'Courier New', monospace;
        }
        .badge-pub {
            background: #dbeafe;
            color: #1e40af;
        }
        .badge-priv {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body class="min-h-screen py-6 md:py-10 px-3 md:px-6 flex flex-col items-center justify-center">

    <div class="max-w-4xl w-full mx-auto relative">
        <!-- indicateur slide + progression -->
        <div class="flex justify-between items-center mb-4 px-2 text-sm font-medium text-gray-600">
            <span id="slideCounter" class="bg-white/70 backdrop-blur-sm px-3 py-1 rounded-full shadow-sm">Slide 1 / <span id="totalSlides">0</span></span>
            <div class="w-32 md:w-48 bg-gray-200 rounded-full h-2 overflow-hidden shadow-inner">
                <div id="progressFill" class="progress-bar h-full bg-blue-700 rounded-full w-0"></div>
            </div>
        </div>

        <!-- SLIDES CONTAINER -->
        <div id="slidesContainer" class="relative">
            <!-- Les slides seront injectées dynamiquement via jQuery -->
        </div>

        <!-- Navigation buttons -->
        <div class="flex justify-between mt-8 gap-3 px-2">
            <button id="prevBtn" class="nav-btn bg-white hover:bg-gray-100 text-gray-800 font-semibold py-3 px-5 rounded-2xl shadow-md border border-gray-200 flex items-center gap-2 transition disabled:opacity-40 disabled:cursor-not-allowed">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
                Précédent
            </button>
            <button id="nextBtn" class="nav-btn bg-blue-800 hover:bg-blue-900 text-white font-semibold py-3 px-5 rounded-2xl shadow-md flex items-center gap-2 transition disabled:opacity-40 disabled:cursor-not-allowed">
                Suivant
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
            </button>
        </div>
        <p class="text-center text-xs text-gray-500 mt-5">✨ Navigation clavier : flèches gauche/droite | Leçon 5 : Crypto asymétrique</p>
    </div>

    <script>
        // Données de la leçon 5 (d'après le programme: chap2 -> lesson5)
        // Titre, objectifs, et contenu détaillé enrichi avec exemples, analogies, formules mathématiques, etc.
        const lessonData = {
            title: "Cryptographie asymétrique : la révolution des paires de clés",
            subtitle: "Chiffrement à clé publique / privée | Sécurité moderne",
            objectives: [
                "Comprendre le principe de la paire de clés (publique / privée) et leur relation mathématique.",
                "Découvrir les algorithmes fondamentaux : RSA, ECC (courbes elliptiques) et l'échange de clés Diffie-Hellman.",
                "Maîtriser les usages concrets : chiffrement de message, signature numérique, échange sécurisé de clés."
            ],
            sections: [
                {
                    title: "🧠 1. Principe fondamental : La paire de clés",
                    content: `<p class="mb-3">Contrairement à la cryptographie symétrique (une seule clé secrète), la cryptographie <span class="font-bold text-blue-800">asymétrique</span> utilise deux clés mathématiquement liées :</p>
                    <ul class="list-disc pl-6 space-y-2 mb-4">
                        <li><span class="font-mono bg-gray-100 px-2 py-0.5 rounded">🔓 Clé publique</span> : partageable librement, utilisée pour <strong>chiffrer</strong> ou <strong>vérifier une signature</strong>.</li>
                        <li><span class="font-mono bg-gray-100 px-2 py-0.5 rounded">🔐 Clé privée</span> : gardée secrète, permet de <strong>déchiffrer</strong> ou <strong>signer</strong>.</li>
                    </ul>
                    <div class="bg-indigo-50 p-4 rounded-xl border-l-8 border-indigo-400 my-4">
                        <p class="italic text-gray-700">📦 Analogie simple : « La boîte aux lettres » 🚪</p>
                        <p class="text-sm">La clé publique est comme l'adresse de ta boîte aux lettres (tout le monde peut y déposer un message). La clé privée est ta clé personnelle (toi seul peux ouvrir la boîte et lire les lettres).</p>
                    </div>
                    <p>Mathématiquement, on utilise des fonctions à sens unique avec <strong>porte dérobée</strong> (trappe). Exemple avec RSA : </p>
                    <div class="code-bg p-3 text-sm my-3 overflow-x-auto">
                        $$ \\text{Chiffrement : } C = M^e \\mod n $$
                        $$ \\text{Déchiffrement : } M = C^d \\mod n $$
                        <span class="text-xs text-gray-300">(où (e,n) = clé publique, (d,n)= clé privée)</span>
                    </div>`
                },
                {
                    title: "⚙️ 2. Algorithmes majeurs : RSA, ECC, Diffie-Hellman",
                    content: `<div class="grid grid-cols-1 md:grid-cols-3 gap-4 my-2">
                        <div class="bg-white shadow-sm border border-gray-200 rounded-2xl p-4">
                            <h3 class="font-bold text-lg text-blue-800">🔷 RSA</h3>
                            <p class="text-sm mt-1">Basé sur la factorisation de grands nombres premiers. Très utilisé (HTTPS, emails). Sécurité reposant sur la difficulté de factoriser <span class="font-mono">n = p × q</span>.</p>
                        </div>
                        <div class="bg-white shadow-sm border border-gray-200 rounded-2xl p-4">
                            <h3 class="font-bold text-lg text-emerald-700">🌀 ECC (Courbes Elliptiques)</h3>
                            <p class="text-sm mt-1">Plus efficace : clés plus courtes pour un niveau de sécurité équivalent. Ex: <span class="font-mono">secp256k1</span> (Bitcoin). Basé sur le problème du logarithme discret sur courbe elliptique.</p>
                        </div>
                        <div class="bg-white shadow-sm border border-gray-200 rounded-2xl p-4">
                            <h3 class="font-bold text-lg text-amber-700">🤝 Diffie-Hellman (DH)</h3>
                            <p class="text-sm mt-1">Permet d'établir un secret commun sur un canal non sécurisé. Pas de chiffrement direct, mais échange de clés pour générer une clé symétrique de session.</p>
                        </div>
                    </div>
                    <p class="mt-3 text-sm text-gray-600">📌 Exemple d'échange Diffie-Hellman : Alice et Bob choisissent un module \( p \) et une base \( g \). Ils échangent \( g^a \mod p \) et \( g^b \mod p \) puis calculent le secret partagé.</p>
                    <div class="code-bg p-2 text-center my-2 text-sm">$$ K_{secret} = (g^b \\mod p)^a \\mod p = (g^a \\mod p)^b \\mod p $$</div>`
                },
                {
                    title: "🔏 3. Usages concrets : chiffrement, signature, échange de clés",
                    content: `<div class="space-y-5">
                        <div class="flex flex-col md:flex-row gap-3 items-start bg-gray-50 p-4 rounded-xl">
                            <span class="bg-blue-100 text-blue-800 text-sm font-bold px-3 py-1 rounded-full">✉️ Chiffrement</span>
                            <div>Bob envoie un message à Alice en utilisant la <strong>clé publique d'Alice</strong>. Seule Alice avec sa clé privée peut déchiffrer. → Confidentialité.</div>
                        </div>
                        <div class="flex flex-col md:flex-row gap-3 items-start bg-gray-50 p-4 rounded-xl">
                            <span class="bg-green-100 text-green-800 text-sm font-bold px-3 py-1 rounded-full">🖊️ Signature numérique</span>
                            <div>Alice signe un document avec sa <strong>clé privée</strong>. Bob vérifie la signature avec la clé publique d'Alice → Authenticité + non-répudiation + intégrité.</div>
                        </div>
                        <div class="flex flex-col md:flex-row gap-3 items-start bg-gray-50 p-4 rounded-xl">
                            <span class="bg-purple-100 text-purple-800 text-sm font-bold px-3 py-1 rounded-full">🔄 Échange de clés</span>
                            <div>Protocole DH ou ECDH : deux parties génèrent un secret commun sans jamais transmettre la clé finale. Utilisé dans TLS, VPN, Signal.</div>
                        </div>
                    </div>
                    <div class="mt-5 p-3 border-t-2 border-blue-200 text-sm italic">
                        💡 Dans le monde réel : <strong>HTTPS / SSL/TLS</strong> utilise asymétrique pour authentifier le serveur et échanger une clé symétrique temporaire (performance).
                    </div>`
                },
                {
                    title: "🧪 4. Exemple visuel simplifié : Signer un message",
                    content: `<p>On peut imaginer qu'Alice souhaite garantir l'intégrité de son message. Elle calcule un hash du message, puis le chiffre avec sa clé privée (signature). Bob recalcule le hash et déchiffre la signature avec la clé publique d'Alice. Si les hashs correspondent : le message est authentique.</p>
                    <div class="bg-white border rounded-2xl p-4 my-3 shadow-sm flex flex-wrap gap-2 justify-center">
                        <!-- Diagramme simple dessiné avec SVG maison (pas d'image externe) -->
                        <svg width="100%" height="130" viewBox="0 0 600 100" xmlns="http://www.w3.org/2000/svg" class="max-w-full">
                            <rect x="10" y="20" width="100" height="40" fill="#e0e7ff" stroke="#4338ca" stroke-width="1.5" rx="8" />
                            <text x="35" y="45" font-size="11" fill="#1e1b4b">Message</text>
                            <text x="35" y="55" font-size="9" fill="#4338ca">Alice</text>
                            <path d="M120 40 L160 40" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />
                            <rect x="170" y="20" width="100" height="40" fill="#fecaca" stroke="#991b1b" rx="8" />
                            <text x="195" y="45" font-size="11" fill="#7f1d1d">Hash +</text>
                            <text x="195" y="57" font-size="10" fill="#b91c1c">Clé privée</text>
                            <path d="M280 40 L320 40" stroke="#334155" stroke-width="2" />
                            <rect x="330" y="15" width="110" height="50" fill="#dcfce7" stroke="#15803d" rx="8" />
                            <text x="345" y="38" font-size="10" fill="#14532d">Signature</text>
                            <text x="348" y="52" font-size="9" fill="#166534">transmise</text>
                            <path d="M450 40 L490 40" stroke="#334155" stroke-width="2" />
                            <rect x="500" y="20" width="90" height="40" fill="#e0e7ff" stroke="#3730a3" rx="8" />
                            <text x="515" y="45" font-size="10" fill="#1e1b4b">Vérif</text>
                            <text x="515" y="55" font-size="8" fill="#4f46e5">Clé pub</text>
                            <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><polygon points="0 0, 8 4, 0 8" fill="#334155"/></marker></defs>
                        </svg>
                        <p class="text-xs text-center text-gray-500 w-full">Processus de signature & vérification</p>
                    </div>`
                },
                {
                    title: "📊 Comparaison : Symétrique vs Asymétrique",
                    content: `<div class="overflow-x-auto">
                        <table class="min-w-full bg-white border border-gray-300 rounded-2xl text-sm">
                            <thead class="bg-gray-100"><tr><th class="p-3 border">Critère</th><th class="p-3 border">Symétrique</th><th class="p-3 border">Asymétrique</th></tr></thead>
                            <tbody>
                                <tr><td class="p-3 border font-medium">Clés</td><td class="p-3 border">Une clé secrète partagée</td><td class="p-3 border">Paire (publique/privée)</td></tr>
                                <tr><td class="p-3 border font-medium">Vitesse</td><td class="p-3 border">Très rapide</td><td class="p-3 border">Lente (100x plus lente)</td></tr>
                                <tr><td class="p-3 border font-medium">Distribution</td><td class="p-3 border">Problème d'échange sécurisé</td><td class="p-3 border">Clé publique librement distribuable</td></tr>
                                <tr><td class="p-3 border font-medium">Utilisation typique</td><td class="p-3 border">Chiffrement de données massives (AES)</td><td class="p-3 border">Signature, échange clé, SSL/TLS</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="mt-4 bg-yellow-50 p-3 rounded-lg border-l-4 border-yellow-500 text-sm">
                        ⚡ <strong>Bon à savoir :</strong> Les systèmes hybrides (ex: HTTPS) utilisent asymétrique uniquement pour échanger une clé symétrique temporaire, puis symétrique pour le chiffrement des données.
                    </div>`
                }
            ]
        };

        // Construction des slides : slide0 titre, slide1 objectifs, puis les sections = contenu
        let slidesArray = [];

        // Slide 0 : Titre de la leçon
        slidesArray.push({
            type: "title",
            content: `
                <div class="text-center py-8 md:py-12">
                    <div class="inline-block p-3 bg-blue-100 rounded-full mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-blue-800" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                    </div>
                    <h1 class="text-3xl md:text-4xl font-extrabold bg-gradient-to-r from-blue-900 to-indigo-700 bg-clip-text text-transparent">${lessonData.title}</h1>
                    <p class="text-gray-600 mt-3 text-lg">${lessonData.subtitle}</p>
                    <div class="mt-6 flex justify-center gap-2 text-sm text-gray-500">
                        <span class="bg-white/50 px-3 py-1 rounded-full">🔐 Clé publique / privée</span>
                        <span class="bg-white/50 px-3 py-1 rounded-full">📜 RSA - ECC - DH</span>
                    </div>
                </div>
            `
        });

        // Slide 1 : objectifs pédagogiques
        let objectivesHtml = `<div class="p-5 md:p-7"><h2 class="text-2xl font-bold text-gray-800 border-l-5 border-blue-600 pl-4 mb-6">🎯 Objectifs d’apprentissage</h2><ul class="space-y-4">`;
        lessonData.objectives.forEach(obj => {
            objectivesHtml += `<li class="flex items-start gap-3 bg-gray-50 p-3 rounded-xl shadow-sm"><span class="text-blue-600 text-xl">✓</span><span class="text-gray-700">${obj}</span></li>`;
        });
        objectivesHtml += `</ul><div class="mt-8 text-center text-gray-500 text-sm">📘 Chapitre 2 · Cryptographie asymétrique</div></div>`;
        slidesArray.push({ type: "objectives", content: objectivesHtml });

        // Slides pour chaque section de contenu (lessonData.sections)
        lessonData.sections.forEach((section, idx) => {
            slidesArray.push({
                type: "content",
                content: `
                    <div class="p-5 md:p-7">
                        <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2 mb-5">${section.title}</h2>
                        <div class="prose prose-blue max-w-none text-gray-700 leading-relaxed">
                            ${section.content}
                        </div>
                        ${idx === lessonData.sections.length - 1 ? `<div class="mt-8 border-t pt-5 text-center text-sm text-blue-700 font-medium">✨ Fin de la leçon 5 — Prochaine étape : mise en pratique ✨</div>` : ''}
                    </div>
                `
            });
        });

        // variables
        let currentSlide = 0;
        const $container = $("#slidesContainer");
        const $prevBtn = $("#prevBtn");
        const $nextBtn = $("#nextBtn");
        const $slideCounterSpan = $("#slideCounter");
        const $totalSlidesSpan = $("#totalSlides");
        const $progressFill = $("#progressFill");

        function renderSlides() {
            $container.empty();
            slidesArray.forEach((slide, idx) => {
                const isActive = (idx === currentSlide);
                const slideDiv = $('<div>', {
                    class: `slide-card transition-all duration-300 ease-in-out ${isActive ? 'block opacity-100' : 'hidden opacity-0'}`,
                    'data-slide-index': idx
                }).html(slide.content);
                $container.append(slideDiv);
            });
            updateNavAndProgress();
            // MathJax re-rendu si nécessaire (nouveaux éléments)
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        function updateNavAndProgress() {
            const total = slidesArray.length;
            $totalSlidesSpan.text(total);
            $slideCounterSpan.html(`Slide ${currentSlide+1} / ${total}`);
            const percent = ((currentSlide) / (total - 1)) * 100;
            $progressFill.css("width", `${percent}%`);
            // désactiver boutons si limites
            if (currentSlide === 0) {
                $prevBtn.prop('disabled', true);
            } else {
                $prevBtn.prop('disabled', false);
            }
            if (currentSlide === total - 1) {
                $nextBtn.prop('disabled', true);
            } else {
                $nextBtn.prop('disabled', false);
            }
            // mise à jour affichage
        }

        function goToSlide(index) {
            if (index < 0 || index >= slidesArray.length) return;
            // cacher tout
            $(".slide-card").addClass("hidden").removeClass("block opacity-100");
            $(`.slide-card[data-slide-index="${index}"]`).removeClass("hidden").addClass("block opacity-100");
            currentSlide = index;
            updateNavAndProgress();
            // scroll en douceur vers le haut
            $('html, body').animate({ scrollTop: $("#slidesContainer").offset().top - 20 }, 200);
            // refraichir MathJax pour les nouvelles formules
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        // événements
        $prevBtn.on("click", () => goToSlide(currentSlide - 1));
        $nextBtn.on("click", () => goToSlide(currentSlide + 1));
        $(document).on("keydown", (e) => {
            if (e.key === "ArrowLeft") {
                e.preventDefault();
                goToSlide(currentSlide - 1);
            } else if (e.key === "ArrowRight") {
                e.preventDefault();
                goToSlide(currentSlide + 1);
            }
        });

        // initialisation
        renderSlides();
        goToSlide(0);
        // Rendre joli le rendu LaTeX après chargement supplémentaire
        setTimeout(() => { if(window.MathJax) MathJax.typesetPromise(); }, 100);
    </script>
</body>
</html>
