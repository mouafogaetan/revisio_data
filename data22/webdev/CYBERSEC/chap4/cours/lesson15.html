<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Leçon 15 : Sécurisation des API | Cybersécurité</title>
    <!-- Tailwind CSS + Font Awesome (quelques icônes légères) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax pour formules légères (aucune ici mais compatibilité) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* transitions fluides pour slides */
        .slide-container {
            transition: opacity 0.25s ease-in-out;
        }
        .fadeIn {
            animation: fadeSlide 0.3s ease-out;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .nav-btn:active {
            transform: scale(0.96);
        }
        .slide-card {
            transition: box-shadow 0.2s;
        }
        /* custom scroll */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #818cf8;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-gradient-to-b from-slate-50 to-indigo-50 antialiased">

    <main class="max-w-5xl mx-auto px-4 py-6 md:py-10">
        <div class="relative bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl overflow-hidden border border-indigo-200">
            <!-- en-tête de la leçon -->
            <div class="bg-gradient-to-r from-indigo-800 to-violet-800 px-5 py-4 text-white flex justify-between items-center flex-wrap gap-2">
                <div class="flex items-center gap-2">
                    <span class="text-2xl">🔐</span>
                    <span class="font-bold tracking-wide">Initiation à la Cybersécurité | API Security</span>
                </div>
                <span class="bg-white/20 text-xs px-3 py-1 rounded-full">Leçon 15 · OWASP API Top 10</span>
            </div>

            <!-- zone des slides dynamiques -->
            <div id="slides-wrapper" class="p-5 md:p-8 min-h-[500px] flex flex-col">
                <!-- contenu injecté par jQuery -->
            </div>

            <!-- navigation et indicateurs -->
            <div class="border-t border-gray-200 bg-gray-50/90 px-5 py-4 flex flex-wrap justify-between items-center gap-3">
                <div class="flex gap-2">
                    <button id="prevSlide" class="nav-btn bg-white border border-gray-300 hover:bg-indigo-100 text-indigo-800 font-medium py-2 px-4 rounded-xl shadow-sm flex items-center gap-1 text-sm md:text-base transition">◀ Précédent</button>
                    <button id="nextSlide" class="nav-btn bg-indigo-700 hover:bg-indigo-800 text-white font-medium py-2 px-5 rounded-xl shadow-md flex items-center gap-1 text-sm md:text-base transition">Suivant ▶</button>
                </div>
                <div class="flex items-center gap-2 text-sm text-gray-600 bg-white px-3 py-1 rounded-full shadow-inner">
                    <span id="slideCounter">Slide 1 / 1</span>
                    <span class="w-1.5 h-1.5 rounded-full bg-indigo-400"></span>
                    <span class="hidden sm:inline">Sécurisation des API</span>
                </div>
                <div class="flex gap-1" id="dotsIndicator"></div>
            </div>
        </div>
        <p class="text-center text-xs text-gray-500 mt-5">🔐 Utilisez les boutons pour naviguer – cours interactif sur la sécurité des API</p>
    </main>

    <script>
        // ----- DÉFINITION DES SLIDES (Leçon 15) -----
        // Contenu pédagogique basé sur les objectifs : risques API, authentification (JWT, OAuth2, API keys), rate limiting, validation entrées.
        const slides = [
            { // Slide 0 : Titre principal
                type: "title",
                content: `
                    <div class="flex flex-col items-center justify-center text-center h-full min-h-[450px]">
                        <div class="bg-indigo-100 rounded-full p-4 mb-5 shadow-md">
                            <svg class="w-12 h-12 text-indigo-700" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V6a4 4 0 00-8 0v4h8z"></path></svg>
                        </div>
                        <h1 class="text-3xl md:text-5xl font-extrabold bg-gradient-to-r from-indigo-800 to-violet-700 bg-clip-text text-transparent">Sécurisation des API</h1>
                        <p class="text-gray-600 max-w-xl mx-auto mt-4 text-lg">Protéger les interfaces de programmation contre les attaques modernes (OWASP API Top 10)</p>
                        <div class="flex flex-wrap gap-2 justify-center mt-6 text-sm">
                            <span class="bg-gray-100 px-3 py-1 rounded-full">🔑 Authentification (JWT, OAuth2)</span>
                            <span class="bg-gray-100 px-3 py-1 rounded-full">⛔ Rate limiting</span>
                            <span class="bg-gray-100 px-3 py-1 rounded-full">✅ Validation entrées</span>
                            <span class="bg-gray-100 px-3 py-1 rounded-full">🛡️ API Keys & scopes</span>
                        </div>
                    </div>
                `
            },
            { // Slide 1 : Objectifs pédagogiques (Bloom)
                type: "objectifs",
                content: `
                    <div class="h-full">
                        <h2 class="text-2xl md:text-3xl font-bold text-indigo-800 border-l-5 border-indigo-500 pl-4 mb-6">🎯 Objectifs de la leçon</h2>
                        <div class="grid md:grid-cols-2 gap-5">
                            <div class="bg-indigo-50 rounded-xl p-4 shadow-sm"><div class="font-bold text-indigo-800">1. Comprendre</div><p class="text-gray-700">Identifier les principales vulnérabilités des API (OWASP API Top 10 : BOLA, BOPLA, etc.)</p></div>
                            <div class="bg-indigo-50 rounded-xl p-4 shadow-sm"><div class="font-bold text-indigo-800">2. Appliquer</div><p class="text-gray-700">Mettre en place l'authentification JWT, OAuth2 et gérer les API keys.</p></div>
                            <div class="bg-indigo-50 rounded-xl p-4 shadow-sm"><div class="font-bold text-indigo-800">3. Analyser</div><p class="text-gray-700">Évaluer les risques liés à une mauvaise validation des entrées (injection, mass assignment).</p></div>
                            <div class="bg-indigo-50 rounded-xl p-4 shadow-sm"><div class="font-bold text-indigo-800">4. Créer</div><p class="text-gray-700">Concevoir une politique de rate limiting et de moindre privilège pour les endpoints.</p></div>
                        </div>
                        <div class="mt-6 p-3 bg-violet-50 rounded-lg text-violet-800 text-sm italic">💡 À la fin, vous serez capable de sécuriser une API REST avec des mécanismes robustes.</div>
                    </div>
                `
            },
            { // Slide 2 : Pourquoi sécuriser les API ? (risques majeurs)
                type: "content",
                content: `
                    <div>
                        <h2 class="text-xl md:text-2xl font-bold text-indigo-800 flex items-center gap-2">⚠️ Pourquoi les API sont-elles une cible privilégiée ?</h2>
                        <div class="grid md:grid-cols-2 gap-4 mt-4">
                            <div class="bg-red-50 p-4 rounded-xl border-l-4 border-red-400">
                                <div class="font-bold text-red-700">📌 BOLA (Broken Object Level Authorization)</div>
                                <p class="text-sm">Attaquant modifie l'ID d'un objet (ex: /api/user/123 → /api/user/124) sans contrôle d'accès.</p>
                            </div>
                            <div class="bg-amber-50 p-4 rounded-xl border-l-4 border-amber-400">
                                <div class="font-bold text-amber-700">📌 Authentification défaillante</div>
                                <p class="text-sm">JWT faible, secrets exposés, absence de rate limiting → brute force.</p>
                            </div>
                            <div class="bg-orange-50 p-4 rounded-xl border-l-4 border-orange-400">
                                <div class="font-bold text-orange-700">📌 Mass Assignment</div>
                                <p class="text-sm">Envoi de champs supplémentaires (ex: "isAdmin": true) non filtrés par l'API.</p>
                            </div>
                            <div class="bg-purple-50 p-4 rounded-xl border-l-4 border-purple-400">
                                <div class="font-bold text-purple-700">📌 Injection & Validation insuffisante</div>
                                <p class="text-sm">SQL, NoSQL, Command injection via paramètres non nettoyés.</p>
                            </div>
                        </div>
                        <p class="mt-4 text-gray-600 text-sm">Selon OWASP API Top 10, ces failles représentent plus de 80% des incidents API.</p>
                    </div>
                `
            },
            { // Slide 3 : Mécanismes d'authentification (JWT, OAuth2, API Keys)
                type: "content",
                content: `
                    <div>
                        <h2 class="text-xl md:text-2xl font-bold text-indigo-800 flex items-center gap-2">🔑 Authentification & Autorisation pour API</h2>
                        <div class="space-y-4 mt-4">
                            <div class="bg-gray-50 rounded-xl p-4 border border-gray-200">
                                <div class="font-mono font-bold text-indigo-700">🔹 API Keys</div>
                                <p>Clé simple incluse dans l'en-tête (X-API-Key). Simple mais <strong>faible</strong> si non associée à des scopes / expiration.</p>
                                <pre class="bg-gray-900 text-green-300 p-2 rounded text-xs mt-2"><code>GET /orders HTTP/1.1\nX-API-Key: a1b2c3d4e5f6</code></pre>
                            </div>
                            <div class="bg-gray-50 rounded-xl p-4 border border-gray-200">
                                <div class="font-mono font-bold text-indigo-700">🔹 JWT (JSON Web Token)</div>
                                <p>Token signé (HMAC ou RSA) contenant des claims. Stocké côté client, utilisé dans en-tête Authorization: Bearer &lt;token&gt;. Attention à la durée de vie et à l'expiration.</p>
                                <div class="text-xs bg-gray-100 p-2 rounded mt-1"><strong>Bonnes pratiques :</strong> courte durée, stockage sécurisé, blacklist, signature forte.</div>
                            </div>
                            <div class="bg-gray-50 rounded-xl p-4 border border-gray-200">
                                <div class="font-mono font-bold text-indigo-700">🔹 OAuth2 / OpenID Connect</div>
                                <p>Protocole délégué permettant à une application d'accéder aux ressources sans partager le mot de passe. Utilise access token, refresh token, scopes.</p>
                                <ul class="list-disc list-inside text-sm mt-1"><li>Authorization Code Flow (web), Client Credentials (machine-to-machine)</li><li>Ne jamais stocker les tokens en clair côté client mobile.</li></ul>
                            </div>
                        </div>
                    </div>
                `
            },
            { // Slide 4 : Rate limiting, validation entrées et bonnes pratiques
                type: "content",
                content: `
                    <div>
                        <h2 class="text-xl md:text-2xl font-bold text-indigo-800">⛔ Rate Limiting & Défense en profondeur</h2>
                        <div class="mt-3 grid md:grid-cols-2 gap-5">
                            <div class="bg-slate-100 p-4 rounded-lg">
                                <span class="font-bold text-lg">🚦 Rate Limiting</span>
                                <p class="text-sm mt-1">Limite le nombre de requêtes par IP/API Key pour prévenir brute force et déni de service.</p>
                                <div class="bg-gray-800 text-gray-200 text-xs p-2 rounded mt-2 font-mono">X-RateLimit-Limit: 100\nX-RateLimit-Remaining: 85\nRetry-After: 3600</div>
                                <p class="text-xs text-gray-600 mt-2">Implémentations : <strong>token bucket, leaky bucket</strong> (Redis, middleware API Gateway).</p>
                            </div>
                            <div class="bg-slate-100 p-4 rounded-lg">
                                <span class="font-bold text-lg">✅ Validation stricte des entrées</span>
                                <p class="text-sm mt-1">Ne jamais faire confiance aux données clients. Types, longueurs, regex, whitelist.</p>
                                <pre class="bg-gray-800 text-green-200 p-2 rounded text-xs mt-2 overflow-x-auto"><code>// Exemple validation avec schéma (JSON Schema)\n{\n  "type": "object",\n  "properties": {\n    "email": {"type": "string", "format": "email"},\n    "age": {"type": "integer", "minimum": 0}\n  },\n  "required": ["email"]\n}</code></pre>
                            </div>
                        </div>
                        <div class="mt-5 p-3 bg-indigo-50 rounded-lg border border-indigo-200 text-sm">
                            💡 <span class="font-semibold">Autres bonnes pratiques :</span> Use TLS partout, logging sans données sensibles, moindre privilège (scopes), éviter l’exposition des erreurs techniques, et utiliser des API Gateway (Kong, AWS API Gateway) pour mutualiser la sécurité.
                        </div>
                    </div>
                `
            },
            { // Slide 5 : Mise en situation et exemples concrets
                type: "content",
                content: `
                    <div>
                        <h2 class="text-xl md:text-2xl font-bold text-indigo-800">🛡️ Cas pratique : API bancaire fictive</h2>
                        <div class="bg-white border rounded-xl p-4 mt-3 shadow-sm">
                            <p class="font-medium">Scénario : API REST pour gérer les comptes et transactions.</p>
                            <ul class="list-disc list-inside mt-2 text-gray-700 text-sm space-y-1">
                                <li><strong>Risque identifié :</strong> endpoint <code>/api/account/{id}</code> sans contrôle d'objet → BOLA.</li>
                                <li><strong>Solution :</strong> Vérifier que le token JWT contient bien le claim `sub` correspondant à l'ID du compte.</li>
                                <li><strong>Rate limiting :</strong> 50 requêtes/min pour les endpoints sensibles (virement).</li>
                                <li><strong>Validation :</strong> Un montant ne peut être négatif et doit être un Decimal.</li>
                                <li><strong>Journalisation :</strong> Loguer les tentatives échouées (IP, user agent) sans capturer les mots de passe.</li>
                            </ul>
                            <div class="bg-emerald-50 p-3 rounded mt-3 text-emerald-800 text-xs font-mono">
                                🔐 # Bonnes pratiques déployées : JWT avec expiration courte (15 min), refresh token sécurisé, whitelist d'origines CORS, audit logs.
                            </div>
                        </div>
                        <div class="mt-4 text-center text-indigo-700 text-sm bg-gray-50 p-2 rounded-lg">📌 Les API sont aujourd'hui la porte d'entrée principale des applications : sécurisez-les dès la conception (Shift Left).</div>
                    </div>
                `
            }
        ];

        let currentSlideIndex = 0;
        const totalSlides = slides.length;

        function renderSlide() {
            const data = slides[currentSlideIndex];
            $('#slides-wrapper').html(`<div class="slide-container fadeIn w-full">${data.content}</div>`);
            $('#slideCounter').text(`Slide ${currentSlideIndex+1} / ${totalSlides}`);

            // génération des dots
            let dotsHtml = '';
            for (let i = 0; i < totalSlides; i++) {
                const active = i === currentSlideIndex ? 'bg-indigo-600 w-6' : 'bg-gray-300 w-2';
                dotsHtml += `<button class="dot-indicator h-2 rounded-full transition-all ${active} mx-1 hover:bg-indigo-400" data-index="${i}"></button>`;
            }
            $('#dotsIndicator').html(dotsHtml);
            $('.dot-indicator').on('click', function() {
                const idx = parseInt($(this).data('index'));
                if (!isNaN(idx) && idx !== currentSlideIndex && idx >=0 && idx < totalSlides) {
                    currentSlideIndex = idx;
                    renderSlide();
                }
            });
            if (window.MathJax) MathJax.typesetPromise();
        }

        $('#prevSlide').on('click', () => {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                renderSlide();
            }
        });
        $('#nextSlide').on('click', () => {
            if (currentSlideIndex < totalSlides - 1) {
                currentSlideIndex++;
                renderSlide();
            } else {
                // petite notification de fin de cours
                if (currentSlideIndex === totalSlides-1) {
                    const notif = $('<div class="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-indigo-800 text-white text-sm px-5 py-2 rounded-full shadow-lg z-50">📘 Fin du cours — API sécurisée !</div>');
                    $('body').append(notif);
                    setTimeout(() => notif.fadeOut(500, function(){ $(this).remove(); }), 2000);
                }
            }
        });

        $(document).on('keydown', (e) => {
            if (e.key === 'ArrowLeft') $('#prevSlide').click();
            if (e.key === 'ArrowRight') $('#nextSlide').click();
        });

        renderSlide();
    </script>
</body>
</html>
