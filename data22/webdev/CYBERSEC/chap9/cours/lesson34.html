<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 34 : Ingénierie Sociale - Initiation à la Cybersécurité</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (optionnel, mais inclus pour les formules si besoin) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <!-- Style personnalisé pour améliorer le contraste et l'expérience slide -->
    <style>
        /* Transition douce entre les slides */
        .slide-container {
            transition: transform 0.3s ease-in-out, opacity 0.3s ease;
        }
        .slide {
            min-height: 85vh;
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .slide.active {
            display: block;
            opacity: 1;
        }
        /* Navigation buttons style */
        .nav-btn {
            transition: all 0.2s;
        }
        .nav-btn:hover:not(:disabled) {
            transform: scale(1.05);
            background-color: #1e3a8a; /* bleu foncé */
        }
        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        /* Pour les petits écrans, ajustement des marges */
        @media (max-width: 640px) {
            .slide {
                min-height: 75vh;
            }
            h1 {
                font-size: 1.8rem;
            }
            h2 {
                font-size: 1.4rem;
            }
        }
        /* Style pour les objectifs listes */
        .objective-list li {
            margin-bottom: 0.75rem;
            line-height: 1.4;
        }
        /* Couleurs douces mais lisibles */
        body {
            background: #f0f9ff; /* fond bleu très clair apaisant */
        }
        .card-bg {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(2px);
        }
        .highlight {
            background: #dbeafe;
            border-left: 4px solid #2563eb;
        }
        .badge-technique {
            background-color: #e0e7ff;
            color: #1e3a8a;
            font-weight: 500;
        }
    </style>
</head>
<body class="font-sans antialiased">

    <div class="max-w-4xl mx-auto px-4 py-6 md:py-8">
        <!-- En-tête fixe avec indicateur de progression -->
        <div class="flex justify-between items-center mb-4 bg-white/70 backdrop-blur-sm rounded-full px-4 py-2 shadow-sm">
            <div class="text-sm font-medium text-gray-700">
                <span id="currentSlideIdx">1</span> / <span id="totalSlides">0</span>
            </div>
            <div class="text-sm font-semibold text-blue-800">📘 Ingénierie Sociale</div>
            <div class="w-6"></div>
        </div>

        <!-- Conteneur des slides -->
        <div id="slidesWrapper" class="relative">
            <!-- Les slides seront injectées dynamiquement via jQuery pour faciliter la gestion -->
        </div>

        <!-- Navigation buttons -->
        <div class="flex justify-between items-center mt-8 gap-3">
            <button id="prevSlide" class="nav-btn bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2 px-5 rounded-full shadow-md transition disabled:opacity-40" disabled>◀ Précédent</button>
            <div class="text-sm text-gray-600 bg-white/60 px-3 py-1 rounded-full">
                <span id="slideTitleNav">Slide</span>
            </div>
            <button id="nextSlide" class="nav-btn bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2 px-5 rounded-full shadow-md transition">Suivant ▶</button>
        </div>

        <!-- Footer: petit rappel -->
        <div class="text-center text-xs text-gray-500 mt-8 border-t pt-4">
            🔐 Cours d'initiation à la Cybersécurité — Classe Développement Web (Cameroun) — Leçon 34 : Ingénierie Sociale
        </div>
    </div>

    <script>
        $(document).ready(function(){
            // Définition des données de la leçon 34 (d'après le programme: chap9, leçon34)
            // Titre principal générique, nous créons un titre dynamique.
            const lessonData = {
                title: "Ingénierie Sociale : Manipulation et Facteur Humain",
                objectives: [
                    "Comprendre les techniques d'ingénierie sociale (phishing, pretexting, baiting, tailgating).",
                    "Mener des campagnes de simulation éthique (ex: GoPhish).",
                    "Sensibiliser les utilisateurs aux risques humains en cybersécurité."
                ],
                contentSlides: [
                    {
                        subtitle: "🧠 Qu'est-ce que l'ingénierie sociale ?",
                        paragraphs: [
                            "L'ingénierie sociale est l'art de manipuler psychologiquement les personnes pour qu'elles divulguent des informations confidentielles ou réalisent des actions nuisibles. Contrairement aux attaques purement techniques, elle exploite la confiance, la peur ou l'ignorance.",
                            "C'est souvent le maillon faible de la sécurité. Même les systèmes les plus protégés peuvent être contournés par une simple ruse téléphonique ou un email bien conçu.",
                            "📌 Les attaquants ciblent les employés, les sous-traitants, et parfois le grand public pour accéder à des données sensibles."
                        ],
                        illustration: "drawing" // dessin simple
                    },
                    {
                        subtitle: "🎣 1. Phishing (Hameçonnage)",
                        paragraphs: [
                            "Le phishing est une technique où l'attaquant envoie un email, SMS ou message frauduleux semblant provenir d'une source légitime (banque, service IT, réseau social).",
                            "Objectif : récupérer vos identifiants, mots de passe ou données bancaires. Exemple : 'Votre compte va être désactivé, cliquez ici pour le valider.'",
                            "🔐 Comment s'en protéger : Vérifier l'expéditeur, ne pas cliquer sur les liens suspects, utiliser l'authentification multi-facteurs."
                        ]
                    },
                    {
                        subtitle: "🎭 2. Pretexting (Prétexte)",
                        paragraphs: [
                            "Le pretexting consiste à créer un scénario ou un prétexte crédible pour voler des informations. L'attaquant se fait passer pour un collègue, un technicien support, un banquier, etc.",
                            "Exemple : un faux agent de la sécurité informatique appelle pour 'vérifier' votre mot de passe sous prétexte d'une panne urgente.",
                            "🛡️ Prévention : toujours vérifier l'identité de l'interlocuteur via un canal officiel et ne jamais partager de mot de passe."
                        ]
                    },
                    {
                        subtitle: "🍬 3. Baiting (Appât)",
                        paragraphs: [
                            "Le baiting promet une récompense (objet, cadeau, téléchargement gratuit) pour piéger la victime. Exemple physique : une clé USB infectée laissée volontairement dans un parking avec l'étiquette 'salaires 2024'.",
                            "L'utilisateur curieux la branche sur son PC, installant ainsi un malware. En ligne, des offres trop alléchantes mènent à des sites piégés.",
                            "🚫 Règle d'or : ne jamais utiliser de supports de stockage inconnus, se méfier des offres gratuites trop belles."
                        ]
                    },
                    {
                        subtitle: "🚪 4. Tailgating (Resquille / Suivi de personne)",
                        paragraphs: [
                            "Tailgating consiste à suivre une personne autorisée pour pénétrer dans une zone sécurisée (bâtiment, salle serveur). L'attaquant porte un badge factice ou porte des cartons pour qu'on lui tienne la porte.",
                            "Exemple concret : dans une entreprise, un intrus profite de la politesse d'un employé qui tient la porte sans vérifier le badge.",
                            "🔒 Mesures : sensibiliser à ne jamais laisser entrer un inconnu, mettre en place des tourniquets, des sas d'accès."
                        ]
                    },
                    {
                        subtitle: "📧 Simulations et sensibilisation (GoPhish, campagnes éthiques)",
                        paragraphs: [
                            "Pour renforcer la sécurité humaine, les organisations mènent des campagnes de simulation. GoPhish est un outil open source qui permet d'envoyer des emails de phishing factices aux employés, sans risque, afin de mesurer leur vigilance.",
                            "Ces tests éthiques aident à identifier les utilisateurs vulnérables et à proposer des formations ciblées.",
                            "📈 Résultat: après quelques campagnes, le taux de clics sur les faux liens baisse considérablement."
                        ]
                    },
                    {
                        subtitle: "🧑‍🏫 Sensibiliser les utilisateurs aux risques",
                        paragraphs: [
                            "La meilleure défense contre l'ingénierie sociale reste la formation et la culture de sécurité. Chaque utilisateur doit connaître les signes d'une tentative d'attaque : urgence, ton menaçant, demande d'informations sensibles, liens anormaux.",
                            "✅ Bonnes pratiques :",
                            "- Organiser des ateliers réguliers",
                            "- Afficher des posters de rappel dans les espaces de travail",
                            "- Mettre en place un canal de signalement d'incidents",
                            "La sensibilisation réduit les risques humains de plus de 70%."
                        ],
                        listItems: true
                    },
                    {
                        subtitle: "⚖️ Cadre légal & éthique au Cameroun",
                        paragraphs: [
                            "Au Cameroun, la loi N° 2010/012 du 21 décembre 2010 relative à la cybersécurité et la cybercriminalité punit les actes d'ingénierie sociale frauduleuse. En tant que futur professionnel, vous devez utiliser ces connaissances uniquement pour la défense, avec autorisation écrite.",
                            "Les tests d'intrusion et campagnes de simulation doivent être réalisés dans un cadre strict (périmètre défini, consentement de la direction).",
                            "Respectez toujours la vie privée et l'éthique."
                        ]
                    }
                ]
            };

            // Construction des slides (première slide = titre, seconde = objectifs, puis les slides de contenu)
            let slidesArray = [];

            // Slide 0 : Titre de la leçon
            slidesArray.push({
                type: "title",
                title: lessonData.title,
                chapter: "Chapitre 9 : Techniques d'attaque éthique",
                lessonNumber: "Leçon 34"
            });

            // Slide 1 : Objectifs pédagogiques
            slidesArray.push({
                type: "objectives",
                objectives: lessonData.objectives
            });

            // Slides de contenu à partir des données contentSlides
            lessonData.contentSlides.forEach((slide, idx) => {
                slidesArray.push({
                    type: "content",
                    subtitle: slide.subtitle,
                    paragraphs: slide.paragraphs,
                    listItems: slide.listItems || false,
                    illustration: slide.illustration || null
                });
            });

            // Mise à jour du compteur total
            $("#totalSlides").text(slidesArray.length);
            let currentIndex = 0;

            // Fonction pour afficher la slide courante
            function renderSlide(index) {
                const slideData = slidesArray[index];
                let html = '';
                // Conteneur principal avec classes tailwind et animation
                if (slideData.type === 'title') {
                    html = `
                        <div class="slide active rounded-2xl shadow-xl overflow-hidden bg-gradient-to-br from-blue-50 to-indigo-100 p-6 md:p-10">
                            <div class="flex flex-col justify-center min-h-[70vh] text-center">
                                <div class="mb-4 inline-block mx-auto bg-blue-100 p-3 rounded-full">
                                    <span class="text-4xl">🛡️🔐</span>
                                </div>
                                <span class="text-sm uppercase tracking-wider text-blue-700 font-semibold">${slideData.chapter} - ${slideData.lessonNumber}</span>
                                <h1 class="text-3xl md:text-5xl font-extrabold mt-4 text-gray-800 leading-tight">${slideData.title}</h1>
                                <div class="h-1 w-20 bg-blue-500 mx-auto my-6 rounded-full"></div>
                                <p class="text-gray-600 text-lg">Initiation à la Cybersécurité | Enseignant: Cours pratique</p>
                                <div class="mt-8 text-blue-600 text-sm">👥 Facteur humain : le maillon clé</div>
                            </div>
                        </div>
                    `;
                } 
                else if (slideData.type === 'objectives') {
                    html = `
                        <div class="slide active rounded-2xl shadow-xl bg-white p-6 md:p-8">
                            <div class="border-b border-gray-200 pb-3 mb-5 flex items-center gap-2">
                                <span class="text-3xl">🎯</span>
                                <h2 class="text-2xl md:text-3xl font-bold text-gray-800">Objectifs d'apprentissage</h2>
                            </div>
                            <ul class="objective-list space-y-4 text-gray-700 text-lg">
                                ${slideData.objectives.map(obj => `<li class="flex items-start gap-3"><span class="text-blue-600 text-xl">•</span> <span>${obj}</span></li>`).join('')}
                            </ul>
                            <div class="mt-8 bg-blue-50 p-4 rounded-xl text-blue-800 text-sm italic">
                                💡 Après cette leçon, vous saurez reconnaître et vous protéger des manipulations humaines.
                            </div>
                        </div>
                    `;
                }
                else if (slideData.type === 'content') {
                    let contentHtml = `<div class="slide active rounded-2xl shadow-xl bg-white p-6 md:p-8">`;
                    contentHtml += `<div class="mb-4 flex items-center gap-2 border-l-4 border-blue-500 pl-3"><span class="text-2xl">📖</span><h3 class="text-xl md:text-2xl font-bold text-gray-800">${slideData.subtitle}</h3></div>`;
                    
                    // Paragraphes
                    if (slideData.paragraphs && slideData.paragraphs.length) {
                        if(slideData.listItems === true){
                            // Cas particulier: sous forme de liste
                            contentHtml += `<ul class="list-disc pl-6 space-y-2 mt-3 text-gray-700">`;
                            slideData.paragraphs.forEach(p => {
                                if(p.includes("- ")){
                                    let items = p.split("- ").filter(t => t.trim().length > 0);
                                    items.forEach(item => contentHtml += `<li class="mb-2">${item}</li>`);
                                } else {
                                    contentHtml += `<li>${p}</li>`;
                                }
                            });
                            contentHtml += `</ul>`;
                        } else {
                            slideData.paragraphs.forEach(p => {
                                contentHtml += `<p class="mb-4 text-gray-700 leading-relaxed">${p}</p>`;
                            });
                        }
                    }
                    
                    // Ajout d'une illustration simple (dessin ascii ou petite icône maison)
                    if (slideData.subtitle.includes("Phishing") || slideData.subtitle.includes("hameçonnage")) {
                        contentHtml += `
                            <div class="mt-6 bg-gray-100 p-4 rounded-lg text-center border border-gray-200">
                                <div class="font-mono text-sm text-gray-600">
                                    <pre class="whitespace-pre-wrap text-xs md:text-sm">📧 Exemple d'email frauduleux:
"Bonjour, votre mot de passe expire aujourd'hui. Cliquez ici: http://fake-bank.com/secure" 
⚠️ [LIEN SUSPECT]</pre>
                                </div>
                                <p class="text-xs text-red-600 mt-2">✅ Ne jamais cliquer sans vérifier!</p>
                            </div>
                        `;
                    } else if (slideData.subtitle.includes("Tailgating")) {
                        contentHtml += `
                            <div class="mt-6 flex justify-center">
                                <div class="bg-slate-100 p-3 rounded-lg inline-block text-center">
                                    <div class="text-4xl">🚪🧑‍💼🏢</div>
                                    <p class="text-sm font-mono">Employé autorisé + Intrus suivant = ❌ Accès non sécurisé</p>
                                </div>
                            </div>
                        `;
                    } else if (slideData.subtitle.includes("Baiting")) {
                        contentHtml += `
                            <div class="mt-5 bg-amber-50 p-3 rounded border border-amber-200 text-center">
                                <span class="text-3xl">💾</span> <span class="font-semibold">Clé USB inconnue ? Ne la branchez jamais !</span>
                                <div class="text-xs text-gray-500">Piège classique de baiting physique</div>
                            </div>
                        `;
                    } else if (slideData.subtitle.includes("Pretexting")) {
                        contentHtml += `
                            <div class="mt-5 bg-blue-50 p-3 rounded-lg text-sm">
                                <span class="font-bold">📞 Scénario type : </span> “Bonjour, je suis du support technique Microsoft, nous avons détecté un virus sur votre PC. Veuillez installer ce logiciel de contrôle à distance.”
                                <div class="text-red-600 mt-1">➡️ À savoir : Ne jamais céder à la pression, contacter votre vrai support.</div>
                            </div>
                        `;
                    } else if (slideData.subtitle.includes("Simulations") || slideData.subtitle.includes("GoPhish")) {
                        contentHtml += `
                            <div class="mt-5 bg-green-50 p-4 rounded border border-green-200">
                                <p class="font-semibold flex items-center"><span class="text-xl mr-2">🛠️</span> Outil GoPhish</p>
                                <p class="text-sm">Plateforme de simulation de phishing open source. Permet de créer des campagnes éthiques, suivre les clics et renforcer la sensibilisation.</p>
                                <img src="" alt="Interface d'outil de simulation de campagne de phishing GoPhish pour sensibilisation cybersécurité" class="hidden">
                            </div>
                        `;
                    } else if (slideData.subtitle.includes("Sensibiliser")) {
                        contentHtml += `
                            <div class="mt-5 grid grid-cols-1 sm:grid-cols-2 gap-2 text-xs bg-indigo-50 p-3 rounded">
                                <div class="p-2">✅ Vérifier l'URL avant de cliquer</div>
                                <div class="p-2">✅ Méfiez-vous des appels urgents</div>
                                <div class="p-2">✅ Signaler tout comportement suspect</div>
                                <div class="p-2">✅ Utiliser des mots de passe robustes</div>
                            </div>
                        `;
                    }
                    else if(slideData.subtitle.includes("Cadre légal")){
                        contentHtml += `<div class="mt-4 p-3 border-l-4 border-yellow-500 bg-yellow-50 text-sm">⚖️ Article 84 de la loi camerounaise: l'usurpation d'identité en ligne est punie d'amende et d'emprisonnement. L'ingénierie sociale à des fins malveillantes est un délit.</div>`;
                    }
                    
                    contentHtml += `</div>`;
                    html = contentHtml;
                }
                
                // Mettre à jour l'affichage
                $('#slidesWrapper').empty().append(html);
                // Mise à jour de l'affichage de la navigation
                $('#currentSlideIdx').text(index+1);
                // Mettre à jour le titre simplifié dans la nav centrale
                let shortTitle = "";
                if(slideData.type === 'title') shortTitle = "🏠 Titre";
                else if(slideData.type === 'objectives') shortTitle = "🎯 Objectifs";
                else shortTitle = slideData.subtitle ? slideData.subtitle.substring(0, 30) : "Contenu";
                $('#slideTitleNav').text(shortTitle);
                
                // Activer/désactiver boutons
                $('#prevSlide').prop('disabled', index === 0);
                $('#nextSlide').prop('disabled', index === slidesArray.length-1);
                
                // Scroll en haut pour meilleure expérience
                $('html, body').scrollTop(0);
            }
            
            // Initialisation
            renderSlide(0);
            
            // Événements de navigation
            $('#prevSlide').on('click', function() {
                if(currentIndex > 0) {
                    currentIndex--;
                    renderSlide(currentIndex);
                }
            });
            
            $('#nextSlide').on('click', function() {
                if(currentIndex < slidesArray.length-1) {
                    currentIndex++;
                    renderSlide(currentIndex);
                }
            });
            
            // Gestion clavier (optionnel)
            $(document).keydown(function(e) {
                if(e.key === 'ArrowLeft') {
                    $('#prevSlide').click();
                } else if(e.key === 'ArrowRight') {
                    $('#nextSlide').click();
                }
            });
            
            // Ajout d'une petite info pour l'affichage
            console.log("Leçon 34 générée avec succès. Ingénierie sociale - approche simple.");
        });
    </script>
</body>
</html>
