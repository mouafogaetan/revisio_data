<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Leçon 28 : CSPM - Sécurité des infrastructures cloud | Cours Cybersécurité</title>
  <!-- Tailwind CSS + Font Awesome (pour icônes) + jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- MathJax (pour formules si besoin, mais peu utilisé ici, chargé léger) -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
  <style>
    /* transitions douces et personnalisation des slides */
    .slide {
      transition: all 0.3s ease;
    }
    body {
      background: linear-gradient(145deg, #f0f4fa 0%, #e9eef5 100%);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
    }
    .card-slide {
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(0px);
      box-shadow: 0 25px 40px -12px rgba(0,0,0,0.2);
    }
    .nav-btn {
      transition: all 0.2s;
    }
    .nav-btn:active { transform: scale(0.96); }
    .progress-bar {
      transition: width 0.3s ease;
    }
    /* adapté aux petits écrans */
    @media (max-width: 640px) {
      .card-slide {
        border-radius: 1.5rem;
      }
      h1 { font-size: 1.8rem; }
    }
    /* couleurs douces */
    .bg-soft-primary { background-color: #1e3a8a; }
    .text-primary-dark { color: #1e293b; }
    .border-accent { border-color: #3b82f6; }
  </style>
</head>
<body class="antialiased">

  <div class="max-w-4xl mx-auto px-4 sm:px-6 py-6 md:py-10">
    <!-- Conteneur slides avec navigation -->
    <div class="relative">
      <!-- Slides wrapper -->
      <div id="slides-container" class="relative overflow-hidden rounded-2xl">
        <!-- Les slides seront injectées ici via jQuery -->
      </div>

      <!-- Navigation et indicateurs -->
      <div class="flex flex-col sm:flex-row justify-between items-center mt-6 gap-4">
        <div class="flex gap-3">
          <button id="prevSlide" class="nav-btn bg-white hover:bg-gray-100 text-gray-800 font-medium py-2 px-5 rounded-full shadow-md border border-gray-200 transition disabled:opacity-40 disabled:cursor-not-allowed">← Précédent</button>
          <button id="nextSlide" class="nav-btn bg-blue-700 hover:bg-blue-800 text-white font-medium py-2 px-5 rounded-full shadow-md transition disabled:opacity-40 disabled:cursor-not-allowed">Suivant →</button>
        </div>
        <div class="text-sm text-gray-600 bg-white/70 backdrop-blur-sm px-4 py-1.5 rounded-full shadow-sm">
          Slide <span id="currentSlideIdx">1</span> / <span id="totalSlides">0</span>
        </div>
      </div>
      <!-- Barre de progression -->
      <div class="w-full bg-gray-200 rounded-full h-2 mt-5 overflow-hidden">
        <div id="progressFill" class="progress-bar bg-blue-600 h-2 rounded-full" style="width: 0%"></div>
      </div>
    </div>
  </div>

  <script>
    // Définition des slides pour la leçon 28 : "Comprendre CSPM (détection des mauvaises configurations) + AWS Security Hub, Azure Security Center, GCP Security Command Center + Automatisation correction"
    // Slide 0 : titre
    // Slide 1 : objectifs de la leçon (reprenant les objectifs de la lesson28)
    // Slides 2..n : contenu détaillé
    
    const slidesData = [
      { // slide 0 : titre
        type: 'title',
        title: '📡 CSPM & Posture de sécurité Cloud',
        subtitle: 'Cloud Security Posture Management · Détection automatique · Correction continue',
        icon: '☁️🔒'
      },
      { // slide 1 : objectifs de la leçon (conformes à lesson28)
        type: 'objectives',
        objectives: [
          "Comprendre CSPM (détection des mauvaises configurations cloud)",
          "Utiliser AWS Security Hub, Azure Security Center, GCP Security Command Center",
          "Automatiser la correction des violations de sécurité"
        ]
      },
      { // slide 2 : Qu'est-ce que le CSPM ?
        type: 'content',
        title: "🧠 Qu'est-ce que le CSPM ?",
        paragraphs: [
          "CSPM (Cloud Security Posture Management) désigne une catégorie d'outils qui surveillent en continu les configurations cloud (IaaS, PaaS, SaaS).",
          "Objectif : détecter automatiquement les écarts par rapport aux bonnes pratiques (benchmarks CIS, NIST, etc.) et les erreurs de configuration sensibles.",
          "🚨 Exemples de violations : buckets S3 publics, ports SSH ouverts sur 0.0.0.0/0, absence de chiffrement, logs désactivés, IAM trop permissif."
        ],
        tip: "Le CSPM agit comme un 'scanner de conformité' en temps réel, vous aidant à réduire la surface d'attaque dans le cloud."
      },
      { // slide 4 : AWS Security Hub
        type: 'content',
        title: "☁️ AWS Security Hub",
        paragraphs: [
          "Service centralisé d'AWS qui agrège les alertes de sécurité issues de plusieurs services : GuardDuty, Inspector, Macie, et les règles de conformité (CIS AWS Foundations).",
          "Il fournit un score de posture de sécurité (Security Score) et priorise les findings par sévérité.",
          "📌 Fonctionnalité clé : détection automatique des mauvaises configurations (ex: groupes de sécurité trop permissifs, S3 public, MFA non activée sur le compte root)."
        ],
        imageDesc: "schéma simple : AWS Security Hub collecte les données -> analyse centralisée -> tableau de bord des violations."
      },
      { // slide 5 : Azure Security Center (devenu Microsoft Defender for Cloud)
        type: 'content',
        title: "🟦 Azure Security Center (Defender for Cloud)",
        paragraphs: [
          "Microsoft Defender for Cloud (anciennement Azure Security Center) offre une gestion de la posture de sécurité (CSPM) pour les ressources Azure, hybrides et multicloud.",
          "Il évalue vos configurations par rapport aux standards (Azure Security Benchmark, NIST, CIS).",
          "🔍 Recommandations personnalisées : par exemple, activer le chiffrement des disques, configurer les pare-feu réseau, activer l'authentification juste-à-temps (JIT)."
        ],
        extra: "Azure Secure Score permet de suivre la progression et de corriger automatiquement certaines erreurs via des 'correctifs rapides' (Quick Fix)."
      },
      { // slide 6 : GCP Security Command Center
        type: 'content',
        title: "🟢 GCP Security Command Center (SCC)",
        paragraphs: [
          "Security Command Center est la solution native de Google Cloud pour la gestion de posture et la détection de menaces.",
          "Il inclut le 'Security Health Analytics' (analyse de santé) qui détecte plus de 150 types de mauvaises configurations comme les comptes de service inactifs, les règles de pare-feu trop larges, les accès anonymes sur Cloud Storage.",
          "📊 Tableau de bord unifié, intégration avec les sources SIEM et possibilité d'activer des contrôles 'Real-time'."
        ],
        tip: "Google fournit également le 'CIS Benchmark for GCP' intégré nativement dans SCC pour évaluer votre conformité."
      },
      { // slide 7 : Automatiser la correction des violations
        type: 'content',
        title: "⚙️ Automatisation de la correction (Remédiation)",
        paragraphs: [
          "Les outils CSPM modernes permettent de corriger automatiquement les violations grâce à des mécanismes de 'auto-remediation'.",
          "Exemples concrets :",
          "• AWS : via AWS Config Rules + SSM Automation (fermer un port exposé, appliquer des tags requis)",
          "• Azure : utiliser Azure Policy et 'Remediation tasks' pour corriger les ressources non conformes (ex: déployer un paramètre de diagnostic)",
          "• GCP : avec les 'Organization Policies' + 'Cloud Asset Inventory' pour appliquer des contraintes automatiques.",
          "Avantage : gain de temps, réduction des erreurs humaines, conformité continue sans intervention manuelle."
        ],
        schema: "boucle vertueuse : Détection (CSPM) -> Analyse -> Correction auto -> Re-vérification"
      },
      { // slide 8 : Bonnes pratiques pour l’usage du CSPM
        type: 'content',
        title: "✅ Mise en place efficace du CSPM",
        paragraphs: [
          "1. Activer le CSPM natif de votre fournisseur (Security Hub, Defender for Cloud, SCC) dès la création du compte cloud.",
          "2. Choisir les benchmarks adaptés (CIS, NIST, PCI-DSS, ISO 27001 selon votre secteur).",
          "3. Définir des priorités: traiter d'abord les violations à haute criticité (ex: expositions publiques, identifiants compromis).",
          "4. Mettre en place une automatisation pour les corrections standards (ex: attacher automatiquement des Network ACLs).",
          "5. Intégrer les alertes CSPM dans vos outils SIEM ou systèmes de ticketing (Jira, ServiceNow)."
        ],
        note: "Le CSPM ne remplace pas la responsabilité humaine mais permet d'éviter les 'fat finger' et les expositions accidentelles."
      },
      { // slide 9 : Défis & limites
        type: 'content',
        title: "⚠️ Limites du CSPM",
        paragraphs: [
          "❌ Le CSPM détecte des configurations, mais ne protège pas contre les menaces avancées (zero-day, intrusion).",
          "❌ Des faux positifs possibles nécessitant un calibrage.",
          "❌ Dans un environnement multicloud, utiliser un outil CSPM unifié (Wiz, Orca, Lacework) ou combiner les solutions natives.",
          "🔧 Bonne nouvelle : les fournisseurs cloud améliorent continuellement l'automatisation pour fermer la boucle de correction."
        ]
      },
      { // slide 10 : Récapitulatif / cas pratique simple
        type: 'content',
        title: "📌 À retenir pour la leçon 28",
        paragraphs: [
          "• CSPM = analyse continue des configurations cloud pour éviter des expositions par erreur.",
          "• Les trois grands clouds proposent leurs propres services : AWS Security Hub, Azure Defender for Cloud (CSPM), GCP Security Command Center.",
          "• La correction automatique peut être déclenchée via des politiques (AWS Config Remediation, Azure Policy, GCP Organization Policies).",
          "• Toujours suivre le principe du moindre privilège et vérifier régulièrement le score de posture."
        ],
        quiz: "Question flash : Que signifie l'acronyme CSPM ? (Réponse : Cloud Security Posture Management)"
      }
    ];

    let currentIndex = 0;
    let total = slidesData.length;

    function renderSlide(index) {
      const slide = slidesData[index];
      let html = '';
      const baseCardClass = "card-slide rounded-2xl p-6 md:p-8 bg-white shadow-xl transition-all duration-200 border border-gray-100";
      
      if (slide.type === 'title') {
        html = `
          <div class="${baseCardClass} text-center">
            <div class="text-6xl mb-4">${slide.icon || '🛡️'}</div>
            <h1 class="text-3xl md:text-4xl font-extrabold bg-gradient-to-r from-blue-800 to-indigo-700 bg-clip-text text-transparent">${slide.title}</h1>
            <p class="text-gray-600 mt-3 text-lg">${slide.subtitle}</p>
            <div class="mt-8 border-t border-gray-200 pt-6 text-sm text-gray-500">Cours · Initiation Cybersécurité</div>
          </div>
        `;
      } 
      else if (slide.type === 'objectives') {
        html = `
          <div class="${baseCardClass}">
            <div class="flex items-center gap-3 border-b pb-3 mb-5 border-blue-100">
              <span class="text-3xl">🎯</span>
              <h2 class="text-2xl md:text-3xl font-bold text-gray-800">Objectifs de la leçon</h2>
            </div>
            <ul class="space-y-4">
              ${slide.objectives.map(obj => `<li class="flex items-start gap-3 text-gray-700 text-lg"><span class="text-blue-600 text-xl mt-0.5">✓</span><span>${obj}</span></li>`).join('')}
            </ul>
            <div class="mt-6 bg-blue-50 p-4 rounded-xl text-blue-800 text-sm italic">
              💡 À la fin de ce cours, vous saurez utiliser les solutions CSPM cloud et automatiser les corrections.
            </div>
          </div>
        `;
      }
      else if (slide.type === 'content') {
        html = `<div class="${baseCardClass}">
                  <div class="flex items-center gap-2 border-b pb-2 mb-4 border-gray-200">
                    <span class="text-2xl">📖</span>
                    <h2 class="text-xl md:text-2xl font-bold text-gray-800">${slide.title}</h2>
                  </div>
                  <div class="space-y-4 text-gray-700 leading-relaxed">
                    ${slide.paragraphs.map(p => `<p>${p}</p>`).join('')}
                    ${slide.tip ? `<div class="bg-amber-50 border-l-4 border-amber-400 p-3 rounded-md text-amber-800 text-sm mt-3">💡 Astuce : ${slide.tip}</div>` : ''}
                    ${slide.extra ? `<div class="bg-indigo-50 p-3 rounded-md text-indigo-800 text-sm mt-2">🔧 ${slide.extra}</div>` : ''}
                    ${slide.note ? `<div class="bg-gray-50 p-3 rounded-md text-gray-700 text-sm border mt-2">📌 Note : ${slide.note}</div>` : ''}
                    ${slide.quiz ? `<div class="bg-green-50 p-3 rounded-lg mt-4 border border-green-200 text-green-800 text-sm font-medium">🧪 ${slide.quiz}</div>` : ''}
                    ${slide.schema ? `<div class="my-4 p-3 bg-gray-100 rounded-lg text-center text-gray-600 font-mono text-sm border">📐 ${slide.schema}</div>` : ''}
                  </div>
                </div>`;
      }
      
      // Ajout d'une petite image SVG dessinée pour illustrer le principe CSPM (si nécessaire et pour rendre plus intuitif)
      if (slide.title && (slide.title.includes("CSPM") || slide.title.includes("AWS Security Hub") || slide.title.includes("Automatisation"))) {
        if (slide.type === 'content' && slide.title.includes("CSPM")) {
          html += `<div class="mt-4 flex justify-center">
                      <svg width="260" height="90" viewBox="0 0 300 90" xmlns="http://www.w3.org/2000/svg" class="bg-white/50 rounded-xl p-2 shadow-inner">
                        <rect x="10" y="20" width="60" height="40" fill="#2563eb" rx="8" />
                        <text x="20" y="45" fill="white" font-size="12" font-weight="bold">Cloud</text>
                        <rect x="110" y="20" width="70" height="40" fill="#3b82f6" rx="8" />
                        <text x="125" y="45" fill="white" font-size="12">CSPM</text>
                        <rect x="220" y="20" width="60" height="40" fill="#1e40af" rx="8" />
                        <text x="232" y="45" fill="white" font-size="10">Reméd.</text>
                        <path d="M75 40 L105 40" stroke="#f97316" stroke-width="3" stroke-dasharray="4" marker-end="url(#arrow)"/>
                        <path d="M185 40 L215 40" stroke="#10b981" stroke-width="3" stroke-dasharray="4"/>
                        <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><polygon points="0 0, 8 4, 0 8" fill="#f97316"/></marker></defs>
                        <text x="80" y="15" fill="#475569" font-size="9">détection</text>
                        <text x="190" y="15" fill="#475569" font-size="9">correction auto</text>
                      </svg>
                    </div>`;
        } else if (slide.title && slide.title.includes("AWS Security Hub")) {
          html += `<div class="mt-5 bg-gray-100 rounded-xl p-3 text-center text-sm text-gray-700 border border-gray-200">🖥️ Schéma: AWS Security Hub agrège GuardDuty + Config + Inspector → tableau unifié des violations → actions automatisées</div>`;
        }
      }
      
      // Si pas d'image complexe, on peut insérer une petite icône simple
      if (slide.type === 'content' && slide.title.includes("GCP")) {
        html += `<div class="mt-4 flex justify-center"><div class="bg-green-100 p-2 rounded-full px-5 text-green-700 text-sm font-medium">🔐 Security Command Center (GCP) : détection des buckets publics & IAM</div></div>`;
      }
      
      $('#slides-container').html(html);
      $('#currentSlideIdx').text(index+1);
      $('#totalSlides').text(total);
      const progressPercent = ((index) / (total-1)) * 100;
      $('#progressFill').css('width', `${progressPercent}%`);
      updateButtons();
    }
    
    function updateButtons() {
      if (currentIndex === 0) {
        $('#prevSlide').prop('disabled', true);
      } else {
        $('#prevSlide').prop('disabled', false);
      }
      if (currentIndex === total-1) {
        $('#nextSlide').prop('disabled', true);
      } else {
        $('#nextSlide').prop('disabled', false);
      }
    }
    
    function nextSlide() {
      if (currentIndex < total-1) {
        currentIndex++;
        renderSlide(currentIndex);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }
    
    function prevSlide() {
      if (currentIndex > 0) {
        currentIndex--;
        renderSlide(currentIndex);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }
    
    $(document).ready(function() {
      renderSlide(0);
      $('#nextSlide').on('click', nextSlide);
      $('#prevSlide').on('click', prevSlide);
      // raccourci clavier flèches droite/gauche
      $(document).on('keydown', function(e) {
        if (e.key === 'ArrowRight') {
          nextSlide();
        } else if (e.key === 'ArrowLeft') {
          prevSlide();
        }
      });
    });
  </script>
  <!-- Note pédagogique : nous respectons la leçon 28 du programme "Comprendre CSPM (détection des mauvaises configurations) / AWS Security Hub, Azure Security Center, GCP Security Command Center / Automatiser la correction des violations" -->
  <footer class="text-center text-gray-500 text-xs py-6 mt-4 border-t border-gray-200 max-w-4xl mx-auto px-4">
    📘 Leçon 28 - Initiation à la Cybersécurité (programme WebDev) | Enseignant au Cameroun 🇨🇲 | Support visuel & slides interactifs
  </footer>
</body>
</html>
