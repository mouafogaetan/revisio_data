<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 38 : Projet pratique - Analyse de risque & Architecture sécurisée | Cybersécurité</title>
    <!-- Tailwind CSS CDN + base styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (pour d'éventuelles formules mathématiques) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <!-- Personnalisation Tailwind + couleurs accessibles -->
    <style>
        /* Transition slides + responsive */
        .slide-container {
            transition: transform 0.3s ease-in-out;
        }
        .slide {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .btn-nav {
            transition: all 0.2s;
        }
        .btn-nav:hover {
            transform: scale(1.05);
            background-color: #1e3a8a; /* bleu profond */
        }
        /* style pour les bulles de pagination */
        .dot {
            transition: background-color 0.2s;
            cursor: pointer;
        }
        /* personnalisation pour mobile: réduire padding */
        @media (max-width: 640px) {
            .slide {
                min-height: 70vh;
            }
            .card-padding {
                padding: 1rem;
            }
        }
        /* rendre les slides lisible et espacement */
        .prose-custom {
            line-height: 1.5;
        }
        body {
            background: #f0f9ff; /* doux ciel */
        }
    </style>
</head>
<body class="bg-gradient-to-br from-sky-50 to-blue-50 font-sans antialiased">

    <div class="max-w-5xl mx-auto px-4 sm:px-6 py-6 md:py-10">
        <!-- Conteneur principal slides -->
        <div class="bg-white/80 backdrop-blur-sm rounded-3xl shadow-2xl overflow-hidden border border-blue-100">
            <!-- Slides wrapper -->
            <div id="slidesWrapper" class="relative overflow-hidden">
                <div id="slidesContainer" class="slide-container flex flex-col md:flex-row transition-transform duration-300">
                    <!-- les slides seront injectées dynamiquement via jQuery -->
                </div>
            </div>

            <!-- Navigation et indicateurs -->
            <div class="flex justify-between items-center px-6 py-4 bg-white/60 border-t border-blue-100 flex-wrap gap-3">
                <button id="prevBtn" class="btn-nav bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2 px-5 rounded-full shadow-md flex items-center gap-1 transition disabled:opacity-40 disabled:cursor-not-allowed" aria-label="Diapositive précédente">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
                    Précédent
                </button>
                <div id="dotsContainer" class="flex space-x-2 justify-center flex-wrap"></div>
                <button id="nextBtn" class="btn-nav bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2 px-5 rounded-full shadow-md flex items-center gap-1 transition disabled:opacity-40 disabled:cursor-not-allowed">
                    Suivant
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
                </button>
            </div>
        </div>
        
        <!-- Petit pied de page discret -->
        <p class="text-center text-blue-600 text-sm mt-6">Cours d'initiation à la cybersécurité | Classe Développement Web – Cameroun 🇨🇲</p>
    </div>

    <script>
        $(document).ready(function() {
            // Définition des données des slides pour la leçon 38 (chap11 - lesson38)
            // D'après le JSON: idLesson: "lesson38", objectifsLesson:
            // Objectifs de lesson38: 
            // 0: Choisir une application ou infrastructure existante
            // 1: Réaliser une analyse de risque (EBIOS, OCTAVE)
            // 2: Proposer une architecture sécurisée
            
            // Nous allons construire plusieurs slides :
            // Slide 1 : Titre de la leçon + sous-titre
            // Slide 2 : Objectifs pédagogiques
            // Slides 3 : Contenu détaillé - Étape 1: Choix de l'application/infrastructure
            // Slides 4 : Étape 2 - Analyse de risque (EBIOS, OCTAVE)
            // Slides 5 : Étape 3 - Proposition d'architecture sécurisée
            // Slide 6 : Petit schéma simple d'une architecture sécurisée (Dessin simplifié)
            // Slide 7 : Exercice pratique / Mise en application (synthèse)
            
            const slidesData = [
                {
                    type: "title",
                    title: "🔐 Leçon 38 : Mettre en pratique les compétences",
                    subtitle: "Projet concret : Analyse de risques et architecture sécurisée",
                    extra: "Chapitre 11 – Compétences pratiques"
                },
                {
                    type: "objectives",
                    title: "🎯 Objectifs de la leçon",
                    objectives: [
                        "Choisir une application ou infrastructure existante (réelle ou fictive) à analyser.",
                        "Réaliser une analyse de risque avec des méthodes reconnues (EBIOS Risk Manager, OCTAVE).",
                        "Proposer une architecture sécurisée adaptée aux menaces identifiées."
                    ]
                },
                {
                    type: "content",
                    title: "📌 1. Choisir une application ou infrastructure cible",
                    content: `<p class="mb-3">Avant toute démarche de sécurité, il faut <strong class="text-blue-800">sélectionner un périmètre d'étude</strong>. Cela peut être :</p>
                    <ul class="list-disc pl-6 space-y-2 mb-4">
                        <li>Une application web (exemple : site e-commerce, plateforme de cours en ligne, système de notation).</li>
                        <li>Une infrastructure réseau (petite entreprise, serveur de fichiers, base de données clients).</li>
                        <li>Un service critique (messagerie, authentification, paiement).</li>
                    </ul>
                    <div class="bg-blue-50 p-4 rounded-xl border-l-8 border-blue-500 mt-2">
                        <p class="font-semibold">💡 Conseil :</p>
                        <p>Pour ce cours pratique, nous prendrons l’exemple d’une <strong>application de gestion de notes d’étudiants</strong> (intranet universitaire) avec base de données et interface web.</p>
                    </div>`
                },
                {
                    type: "content",
                    title: "📊 2. Réaliser une analyse de risque (EBIOS / OCTAVE)",
                    content: `<p class="mb-3">L'analyse de risque permet d'<strong>identifier les menaces, vulnérabilités et impacts</strong>. Deux méthodes populaires :</p>
                    <div class="grid md:grid-cols-2 gap-4 my-4">
                        <div class="bg-white border border-gray-200 rounded-xl p-4 shadow-sm">
                            <h3 class="font-bold text-blue-700 text-lg">📘 EBIOS Risk Manager</h3>
                            <p class="text-sm">Méthode française (ANSSI) qui structure ateliers : atelier contextes, scénarios, stratégies. Idéale pour secteur public / critique.</p>
                        </div>
                        <div class="bg-white border border-gray-200 rounded-xl p-4 shadow-sm">
                            <h3 class="font-bold text-blue-700 text-lg">🔍 OCTAVE</h3>
                            <p class="text-sm">Méthode américaine (CERT/SEI) basée sur ateliers participatifs, moins lourde, approche par actifs.</p>
                        </div>
                    </div>
                    <p class="mt-2">Étapes clés :</p>
                    <ol class="list-decimal pl-6 space-y-1 mt-1">
                        <li>Inventaire des actifs (données, serveurs, code source).</li>
                        <li>Identification des menaces (injection SQL, piratage de session, ransomware).</li>
                        <li>Estimation de la vraisemblance et de l'impact (niveau de risque).</li>
                        <li>Proposition de mesures de sécurité (mitigation).</li>
                    </ol>
                    <div class="bg-amber-50 p-3 rounded-lg mt-4 italic text-amber-800 text-sm">📋 <strong>Exemple concret :</strong> Pour l'app de notes → vulnérabilité XSS, fuite de notes, attaque par force brute sur compte prof. Risque élevé. Contre-mesures : chiffrement TLS, firewall applicatif, MFA.</div>`
                },
                {
                    type: "content",
                    title: "🏛️ 3. Proposer une architecture sécurisée",
                    content: `<p class="mb-3">À partir des risques, on conçoit une <strong>architecture défensive</strong> : segmentation, chiffrement, authentification forte. Exemple d'architecture sécurisée à 3 niveaux :</p>
                    <ul class="list-disc pl-6 space-y-1 mb-4">
                        <li>✅ <strong>Pare-feu nouvelle génération (NGFW)</strong> en frontal.</li>
                        <li>✅ <strong>DMZ</strong> pour serveur web/public.</li>
                        <li>✅ <strong>Zone interne</strong> avec serveur applicatif et base de données (accès restreint).</li>
                        <li>✅ <strong>Authentification multi-facteurs + contrôle d'accès RBAC</strong>.</li>
                        <li>✅ <strong>Chiffrement des données au repos et en transit (TLS + chiffrement disque).</strong></li>
                        <li>✅ <strong>Solution de journalisation centralisée (SIEM) et sauvegardes hors site.</strong></li>
                    </ul>
                    <p class="font-medium text-blue-800">Résultat : une infrastructure résiliente, conforme aux bonnes pratiques (Zero Trust partiel).</p>`
                },
                {
                    type: "schema",
                    title: "🖍️ Schéma simplifié : Architecture sécurisée (exemple web app)",
                    schemaDesc: "Représentation ASCII-like / dessin minimal d'une architecture sécurisée avec DMZ, pare-feu, serveur web et base de données."
                },
                {
                    type: "practice",
                    title: "✏️ Mise en pratique : Travail à réaliser",
                    content: `<p class="font-semibold">🎓 Votre mission (à faire en binôme ou individuellement) :</p>
                    <ol class="list-decimal pl-6 mt-2 space-y-2">
                        <li>Choisissez une infrastructure que vous connaissez (site de e-commerce, plateforme e-learning, réseau d’école).</li>
                        <li>Réalisez une analyse de risque simplifiée avec la méthode OCTAVE ou EBIOS (tableau des menaces).</li>
                        <li>Proposez un schéma d’architecture sécurisée incluant au moins <strong>pare-feu, chiffrement, MFA, sauvegarde</strong>.</li>
                        <li>Présentez vos résultats sous forme d’un mini-rapport (ou diapositives).</li>
                    </ol>
                    <div class="mt-5 p-3 bg-green-50 border border-green-200 rounded-lg text-green-800">📌 <strong>Conseil d'enseignant</strong> : Utilisez des outils gratuits comme draw.io ou même papier pour schématiser. Pensez à justifier vos choix de sécurité.</div>`
                }
            ];

            let currentIndex = 0;
            let totalSlides = slidesData.length;

            // Fonction pour générer le HTML d'un slide selon son type
            function renderSlide(slide, idx) {
                if (slide.type === "title") {
                    return `
                        <div class="slide w-full flex-shrink-0 px-5 md:px-10 py-8 md:py-12 bg-gradient-to-br from-blue-50 to-indigo-50" data-slide-index="${idx}">
                            <div class="text-center space-y-5">
                                <div class="inline-block bg-blue-100 text-blue-800 px-4 py-1 rounded-full text-sm font-semibold">${slide.extra || "Leçon pratique"}</div>
                                <h1 class="text-3xl md:text-5xl font-extrabold text-gray-800 tracking-tight">${slide.title}</h1>
                                <p class="text-xl md:text-2xl text-blue-700 font-medium">${slide.subtitle}</p>
                                <div class="pt-4 text-gray-600 italic">Cameroun – Développement Web & Cybersécurité</div>
                                <div class="w-24 h-1 bg-blue-500 mx-auto rounded-full mt-4"></div>
                            </div>
                        </div>
                    `;
                } 
                else if (slide.type === "objectives") {
                    return `
                        <div class="slide w-full flex-shrink-0 px-5 md:px-10 py-8 md:py-10" data-slide-index="${idx}">
                            <div class="max-w-2xl mx-auto">
                                <h2 class="text-2xl md:text-3xl font-bold text-blue-800 border-l-8 border-blue-600 pl-4 mb-6">${slide.title}</h2>
                                <div class="space-y-4">
                                    ${slide.objectives.map((obj, i) => `
                                        <div class="flex items-start gap-3 bg-white rounded-xl p-4 shadow-md border border-gray-100">
                                            <span class="flex-shrink-0 w-7 h-7 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center font-bold">${i+1}</span>
                                            <p class="text-gray-700 text-lg">${obj}</p>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    `;
                }
                else if (slide.type === "content") {
                    return `
                        <div class="slide w-full flex-shrink-0 px-5 md:px-10 py-8 md:py-10 overflow-y-auto" data-slide-index="${idx}">
                            <div class="max-w-3xl mx-auto">
                                <h2 class="text-2xl md:text-3xl font-bold text-blue-800 border-b-2 border-blue-200 pb-2 mb-5">${slide.title}</h2>
                                <div class="prose-custom text-gray-700 text-base md:text-lg">
                                    ${slide.content}
                                </div>
                            </div>
                        </div>
                    `;
                }
                else if (slide.type === "schema") {
                    // Dessin d'un schéma simplifié en HTML/CSS & SVG-like (en utilisant du CSS Grid/Flex pour représenter l'architecture)
                    return `
                        <div class="slide w-full flex-shrink-0 px-4 md:px-10 py-8 md:py-10" data-slide-index="${idx}">
                            <div class="max-w-4xl mx-auto">
                                <h2 class="text-2xl md:text-3xl font-bold text-blue-800 text-center mb-5">${slide.title}</h2>
                                <div class="bg-gray-50 rounded-2xl p-5 shadow-inner border border-gray-200">
                                    <div class="text-sm text-center text-gray-500 mb-3">Architecture sécurisée recommandée (vue réseau simplifiée)</div>
                                    <!-- Schéma dessiné maison avec flex/grid et icônes texte -->
                                    <div class="relative overflow-x-auto">
                                        <div class="min-w-[280px] flex flex-col items-center space-y-4">
                                            <!-- Internet -->
                                            <div class="bg-gray-700 text-white px-6 py-2 rounded-full font-mono text-sm">🌐 Internet</div>
                                            <div class="w-0.5 h-6 bg-gray-400"></div>
                                            <!-- Pare-feu NGFW -->
                                            <div class="bg-red-100 border-2 border-red-500 rounded-xl px-6 py-2 font-bold text-red-700 shadow">🔥 Pare-feu NGFW (Filtrage / IPS)</div>
                                            <div class="w-0.5 h-6 bg-gray-400"></div>
                                            <!-- DMZ -->
                                            <div class="border-2 border-dashed border-amber-500 rounded-xl p-4 bg-amber-50 w-full max-w-md">
                                                <div class="text-center font-semibold text-amber-800">DMZ</div>
                                                <div class="flex flex-wrap justify-center gap-3 mt-2">
                                                    <div class="bg-white rounded shadow px-3 py-1 text-sm">🌍 Serveur Web</div>
                                                    <div class="bg-white rounded shadow px-3 py-1 text-sm">🔁 Reverse Proxy</div>
                                                </div>
                                            </div>
                                            <div class="w-0.5 h-6 bg-gray-400"></div>
                                            <!-- Réseau interne -->
                                            <div class="border-2 border-solid border-blue-500 rounded-xl p-4 bg-blue-50 w-full max-w-md">
                                                <div class="text-center font-semibold text-blue-800">Réseau interne sécurisé</div>
                                                <div class="flex flex-wrap justify-center gap-3 mt-2">
                                                    <div class="bg-white rounded shadow px-2 py-1 text-sm">🖥️ App serveur</div>
                                                    <div class="bg-white rounded shadow px-2 py-1 text-sm">🗄️ Base donnée chiffrée</div>
                                                    <div class="bg-white rounded shadow px-2 py-1 text-sm">🔐 LDAP / MFA</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="text-xs text-gray-500 mt-5 text-center">✔️ Schéma illustrant la séparation DMZ, pare-feu, segmentation interne, accès authentifiés.</div>
                                </div>
                                <p class="mt-4 text-center text-gray-600">Le schéma peut être adapté selon votre projet. La clé : <strong>défense en profondeur</strong>.</p>
                            </div>
                        </div>
                    `;
                }
                else if (slide.type === "practice") {
                    return `
                        <div class="slide w-full flex-shrink-0 px-5 md:px-10 py-8 md:py-10" data-slide-index="${idx}">
                            <div class="max-w-3xl mx-auto">
                                <h2 class="text-2xl md:text-3xl font-bold text-blue-800 mb-5">${slide.title}</h2>
                                <div class="bg-indigo-50 p-5 rounded-2xl border border-indigo-200 shadow-sm">
                                    ${slide.content}
                                </div>
                                <div class="mt-6 p-4 bg-white rounded-xl border-l-4 border-green-500 shadow">
                                    <p class="font-medium text-green-800">🧠 Rappel : L'analyse de risque est une démarche continue. N'oubliez pas de mettre à jour votre architecture régulièrement.</p>
                                </div>
                            </div>
                        </div>
                    `;
                }
                return `<div class="slide w-full flex-shrink-0 p-8">Contenu par défaut</div>`;
            }

            // Générer tous les slides et les ajouter au conteneur
            function buildSlides() {
                let slidesHtml = '';
                slidesData.forEach((slide, i) => {
                    slidesHtml += renderSlide(slide, i);
                });
                $('#slidesContainer').html(slidesHtml);
                createDots();
                updateActiveSlide();
            }

            function createDots() {
                let dotsHtml = '';
                for (let i = 0; i < totalSlides; i++) {
                    dotsHtml += `<div class="dot w-2.5 h-2.5 rounded-full bg-gray-400 transition-all duration-200 mx-1 hover:bg-blue-500" data-index="${i}"></div>`;
                }
                $('#dotsContainer').html(dotsHtml);
                // click sur dot
                $('.dot').on('click', function() {
                    let idx = parseInt($(this).data('index'));
                    if (!isNaN(idx)) goToSlide(idx);
                });
            }

            function updateActiveSlide() {
                // update container translate en mode flex-row (horizontal)
                const slideWidth = $('#slidesContainer .slide').first().outerWidth();
                if (slideWidth) {
                    $('#slidesContainer').css('transform', `translateX(-${currentIndex * slideWidth}px)`);
                } else {
                    // fallback
                    let width = $('#slidesWrapper').width();
                    $('#slidesContainer').css('transform', `translateX(-${currentIndex * width}px)`);
                }
                // Mise à jour des dots actifs
                $('.dot').each(function(i) {
                    if (i === currentIndex) {
                        $(this).removeClass('bg-gray-400').addClass('bg-blue-700 w-4 h-4');
                    } else {
                        $(this).removeClass('bg-blue-700 w-4 h-4').addClass('bg-gray-400 w-2.5 h-2.5');
                    }
                });
                // Gestion état boutons
                $('#prevBtn').prop('disabled', currentIndex === 0);
                $('#nextBtn').prop('disabled', currentIndex === totalSlides - 1);
            }

            function goToSlide(index) {
                if (index < 0) index = 0;
                if (index >= totalSlides) index = totalSlides - 1;
                if (index === currentIndex) return;
                currentIndex = index;
                // largeur du conteneur slide
                const slidesWrapper = $('#slidesWrapper');
                const containerWidth = slidesWrapper.width();
                if (containerWidth) {
                    $('#slidesContainer').css('transform', `translateX(-${currentIndex * containerWidth}px)`);
                } else {
                    let firstSlide = $('.slide').first();
                    let widthSlide = firstSlide.outerWidth();
                    $('#slidesContainer').css('transform', `translateX(-${currentIndex * widthSlide}px)`);
                }
                updateActiveSlide();
                // déclencher MathJax si présent
                if (window.MathJax) {
                    MathJax.typesetPromise();
                }
            }

            // Gestion du redimensionnement: recalculer la translation
            function handleResize() {
                if (!$('#slidesContainer').length) return;
                const containerWidth = $('#slidesWrapper').width();
                if (containerWidth) {
                    $('#slidesContainer').css('transform', `translateX(-${currentIndex * containerWidth}px)`);
                }
            }

            $(window).on('resize', function() {
                handleResize();
            });

            $('#nextBtn').on('click', function() {
                if (currentIndex < totalSlides - 1) {
                    goToSlide(currentIndex + 1);
                }
            });
            $('#prevBtn').on('click', function() {
                if (currentIndex > 0) {
                    goToSlide(currentIndex - 1);
                }
            });

            // Initialisation
            buildSlides();
            // Forcer le recalcule de largeur après affichage
            setTimeout(() => {
                handleResize();
                updateActiveSlide();
            }, 100);
            // support clavier
            $(document).on('keydown', function(e) {
                if (e.key === 'ArrowLeft') {
                    $('#prevBtn').click();
                } else if (e.key === 'ArrowRight') {
                    $('#nextBtn').click();
                }
            });
        });
    </script>
</body>
</html>
