<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Leçon 40 : Présentation des résultats & plan de remédiation | Cybersécurité</title>
    <!-- Tailwind CSS + Google Fonts + Font Awesome (icônes légères) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (formules si besoin, mais peu probable pour cette leçon, on l'inclut par précaution) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* Override pour un confort visuel + transition slides */
        body {
            background: #f0f9ff; /* bleu très clair apaisant */
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        /* personnalisation du défilement smooth */
        .slide-container {
            scroll-behavior: smooth;
        }
        /* Dots actifs */
        .dot-active {
            background-color: #1e3a8a !important;
            transform: scale(1.2);
            box-shadow: 0 0 6px #1e3a8a;
        }
        /* Cards & transitions */
        .slide-card {
            transition: all 0.2s ease;
        }
        /* rendre le texte lisible sur mobile */
        @media (max-width: 640px) {
            .prose {
                font-size: 0.95rem;
            }
            h2 {
                font-size: 1.5rem;
            }
        }
        /* petite ombre douce */
        .card-shadow {
            box-shadow: 0 12px 25px -12px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>
<body class="antialiased">

    <!-- en-tête léger avec titre de matière/classe -->
    <div class="sticky top-0 z-20 bg-white/80 backdrop-blur-sm border-b border-blue-100 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 py-2 flex flex-wrap justify-between items-center text-sm md:text-base">
            <div class="font-semibold text-blue-800">🎓 Initiation à la Cybersécurité</div>
            <div class="text-gray-600">Classe : Développement Web | Leçon 40/40</div>
        </div>
    </div>

    <main class="max-w-5xl mx-auto px-3 sm:px-6 py-6 md:py-10">
        <!-- Conteneur principal des slides -->
        <div id="slidesWrapper" class="relative">
            <!-- Slides (conteneurs) -->
            <div id="slidesContainer" class="slide-container overflow-hidden relative">
                <div id="slidesTrack" class="flex transition-transform duration-500 ease-in-out">
                    <!-- Les slides seront injectés dynamiquement via jQuery, mais pour une meilleure lisibilité on les écrit en HTML statique 
                         tout en gérant la navigation dynamique. On va générer les slides manuellement pour coller au contenu de la leçon40.
                         Le contenu suit les objectifs de la lesson40: 
                         objectif 0: Présenter les résultats à un public technique et métier
                         objectif 1: Établir un plan de remédiation avec priorités
                         objectif 2: Démontrer l'amélioration après correction
                    -->
                </div>
            </div>
            
            <!-- Navigation dots + flèches -->
            <div class="flex justify-center items-center gap-3 mt-8 mb-4 flex-wrap">
                <button id="prevSlide" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-full shadow-md transition disabled:opacity-40 disabled:cursor-not-allowed text-sm font-medium">◀ Précédent</button>
                <div id="dotsContainer" class="flex gap-2 mx-2 flex-wrap justify-center"></div>
                <button id="nextSlide" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-full shadow-md transition disabled:opacity-40 disabled:cursor-not-allowed text-sm font-medium">Suivant ▶</button>
            </div>
            <!-- indicateur de progression / compteur -->
            <div id="slideCounter" class="text-center text-gray-500 text-sm mt-2"></div>
        </div>
    </main>

    <script>
        // Données structurées pour la leçon 40 selon le programme JSON : chapitre 11, lesson 39/40? mais lesson40 avec trois objectifs.
        // Nous construisons les slides : 
        // Slide 0 : Titre de la leçon + illustration
        // Slide 1 : Objectifs de la leçon (3 objectifs)
        // Slide 2 : Présenter les résultats à public technique et métier (contenu pédagogique)
        // Slide 3 : Établir un plan de remédiation avec priorités
        // Slide 4 : Démontrer l'amélioration après correction + étude de cas 
        // Slide 5 : Résumé & conseils pratiques (bonus)

        const lessonData = {
            title: "Présentation des résultats & plan de remédiation",
            subtitle: "Communiquer efficacement et prioriser les correctifs en cybersécurité",
            objectives: [
                "🎯 Présenter les résultats d’un audit/pentest à un public technique et métier (direction, chefs de projet).",
                "📋 Établir un plan de remédiation avec priorités (criticité, faisabilité, impact).",
                "📈 Démontrer l’amélioration après correction (tests de régression, nouvelle évaluation)."
            ],
            slidesContent: [
                {
                    type: "cover",
                    title: "Leçon 40",
                    main: "Présentation des résultats &<br> plan de remédiation",
                    desc: "Transformer les vulnérabilités en actions concrètes et compréhensibles pour tous.",
                },
                {
                    type: "objectives",
                    title: "Objectifs de la leçon",
                },
                {
                    type: "content",
                    title: "1. Présenter les résultats à différents publics",
                    content: `
                        <div class="space-y-4">
                            <p class="text-gray-700">Après un test d'intrusion ou un audit de sécurité, deux types d'audiences sont essentielles :</p>
                            <ul class="list-disc pl-6 space-y-2 text-gray-700">
                                <li><span class="font-semibold">Public technique</span> (administrateurs, développeurs) : détails précis, preuves techniques, captures d'écran, requêtes exploitées, lignes de code vulnérables. Utilisez un rapport clair avec reproduction des failles.</li>
                                <li><span class="font-semibold">Public métier / direction</span> : synthèse des risques business, impact financier, conformité, réputation. Évitez le jargon excessif, présentez des métriques (criticité, nombre de données exposées...).</li>
                            </ul>
                            <div class="bg-blue-50 p-4 rounded-lg border-l-4 border-blue-500 mt-2">
                                <p class="italic text-blue-800">💡 Astuce : Pour une direction, utilisez un tableau de bord avec feux de circulation (vert/orange/rouge) et des recommandations stratégiques.</p>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-3">
                                <div class="bg-white rounded shadow p-3 border"><span class="font-bold">🔧 Livrable technique :</span> rapport détaillé (preuves, CVSS, endpoints vulnérables)</div>
                                <div class="bg-white rounded shadow p-3 border"><span class="font-bold">📊 Livrable métier :</span> Executive summary, tableau des risques, coût estimé d’un incident</div>
                            </div>
                        </div>
                    `,
                },
                {
                    type: "content",
                    title: "2. Établir un plan de remédiation avec priorités",
                    content: `
                        <div class="space-y-4">
                            <p>Le plan de remédiation doit hiérarchiser les actions selon : <span class="font-semibold">criticité (CVSS)</span>, <span class="font-semibold">facilité de correction</span>, <span class="font-semibold">impact sur l'activité</span>.</p>
                            <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200">
                                <h4 class="font-bold text-blue-800 mb-2">📌 Matrice de priorisation (Exemple)</h4>
                                <ul class="space-y-1 list-disc pl-5">
                                    <li><span class="text-red-600 font-medium">Critique (P0)</span> : correction immédiate (moins de 24h) - injection SQL exposant des données sensibles.</li>
                                    <li><span class="text-orange-500 font-medium">Élevée (P1)</span> : correction sous 1 semaine - XSS stocké / contournement d’authentification.</li>
                                    <li><span class="text-yellow-600 font-medium">Moyenne (P2)</span> : planifiée dans le sprint suivant - information de version exposée, CSRF.</li>
                                    <li><span class="text-green-600 font-medium">Faible (P3)</span> : amélioration progressive - headers de sécurité manquants mais risque limité.</li>
                                </ul>
                            </div>
                            <p>Pour chaque vulnérabilité, associer : <strong>action corrective + responsable + deadline + preuve de correction</strong>. Utiliser des outils de ticketing (Jira, Trello) et intégrer la sécurité dans le cycle de développement.</p>
                            <div class="flex flex-wrap gap-2 mt-2">
                                <span class="bg-gray-100 px-3 py-1 rounded-full text-sm">✅ Correction rapide (patch)</span>
                                <span class="bg-gray-100 px-3 py-1 rounded-full text-sm">🔄 Changer de configuration</span>
                                <span class="bg-gray-100 px-3 py-1 rounded-full text-sm">🛡️ Ajouter un WAF temporaire</span>
                                <span class="bg-gray-100 px-3 py-1 rounded-full text-sm">📚 Formation développeurs</span>
                            </div>
                        </div>
                    `,
                },
                {
                    type: "content",
                    title: "3. Démontrer l’amélioration après correction",
                    content: `
                        <div class="space-y-4">
                            <p>Pour prouver l’efficacité des correctifs, il est impératif de :</p>
                            <div class="bg-emerald-50 p-4 rounded-xl border border-emerald-200">
                                <ul class="space-y-2">
                                    <li>✔️ <strong>Refaire les tests</strong> (même périmètre) sur les points vulnérables corrigés.</li>
                                    <li>✔️ <strong>Utiliser des scanners de vulnérabilités</strong> (Nessus, OpenVAS) avant/après pour comparer les scores.</li>
                                    <li>✔️ <strong>Réaliser des tests de non-régression fonctionnelle et sécurité</strong>.</li>
                                    <li>✔️ <strong>Mettre à jour le rapport d’audit</strong> avec la colonne “statut corrigé” et preuve (patch ID, captures).</li>
                                </ul>
                            </div>
                            <p>Exemple concret : Une faille XSS détectée → correction par échappement des sorties → nouveau test avec payloads → plus de script exécuté → on capture l’écran et on valide la résolution. On peut aussi rejouer la chaîne d’attaque Metasploit pour vérifier l’impossibilité d’exploitation.</p>
                            <div class="bg-white rounded shadow p-3 border-l-8 border-l-green-500 mt-2">
                                <p class="text-sm font-mono">📈 Indicateur de performance : Taux de correction (nombre de failles corrigées / total) et réduction du risque résiduel.</p>
                            </div>
                        </div>
                    `,
                },
                {
                    type: "conclusion",
                    title: "Bonnes pratiques & synthèse",
                    content: `
                        <div class="space-y-3">
                            <p>✅ <strong>Communication adaptée</strong> : Un rapport unique avec deux sections (technique & métier) favorise l’adhésion.</p>
                            <p>✅ <strong>Plan d’action SMART</strong> (Spécifique, Mesurable, Atteignable, Réaliste, Temporellement défini).</p>
                            <p>✅ <strong>Retour d’expérience (REX)</strong> : organiser une réunion de débriefing avec les parties prenantes.</p>
                            <div class="flex flex-col sm:flex-row gap-3 justify-center mt-4">
                                <div class="text-center p-2 bg-blue-100 rounded-xl w-full sm:w-auto">
                                    <span class="text-2xl mr-1">📄</span> Modèle de rapport
                                </div>
                                <div class="text-center p-2 bg-blue-100 rounded-xl w-full sm:w-auto">
                                    <span class="text-2xl mr-1">⚙️</span> Plan de remédiation type
                                </div>
                                <div class="text-center p-2 bg-blue-100 rounded-xl w-full sm:w-auto">
                                    <span class="text-2xl mr-1">🔄</span> Cycle d'amélioration continue
                                </div>
                            </div>
                        </div>
                    `
                }
            ]
        };

        // Construction des slides en jQuery
        let currentIndex = 0;
        let totalSlides = 0;
        let $track = $("#slidesTrack");
        let $dotsContainer = $("#dotsContainer");
        let $prevBtn = $("#prevSlide");
        let $nextBtn = $("#nextSlide");
        let $counter = $("#slideCounter");

        function buildSlides() {
            $track.empty();
            // slide 0 : cover
            const coverSlide = `
                <div class="slide-card w-full flex-shrink-0 px-2 md:px-4">
                    <div class="bg-white rounded-2xl card-shadow overflow-hidden p-6 md:p-8 h-full transition">
                        <div class="flex flex-col items-center text-center">
                            <div class="bg-blue-100 text-blue-800 text-sm font-semibold px-3 py-1 rounded-full mb-3">Chapitre 11 · Mise en pratique</div>
                            <h1 class="text-3xl md:text-5xl font-extrabold bg-gradient-to-r from-blue-700 to-indigo-700 bg-clip-text text-transparent">${lessonData.title}</h1>
                            <p class="text-lg md:text-xl text-gray-600 mt-3 max-w-2xl">${lessonData.subtitle}</p>
                            <div class="mt-8 w-24 h-24 bg-blue-50 rounded-full flex items-center justify-center">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-12 h-12 text-blue-600"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.75 16.5l-.542-1.896a3 3 0 00-2.062-2.062L14.25 12l1.896-.542a3 3 0 002.062-2.062L18.75 7.5l.542 1.896a3 3 0 002.062 2.062L23.25 12l-1.896.542a3 3 0 00-2.062 2.062L18.75 16.5z"/></svg>
                            </div>
                            <p class="text-gray-500 mt-6 text-sm md:text-base">Communication · Priorisation · Amélioration continue</p>
                            <div class="mt-4 text-blue-500 text-sm">⬅️ Utilisez les flèches pour naviguer ➡️</div>
                        </div>
                    </div>
                </div>
            `;
            $track.append(coverSlide);

            // slide 1 : objectifs
            let objectivesHtml = `<div class="slide-card w-full flex-shrink-0 px-2 md:px-4"><div class="bg-white rounded-2xl card-shadow p-6 md:p-8 h-full"><h2 class="text-2xl md:text-3xl font-bold text-blue-800 border-l-4 border-blue-500 pl-4 mb-6">🎯 Objectifs pédagogiques</h2><div class="space-y-4">`;
            lessonData.objectives.forEach(obj => {
                objectivesHtml += `<div class="flex items-start gap-3 p-3 bg-gray-50 rounded-xl"><span class="text-blue-500 text-xl">📌</span><p class="text-gray-700">${obj}</p></div>`;
            });
            objectivesHtml += `</div><div class="mt-6 text-sm text-gray-500 italic">Après cette leçon, vous saurez valoriser votre travail de cybersécurité.</div></div></div>`;
            $track.append(objectivesHtml);

            // slides de contenu (type content)
            const contentSlides = lessonData.slidesContent.filter(s => s.type === "content");
            contentSlides.forEach(slide => {
                let html = `
                    <div class="slide-card w-full flex-shrink-0 px-2 md:px-4">
                        <div class="bg-white rounded-2xl card-shadow p-6 md:p-8 h-full">
                            <h2 class="text-xl md:text-2xl font-bold text-gray-800 border-b border-blue-200 pb-2 mb-5">${slide.title}</h2>
                            <div class="prose max-w-none">${slide.content}</div>
                        </div>
                    </div>
                `;
                $track.append(html);
            });

            // slide conclusion (dernier)
            const conclusion = lessonData.slidesContent.find(s => s.type === "conclusion");
            if(conclusion) {
                let concHtml = `
                    <div class="slide-card w-full flex-shrink-0 px-2 md:px-4">
                        <div class="bg-white rounded-2xl card-shadow p-6 md:p-8 h-full">
                            <h2 class="text-2xl font-bold text-green-700 mb-4">✨ ${conclusion.title}</h2>
                            <div class="prose max-w-none">${conclusion.content}</div>
                            <div class="mt-6 pt-4 text-center text-gray-400 text-sm border-t">🔐 "La sécurité est un processus, pas un produit" - Bruce Schneier</div>
                        </div>
                    </div>
                `;
                $track.append(concHtml);
            } else {
                // fallback rapide
                $track.append(`<div class="slide-card w-full flex-shrink-0 px-2"><div class="bg-white rounded-2xl p-6"><h3>Résumé</h3><p>Présentation des résultats et remédiation sont clés.</p></div></div>`);
            }

            totalSlides = $track.children().length;
            updateDots();
            updateSlidePosition();
            updateButtonsState();
            updateCounter();
        }

        function updateDots() {
            $dotsContainer.empty();
            for(let i = 0; i < totalSlides; i++) {
                let dot = $('<button class="w-3 h-3 rounded-full bg-gray-400 transition-all duration-200 mx-1 focus:outline-none"></button>');
                dot.data('index', i);
                dot.on('click', function() {
                    currentIndex = $(this).data('index');
                    updateSlidePosition();
                    updateButtonsState();
                    updateDotsActive();
                    updateCounter();
                });
                $dotsContainer.append(dot);
            }
            updateDotsActive();
        }

        function updateDotsActive() {
            $dotsContainer.children().each((idx, el) => {
                if(idx === currentIndex) {
                    $(el).addClass('dot-active bg-blue-700').removeClass('bg-gray-400');
                } else {
                    $(el).removeClass('dot-active bg-blue-700').addClass('bg-gray-400');
                }
            });
        }

        function updateSlidePosition() {
            const width = $("#slidesContainer").width();
            if(width) {
                $track.css('transform', `translateX(-${currentIndex * 100}%)`);
            } else {
                // fallback
                setTimeout(() => {
                    const w = $("#slidesContainer").width();
                    $track.css('transform', `translateX(-${currentIndex * 100}%)`);
                }, 10);
            }
        }

        function updateButtonsState() {
            $prevBtn.prop('disabled', currentIndex === 0);
            $nextBtn.prop('disabled', currentIndex === totalSlides - 1);
        }

        function updateCounter() {
            $counter.text(`Slide ${currentIndex+1} / ${totalSlides}`);
        }

        function nextSlide() {
            if(currentIndex < totalSlides - 1) {
                currentIndex++;
                updateSlidePosition();
                updateButtonsState();
                updateDotsActive();
                updateCounter();
            }
        }

        function prevSlide() {
            if(currentIndex > 0) {
                currentIndex--;
                updateSlidePosition();
                updateButtonsState();
                updateDotsActive();
                updateCounter();
            }
        }

        $(window).on('resize', function() {
            updateSlidePosition();
        });

        $(document).ready(function() {
            buildSlides();
            // Event listeners
            $nextBtn.on('click', nextSlide);
            $prevBtn.on('click', prevSlide);
            // Navigation clavier (optionnel)
            $(document).keydown(function(e) {
                if(e.key === 'ArrowRight') nextSlide();
                if(e.key === 'ArrowLeft') prevSlide();
            });
            // Initialisation correcte de la largeur
            setTimeout(() => {
                updateSlidePosition();
            }, 100);
        });
    </script>

    <!-- pied de page simple -->
    <footer class="text-center text-gray-400 text-xs py-6 border-t border-gray-200 mt-6">
        <p>📘 Cours d’Initiation à la Cybersécurité — Classe Développement Web — Enseignant Cameroun 🇨🇲</p>
        <p class="mt-1">Support interactif : présentation des résultats, plan de remédiation et amélioration continue</p>
    </footer>

    <!-- correction du responsive : s'assurer que le container des slides prenne bien toute largeur -->
    <style>
        #slidesContainer {
            width: 100%;
            overflow: hidden;
        }
        #slidesTrack {
            display: flex;
            width: 100%;
        }
        .slide-card {
            width: 100%;
            flex-shrink: 0;
            box-sizing: border-box;
        }
        .prose ul, .prose p {
            margin-bottom: 0.75rem;
        }
        .prose li {
            margin-top: 0.25rem;
        }
    </style>
</body>
</html>
