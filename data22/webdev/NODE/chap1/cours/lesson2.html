<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Node.js - Installation et Premier Script | Cours en Slides</title>
    <!-- Tailwind CSS via CDN + custom layer pour améliorer lisibilité -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (pour formules éventuelles, bien que cette leçon n'en contienne pas, mais inclus pour compatibilité) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* transition douce pour slides */
        .slide-container {
            transition: opacity 0.3s ease-in-out;
        }
        .slide {
            min-height: 70vh;
        }
        /* personnalisation scrollbar pour meilleur confort */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #8b5cf6;
            border-radius: 10px;
        }
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
        }
        /* sur petits écrans, améliorer le padding */
        @media (max-width: 640px) {
            .slide {
                min-height: 60vh;
            }
            .btn-nav {
                padding: 0.5rem 0.75rem;
                font-size: 0.8rem;
            }
        }
        /* pour que les slides soient bien visibles */
        .card-progress {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="font-sans antialiased">

    <div class="max-w-5xl mx-auto px-4 py-6 md:py-10">
        <!-- Header simple indiquant la matière / classe -->
        <div class="text-center mb-6 md:mb-10">
            <span class="inline-block bg-indigo-100 text-indigo-800 text-xs md:text-sm font-semibold px-3 py-1 rounded-full uppercase tracking-wide">Cours Node.js - Classe Développement Web</span>
            <h1 class="text-2xl md:text-3xl font-bold text-gray-800 mt-2">Backend avec Node.js</h1>
        </div>

        <!-- Zone principale du diaporama -->
        <div class="bg-white/70 backdrop-blur-sm rounded-2xl shadow-xl overflow-hidden border border-indigo-100">
            <!-- Slider wrapper -->
            <div id="slidesWrapper" class="relative">
                <!-- Affichage de la slide active -->
                <div id="slidesContainer" class="slide-container p-5 md:p-8">
                    <!-- les slides seront injectées ici via jQuery -->
                </div>

                <!-- Navigation + indicateurs -->
                <div class="flex flex-wrap justify-between items-center gap-3 p-4 bg-white/60 border-t border-indigo-100">
                    <button id="prevSlide" class="btn-nav bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-2 px-4 rounded-lg transition disabled:opacity-40 disabled:cursor-not-allowed shadow-sm flex items-center gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd" /></svg>
                        Précédent
                    </button>
                    <div id="slideCounter" class="text-sm text-gray-600 font-mono bg-gray-100 px-3 py-1 rounded-full">Slide 1 / 1</div>
                    <button id="nextSlide" class="btn-nav bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-4 rounded-lg transition shadow-sm flex items-center gap-1">
                        Suivant
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" /></svg>
                    </button>
                </div>
                <!-- progress dots -->
                <div id="dotsContainer" class="flex justify-center gap-2 py-3 bg-white/40 flex-wrap"></div>
            </div>
        </div>

        <!-- Petit message pédagogique -->
        <div class="mt-8 text-center text-sm text-gray-500 italic">
            📘 Leçon 2 : Installer Node.js, npm, premier script, console REPL. Utilise les flèches pour naviguer.
        </div>
    </div>

    <script>
        $(document).ready(function() {
            // ----- Définition des slides pour la LESSON 2 (ID Lesson: lesson2) -----
            // Titre principal de la leçon extrait des objectifs + enrichi pour pédagogie
            // Le contexte JSON montre lesson2: "Installer Node.js et npm", "Écrire et exécuter premier script", "REPL"
            // Création de slides structurés:
            // Slide 1 : Titre de la leçon
            // Slide 2 : Objectifs d'apprentissage (basés sur les objectifsLesson)
            // Slides 3, 4, 5 : Contenu approfondi (installation, premier script, REPL)
            
            const lessonTitle = "🔧 Installation de Node.js & Premier Script";
            const objectives = [
                "Installer Node.js et npm (Node Package Manager) sur différents systèmes (Windows, macOS, Linux).",
                "Écrire et exécuter un premier script JavaScript avec la commande `node`.",
                "Comprendre et utiliser la console REPL (Read-Eval-Print Loop) de Node.js pour tester du code rapidement."
            ];
            
            // Contenu détaillé - Slides pédagogiques
            // Slide installation détaillée
            const installContent = {
                title: "📥 1. Installer Node.js et npm",
                paragraphs: [
                    "Node.js est un environnement d'exécution JavaScript basé sur le moteur V8 de Chrome. Pour commencer, il faut l'installer avec son gestionnaire de paquets intégré : npm.",
                    "Rendez-vous sur le site officiel : <a href='https://nodejs.org' target='_blank' class='text-indigo-600 underline font-medium'>nodejs.org</a>. Deux versions sont proposées : LTS (Long Term Support, recommandée pour la majorité des projets) et Current (dernières fonctionnalités).",
                    "💻 Sur Windows : téléchargez l'installateur .msi et suivez l'assistant. N'oubliez pas de cocher l'option d'ajout au PATH. Sur macOS : utilisez le package .pkg ou via Homebrew (`brew install node`). Sur Linux : via le gestionnaire de paquets (apt, dnf) ou nvm."
                ],
                tips: "✔️ Après installation, ouvrez un terminal (cmd, PowerShell, bash) et tapez `node -v` puis `npm -v` pour vérifier les versions."
            };
            
            const firstScriptContent = {
                title: "✍️ 2. Écrire et exécuter un premier script avec node",
                paragraphs: [
                    "Créez un dossier pour vos projets Node. À l'intérieur, créez un fichier `hello.js`.",
                    "Éditez ce fichier avec un éditeur de texte (VSCode, Notepad++, etc.) et écrivez :",
                    "<pre class='bg-gray-900 text-green-300 p-3 rounded-md overflow-x-auto text-sm my-3'><code>console.log('Bienvenue dans Node.js !');\nconst salutation = 'Bonjour, Cameroun !';\nconsole.log(salutation);</code></pre>",
                    "Pour exécuter votre script : ouvrez le terminal à l'emplacement du fichier et lancez : <code class='bg-gray-200 px-2 py-0.5 rounded font-mono text-indigo-700'>node hello.js</code>",
                    "Vous verrez alors le texte s'afficher. Félicitations, vous avez créé votre premier programme serveur JavaScript !"
                ],
                imageAlt: "exemple de terminal affichant node hello.js et le résultat"
            };
            
            const replContent = {
                title: "🖥️ 3. La console REPL de Node.js",
                paragraphs: [
                    "REPL signifie <strong>Read-Eval-Print Loop</strong> (Lire-Évaluer-Afficher-Boucler). C'est un environnement interactif qui permet d'exécuter du JavaScript ligne par ligne.",
                    "Pour y accéder, tapez simplement `node` dans votre terminal (sans nom de fichier). Vous verrez apparaître un prompt `>`.",
                    "Exemples d'utilisation :",
                    "<pre class='bg-gray-900 text-green-300 p-3 rounded-md overflow-x-auto text-sm my-3'><code>> 2 + 3\n5\n> let pays = 'Cameroun';\nundefined\n> console.log('Bienvenue au ' + pays);\nBienvenue au Cameroun\nundefined\n> .exit</code></pre>",
                    "La REPL est idéale pour tester des bouts de code, des fonctions ou comprendre rapidement le comportement de JavaScript. Pour quitter, tapez `.exit` ou utilisez `Ctrl+C` deux fois."
                ],
                note: "💡 Astuce : dans la REPL, vous pouvez utiliser la touche ⬆ pour rappeler les commandes précédentes."
            };
            
            // Bonus slide: récapitulatif et bonnes pratiques
            const recapContent = {
                title: "🏁 Récapitulatif & Bonnes pratiques",
                paragraphs: [
                    "✅ Node.js permet d'exécuter JS côté serveur, indispensable pour le backend.",
                    "✅ npm est le gestionnaire de paquets : vous l'utiliserez pour installer des bibliothèques (Express, Mongoose, etc.)",
                    "✅ Toujours vérifier vos installations avec `node -v` et `npm -v`.",
                    "✅ Pratiquez la REPL pour tester rapidement des expressions. Pour les scripts, enregistrez dans un fichier `.js` et lancez avec `node`.",
                    "✅ Sur les systèmes UNIX, pour Node, pensez à utiliser nvm (Node Version Manager) pour gérer plusieurs versions."
                ],
                imageAscii: true
            };
            
            // Construction des slides au format HTML (Objet slide)
            let slides = [];
            
            // SLIDE 0 : Titre principal + illustration symbolique (dessin minimal en SVG)
            slides.push(`
                <div class="slide text-center flex flex-col justify-center items-center">
                    <div class="mb-6 inline-flex p-3 bg-indigo-50 rounded-full">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7" />
                            <path d="M12 5v14" stroke="currentColor" />
                        </svg>
                    </div>
                    <h2 class="text-3xl md:text-4xl font-extrabold bg-gradient-to-r from-indigo-700 to-purple-700 bg-clip-text text-transparent">${lessonTitle}</h2>
                    <p class="text-gray-600 mt-4 max-w-md">Leçon 2 - Module "Backend avec Node.js"</p>
                    <div class="mt-8 text-sm bg-indigo-50 p-3 rounded-lg inline-block">
                        🎯 Classe : Développement Web | Matière : Node.js
                    </div>
                    <div class="mt-6 w-24 h-1 bg-indigo-300 rounded-full mx-auto"></div>
                </div>
            `);
            
            // SLIDE 1 : Objectifs (basés sur les objectifs de la leçon)
            let objectivesHtml = `<div class="slide"><h3 class="text-2xl font-bold text-indigo-800 border-l-4 border-indigo-500 pl-3 mb-5">🎯 Objectifs d'apprentissage</h3><ul class="space-y-3 list-disc pl-6 text-gray-700">`;
            objectives.forEach(obj => {
                objectivesHtml += `<li class="text-base md:text-lg">${obj}</li>`;
            });
            objectivesHtml += `</ul><div class="mt-8 p-4 bg-blue-50 rounded-xl italic text-blue-800">🌟 À la fin de cette leçon, vous serez capable d'installer Node.js, d'exécuter des scripts et d'utiliser la console REPL en autonomie.</div></div>`;
            slides.push(objectivesHtml);
            
            // SLIDE 2 : Installation détaillée
            slides.push(`
                <div class="slide">
                    <h3 class="text-2xl font-bold text-indigo-800 border-l-4 border-indigo-500 pl-3 mb-4">${installContent.title}</h3>
                    ${installContent.paragraphs.map(p => `<p class="mb-3 text-gray-700 leading-relaxed">${p}</p>`).join('')}
                    <div class="bg-green-50 p-4 rounded-lg mt-4 text-green-800 border border-green-200">
                        <span class="font-semibold">✅ Vérification :</span> ${installContent.tips}
                    </div>
                    <!-- petit dessin SVG pour illustrer terminal / installation -->
                    <div class="mt-6 flex justify-center">
                        <svg width="180" height="80" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg" class="text-gray-500">
                            <rect x="10" y="20" width="160" height="40" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
                            <circle cx="28" cy="40" r="5" fill="#10b981" />
                            <text x="42" y="45" fill="#cbd5e1" font-size="12" font-family="monospace">$ node -v</text>
                            <text x="42" y="60" fill="#facc15" font-size="11" font-family="monospace">v20.10.0</text>
                        </svg>
                    </div>
                </div>
            `);
            
            // SLIDE 3 : Premier script
            slides.push(`
                <div class="slide">
                    <h3 class="text-2xl font-bold text-indigo-800 border-l-4 border-indigo-500 pl-3 mb-4">${firstScriptContent.title}</h3>
                    ${firstScriptContent.paragraphs.map(p => `<div class="mb-3 text-gray-700 leading-relaxed">${p}</div>`).join('')}
                    <div class="bg-amber-50 p-3 rounded-md border border-amber-200 mt-2 text-sm">
                        💡 <span class="font-semibold">À retenir :</span> Node exécute du JavaScript hors navigateur, ce qui permet de créer des serveurs, des outils CLI, etc.
                    </div>
                    <!-- mini représentation dessinée d'un éditeur de texte -->
                    <div class="flex justify-center mt-5">
                        <svg width="200" height="70" viewBox="0 0 240 70" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="8" y="8" width="200" height="54" rx="6" fill="#0f172a" stroke="#334155"/>
                            <rect x="20" y="20" width="170" height="12" rx="2" fill="#3b82f6" opacity="0.7"/>
                            <rect x="20" y="38" width="120" height="10" rx="2" fill="#64748b"/>
                            <circle cx="192" cy="35" r="5" fill="#f59e0b"/>
                            <text x="30" y="30" fill="white" font-size="8" font-family="monospace">console.log('Hello Node.js');</text>
                        </svg>
                    </div>
                </div>
            `);
            
            // SLIDE 4 : REPL
            slides.push(`
                <div class="slide">
                    <h3 class="text-2xl font-bold text-indigo-800 border-l-4 border-indigo-500 pl-3 mb-4">${replContent.title}</h3>
                    ${replContent.paragraphs.map(p => `<p class="mb-3 text-gray-700 leading-relaxed">${p}</p>`).join('')}
                    <div class="bg-purple-50 p-3 rounded-lg mt-2 border border-purple-200">${replContent.note}</div>
                    <!-- dessin interactif style terminal REPL -->
                    <div class="mt-5 bg-black/80 text-green-400 p-3 rounded-lg font-mono text-xs max-w-full overflow-x-auto">
                        <span class="text-white">$ node</span><br/>
                        > let x = 42;<br/>
                        undefined<br/>
                        > x * 2<br/>
                        84<br/>
                        > .exit<br/>
                    </div>
                </div>
            `);
            
            // SLIDE 5 : Récapitulatif (bonus mais enrichissant)
            slides.push(`
                <div class="slide">
                    <h3 class="text-2xl font-bold text-indigo-800 border-l-4 border-indigo-500 pl-3 mb-4">${recapContent.title}</h3>
                    ${recapContent.paragraphs.map(p => `<p class="mb-2 text-gray-700">${p}</p>`).join('')}
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-5">
                        <div class="bg-indigo-50 p-3 rounded-lg text-center"><span class="font-bold">📦 npm</span><br/>Plus de 2 millions de paquets</div>
                        <div class="bg-indigo-50 p-3 rounded-lg text-center"><span class="font-bold">⚡ Event loop</span><br/>Asynchrone non-bloquant</div>
                    </div>
                    <p class="mt-4 text-center text-gray-500 text-sm">✨ Prochaine leçon : gestion des modules CommonJS et ES Modules ✨</p>
                </div>
            `);
            
            // Initialisation carrousel simple
            let currentSlide = 0;
            const totalSlides = slides.length;
            
            function renderSlide(index) {
                if (index < 0) index = 0;
                if (index >= totalSlides) index = totalSlides - 1;
                currentSlide = index;
                $('#slidesContainer').fadeOut(150, function() {
                    $(this).html(slides[currentSlide]).fadeIn(200);
                });
                $('#slideCounter').text(`Slide ${currentSlide+1} / ${totalSlides}`);
                // gestion boutons prev/next
                $('#prevSlide').prop('disabled', currentSlide === 0);
                $('#nextSlide').prop('disabled', currentSlide === totalSlides-1);
                // Mettre à jour les dots
                updateDots();
            }
            
            function updateDots() {
                let dotsHtml = '';
                for (let i = 0; i < totalSlides; i++) {
                    const activeClass = (i === currentSlide) ? 'bg-indigo-600 w-8' : 'bg-gray-300 w-3';
                    dotsHtml += `<button class="dotSlide h-2 rounded-full transition-all ${activeClass} hover:bg-indigo-400 mx-1" data-index="${i}"></button>`;
                }
                $('#dotsContainer').html(dotsHtml);
                // écoute clic sur dots
                $('.dotSlide').on('click', function() {
                    const idx = parseInt($(this).data('index'));
                    if (!isNaN(idx) && idx !== currentSlide) {
                        currentSlide = idx;
                        renderSlide(currentSlide);
                    }
                });
            }
            
            // Navigation
            $('#prevSlide').on('click', function() {
                if (currentSlide > 0) {
                    currentSlide--;
                    renderSlide(currentSlide);
                }
            });
            $('#nextSlide').on('click', function() {
                if (currentSlide < totalSlides - 1) {
                    currentSlide++;
                    renderSlide(currentSlide);
                }
            });
            
            // Support clavier (gauche/droite)
            $(document).on('keydown', function(e) {
                if (e.key === 'ArrowLeft') {
                    $('#prevSlide').click();
                } else if (e.key === 'ArrowRight') {
                    $('#nextSlide').click();
                }
            });
            
            // initialisation premiere slide
            renderSlide(0);
            
            // Ajout option swipe minimal pour mobile (simple amélioration tactile)
            let touchStartX = 0;
            let touchEndX = 0;
            $('#slidesWrapper').on('touchstart', function(e) {
                touchStartX = e.originalEvent.touches[0].clientX;
            });
            $('#slidesWrapper').on('touchend', function(e) {
                touchEndX = e.originalEvent.changedTouches[0].clientX;
                const diff = touchStartX - touchEndX;
                if (Math.abs(diff) > 50) {
                    if (diff > 0) $('#nextSlide').click();
                    else $('#prevSlide').click();
                }
            });
        });
    </script>
</body>
</html>
