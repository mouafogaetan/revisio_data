<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cours : Sécurité des bases de données - Leçon 33 | Initiation aux BD</title>
    <!-- Tailwind CSS + CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (formules mathématiques si besoin) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* styles doux pour confort visuel et transitions */
        body {
            background: #f4f7fc;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
        }
        .slide-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .slide-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.1);
        }
        .nav-btn {
            transition: all 0.2s;
        }
        .nav-btn:active {
            transform: scale(0.96);
        }
        .progress-bar {
            transition: width 0.3s ease;
        }
        /* pour les petits écrans, slide interne padding adapté */
        @media (max-width: 640px) {
            .slide-content {
                padding: 1.25rem;
            }
        }
        /* custom scrollbar discret */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 10px;
        }
    </style>
</head>
<body class="antialiased">

    <div class="max-w-4xl mx-auto px-4 py-6 md:py-10">
        <!-- Header fixe avec progression -->
        <div class="sticky top-0 z-10 bg-white/90 backdrop-blur-sm rounded-2xl shadow-sm p-3 mb-6 border border-gray-100">
            <div class="flex justify-between items-center text-sm text-gray-600 mb-2 flex-wrap gap-2">
                <div class="font-medium"><span class="bg-blue-100 text-blue-800 px-2 py-1 rounded-full text-xs">Leçon 33/36</span> </div>
                <div class="font-mono text-xs">Sécurité & Gestion</div>
                <div class="text-xs">📘 Initiation aux Bases de données</div>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2 overflow-hidden">
                <div class="progress-bar bg-gradient-to-r from-blue-600 to-teal-500 h-full rounded-full" style="width: 0%;"></div>
            </div>
            <p class="text-right text-xs text-gray-400 mt-1 mt-1" id="slideCounter">Slide 1 / 6</p>
        </div>

        <!-- container slides dynamique -->
        <div id="slidesContainer" class="relative"></div>

        <!-- Navigation buttons -->
        <div class="flex justify-between items-center mt-8 gap-3">
            <button id="prevBtn" class="nav-btn px-5 py-2.5 bg-white border border-gray-300 rounded-xl shadow-sm text-gray-700 font-medium hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition flex items-center gap-2">
                ◀ Précédent
            </button>
            <div class="flex gap-2">
                <button id="gotoSlide1" class="w-2.5 h-2.5 rounded-full bg-gray-300 hover:bg-blue-400 transition dot-nav" data-index="0"></button>
                <button id="gotoSlide2" class="w-2.5 h-2.5 rounded-full bg-gray-300 hover:bg-blue-400 transition dot-nav" data-index="1"></button>
                <button id="gotoSlide3" class="w-2.5 h-2.5 rounded-full bg-gray-300 hover:bg-blue-400 transition dot-nav" data-index="2"></button>
                <button id="gotoSlide4" class="w-2.5 h-2.5 rounded-full bg-gray-300 hover:bg-blue-400 transition dot-nav" data-index="3"></button>
                <button id="gotoSlide5" class="w-2.5 h-2.5 rounded-full bg-gray-300 hover:bg-blue-400 transition dot-nav" data-index="4"></button>
                <button id="gotoSlide6" class="w-2.5 h-2.5 rounded-full bg-gray-300 hover:bg-blue-400 transition dot-nav" data-index="5"></button>
            </div>
            <button id="nextBtn" class="nav-btn px-5 py-2.5 bg-blue-600 text-white rounded-xl shadow-md hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition flex items-center gap-2">
                Suivant ▶
            </button>
        </div>

        <!-- footer note -->
        <div class="text-center text-xs text-gray-400 mt-8 border-t border-gray-200 pt-5">
            🛡️ Cours conçu pour les étudiants camerounais — Protection SQL, chiffrement, pare-feu
        </div>
    </div>

    <script>
        $(document).ready(function() {
            // ---------- DONNÉES DES SLIDES (Leçon 33 : Sécuriser une base de données) ----------
            // Slide 1 : Titre
            // Slide 2 : Objectifs d'apprentissage
            // Slide 3 : Protection contre les injections SQL
            // Slide 4 : Chiffrement des données sensibles
            // Slide 5 : Pare-feu et contrôle d'accès réseau
            // Slide 6 : Bonnes pratiques et résumé / QCM flash

            const slidesData = [
                { // slide 0 - titre
                    type: "title",
                    title: "🛡️ Sécuriser une base de données",
                    subtitle: "Protection contre les injections SQL · Chiffrement · Pare-feu",
                    badge: "Leçon 33 • Initiation aux Bases de données",
                    icon: "🔐"
                },
                { // slide 1 - objectifs pédagogiques
                    type: "objectifs",
                    title: "🎯 Objectifs de la leçon",
                    objectives: [
                        "✅ Protéger efficacement une base de données contre les injections SQL (requêtes paramétrées).",
                        "✅ Comprendre le chiffrement des données sensibles (au repos & en transit).",
                        "✅ Savoir configurer un pare-feu et restreindre l’accès réseau à la base de données.",
                        "✅ Appliquer le principe de moindre privilège (droits des utilisateurs)."
                    ]
                },
                { // slide 2 - injection SQL (contenu principal)
                    type: "content",
                    title: "🧪 Injection SQL : le danger n°1",
                    content: `
                        <div class="space-y-4">
                            <p class="text-gray-700 leading-relaxed"><span class="font-bold text-red-600">Qu'est-ce que l'injection SQL ?</span> C'est une attaque où un hacker insère du code SQL malveillant via des champs de saisie (formulaire, URL). Cela peut <strong>voler, modifier ou supprimer</strong> toutes vos données.</p>
                            <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded-lg">
                                <p class="font-semibold text-red-800">⚠️ Exemple vulnérable (à ne jamais faire) :</p>
                                <code class="block bg-gray-800 text-green-300 p-2 rounded mt-2 text-sm overflow-x-auto">"SELECT * FROM users WHERE login = '" + userInput + "' AND password = '" + pwd + "'"</code>
                                <p class="mt-2 text-sm">Si l'utilisateur tape <span class="bg-gray-200 px-1 font-mono">' OR '1'='1</span> → contourne l'authentification !</p>
                            </div>
                            <div class="bg-green-50 border-l-4 border-green-600 p-4 rounded-lg">
                                <p class="font-semibold text-green-800">🛡️ Solution : requêtes paramétrées (prepared statements)</p>
                                <code class="block bg-gray-800 text-green-300 p-2 rounded mt-2 text-sm overflow-x-auto">$stmt = $pdo->prepare("SELECT * FROM users WHERE login = ? AND password = ?"); $stmt->execute([$login, $pwd]);</code>
                                <p class="mt-1 text-sm">Aucune interférence possible : les données ne sont jamais interprétées comme du SQL.</p>
                            </div>
                            <div class="bg-blue-50 p-3 rounded-lg text-sm">
                                💡 <strong>Astuce Cameroun</strong> : validez et échappez toujours les entrées utilisateur. Utilisez des ORM comme Eloquent ou Doctrine qui paramètrent automatiquement.
                            </div>
                        </div>
                    `
                },
                { // slide 3 - chiffrement des données sensibles
                    type: "content",
                    title: "🔒 Chiffrement des données : repos & transit",
                    content: `
                        <div class="space-y-5">
                            <div class="flex flex-col md:flex-row gap-4">
                                <div class="flex-1 bg-white rounded-xl border p-4 shadow-sm">
                                    <h3 class="text-lg font-semibold flex items-center gap-2">📀 Chiffrement au repos</h3>
                                    <p class="text-gray-600 mt-1">Protège les fichiers de la base de données si le disque est volé.</p>
                                    <ul class="list-disc list-inside mt-2 text-sm space-y-1">
                                        <li>TDE (Transparent Data Encryption) : MySQL, PostgreSQL, SQL Server</li>
                                        <li>Chiffrement colonne : AES_ENCRYPT() / pgcrypto</li>
                                        <li>Exemple : <code class="bg-gray-100 px-1 rounded">UPDATE users SET ssn = AES_ENCRYPT('numéro', 'clé_secrète');</code></li>
                                    </ul>
                                </div>
                                <div class="flex-1 bg-white rounded-xl border p-4 shadow-sm">
                                    <h3 class="text-lg font-semibold flex items-center gap-2">🌐 Chiffrement en transit</h3>
                                    <p class="text-gray-600 mt-1">Entre l'application et le serveur BD.</p>
                                    <ul class="list-disc list-inside mt-2 text-sm space-y-1">
                                        <li>Utiliser TLS/SSL (certificats)</li>
                                        <li>MySQL : <span class="font-mono text-xs">REQUIRE SSL</span> sur les utilisateurs</li>
                                        <li>PostgreSQL : <span class="font-mono text-xs">sslmode=require</span></li>
                                        <li>Connexion SSH tunnel sécurisé</li>
                                    </ul>
                                </div>
                            </div>
                            <div class="bg-amber-50 p-3 rounded-lg text-amber-800 text-sm">
                                <span class="font-bold">🗝️ Leçon clé :</span> Ne stockez jamais les mots de passe en clair ! Utilisez <strong>bcrypt, Argon2</strong> (hachage salé). Le chiffrement est réversible, le hachage pour les mots de passe.
                            </div>
                            <!-- petit dessin simple avec css inline representation chiffrement -->
                            <div class="bg-gray-100 p-3 rounded-lg text-center text-gray-700 font-mono text-sm border border-gray-300">
                                🔑 Donnée claire → [🔒 Chiffrement] → Donnée chiffrée (stockage) → [🔓 Déchiffrement] → Donnée lisible
                            </div>
                        </div>
                    `
                },
                { // slide 4 - Pare-feu et accès réseau + moindre privilège
                    type: "content",
                    title: "🔥 Pare-feu & contrôle d'accès réseau",
                    content: `
                        <div class="space-y-4">
                            <p>Une base de données ne doit pas être exposée directement sur Internet. Voici les bonnes pratiques :</p>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div class="bg-slate-50 p-3 rounded-lg border">
                                    <div class="font-bold text-blue-800">🛡️ Pare-feu réseau</div>
                                    <ul class="text-sm mt-1 list-disc pl-5">
                                        <li>Autoriser uniquement les IPs des serveurs applicatifs.</li>
                                        <li>Exemple avec UFW : <code class="text-xs">ufw allow from 192.168.1.100 to any port 3306</code></li>
                                        <li>Sur le cloud : Security Groups AWS / Firewall rules GCP.</li>
                                    </ul>
                                </div>
                                <div class="bg-slate-50 p-3 rounded-lg border">
                                    <div class="font-bold text-blue-800">👥 Principe du moindre privilège</div>
                                    <ul class="text-sm mt-1 list-disc pl-5">
                                        <li>Créer des utilisateurs avec le minimum de droits (SELECT seulement si besoin).</li>
                                        <li>Exemple : <code class="text-xs">GRANT SELECT, INSERT ON app_db.* TO 'app_user'@'%';</code></li>
                                        <li>Éviter 'root' dans les applications.</li>
                                    </ul>
                                </div>
                            </div>
                            <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-200">
                                <p class="font-semibold">⚙️ Bonne pratique au Cameroun :</p>
                                <p class="text-sm">Pour les projets web, hébergez la base de données sur un réseau privé (VPC) ou en localhost. Utilisez des VPN pour accès admin. Interdisez les connexions externes directes sur le port par défaut (3306, 5432).</p>
                            </div>
                            <!-- schéma simple dessin ascii-friendly -->
                            <div class="border rounded-xl bg-white p-3 flex flex-wrap justify-center items-center gap-2 text-sm">
                                <span class="bg-gray-200 p-2 rounded">🌍 Internet</span> 
                                <span>→</span> 
                                <span class="bg-red-200 p-2 rounded">🔥 Pare-feu</span> 
                                <span>→</span> 
                                <span class="bg-green-200 p-2 rounded">✔️ Serveur Web (autorisé)</span> 
                                <span>→</span> 
                                <span class="bg-blue-200 p-2 rounded">🗄️ Base de données</span>
                            </div>
                        </div>
                    `
                },
                { // slide 5 - récap + bonnes pratiques / quizz simple
                    type: "recap",
                    title: "📌 Récapitulatif & Bonnes pratiques essentielles",
                    content: `
                        <div class="grid gap-4">
                            <div class="bg-white rounded-xl p-4 shadow border">
                                <h3 class="font-bold text-lg flex gap-2">🧠 3 piliers de la sécurité BD</h3>
                                <ul class="mt-2 space-y-2">
                                    <li class="flex items-start gap-2"><span class="text-blue-600">1️⃣</span> <strong>Injections SQL</strong> → Requêtes paramétrées, ORM, validation stricte.</li>
                                    <li class="flex items-start gap-2"><span class="text-blue-600">2️⃣</span> <strong>Chiffrement</strong> → Données sensibles chiffrées au repos (AES) et transit (TLS).</li>
                                    <li class="flex items-start gap-2"><span class="text-blue-600">3️⃣</span> <strong>Contrôle d'accès</strong> → Pare-feu + privilèges minimaux + utilisateurs dédiés.</li>
                                </ul>
                            </div>
                            <div class="bg-teal-50 rounded-xl p-4">
                                <p class="font-semibold">🧪 Mini Quiz (pour tester ta compréhension) :</p>
                                <div class="mt-2 text-sm space-y-2">
                                    <div><span class="font-mono">1.</span> Quelle est la meilleure défense contre l'injection SQL ? <br> 
                                    <span class="italic">Réponse : </span> <span class="bg-white px-2 rounded">Requêtes paramétrées / Prepared statements</span></div>
                                    <div><span class="font-mono">2.</span> Quel algorithme recommande-t-on pour hacher un mot de passe ? <br> 
                                    <span class="italic">Réponse : </span> <span class="bg-white px-2 rounded">bcrypt ou Argon2</span></div>
                                    <div><span class="font-mono">3.</span> Vrai/Faux : Le pare-feu doit autoriser tout le trafic entrant sur le port 3306 depuis n'importe quelle IP. <br> 
                                    <span class="italic">Réponse : </span> <span class="bg-white px-2 rounded">Faux → restreindre aux IPs de confiance.</span></div>
                                </div>
                            </div>
                            <div class="text-center text-sm text-gray-500 mt-2">
                                🔐 "La sécurité n'est pas un produit, c'est un processus continu." — Protégez vos données, protégez vos utilisateurs.
                            </div>
                        </div>
                    `
                }
            ];

            let currentSlide = 0;
            const totalSlides = slidesData.length;

            // Fonction pour rendre les slides dans le container avec animation simple
            function renderSlide(index) {
                const data = slidesData[index];
                let html = '';
                if (data.type === 'title') {
                    html = `
                        <div class="slide-card bg-gradient-to-br from-blue-50 to-indigo-50 rounded-3xl shadow-xl overflow-hidden border border-blue-100">
                            <div class="slide-content p-6 md:p-10 text-center">
                                <div class="text-7xl mb-4">${data.icon || '📚'}</div>
                                <h1 class="text-3xl md:text-5xl font-extrabold text-gray-800 leading-tight">${data.title}</h1>
                                <p class="text-gray-600 text-lg md:text-xl mt-4 max-w-2xl mx-auto">${data.subtitle}</p>
                                <div class="mt-6 inline-block bg-white/60 backdrop-blur-sm px-4 py-2 rounded-full text-sm font-medium text-blue-700">${data.badge}</div>
                            </div>
                        </div>
                    `;
                } 
                else if (data.type === 'objectifs') {
                    html = `
                        <div class="slide-card bg-white rounded-3xl shadow-xl border border-gray-200">
                            <div class="slide-content p-6 md:p-8">
                                <h2 class="text-2xl md:text-3xl font-bold text-gray-800 border-l-5 border-blue-500 pl-4">${data.title}</h2>
                                <div class="mt-6 space-y-3">
                                    ${data.objectives.map(obj => `<div class="flex items-start gap-3 p-2 bg-gray-50 rounded-xl"><span class="text-green-600 text-xl">✓</span> <span class="text-gray-700">${obj}</span></div>`).join('')}
                                </div>
                                <div class="mt-8 text-center text-sm italic text-gray-400">🎓 À la fin de cette leçon, vous saurez sécuriser une base de données comme un professionnel.</div>
                            </div>
                        </div>
                    `;
                }
                else if (data.type === 'content') {
                    html = `
                        <div class="slide-card bg-white rounded-3xl shadow-xl border border-gray-200">
                            <div class="slide-content p-6 md:p-8">
                                <h2 class="text-2xl font-bold text-gray-800 border-b-2 border-blue-200 pb-2 inline-block mb-4">${data.title}</h2>
                                <div class="prose prose-blue max-w-none">
                                    ${data.content}
                                </div>
                            </div>
                        </div>
                    `;
                }
                else if (data.type === 'recap') {
                    html = `
                        <div class="slide-card bg-white rounded-3xl shadow-xl border border-gray-200">
                            <div class="slide-content p-6 md:p-8">
                                <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2">📘 ${data.title}</h2>
                                <div class="mt-4">
                                    ${data.content}
                                </div>
                            </div>
                        </div>
                    `;
                }

                $('#slidesContainer').fadeOut(120, function() {
                    $(this).html(html);
                    $(this).fadeIn(200);
                });
                
                // Mise à jour progression
                const progressPercent = ((index + 1) / totalSlides) * 100;
                $('.progress-bar').css('width', `${progressPercent}%`);
                $('#slideCounter').text(`Slide ${index+1} / ${totalSlides}`);
                
                // Mise à jour des dots
                $('.dot-nav').each(function(i) {
                    if (i === index) $(this).removeClass('bg-gray-300').addClass('bg-blue-600 w-3 h-3');
                    else $(this).removeClass('bg-blue-600 w-3 h-3').addClass('bg-gray-300 w-2.5 h-2.5');
                });
                
                // Gérer état boutons
                $('#prevBtn').prop('disabled', index === 0);
                $('#nextBtn').prop('disabled', index === totalSlides - 1);
            }

            // Navigation
            function nextSlide() {
                if (currentSlide < totalSlides - 1) {
                    currentSlide++;
                    renderSlide(currentSlide);
                }
            }
            function prevSlide() {
                if (currentSlide > 0) {
                    currentSlide--;
                    renderSlide(currentSlide);
                }
            }
            function goToSlide(idx) {
                if (idx >= 0 && idx < totalSlides) {
                    currentSlide = idx;
                    renderSlide(currentSlide);
                }
            }

            // Event handlers
            $('#nextBtn').on('click', nextSlide);
            $('#prevBtn').on('click', prevSlide);
            $('.dot-nav').each(function(idx) {
                $(this).on('click', function() {
                    goToSlide(idx);
                });
            });
            
            // keyboard navigation (flèches)
            $(document).on('keydown', function(e) {
                if (e.key === 'ArrowRight') {
                    nextSlide();
                    e.preventDefault();
                } else if (e.key === 'ArrowLeft') {
                    prevSlide();
                    e.preventDefault();
                }
            });
            
            // Initialisation premier slide
            renderSlide(0);
        });
    </script>
</body>
</html>
