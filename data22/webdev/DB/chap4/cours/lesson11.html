<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 11 : Filtrage avancé avec SQL | Cours Base de données</title>
    <!-- Tailwind CSS + Font Awesome (pour icones subtiles) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (pour formules mathématiques si besoin) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* Styles supplémentaires pour lisibilité et slides */
        body {
            background: #f4f7fc;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        .slide-container {
            max-width: 1200px;
            margin: 1rem auto;
            transition: all 0.2s ease;
        }
        .slide-card {
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
            overflow: hidden;
        }
        .nav-btn {
            transition: all 0.2s;
            background-color: #eef2ff;
            color: #1e3a8a;
            border-radius: 3rem;
            padding: 0.6rem 1.2rem;
            font-weight: 500;
        }
        .nav-btn:hover:not(:disabled) {
            background-color: #cbd5e1;
            transform: scale(0.97);
        }
        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .progress-bar {
            height: 6px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #2563eb;
            transition: width 0.3s ease;
        }
        .objective-badge {
            background: #eef2ff;
            color: #1e40af;
            border-radius: 2rem;
            padding: 0.25rem 1rem;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .sql-code {
            background: #0f172a;
            color: #e2e8f0;
            padding: 1rem;
            border-radius: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            overflow-x: auto;
            white-space: pre-wrap;
        }
        .keyword {
            color: #facc15;
        }
        .string {
            color: #86efac;
        }
        @media (max-width: 640px) {
            .slide-card {
                border-radius: 1.5rem;
            }
            .nav-btn {
                padding: 0.4rem 0.9rem;
                font-size: 0.8rem;
            }
            h1 {
                font-size: 1.6rem;
            }
            h2 {
                font-size: 1.3rem;
            }
        }
        .table-example {
            overflow-x: auto;
        }
        table {
            min-width: 300px;
        }
    </style>
</head>
<body class="antialiased">

<div class="slide-container px-4 py-6 md:py-8">
    <div class="slide-card">
        <!-- En-tête avec progression et compteur -->
        <div class="bg-gradient-to-r from-blue-700 to-indigo-800 text-white px-5 py-4 md:px-8 flex justify-between items-center flex-wrap gap-2">
            <div>
                <span class="text-sm font-semibold bg-white/20 px-3 py-1 rounded-full">Initiation aux Bases de données</span>
                <h1 class="text-xl md:text-2xl font-bold mt-1">Leçon 11 : Filtrage avancé avec SQL</h1>
            </div>
            <div class="text-right">
                <span id="slideCounter" class="bg-black/30 px-3 py-1 rounded-full text-sm">Slide 1 / ?</span>
            </div>
        </div>

        <!-- Zone de contenu dynamique (slides) -->
        <div id="slidesContainer" class="p-5 md:p-8">
            <!-- Les slides seront injectées ici via jQuery -->
        </div>

        <!-- Barre de progression et boutons navigation -->
        <div class="px-5 md:px-8 pb-2">
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
        </div>
        <div class="flex justify-between items-center px-5 md:px-8 py-5 border-t border-gray-100 bg-gray-50">
            <button id="prevBtn" class="nav-btn flex items-center gap-1"><span>←</span> Précédent</button>
            <span id="pageIndicator" class="text-sm text-gray-600 font-medium">Étape 1/??</span>
            <button id="nextBtn" class="nav-btn flex items-center gap-1">Suivant <span>→</span></button>
        </div>
    </div>
    <p class="text-center text-xs text-gray-500 mt-6">📘 Cours Cameroun • Comprendre les opérateurs de filtrage SQL • Diaporama interactif</p>
</div>

<script>
    // Définition des slides pour la leçon 11 (objectifs de la lesson11 du programme JSON)
    // D'après le fichier JSON, lesson11 correspond aux objectifs:
    // - Utiliser les opérateurs de comparaison (=, <>, <, >, <=, >=)
    // - Combiner avec AND, OR, NOT
    // - Utiliser IN, BETWEEN, LIKE, IS NULL
    const slides = [
        { // slide 0 : Titre principal
            type: "title",
            title: "🔍 Filtrage avancé dans les requêtes SQL",
            subtitle: "Opérateurs de comparaison, conditions logiques, IN, BETWEEN, LIKE et valeurs NULL",
            desc: "Module : Initiation aux Bases de données | Classe: Développement Web",
            icon: "🎯"
        },
        { // slide 1 : Objectifs pédagogiques
            type: "objectives",
            title: "📌 Objectifs de la leçon",
            objectives: [
                "Maîtriser les opérateurs de comparaison (=, <>, <, >, <=, >=) pour filtrer les données",
                "Combiner plusieurs conditions avec AND, OR, NOT",
                "Utiliser les opérateurs IN, BETWEEN, LIKE et la gestion des NULL (IS NULL / IS NOT NULL)"
            ]
        },
        { // slide 2 : Opérateurs de comparaison
            type: "content",
            title: "⚖️ Les opérateurs de comparaison",
            content: `
                <p class="mb-3">Ils servent à comparer une valeur avec une autre dans la clause <span class="font-mono bg-gray-100 px-1 rounded">WHERE</span>. Les plus courants :</p>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-4">
                    <div class="bg-blue-50 p-3 rounded-xl"><code class="font-bold">=</code> Égalité</div>
                    <div class="bg-blue-50 p-3 rounded-xl"><code class="font-bold"><></code> ou <code class="font-bold">!=</code> Différent</div>
                    <div class="bg-blue-50 p-3 rounded-xl"><code class="font-bold"><</code> Plus petit que</div>
                    <div class="bg-blue-50 p-3 rounded-xl"><code class="font-bold">></code> Plus grand que</div>
                    <div class="bg-blue-50 p-3 rounded-xl"><code class="font-bold"><=</code> Inférieur ou égal</div>
                    <div class="bg-blue-50 p-3 rounded-xl"><code class="font-bold">>=</code> Supérieur ou égal</div>
                </div>
                <div class="sql-code">
                    -- Exemple : Sélectionner les étudiants ayant un âge supérieur ou égal à 18 ans<br>
                    SELECT nom, age FROM etudiants WHERE age >= 18;<br><br>
                    -- Sélectionner les produits dont le prix est différent de 0<br>
                    SELECT * FROM produits WHERE prix <> 0;
                </div>
                <p class="text-sm text-gray-600 mt-3">💡 Astuce : <code class="bg-gray-100 px-1 rounded">=</code> compare exactement, attention aux chaînes de caractères (sensibles à la casse selon SGBD).</p>
            `
        },
        { // slide 3 : AND, OR, NOT
            type: "content",
            title: "🧩 Combiner conditions : AND, OR, NOT",
            content: `
                <p class="mb-2">On peut lier plusieurs conditions avec des opérateurs logiques :</p>
                <ul class="list-disc list-inside space-y-1 mb-4 bg-gray-50 p-4 rounded-xl">
                    <li><strong class="text-blue-700">AND</strong> → toutes les conditions doivent être vraies.</li>
                    <li><strong class="text-blue-700">OR</strong> → au moins une condition vraie.</li>
                    <li><strong class="text-blue-700">NOT</strong> → inverse une condition.</li>
                </ul>
                <div class="sql-code">
                    -- Étudiants de plus de 20 ans ET habitant "Douala"<br>
                    SELECT * FROM etudiants WHERE age > 20 AND ville = 'Douala';<br><br>
                    -- Clients qui habitent "Yaoundé" OU "Garoua"<br>
                    SELECT nom FROM clients WHERE ville = 'Yaoundé' OR ville = 'Garoua';<br><br>
                    -- Produits qui ne sont pas en rupture (stock > 0)<br>
                    SELECT * FROM produits WHERE NOT stock = 0;
                </div>
                <div class="mt-3 p-3 bg-amber-50 border-l-4 border-amber-400 rounded">
                    ⚠️ Ordre des évaluations : <code class="font-mono">NOT</code> puis <code class="font-mono">AND</code> puis <code class="font-mono">OR</code>. Utilisez des parenthèses pour clarifier.
                </div>
            `
        },
        { // slide 4 : Opérateur IN
            type: "content",
            title: "🎯 L'opérateur IN",
            content: `
                <p><code class="bg-gray-200 px-1 rounded font-mono">IN</code> permet de tester si une valeur appartient à une liste de valeurs possibles. Plus élégant qu’une série de OR.</p>
                <div class="sql-code my-4">
                    -- Sélectionner les commandes dont le statut est 'payée', 'expédiée' ou 'livrée'<br>
                    SELECT * FROM commandes WHERE statut IN ('payée', 'expédiée', 'livrée');<br><br>
                    -- Equivalent avec OR: WHERE statut = 'payée' OR statut = 'expédiée' OR statut = 'livrée';<br><br>
                    -- Peut aussi utiliser une sous-requête<br>
                    SELECT nom FROM employes WHERE id_departement IN (SELECT id FROM departements WHERE region = 'Centre');
                </div>
                <p class="text-sm">✅ Utile pour filtrer sur plusieurs valeurs discrètes. Combine avec NOT : <code class="bg-gray-100 px-1 rounded">NOT IN</code> exclut la liste.</p>
            `
        },
        { // slide 5 : Opérateur BETWEEN
            type: "content",
            title: "📊 BETWEEN : intervalles de valeurs",
            content: `
                <p><code class="bg-gray-200 px-1 rounded font-mono">BETWEEN</code> sélectionne les valeurs comprises dans un intervalle (bornes incluses). Idéal pour les dates ou les nombres.</p>
                <div class="sql-code my-4">
                    -- Employés dont le salaire est entre 200000 et 500000 FCFA<br>
                    SELECT nom, prenom, salaire FROM employes WHERE salaire BETWEEN 200000 AND 500000;<br><br>
                    -- Commandes passées en janvier 2025<br>
                    SELECT * FROM commandes WHERE date_commande BETWEEN '2025-01-01' AND '2025-01-31';<br><br>
                    -- Equivalent : salaire >= 200000 AND salaire <= 500000
                </div>
                <div class="bg-green-50 p-3 rounded-lg">
                    🧠 <strong>Note:</strong> <code>BETWEEN</code> est inclusif. Pensez à NOT BETWEEN pour l’exclusion.
                </div>
            `
        },
        { // slide 6 : LIKE et motifs
            type: "content",
            title: "🧩 Filtrage textuel : LIKE & wildcards",
            content: `
                <p><code class="bg-gray-200 px-1 rounded font-mono">LIKE</code> permet de chercher des motifs dans une chaîne de caractères avec des jokers :</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 my-4">
                    <div class="border p-3 rounded-lg"><span class="font-mono font-bold">%</span> → n'importe quelle chaîne (0,1 ou plusieurs caractères)</div>
                    <div class="border p-3 rounded-lg"><span class="font-mono font-bold">_</span> → exactement un caractère (underscore)</div>
                </div>
                <div class="sql-code">
                    -- Noms commençant par "Kam" : Kamdem, Kamga ...<br>
                    SELECT * FROM eleves WHERE nom LIKE 'Kam%';<br><br>
                    -- Noms de 5 lettres qui se terminent par "i" : Eg : Mohamadi ? Non mais 'Nassi'<br>
                    SELECT * FROM eleves WHERE nom LIKE '____i';<br><br>
                    -- Emails contenant 'gmail'<br>
                    SELECT * FROM utilisateurs WHERE email LIKE '%gmail%';<br>
                    -- Éviter la casse ? selon SGBD, utiliser ILIKE (PostgreSQL) ou LOWER()
                </div>
                <p class="text-sm text-gray-600 mt-2">⭐ Combiner avec NOT LIKE pour exclure un motif.</p>
            `
        },
        { // slide 7 : Valeurs NULL
            type: "content",
            title: "❓ Gérer les NULL : IS NULL / IS NOT NULL",
            content: `
                <p>En SQL, <span class="font-mono bg-gray-200 px-1">NULL</span> signifie <strong>absence de valeur</strong> ou inconnu. On ne peut pas tester NULL avec <code>=</code> ou <code><></code>.</p>
                <div class="sql-code my-4">
                    -- Trouver les clients qui n'ont pas de numéro de téléphone renseigné<br>
                    SELECT nom, prenom FROM clients WHERE telephone IS NULL;<br><br>
                    -- Employés qui ont une date de départ (donc non null)<br>
                    SELECT * FROM employes WHERE date_depart IS NOT NULL;<br><br>
                    -- Attention : NULL = NULL renvoie NULL (pas TRUE), donc toujours utiliser IS NULL
                </div>
                <div class="bg-yellow-50 p-3 rounded-lg border-l-4 border-yellow-400">
                    ⚠️ Les fonctions d'agrégation ignorent généralement les NULL, mais les filtres WHERE classiques ne les incluent pas.
                </div>
            `
        },
        { // slide 8 : Synthèse et exemple combiné
            type: "content",
            title: "🎓 Exemple complet avec plusieurs filtres",
            content: `
                <p class="mb-2">Mettons en pratique : listons les commandes répondant à plusieurs critères.</p>
                <div class="sql-code">
                    -- Commandes avec montant total entre 50000 et 200000,<br>
                    -- statut 'validée' ou 'livrée',<br>
                    -- et dont la ville du client n'est pas NULL<br>
                    SELECT c.id, c.montant, cl.nom, cl.ville<br>
                    FROM commandes c<br>
                    JOIN clients cl ON c.client_id = cl.id<br>
                    WHERE c.montant BETWEEN 50000 AND 200000<br>
                      AND c.statut IN ('validée', 'livrée')<br>
                      AND cl.ville IS NOT NULL<br>
                      AND (cl.nom LIKE 'M%' OR cl.nom LIKE 'N%');<br>
                </div>
                <div class="mt-4 text-sm bg-indigo-50 p-3 rounded-xl">
                    💡 Conseil : toujours tester vos requêtes étape par étape. Utilisez les parenthèses pour grouper les conditions OR/AND.
                </div>
            `
        },
        { // slide 9 : Petit quiz / exercice pour auto-évaluation
            type: "quiz",
            title: "🧪 Vérifions votre compréhension",
            questions: [
                "Quel opérateur utilisez-vous pour chercher des noms qui commencent par 'A' et finissent par 'e' ?",
                "Comment écrire la condition : âge strictement supérieur à 25 ET (ville = 'Douala' OU ville = 'Bafoussam') ?",
                "Quel opérateur filtre les valeurs d’une plage inclusive ?",
                "La clause correcte pour vérifier qu'une colonne 'adresse' n’est pas nulle ?"
            ],
            answers: [
                "LIKE 'A%e'",
                "age > 25 AND (ville = 'Douala' OR ville = 'Bafoussam')",
                "BETWEEN",
                "adresse IS NOT NULL"
            ]
        },
        { // slide 10 : Résumé / Fin
            type: "end",
            title: "✨ Récapitulons",
            summaryPoints: [
                "Les opérateurs de comparaison filtrent lignes selon des conditions simples.",
                "AND, OR, NOT permettent d’articuler des conditions complexes.",
                "IN facilite l’appartenance à une liste, BETWEEN simplifie les intervalles.",
                "LIKE recherche des motifs avec % et _.",
                "NULL se teste avec IS NULL / IS NOT NULL (jamais avec =)."
            ],
            footer: "Prochaine leçon : ORDER BY et LIMIT | Continuez à pratiquer avec des jeux de données! 🚀"
        }
    ];

    let currentSlide = 0;
    const totalSlides = slides.length;

    // Fonction de rendu selon type de slide
    function renderSlide(index) {
        const slide = slides[index];
        let html = '';

        if (slide.type === 'title') {
            html = `
                <div class="text-center py-4 md:py-10">
                    <div class="text-6xl mb-4">${slide.icon || '📚'}</div>
                    <h2 class="text-3xl md:text-4xl font-extrabold text-gray-800">${slide.title}</h2>
                    <p class="text-xl text-gray-600 mt-3">${slide.subtitle}</p>
                    <div class="mt-6 bg-blue-50 inline-block px-6 py-2 rounded-full text-blue-800">${slide.desc}</div>
                </div>
            `;
        } 
        else if (slide.type === 'objectives') {
            html = `
                <div>
                    <div class="flex items-center gap-2 mb-5"><span class="text-2xl">🎯</span><h2 class="text-2xl font-bold text-gray-800">${slide.title}</h2></div>
                    <div class="space-y-4">
                        ${slide.objectives.map(obj => `
                            <div class="flex items-start gap-3 bg-white border border-gray-200 rounded-xl p-4 shadow-sm">
                                <span class="text-green-600 text-xl">✓</span>
                                <span class="text-gray-700 text-lg">${obj}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="mt-6 text-center text-sm text-gray-500">📖 À la fin de cette leçon, vous serez capable de filtrer comme un pro !</div>
                </div>
            `;
        }
        else if (slide.type === 'content') {
            html = `
                <div>
                    <h2 class="text-2xl font-bold text-gray-800 border-b-4 border-blue-500 inline-block pb-1 mb-5">${slide.title}</h2>
                    <div class="prose max-w-none">${slide.content}</div>
                </div>
            `;
        }
        else if (slide.type === 'quiz') {
            html = `
                <div>
                    <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2"><span>🧠</span> ${slide.title}</h2>
                    <div class="mt-4 space-y-5">
                        ${slide.questions.map((q, idx) => `
                            <div class="bg-gray-50 p-4 rounded-xl">
                                <p class="font-semibold text-gray-800 mb-2">${idx+1}. ${q}</p>
                                <div class="flex items-center gap-2">
                                    <input type="text" id="quizAns${idx}" placeholder="Votre réponse..." class="border border-gray-300 rounded-lg px-3 py-2 w-full md:w-2/3">
                                    <button class="revealAnsBtn bg-blue-600 text-white px-4 py-2 rounded-lg text-sm" data-idx="${idx}">Voir corrigé</button>
                                </div>
                                <p id="quizHint${idx}" class="text-green-700 mt-2 text-sm hidden italic"></p>
                            </div>
                        `).join('')}
                    </div>
                    <p class="text-xs text-gray-400 mt-5">💡 Cliquez sur "Voir corrigé" pour vérifier.</p>
                </div>
            `;
        }
        else if (slide.type === 'end') {
            html = `
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">${slide.title}</h2>
                    <div class="bg-gradient-to-r from-indigo-50 to-blue-50 p-5 rounded-2xl mt-5">
                        <ul class="space-y-3">
                            ${slide.summaryPoints.map(p => `<li class="flex gap-2 items-start"><span class="text-blue-600 text-xl">▹</span> <span>${p}</span></li>`).join('')}
                        </ul>
                    </div>
                    <div class="mt-7 p-4 text-center bg-gray-100 rounded-xl">
                        <p class="text-gray-700">${slide.footer}</p>
                    </div>
                </div>
            `;
        }

        $('#slidesContainer').html(html);
        $('#slideCounter').text(`Slide ${index+1} / ${totalSlides}`);
        const progressPercent = ((index+1)/totalSlides)*100;
        $('#progressFill').css('width', `${progressPercent}%`);
        $('#pageIndicator').text(`Étape ${index+1}/${totalSlides}`);

        // Gestion boutons navigation (disabled)
        if(index === 0) $('#prevBtn').prop('disabled', true);
        else $('#prevBtn').prop('disabled', false);
        
        if(index === totalSlides-1) $('#nextBtn').prop('disabled', true);
        else $('#nextBtn').prop('disabled', false);

        // Activer révélateur quiz si on est sur slide quiz
        if(slide.type === 'quiz') {
            $('.revealAnsBtn').off('click').on('click', function() {
                const idx = $(this).data('idx');
                const correctAnswer = slides[currentSlide].answers[idx];
                $(`#quizHint${idx}`).text(`✅ Corrigé : ${correctAnswer}`).removeClass('hidden').addClass('block');
            });
        } else {
            // nettoyer
        }
    }

    // Navigation
    function nextSlide() {
        if(currentSlide < totalSlides-1) {
            currentSlide++;
            renderSlide(currentSlide);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }
    function prevSlide() {
        if(currentSlide > 0) {
            currentSlide--;
            renderSlide(currentSlide);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    $(document).ready(function(){
        renderSlide(0);
        $('#nextBtn').on('click', nextSlide);
        $('#prevBtn').on('click', prevSlide);
        // Gestion clavier (flèches)
        $(document).keydown(function(e){
            if(e.key === 'ArrowRight') nextSlide();
            if(e.key === 'ArrowLeft') prevSlide();
        });
    });
</script>
</body>
</html>
