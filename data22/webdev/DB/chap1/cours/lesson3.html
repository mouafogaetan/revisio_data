<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Cours : Comprendre les SGBD - Initiation aux Bases de données</title>
    <!-- Tailwind CSS + Google Fonts pour une meilleure lisibilité -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (optionnel, pour formules si besoin) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <!-- Personnalisation légère pour adoucir l'expérience mobile et slides -->
    <style>
        /* transitions douces pour les slides */
        .slide-container {
            transition: opacity 0.25s ease-in-out;
        }
        .slide {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
        }
        /* boutons tactiles agrandis */
        .nav-btn {
            min-width: 44px;
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .nav-btn:active {
            transform: scale(0.96);
        }
        /* meilleure lisibilité des listes */
        .objective-list li, .content-list li {
            margin-bottom: 0.75rem;
            line-height: 1.4;
        }
        /* code friendly */
        pre {
            background: #f1f5f9;
            padding: 0.75rem;
            border-radius: 1rem;
            overflow-x: auto;
            font-size: 0.85rem;
            font-family: 'Courier New', monospace;
        }
        @media (max-width: 640px) {
            .slide {
                border-radius: 1.25rem;
            }
            h2 {
                font-size: 1.5rem;
            }
        }
        /* couleurs douces et accessibles : fond clair, tons bleu-vert pour accents */
        body {
            background: #f8fafc;
        }
        .badge-chapter {
            background-color: #e0f2fe;
            color: #0369a1;
        }
        .progress-bar {
            background: #e2e8f0;
            border-radius: 999px;
            height: 6px;
        }
        .progress-fill {
            background: #2c7da0;
            border-radius: 999px;
            height: 6px;
            width: 0%;
            transition: width 0.2s ease;
        }
    </style>
</head>
<body class="font-sans antialiased">

    <div class="max-w-4xl mx-auto px-4 py-6 md:py-10">
        <!-- En-tête de la matière avec infos claires -->
        <div class="mb-5 flex flex-wrap justify-between items-center gap-2">
            <div>
                <span class="text-xs uppercase tracking-wide text-sky-700 font-semibold bg-sky-100 px-3 py-1 rounded-full">Classe : Développement Web</span>
                <h1 class="text-xl md:text-2xl font-bold text-slate-800 mt-2">Initiation aux Bases de données</h1>
            </div>
            <div class="badge-chapter px-3 py-1 rounded-full text-sm font-medium shadow-sm">
                Leçon 3 / 36
            </div>
        </div>

        <!-- Conteneur principal slide -->
        <div class="slide-container relative">
            <!-- Slide courant (injecté dynamiquement) -->
            <div id="currentSlide" class="slide p-5 md:p-8 bg-white border border-slate-200">
                <!-- le contenu sera chargé ici -->
                <div class="flex justify-center items-center h-64">
                    <div class="animate-pulse text-slate-400">Chargement de la leçon...</div>
                </div>
            </div>

            <!-- Indicateur de progression et navigation -->
            <div class="mt-6 flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4">
                <div class="flex-1">
                    <div class="progress-bar w-full">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                    <div class="flex justify-between text-xs text-slate-500 mt-1">
                        <span>Diapositive <span id="slideCounter">1</span> / <span id="totalSlides"></span></span>
                        <span id="slideTitleIndicator">Introduction</span>
                    </div>
                </div>
                <div class="flex gap-3 justify-center sm:justify-end">
                    <button id="prevBtn" class="nav-btn bg-white border border-slate-300 text-slate-700 rounded-full px-5 py-2 shadow-sm hover:bg-slate-50 disabled:opacity-40 transition" disabled>◀ Précédent</button>
                    <button id="nextBtn" class="nav-btn bg-sky-600 text-white rounded-full px-5 py-2 shadow-md hover:bg-sky-700 transition">Suivant ▶</button>
                </div>
            </div>
        </div>

        <!-- Pied de page informatif -->
        <div class="mt-8 text-center text-xs text-slate-400 border-t border-slate-200 pt-5">
            📘 Cours conçu pour les étudiants camerounais - Module SGBD | Approche simple et pratique
        </div>
    </div>

    <script>
        // ***********************************************************
        // DONNÉES DE LA LEÇON 3 (lesson3) : Définir un SGBD, ses fonctions, principaux SGBD, architecture
        // Contenu structuré en 3 slides après le titre + objectifs 
        // Slide 1 : Titre de la leçon + contexte
        // Slide 2 : Objectifs pédagogiques (repris depuis lesson3 objectifs)
        // Slides 3, 4, 5 (contenu détaillé)
        // ***********************************************************

        // Définition de la leçon (lesson3)
        const lessonData = {
            id: "lesson3",
            title: "Systèmes de Gestion de Base de Données (SGBD)",
            chapter: "Chapitre 1 - Concepts fondamentaux",
            objectives: [
                "Définir un SGBD et ses fonctions (définition, manipulation, contrôle).",
                "Découvrir les principaux SGBD (MySQL, PostgreSQL, MongoDB, SQLite, Oracle).",
                "Comprendre l'architecture client-serveur et embarquée."
            ],
            // Contenu des slides supplémentaires (3 slides de fond)
            contentSlides: [
                {
                    titre: "🔧 Qu'est-ce qu'un SGBD ?",
                    contenu: `
                        <p class="mb-4 text-slate-700">Un <strong class="text-sky-700">SGBD (Système de Gestion de Base de Données)</strong> est un logiciel qui permet de <strong>créer, manipuler et administrer</strong> une base de données. Il sert d'interface entre les utilisateurs (ou applications) et les données stockées.</p>
                        <div class="bg-slate-50 p-4 rounded-xl border-l-4 border-sky-500 mb-4">
                            <h3 class="font-bold text-slate-800 mb-2">🔍 Les 3 grandes fonctions d’un SGBD :</h3>
                            <ul class="list-disc pl-5 space-y-2 text-slate-700">
                                <li><span class="font-semibold">Définition (DDL) :</span> Création et modification de la structure (tables, index, vues).</li>
                                <li><span class="font-semibold">Manipulation (DML) :</span> Ajout, modification, suppression, interrogation des données (ex: SQL).</li>
                                <li><span class="font-semibold">Contrôle :</span> Gestion des droits d’accès, sécurité, intégrité des données et transactions.</li>
                            </ul>
                        </div>
                        <p class="text-slate-600">💡 <strong>Exemple concret :</strong> Dans une application de billetterie, le SGBD gère les réservations, empêche deux personnes d’acheter le même siège, et sauvegarde les données.</p>
                    `
                },
                {
                    titre: "📦 Principaux SGBD du marché",
                    contenu: `
                        <p class="mb-3 text-slate-700">Il existe plusieurs SGBD, chacun avec ses forces. Voici les plus connus :</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mt-3">
                            <div class="bg-cyan-50 p-3 rounded-lg"><span class="font-bold text-cyan-800">MySQL</span><br>Très populaire pour le web (WordPress, Laravel). Open source.</div>
                            <div class="bg-cyan-50 p-3 rounded-lg"><span class="font-bold text-cyan-800">PostgreSQL</span><br>Avancé, respect des standards SQL, idéal pour applications complexes.</div>
                            <div class="bg-cyan-50 p-3 rounded-lg"><span class="font-bold text-cyan-800">SQLite</span><br>Léger, embarqué (smartphones, navigateurs). Aucun serveur séparé.</div>
                            <div class="bg-cyan-50 p-3 rounded-lg"><span class="font-bold text-cyan-800">MongoDB</span><br>NoSQL orienté documents, flexible pour données non structurées.</div>
                            <div class="bg-cyan-50 p-3 rounded-lg"><span class="font-bold text-cyan-800">Oracle Database</span><br>Puissant, utilisé par les grandes entreprises (haute disponibilité).</div>
                        </div>
                        <div class="mt-5 p-3 bg-amber-50 rounded-lg text-amber-800 text-sm">
                            ⭐ <strong>À retenir :</strong> Choisir un SGBD dépend du projet : petite app → SQLite, site web → MySQL ou PostgreSQL, big data → MongoDB.
                        </div>
                    `
                },
                {
                    titre: "🏛️ Architecture : Client-Serveur vs Embarqué",
                    contenu: `
                        <p class="mb-3 text-slate-700">Les SGBD fonctionnent selon deux architectures principales :</p>
                        <div class="space-y-5">
                            <div>
                                <h3 class="font-bold text-indigo-800 text-lg">🌐 Architecture Client-Serveur</h3>
                                <p>Un serveur central héberge la base de données. Les clients (applications, sites web) s’y connectent via un réseau. Exemples : MySQL, PostgreSQL, Oracle.</p>
                                <div class="bg-slate-100 p-3 rounded-lg mt-2 text-center">
                                    <span class="font-mono text-sm">[Application] ⇄ [SGBD Serveur] ⇄ [Base de données]</span>
                                </div>
                                <p class="text-sm text-slate-500 mt-1">✔️ Avantages : centralisation, gestion des accès, haute capacité.</p>
                            </div>
                            <div>
                                <h3 class="font-bold text-indigo-800 text-lg">📁 Architecture Embarquée</h3>
                                <p>Le SGBD est intégré directement à l’application. Pas de serveur séparé, la base est un simple fichier. Exemple : SQLite.</p>
                                <div class="bg-slate-100 p-3 rounded-lg mt-2 text-center">
                                    <span class="font-mono text-sm">[Application + SGBD] → base de données (fichier .db)</span>
                                </div>
                                <p class="text-sm text-slate-500 mt-1">✔️ Avantages : léger, sans configuration réseau, parfait pour mobile ou desktop.</p>
                            </div>
                        </div>
                        <div class="mt-4 p-2 border-t border-slate-200 text-slate-600 italic">
                            💬 Imaginez: Client-serveur = cantine centrale de l’école (tout le monde vient y manger). Embarqué = chacun a son propre lunchbox.
                        </div>
                    `
                }
            ]
        };

        // Construction des slides :
        // Slide 0 : Slide de titre (présentation leçon)
        // Slide 1 : Objectifs pédagogiques
        // Slides 2 à 4 : les 3 contentSlides (0,1,2)
        let slides = [];

        // Slide titre
        slides.push({
            type: "title",
            html: `
                <div class="text-center py-4 md:py-8">
                    <div class="inline-block p-3 bg-sky-100 rounded-full mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-sky-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 7v10c0 2.21 1.79 4 4 4h8c2.21 0 4-1.79 4-4V7c0-2.21-1.79-4-4-4H8c-2.21 0-4 1.79-4 4zm8 14V9m0 0L9 12m3-3l3 3" /></svg>
                    </div>
                    <h2 class="text-3xl md:text-4xl font-extrabold text-slate-800 mb-3">${lessonData.title}</h2>
                    <p class="text-sky-600 font-medium text-lg">${lessonData.chapter}</p>
                    <div class="mt-6 h-1 w-20 bg-sky-300 mx-auto rounded-full"></div>
                    <p class="text-slate-500 mt-6 max-w-md mx-auto">Bienvenue dans le monde des Systèmes de gestion de bases de données !</p>
                </div>
            `
        });
        // Slide Objectifs
        let objList = '';
        lessonData.objectives.forEach((obj, idx) => {
            objList += `<li class="flex items-start gap-3 mb-4"><span class="text-sky-600 font-bold text-xl">${idx+1}.</span><span class="text-slate-700">${obj}</span></li>`;
        });
        slides.push({
            type: "objectives",
            html: `
                <div>
                    <div class="flex items-center gap-2 mb-6 border-b border-slate-200 pb-3">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                        <h3 class="text-2xl font-bold text-slate-800">🎯 Objectifs de la leçon</h3>
                    </div>
                    <ul class="objective-list space-y-1">
                        ${objList}
                    </ul>
                    <div class="mt-8 bg-indigo-50 p-4 rounded-xl text-indigo-800">
                        💡 À la fin de ce cours, vous saurez expliquer ce qu’est un SGBD, citer des exemples et comprendre comment les bases communiquent avec les applications.
                    </div>
                </div>
            `
        });
        // Ajout des slides de contenu
        lessonData.contentSlides.forEach((cs, i) => {
            slides.push({
                type: "content",
                html: `
                    <div>
                        <h3 class="text-2xl font-bold text-slate-800 mb-4 flex items-center gap-2">
                            <span class="bg-sky-100 text-sky-700 w-8 h-8 rounded-full inline-flex items-center justify-center text-sm">${i+1}</span>
                            ${cs.titre}
                        </h3>
                        <div class="content-list text-slate-700 leading-relaxed">
                            ${cs.contenu}
                        </div>
                        <div class="mt-6 text-xs text-slate-400 border-t pt-3 text-right">
                            <span>✨ Module SGBD - ${lessonData.title}</span>
                        </div>
                    </div>
                `
            });
        });

        // Variables pour la navigation
        let currentIndex = 0;
        const total = slides.length;

        // Mise à jour affichage slide + progression
        function renderSlide(index) {
            const slideHtml = slides[index].html;
            $('#currentSlide').html(slideHtml);
            // Mise à jour compteur et progression
            $('#slideCounter').text(index+1);
            $('#totalSlides').text(total);
            // calcul progression
            const percent = ((index+1) / total) * 100;
            $('#progressFill').css('width', `${percent}%`);
            // Mettre à jour indicateur titre succinct
            let titleShort = '';
            if(index === 0) titleShort = 'Titre';
            else if(index === 1) titleShort = 'Objectifs';
            else titleShort = lessonData.contentSlides[index-2]?.titre.substring(0, 30) || 'Contenu';
            $('#slideTitleIndicator').text(titleShort);
            
            // Gestion désactivation boutons
            $('#prevBtn').prop('disabled', index === 0);
            $('#nextBtn').prop('disabled', index === total-1);
            if(index === total-1) {
                $('#nextBtn').text('✅ Terminé');
            } else {
                $('#nextBtn').text('Suivant ▶');
            }
            // Scroll en haut pour meilleur confort mobile
            window.scrollTo({ top: 0, behavior: 'smooth' });
            // Re-MathJax si nécessaire (détection formules mais il n'y en a pas mais on prévient)
            if(window.MathJax) {
                MathJax.typesetPromise ? MathJax.typesetPromise() : MathJax.typeset();
            }
        }

        // Gestion événements
        $('#prevBtn').on('click', function() {
            if(currentIndex > 0) {
                currentIndex--;
                renderSlide(currentIndex);
            }
        });
        $('#nextBtn').on('click', function() {
            if(currentIndex < total-1) {
                currentIndex++;
                renderSlide(currentIndex);
            } else if(currentIndex === total-1) {
                // message de fin (optionnel)
                if(confirm("🎉 Félicitations ! Vous avez terminé cette leçon. Voulez-vous revoir les objectifs ?")) {
                    currentIndex = 1; // ramène aux objectifs
                    renderSlide(currentIndex);
                }
            }
        });
        
        // Swipe tactile simple pour mobile (optionnel avec jquery)
        let touchStartX = 0;
        let touchEndX = 0;
        $(document).on('touchstart', '.slide-container', function(e) {
            touchStartX = e.originalEvent.touches[0].clientX;
        });
        $(document).on('touchend', '.slide-container', function(e) {
            touchEndX = e.originalEvent.changedTouches[0].clientX;
            const diff = touchStartX - touchEndX;
            if(Math.abs(diff) > 70) {
                if(diff > 0 && currentIndex < total-1) {
                    currentIndex++;
                    renderSlide(currentIndex);
                } else if(diff < 0 && currentIndex > 0) {
                    currentIndex--;
                    renderSlide(currentIndex);
                }
            }
        });
        
        // dessin d'un schéma simplifié pour illustrer client-serveur (dans le slide 4 de contenu? déja du texte)
        // mais on peut insérer un petit dessin en SVG si nécessaire pour le slide "architecture". On va modifier le 3eme slide de contenu (index 4)
        // pour améliorer l’aspect visuel avec un petit dessin maison (svg) directement dans le slide dédié
        // On enrichit le slide 4 (slides[4]) qui correspond à l'architecture (contentSlides index 2)
        // On va injecter un mini schéma svg sans remplacer l'existant mais améliorer.
        // Cette approche dynamique après le chargement :
        function injectCustomSVG() {
            // Sélectionner le dernier slide de contenu (index 4) si présent
            const archSlide = $('.slide .content-list').filter(function() {
                return $(this).find('div:contains("Architecture : Client-Serveur vs Embarqué")').length > 0 || $(this).closest('.slide').find('h3:contains("Architecture")').length > 0;
            });
            if(archSlide.length) {
                // éviter de dupliquer
                if(archSlide.find('.custom-schema').length === 0) {
                    const svgSchema = `
                        <div class="custom-schema mt-5 bg-white border border-slate-200 rounded-xl p-3 text-center">
                            <p class="font-semibold text-slate-600 mb-2">🔁 Schéma simplifié Client-Serveur</p>
                            <svg viewBox="0 0 300 110" xmlns="http://www.w3.org/2000/svg" class="w-full max-w-xs mx-auto">
                                <rect x="10" y="20" width="60" height="40" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" rx="6" />
                                <text x="40" y="44" font-size="8" text-anchor="middle" fill="#1e40af">Client</text>
                                <path d="M80 40 L120 40" stroke="#2563eb" stroke-width="2" stroke-dasharray="4" />
                                <polygon points="118,36 128,40 118,44" fill="#2563eb" />
                                <rect x="130" y="15" width="80" height="50" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" rx="6" />
                                <text x="170" y="35" font-size="8" text-anchor="middle" fill="#166534">SGBD</text>
                                <text x="170" y="48" font-size="7" text-anchor="middle" fill="#166534">(Serveur)</text>
                                <path d="M220 40 L260 40" stroke="#16a34a" stroke-width="2" />
                                <polygon points="258,36 268,40 258,44" fill="#16a34a" />
                                <rect x="270" y="20" width="30" height="40" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" rx="6" />
                                <text x="285" y="44" font-size="7" text-anchor="middle" fill="#92400e">BDD</text>
                            </svg>
                            <p class="text-xs text-slate-500 mt-2">✔️ Requête → SGBD → données → réponse</p>
                        </div>
                    `;
                    archSlide.append(svgSchema);
                }
            }
        }
        
        // Après chaque rendu, si c'est le slide d'architecture (qui contient le texte spécifique), on injecte le schéma.
        // On améliore la fonction renderSlide pour exécuter après affichage
        const originalRender = renderSlide;
        window.renderSlide = function(index) {
            originalRender(index);
            setTimeout(() => {
                // Vérifier si le slide courant contient le titre "Architecture" (le 3e contenu)
                const slideHtmlElem = document.getElementById('currentSlide');
                if(slideHtmlElem && (slideHtmlElem.innerText.includes('Architecture : Client-Serveur') || slideHtmlElem.innerText.includes('Architecture client-serveur'))) {
                    // on force l'injection si nécessaire
                    if($('#currentSlide .custom-schema').length === 0) {
                        // trouver le bloc .content-list ou on peut ajouter directement
                        const container = $('#currentSlide .content-list');
                        if(container.length && !container.find('.custom-schema').length) {
                            const svgSchemaInline = `
                                <div class="custom-schema mt-6 bg-white border border-slate-200 rounded-xl p-3 text-center shadow-sm">
                                    <p class="font-semibold text-slate-700 mb-2">📡 Petit schéma interactif (client-serveur)</p>
                                    <svg viewBox="0 0 340 110" xmlns="http://www.w3.org/2000/svg" class="w-full max-w-sm mx-auto">
                                        <rect x="10" y="20" width="70" height="44" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5" rx="8" />
                                        <text x="45" y="46" font-size="9" text-anchor="middle" fill="#0c4a6e">Application</text>
                                        <text x="45" y="56" font-size="7" text-anchor="middle" fill="#0c4a6e">Client</text>
                                        <path d="M85 42 L125 42" stroke="#0284c7" stroke-width="2" stroke-dasharray="4 2" />
                                        <polygon points="123,38 133,42 123,46" fill="#0284c7" />
                                        <rect x="135" y="15" width="85" height="54" fill="#ccfbf1" stroke="#0f766e" stroke-width="1.5" rx="8" />
                                        <text x="177" y="38" font-size="9" text-anchor="middle" fill="#134e4a">SGBD</text>
                                        <text x="177" y="52" font-size="7" text-anchor="middle" fill="#134e4a">(Serveur)</text>
                                        <path d="M225 42 L265 42" stroke="#0f766e" stroke-width="2" />
                                        <polygon points="263,38 273,42 263,46" fill="#0f766e" />
                                        <rect x="275" y="20" width="50" height="44" fill="#fed7aa" stroke="#b45309" stroke-width="1.5" rx="8" />
                                        <text x="300" y="46" font-size="9" text-anchor="middle" fill="#7c2d12">Données</text>
                                    </svg>
                                    <p class="text-xs text-slate-500 mt-2">💻 Le client envoie une requête → SGBD interroge la base → renvoie le résultat.</p>
                                </div>
                            `;
                            container.append(svgSchemaInline);
                        }
                    }
                }
                // Bonus: faire un petit rappel des slides avec MathJax si jamais
                if(window.MathJax) MathJax.typesetPromise?.();
            }, 50);
        };
        // Remplacer la fonction globale
        renderSlide = function(index) {
            originalRender(index);
            setTimeout(() => {
                // detection archi slide comme avant (amélioré)
                if(document.getElementById('currentSlide')?.innerText.includes('Architecture : Client-Serveur')) {
                    if($('#currentSlide .custom-schema').length === 0) {
                        const container = $('#currentSlide .content-list');
                        if(container.length && !container.find('.custom-schema').length) {
                            container.append(`
                                <div class="custom-schema mt-6 bg-gradient-to-r from-slate-50 to-white p-3 rounded-xl border border-slate-200">
                                    <p class="font-medium text-slate-700 text-center">🖥️ Architecture en image</p>
