<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Leçon 34 : Concevoir une base de données - Cours BD</title>
  <!-- Tailwind CSS + Font Awesome (pour icones) + jQuery -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Personnalisation légère du thème pour meilleure lisibilité -->
  <style>
    /* ajustements supplémentaires pour le confort visuel */
    body {
      background: #f4f7fc;
    }
    .slide-container {
      transition: transform 0.3s ease, opacity 0.2s;
    }
    .btn-slide {
      transition: all 0.2s;
    }
    .btn-slide:active {
      transform: scale(0.96);
    }
    /* pour les petits écrans, marges fines */
    @media (max-width: 640px) {
      .card-slide {
        padding: 1.25rem !important;
      }
      h2 {
        font-size: 1.5rem !important;
      }
    }
    /* rend les slides lisible */
    .prose p, .prose li {
      line-height: 1.5;
    }
  </style>
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <!-- MathJax config (optionnel, mais présent si formules, bien que peu de maths ici) -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
</head>
<body class="font-sans antialiased">

  <div class="max-w-4xl mx-auto px-3 py-4 md:py-6">
    <!-- Conteneur slides avec navigation type carrousel -->
    <div class="relative bg-white/90 backdrop-blur-sm rounded-2xl shadow-xl overflow-hidden border border-indigo-100">
      
      <!-- zone de slide dynamique -->
      <div id="slides-wrapper" class="relative overflow-hidden">
        <div id="slides-track" class="flex transition-transform duration-500 ease-in-out">
          <!-- Les slides seront injectées via jQuery -->
        </div>
      </div>

      <!-- indicateurs de progression + boutons navigation -->
      <div class="flex justify-between items-center px-5 py-3 bg-indigo-50/70 border-t border-indigo-100">
        <button id="prevSlide" class="btn-slide bg-white hover:bg-indigo-100 text-indigo-700 font-semibold py-2 px-4 rounded-full shadow-sm disabled:opacity-40 disabled:cursor-not-allowed transition flex items-center gap-1">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
          Précédent
        </button>
        <div class="text-sm text-indigo-800 font-medium bg-indigo-100 px-3 py-1 rounded-full">
          Slide <span id="currentSlideIdx">1</span> / <span id="totalSlides">0</span>
        </div>
        <button id="nextSlide" class="btn-slide bg-white hover:bg-indigo-100 text-indigo-700 font-semibold py-2 px-4 rounded-full shadow-sm disabled:opacity-40 disabled:cursor-not-allowed transition flex items-center gap-1">
          Suivant
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
        </button>
      </div>

      <!-- petites dots indicatrices (mobile friendly) -->
      <div class="flex justify-center gap-2 py-2 bg-white/50 flex-wrap" id="dotsContainer"></div>
    </div>

    <!-- petit pied de page explicatif -->
    <p class="text-center text-xs text-gray-500 mt-4">Leçon 34 : Conception et implémentation - Classe Développement Web</p>
  </div>

  <script>
    // Définition du contenu des slides selon la leçon 34 (domaine bibliothèque/e-commerce/gestion personnel)
    // D'après le programme: objectif: Choisir un domaine, créer DER, normaliser.
    // Nous allons produire 4 slides (1 titre, 2 objectifs, 3 contenu principal: choix domaine et modélisation, 4 exercice/conseils)
    // Mais pour mieux couvrir les 3 objectifs précis: 1) Choisir domaine, 2) diagramme entité-association, 3) normalisation.
    // Créons 5 slides : Slide1= titre; slide2= objectifs détaillés; slide3= Choisir un domaine et exemples; slide4= Diagramme E/A & normalisation; slide5= Résumé & mise en pratique
    
    const slidesData = [
      { // slide 1 : titre
        type: "title",
        content: `
          <div class="flex flex-col items-center justify-center min-h-[65vh] text-center px-2">
            <span class="inline-block bg-indigo-100 text-indigo-700 rounded-full px-3 py-1 text-sm font-semibold mb-3">Leçon 34 • Conception avancée</span>
            <h1 class="text-3xl md:text-4xl font-extrabold bg-gradient-to-r from-indigo-800 to-purple-700 bg-clip-text text-transparent">Concevoir et implémenter<br>une base de données complète</h1>
            <div class="w-20 h-1 bg-indigo-400 rounded-full my-4"></div>
            <p class="text-gray-600 max-w-md text-lg mt-2">De l’idée à la base relationnelle fonctionnelle</p>
            <div class="mt-8 flex gap-2 text-sm text-gray-500">
              <span>📘 Domaine métier</span> • <span>📐 Modèle E/A</span> • <span>⚙️ Normalisation</span>
            </div>
          </div>
        `
      },
      { // slide 2 : Objectifs pédagogiques
        type: "objectifs",
        content: `
          <div class="px-1 py-2">
            <h2 class="text-2xl font-bold text-indigo-800 border-l-4 border-indigo-500 pl-3 mb-5">🎯 Objectifs de la leçon</h2>
            <div class="grid gap-4 md:grid-cols-1">
              <div class="bg-indigo-50/50 p-4 rounded-xl shadow-sm">
                <div class="flex items-start gap-3">
                  <div class="bg-indigo-200 rounded-full p-2 mt-0.5"><span class="text-indigo-700 font-bold">1</span></div>
                  <div><span class="font-semibold text-gray-800">Choisir un domaine pertinent</span>
                  <p class="text-gray-600 text-sm">Bibliothèque, e-commerce, gestion de personnel, etc. Définir le périmètre fonctionnel.</p></div>
                </div>
              </div>
              <div class="bg-indigo-50/50 p-4 rounded-xl shadow-sm">
                <div class="flex items-start gap-3">
                  <div class="bg-indigo-200 rounded-full p-2 mt-0.5"><span class="text-indigo-700 font-bold">2</span></div>
                  <div><span class="font-semibold text-gray-800">Créer un diagramme entité-association (DER)</span>
                  <p class="text-gray-600 text-sm">Identifier entités, attributs, cardinalités, associations.</p></div>
                </div>
              </div>
              <div class="bg-indigo-50/50 p-4 rounded-xl shadow-sm">
                <div class="flex items-start gap-3">
                  <div class="bg-indigo-200 rounded-full p-2 mt-0.5"><span class="text-indigo-700 font-bold">3</span></div>
                  <div><span class="font-semibold text-gray-800">Normaliser les données (1NF, 2NF, 3NF)</span>
                  <p class="text-gray-600 text-sm">Éliminer redondances, garantir intégrité.</p></div>
                </div>
              </div>
            </div>
            <div class="mt-6 bg-amber-50 p-3 rounded-lg border border-amber-200 text-amber-800 text-sm">
              💡 À la fin, vous serez capable de concevoir une base cohérente avant même d’écrire la moindre ligne SQL !
            </div>
          </div>
        `
      },
      { // slide 3 : Choisir un domaine & exemples concrets
        type: "content",
        content: `
          <div>
            <h2 class="text-xl md:text-2xl font-bold text-indigo-800 flex items-center gap-2"><span class="text-3xl">🗂️</span> 1. Choisir un domaine</h2>
            <p class="mt-2 text-gray-700">Une bonne base répond aux besoins d’un <strong>cas d’usage réel</strong>. Voici trois domaines classiques en projet pédagogique :</p>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 my-5">
              <div class="bg-white border border-indigo-100 rounded-xl p-3 shadow-sm"><span class="font-bold text-indigo-700">📚 Bibliothèque</span><br>Gestion des livres, adhérents, emprunts, retards.</div>
              <div class="bg-white border border-indigo-100 rounded-xl p-3 shadow-sm"><span class="font-bold text-indigo-700">🛒 E-commerce</span><br>Produits, catégories, clients, commandes, panier.</div>
              <div class="bg-white border border-indigo-100 rounded-xl p-3 shadow-sm"><span class="font-bold text-indigo-700">👥 Gestion personnel</span><br>Employés, services, salaires, congés, supérieurs.</div>
            </div>
            <div class="bg-gray-50 p-4 rounded-lg mt-2">
              <p class="font-semibold">📌 Exemple retenu pour la suite : <span class="text-indigo-700">« Petite bibliothèque communautaire »</span></p>
              <p class="text-sm text-gray-600">Règles de gestion : un adhérent peut emprunter jusqu’à 3 livres. Un livre peut être emprunté plusieurs fois dans le temps, mais un exemplaire spécifique est suivi.</p>
            </div>
            <!-- petite illustration simple dessinée via SVG -->
            <div class="flex justify-center my-4">
              <svg width="220" height="60" viewBox="0 0 300 70" xmlns="http://www.w3.org/2000/svg" class="mx-auto">
                <rect x="20" y="15" width="55" height="40" fill="#e0e7ff" stroke="#4338ca" stroke-width="1.5" rx="6" />
                <text x="30" y="42" font-size="12" fill="#1e1b4b">📖 Livre</text>
                <line x1="85" y1="35" x2="115" y2="35" stroke="#6366f1" stroke-width="2" stroke-dasharray="4" />
                <rect x="125" y="15" width="60" height="40" fill="#e0e7ff" stroke="#4338ca" stroke-width="1.5" rx="6" />
                <text x="132" y="42" font-size="12" fill="#1e1b4b">👤 Adhérent</text>
                <line x1="195" y1="35" x2="230" y2="35" stroke="#6366f1" stroke-width="2" />
                <rect x="240" y="15" width="50" height="40" fill="#e0e7ff" stroke="#4338ca" stroke-width="1.5" rx="6" />
                <text x="248" y="42" font-size="10" fill="#1e1b4b">📅 Emprunt</text>
              </svg>
              <p class="text-xs text-center text-gray-500 mt-1">Schéma conceptuel simplifié</p>
            </div>
          </div>
        `
      },
      { // slide 4 : Diagramme entité-association & normalisation (contenu central)
        type: "content",
        content: `
          <div>
            <h2 class="text-xl md:text-2xl font-bold text-indigo-800 flex items-center gap-2">📐 2. Diagramme E/A + Normalisation</h2>
            <div class="mt-3 space-y-4">
              <div class="bg-indigo-50/40 p-3 rounded-lg">
                <p class="font-semibold text-indigo-800">🔹 Entités & attributs (exemple bibliothèque)</p>
                <ul class="list-disc pl-5 text-gray-700 text-sm space-y-1 mt-1">
                  <li><strong>Livre</strong> (id_livre, titre, auteur, isbn, annee_edition)</li>
                  <li><strong>Adherent</strong> (id_adherent, nom, prenom, date_inscription, email)</li>
                  <li><strong>Exemplaire</strong> (id_exemplaire, id_livre, etat)</li>
                  <li><strong>Emprunt</strong> (id_emprunt, id_exemplaire, id_adherent, date_emprunt, date_retour_prevue, date_retour_reelle)</li>
                </ul>
              </div>
              <div class="border-l-4 border-green-400 pl-4">
                <p class="font-semibold">🧩 Cardinalités :</p>
                <p class="text-sm">Un Livre peut avoir plusieurs Exemplaires (1,n). Un Adherent peut faire plusieurs Emprunts (0,n). Un Emprunt concerne 1 exemplaire et 1 adhérent.</p>
              </div>
              <div class="bg-white p-3 rounded-lg shadow">
                <p class="font-bold text-indigo-700">📏 Normalisation (3 formes normales)</p>
                <table class="w-full text-sm mt-2">
                  <tr class="border-b"><td class="py-1 font-medium">1NF</td><td>Valeurs atomiques, pas de groupes répétitifs. ✅ Ex: un emprunt ne contient pas plusieurs livres dans une colonne.</td></tr>
                  <tr class="border-b"><td class="py-1 font-medium">2NF</td><td>Être en 1NF et supprimer dépendances partielles (clé primaire composite) → on extrait les dépendances.</td></tr>
                  <tr><td class="py-1 font-medium">3NF</td><td>Supprimer dépendances transitives : ex. la bibliothèque ne stocke pas la ville de l'éditeur dans la table Livre, on crée table Editeur.</td></tr>
                </table>
                <p class="text-xs text-gray-500 mt-2">💡 Dans notre conception bibliothèque, nous veillons à ce que chaque table représente une entité unique sans redondance.</p>
              </div>
            </div>
            <!-- Diagramme simple dessiné SVG pour normalisation -->
            <div class="flex flex-wrap justify-center gap-3 mt-4 text-xs">
              <div class="bg-gray-100 p-2 rounded-md">📄 LIVRE (id_livre*, titre, auteur)</div>
              <span class="text-indigo-500">⇢</span>
              <div class="bg-gray-100 p-2 rounded-md">📑 EXEMPLAIRE (id_exemplaire*, id_livre#)</div>
              <span class="text-indigo-500">⇢</span>
              <div class="bg-gray-100 p-2 rounded-md">🔄 EMPRUNT (id_emprunt*, id_exemplaire#, id_adherent#, dates)</div>
            </div>
          </div>
        `
      },
      { // slide 5 : Mise en pratique et conclusion + projet miniature
        type: "content",
        content: `
          <div>
            <h2 class="text-xl font-bold text-indigo-800">🚀 3. Mise en pratique – De la conception à l’implémentation</h2>
            <div class="my-4 bg-gradient-to-r from-indigo-50 to-white p-4 rounded-xl">
              <p class="font-semibold">✨ Exercice fil rouge : concevoir une BD pour un <strong>mini e-commerce</strong></p>
              <ul class="list-disc pl-5 text-sm space-y-1 mt-2">
                <li>Étape 1 : Lister les entités (Produit, Catégorie, Client, Commande, LigneCommande).</li>
                <li>Étape 2 : Définir les attributs et clés primaires.</li>
                <li>Étape 3 : Tracer les associations (Client passe Commande, Commande contient Produits via LigneCommande).</li>
                <li>Étape 4 : Vérifier la 3NF (ex: le prix unitaire à la commande est stocké dans LigneCommande pour éviter dépendance).</li>
              </ul>
              <div class="mt-4 p-2 bg-indigo-100 rounded-lg text-indigo-800 text-sm">
                💻 À faire en binôme: réaliser le DER sur papier ou outil en ligne, puis le transformer en script SQL (CREATE TABLE).
              </div>
            </div>
            <div class="flex flex-col gap-2 text-center text-green-700 bg-green-50 p-3 rounded-lg border border-green-200">
              <span class="font-bold">🏆 Objectif final de la leçon 34</span>
              <span class="text-sm">Savoir transformer un besoin métier en une base relationnelle normalisée et prête à être implémentée avec MySQL ou PostgreSQL.</span>
              <span class="text-xs mt-1">⬅️ Utilisez les boutons pour revoir les concepts</span>
            </div>
          </div>
        `
      }
    ];

    // Remplissage du track
    let currentIndex = 0;
    const $track = $("#slides-track");
    const $prevBtn = $("#prevSlide");
    const $nextBtn = $("#nextSlide");
    const $currentIdxSpan = $("#currentSlideIdx");
    const $totalSlidesSpan = $("#totalSlides");
    const $dotsContainer = $("#dotsContainer");

    function buildSlides() {
      $track.empty();
      $.each(slidesData, function(i, slide) {
        const slideDiv = $("<div>").addClass("slide-container w-full flex-shrink-0 px-4 py-5 md:px-7 md:py-7 card-slide");
        // largeur fixe par rapport au conteneur parent (taille du track)
        slideDiv.css("width", "100%");
        // contenu inner
        const innerDiv = $("<div>").addClass("prose max-w-none text-gray-800");
        innerDiv.html(slide.content);
        slideDiv.append(innerDiv);
        $track.append(slideDiv);
      });
      updateSlidesCount();
      updateDots();
      goToSlide(0);
    }

    function updateSlidesCount() {
      const total = slidesData.length;
      $totalSlidesSpan.text(total);
    }

    function updateDots() {
      $dotsContainer.empty();
      const total = slidesData.length;
      for (let i = 0; i < total; i++) {
        const dot = $("<button>").addClass("w-2 h-2 rounded-full transition-all mx-1 focus:outline-none");
        if (i === currentIndex) {
          dot.addClass("bg-indigo-600 w-4");
          dot.css("width", "1rem");
        } else {
          dot.addClass("bg-indigo-300 hover:bg-indigo-400 w-2");
          dot.css("width", "0.5rem");
        }
        dot.css("height", "0.5rem");
        dot.attr("data-index", i);
        dot.on("click", function() {
          goToSlide(parseInt($(this).attr("data-index")));
        });
        $dotsContainer.append(dot);
      }
    }

    function goToSlide(index) {
      const total = slidesData.length;
      if (index < 0) index = 0;
      if (index >= total) index = total - 1;
      currentIndex = index;
      const offset = - (currentIndex * 100);
      $track.css("transform", `translateX(${offset}%)`);
      $currentIdxSpan.text(currentIndex + 1);
      // mise à jour boutons disabled
      $prevBtn.prop("disabled", currentIndex === 0);
      $nextBtn.prop("disabled", currentIndex === total - 1);
      updateDots();
    }

    function nextSlide() {
      if (currentIndex < slidesData.length - 1) {
        goToSlide(currentIndex + 1);
      }
    }
    function prevSlide() {
      if (currentIndex > 0) {
        goToSlide(currentIndex - 1);
      }
    }

    // gestionnaire d'événements
    $nextBtn.on("click", nextSlide);
    $prevBtn.on("click", prevSlide);
    // swipe simplifié mobile avec jquery (touch events)
    let touchStartX = 0;
    let touchEndX = 0;
    const $swipeArea = $("#slides-wrapper");
    $swipeArea.on("touchstart", function(e) {
      touchStartX = e.originalEvent.touches[0].clientX;
    });
    $swipeArea.on("touchend", function(e) {
      touchEndX = e.originalEvent.changedTouches[0].clientX;
      const diff = touchEndX - touchStartX;
      if (Math.abs(diff) > 50) {
        if (diff > 0) {
          prevSlide();
        } else {
          nextSlide();
        }
      }
    });
    // flèches clavier pour accessibilité
    $(document).on("keydown", function(e) {
      if (e.key === "ArrowLeft") prevSlide();
      if (e.key === "ArrowRight") nextSlide();
    });

    // initialisation
    buildSlides();

    // correction responsive : forcer le track à bien dimensionner à chaque resize
    $(window).on("resize", function() {
      // réapplique la translation pour éviter décallage (taille fixe en % , pas besoin, mais on rappelle le goToSlide pour sync)
      goToSlide(currentIndex);
    });
  </script>
</body>
</html>
