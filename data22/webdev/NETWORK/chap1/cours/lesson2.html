<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Leçon 2 - Types de réseaux, topologies & architecture | Initiation aux Réseaux</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (utile pour d'éventuelles notations réseau) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* transitions douces pour les slides */
        .slide {
            transition: opacity 0.35s ease-in-out;
        }
        .slide-container {
            min-height: 65vh;
        }
        .nav-btn {
            transition: all 0.2s;
        }
        .nav-btn:active {
            transform: scale(0.96);
        }
        /* pour la topologie dessinée en SVG (petite illustration) */
        .topo-svg svg {
            max-width: 100%;
            height: auto;
            border-radius: 1rem;
            background: #f8fafc;
        }
        @media (max-width: 640px) {
            .slide-container {
                min-height: 55vh;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-100 to-gray-200 font-sans antialiased">

    <div class="max-w-5xl mx-auto px-3 md:px-6 py-4 md:py-8">
        <!-- Carte principale -->
        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden border border-gray-200">
            <!-- Header info -->
            <div class="bg-blue-800 px-5 py-3 md:py-4 flex justify-between items-center flex-wrap gap-2">
                <div class="flex items-center space-x-3">
                    <span class="text-white text-sm font-mono bg-blue-900 px-2 py-1 rounded-md">Leçon 2 / 35</span>
                    <span class="text-white font-semibold text-sm md:text-base">🌐 Initiation aux Réseaux informatiques</span>
                </div>
                <div class="text-white text-sm bg-blue-700 px-3 py-1 rounded-full">
                    <span id="slideCounter">1 / 7</span>
                </div>
            </div>

            <!-- zone slides -->
            <div id="slidesWrapper" class="relative overflow-hidden p-5 md:p-8 slide-container bg-gray-50">
                <!-- les slides seront injectées ici -->
            </div>

            <!-- navigation -->
            <div class="border-t border-gray-200 px-5 py-4 flex justify-between items-center bg-white flex-wrap gap-3">
                <button id="prevSlide" class="nav-btn bg-gray-100 hover:bg-gray-200 text-gray-800 font-medium py-2 px-5 rounded-full shadow-sm border border-gray-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                    ← Précédent
                </button>
                <div class="flex space-x-2" id="dotsIndicator"></div>
                <button id="nextSlide" class="nav-btn bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-5 rounded-full shadow-md transition">
                    Suivant →
                </button>
            </div>
        </div>
        <p class="text-center text-xs text-gray-500 mt-6">
            💡 Navigation tactile (glisser) ou clavier (flèches). Découvrez les différents types de réseaux, topologies et architectures.
        </p>
    </div>

    <script>
        $(document).ready(function() {
            // --------------------------------------------------------------
            // SLIDES pour la Leçon 2 (chap1 - lesson2) 
            // Objectifs: Distinguer PAN, LAN, MAN, WAN; topologies (bus, étoile, anneau, maillage, arbre);
            // Différencier client-serveur et pair-à-pair.
            // --------------------------------------------------------------
            const slidesData = [
                { // Slide 0 : Titre
                    type: "title",
                    title: "📡 Les réseaux informatiques : classification, topologies & architectures",
                    subtitle: "PAN, LAN, MAN, WAN · Topologies physiques et logiques · Client/Serveur vs Peer-to-Peer",
                    emoji: "🌍",
                    bgClass: "bg-gradient-to-r from-blue-50 to-indigo-50"
                },
                { // Slide 1 : Objectifs pédagogiques
                    type: "objectives",
                    title: "🎯 Objectifs de la leçon",
                    objectives: [
                        "Distinguer les différents types de réseaux selon l'étendue géographique (PAN, LAN, MAN, WAN).",
                        "Comprendre les principales topologies de réseau (bus, étoile, anneau, maillage, arbre).",
                        "Différencier l'architecture client-serveur du modèle pair-à-pair (P2P).",
                        "Identifier les avantages et inconvénients de chaque configuration."
                    ]
                },
                { // Slide 2 : Classification géographique PAN, LAN, MAN, WAN
                    type: "content",
                    title: "📍 1. Classification selon l'étendue (PAN, LAN, MAN, WAN)",
                    contentHtml: `
                        <p class="mb-3">La taille et la portée d’un réseau déterminent sa catégorie :</p>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                            <div class="bg-blue-50 p-3 rounded-xl border border-blue-200"><span class="font-bold text-blue-800">PAN (Personal Area Network)</span><br>Très petite zone : quelques mètres (Bluetooth, clavier sans fil, casque). Exemple : connexion téléphone ↔ montre connectée.</div>
                            <div class="bg-green-50 p-3 rounded-xl border border-green-200"><span class="font-bold text-green-800">LAN (Local Area Network)</span><br>Étendue limitée à un bâtiment, une école, une maison. Ethernet/WiFi. Débits élevés.</div>
                            <div class="bg-yellow-50 p-3 rounded-xl border border-yellow-200"><span class="font-bold text-yellow-800">MAN (Metropolitan Area Network)</span><br>À l’échelle d’une ville, plusieurs sites interconnectés. Exemple : réseau d’une université sur plusieurs campus.</div>
                            <div class="bg-purple-50 p-3 rounded-xl border border-purple-200"><span class="font-bold text-purple-800">WAN (Wide Area Network)</span><br>Très grande distance (pays, continents). Internet est le plus grand WAN public.</div>
                        </div>
                        <p class="mt-4 text-indigo-700 bg-indigo-50 p-2 rounded-lg text-center text-sm">📌 <strong>À retenir</strong> : plus le réseau est étendu, plus la technologie et les délais peuvent varier.</p>
                    `
                },
                { // Slide 3 : Topologies de réseau (illustration dessinée maison via SVG)
                    type: "content",
                    title: "🕸️ 2. Topologies physiques & logiques",
                    contentHtml: `
                        <p>La topologie décrit comment les équipements (nœuds) sont reliés entre eux. Voici les principales :</p>
                        <div class="topo-svg my-4 flex justify-center">
                            <svg width="100%" height="180" viewBox="0 0 700 160" xmlns="http://www.w3.org/2000/svg" style="background:#f1f5f9; border-radius:16px; padding:8px;">
                                <!-- Étoile -->
                                <circle cx="70" cy="75" r="12" fill="#3b82f6" stroke="white" stroke-width="2"/>
                                <circle cx="40" cy="45" r="8" fill="#f59e0b" /><line x1="70" y1="75" x2="40" y2="45" stroke="#475569" stroke-width="1.5"/>
                                <circle cx="100" cy="45" r="8" fill="#f59e0b" /><line x1="70" y1="75" x2="100" y2="45" stroke="#475569" stroke-width="1.5"/>
                                <circle cx="40" cy="105" r="8" fill="#f59e0b" /><line x1="70" y1="75" x2="40" y2="105" stroke="#475569" stroke-width="1.5"/>
                                <circle cx="100" cy="105" r="8" fill="#f59e0b" /><line x1="70" y1="75" x2="100" y2="105" stroke="#475569" stroke-width="1.5"/>
                                <text x="55" y="140" font-size="9" fill="#1e293b">Étoile</text>

                                <!-- Bus -->
                                <line x1="170" y1="75" x2="270" y2="75" stroke="#dc2626" stroke-width="3"/>
                                <circle cx="190" cy="75" r="7" fill="#f97316" /><circle cx="220" cy="75" r="7" fill="#f97316" /><circle cx="250" cy="75" r="7" fill="#f97316" />
                                <text x="195" y="105" font-size="9" fill="#1e293b">Bus</text>

                                <!-- Anneau -->
                                <circle cx="370" cy="75" r="38" fill="none" stroke="#16a34a" stroke-width="3"/>
                                <circle cx="345" cy="55" r="7" fill="#10b981"/><circle cx="395" cy="55" r="7" fill="#10b981"/>
                                <circle cx="395" cy="95" r="7" fill="#10b981"/><circle cx="345" cy="95" r="7" fill="#10b981"/>
                                <text x="358" y="130" font-size="9" fill="#1e293b">Anneau</text>

                                <!-- Maillage partiel -->
                                <circle cx="500" cy="50" r="8" fill="#8b5cf6"/><circle cx="550" cy="40" r="8" fill="#8b5cf6"/>
                                <circle cx="530" cy="85" r="8" fill="#8b5cf6"/><circle cx="580" cy="80" r="8" fill="#8b5cf6"/>
                                <line x1="500" y1="50" x2="550" y2="40" stroke="#6d28d9" stroke-width="1.5"/>
                                <line x1="500" y1="50" x2="530" y2="85" stroke="#6d28d9" stroke-width="1.5"/>
                                <line x1="550" y1="40" x2="530" y2="85" stroke="#6d28d9" stroke-width="1.5"/>
                                <line x1="550" y1="40" x2="580" y2="80" stroke="#6d28d9" stroke-width="1.5"/>
                                <line x1="530" y1="85" x2="580" y2="80" stroke="#6d28d9" stroke-width="1.5"/>
                                <text x="515" y="115" font-size="9" fill="#1e293b">Maillage</text>
                            </svg>
                        </div>
                        <ul class="list-disc pl-5 mt-2 space-y-1 text-sm">
                            <li><span class="font-semibold">Topologie en étoile</span> : tous les nœuds reliés à un commutateur central (switch). Panne d’un périphérique n’affecte que lui.</li>
                            <li><span class="font-semibold">Topologie en bus</span> : un câble principal. Simple mais fragile (si câble coupé tout s’arrête).</li>
                            <li><span class="font-semibold">Topologie en anneau</span> : chaque nœud connecté à deux voisins. Les données circulent dans un sens.</li>
                            <li><span class="font-semibold">Topologie en maillage</span> : plusieurs chemins redondants (utilisé pour les grands réseaux fiables).</li>
                            <li><span class="font-semibold">Topologie en arbre</span> : hiérarchique, combine bus/étoile, utilisé dans les grands campus.</li>
                        </ul>
                    `
                },
                { // Slide 4 : Client-Serveur vs Peer to Peer
                    type: "content",
                    title: "⚙️ 3. Architectures réseaux : Client/Serveur et Pair-à-Pair (P2P)",
                    contentHtml: `
                        <div class="flex flex-col md:flex-row gap-5 mt-2">
                            <div class="flex-1 bg-white border border-gray-300 rounded-xl p-4 shadow-sm">
                                <div class="flex items-center gap-2 text-indigo-700 font-bold text-lg">🖥️ Client-Serveur</div>
                                <p class="text-sm mt-1">Un serveur central fournit des services (fichiers, web, email). Les clients envoient des requêtes.</p>
                                <ul class="list-disc pl-5 mt-2 text-sm">
                                    <li>✅ Gestion centralisée (sécurité, sauvegardes).</li>
                                    <li>✅ Facilité d'administration.</li>
                                    <li>❌ Risque de surcharge si le serveur tombe en panne.</li>
                                    <li>📌 Exemples : sites web, messagerie d'entreprise.</li>
                                </ul>
                            </div>
                            <div class="flex-1 bg-white border border-gray-300 rounded-xl p-4 shadow-sm">
                                <div class="flex items-center gap-2 text-green-700 font-bold text-lg">🔄 Pair-à-Pair (P2P)</div>
                                <p class="text-sm mt-1">Tous les ordinateurs sont égaux, partagent directement leurs ressources sans serveur dédié.</p>
                                <ul class="list-disc pl-5 mt-2 text-sm">
                                    <li>✅ Pas de serveur central, économique.</li>
                                    <li>✅ Tolérance aux pannes (réseau distribué).</li>
                                    <li>❌ Sécurité et découverte des pairs complexes.</li>
                                    <li>📌 Exemples : BitTorrent, partage de fichiers entre postes.</li>
                                </ul>
                            </div>
                        </div>
                        <div class="mt-4 p-2 bg-cyan-50 border-l-4 border-cyan-500 text-sm">
                            💡 <strong>À savoir :</strong> Internet mélange les deux modèles. Le Web utilise le modèle client-serveur (navigateur ↔ serveur web), tandis que le partage de fichiers pair-à-pair fonctionne sans serveur central.
                        </div>
                    `
                },
                { // Slide 5 : Comparaison tableau et notion de topologie hybride
                    type: "content",
                    title: "📊 Tableau récapitulatif & topologies hybrides",
                    contentHtml: `
                        <div class="overflow-x-auto">
                            <table class="min-w-full text-sm border border-gray-300 bg-white rounded-lg">
                                <thead class="bg-blue-100">
                                    <tr><th class="border p-2">Type</th><th class="border p-2">Étendue</th><th class="border p-2">Exemple</th></tr>
                                </thead>
                                <tbody>
                                    <tr><td class="border p-2">PAN</td><td class="border p-2">Quelques mètres</td><td class="border p-2">Bluetooth, casque</td></tr>
                                    <tr><td class="border p-2">LAN</td><td class="border p-2">Bâtiment, école</td><td class="border p-2">Réseau WiFi d'une maison</td></tr>
                                    <tr><td class="border p-2">MAN</td><td class="border p-2">Ville</td><td class="border p-2">Réseau fibre d'une municipalité</td></tr>
                                    <tr><td class="border p-2">WAN</td><td class="border p-2">Pays/Continent</td><td class="border p-2">Internet, backbone</td></tr>
                                </tbody>
                            </table>
                        </div>
                        <p class="mt-4"><span class="font-bold">Topologies hybrides :</span> la plupart des réseaux modernes combinent plusieurs topologies (ex: étoile + bus pour un campus). Les réseaux sans fil (WiFi) fonctionnent souvent en étoile avec point d'accès central.</p>
                        <div class="mt-3 p-3 bg-gray-100 rounded-lg text-center text-sm italic">
                            ⭐ "Un bon réseau correspond aux besoins : coût, fiabilité, facilité d'extension."
                        </div>
                    `
                },
                { // Slide 6 : Exercice d'ancrage - Quiz rapide
                    type: "content",
                    title: "🧠 Vérifions vos acquis (auto-évaluation)",
                    contentHtml: `
                        <div class="space-y-3">
                            <div class="bg-white p-3 rounded border">
                                <p class="font-semibold">1️⃣ Quel type de réseau relie des ordinateurs dans un même immeuble ?</p>
                                <div class="mt-1 text-indigo-600">👉 LAN (Local Area Network).</div>
                            </div>
                            <div class="bg-white p-3 rounded border">
                                <p class="font-semibold">2️⃣ Dans une topologie en étoile, que se passe-t-il si le commutateur central tombe en panne ?</p>
                                <div class="mt-1 text-indigo-600">👉 Tout le réseau devient inaccessible.</div>
                            </div>
                            <div class="bg-white p-3 rounded border">
                                <p class="font-semibold">3️⃣ Donnez un avantage du modèle peer-to-peer.</p>
                                <div class="mt-1 text-indigo-600">👉 Pas de serveur dédié, résilience, moins coûteux.</div>
                            </div>
                            <p class="text-xs text-gray-500 mt-2">📘 Ces questions vous aident à mémoriser. Reprenez la leçon si nécessaire.</p>
                        </div>
                    `
                }
            ];

            let currentIndex = 0;
            const totalSlides = slidesData.length;

            function renderSlide(slide) {
                if(slide.type === "title") {
                    return `<div class="slide text-center py-8 md:py-12 ${slide.bgClass || 'bg-white'} rounded-xl">
                                <div class="text-6xl mb-4">${slide.emoji || "🌐"}</div>
                                <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-3">${slide.title}</h1>
                                <p class="text-lg md:text-xl text-gray-600 max-w-xl mx-auto">${slide.subtitle}</p>
                                <div class="mt-6 text-blue-500 text-sm font-mono">Réseaux Informatiques - Niveau débutant</div>
                            </div>`;
                } 
                else if(slide.type === "objectives") {
                    return `<div class="slide bg-white rounded-xl">
                                <h2 class="text-2xl md:text-3xl font-bold text-blue-800 border-l-8 border-blue-500 pl-4 mb-4">${slide.title}</h2>
                                <ul class="space-y-2 text-gray-700 text-base md:text-lg list-disc pl-6">
                                    ${slide.objectives.map(obj => `<li class="mb-2">🎯 ${obj}</li>`).join('')}
                                </ul>
                                <div class="mt-5 p-3 bg-blue-50 rounded-lg text-blue-700 text-sm">⏱️ Temps estimé : 20 minutes de lecture + réflexion.</div>
                            </div>`;
                }
                else {
                    return `<div class="slide bg-white rounded-xl">
                                <h2 class="text-xl md:text-2xl font-bold text-blue-800 border-b-2 border-blue-200 pb-2 mb-4">${slide.title}</h2>
                                <div class="prose-custom text-gray-700 text-base md:text-lg leading-relaxed">
                                    ${slide.contentHtml}
                                </div>
                            </div>`;
                }
            }

            function updateDisplay() {
                const currentSlide = slidesData[currentIndex];
                const slideHtml = renderSlide(currentSlide);
                $("#slidesWrapper").fadeOut(120, function() {
                    $(this).html(slideHtml).fadeIn(150);
                });
                $("#slideCounter").text(`${currentIndex+1} / ${totalSlides}`);
                $("#prevSlide").prop("disabled", currentIndex === 0);
                $("#nextSlide").prop("disabled", currentIndex === totalSlides - 1);
                $(".dot").each(function(i) {
                    if(i === currentIndex) {
                        $(this).removeClass("bg-gray-300").addClass("bg-blue-600 w-6");
                    } else {
                        $(this).removeClass("bg-blue-600 w-6").addClass("bg-gray-300 w-2");
                    }
                });
            }

            function generateDots() {
                let dots = "";
                for(let i=0; i<totalSlides; i++) {
                    dots += `<button class="dot h-2 rounded-full transition-all duration-200 mx-1 ${i===0 ? 'bg-blue-600 w-6' : 'bg-gray-300 w-2'}" data-index="${i}"></button>`;
                }
                $("#dotsIndicator").html(dots);
                $(".dot").on("click", function() {
                    let idx = parseInt($(this).data("index"));
                    if(!isNaN(idx) && idx >=0 && idx < totalSlides) {
                        currentIndex = idx;
                        updateDisplay();
                    }
                });
            }

            function nextSlide() { if(currentIndex < totalSlides-1) { currentIndex++; updateDisplay(); } }
            function prevSlide() { if(currentIndex > 0) { currentIndex--; updateDisplay(); } }

            $("#nextSlide").on("click", nextSlide);
            $("#prevSlide").on("click", prevSlide);

            // Gestion swipe tactile
            let touchStartX = 0, touchEndX = 0;
            const swiper = document.getElementById("slidesWrapper");
            swiper.addEventListener("touchstart", (e) => { touchStartX = e.changedTouches[0].screenX; }, false);
            swiper.addEventListener("touchend", (e) => {
                touchEndX = e.changedTouches[0].screenX;
                if(touchEndX < touchStartX - 40) nextSlide();
                else if(touchEndX > touchStartX + 40) prevSlide();
            }, false);

            $(document).on("keydown", (e) => {
                if(e.key === "ArrowRight") { nextSlide(); e.preventDefault(); }
                else if(e.key === "ArrowLeft") { prevSlide(); e.preventDefault(); }
            });

            generateDots();
            updateDisplay();
        });
    </script>
</body>
</html>
