<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 14 : Relations et chargements avec EF Core | API .NET</title>
    <!-- Tailwind CSS via CDN + base styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (pour formules légères si besoin) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <!-- Personnalisation du thème / transitions douces -->
    <style>
        /* transitions pour les slides */
        .slide-container {
            transition: opacity 0.3s ease-in-out;
        }
        .slide {
            transition: transform 0.2s ease, opacity 0.3s ease;
        }
        .btn-nav {
            transition: all 0.2s ease;
        }
        .btn-nav:hover {
            transform: scale(1.02);
        }
        /* rendu mathjax adapté */
        mjx-container {
            overflow-x: auto;
            overflow-y: hidden;
        }
        /* personnalisation des scrolls */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
        }
        .card-shadow {
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
        }
        .prose li {
            margin-bottom: 0.4rem;
        }
    </style>
</head>
<body class="font-sans antialiased">

    <!-- Conteneur principal avec padding adapté aux mobiles -->
    <div class="max-w-4xl mx-auto px-4 py-6 md:py-10">
        <!-- Barre de navigation slides + indicateur -->
        <div class="bg-white/70 backdrop-blur-sm rounded-2xl shadow-md p-3 mb-6 flex flex-wrap items-center justify-between sticky top-2 z-10">
            <div class="flex items-center gap-3">
                <button id="prevSlide" class="btn-nav bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-sm font-medium shadow-md transition">◀ Précédent</button>
                <button id="nextSlide" class="btn-nav bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-sm font-medium shadow-md">Suivant ▶</button>
            </div>
            <div class="text-sm text-gray-600 font-medium mt-2 sm:mt-0">
                <span id="slideCounter">1</span> / <span id="totalSlides"></span>
            </div>
            <div class="hidden md:flex text-xs text-gray-500 italic">
                Leçon 14 : Relations & chargements EF Core
            </div>
        </div>

        <!-- Zone dynamique des slides (contenu injecté par jQuery) -->
        <div id="slidesRoot" class="slide-container"></div>
    </div>

    <script>
        // ----- Définition du contenu des slides pour la lesson 14 -----
        // D'après les objectifs de la lesson14: 
        // 0: Configurer les relations One-to-Many, Many-to-Many
        // 1: Utiliser les propriétés de navigation et Include() pour le chargement
        // 2: Comprendre les chargements (Eager, Lazy, Explicit loading)

        const slidesData = [
            {
                type: "title",
                title: "📘 Relations entre tables & Chargements avec Entity Framework Core",
                subtitle: "API .NET (ASP.NET Core) | Leçon 14",
                icon: "🗄️"
            },
            {
                type: "objectifs",
                title: "🎯 Objectifs d'apprentissage",
                objectives: [
                    "✅ Configurer des relations One-to-Many et Many-to-Many avec EF Core (Data Annotations / Fluent API)",
                    "✅ Utiliser les propriétés de navigation pour naviguer entre entités",
                    "✅ Maîtriser les différentes stratégies de chargement : Eager Loading (Include/ThenInclude), Lazy Loading et Explicit Loading",
                    "✅ Savoir quand utiliser chaque type de chargement pour optimiser les performances"
                ]
            },
            {
                type: "content",
                title: "🔗 1. Les relations entre entités",
                content: `
                    <p class="text-gray-700 leading-relaxed">En EF Core, les relations (One-to-Many, Many-to-Many) se modélisent via des propriétés de navigation. Voici un exemple concret :</p>
                    <div class="bg-gray-900 text-gray-100 rounded-xl p-4 my-4 overflow-x-auto text-sm font-mono">
                        <pre>public class Category   // Un côté "un"
{
    public int Id { get; set; }
    public string Name { get; set; }
    public ICollection<Product> Products { get; set; } // Navigation
}

public class Product     // Côté "plusieurs"
{
    public int Id { get; set; }
    public string Title { get; set; }
    public int CategoryId { get; set; }     // Clé étrangère
    public Category Category { get; set; }  // Navigation inverse
}</pre>
                    </div>
                    <p class="mt-3 text-gray-700"><span class="font-semibold">Many-to-Many</span> (sans classe de jointure explicite depuis .NET 7) : EF Core peut générer une table de jonction automatiquement.</p>
                    <div class="bg-indigo-50 border-l-4 border-indigo-500 p-3 rounded-md my-3 text-indigo-800 text-sm">
                        💡 Astuce : utilisez la Fluent API dans <code>OnModelCreating</code> pour configurer précisément les clés étrangères et les cascade delete.
                    </div>
                `
            },
            {
                type: "content",
                title: "🧩 2. Propriétés de navigation et clés étrangères",
                content: `
                    <p class="text-gray-700">Les <span class="font-mono bg-gray-200 px-1 rounded">proprités de navigation</span> (ex: <code>Category Products</code>) permettent d'accéder aux entités liées sans écrire de jointures SQL manuelles.</p>
                    <ul class="list-disc pl-6 mt-3 space-y-2 text-gray-700">
                        <li><strong>Relation One-to-Many</strong> : une catégorie possède plusieurs produits, chaque produit appartient à une catégorie.</li>
                        <li><strong>Relation Many-to-Many</strong> : ex: un étudiant peut s'inscrire à plusieurs cours et chaque cours a plusieurs étudiants. EF Core crée une table "EtudiantCours".</li>
                        <li><strong>Clé étrangère explicite</strong> : <code>public int CategoryId { get; set; }</code> pour matérialiser la FK.</li>
                    </ul>
                    <div class="bg-yellow-50 p-3 rounded-lg border border-yellow-200 mt-4 text-sm">
                        ⚠️ Important : si vous ne déclarez pas explicitement la propriété de FK, EF Core va créer une shadow property (colonne cachée). Mieux vaut l'expliciter !
                    </div>
                `
            },
            {
                type: "content",
                title: "⚡ 3. Eager Loading (Chargement hâtif) - Include()",
                content: `
                    <p class="text-gray-700 mb-2">Le <strong>Eager Loading</strong> charge les données liées <em>dans la même requête</em> via <code>.Include()</code>. Évite les appels multiples à la base de données.</p>
                    <div class="bg-gray-800 text-green-300 rounded-lg p-3 my-3 font-mono text-sm overflow-x-auto">
                        <pre>// Récupérer tous les produits avec leur catégorie associée
var produits = context.Products
                      .Include(p => p.Category)
                      .ToList();

// Pour les relations imbriquées (Category → ...)
var categories = context.Categories
                         .Include(c => c.Products)
                         .ThenInclude(p => p.Fournisseur)  // Niveau suivant
                         .ToList();</pre>
                    </div>
                    <p class="text-gray-600">✅ <span class="font-medium">Avantage</span> : une seule requête SQL avec JOIN. Parfait quand on sait qu’on a besoin des données liées.</p>
                    <p class="text-gray-600">⚠️ <span class="font-medium">Inconvénient</span> : peut charger trop de données si l’arbre est profond.</p>
                `
            },
            {
                type: "content",
                title: "🐢 4. Lazy Loading (Chargement paresseux)",
                content: `
                    <p class="text-gray-700">Le <strong>Lazy Loading</strong> charge automatiquement les propriétés de navigation <em>au moment où on y accède</em> (nécessite installation de <code>Microsoft.EntityFrameworkCore.Proxies</code> et configuration).</p>
                    <div class="bg-gray-800 text-gray-200 p-3 rounded-md my-3 font-mono text-sm">
                        <pre>// Program.cs / ConfigureServices
options.UseLazyLoadingProxies().UseSqlServer(connexion);

// Usage : quand on accède à produit.Category, une requête est envoyée.
var produit = context.Products.First();
string nomCategorie = produit.Category.Name; // exécute un SELECT supplémentaire</pre>
                    </div>
                    <ul class="list-disc pl-6 mt-2 space-y-1 text-gray-700">
                        <li>✔️ Pratique pour le développement, code propre.</li>
                        <li>❌ Risque de N+1 requêtes en production (performance dégradée).</li>
                        <li>📌 Nécessite que les propriétés de navigation soient <code>virtual</code>.</li>
                    </ul>
                    <div class="bg-red-50 p-3 rounded-md mt-3 text-red-700 border border-red-200 text-sm">⚠️ À utiliser avec précaution dans les APIs REST, car la sérialisation peut déclencher des chargements intempestifs.</div>
                `
            },
            {
                type: "content",
                title: "🛠️ 5. Explicit Loading (Chargement explicite)",
                content: `
                    <p class="text-gray-700">Permet de charger une propriété de navigation <em>à la demande</em> après avoir récupéré l’entité principale. Utile pour contrôler finement les performances.</p>
                    <div class="bg-gray-800 text-green-200 p-3 rounded-md my-3 font-mono text-sm">
                        <pre>var produit = context.Products.First();
// Charger explicitement la catégorie si besoin
context.Entry(produit).Reference(p => p.Category).Load();

// Pour une collection (Products d'une catégorie) : 
context.Entry(categorie).Collection(c => c.Products).Load();</pre>
                    </div>
                    <p class="text-gray-700">Avantages : charge uniquement quand on en a besoin, sans proxy. Parfait dans des scénarios où le chargement dépend de conditions métier.</p>
                    <p class="text-gray-700">💡 Peut être utilisé avec <code>Query()</code> pour appliquer des filtres supplémentaires avant <code>Load()</code>.</p>
                `
            },
            {
                type: "content",
                title: "🧪 Comparatif visuel des 3 chargements",
                content: `
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 my-4 text-sm">
                        <div class="bg-white rounded-xl p-4 border shadow-sm"><span class="font-bold text-indigo-700">Eager (.Include)</span><br/>📦 1 requête SQL (JOIN) → rapide mais charge tout dès le début.</div>
                        <div class="bg-white rounded-xl p-4 border shadow-sm"><span class="font-bold text-indigo-700">Lazy (Proxy)</span><br/>🐢 1 requête par entité + N requêtes pour les navs → risque de lenteur.</div>
                        <div class="bg-white rounded-xl p-4 border shadow-sm"><span class="font-bold text-indigo-700">Explicit (.Load)</span><br/>🎮 Contrôle total, charge après requête principale si condition remplie.</div>
                    </div>
                    <p class="text-center text-gray-500 text-sm italic">✅ Recommendation API REST : Eager Loading pour les endpoints prévisibles, Explicit pour les cas complexes.</p>
                `
            },
            {
                type: "content",
                title: "🏗️ Exemple concret Many-to-Many",
                content: `
                    <p class="text-gray-700"><strong>Modèle étudiants ↔ cours</strong> : un étudiant peut suivre plusieurs cours, un cours a plusieurs étudiants.</p>
                    <div class="bg-gray-900 text-gray-100 p-3 rounded-md my-3 overflow-x-auto text-xs md:text-sm">
                        <pre>public class Student
{
    public int Id { get; set; }
    public string Name { get; set; }
    public ICollection<Course> Courses { get; set; }
}
public class Course
{
    public int Id { get; set; }
    public string Title { get; set; }
    public ICollection<Student> Students { get; set; }
}
// Avec EF Core 7+ la table de jonction est automatique. Chargement via Include :
var studentWithCourses = context.Students
                                 .Include(s => s.Courses)
                                 .FirstOrDefault();</pre>
                    </div>
                    <p class="text-gray-600 mt-1">On peut accéder à <code>student.Courses</code> après Include, évite des requêtes supplémentaires.</p>
                `
            },
            {
                type: "content",
                title: "🎓 Résumé & bonnes pratiques",
                content: `
                    <ul class="list-disc pl-6 space-y-2 text-gray-700">
                        <li>✔️ Toujours penser aux performances lors du chargement des relations.</li>
                        <li>✔️ Pour les API, privilégier <span class="font-semibold">Eager Loading</span> (Include) afin d'éviter le problème N+1.</li>
                        <li>✔️ Désactiver le Lazy Loading par défaut dans les projets de production sauf cas spécifiques.</li>
                        <li>✔️ Utiliser <code>Select</code> et les projections (DTO) pour ne charger que les champs nécessaires, améliorant les perfs.</li>
                        <li>✔️ <code>ThenInclude</code> chaîne les includes secondaires, pensez aux chemins profonds.</li>
                    </ul>
                    <div class="bg-green-100 p-4 rounded-xl mt-5 border border-green-300 text-green-800">
                        🔥 <strong>À retenir pour l'examen / projet :</strong> sachez distinguer les trois chargements, et implémentez au moins un Include dans vos contrôleurs pour prouver la maîtrise d'EF Core !
                    </div>
                `
            }
        ];

        // État des slides
        let currentSlideIndex = 0;
        let totalSlides = slidesData.length;

        // Rendu d'un slide selon son type
        function renderSlide(slide, idx) {
            const isActive = idx === currentSlideIndex ? "block" : "hidden";
            if (slide.type === "title") {
                return `
                    <div class="slide bg-white/90 backdrop-blur-sm rounded-3xl card-shadow p-6 md:p-10 text-center transition-all" data-slide-index="${idx}">
                        <div class="text-7xl mb-4">${slide.icon || "📖"}</div>
                        <h1 class="text-3xl md:text-5xl font-extrabold bg-gradient-to-r from-indigo-700 to-purple-700 bg-clip-text text-transparent">${slide.title}</h1>
                        <p class="text-gray-600 mt-4 text-lg">${slide.subtitle}</p>
                        <div class="mt-8 text-sm text-indigo-500 font-mono">Leçon 14 · Relations & Chargements</div>
                    </div>
                `;
            }
            else if (slide.type === "objectifs") {
                return `
                    <div class="slide bg-white rounded-3xl card-shadow p-6 md:p-8" data-slide-index="${idx}">
                        <h2 class="text-2xl md:text-3xl font-bold text-indigo-800 border-b border-indigo-200 pb-3 mb-5">${slide.title}</h2>
                        <ul class="space-y-3 text-gray-700 text-base md:text-lg">
                            ${slide.objectives.map(obj => `<li class="flex items-start gap-3"><span class="text-indigo-600 text-xl">🎯</span> <span>${obj}</span></li>`).join('')}
                        </ul>
                        <div class="mt-6 bg-indigo-50 p-3 rounded-xl text-indigo-700 text-sm italic">
                            ⭐ À la fin de cette leçon, vous saurez modéliser des bases relationnelles avancées avec EF Core.
                        </div>
                    </div>
                `;
            }
            else if (slide.type === "content") {
                return `
                    <div class="slide bg-white rounded-3xl card-shadow p-6 md:p-8" data-slide-index="${idx}">
                        <h2 class="text-xl md:text-2xl font-bold text-gray-800 border-l-4 border-indigo-500 pl-3 mb-5">${slide.title}</h2>
                        <div class="prose max-w-none text-gray-700">
                            ${slide.content}
                        </div>
                        <div class="mt-6 text-right text-xs text-gray-400">Slide ${idx+1}/${totalSlides}</div>
                    </div>
                `;
            }
            return `<div class="slide bg-white p-6 rounded-2xl">Contenu générique</div>`;
        }

        // Mise à jour de l'affichage complet
        function updateSlidesDisplay() {
            $(".slide").each(function() {
                const slideIdx = parseInt($(this).data("slide-index"));
                if (slideIdx === currentSlideIndex) {
                    $(this).removeClass("hidden").fadeIn(150);
                } else {
                    $(this).addClass("hidden");
                }
            });
            $("#slideCounter").text(currentSlideIndex + 1);
            $("#totalSlides").text(totalSlides);
            // Scroll en haut pour chaque slide (meilleure expérience mobile)
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        // Construire tous les slides dans le DOM
        function buildSlides() {
            const container = $("#slidesRoot");
            container.empty();
            slidesData.forEach((slide, i) => {
                const slideHtml = renderSlide(slide, i);
                const $slideElem = $(slideHtml);
                $slideElem.attr("data-slide-index", i);
                if (i !== currentSlideIndex) $slideElem.addClass("hidden");
                container.append($slideElem);
            });
            $("#totalSlides").text(totalSlides);
            $("#slideCounter").text(currentSlideIndex + 1);
        }

        // Navigation
        function goPrev() {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                updateSlidesDisplay();
            } else {
                // Effet visuel notification bordereau
                $("#prevSlide").addClass("ring-2 ring-red-300");
                setTimeout(() => $("#prevSlide").removeClass("ring-2 ring-red-300"), 300);
            }
        }

        function goNext() {
            if (currentSlideIndex < totalSlides - 1) {
                currentSlideIndex++;
                updateSlidesDisplay();
            } else {
                $("#nextSlide").addClass("ring-2 ring-green-400");
                setTimeout(() => $("#nextSlide").removeClass("ring-2 ring-green-400"), 300);
            }
        }

        // Gestion touches clavier (gauche/droite)
        $(document).on("keydown", function(e) {
            if (e.key === "ArrowLeft") {
                goPrev();
                e.preventDefault();
            } else if (e.key === "ArrowRight") {
                goNext();
                e.preventDefault();
            }
        });

        // Initialisation
        $(document).ready(function() {
            buildSlides();
            // Événements boutons
            $("#prevSlide").on("click", goPrev);
            $("#nextSlide").on("click", goNext);
            // Ajout d'un petit tooltip sur les boutons pour mobile
            $(".btn-nav").on("touchstart", function() {
                $(this).css("transform", "scale(0.97)");
                setTimeout(() => $(this).css("transform", ""), 150);
            });
            // Ajustement MathJax au besoin
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        });
    </script>
    <!-- note: toutes les informations de la lesson14 sont couvertes (relations 1-N, M-N, Include, Lazy, Explicit) -->
    <footer class="text-center text-gray-400 text-xs py-6 border-t border-gray-200 mt-4">
        Cours ASP.NET Core API - Relations EF Core | Chargement de données | Enseignant Cameroun 🇨🇲
    </footer>
</body>
</html>
