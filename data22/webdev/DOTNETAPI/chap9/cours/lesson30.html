<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leçon 30 : Cache & Performance - API .NET Core</title>
    <!-- Tailwind CSS + Font Awesome (pour icones) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax (formules mathématiques si besoin, discret) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <!-- personnalisation tailwind + transitions simples -->
    <style>
        /* transitions pour slides */
        .slide {
            transition: opacity 0.3s ease-in-out, transform 0.3s ease;
        }
        .slide.hidden-slide {
            display: none;
            opacity: 0;
            transform: translateX(20px);
        }
        .slide:not(.hidden-slide) {
            display: block;
            opacity: 1;
            transform: translateX(0);
        }
        body {
            background: #f4f7fc; /* fond doux */
        }
        /* amélioration du contraste pour les cartes */
        .card-hover:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px -12px rgba(0,0,0,0.15);
            transition: all 0.2s;
        }
        /* personnalisation pour les petits écrans */
        @media (max-width: 640px) {
            .container-slide {
                padding-left: 0.75rem;
                padding-right: 0.75rem;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
        /* barre de progression */
        .progress-bar {
            background-color: #e2e8f0;
            border-radius: 20px;
            overflow: hidden;
        }
        .progress-fill {
            background-color: #3b82f6;
            width: 0%;
            height: 0.5rem;
            transition: width 0.2s;
        }
        .btn-nav {
            transition: background 0.2s, transform 0.1s;
        }
        .btn-nav:active {
            transform: scale(0.97);
        }
        /* style code mock */
        .code-block {
            background: #1e293b;
            color: #e2e8f0;
            border-radius: 12px;
            padding: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            overflow-x: auto;
        }
    </style>
</head>
<body class="font-sans antialiased">

    <div class="max-w-5xl mx-auto px-4 py-6 md:py-10 container-slide">
        <!-- Navigation et indicateur de progression -->
        <div class="flex justify-between items-center mb-6 flex-wrap gap-3">
            <div class="flex items-center space-x-3">
                <button id="prevSlide" class="btn-nav bg-white hover:bg-gray-100 text-gray-800 font-semibold py-2 px-4 rounded-lg shadow-md border border-gray-300 disabled:opacity-50 disabled:cursor-not-allowed">◀ Précédent</button>
                <button id="nextSlide" class="btn-nav bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-5 rounded-lg shadow-md">Suivant ▶</button>
            </div>
            <div class="text-sm text-gray-600 bg-white/70 px-3 py-1 rounded-full shadow-sm">
                <span id="slideCounter">1</span> / <span id="totalSlides">0</span>
            </div>
        </div>
        
        <!-- Barre de progression -->
        <div class="progress-bar mb-8">
            <div id="progressFill" class="progress-fill"></div>
        </div>

        <!-- CONTENEUR DES SLIDES (injecté dynamiquement mais on peut aussi le générer en dur, pour rester clair on construira en JS mais on peut prévoir structure) -->
        <div id="slidesContainer" class="relative"></div>

        <!-- Pied de page indicateur rapide -->
        <div class="mt-10 text-center text-xs text-gray-500 border-t pt-6">
            <p>📘 Leçon 30 · API .NET Core - Optimisation des performances & cache | <span id="mobileTip">👆 Glisser ou utiliser boutons</span></p>
        </div>
    </div>

    <script>
        // Données de la leçon 30: Titre, objectifs, contenu structuré en slides.
        // basé sur les objectifs de la leçon 30 (lesson30) du programme JSON:
        // Objectifs: [ "Utiliser [ResponseCache] pour le cache côté client",
        //             "Implémenter IMemoryCache pour le cache en mémoire",
        //             "Configurer la durée d'expiration et les dépendances" ]
        // Nous créons 1 slide titre + 1 slide objectifs + 3 slides de contenu (un par objectif)
        const lessonData = {
            title: "🚀 Optimisation des performances & mise en cache",
            subtitle: "ASP.NET Core – Améliorez la réactivité de votre API",
            objectives: [
                "✅ Utiliser l'attribut [ResponseCache] pour le cache HTTP (côté client / proxy)",
                "✅ Implémenter IMemoryCache pour le cache en mémoire côté serveur",
                "✅ Configurer la durée d'expiration, les dépendances et bonnes pratiques"
            ],
            slidesContent: [
                {
                    type: "content",
                    title: "📦 [ResponseCache] – Cache côté client",
                    explanation: "L'attribut `[ResponseCache]` permet d'ajouter des en-têtes HTTP `Cache-Control` pour que le navigateur ou les proxies intermédiaires mettent en cache la réponse. Réduit la charge serveur et améliore la latence perçue.",
                    codeExample: `// Dans un contrôleur API
[HttpGet("produits")]
[ResponseCache(Duration = 60, Location = ResponseCacheLocation.Any, NoStore = false)]
public IActionResult GetProduits()
{
    var produits = _service.GetAll(); // données coûteuses
    return Ok(produits);
}

// Paramètres clés:
// - Duration: secondes de validité
// - Location: Any, Client, None (Any = navigateur + proxy)
// - VaryByHeader: varier selon un en-tête (ex: "Accept-Encoding")
// - CacheProfileName: réutiliser un profil défini dans Program.cs`,
                    tips: "💡 Idéal pour les données rarement modifiées (liste de catégories, référentiels). Attention aux données personnalisées par utilisateur !"
                },
                {
                    type: "content",
                    title: "🧠 IMemoryCache – Cache en mémoire sur le serveur",
                    explanation: "Le cache `IMemoryCache` stocke les données dans le processus du serveur. Évite des accès répétés à la base de données ou à des services lents. Très efficace pour des calculs ou des appels externes.",
                    codeExample: `// 1. Enregistrer le service dans Program.cs
builder.Services.AddMemoryCache();

// 2. Injecter IMemoryCache dans votre service/contrôleur
public class ProduitService : IProduitService
{
    private readonly IMemoryCache _cache;
    public ProduitService(IMemoryCache cache) => _cache = cache;
    
    public async Task<List<Produit>> GetProduitsAsync()
    {
        return await _cache.GetOrCreateAsync("tous_produits", async entry =>
        {
            entry.SlidingExpiration = TimeSpan.FromMinutes(5);
            entry.AbsoluteExpirationRelativeToNow = TimeSpan.FromHours(1);
            // Logique coûteuse
            return await _dbContext.Produits.ToListAsync();
        });
    }
}

// Ou manuellement: _cache.Set("cle", valeur, options);`,
                    tips: "⚠️ Le cache mémoire partage la RAM du serveur : pour les applications web en cluster, préférez Redis (Distributed Cache). Mais pour débuter, IMemoryCache est simple & rapide."
                },
                {
                    type: "content",
                    title: "⏱️ Durée d’expiration & dépendances (Cache intelligent)",
                    explanation: "Pour ne pas servir des données obsolètes, configurez une expiration absolue ou glissante. Vous pouvez aussi créer des dépendances entre caches ou invalider manuellement.",
                    codeExample: `// Options disponibles:
var cacheEntryOptions = new MemoryCacheEntryOptions()
    .SetAbsoluteExpiration(TimeSpan.FromMinutes(10))   // Expiration fixe
    .SetSlidingExpiration(TimeSpan.FromMinutes(2))     // expire si non utilisé pendant 2min
    .SetPriority(CacheItemPriority.High)
    .RegisterPostEvictionCallback((key, value, reason, state) =>
    {
        Console.WriteLine($"Cache supprimé pour {key}, raison: {reason}");
    });

_cache.Set("donnee_importante", data, cacheEntryOptions);

// Invalider manuellement:
_cache.Remove("donnee_importante");

// Dépendance avec IChangeToken (ex: fichier modifié)
var cts = new CancellationTokenSource();
_cache.Set("config", configData, new MemoryCacheEntryOptions()
    .AddExpirationToken(new CancellationChangeToken(cts.Token)));
// Invalider avec: cts.Cancel();`,
                    tips: "🏆 Pratique avancée : utilisez `GetOrCreateAsync` pour une logique 'cache-aside' robuste. Évitez les 'cache stampedes' en verrouillant avec `SemaphoreSlim` si nécessaire."
                }
            ]
        };

        // Génération des slides dans le container
        let slides = [];
        let currentIndex = 0;

        function buildSlides() {
            const container = $("#slidesContainer");
            container.empty();
            slides = [];

            // Slide 0 : Titre principal
            const titleSlide = $(`<div class="slide bg-white rounded-2xl shadow-xl p-6 md:p-8 mb-4 transition-all" data-slide="title"></div>`);
            titleSlide.html(`
                <div class="text-center">
                    <span class="inline-block bg-blue-100 text-blue-800 text-sm font-semibold px-3 py-1 rounded-full mb-4">📖 Leçon 30 · API .NET Core</span>
                    <h1 class="text-3xl md:text-5xl font-extrabold text-gray-800 mb-4">${escapeHtml(lessonData.title)}</h1>
                    <p class="text-lg text-gray-600 max-w-2xl mx-auto">${escapeHtml(lessonData.subtitle)}</p>
                    <div class="mt-8 flex justify-center">
                        <div class="bg-gray-50 rounded-2xl p-5 inline-block">
                            <svg class="w-16 h-16 text-blue-500 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                            <p class="text-sm text-gray-500 mt-2">Performances ⚡ Cache</p>
                        </div>
                    </div>
                </div>
            `);
            slides.push(titleSlide);

            // Slide 1 : Objectifs pédagogiques
            const objectivesSlide = $(`<div class="slide bg-white rounded-2xl shadow-xl p-6 md:p-8 mb-4" data-slide="objectifs"></div>`);
            let objectivesHtml = `<h2 class="text-2xl md:text-3xl font-bold text-gray-800 border-l-4 border-blue-500 pl-4 mb-6">🎯 Objectifs de la leçon</h2><ul class="space-y-4">`;
            lessonData.objectives.forEach(obj => {
                objectivesHtml += `<li class="flex items-start gap-3 text-gray-700"><span class="text-green-500 text-xl">✓</span> <span class="text-base md:text-lg">${escapeHtml(obj)}</span></li>`;
            });
            objectivesHtml += `</ul><div class="mt-8 bg-blue-50 p-4 rounded-xl"><p class="text-blue-800"><span class="font-bold">💡 Pourquoi ?</span> Une API rapide = meilleure expérience utilisateur + économie de ressources serveur.</p></div>`;
            objectivesSlide.html(objectivesHtml);
            slides.push(objectivesSlide);

            // Slides de contenu (3 contenu)
            lessonData.slidesContent.forEach((cont, idx) => {
                const contentSlide = $(`<div class="slide bg-white rounded-2xl shadow-xl p-6 md:p-8 mb-4" data-slide="content-${idx}"></div>`);
                let htmlContent = `
                    <h2 class="text-2xl font-bold text-gray-800 mb-3 flex items-center gap-2">${escapeHtml(cont.title)}</h2>
                    <div class="prose max-w-none text-gray-700 space-y-4">
                        <p class="text-base leading-relaxed">${escapeHtml(cont.explanation)}</p>
                        <div class="code-block my-4">
                            <pre class="whitespace-pre-wrap break-words text-sm">${escapeHtml(cont.codeExample)}</pre>
                        </div>
                        <div class="bg-amber-50 p-4 rounded-lg border-l-4 border-amber-400">
                            <p class="font-semibold text-amber-800">📌 Astuce pratique :</p>
                            <p class="text-amber-700">${escapeHtml(cont.tips)}</p>
                        </div>
                    </div>
                `;
                // Ajout d'un petit schéma dessiné pour le cache (uniquement si utile)
                if (idx === 0) {
                    htmlContent += `
                        <div class="mt-6 grid grid-cols-1 md:grid-cols-2 gap-4 text-center text-sm">
                            <div class="bg-gray-100 p-3 rounded-xl">
                                <span class="font-mono">🌐 Client (navigateur)</span>
                                <div class="text-2xl">🔄</div>
                                <span>Cache-Control: max-age=60</span>
                            </div>
                            <div class="bg-gray-100 p-3 rounded-xl">
                                <span class="font-mono">☁️ Proxy / CDN</span>
                                <div class="text-2xl">⚡</div>
                                <span>Réponse depuis cache</span>
                            </div>
                        </div>
                    `;
                } else if (idx === 1) {
                    htmlContent += `
                        <div class="mt-5 flex justify-center">
                            <div class="bg-gradient-to-r from-indigo-50 to-blue-50 p-3 rounded-2xl w-full max-w-sm text-center">
                                <p class="font-semibold">🏛️ Serveur API → IMemoryCache</p>
                                <div class="flex justify-around text-2xl my-2">📦 ➡️ 🚀</div>
                                <p class="text-xs">Données en RAM: accès ultra-rapide</p>
                            </div>
                        </div>
                    `;
                }
                contentSlide.html(htmlContent);
                slides.push(contentSlide);
            });

            // Slide de conclusion / récapitulatif rapide pour bien finir
            const conclusionSlide = $(`<div class="slide bg-white rounded-2xl shadow-xl p-6 md:p-8 mb-4" data-slide="conclusion"></div>`);
            conclusionSlide.html(`
                <h2 class="text-2xl font-bold text-gray-800 mb-4">🏁 En résumé : performances & cache</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="border rounded-xl p-4 text-center"><span class="text-3xl">📄</span><p class="font-medium mt-2">[ResponseCache]</p><p class="text-xs text-gray-500">Cache HTTP (client/proxy)</p></div>
                    <div class="border rounded-xl p-4 text-center"><span class="text-3xl">💾</span><p class="font-medium mt-2">IMemoryCache</p><p class="text-xs text-gray-500">Cache serveur en mémoire</p></div>
                    <div class="border rounded-xl p-4 text-center"><span class="text-3xl">⏲️</span><p class="font-medium mt-2">Expiration & dépendances</p><p class="text-xs text-gray-500">Sliding/Absolute + invalidation</p></div>
                </div>
                <p class="mt-6 text-gray-700 text-center">✨ Appliquer ces techniques rend votre API .NET Core réactive et scalable !</p>
                <div class="mt-4 text-center text-blue-600">🎉 Fin de la leçon 30 – Pratiquez avec un projet réel</div>
            `);
            slides.push(conclusionSlide);

            // Ajout au DOM
            slides.forEach(slide => {
                container.append(slide);
            });
            $("#totalSlides").text(slides.length);
            updateSlideVisibility();
            updateCounterAndProgress();
        }

        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }

        function updateSlideVisibility() {
            slides.forEach((slide, idx) => {
                if (idx === currentIndex) {
                    slide.removeClass('hidden-slide');
                } else {
                    slide.addClass('hidden-slide');
                }
            });
            updateCounterAndProgress();
            // Scroll en haut pour meilleure UX sur mobile
            $('html, body').animate({ scrollTop: 0 }, 100);
        }

        function updateCounterAndProgress() {
            $("#slideCounter").text(currentIndex + 1);
            const total = slides.length;
            const percent = ((currentIndex) / (total - 1)) * 100;
            $("#progressFill").css("width", percent + "%");
            // gestion désactivation boutons
            $("#prevSlide").prop("disabled", currentIndex === 0);
            $("#nextSlide").prop("disabled", currentIndex === total - 1);
            if (currentIndex === total - 1) {
                $("#nextSlide").text("Terminé ✓");
            } else {
                $("#nextSlide").text("Suivant ▶");
            }
        }

        function nextSlide() {
            if (currentIndex < slides.length - 1) {
                currentIndex++;
                updateSlideVisibility();
            }
        }

        function prevSlide() {
            if (currentIndex > 0) {
                currentIndex--;
                updateSlideVisibility();
            }
        }

        // Gestion swipe pour mobile (avec jQuery + events tactiles)
        let touchStartX = 0;
        let touchEndX = 0;
        function handleTouchStart(e) {
            touchStartX = e.originalEvent.touches[0].clientX;
        }
        function handleTouchEnd(e) {
            if (touchStartX === 0) return;
            touchEndX = e.originalEvent.changedTouches[0].clientX;
            const diff = touchEndX - touchStartX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) {
                    prevSlide();
                } else {
                    nextSlide();
                }
            }
            touchStartX = 0;
        }

        $(document).ready(function() {
            buildSlides();
            // Event listeners
            $("#nextSlide").on("click", nextSlide);
            $("#prevSlide").on("click", prevSlide);
            // Support clavier (flèches)
            $(document).on("keydown", function(e) {
                if (e.key === "ArrowRight") {
                    nextSlide();
                    e.preventDefault();
                } else if (e.key === "ArrowLeft") {
                    prevSlide();
                    e.preventDefault();
                }
            });
            // swipe mobile
            const containerElem = document.getElementById("slidesContainer");
            if (containerElem) {
                $(containerElem).on("touchstart", handleTouchStart);
                $(containerElem).on("touchend", handleTouchEnd);
            }
            // petit ajustement: pour éviter les conflits avec les boutons
            $(".btn-nav").on("touchstart", function(e) {
                e.stopPropagation();
            });
        });
    </script>
</body>
</html>
