<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Leçon 31 : Rate Limiting - Protéger vos API ASP.NET Core</title>
    <!-- Tailwind CSS + Font Awesome (icônes) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MathJax pour formules (si besoin) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        .slide-container {
            transition: opacity 0.25s ease-in-out;
        }
        .fadeIn {
            animation: fadeSlide 0.3s ease-out;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .nav-btn:active {
            transform: scale(0.96);
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #6366f1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-indigo-50 antialiased">

    <main class="max-w-5xl mx-auto px-4 py-6 md:py-10">
        <div class="relative bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl overflow-hidden border border-indigo-200">
            <!-- en-tête -->
            <div class="bg-gradient-to-r from-indigo-800 to-cyan-800 px-5 py-4 text-white flex justify-between items-center flex-wrap gap-2">
                <div class="flex items-center gap-2">
                    <span class="text-2xl">⏱️</span>
                    <span class="font-bold tracking-wide">API .NET (ASP.NET Core) | Performance</span>
                </div>
                <span class="bg-white/20 text-xs px-3 py-1 rounded-full">Leçon 31 · Rate Limiting intégré (.NET 7+)</span>
            </div>

            <!-- zone slides dynamiques -->
            <div id="slides-wrapper" class="p-5 md:p-8 min-h-[500px] flex flex-col">
                <!-- contenu injecté jQuery -->
            </div>

            <!-- navigation -->
            <div class="border-t border-gray-200 bg-gray-50/90 px-5 py-4 flex flex-wrap justify-between items-center gap-3">
                <div class="flex gap-2">
                    <button id="prevSlide" class="nav-btn bg-white border border-gray-300 hover:bg-indigo-100 text-indigo-800 font-medium py-2 px-4 rounded-xl shadow-sm flex items-center gap-1 text-sm md:text-base transition">◀ Précédent</button>
                    <button id="nextSlide" class="nav-btn bg-indigo-700 hover:bg-indigo-800 text-white font-medium py-2 px-5 rounded-xl shadow-md flex items-center gap-1 text-sm md:text-base transition">Suivant ▶</button>
                </div>
                <div class="flex items-center gap-2 text-sm text-gray-600 bg-white px-3 py-1 rounded-full shadow-inner">
                    <span id="slideCounter">Slide 1 / 1</span>
                    <span class="w-1.5 h-1.5 rounded-full bg-indigo-400"></span>
                    <span class="hidden sm:inline">Rate Limiting</span>
                </div>
                <div class="flex gap-1" id="dotsIndicator"></div>
            </div>
        </div>
        <p class="text-center text-xs text-gray-500 mt-5">🔁 Utilisez les boutons ou flèches ← → pour naviguer. Apprenez à contrôler le flux de requêtes.</p>
    </main>

    <script>
        // ----- SLIDES POUR LEÇON 31 (Rate Limiting) -----
        const slides = [
            { // Slide 0 : Titre
                type: "title",
                content: `
                    <div class="flex flex-col items-center justify-center text-center h-full min-h-[450px]">
                        <div class="bg-indigo-100 rounded-full p-4 mb-5 shadow-md">
                            <svg class="w-12 h-12 text-indigo-700" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                        </div>
                        <h1 class="text-3xl md:text-5xl font-extrabold bg-gradient-to-r from-indigo-800 to-cyan-700 bg-clip-text text-transparent">Rate Limiting</h1>
                        <p class="text-gray-600 max-w-xl mx-auto mt-4 text-lg">Protéger vos API ASP.NET Core contre les abus et les attaques DDoS</p>
                        <div class="flex flex-wrap gap-2 justify-center mt-6 text-sm">
                            <span class="bg-gray-100 px-3 py-1 rounded-full">⛔ Fixed Window</span>
                            <span class="bg-gray-100 px-3 py-1 rounded-full">🔄 Sliding Window</span>
                            <span class="bg-gray-100 px-3 py-1 rounded-full">🪣 Token Bucket</span>
                            <span class="bg-gray-100 px-3 py-1 rounded-full">⚙️ Middleware natif .NET 7+</span>
                        </div>
                    </div>
                `
            },
            { // Slide 1 : Objectifs pédagogiques
                type: "objectifs",
                content: `
                    <div class="h-full">
                        <h2 class="text-2xl md:text-3xl font-bold text-indigo-800 border-l-5 border-indigo-500 pl-4 mb-6">🎯 Objectifs de la leçon</h2>
                        <div class="grid md:grid-cols-2 gap-5">
                            <div class="bg-indigo-50 rounded-xl p-4 shadow-sm"><div class="font-bold text-indigo-800">1. Comprendre</div><p class="text-gray-700">L'importance du rate limiting pour la sécurité et la disponibilité des API.</p></div>
                            <div class="bg-indigo-50 rounded-xl p-4 shadow-sm"><div class="font-bold text-indigo-800">2. Distinguer</div><p class="text-gray-700">Les algorithmes : Fixed Window, Sliding Window, Token Bucket, Concurrency.</p></div>
                            <div class="bg-indigo-50 rounded-xl p-4 shadow-sm"><div class="font-bold text-indigo-800">3. Configurer</div><p class="text-gray-700">Le rate limiting dans Program.cs avec les extensions .NET 7+.</p></div>
                            <div class="bg-indigo-50 rounded-xl p-4 shadow-sm"><div class="font-bold text-indigo-800">4. Appliquer</div><p class="text-gray-700">Des politiques sur des endpoints spécifiques et gérer les réponses 429 (Too Many Requests).</p></div>
                        </div>
                        <div class="mt-6 p-3 bg-cyan-50 rounded-lg text-cyan-800 text-sm italic">💡 À la fin, vous saurez intégrer du rate limiting pour renforcer vos API contre les abus !</div>
                    </div>
                `
            },
            { // Slide 2 : Pourquoi Rate Limiting ?
                type: "content",
                content: `
                    <div>
                        <h2 class="text-xl md:text-2xl font-bold text-indigo-800 flex items-center gap-2">⚠️ Pourquoi limiter le débit des requêtes ?</h2>
                        <div class="grid md:grid-cols-2 gap-4 mt-4">
                            <div class="bg-red-50 p-4 rounded-xl border-l-4 border-red-400">
                                <div class="font-bold">🛡️ Prévention des attaques par déni de service (DDoS)</div>
                                <p class="text-sm">Un attaquant peut saturer votre serveur avec des milliers de requêtes par seconde.</p>
                            </div>
                            <div class="bg-amber-50 p-4 rounded-xl border-l-4 border-amber-400">
                                <div class="font-bold">🤖 Brute force & Credential stuffing</div>
                                <p class="text-sm">Limiter les tentatives de connexion / login protège les mots de passe.</p>
                            </div>
                            <div class="bg-emerald-50 p-4 rounded-xl border-l-4 border-emerald-400">
                                <div class="font-bold">💰 Équité entre utilisateurs</div>
                                <p class="text-sm">Éviter qu'un client consomme toutes les ressources (API publique).</p>
                            </div>
                            <div class="bg-purple-50 p-4 rounded-xl border-l-4 border-purple-400">
                                <div class="font-bold">📉 Maîtrise des coûts cloud</div>
                                <p class="text-sm">Moins de requêtes abusives = moins de facturation pour les services externes.</p>
                            </div>
                        </div>
                    </div>
                `
            },
            { // Slide 3 : Algorithmes de rate limiting
                type: "content",
                content: `
                    <div>
                        <h2 class="text-xl md:text-2xl font-bold text-indigo-800">📐 Les algorithmes de rate limiting (intégrés .NET)</h2>
                        <div class="space-y-3 mt-3">
                            <div class="bg-gray-50 p-3 rounded-lg border"><span class="font-mono font-bold">Fixed Window</span> – Fenêtre fixe de temps (ex: 100 requêtes / minute). Simple mais peut créer des pics en bordure de fenêtre.</div>
                            <div class="bg-gray-50 p-3 rounded-lg border"><span class="font-mono font-bold">Sliding Window</span> – Découpe le temps en segments, lisse les pics. Plus précis.</div>
                            <div class="bg-gray-50 p-3 rounded-lg border"><span class="font-mono font-bold">Token Bucket</span> – Un seau contient des jetons; chaque requête consomme un jeton. Permet des rafales contrôlées.</div>
                            <div class="bg-gray-50 p-3 rounded-lg border"><span class="font-mono font-bold">Concurrency</span> – Limite le nombre de requêtes simultanées (utile pour les fichiers lourds).</div>
                        </div>
                        <div class="mt-4 bg-indigo-50 p-3 rounded text-indigo-800 text-sm">⭐ Depuis .NET 7, Microsoft.AspNetCore.RateLimiting est intégré nativement.</div>
                    </div>
                `
            },
            { // Slide 4 : Configuration de base (Program.cs)
                type: "content",
                content: `
                    <div>
                        <h2 class="text-xl md:text-2xl font-bold text-indigo-800">⚙️ Installation et configuration minimale</h2>
                        <p class="mt-1 text-gray-700">Package déjà inclus dans .NET 7/8 : <code class="bg-gray-100 px-1 rounded">Microsoft.AspNetCore.RateLimiting</code>.</p>
                        <div class="bg-gray-900 text-green-300 p-4 rounded-lg mt-4 overflow-x-auto">
                            <pre><code>// Program.cs
using Microsoft.AspNetCore.RateLimiting;
using System.Threading.RateLimiting;

var builder = WebApplication.CreateBuilder(args);

// Ajouter une politique de rate limiting (Fixed Window)
builder.Services.AddRateLimiter(options =>
{
    options.AddFixedWindowLimiter("FixedPolicy", opt =>
    {
        opt.PermitLimit = 100;        // 100 requêtes
        opt.Window = TimeSpan.FromMinutes(1); // par minute
        opt.QueueProcessingOrder = QueueProcessingOrder.OldestFirst;
        opt.QueueLimit = 2;            // file d'attente max
    });
});

var app = builder.Build();
app.UseRateLimiter();  // activer le middleware
app.MapControllers();
app.Run();</code></pre>
                        </div>
                    </div>
                `
            },
            { // Slide 5 : Appliquer des politiques sur les endpoints
                type: "content",
                content: `
                    <div>
                        <h2 class="text-xl md:text-2xl font-bold text-indigo-800">🎯 Utiliser [EnableRateLimiting] et [DisableRateLimiting]</h2>
                        <p class="text-gray-700">Contrôlez finement quel endpoint est limité.</p>
                        <div class="bg-gray-800 text-gray-100 p-4 rounded-lg mt-3">
                            <pre><code>// Controller avec attribution
[ApiController]
[Route("api/products")]
public class ProductsController : ControllerBase
{
    [HttpGet]
    [EnableRateLimiting("FixedPolicy")]   // applique la politique nommée
    public IActionResult GetProducts() { ... }

    [HttpPost]
    [DisableRateLimiting]                // pas de limitation
    public IActionResult Create() { ... }
}</code></pre>
                        </div>
                        <p class="mt-3 text-sm text-gray-500">On peut aussi appliquer des politiques globales, par partition (clé utilisateur, IP, ...).</p>
                    </div>
                `
            },
            { // Slide 6 : Politique par utilisateur (IP / JWT claim)
                type: "content",
                content: `
                    <div>
                        <h2 class="text-xl md:text-2xl font-bold text-indigo-800">🔑 Limitation par identifiant client (IP ou UserId)</h2>
                        <p class="text-gray-700">Partitionnement dynamique avec <code>PartitionedRateLimiter</code>.</p>
                        <div class="bg-gray-800 text-green-200 p-4 rounded-lg mt-3 text-sm overflow-x-auto">
                            <pre><code>options.AddPolicy("PerUserPolicy", httpContext =>
{
    var userId = httpContext.User.FindFirst("sub")?.Value 
                 ?? httpContext.Connection.RemoteIpAddress?.ToString();
    return RateLimitPartition.GetFixedWindowLimiter(userId, _ => new FixedWindowRateLimiterOptions
    {
        PermitLimit = 50,
        Window = TimeSpan.FromMinutes(1)
    });
});</code></pre>
                        </div>
                        <p class="mt-2 text-gray-600">Chaque utilisateur/IP a son propre compteur. Idéal pour les API avec authentification.</p>
                    </div>
                `
            },
            { // Slide 7 : Réponse HTTP 429 et personnalisation
                type: "content",
                content: `
                    <div>
                        <h2 class="text-xl md:text-2xl font-bold text-indigo-800">🚦 Gérer les requêtes rejetées (429 Too Many Requests)</h2>
                        <p>Par défaut, le middleware retourne <span class="font-mono">Status 429</span> avec l'en-tête <span class="font-mono">Retry-After</span>.</p>
                        <div class="bg-gray-100 p-3 rounded-lg mt-2">
                            <pre class="text-sm"><code>options.OnRejected = async (context, token) =>
{
    context.HttpContext.Response.StatusCode = 429;
    context.HttpContext.Response.Headers["Retry-After"] = "60";
    await context.HttpContext.Response.WriteAsync("Trop de requêtes. Réessayez dans une minute.", token);
};</code></pre>
                        </div>
                        <div class="mt-3 flex flex-wrap gap-2">
                            <span class="bg-yellow-100 px-3 py-1 rounded-full text-xs">⚠️ Personnalisez le message</span>
                            <span class="bg-blue-100 px-3 py-1 rounded-full text-xs">📝 Logger les abus</span>
                        </div>
                    </div>
                `
            },
            { // Slide 8 : Bonnes pratiques et conclusion
                type: "content",
                content: `
                    <div>
                        <h2 class="text-xl md:text-2xl font-bold text-indigo-800">✅ Bonnes pratiques pour le Rate Limiting</h2>
                        <ul class="list-disc list-inside space-y-2 mt-3 text-gray-700">
                            <li>Commencer avec des seuils larges, puis affiner selon les logs.</li>
                            <li>Protéger les endpoints d'authentification (login, inscription) en priorité.</li>
                            <li>Combiner rate limiting + WAF pour une défense en profondeur.</li>
                            <li>Utiliser des politiques différentes selon les rôles (utilisateur premium vs gratuit).</li>
                            <li>Surveiller les headers <code>X-RateLimit-*</code> (personnalisable).</li>
                        </ul>
                        <div class="mt-6 bg-green-50 p-4 rounded-xl border border-green-300 text-green-800 text-center">
                            ⚡ Le rate limiting est un pilier des API modernes. .NET 7+ le rend simple et performant.
                        </div>
                    </div>
                `
            }
        ];

        let currentSlideIndex = 0;
        const totalSlides = slides.length;

        function renderSlide() {
            const data = slides[currentSlideIndex];
            $('#slides-wrapper').html(`<div class="slide-container fadeIn w-full">${data.content}</div>`);
            $('#slideCounter').text(`Slide ${currentSlideIndex+1} / ${totalSlides}`);

            // Génération des indicateurs
            let dotsHtml = '';
            for (let i = 0; i < totalSlides; i++) {
                const active = i === currentSlideIndex ? 'bg-indigo-600 w-6' : 'bg-gray-300 w-2';
                dotsHtml += `<button class="dot-indicator h-2 rounded-full transition-all ${active} mx-1 hover:bg-indigo-400" data-index="${i}"></button>`;
            }
            $('#dotsIndicator').html(dotsHtml);
            $('.dot-indicator').on('click', function() {
                const idx = parseInt($(this).data('index'));
                if (!isNaN(idx) && idx !== currentSlideIndex && idx >=0 && idx < totalSlides) {
                    currentSlideIndex = idx;
                    renderSlide();
                }
            });
            if (window.MathJax) MathJax.typesetPromise();
        }

        $('#prevSlide').on('click', () => {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                renderSlide();
            }
        });
        $('#nextSlide').on('click', () => {
            if (currentSlideIndex < totalSlides - 1) {
                currentSlideIndex++;
                renderSlide();
            } else {
                if (currentSlideIndex === totalSlides-1) {
                    const notif = $('<div class="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-indigo-800 text-white text-sm px-5 py-2 rounded-full shadow-lg z-50">✅ Fin du cours Rate Limiting ! Protégez vos API.</div>');
                    $('body').append(notif);
                    setTimeout(() => notif.fadeOut(500, function(){ $(this).remove(); }), 2500);
                }
            }
        });

        $(document).on('keydown', (e) => {
            if (e.key === 'ArrowLeft') $('#prevSlide').click();
            if (e.key === 'ArrowRight') $('#nextSlide').click();
        });

        renderSlide();
    </script>
</body>
</html>
