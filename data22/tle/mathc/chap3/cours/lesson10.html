<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }

    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }

    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }

    .content-card li:last-child {
        border-bottom: none;
    }

    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }

    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }

    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }

    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }

    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }

    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }

    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }

    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }

    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }

    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }

    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }

    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }

    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }

    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }

    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }

    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }

    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }

    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }

    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }

    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }

    /* Mode jour (par défaut) */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>

<div class="app-container">

    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>

    <main class="slide-body" id="slideBody"></main>

    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>

    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>

        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>

        <div class="auto-indicator" id="autoIndicator">⏸ Lecture manuelle</div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Introduction aux Espaces Vectoriels",
    "contenu": "<div style='display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center;'><h2 style='color: #2c3e50;'>Chapitre 3 : Espaces Vectoriels</h2><h1 style='color: #e74c3c; margin: 20px 0;'>Leçon 10 : Espaces Vectoriels</h1><div style='background-color: #ecf0f1; padding: 20px; border-radius: 10px; margin-top: 20px;'><p style='font-size: 1.2rem; color: #2c3e50;'>Objectifs de la leçon</p><ul style='text-align: left; color: #34495e;'><li>Vérifier qu'un ensemble est un espace vectoriel réel</li><li>Montrer qu'une partie est un sous-espace vectoriel</li><li>Déterminer si une famille de vecteurs est libre ou liée</li><li>Déterminer une base d'un espace vectoriel de dimension finie</li></ul></div></div>",
    "texteParle": "Bonjour à tous. Nous commençons aujourd'hui le chapitre 3 sur les espaces vectoriels et les applications linéaires. Cette première leçon est fondamentale car elle pose les bases de toute l'algèbre linéaire. Nous allons apprendre ce qu'est un espace vectoriel, comment vérifier qu'un ensemble en est un, et comment travailler avec les sous-espaces vectoriels, les familles libres et les bases.",
    "note": "Objectifs de la leçon 10 : Espaces Vectoriels"
  },
  {
    "titre": "Définition d'un espace vectoriel",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2c3e50;'>Espace vectoriel réel</h3><div style='background-color: #e8f4fd; padding: 15px; border-radius: 8px; margin: 10px 0;'><p style='font-weight: bold;'>Définition :</p><p>Un <span style='font-weight: bold;'>espace vectoriel réel</span> est un ensemble E non vide muni de deux lois :</p><ul><li>Une <span style='font-weight: bold;'>loi interne</span> d'addition : + : E × E → E</li><li>Une <span style='font-weight: bold;'>loi externe</span> de multiplication par un scalaire : · : ℝ × E → E</li></ul><p style='margin-top: 10px;'>Ces lois doivent vérifier <span style='font-weight: bold;'>8 axiomes</span>.</p></div><div style='background-color: #fff3cd; padding: 15px; border-radius: 8px; margin-top: 10px;'><p style='color: #856404; font-weight: bold;'>Exemples d'espaces vectoriels :</p><ul style='color: #856404;'><li>ℝ², ℝ³, ℝⁿ avec les opérations usuelles</li><li>L'ensemble des polynômes de degré ≤ n</li><li>L'ensemble des fonctions continues sur un intervalle</li></ul></div></div>",
    "texteParle": "Un espace vectoriel réel est un ensemble non vide sur lequel on définit deux opérations. Une addition qui permet de combiner deux éléments de l'ensemble, et une multiplication par un nombre réel. Ces deux opérations doivent vérifier huit axiomes que nous allons détailler. Les exemples les plus connus sont les espaces ℝ², ℝ³ et plus généralement ℝⁿ. Mais il y a aussi l'ensemble des polynômes de degré inférieur ou égal à n, ou encore l'ensemble des fonctions continues sur un intervalle. Tous ces ensembles sont des espaces vectoriels.",
    "note": "Un espace vectoriel est un ensemble avec deux lois vérifiant 8 axiomes"
  },
  {
    "titre": "Les 8 axiomes d'un espace vectoriel",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2c3e50;'>Axiomes d'espace vectoriel</h3><div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; margin: 10px 0;'><p style='font-weight: bold;'>Pour tout u, v, w ∈ E et α, β ∈ ℝ :</p><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 10px;'><div style='background-color: #e9ecef; padding: 8px; border-radius: 5px;'><p><span style='font-weight: bold;'>1.</span> u + v = v + u</p><p style='font-size: 0.9rem; color: #6c757d;'>Commutativité</p></div><div style='background-color: #e9ecef; padding: 8px; border-radius: 5px;'><p><span style='font-weight: bold;'>2.</span> u + (v + w) = (u + v) + w</p><p style='font-size: 0.9rem; color: #6c757d;'>Associativité</p></div><div style='background-color: #e9ecef; padding: 8px; border-radius: 5px;'><p><span style='font-weight: bold;'>3.</span> Il existe 0 ∈ E tel que u + 0 = u</p><p style='font-size: 0.9rem; color: #6c757d;'>Élément neutre</p></div><div style='background-color: #e9ecef; padding: 8px; border-radius: 5px;'><p><span style='font-weight: bold;'>4.</span> Pour tout u, il existe -u tel que u + (-u) = 0</p><p style='font-size: 0.9rem; color: #6c757d;'>Opposé</p></div><div style='background-color: #e9ecef; padding: 8px; border-radius: 5px;'><p><span style='font-weight: bold;'>5.</span> α·(β·u) = (αβ)·u</p><p style='font-size: 0.9rem; color: #6c757d;'>Associativité mixte</p></div><div style='background-color: #e9ecef; padding: 8px; border-radius: 5px;'><p><span style='font-weight: bold;'>6.</span> (α + β)·u = α·u + β·u</p><p style='font-size: 0.9rem; color: #6c757d;'>Distributivité 1</p></div><div style='background-color: #e9ecef; padding: 8px; border-radius: 5px;'><p><span style='font-weight: bold;'>7.</span> α·(u + v) = α·u + α·v</p><p style='font-size: 0.9rem; color: #6c757d;'>Distributivité 2</p></div><div style='background-color: #e9ecef; padding: 8px; border-radius: 5px;'><p><span style='font-weight: bold;'>8.</span> 1·u = u</p><p style='font-size: 0.9rem; color: #6c757d;'>Élément neutre de la multiplication</p></div></div></div></div>",
    "texteParle": "Voici les huit axiomes qui définissent un espace vectoriel. Les quatre premiers concernent l'addition : la commutativité, l'associativité, l'existence d'un élément neutre qu'on note zéro, et l'existence d'un opposé pour chaque élément. Les quatre suivants concernent la multiplication par un scalaire : l'associativité mixte, les deux distributivités, et l'élément neutre un. Pour vérifier qu'un ensemble est un espace vectoriel, il faut vérifier tous ces axiomes.",
    "note": "Les 8 axiomes d'un espace vectoriel : 4 pour l'addition et 4 pour la multiplication"
  },
  {
    "titre": "Sous-espace vectoriel",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2c3e50;'>Sous-espace vectoriel</h3><div style='background-color: #e8f4fd; padding: 15px; border-radius: 8px; margin: 10px 0;'><p style='font-weight: bold;'>Définition :</p><p>Soit E un espace vectoriel. Une partie F de E est un <span style='font-weight: bold;'>sous-espace vectoriel</span> de E si :</p><ul><li>F est non vide</li><li>F est stable par addition : ∀u, v ∈ F, u + v ∈ F</li><li>F est stable par multiplication externe : ∀u ∈ F, ∀α ∈ ℝ, α·u ∈ F</li></ul></div><div style='background-color: #fff3cd; padding: 15px; border-radius: 8px; margin-top: 10px;'><p style='color: #856404; font-weight: bold;'>Méthode de vérification :</p><p style='color: #856404;'>Pour montrer que F est un sous-espace vectoriel, on vérifie :</p><ul style='color: #856404;'><li>0 ∈ F (ou F ≠ ∅)</li><li>∀u, v ∈ F, ∀α, β ∈ ℝ, α·u + β·v ∈ F</li></ul></div><div style='background-color: #d4edda; padding: 15px; border-radius: 8px; margin-top: 10px;'><p style='color: #155724; font-weight: bold;'>Exemple :</p><p style='color: #155724;'>Dans ℝ³, l'ensemble des vecteurs (x, y, z) tels que x + y + z = 0 est un sous-espace vectoriel.</p></div></div>",
    "texteParle": "Un sous-espace vectoriel est une partie d'un espace vectoriel qui est elle-même un espace vectoriel pour les mêmes opérations. Pour vérifier qu'une partie F est un sous-espace vectoriel de E, on doit vérifier qu'elle est non vide, qu'elle est stable par addition, et qu'elle est stable par multiplication par un scalaire. En pratique, on peut simplifier en vérifiant que pour tous vecteurs u et v dans F, et pour tous scalaires alpha et bêta, la combinaison linéaire alpha u plus bêta v est encore dans F. L'exemple classique est dans ℝ³ l'ensemble des vecteurs dont la somme des coordonnées est nulle.",
    "note": "Un sous-espace vectoriel est stable par combinaison linéaire"
  },
  {
    "titre": "Combinaison linéaire",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2c3e50;'>Combinaison linéaire</h3><div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; margin: 10px 0;'><p style='font-weight: bold;'>Définition :</p><p>On appelle <span style='font-weight: bold;'>combinaison linéaire</span> des vecteurs v₁, v₂, ..., vₙ tout vecteur de la forme :</p><div class='math-block' style='text-align: center; padding: 10px;'><div class='math' style='font-size: 1.2rem;'>$$\\alpha_1 v_1 + \\alpha_2 v_2 + ... + \\alpha_n v_n$$</div></div><p>où α₁, α₂, ..., αₙ sont des scalaires.</p></div><div style='background-color: #e8f4fd; padding: 15px; border-radius: 8px; margin: 10px 0;'><p style='font-weight: bold;'>Exemple dans ℝ² :</p><p>Soit v₁ = (1, 2) et v₂ = (3, 4)</p><p>Une combinaison linéaire est : 2v₁ + 3v₂ = 2(1,2) + 3(3,4) = (2,4) + (9,12) = (11,16)</p></div><div style='background-color: #fff3cd; padding: 15px; border-radius: 8px;'><p style='color: #856404; font-weight: bold;'>Remarque :</p><p style='color: #856404;'>Le sous-espace vectoriel engendré par une famille de vecteurs est l'ensemble de toutes leurs combinaisons linéaires.</p></div></div>",
    "texteParle": "Une combinaison linéaire est une expression construite à partir de vecteurs en les multipliant par des scalaires et en les additionnant. Par exemple, dans ℝ², si on a les vecteurs v1 égale (1, 2) et v2 égale (3, 4), alors deux fois v1 plus trois fois v2 donne le vecteur (11, 16). L'ensemble de toutes les combinaisons linéaires d'une famille de vecteurs forme un sous-espace vectoriel, appelé le sous-espace engendré par la famille.",
    "note": "Une combinaison linéaire est une somme de vecteurs multipliés par des scalaires"
  },
  {
    "titre": "Famille libre et famille liée",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2c3e50;'>Famille libre et famille liée</h3><div style='background-color: #e8f4fd; padding: 15px; border-radius: 8px; margin: 10px 0;'><p style='font-weight: bold;'>Définition :</p><p>Une famille de vecteurs (v₁, v₂, ..., vₙ) est :</p><ul><li><span style='font-weight: bold;'>Libre</span> si la seule combinaison linéaire nulle est celle où tous les coefficients sont nuls :</li></ul><div class='math-block' style='text-align: center; padding: 5px;'>$$\\alpha_1 v_1 + ... + \\alpha_n v_n = 0 \\Rightarrow \\alpha_1 = ... = \\alpha_n = 0$$</div><ul><li><span style='font-weight: bold;'>Liée</span> si elle n'est pas libre, c'est-à-dire s'il existe une combinaison linéaire nulle avec des coefficients non tous nuls.</li></ul></div><div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; margin: 10px 0;'><p style='font-weight: bold;'>Exemples :</p><p>Dans ℝ², la famille ((1,0), (0,1)) est <span style='color: #28a745; font-weight: bold;'>libre</span>.</p><p>Dans ℝ², la famille ((1,2), (2,4)) est <span style='color: #dc3545; font-weight: bold;'>liée</span> car 2(1,2) - (2,4) = (0,0).</p></div></div>",
    "texteParle": "Une famille de vecteurs est dite libre si la seule façon d'obtenir le vecteur nul comme combinaison linéaire est de prendre tous les coefficients nuls. En d'autres termes, aucun vecteur de la famille ne peut s'écrire comme combinaison linéaire des autres. Une famille est liée si elle n'est pas libre, c'est-à-dire s'il existe une combinaison linéaire nulle avec des coefficients non tous nuls. Par exemple, dans ℝ², les vecteurs (1, 0) et (0, 1) forment une famille libre, tandis que (1, 2) et (2, 4) forment une famille liée car le deuxième est le double du premier.",
    "note": "Une famille libre n'a pas de relation linéaire non triviale"
  },
  {
    "titre": "Famille génératrice et base",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2c3e50;'>Famille génératrice et base</h3><div style='background-color: #e8f4fd; padding: 15px; border-radius: 8px; margin: 10px 0;'><p style='font-weight: bold;'>Définition :</p><ul><li>Une famille est <span style='font-weight: bold;'>génératrice</span> de E si tout vecteur de E peut s'écrire comme combinaison linéaire des vecteurs de la famille.</li><li>Une <span style='font-weight: bold;'>base</span> est une famille à la fois libre et génératrice.</li></ul></div><div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; margin: 10px 0;'><p style='font-weight: bold;'>Exemple :</p><p>La famille ((1,0), (0,1)) est une base de ℝ² car :</p><ul><li>Elle est libre : α(1,0) + β(0,1) = (α, β) = (0,0) ⇒ α = β = 0</li><li>Elle est génératrice : tout (x, y) = x(1,0) + y(0,1)</li></ul></div><div style='background-color: #d4edda; padding: 15px; border-radius: 8px;'><p style='color: #155724; font-weight: bold;'>Propriété :</p><p style='color: #155724;'>Si une famille est libre, tout vecteur de l'espace s'écrit de manière unique comme combinaison linéaire des vecteurs de la base.</p></div></div>",
    "texteParle": "Une famille génératrice est une famille dont les combinaisons linéaires permettent d'obtenir tous les vecteurs de l'espace. Une base est une famille qui est à la fois libre et génératrice. La base canonique de ℝ² est constituée des vecteurs (1, 0) et (0, 1). Cette base est libre car la seule combinaison linéaire nulle est avec des coefficients nuls, et elle est génératrice car tout vecteur (x, y) s'écrit x fois (1, 0) plus y fois (0, 1). Une propriété importante est que dans une base, l'écriture d'un vecteur est unique.",
    "note": "Une base est une famille libre et génératrice"
  },
  {

    "contenu": "<div style='padding: 10px;'><h3 style='color: #2c3e50;'>Dimension</h3><div style='background-color: #e8f4fd; padding: 15px; border-radius: 8px; margin: 10px 0;'><p style='font-weight: bold;'>Définition :</p><p>La <span style='font-weight: bold;'>dimension</span> d'un espace vectoriel E est le nombre de vecteurs d'une base de E.</p><p>On note dim(E) = n.</p></div><div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; margin: 10px 0;'><p style='font-weight: bold;'>Théorème :</p><p>Toutes les bases d'un espace vectoriel de dimension finie ont le même nombre de vecteurs.</p></div><div style='background-color: #fff3cd; padding: 15px; border-radius: 8px;'><p style='color: #856404; font-weight: bold;'>Exemples :</p><ul style='color: #856404;'><li>dim(ℝ²) = 2</li><li>dim(ℝ³) = 3</li><li>dim(ℝⁿ) = n</li><li>dim(Pₙ) = n + 1 (polynômes de degré ≤ n)</li></ul></div></div>",
    "texteParle": "La dimension d'un espace vectoriel est le nombre de vecteurs dans une base. Toutes les bases d'un même espace vectoriel ont le même nombre de vecteurs. Par exemple, ℝ² a pour dimension 2, ℝ³ a pour dimension 3, et plus généralement ℝⁿ a pour dimension n. L'ensemble des polynômes de degré inférieur ou égal à n a pour dimension n plus un. Cette notion de dimension est fondamentale car elle nous permet de caractériser la taille d'un espace vectoriel.",

  {
    "titre": "Théorème de la base incomplète",
    "contenu": "<div style='padding: 10px;'><h3 style='color: #2c3e50;'>Base incomplète</h3><div style='background-color: #e8f4fd; padding: 15px; border-radius: 8px; margin: 10px 0;'><p style='font-weight: bold;'>Théorème :</p><p>Toute famille libre d'un espace vectoriel de dimension finie peut être complétée en une base.</p></div><div style='background-color: #f8f9fa; padding: 15px; border-radius: 8px; margin: 10px 0;'><p style='font-weight: bold;'>Corollaire :</p><ul><li>Dans un espace de dimension n, une famille libre a au plus n vecteurs.</li><li>Dans un espace de dimension n, une famille génératrice a au moins n vecteurs.</li><li>Dans un espace de dimension n, une famille libre de n vecteurs est une base.</li><li>Dans un espace de dimension n, une famille génératrice de n vecteurs est une base.</li></ul></div><div style='background-color: #d4edda; padding: 15px; border-radius: 8px;'><p style='color: #155724; font-weight: bold;'>Méthode pratique :</p><p style='color: #155724;'>Pour montrer qu'une famille est une base de ℝⁿ, il suffit de montrer qu'elle est libre et qu'elle a n vecteurs.</p></div></div>",
    "texteParle": "Le théorème de la base incomplète est un résultat très utile. Il affirme que toute famille libre peut être complétée en une base. Cela signifie que si on a des vecteurs linéairement indépendants dans un espace de dimension n, on peut toujours ajouter d'autres vecteurs pour obtenir une base. Ce théorème a plusieurs conséquences importantes. Dans un espace de dimension n, une famille libre a au plus n vecteurs. Une famille génératrice a au moins n vecteurs. Et si une famille libre a exactement n vecteurs, alors c'est une base. De même pour une famille génératrice de n vecteurs.",
    "note": "Toute famille libre peut être complétée en une base"

  {

    "texteParle": "Pour terminer cette leçon, retenons les points essentiels. Un espace vectoriel est un ensemble muni de deux lois vérifiant huit axiomes. Un sous-espace vectoriel est une partie stable par combinaison linéaire. Une famille libre n'a pas de relation linéaire non triviale, tandis qu'une famille liée en a une. Une base est une famille à la fois libre et génératrice. Enfin, la dimension d'un espace vectoriel est le nombre de vecteurs dans une base. Ces notions sont fondamentales pour toute l'algèbre linéaire que nous verrons dans les leçons suivantes.",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;

    const total = slides.length;
    const synth = window.speechSynthesis;

    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }

    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }

    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        
        loadingCancelled = false;
        isLoading = true;
        
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }

    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }

    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }

    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }

    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }

    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }

    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);

        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }

    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }

            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }

            // Arrêter toute lecture en cours
            stopSpeaking();
            
            // Réinitialiser l'état de pause
            isPaused = false;
            
            showLoading();
            setStatus("Initialisation...", 'loading');

            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;

                let isFinished = false;
                let errorHandled = false;

                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };

                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };

                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    
                    resolve();
                };

                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }

                currentUtterance = utterance;
                
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }

            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }

    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        // Arrêter complètement la lecture
        stopSpeaking();
        
        await new Promise(r => setTimeout(r, 50));
        
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }

        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');

        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }

    async function goToNext() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }

    async function goToPrev() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }

    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }

        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }

        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }

        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }

        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }

    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }

        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }

        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');

        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });

        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });

        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });

        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });

        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });

        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });

        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });

        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }

    init();
});



    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;

    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');

        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            header.style.background = 'rgba(15, 23, 42, 0.85)';
            footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            header.style.background = 'rgba(255, 255, 255, 0.85)';
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }

    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {
        // Appliquer le mode jour par défaut
        const body = document.body;

        const autoIndicator = document.querySelector('.auto-indicator');

        }
        
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {

            }
        });
        
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {

        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
        }
    });
</script>
