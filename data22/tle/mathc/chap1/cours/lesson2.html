<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Présentation mobile</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            options: { skipHtmlTypes: 'script' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0b1120;
        color: #ffffff;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 500px;
        margin: 0 auto;
        background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    .slide-header {
        flex-shrink: 0;
        padding: 18px 16px 10px 16px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .slide-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }

    .content-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 18px 16px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        flex-shrink: 0;
    }

    .content-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .content-card li {
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1rem;
        line-height: 1.5;
    }

    .content-card li:last-child {
        border-bottom: none;
    }

    .bullet-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }

    .math-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        overflow-x: auto;
        flex-shrink: 0;
        margin: 4px 0;
    }

    .math-block .math {
        font-size: 1.2rem;
        color: #e2e8f0;
    }

    .note-box {
        background: rgba(96, 165, 250, 0.08);
        border-left: 4px solid #60a5fa;
        padding: 12px 16px;
        border-radius: 12px;
        font-style: italic;
        font-size: 0.9rem;
        color: #cbd5e1;
        flex-shrink: 0;
    }

    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        border-radius: 0;
        flex-direction: column;
    }

    .loading-card {
        background: #1e293b;
        padding: 32px 28px;
        border-radius: 28px;
        text-align: center;
        max-width: 320px;
        width: 90%;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #334155;
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px auto;
    }

    .loading-text {
        font-weight: 600;
        font-size: 1.1rem;
        color: #f1f5f9;
        margin-bottom: 4px;
    }
    .loading-sub {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 16px;
    }
    .loading-progress {
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        animation: loadingProgress 30s ease-out forwards;
    }

    .loading-timeout {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 12px;
    }

    .btn-cancel-loading {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 40px;
        padding: 8px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f87171;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }

    .btn-cancel-loading:active {
        transform: scale(0.94);
        background: rgba(239, 68, 68, 0.25);
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes loadingProgress {
        0% { width: 0%; }
        100% { width: 100%; }
    }

    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .slide-counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(255,255,255,0.04);
    }

    .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        border-radius: 30px;
        background: rgba(96, 165, 250, 0.12);
        color: #93bbfc;
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(96, 165, 250, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }

    .status-badge .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        animation: pulse-dot 1.2s infinite;
        flex-shrink: 0;
    }

    .status-badge.idle .dot {
        animation: none;
        background: #64748b;
    }
    .status-badge.speaking .dot {
        background: #34d399;
        animation: pulse-dot 0.8s infinite;
    }
    .status-badge.error .dot {
        background: #f87171;
        animation: none;
    }
    .status-badge.paused .dot {
        animation: none;
        background: #fbbf24;
    }
    .status-badge.waiting .dot {
        animation: pulse-dot 1.5s infinite;
        background: #fbbf24;
    }
    .status-badge.loading .dot {
        animation: pulse-dot 0.5s infinite;
        background: #60a5fa;
    }

    @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
    }

    .footer-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #e2e8f0;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(255,255,255,0.1);
    }

    .btn-secondary {
        background: rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-play {
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.2);
        color: #34d399;
        min-width: 80px;
        justify-content: center;
    }
    .btn-play:active {
        background: rgba(52, 211, 153, 0.25);
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }

    .auto-indicator {
        font-size: 0.65rem;
        color: #64748b;
        text-align: center;
        letter-spacing: 0.3px;
        padding: 2px 0;
    }

    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.2rem;
        }
        .content-card li {
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .btn-play {
            min-width: 60px;
        }
        .footer-buttons {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
        .loading-card {
            padding: 20px 16px;
        }
        .math-block .math {
            font-size: 1rem;
        }
    }

    @media (min-width: 600px) {
        .app-container {
            max-width: 480px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
        .loading-overlay {
            border-radius: 32px;
        }
    }

    /* Mode jour (par défaut) */
    html, body {
        background: #f0f4f8 !important;
        color: #1a202c !important;
    }
    .app-container {
        background: linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%) !important;
    }
    .slide-header {
        background: rgba(255, 255, 255, 0.85) !important;
        border-bottom: 1px solid rgba(0,0,0,0.08) !important;
    }
    .slide-header h1 {
        background: linear-gradient(135deg, #2b6cb0, #6b46c1) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
    }
    .slide-footer {
        background: rgba(255, 255, 255, 0.9) !important;
        border-top: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card {
        background: rgba(255,255,255,0.8) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .content-card li {
        border-bottom: 1px solid rgba(0,0,0,0.05) !important;
    }
    .note-box {
        background: rgba(96, 165, 250, 0.12) !important;
        border-left: 4px solid #4299e1 !important;
        color: #2c3e50 !important;
    }
    .math-block {
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .math-block .math {
        color: #2d3748 !important;
    }
    .slide-counter {
        color: #4a5568 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .status-badge {
        background: rgba(96, 165, 250, 0.15) !important;
        color: #2b6cb0 !important;
        border: 1px solid rgba(96, 165, 250, 0.15) !important;
    }
    .btn {
        color: #2d3748 !important;
        background: rgba(0,0,0,0.05) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .btn-secondary {
        background: rgba(0,0,0,0.04) !important;
        border-color: rgba(0,0,0,0.08) !important;
    }
    .btn-play {
        background: rgba(52, 211, 153, 0.15) !important;
        border-color: rgba(52, 211, 153, 0.2) !important;
        color: #38a169 !important;
    }
    .btn-play.playing {
        background: rgba(251, 191, 36, 0.15) !important;
        border-color: rgba(251, 191, 36, 0.2) !important;
        color: #d69e2e !important;
    }
    .auto-indicator {
        color: #718096 !important;
    }
    .loading-card {
        background: #ffffff !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
    }
    .loading-text {
        color: #1a202c !important;
    }
    .loading-sub {
        color: #4a5568 !important;
    }
</style>
</head>
<body>

<div class="app-container">

    <header class="slide-header">
        <h1 id="slideTitle">Chargement...</h1>
    </header>

    <main class="slide-body" id="slideBody"></main>

    <!-- LOADING OVERLAY AVEC BOUTON ANNULER -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Préparation vocale...</div>
            <div class="loading-sub" id="loadingSub">Synthèse en cours</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-timeout" id="loadingTimeout">⏱️ 30 secondes maximum</div>
            <button class="btn-cancel-loading" id="cancelLoadingBtn">
                <span>✕</span> Annuler
            </button>
        </div>
    </div>

    <footer class="slide-footer">
        <div class="footer-top">
            <span class="slide-counter" id="slideCounter">1 / 3</span>
            <span class="status-badge idle" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Prêt</span>
            </span>
        </div>

        <div class="footer-buttons">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-secondary" id="replayBtn">
                <span class="btn-icon">🔁</span> <span class="btn-label">Relire</span>
            </button>
            <button class="btn btn-play" id="playBtn">
                <span class="btn-icon">▶</span> <span class="btn-label">Play</span>
            </button>
        </div>

        <div class="auto-indicator" id="autoIndicator">⏸ Lecture manuelle</div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // SLIDES
    // ================================================================
    const slides = [
  {
    "titre": "Introduction : Diviser sans calculer",
    "contenu": "<div style='background-color: #e8f0fe; padding: 15px; border-radius: 10px; color: #1a237e;'><h3 style='margin-top: 0;'>Un défi pour commencer</h3><p>Pouvez-vous dire, <strong>sans effectuer la division</strong>, si les nombres suivants sont divisibles par 2, par 3 ou par 5 ?</p><ul><li>124</li><li>345</li><li>1 002</li></ul><p style='margin-top: 15px;'>Pour répondre, nous allons découvrir des <strong>critères de divisibilité</strong> qui nous permettront de le faire rapidement.</p><p>Ces critères sont basés sur l'écriture décimale des nombres et sur une notion fondamentale : la <strong>congruence</strong>.</p></div>",
    "texteParle": "Bonjour à tous. Aujourd'hui, nous allons aborder un sujet très pratique en arithmétique : la divisibilité et les congruences. Pour commencer, je vous pose un défi. Sans faire la division, pouvez-vous me dire si 124 est divisible par 2, si 345 est divisible par 3 ou par 5, ou si 1002 est divisible par ces nombres ? Nous allons voir ensemble des critères simples qui permettent de répondre à ce type de questions très rapidement. Ces critères sont liés à la façon dont nous écrivons les nombres et à une notion puissante que nous allons découvrir : la congruence.",
    "note": "Introduction par un défi pour susciter l'intérêt et montrer l'utilité des critères de divisibilité."
  },
  {
    "titre": "Divisibilité : Définition",
    "contenu": "<h3>Quand dit-on qu'un nombre est divisible par un autre ?</h3><p>Soient \\(a\\) et \\(b\\) deux entiers relatifs avec \\(b \\neq 0\\).</p><p>On dit que <strong>\\(b\\) divise \\(a\\)</strong> s'il existe un entier relatif \\(k\\) tel que :</p><div class='math-block'><div class='math'>$$ a = b \\times k $$</div></div><p>On note : \\(b \\mid a\\)</p><div style='background-color: #e8f5e9; padding: 15px; border-radius: 10px; color: #1b5e20;'><h4 style='margin-top: 0;'>Exemples</h4><ul><li>\\(3 \\mid 12\\) car \\(12 = 3 \\times 4\\)</li><li>\\(-5 \\mid 20\\) car \\(20 = (-5) \\times (-4)\\)</li><li>\\(7 \\nmid 25\\) (7 ne divise pas 25) car il n'existe pas d'entier \\(k\\) tel que \\(25 = 7k\\)</li></ul></div>",
    "texteParle": "Commençons par la définition de la divisibilité. On dit qu'un nombre entier b divise un nombre entier a s'il existe un autre entier k tel que a soit égal à b multiplié par k. En d'autres termes, a est un multiple de b. Par exemple, 3 divise 12 car 12 est égal à 3 fois 4. On note cela 3 barre verticale 12. En revanche, 7 ne divise pas 25 car il n'existe pas d'entier qui, multiplié par 7, donne 25. Cette définition est la base de tout ce que nous allons faire aujourd'hui.",
    "note": "Définition formelle de la divisibilité avec la notation b | a."
  },
  {
    "titre": "Critère de divisibilité par 2 et 5",
    "contenu": "<div style='background-color: #fff3e0; padding: 15px; border-radius: 10px; color: #e65100;'><h3 style='margin-top: 0;'>Les plus simples</h3><h4>Par 2</h4><p>Un nombre est divisible par 2 si et seulement si <strong>son dernier chiffre est pair</strong> (0, 2, 4, 6 ou 8).</p><p><strong>Exemple :</strong> 124 est divisible par 2 car il se termine par 4.</p><h4>Par 5</h4><p>Un nombre est divisible par 5 si et seulement si <strong>son dernier chiffre est 0 ou 5</strong>.</p><p><strong>Exemple :</strong> 345 est divisible par 5 car il se termine par 5.</p><hr style='border-color: #ffcc80;'><p style='font-style: italic;'>Pourquoi ? Car \\(10 = 2 \\times 5\\). Seul le dernier chiffre compte pour la divisibilité par 2 ou 5.</p></div>",
    "texteParle": "Commençons par les critères les plus simples, ceux pour la divisibilité par 2 et par 5. Un nombre est divisible par 2 si son dernier chiffre est pair, c'est-à-dire 0, 2, 4, 6 ou 8. Par exemple, 124 se termine par 4, donc il est divisible par 2. Pour la divisibilité par 5, c'est encore plus simple : un nombre est divisible par 5 si son dernier chiffre est 0 ou 5. 345 se termine par 5, donc il est divisible par 5. Ces critères sont simples à retenir car 10, qui est la base de notre système décimal, est le produit de 2 et de 5.",
    "note": "Critères de divisibilité par 2 et 5, basés sur le dernier chiffre."
  },
  {
    "titre": "Critère de divisibilité par 3 et 9",
    "contenu": "<div style='background-color: #e3f2fd; padding: 15px; border-radius: 10px; color: #0d47a1;'><h3 style='margin-top: 0;'>La somme des chiffres</h3><h4>Par 3</h4><p>Un nombre est divisible par 3 si et seulement si <strong>la somme de ses chiffres est divisible par 3</strong>.</p><p><strong>Exemple :</strong> 345 → 3+4+5 = 12, et 12 est divisible par 3, donc 345 est divisible par 3.</p><h4>Par 9</h4><p>Un nombre est divisible par 9 si et seulement si <strong>la somme de ses chiffres est divisible par 9</strong>.</p><p><strong>Exemple :</strong> 1 002 → 1+0+0+2 = 3, et 3 n'est pas divisible par 9, donc 1 002 n'est pas divisible par 9.</p><hr style='border-color: #90caf9;'><p style='font-style: italic;'>Pourquoi ? Car \\(10 \\equiv 1 \\mod 3\\) et \\(10 \\equiv 1 \\mod 9\\).</p></div>",
    "texteParle": "Passons maintenant aux critères de divisibilité par 3 et par 9. Pour ces deux nombres, la règle est basée sur la somme des chiffres. Un nombre est divisible par 3 si la somme de ses chiffres est elle-même divisible par 3. Prenons l'exemple de 345. La somme de ses chiffres est 3 plus 4 plus 5, ce qui donne 12. 12 est divisible par 3, donc 345 est divisible par 3. La règle est similaire pour 9 : un nombre est divisible par 9 si la somme de ses chiffres est divisible par 9. Pour 1002, la somme est 3, qui n'est pas divisible par 9, donc 1002 n'est pas divisible par 9. Ces critères fonctionnent parce que 10 est congru à 1 modulo 3 et modulo 9.",
    "note": "Critères de divisibilité par 3 et 9 basés sur la somme des chiffres."
  },
  {
    "titre": "Critère de divisibilité par 4",
    "contenu": "<div style='background-color: #fce4ec; padding: 15px; border-radius: 10px; color: #b71c1c;'><h3 style='margin-top: 0;'>Les deux derniers chiffres</h3><p>Un nombre est divisible par 4 si et seulement si <strong>le nombre formé par ses deux derniers chiffres est divisible par 4</strong>.</p><p><strong>Exemple :</strong> 124 → les deux derniers chiffres sont 24. 24 est divisible par 4 (24 = 4 × 6), donc 124 est divisible par 4.</p><p><strong>Contre-exemple :</strong> 345 → les deux derniers chiffres sont 45. 45 n'est pas divisible par 4 (45 = 4 × 11 + 1), donc 345 n'est pas divisible par 4.</p><hr style='border-color: #ef9a9a;'><p style='font-style: italic;'>Pourquoi ? Car \\(100 = 4 \\times 25\\). Seuls les deux derniers chiffres comptent.</p></div>",
    "texteParle": "Pour la divisibilité par 4, la règle est différente. Il ne faut pas regarder tous les chiffres, mais seulement les deux derniers. Un nombre est divisible par 4 si le nombre formé par ses deux derniers chiffres est divisible par 4. Prenons 124. Les deux derniers chiffres forment le nombre 24, qui est divisible par 4, donc 124 est divisible par 4. En revanche, pour 345, les deux derniers chiffres sont 45, qui n'est pas divisible par 4, donc 345 ne l'est pas non plus. Cette règle fonctionne car 100 est un multiple de 4, donc seuls les deux derniers chiffres comptent.",
    "note": "Critère de divisibilité par 4 basé sur les deux derniers chiffres."

  {
    "titre": "Critère de divisibilité par 11",
    "contenu": "<div style='background-color: #f3e5f5; padding: 15px; border-radius: 10px; color: #4a148c;'><h3 style='margin-top: 0;'>La différence des sommes</h3><p>Un nombre est divisible par 11 si et seulement si <strong>la différence entre la somme de ses chiffres de rang pair et la somme de ses chiffres de rang impair est un multiple de 11</strong> (y compris 0).</p><p><strong>Exemple :</strong> 1 001 → chiffres de rang impair (en partant de la gauche) : 1 et 0 → somme = 1. Chiffres de rang pair : 0 et 1 → somme = 1. Différence = 1 - 1 = 0, qui est divisible par 11. Donc 1 001 est divisible par 11.</p><p><strong>Contre-exemple :</strong> 123 → impair : 1 et 3 → somme = 4. Pair : 2 → somme = 2. Différence = 4 - 2 = 2, qui n'est pas divisible par 11. Donc 123 n'est pas divisible par 11.</p><hr style='border-color: #ce93d8;'><p style='font-style: italic;'>Pourquoi ? Car \\(10 \\equiv -1 \\mod 11\\).</p></div>",
    "texteParle": "Le dernier critère que nous allons voir est celui pour la divisibilité par 11. Il est un peu plus complexe. On prend la somme des chiffres de rang impair, on soustrait la somme des chiffres de rang pair, et on regarde si le résultat est un multiple de 11. Par exemple, prenons 1001. Les chiffres de rang impair sont le premier et le troisième, c'est-à-dire 1 et 0, leur somme est 1. Les chiffres de rang pair sont le deuxième et le quatrième, 0 et 1, leur somme est aussi 1. La différence est 0, qui est divisible par 11, donc 1001 est divisible par 11. Ce critère fonctionne car 10 est congru à -1 modulo 11.",
    "note": "Critère de divisibilité par 11 utilisant la somme des chiffres de rang pair et impair."

  {
    "titre": "Les Congruences : Définition",
    "contenu": "<h3>Une relation d'équivalence sur \\(\\mathbb{Z}\\)</h3><p>Soient \\(a\\) et \\(b\\) deux entiers relatifs et \\(n\\) un entier naturel non nul.</p><p>On dit que <strong>\\(a\\) est congru à \\(b\\) modulo \\(n\\)</strong> si \\(n\\) divise la différence \\(a - b\\).</p><div class='math-block'><div class='math'>$$ a \\equiv b \\pmod n \\iff n \\mid (a - b) $$</div></div><p>Autrement dit, \\(a\\) et \\(b\\) ont le même reste dans la division euclidienne par \\(n\\).</p><div style='background-color: #e8f5e9; padding: 15px; border-radius: 10px; color: #1b5e20;'><h4 style='margin-top: 0;'>Exemple</h4><p>\\(17 \\equiv 2 \\pmod 5\\) car \\(17 - 2 = 15\\) est divisible par 5.</p><p>Les restes de la division de 17 et de 2 par 5 sont tous les deux égaux à 2.</p></div>",
    "texteParle": "Nous arrivons maintenant à la notion de congruence. La congruence est une relation qui permet de comparer deux nombres par rapport à un diviseur commun. On dit que deux nombres a et b sont congrus modulo n si leur différence est divisible par n. Cela signifie que a et b ont le même reste dans la division euclidienne par n. Par exemple, 17 et 2 sont congrus modulo 5 car leur différence, 15, est divisible par 5. En effet, 17 divisé par 5 donne un reste de 2, et 2 divisé par 5 donne aussi un reste de 2. La congruence est un outil très puissant en arithmétique.",
    "note": "Définition de la congruence modulo n et lien avec le reste de la division euclidienne."
  },
  {
    "titre": "Propriétés des Congruences",
    "contenu": "<h3>Calculer avec les congruences</h3><p>Si \\(a \\equiv b \\pmod n\\) et \\(c \\equiv d \\pmod n\\), alors :</p><ul><li><strong>Addition :</strong> \\(a + c \\equiv b + d \\pmod n\\)</li><li><strong>Soustraction :</strong> \\(a - c \\equiv b - d \\pmod n\\)</li><li><strong>Multiplication :</strong> \\(a \\times c \\equiv b \\times d \\pmod n\\)</li><li><strong>Puissance :</strong> \\(a^k \\equiv b^k \\pmod n\\) pour tout entier \\(k \\ge 0\\)</li></ul><div style='background-color: #e3f2fd; padding: 15px; border-radius: 10px; color: #0d47a1;'><h4 style='margin-top: 0;'>Exemple</h4><p>Comme \\(10 \\equiv 1 \\pmod 3\\), alors \\(10^2 \\equiv 1^2 \\equiv 1 \\pmod 3\\), ce qui explique le critère de divisibilité par 3.</p></div>",
    "texteParle": "La grande force des congruences, c'est qu'on peut faire des calculs avec elles comme avec des égalités. Si a est congru à b modulo n et c est congru à d modulo n, alors on peut additionner, soustraire ou multiplier les congruences. On peut aussi élever à une puissance. Par exemple, comme 10 est congru à 1 modulo 3, alors 10 au carré est congru à 1 au carré, donc à 1 modulo 3. Et ainsi de suite pour toutes les puissances de 10. C'est précisément pour cela que le critère de divisibilité par 3 fonctionne : chaque chiffre d'un nombre peut être remplacé par sa valeur modulo 3.",
    "note": "Propriétés opératoires des congruences (addition, soustraction, multiplication, puissance)."

  {
    "titre": "Application : Reste d'une Division",
    "contenu": "<div style='background-color: #fff8e1; padding: 15px; border-radius: 10px; color: #e65100;'><h3 style='margin-top: 0;'>Trouver un reste sans poser la division</h3><p><strong>Problème :</strong> Quel est le reste de la division de \\(2^{100}\\) par 7 ?</p><p><strong>Résolution avec les congruences :</strong></p><ul><li>\\(2^1 \\equiv 2 \\pmod 7\\)</li><li>\\(2^2 \\equiv 4 \\pmod 7\\)</li><li>\\(2^3 \\equiv 8 \\equiv 1 \\pmod 7\\)</li></ul><p>On a \\(2^3 \\equiv 1 \\pmod 7\\).</p><p>Donc \\(2^{100} = 2^{3 \\times 33 + 1} = (2^3)^{33} \\times 2^1 \\equiv 1^{33} \\times 2 \\equiv 2 \\pmod 7\\).</p><p><strong>Le reste de la division de \\(2^{100}\\) par 7 est donc 2.</strong></p></div>",
    "texteParle": "Voyons maintenant une application concrète des congruences. On peut les utiliser pour trouver le reste d'une division sans avoir à poser la division, même pour de très grands nombres. Par exemple, quel est le reste de la division de 2 puissance 100 par 7 ? On va calculer les premières puissances de 2 modulo 7. 2 puissance 1 est congru à 2. 2 puissance 2 est congru à 4. 2 puissance 3 est congru à 8, donc à 1 modulo 7. On a trouvé un cycle : 2 puissance 3 est congru à 1. Donc 2 puissance 100, c'est 2 puissance 3 fois 33 plus 1, ce qui est congru à 1 puissance 33 fois 2, donc à 2. Le reste est donc 2. C'est beaucoup plus rapide que de calculer 2 puissance 100 !",
    "note": "Utilisation des congruences pour déterminer un reste sans effectuer la division complète."

  {
    "titre": "Application : Codes de Contrôle",
    "contenu": "<div style='background-color: #e8f0fe; padding: 15px; border-radius: 10px; color: #1a237e;'><h3 style='margin-top: 0;'>Les congruences dans la vie quotidienne</h3><p>Les congruences sont utilisées pour créer des <strong>codes de contrôle</strong> qui permettent de vérifier qu'un numéro est correct, par exemple :</p><ul><li><strong>Numéro INSEE</strong> (en France) : vérification par le modulo 97.</li><li><strong>Code-barres</strong> (EAN-13) : vérification par un algorithme de congruence modulo 10.</li><li><strong>Billets de banque</strong> (euros) : le numéro de série est vérifié par une congruence.</li></ul><p>Ces codes de contrôle permettent de détecter des erreurs de saisie ou de fabrication.</p><p style='font-style: italic;'>Nous allons voir le principe sur un exemple simplifié.</p></div>",
    "texteParle": "Les congruences ne sont pas seulement une théorie mathématique. Elles ont des applications très concrètes dans la vie de tous les jours. Par exemple, les codes de contrôle, comme ceux que l'on trouve sur les billets de banque ou les codes-barres, utilisent des congruences. L'idée est d'ajouter un chiffre supplémentaire à un numéro pour que l'ensemble vérifie une certaine relation de congruence. Si une erreur est faite en saisissant le numéro, la relation de congruence ne sera plus vérifiée et on pourra détecter l'erreur. C'est un système très efficace et largement utilisé.",

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentIndex = 0;
    let isSpeaking = false;
    let isPaused = false;
    let currentUtterance = null;
    let isLoading = false;
    let loadingTimeout = null;
    let isTransitioning = false;
    let speechSupported = true;
    let userInteracted = false;
    let isPlaying = false;
    let loadingCancelled = false;

    const total = slides.length;
    const synth = window.speechSynthesis;

    // Références jQuery
    const $title = $('#slideTitle');
    const $body = $('#slideBody');
    const $counter = $('#slideCounter');
    const $statusText = $('#statusText');
    const $statusBadge = $('#statusBadge');
    const $loading = $('#loadingOverlay');
    const $loadingText = $('#loadingText');
    const $loadingSub = $('#loadingSub');
    const $loadingTimeout = $('#loadingTimeout');
    const $loadingProgressBar = $('#loadingProgressBar');
    const $autoIndicator = $('#autoIndicator');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $replay = $('#replayBtn');
    const $play = $('#playBtn');
    const $cancelLoading = $('#cancelLoadingBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function setStatus(text, type) {
        $statusText.text(text);
        $statusBadge.removeClass('idle speaking error paused waiting loading');
        if (type === 'speaking') $statusBadge.addClass('speaking');
        else if (type === 'error') $statusBadge.addClass('error');
        else if (type === 'paused') $statusBadge.addClass('paused');
        else if (type === 'waiting') $statusBadge.addClass('waiting');
        else if (type === 'loading') $statusBadge.addClass('loading');
        else $statusBadge.addClass('idle');
    }

    function updatePlayButton() {
        if (isPlaying) {
            $play.addClass('playing');
            $play.find('.btn-icon').text('⏸');
            $play.find('.btn-label').text('Pause');
        } else {
            $play.removeClass('playing');
            $play.find('.btn-icon').text('▶');
            $play.find('.btn-label').text('Play');
        }
    }

    function showLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        
        loadingCancelled = false;
        isLoading = true;
        
        // Réinitialiser la barre de progression
        $loadingProgressBar.css('animation', 'none');
        $loadingProgressBar.css('width', '0%');
        // Forcer un reflow
        $loadingProgressBar[0].offsetHeight;
        $loadingProgressBar.css('animation', 'loadingProgress 30s ease-out forwards');
        
        $loadingText.text('Préparation vocale...');
        $loadingSub.text('Synthèse en cours');
        $loadingTimeout.text('⏱️ 30 secondes maximum');
        $loading.fadeIn(300);
        setStatus("⏳ Chargement...", 'loading');
        
        // 🔥 TIMEOUT DE 30 SECONDES
        loadingTimeout = setTimeout(() => {
            if (isLoading && !loadingCancelled) {
                hideLoading();
                setStatus("⚠️ Délai dépassé (30s)", 'error');
                isPlaying = false;
                updatePlayButton();
                $loadingSub.text('La synthèse vocale a pris trop de temps');
                $loadingTimeout.text('❌ Délai dépassé');
            }
        }, 30000);
    }

    function hideLoading() {
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        isLoading = false;
        loadingCancelled = false;
        $loading.fadeOut(300);
        // Ne pas changer le statut si on est en train de parler
        if (!isSpeaking && !isPlaying) {
            setStatus("⏸ Lecture arrêtée", 'paused');
        }
    }

    function cancelLoading() {
        loadingCancelled = true;
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
        hideLoading();
        stopSpeaking();
        setStatus("⏸ Annulé", 'paused');
        isPlaying = false;
        updatePlayButton();
        $loadingText.text('Annulé par l\'utilisateur');
        $loadingSub.text('Vous pouvez réessayer');
        $loadingTimeout.text('✕ Annulation');
    }

    // Arrêter la parole proprement
    function stopSpeaking() {
        try {
            if (synth && (synth.speaking || synth.pending)) {
                synth.cancel();
            }
        } catch(e) {
            console.warn('Erreur stopSpeaking:', e);
        }
        if (currentUtterance) {
            try {
                currentUtterance.onend = null;
                currentUtterance.onerror = null;
                currentUtterance.onstart = null;
            } catch(e) {}
            currentUtterance = null;
        }
        isSpeaking = false;
        isPlaying = false;
        updatePlayButton();
    }

    // Mettre en pause la parole
    function pauseSpeaking() {
        try {
            if (synth && synth.speaking) {
                synth.pause();
                isPaused = true;
                isPlaying = false;
                setStatus("⏸ Lecture en pause", 'paused');
                updatePlayButton();
            }
        } catch(e) {
            console.warn('Erreur pauseSpeaking:', e);
            stopSpeaking();
        }
    }

    // Reprendre la parole
    function resumeSpeaking() {
        try {
            if (synth && synth.paused) {
                synth.resume();
                isPaused = false;
                isPlaying = true;
                setStatus("🔊 Lecture en cours", 'speaking');
                updatePlayButton();
            } else if (!isSpeaking && !synth.speaking && !synth.pending) {
                speakSlide(currentIndex);
            }
        } catch(e) {
            console.warn('Erreur resumeSpeaking:', e);
            speakSlide(currentIndex);
        }
    }

    function renderSlide(index) {
        const slide = slides[index];
        $title.text(slide.titre);

        let html = '';
        html += `<div class="content-card">${slide.contenu}</div>`;
        if (slide.note) {
            html += `<div class="note-box">${slide.note}</div>`;
        }
        $body.html(html);
        $counter.text(`${index+1} / ${total}`);

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
        }
    }

    // ================================================================
    // LECTURE VOCALE
    // ================================================================
    function speakSlide(index) {
        return new Promise((resolve) => {
            const slide = slides[index];
            const text = slide.texteParle;
            
            if (!text || text.trim() === '' || !speechSupported) {
                resolve();
                return;
            }

            if (!window.speechSynthesis) {
                setStatus("❌ Synthèse vocale non supportée", 'error');
                speechSupported = false;
                resolve();
                return;
            }

            // Arrêter toute lecture en cours
            stopSpeaking();
            
            // Réinitialiser l'état de pause
            isPaused = false;
            
            showLoading();
            setStatus("Initialisation...", 'loading');

            try {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;

                let isFinished = false;
                let errorHandled = false;

                utterance.onstart = function() {
                    if (loadingCancelled) {
                        stopSpeaking();
                        resolve();
                        return;
                    }
                    hideLoading();
                    isSpeaking = true;
                    isPlaying = true;
                    isPaused = false;
                    setStatus("🔊 Lecture en cours", 'speaking');
                    updatePlayButton();
                };

                utterance.onend = function() {
                    if (isFinished) return;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    setStatus("✅ Terminé", 'idle');
                    hideLoading();
                    updatePlayButton();
                    resolve();
                };

                utterance.onerror = function(e) {
                    if (isFinished || errorHandled) return;
                    errorHandled = true;
                    isFinished = true;
                    isSpeaking = false;
                    isPlaying = false;
                    isPaused = false;
                    hideLoading();
                    updatePlayButton();
                    
                    if (e.error === 'not-allowed') {
                        setStatus("⚠️ Permission refusée", 'error');
                    } else if (e.error === 'synthesis-unavailable') {
                        setStatus("⚠️ Synthèse indisponible", 'error');
                    } else if (e.error === 'canceled') {
                        setStatus("⏸ Annulé", 'paused');
                    } else {
                        setStatus("❌ Erreur audio: " + (e.error || 'inconnue'), 'error');
                    }
                    
                    resolve();
                };

                // Gestion du chargement des voix
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = function() {
                        if (!loadingCancelled) {
                            try {
                                synth.speak(utterance);
                            } catch(err) {
                                // Silencieux
                            }
                        }
                        synth.onvoiceschanged = null;
                    };
                }

                currentUtterance = utterance;
                
                if (!loadingCancelled) {
                    try {
                        synth.speak(utterance);
                    } catch(err) {
                        setTimeout(() => {
                            if (!loadingCancelled) {
                                try {
                                    synth.speak(utterance);
                                } catch(e) {
                                    setStatus("❌ Erreur de lecture", 'error');
                                    isPlaying = false;
                                    updatePlayButton();
                                    hideLoading();
                                    resolve();
                                }
                            } else {
                                resolve();
                            }
                        }, 100);
                    }
                } else {
                    resolve();
                }

            } catch(err) {
                hideLoading();
                setStatus("❌ Erreur générale", 'error');
                isPlaying = false;
                updatePlayButton();
                console.error('Erreur speakSlide:', err);
                resolve();
            }
        });
    }

    // ================================================================
    // NAVIGATION
    // ================================================================
    async function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        
        // Si on est en train de lire, on met en pause avant de naviguer
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        // Arrêter complètement la lecture
        stopSpeaking();
        
        await new Promise(r => setTimeout(r, 50));
        
        if (index === currentIndex) {
            setStatus("📄 Slide actuel", 'idle');
            return;
        }

        isTransitioning = true;
        currentIndex = index;
        renderSlide(index);
        
        // Réinitialiser l'état de lecture
        isPlaying = false;
        updatePlayButton();
        setStatus("⏸ Lecture arrêtée", 'paused');

        await new Promise(r => setTimeout(r, 150));
        isTransitioning = false;
    }

    async function goToNext() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex + 1 < total) {
            await goToSlide(currentIndex + 1);
        } else {
            setStatus("🏁 Dernier slide", 'idle');
        }
    }

    async function goToPrev() {
        if (isTransitioning) return;
        
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
        }
        
        if (currentIndex - 1 >= 0) {
            await goToSlide(currentIndex - 1);
        } else {
            setStatus("🔁 Premier slide", 'idle');
        }
    }

    // ================================================================
    // GESTION PLAY/PAUSE
    // ================================================================
    function togglePlay() {
        if (!userInteracted) {
            userInteracted = true;
        }

        // Si le chargement est en cours, on l'annule
        if (isLoading) {
            cancelLoading();
            return;
        }

        // Si le synthétiseur est en pause, on reprend
        if (synth && synth.paused) {
            resumeSpeaking();
            return;
        }

        // Si la lecture est en cours, on met en pause
        if (isSpeaking || isPlaying) {
            pauseSpeaking();
            return;
        }

        // Sinon, on démarre la lecture du slide courant
        if (!isSpeaking && !isPlaying) {
            stopSpeaking();
            speakSlide(currentIndex);
        }
    }

    // ================================================================
    // INIT
    // ================================================================
    async function init() {
        // Vérifier la compatibilité
        if (!window.speechSynthesis) {
            setStatus("❌ Synthèse vocale non supportée", 'error');
            speechSupported = false;
        }

        // Précharger les voix
        try {
            if (synth.getVoices) {
                synth.getVoices();
                setTimeout(() => {
                    try {
                        synth.getVoices();
                    } catch(e) {}
                }, 200);
            }
        } catch(e) {
            console.warn('Erreur chargement voix:', e);
        }

        // Afficher le premier slide
        renderSlide(0);
        $counter.text(`1 / ${total}`);
        
        // État initial
        setStatus("⏸ Appuie sur Play", 'paused');
        updatePlayButton();
        $autoIndicator.text('⏸ Lecture manuelle');

        // ================================================================
        // ÉVÉNEMENTS
        // ================================================================
        
        // Bouton Play/Pause
        $play.on('click', function() {
            togglePlay();
        });

        // Bouton Annuler le chargement
        $cancelLoading.on('click', function() {
            cancelLoading();
        });

        // Navigation
        $prev.on('click', function() {
            // Si chargement en cours, on annule
            if (isLoading) cancelLoading();
            goToPrev();
        });

        $next.on('click', function() {
            if (isLoading) cancelLoading();
            goToNext();
        });

        // Replay - relire le slide courant
        $replay.on('click', function() {
            if (isLoading) cancelLoading();
            stopSpeaking();
            setTimeout(() => {
                speakSlide(currentIndex);
            }, 100);
        });

        // Support du clavier (espace pour play/pause)
        $(document).on('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });

        // Nettoyage
        $(window).on('beforeunload', function() {
            try {
                if (synth.speaking) synth.cancel();
            } catch(e) {}
            hideLoading();
        });

        // Gérer les cas où la synthèse se termine de manière inattendue
        setInterval(() => {
            if (isPlaying && !synth.speaking && !synth.pending && !isPaused && !isLoading) {
                isPlaying = false;
                updatePlayButton();
                setStatus("⏸ Lecture arrêtée", 'paused');
            }
        }, 1000);
    }

    init();
});



    // ================================================================
    // GESTION DU THÈME JOUR/NUIT
    // ================================================================
    let isDarkMode = false;

    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const body = document.body;
        const appContainer = document.querySelector('.app-container');
        const header = document.querySelector('.slide-header');
        const footer = document.querySelector('.slide-footer');
        const contentCards = document.querySelectorAll('.content-card');
        const noteBoxes = document.querySelectorAll('.note-box');
        const mathBlocks = document.querySelectorAll('.math-block');
        const buttons = document.querySelectorAll('.btn');
        const statusBadge = document.querySelector('.status-badge');
        const slideCounter = document.querySelector('.slide-counter');
        const autoIndicator = document.querySelector('.auto-indicator');
        const themeBtn = document.getElementById('themeToggle');

        if (isDarkMode) {
            // Mode nuit
            body.style.background = '#0b1120';
            body.style.color = '#f1f5f9';
            appContainer.style.background = 'linear-gradient(145deg, #0f172a 0%, #1e293b 100%)';
            header.style.background = 'rgba(15, 23, 42, 0.85)';
            footer.style.background = 'rgba(15, 23, 42, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.05)';
                card.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.08)';
                note.style.color = '#cbd5e1';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.25)';
                block.style.borderColor = 'rgba(255,255,255,0.06)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#e2e8f0';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.12)';
                statusBadge.style.color = '#93bbfc';
            }
            if (slideCounter) {
                slideCounter.style.color = '#94a3b8';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#64748b';
            }
            if (themeBtn) {
                themeBtn.textContent = '☀️';
                themeBtn.title = 'Passer en mode jour';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#e2e8f0';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#e2e8f0';
                }
            });
        } else {
            // Mode jour (par défaut)
            body.style.background = '#f0f4f8';
            body.style.color = '#1a202c';
            appContainer.style.background = 'linear-gradient(145deg, #ffffff 0%, #f0f4f8 100%)';
            header.style.background = 'rgba(255, 255, 255, 0.85)';
            footer.style.background = 'rgba(255, 255, 255, 0.9)';
            contentCards.forEach(card => {
                card.style.background = 'rgba(255,255,255,0.8)';
                card.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            noteBoxes.forEach(note => {
                note.style.background = 'rgba(96, 165, 250, 0.12)';
                note.style.color = '#2c3e50';
            });
            mathBlocks.forEach(block => {
                block.style.background = 'rgba(0,0,0,0.05)';
                block.style.borderColor = 'rgba(0,0,0,0.08)';
            });
            buttons.forEach(btn => {
                btn.style.color = '#2d3748';
            });
            if (statusBadge) {
                statusBadge.style.background = 'rgba(96, 165, 250, 0.15)';
                statusBadge.style.color = '#2b6cb0';
            }
            if (slideCounter) {
                slideCounter.style.color = '#4a5568';
            }
            if (autoIndicator) {
                autoIndicator.style.color = '#718096';
            }
            if (themeBtn) {
                themeBtn.textContent = '🌓';
                themeBtn.title = 'Passer en mode nuit';
            }
            // Couleurs des titres dans les slides
            document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
                if (!el.closest('.note-box')) {
                    el.style.color = '#2c3e50';
                }
            });
            document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
                if (!el.closest('.note-box') && !el.closest('.math-block')) {
                    el.style.color = '#2d3748';
                }
            });
        }
    }

    // Initialiser en mode jour
    document.addEventListener('DOMContentLoaded', function() {

        const body = document.body;

        }
        
        const autoIndicator = document.querySelector('.auto-indicator');
        if (autoIndicator) {

        }
        
        document.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body h4').forEach(el => {
            if (!el.closest('.note-box')) {
                el.style.color = '#2c3e50';
            }
        });
        
        document.querySelectorAll('.slide-body p, .slide-body li, .slide-body td, .slide-body th').forEach(el => {
            if (!el.closest('.note-box') && !el.closest('.math-block')) {

        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.textContent = '🌓';
            themeBtn.title = 'Passer en mode nuit';
        }
    });
</script>
