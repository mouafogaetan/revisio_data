<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
 "matiere": "Maths Tle C",
 "classe": "Terminale C",
 "sequence": "Séquence 4",
 "anneeScolaire": "2025-2026",
 "exercices": [
   {
     "titre": "Exercice 1 : Équations différentielles",
     "points": "4 pts",
     "enonce": "<p>On considère l'équation différentielle <span class='math-inline'>\\( (E) : y'' - 4y' + 3y = 0 \\)</span>.</p><p>1. Résoudre l'équation différentielle (E).</p><p>2. Déterminer la solution particulière de (E) vérifiant les conditions initiales <span class='math-inline'>\\( y(0) = 1 \\)</span> et <span class='math-inline'>\\( y'(0) = 1 \\)</span>.</p><p>3. On note <span class='math-inline'>\\( f \\)</span> la fonction solution ainsi trouvée. Étudier les variations de <span class='math-inline'>\\( f \\)</span> sur <span class='math-inline'>\\( \\mathbb{R} \\)</span>.</p>",
     "questions": [
       {
         "question": "1) Résoudre l'équation différentielle (E).",
         "reponse": "L'équation caractéristique est <span class='math-inline'>\\( r^2 - 4r + 3 = 0 \\)</span>, soit <span class='math-inline'>\\( (r-1)(r-3) = 0 \\)</span>. Les racines sont <span class='math-inline'>\\( r_1 = 1 \\)</span> et <span class='math-inline'>\\( r_2 = 3 \\)</span>. La solution générale est donc <span class='math-inline'>\\( y(x) = C_1 e^{x} + C_2 e^{3x} \\)</span>, avec <span class='math-inline'>\\( C_1, C_2 \\in \\mathbb{R} \\)</span>."
       },
       {
         "question": "2) Déterminer la solution particulière vérifiant <span class='math-inline'>\\( y(0) = 1 \\)</span> et <span class='math-inline'>\\( y'(0) = 1 \\)</span>.",
         "reponse": "On a <span class='math-inline'>\\( y(0) = C_1 + C_2 = 1 \\)</span>. <span class='math-inline'>\\( y'(x) = C_1 e^{x} + 3C_2 e^{3x} \\)</span>, donc <span class='math-inline'>\\( y'(0) = C_1 + 3C_2 = 1 \\)</span>. En résolvant le système, on trouve <span class='math-inline'>\\( C_2 = 0 \\)</span> et <span class='math-inline'>\\( C_1 = 1 \\)</span>. La solution est <span class='math-inline'>\\( y(x) = e^{x} \\)</span>."
       },
       {
         "question": "3) Étudier les variations de la fonction <span class='math-inline'>\\( f(x) = e^{x} \\)</span>.",
         "reponse": "La fonction <span class='math-inline'>\\( f \\)</span> est définie et dérivable sur <span class='math-inline'>\\( \\mathbb{R} \\)</span>. Sa dérivée est <span class='math-inline'>\\( f'(x) = e^{x} > 0 \\)</span> pour tout <span class='math-inline'>\\( x \\in \\mathbb{R} \\)</span>. Donc <span class='math-inline'>\\( f \\)</span> est strictement croissante sur <span class='math-inline'\\( \\mathbb{R} \\)</span>. De plus, <span class='math-inline'>\\( \\lim_{x \\to -\\infty} f(x) = 0 \\)</span> et <span class='math-inline'>\\( \\lim_{x \\to +\\infty} f(x) = +\\infty \\)</span>."
       }
     ]
   },
   {
     "titre": "Exercice 2 : Statistiques et Ajustement Linéaire",
     "points": "4 pts",
     "enonce": "<p>Un concessionnaire automobile a relevé, pour la vente d'un modèle, les données suivantes pour les années 2018 à 2023 :</p><div class='math-block' style='text-align: center;'><table style='margin: 0 auto; border-collapse: collapse;'><tr><th style='border: 1px solid black; padding: 8px;'>Année</th><td style='border: 1px solid black; padding: 8px;'>2018</td><td style='border: 1px solid black; padding: 8px;'>2019</td><td style='border: 1px solid black; padding: 8px;'>2020</td><td style='border: 1px solid black; padding: 8px;'>2021</td><td style='border: 1px solid black; padding: 8px;'>2022</td><td style='border: 1px solid black; padding: 8px;'>2023</td></tr><tr><th style='border: 1px solid black; padding: 8px;'>Rang x_i</th><td style='border: 1px solid black; padding: 8px;'>1</td><td style='border: 1px solid black; padding: 8px;'>2</td><td style='border: 1px solid black; padding: 8px;'>3</td><td style='border: 1px solid black; padding: 8px;'>4</td><td style='border: 1px solid black; padding: 8px;'>5</td><td style='border: 1px solid black; padding: 8px;'>6</td></tr><tr><th style='border: 1px solid black; padding: 8px;'>Ventes y_i</th><td style='border: 1px solid black; padding: 8px;'>15</td><td style='border: 1px solid black; padding: 8px;'>18</td><td style='border: 1px solid black; padding: 8px;'>21</td><td style='border: 1px solid black; padding: 8px;'>25</td><td style='border: 1px solid black; padding: 8px;'>28</td><td style='border: 1px solid black; padding: 8px;'>31</td></tr></table></div><p>1. Représenter le nuage de points de cette série statistique.</p><p>2. Calculer les coordonnées du point moyen G.</p><p>3. En utilisant la méthode des moindres carrés, déterminer une équation de la droite de régression de y en x.</p><p>4. En déduire une estimation du nombre de ventes pour l'année 2025.</p>",
     "questions": [
       {
         "question": "1) Représenter le nuage de points.",
         "reponse": "Le nuage de points est constitué des points de coordonnées (1, 15), (2, 18), (3, 21), (4, 25), (5, 28) et (6, 31) dans un repère orthonormé."
       },
       {
         "question": "2) Calculer les coordonnées du point moyen G.",
         "reponse": "<span class='math-inline'>\\( \\bar{x} = \\dfrac{1+2+3+4+5+6}{6} = 3.5 \\)</span> et <span class='math-inline'>\\( \\bar{y} = \\dfrac{15+18+21+25+28+31}{6} = 23 \\)</span>. Donc <span class='math-inline'>\\( G(3.5, 23) \\)</span>."
       },
       {
         "question": "3) Déterminer une équation de la droite de régression de y en x.",
         "reponse": "On calcule la covariance et la variance. <span class='math-inline'>\\( \\sum x_i y_i = 1\\times15 + 2\\times18 + 3\\times21 + 4\\times25 + 5\\times28 + 6\\times31 = 15 + 36 + 63 + 100 + 140 + 186 = 540 \\)</span>. <span class='math-inline'>\\( \\sum x_i^2 = 1+4+9+16+25+36 = 91 \\)</span>. <span class='math-inline'>\\( \\bar{x} = 3.5 \\)</span> et <span class='math-inline'>\\( \\bar{y} = 23 \\)</span>. La covariance est <span class='math-inline'>\\( \\text{Cov}(x,y) = \\dfrac{540}{6} - 3.5 \\times 23 = 90 - 80.5 = 9.5 \\)</span>. La variance de x est <span class='math-inline'>\\( V(x) = \\dfrac{91}{6} - (3.5)^2 \\approx 15.17 - 12.25 = 2.92 \\)</span>. Le coefficient directeur est <span class='math-inline'>\\( a = \\dfrac{9.5}{2.92} \\approx 3.25 \\)</span>. Ordonnée à l'origine : <span class='math-inline'>\\( b = 23 - 3.25 \\times 3.5 = 23 - 11.375 = 11.625 \\)</span>. L'équation est <span class='math-inline'>\\( y = 3.25x + 11.625 \\)</span>."
       },
       {
         "question": "4) En déduire une estimation du nombre de ventes pour l'année 2025.",
         "reponse": "Pour l'année 2025, le rang est <span class='math-inline'>\\( x = 8 \\)</span>. On a <span class='math-inline'>\\( y = 3.25 \\times 8 + 11.625 = 26 + 11.625 = 37.625 \\)</span>. On estime à environ 38 ventes."
       }
     ]
   },
   {
     "titre": "Exercice 3 : Arithmétique et Probabilités",
     "points": "4 pts",
     "enonce": "<p>Un sac contient des jetons numérotés de 1 à 30.</p><p>1. On tire un jeton au hasard. Calculer la probabilité des événements suivants :</p><ul><li>A : « le numéro est divisible par 3 ».</li><li>B : « le numéro est divisible par 5 ».</li><li>C : « le numéro est divisible par 3 et par 5 ».</li></ul><p>2. En déduire la probabilité que le numéro soit divisible par 3 ou par 5.</p><p>3. Si on tire deux jetons simultanément, quelle est la probabilité que la somme de leurs numéros soit divisible par 3 ?</p>",
     "questions": [
       {
         "question": "1) Calculer les probabilités des événements A, B et C.",
         "reponse": "Les numéros divisibles par 3 entre 1 et 30 sont 3, 6, 9, 12, 15, 18, 21, 24, 27, 30 (10 numéros). Donc <span class='math-inline'>\\( P(A) = \\dfrac{10}{30} = \\dfrac{1}{3} \\)</span>. Les numéros divisibles par 5 sont 5, 10, 15, 20, 25, 30 (6 numéros). Donc <span class='math-inline'>\\( P(B) = \\dfrac{6}{30} = \\dfrac{1}{5} \\)</span>. L'événement C est l'intersection A∩B, les numéros divisibles par 15 : 15, 30. Donc <span class='math-inline'>\\( P(C) = \\dfrac{2}{30} = \\dfrac{1}{15} \\)</span>."
       },
       {
         "question": "2) En déduire la probabilité que le numéro soit divisible par 3 ou par 5.",
         "reponse": "La probabilité de l'union est <span class='math-inline'>\\( P(A \\cup B) = P(A) + P(B) - P(A \\cap B) = \\dfrac{1}{3} + \\dfrac{1}{5} - \\dfrac{1}{15} = \\dfrac{5+3-1}{15} = \\dfrac{7}{15} \\)</span>."
       },
       {
         "question": "3) Quelle est la probabilité que la somme de deux jetons tirés simultanément soit divisible par 3 ?",
         "reponse": "Il y a <span class='math-inline'>\\( \\binom{30}{2} = 435 \\)</span> tirages possibles. Pour que la somme soit divisible par 3, on peut avoir deux multiples de 3 (on tire deux numéros parmi les 10 multiples de 3) : <span class='math-inline'>\\( \\binom{10}{2} = 45 \\)</span>. On peut aussi avoir un nombre congru à 1 modulo 3 et un nombre congru à 2 modulo 3. Il y a 10 nombres congrus à 1 (1,4,7,10,13,16,19,22,25,28) et 10 nombres congrus à 2 (2,5,8,11,14,17,20,23,26,29), ce qui donne <span class='math-inline'>\\( 10 \\times 10 = 100 \\)</span> possibilités. Le nombre de cas favorables est <span class='math-inline'>\\( 45 + 100 = 145 \\)</span>. La probabilité est <span class='math-inline'>\\( \\dfrac{145}{435} = \\dfrac{29}{87} \\)</span>."
       }
     ]
   },
   {
     "titre": "Exercice 4 : Nombres Complexes et Géométrie",
     "points": "4 pts",
     "enonce": "<p>Le plan complexe est rapporté à un repère orthonormé direct <span class='math-inline'>\\( (O, \\vec{u}, \\vec{v}) \\)</span>.</p><p>On considère les points A, B et C d'affixes respectives <span class='math-inline'>\\( z_A = 1 + i \\sqrt{3} \\)</span>, <span class='math-inline'>\\( z_B = -1 + i \\sqrt{3} \\)</span> et <span class='math-inline'>\\( z_C = -2i \\)</span>.</p><p>1. Écrire les nombres complexes <span class='math-inline'>\\( z_A \\)</span>, <span class='math-inline'>\\( z_B \\)</span> et <span class='math-inline'>\\( z_C \\)</span> sous forme exponentielle.</p><p>2. En déduire la nature du triangle ABC.</p><p>3. Déterminer l'affixe du point D, image de A par la rotation de centre O et d'angle <span class='math-inline'>\\( \\dfrac{\\pi}{3} \\)</span>.</p>",
     "questions": [
       {
         "question": "1) Écrire les nombres complexes <span class='math-inline'>\\( z_A, z_B, z_C \\)</span> sous forme exponentielle.",
         "reponse": "<span class='math-inline'>\\( |z_A| = \\sqrt{1^2 + (\\sqrt{3})^2} = 2 \\)</span> et <span class='math-inline'>\\( \\arg(z_A) = \\dfrac{\\pi}{3} \\)</span>, donc <span class='math-inline'>\\( z_A = 2 e^{i\\pi/3} \\)</span>. <span class='math-inline'>\\( |z_B| = \\sqrt{(-1)^2 + (\\sqrt{3})^2} = 2 \\)</span> et <span class='math-inline'>\\( \\arg(z_B) = \\dfrac{2\\pi}{3} \\)</span>, donc <span class='math-inline'>\\( z_B = 2 e^{i2\\pi/3} \\)</span>. <span class='math-inline'>\\( |z_C| = 2 \\)</span> et <span class='math-inline'>\\( \\arg(z_C) = -\\dfrac{\\pi}{2} \\)</span>, donc <span class='math-inline'>\\( z_C = 2 e^{-i\\pi/2} \\)</span>."
       },
       {
         "question": "2) En déduire la nature du triangle ABC.",
         "reponse": "Les trois affixes ont le même module 2. Les points A, B et C appartiennent donc au cercle de centre O et de rayon 2. De plus, les arguments sont en progression arithmétique : <span class='math-inline'>\\( \\pi/3, 2\\pi/3, -\\pi/2 \\)</span> (soit <span class='math-inline'>\\( \\pi/3, 2\\pi/3, 3\\pi/2 \\)</span> mod <span class='math-inline'>\\( 2\\pi \\)</span>). Les trois points forment un triangle équilatéral."

       {

         "reponse": "L'écriture complexe d'une rotation de centre O et d'angle θ est <span class='math-inline'>\\( z' = e^{i\\theta} z \\)</span>. Donc <span class='math-inline'>\\( z_D = e^{i\\pi/3} \\times 2 e^{i\\pi/3} = 2 e^{i2\\pi/3} = z_B \\)</span>. Le point D est confondu avec B."

   {

     "enonce": "<p>La vitesse de refroidissement d'un corps est proportionnelle à la différence entre la température du corps et la température ambiante (loi de Newton).</p><p>On suppose que la température ambiante est de <span class='math-inline'>\\( 20°C \\)</span> et qu'à l'instant <span class='math-inline'>\\( t=0 \\)</span> (en minutes), la température du corps est de <span class='math-inline'>\\( 80°C \\)</span>. On note <span class='math-inline'>\\( T(t) \\)</span> la température du corps à l'instant <span class='math-inline'>\\( t \\)</span>.</p><p>1. Montrer que <span class='math-inline'>\\( T \\)</span> vérifie l'équation différentielle <span class='math-inline'>\\( T'(t) = -k (T(t) - 20) \\)</span>, où <span class='math-inline'>\\( k > 0 \\)</span> est une constante.</p><p>2. Résoudre cette équation différentielle.</p><p>3. Si au bout de 5 minutes, la température du corps est de <span class='math-inline'>\\( 60°C \\)</span>, déterminer la valeur de <span class='math-inline'>\\( k \\)</span>.</p><p>4. Au bout de combien de temps la température du corps sera-t-elle de <span class='math-inline'>\\( 30°C \\)</span> ?</p>",
     "questions": [
       {

         "reponse": "La loi de Newton dit que la vitesse de refroidissement est proportionnelle à la différence entre la température du corps et la température ambiante. On a donc <span class='math-inline'>\\( T'(t) = -k (T(t) - 20) \\)</span>, le signe négatif indiquant que la température diminue."

       },
       {
         "question": "3) Déterminer la valeur de k.",
         "reponse": "A <span class='math-inline'>\\( t=0 \\)</span>, <span class='math-inline'>\\( T(0) = 20 + C = 80 \\)</span>, donc <span class='math-inline'>\\( C = 60 \\)</span>. A <span class='math-inline'>\\( t=5 \\)</span>, <span class='math-inline'>\\( T(5) = 20 + 60 e^{-5k} = 60 \\)</span>, donc <span class='math-inline'>\\( 60 e^{-5k} = 40 \\)</span>, soit <span class='math-inline'>\\( e^{-5k} = \\dfrac{2}{3} \\)</span>. On a <span class='math-inline'>\\( -5k = \\ln\\left(\\dfrac{2}{3}\\right) \\)</span>, donc <span class='math-inline'>\\( k = -\\dfrac{1}{5} \\ln\\left(\\dfrac{2}{3}\\right) = \\dfrac{1}{5} \\ln\\left(\\dfrac{3}{2}\\right) \\)</span>."

         "reponse": "On résout <span class='math-inline'>\\( T(t) = 20 + 60 e^{-kt} = 30 \\)</span>, soit <span class='math-inline'>\\( 60 e^{-kt} = 10 \\)</span>, donc <span class='math-inline'>\\( e^{-kt} = \\dfrac{1}{6} \\)</span>. <span class='math-inline'>\\( -kt = \\ln\\left(\\dfrac{1}{6}\\right) = -\\ln 6 \\)</span>, donc <span class='math-inline'>\\( t = \\dfrac{\\ln 6}{k} = \\dfrac{5 \\ln 6}{\\ln(3/2)} \\)</span> minutes."

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
