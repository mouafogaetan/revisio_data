<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Mathématiques",
  "classe": "Terminale C",
  "sequence": "Séquence 3",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Arithmétique dans ℤ",
      "points": "4 pts",
      "enonce": "<p>Le plan est muni d'un repère orthonormé \\( (O, \\vec{i}, \\vec{j}) \\).</p><p>1. Démontrer que pour tout entier naturel \\( n \\), le nombre \\( 3^{2n+1} + 2^{n+2} \\) est divisible par 7.</p><p>2. Résoudre dans \\( \\mathbb{Z}^2 \\) l'équation diophantienne : \\( 17x - 5y = 3 \\).</p><p>3. En déduire l'ensemble des entiers naturels \\( n \\) tels que \\( 17n - 5 \\equiv 3 \\mod 7 \\).</p>",
      "questions": [
        {
          "question": "1. Démontrer que pour tout entier naturel \\( n \\), \\( 3^{2n+1} + 2^{n+2} \\) est divisible par 7.",
          "reponse": "<p>On procède par récurrence sur \\( n \\).</p><p>Initialisation : Pour \\( n = 0 \\), \\( 3^{1} + 2^{2} = 3 + 4 = 7 \\) qui est divisible par 7. La propriété est vraie.</p><p>Hérédité : Supposons que \\( P(n) \\) est vraie, c'est-à-dire qu'il existe \\( k \\in \\mathbb{N} \\) tel que \\( 3^{2n+1} + 2^{n+2} = 7k \\).</p><p>Montrons que \\( P(n+1) \\) est vraie :</p><p>\\( 3^{2(n+1)+1} + 2^{(n+1)+2} = 3^{2n+3} + 2^{n+3} = 9 \\times 3^{2n+1} + 2 \\times 2^{n+2} \\)</p><p>En utilisant l'hypothèse \\( 3^{2n+1} = 7k - 2^{n+2} \\) :</p><p>\\( 9(7k - 2^{n+2}) + 2 \\times 2^{n+2} = 63k - 9 \\times 2^{n+2} + 2 \\times 2^{n+2} = 63k - 7 \\times 2^{n+2} = 7(9k - 2^{n+2}) \\)</p><p>Donc \\( 3^{2(n+1)+1} + 2^{(n+1)+2} \\) est divisible par 7. La propriété est héréditaire.</p><p>Conclusion : Par récurrence, pour tout \\( n \\in \\mathbb{N} \\), \\( 3^{2n+1} + 2^{n+2} \\) est divisible par 7.</p>"
        },
        {
          "question": "2. Résoudre dans \\( \\mathbb{Z}^2 \\) l'équation diophantienne : \\( 17x - 5y = 3 \\).",
          "reponse": "<p>On cherche une solution particulière. \\( 17 \\times 2 - 5 \\times 7 = 34 - 35 = -1 \\). Donc \\( 17 \\times (-6) - 5 \\times (-21) = 3 \\). Une solution particulière est \\( (x_0, y_0) = (-6, -21) \\).</p><p>La solution générale de l'équation homogène \\( 17x - 5y = 0 \\) est \\( x = 5k, y = 17k \\) avec \\( k \\in \\mathbb{Z} \\).</p><p>La solution générale de \\( 17x - 5y = 3 \\) est donc :</p><p>$$ \\boxed{ (x, y) = (5k - 6, 17k - 21), \\quad k \\in \\mathbb{Z} } $$</p>"
        },
        {
          "question": "3. En déduire l'ensemble des entiers naturels \\( n \\) tels que \\( 17n - 5 \\equiv 3 \\mod 7 \\).",
          "reponse": "<p>On a \\( 17n - 5 \\equiv 3 \\mod 7 \\) ce qui équivaut à \\( 17n - 5y = 3 \\) avec \\( y = 1 \\).</p><p>D'après la question 2, les solutions entières de \\( 17x - 5y = 3 \\) sont \\( x = 5k - 6 \\) et \\( y = 17k - 21 \\).</p><p>Pour \\( y = 1 \\), on a \\( 17k - 21 = 1 \\) donc \\( 17k = 22 \\), ce qui n'a pas de solution entière.</p><p>Il faut donc résoudre \\( 17n - 5 \\equiv 3 \\mod 7 \\) directement :</p><p>\\( 17 \\equiv 3 \\mod 7 \\) et \\( -5 \\equiv 2 \\mod 7 \\), donc \\( 3n + 2 \\equiv 3 \\mod 7 \\) soit \\( 3n \\equiv 1 \\mod 7 \\).</p><p>L'inverse de 3 modulo 7 est 5 car \\( 3 \\times 5 = 15 \\equiv 1 \\mod 7 \\).</p><p>Donc \\( n \\equiv 1 \\times 5 \\mod 7 \\) soit \\( n \\equiv 5 \\mod 7 \\).</p><p>L'ensemble des solutions est : $$ \\boxed{ n \\equiv 5 \\mod 7 \\text{ soit } n = 7k + 5, \\quad k \\in \\mathbb{N} } $$</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Nombres Complexes",
      "points": "4 pts",
      "enonce": "<p>On considère le nombre complexe \\( z = \\frac{(2 + i)^2}{1 - 3i} \\).</p><p>1. Mettre \\( z \\) sous forme algébrique.</p><p>2. Déterminer le module et un argument de \\( z \\).</p><p>3. En déduire la forme trigonométrique et exponentielle de \\( z \\).</p>",
      "questions": [
        {
          "question": "1. Mettre \\( z \\) sous forme algébrique.",
          "reponse": "<p>On calcule \\( (2 + i)^2 = 4 + 4i + i^2 = 3 + 4i \\).</p><p>$$ z = \\frac{3 + 4i}{1 - 3i} = \\frac{(3 + 4i)(1 + 3i)}{(1 - 3i)(1 + 3i)} = \\frac{3 + 9i + 4i + 12i^2}{1 + 9} = \\frac{3 - 12 + 13i}{10} = \\frac{-9 + 13i}{10} $$</p><p>Donc la forme algébrique de \\( z \\) est : $$ \\boxed{ z = -\\frac{9}{10} + \\frac{13}{10}i } $$</p>"
        },
        {
          "question": "2. Déterminer le module et un argument de \\( z \\).",
          "reponse": "<p>Le module est : \\( |z| = \\sqrt{(-9/10)^2 + (13/10)^2} = \\frac{1}{10} \\sqrt{81 + 169} = \\frac{\\sqrt{250}}{10} = \\frac{5\\sqrt{10}}{10} = \\frac{\\sqrt{10}}{2} \\).</p><p>Pour l'argument, on a \\( \\cos \\theta = \\frac{-9/10}{\\sqrt{10}/2} = -\\frac{9}{5\\sqrt{10}} \\) et \\( \\sin \\theta = \\frac{13/10}{\\sqrt{10}/2} = \\frac{13}{5\\sqrt{10}} \\).</p><p>Un argument est donc \\( \\theta = \\pi - \\arctan(13/9) \\).</p><p>$$ \\boxed{ |z| = \\frac{\\sqrt{10}}{2}, \\quad \\arg(z) = \\pi - \\arctan\\left(\\frac{13}{9}\\right) } $$</p>"
        },
        {
          "question": "3. En déduire la forme trigonométrique et exponentielle de \\( z \\).",
          "reponse": "<p>La forme trigonométrique est : \\( z = \\frac{\\sqrt{10}}{2} (\\cos \\theta + i \\sin \\theta) \\).</p><p>La forme exponentielle est : \\( z = \\frac{\\sqrt{10}}{2} e^{i\\theta} \\).</p><p>$$ \\boxed{ z = \\frac{\\sqrt{10}}{2} e^{i(\\pi - \\arctan(13/9))} } $$</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Suites Numériques",
      "points": "4 pts",
      "enonce": "<p>On considère la suite \\( (u_n) \\) définie par \\( u_0 = 1 \\) et pour tout \\( n \\in \\mathbb{N} \\), \\( u_{n+1} = \\sqrt{u_n + 2} \\).</p><p>1. Montrer que pour tout \\( n \\in \\mathbb{N} \\), \\( 0 < u_n < 2 \\).</p><p>2. Étudier la monotonie de la suite \\( (u_n) \\).</p><p>3. Justifier que la suite \\( (u_n) \\) converge et déterminer sa limite.</p>",
      "questions": [
        {
          "question": "1. Montrer que pour tout \\( n \\in \\mathbb{N} \\), \\( 0 < u_n < 2 \\).",
          "reponse": "<p>On procède par récurrence.</p><p>Initialisation : Pour \\( n = 0 \\), \\( u_0 = 1 \\), donc \\( 0 < 1 < 2 \\). La propriété est vraie.</p><p>Hérédité : Supposons que \\( 0 < u_n < 2 \\). Alors \\( 2 < u_n + 2 < 4 \\).</p><p>Comme la fonction racine carrée est strictement croissante sur \\( [0, +\\infty[ \\) : \\( \\sqrt{2} < \\sqrt{u_n + 2} < 2 \\).</p><p>Donc \\( 0 < u_{n+1} < 2 \\). La propriété est héréditaire.</p><p>Conclusion : Par récurrence, pour tout \\( n \\in \\mathbb{N} \\), \\( 0 < u_n < 2 \\).</p>"
        },
        {
          "question": "2. Étudier la monotonie de la suite \\( (u_n) \\).",
          "reponse": "<p>On étudie le signe de \\( u_{n+1} - u_n \\).</p><p>$$ u_{n+1} - u_n = \\sqrt{u_n + 2} - u_n = \\frac{(\\sqrt{u_n + 2} - u_n)(\\sqrt{u_n + 2} + u_n)}{\\sqrt{u_n + 2} + u_n} = \\frac{u_n + 2 - u_n^2}{\\sqrt{u_n + 2} + u_n} $$</p><p>Or \\( -u_n^2 + u_n + 2 = -(u_n - 2)(u_n + 1) \\).</p><p>Comme \\( 0 < u_n < 2 \\), on a \\( u_n - 2 < 0 \\) et \\( u_n + 1 > 0 \\), donc \\( -(u_n - 2)(u_n + 1) > 0 \\).</p><p>Le dénominateur \\( \\sqrt{u_n + 2} + u_n > 0 \\).</p><p>Donc \\( u_{n+1} - u_n > 0 \\) : la suite \\( (u_n) \\) est strictement croissante.</p>"
        },
        {
          "question": "3. Justifier que la suite \\( (u_n) \\) converge et déterminer sa limite.",
          "reponse": "<p>La suite \\( (u_n) \\) est croissante et majorée par 2, donc d'après le théorème de la convergence monotone, elle converge vers une limite \\( l \\).</p><p>Comme \\( u_{n+1} = \\sqrt{u_n + 2} \\) et que la fonction \\( x \\mapsto \\sqrt{x+2} \\) est continue sur \\( [0, 2] \\), on passe à la limite : \\( l = \\sqrt{l + 2} \\).</p><p>On résout \\( l^2 = l + 2 \\) avec \\( l \\geq 0 \\), soit \\( l^2 - l - 2 = 0 \\) : \\( (l - 2)(l + 1) = 0 \\).</p><p>La limite est donc \\( l = 2 \\) (car \\( l = -1 \\) est impossible).</p><p>$$ \\boxed{ \\lim_{n \\to +\\infty} u_n = 2 } $$</p>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Ajustement Linéaire",
      "points": "4 pts",
      "enonce": "<p>Une entreprise de production de cacao au Cameroun a relevé sa production annuelle \\( y \\) (en tonnes) en fonction du nombre d'années \\( x \\) depuis 2020. Les données sont les suivantes :</p><ul><li>2020 : 12 t</li><li>2021 : 15 t</li><li>2022 : 18 t</li><li>2023 : 21 t</li><li>2024 : 25 t</li></ul><p>1. Déterminer le point moyen \\( G \\) de cette série.</p><p>2. Calculer le coefficient de corrélation linéaire. Interpréter le résultat.</p><p>3. Déterminer l'équation de la droite de régression de \\( y \\) en \\( x \\) par la méthode des moindres carrés.</p><p>4. Estimer la production pour l'année 2026.</p>",
      "questions": [
        {
          "question": "1. Déterminer le point moyen \\( G \\) de cette série.",
          "reponse": "<p>On prend \\( x \\) comme le nombre d'années depuis 2020 :</p><ul><li>2020 : \\( x=0 \\), \\( y=12 \\)</li><li>2021 : \\( x=1 \\), \\( y=15 \\)</li><li>2022 : \\( x=2 \\), \\( y=18 \\)</li><li>2023 : \\( x=3 \\), \\( y=21 \\)</li><li>2024 : \\( x=4 \\), \\( y=25 \\)</li></ul><p>$$ \\bar{x} = \\frac{0 + 1 + 2 + 3 + 4}{5} = 2 $$</p><p>$$ \\bar{y} = \\frac{12 + 15 + 18 + 21 + 25}{5} = 18,2 $$</p><p>Le point moyen est donc : $$ \\boxed{ G(2, 18,2) } $$</p>"
        },
        {
          "question": "2. Calculer le coefficient de corrélation linéaire. Interpréter le résultat.",
          "reponse": "<p>On calcule les sommes nécessaires :</p><p>$$ \\sum x_i^2 = 0 + 1 + 4 + 9 + 16 = 30 $$</p><p>$$ \\sum y_i^2 = 144 + 225 + 324 + 441 + 625 = 1759 $$</p><p>$$ \\sum x_i y_i = 0 \\times 12 + 1 \\times 15 + 2 \\times 18 + 3 \\times 21 + 4 \\times 25 = 0 + 15 + 36 + 63 + 100 = 214 $$</p><p>La covariance : \\( \\text{Cov}(x,y) = \\frac{214}{5} - 2 \\times 18,2 = 42,8 - 36,4 = 6,4 \\)</p><p>Les variances : \\( V(x) = \\frac{30}{5} - 2^2 = 6 - 4 = 2 \\)</p><p>\\( V(y) = \\frac{1759}{5} - 18,2^2 = 351,8 - 331,24 = 20,56 \\)</p><p>Le coefficient de corrélation :</p><p>$$ r = \\frac{6,4}{\\sqrt{2 \\times 20,56}} = \\frac{6,4}{\\sqrt{41,12}} = \\frac{6,4}{6,41} \\approx 0,998 $$</p><p>Le coefficient est très proche de 1, ce qui indique une corrélation très forte et positive entre le temps et la production. L'ajustement linéaire est excellent.</p>"
        },
        {
          "question": "3. Déterminer l'équation de la droite de régression de \\( y \\) en \\( x \\) par la méthode des moindres carrés.",
          "reponse": "<p>Le coefficient directeur est : \\( a = \\frac{\\text{Cov}(x,y)}{V(x)} = \\frac{6,4}{2} = 3,2 \\).</p><p>L'ordonnée à l'origine : \\( b = \\bar{y} - a\\bar{x} = 18,2 - 3,2 \\times 2 = 18,2 - 6,4 = 11,8 \\).</p><p>L'équation de la droite de régression est : $$ \\boxed{ y = 3,2x + 11,8 } $$</p>"
        },
        {
          "question": "4. Estimer la production pour l'année 2026.",
          "reponse": "<p>Pour l'année 2026, \\( x = 2026 - 2020 = 6 \\).</p><p>$$ y = 3,2 \\times 6 + 11,8 = 19,2 + 11,8 = 31 $$</p><p>La production estimée pour 2026 est d'environ 31 tonnes.</p>"

    {

      "points": "4 pts",
      "enonce": "<p>On considère l'équation différentielle \\( (E) : y'' + 4y = 0 \\).</p><p>1. Résoudre l'équation \\( (E) \\) sur \\( \\mathbb{R} \\).</p><p>2. Déterminer la solution \\( f \\) de \\( (E) \\) vérifiant \\( f(0) = 1 \\) et \\( f'(0) = 2 \\).</p><p>3. Résoudre l'équation différentielle \\( (E') : y'' + 4y = 1 \\).</p>",
      "questions": [
        {
          "question": "1. Résoudre l'équation \\( (E) : y'' + 4y = 0 \\) sur \\( \\mathbb{R} \\).",
          "reponse": "<p>L'équation caractéristique est : \\( r^2 + 4 = 0 \\), soit \\( r^2 = -4 \\).</p><p>Les racines sont \\( r = \\pm 2i \\).</p><p>La solution générale sur \\( \\mathbb{R} \\) est :</p><p>$$ \\boxed{ y(x) = A \\cos(2x) + B \\sin(2x), \\quad A, B \\in \\mathbb{R} } $$</p>"
        },
        {
          "question": "2. Déterminer la solution \\( f \\) de \\( (E) \\) vérifiant \\( f(0) = 1 \\) et \\( f'(0) = 2 \\).",
          "reponse": "<p>On a \\( f(x) = A \\cos(2x) + B \\sin(2x) \\).</p><p>$$ f(0) = A \\cos(0) + B \\sin(0) = A = 1 $$</p><p>$$ f'(x) = -2A \\sin(2x) + 2B \\cos(2x) $$</p><p>$$ f'(0) = 2B = 2 \\Rightarrow B = 1 $$</p><p>La solution est donc : $$ \\boxed{ f(x) = \\cos(2x) + \\sin(2x) } $$</p>"

        {
          "question": "3. Résoudre l'équation différentielle \\( (E') : y'' + 4y = 1 \\).",
          "reponse": "<p>La solution générale de \\( (E') \\) est la somme de la solution générale de l'équation homogène associée \\( (E) \\) et d'une solution particulière de \\( (E') \\).</p><p>On cherche une solution particulière constante \\( y_p = C \\). Alors \\( y_p'' = 0 \\) et \\( 4C = 1 \\) donc \\( C = 1/4 \\).</p><p>La solution générale de \\( (E') \\) est :</p><p>$$ \\boxed{ y(x) = \\frac{1}{4} + A \\cos(2x) + B \\sin(2x), \\quad A, B \\in \\mathbb{R} } $$</p>"

    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>
