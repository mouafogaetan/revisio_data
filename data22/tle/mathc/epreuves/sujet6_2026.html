<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Mathématiques",
  "classe": "Terminale C",
  "sequence": "Séquence 6",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Arithmétique et Congruences",
      "points": "4 pts",
      "enonce": "<p>Le but de cet exercice est de résoudre des problèmes de divisibilité et de congruences dans $\\mathbb{Z}$.</p>",
      "questions": [
        {
          "question": "<p><strong>1.</strong> Déterminer, à l'aide de l'algorithme d'Euclide, le PGCD de 756 et 441.</p>",
          "reponse": "<p>$756 = 441 \\times 1 + 315$<br>$441 = 315 \\times 1 + 126$<br>$315 = 126 \\times 2 + 63$<br>$126 = 63 \\times 2 + 0$<br>Donc $\\text{PGCD}(756, 441) = 63$.</p>"
        },
        {
          "question": "<p><strong>2.</strong> En déduire le PPCM de 756 et 441.</p>",
          "reponse": "<p>$\\text{PPCM}(756, 441) = \\dfrac{756 \\times 441}{\\text{PGCD}(756, 441)} = \\dfrac{756 \\times 441}{63} = 12 \\times 441 = 5292$.</p>"
        },
        {
          "question": "<p><strong>3.</strong> Résoudre dans $\\mathbb{Z}^2$ l'équation $756x + 441y = 63$.</p>",
          "reponse": "<p>En divisant par 63, on obtient $12x + 7y = 1$.<br>Une solution particulière est $(x_0, y_0) = (3, -5)$ car $12 \\times 3 + 7 \\times (-5) = 36 - 35 = 1$.<br>La solution générale est : $x = 3 + 7k$ et $y = -5 - 12k$ avec $k \\in \\mathbb{Z}$.</p>"
        },
        {
          "question": "<p><strong>4.</strong> Déterminer le reste de la division euclidienne de $2^{100}$ par 7.</p>",
          "reponse": "<p>$2^1 \\equiv 2 \\pmod{7}$, $2^2 \\equiv 4 \\pmod{7}$, $2^3 \\equiv 1 \\pmod{7}$.<br>$100 = 3 \\times 33 + 1$.<br>Donc $2^{100} \\equiv (2^3)^{33} \\times 2^1 \\equiv 1^{33} \\times 2 \\equiv 2 \\pmod{7}$.<br>Le reste est 2.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Nombres Complexes",
      "points": "4 pts",
      "enonce": "<p>Cet exercice porte sur la manipulation des nombres complexes sous forme algébrique et trigonométrique.</p>",
      "questions": [
        {
          "question": "<p><strong>1.</strong> Résoudre dans $\\mathbb{C}$ l'équation $z^2 - 6z + 13 = 0$.</p>",
          "reponse": "<p>$\\Delta = (-6)^2 - 4 \\times 1 \\times 13 = 36 - 52 = -16 = (4i)^2$.<br>Les solutions sont $z_1 = \\dfrac{6 + 4i}{2} = 3 + 2i$ et $z_2 = \\dfrac{6 - 4i}{2} = 3 - 2i$.</p>"
        },
        {
          "question": "<p><strong>2.</strong> On pose $z_1 = 3 + 2i$. Calculer le module et un argument de $z_1$.</p>",
          "reponse": "<p>$|z_1| = \\sqrt{3^2 + 2^2} = \\sqrt{13}$.<br>Un argument $\\theta$ est tel que $\\cos \\theta = \\dfrac{3}{\\sqrt{13}}$ et $\\sin \\theta = \\dfrac{2}{\\sqrt{13}}$.<br>Donc $\\theta \\approx \\arctan\\left(\\dfrac{2}{3}\\right)$.</p>"
        },
        {
          "question": "<p><strong>3.</strong> Écrire $z_1$ sous forme trigonométrique.</p>",
          "reponse": "<p>$z_1 = \\sqrt{13} \\left( \\cos \\theta + i \\sin \\theta \\right)$ avec $\\theta = \\arg(z_1)$.</p>"
        },
        {
          "question": "<p><strong>4.</strong> Déterminer l'ensemble des points $M$ d'affixe $z$ tels que $|z - (3 + 2i)| = 2$.</p>",
          "reponse": "<p>C'est le cercle de centre $\\Omega$ d'affixe $3 + 2i$ et de rayon 2.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Suites Numériques",
      "points": "4 pts",
      "enonce": "<p>Cet exercice porte sur l'étude d'une suite définie par récurrence.</p>",
      "questions": [
        {
          "question": "<p><strong>1.</strong> On considère la suite $(u_n)$ définie par $u_0 = 1$ et $u_{n+1} = \\dfrac{1}{2}u_n + 1$. Calculer $u_1$, $u_2$ et $u_3$.</p>",
          "reponse": "<p>$u_1 = \\dfrac{1}{2} \\times 1 + 1 = 1.5$<br>$u_2 = \\dfrac{1}{2} \\times 1.5 + 1 = 1.75$<br>$u_3 = \\dfrac{1}{2} \\times 1.75 + 1 = 1.875$</p>"
        },
        {
          "question": "<p><strong>2.</strong> Démontrer par récurrence que pour tout $n \\in \\mathbb{N}$, $u_n \\leq 2$.</p>",
          "reponse": "<p><strong>Initialisation :</strong> $u_0 = 1 \\leq 2$, vraie.<br><strong>Hérédité :</strong> Supposons $u_n \\leq 2$. Alors $u_{n+1} = \\dfrac{1}{2}u_n + 1 \\leq \\dfrac{1}{2} \\times 2 + 1 = 2$. La propriété est héréditaire.<br>Donc $u_n \\leq 2$ pour tout $n$.</p>"
        },
        {
          "question": "<p><strong>3.</strong> Étudier la monotonie de la suite $(u_n)$.</p>",
          "reponse": "<p>$u_{n+1} - u_n = \\dfrac{1}{2}u_n + 1 - u_n = 1 - \\dfrac{1}{2}u_n$.<br>Comme $u_n \\leq 2$, on a $1 - \\dfrac{1}{2}u_n \\geq 0$.<br>Donc $u_{n+1} - u_n \\geq 0$, la suite est croissante.</p>"
        },
        {
          "question": "<p><strong>4.</strong> En déduire que la suite converge et déterminer sa limite.</p>",
          "reponse": "<p>La suite est croissante et majorée par 2, donc elle converge vers une limite $l$.<br>En passant à la limite dans $u_{n+1} = \\dfrac{1}{2}u_n + 1$, on obtient $l = \\dfrac{1}{2}l + 1$, soit $\\dfrac{1}{2}l = 1$, donc $l = 2$.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Probabilités et Loi Binomiale",
      "points": "4 pts",
      "enonce": "<p>Cet exercice porte sur les probabilités et la loi binomiale.</p>",
      "questions": [
        {
          "question": "<p><strong>1.</strong> Une urne contient 5 boules rouges et 3 boules vertes. On tire successivement 3 boules avec remise. Soit $X$ la variable aléatoire égale au nombre de boules rouges obtenues. Déterminer la loi de probabilité de $X$.</p>",
          "reponse": "<p>$X$ suit une loi binomiale de paramètres $n=3$ et $p = \\dfrac{5}{8}$.<br>$P(X = k) = C_3^k \\left(\\dfrac{5}{8}\\right)^k \\left(\\dfrac{3}{8}\\right)^{3-k}$ pour $k \\in \\{0, 1, 2, 3\\}$.</p>"
        },
        {
          "question": "<p><strong>2.</strong> Calculer $P(X = 2)$.</p>",
          "reponse": "<p>$P(X = 2) = C_3^2 \\left(\\dfrac{5}{8}\\right)^2 \\left(\\dfrac{3}{8}\\right)^1 = 3 \\times \\dfrac{25}{64} \\times \\dfrac{3}{8} = \\dfrac{225}{512}$.</p>"
        },
        {
          "question": "<p><strong>3.</strong> Calculer l'espérance et la variance de $X$.</p>",
          "reponse": "<p>$E(X) = np = 3 \\times \\dfrac{5}{8} = \\dfrac{15}{8}$.<br>$V(X) = np(1-p) = 3 \\times \\dfrac{5}{8} \\times \\dfrac{3}{8} = \\dfrac{45}{64}$.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Statistiques à Deux Variables",
      "points": "4 pts",
      "enonce": "<p>Cet exercice porte sur l'ajustement linéaire d'un nuage de points.</p>",
      "questions": [
        {
          "question": "<p><strong>1.</strong> Déterminer les coordonnées du point moyen du nuage de points suivant : $(1, 2)$, $(2, 4)$, $(3, 6)$, $(4, 8)$.</p>",
          "reponse": "<p>$\\bar{x} = \\dfrac{1+2+3+4}{4} = \\dfrac{10}{4} = 2.5$<br>$\\bar{y} = \\dfrac{2+4+6+8}{4} = \\dfrac{20}{4} = 5$<br>Le point moyen est $G(2.5, 5)$.</p>"
        },
        {
          "question": "<p><strong>2.</strong> Calculer la covariance $\\text{Cov}(x, y)$.</p>",
          "reponse": "<p>$\\text{Cov}(x, y) = \\dfrac{1}{4} \\sum_{i=1}^4 (x_i - \\bar{x})(y_i - \\bar{y})$<br>$= \\dfrac{1}{4} \\left[ (1-2.5)(2-5) + (2-2.5)(4-5) + (3-2.5)(6-5) + (4-2.5)(8-5) \\right]$<br>$= \\dfrac{1}{4} \\left[ (-1.5)(-3) + (-0.5)(-1) + (0.5)(1) + (1.5)(3) \\right]$<br>$= \\dfrac{1}{4} (4.5 + 0.5 + 0.5 + 4.5) = \\dfrac{10}{4} = 2.5$.</p>"
        },
        {
          "question": "<p><strong>3.</strong> Déterminer l'équation de la droite de régression de $y$ en $x$.</p>",
          "reponse": "<p>La droite de régression a pour équation $y - \\bar{y} = \\dfrac{\\text{Cov}(x, y)}{V(x)} (x - \\bar{x})$.<br>$V(x) = \\dfrac{1}{4} \\sum (x_i - \\bar{x})^2 = \\dfrac{1}{4} (2.25 + 0.25 + 0.25 + 2.25) = \\dfrac{5}{4} = 1.25$.<br>$\\dfrac{\\text{Cov}(x, y)}{V(x)} = \\dfrac{2.5}{1.25} = 2$.<br>L'équation est $y - 5 = 2(x - 2.5)$, soit $y = 2x$.</p>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
