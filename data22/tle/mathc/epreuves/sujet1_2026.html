<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Mathématiques",
  "classe": "Terminale C",
  "sequence": "Séquence 1",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Nombres complexes et équations",
      "points": "4 points",
      "enonce": "<div style='display: flex; flex-direction: column; gap: 8px;'>\n  <p>Le plan complexe est muni d'un repère orthonormé \\( (O; \\vec{u}; \\vec{v}) \\). On considère les nombres complexes :</p>\n  <div class='math-block' style='background: #f1f5f9; padding: 10px; border-radius: 6px;'>\n    <div class='math'>$$ z_1 = 1 + i \\quad ; \\quad z_2 = 2 - 3i $$</div>\n  </div>\n</div>",
      "questions": [
        {
          "question": "<p>1) Déterminer les parties réelles et imaginaires de \\( z_1 \\) et \\( z_2 \\).</p>",
          "reponse": "<p>\\( \\text{Re}(z_1) = 1 \\), \\( \\text{Im}(z_1) = 1 \\) ; \\( \\text{Re}(z_2) = 2 \\), \\( \\text{Im}(z_2) = -3 \\).</p>"
        },
        {
          "question": "<p>2) Calculer \\( z_1 + z_2 \\), \\( z_1 - z_2 \\), \\( z_1 \\times z_2 \\) et \\( \\dfrac{z_1}{z_2} \\).</p>",
          "reponse": "<p>\\( z_1 + z_2 = 3 - 2i \\)<br>\\( z_1 - z_2 = -1 + 4i \\)<br>\\( z_1 \\times z_2 = (1+i)(2-3i) = 2 - 3i + 2i - 3i^2 = 2 - i + 3 = 5 - i \\)<br>\\( \\dfrac{z_1}{z_2} = \\dfrac{1+i}{2-3i} = \\dfrac{(1+i)(2+3i)}{(2-3i)(2+3i)} = \\dfrac{2+3i+2i+3i^2}{4+9} = \\dfrac{-1+5i}{13} = -\\dfrac{1}{13} + \\dfrac{5}{13}i \\)</p>"
        },
        {
          "question": "<p>3) Déterminer le conjugué de \\( z_1 \\) et le module de \\( z_2 \\).</p>",
          "reponse": "<p>\\( \\overline{z_1} = 1 - i \\)<br>\\( |z_2| = \\sqrt{2^2 + (-3)^2} = \\sqrt{4 + 9} = \\sqrt{13} \\)</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Suites numériques",
      "points": "4 points",
      "enonce": "<div style='display: flex; flex-direction: column; gap: 8px;'>\n  <p>On considère la suite \\( (u_n) \\) définie pour tout entier naturel \\( n \\) par :</p>\n  <div class='math-block' style='background: #f1f5f9; padding: 10px; border-radius: 6px;'>\n    <div class='math'>$$ u_{n+1} = 2u_n - 1 \\quad \\text{avec} \\quad u_0 = 3 $$</div>\n  </div>\n</div>",
      "questions": [
        {
          "question": "<p>1) Calculer les termes \\( u_1 \\), \\( u_2 \\) et \\( u_3 \\).</p>",
          "reponse": "<p>\\( u_1 = 2 \\times 3 - 1 = 5 \\)<br>\\( u_2 = 2 \\times 5 - 1 = 9 \\)<br>\\( u_3 = 2 \\times 9 - 1 = 17 \\)</p>"
        },
        {
          "question": "<p>2) Démontrer par récurrence que pour tout \\( n \\in \\mathbb{N} \\), \\( u_n = 2^{n+1} + 1 \\).</p>",
          "reponse": "<p>Initialisation : Pour \\( n=0 \\), \\( u_0 = 2^{1} + 1 = 2 + 1 = 3 \\), vrai.<br>Hérédité : Supposons que \\( u_n = 2^{n+1} + 1 \\). Alors \\( u_{n+1} = 2(2^{n+1} + 1) - 1 = 2^{n+2} + 2 - 1 = 2^{n+2} + 1 \\). La propriété est héréditaire. Conclusion : la propriété est vraie pour tout \\( n \\in \\mathbb{N} \\).</p>"
        },
        {
          "question": "<p>3) Déterminer la limite de \\( (u_n) \\).</p>",
          "reponse": "<p>Comme \\( 2^{n+1} \\to +\\infty \\), on a \\( \\lim\\limits_{n \\to +\\infty} u_n = +\\infty \\).</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Statistiques à deux variables",
      "points": "6 points",
      "enonce": "<div style='display: flex; flex-direction: column; gap: 8px;'>\n  <p>Le tableau ci-dessous donne le nombre d'habitants (en milliers) d'une ville en fonction de l'année.</p>\n  <div style='background: #f1f5f9; padding: 10px; border-radius: 6px; overflow-x: auto;'>\n    <table style='width: 100%; border-collapse: collapse; font-size: 14px;'>\n      <thead>\n        <tr style='background: #3b82f6; color: white;'>\n          <th style='padding: 8px; border: 1px solid #ddd;'>Année \\( x \\)</th>\n          <th style='padding: 8px; border: 1px solid #ddd;'>2000</th>\n          <th style='padding: 8px; border: 1px solid #ddd;'>2002</th>\n          <th style='padding: 8px; border: 1px solid #ddd;'>2004</th>\n          <th style='padding: 8px; border: 1px solid #ddd;'>2006</th>\n          <th style='padding: 8px; border: 1px solid #ddd;'>2008</th>\n        </tr>\n      </thead>\n      <tbody>\n        <tr>\n          <td style='padding: 8px; border: 1px solid #ddd; background: #f8fafc;'><strong>Population \\( y \\)</strong></td>\n          <td style='padding: 8px; border: 1px solid #ddd; background: #f8fafc;'>10</td>\n          <td style='padding: 8px; border: 1px solid #ddd; background: #f8fafc;'>12</td>\n          <td style='padding: 8px; border: 1px solid #ddd; background: #f8fafc;'>15</td>\n          <td style='padding: 8px; border: 1px solid #ddd; background: #f8fafc;'>18</td>\n          <td style='padding: 8px; border: 1px solid #ddd; background: #f8fafc;'>22</td>\n        </tr>\n      </tbody>\n    </table>\n  </div>\n</div>",
      "questions": [
        {
          "question": "<p>1) Représenter le nuage de points associé à cette série statistique.</p>",
          "reponse": "<p>Le nuage de points est formé par les points \\( A_1(2000;10) \\), \\( A_2(2002;12) \\), \\( A_3(2004;15) \\), \\( A_4(2006;18) \\) et \\( A_5(2008;22) \\). Il présente une tendance croissante.</p>"
        },
        {
          "question": "<p>2) Calculer les coordonnées du point moyen \\( G \\).</p>",
          "reponse": "<p>\\( \\bar{x} = \\dfrac{2000+2002+2004+2006+2008}{5} = 2004 \\)<br>\\( \\bar{y} = \\dfrac{10+12+15+18+22}{5} = \\dfrac{77}{5} = 15.4 \\)<br>Donc \\( G(2004; 15.4) \\).</p>"
        },
        {
          "question": "<p>3) Déterminer l'équation de la droite de régression de \\( y \\) en \\( x \\) par la méthode des moindres carrés.</p>",
          "reponse": "<p>On pose \\( X = x - 2000 \\) pour simplifier les calculs. On obtient \\( X_i \\) : 0, 2, 4, 6, 8.<br>\\( \\bar{X} = 4 \\), \\( \\bar{y} = 15.4 \\)<br>\\( \\sum X_i^2 = 0 + 4 + 16 + 36 + 64 = 120 \\)<br>\\( \\sum X_i y_i = 0\\times10 + 2\\times12 + 4\\times15 + 6\\times18 + 8\\times22 = 0+24+60+108+176 = 368 \\)<br>\\( a = \\dfrac{\\sum X_i y_i - n\\bar{X}\\bar{y}}{\\sum X_i^2 - n\\bar{X}^2} = \\dfrac{368 - 5\\times4\\times15.4}{120 - 5\\times16} = \\dfrac{368 - 308}{120 - 80} = \\dfrac{60}{40} = 1.5 \\)<br>\\( b = \\bar{y} - a\\bar{X} = 15.4 - 1.5\\times4 = 15.4 - 6 = 9.4 \\)<br>Donc \\( y = 1.5X + 9.4 \\). En revenant à \\( x \\) : \\( y = 1.5(x-2000) + 9.4 = 1.5x - 3000 + 9.4 = 1.5x - 2990.6 \\).</p>"
        },
        {
          "question": "<p>4) En utilisant cette droite, estimer la population en 2010.</p>",
          "reponse": "<p>Pour \\( x = 2010 \\) : \\( y = 1.5 \\times 2010 - 2990.6 = 3015 - 2990.6 = 24.4 \\) milliers d'habitants.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Probabilités et loi binomiale",
      "points": "6 points",
      "enonce": "<div style='display: flex; flex-direction: column; gap: 8px;'>\n  <p>Dans une classe de Terminale C, 60% des élèves sont des filles. On choisit au hasard et avec remise 5 élèves de cette classe. Soit \\( X \\) la variable aléatoire égale au nombre de filles choisies.</p>\n</div>",
      "questions": [
        {
          "question": "<p>1) Justifier que \\( X \\) suit une loi binomiale dont on précisera les paramètres.</p>",
          "reponse": "<p>On répète 5 fois de manière indépendante une épreuve de Bernoulli de paramètre \\( p = 0.6 \\) (succès : \"choisir une fille\"). Donc \\( X \\) suit la loi binomiale \\( \\mathcal{B}(5; 0.6) \\).</p>"
        },
        {
          "question": "<p>2) Déterminer \\( P(X = 2) \\).</p>",
          "reponse": "<p>\\( P(X = 2) = \\binom{5}{2} (0.6)^2 (0.4)^3 = 10 \\times 0.36 \\times 0.064 = 10 \\times 0.02304 = 0.2304 \\)</p>"
        },
        {
          "question": "<p>3) Calculer l'espérance mathématique \\( E(X) \\) et l'écart-type \\( \\sigma(X) \\).</p>",
          "reponse": "<p>\\( E(X) = np = 5 \\times 0.6 = 3 \\)<br>\\( V(X) = np(1-p) = 5 \\times 0.6 \\times 0.4 = 1.2 \\)<br>\\( \\sigma(X) = \\sqrt{V(X)} = \\sqrt{1.2} \\approx 1.095 \\)</p>"
        },
        {
          "question": "<p>4) Quelle est la probabilité d'avoir au moins 3 filles ?</p>",
          "reponse": "<p>\\( P(X \\ge 3) = P(X=3) + P(X=4) + P(X=5) \\)<br>\\( P(X=3) = \\binom{5}{3} (0.6)^3 (0.4)^2 = 10 \\times 0.216 \\times 0.16 = 0.3456 \\)<br>\\( P(X=4) = \\binom{5}{4} (0.6)^4 (0.4)^1 = 5 \\times 0.1296 \\times 0.4 = 0.2592 \\)<br>\\( P(X=5) = \\binom{5}{5} (0.6)^5 (0.4)^0 = 0.07776 \\)<br>\\( P(X \\ge 3) = 0.3456 + 0.2592 + 0.07776 = 0.68256 \\)</p>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
