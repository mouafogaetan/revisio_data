<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Épreuve</title>

    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: { fontCache: 'global' },
            options: {
                skipHtmlTypes: 'script',
                ignoreHtmlClass: 'no-mathjax'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f0f4f8;
        color: #1e293b;
        overflow: hidden;
        touch-action: manipulation;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }

    /* ===== HEADER ===== */
    .slide-header {
        flex-shrink: 0;
        padding: 14px 16px 10px 16px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
        z-index: 10;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 4px;
    }

    .slide-header h1 {
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        padding: 0 4px;
        word-break: break-word;
    }

    .header-sub {
        font-size: 0.75rem;
        color: #64748b;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .header-sub span {
        background: rgba(0,0,0,0.04);
        padding: 2px 10px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== CORPS ===== */
    .slide-body {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 16px 18px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    }

    .slide-body::-webkit-scrollbar {
        width: 4px;
    }
    .slide-body::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.04);
    }
    .slide-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
    }

    /* ===== EXERCICE ===== */
    .exercise-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 16px 16px 12px 16px;
        flex-shrink: 0;
    }

    .exercise-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e2e8f0;
    }

    .exercise-title {
        font-weight: 700;
        font-size: 1.1rem;
        color: #1e40af;
    }

    .exercise-points {
        font-size: 0.75rem;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 2px 12px;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
    }

    .exercise-statement {
        color: #1e293b;
        line-height: 1.7;
        margin-bottom: 12px;
        font-size: 0.95rem;
        padding: 0 4px;
    }

    .exercise-statement .math {
        color: #1e40af;
    }

    /* ===== QUESTIONS ===== */
    .question-block {
        background: rgba(0,0,0,0.02);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 8px;
        border-left: 3px solid #e2e8f0;
        transition: border-color 0.3s ease;
    }

    .question-block.revealed {
        border-left-color: #059669;
    }

    .question-text {
        font-size: 0.92rem;
        color: #1e293b;
        line-height: 1.6;
        margin-bottom: 8px;
        display: flex;
        gap: 8px;
    }

    .question-label {
        font-weight: 600;
        color: #2563eb;
        flex-shrink: 0;
    }

    .question-answer {
        background: rgba(5, 150, 105, 0.06);
        border: 1px solid rgba(5, 150, 105, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        margin-top: 8px;
        display: none;
        font-size: 0.9rem;
        color: #065f46;
        line-height: 1.6;
        transition: all 0.3s ease;
    }

    .question-answer.visible {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .question-answer .math {
        color: #065f46;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .btn-reveal {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.15);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #2563eb;
        cursor: pointer;
        transition: all 0.15s ease;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        margin-top: 4px;
    }

    .btn-reveal:active {
        transform: scale(0.94);
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-reveal.revealed {
        background: rgba(5, 150, 105, 0.1);
        border-color: rgba(5, 150, 105, 0.2);
        color: #059669;
    }

    /* ===== FOOTER ===== */
    .slide-footer {
        flex-shrink: 0;
        padding: 12px 14px 16px 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
    }

    .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
    }

    .footer-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn {
        background: rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.06);
        border-radius: 40px;
        padding: 8px 14px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 40px;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        flex: 0 1 auto;
    }

    .btn:active {
        transform: scale(0.94);
        background: rgba(0,0,0,0.08);
    }

    .btn-secondary {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.06);
    }

    .btn-icon {
        font-size: 1.1rem;
        line-height: 1;
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.12);
        color: #2563eb;
    }
    .btn-primary:active {
        background: rgba(37, 99, 235, 0.15);
    }

    .btn-success {
        background: rgba(5, 150, 105, 0.08);
        border-color: rgba(5, 150, 105, 0.12);
        color: #059669;
    }
    .btn-success:active {
        background: rgba(5, 150, 105, 0.15);
    }

    .btn-warning {
        background: rgba(217, 119, 6, 0.08);
        border-color: rgba(217, 119, 6, 0.12);
        color: #d97706;
    }
    .btn-warning:active {
        background: rgba(217, 119, 6, 0.15);
    }

    .counter {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        background: rgba(0,0,0,0.04);
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
        .slide-header h1 {
            font-size: 1.1rem;
        }
        .header-sub {
            font-size: 0.65rem;
            gap: 6px;
        }
        .exercise-title {
            font-size: 1rem;
        }
        .exercise-statement {
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 0.82rem;
        }
        .btn {
            font-size: 0.75rem;
            padding: 6px 10px;
            min-height: 34px;
        }
        .footer-actions {
            gap: 5px;
        }
        .slide-body {
            padding: 12px 12px 16px 12px;
        }
    }

    @media (min-width: 700px) {
        .app-container {
            max-width: 600px;
            border-radius: 32px;
            margin-top: 20px;
            margin-bottom: 20px;
            height: 90vh;
            height: 90dvh;
        }
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="slide-header">
        <h1 id="examTitle">Épreuve</h1>
        <div class="header-sub" id="examInfo">
            <span id="subjectInfo">Matière</span>
            <span id="classInfo">Classe</span>
            <span id="sequenceInfo">Séquence</span>
            <span id="yearInfo">Année</span>
        </div>
    </header>

    <!-- BODY -->
    <main class="slide-body" id="slideBody"></main>

    <!-- FOOTER -->
    <footer class="slide-footer">
        <div class="footer-top">
            <span class="counter" id="exerciseCounter">Exercice 1 / 3</span>
            <span class="counter" id="questionCounter">Q: 0 / 0</span>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn">
                <span class="btn-icon">◀</span> <span class="btn-label">Préc.</span>
            </button>
            <button class="btn btn-secondary" id="nextBtn">
                <span class="btn-label">Suiv.</span> <span class="btn-icon">▶</span>
            </button>
            <button class="btn btn-primary" id="revealAllBtn">
                <span class="btn-icon">👁️</span> <span class="btn-label">Tout voir</span>
            </button>
            <button class="btn btn-warning" id="hideAllBtn">
                <span class="btn-icon">🙈</span> <span class="btn-label">Tout cacher</span>
            </button>
        </div>
    </footer>
</div>

<script>
$(function() {

    // ================================================================
    // DONNÉES DE L'ÉPREUVE - MODIFIEZ ICI
    // ================================================================
    const examData = {
  "matiere": "Mathématiques",
  "classe": "Terminale C",
  "sequence": "Séquence 5",
  "anneeScolaire": "2025-2026",
  "exercices": [
    {
      "titre": "Exercice 1 : Fonctions exponentielles et logarithmes",
      "points": "4 points",
      "enonce": "<div style='display: flex; flex-direction: column; gap: 8px;'>\n  <p>On considère la fonction \\( f \\) définie sur \\( \\mathbb{R} \\) par :</p>\n  <div class='math-block' style='background: #f1f5f9; padding: 10px; border-radius: 6px;'>\n    <div class='math'>$$ f(x) = e^{2x} - 2e^x $$</div>\n  </div>\n</div>",
      "questions": [
        {
          "question": "<p>1) Déterminer la limite de \\( f(x) \\) lorsque \\( x \\) tend vers \\( -\\infty \\) et vers \\( +\\infty \\).</p>",
          "reponse": "<p>\\( \\lim\\limits_{x \\to -\\infty} f(x) = 0 \\) car \\( e^{2x} \\to 0 \\) et \\( e^x \\to 0 \\).<br>\\( \\lim\\limits_{x \\to +\\infty} f(x) = +\\infty \\) car \\( e^{2x} \\) domine \\( 2e^x \\).</p>"
        },
        {
          "question": "<p>2) Calculer \\( f'(x) \\) et étudier le signe de \\( f'(x) \\).</p>",
          "reponse": "<p>\\( f'(x) = 2e^{2x} - 2e^x = 2e^x(e^x - 1) \\).<br>Comme \\( e^x > 0 \\), \\( f'(x) \\) est du signe de \\( e^x - 1 \\).<br>Donc \\( f'(x) < 0 \\) sur \\( ]-\\infty; 0[ \\) et \\( f'(x) > 0 \\) sur \\( ]0; +\\infty[ \\).<br>La fonction est décroissante sur \\( ]-\\infty; 0] \\) et croissante sur \\( [0; +\\infty[ \\).</p>"
        },
        {
          "question": "<p>3) En déduire le minimum de \\( f \\) sur \\( \\mathbb{R} \\).</p>",
          "reponse": "<p>Le minimum est atteint en \\( x = 0 \\) et vaut \\( f(0) = e^0 - 2e^0 = 1 - 2 = -1 \\).</p>"
        },
        {
          "question": "<p>4) Résoudre dans \\( \\mathbb{R} \\) l'équation \\( f(x) = 0 \\).</p>",
          "reponse": "<p>\\( e^{2x} - 2e^x = 0 \\iff e^x(e^x - 2) = 0 \\).<br>Comme \\( e^x > 0 \\), on a \\( e^x = 2 \\), donc \\( x = \\ln 2 \\).</p>"
        }
      ]
    },
    {
      "titre": "Exercice 2 : Primitives et intégrales",
      "points": "4 points",
      "enonce": "<div style='display: flex; flex-direction: column; gap: 8px;'>\n  <p>On considère la fonction \\( f(x) = \\dfrac{1}{x} + \\ln x \\) définie sur \\( ]0; +\\infty[ \\).</p>\n</div>",
      "questions": [
        {
          "question": "<p>1) Déterminer une primitive \\( F \\) de \\( f \\) sur \\( ]0; +\\infty[ \\).</p>",
          "reponse": "<p>Une primitive de \\( \\dfrac{1}{x} \\) est \\( \\ln x \\).<br>Une primitive de \\( \\ln x \\) est \\( x\\ln x - x \\) (intégration par parties).<br>Donc \\( F(x) = \\ln x + x\\ln x - x + C = (1+x)\\ln x - x + C \\).</p>"
        },
        {
          "question": "<p>2) Calculer l'intégrale \\( I = \\displaystyle\\int_{1}^{e} f(x) \\, dx \\).</p>",
          "reponse": "<p>On utilise la primitive trouvée précédemment avec \\( C = 0 \\).<br>\\( I = [\\ln x + x\\ln x - x]_{1}^{e} \\)<br>\\( = (\\ln e + e\\ln e - e) - (\\ln 1 + 1\\ln 1 - 1) \\)<br>\\( = (1 + e - e) - (0 + 0 - 1) = 1 + 1 = 2 \\).</p>"
        },
        {
          "question": "<p>3) En utilisant une intégration par parties, calculer \\( J = \\displaystyle\\int_{1}^{e} (\\ln x)^2 \\, dx \\).</p>",
          "reponse": "<p>On pose \\( u = (\\ln x)^2 \\) et \\( v' = 1 \\).<br>\\( u' = \\dfrac{2\\ln x}{x} \\) et \\( v = x \\).<br>\\( J = [x(\\ln x)^2]_{1}^{e} - \\displaystyle\\int_{1}^{e} x \\times \\dfrac{2\\ln x}{x} \\, dx \\)<br>\\( = [x(\\ln x)^2]_{1}^{e} - 2\\displaystyle\\int_{1}^{e} \\ln x \\, dx \\)<br>\\( = (e \\times 1^2 - 0) - 2[x\\ln x - x]_{1}^{e} \\)<br>\\( = e - 2[(e - e) - (0 - 1)] = e - 2(1) = e - 2 \\).</p>"
        }
      ]
    },
    {
      "titre": "Exercice 3 : Équations différentielles",
      "points": "5 points",
      "enonce": "<div style='display: flex; flex-direction: column; gap: 8px;'>\n  <p>On considère l'équation différentielle :</p>\n  <div class='math-block' style='background: #f1f5f9; padding: 10px; border-radius: 6px;'>\n    <div class='math'>$$ (E) : y'' + 4y' + 4y = 0 $$</div>\n  </div>\n</div>",
      "questions": [
        {
          "question": "<p>1) Déterminer l'équation caractéristique de \\( (E) \\).</p>",
          "reponse": "<p>L'équation caractéristique est : \\( r^2 + 4r + 4 = 0 \\), soit \\( (r+2)^2 = 0 \\).</p>"
        },
        {
          "question": "<p>2) Résoudre cette équation caractéristique et en déduire la solution générale de \\( (E) \\).</p>",
          "reponse": "<p>L'équation caractéristique admet une racine double \\( r = -2 \\).<br>Donc la solution générale de \\( (E) \\) est : \\( y(x) = (C_1 + C_2 x)e^{-2x} \\), avec \\( C_1, C_2 \\in \\mathbb{R} \\).</p>"
        },
        {
          "question": "<p>3) Déterminer la solution particulière vérifiant les conditions initiales \\( y(0) = 1 \\) et \\( y'(0) = 0 \\).</p>",
          "reponse": "<p>\\( y(0) = C_1 = 1 \\).<br>\\( y'(x) = C_2 e^{-2x} - 2(C_1 + C_2 x)e^{-2x} \\).<br>\\( y'(0) = C_2 - 2C_1 = 0 \\), donc \\( C_2 = 2C_1 = 2 \\).<br>La solution particulière est : \\( y(x) = (1 + 2x)e^{-2x} \\).</p>"
        },
        {
          "question": "<p>4) Déterminer la limite de cette solution lorsque \\( x \\) tend vers \\( +\\infty \\).</p>",
          "reponse": "<p>\\( y(x) = (1 + 2x)e^{-2x} \\).<br>Comme \\( \\lim\\limits_{x \\to +\\infty} (1+2x)e^{-2x} = 0 \\) (croissance comparée), la solution tend vers 0.</p>"
        }
      ]
    },
    {
      "titre": "Exercice 4 : Barycentres et lignes de niveau",
      "points": "3 points",
      "enonce": "<div style='display: flex; flex-direction: column; gap: 8px;'>\n  <p>Soient \\( A \\), \\( B \\) et \\( C \\) trois points distincts du plan. On considère le barycentre \\( G \\) du système de points pondérés \\( \\{(A, 1), (B, 2), (C, 3)\\} \\).</p>\n</div>",
      "questions": [
        {
          "question": "<p>1) Donner la relation vectorielle caractérisant \\( G \\).</p>",
          "reponse": "<p>\\( \\overrightarrow{GA} + 2\\overrightarrow{GB} + 3\\overrightarrow{GC} = \\vec{0} \\).</p>"
        },
        {
          "question": "<p>2) Montrer que \\( G \\) est le barycentre du système \\( \\{(B, 2), (M, 4)\\} \\) où \\( M \\) est le milieu de \\( [AC] \\).</p>",
          "reponse": "<p>M est le barycentre de \\( \\{(A, 1), (C, 3)\\} \\) car \\( \\overrightarrow{MA} + 3\\overrightarrow{MC} = \\vec{0} \\).<br>Le barycentre de \\( \\{(B, 2), (M, 4)\\} \\) vérifie \\( 2\\overrightarrow{GB} + 4\\overrightarrow{GM} = \\vec{0} \\).<br>En utilisant la propriété d'associativité, ce système est équivalent à \\( \\{(A, 1), (B, 2), (C, 3)\\} \\).<br>Donc \\( G \\) est bien le barycentre de \\( \\{(B, 2), (M, 4)\\} \\).</p>"
        },
        {
          "question": "<p>3) Déterminer les coordonnées de \\( G \\) dans un repère orthonormé où \\( A(1;0) \\), \\( B(0;1) \\) et \\( C(2;3) \\).</p>",
          "reponse": "<p>\\( x_G = \\dfrac{1\\times1 + 2\\times0 + 3\\times2}{1+2+3} = \\dfrac{1 + 0 + 6}{6} = \\dfrac{7}{6} \\)<br>\\( y_G = \\dfrac{1\\times0 + 2\\times1 + 3\\times3}{6} = \\dfrac{0 + 2 + 9}{6} = \\dfrac{11}{6} \\)<br>Donc \\( G\\left(\\dfrac{7}{6}; \\dfrac{11}{6}\\right) \\).</p>"
        }
      ]
    },
    {
      "titre": "Exercice 5 : Probabilités et loi binomiale",
      "points": "4 points",
      "enonce": "<div style='display: flex; flex-direction: column; gap: 8px;'>\n  <p>Une entreprise produit des ampoules électriques. La probabilité qu'une ampoule soit défectueuse est de 0.05. On prélève un échantillon de 10 ampoules. Soit \\( X \\) la variable aléatoire égale au nombre d'ampoules défectueuses dans l'échantillon.</p>\n</div>",
      "questions": [
        {
          "question": "<p>1) Justifier que \\( X \\) suit une loi binomiale. Préciser ses paramètres.</p>",
          "reponse": "<p>On répète 10 fois une épreuve de Bernoulli de paramètre \\( p = 0.05 \\) (succès : ampoule défectueuse). Les tirages sont indépendants. Donc \\( X \\) suit la loi binomiale \\( \\mathcal{B}(10; 0.05) \\).</p>"
        },
        {
          "question": "<p>2) Calculer la probabilité qu'il y ait exactement 2 ampoules défectueuses.</p>",
          "reponse": "<p>\\( P(X=2) = \\binom{10}{2} (0.05)^2 (0.95)^8 = 45 \\times 0.0025 \\times 0.6634 \\approx 0.0746 \\).</p>"
        },
        {
          "question": "<p>3) Calculer la probabilité qu'il y ait au moins une ampoule défectueuse.</p>",
          "reponse": "<p>\\( P(X \\ge 1) = 1 - P(X=0) = 1 - (0.95)^{10} \\approx 1 - 0.5987 = 0.4013 \\).</p>"
        },
        {
          "question": "<p>4) Calculer l'espérance mathématique de \\( X \\).</p>",
          "reponse": "<p>\\( E(X) = np = 10 \\times 0.05 = 0.5 \\). En moyenne, on s'attend à trouver 0.5 ampoule défectueuse par échantillon.</p>"
        }
      ]
    }
  ]
};
    // ================================================================
    // ÉTAT
    // ================================================================
    let currentExerciseIndex = 0;
    let revealedAnswers = {};

    const totalExercises = examData.exercices.length;

    // Références jQuery
    const $title = $('#examTitle');
    const $subjectInfo = $('#subjectInfo');
    const $classInfo = $('#classInfo');
    const $sequenceInfo = $('#sequenceInfo');
    const $yearInfo = $('#yearInfo');
    const $body = $('#slideBody');
    const $exerciseCounter = $('#exerciseCounter');
    const $questionCounter = $('#questionCounter');
    const $prev = $('#prevBtn');
    const $next = $('#nextBtn');
    const $revealAll = $('#revealAllBtn');
    const $hideAll = $('#hideAllBtn');

    // ================================================================
    // FONCTIONS
    // ================================================================
    function renderExercise(index) {
        const exercise = examData.exercices[index];
        const totalQuestions = exercise.questions.length;

        // Mettre à jour le header
        $title.text(examData.matiere + ' - Épreuve');
        $subjectInfo.text('📚 ' + examData.matiere);
        $classInfo.text('🏫 ' + examData.classe);
        $sequenceInfo.text('📖 ' + examData.sequence);
        $yearInfo.text('📅 ' + examData.anneeScolaire);

        // Construire le contenu
        let html = '';

        // En-tête de l'exercice
        html += `
            <div class="exercise-card">
                <div class="exercise-header">
                    <span class="exercise-title">${exercise.titre}</span>
                    <span class="exercise-points">${exercise.points}</span>
                </div>
                <div class="exercise-statement">
                    ${exercise.enonce}
                </div>
        `;

        // Questions
        exercise.questions.forEach((q, qIndex) => {
            const isRevealed = revealedAnswers[index] && revealedAnswers[index][qIndex] || false;
            const questionId = `q-${index}-${qIndex}`;

            html += `
                <div class="question-block ${isRevealed ? 'revealed' : ''}" id="block-${questionId}">
                    <div class="question-text">
                        <span class="question-label">${qIndex + 1}.</span>
                        <span>${q.question}</span>
                    </div>
                    <button class="btn-reveal ${isRevealed ? 'revealed' : ''}" 
                            data-exercise="${index}" 
                            data-question="${qIndex}"
                            id="btn-${questionId}">
                        ${isRevealed ? '🙈 Masquer' : '👁️ Voir réponse'}
                    </button>
                    <div class="question-answer ${isRevealed ? 'visible' : ''}" id="answer-${questionId}">
                        ${q.reponse}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        $body.html(html);

        // Mettre à jour les compteurs
        $exerciseCounter.text(`Exercice ${index + 1} / ${totalExercises}`);
        $questionCounter.text(`Q: ${totalQuestions} question${totalQuestions > 1 ? 's' : ''}`);

        // Rafraîchir MathJax
        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.warn('MathJax error:', err));
            }, 100);
        }

        // Attacher les événements aux boutons de révélation
        $('.btn-reveal').on('click', function() {
            const exIndex = parseInt($(this).data('exercise'));
            const qIndex = parseInt($(this).data('question'));
            toggleAnswer(exIndex, qIndex);
        });
    }

    function toggleAnswer(exIndex, qIndex) {
        if (!revealedAnswers[exIndex]) {
            revealedAnswers[exIndex] = {};
        }

        const isRevealed = revealedAnswers[exIndex][qIndex] || false;
        revealedAnswers[exIndex][qIndex] = !isRevealed;

        const questionId = `q-${exIndex}-${qIndex}`;
        const $block = $(`#block-${questionId}`);
        const $btn = $(`#btn-${questionId}`);
        const $answer = $(`#answer-${questionId}`);

        if (revealedAnswers[exIndex][qIndex]) {
            $block.addClass('revealed');
            $btn.addClass('revealed');
            $btn.html('🙈 Masquer');
            $answer.addClass('visible');
        } else {
            $block.removeClass('revealed');
            $btn.removeClass('revealed');
            $btn.html('👁️ Voir réponse');
            $answer.removeClass('visible');
        }
    }

    function goToExercise(index) {
        if (index < 0) index = 0;
        if (index >= totalExercises) index = totalExercises - 1;
        currentExerciseIndex = index;
        renderExercise(index);
    }

    function goToNext() {
        if (currentExerciseIndex + 1 < totalExercises) {
            goToExercise(currentExerciseIndex + 1);
        }
    }

    function goToPrev() {
        if (currentExerciseIndex - 1 >= 0) {
            goToExercise(currentExerciseIndex - 1);
        }
    }

    function revealAll() {
        const exercise = examData.exercices[currentExerciseIndex];
        exercise.questions.forEach((_, qIndex) => {
            if (!revealedAnswers[currentExerciseIndex]) {
                revealedAnswers[currentExerciseIndex] = {};
            }
            revealedAnswers[currentExerciseIndex][qIndex] = true;
        });
        renderExercise(currentExerciseIndex);
    }

    function hideAll() {
        if (revealedAnswers[currentExerciseIndex]) {
            revealedAnswers[currentExerciseIndex] = {};
        }
        renderExercise(currentExerciseIndex);
    }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
        // Initialiser l'état des réponses
        examData.exercices.forEach((_, index) => {
            revealedAnswers[index] = {};
        });

        // Afficher le premier exercice
        renderExercise(0);

        // Événements
        $prev.on('click', goToPrev);
        $next.on('click', goToNext);
        $revealAll.on('click', revealAll);
        $hideAll.on('click', hideAll);

        // Support du clavier
        $(document).on('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                revealAll();
            } else if (e.key === 'h' || e.key === 'H') {
                e.preventDefault();
                hideAll();
            }
        });
    }

    init();
});
</script>

</body>
</html>
